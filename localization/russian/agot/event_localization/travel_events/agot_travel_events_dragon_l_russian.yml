l_russian:

 #########################
 # DO A FLIP (0001-0004) #
 #########################
 # 0001
 agot_travel_events_dragon.0001.t: "Сальто"
 agot_travel_events_dragon.0001.desc: "По мере того, как я и [pet_dragon.GetName] парим над землями внизу, меня начинает одолевать скука. Ощущение новизны от полёта прошло, и моё равновесие начало восстанавливаться. Драконы известны своей способностью маневрировать в воздухе во время битвы или охоты, но такие трюки сопряжены с изрядной долей риска для наездника.\n\nТем не менее, это могло бы оживить моё путешествие и немного развлечь."
 agot_travel_events_dragon.0001.a: "Как насчёт сальто?"
 agot_travel_events_dragon.0001.b: "Лучше перестраховаться, чем потом жалеть."
 agot_travel_events_dragon.0001.injury_warning: "@warning_icon! #X Вы можете получить ранение.#!"
 agot_travel_events_dragon.0001.success: "Успех!"
 agot_travel_events_dragon.0001.success.flip_past: "[pet_dragon.GetName] делает сальто!"
 agot_travel_events_dragon.0001.success.flip: "[pet_dragon.GetName] отклоняется назад, и я чувствую, как [pet_dragon.Custom('GetDragonHerHis')] вес смещается подо мной, когда я сжимаю [pet_dragon.Custom('GetDragonHerHis')] ещё крепче. Несколько захватывающих мгновений верх сменяется низом, а низ - подъёмом, и земля проносится надо мной, в то время как небо угрожает поглотить меня снизу. Довольно скоро всё становится так, как и должно быть, поскольку [pet_dragon.GetNameNoTooltip] выпрямляется и продолжает лететь прямо вперёд, хотя моё сердце бешено колотится в груди от волнения."
 agot_travel_events_dragon.0001.failure: "Провал!"
 agot_travel_events_dragon.0001.failure.flip_past: "[pet_dragon.GetName] не может сделать сальто..."
 agot_travel_events_dragon.0001.failure.flip: "[pet_dragon.GetName] начинает отклоняться, но мне остаётся только карабкаться, так как дракон не может правильно перенести свой вес и неловко поворачивается в небе. Я чуть не падаю навстречу своей гибели, но моя нога больно цепляется за ремни седла. Карабкаться обратно наверх - неприятное удовольствие, но, к счастью, нам удаётся вернуться на прежний курс."
 agot_travel_events_dragon.0001.no_attempt: "Нет смысла."
 agot_travel_events_dragon.0001.no_attempt.flip: "Это не стоит такого риска..."


 ############################
 # BEAUTIFUL UP HERE (0005) #
 ############################
 # 0005
 agot_travel_events_dragon.0005.t: "Красота небес"
 agot_travel_events_dragon.0005.desc: "Когда я и [pet_dragon.GetName] парим в небесах, мы прорываемся сквозь облака, и нас обоих встречает удивительное зрелище. Со всех сторон нас окружают владения самих богов, мягкие белые стены выделяются на фоне свирепо-серых, в то время как земля под ними расстилается, словно ожившая карта."
 agot_travel_events_dragon.0005.a: "Всё это так спокойно, вдали от всего остального."
 agot_travel_events_dragon.0005.b: "Как славно! Я [Select_CString(ROOT.Char.IsFemale, 'прикоснулась', 'прикоснулся' )] к владениям древних драконьих наездников!"
 agot_travel_events_dragon.0005.c: "Взобравшись сюда, я становлюсь ближе к богам."


 ############################
 # ANTSY DRAGON (0006-0010) #
 ############################
 # 0006
 agot_travel_events_dragon.0006.t: "Беспокойный дракон"
 agot_travel_events_dragon.0006.desc: "Во время нашего полёта всё шло хорошо, пока внезапно [pet_dragon.GetName] не [Select_CString(EqualTo_string('он', pet_dragon.Custom('GetDragonSheHe')), 'начал', 'начала')] брыкаться и фыркать, становясь [Select_CString(EqualTo_string('он', pet_dragon.Custom('GetDragonSheHe')), 'беспокойным', 'беспокойной')], когда мы пролетали над каким—то лесом!\n\nБудь то из-за голода, скуки или расстройства, [pet_dragon.GetNameNoTooltip] определённо кажется [Select_CString(EqualTo_string('он', pet_dragon.Custom('GetDragonSheHe')), 'обеспокоенным', 'обеспокоенной')] тем, что находится внизу. Что мне делать?"
 agot_travel_events_dragon.0006.a: "У нас есть дела поважнее. Продолжай полёт."
 agot_travel_events_dragon.0006.a.tt: "Вы не задержитесь в пути, но [Select_CString(EqualTo_string('он', pet_dragon.Custom('GetDragonSheHe')), 'ваш дракон', 'ваша драконица')] будет [Select_CString(EqualTo_string('он', pet_dragon.Custom('GetDragonSheHe')), 'недоволен', 'недовольна')] тем, что вы [pet_dragon.Custom('GetDragonHerHis')] проигнорировали."
 agot_travel_events_dragon.0006.b: "Приземляйся, [pet_dragon.GetNameNoTooltip]. Что тебя беспокоит?"
 agot_travel_events_dragon.0006.b.tt: "Вы задержитесь в пути."

 # 0007
 agot_travel_events_dragon.0007.t: "$agot_travel_events_dragon.0006.t$"
 agot_travel_events_dragon.0007.desc: "[pet_dragon.GetName] приземляется с глухим стуком, заставляя меня подпрыгнуть в седле. После поисков источника недовольства моего дракона, мы обнаруживаем...\n\nНичего... [pet_dragon.GetNameNoTooltip] всё ещё выглядит [Select_CString(EqualTo_string('он', pet_dragon.Custom('GetDragonSheHe')), 'взволнованным', 'взволнованной')], но я чувствую, как напряжение постепенно спадает, когда [pet_dragon.Custom('GetDragonHerHis')] тело расслабляется подо мной. Что бы ни напугало моего дракона, оно либо исчезло, либо никогда не существовало, и я не могу справиться с чувством разочарования, которое охватывает меня, когда я снова беру поводья в свои руки."
 agot_travel_events_dragon.0007.a: "Все мы время от времени совершаем ошибки. Ничего страшного."
 agot_travel_events_dragon.0007.b: "Вялый зверь. Нам лучше не опаздывать."

 # 0008
 agot_travel_events_dragon.0008.t: "$agot_travel_events_dragon.0006.t$"
 agot_travel_events_dragon.0008.desc: "[pet_dragon.GetName] приземляется с глухим стуком, заставляя меня подпрыгнуть в седле. После поисков источника недовольства моего дракона, мы обнаруживаем...\n\n"
 agot_travel_events_dragon.0008.desc.pred: "Это [ROOT.Char.Custom('RegionalFerociousAnimal')], явно взволнованный нашим внезапным вторжением. В, возможно, бесполезной, но от этого не менее свирепой демонстрации неповиновения, крупный зверь тихо предупреждающе рычит. Обычно дракону приходится выбирать между сражением и бегством, и, похоже, [pet_dragon.GetNameNoTooltip] вполне может принять этот дерзкий вызов."
 agot_travel_events_dragon.0008.desc.prey: "Это не более чем напуганный [ROOT.Char.Custom('GetRandomRegionalSmallGame')], оцепеневший от внезапного появления [Select_CString(EqualTo_string('он', pet_dragon.Custom('GetDragonSheHe')), 'высшего хищника, такого', 'высшей хищницы, такой')] как [pet_dragon.GetNameNoTooltip]. Хватит простой команды, чтобы [pet_dragon.GetNameNoTooltip] быстро [Select_CString(EqualTo_string('он', pet_dragon.Custom('GetDragonSheHe')), 'расправился', 'расправилась')] с перепуганным животным, но действительно ли это того стоит?"
 agot_travel_events_dragon.0008.a.valyrian: "#emp Дракарис!#!"
 agot_travel_events_dragon.0008.a: "Преврати его в пепел, [pet_dragon.GetNameNoTooltip]!"
 agot_travel_events_dragon.0008.b: "Лети, [pet_dragon.GetNameNoTooltip]!"
 agot_travel_events_dragon.0008.c: "Оставь бедное создание в покое..."

 # 0009
 agot_travel_events_dragon.0009.t: "Наблюдение за людьми"
 agot_travel_events_dragon.0009.desc: "Путешествие на спине дракона порой может быть скучным; никакой компании, кроме редких облаков, и они вряд ли будут хорошими собеседниками. Я часто провожу время, осматривая землю внизу в поисках любого признака присутствия человека, отмечая любые отличительные черты, которые я могу различить, — не самая простая задача с высоты.\n\nСегодня я [Select_CString(ROOT.Char.IsFemale, 'обратила', 'обратил' )] внимание на прохожего, едва различимого. Но дракона, кажется, тянет к ним, поэтому я приказываю, чтобы [pet_dragon.GetName] [Select_CString(EqualTo_string('он', pet_dragon.Custom('GetDragonSheHe')), 'снизилась', 'снизился')], дабы рассмотреть его поближе."
 agot_travel_events_dragon.0009.desc.good: "Приземлившись неподалеку, я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] тепло [Select_CString(ROOT.Char.IsFemale, 'встречена', 'встречен' )] [Select_CString(good_commoner.IsFemale, 'женщиной, которая', 'мужчиной, который' )] называет себя [good_commoner.GetFirstNameNicknamed]. [pet_dragon.GetNameNoTooltip], кажется, чувствует себя непринуждённо в [Select_CString(good_commoner.IsFemale, 'её', 'его' )] присутствии, поэтому я [Select_CString(ROOT.Char.IsFemale, 'спрыгнула', 'спрыгнул' )] вниз. [Select_CString(ROOT.Char.IsFemale, 'Уверена', 'Уверен' )], у меня найдётся время для короткого разговора?"
 agot_travel_events_dragon.0009.desc.bad: "Приземлившись неподалёку, я [Select_CString(ROOT.Char.IsFemale, 'была встречена', 'был встречен' )] враждебно [Select_CString(bad_commoner.IsFemale, 'женщиной', 'мужчиной' )], у [Select_CString(bad_commoner.IsFemale, 'которой', 'которого' )] даже не хватило вежливости представиться. [pet_dragon.GetNameNoTooltip] встревоженно [Select_CString(EqualTo_string('он', pet_dragon.Custom('GetDragonSheHe')), 'ощетинился', 'ощетинилась')], и я нутром чую, что [Select_CString(bad_commoner.IsFemale, 'эта простолюдинка замыслила', 'этот простолюдин замыслил' )] дурное..."
 agot_travel_events_dragon.0009.desc.noble: "Я приземляюсь неподалёку, и меня встречает [noble.GetTitledFirstNameNicknamed], [Select_CString(noble.IsFemale, 'которая', 'который' )], должно быть, живёт в этих краях. Возможно, [Select_CString(noble.IsFemale, 'она заблудилась', 'он заблудился' )], или, возможно, [Select_CString(noble.IsFemale, 'ей', 'ему' )] просто [Select_CString(ROOT.Char.IsFemale, 'нужна достойная собеседница', 'нужен достойный собеседник' )]."
 agot_travel_events_dragon.0009.a: "Итак, расскажи мне о себе!"
 agot_travel_events_dragon.0009.b: "У меня нет на это времени."
 agot_travel_events_dragon.0009.c: "Есть только один способ справиться с плохими яблоками!"
 agot_travel_events_dragon.0009.d: "Таким самое место в темнице..."
 agot_travel_events_dragon.0009.e: "Эти простолюдины не должны меня волновать."
 agot_travel_events_dragon.0009.f: "Я могу помочь вам добраться домой, [Select_CString(noble.IsFemale, 'миледи', 'милорд' )]."
 agot_travel_events_dragon.0009.g: "Может быть, у вас найдётся время поболтать?"
 agot_travel_events_dragon.0009.g.modifier_desc: "Вы побеседовали с персонажем [noble.GetName]."
 agot_travel_events_dragon.0009.h: "Будет лучше, если я пойду..."
 agot_travel_events_dragon.0009.h.modifier_desc: "Вы проигнорировали персонажа [noble.GetName]."


 ###############################
 # STORM ENCOUNTER (0011-0012) #
 ###############################
 # 0011
 agot_travel_events_dragon.0011.t: "Шторм!"
 agot_travel_events_dragon.0011.desc: "Несмотря на то, что небеса прекрасны и необъятны, они часто могут быть такими же коварными, как суша или море. Я сразу вспоминаю об этом, я и [pet_dragon.GetName] попадаем в шторм, который, кажется, начинается как раз в тот момент, когда мы пролетаем под ним.\n\n[pet_dragon.GetNameNoTooltip] изо всех сил старается лететь против ветра, который набирает скорость, а над головой гремит гром. Далёкий горизонт прорезает вспышка молнии, напоминая мне об опасности грозы. Ясно, что эта буря не скоро утихнет, но, если повезёт, мы сможем пройти её невредимыми, если не хотим задерживаться в пути."
 agot_travel_events_dragon.0011.a: "Мы должны приземлиться и переждать."
 agot_travel_events_dragon.0011.a.tt: "Вы задержитесь в пути на три-семь дней, но не пострадаете."
 agot_travel_events_dragon.0011.b: "Пролети сквозь него!"
 agot_travel_events_dragon.0011.b.tt: "Вы рискуете получить травму, но не задержитесь в пути."


 ###########################################
 # DRAGON TAKES YOU OFF COURSE (0013-0014) #
 ###########################################
 # 0013
 agot_travel_events_dragon.0013.t: "Не в ту сторону!"
 agot_travel_events_dragon.0013.desc: "Это ужасно скучный отрезок нашего путешествия — настолько, что [pet_dragon.GetName], кажется, [Select_CString(EqualTo_string('он', pet_dragon.Custom('GetDragonSheHe')), 'заскучал', 'заскучала')]. Когда я [Select_CString(ROOT.Char.IsFemale, 'развалилась', 'развалился' )] в седле, [pet_dragon.Custom('GetDragonSheHe')] резко [Select_CString(EqualTo_string('он', pet_dragon.Custom('GetDragonSheHe')), 'свернул', 'свернула')] с курса!\n\nВнезапное изменение направления выводит меня из оцепенения, заставляя схватиться за поводья. Я выкрикиваю команды, когда [pet_dragon.GetNameNoTooltip] нерешительно начинает поворачивать обратно к намеченному курсу."
 agot_travel_events_dragon.0013.a: "Как только мы доберёмся до места, ты сможешь поступать, как пожелаешь, [pet_dragon.GetNameNoTooltip]."
 agot_travel_events_dragon.0013.tt: "Ваше путешествие затягивается."


 ##############################
 # PLAYFUL DRAGON (0021-0024) #
 ##############################
 # 0021 - In air
 agot_travel_events_dragon.0021.t:0 "Playful Dragon"
 agot_travel_events_dragon.0021.desc:0 "While flying over a particularly unremarkable stretch of land, [pet_dragon.GetName] begins to eye me strangely. It's a look my dragon has given me since [pet_dragon.Custom('GetDragonSheHe')] was but a hatchling, and it means [pet_dragon.Custom('GetDragonSheHe')] wants to play. I can hardly blame [pet_dragon.Custom('GetDragonHerHim')]; a dragon is easily bored when not hunting, eating, or fighting. But if [pet_dragon.GetNameNoTooltip] gets too distracted, we may be late."
 agot_travel_events_dragon.0021.a:0 "What's the harm?"
 agot_travel_events_dragon.0021.a.tt:0 "You will play with [pet_dragon.GetName]"
 agot_travel_events_dragon.0021.b:0 "No, we have places to be."
 agot_travel_events_dragon.0021.b.tt:0 "You will not play with [pet_dragon.GetName]"

 # 0022
 agot_travel_events_dragon.0022.t:0 "Playful Dragon"
 agot_travel_events_dragon.0022.desc.played:0 "I grin and reach for my saddlebags. Playing fetch with raw meat is an old game for us, but [pet_dragon.GetNameNoTooltip] and I still love it. A goat's leg, a flank of aurochs, even a chicken breast are among the cuts that fly through the air — only for [pet_dragon.GetNameNoTooltip] to snatch them up, char them, and swallow the morsels whole. Sometimes [pet_dragon.GetNameNoTooltip] rears up to catch them immediately; other times [pet_dragon.Custom('GetDragonSheHe')] waits and chases the meat as it falls to the ground. Eventually [pet_dragon.GetNameNoTooltip] settles down, and we are reinvigorated as we return to our journey."
 agot_travel_events_dragon.0022.desc.no_play:0 "[pet_dragon.GetNameNoTooltip] keeps up the pleading look, [pet_dragon.Custom('GetDragonHerHis')] eyes growing almost forlorn as a soft, grumbling growl escapes the dragon's throat in protest. However, with but a few more commands, [pet_dragon.GetNameNoTooltip] finally gives up and looks away, flying onward to our destination."
 agot_travel_events_dragon.0022.desc.fallback:0 "I honestly think this isn't needed, but just in case, for the sake of good code structure. /shrug."
 agot_travel_events_dragon.0022.a:0 "This was fun. Good job, [pet_dragon.GetNameNoTooltip]."
 agot_travel_events_dragon.0022.b:0 "Such pleading hardly befits a dragon."

 # 0023 - Camped out
 agot_travel_events_dragon.0023.t:0 "Playful Dragon"
 agot_travel_events_dragon.0023.desc:0 "While camped out for the night, [pet_dragon.GetNameNoTooltip] lumbers toward where I am seated by the fire and nudges me with [pet_dragon.Custom('GetDragonHerHis')] snout in a tentatively eager way that tells me my dragon is bored. Naturally, [pet_dragon.Custom('GetDragonHerHis')] first instinct is to try and get me to play. With each other, dragons will often play a game of tug-of-war with their meals, and it is seldom different with their riders. But the hour is late, and sleep is not far off, so I could simply try to get [pet_dragon.GetNameNoTooltip] to bugger off."
 agot_travel_events_dragon.0023.a:0 "Why not? Go find something to pull on, [pet_dragon.GetNameNoTooltip]."
 agot_travel_events_dragon.0023.a.tt:0 "Increases bond, and your dragon may become tired, leaving them less likely to disrupt your camp."
 agot_travel_events_dragon.0023.b:0 "No, let me sleep, [pet_dragon.GetNameNoTooltip]."
 agot_travel_events_dragon.0023.b.tt:0 "Decreases bond, and your dragon will not be tired, making [pet_dragon.Custom('GetDragonHerHim')] more likely to get up to mischief on [pet_dragon.Custom('GetDragonHerHis')] own."

 # 0024
 agot_travel_events_dragon.0024.t:0 "Playful Dragon"
 agot_travel_events_dragon.0024.desc.played:0 "Following my commands to the letter, [pet_dragon.GetNameNoTooltip] flies off excitedly and returns with a dead [ROOT.Char.Custom('GetRandomRegionalSmallGame')] that [pet_dragon.Custom('GetDragonSheHe')] undoubtedly sniffed out with ease. [pet_dragon.GetNameNoTooltip] offers me the head of the creature, and I grab it by the ears and start to pull. It is a mock game, of course, with [pet_dragon.GetNameNoTooltip] possessing natural strength far exceeding my own, but nevertheless [pet_dragon.GetNameNoTooltip] holds back until finally wrenching the carcass from my hands and trudging off to enjoy [pet_dragon.Custom('GetDragonHerHis')] late-night snack in triumph."
 agot_travel_events_dragon.0024.desc.no_play:0 "I put a hand on the snout [pet_dragon.GetNameNoTooltip] is prodding me with and sigh. My High Valyrian is clear, but it takes several commands to make [pet_dragon.GetNameNoTooltip] turn and finally leave me alone so I can rest. The day and night have been long, and wrestling a dragon over some dead game is simply asking too much."
 agot_travel_events_dragon.0024.desc.fallback:0 "I honestly think this isn't needed, but just in case, for the sake of good code structure. /shrug."
 agot_travel_events_dragon.0024.a:0 "Ah, bonding with a dragon is certainly special."
 agot_travel_events_dragon.0024.b:0 "Sorry, [pet_dragon.GetNameNoTooltip], but even a dragonrider must rest."


 ##########################
 # TURBULENCE (0031-0032) #
 ##########################
 # 0031
 agot_travel_events_dragon.0031.t:0 "Turbulence!"
 agot_travel_events_dragon.0031.desc:0 "The air is calm and steady — until suddenly [pet_dragon.GetName] and I run into an unexpected burst of turbulence! The rough air nearly launches me from my saddle as I strap myself in, and [pet_dragon.GetNameNoTooltip] growls in protest, attempting to right [pet_dragon.Custom('GetDragonHerselfHimself')] from the sudden harsh resistance.\n\nThe turbulence hits harder and for longer than I expected, and I brace myself against my dragon as the ground stares up at my invitingly through the ordeal."
 agot_travel_events_dragon.0031.a:0 "Duck, dodge, dip, dive, and dodge!"
 agot_travel_events_dragon.0031.a.tt:0 "You have a chance to be delayed and injured"


 #############################
 # HUNGRY DRAGON (0046-0055) #
 #############################
 # 0047 - Flock of Birds
 agot_travel_events_dragon.0047.t:0 "Hungry Dragon!"
 agot_travel_events_dragon.0047.desc:0 "While the skies are mostly empty, today [pet_dragon.GetName] and I run into a flock of birds in the midst of their migration — and in a bout of hunger, my [pet_dragon.Custom('GetDragonColor')] mount snaps at them with sharp fangs in hopes of a snack! It is a bit undisciplined, but a dragon's killer instincts sometimes cannot be helped."
 agot_travel_events_dragon.0047.a:0 "Pluck them from the sky, [pet_dragon.GetNameNoTooltip]!"
 agot_travel_events_dragon.0047.a.tt:0 "You will be delayed, but your dragon will appreciate this."
 agot_travel_events_dragon.0047.b:0 "Control yourself!"
 agot_travel_events_dragon.0047.b.tt:0 "You will not be delayed, but your dragon will not appreciate it."

 # 0048 - Fish / Dolphin / Whale
 agot_travel_events_dragon.0048.t:0 "$agot_travel_events_dragon.0047.t$"
 agot_travel_events_dragon.0048.desc_fish:0 "Though we oft fly high among the clouds, today [pet_dragon.GetName] dips near the water, where a salty sea breeze blows. As we glide over the clear blue waves, something catches [pet_dragon.GetNamePossessiveNoTooltip] attention below.\n\nI suspect it to be a fish, given the noticeable shadowy shape swimming beneath us. Perhaps a cod or snapper. While not the largest of catches, it is nonetheless enough to tempt [pet_dragon.GetNamePossessiveNoTooltip] empty stomach."
 agot_travel_events_dragon.0048.desc_dolphin:0 "Though we oft fly high among the clouds, today [pet_dragon.GetName] dips near the water, where a salty sea breeze blows. As we pass over the clear blue sea, [pet_dragon.GetNamePossessive] stomach groans loudly enough that I can almost feel the rumble through [pet_dragon.Custom('GetDragonHerHim')].\n\nPeering down at the waters below, I spot a common sight: dolphins breaching the waves for air. [pet_dragon.GetNameNoTooltip] notices as well, and it is clearly an appetizing spectacle for my hungry dragon."
 agot_travel_events_dragon.0048.desc_whale:0 "The beats of [pet_dragon.GetNamePossessive] great wings over the open sea match the crashing waves beneath us in volume. A dragon as large as [pet_dragon.GetNameNoTooltip] can be voracious indeed, and I am starkly reminded of this as [pet_dragon.Custom('GetDragonSheHe')] suddenly lurches downward in a fit of hunger at the sight of a massive whale breaching below!\n\nIt would be no trifling task to pluck a whale from the sea like some oversized grape, but [pet_dragon.GetNameNoTooltip] is big and strong enough that the unfortunate leviathan may become nothing more than a kingly feast for the royalty of the skies."
 agot_travel_events_dragon.0048.a:0 "Cast your net, [pet_dragon.GetNameNoTooltip]!"
 agot_travel_events_dragon.0048.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
 agot_travel_events_dragon.0048.b:0 "Control yourself!"
 agot_travel_events_dragon.0048.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"

 # 0049 - Farm Animals
 agot_travel_events_dragon.0049.t:0 "$agot_travel_events_dragon.0047.t$"
 agot_travel_events_dragon.0049.desc:0 "While the skies are largely empty, over the rolling pastures beneath us [pet_dragon.GetName] takes keen notice of the livestock below. A field of grazing [ROOT.Char.Custom('RegionalFarmAnimalPlural')] lies spread out like a veritable feast before [pet_dragon.GetNamePossessiveNoTooltip] eyes and stomach, and the great [pet_dragon.Custom('GetDragonColor')] beast practically salivates in the air as [pet_dragon.Custom('GetDragonSheHe')] awaits my command."
 agot_travel_events_dragon.0049.a:0 "The farmers won't miss one or two..."
 agot_travel_events_dragon.0049.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
 agot_travel_events_dragon.0049.b:0 "Control yourself!"
 agot_travel_events_dragon.0049.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"

 # 0050 - Game Animal
 agot_travel_events_dragon.0050.t:0 "$agot_travel_events_dragon.0047.t$"
 agot_travel_events_dragon.0050.desc:0 "Soaring over the shaded forests below, [pet_dragon.GetName] lets out an agitated cry that I instantly recognize as [pet_dragon.Custom('GetDragonHerHis')] usual tone when hungry and eager to hunt. The urge is strong enough that [pet_dragon.GetNameNoTooltip] slows over the trees and spots a lone [ROOT.Char.Custom('GetRandomRegionalSmallGame')] that visibly tenses — even from so far above — at the sudden shadow passing over it. It would be a trifling matter to let my [pet_dragon.Custom('GetDragonColorGrade')] mount gobble it up, but we do have places to be..."
 agot_travel_events_dragon.0050.a:0 "There's no harm. A dragon can only be a dragon, after all."
 agot_travel_events_dragon.0050.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
 agot_travel_events_dragon.0050.b:0 "Bah, hardly worth our time. Onwards!"
 agot_travel_events_dragon.0050.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"

 # 0051 - Predator
 agot_travel_events_dragon.0051.t:0 "$agot_travel_events_dragon.0047.t$"
 agot_travel_events_dragon.0051.desc:0 "As [pet_dragon.GetNameNoTooltip] and I continue on our journey, I notice my dragon peering down at the ground more and more. It is obvious that [pet_dragon.GetNameNoTooltip] is growing hungry while carrying me across the land, and before long I spot a large [ROOT.Char.Custom('RegionalFerociousAnimal')] engaged in its own hunt below. On foot, such a [ROOT.Char.Custom('RegionalFerociousAnimal')] would be a great danger, but to [pet_dragon.GetNameNoTooltip] it is merely another land-bound beast at the mercy of [pet_dragon.GetHerHis] fangs and flame."
 agot_travel_events_dragon.0051.a:0 "We can take it, [pet_dragon.GetNameNoTooltip]!"
 agot_travel_events_dragon.0051.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
 agot_travel_events_dragon.0051.b:0 "On second thought, there might be more appetizing meals out there..."
 agot_travel_events_dragon.0051.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"


 ################################
 # BIRD ATTACKS YOU (0056-0057) #
 ################################
 # 0056
 agot_travel_events_dragon.0056.t:0 "Bird Attack!"
 agot_travel_events_dragon.0056.desc:0 "I am enjoying the serenity of the sky when [pet_dragon.GetName] and I are suddenly assaulted by a crazed bird of prey that seems to think itself my dragon's equal! It squawks furiously and pecks in a blind rage as [pet_dragon.GetNameNoTooltip] and I valiantly fight it off."
 agot_travel_events_dragon.0056.a:0 "Away, foul creature!"
 agot_travel_events_dragon.0056.a.tt:0 "You have a chance to be delayed and injured."


 ###########################
 # MAINTENANCE (9000-9999) #
 ###########################
 # 9000
 agot_travel_events_dragon.9000.t:0 "Отставшие"
 agot_travel_events_dragon.9000.desc:0 "[awkward_entourage_member.GetName] нервно подходит ко мне, когда я седлаю дракона [dragon.GetFirstName] для нашего путешествия. \«К сожалению, поскольку вы решили отправиться в путь верхом на драконе [dragon.GetFirstNameNoTooltip], те из нас, кто не является драконьими наездниками, не смогут присоединиться к вам в пути. Мы будем с нетерпением ждать вашего возвращения ко двору, [Select_CString(ROOT.Char.IsFemale, 'миледи', 'милорд' )].\»"
 agot_travel_events_dragon.9000.a:0 "Досадно."
 agot_travel_events_dragon.9000.tt:0 "[entourage_member.GetFirstName] покидает свиту."