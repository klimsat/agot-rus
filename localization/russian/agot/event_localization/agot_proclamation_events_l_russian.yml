l_russian:

 agot_proclamation_events.1000.t:0 "Новый великий дом"
 agot_proclamation_events.1000.desc_intro:0 "[Select_CString(king.IsFemale, 'Моя королева', 'Мой король' )] [king.GetFirstName] стоит передо мной, пока я приношу клятвы верности. Затем [Select_CString(king.IsFemale, 'она', 'он' )] дарует мне новый титул — [kingdom_title_to_grant.GetName] — и власть над землями, входящими в состав этого владения.\n\n"
 agot_proclamation_events.1000.desc.not_legitimate_house:0 "На глазах у моих вассалов — старых и новых — меня возводят на ступень, которую ещё никогда не занимал мой род. В моих владениях рождается новый великий дом, и его имя разносится по всей земле. Но шёпот сомнений не стихает: некоторые ставят под вопрос моё право на этот титул, ведь я не принадлежу к дому [legitimate_house.GetBaseName]."
 agot_proclamation_events.1000.desc.legitimate_house:0 "На глазах у моих вассалов — старых и новых — я возвращаю древнее владение моей семьи: великий дом занимает своё законное место. Я клянусь чтить предков и сделать так, чтобы этот титул больше никогда не был нами утрачен."
 agot_proclamation_events.1000.a:0 "У дома [new_holder.GetHouse.GetBaseNameNoTooltip] светлое будущее."

 agot_proclamation_it_succession_msg_title:0 "Престолонаследие Железного трона"
 agot_proclamation_it_succession_msg_inheritance:0 "«[Select_CString(player.IsFemale, 'Миледи', 'Милорд' )], из земель [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] прибыло письмо с печатью дома [new_holder.GetHouse.GetBaseName]; [previous_holder.GetTitledFirstName|U] [previous_holder.GetDeathReason] — да упокоится [previous_holder.GetSheHe] с миром.\n\n[new_holder.GetFirstName] [new_holder.GetHouse.GetBaseName] [Select_CString(new_holder.IsFemale, 'была провозглашена законной наследницей', 'был провозглашён законным наследником' )] державы [new_holder.GetPrimaryTitle.GetNameNoTooltip]»."
 agot_proclamation_it_succession_msg_conquest:0 "«[Select_CString(player.IsFemale, 'Миледи', 'Милорд' )], из земель [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] прибыло письмо с печатью дома [new_holder.GetHouse.GetBaseName]; [previous_holder.GetFirstName] [previous_holder.GetHouse.GetBaseName] [Select_CString(previous_holder.IsFemale, 'была побеждена', 'был побеждён' )] и [new_holder.GetTitledFirstName] [new_holder.GetHouse.GetBaseName] [Select_CString(new_holder.IsFemale, 'заняла', 'занял' )] Железный трон по праву завоевания»."
 agot_proclamation_it_succession_msg_abdication:0 "«[Select_CString(player.IsFemale, 'Миледи', 'Милорд' )], из земель [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] прибыло письмо с печатью дома [new_holder.GetHouse.GetBaseName]; В результате неожиданного поворота событий [previous_holder.GetHerHis|U] Милость [previous_holder.GetFirstNameRegnal] [new_holder.GetHouse.GetBaseName] [Select_CString(previous_holder.IsFemale, 'отреклась', 'отрёкся' )] от правления. Поэтому, [new_holder.GetTitledFirstName] [new_holder.GetHouse.GetBaseName] [Select_CString(new_holder.IsFemale, 'была провозглашена', 'был провозглашён' )] [previous_holder.GetHerHis] [Select_CString(new_holder.IsFemale, 'наследницей', 'наследником' )] и взойдёт на Железный трон, чтобы править Семью королевствами»."
 agot_proclamation_it_succession_msg_usurped:0 "«[Select_CString(player.IsFemale, 'Миледи', 'Милорд' )], из земель [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] прибыло письмо с печатью дома [new_holder.GetHouse.GetBaseName]; [previous_holder.GetFirstName] [previous_holder.GetHouse.GetBaseName] больше не правит нами. [new_holder.GetTitledFirstName] [new_holder.GetHouse.GetBaseName] [Select_CString(new_holder.IsFemale, 'отняла', 'отнял' )] у [Select_CString(previous_holder.IsFemale, 'неё', 'него' )] Железный трон и [Select_CString(new_holder.IsFemale, 'была провозглашена новой правительницей', 'был провозглашён новым правителем' )] Семи королевств.\n\nХотя некоторые иронично называют [new_holder.GetHerHis] [Select_CString(new_holder.IsFemale, 'узурпаторшей', 'узурпатором' )], нельзя отрицать, что Железный трон теперь прочно удерживается в [new_holder.GetHerHis] хватке»."
 agot_proclamation_it_succession_msg_fallback:0 "«[Select_CString(player.IsFemale, 'Миледи', 'Милорд' )], из земель [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] прибыло письмо с печатью дома [new_holder.GetHouse.GetBaseName]; [new_holder.GetTitledFirstName] [new_holder.GetHouse.GetBaseName] [Select_CString(new_holder.IsFemale, 'была провозглашена новой правительницей', 'был провозглашён новым правителем' )] Семи королевств»."