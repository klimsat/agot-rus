l_russian:
 #Headers
 agot_multi_duel.header:0 "Clash at [background_terrain_scope.GetNameNoTooltip]"
 agot_multi_duel.tos_header:0 "A Trial of Seven"

 #Opponent Stands Up
 agot_multi_duel.1002.a.t:0 "$agot_multi_duel.tos_header$: Still Standing"
 agot_multi_duel.1002.desc.tos.stands_winner_pov:0 "I drove [loser_multi_duelist.GetTitledFirstName] to the ground, certain the clash was done. For a heartbeat, [loser_multi_duelist.GetSheHe] lay still amid the churn of battle.\n\nThen [loser_multi_duelist.GetSheHe] rises. Bloodied, unsteady, but standing once more, forcing [loser_multi_duelist.GetHerHis] way back into the fight as if pain and sense alike have been cast aside."
 agot_multi_duel.1002.desc.tos.stands_loser_pov:0 "[winner_multi_duelist.GetTitledFirstNamePossessive] blow sends me to the ground, the world spinning as steel and noise crash around me. For a moment, it feels as though the fight has ended.\n\nI force myself up through the pain, breath ragged, limbs screaming in protest. Whatever comes next, I will not stay down."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend:0 "I drove [loser_multi_duelist.GetTitledFirstName] to the ground, certain the clash was done. For a heartbeat, [loser_multi_duelist.GetSheHe] lay still amid the churn of battle."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend:0 "[winner_multi_duelist.GetTitledFirstNamePossessive] blow sends me to the ground, the world spinning as steel and noise crash around me. For a moment, it feels as though the fight has ended."

 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_1:0 "\n\nA voice breaks through the noise, [loser_duelist_friend.GetTitledFirstName] shouting from the crowd.\n\n#EMP "Up, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! The fight is not yours to lose!"#! \n\nAnd somehow, [loser_multi_duelist.GetSheHe] rises. Bloodied, unsteady, but standing once more, forcing [loser_multi_duelist.GetHerHis] way back into the fight as if pain and sense alike have been cast aside."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_2:0 "\n\nA cry carries across the clash, [loser_duelist_friend.GetTitledFirstName] calling out from the crowd.\n\n#EMP "On your feet, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! This is not where you fall!"#! \n\nAgainst all sense, [loser_multi_duelist.GetSheHe] drags [loser_multi_duelist.GetHerselfHimself] upright again, battered but unbowed as the duel resumes."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_3:0 "\n\nAbove the roar of steel, [loser_duelist_friend.GetTitledFirstNamePossessive] voice rings clear.\n\n#EMP "Rise, ser! Show them you still stand!"#! \n\nA moment later, [loser_multi_duelist.GetSheHe] pushes back to [loser_multi_duelist.GetHerHis] feet, swaying but ready to fight on."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_4:0 "\n\nA desperate shout breaks through the din, [loser_duelist_friend.GetTitledFirstName] urging [loser_multi_duelist.GetHerHim] on.\n\n#EMP "Up now! The Seven watch you — do not yield!"#! \n\nWith a ragged breath, [loser_multi_duelist.GetSheHe] rises once more, refusing to let the clash end."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_5:0 "\n\nFrom the edge of the crowd, [loser_duelist_friend.GetTitledFirstName] shouts with fierce resolve.\n\n#EMP "Stand, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Stand and face them!"#! \n\nSlowly, stubbornly, [loser_multi_duelist.GetSheHe] regains [loser_multi_duelist.GetHerHis] footing and steps back into the fight."

 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_1:0 "\n\nThrough the haze, I hear [loser_duelist_friend.GetTitledFirstName] shouting above the chaos.\n\n#EMP "Stand, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Stand and fight!"#! \n\nThe sound cuts through the fog, and I force myself upright through the pain, breath ragged, limbs screaming in protest. Whatever comes next, I will not stay down."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_2:0 "\n\nThrough the chaos, [loser_duelist_friend.GetTitledFirstNamePossessive] voice finds me.\n\n#EMP "Up, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! You are not beaten yet!"#! \n\nThe words burn through the haze, and I force myself upright, refusing to let the fight end here."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_3:0 "\n\nA familiar voice cuts through the ringing in my ears, [loser_duelist_friend.GetTitledFirstName], fierce and unyielding.\n\n#EMP "Rise, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! On your feet, and fight!"#! \n\nGritting my teeth, I drag myself back to standing, pain trailing every movement."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_4:0 "\n\nAbove the clash of steel, I hear [loser_duelist_friend.GetTitledFirstName] calling my name.\n\n#EMP "Stand fast! Do not fall now!"#! \n\nThe shout steadies me, and I push through the pain to stand once more."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_5:0 "\n\nSomewhere beyond the noise, [loser_duelist_friend.GetTitledFirstName] shouts with desperate urgency.\n\n#EMP "Up, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! The fight is yours — rise!"#! \n\nThe words cut through the fog, and I haul myself upright, breath ragged but resolve unbroken."

 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_1:0 "\n\nThe world fades for a heartbeat, and I see [my_teacher_knight.GetTitledFirstName] standing over me in the training yard, watching as I struggled to rise from the dirt. [my_teacher_knight.GetSheHe|U] shakes [my_teacher_knight.GetHerHis] head, voice firm and familiar.\n\n#EMP "Up. A knight rises, no matter how hard he falls."#! \n\nSteel crashes back into my senses and the memory breaks apart. I draw a ragged breath, planting my hand against the churned ground and forcing myself upright once more."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_2:0 "\n\nDarkness presses close until [my_teacher_knight.GetTitledFirstNamePossessive] voice cuts through it, calm and unyielding, just as in the old days when every bruise was a lesson and every fall earned another command.\n\n#EMP "Pain passes. Standing is a choice."#! \n\nThe roar of battle floods back in, sharp and overwhelming. Gritting my teeth, I push through the ache and haul myself back to my feet."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_3:0 "\n\nFor a moment, I am no longer on the field but in the dust of a distant memory, [my_teacher_knight.GetTitledFirstName] watching with folded arms as I struggled to prove myself worthy of the blade.\n\n#EMP "Again. Until you learn not to stay down."#! \n\nThe memory snaps away beneath the clash of steel. Breath burning in my lungs, I stagger upright, refusing to let the lesson end here."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_4:0 "\n\nThe noise slips away, and I hear [my_teacher_knight.GetTitledFirstNamePossessive] voice as clearly as if [my_teacher_knight.GetSheHe] stood beside me on some long-forgotten road, urging me onward when exhaustion threatened to claim me.\n\n#EMP "A true knight endures."#! \n\nThe present crashes back in with the ring of steel and shouted orders. Drawing on that old strength, I force my limbs to obey and rise once more."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_5:0 "\n\nFor an instant, the battle vanishes, replaced by the stern gaze of [my_teacher_knight.GetTitledFirstName] after a failed sparring match, waiting in silence for me to stand again rather than offering a hand.\n\n#EMP "Do not wait for mercy. Stand."#! \n\nThe vision fades like smoke as the weight of the present returns. With a harsh breath and trembling resolve, I push myself upright and step back into the fight."

 agot_multi_duel.1002.a:0 "The fight goes on."

 #Opponent Downed
 agot_multi_duel.1003.a.t:0 "$agot_multi_duel.tos_header$: Brought Low"
 agot_multi_duel.1003.desc.tos.downed_winner_pov:0 "[loser_multi_duelist.GetTitledFirstName] tries to rise again, but the strength is gone. Whatever kept [loser_multi_duelist.GetHerHim] standing before has finally failed, and [loser_multi_duelist.GetSheHe] falls back to the ground.\n\nThe fight is finished. [loser_multi_duelist.GetSheHe|U] still breathes, but [loser_multi_duelist.GetSheHe] can no longer answer steel with steel."
 agot_multi_duel.1003.desc.tos.downed_loser_pov:0 "I try to push myself upright, but my body refuses me. Pain drowns out all else, and my limbs will no longer obey.\n\nThe fight has gone on without me, and here it ends. I see [winner_multi_duelist.GetTitledFirstName] above me, bloodied and unbroken, tasting triumph I can no longer reach."
 agot_multi_duel.1003.a:0 "One less stands."

 #ToS - Accuser yielded
 agot_multi_duel.1004.a.t:0 "$agot_multi_duel.tos_header$: The Charge Unmade"
 agot_multi_duel.1004.desc.tos.yields_winner_pov:0 "[loser_multi_duelist.GetTitledFirstName] falters at last, [loser_multi_duelist.GetHerHis] strength spent and [loser_multi_duelist.GetHerHis] will broken. Before steel can answer again, [loser_multi_duelist.GetSheHe] yields.\n\nThe words follow soon after. The accusation against [tos_accused.GetTitledFirstName] is withdrawn, the challenge abandoned in full view of the realm. What was called into question is no longer contested, and the Trial of Seven ends not in blood, but in surrender."
 agot_multi_duel.1004.desc.tos.yields_loser_pov:0 "The strength leaves me, and with it the certainty that carried me this far. I lower my [loser_multi_duelist.Custom('signature_weapon')] and yield, knowing there is no more to be gained by standing.\n\nBefore all who watch, I withdraw the charge and abandon the trial I called against [tos_accused.GetTitledFirstName]. The truth I sought to prove will not be proven by my hand. The Trial of Seven ends here, undone by my surrender."
 agot_multi_duel.1004.desc.tos.yields_observer_pov:0 "The clash slows, then stills. [loser_multi_duelist.GetTitledFirstName], who called the trial and set the accusation against [tos_accused.GetTitledFirstName] before the realm, yields at last.\n\nWith that surrender, the charge itself is withdrawn. The Trial of Seven ends not with a final blow, but with the accuser's own words undoing what was begun. Before all who bear witness, the matter is settled, and the accusation is laid to rest."
 agot_multi_duel.1004.a:0 "The trial ends here."

 #ToS - Invalidated
 agot_multi_duel.1005.t.tos:0 "$agot_multi_duel.tos_header$: A Trial Unmade"
 agot_multi_duel.1005.desc.tos:0 "Before the Trial of Seven could be brought to its end, word arrives that [dead_enemy_leader.GetTitledFirstName] has died beyond the bounds of the field. Whether by chance, misfortune, or another hand entirely, the cause that called the champions together no longer stands.\n\nWithout accuser or accused to answer for the charge, the trial cannot continue. The gathered blades are dismissed, and what was meant to be decided in steel passes instead into silence."
 agot_multi_duel.1005.a:0 "It is finished."

