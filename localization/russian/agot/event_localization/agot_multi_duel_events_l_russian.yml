 #DUEL INTRO TEXTS
 agot_multi_duel.0020.desc.intro1:0 "The clash between [winner_duelist.GetTitledFirstName] and [loser_duelist.GetTitledFirstName] erupts like a storm amidst the chaos of battle, drawing my gaze as their weapons dance in the dim light."
 agot_multi_duel.0020.desc.intro2:0 "I catch sight of [winner_duelist.GetTitledFirstName] and [loser_duelist.GetTitledFirstName] circling each other with deadly intent, the noise of battle fading as their duel takes center stage."
 agot_multi_duel.0020.desc.intro3:0 "Amidst the swirling melee, my attention is drawn to [winner_duelist.GetTitledFirstName] and [loser_duelist.GetTitledFirstName] as they charge at each other, their blades flashing with lethal purpose."
 agot_multi_duel.0020.desc.intro4:0 "[winner_duelist.GetTitledFirstName] and [loser_duelist.GetTitledFirstName] meet with a ferocity that echoes across the battlefield, their duel a deadly dance that commands my attention."
 agot_multi_duel.0020.desc.intro5:0 "Through the chaos, I notice [winner_duelist.GetTitledFirstName] and [loser_duelist.GetTitledFirstName] locking eyes, both determined to prove their mettle in a duel that could turn the tide of battle."
 agot_multi_duel.0020.desc.intro6:0 "As the battle rages on, I spot [winner_duelist.GetTitledFirstName] and [loser_duelist.GetTitledFirstName] closing in on each other, their every move calculated and deadly."
 agot_multi_duel.0020.desc.intro7:0 "[winner_duelist.GetTitledFirstName] and [loser_duelist.GetTitledFirstName] engage in a fierce contest, their weapons clashing with a sound that cuts through the din of war."
 agot_multi_duel.0020.desc.intro8:0 "My eyes are drawn to [winner_duelist.GetTitledFirstName] and [loser_duelist.GetTitledFirstName] as they weave through the battlefield, their weapons poised to strike in a duel that could end in bloodshed."
 agot_multi_duel.0020.desc.intro9:0 "In the midst of the fighting, the duel between [winner_duelist.GetTitledFirstName] and [loser_duelist.GetTitledFirstName] stands out like a beacon, their skills on full display as they fight for survival."
 agot_multi_duel.0020.desc.intro10:0 "[winner_duelist.GetTitledFirstName] and [loser_duelist.GetTitledFirstName] come together in a violent collision, the sparks from their blades lighting up the battlefield as their duel unfolds."

 #DUEL MIDDLE TEXTS
 agot_multi_duel.0020.desc.middle1:0 "[winner_duelist.GetTitledFirstNameNoTooltip] lunges forward with a quick thrust, but [loser_duelist.GetTitledFirstNameNoTooltip] sidesteps and counters with a brutal [loser_duelist.Custom('AGOT_SignatureWeaponCritical')] that almost finds its mark."
 agot_multi_duel.0020.desc.middle2:0 "[loser_duelist.GetTitledFirstNamePossessiveNoTooltip] [loser_duelist.Custom('signature_weapon')] whistles through the air as [winner_duelist.GetTitledFirstNameNoTooltip] ducks beneath it, retaliating with a swift [winner_duelist.Custom('AGOT_SignatureVerb')] to [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] side that draws blood."
 agot_multi_duel.0020.desc.middle3:0 "The duel intensifies as [winner_duelist.GetTitledFirstNameNoTooltip] blocks a powerful blow from [loser_duelist.GetTitledFirstNameNoTooltip], pushing [loser_duelist.GetHerHim] back before launching into a flurry of strikes."
 agot_multi_duel.0020.desc.middle4:0 "[loser_duelist.GetTitledFirstNameNoTooltip] feints to the left, drawing [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] guard away before delivering a [winner_duelist.Custom('AGOT_SignatureWeaponHeavy')] blow that nearly takes [winner_duelist.GetTitledFirstNameNoTooltip] off [winner_duelist.GetHerHis] feet."
 agot_multi_duel.0020.desc.middle5:0 "[winner_duelist.GetTitledFirstNameNoTooltip] parries [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] overhead swing and steps in close, driving [winner_duelist.GetHerHis] knee into [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] gut before shoving [loser_duelist.GetHerHim] back."
 agot_multi_duel.0020.desc.middle6:0 "[loser_duelist.GetTitledFirstNameNoTooltip] sweeps low with [loser_duelist.GetHerHis] [loser_duelist.Custom('signature_weapon')], aiming for [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] legs, but [winner_duelist.GetTitledFirstNameNoTooltip] leaps over the attack and responds with a fierce [winner_duelist.Custom('AGOT_SignatureWeaponCritical')] to [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] shoulder."
 agot_multi_duel.0020.desc.middle7:0 "[winner_duelist.GetTitledFirstNameNoTooltip] and [loser_duelist.GetTitledFirstNameNoTooltip] trade blows in a furious exchange, each narrowly avoiding death as they press their attack."
 agot_multi_duel.0020.desc.middle8:0 "[loser_duelist.GetTitledFirstNameNoTooltip] spins away from a heavy strike, using the momentum to land a glancing blow on [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] arm, drawing a line of crimson."
 agot_multi_duel.0020.desc.middle9:0 "[winner_duelist.GetTitledFirstNameNoTooltip] baits [loser_duelist.GetTitledFirstNameNoTooltip] into overextending with a false retreat, then steps in and delivers a punishing strike to [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] chest."
 agot_multi_duel.0020.desc.middle10:0 "[loser_duelist.GetTitledFirstNamePossessiveNoTooltip] [loser_duelist.Custom('signature_weapon')] clashes against [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] [winner_duelist.Custom('signature_weapon')] with a resounding crash, but [winner_duelist.GetTitledFirstNameNoTooltip] retaliates quickly, driving [winner_duelist.GetHerHis] [winner_duelist.Custom('signature_weapon')] toward [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] neck."

 #DUEL OUTRO TEXTS - Fatal
 agot_multi_duel.0020.desc.outro1:0 "\n\nWith a final, desperate thrust, [winner_duelist.GetTitledFirstNameNoTooltip] drives [winner_duelist.GetHerHis] [winner_duelist.Custom('signature_weapon')] through [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] chest, ending the duel in a spray of blood. [loser_duelist.GetTitledFirstNameNoTooltip] falls to the ground, never to rise again."
 agot_multi_duel.0020.desc.outro2:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] manages to disarm [winner_duelist.GetTitledFirstNameNoTooltip], but before [loser_duelist.GetSheHe] can finish [winner_duelist.GetHerHim] off, [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] [winner_duelist.Custom('signature_weapon')] finds its way into [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] heart. [loser_duelist.GetTitledFirstNameNoTooltip] crumples to the ground, dead before [loser_duelist.GetSheHe] hits it."
 agot_multi_duel.0020.desc.outro3:0 "\n\n[winner_duelist.GetTitledFirstNamePossessiveNoTooltip] [winner_duelist.Custom('signature_weapon')] catches [loser_duelist.GetTitledFirstNameNoTooltip] in the throat, a spray of blood marking the end of the duel as [loser_duelist.GetTitledFirstNameNoTooltip] collapses, lifeless."
 agot_multi_duel.0020.desc.outro4:0 "\n\n[loser_duelist.GetTitledFirstNamePossessiveNoTooltip] last desperate swing misses, leaving [loser_duelist.GetHerHim] open for [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] killing blow. [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] [winner_duelist.Custom('signature_weapon')] [winner_duelist.Custom('AGOT_SignatureWeaponCriticalPresent')] [loser_duelist.GetHerHis] heart, and [loser_duelist.GetTitledFirstNameNoTooltip] falls with a final gasp."
 agot_multi_duel.0020.desc.outro5:0 "\n\nWith a brutal swing, [winner_duelist.GetTitledFirstNameNoTooltip] decapitates [loser_duelist.GetTitledFirstNameNoTooltip], ending the duel in a single, decisive stroke. [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] body crumples to the ground."
 agot_multi_duel.0020.desc.outro6:0 "\n\n[winner_duelist.GetTitledFirstNamePossessiveNoTooltip] final strike [winner_duelist.Custom('AGOT_SignatureWeaponCriticalPresent')] [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] side, the fatal wound dropping [loser_duelist.GetTitledFirstNameNoTooltip] to [loser_duelist.GetHerHis] knees before [loser_duelist.GetSheHe] collapses, dead."
 agot_multi_duel.0020.desc.outro7:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] lands a killing blow on [loser_duelist.GetTitledFirstNameNoTooltip], [winner_duelist.GetHerHis] [winner_duelist.Custom('signature_weapon')] burying deep into the chest of [winner_duelist.GetHerHis] opponent. [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] lifeless body slumps to the ground."
 agot_multi_duel.0020.desc.outro8:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] overextends, and [winner_duelist.GetTitledFirstNameNoTooltip] takes advantage, running [winner_duelist.GetHerHim] through with a single, precise thrust of [winner_duelist.GetHerHis] [winner_duelist.Custom('signature_weapon')]. [loser_duelist.GetTitledFirstNameNoTooltip] falls, dead before [loser_duelist.GetSheHe] hits the ground."
 agot_multi_duel.0020.desc.outro9:0 "\n\nWith a quick, savage strike, [winner_duelist.GetTitledFirstNameNoTooltip] opens [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] throat. [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] eyes go wide with shock as [loser_duelist.GetSheHe] collapses, blood pouring from the wound."
 agot_multi_duel.0020.desc.outro10:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] slips past [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] guard and drives [winner_duelist.GetHerHis] [winner_duelist.Custom('signature_weapon')] deep into [loser_duelist.GetHerHis] belly. [loser_duelist.GetTitledFirstNameNoTooltip] staggers for a heartbeat before collapsing, lifeless, upon the blood-stained ground."

 #DUEL OUTRO TEXTS - Non-Fatal
 agot_multi_duel.0020.desc.outro_survived1:0 "\n\nBoth duelists are left bloodied and battered, but alive, as they disengage and retreat to tend to their wounds."
 agot_multi_duel.0020.desc.outro_survived2:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] manages to disarm [loser_duelist.GetTitledFirstNameNoTooltip], but instead of delivering the killing blow, [winner_duelist.GetSheHe] spares [loser_duelist.GetHerHim], letting [loser_duelist.GetHerHim] crawl away from the fight."
 agot_multi_duel.0020.desc.outro_survived3:0 "\n\nThe duel ends in a stalemate, both men too exhausted to continue. They eye each other warily before backing away, their honor intact."
 agot_multi_duel.0020.desc.outro_survived4:0 "\n\nA sudden distraction from the battlefield causes both [winner_duelist.GetTitledFirstNameNoTooltip] and [loser_duelist.GetTitledFirstNameNoTooltip] to break off their duel, neither willing to risk a strike in such uncertainty."
 agot_multi_duel.0020.desc.outro_survived5:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] and [loser_duelist.GetTitledFirstNameNoTooltip] circle each other warily, but neither can find an opening to land a killing blow. They eventually part, both bruised but alive."
 agot_multi_duel.0020.desc.outro_survived6:0 "\n\nThe fight is interrupted by a surge of enemy soldiers, forcing [winner_duelist.GetTitledFirstNameNoTooltip] and [loser_duelist.GetTitledFirstNameNoTooltip] to break off their duel and return to the larger battle."
 agot_multi_duel.0020.desc.outro_survived7:0 "\n\nBoth men are on the verge of collapse, but neither yields. Eventually, they agree to call the duel off, each respecting the skill of the other."
 agot_multi_duel.0020.desc.outro_survived8:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] manages to wound [loser_duelist.GetTitledFirstNameNoTooltip], but before [winner_duelist.GetSheHe] can finish him, other fighters rush between them, breaking the moment and ending the duel."
 agot_multi_duel.0020.desc.outro_survived9:0 "\n\nAs both men tire, their strikes lose their force, and they finally step back, acknowledging the draw with a nod before rejoining the fray."
 agot_multi_duel.0020.desc.outro_survived10:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] lands a blow that should have been fatal, but [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] armor saves him. Realizing the fight could go on indefinitely, they part ways, both breathing heavily."

 #EXTRA DUEL OUTRO - Rises again
 agot_multi_duel.0020.desc.outro_survived1.stands_up:0 "\n\nA heavy blow sends [loser_duelist.GetTitledFirstNameNoTooltip] crashing to the ground, lost for a moment amid the churn of battle. Just as it seems the duel may be decided, [loser_duelist.GetSheHe] drags [loser_duelist.GetHerselfHimself] back to [loser_duelist.GetHerHis] feet and presses on."
 agot_multi_duel.0020.desc.outro_survived2.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] stumbles and falls hard, the impact drawing a sharp breath from onlookers nearby. Yet moments later, [loser_duelist.GetSheHe] rises again, shaking off the blow and forcing [loser_duelist.GetHerselfHimself] back into the fight."
 agot_multi_duel.0020.desc.outro_survived3.stands_up:0 "\n\nThe clash ends with [loser_duelist.GetTitledFirstNameNoTooltip] driven to the earth, [loser_duelist.Custom('signature_weapon')] slipping from [loser_duelist.GetHerHis] grasp. With effort and resolve, [loser_duelist.GetSheHe] recovers it, hauling [loser_duelist.GetHerselfHimself] upright to face the fight once more."
 agot_multi_duel.0020.desc.outro_survived4.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] is knocked from [loser_duelist.GetHerHis] footing and sent sprawling amid the press of bodies. For a heartbeat the duel falters, before [loser_duelist.GetSheHe] rises again, wounded but unwilling to yield."
 agot_multi_duel.0020.desc.outro_survived5.stands_up:0 "\n\nSteel and force drive [loser_duelist.GetTitledFirstNameNoTooltip] to the ground, dust and blood mingling beneath [loser_duelist.GetHerHim]. Yet [loser_duelist.GetSheHe] does not remain there, clawing back to [loser_duelist.GetHerHis] feet as the battle roars on."
 agot_multi_duel.0020.desc.outro_survived6.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] falls beneath the assault, [loser_duelist.GetHerHis] breath knocked free as the ground rushes up to meet [loser_duelist.GetHerHim]. A moment later, [loser_duelist.GetSheHe] forces [loser_duelist.GetHerselfHimself] upright again, refusing to let the duel end so easily."
 agot_multi_duel.0020.desc.outro_survived7.stands_up:0 "\n\nA crushing exchange sends [loser_duelist.GetTitledFirstNameNoTooltip] to the dirt, still and stunned. The pause is brief, and soon [loser_duelist.GetSheHe] rises once more, grit and determination carrying [loser_duelist.GetHerselfHimself] back into the fray."
 agot_multi_duel.0020.desc.outro_survived8.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] is driven back and down, the duel momentarily broken by the fall. With a sharp breath and clenched resolve, [loser_duelist.GetSheHe] regains [loser_duelist.GetHerHis] footing and steps forward again."
 agot_multi_duel.0020.desc.outro_survived9.stands_up:0 "\n\nThe force of the fight finally sends [loser_duelist.GetTitledFirstNameNoTooltip] sprawling, weapons scraping against the ground. Still, [loser_duelist.GetSheHe] does not yield, pulling [loser_duelist.GetHerselfHimself] upright and rejoining the clash."
 agot_multi_duel.0020.desc.outro_survived10.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] is struck down and swallowed for a moment by the chaos around [loser_duelist.GetHerHim]. Then [loser_duelist.GetSheHe] emerges again, battered but standing, and the duel continues."

 #EXTRA DUEL OUTRO - Rises again (Get up, Ser!)
 agot_multi_duel.0020.desc.outro_survived1.stands_up.friend:0 "\n\nA heavy strike drives [loser_duelist.GetTitledFirstNameNoTooltip] to the ground, the breath leaving [loser_duelist.GetHerHim] in a rush. As the duel threatens to end, a voice breaks through the noise, [loser_duelist_friend.GetTitledFirstName] shouting from the crowd.\n\n#EMP "Up, [loser_duelist.GetTitledFirstNameNoTooltip]! On your feet, the fight is not done!"#! \n\nStirred by the cry, [loser_duelist.GetSheHe] forces [loser_duelist.GetHerselfHimself] back upright."
 agot_multi_duel.0020.desc.outro_survived2.stands_up.friend:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] falls hard, dust rising where [loser_duelist.GetSheHe] strikes the earth. For a heartbeat the clash falters, until [loser_duelist_friend.GetTitledFirstNamePossessive] voice cuts through the din.\n\n#EMP "Stand, [loser_duelist.GetFirstNameNoTooltip]! Stand and face them!"#! \n\nWith a sharp breath, [loser_duelist.GetSheHe] drags [loser_duelist.GetHerselfHimself] back to [loser_duelist.GetHerHis] feet."
 agot_multi_duel.0020.desc.outro_survived3.stands_up.friend:0 "\n\nSteel drives [loser_duelist.GetTitledFirstNameNoTooltip] backward and down, [loser_duelist.Custom('signature_weapon')] slipping from [loser_duelist.GetHerHis] grasp. Before the moment can settle, a cry rises from the crowd, [loser_duelist_friend.GetTitledFirstName] urging [loser_duelist.GetHerHim] on.\n\n#EMP "Get up! You are not beaten yet, rise!"#! \n\nGritting [loser_duelist.GetHerHis] teeth, [loser_duelist.GetSheHe] scrambles upright once more."
 agot_multi_duel.0020.desc.outro_survived4.stands_up.friend:0 "\n\nThe force of the exchange sends [loser_duelist.GetTitledFirstNameNoTooltip] sprawling across the churned earth. Murmurs ripple through the onlookers, until one voice rises above the rest, [loser_duelist_friend.GetTitledFirstName], fierce and unyielding.\n\n#EMP "On your feet, [loser_duelist.GetFirstNameNoTooltip], show them your strength!"#! \n\nAnswering the call, [loser_duelist.GetSheHe] rises again, unsteady but unbroken."
 agot_multi_duel.0020.desc.outro_survived5.stands_up.friend:0 "\n\nDriven low by the assault, [loser_duelist.GetTitledFirstNameNoTooltip] collapses amid dust and steel. The duel seems all but decided when a shout rings clear from beyond the fighters, [loser_duelist_friend.GetTitledFirstName] calling out.\n\n#EMP "Rise now! The Seven watch you, do not fall!"#! \n\nAs the words carry across the field, [loser_duelist.GetSheHe] pushes back to [loser_duelist.GetHerHis] feet."

 #EXTRA DUEL OUTRO - Downed
 agot_multi_duel.0020.desc.outro_survived1.downed:0 "\n\nA brutal exchange sends [loser_duelist.GetTitledFirstNameNoTooltip] crashing to the ground, and this time there is no quick recovery. [loser_duelist.GetSheHe] struggles to rise, but the strength is gone and the duel ends where [loser_duelist.GetSheHe] fell."
 agot_multi_duel.0020.desc.outro_survived2.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] is driven hard to the earth, the impact knocking the fight out of [loser_duelist.GetHerHim]. Though [loser_duelist.GetSheHe] stirs, [loser_duelist.GetSheHe] cannot regain [loser_duelist.GetHerHis] footing."
 agot_multi_duel.0020.desc.outro_survived3.downed:0 "\n\nSteel and force send [loser_duelist.GetTitledFirstNameNoTooltip] sprawling across the ground. [loser_duelist.GetSheHe] reaches for balance that does not return, and the duel is decided in that moment."
 agot_multi_duel.0020.desc.outro_survived4.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] falls beneath the assault and remains there, breath ragged and limbs unresponsive. The attempt to rise falters, and the fight is over."
 agot_multi_duel.0020.desc.outro_survived5.downed:0 "\n\nA final blow sends [loser_duelist.GetTitledFirstNameNoTooltip] to the ground, dust and blood marking where [loser_duelist.GetSheHe] lands. [loser_duelist.GetSheHe] does not rise again, and the duel comes to its end."
 agot_multi_duel.0020.desc.outro_survived6.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] collapses under the strain of the fight, the effort to stand ending in failure. The crowd can see it plainly now: [loser_duelist.GetSheHe] cannot continue."
 agot_multi_duel.0020.desc.outro_survived7.downed:0 "\n\nThe clash ends with [loser_duelist.GetTitledFirstNameNoTooltip] driven to the ground, strength spent and resolve exhausted. Though [loser_duelist.GetSheHe] moves, [loser_duelist.GetSheHe] cannot rise to meet the fight again."
 agot_multi_duel.0020.desc.outro_survived8.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] is knocked from [loser_duelist.GetHerHis] feet and remains where [loser_duelist.GetSheHe] falls. The duel pauses, then ends, as it becomes clear [loser_duelist.GetSheHe] can no longer stand."
 agot_multi_duel.0020.desc.outro_survived9.downed:0 "\n\nThe force of the encounter finally overwhelms [loser_duelist.GetTitledFirstNameNoTooltip], sending [loser_duelist.GetHerHim] to the ground. The effort to rise fails, and the outcome is no longer in doubt."
 agot_multi_duel.0020.desc.outro_survived10.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] is struck down and stays down, the will to fight undone by exhaustion and pain. The duel ends not with another blow, but with [loser_duelist.GetHerHis] inability to rise."

 #EXTRA DUEL OUTRO - Trial of Seven accuer yielded
 agot_multi_duel.0020.desc.outro_survived1.yielded:0 "\n\nThe clash slows as [loser_duelist.GetTitledFirstNameNoTooltip] lowers [loser_duelist.GetHerHis] [loser_duelist.Custom('signature_weapon')] and yields before all who watch. A hush follows as the meaning of the gesture settles in.\n\nWith that surrender, the Trial of Seven loses its purpose. [loser_duelist.GetSheHe|U] withdraws the charge against [tos_accused.GetTitledFirstName], and the accusation that called steel to the field is undone by [loser_duelist.GetHerHis] own words."

 agot_multi_duel.0020.desc.outro_survived2.yielded:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] steps back from the fight, [loser_duelist.Custom('signature_weapon')] lowered and will spent, yielding in full view of the realm. The duel ends not with a final blow, but with surrender.\n\nThe Trial of Seven comes apart in that moment. [loser_duelist.GetSheHe|U] withdraws [loser_duelist.GetHerHis] accusation against [tos_accused.GetTitledFirstName], and the challenge that shook the realm is laid to rest."

 agot_multi_duel.0020.desc.outro_survived3.yielded:0 "\n\nA hush spreads across the field as [loser_duelist.GetTitledFirstNameNoTooltip] yields, lowering [loser_duelist.GetHerHis] [loser_duelist.Custom('signature_weapon')] before gods and men alike. The meaning is clear to all who bear witness.\n\nBy yielding, [loser_duelist.GetSheHe] withdraws the charge against [tos_accused.GetTitledFirstName], stripping the Trial of Seven of its cause. What was brought to judgment is undone not by blood, but by surrender."

 agot_multi_duel.0020.desc.outro_survived4.yielded:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] falters, then yields, lowering [loser_duelist.GetHerHis] [loser_duelist.Custom('signature_weapon')] as the clash finally stills. The field waits, listening.\n\nWith the accuser's surrender, the Trial of Seven collapses. [loser_duelist.GetSheHe|U] withdraws the accusation against [tos_accused.GetTitledFirstName], and the charge that demanded judgment in steel is publicly undone."

 agot_multi_duel.0020.desc.outro_survived5.yielded:0 "\n\nThe moment breaks as [loser_duelist.GetTitledFirstNameNoTooltip] yields, strength and certainty alike spent. Steel falls quiet, and the duel comes to an end without another strike.\n\nThe Trial of Seven cannot continue. [loser_duelist.GetSheHe|U] withdraws [loser_duelist.GetHerHis] claim against [tos_accused.GetTitledFirstName], leaving the accusation without voice or champion to carry it further."

 agot_multi_duel.0020.a.a:0 "Stay focused!"
 agot_multi_duel.0020.a.b:0 "Keep your guard up!"
 agot_multi_duel.0020.a.c:0 "Finish it, quick!"
 agot_multi_duel.0020.a.d:0 "Watch your back!"
 agot_multi_duel.0020.a.e:0 "Do not lose focus!"
 agot_multi_duel.0020.a.f:0 "Keep fighting!"



