 #DUEL INTRO TEXTS
 agot_multi_duel.0020.desc.intro1: "Схватка, которую ведут [winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName], вспыхивает подобно буре среди хаоса битвы, приковывая мой взгляд, когда их оружие пляшет в тусклом свете."
 agot_multi_duel.0020.desc.intro2: "Я замечаю, как [winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] кружат друг вокруг друга со смертоносным намерением, шум битвы затихает, когда их поединок выходит на первый план."
 agot_multi_duel.0020.desc.intro3: "Среди кружащейся сечи мое внимание привлекают [winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName], когда они бросаются друг на друга, их клинки сверкают с летальной целью."
 agot_multi_duel.0020.desc.intro4: "[winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] встречаются с яростью, что разносится эхом по полю битвы, их поединок — смертельная пляска, завладевшая моим вниманием."
 agot_multi_duel.0020.desc.intro5: "Сквозь хаос я замечаю, как [winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] встречаются взглядами, оба полны решимости доказать свою доблесть в поединке, который может переломить ход битвы."
 agot_multi_duel.0020.desc.intro6: "Пока битва бушует, я вижу, как [winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] сближаются, каждое их движение рассчитано и смертоносно."
 agot_multi_duel.0020.desc.intro7: "[winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] вступают в жестокую схватку, их оружие сталкивается со звуком, пробивающим шум войны."
 agot_multi_duel.0020.desc.intro8: "Мой взгляд приковывает то, как [winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] пробиваются через поле битвы, их оружие занесено для удара в поединке, который может окончиться кровопролитием."
 agot_multi_duel.0020.desc.intro9: "В гуще сражения поединок, который ведут [winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName], выделяется подобно маяку, их мастерство выставлено напоказ, когда они сражаются за жизнь."
 agot_multi_duel.0020.desc.intro10: "[winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] сходятся в жестоком столкновении, искры от их клинков озаряют поле битвы, когда их поединок разворачивается."

 #DUEL MIDDLE TEXTS
 agot_multi_duel.0020.desc.middle1: "[winner_duelist.GetTitledFirstNameNoTooltip] бросается вперед с быстрым выпадом, но [loser_duelist.GetTitledFirstNameNoTooltip] уклоняется и делает жестокий [loser_duelist.Custom('AGOT_SignatureWeaponCritical')], едва не достигший цели."
 agot_multi_duel.0020.desc.middle2: "[loser_duelist.GetTitledFirstNameNoTooltip] делает выпад, и [loser_duelist.Custom('signature_weapon')] свистит в воздухе, когда [winner_duelist.GetTitledFirstNameNoTooltip] пригибается под ним, делает быстрый ответный [winner_duelist.Custom('AGOT_SignatureVerb')] в бок, проливая кровь."
 agot_multi_duel.0020.desc.middle3: "Поединок накаляется, когда [winner_duelist.GetTitledFirstNameNoTooltip] блокирует мощный удар, который [Select_CString(loser_duelist.IsFemale, 'нанесла', 'нанёс' )] [loser_duelist.GetTitledFirstNameNoTooltip], оттесняя [loser_duelist.GetHerHis] назад, а затем обрушивает град ударов."
 agot_multi_duel.0020.desc.middle4: "[loser_duelist.GetTitledFirstNameNoTooltip] финтит влево, отвлекая защиту, которую [Select_CString(winner_duelist.IsFemale, 'выстроила', 'выстроил' )] [winner_duelist.GetTitledFirstNameNoTooltip], прежде чем нанести [winner_duelist.Custom('AGOT_SignatureWeaponHeavy')] удар, который едва не сбивает [winner_duelist.GetHerHis] с ног."
 agot_multi_duel.0020.desc.middle5: "[winner_duelist.GetTitledFirstNameNoTooltip] парирует сверху замах, что [Select_CString(loser_duelist.IsFemale, 'сделала', 'сделал' )] [loser_duelist.GetTitledFirstNameNoTooltip] и подходит вплотную, бьёт коленом в [loser_duelist.GetHerHis] живот, прежде чем оттолкнуть [loser_duelist.GetHerHis] назад."
 agot_multi_duel.0020.desc.middle6: "[loser_duelist.GetTitledFirstNameNoTooltip] достаёт из ножен [loser_duelist.Custom('signature_weapon')] и делает удар снизи, целясь в [winner_duelist.GetHerHis] ноги, но [winner_duelist.GetTitledFirstNameNoTooltip] перепрыгивает атаку и делает яростный [winner_duelist.Custom('AGOT_SignatureWeaponCritical')] в [loser_duelist.GetHerHis] плечо."
 agot_multi_duel.0020.desc.middle7: "[winner_duelist.GetTitledFirstNameNoTooltip] и [loser_duelist.GetTitledFirstNameNoTooltip] обмениваются ударами в яростной перепалке, каждый едва избегает смерти, продолжая наступление."
 agot_multi_duel.0020.desc.middle8: "[loser_duelist.GetTitledFirstNameNoTooltip] уворачивается от тяжёлого удара, что [Select_CString(winner_duelist.IsFemale, 'нанесла', 'нанёс' )] [winner_duelist.GetTitledFirstNameNoTooltip], используя инерцию, чтобы нанести скользящий удар по [winner_duelist.GetHerHis] руке, оставляя кровавую полосу."
 agot_multi_duel.0020.desc.middle9: "[winner_duelist.GetTitledFirstNameNoTooltip] делает финт с ложным отступлением, а [loser_duelist.GetTitledFirstNameNoTooltip] не в состоянии разгадать это. Затем [winner_duelist.GetTitledFirstNameNoTooltip] подходит и наносит сокрушительный удар в [loser_duelist.GetHerHis] грудь."
 agot_multi_duel.0020.desc.middle10: "[loser_duelist.GetTitledFirstNameNoTooltip] и [winner_duelist.GetTitledFirstNameNoTooltip] бьются.  [loser_duelist.Custom('signature_weapon')] и [winner_duelist.Custom('signature_weapon')] сталкиваются с оглушительным грохотом, но [winner_duelist.GetTitledFirstNameNoTooltip] быстро отвечает, направляя [winner_duelist.Custom('signature_weapon')] к [loser_duelist.GetHerHis] шее."

 #DUEL OUTRO TEXTS - Fatal
 agot_multi_duel.0020.desc.outro1: "\n\nПоследним отчаянным выпадом [winner_duelist.GetTitledFirstNameNoTooltip] вонзает [winner_duelist.Custom('signature_weapon')] в [loser_duelist.GetHerHis] грудь, заканчивая поединок кровавым всплеском. [loser_duelist.GetTitledFirstNameNoTooltip] падает на землю и больше не поднимается."
 agot_multi_duel.0020.desc.outro2: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] [Select_CString(loser_duelist.IsFemale, 'сумела', 'сумел' )] обезоружить [winner_duelist.GetHerHis], но прежде чем [loser_duelist.GetSheHe] может прикончить [winner_duelist.GetHerHis], [winner_duelist.GetTitledFirstNameNoTooltip] вонзает [winner_duelist.Custom('signature_weapon')] в [loser_duelist.GetHerHis] сердце. [loser_duelist.GetTitledFirstNameNoTooltip] падает на землю, [Select_CString(loser_duelist.IsFemale, 'мёртвая', 'мёртвый' )] ещё до того, как [loser_duelist.GetSheHe] касается ее."
 agot_multi_duel.0020.desc.outro3: "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] вонзает [winner_duelist.Custom('signature_weapon')] в [loser_duelist.GetHerHis] горло, кровавый всплеск отмечает конец поединка, когда [loser_duelist.GetTitledFirstNameNoTooltip] падает [Select_CString(loser_duelist.IsFemale, 'бездыханной', 'бездыханным' )]."
 agot_multi_duel.0020.desc.outro4: "\n\nПоследний отчаянный взмах, что [Select_CString(loser_duelist.IsFemale, 'сделала', 'сделал' )] [loser_duelist.GetTitledFirstNameNoTooltip], проходит мимо, оставляя [loser_duelist.GetHerHis] [Select_CString(loser_duelist.IsFemale, 'открытой', 'открытым' )] для смертельного удара. [winner_duelist.GetTitledFirstNameNoTooltip] делает [winner_duelist.Custom('AGOT_SignatureWeaponCriticalPresent')], и [winner_duelist.Custom('signature_weapon')] вонзается в [loser_duelist.GetHerHis] сердце, и [loser_duelist.GetTitledFirstNameNoTooltip] падает с последним вздохом."
 agot_multi_duel.0020.desc.outro5: "\n\nЯростным взмахом [winner_duelist.GetTitledFirstNameNoTooltip] обезглавливает [Select_CString(loser_duelist.IsFemale, 'противницу', 'противника' )], заканчивая поединок одним решающим ударом. [loser_duelist.GetTitledFirstNameNoTooltip] падает на землю."
 agot_multi_duel.0020.desc.outro6: "\n\nПоследним ударом [winner_duelist.GetTitledFirstNameNoTooltip] [winner_duelist.Custom('AGOT_SignatureWeaponCriticalPresent')] в бок [Select_CString(loser_duelist.IsFemale, 'противницы', 'противника' )], из-за смертельной раны [loser_duelist.GetTitledFirstNameNoTooltip] падает на колени, прежде чем [loser_duelist.GetSheHe] делает последний вздох."
 agot_multi_duel.0020.desc.outro7: "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] наносит смертельный удар, [winner_duelist.GetHerHis] [winner_duelist.Custom('signature_weapon')] глубоко вонзается в грудь [Select_CString(loser_duelist.IsFemale, 'противницы', 'противника' )]. [Select_CString(loser_duelist.IsFemale, 'Бездыханная', 'Бездыханный' )] [loser_duelist.GetTitledFirstNameNoTooltip] падает на землю."
 agot_multi_duel.0020.desc.outro8: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] ослабляет защиту, и [winner_duelist.GetTitledFirstNameNoTooltip] пользуется этим, пронзая [loser_duelist.GetHerHis] насквозь одним точным выпадом, держа [winner_duelist.Custom('signature_weapon')] в руке. [loser_duelist.GetTitledFirstNameNoTooltip] падает, [Select_CString(loser_duelist.IsFemale, 'мёртвая', 'мёртвый' )] ещё до того, как [loser_duelist.GetSheHe] касается земли."
 agot_multi_duel.0020.desc.outro9: "\n\nБыстрым, жестоким ударом [winner_duelist.GetTitledFirstNameNoTooltip] перерезает горло [Select_CString(loser_duelist.IsFemale, 'противницы', 'противника' )]. [loser_duelist.GetTitledFirstNameNoTooltip] широко открывается глаза от шока, когда [loser_duelist.GetSheHe] падает, кровь хлещет из раны."
 agot_multi_duel.0020.desc.outro10: "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] проскальзывает мимо защиты [Select_CString(loser_duelist.IsFemale, 'противницы', 'противника' )] и глубоко вонзает [winner_duelist.Custom('signature_weapon')] в [loser_duelist.GetHerHis] живот. [loser_duelist.GetTitledFirstNameNoTooltip] шатается на мгновение, прежде чем падает [Select_CString(loser_duelist.IsFemale, 'бездыханной', 'бездыханным' )] на залитую кровью землю."

 #DUEL OUTRO TEXTS - Non-Fatal
 agot_multi_duel.0020.desc.outro_survived1: "\n\nОба дуэлянта остаются окровавленными и избитыми, но живыми, когда они расходятся и отступают, чтобы перевязать раны."
 agot_multi_duel.0020.desc.outro_survived2: "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] [Select_CString(winner_duelist.IsFemale, 'сумела', 'сумел' )] обезоружить [Select_CString(loser_duelist.IsFemale, 'противницу', 'противника' )], но вместо смертельного удара [winner_duelist.GetSheHe] щадит [loser_duelist.GetHerHis], позволяя [loser_duelist.GetHerHim] уползти прочь."
 agot_multi_duel.0020.desc.outro_survived3: "\n\nПоединок заканчивается вничью, оба слишком измотаны, чтобы продолжать. Они настороженно смотрят друг на друга, прежде чем отступить, сохранив честь."
 agot_multi_duel.0020.desc.outro_survived4: "\n\nИз-за внезапного отвлечения на поле боя [winner_duelist.GetTitledFirstNameNoTooltip], и [loser_duelist.GetTitledFirstNameNoTooltip] вынуждены прервать поединок, никто не желает рисковать ударом в такой неопределённости."
 agot_multi_duel.0020.desc.outro_survived5: "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] и [loser_duelist.GetTitledFirstNameNoTooltip] настороженно кружат друг вокруг друга, но ни один не может найти возможность для смертельного удара. В конце концов они расходятся, оба помяты, но живы."
 agot_multi_duel.0020.desc.outro_survived6: "\n\nБой прерывается натиском вражеских воинов, [winner_duelist.GetTitledFirstNameNoTooltip] и [loser_duelist.GetTitledFirstNameNoTooltip] вынуждены прекратить поединок и вернуться к большой битве."
 agot_multi_duel.0020.desc.outro_survived7: "\n\nОба на грани изнеможения, но никто не сдаётся. В конце концов они соглашаются прекратить бой, каждый уважая доблесть другого."
 agot_multi_duel.0020.desc.outro_survived8: "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] наносит удар и [loser_duelist.GetTitledFirstNameNoTooltip] получает ранение, но прежде чем [winner_duelist.GetSheHe] может добить [loser_duelist.GetHerHis], между ними врываются другие бойцы, прерывая момент и заканчивая поединок."
 agot_multi_duel.0020.desc.outro_survived9: "\n\nПо мере того как оба устают, их удары теряют силу, и наконец они отступают, признавая ничью кивком, прежде чем снова влиться в схватку."
 agot_multi_duel.0020.desc.outro_survived10: "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] наносит удар, который должен был быть смертельным, но [loser_duelist.GetTitledFirstNameNoTooltip] выживает благодаря своим доспехам. Понимая, что бой может продолжаться бесконечно, они расходятся, оба тяжело дыша."

 #EXTRA DUEL OUTRO - Rises again
 agot_multi_duel.0020.desc.outro_survived1.stands_up: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] падает из-за тяжёлого удара на землю, на миг теряясь в круговерти битвы. Когда кажется, что поединок уже решен, [loser_duelist.GetSheHe] поднимается на ноги и продолжает бой."
 agot_multi_duel.0020.desc.outro_survived2.stands_up: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] спотыкается и тяжело падает, удар вырывает резкий вздох у наблюдающих. Но мгновение спустя [loser_duelist.GetSheHe] снова поднимается, стряхивая удар и заставляя себя вернуться в бой."
 agot_multi_duel.0020.desc.outro_survived3.stands_up: "\n\nСхватка заканчивается тем, что [loser_duelist.GetTitledFirstNameNoTooltip] [Select_CString(loser_duelist.IsFemale, 'прижата', 'прижат' )] к земле, [loser_duelist.Custom('signature_weapon')] выскальзывает из рук. С усилием и решимостью [loser_duelist.GetSheHe] подбирает оружие и поднимается, чтобы снова встретить бой."
 agot_multi_duel.0020.desc.outro_survived4.stands_up: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] [Select_CString(loser_duelist.IsFemale, 'сбита', 'сбит' )] с ног и [Select_CString(loser_duelist.IsFemale, 'растянулась', 'растянулся' )] среди тел. На миг поединок замирает, прежде чем [loser_duelist.GetSheHe] снова поднимается, [Select_CString(loser_duelist.IsFemale, 'раненая', 'раненый' )], но не [Select_CString(loser_duelist.IsFemale, 'желающая', 'желающий' )] сдаваться."
 agot_multi_duel.0020.desc.outro_survived5.stands_up: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] падает на землю из-за силы стали на землю, пыль и кровь смешиваются под [Select_CString(loser_duelist.IsFemale, 'ней', 'ним' )]. Но [loser_duelist.GetSheHe] не остаётся там, с трудом поднимаясь на ноги, пока бушует битва."
 agot_multi_duel.0020.desc.outro_survived6.stands_up: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] падает под натиском, дыхание перехватывает, когда земля устремляется навстречу. Мгновение спустя [loser_duelist.GetSheHe] заставляет себя подняться, отказываясь позволить поединку закончиться так легко."
 agot_multi_duel.0020.desc.outro_survived7.stands_up: "\n\nПосле сокрушительного обмена ударами [loser_duelist.GetTitledFirstNameNoTooltip] падает в грязь, [Select_CString(loser_duelist.IsFemale, 'неподвижный и оглушённая', 'неподвижный и оглушённый' )]. Пауза длится недолго, и вскоре [loser_duelist.GetSheHe] снова поднимается, возвращаясь из-за упорства и решимости в бой."
 agot_multi_duel.0020.desc.outro_survived8.stands_up: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] [Select_CString(loser_duelist.IsFemale, 'отброшена', 'отброшен' )] назад и вниз, поединок на миг прерван падением. С резким вдохом и сжатой решимостью [loser_duelist.GetSheHe] обретает равновесие и снова делает шаг вперёд."
 agot_multi_duel.0020.desc.outro_survived9.stands_up: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] наконец падает на землю из-за силы противостояния, оружие скрежещет по земле. Тем не менее [loser_duelist.GetSheHe] не сдаётся, поднимается на ноги и снова вступает в бой."
 agot_multi_duel.0020.desc.outro_survived10.stands_up: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] [Select_CString(loser_duelist.IsFemale, 'сражена', 'сражен' )] и на мгновение [Select_CString(loser_duelist.IsFemale, 'поглощена', 'поглощён' )] окружающим хаосом. Затем [loser_duelist.GetSheHe] снова поднимается, [Select_CString(loser_duelist.IsFemale, 'избитая', 'избитый' )], но на ногах, и поединок продолжается."

 #EXTRA DUEL OUTRO - Rises again (Get up, Ser!)
 agot_multi_duel.0020.desc.outro_survived1.stands_up.friend: "\n\nПосле тяжёлого удара [loser_duelist.GetTitledFirstNameNoTooltip] падает на землю, дыхание выбито. Когда поединок грозит закончиться, сквозь шум прорывается голос, [loser_duelist_friend.GetTitledFirstName] кричит из толпы.\n\n#EMP «Вставай, [loser_duelist.GetTitledFirstNameNoTooltip]! На ноги, бой не окончен!»#!\n\n[Select_CString(loser_duelist.IsFemale, 'Взбодрённая', 'Взбодрённый' )] криком, [loser_duelist.GetSheHe] заставляет себя подняться."
 agot_multi_duel.0020.desc.outro_survived2.stands_up.friend: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] тяжело падает, пыль вздымается там, где [loser_duelist.GetSheHe] ударяется о землю. На миг схватка замирает, пока [loser_duelist_friend.GetTitledFirstName] своим голосом не прорывает грохот.\n\n#EMP «Вставай, [loser_duelist.GetFirstNameNoTooltip]! Вставай и встреть их!»#!\n\nС резким вдохом [loser_duelist.GetSheHe] поднимается на ноги."
 agot_multi_duel.0020.desc.outro_survived3.stands_up.friend: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] [Select_CString(loser_duelist.IsFemale, 'отброшена', 'отброшен' )] сталью назад и вниз, [loser_duelist.Custom('signature_weapon')] выскальзывает из рук. Прежде чем момент уходит, из толпы раздается крик, [loser_duelist_friend.GetTitledFirstName] подбадривает [loser_duelist.GetHerHis].\n\n#EMP «Вставай! Ты ещё не [Select_CString(loser_duelist.IsFemale, 'побеждена', 'побеждён' )], поднимайся!»#!\n\nСтиснув зубы, [loser_duelist.GetSheHe] с трудом поднимается на ноги."
 agot_multi_duel.0020.desc.outro_survived4.stands_up.friend: "\n\nИз-за силы обмена ударами [loser_duelist.GetTitledFirstNameNoTooltip] падает на истоптанную землю. Среди зрителей пробегает шепот, пока один голос не возвышается над остальными, [loser_duelist_friend.GetTitledFirstName], [Select_CString(loser_duelist_friend.IsFemale, 'яростная и несгибаемая', 'яростный и несгибаемый' )].\n\n#EMP «На ноги, [loser_duelist.GetFirstNameNoTooltip], покажи им свою силу!»#!\n\nОтвечая на призыв, [loser_duelist.GetSheHe] снова поднимается, [Select_CString(loser_duelist.IsFemale, 'нетвёрдая, но несломленная', 'нетвёрдый, но несломленный' )]."
 agot_multi_duel.0020.desc.outro_survived5.stands_up.friend: "\n\n[Select_CString(loser_duelist.IsFemale, 'Сбитая', 'Сбитый' )] с ног натиском, [loser_duelist.GetTitledFirstNameNoTooltip] падает среди пыли и стали. Поединок кажется почти решённым, когда ясный крик разносится за пределами бойцов, [loser_duelist_friend.GetTitledFirstName] выкрикивает.\n\n#EMP «Вставай! Семеро видят тебя, не падай!»#!\n\nКогда слова разносятся по полю, [loser_duelist.GetSheHe] поднимается на ноги."

 #EXTRA DUEL OUTRO - Downed
 agot_multi_duel.0020.desc.outro_survived1.downed: "\n\nИз-за жестокого обмена ударами [loser_duelist.GetTitledFirstNameNoTooltip] падает на землю, и на этот раз быстрого восстановления не последует. [loser_duelist.GetSheHe|U] пытается подняться, но силы иссякли, и поединок заканчивается там, где [loser_duelist.GetSheHe] [Select_CString(loser_duelist.IsFemale, 'упала', 'упал' )]."
 agot_multi_duel.0020.desc.outro_survived2.downed: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] с силой [Select_CString(loser_duelist.IsFemale, 'брошена', 'брошен' )] на землю, удар выбивает из [Select_CString(loser_duelist.IsFemale, 'неё', 'него' )] боевой дух. Хотя [loser_duelist.GetSheHe] шевелится, [loser_duelist.GetSheHe] не может встать на ноги."
 agot_multi_duel.0020.desc.outro_survived3.downed: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] [Select_CString(loser_duelist.IsFemale, 'отброшена', 'отброшен' )] силой стали на землю. [loser_duelist.GetSheHe] тщетно пытается восстановить равновесие, и поединок решён в этот миг."
 agot_multi_duel.0020.desc.outro_survived4.downed: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] падает под натиском и остаётся там, дыхание прерывисто, конечности не слушаются. Попытка подняться терпит неудачу, и бой окончен."
 agot_multi_duel.0020.desc.outro_survived5.downed: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] падает на землю после последнего удара, пыль и кровь отмечают место падения. [loser_duelist.GetSheHe] не поднимается, и поединок подходит к концу."
 agot_multi_duel.0020.desc.outro_survived6.downed: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] рушится под тяжестью боя, попытка встать оканчивается неудачей. Толпа ясно видит: [loser_duelist.GetSheHe] не может продолжать."
 agot_multi_duel.0020.desc.outro_survived7.downed: "\n\nСхватка заканчивается тем, что [loser_duelist.GetTitledFirstNameNoTooltip] [Select_CString(loser_duelist.IsFemale, 'прижата', 'прижат' )] к земле, силы иссякли, решимость исчерпана. Хотя [loser_duelist.GetSheHe] двигается, [loser_duelist.GetSheHe] не может подняться, чтобы продолжить бой."
 agot_multi_duel.0020.desc.outro_survived8.downed: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] [Select_CString(loser_duelist.IsFemale, 'сбита', 'сбит' )] с ног и остаётся там, где [Select_CString(loser_duelist.IsFemale, 'упала', 'упал' )]. Поединок замирает, затем заканчивается, когда становится ясно, что [loser_duelist.GetSheHe] больше не может стоять."
 agot_multi_duel.0020.desc.outro_survived9.downed: "\n\nНаконец [loser_duelist.GetTitledFirstNameNoTooltip] уступает силе схватки, падая на землю. Попытка подняться не удаётся, и исход более не вызывает сомнений."
 agot_multi_duel.0020.desc.outro_survived10.downed: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] [Select_CString(loser_duelist.IsFemale, 'сражена', 'сражён' )] и остаётся лежать, воля к бою уничтожена усталостью и болью. Поединок заканчивается не новым ударом, а [loser_duelist.GetHerHis] неспособностью подняться."

 #EXTRA DUEL OUTRO - Trial of Seven accuser yielded
 agot_multi_duel.0020.desc.outro_survived1.yielded: "\n\nСхватка замедляется, когда [loser_duelist.GetTitledFirstNameNoTooltip] опускает [loser_duelist.Custom('signature_weapon')] и сдаётся на глазах у всех. Когда смысл жеста укореняется, последовала тишина.\n\nС этой сдачей Суд Семерых теряет свою цель. [loser_duelist.GetSheHe|U] отзывает обвинение. [tos_accused.GetTitledFirstName] [Select_CString(tos_accused.IsFemale, 'свободна', 'свободен' )]. Обвинение, призвавшее сталь на поле, уничтожено [loser_duelist.GetHerHis] собственными словами."

 agot_multi_duel.0020.desc.outro_survived2.yielded: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] отступает от боя, [loser_duelist.Custom('signature_weapon')] лежит на земле, воля исчерпана, сдаётся на глазах у всей державы. Поединок заканчивается не последним ударом, а сдачей.\n\nСуд Семерых распадается в этот миг. [loser_duelist.GetSheHe|U] отзывает своё обвинение. [tos_accused.GetTitledFirstName] [Select_CString(tos_accused.IsFemale, 'оправдана', 'оправдан' )], и вызов, потрясший державу, предан забвению."

 agot_multi_duel.0020.desc.outro_survived3.yielded: "\n\nТишина распространяется по полю, когда [loser_duelist.GetTitledFirstNameNoTooltip] сдаётся, опуская [loser_duelist.Custom('signature_weapon')] перед богами и людьми. Смысл ясен всем свидетелям.\n\nСдаваясь, [loser_duelist.GetSheHe] снимает обвинение, [tos_accused.GetTitledFirstName] [Select_CString(tos_accused.IsFemale, 'оправдана', 'оправдан' )], лишая Суд Семерых основания. То, что было принесено на суд, уничтожено не кровью, а сдачей."

 agot_multi_duel.0020.desc.outro_survived4.yielded: "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] [Select_CString(loser_duelist.IsFemale, 'дрогнула', 'дрогнул' )], затем сдаётся, опуская [loser_duelist.Custom('signature_weapon')], когда схватка наконец стихает. Поле ждёт, слушая.\n\nСо сдачей [Select_CString(loser_duelist.IsFemale, 'обвинительницы', 'обвинителя' )] Суд Семерых рушится. [loser_duelist.GetSheHe|U] отзывает обвинение, а [tos_accused.GetTitledFirstName] [Select_CString(tos_accused.IsFemale, 'оправдана', 'оправдан' )], и обвинение, требовавшее суда сталью, публично снято."

 agot_multi_duel.0020.desc.outro_survived5.yielded: "\n\nМомент прерывается, когда [loser_duelist.GetTitledFirstNameNoTooltip] сдаётся, силы и уверенность исчерпаны. Сталь замолкает, и поединок заканчивается без нового удара.\n\nСуд Семерых не может продолжаться. [loser_duelist.GetSheHe|U] отзывает свои притязания, на которые [Select_CString(tos_accused.IsFemale, 'должна', 'должен' )] ответить [tos_accused.GetTitledFirstName], оставляя обвинение без голоса и защитников, чтобы нести его дальше."

 agot_multi_duel.0020.a.a: "Храни сосредоточение!"
 agot_multi_duel.0020.a.b: "Держи защиту!"
 agot_multi_duel.0020.a.c: "Покончи с этим, быстро!"
 agot_multi_duel.0020.a.d: "Смотри за спину!"
 agot_multi_duel.0020.a.e: "Не теряй фокус!"
 agot_multi_duel.0020.a.f: "Продолжай сражаться!"



