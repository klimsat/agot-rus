 agot_multi_duel.0100.t.tos.accuser_yielded: "$agot_multi_duel.tos_header$: Поражение обвинителей"
 agot_multi_duel.0100.t.tos.accuser_downed: "$agot_multi_duel.tos_header$: Поверженное обвинение"
 agot_multi_duel.0100.t.tos.accuser_dead: "$agot_multi_duel.tos_header$: Падение обвинителей"
 agot_multi_duel.0100.t.tos.accused_downed: "$agot_multi_duel.tos_header$: Вынесение приговора"
 agot_multi_duel.0100.t.tos.accused_dead: "$agot_multi_duel.tos_header$: Вина, доказанная кровью"

 #Winner Pov
 agot_multi_duel.0100.desc.accuser_yielded: "Противостояние заканчивается без нового удара. [main_loser_leader.GetTitledFirstName] сдаётся перед всей державой, опуская [main_loser_leader.Custom('signature_weapon')] и отступая от обвинения, призвавшего сталь на поле.\n\nСлова, следующие за этим, значат больше, чем любой удар. Обвинение снято на глазах у богов и людей, и Суд Семерых заканчивается сдачей, а не кровью. Я [Select_CString(ROOT.Char.IsFemale, 'оправдана', 'оправдан' )], моё имя очищено не указом, но словом [Select_CString(main_loser_leader.IsFemale, 'самой обвинительницы', 'самого обвинителя' )]. Держава видела, как [main_loser_leader.GetTitledFirstNamePossessiveNoTooltip] предаёт обвинение против меня забвению собственными словами."
 agot_multi_duel.0100.desc.accuser_downed: "[main_loser_leader.GetTitledFirstName] [Select_CString(main_loser_leader.IsFemale, 'повержена', 'повержен' )] на поле боя, силы иссякли, и [main_loser_leader.GetSheHe] не может подняться. Какая бы решимость ни вела [main_loser_leader.GetHerHis] в этом испытании, она наконец оставила [main_loser_leader.GetHerHis].\n\nС неспособностью [Select_CString(main_loser_leader.IsFemale, 'обвинительницы', 'обвинителя' )] продолжать Суд Семерых подходит к концу. По закону и обычаю обвинение падает вместе с поражением. Я [Select_CString(ROOT.Char.IsFemale, 'признана правой', 'признан правым' )] перед всеми, кто наблюдал этот суд стали, моё дело подтверждено не словами, а стойкостью, когда это было важнее всего."
 agot_multi_duel.0100.desc.accuser_dead: "[main_loser_leader.GetTitledFirstName] [Select_CString(main_loser_leader.IsFemale, 'пала', 'пал' )] на поле битвы после последней схватки, голос, призвавший это испытание, наконец умолк.\n\nС кончиной [Select_CString(main_loser_leader.IsFemale, 'обвинительницы', 'обвинителя' )] Суд Семерых заканчивается кровью и вердиктом. Не осталось ни вызова, на который нужно ответить, ни обвинения, которое нужно оспаривать. Я [Select_CString(ROOT.Char.IsFemale, 'оправдана', 'оправдан' )] одним лишь выживанием, моё дело доказано там, где прежде не помогли клятвы и обвинения, и держава не сомневается, кому благоволят боги."
 agot_multi_duel.0100.desc.accused_downed: "[main_loser_leader.GetTitledFirstName] [Select_CString(main_loser_leader.IsFemale, 'повержена', 'повержен' )] на поле, силы иссякают, когда бой наконец оставляет [main_loser_leader.GetHerHis]. Схватка заканчивается тем, что [main_loser_leader.GetSheHe] не может удержаться на ногах.\n\nСуд Семерых наконец выносит приговор. Я крепко стою на ногах, а [Select_CString(main_loser_leader.IsFemale, 'обвиняемая', 'обвиняемый' )] — нет, и по стали и обычаю вина ложится на [main_loser_leader.GetHerHis] имя. Перед всей державой обвинение, которое я [Select_CString(ROOT.Char.IsFemale, 'выдвинула', 'выдвинул' )], доказано, и суд, которого я [Select_CString(ROOT.Char.IsFemale, 'требовала', 'требовал' )], свершился."
 agot_multi_duel.0100.desc.accused_dead: "Поединок заканчивается кровью, когда [main_loser_leader.GetTitledFirstName] падает под тяжёстью суда, призванного против н[main_loser_leader.GetHerHis]. Поле замирает, когда смысл момента укореняется.\n\nСуд Семерых наконец решен. Я [Select_CString(ROOT.Char.IsFemale, 'одержала', 'одержал' )] верх, и обвинение доказано на поле на глазах у всех. Больше не нужны слова, не осталось сомнений. Держава получила ответ, написанный стальным пером."

 #Observer Pov
 agot_multi_duel.0100.desc.accuser_yielded.observer: "Схватка замирает, когда [main_loser_leader.GetTitledFirstName] сдаётся, опуская [main_loser_leader.Custom('signature_weapon')] перед взором всех свидетелей. Звук стали стихает, сменяясь напряжённой тишиной, когда смысл момента оседает над полем.\n\nС отзывом обвинения Суд Семерых подходит к концу. [main_winner_leader.GetTitledFirstName] [Select_CString(main_winner_leader.IsFemale, 'оправдана', 'оправдан' )]. Обвинение уничтожено не кровью, а сдачей [Select_CString(main_loser_leader.IsFemale, 'обвинительницы', 'обвинителя' )]. Перед взором богов и людей дело решено без нового удара, и державе остаётся лишь осознать суд, произнесённый словами, а не сталью."
 agot_multi_duel.0100.desc.accuser_downed.observer: "[main_loser_leader.GetTitledFirstName] [Select_CString(main_loser_leader.IsFemale, 'сбита', 'сбит' )] с ног и не может подняться. Поле ждёт в напряжённой тишине, наблюдая за движением, которое не наступает.\n\nСуд Семерых заканчивается поражением [Select_CString(main_loser_leader.IsFemale, 'обвинительницы', 'обвинителя' )] на поле. По обычаю и закону обвинение терпит неудачу там, где его защитники не смогли устоять. [main_winner_leader.GetTitledFirstName] [Select_CString(main_winner_leader.IsFemale, 'оправдана', 'оправдан' )] перед державой, обвинение отвечено силой, которая осталась, когда другая сторона дрогнула."
 agot_multi_duel.0100.desc.accuser_dead.observer: "После последнего обмена ударами [main_loser_leader.GetTitledFirstName] [Select_CString(main_loser_leader.IsFemale, 'пала', 'пал' )] на поле битвы, и вместе с [Select_CString(main_loser_leader.IsFemale, 'ней', 'ним' )] падает голос, призвавший это испытание. Схватка заканчивается, когда поле впитывает окончательность момента.\n\nСуд Семерых решён кровью. [main_winner_leader.GetTitledFirstName] крепко стоит на ногах, на обвинение отвечено одним лишь выживанием. Не нужно дальнейшего суда, и держава засвидетельствовала приговор, ясно написанный сталью."
 agot_multi_duel.0100.desc.accused_downed.observer: "[main_loser_leader.GetTitledFirstName] [Select_CString(main_loser_leader.IsFemale, 'повержена', 'повержен' )] и не может продолжать бой. Схватка иссякает, пока не становится ясно, что [Select_CString(main_loser_leader.IsFemale, 'обвиняемая', 'обвиняемый' )] не может подняться, чтобы ответить на обвинение.\n\nСуд Семерых наконец выносит приговор. [main_winner_leader.GetTitledFirstName] [Select_CString(main_winner_leader.IsFemale, 'признана победительницей', 'признан победителем' )] перед всеми свидетелями, и вина возлагается на [Select_CString(main_loser_leader.IsFemale, 'обвиняемой', 'обвиняемого' )] под взором всей державы. То, что было поставлено под сомнение, теперь получило ответ без двусмысленности."
 agot_multi_duel.0100.desc.accused_dead.observer: "Поединок заканчивается тем, что [main_loser_leader.GetTitledFirstName] [Select_CString(main_loser_leader.IsFemale, 'сражена', 'сражён' )] на поле, последний удар заставляет замолчать любое дальнейшее отрицание обвинения.\n\nСуд Семерых завершается кровью и определённостью. Обвинение доказано сталью, и [main_winner_leader.GetTitledFirstName] выходит [Select_CString(main_loser_leader.IsFemale, 'победительницей', 'победителем' )] перед взором всей державы. Не осталось сомнений, на чью сторону пал суд, и дело решено навсегда."

 #Loser Pov
 agot_multi_duel.0100.desc.accuser_yielded.loser: "Силы покидают меня, а вместе с ними и уверенность, что несла меня до сих пор. Моя рука дрожит, когда я опускаю [main_loser_leader.Custom('signature_weapon')], тяжесть момента тяжелее любой раны.\n\nНа глазах у всех я сдаюсь. Я снимаю обвинение, которое [Select_CString(ROOT.Char.IsFemale, 'выдвинула', 'выдвинул' )], и отказываюсь от вызова, призвавшего сталь на поле. Суд Семерых заканчивается моей собственной сдачей, и обвинение, которое я так смело [Select_CString(ROOT.Char.IsFemale, 'произнесла', 'произнёс' )], умирает с моими словами, оставляя державе память о том, что я [Select_CString(ROOT.Char.IsFemale, 'отступила', 'отступил' )], когда не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] идти дальше."
 agot_multi_duel.0100.desc.accuser_downed.loser: "Я пытаюсь подняться, но тело не слушается. Земля кажется далёкой и нетвёрдой, шум битвы расплывается, боль заглушает всё.\n\nПравда становится неизбежной. Я больше не могу стоять, чтобы отстаивать обвинение, которое [Select_CString(ROOT.Char.IsFemale, 'произнесла', 'произнёс' )] перед державой. Суд Семерых заканчивается моим поражением, и моё обвинение терпит неудачу там, где иссякли мои силы. На глазах у всех мой вызов рассыпается на поле."
 agot_multi_duel.0100.desc.accused_downed.loser: "Бой истощает мои силы, пока ноги не подкашиваются и я не могу больше стоять. Каждый вдох обжигает, и поле кренится, когда я пытаюсь осознать, что решено.\n\nСуд Семерых отвечает на обвинение против меня сталью. Я падаю на землю [Select_CString(ROOT.Char.IsFemale, 'поверженная', 'поверженный' )], когда приговор выносится на глазах у всех, моя судьба решена не словами или клятвами, а моей неспособностью устоять, когда момент потребовал этого."

 agot_multi_duel.0100.a: "Свершилось."

