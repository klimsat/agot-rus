 #POV EVENT INTRO TEXTS
 agot_multi_duel.0030.desc.intro.a: "Я и [duelist_enemy.GetTitledFirstName], [Select_CString(duelist_enemy.IsFemale, 'та', 'тот' )], кто стоит между мной и победой, оказываемся лицом к лицу."
 agot_multi_duel.0030.desc.intro.b: "Настало время для того, чтобы я и [duelist_enemy.GetTitledFirstName] встретились лицом к лицу. Пути назад нет."
 agot_multi_duel.0030.desc.intro.c: "Передо мной стоит [duelist_enemy.GetTitledFirstName], [Select_CString(duelist_enemy.IsFemale, 'решительная противница, готовая', 'решительный противник, готовый' )] к битве."
 agot_multi_duel.0030.desc.intro.d: "Напряжение ощутимо, когда я и [duelist_enemy.GetTitledFirstName] готовимся к поединку."
 agot_multi_duel.0030.desc.intro.e: "Вот оно. [duelist_enemy.GetTitledFirstName] и я вот-вот сойдёмся в бою до конца."
 agot_multi_duel.0030.desc.intro.f: "[duelist_enemy.GetTitledFirstName] ждёт с холодной решимостью в глазах, когда мы готовимся к битве."
 agot_multi_duel.0030.desc.intro.g: "Я и [duelist_enemy.GetTitledFirstName] стоим наготове, зная, что только один из нас уйдёт."
 agot_multi_duel.0030.desc.intro.h: "Теперь только я и [duelist_enemy.GetTitledFirstName]. Исход этого поединка изменит всё."
 agot_multi_duel.0030.desc.intro.i: "Воздух наполнен ожиданием, когда я и [duelist_enemy.GetTitledFirstName], [Select_CString(duelist_enemy.IsFemale, 'моя соперница', 'мой соперник' )] в этом смертельном состязании, стоим лицом к лицу."
 agot_multi_duel.0030.desc.intro.j: "Я крепко сжимаю [player_duelist.Custom('signature_weapon')], зная, что [duelist_enemy.GetTitledFirstName] делает то же самое."
 agot_multi_duel.0030.desc.intro.k: "Я и [duelist_enemy.GetTitledFirstName] встречаемся взглядами, зная, что этот поединок может стать последним."
 agot_multi_duel.0030.desc.intro.l: "Когда я и [duelist_enemy.GetTitledFirstName] стоим друг перед другом, нет места страху, только сосредоточенность."
 agot_multi_duel.0030.desc.intro.m: "Я вижу, как решительно стоит [duelist_enemy.GetTitledFirstName], когда мы готовимся к бою."
 agot_multi_duel.0030.desc.intro.n: "Передо мной [duelist_enemy.GetTitledFirstName], и я знаю, что эту битву я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выиграть."
 agot_multi_duel.0030.desc.intro.o: "Я делаю глубокий вдох, собираясь с мыслями, пока я и [duelist_enemy.GetTitledFirstName] готовимся к поединку."
 agot_multi_duel.0030.desc.intro.p: "Поле битвы исчезает, когда все мои мысли занимает [duelist_enemy.GetTitledFirstName], [Select_CString(duelist_enemy.IsFemale, 'моя противница', 'мой противник' )]."
 agot_multi_duel.0030.desc.intro.q: "Пришло время доказать свою доблесть. [duelist_enemy.GetTitledFirstName] и я вот-вот сойдёмся."
 agot_multi_duel.0030.desc.intro.r: "Я [Select_CString(ROOT.Char.IsFemale, 'сталкивалась', 'сталкивался' )] со многими вызовами, но ни с одним, подобным тому, что представляет из себя [duelist_enemy.GetTitledFirstName]."
 agot_multi_duel.0030.desc.intro.s: "Когда я и [duelist_enemy.GetTitledFirstName] стоим лицом к лицу, я чувствую прилив решимости."
 agot_multi_duel.0030.desc.intro.t: "От этого не уйти. [duelist_enemy.GetTitledFirstName] и я сейчас сразимся."

 #POV EVENT OUTRO Part1 TEXTS
 agot_multi_duel.0030.desc.outro.a: "Когда мы стоим на грани битвы, я ощущаю всю тяжесть того, что должно произойти."
 agot_multi_duel.0030.desc.outro.b: "Мир, кажется, затаил дыхание, когда мы готовимся к схватке. Напряжение душит, но и опьяняет. Я знаю, что следующие мгновения определят всё."
 agot_multi_duel.0030.desc.outro.c: "Холодный ветер несёт с собой тяжесть бесчисленных битв, выигранных и проигранных. Это ничем не отличается, но кажется, что всё висит на волоске."
 agot_multi_duel.0030.desc.outro.d: "С каждым ударом сердца момент истины приближается. Я чувствую силу в своих руках, силу своей воли."
 agot_multi_duel.0030.desc.outro.e: "Поле битвы вокруг нас меркнет. Остаемся только я и [duelist_enemy.GetTitledFirstNameNoTooltip], каждый движим силами, приведшими нас к этому моменту."
 agot_multi_duel.0030.desc.outro.f: "Воздух заряжен обещанием насилия. Всё, что мы сделали, всё, кем мы стали, привело к этому мгновению. Я чувствую напряжение в мышцах, готовность в стойке."
 agot_multi_duel.0030.desc.outro.g: "Каждый вдох, каждая секунда приближает нас к неизбежной схватке. Больше нет времени на колебания."
 agot_multi_duel.0030.desc.outro.h: "[player_duelist.Custom('signature_weapon')] кажется тяжелее обычного — не из-за физического веса, а из-за груза того, что вот-вот свершится."
 agot_multi_duel.0030.desc.outro.i: "Это кульминация всего, что привело нас к этой точке. Грядущая битва — не просто выживание; это судьба, то, кто мы есть и за что выступаем."
 agot_multi_duel.0030.desc.outro.j: "В тишине перед бурей я собираю мысли и мужество. Нельзя избежать реальности того, что сейчас произойдет."
 agot_multi_duel.0030.desc.outro.k: "Мир сужается до одного этого пугающего момента. Весь шум, весь хаос битвы отступает на задний план."
 agot_multi_duel.0030.desc.outro.l: "Когда мы готовимся к удару, на меня обрушивается вся тяжесть того, что вот-вот случится. Это не просто битва; это конец пути, последнее испытание силы и воли."
 agot_multi_duel.0030.desc.outro.m: "Напряжение невыносимо, но я заставляю себя сохранять спокойствие. Я [Select_CString(ROOT.Char.IsFemale, 'сталкивалась', 'сталкивался' )] с вызовами раньше, но ни с чем подобным."
 agot_multi_duel.0030.desc.outro.n: "Время, кажется, замедляется, когда поединок приближается. Каждая деталь становится резче в моем сознании — [player_duelist.Custom('signature_weapon')], земля под ногами, решимость, которую демонстрирует [duelist_enemy.GetTitledFirstNameNoTooltip] во взгляде."
 agot_multi_duel.0030.desc.outro.o: "Ожидание подобно живому существу, свернувшемуся и готовому нанести удар. Я чувствую это каждой клеткой своего тела, уверенность, что этот поединок будет не похож ни на один другой."
 agot_multi_duel.0030.desc.outro.p: "Когда мы стоим друг против друга, груз судьбы давит. Это не просто поединок; это перекресток, момент, который определит течение наших жизней."
 agot_multi_duel.0030.desc.outro.q: "Тишина перед бурей оглушает, затишье, предшествующее насилию. В этот момент ясно, что ничто иное не имеет значения, кроме поединка."
 agot_multi_duel.0030.desc.outro.r: "С каждой проходящей секундой неизбежное приближается. Поединок — это больше, чем бой; это проверка всего, чему я [Select_CString(ROOT.Char.IsFemale, 'научилась', 'научился' )], всего, что я есть."
 agot_multi_duel.0030.desc.outro.s: "В этом моменте есть окончательность, чувство, что всё привело к этой точке."
 agot_multi_duel.0030.desc.outro.t: "Когда я и [duelist_enemy.GetTitledFirstNameNoTooltip] готовимся к противостоянию, я чувствую тяжесть каждого сделанного мною выбора."

 #POV EVENT OUTRO Part2 TEXTS
 agot_multi_duel.0030.desc.outro2.a: "\n\nКаждое решение, каждое движение определит не только исход этого поединка, но и путь, лежащий впереди. Нет места ошибке."
 agot_multi_duel.0030.desc.outro2.b: "\n\nПобеда достанется лишь тому, кто сумеет её схватить."
 agot_multi_duel.0030.desc.outro2.c: "\n\nМоя решимость крепнет. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] быть [Select_CString(ROOT.Char.IsFemale, 'той', 'тем' )], кто выйдет из этого [Select_CString(ROOT.Char.IsFemale, 'победительницей', 'победителем' )]."
 agot_multi_duel.0030.desc.outro2.d: "\n\nНо достаточно ли этого? Скоро не останется вопросов, только холодная реальность поединка."
 agot_multi_duel.0030.desc.outro2.e: "\n\nТолько один выйдет победителем, и ставки выше некуда."
 agot_multi_duel.0030.desc.outro2.f: "\n\nПришло время доказать, кто сильнее."
 agot_multi_duel.0030.desc.outro2.g: "\n\nПоединок начнётся, и только один из нас увидит его конец. Я [Select_CString(ROOT.Char.IsFemale, 'полна', 'полон' )] решимости, что это буду я."
 agot_multi_duel.0030.desc.outro2.h: "\n\nПоединок — это больше, чем просто бой; это расплата, суд, совершаемый сталью и мастерством."
 agot_multi_duel.0030.desc.outro2.i: "\n\nВремя действовать настало."
 agot_multi_duel.0030.desc.outro2.j: "\n\nМы две силы, сталкивающиеся, и только одна останется стоять, когда осядет пыль."
 agot_multi_duel.0030.desc.outro2.k: "\n\nТеперь важен только предстоящий поединок, поле испытания, где один из нас падет."
 agot_multi_duel.0030.desc.outro2.l: "\n\nОстаётся лишь надеяться, что я [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )]."
 agot_multi_duel.0030.desc.outro2.m: "\n\nЭтот поединок станет определяющим моментом, битвой, которая либо сломает меня, либо приведет к победе."
 agot_multi_duel.0030.desc.outro2.n: "\n\nНе избежать того, что грядет."
 agot_multi_duel.0030.desc.outro2.o: "\n\nЭто момент, который изменит всё."
 agot_multi_duel.0030.desc.outro2.p: "\n\nЯ успокаиваю дыхание, зная, что то, что произойдет дальше, определит меня."
 agot_multi_duel.0030.desc.outro2.q: "\n\nИсход определит будущее способами, которые ни один из нас не может предсказать."
 agot_multi_duel.0030.desc.outro2.r: "\n\nЯ могу только надеяться, что я достаточно [Select_CString(ROOT.Char.IsFemale, 'сильна', 'силён' )], чтобы пройти через это."
 agot_multi_duel.0030.desc.outro2.s: "\n\nПоединок — это не просто победа или поражение; не просто я и [duelist_enemy.GetTitledFirstNameNoTooltip] на поле боя, это доказательство чего-то фундаментального."
 agot_multi_duel.0030.desc.outro2.t: "\n\nЭтот поединок станет высшим испытанием, моментом, который либо определит меня, либо сломает."

 agot_multi_duel.1000.b: "Возможно, мудрее будет сдаться сейчас."

 #POV EVENT OPTION TEXTS
 agot_multi_duel.0030.a.a: "Началось."
 agot_multi_duel.0030.a.b: "Иди сюда!"
 agot_multi_duel.0030.a.c: "Время сражаться."
 agot_multi_duel.0030.a.d: "Хватит игр."
 agot_multi_duel.0030.a.e: "Это кончится здесь."
 agot_multi_duel.0030.a.f: "Теперь конец."
 agot_multi_duel.0030.a.g: "За честь!"
 agot_multi_duel.0030.a.h: "Сразись со мной!"
 agot_multi_duel.0030.a.i: "Я [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )]."
 agot_multi_duel.0030.a.j: "Насмерть!"
 agot_multi_duel.0030.a.k: "Всё кончится сейчас."


