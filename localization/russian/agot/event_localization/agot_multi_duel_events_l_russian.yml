l_russian:
 #Headers
 agot_multi_duel.header: "[background_terrain_scope.GetAdjectiveNoTooltip]ая схватка"
 agot_multi_duel.tos_header: "Суд Семерых"

 #Opponent Stands Up
 agot_multi_duel.1002.a.t: "$agot_multi_duel.tos_header$: Еще на ногах"
 agot_multi_duel.1002.desc.tos.stands_winner_pov: "[loser_multi_duelist.GetTitledFirstName] [Select_CString(loser_multi_duelist.IsFemale, 'прижата', 'прижат' )] к земле, а я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что схватка окончена. На миг [loser_multi_duelist.GetSheHe] [Select_CString(loser_multi_duelist.IsFemale, 'лежала', 'лежал' )] неподвижно среди круговерти битвы.\n\nА затем [loser_multi_duelist.GetSheHe] поднимается. [Select_CString(loser_multi_duelist.IsFemale, 'Окровавленная, нетвердая', 'Окровавленный, нетвердый' )], но снова на ногах, [loser_multi_duelist.GetSheHe] врывается обратно в бой, словно отбросив боль и здравый смысл."
 agot_multi_duel.1002.desc.tos.stands_loser_pov: "[winner_multi_duelist.GetTitledFirstName] наносит удар и я падаю на землю, мир кружится, сталь и грохот обрушиваются со всех сторон. На мгновение кажется, что бой окончен.\n\nЯ заставляю себя подняться сквозь боль, дыхание прерывисто, конечности кричат от боли. Что бы ни случилось дальше, я не останусь лежать."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend: "[loser_multi_duelist.GetTitledFirstName] [Select_CString(loser_multi_duelist.IsFemale, 'прижата', 'прижат' )] к земле, а я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что схватка окончена. На миг [loser_multi_duelist.GetSheHe] [Select_CString(loser_multi_duelist.IsFemale, 'лежала', 'лежал' )] неподвижно среди круговерти битвы."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend: "[winner_multi_duelist.GetTitledFirstName] наносит удар и я падаю на землю, мир кружится, сталь и грохот обрушиваются со всех сторон. На мгновение кажется, что бой окончен."

 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_1: "\n\nСквозь шум прорывается голос, [loser_duelist_friend.GetTitledFirstName] кричит из толпы.\n\n#EMP «Вставай, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Не тебе проигрывать эту битву!»#!\n\nИ каким-то образом [loser_multi_duelist.GetSheHe] поднимается. [Select_CString(loser_multi_duelist.IsFemale, 'Окровавленная, нетвердая', 'Окровавленный, нетвердый' )], но снова на ногах, [loser_multi_duelist.GetSheHe] врывается обратно в бой, словно отбросив боль и здравый смысл."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_2: "\n\nСквозь схватку разносится крик, [loser_duelist_friend.GetTitledFirstName] кричит из толпы.\n\n#EMP «На ноги, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Не здесь тебе падать!»#!\n\nНаперекор всему [loser_multi_duelist.GetSheHe] снова поднимается на ноги, [Select_CString(loser_multi_duelist.IsFemale, 'избитая', 'избитый' )], но [Select_CString(loser_multi_duelist.IsFemale, 'несломленная', 'несломленный' )], и поединок продолжается."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_3: "\n\nЛязг стали прерывает [loser_duelist_friend.GetTitledFirstName].\n\n#EMP «Вставай, сир! Покажи им, что ты еще на ногах!»#!\n\nМгновение спустя [loser_multi_duelist.GetSheHe] снова поднимается, пошатываясь, но [Select_CString(loser_multi_duelist.IsFemale, 'готовая', 'готовый' )] продолжить бой."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_4: "\n\nОтчаянный крик прорывается сквозь грохот, [loser_duelist_friend.GetTitledFirstName] подбадривает [loser_multi_duelist.GetHerHis].\n\n#EMP «Вставай! Семеро видят тебя — не сдавайся!»#!\n\nС прерывистым дыханием [loser_multi_duelist.GetSheHe] вновь поднимается, отказываясь позволить схватке закончиться."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_5: "\n\nС края толпы [loser_duelist_friend.GetTitledFirstName] выкрикивает с яростной решимостью.\n\n#EMP «Сражайся, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Сражайся и встреть их!»#!\n\nМедленно, упрямо [loser_multi_duelist.GetSheHe] обретает равновесие и снова вступает в бой."

 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_1: "\n\nСквозь пелену я слышу, как [loser_duelist_friend.GetTitledFirstName] кричит сквозь хаос.\n\n#EMP «Сражайся, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Вставай и сражайся!»#!\n\nЗвук пробивается сквозь туман, и я заставляю себя подняться сквозь боль, дыхание прерывисто, конечности кричат от боли. Что бы ни случилось дальше, я не останусь лежать."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_2: "\n\nСквозь хаос я слышу, как кричит [loser_duelist_friend.GetTitledFirstName].\n\n#EMP «Вставай, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Ты еще не [Select_CString(loser_multi_duelist.IsFemale, 'побеждена', 'побежден' )]!»#!\n\nСлова прожигают пелену, и я заставляю себя подняться, отказываясь позволить бою закончиться."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_3: "\n\nЗнакомый голос прорывается сквозь звон в ушах — [loser_duelist_friend.GetTitledFirstName], [Select_CString(loser_duelist_friend.IsFemale, 'яростная и несгибаемая', 'яростный и несгибаемый' )].\n\n#EMP «Вставай, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! На ноги и сражайся!»#!\n\nСтиснув зубы, я поднимаюсь, боль сопровождает каждое движение."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_4: "\n\nНад лязгом стали я слышу, как [loser_duelist_friend.GetTitledFirstName] называет моё имя.\n\n#EMP «Держись! Не падай!»#! \n\nКрик придаёт мне сил, и я, превозмогая боль, встаю."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_5: "\n\nГде-то за шумом [loser_duelist_friend.GetTitledFirstName] кричит с отчаянной мольбой.\n\n#EMP «Вставай, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Битва твоя — поднимайся!»#!\n\nСлова прорывают туман, и я поднимаюсь на ноги, дыхание прерывисто, но решимость несломлена."

 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_1: "\n\nНа миг мир исчезает, и я вижу, как надо мной на тренировочном дворе нависает [my_teacher_knight.GetTitledFirstName], [my_teacher_knight.GetSheHe] смотрит, как я пытаюсь подняться из грязи. [my_teacher_knight.GetSheHe|U] качает головой, голос тверд и знаком.\n\n#EMP «Вставай. Рыцарь поднимается, как бы тяжело ни упал».#!\n\nЛязг стали возвращает меня в реальность, воспоминание рассеивается. Я делаю прерывистый вдох, упираюсь рукой в истоптанную землю и снова заставляю себя подняться."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_2: "\n\nТьма сжимается вокруг, но [my_teacher_knight.GetTitledFirstName] своим спокойным и несгибаемым голосом прорывается сквозь неё, как в старые времена, когда каждый синяк был уроком, а каждое падение приносило новый приказ.\n\n#EMP «Боль проходит. Стоять — это выбор».#!\n\nГрохот битвы возвращается, резкий и оглушительный. Стиснув зубы, я прорываюсь сквозь боль и поднимаюсь на ноги."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_3: "\n\nНа миг я уже не на поле, а в пыли далёкого воспоминания, [my_teacher_knight.GetTitledFirstName] наблюдает, сложив руки, как я пытаюсь доказать, что [Select_CString(ROOT.Char.IsFemale, 'достойна', 'достоин' )] меча.\n\n#EMP «Ещё раз. Пока не научишься не падать».#!\n\nВоспоминание исчезает под лязгом стали. Дыхание обжигает легкие, я, шатаясь, поднимаюсь, отказываясь позволить уроку закончиться."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_4: "\n\nШум утихает, и я слышу [my_teacher_knight.GetHerHis] голос так же ясно, словно [my_teacher_knight.GetTitledFirstName] стоит рядом на какой-то давно забытой дороге, подбадривая меня, когда усталость грозила сломить.\n\n#EMP «Истинный рыцарь выдерживает».#!\n\nНастоящее возвращается с лязгом стали и выкриками команд. Черпая силы в той старой стойкости, я заставляю тело подчиниться и встаю."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_5: "\n\nНа мгновение битва исчезает, уступая место суровому взгляду после неудачной тренировочной схватки, [my_teacher_knight.GetTitledFirstName] молча ждёт, когда я встану [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )], вместо того чтобы протянуть руку.\n\n#EMP «Не жди пощады. Вставай».#!\n\nВидение исчезает, как дым, когда возвращается тяжесть настоящего. С тяжелым дыханием и дрожащей решимостью я поднимаюсь на ноги и снова вступаю в бой."

 agot_multi_duel.1002.a: "Бой продолжается."

 #Opponent Downed
 agot_multi_duel.1003.a.t: "$agot_multi_duel.tos_header$: Поражение"
 agot_multi_duel.1003.desc.tos.downed_winner_pov: "[loser_multi_duelist.GetTitledFirstName] пытается подняться, но силы иссякли. То, что прежде держало [loser_multi_duelist.GetHerHis] на ногах, наконец оставило [loser_multi_duelist.GetHerHis], и [loser_multi_duelist.GetSheHe] падает на землю.\n\nБой окончен. [loser_multi_duelist.GetSheHe|U] еще дышит, но больше не может ответить сталью на сталь."
 agot_multi_duel.1003.desc.tos.downed_loser_pov: "Я пытаюсь подняться, но тело не слушается. Боль заглушает всё, конечности больше не подчиняются.\n\nБой продолжился без меня, и на этом он заканчивается. Я вижу, как надо мной нависает [winner_multi_duelist.GetTitledFirstName], [Select_CString(winner_multi_duelist.IsFemale, 'окровавленная и несломленная, вкушающая', 'окровавленный и несломленный, вкушающий' )] триумф, до которого мне уже не дотянуться."
 agot_multi_duel.1003.a: "Одним меньше."

 #ToS - Accuser yielded
 agot_multi_duel.1004.a.t: "$agot_multi_duel.tos_header$: Обвинение снято"
 agot_multi_duel.1004.desc.tos.yields_winner_pov: "[loser_multi_duelist.GetTitledFirstName] наконец [Select_CString(loser_multi_duelist.IsFemale, 'дрогнула', 'дрогнул' )], [loser_multi_duelist.GetHerHis] силы иссякли, воля сломлена. Прежде чем сталь снова встретится, [loser_multi_duelist.GetSheHe] сдаётся.\n\nСлова следуют за этим. [tos_accused.GetTitledFirstName] [Select_CString(tos_accused.IsFemale, 'свободна', 'свободен' )], обвинения сняты, вызов отозван на глазах у всей державы. То, что было поставлено под сомнение, больше не оспаривается, и Суд Семерых завершается не кровью, а сдачей."
 agot_multi_duel.1004.desc.tos.yields_loser_pov: "Силы покидают меня, а вместе с ними и уверенность, что несла меня до сих пор. Я опускаю [loser_multi_duelist.Custom('signature_weapon')] и сдаюсь, зная, что стоять дальше не имеет смысла.\n\nНа глазах у всех я снимаю обвинение и отказываюсь от суда, которым [Select_CString(tos_accused.IsFemale, 'связана', 'связан' )] [tos_accused.GetTitledFirstName]. Правда, которую я [Select_CString(ROOT.Char.IsFemale, 'стремилась', 'стремился' )] доказать, не будет доказана моей рукой. Суд Семерых завершается здесь, отмененный моей сдачей."
 agot_multi_duel.1004.desc.tos.yields_observer_pov: "Схватка замедляется, затем стихает. [loser_multi_duelist.GetTitledFirstName], [Select_CString(loser_multi_duelist.IsFemale, 'призвавшая', 'призвавший' )] суд и [Select_CString(loser_multi_duelist.IsFemale, 'выдвинувшая', 'выдвинувший' )] обвинение перед всей державой, наконец сдаётся. [tos_accused.GetTitledFirstName] [Select_CString(tos_accused.IsFemale, 'свободна', 'свободен' )] от обвинений.\n\nС этой сдачей обвинение снимается. Суд Семерых завершается не последним ударом, а словами [Select_CString(loser_multi_duelist.IsFemale, 'обвинительницы', 'обвинителя' )], отменяющими начатое. На глазах у всех свидетелей дело решено, и обвинение предано забвению."
 agot_multi_duel.1004.a: "Суд окончен."

 #ToS - Invalidated
 agot_multi_duel.1005.t.tos: "$agot_multi_duel.tos_header$: Отмена суда"
 agot_multi_duel.1005.desc.tos: "Прежде чем Суд Семерых мог быть доведен до конца, пришла весть, что [dead_enemy_leader.GetTitledFirstName] [Select_CString(dead_enemy_leader.IsFemale, 'умерла', 'умер' )] за пределами поля. Будь то случай, невезение или чья-то рука, причины, собравшей защитников, более не существует.\n\nБез обвинителя и обвиняемого, чтобы ответить за обвинение, суд не может продолжаться. Собравшиеся клинки распущены, и то, что должно было решиться сталью, уходит в молчание."
 agot_multi_duel.1005.a: "Свершилось."

