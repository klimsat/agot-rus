 #POV EVENT INTRO TEXTS
 agot_multi_duel.0030.desc.intro.a:0 "I find myself face to face with [duelist_enemy.GetTitledFirstName], the one who stands between me and victory."
 agot_multi_duel.0030.desc.intro.b:0 "The time has come to face [duelist_enemy.GetTitledFirstName]. There is no turning back now."
 agot_multi_duel.0030.desc.intro.c:0 "Before me stands [duelist_enemy.GetTitledFirstName], a determined opponent ready for battle."
 agot_multi_duel.0030.desc.intro.d:0 "The tension is palpable as I prepare to duel [duelist_enemy.GetTitledFirstName]."
 agot_multi_duel.0030.desc.intro.e:0 "This is it. [duelist_enemy.GetTitledFirstName] and I are about to clash in a fight to the finish."
 agot_multi_duel.0030.desc.intro.f:0 "There is a cold resolve in [duelist_enemy.GetTitledFirstNamePossessive] eyes as we ready ourselves for battle."
 agot_multi_duel.0030.desc.intro.g:0 "I stand ready, facing [duelist_enemy.GetTitledFirstName], knowing that only one of us will walk away."
 agot_multi_duel.0030.desc.intro.h:0 "It is just me and [duelist_enemy.GetTitledFirstName] now. The outcome of this duel will change everything."
 agot_multi_duel.0030.desc.intro.i:0 "The air is thick with anticipation as I face [duelist_enemy.GetTitledFirstName], my rival in this deadly contest."
 agot_multi_duel.0030.desc.intro.j:0 "I grip my [player_duelist.Custom('signature_weapon')] tightly, knowing that [duelist_enemy.GetTitledFirstName] is doing the same."
 agot_multi_duel.0030.desc.intro.k:0 "I lock eyes with [duelist_enemy.GetTitledFirstName], knowing that this duel could be my last."
 agot_multi_duel.0030.desc.intro.l:0 "As I stand before [duelist_enemy.GetTitledFirstName], there is no room for fear, only focus."
 agot_multi_duel.0030.desc.intro.m:0 "I can see the determination in [duelist_enemy.GetTitledFirstNamePossessive] stance as we prepare to fight."
 agot_multi_duel.0030.desc.intro.n:0 "With [duelist_enemy.GetTitledFirstName] before me, I know this is a battle I must win."
 agot_multi_duel.0030.desc.intro.o:0 "I take a deep breath, steadying myself as I prepare to duel [duelist_enemy.GetTitledFirstName]."
 agot_multi_duel.0030.desc.intro.p:0 "The battlefield fades away as I focus on [duelist_enemy.GetTitledFirstName], my opponent."
 agot_multi_duel.0030.desc.intro.q:0 "It is time to prove my worth. [duelist_enemy.GetTitledFirstName] and I are about to clash."
 agot_multi_duel.0030.desc.intro.r:0 "I have faced many challenges, but none quite like [duelist_enemy.GetTitledFirstName]."
 agot_multi_duel.0030.desc.intro.s:0 "As I face [duelist_enemy.GetTitledFirstName], I feel a surge of determination."
 agot_multi_duel.0030.desc.intro.t:0 "There is no escaping this. [duelist_enemy.GetTitledFirstName] and I are about to fight."

 #POV EVENT OUTRO Part1 TEXTS
 agot_multi_duel.0030.desc.outro.a:0 "As we stand on the brink of battle, I feel the gravity of what is about to happen."
 agot_multi_duel.0030.desc.outro.b:0 "The world seems to hold its breath as we prepare to clash. The tension is suffocating, yet exhilarating. I know that the next moments will define everything."
 agot_multi_duel.0030.desc.outro.c:0 "A cold wind blows, carrying with it the weight of countless battles fought and won. This is no different, yet it feels like everything hangs in the balance."
 agot_multi_duel.0030.desc.outro.d:0 "With every heartbeat, the moment of truth draws nearer. I can feel the power in my hands, the strength of my will."
 agot_multi_duel.0030.desc.outro.e:0 "The battlefield around us fades into insignificance. It is just me and [duelist_enemy.GetTitledFirstNameNoTooltip], each of us driven by forces that have led to this point."
 agot_multi_duel.0030.desc.outro.f:0 "The air is charged with the promise of violence. All that we have done, all that we have become, leads to this moment. I can feel the tension in my muscles, the readiness in my stance."
 agot_multi_duel.0030.desc.outro.g:0 "Every breath, every second, brings us closer to the inevitable clash. There is no more time to hesitate."
 agot_multi_duel.0030.desc.outro.h:0 "The weight of my [player_duelist.Custom('signature_weapon')] feels heavier than ever — not from its physical mass, but from the burden of what is about to unfold."
 agot_multi_duel.0030.desc.outro.i:0 "This is the culmination of everything that has brought us to this point. The battle ahead is not just about survival; it is about destiny, about who we are and what we stand for."
 agot_multi_duel.0030.desc.outro.j:0 "In the silence before the storm, I gather my thoughts and my courage. There is no escaping the reality of what is about to happen."
 agot_multi_duel.0030.desc.outro.k:0 "The world narrows down to this single, terrifying moment. All the noise, all the chaos of battle, recedes into the background."
 agot_multi_duel.0030.desc.outro.l:0 "As we prepare to strike, the enormity of what is about to happen bears down on me. This is not just a battle; it is the end of a journey, a final test of strength and will."
 agot_multi_duel.0030.desc.outro.m:0 "The tension is unbearable, yet I force myself to remain calm. I have faced challenges before, but nothing like this."
 agot_multi_duel.0030.desc.outro.n:0 "Time seems to slow as the duel approaches. Every detail sharpens in my mind — the weight of my [player_duelist.Custom('signature_weapon')], the ground beneath my feet, the resolve in [duelist_enemy.GetTitledFirstNamePossessiveNoTooltip] eyes."
 agot_multi_duel.0030.desc.outro.o:0 "The anticipation is like a living thing, coiled and ready to strike. I can feel it in every fiber of my being, the certainty that this duel will be unlike any other."
 agot_multi_duel.0030.desc.outro.p:0 "As we face each other, the weight of destiny presses down. This is not just a duel; it is a crossroads, a moment that will determine the course of our lives."
 agot_multi_duel.0030.desc.outro.q:0 "The silence before the storm is deafening, a calm that belies the violence to come. In this moment, it is clear that nothing else matters but the duel."
 agot_multi_duel.0030.desc.outro.r:0 "With every second that passes, the inevitable draws nearer. The duel is more than a fight; it is a test of everything I have learned, everything I am."
 agot_multi_duel.0030.desc.outro.s:0 "There is a finality to this moment, a sense that everything has led to this point."
 agot_multi_duel.0030.desc.outro.t:0 "As I prepare to face [duelist_enemy.GetTitledFirstNameNoTooltip], I can feel the weight of every choice I have made."

 #POV EVENT OUTRO Part2 TEXTS
 agot_multi_duel.0030.desc.outro2.a:0 "\n\nEvery decision, every move, will determine not just the outcome of this duel, but the path that lies ahead. There is no room for error."
 agot_multi_duel.0030.desc.outro2.b:0 "\n\nVictory will come only to the one who can seize it."
 agot_multi_duel.0030.desc.outro2.c:0 "\n\nMy resolve hardens. I must be the one to walk away from this."
 agot_multi_duel.0030.desc.outro2.d:0 "\n\nBut will it be enough? Soon, there will be no more questions, only the cold reality of the duel."
 agot_multi_duel.0030.desc.outro2.e:0 "\n\nOnly one will emerge victorious, and the stakes could not be higher."
 agot_multi_duel.0030.desc.outro2.f:0 "\n\nIt is time to prove who is stronger."
 agot_multi_duel.0030.desc.outro2.g:0 "\n\nThe duel will commence, and only one of us will see the end of it. I am determined that it will be me."
 agot_multi_duel.0030.desc.outro2.h:0 "\n\nThe duel is more than just a fight; it is a reckoning, a judgment passed by steel and skill."
 agot_multi_duel.0030.desc.outro2.i:0 "\n\nThe time for action has arrived."
 agot_multi_duel.0030.desc.outro2.j:0 "\n\nWe are two forces colliding, and only one will be left standing when the dust settles."
 agot_multi_duel.0030.desc.outro2.k:0 "\n\nWhat matters now is the duel ahead, the proving ground where one of us will fall."
 agot_multi_duel.0030.desc.outro2.l:0 "\n\nI can only hope I am ready."
 agot_multi_duel.0030.desc.outro2.m:0 "\n\nThis duel will be the defining moment, the battle that will either break me or see me victorious."
 agot_multi_duel.0030.desc.outro2.n:0 "\n\nThere is no avoiding what comes next."
 agot_multi_duel.0030.desc.outro2.o:0 "\n\nIt is a moment that will change everything."
 agot_multi_duel.0030.desc.outro2.p:0 "\n\nI steady my breathing, knowing that what happens next will define me."
 agot_multi_duel.0030.desc.outro2.q:0 "\n\nThe outcome will shape the future in ways neither of us can predict."
 agot_multi_duel.0030.desc.outro2.r:0 "\n\nI can only hope that I am strong enough to see it through."
 agot_multi_duel.0030.desc.outro2.s:0 "\n\nThe duel is not just about victory or defeat; it is about proving something fundamental — to myself and to [duelist_enemy.GetTitledFirstNameNoTooltip]."
 agot_multi_duel.0030.desc.outro2.t:0 "\n\nThis duel will be the ultimate test, the moment that will either make me or break me."

 agot_multi_duel.1000.b:0 "Perhaps it is wiser to yield now."

 #POV EVENT OPTION TEXTS
 agot_multi_duel.0030.a.a:0 "And now it begins."
 agot_multi_duel.0030.a.b:0 "Come at me!"
 agot_multi_duel.0030.a.c:0 "Time to fight."
 agot_multi_duel.0030.a.d:0 "No more games."
 agot_multi_duel.0030.a.e:0 "This ends here."
 agot_multi_duel.0030.a.f:0 "Now it ends."
 agot_multi_duel.0030.a.g:0 "For honor!"
 agot_multi_duel.0030.a.h:0 "Face me!"
 agot_multi_duel.0030.a.i:0 "I am ready."
 agot_multi_duel.0030.a.j:0 "To the death!"
 agot_multi_duel.0030.a.k:0 "This ends now."


 ######################
 ### TRIAL OF SEVEN ###
 ######################
 agot_multi_duel.0100.t.tos.accuser_yielded:0 "$agot_multi_duel.tos_header$: The Yield of the Accuser"
 agot_multi_duel.0100.t.tos.accuser_downed:0 "$agot_multi_duel.tos_header$: A Broken Accuser"
 agot_multi_duel.0100.t.tos.accuser_dead:0 "$agot_multi_duel.tos_header$: The Fall of the Accuser"
 agot_multi_duel.0100.t.tos.accused_downed:0 "$agot_multi_duel.tos_header$: Judgment Rendered"
 agot_multi_duel.0100.t.tos.accused_dead:0 "$agot_multi_duel.tos_header$: Guilt Proven in Blood"

 #Winner Pov
 agot_multi_duel.0100.desc.accuser_yielded:0 "The clash ends without another blow. [main_loser_leader.GetTitledFirstName] yields before the realm, lowering [main_loser_leader.GetHerHis] [main_loser_leader.Custom('signature_weapon')] and stepping back from the charge that brought steel to the field.\n\nThe words that follow matter more than any strike. The accusation is withdrawn in full view of gods and men, and the Trial of Seven is undone by surrender rather than blood. I stand vindicated, my name cleared not by decree, but by the accuser's own retreat. The realm bears witness as the charge against me is laid to rest by [main_loser_leader.GetTitledFirstNamePossessiveNoTooltip] own words."
 agot_multi_duel.0100.desc.accuser_downed:0 "The fight leaves [main_loser_leader.GetTitledFirstName] broken upon the field, strength spent and unable to rise again. Whatever resolve carried [main_loser_leader.GetHerHim] into this trial has finally failed.\n\nWith the accuser unable to continue, the Trial of Seven reaches its end. By law and custom, the charge falls with [main_loser_leader.GetTitledFirstNamePossessiveNoTooltip] defeat. I stand proven before all who watched this judgment in steel, my cause upheld not by words, but by endurance when it mattered most."
 agot_multi_duel.0100.desc.accuser_dead:0 "The final clash leaves [main_loser_leader.GetTitledFirstName] fallen upon the field, the voice that called this trial silenced at last.\n\nWith the accuser gone, the Trial of Seven ends in blood and finality. No challenge remains to be answered, no charge left to contest. I stand vindicated by survival alone, my cause proven where oaths and accusations once failed, and the realm is left with no doubt as to where judgment has fallen."
 agot_multi_duel.0100.desc.accused_downed:0 "[main_loser_leader.GetTitledFirstName] is brought low upon the field, strength failing as the fight finally leaves [main_loser_leader.GetHerHim]. The struggle ends with [main_loser_leader.GetHerHim] unable to keep [main_loser_leader.GetHerHis] feet.\n\nThe Trial of Seven delivers its judgment at last. I remain standing where the accused does not, and by steel and custom alike, guilt is laid upon [main_loser_leader.GetTitledFirstNamePossessiveNoTooltip] name. Before the realm, the charge I raised is proven, and the judgment I demanded is given."
 agot_multi_duel.0100.desc.accused_dead:0 "The duel ends in blood as [main_loser_leader.GetTitledFirstName] falls beneath the judgment called against [main_loser_leader.GetHerHim]. The field stills as the meaning of the moment settles in.\n\nThe Trial of Seven is decided at last. I stand victorious where the accused does not, and the charge is proven upon the field for all to see. No further words are needed, no doubt remains. The realm has its answer, written plainly in steel."

 #Observer Pov
 agot_multi_duel.0100.desc.accuser_yielded.observer:0 "The clash stills as [main_loser_leader.GetTitledFirstName] yields, lowering [main_loser_leader.GetHerHis] [main_loser_leader.Custom('signature_weapon')] before all who watch. The sound of steel fades, replaced by a charged silence as the meaning of the moment settles over the field.\n\nWith the accusation withdrawn, the Trial of Seven collapses in on itself. The charge against [main_winner_leader.GetTitledFirstName] is undone not by blood, but by the accuser's surrender. Before gods and men alike, the matter is settled without another blow, and the realm is left to reckon with a judgment spoken in words rather than steel."
 agot_multi_duel.0100.desc.accuser_downed.observer:0 "[main_loser_leader.GetTitledFirstName] is driven to the ground and cannot rise again. The field waits in tense stillness, watching for movement that does not come.\n\nThe Trial of Seven ends with the accuser defeated upon the field. By custom and law, the charge fails where its champion could not endure. [main_winner_leader.GetTitledFirstName] stands vindicated before the realm, the accusation answered by strength that remained when the other faltered."
 agot_multi_duel.0100.desc.accuser_dead.observer:0 "The last exchange leaves [main_loser_leader.GetTitledFirstName] fallen upon the field, and with [main_loser_leader.GetHerHim] falls the voice that called this trial into being. The clash ends as the field absorbs the finality of the moment.\n\nThe Trial of Seven is decided in blood. [main_winner_leader.GetTitledFirstName] remains standing where the accuser does not, the charge answered by survival alone. No further judgment is needed, and the realm bears witness to a verdict written plainly in steel."
 agot_multi_duel.0100.desc.accused_downed.observer:0 "[main_loser_leader.GetTitledFirstName] is brought low and can no longer continue the fight. The struggle drains away until it is clear the accused cannot rise to answer the charge.\n\nThe Trial of Seven delivers its judgment at last. [main_winner_leader.GetTitledFirstName] stands victorious before all who bear witness, and guilt is laid upon the accused in full view of the realm. What was called into question is now answered without ambiguity."
 agot_multi_duel.0100.desc.accused_dead.observer:0 "The duel ends with [main_loser_leader.GetTitledFirstName] struck down upon the field, the final blow silencing any further denial of the charge.\n\nThe Trial of Seven concludes in blood and certainty. The accusation is proven by steel, and [main_winner_leader.GetTitledFirstName] emerges victorious as the realm looks on. No doubt remains as to where judgment has fallen, and the matter is settled for all time."

 #Loser Pov
 agot_multi_duel.0100.desc.accuser_yielded.loser:0 "The strength leaves me, and with it the certainty that carried me this far. My arm trembles as I lower my [main_loser_leader.Custom('signature_weapon')], the weight of the moment heavier than any wound.\n\nBefore all who watch, I yield. I withdraw the charge I raised and abandon the challenge that brought steel to the field. The Trial of Seven ends by my own surrender, and the accusation I spoke so boldly dies with my words, leaving the realm to remember that I stepped back when I could go no further."
 agot_multi_duel.0100.desc.accuser_downed.loser:0 "I try to rise, but my body refuses me. The ground feels distant and unsteady, and the noise of battle blurs as pain drowns out all else.\n\nThe truth becomes unavoidable. I can no longer stand to press the charge I brought before the realm. The Trial of Seven ends with my defeat, and my accusation fails where my strength did. Before all who watch, my challenge falls apart upon the field."
 agot_multi_duel.0100.desc.accused_downed.loser:0 "The fight drains away my strength until my legs give beneath me and I can no longer stand. Each breath burns, and the field tilts as I struggle to remain conscious of what has been decided.\n\nThe Trial of Seven answers the charge against me in steel. I am left broken upon the ground as judgment is passed before all who watch, my fate sealed not by words or oaths, but by my failure to endure when the moment demanded it."

 agot_multi_duel.0100.a:0 "It is done."

