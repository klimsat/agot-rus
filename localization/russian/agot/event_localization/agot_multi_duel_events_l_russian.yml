 #DUEL INTRO TEXTS
 agot_multi_duel.0020.desc.intro1:0 "Схватка между [winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] вспыхивает подобно буре среди хаоса битвы, приковывая мой взгляд, когда их оружие пляшет в тусклом свете."
 agot_multi_duel.0020.desc.intro2:0 "Я замечаю, как [winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] кружат друг вокруг друга со смертоносным намерением, шум битвы затихает, когда их поединок выходит на первый план."
 agot_multi_duel.0020.desc.intro3:0 "Среди кружащейся сечи мое внимание привлекают [winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName], когда они бросаются друг на друга, их клинки сверкают с летальной целью."
 agot_multi_duel.0020.desc.intro4:0 "[winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] встречаются с яростью, что разносится эхом по полю битвы, их поединок — смертельная пляска, завладевшая моим вниманием."
 agot_multi_duel.0020.desc.intro5:0 "Сквозь хаос я замечаю, как [winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] встречаются взглядами, оба полны решимости доказать свою доблесть в поединке, который может переломить ход битвы."
 agot_multi_duel.0020.desc.intro6:0 "Пока битва бушует, я вижу, как [winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] сближаются, каждое их движение рассчитано и смертоносно."
 agot_multi_duel.0020.desc.intro7:0 "[winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] вступают в жестокую схватку, их оружие сталкивается со звуком, пробивающим шум войны."
 agot_multi_duel.0020.desc.intro8:0 "Мой взгляд прикован к [winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName], когда они пробиваются через поле битвы, их оружие занесено для удара в поединке, который может окончиться кровопролитием."
 agot_multi_duel.0020.desc.intro9:0 "В гуще сражения поединок между [winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] выделяется подобно маяку, их мастерство выставлено напоказ, когда они сражаются за жизнь."
 agot_multi_duel.0020.desc.intro10:0 "[winner_duelist.GetTitledFirstName] и [loser_duelist.GetTitledFirstName] сходятся в жестоком столкновении, искры от их клинков озаряют поле битвы, когда их поединок разворачивается."

 #DUEL MIDDLE TEXTS
 agot_multi_duel.0020.desc.middle1:0 "[winner_duelist.GetTitledFirstNameNoTooltip] бросается вперед с быстрым выпадом, но [loser_duelist.GetTitledFirstNameNoTooltip] уклоняется и отвечает жестоким [loser_duelist.Custom('AGOT_SignatureWeaponCritical')], едва не достигшим цели."
 agot_multi_duel.0020.desc.middle2:0 "[loser_duelist.GetTitledFirstNamePossessiveNoTooltip] [loser_duelist.Custom('signature_weapon')] свистит в воздухе, когда [winner_duelist.GetTitledFirstNameNoTooltip] пригибается под ним, отвечая быстрым [winner_duelist.Custom('AGOT_SignatureVerb')] в бок [loser_duelist.GetTitledFirstNamePossessiveNoTooltip], проливая кровь."
 agot_multi_duel.0020.desc.middle3:0 "Поединок накаляется, когда [winner_duelist.GetTitledFirstNameNoTooltip] блокирует мощный удар [loser_duelist.GetTitledFirstNameNoTooltip], оттесняя [loser_duelist.GetHerHim] назад, а затем обрушивает град ударов."
 agot_multi_duel.0020.desc.middle4:0 "[loser_duelist.GetTitledFirstNameNoTooltip] финтит влево, отвлекая защиту [winner_duelist.GetTitledFirstNamePossessiveNoTooltip], прежде чем нанести удар [winner_duelist.Custom('AGOT_SignatureWeaponHeavy')], который едва не сбивает [winner_duelist.GetTitledFirstNameNoTooltip] с ног."
 agot_multi_duel.0020.desc.middle5:0 "[winner_duelist.GetTitledFirstNameNoTooltip] парирует замах [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] сверху и подходит вплотную, вонзая колено в живот [loser_duelist.GetTitledFirstNamePossessiveNoTooltip], прежде чем оттолкнуть [loser_duelist.GetHerHim] назад."
 agot_multi_duel.0020.desc.middle6:0 "[loser_duelist.GetTitledFirstNameNoTooltip] бьет снизу своим [loser_duelist.Custom('signature_weapon')], целясь в ноги [winner_duelist.GetTitledFirstNamePossessiveNoTooltip], но [winner_duelist.GetTitledFirstNameNoTooltip] перепрыгивает атаку и отвечает яростным [winner_duelist.Custom('AGOT_SignatureWeaponCritical')] в плечо [loser_duelist.GetTitledFirstNamePossessiveNoTooltip]."
 agot_multi_duel.0020.desc.middle7:0 "[winner_duelist.GetTitledFirstNameNoTooltip] и [loser_duelist.GetTitledFirstNameNoTooltip] обмениваются ударами в яростной перепалке, каждый едва избегает смерти, продолжая наступление."
 agot_multi_duel.0020.desc.middle8:0 "[loser_duelist.GetTitledFirstNameNoTooltip] уворачивается от тяжелого удара, используя инерцию, чтобы нанести скользящий удар по руке [winner_duelist.GetTitledFirstNamePossessiveNoTooltip], оставляя кровавую полосу."
 agot_multi_duel.0020.desc.middle9:0 "[winner_duelist.GetTitledFirstNameNoTooltip] выманивает [loser_duelist.GetTitledFirstNameNoTooltip] на переразгибание ложным отступлением, затем подходит и наносит сокрушительный удар в грудь [loser_duelist.GetTitledFirstNamePossessiveNoTooltip]."
 agot_multi_duel.0020.desc.middle10:0 "[loser_duelist.GetTitledFirstNamePossessiveNoTooltip] [loser_duelist.Custom('signature_weapon')] сталкивается с [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] [winner_duelist.Custom('signature_weapon')] с оглушительным грохотом, но [winner_duelist.GetTitledFirstNameNoTooltip] быстро отвечает, направляя свой [winner_duelist.Custom('signature_weapon')] к шее [loser_duelist.GetTitledFirstNamePossessiveNoTooltip]."

 #DUEL OUTRO TEXTS - Fatal
 agot_multi_duel.0020.desc.outro1:0 "\n\nПоследним отчаянным выпадом [winner_duelist.GetTitledFirstNameNoTooltip] вонзает свой [winner_duelist.Custom('signature_weapon')] в грудь [loser_duelist.GetTitledFirstNamePossessiveNoTooltip], заканчивая поединок кровавым всплеском. [loser_duelist.GetTitledFirstNameNoTooltip] падает на землю, чтобы больше не подняться."
 agot_multi_duel.0020.desc.outro2:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] удается обезоружить [winner_duelist.GetTitledFirstNameNoTooltip], но прежде чем [loser_duelist.GetSheHe] может прикончить [winner_duelist.GetHerHim], [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] [winner_duelist.Custom('signature_weapon')] находит путь к сердцу [loser_duelist.GetTitledFirstNamePossessiveNoTooltip]. [loser_duelist.GetTitledFirstNameNoTooltip] падает на землю, мертвый еще до того, как [loser_duelist.GetSheHe] касается ее."
 agot_multi_duel.0020.desc.outro3:0 "\n\n[winner_duelist.GetTitledFirstNamePossessiveNoTooltip] [winner_duelist.Custom('signature_weapon')] попадает [loser_duelist.GetTitledFirstNameNoTooltip] в горло, кровавый всплеск отмечает конец поединка, когда [loser_duelist.GetTitledFirstNameNoTooltip] падает бездыханным."
 agot_multi_duel.0020.desc.outro4:0 "\n\nПоследний отчаянный взмах [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] проходит мимо, оставляя [loser_duelist.GetHerHim] открытым для смертельного удара [winner_duelist.GetTitledFirstNamePossessiveNoTooltip]. [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] [winner_duelist.Custom('signature_weapon')] [winner_duelist.Custom('AGOT_SignatureWeaponCriticalPresent')] сердце [loser_duelist.GetHerHis], и [loser_duelist.GetTitledFirstNameNoTooltip] падает с последним вздохом."
 agot_multi_duel.0020.desc.outro5:0 "\n\nЯростным взмахом [winner_duelist.GetTitledFirstNameNoTooltip] обезглавливает [loser_duelist.GetTitledFirstNameNoTooltip], заканчивая поединок одним решающим ударом. Тело [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] падает на землю."
 agot_multi_duel.0020.desc.outro6:0 "\n\nПоследний удар [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] [winner_duelist.Custom('AGOT_SignatureWeaponCriticalPresent')] в бок [loser_duelist.GetTitledFirstNamePossessiveNoTooltip], смертельная рана валит [loser_duelist.GetTitledFirstNameNoTooltip] на колени, прежде чем [loser_duelist.GetSheHe] падает замертво."
 agot_multi_duel.0020.desc.outro7:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] наносит смертельный удар [loser_duelist.GetTitledFirstNameNoTooltip], [winner_duelist.GetHerHis] [winner_duelist.Custom('signature_weapon')] глубоко вонзается в грудь [winner_duelist.GetHerHis] противника. Бездыханное тело [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] падает на землю."
 agot_multi_duel.0020.desc.outro8:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] переразгибается, и [winner_duelist.GetTitledFirstNameNoTooltip] пользуется этим, пронзая [loser_duelist.GetHerHim] насквозь одним точным выпадом своего [winner_duelist.Custom('signature_weapon')]. [loser_duelist.GetTitledFirstNameNoTooltip] падает, мертвый еще до того, как [loser_duelist.GetSheHe] касается земли."
 agot_multi_duel.0020.desc.outro9:0 "\n\nБыстрым, жестоким ударом [winner_duelist.GetTitledFirstNameNoTooltip] перерезает горло [loser_duelist.GetTitledFirstNamePossessiveNoTooltip]. Глаза [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] расширяются от шока, когда [loser_duelist.GetSheHe] падает, кровь хлещет из раны."
 agot_multi_duel.0020.desc.outro10:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] проскальзывает мимо защиты [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] и глубоко вонзает свой [winner_duelist.Custom('signature_weapon')] в живот [loser_duelist.GetHerHis]. [loser_duelist.GetTitledFirstNameNoTooltip] шатается мгновение, прежде чем падает бездыханным на залитую кровью землю."

 #DUEL OUTRO TEXTS - Non-Fatal
 agot_multi_duel.0020.desc.outro_survived1:0 "\n\nОба дуэлянта остаются окровавленными и избитыми, но живыми, когда они расходятся и отступают, чтобы перевязать раны."
 agot_multi_duel.0020.desc.outro_survived2:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] удается обезоружить [loser_duelist.GetTitledFirstNameNoTooltip], но вместо смертельного удара [winner_duelist.GetSheHe] щадит [loser_duelist.GetHerHim], позволяя [loser_duelist.GetHerHim] уползти прочь."
 agot_multi_duel.0020.desc.outro_survived3:0 "\n\nПоединок заканчивается вничью, оба слишком измотаны, чтобы продолжать. Они настороженно смотрят друг на друга, прежде чем отступить, сохранив честь."
 agot_multi_duel.0020.desc.outro_survived4:0 "\n\nВнезапное отвлечение на поле боя заставляет и [winner_duelist.GetTitledFirstNameNoTooltip], и [loser_duelist.GetTitledFirstNameNoTooltip] прервать поединок, никто не желает рисковать ударом в такой неопределенности."
 agot_multi_duel.0020.desc.outro_survived5:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] и [loser_duelist.GetTitledFirstNameNoTooltip] настороженно кружат друг вокруг друга, но ни один не может найти возможность для смертельного удара. В конце концов они расходятся, оба помяты, но живы."
 agot_multi_duel.0020.desc.outro_survived6:0 "\n\nБой прерывается натиском вражеских солдат, заставляя [winner_duelist.GetTitledFirstNameNoTooltip] и [loser_duelist.GetTitledFirstNameNoTooltip] прекратить поединок и вернуться к большой битве."
 agot_multi_duel.0020.desc.outro_survived7:0 "\n\nОба на грани изнеможения, но никто не сдается. В конце концов они соглашаются прекратить бой, каждый уважая мастерство другого."
 agot_multi_duel.0020.desc.outro_survived8:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] ранит [loser_duelist.GetTitledFirstNameNoTooltip], но прежде чем [winner_duelist.GetSheHe] может добить его, между ними врываются другие бойцы, прерывая момент и заканчивая поединок."
 agot_multi_duel.0020.desc.outro_survived9:0 "\n\nПо мере того как оба устают, их удары теряют силу, и наконец они отступают, признавая ничью кивком, прежде чем снова влиться в схватку."
 agot_multi_duel.0020.desc.outro_survived10:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] наносит удар, который должен был быть смертельным, но доспехи [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] спасают его. Понимая, что бой может продолжаться бесконечно, они расходятся, оба тяжело дыша."

 #EXTRA DUEL OUTRO - Rises again
 agot_multi_duel.0020.desc.outro_survived1.stands_up:0 "\n\nТяжелый удар отправляет [loser_duelist.GetTitledFirstNameNoTooltip] на землю, на миг потерянного в круговерти битвы. Когда кажется, что поединок уже решен, [loser_duelist.GetSheHe] поднимается на ноги и продолжает бой."
 agot_multi_duel.0020.desc.outro_survived2.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] спотыкается и тяжело падает, удар вырывает резкий вздох у наблюдающих. Но мгновение спустя [loser_duelist.GetSheHe] снова поднимается, стряхивая удар и заставляя себя вернуться в бой."
 agot_multi_duel.0020.desc.outro_survived3.stands_up:0 "\n\nСхватка заканчивается тем, что [loser_duelist.GetTitledFirstNameNoTooltip] прижат к земле, [loser_duelist.Custom('signature_weapon')] выскальзывает из рук. С усилием и решимостью [loser_duelist.GetSheHe] подбирает оружие и поднимается, чтобы снова встретить бой."
 agot_multi_duel.0020.desc.outro_survived4.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] сбит с ног и растянулся среди тел. На миг поединок замирает, прежде чем [loser_duelist.GetSheHe] снова поднимается, раненый, но не желающий сдаваться."
 agot_multi_duel.0020.desc.outro_survived5.stands_up:0 "\n\nСталь и сила бросают [loser_duelist.GetTitledFirstNameNoTooltip] на землю, пыль и кровь смешиваются под ним. Но он не остается там, с трудом поднимаясь на ноги, пока бушует битва."
 agot_multi_duel.0020.desc.outro_survived6.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] падает под натиском, дыхание перехватывает, когда земля устремляется навстречу. Мгновение спустя [loser_duelist.GetSheHe] заставляет себя подняться, отказываясь позволить поединку закончиться так легко."
 agot_multi_duel.0020.desc.outro_survived7.stands_up:0 "\n\nСокрушительный обмен ударами отправляет [loser_duelist.GetTitledFirstNameNoTooltip] в грязь, неподвижного и оглушенного. Пауза длится недолго, и вскоре [loser_duelist.GetSheHe] снова поднимается, упорство и решимость возвращают [loser_duelist.GetHerselfHimself] в бой."
 agot_multi_duel.0020.desc.outro_survived8.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] отброшен назад и вниз, поединок на миг прерван падением. С резким вдохом и сжатой решимостью [loser_duelist.GetSheHe] обретает равновесие и снова делает шаг вперед."
 agot_multi_duel.0020.desc.outro_survived9.stands_up:0 "\n\nСила схватки наконец отправляет [loser_duelist.GetTitledFirstNameNoTooltip] на землю, оружие скрежещет по земле. Тем не менее [loser_duelist.GetSheHe] не сдается, поднимается на ноги и снова вступает в бой."
 agot_multi_duel.0020.desc.outro_survived10.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] сражен и на мгновение поглощен хаосом вокруг. Затем [loser_duelist.GetSheHe] снова появляется, избитый, но стоящий, и поединок продолжается."

 #EXTRA DUEL OUTRO - Rises again (Get up, Ser!)
 agot_multi_duel.0020.desc.outro_survived1.stands_up.friend:0 "\n\nТяжелый удар бросает [loser_duelist.GetTitledFirstNameNoTooltip] на землю, дыхание выбито. Когда поединок грозит закончиться, сквозь шум прорывается голос, [loser_duelist_friend.GetTitledFirstName] кричит из толпы.\n\n#EMP «Вставай, [loser_duelist.GetTitledFirstNameNoTooltip]! На ноги, бой не окончен!»#! \n\nВзбодренный криком, [loser_duelist.GetSheHe] заставляет себя подняться."
 agot_multi_duel.0020.desc.outro_survived2.stands_up.friend:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] падает тяжело, пыль вздымается там, где [loser_duelist.GetSheHe] ударяется о землю. На миг схватка замирает, пока голос [loser_duelist_friend.GetTitledFirstNamePossessive] не прорывает грохот.\n\n#EMP «Стой, [loser_duelist.GetFirstNameNoTooltip]! Стой и встреть их!»#! \n\nС резким вдохом [loser_duelist.GetSheHe] поднимается на ноги."
 agot_multi_duel.0020.desc.outro_survived3.stands_up.friend:0 "\n\nСталь отбрасывает [loser_duelist.GetTitledFirstNameNoTooltip] назад и вниз, [loser_duelist.Custom('signature_weapon')] выскальзывает из рук. Прежде чем момент уходит, из толпы раздается крик, [loser_duelist_friend.GetTitledFirstName] подбадривает [loser_duelist.GetHerHim].\n\n#EMP «Вставай! Ты еще не побежден, поднимайся!»#! \n\nСтиснув зубы, [loser_duelist.GetSheHe] с трудом поднимается на ноги."
 agot_multi_duel.0020.desc.outro_survived4.stands_up.friend:0 "\n\nСила обмена ударами отправляет [loser_duelist.GetTitledFirstNameNoTooltip] на истоптанную землю. Среди зрителей пробегает шепот, пока один голос не возвышается над остальными, [loser_duelist_friend.GetTitledFirstName], яростный и несгибаемый.\n\n#EMP «На ноги, [loser_duelist.GetFirstNameNoTooltip], покажи им свою силу!»#! \n\nОтвечая на призыв, [loser_duelist.GetSheHe] снова поднимается, нетвердый, но несломленный."
 agot_multi_duel.0020.desc.outro_survived5.stands_up.friend:0 "\n\nСбитый с ног натиском, [loser_duelist.GetTitledFirstNameNoTooltip] падает среди пыли и стали. Поединок кажется почти решенным, когда ясный крик разносится за пределами бойцов, [loser_duelist_friend.GetTitledFirstName] выкрикивает.\n\n#EMP «Вставай! Семеро видят тебя, не падай!»#! \n\nКогда слова разносятся по полю, [loser_duelist.GetSheHe] поднимается на ноги."

 #EXTRA DUEL OUTRO - Downed
 agot_multi_duel.0020.desc.outro_survived1.downed:0 "\n\nЖестокий обмен ударами отправляет [loser_duelist.GetTitledFirstNameNoTooltip] на землю, и на этот раз быстрого восстановления не последует. [loser_duelist.GetSheHe] пытается подняться, но силы иссякли, и поединок заканчивается там, где [loser_duelist.GetSheHe] упал."
 agot_multi_duel.0020.desc.outro_survived2.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] с силой брошен на землю, удар выбивает из него боевой дух. Хотя [loser_duelist.GetSheHe] шевелится, [loser_duelist.GetSheHe] не может встать на ноги."
 agot_multi_duel.0020.desc.outro_survived3.downed:0 "\n\nСталь и сила швыряют [loser_duelist.GetTitledFirstNameNoTooltip] на землю. [loser_duelist.GetSheHe] тянется за равновесием, которое не возвращается, и поединок решен в этот миг."
 agot_multi_duel.0020.desc.outro_survived4.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] падает под натиском и остается там, дыхание прерывисто, конечности не слушаются. Попытка подняться терпит неудачу, и бой окончен."
 agot_multi_duel.0020.desc.outro_survived5.downed:0 "\n\nФинальный удар отправляет [loser_duelist.GetTitledFirstNameNoTooltip] на землю, пыль и кровь отмечают место падения. [loser_duelist.GetSheHe] не поднимается, и поединок подходит к концу."
 agot_multi_duel.0020.desc.outro_survived6.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] рушится под тяжестью боя, попытка встать оканчивается неудачей. Толпа ясно видит: [loser_duelist.GetSheHe] не может продолжать."
 agot_multi_duel.0020.desc.outro_survived7.downed:0 "\n\nСхватка заканчивается тем, что [loser_duelist.GetTitledFirstNameNoTooltip] прижат к земле, силы иссякли, решимость исчерпана. Хотя [loser_duelist.GetSheHe] двигается, [loser_duelist.GetSheHe] не может подняться, чтобы продолжить бой."
 agot_multi_duel.0020.desc.outro_survived8.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] сбит с ног и остается там, где упал. Поединок замирает, затем заканчивается, когда становится ясно, что [loser_duelist.GetSheHe] больше не может стоять."
 agot_multi_duel.0020.desc.outro_survived9.downed:0 "\n\nСила схватки наконец одолевает [loser_duelist.GetTitledFirstNameNoTooltip], бросая [loser_duelist.GetHerHim] на землю. Попытка подняться не удается, и исход более не вызывает сомнений."
 agot_multi_duel.0020.desc.outro_survived10.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] сражен и остается лежать, воля к бою уничтожена усталостью и болью. Поединок заканчивается не новым ударом, а неспособностью [loser_duelist.GetHerHis] подняться."

 #EXTRA DUEL OUTRO - Trial of Seven accuser yielded
 agot_multi_duel.0020.desc.outro_survived1.yielded:0 "\n\nСхватка замедляется, когда [loser_duelist.GetTitledFirstNameNoTooltip] опускает свой [loser_duelist.Custom('signature_weapon')] и сдается на глазах у всех. Тишина следует за ним, когда смысл жеста укореняется.\n\nС этой сдачей Суд Семерых теряет свою цель. [loser_duelist.GetSheHe|U] снимает обвинение против [tos_accused.GetTitledFirstName], и обвинение, призвавшее сталь на поле, уничтожено [loser_duelist.GetHerHis] собственными словами."

 agot_multi_duel.0020.desc.outro_survived2.yielded:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] отступает от боя, [loser_duelist.Custom('signature_weapon')] опущен, воля исчерпана, сдается на виду у всего королевства. Поединок заканчивается не последним ударом, а сдачей.\n\nСуд Семерых распадается в этот миг. [loser_duelist.GetSheHe|U] отзывает свое обвинение против [tos_accused.GetTitledFirstName], и вызов, потрясший королевство, предан забвению."

 agot_multi_duel.0020.desc.outro_survived3.yielded:0 "\n\nТишина распространяется по полю, когда [loser_duelist.GetTitledFirstNameNoTooltip] сдается, опуская свой [loser_duelist.Custom('signature_weapon')] перед богами и людьми. Смысл ясен всем свидетелям.\n\nСдаваясь, [loser_duelist.GetSheHe] снимает обвинение против [tos_accused.GetTitledFirstName], лишая Суд Семерых его основания. То, что было принесено на суд, уничтожено не кровью, а сдачей."

 agot_multi_duel.0020.desc.outro_survived4.yielded:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] дрогнул, затем сдается, опуская свой [loser_duelist.Custom('signature_weapon')], когда схватка наконец стихает. Поле ждет, слушая.\n\nСо сдачей обвинителя Суд Семерых рушится. [loser_duelist.GetSheHe|U] отзывает обвинение против [tos_accused.GetTitledFirstName], и обвинение, требовавшее суда сталью, публично снято."

 agot_multi_duel.0020.desc.outro_survived5.yielded:0 "\n\nМомент прерывается, когда [loser_duelist.GetTitledFirstNameNoTooltip] сдается, силы и уверенность исчерпаны. Сталь замолкает, и поединок заканчивается без нового удара.\n\nСуд Семерых не может продолжаться. [loser_duelist.GetSheHe|U] отзывает свое требование против [tos_accused.GetTitledFirstName], оставляя обвинение без голоса и чемпиона, чтобы нести его дальше."

 agot_multi_duel.0020.a.a:0 "Оставайся сосредоточен!"
 agot_multi_duel.0020.a.b:0 "Держи защиту!"
 agot_multi_duel.0020.a.c:0 "Покончи с ним быстро!"
 agot_multi_duel.0020.a.d:0 "Смотри за спиной!"
 agot_multi_duel.0020.a.e:0 "Не теряй фокус!"
 agot_multi_duel.0020.a.f:0 "Продолжай сражаться!"



