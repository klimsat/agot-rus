 #POV EVENT INTRO TEXTS
 agot_multi_duel.0030.desc.intro.a:0 "Я оказываюсь лицом к лицу с [duelist_enemy.GetTitledFirstName], тем, кто стоит между мной и победой."
 agot_multi_duel.0030.desc.intro.b:0 "Настало время встретиться с [duelist_enemy.GetTitledFirstName]. Пути назад нет."
 agot_multi_duel.0030.desc.intro.c:0 "Передо мной стоит [duelist_enemy.GetTitledFirstName], решительный противник, готовый к битве."
 agot_multi_duel.0030.desc.intro.d:0 "Напряжение ощутимо, когда я готовлюсь к поединку с [duelist_enemy.GetTitledFirstName]."
 agot_multi_duel.0030.desc.intro.e:0 "Вот оно. [duelist_enemy.GetTitledFirstName] и я вот-вот сойдемся в бою до конца."
 agot_multi_duel.0030.desc.intro.f:0 "В глазах [duelist_enemy.GetTitledFirstNamePossessive] холодная решимость, когда мы готовимся к битве."
 agot_multi_duel.0030.desc.intro.g:0 "Я стою наготове, facing [duelist_enemy.GetTitledFirstName], зная, что только один из нас уйдет."
 agot_multi_duel.0030.desc.intro.h:0 "Теперь только я и [duelist_enemy.GetTitledFirstName]. Исход этого поединка изменит всё."
 agot_multi_duel.0030.desc.intro.i:0 "Воздух наполнен ожиданием, когда я стою перед [duelist_enemy.GetTitledFirstName], моим соперником в этом смертельном состязании."
 agot_multi_duel.0030.desc.intro.j:0 "Я крепко сжимаю свой [player_duelist.Custom('signature_weapon')], зная, что [duelist_enemy.GetTitledFirstName] делает то же самое."
 agot_multi_duel.0030.desc.intro.k:0 "Я встречаюсь взглядом с [duelist_enemy.GetTitledFirstName], зная, что этот поединок может стать для меня последним."
 agot_multi_duel.0030.desc.intro.l:0 "Когда я стою перед [duelist_enemy.GetTitledFirstName], нет места страху, только сосредоточенность."
 agot_multi_duel.0030.desc.intro.m:0 "Я вижу решимость в стойке [duelist_enemy.GetTitledFirstNamePossessive], когда мы готовимся к бою."
 agot_multi_duel.0030.desc.intro.n:0 "С [duelist_enemy.GetTitledFirstName] передо мной, я знаю, что эту битву я должен выиграть."
 agot_multi_duel.0030.desc.intro.o:0 "Я делаю глубокий вдох, собираясь с мыслями, готовясь к поединку с [duelist_enemy.GetTitledFirstName]."
 agot_multi_duel.0030.desc.intro.p:0 "Поле битвы исчезает, когда я сосредотачиваюсь на [duelist_enemy.GetTitledFirstName], моем противнике."
 agot_multi_duel.0030.desc.intro.q:0 "Пришло время доказать свою доблесть. [duelist_enemy.GetTitledFirstName] и я вот-вот сойдемся."
 agot_multi_duel.0030.desc.intro.r:0 "Я сталкивался со многими вызовами, но ни с одним, подобным [duelist_enemy.GetTitledFirstName]."
 agot_multi_duel.0030.desc.intro.s:0 "Когда я стою перед [duelist_enemy.GetTitledFirstName], я чувствую прилив решимости."
 agot_multi_duel.0030.desc.intro.t:0 "От этого не уйти. [duelist_enemy.GetTitledFirstName] и я сейчас сразимся."

 #POV EVENT OUTRO Part1 TEXTS
 agot_multi_duel.0030.desc.outro.a:0 "Когда мы стоим на грани битвы, я ощущаю всю тяжесть того, что должно произойти."
 agot_multi_duel.0030.desc.outro.b:0 "Мир, кажется, затаил дыхание, когда мы готовимся к схватке. Напряжение душит, но и опьяняет. Я знаю, что следующие мгновения определят всё."
 agot_multi_duel.0030.desc.outro.c:0 "Холодный ветер несет с собой тяжесть бесчисленных битв, выигранных и проигранных. Это ничем не отличается, но кажется, что всё висит на волоске."
 agot_multi_duel.0030.desc.outro.d:0 "С каждым ударом сердца момент истины приближается. Я чувствую силу в своих руках, силу своей воли."
 agot_multi_duel.0030.desc.outro.e:0 "Поле битвы вокруг нас меркнет. Остаемся только я и [duelist_enemy.GetTitledFirstNameNoTooltip], каждый движим силами, приведшими нас к этому моменту."
 agot_multi_duel.0030.desc.outro.f:0 "Воздух заряжен обещанием насилия. Всё, что мы сделали, всё, кем мы стали, привело к этому мгновению. Я чувствую напряжение в мышцах, готовность в стойке."
 agot_multi_duel.0030.desc.outro.g:0 "Каждый вдох, каждая секунда приближает нас к неизбежной схватке. Больше нет времени на колебания."
 agot_multi_duel.0030.desc.outro.h:0 "Мой [player_duelist.Custom('signature_weapon')] кажется тяжелее обычного — не из-за физического веса, а из-за груза того, что вот-вот свершится."
 agot_multi_duel.0030.desc.outro.i:0 "Это кульминация всего, что привело нас к этой точке. Грядущая битва — не просто выживание; это судьба, то, кто мы есть и за что стоим."
 agot_multi_duel.0030.desc.outro.j:0 "В тишине перед бурей я собираю мысли и мужество. Нельзя избежать реальности того, что сейчас произойдет."
 agot_multi_duel.0030.desc.outro.k:0 "Мир сужается до одного этого пугающего момента. Весь шум, весь хаос битвы отступает на задний план."
 agot_multi_duel.0030.desc.outro.l:0 "Когда мы готовимся к удару, на меня обрушивается вся тяжесть того, что вот-вот случится. Это не просто битва; это конец пути, последнее испытание силы и воли."
 agot_multi_duel.0030.desc.outro.m:0 "Напряжение невыносимо, но я заставляю себя сохранять спокойствие. Я сталкивался с вызовами раньше, но ни с чем подобным."
 agot_multi_duel.0030.desc.outro.n:0 "Время, кажется, замедляется, когда поединок приближается. Каждая деталь становится резче в моем сознании — вес моего [player_duelist.Custom('signature_weapon')], земля под ногами, решимость в глазах [duelist_enemy.GetTitledFirstNamePossessiveNoTooltip]."
 agot_multi_duel.0030.desc.outro.o:0 "Ожидание подобно живому существу, свернувшемуся и готовому нанести удар. Я чувствую это каждой клеткой своего тела, уверенность, что этот поединок будет не похож ни на один другой."
 agot_multi_duel.0030.desc.outro.p:0 "Когда мы стоим друг против друга, груз судьбы давит. Это не просто поединок; это перекресток, момент, который определит течение наших жизней."
 agot_multi_duel.0030.desc.outro.q:0 "Тишина перед бурей оглушает, затишье, предшествующее насилию. В этот момент ясно, что ничто иное не имеет значения, кроме поединка."
 agot_multi_duel.0030.desc.outro.r:0 "С каждой проходящей секундой неизбежное приближается. Поединок — это больше, чем бой; это проверка всего, чему я научился, всего, что я есть."
 agot_multi_duel.0030.desc.outro.s:0 "В этом моменте есть окончательность, чувство, что всё привело к этой точке."
 agot_multi_duel.0030.desc.outro.t:0 "Когда я готовлюсь встретиться с [duelist_enemy.GetTitledFirstNameNoTooltip], я чувствую тяжесть каждого сделанного мною выбора."

 #POV EVENT OUTRO Part2 TEXTS
 agot_multi_duel.0030.desc.outro2.a:0 "\n\nКаждое решение, каждое движение определит не только исход этого поединка, но и путь, лежащий впереди. Нет места ошибке."
 agot_multi_duel.0030.desc.outro2.b:0 "\n\nПобеда достанется лишь тому, кто сумеет ее схватить."
 agot_multi_duel.0030.desc.outro2.c:0 "\n\nМоя решимость крепнет. Я должен быть тем, кто выйдет из этого победителем."
 agot_multi_duel.0030.desc.outro2.d:0 "\n\nНо достаточно ли этого? Скоро не останется вопросов, только холодная реальность поединка."
 agot_multi_duel.0030.desc.outro2.e:0 "\n\nТолько один выйдет победителем, и ставки выше некуда."
 agot_multi_duel.0030.desc.outro2.f:0 "\n\nПришло время доказать, кто сильнее."
 agot_multi_duel.0030.desc.outro2.g:0 "\n\nПоединок начнется, и только один из нас увидит его конец. Я полон решимости, что это буду я."
 agot_multi_duel.0030.desc.outro2.h:0 "\n\nПоединок — это больше, чем просто бой; это расплата, суд, совершаемый сталью и мастерством."
 agot_multi_duel.0030.desc.outro2.i:0 "\n\nВремя действовать настало."
 agot_multi_duel.0030.desc.outro2.j:0 "\n\nМы две силы, сталкивающиеся, и только одна останется стоять, когда осядет пыль."
 agot_multi_duel.0030.desc.outro2.k:0 "\n\nТеперь важно только предстоящий поединок, поле испытания, где один из нас падет."
 agot_multi_duel.0030.desc.outro2.l:0 "\n\nОстается лишь надеяться, что я готов."
 agot_multi_duel.0030.desc.outro2.m:0 "\n\nЭтот поединок станет определяющим моментом, битвой, которая либо сломает меня, либо приведет к победе."
 agot_multi_duel.0030.desc.outro2.n:0 "\n\nНе избежать того, что грядет."
 agot_multi_duel.0030.desc.outro2.o:0 "\n\nЭто момент, который изменит всё."
 agot_multi_duel.0030.desc.outro2.p:0 "\n\nЯ успокаиваю дыхание, зная, что то, что произойдет дальше, определит меня."
 agot_multi_duel.0030.desc.outro2.q:0 "\n\nИсход определит будущее способами, которые ни один из нас не может предсказать."
 agot_multi_duel.0030.desc.outro2.r:0 "\n\nЯ могу только надеяться, что я достаточно силен, чтобы пройти через это."
 agot_multi_duel.0030.desc.outro2.s:0 "\n\nПоединок — это не просто победа или поражение; это доказательство чего-то фундаментального — себе и [duelist_enemy.GetTitledFirstNameNoTooltip]."
 agot_multi_duel.0030.desc.outro2.t:0 "\n\nЭтот поединок станет высшим испытанием, моментом, который либо сделает меня, либо сломает."

 agot_multi_duel.1000.b:0 "Возможно, мудрее будет сдаться сейчас."

 #POV EVENT OPTION TEXTS
 agot_multi_duel.0030.a.a:0 "И вот оно начинается."
 agot_multi_duel.0030.a.b:0 "Иди на меня!"
 agot_multi_duel.0030.a.c:0 "Время сражаться."
 agot_multi_duel.0030.a.d:0 "Хватит игр."
 agot_multi_duel.0030.a.e:0 "Это кончится здесь."
 agot_multi_duel.0030.a.f:0 "Теперь конец."
 agot_multi_duel.0030.a.g:0 "За честь!"
 agot_multi_duel.0030.a.h:0 "Выходи на меня!"
 agot_multi_duel.0030.a.i:0 "Я готов."
 agot_multi_duel.0030.a.j:0 "Насмерть!"
 agot_multi_duel.0030.a.k:0 "Это кончается сейчас."


