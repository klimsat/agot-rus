 #Winner Pov
 agot_multi_duel.0100.desc.accuser_yielded:0 "Схватка заканчивается без нового удара. [main_loser_leader.GetTitledFirstName] сдается перед королевством, опуская свой [main_loser_leader.Custom('signature_weapon')] и отступая от обвинения, призвавшего сталь на поле.\n\nСлова, следующие за этим, значат больше, чем любой удар. Обвинение снято на глазах у богов и людей, и Суд Семерых уничтожен сдачей, а не кровью. Я остаюсь оправданным, мое имя очищено не указом, но отступлением самого обвинителя. Королевство свидетельствует, как обвинение против меня предано забвению собственными словами [main_loser_leader.GetTitledFirstNamePossessiveNoTooltip]."
 agot_multi_duel.0100.desc.accuser_downed:0 "Бой оставляет [main_loser_leader.GetTitledFirstName] поверженным на поле, силы иссякли, и [main_loser_leader.GetSheHe] не может подняться. Какая бы решимость ни вела [main_loser_leader.GetHerHim] в это испытание, она наконец оставила [main_loser_leader.GetHerHim].\n\nС неспособностью обвинителя продолжать Суд Семерых подходит к концу. По закону и обычаю обвинение падает вместе с поражением [main_loser_leader.GetTitledFirstNamePossessiveNoTooltip]. Я признан правым перед всеми, кто наблюдал этот суд сталью, мое дело подтверждено не словами, а стойкостью, когда это было важнее всего."
 agot_multi_duel.0100.desc.accuser_dead:0 "Последняя схватка оставляет [main_loser_leader.GetTitledFirstName] павшим на поле, голос, призвавший это испытание, наконец умолк.\n\nС уходом обвинителя Суд Семерых заканчивается кровью и окончательностью. Не осталось ни вызова, на который нужно ответить, ни обвинения, которое нужно оспаривать. Я оправдан одним лишь выживанием, мое дело доказано там, где прежде не помогли клятвы и обвинения, и королевство не сомневается, на чью сторону пал суд."
 agot_multi_duel.0100.desc.accused_downed:0 "[main_loser_leader.GetTitledFirstName] повержен на поле, силы иссякают, когда бой наконец оставляет [main_loser_leader.GetHerHim]. Схватка заканчивается тем, что [main_loser_leader.GetSheHe] не может удержаться на ногах.\n\nСуд Семерых наконец выносит приговор. Я остаюсь стоять там, где обвиняемый — нет, и по стали и обычаю вина ложится на имя [main_loser_leader.GetTitledFirstNamePossessiveNoTooltip]. Перед королевством обвинение, которое я выдвинул, доказано, и суд, которого я требовал, свершился."
 agot_multi_duel.0100.desc.accused_dead:0 "Поединок заканчивается кровью, когда [main_loser_leader.GetTitledFirstName] падает под судом, призванным против [main_loser_leader.GetHerHim]. Поле замирает, когда смысл момента укореняется.\n\nСуд Семерых наконец решен. Я стою победителем там, где обвиняемый — нет, и обвинение доказано на поле на глазах у всех. Больше не нужны слова, не осталось сомнений. Королевство получило ответ, написанный ясно сталью."

 #Observer Pov
 agot_multi_duel.0100.desc.accuser_yielded.observer:0 "Схватка замирает, когда [main_loser_leader.GetTitledFirstName] сдается, опуская свой [main_loser_leader.Custom('signature_weapon')] перед всеми, кто смотрит. Звук стали стихает, сменяясь напряженной тишиной, когда смысл момента оседает над полем.\n\nС отзывом обвинения Суд Семерых рушится сам в себя. Обвинение против [main_winner_leader.GetTitledFirstName] уничтожено не кровью, а сдачей обвинителя. Перед богами и людьми дело решено без нового удара, и королевству остается лишь осознать суд, произнесенный словами, а не сталью."
 agot_multi_duel.0100.desc.accuser_downed.observer:0 "[main_loser_leader.GetTitledFirstName] сбит с ног и не может подняться. Поле ждет в напряженной тишине, наблюдая за движением, которое не наступает.\n\nСуд Семерых заканчивается поражением обвинителя на поле. По обычаю и закону обвинение терпит неудачу там, где его чемпион не смог устоять. [main_winner_leader.GetTitledFirstName] оправдан перед королевством, обвинение отвечено силой, которая осталась, когда другой дрогнул."
 agot_multi_duel.0100.desc.accuser_dead.observer:0 "Последний обмен оставляет [main_loser_leader.GetTitledFirstName] павшим на поле, и с [main_loser_leader.GetHerHim] падает голос, призвавший это испытание. Схватка заканчивается, когда поле впитывает окончательность момента.\n\nСуд Семерых решен кровью. [main_winner_leader.GetTitledFirstName] остается стоять там, где обвинитель — нет, обвинение отвечено одним лишь выживанием. Не нужно дальнейшего суда, и королевство свидетельствует приговор, написанный ясно сталью."
 agot_multi_duel.0100.desc.accused_downed.observer:0 "[main_loser_leader.GetTitledFirstName] повержен и не может продолжать бой. Схватка иссякает, пока не становится ясно, что обвиняемый не может подняться, чтобы ответить на обвинение.\n\nСуд Семерых наконец выносит приговор. [main_winner_leader.GetTitledFirstName] стоит победителем перед всеми свидетелями, и вина возлагается на обвиняемого на виду у королевства. То, что было поставлено под сомнение, теперь отвечено без двусмысленности."
 agot_multi_duel.0100.desc.accused_dead.observer:0 "Поединок заканчивается тем, что [main_loser_leader.GetTitledFirstName] сражен на поле, последний удар заставляет замолчать любое дальнейшее отрицание обвинения.\n\nСуд Семерых завершается кровью и определенностью. Обвинение доказано сталью, и [main_winner_leader.GetTitledFirstName] выходит победителем, пока королевство смотрит. Не осталось сомнений, на чью сторону пал суд, и дело решено навсегда."

 #Loser Pov
 agot_multi_duel.0100.desc.accuser_yielded.loser:0 "Силы покидают меня, а вместе с ними и уверенность, что несла меня до сих пор. Моя рука дрожит, когда я опускаю свой [main_loser_leader.Custom('signature_weapon')], тяжесть момента тяжелее любой раны.\n\nНа глазах у всех я сдаюсь. Я снимаю обвинение, которое выдвинул, и отказываюсь от вызова, призвавшего сталь на поле. Суд Семерых заканчивается моей собственной сдачей, и обвинение, которое я так смело произнес, умирает с моими словами, оставляя королевству память о том, что я отступил, когда не мог идти дальше."
 agot_multi_duel.0100.desc.accuser_downed.loser:0 "Я пытаюсь подняться, но тело не слушается. Земля кажется далекой и нетвердой, шум битвы расплывается, боль заглушает всё.\n\nПравда становится неизбежной. Я больше не могу стоять, чтобы отстаивать обвинение, которое принес перед королевством. Суд Семерых заканчивается моим поражением, и мое обвинение терпит неудачу там, где иссякли мои силы. На глазах у всех мой вызов рассыпается на поле."
 agot_multi_duel.0100.desc.accused_downed.loser:0 "Бой истощает мои силы, пока ноги не подкашиваются и я не могу больше стоять. Каждый вдох обжигает, и поле кренится, когда я пытаюсь осознать, что решено.\n\nСуд Семерых отвечает на обвинение против меня сталью. Я оставлен поверженным на земле, когда приговор выносится на глазах у всех, моя судьба решена не словами или клятвами, а моей неспособностью устоять, когда момент потребовал этого."

 agot_multi_duel.0100.a:0 "Свершилось."

