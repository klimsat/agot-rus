l_russian:
 #Headers
 agot_multi_duel.header: "[background_terrain_scope.GetAdjectiveNoTooltip]ая схватка"
 agot_multi_duel.tos_header: "Суд Семерых"

 #Opponent Stands Up
 agot_multi_duel.1002.a.t:0 "$agot_multi_duel.tos_header$: Еще на ногах"
 agot_multi_duel.1002.desc.tos.stands_winner_pov:0 "Я прижал [loser_multi_duelist.GetTitledFirstName] к земле, уверенный, что схватка окончена. На миг [loser_multi_duelist.GetSheHe] лежал неподвижно среди круговерти битвы.\n\nА затем [loser_multi_duelist.GetSheHe] поднимается. Окровавленный, нетвердый, но снова на ногах, [loser_multi_duelist.GetSheHe] врывается обратно в бой, словно отбросив боль и здравый смысл."
 agot_multi_duel.1002.desc.tos.stands_loser_pov:0 "Удар [winner_multi_duelist.GetTitledFirstNamePossessive] отправляет меня на землю, мир кружится, сталь и грохот обрушиваются со всех сторон. На мгновение кажется, что бой окончен.\n\nЯ заставляю себя подняться сквозь боль, дыхание прерывисто, конечности кричат от боли. Что бы ни случилось дальше, я не останусь лежать."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend:0 "Я прижал [loser_multi_duelist.GetTitledFirstName] к земле, уверенный, что схватка окончена. На миг [loser_multi_duelist.GetSheHe] лежал неподвижно среди круговерти битвы."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend:0 "Удар [winner_multi_duelist.GetTitledFirstNamePossessive] отправляет меня на землю, мир кружится, сталь и грохот обрушиваются со всех сторон. На мгновение кажется, что бой окончен."

 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_1:0 "\n\nСквозь шум прорывается голос, [loser_duelist_friend.GetTitledFirstName] кричит из толпы.\n\n#EMP «Вставай, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Не тебе проигрывать эту битву!»#! \n\nИ каким-то образом [loser_multi_duelist.GetSheHe] поднимается. Окровавленный, нетвердый, но снова на ногах, [loser_multi_duelist.GetSheHe] врывается обратно в бой, словно отбросив боль и здравый смысл."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_2:0 "\n\nСквозь схватку разносится крик, [loser_duelist_friend.GetTitledFirstName] зовет из толпы.\n\n#EMP «На ноги, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Не здесь тебе падать!»#! \n\nНаперекор всему [loser_multi_duelist.GetSheHe] снова поднимается на ноги, избитый, но несломленный, и поединок продолжается."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_3:0 "\n\nНад лязгом стали раздается голос [loser_duelist_friend.GetTitledFirstNamePossessive].\n\n#EMP «Вставай, сер! Покажи им, что ты еще на ногах!»#! \n\nМгновение спустя [loser_multi_duelist.GetSheHe] снова поднимается, пошатываясь, но готовый продолжить бой."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_4:0 "\n\nОтчаянный крик прорывается сквозь грохот, [loser_duelist_friend.GetTitledFirstName] подбадривает [loser_multi_duelist.GetHerHim].\n\n#EMP «Вставай! Семеро видят тебя — не сдавайся!»#! \n\nС прерывистым дыханием [loser_multi_duelist.GetSheHe] вновь поднимается, отказываясь позволить схватке закончиться."
 agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_5:0 "\n\nС края толпы [loser_duelist_friend.GetTitledFirstName] выкрикивает с яростной решимостью.\n\n#EMP «Стой, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Стой и встреть их!»#! \n\nМедленно, упрямо [loser_multi_duelist.GetSheHe] обретает равновесие и снова вступает в бой."

 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_1:0 "\n\nСквозь пелену я слышу голос [loser_duelist_friend.GetTitledFirstName], кричащий сквозь хаос.\n\n#EMP «Стой, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Стой и сражайся!»#! \n\nЗвук пробивается сквозь туман, и я заставляю себя подняться сквозь боль, дыхание прерывисто, конечности кричат от боли. Что бы ни случилось дальше, я не останусь лежать."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_2:0 "\n\nСквозь хаос ко мне прорывается голос [loser_duelist_friend.GetTitledFirstNamePossessive].\n\n#EMP «Вставай, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Ты еще не побежден!»#! \n\nСлова прожигают пелену, и я заставляю себя подняться, отказываясь позволить бою закончиться здесь."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_3:0 "\n\nЗнакомый голос прорывается сквозь звон в ушах — [loser_duelist_friend.GetTitledFirstName], яростный и несгибаемый.\n\n#EMP «Вставай, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! На ноги и сражайся!»#! \n\nСтиснув зубы, я поднимаюсь, боль сопровождает каждое движение."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_4:0 "\n\nНад лязгом стали я слышу, как [loser_duelist_friend.GetTitledFirstName] называет мое имя.\n\n#EMP «Держись! Не падай сейчас!»#! \n\nКрик придает мне сил, и я, превозмогая боль, встаю."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_5:0 "\n\nГде-то за шумом [loser_duelist_friend.GetTitledFirstName] кричит с отчаянной мольбой.\n\n#EMP «Вставай, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Битва твоя — поднимайся!»#! \n\nСлова прорывают туман, и я поднимаюсь на ноги, дыхание прерывисто, но решимость несломлена."

 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_1:0 "\n\nНа миг мир исчезает, и я вижу [my_teacher_knight.GetTitledFirstName] надо мной на тренировочном дворе, [my_teacher_knight.GetSheHe] смотрит, как я пытаюсь подняться из грязи. [my_teacher_knight.GetSheHe|U] качает головой, голос тверд и знаком.\n\n#EMP «Вставай. Рыцарь поднимается, как бы тяжело ни упал.»#! \n\nЛязг стали возвращает меня в реальность, воспоминание рассеивается. Я делаю прерывистый вдох, упираюсь рукой в истоптанную землю и снова заставляю себя подняться."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_2:0 "\n\nТьма сжимается вокруг, но голос [my_teacher_knight.GetTitledFirstNamePossessive] прорывается сквозь нее, спокойный и несгибаемый, как в старые времена, когда каждый синяк был уроком, а каждое падение приносило новый приказ.\n\n#EMP «Боль проходит. Стоять — это выбор.»#! \n\nГрохот битвы возвращается, резкий и оглушительный. Стиснув зубы, я прорываюсь сквозь боль и поднимаюсь на ноги."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_3:0 "\n\nНа миг я уже не на поле, а в пыли далекого воспоминания, [my_teacher_knight.GetTitledFirstName] наблюдает, сложив руки, как я пытаюсь доказать, что достоин меча.\n\n#EMP «Снова. Пока не научишься не падать.»#! \n\nВоспоминание исчезает под лязгом стали. Дыхание обжигает легкие, я, шатаясь, поднимаюсь, отказываясь позволить уроку закончиться здесь."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_4:0 "\n\nШум утихает, и я слышу голос [my_teacher_knight.GetTitledFirstNamePossessive] так же ясно, словно [my_teacher_knight.GetSheHe] стоит рядом на какой-то давно забытой дороге, подбадривая меня, когда усталость грозила сломить.\n\n#EMP «Истинный рыцарь выдерживает.»#! \n\nНастоящее возвращается с лязгом стали и выкриками команд. Черпая силы в той старой стойкости, я заставляю тело подчиниться и встаю."
 agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_5:0 "\n\nНа мгновение битва исчезает, уступая место суровому взгляду [my_teacher_knight.GetTitledFirstName] после неудачной тренировочной схватки, [my_teacher_knight.GetSheHe] молча ждет, когда я встану сам, вместо того чтобы протянуть руку.\n\n#EMP «Не жди пощады. Вставай.»#! \n\nВидение исчезает, как дым, когда возвращается тяжесть настоящего. С тяжелым дыханием и дрожащей решимостью я поднимаюсь на ноги и снова вступаю в бой."

 agot_multi_duel.1002.a:0 "Бой продолжается."

 #Opponent Downed
 agot_multi_duel.1003.a.t:0 "$agot_multi_duel.tos_header$: Повержен"
 agot_multi_duel.1003.desc.tos.downed_winner_pov:0 "[loser_multi_duelist.GetTitledFirstName] пытается подняться, но силы иссякли. То, что прежде держало [loser_multi_duelist.GetHerHim] на ногах, наконец оставило [loser_multi_duelist.GetHerHim], и [loser_multi_duelist.GetSheHe] падает на землю.\n\nБой окончен. [loser_multi_duelist.GetSheHe|U] еще дышит, но больше не может ответить сталью на сталь."
 agot_multi_duel.1003.desc.tos.downed_loser_pov:0 "Я пытаюсь подняться, но тело не слушается. Боль заглушает все, конечности больше не подчиняются.\n\nБой продолжился без меня, и здесь он заканчивается. Я вижу надо мной [winner_multi_duelist.GetTitledFirstName], окровавленного и несломленного, вкушающего триумф, до которого мне уже не дотянуться."
 agot_multi_duel.1003.a:0 "Одним меньше."

 #ToS - Accuser yielded
 agot_multi_duel.1004.a.t:0 "$agot_multi_duel.tos_header$: Обвинение снято"
 agot_multi_duel.1004.desc.tos.yields_winner_pov:0 "[loser_multi_duelist.GetTitledFirstName] наконец дрогнул, силы [loser_multi_duelist.GetHerHis] иссякли, воля сломлена. Прежде чем сталь снова встретится, [loser_multi_duelist.GetSheHe] сдается.\n\nСлова следуют за этим. Обвинение против [tos_accused.GetTitledFirstName] снято, вызов отозван на глазах у всего королевства. То, что было поставлено под сомнение, больше не оспаривается, и Суд Семерых завершается не кровью, а сдачей."
 agot_multi_duel.1004.desc.tos.yields_loser_pov:0 "Силы покидают меня, а вместе с ними и уверенность, что несла меня до сих пор. Я опускаю свой [loser_multi_duelist.Custom('signature_weapon')] и сдаюсь, зная, что стоять дальше не имеет смысла.\n\nНа глазах у всех я снимаю обвинение и отказываюсь от суда, который призвал против [tos_accused.GetTitledFirstName]. Правда, которую я стремился доказать, не будет доказана моей рукой. Суд Семерых завершается здесь, отмененный моей сдачей."
 agot_multi_duel.1004.desc.tos.yields_observer_pov:0 "Схватка замедляется, затем стихает. [loser_multi_duelist.GetTitledFirstName], призвавший суд и выдвинувший обвинение против [tos_accused.GetTitledFirstName] перед королевством, наконец сдается.\n\nС этой сдачей обвинение снимается. Суд Семерых завершается не последним ударом, а словами обвинителя, отменяющими начатое. На глазах у всех свидетелей дело решено, и обвинение предано забвению."
 agot_multi_duel.1004.a:0 "Суд окончен."

 #ToS - Invalidated
 agot_multi_duel.1005.t.tos:0 "$agot_multi_duel.tos_header$: Суд неначавшийся"
 agot_multi_duel.1005.desc.tos:0 "Прежде чем Суд Семерых мог быть доведен до конца, пришла весть, что [dead_enemy_leader.GetTitledFirstName] умер за пределами поля. Будь то случай, невезение или чья-то рука, причина, собравшая чемпионов, более не существует.\n\nБез обвинителя и обвиняемого, чтобы ответить за обвинение, суд не может продолжаться. Собравшиеся клинки распущены, и то, что должно было решиться сталью, уходит в молчание."
 agot_multi_duel.1005.a:0 "Свершилось."

