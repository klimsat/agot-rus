l_russian:

 agot_title_and_name_events.0001.t:0 "Вопрос королевской крови"
 agot_title_and_name_events.0001.desc: "[Select_CString(child.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('child'))], [AGOTGetName(child)], королевских кровей, но не [Select_CString(child.IsFemale, 'признана как таковая', 'признан как таковой' )]. Как [ROOT.Char.GetTitleAsNameNoTooltip|l], я могу оказать [child.GetHerHim] такие почести, чтобы все знали о [child.GetHerHis] королевском происхождении."
 agot_title_and_name_events.0001.desc.twins: "[AGOTGetName(child)] и [AGOTGetName(child_2)], новорождённые дети, [Select_CString(scoped_relative.IsFemale, 'чьей родительницей', 'чьим родителем' )] является [Select_CString(scoped_relative.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('scoped_relative'))], [AGOTGetName(scoped_relative)], имеют королевскую кровь, но не признаны как таковые. Я, как [ROOT.Char.GetTitleAsNameNoTooltip|l], могу оказать им такие почести, чтобы все знали об их королевском происхождении."
 agot_title_and_name_events.0001.desc.triplets: "[AGOTGetName(child)], [AGOTGetName(child_2)] и [AGOTGetName(child_3)], новорождённые дети, [Select_CString(scoped_relative.IsFemale, 'чьей родительницей', 'чьим родителем' )] является [Select_CString(scoped_relative.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('scoped_relative'))], [AGOTGetName(scoped_relative)], имеют королевскую кровь, но не признаны как таковые. Я, как [ROOT.Char.GetTitleAsNameNoTooltip|l], могу оказать им такие почести, чтобы все знали об их королевском происхождении."
 agot_title_and_name_events.0001.a: "Королевская кровь требует королевского признания."
 agot_title_and_name_events.0001.b: "Дальние родственники не заслуживают такой чести."
 agot_title_and_name_events.0001.b.flavor: "@alert_icon! #alert_trial Вы сможете пожаловать королевские титулы позднее#!"

 agot_title_and_name_events.0002.desc: "Члены моего дома - особы королевской крови, но их не признают как таковых. Я, как [ROOT.Char.GetTitleAsNameNoTooltip|l], могу оказать им такие почести, чтобы все знали об их королевском происхождении.\n\n#I Выберите родственников, которым будут дарованы королевские титулы#!"