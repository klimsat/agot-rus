l_russian:
 # Parent will have choice of either trying to make their son brave, or have them train with a sword
 # Scopes are: prodigy
 agot_dayne_prodigy.0002.t: "Отважная звезда"
 agot_dayne_prodigy.0002.desc: "[Select_CString(prodigy.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('RelationToMe', prodigy)] [prodigy.GetFirstName] [Select_CString(prodigy.IsFemale, 'посвятила', 'посвятил' )] два года изучению военного дела и тренировкам с клинком, и теперь пришло время по-настоящему наставлять [prodigy.GetHerHis].\n\nЧтобы стать Мечом Зари, нужно быть готовым встретить даже самых грозных врагов — и для этого у меня есть два пути наставления: либо воспитать в [Select_CString(prodigy.IsFemale, 'ней', 'нём' )] отвагу с помощью опасного рыцарского турнира, либо продолжить обучать [prodigy.GetHerHis] владению оружием."
 agot_dayne_prodigy.0002.a: "По коням!"
 agot_dayne_prodigy.0002.a.tt: "Вы попытаетесь сделать персонажа [prodigy.GetFirstNameNoTooltip] более [Select_CString(prodigy.IsFemale, 'отважной', 'отважным' )]"
 agot_dayne_prodigy.0002.b: "Возьми клинок!"
 agot_dayne_prodigy.0002.b.tt: "[prodigy.GetFirstNameNoTooltip] продолжит тренировки с оружием"
 agot_dayne_prodigy.0002.gainedprowess1: "[Concept('prowess', 'Доблесть')|E] персонажа [prodigy.GetFirstNameNoTooltip] увеличивается на [prowess_i] 1"
 agot_dayne_prodigy.0002.gainedprowess2: "[Concept('prowess', 'Доблесть')|E] персонажа [prodigy.GetFirstNameNoTooltip] увеличивается на [prowess_i] 2"
 agot_dayne_prodigy.0002.gainedprowess3: "[Concept('prowess', 'Доблесть')|E] персонажа [prodigy.GetFirstNameNoTooltip] увеличивается на [prowess_i] 3"
 agot_dayne_prodigy.0002.gainednoprowess: "[prodigy.GetFirstNameNoTooltip] не [Select_CString(prodigy.IsFemale, 'получила', 'получил' )] прироста [Concept('prowess', 'доблести')|E]"
 agot_dayne_prodigy.0002.gainedtraitbrave: "[prodigy.GetFirstNameNoTooltip] [Select_CString(prodigy.IsFemale, 'получила', 'получил' )] [Concept('trait', 'свойство')|E] «[GetTrait('brave').GetName( prodigy )]»"
 agot_dayne_prodigy.0002.gainedtraitcraven: "[prodigy.GetFirstNameNoTooltip] [Select_CString(prodigy.IsFemale, 'получила', 'получил' )] [Concept('trait', 'свойство')|E] «[GetTrait('craven').GetName( prodigy )]»"

 # Parent will have option to push their child for prowess training, or to make them just
 # Scopes are: prodigy
 agot_dayne_prodigy.0003.t: "Справедливость и сталь"
 agot_dayne_prodigy.0003.desc: "[prodigy.GetFirstName] хорошо тренируется, но рыцарство — это не только умение махать клинком и бросаться на врагов. Нужно также нести справедливость своего сюзерена тем, кто её заслуживает. Справедливость — тяжкое бремя, полное испытаний.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'оказалась', 'оказался' )] на распутье, выбирая между двумя уроками, которые [Select_CString(prodigy.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMe', prodigy)] ещё [Select_CString(prodigy.IsFemale, 'должна', 'должен' )] усвоить... Скоро состоится суд, и с ним — возможность увидеть правосудие воочию. Но посещение суда отнимет время, которое можно было бы провести с клинком в руке, так что я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать:\n\nЧто важнее для Меча Зари — справедливость или #bold [prodigy.GetHerHis] меч?"
 agot_dayne_prodigy.0003.a: "[prodigy.GetSheHe|U] понесёт бремя справедливости."
 agot_dayne_prodigy.0003.a.tt: "Вы попытаетесь сделать персонажа [prodigy.GetFirstNameNoTooltip] более [Select_CString(prodigy.IsFemale, 'справедливой', 'справедливым' )]"
 agot_dayne_prodigy.0003.b: "[prodigy.GetSheHe|U] останется [Select_CString(prodigy.IsFemale, 'верна', 'верен' )] тяжести меча."
 agot_dayne_prodigy.0003.b.tt: "[prodigy.GetFirstNameNoTooltip] продолжит тренировки с оружием"
 agot_dayne_prodigy.0003.gainedtraitjust: "[prodigy.GetFirstNameNoTooltip] [Select_CString(prodigy.IsFemale, 'получила', 'получил' )] [Concept('trait', 'свойство')|E] «[GetTrait('just').GetName( prodigy )]»"
 agot_dayne_prodigy.0003.gainedtraitcallous: "[prodigy.GetFirstNameNoTooltip] [Select_CString(prodigy.IsFemale, 'получила', 'получил' )] [Concept('trait', 'свойство')|E] «[GetTrait('callous').GetName( prodigy )]»"

 # Parent will have the option of having them train harder, or trying to make them compassionate
 # Scopes are: prodigy
 agot_dayne_prodigy.0004.t: "Доброе сердце"
 agot_dayne_prodigy.0004.desc: "Что отличает Мечи Зари от простых рыцарей меньших домов — это не только непревзойдённое мастерство владения клинком, но и благородство духа, которое каждый из них нёс во всех своих делах. Чтобы стать поистине великим рыцарем, нужно проявлять милосердие, даже если это сложный выбор.\n\nНекоторые рождаются с добротой, другим приходится учиться ей в воспитании. Я знаю, что [prodigy.GetFirstName] [Select_CString(prodigy.IsFemale, 'должна', 'должен' )] не только совершенствоваться с клинком, но и усвоить уроки милосердия и сострадания. Для этого нужно показать [prodigy.GetHerHim] жизнь других и истинную ценность их существования. Это отнимет время от тренировок с клинком, но может оказаться куда ценнее на все [prodigy.GetHerHis] грядущие дни. И всё же я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] сделать выбор:\n\nМеч или сердце?"
 agot_dayne_prodigy.0004.desc_nocomp: "Что отличает Мечи Зари от простых рыцарей меньших домов — это не только непревзойдённое мастерство владения клинком, но и благородство духа, которое каждый из них нёс во всех своих делах. Чтобы стать поистине великим рыцарем, нужно проявлять милосердие, даже если это сложный выбор.\n\nБоюсь, сейчас слишком мало времени, чтобы внушить эти уроки, так что всё, что я могу сделать, — это научить ценности мастерства владения сталью."
 agot_dayne_prodigy.0004.a: "Мы отдадим предпочтение сердцу, а не силе руки."
 agot_dayne_prodigy.0004.a.tt: "Вы попытаетесь сделать персонажа [prodigy.GetFirstNameNoTooltip] более [Select_CString(prodigy.IsFemale, 'сострадательной', 'сострадательным' )]"
 agot_dayne_prodigy.0004.b: "Меч принесёт больше утешения, чем доброе сердце."
 agot_dayne_prodigy.0004.b.tt: "[prodigy.GetFirstNameNoTooltip] продолжит тренировки с оружием"
 agot_dayne_prodigy.0004.gainedtraitcompassionate: "[prodigy.GetFirstNameNoTooltip] [Select_CString(prodigy.IsFemale, 'получила', 'получил' )] [Concept('trait', 'свойство')|E] «[GetTrait('compassionate').GetName( prodigy )]»"
 agot_dayne_prodigy.0004.gainedtraitsadistic: "[prodigy.GetFirstNameNoTooltip] [Select_CString(prodigy.IsFemale, 'получила', 'получил' )] [Concept('trait', 'свойство')|E] «[GetTrait('sadistic').GetName( prodigy )]»"

 # Parent will have the option of trying to make them a blademaster with a bunch of XP or giving up, may result in death if they choose the former
 # Scopes are: prodigy
 agot_dayne_prodigy.0005.t: "Испытание на заре"
 agot_dayne_prodigy.0005.desc: "[prodigy.GetFirstName] всю свою жизнь [Select_CString(prodigy.IsFemale, 'тренировалась', 'тренировался' )] ради этого дня, дня, когда [prodigy.GetSheHe] либо докажет свою доблесть в бою, либо навсегда потеряет надежду на [dawn.GetName]. Чтобы стать Мечом Зари, нужно прежде всего быть истинным мастером клинка, возможно, величайшим в Вестеросе или за его пределами.\n\nТолько непревзойдённый рыцарь достоин носить [dawn.GetNameNoTooltip], и вот настало время испытания. [prodigy.GetFirstNameNoTooltip] [Select_CString(prodigy.IsFemale, 'должна', 'должен' )] сразиться с полноправным рыцарем в бою — и не просто победить, но проявить исключительную доблесть. Если [prodigy.GetSheHe] преуспеет, [prodigy.GetSheHe] вне всяких сомнений докажет свою доблесть. Это опасное испытание, которое даже может привести к [prodigy.GetHerHis] гибели.\n\n[Select_CString(ROOT.Char.IsFemale, 'Готова', 'Готов' )] ли я пойти на такой риск?"

 # They put their son through extreme trials, leading to their death, maiming, or becoming a blademaster
 agot_dayne_prodigy.0005.a: "Истинный рыцарь рискует жизнью, начинайте испытание."
 agot_dayne_prodigy.0005.a.tt: "[prodigy.GetFirstNameNoTooltip] попытается пройти смертельно опасное испытание доблесть"
 agot_dayne_prodigy.0005.b: "Я не могу рисковать [Select_CString(prodigy.IsFemale, 'ей', 'им' )], отменить всё!"
 agot_dayne_prodigy.0005.b.tt: "[prodigy.GetFirstNameNoTooltip] откажется от всех надежд стать Мечом Зари"

 agot_dayne_prodigy.0006.t: "Ночь предвкушения"
 agot_dayne_prodigy.0006.desc: "[Select_CString(prodigy.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('RelationToMe', prodigy)] [prodigy.GetFirstName] всё ещё во дворе, упражняется с клинком, хотя луна высоко в небе, а утро ещё далеко. Завтра [prodigy.GetSheHe] будет [Select_CString(prodigy.IsFemale, 'взвешена и оценена', 'взвешен и оценён' )], и [prodigy.GetSheHe] боится, что окажется [Select_CString(prodigy.IsFemale, 'недостойной', 'недостойным' )].\n\nТеперь нам остаётся только ждать рассвета."
 agot_dayne_prodigy.0006.a: "Час суда близок."
 agot_dayne_prodigy.0006.a.tt: "[prodigy.GetFirstNameNoTooltip] будет [Select_CString(prodigy.IsFemale, 'оцена', 'оценен' )] по [prodigy.GetHerHis] достоинству"

 # See if the prodigy is worthy of being SOTM
 agot_dayne_prodigy.0007.t: "Восходящее солнце"

 # Description if dynasty head is not their parent
 agot_dayne_prodigy.0007.desc.non_parent: "В последнее время до меня доносились слухи, шёпот о юном даровании нашего дома, искусном в обращении с клинком и благородным сердцем. Мне сказали, что [prodigy.GetSheHe] — будущее нашего дома, и, более того, что [prodigy.GetHerHim] предначертано стать Мечом Зари.\n\nЧто бы ни было правдой, окончательное решение лежит на мне не меньше, чем на ком-либо: [Select_CString(prodigy.IsFemale, 'готова', 'готов' )] ли [prodigy.GetFullNameNicknamed] стать Мечом Зари?"
 agot_dayne_prodigy.0007.desc: "День суда настал, и весь наш дом собрался, чтобы стать свидетелями этого. Я [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )] рассказы лордов и леди, простолюдинов и рыцарей. Сказания о мастерстве, храбрости и благородном сердце. Хотя их подвиги ещё не записаны, не все, кто претендовал на [dawn.GetName], были известны в державе, когда впервые поднимали древний клинок. У них ещё много времени, чтобы обрести славу.\n\nСвет утра разливается по комнате, падая на молочно-белый клинок [dawn.GetNameNoTooltip] в моей руке, освещая его поверхность и заставляя мурашки бежать по моей спине. Настал час, больше нечего слушать, но многое нужно обдумать.\n\nОкончательное решение лежит на мне не меньше, чем на ком-либо: [Select_CString(prodigy.IsFemale, 'достойна ли моя', 'достоин ли мой' )] [ROOT.Char.Custom2('RelationToMe', prodigy)] стать легендарным Мечом Зари? Можно ли доверить [Select_CString(prodigy.IsFemale, 'ей', 'ему' )] нести свет в мир, полный тьмы?"

 # Prodigy becomes SOTM
 agot_dayne_prodigy.0007.a: "[prodigy.GetSheHe|U] [Select_CString(prodigy.IsFemale, 'достойна', 'достоин' )]!"
 agot_dayne_prodigy.0007.a.tt: "[prodigy.GetFirstNameNoTooltip] станет Мечом Зари"

 # Prodigy fails to become SOTM may attempt to steal Dawn
 agot_dayne_prodigy.0007.b: "[prodigy.GetFirstNameNoTooltip] [Select_CString(prodigy.IsFemale, 'показала', 'показал' )] себя [Select_CString(prodigy.IsFemale, 'недостойной', 'недостойным' )]."
 agot_dayne_prodigy.0007.b.tt: "[prodigy.GetFirstNameNoTooltip] не станет Мечом Зари"

 # Prodigy is worthy but denied the sword anyway
 agot_dayne_prodigy.0007.c: "[prodigy.GetFirstNameNoTooltip] может быть [Select_CString(prodigy.IsFemale, 'достойна', 'достоин' )], но я не вручу [prodigy.GetHerHim] [dawn.GetNameNoTooltip]."
 agot_dayne_prodigy.0007.c.tt: "[prodigy.GetFirstNameNoTooltip] не станет Мечом Зари"

 # Prodigy may be worthy, but there is a SOTM already
 agot_dayne_prodigy.0008.t: "Ждущая звезда"
 agot_dayne_prodigy.0008.desc: "[prodigy.GetFirstName] упорно и успешно [Select_CString(prodigy.IsFemale, 'тренировалась и показала', 'тренировался и показал' )] себя более чем [Select_CString(prodigy.IsFemale, 'достойной', 'достойным' )] нести [dawn.GetName] и титул, который с ним связан. Но другой уже владеет мечом нашего дома, и мы знаем, что новая звезда ждёт, чтобы принять мантию, если он падёт. [prodigy.GetFirstNameNoTooltip] [Select_CString(prodigy.IsFemale, 'разочарована', 'разочарован' )], и имеет на это право, но [Select_CString(prodigy.IsFemale, 'ее', 'его' )] время ещё придёт."
 agot_dayne_prodigy.0008.a: "Терпение — тяжёлый урок."
 agot_dayne_prodigy.0008.a.tt: "[prodigy.GetFirstNameNoTooltip] пока не может стать Мечом Зари"


 # Events for if Prodigy's parent is dead

 # Prodigy will have choice of either trying to be brave, or training with a sword
 agot_dayne_prodigy.0009.t: "Отважная звезда"
 agot_dayne_prodigy.0009.desc: "Я два года [Select_CString(ROOT.Char.IsFemale, 'посвятила', 'посвятил' )] изучению военного дела и тренировкам с моим клинком, и теперь, возможно, пришло время доказать мою отвагу! Чтобы стать Мечом Зари, нужно быть [Select_CString(ROOT.Char.IsFemale, 'готовой', 'готовым' )] встретить даже самых грозных врагов. У меня есть два пути подготовки: рыцарский турнир, который испытает мою храбрость, или сосредоточиться на уроках с мечом."

 # Prodigy tries to become brave
 agot_dayne_prodigy.0009.a: "Подать мне коня!"
 agot_dayne_prodigy.0009.a.tt: "Вы попытаетесь доказать свою храбрость"

 # Prodigy trains with sword
 agot_dayne_prodigy.0009.b: "[dawn.GetNameNoTooltip] должен принадлежать непревзойдённому рыцарю."
 agot_dayne_prodigy.0009.b.tt: "Вы будете тренироваться с мечом"
 agot_dayne_prodigy.0009.gainedprowess1: "Ваша [Concept('prowess', 'доблесть')|E] увеличивается на [prowess_i] 1"
 agot_dayne_prodigy.0009.gainedprowess2: "Ваша [Concept('prowess', 'доблесть')|E] увеличивается на [prowess_i] 2"
 agot_dayne_prodigy.0009.gainedprowess3: "Ваша [Concept('prowess', 'доблесть')|E] увеличивается на [prowess_i] 3"
 agot_dayne_prodigy.0009.gainednoprowess: "Ваша [Concept('prowess', 'доблести')|E] не увеличилась"
 agot_dayne_prodigy.0009.gainedtraitbrave: "Вы получили [Concept('trait', 'свойство')|E] «[GetTrait('brave').GetName( ROOT.Char )]»"
 agot_dayne_prodigy.0009.gainedtraitcraven: "Вы получили [Concept('trait', 'свойство')|E] «[GetTrait('craven').GetName( ROOT.Char )]»"

 # Prodigy will have choice of either trying to be just, or training with a sword
 agot_dayne_prodigy.0010.t: "Честь и сталь"
 agot_dayne_prodigy.0010.desc: "Скоро состоится суд над местным преступником; все истории говорят о рыцарях как о благородных исполнителях справедливости своего сюзерена, и если я хочу доказать, что [Select_CString(ROOT.Char.IsFemale, 'достойна', 'достоин' )] носить [dawn.GetName], я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] стремиться к тому же. На этом суде я вижу шанс увидеть правосудие своими глазами, или, по крайней мере, его провал. Это займёт время, которое я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы провести с мечом в руке.\n\nЧто ценнее: честь или мастерство?"

 # Prodigy tries to become just
 agot_dayne_prodigy.0010.a: "Я выберу честь."
 agot_dayne_prodigy.0010.a.tt: "Вы попытаетесь постичь пути справедливости, хотя можете стать более [Select_CString(ROOT.Char.IsFemale, 'чёрствой', 'чёрствым' )], чем надеялись"

 # Prodigy trains with sword
 agot_dayne_prodigy.0010.b: "Я выберу мастерство."
 agot_dayne_prodigy.0010.b.tt: "Вы проведёте время, тренируясь с мечом"
 agot_dayne_prodigy.0010.gainedtraitjust: "Вы получили [Concept('trait', 'свойство')|E] «[GetTrait('just').GetName( ROOT.Char )]»"
 agot_dayne_prodigy.0010.gainedtraitcallous: "Вы получили [Concept('trait', 'свойство')|E] «[GetTrait('callous').GetName( ROOT.Char )]»"

 # Prodigy will have choice of either trying to be compassionate, or training with a sword
 agot_dayne_prodigy.0011.t: "Нежное сердце"
 agot_dayne_prodigy.0011.desc: "В историях рассказывается о рыцарях, спасающих прекрасных дев из башен и защищающих простолюдинов от тех, кто их угнетает. Чтобы быть [Select_CString(ROOT.Char.IsFemale, 'похожей', 'похожим' )] на рыцарей из этих историй, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] доказать, что в моей душе есть та же доброта.\n\nСледует ли мне провести время среди простолюдинов, в надежде научиться и проявить сострадание? Или сосредоточиться на мастерстве владения оружием?"

 # Prodigy tries to become compassionate
 agot_dayne_prodigy.0011.a: "Я смешаюсь с толпой."
 agot_dayne_prodigy.0011.a.tt: "Вы попытаетесь доказать своё сострадание, хотя результат может быть обратным"

 # Prodigy trains with sword
 agot_dayne_prodigy.0011.b: "Я сосредоточусь на мече."
 agot_dayne_prodigy.0011.b.tt: "Вы продолжите тренироваться с мечом"
 agot_dayne_prodigy.0011.gainedtraitcompassionate: "Вы получили [Concept('trait', 'свойство')|E] «[GetTrait('compassionate').GetName( ROOT.Char )]»"
 agot_dayne_prodigy.0011.gainedtraitsadistic: "Вы получили [Concept('trait', 'свойство')|E] «[GetTrait('sadistic').GetName( ROOT.Char )]»"

 # Prodigy may try to become a blademaster with a bunch of xp, or give up on the dream of being SOTM, may result in death at the trials
 agot_dayne_prodigy.0012.t: "Испытание на заре"
 agot_dayne_prodigy.0012.desc: "Одинокий рыцарь ждёт меня на тренировочном дворе, и пурпурный свет зари падает на его сияющие доспехи. Члены моего дома собрались здесь, чтобы увидеть это испытание и оценить мою ценность. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] сразиться с этим полноправным рыцарем в одиночном бою, не с затупленными тренировочными мечами, а с острой сталью. Поединок не до смерти, но не одна звезда пала в этом самом испытании. Я глубоко вздыхаю, полируя поверхность моего меча. Ещё есть время отступить, защитить свою жизнь и отказаться от мечты носить [dawn.GetName] от имени моей семьи.\n\nТак приму ли я это испытание? Или откажусь от всех своих надежд?"

 # Prodigy goes through extreme trials to become a blademaster, may result in death
 agot_dayne_prodigy.0012.a: "Я приму вызов."
 agot_dayne_prodigy.0012.a.tt: "Вы попытаетесь доказать себя мастером клинка, хотя это рискованно"

 # Prodigy gives up on being SOTM
 agot_dayne_prodigy.0012.b: "Забуду о мечте, сохранив жизнь."
 agot_dayne_prodigy.0012.b.tt: "Вы откажетесь от мечты стать Мечом Зари"

 # Prodigy finds out if they're worthy or not to be SOTM
 agot_dayne_prodigy.0013.t: "Восходящая звезда"
 agot_dayne_prodigy.0013.desc.intro: "Я стою в чертогах дома Дейн, а Рассвет ждёт меня на стене. Сегодня я узнаю, [Select_CString(ROOT.Char.IsFemale, 'заслужила', 'заслужил' )] ли я право стать Мечом Зари.\n\n"
 agot_dayne_prodigy.0013.desc.worthynothousehead: "С улыбкой на лице [dayne_dynasty_head.GetFullName], глава дома Дейн, приглашает меня шагнуть вперёд и взять [dawn.GetName] с помоста. С дрожащими руками я тянусь к мечу, который определил историю моего дома, пока моя семья выкрикивает моё имя за спиной. Теперь история будет следить за мной, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] доказать, что [Select_CString(ROOT.Char.IsFemale, 'достойна', 'достоин' )] её взгляда."
 agot_dayne_prodigy.0013.desc.unworthynothousehead: "С разочарованным взглядом [dayne_dynasty_head.GetFullName], глава дома Дейн, запрещает мне когда-либо держать [dawn.GetName], не говоря уже о том, чтобы владеть им от имени моего дома. Я [Select_CString(ROOT.Char.IsFemale, 'недостойна', 'недостоин' )] нести этот клинок, и мои мечты стать Мечом Зари обратились в пепел."
 agot_dayne_prodigy.0013.desc.worthyhousehead: "Как глава своего дома, я решаю, достойны ли рыцари взять [dawn.GetName]. Без эгоизма я могу сказать, что никто не усомнится в моей достойности, я многократно [Select_CString(ROOT.Char.IsFemale, 'доказала', 'доказал' )] своё мастерство и благородство, и это моё право взять наш древний клинок. Сегодня я стану Мечом Зари и вырежу своё имя в истории Вестероса!"
 agot_dayne_prodigy.0013.desc.unworthyhousehead: "Как глава дома Дейн, я решаю, достоин ли кто-либо из рыцарей среди нас взять [dawn.GetName] и стать Мечом Зари. Глядя на клинок на его священном постаменте, каждая частичка меня хочет взять его, назвать себя Мечом Зари и ощутить славу этого титула.\n\nНо я знаю правду: я не [Select_CString(ROOT.Char.IsFemale, 'заслужила', 'заслужил' )] ни этот клинок, ни титул, который за ним следует. Взять его сейчас означало бы лишь обесчестить себя и мой дом. [dawn.GetNameNoTooltip] должен остаться на месте, ожидая более достойной руки."

 # Prodigy becomes SOTM
 agot_dayne_prodigy.0013.a: "Я — Меч Зари!"
 agot_dayne_prodigy.0013.a.tt: "Вы стали Мечом Зари и будете носить [dawn.GetNameNoTooltip]"

 # Prodigy fails to become SOTM
 agot_dayne_prodigy.0013.b: "Я [Select_CString(ROOT.Char.IsFemale, 'подвела', 'подвёл' )] свой дом."
 agot_dayne_prodigy.0013.b.tt: "Вы никогда не станете Мечом Зари"

 # Prodigy may be worthy, but there is a SOTM already
 agot_dayne_prodigy.0014.t: "Ждущая звезда"
 agot_dayne_prodigy.0014.desc: "Хотя все признают, что я [Select_CString(ROOT.Char.IsFemale, 'достойна', 'достоин' )] носить титул Меча Зари, этот титул уже принадлежит другому. Возможно, мой шанс ещё придёт, а возможно, мне не суждено. В любом случае, сейчас я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] сосредоточить свои силы на других делах."
 agot_dayne_prodigy.0014.a: "Возможно, однажды."
 agot_dayne_prodigy.0014.a.tt: "Меч Зари уже есть"

 # Prodigy has stolen Dawn
 agot_dayne_prodigy.0015.t: "[Select_CString(prodigy.IsFemale, 'Воровка', 'Вор' )] в ночи"
 agot_dayne_prodigy.0015.desc: "[prodigy.GetFirstName], [Select_CString(prodigy.IsFemale, 'которой', 'которому' )] было отказано в праве стать Мечом Зари, [Select_CString(prodigy.IsFemale, 'украла', 'украл' )] [dawn.GetName] с постамента. Если не действовать быстро, [prodigy.GetSheHe] может сбежать, и у меня нет выбора, кроме как попытаться вернуть [prodigy.GetHerHis] в железной клетке, чтобы свершилось правосудие.\n\nХотя я [Select_CString(ROOT.Char.IsFemale, 'надеялась', 'надеялся' )], что [prodigy.GetSheHe] станет нашим новым Мечом Зари, [prodigy.GetSheHe] [Select_CString(prodigy.IsFemale, 'выбрала', 'выбрал' )] ночь."

 # Attempt to imprison them
 agot_dayne_prodigy.0015.a: "Верните [Select_CString(prodigy.IsFemale, 'её', 'его' )] в железной клетке!"
 agot_dayne_prodigy.0015.a.tt: "Вы попытаетесь заключить персонажа [prodigy.GetFirstNameNoTooltip] в темницу, хотя [prodigy.GetSheHe] может сбежать"

 # Notify Dayne parents their child has become SOTM
 agot_dayne_prodigy.0016.t: "Новая заря"
 agot_dayne_prodigy.0016.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] весть, что [Select_CString(prodigy.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMe', prodigy)] [prodigy.GetFirstName] наконец [Select_CString(prodigy.IsFemale, 'достигла', 'достиг' )] своей давней цели стать Мечом Зари, и что [prodigy.GetSheHe] [Select_CString(prodigy.IsFemale, 'стала', 'стал' )] рыцарем, которым может гордиться весь дом Дейн."
 agot_dayne_prodigy.0016.a: "За новую восходящую звезду!"
 agot_dayne_prodigy.0016.a.tt: "Вы воспитали Меч Зари"

 # Prodigy died before story cycle completion
 agot_dayne_prodigy.0017.t: "Павшая звезда"
 agot_dayne_prodigy.0017.desc: "[Select_CString(prodigy.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('RelationToMe', prodigy)] и все мои великие надежды уходят к богам вместе с [Select_CString(prodigy.IsFemale, 'ней', 'ним' )]. [prodigy.GetSheHe|U] [Select_CString(prodigy.IsFemale, 'показала', 'показал' )] такие обещания, а теперь их свет угас, как самая яркая и краткая свеча. Боги сделали нас существами любви, и это делает утрату ещё тяжелее. Но мы должны продолжать, пока не взойдёт новая звезда, подобная солнцу на заре."
 agot_dayne_prodigy.0017.a: "Прощай, моё дитя."
 agot_dayne_prodigy.0017.a.tt: "Вы будете скорбеть о своей утрате"

 # Prodigy failed early with parent/grandparent
 agot_dayne_prodigy.0018.t: "Расточённая звезда"
 agot_dayne_prodigy.0018.desc: "С [prodigy.GetHerHis] провалом в последнем испытании характера и способностей всему нашему дому стало ясно, что [prodigy.GetFirstName] никогда не станет Мечом Зари.\n\nВозможно, это моя вина, что я [Select_CString(ROOT.Char.IsFemale, 'растратила', 'растратил' )] [prodigy.GetHerHis] потенциал и не [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог' )] научить [prodigy.GetHerHis] рыцарским добродетелям. Или, может быть, в [Select_CString(prodigy.IsFemale, 'ней', 'нём' )] изначально был какой-то скрытый изъян, а я слишком [Select_CString(ROOT.Char.IsFemale, 'возвысила', 'возвысил' )] свои надежды. В любом случае, мы должны закрыть эту главу [prodigy.GetHerHis] истории и найти другой способ, которым [prodigy.GetSheHe] докажет свою ценность нашему дому."
 agot_dayne_prodigy.0018.a: "Я [Select_CString(ROOT.Char.IsFemale, 'подвела', 'подвёл' )] тебя."
 agot_dayne_prodigy.0018.a.tt: "[prodigy.GetFirstNameNoTooltip] никогда не станет Мечом Зари"
 # Prodigy failed early without parent/grandparent
 agot_dayne_Prodigy.0019.t: "Неудавшаяся звезда"
 agot_dayne_prodigy.0019.desc: "С моим недавним выступлением в последнем испытании моих навыков и личности как рыцаря я [Select_CString(ROOT.Char.IsFemale, 'доказала', 'доказал' )] свою недостойность в глазах богов и людей. Теперь мне ясно, что я никогда не буду считаться [Select_CString(ROOT.Char.IsFemale, 'достойной', 'достойным' )] стать Мечом Зари, и мне следует отказаться от этой бессмысленной мечты.\n\nХотя я, возможно, никогда не стану величайшим из рыцарей, у меня всё ещё есть множество способов доказать свою ценность дому Дейн."
 agot_dayne_prodigy.0019.a: "Я найду другой способ быть [Select_CString(ROOT.Char.IsFemale, 'полезной', 'полезным' )]."
 agot_dayne_prodigy.0019.a.tt: "Вы никогда не станете Мечом Зари"