l_russian:

 agot_wildling_events.0001.t: "Дарованное имя"
 agot_wildling_events.0001.desc.me: "[ROOT.Char.GetFirstNameNoTooltip].\n\nПростое молочное имя, данное лишь для того, чтобы отвести дурную судьбу в первые дни жизни среди моего народа.\n\nТеперь, когда я достаточно [Select_CString(ROOT.Char.IsFemale, 'окрепла', 'окреп' )], чтобы получить настоящее имя, я думаю, какое имя мне взять."
 agot_wildling_events.0001.desc: "[child.GetFirstNameNoTooltip].\n\nПростое молочное имя, данное лишь для того, чтобы отвести дурную судьбу в первые дни [child.GetHerHis] жизни среди нашего народа.\n\nТеперь, когда [child.GetFirstNameNoTooltip] достаточно [Select_CString(child.IsFemale, 'окрепла', 'окреп' )], пришло время дать [child.GetHerHim] истинное имя среди нашего народа."
 agot_wildling_events.0001.a: "Пусть [Select_CString(Character.IsLocalPlayer, 'я получу', 'ребёнок получит' )] новое имя."

 agot_wildling_events.0100.t: "Имя обретает форму"
 agot_wildling_events.0100.desc.me: "[ROOT.Char.GetFirstNameNoTooltip].\n\nЭто уже не молочное имя, а настоящее — взятое от созданий этого мира, как принято среди моего народа.\n\nЭто первый шаг за пределы детства, хотя ещё не то имя, которое я буду носить, став [Select_CString(ROOT.Char.IsFemale, 'взрослой женщиной', 'взрослым мужчиной' )]."
 agot_wildling_events.0100.desc: "[child.GetFirstNameNoTooltip].\n\nЭто уже не молочное имя, а настоящее — взятое от созданий этого мира, как принято среди нашего народа.\n\nОно знаменует первый шаг за пределы детства, хотя ещё не то имя, которое [child.GetFirstNameNoTooltip] будет носить, став [Select_CString(child.IsFemale, 'взрослой женщиной', 'взрослым мужчиной' )]."
 agot_wildling_events.0100.a: "Имя, заслуженное взрослением."

 agot_wildling_events.0101.t: "Завершённое имя"
 agot_wildling_events.0101.desc.me: "[ROOT.Char.GetFirstNameNoTooltip].\n\nМоё детское имя ушло; теперь моё имя носит прозвище, отражающее то, кем я [Select_CString(ROOT.Char.IsFemale, 'стала', 'стал' )], как принято среди моего народа.\n\nЭто имя, достойное взрослой жизни."
 agot_wildling_events.0101.desc: "[child.GetFirstNameNoTooltip].\n\n[child.GetHerHis|U] детское имя ушло; теперь [child.GetHerHis] имя носит прозвище, отражающее то, кем [child.GetFirstNameNoTooltip] [Select_CString(child.IsFemale, 'стала', 'стал' )], как принято среди нашего народа.\n\nЭто имя, достойное взрослой жизни."
 agot_wildling_events.0101.a: "Имя стало цельным."