l_russian:
 #Marked for Review
 agot_pirate_events.0003.t: "Портовые сборы"
 agot_pirate_events.0003.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'прибыла', 'прибыл' )] в пиратскую гавань владения [port_name.GetName].\n\nКогда я ступаю на причал, мне говорят, что я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] заплатить единовременный сбор за стоянку в размере #P [SCOPE.GetValue('port_docking_fee')|0]#! @gold_icon!, а также ежегодный сбор, который в настоящее время составляет #P [SCOPE.GetValue('yearly_port_fee')|0]#! @gold_icon!.\n\nЕжегодная плата может внезапно измениться по прихоти владельца порта и рассчитывается в зависимости от размера моего судна.\n\nМеня предупредили, что неуплата ежегодной пошлины может привести к #N тюремному заключению!#!"
 agot_pirate_events.0003.a: "Понятно."

 agot_pirate_events.0004.t: "Портовые сборы"
 agot_pirate_events.0004.desc: "Пришло время платить ежегодный портовый сбор. [port_holder.GetName] ожидает, что я заплачу [Select_CString(port_holder.IsFemale, 'ей', 'ему' )] #P [SCOPE.GetValue('yearly_port_fee')|0]#! @gold_icon!."
 agot_pirate_events.0004.a: "Я заплачу."
 agot_pirate_events.0004.b: "Я отказываюсь платить."
 agot_pirate_events.0004.c: "Возможно, я смогу воспользоваться своим преимуществом, чтобы избежать этого платежа..."
 agot_pirate_events.0004.c_tt: "Использование [Concept('strong_hook', 'сильного влияния')|E] на персонажа [port_holder.GetShortUIName] позволит вам избежать обязательных платежей в этом году."

 agot_pirate_events.0100.t: "Становление пиратом"
 agot_pirate_events.0100.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'отказалась', 'отказался' )] от жизни [Select_CString(ROOT.Char.IsFemale, 'искательницы', 'искателя' )] приключений и [Select_CString(ROOT.Char.IsFemale, 'стала', 'стал' )] пиратом."
 agot_pirate_events.0100.a: "Пиратская жизнь по мне."

 agot_pirate_events.0101.t: "К морям"
 agot_pirate_events.0101.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'отказалась', 'отказался' )] от своих титулов и земель, чтобы жить как безземельный капитан, [Select_CString(ROOT.Char.IsFemale, 'связанная', 'связанный' )] лишь с морем и своим кораблем."
 agot_pirate_events.0101.a: "Пиратская жизнь по мне!"

 agot_pirate_auto_join_port_war_interface_toast_title: "Присоединение к оборонительной войне"
 agot_pirate_auto_join_port_war_interface_toast: "Вы автоматически вступили в войну за порт в своём расположении."

 agot_pirate_events.0200.t: "Изгнание"
 agot_pirate_events.0200.desc: "[actor.GetName], [Select_CString(actor.IsFemale, 'правительница', 'правитель' )] владения [port_name.GetName], [Select_CString(actor.IsFemale, 'издала', 'издал' )] указ, согласно которому я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] немедленно покинуть порт, иначе меня ждёт тюремное заключение!"
 agot_pirate_events.0200.a: "Значит, отправлюсь во владение [new_destination.GetName]."
 agot_pirate_events.0200.b: "Пусть попробует меня схватить!"
 agot_pirate_events.0200.c: "Мои возможности ограничены. Возможно, пришло время уйти из пиратства."

 agot_pirate_events.0200.msg_pirate_moved_title: "Отплытие пирата"
 agot_pirate_events.0200.msg_pirate_moved_desc: "[recipient.GetName] [Select_CString(recipient.IsFemale, 'исполнила', 'исполнил' )] ваше требование покинуть владение [port_name.GetNameNoTooltip]!"

 agot_pirate_events.0200.msg_pirate_squatting_title: "Пираты отказываются уходить"
 agot_pirate_events.0200.msg_pirate_squatting_desc: "[recipient.GetName] [Select_CString(recipient.IsFemale, 'отказалась', 'отказался' )] покинуть владение [port_name.GetNameNoTooltip]! Вы можете попытаться захватить [Select_CString(recipient.IsFemale, 'её', 'его' )] имение через [Concept('character_interaction', 'взаимодействие персонажа')|E]."

 agot_pirate_events.0200.msg_pirate_renouncd_piracy_title: "Больше не пираты"
 agot_pirate_events.0200.msg_pirate_renouncd_piracy_desc: "[recipient.GetName] [Select_CString(recipient.IsFemale, 'отказалась', 'отказался' )] от пиратства после того, как вы добились [Select_CString(recipient.IsFemale, 'её', 'его' )] изгнания из владения [port_name.GetNameNoTooltip]! Теперь [Select_CString(recipient.IsFemale, 'она', 'он' )] [Concept('adventurer', Select_CString(recipient.IsFemale, 'авантюристка', 'авантюрист' ))|E]."

 agot_pirate_events.0300.t: "Отказ в выплате портового сбора"
 agot_pirate_events.0300.desc: "[pirate.GetName], пират, [Select_CString(pirate.IsFemale, 'пришвартовавшаяся', 'пришвартовавшийся' )] в одном из моих портов, [Select_CString(pirate.IsFemale, 'отказалась', 'отказался' )] платить мне ежегодный сбор в размере #P [SCOPE.GetValue('yearly_port_fee')|0]#! @gold_icon!."
 agot_pirate_events.0300.a: "Я оставлю это без внимания."
 agot_pirate_events.0300.b: "Захватить корабль и заключить [pirate.GetHerHis] в темницу."

 agot_pirate_events.9000.t: "Возвышение нового капитана"
 agot_pirate_events.9000.desc: "Капитан [dying_pirate_predecessor.GetName] [Select_CString(dying_pirate_predecessor.IsFemale, 'умерла', 'умер' )]! #italic [ROOT.Char.GetPrimaryTitle.GetNameNoTier]#! переходит под моё командование, отныне я капитан этого корабля."
 agot_pirate_events.9000.desc_maa_reset: "\n\nХотя моя власть капитана было быстро признана большей частью команды корабля #italic [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]#!, большое количество закалённых в боях воинов, которых когда-то [Select_CString(dying_pirate_predecessor.IsFemale, 'держала', 'держал' )] при себе [dying_pirate_predecessor.GetNameNoTooltip], ушли в поисках новых испытаний в других местах.\n\nОднако ещё не вся надежда потеряна, поскольку известие о смерти [Select_CString(dying_pirate_predecessor.IsFemale, 'моей предшественницы', 'моего предшественника' )] начало привлекать новых наёмников, жаждущих присягнуть мне."
 agot_pirate_events.9000.a: "Моё путешествие начинается."

 agot_pirate_ship_succession_gui_tt: "@title_succession! [Concept('agot_landless_pirate_domiciles', 'Корабль')|E] будет унаследован вашим [Concept('player_heir', 'наследником-игроком')|E], [Concept('pirate_ship_designated_heir', 'предопределённым наследником')|E], вашим [Concept('primary_heir', 'первым наследником')|E] или подходящим [Concept('courtier', 'придворным')|E]."
 you_are_an_landless_pirate_tt: "Ваша форма правления - [GetGovernment('pirate_government').GetNameWithIcon]"
 agot_pirate_succession_invalid: "@warning_icon! Ваш первый наследник уже владеет пиратским кораблём."

 agot_pirate_tax_results.t: "Сборы пиратского порта: Оплата"
 agot_pirate_tax_results.desc: "[pirate.GetShortUIName] [Select_CString(pirate.IsFemale, 'оплатила', 'оплатил' )] необходимые портовые сборы:"
 agot_pirate_tax_results.desc_used_hook_to_skip_taxes: "[pirate.GetShortUIName] [Select_CString(pirate.IsFemale, 'использовала', 'использовал' )] своё сильное влияние на вас, чтобы #X избежать уплаты портового сбора в этом году#!."

 agot_pirate_domicile_arrived_in_port.t: "Прибытие в пиратский порт"
 agot_pirate_domicile_arrived_in_port.desc: "[pirate.GetShortUIName] [Select_CString(pirate.IsFemale, 'прибыла', 'прибыл' )] во владение [port_name.GetName]."

 agot_pirate_domicile_departed_port.t: "Отбытие из пиратского порта"
 agot_pirate_domicile_departed_port.desc: "[departing_pirate_ship_holder.GetShortUIName] [Select_CString(departing_pirate_ship_holder.IsFemale, 'покинула', 'покинул' )] владение [departing_pirate_ship_location.GetName]."

 agot_pirate_loot_collect: "Собрана добыча"
 agot_pirate_loot_collect_tt: "[THIS.Var('raid_loot').GetValue|0] @gold_icon! добавлено к добыче."

 agot_pirate_port_rate_changed.t: "Изменение портового тарифа"
 agot_pirate_port_rate_changed.desc_01: "Новый портовый тариф - [GetLaw('pirate_tax_rate_01').GetName]."
 agot_pirate_port_rate_changed.desc_02: "Новый портовый тариф - [GetLaw('pirate_tax_rate_02').GetName]."
 agot_pirate_port_rate_changed.desc_03: "Новый портовый тариф - [GetLaw('pirate_tax_rate_03').GetName]."
 agot_pirate_port_rate_changed.desc_04: "Новый портовый тариф - [GetLaw('pirate_tax_rate_04').GetName]."

 agot_pirate_events.9201.t: "Безрадостная затея"
 agot_pirate_events.9201.desc: "«Мой сюзерен,» — с усталым вздохом говорит [colonist.GetName]. — «Эта земля создана для пиратов и налётчиков, а не для земледельцев и торговцев. Почва скудная, побережье опасное, а пираты всё ещё рыщут по водам и холмам. Я не смогу сделать её процветающей без вашей помощи — и даже тогда боюсь, что она так и не окупится».\n\nЯ смогу удержать эти земли под своей властью, но окупятся ли расходы, если эти земли так же бесплодны, как утверждает [colonist.GetFirstNameNoTooltip]? И всё же мой долг — поддерживать вассалов в нужде, ведь если я этот долг нарушу, никто не знает, как долго они останутся верны — или вообще останутся вассалами."
 agot_pirate_events.9201.a: "У тебя будет нужное количество золота."
 agot_pirate_events.9201.b: "Это твоя ответственность, от меня ты ничего не получишь."
 agot_pirate_events.9201.b.tt: "[colonist.GetTitledFirstNameNoTooltip] может плохо воспринять это решение."

 agot_pirate_events.9300.t: "Реальная угроза"
 agot_pirate_events.9300.desc: "[attacker.GetName] [Select_CString(attacker.IsFemale, 'предприняла', 'предпринял' )] вторжение, чтобы пресечь пиратство в регионе. Учитывая серьёзность угрозы, мы и наш сюзерен [defender.GetName] автоматически объединили усилия!\n\nЕсли мы проиграем, наша территория превратится в пустошь, а наши пиратские корабли рассеются."
 agot_pirate_events.9300.a: "Мы должны одержать победу."

