l_russian:
 #Marked for Review
 agot_pirate_events.0003.t: "Портовые сборы"
 agot_pirate_events.0003.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'прибыла', 'прибыл' )] в пиратскую гавань владения [port_name.GetName].\n\nКогда я ступаю на причал, мне говорят, что я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] заплатить единовременный сбор за стоянку в размере #P [SCOPE.GetValue('port_docking_fee')|0]#! @gold_icon!, а также ежегодный сбор, который в настоящее время составляет #P [SCOPE.GetValue('yearly_port_fee')|0]#! @gold_icon!.\n\nЕжегодная плата может внезапно измениться по прихоти владельца порта и рассчитывается в зависимости от размера моего судна.\n\nМеня предупредили, что неуплата ежегодной пошлины может привести к #N тюремному заключению!#!"
 agot_pirate_events.0003.a: "Понятно."

 agot_pirate_events.0004.t: "Портовые сборы"
 agot_pirate_events.0004.desc: "Пришло время платить ежегодный портовый сбор. [port_holder.GetName] ожидает, что я заплачу [Select_CString(port_holder.IsFemale, 'ей', 'ему' )] #P [SCOPE.GetValue('yearly_port_fee')|0]#! @gold_icon!."
 agot_pirate_events.0004.a: "Я заплачу."
 agot_pirate_events.0004.b: "Я отказываюсь платить."
 agot_pirate_events.0004.c: "Возможно, я смогу воспользоваться своим преимуществом, чтобы избежать этого платежа..."
 agot_pirate_events.0004.c_tt: "Использование [Concept('strong_hook', 'сильного влияния')|E] на персонажа [port_holder.GetShortUIName] позволит вам избежать обязательных платежей в этом году."

 agot_pirate_events.0100.t: "Становление пиратом"
 agot_pirate_events.0100.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'отказалась', 'отказался' )] от жизни [Select_CString(ROOT.Char.IsFemale, 'искательницы', 'искателя' )] приключений и [Select_CString(ROOT.Char.IsFemale, 'стала', 'стал' )] пиратом."
 agot_pirate_events.0100.a: "Пиратская жизнь по мне."

 agot_pirate_events.0101.t: "К морям"
 agot_pirate_events.0101.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'отказалась', 'отказался' )] от своих титулов и земель, чтобы жить как безземельный капитан, [Select_CString(ROOT.Char.IsFemale, 'связанная', 'связанный' )] лишь с морем и своим кораблем."
 agot_pirate_events.0101.a: "Пиратская жизнь по мне!"

 agot_pirate_auto_join_port_war_interface_toast_title: "Присоединение к оборонительной войне"
 agot_pirate_auto_join_port_war_interface_toast: "Вы автоматически вступили в войну за порт в своём расположении."

 agot_pirate_events.0200.t: "Изгнание"
 agot_pirate_events.0200.desc: "[actor.GetName], [Select_CString(actor.IsFemale, 'правительница', 'правитель' )] владения [port_name.GetName], [Select_CString(actor.IsFemale, 'издала', 'издал' )] указ, согласно которому я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] немедленно покинуть порт, иначе меня ждёт тюремное заключение!"
 agot_pirate_events.0200.a: "Значит, отправлюсь во владение [new_destination.GetName]."
 agot_pirate_events.0200.b: "Пусть попробует меня схватить!"
 agot_pirate_events.0200.c: "Мои возможности ограничены. Возможно, пришло время уйти из пиратства."

 agot_pirate_events.0200.msg_pirate_moved_title: "Отплытие пирата"
 agot_pirate_events.0200.msg_pirate_moved_desc: "[recipient.GetName] [Select_CString(recipient.IsFemale, 'исполнила', 'исполнил' )] ваше требование покинуть владение [port_name.GetNameNoTooltip]!"

 agot_pirate_events.0200.msg_pirate_squatting_title: "Пираты отказываются уходить"
 agot_pirate_events.0200.msg_pirate_squatting_desc: "[recipient.GetName] [Select_CString(recipient.IsFemale, 'отказалась', 'отказался' )] покинуть владение [port_name.GetNameNoTooltip]! Вы можете попытаться захватить [Select_CString(recipient.IsFemale, 'её', 'его' )] имение через [Concept('character_interaction', 'взаимодействие персонажа')|E]."

 agot_pirate_events.0200.msg_pirate_renouncd_piracy_title: "Больше не пираты"
 agot_pirate_events.0200.msg_pirate_renouncd_piracy_desc: "[recipient.GetName] [Select_CString(recipient.IsFemale, 'отказалась', 'отказался' )] от пиратства после того, как вы добились [Select_CString(recipient.IsFemale, 'её', 'его' )] изгнания из владения [port_name.GetNameNoTooltip]! Теперь [Select_CString(recipient.IsFemale, 'она', 'он' )] [Concept('adventurer', Select_CString(recipient.IsFemale, 'авантюристка', 'авантюрист' ))|E]."

 agot_pirate_events.0300.t: "Отказ в выплате портового сбора"
 agot_pirate_events.0300.desc: "[pirate.GetName], пират, [Select_CString(pirate.IsFemale, 'пришвартовавшаяся', 'пришвартовавшийся' )] в одном из моих портов, [Select_CString(pirate.IsFemale, 'отказалась', 'отказался' )] платить мне ежегодный сбор в размере #P [SCOPE.GetValue('yearly_port_fee')|0]#! @gold_icon!."
 agot_pirate_events.0300.a: "Я оставлю это без внимания."
 agot_pirate_events.0300.b: "Захватить корабль и заключить [pirate.GetHerHis] в темницу."

 agot_pirate_events.9000.t:0 "A New Captain Rises"
 agot_pirate_events.9000.desc:0 "Captain [dying_pirate_predecessor.GetName] has died! I have been given command of the #italic [ROOT.Char.GetPrimaryTitle.GetNameNoTier]#! and now rule as their captain."
 agot_pirate_events.9000.desc_maa_reset:0 "\n\nThough my captaincy was quickly recognized across the #italic [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]#!, large swathes of battle-hardened men-at-arms who once served [dying_pirate_predecessor.GetNameNoTooltip] have departed, seeking new challenges elsewhere.\n\nAll hope is not lost, however, as the news of my predecessor's death has begun to attract new swords eager to pledge themselves to me."
 agot_pirate_events.9000.a:0 "My journey begins."

 agot_pirate_ship_succession_gui_tt:0 "@title_succession! [agot_landless_pirate_domiciles|E] will be inherited by your [player_heir|E], [pirate_ship_designated_heir|E], your [primary_heir|E], or an eligible [courtier|E]."
 you_are_an_landless_pirate_tt:0 "You are a [GetGovernment('pirate_government').GetNameWithIcon]"
 agot_pirate_succession_invalid:0 "@warning_icon! Your primary heir already has a pirate ship."

 agot_pirate_tax_results.t:0 "Pirate Port Fees: Paid"
 agot_pirate_tax_results.desc:0 "[pirate.GetShortUIName] has paid the required port fees:"
 agot_pirate_tax_results.desc_used_hook_to_skip_taxes:0 "[pirate.GetShortUIName] has used their strong hook on you to #X avoid paying this year's port fee#!."

 agot_pirate_domicile_arrived_in_port.t:0 "Pirate Port Arrival"
 agot_pirate_domicile_arrived_in_port.desc:0 "[pirate.GetShortUIName] has arrived at [port_name.GetName]."

 agot_pirate_domicile_departed_port.t:0 "Pirate Port Departure"
 agot_pirate_domicile_departed_port.desc:0 "[departing_pirate_ship_holder.GetShortUIName] has departed from [departing_pirate_ship_location.GetName]."

 agot_pirate_loot_collect:0 "Raid Loot Collected"
 agot_pirate_loot_collect_tt:0 "[THIS.Var('raid_loot').GetValue|0] @gold_icon! added to Army Loot."

 agot_pirate_port_rate_changed.t:0 "Port Rate Changed"
 agot_pirate_port_rate_changed.desc_01:0 "Port rate has changed to [GetLaw('pirate_tax_rate_01').GetName]."
 agot_pirate_port_rate_changed.desc_02:0 "Port rate has changed to [GetLaw('pirate_tax_rate_02').GetName]."
 agot_pirate_port_rate_changed.desc_03:0 "Port rate has changed to [GetLaw('pirate_tax_rate_03').GetName]."
 agot_pirate_port_rate_changed.desc_04:0 "Port rate has changed to [GetLaw('pirate_tax_rate_04').GetName]."

 agot_pirate_events.9201.t:0 "Безрадостная затея"
 agot_pirate_events.9201.desc:0 "«Мой сюзерен,» — с усталым вздохом говорит [colonist.GetName]. — «Эта земля создана для пиратов и налётчиков, а не для земледельцев и торговцев. Почва скудная, побережье опасное, а пираты всё ещё рыщут по водам и холмам. Я не смогу сделать её процветающей без вашей помощи — и даже тогда боюсь, что она так и не окупится».\n\nЯ смогу удержать эти земли под своей властью, но окупятся ли расходы, если эти земли так же бесплодны, как утверждает [colonist.GetFirstNameNoTooltip]? И всё же мой долг — поддерживать вассалов в нужде, ведь если я этот долг нарушу, никто не знает, как долго они останутся верны — или вообще останутся вассалами."
 agot_pirate_events.9201.a:0 "У тебя будет нужное количество золота."
 agot_pirate_events.9201.b:0 "Это твоя ответственность, от меня ты ничего не получишь."
 agot_pirate_events.9201.b.tt:0 "[colonist.GetTitledFirstNameNoTooltip] может плохо воспринять это решение."

 agot_pirate_events.9300.t:0 "Existential Threat"
 agot_pirate_events.9300.desc:0 "[attacker.GetName] has launched an invasion to disrupt piracy in the region. Given the severity of their threat, we have automatically joined forces with our suzerain, [defender.GetName]!\n\nShould we lose, our territory will be reduced to wilderness and our pirate ships scattered."
 agot_pirate_events.9300.a:0 "We must prevail."

