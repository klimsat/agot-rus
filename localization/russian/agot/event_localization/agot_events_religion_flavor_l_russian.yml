l_russian:
 pregnancy.1001.motheroffering:0 "Я сделаю подношение Матери."
 pregnancy.1001.motheroffering.self:0 "Чтобы она проследила за моей беременностью."
 pregnancy.1001.motheroffering.father:0 "Чтобы она присматривала за моей женой."
 pregnancy.1001.motheroffering.deadhusband:0 "Чтобы его последний дар мне не был утерян..."

 agot_religion_flavor.0002.t:0 "Помогая потерянным"
 agot_religion_flavor.0002.desc:0 "Битва подходит к концу, мы победили, но какой ценой? Падальщики уже слетаются на поле сражения, готовые обобрать мертвых и умирающих. Септон, сопровождающий наши войска, подходит ко мне и спрашивает, не можем ли мы освятить небольшое святилище, чтобы Неведомый помог тем, кто умер сегодня."
 agot_religion_flavor.0002.a:0 "Мы соорудим небольшое святилище в честь Неведомого."
 agot_religion_flavor.0002.b:0 "Мы должны сделать больше, проклятье, даже построить небольшое сооружение!"
 agot_religion_flavor.0002.c:0 "Мёртвые мертвы, мы больше не можем им помочь..."

 agot_religion_flavor.0100.t:0 "The Maiden's Day"
 agot_religion_flavor.0100.desc:0 "As I begin my daily routines, I find myself absently overhearing conversations around me. After a short time I notice that the talk of the court is the Maiden's Day — and it happens to be today.\n\nAll unmarried maidens are expected to make a pilgrimage to the nearby sept to light candles at the statue of the Maiden's feet and hang parchment garlands around her neck.\n\nAlthough the significance of the day had almost slipped past me, I still must decide how I should prepare for the day's events..."
 agot_religion_flavor.0100.a:0 "Perhaps I will donate some gold."
 agot_religion_flavor.0100.b:0 "I should volunteer to help at the Sept."
 agot_religion_flavor.0100.c:0 "I am far too busy to partake in any of the events this year..."
 agot_religion_flavor.0100.d:0 "[maiden_daughter.GetName], my young [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('maiden_daughter'))], should certainly attend."
 agot_religion_flavor.0100.e:0 "[maiden_daughter.GetName], my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('maiden_daughter'))], should certainly attend."
 agot_religion_flavor.0100.f:0 "I will make the pilgrimage myself and attend."
 agot_religion_flavor.0100.g:0 "I should attend... but I have not the time."
 agot_religion_flavor.0100.g.tt:0 "You attempt to shirk your duties, but #bold someone#! may be on the lookout."
 agot_religion_flavor.0100.h:0 "Maybe I will go and bask in the songs of the day."
 agot_listened_to_songs:0 "You spent the day listening to the songs."

 agot_religion_flavor.0101.t:0 "Arriving at the Sept"
 agot_religion_flavor.0101.desc:0 "The stairs before me seem as if they rise into the heavens themselves. At the top sat the marble walls and golden domed roof of the Sept — a beacon that beckons all those of the Faith to come within its walls for salvation. Surrounding me are other maidens of the realm, coming to celebrate this holy day alongside me.\n\nAs I ascend the stairs I prepare for the day of prayer and song that will be forthcoming, as we all celebrate our innocence together..."
 agot_religion_flavor.0101.a:0 "Time to sing, dance, and pray"

 agot_religion_flavor.0102.t:0 "Lighting the Seven Candles"
 agot_religion_flavor.0102.desc:0 "I approach the statue of the Maiden, a thin piece of wood that would be used to light the seven candles in the firm grip of my hand and a parchment garland hanging from my wrist. I slowly approach the foot of the statue, placing the parchment garland around the neck of the statue. It falls to rest on top of the garlands the other maidens had placed.\n\nKneeling before the statue, I rest the tip of the tinder into another candle's flame until I capture my own. Steadily, I light the seven candles before me in the exact way that I had been taught by the Septa. Once all seven are lit I place my hands together and prepare to pray..."
 agot_religion_flavor.0102.a:0 "Pray to the Seven Who Are One"

 agot_religion_flavor.0103.t:0 "The Septa Sees All"
 agot_religion_flavor.0103.desc:0 "The mere thought of attending the Maiden's Day festivities bores me; I have so many other things that I ought to do that are far more important. And if I decide to attend to such matters rather than attend these frivolous activities, which only serve to waste my precious time? Surely, I will not be missed.\n\nAs I stroll about my gardens, I hear a hemming sound from behind me. I turn to see [maiden_day_septa.GetName] standing behind me, [maiden_day_septa.GetHerHis] face painted with a smile that one could tell was hiding irritation.\n\n"My child, why are you not preparing for the Maiden's Day festivities? You really should be going, you don't want to be late, do you?""
 agot_religion_flavor.0103.a:0 "How very bold of you to presume to tell me where I should be."
 agot_religion_flavor.0103.b:0 "Why would I go, I am no maiden anymore." #get rekt
 agot_religion_flavor.0103.b.tt:0 "Such a claim may not be without consequence..."
 agot_religion_flavor.0103.b.toast:0 "[maiden_day_septa.GetName] has denounced you as a fornicator to the realm."
 agot_religion_flavor.0103.c:0 "Fine, I will attend the festivities."

 agot_religion_flavor.0105.t:0 "Defiant... as Always"
 agot_religion_flavor.0105.desc:0 "Maiden's Day is upon us. I go to [maiden_daughter.GetFirstNamePossessive] chambers, only to see [maiden_daughter.GetSheHe] has not made preparations to leave.\n\n"Why are you not ready? We must leave for the Sept soon."\n\n"I have higher obligations than to be lectured by a hag of a Septa about my maidenhood," [maiden_daughter.GetSheHe] states with an annoyed tone.\n\nI wonder, not for the first time, why things with [maiden_daughter.GetHerHim] must always be so difficult, regardless of what they were..."
 agot_religion_flavor.0105.a:0 "My dear, please go. You know it unwise to defy the Septas." #defying gravity
 agot_religion_flavor.0105.a.tt:0 "You attempt to reason with [maiden_daughter.GetName]"
 agot_religion_flavor.0105.b:0 "As servants of the Faith, it is our duty to attend."
 agot_religion_flavor.0105.c:0 "How dare this insolent child disobey me!"
 agot_religion_flavor.0105.c.tt:0 "You teach [maiden_daughter.GetFirstNameNoTooltip] a lesson by slapping [maiden_daughter.GetHerHim] across her face" #do not condone
 msg_went_to_celebrations:0 "[maiden_daughter.GetSheHe] relents and attends the festival."

 agot_religion_flavor.0106.t:0 "A Child of the Faith"
 agot_religion_flavor.0106.desc:0 "Maiden's Day is upon us once again. I go to [maiden_daughter.GetNamePossessive] chambers to check on [maiden_daughter.GetHerHis] progress getting prepared, opening the door slightly to peek inside, expecting [maiden_daughter.GetHerHim] to be fast asleep... only to see that [maiden_daughter.GetHerHis] hair is already done up in a ornate braid and [maiden_daughter.GetSheHe] is the process of putting on [maiden_daughter.GetHerHis] gown!\n\nI silently close the chamber door, pride filling my heart. I return to the entrance hall to wait and once [maiden_daughter.GetSheHe] is finished getting ready, [maiden_daughter.GetSheHe] comes to find me; embracing me before [maiden_daughter.GetSheHe] leaves for the Sept." #get it girl
 agot_religion_flavor.0106.a:0 "I'm so proud I've raised such a responsible child."

 agot_religion_flavor.0108.t:0 "Tantrum for the Ages"
 agot_religion_flavor.0108.desc:0 "With a huff, [ROOT.Char.Custom2('direct_address_by_familiarity', maiden_daughter)] throws [maiden_daughter.GetHerselfHimself] down on [maiden_daughter.GetHerHis] bed, crossing [maiden_daughter.GetHerHis] arms across [maiden_daughter.GetHerHis] chest.\n\n"I meant what I said! I will not be going to some stuffy, outdated festival!" [maiden_daughter.GetSheHe] declares, defiant. "Who wants to spend their entire day singing songs and braiding each other's hair?! It's boring and a pointless waste of time!""
 agot_religion_flavor.0108.a:0 "I'll give us #bold both#! space to cool down."
 agot_religion_flavor.0108.a.tt:0 "Frustrated, you leave [maiden_daughter.GetHerHim] to [maiden_daughter.GetHerselfHimself]"

 agot_religion_flavor.0109.t:0 "Not a Maiden Anymore"
 agot_religion_flavor.0109.desc:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', maiden_daughter)|U] seems nervous as [maiden_daughter.GetSheHe] speaks to me. "May I be truthful, [maiden_daughter.Custom2('spoken_address_by_familiarity', ROOT.Char )]?"\n\nI nervously nod yes, anticipation building inside me before [maiden_daughter.GetSheHe] continues.\n\n"I no longer have my maidenhead..." [maiden_daughter.GetNameNoTooltip] whispers."
 agot_religion_flavor.0109.a:0 "..."
 agot_religion_flavor.0109.a.tt:0 "Shocked and saddened, you leave [maiden_daughter.GetHerHis] chambers unsure of what to do or say."
 agot_religion_flavor.0109.b:0 "You have lost your maidenhead while #bold unmarried#!?!"

 agot_religion_flavor.0110.t:0 "A Little Help Before The Event"
 agot_religion_flavor.0110.desc:0 "Maiden's Day is upon us once again. I go to [maiden_daughter.GetNamePossessive] chambers to check on [maiden_daughter.GetHerHis] progress. Slowly opening [maiden_daughter.GetHerHis] door to peek inside, only to see [maiden_daughter.GetHerHim] dressed, but struggling to braid [maiden_daughter.GetHerHis] hair on [maiden_daughter.GetHerHis] own. I open the door fully and walk inside\n\nImmediately [maiden_daughter.GetSheHe] notices me and asks: "[maiden_daughter.Custom2('spoken_address_by_familiarity', ROOT.Char )|U], would you be able to braid my hair?" I smile and nod yes. I grab [maiden_daughter.GetHerHis] hairbrush and gently brush out any knots before putting [maiden_daughter.GetHerHis] hair into a beautiful braided updo..."
 agot_religion_flavor.0110.a:0 "What a wonderful bonding experience!"
 agot_religion_flavor.0110.a.tt:0 "[maiden_daughter.GetName] will attend the festival"

 agot_religion_flavor.0111.t:0 "A Morning Stroll to the Sept"
 agot_religion_flavor.0111.desc:0 "With Maiden's Day upon us, all the maidens of the realm are expected to attend festivities at the Sept. [ROOT.Char.Custom2('direct_address_by_familiarity', maiden_daughter)|U] is far too young to attend on [maiden_daughter.GetHerHis] own, so I will have to walk with [maiden_daughter.GetHerHim]. Once [maiden_daughter.GetSheHe] has put on [maiden_daughter.GetHerHis] gown made specially for the day and is ready, [maiden_daughter.GetSheHe] holds out [maiden_daughter.GetHerHis] tiny hand, waiting patiently for me to take it.\n\n[maiden_daughter.GetSheHe|U] smiles sweetly as I hold [maiden_daughter.GetHerHis] hand in mine, and we make our way to the Sept. We spend so much time talking and giggling during the journey that I realize that we're already almost there in no time at all..."
 agot_religion_flavor.0111.a:0 "I hope she enjoys the festivities..."

 agot_religion_flavor.0112.t:0 "The Muse"
 agot_religion_flavor.0112.desc:0 "While listening to the festive songs, my eyes keep falling upon one particular maiden. As I watch [maiden_day_muse.GetHerHim] sing and dance, I find myself trying to find a way to position myself closer to [maiden_day_muse.GetHerHim]...\n\nI am able to get close enough to hear [maiden_day_muse.GetHerHis] lovely voice, [maiden_day_muse.GetHerHis] beauty only enhancing the appeal of the songs. When [maiden_day_muse.GetSheHe] finishes singing, I strike up a conversation with [maiden_day_muse.GetHerHim]. I have no doubt that [maiden_day_muse.GetFirstNameNicknamed] was sent by the gods, but is there something more here?"
 agot_religion_flavor.0112.a:0 "The gods bless us with [maiden_day_muse.GetHerHim] voice..."
 agot_religion_flavor.0112.a.tt:0 "You spend the day listenting to [maiden_day_muse.GetHerHim] songs"
 agot_religion_flavor.0112.b:0 "Perhaps we should find a place where we can be alone?"
 agot_religion_flavor.0112.b.tt:0 "You attempt to woo the beautiful maiden"
 msg_got_rejected_by_muse:0 "[maiden_day_muse.GetFirstNameNoTooltip] rejects your advances, returning to the festivities."

 agot_religion_flavor.0113.t:0 "Love in the Air"
 agot_religion_flavor.0113.desc:0 "Before long, I am alone with [maiden_day_muse.GetName], far from watchful eyes. The air between us is charged, every glance and movement drawing us closer still, until even silence feels heavy with unspoken intent.\n\nIt is not long before restraint gives way entirely, and we lose ourselves to the moment, the world beyond fading into nothing as we give in to what has been building between us."
 agot_religion_flavor.0113.a:0 "Perhaps this is a sign from the gods to marry [maiden_day_muse.GetHerHim]."
 agot_religion_flavor.0113.b:0 "This cannot be the last time I see [maiden_day_muse.GetHerHim]."
 agot_religion_flavor.0113.c:0 "It was only a passing moment. Nothing more."