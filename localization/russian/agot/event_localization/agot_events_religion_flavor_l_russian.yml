l_russian:
 pregnancy.1001.motheroffering:0 "Я сделаю подношение Матери."
 pregnancy.1001.motheroffering.self:0 "Чтобы она проследила за моей беременностью."
 pregnancy.1001.motheroffering.father:0 "Чтобы она присматривала за моей женой."
 pregnancy.1001.motheroffering.deadhusband:0 "Чтобы его последний дар мне не был утерян..."

 agot_religion_flavor.0002.t:0 "Помогая потерянным"
 agot_religion_flavor.0002.desc:0 "Битва подходит к концу, мы победили, но какой ценой? Падальщики уже слетаются на поле сражения, готовые обобрать мертвых и умирающих. Септон, сопровождающий наши войска, подходит ко мне и спрашивает, не можем ли мы освятить небольшое святилище, чтобы Неведомый помог тем, кто умер сегодня."
 agot_religion_flavor.0002.a:0 "Мы соорудим небольшое святилище в честь Неведомого."
 agot_religion_flavor.0002.b:0 "Мы должны сделать больше, проклятье, даже построить небольшое сооружение!"
 agot_religion_flavor.0002.c:0 "Мёртвые мертвы, мы больше не можем им помочь..."

 agot_religion_flavor.0100.t: "День Девы"
 agot_religion_flavor.0100.desc: "Приступая к своим повседневным обязанностям, я ловлю себя на том, что рассеянно прислушиваюсь к разговорам вокруг меня. Через некоторое время я замечаю, что все разговоры при дворе ведутся о Дне Девы — и так случилось, что это сегодня.\n\nОжидается, что все незамужние девушки совершат паломничество в близлежащую септу, чтобы зажечь свечи у ног статуи Девы и повесить ей на шею пергаментные гирлянды.\n\nХотя значение этого дня почти ускользнуло от меня, я всё ещё [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, как мне подготовиться к событиям этого дня..."
 agot_religion_flavor.0100.a: "Возможно, я пожертвую немного золота."
 agot_religion_flavor.0100.b: "Я вызовусь на помощь в септе."
 agot_religion_flavor.0100.c: "Я слишком [Select_CString(ROOT.Char.IsFemale, 'занята', 'занят' )], чтобы принять участие в каких-либо мероприятиях в этом году..."
 agot_religion_flavor.0100.d: "[maiden_daughter.GetName], [Select_CString(maiden_daughter.IsFemale, 'моя юная', 'мой юный' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('maiden_daughter'))], безусловно, [Select_CString(maiden_daughter.IsFemale, 'должна', 'должен' )] присутствовать."
 agot_religion_flavor.0100.e: "[maiden_daughter.GetName], [Select_CString(maiden_daughter.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('maiden_daughter'))], безусловно, [Select_CString(maiden_daughter.IsFemale, 'должна', 'должен' )] присутствовать."
 agot_religion_flavor.0100.f: "Я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )] совершу паломничество и приму участие."
 agot_religion_flavor.0100.g: "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] присутствовать... но у меня нет времени."
 agot_religion_flavor.0100.g.tt: "Вы пытаетесь уклониться от своих обязанностей, но #bold кто-то#! может быть начеку."
 agot_religion_flavor.0100.h: "Возможно, я пойду и буду наслаждаться песнями этого дня."
 agot_listened_to_songs: "Вы провели весь день, слушая песни."

 agot_religion_flavor.0101.t: "Прибытие в септу"
 agot_religion_flavor.0101.desc: "Лестница передо мной, кажется, поднимается прямо в небеса. На самом верху возвышаются мраморные стены и золотой купол крыши септы — маяк, который манит всех верующих войти в её стены ради спасения. Меня окружают другие девушки державы, которые пришли отпраздновать этот святой день вместе со мной.\n\nПоднимаясь по лестнице, я готовлюсь к предстоящему дню молитв и пения, когда мы все вместе отпразднуем нашу невинность..."
 agot_religion_flavor.0101.a: "Время петь, танцевать и молиться."

 agot_religion_flavor.0102.t: "Зажжение семи свечей"
 agot_religion_flavor.0102.desc: "Я подхожу к статуе Девы, крепко сжимаю в руке тонкий кусок дерева, который используется для зажжения семи свечей, и пергаментную гирлянду, свисающую с запястья. Я медленно подхожу к подножию статуи и вешаю пергаментную гирлянду на шею статуи. Она опускается поверх гирлянд, которые повесили другие девушки.\n\nОпустившись на колени перед статуей, я подношу кончик трута к пламени другой свечи, пока не зажгу свою. Постепенно я зажигаю семь свечей перед собой точно так, как меня научила септа. Как только зажигаются все семь, я складываю руки вместе и готовлюсь молиться..."
 agot_religion_flavor.0102.a: "Вознести молитву Семи ликам Единого."

 agot_religion_flavor.0103.t: "Септа видит всё"
 agot_religion_flavor.0103.desc: "Одна мысль о том, чтобы посетить празднование Дня Девы, наводит на меня скуку; у меня так много других дел, которые я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] сделать, и которые гораздо важнее. А что, если я решу заняться этими делами, а не посещать эти легкомысленные мероприятия, которые только отнимают у меня драгоценное время? Конечно, по мне никто не будет скучать.\n\nПрогуливаясь по своему саду, я слышу позади себя шуршащий звук. Я оборачиваюсь и вижу, что позади меня стоит [maiden_day_septa.GetName], на [maiden_day_septa.GetHerHis] лице появилась улыбка, за которой, как можно было догадаться, скрывалось раздражение.\n\n«Дитя моё, почему ты не готовишься к празднованию Дня Девы? Тебе действительно пора идти, ты же не хочешь опоздать, правда?»"
 agot_religion_flavor.0103.a: "Как смело с твоей стороны говорить мне, где я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] быть."
 agot_religion_flavor.0103.b: "Зачем мне куда-то идти, я больше не дева." #get rekt
 agot_religion_flavor.0103.b.tt: "Такое заявление не пройдёт незамеченным..."
 agot_religion_flavor.0103.b.toast: "[maiden_day_septa.GetName] объявляет вас [Select_CString(ROOT.Char.IsFemale, 'прелюбодейкой', 'прелюбодеем' )] всей державе."
 agot_religion_flavor.0103.c: "Хорошо, я приду на празднование."

 agot_religion_flavor.0105.t: "[Select_CString(maiden_daughter.IsFemale, 'Непокорная', 'Непокорный' )]... как всегда"
 agot_religion_flavor.0105.desc: "Настал День Девы. Я захожу в покои только для того, чтобы увидеть, что [maiden_daughter.GetFirstName] не [Select_CString(maiden_daughter.IsFemale, 'подготовилась', 'подготовился' )] к отъезду.\n\n«Почему ты не [Select_CString(maiden_daughter.IsFemale, 'готова', 'готов' )]? Нам скоро нужно отправляться в септу».\n\n«У меня есть более важные дела, чем выслушивать нотации от ведьмы-септы о моем девичестве», - раздраженно заявляет [maiden_daughter.GetSheHe].\n\nЯ уже не в первый раз задаюсь вопросом, почему отношения с [Select_CString(maiden_daughter.IsFemale, 'ней', 'ним' )] всегда такие сложные, какими бы они ни были..."
 agot_religion_flavor.0105.a: "[Select_CString(maiden_daughter.IsFemale, 'Моя дорогая', 'Мой дорогой' )], пожалуйста, иди. Ты знаешь, что перечить септам неразумно." #defying gravity
 agot_religion_flavor.0105.a.tt: "Вы попытаетесь урезонить персонажа [maiden_daughter.GetName]"
 agot_religion_flavor.0105.b: "Как слуги веры, мы обязаны присутствовать при этом."
 agot_religion_flavor.0105.c: "Как это наглое дитя смеет перечить мне!"
 agot_religion_flavor.0105.c.tt: "Вы преподадите урок персонажу [maiden_daughter.GetFirstNameNoTooltip], ударив [maiden_daughter.GetHerHis] по лицу" #do not condone
 msg_went_to_celebrations: "[maiden_daughter.GetSheHe] смягчается и идёт на праздник."

 agot_religion_flavor.0106.t: "Дитя веры"
 agot_religion_flavor.0106.desc: "Снова наступил День Девы. Я иду в покои, чтобы проверить, как [maiden_daughter.GetName] готовится, приоткрываю дверь, чтобы заглянуть внутрь, ожидая, что [maiden_daughter.GetSheHe] крепко спит... только чтобы увидеть, что [maiden_daughter.GetHerHis] волосы уже заплетены в богато украшенную косу, и [maiden_daughter.GetSheHe] как раз надевает платье!\n\nЯ тихо закрываю дверь комнаты, гордость переполняет моё сердце. Я возвращаюсь в вестибюль, чтобы подождать, и как только [maiden_daughter.GetSheHe] заканчивает собираться, [maiden_daughter.GetSheHe] приходит ко мне и обнимает меня, прежде чем уйти в септу." #get it girl
 agot_religion_flavor.0106.a: "Я так горжусь, что [Select_CString(ROOT.Char.IsFemale, 'вырастила', 'вырастил' )] такого ответственного ребёнка."

 agot_religion_flavor.0108.t: "Истерика на века"
 agot_religion_flavor.0108.desc: "Раздражённо [ROOT.Char.Custom2('direct_address_by_familiarity', maiden_daughter)] бросается на кровать и скрещивает руки на груди.\n\n«Я [Select_CString(maiden_daughter.IsFemale, 'имела', 'имел' )] в виду то, что [Select_CString(maiden_daughter.IsFemale, 'сказала', 'сказал' )]! Я не пойду на какой-то скучный, устаревший праздник!» - с вызовом заявляет [maiden_daughter.GetSheHe]. «Кому захочется весь день распевать песни и заплетать друг другу косички?! Это скучная и бессмысленная трата времени!»"
 agot_religion_flavor.0108.a: "Я дам нам #bold обоим#! время остыть."
 agot_religion_flavor.0108.a.tt: "[Select_CString(ROOT.Char.IsFemale, 'Разочарованная', 'Разочарованный' )], вы предоставляете [Select_CString(maiden_daughter.IsFemale, 'её самой', 'его самому' )] себе"

 agot_religion_flavor.0109.t: "Больше не девица"
 agot_religion_flavor.0109.desc: "[ROOT.Char.Custom2('direct_address_by_familiarity', maiden_daughter)|U], кажется, нервничает, когда говорит со мной. «Могу я быть [Select_CString(maiden_daughter.IsFemale, 'честной', 'честным' )], [maiden_daughter.Custom2('spoken_address_by_familiarity', ROOT.Char )]?»\n\nЯ нервно киваю в знак согласия, предчувствие нарастает во мне, прежде чем [maiden_daughter.GetSheHe] продолжает.\n\n«У меня больше нет девственности...», - шепчет [maiden_daughter.GetNameNoTooltip]."
 agot_religion_flavor.0109.a: "..."
 agot_religion_flavor.0109.a.tt: "[Select_CString(ROOT.Char.IsFemale, 'Потрясённая и опечаленная', 'Потрясённый и опечаленный' )], вы покидаете [maiden_daughter.GetHerHis] покои, не зная, что делать или сказать."
 agot_religion_flavor.0109.b: "Ты потеряла свою девственность, будучи #bold незамужней#!?!"

 agot_religion_flavor.0110.t: "Небольшая помощь перед праздником"
 agot_religion_flavor.0110.desc: "Снова наступил День Девы. Я иду в покои, чтобы проверить, как справляется [maiden_daughter.GetName]. Медленно приоткрываю дверь, чтобы заглянуть внутрь, и вижу, что [Select_CString(maiden_daughter.IsFemale, 'она одета', 'он одет' )], но пытается самостоятельно заплести волосы. Я полностью открываю дверь и вхожу внутрь.\n\n[Select_CString(maiden_daughter.IsFemale, 'Она', 'Он' )] сразу же замечает меня и спрашивает: «[maiden_daughter.Custom2('spoken_address_by_familiarity', ROOT.Char )|U], ты не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы заплести мне косу?» Я улыбаюсь и утвердительно киваю. Я беру [maiden_daughter.GetHerHis] расческу и аккуратно расчёсываю все узлы, прежде чем заплести [Select_CString(maiden_daughter.IsFemale, 'ей', 'ему' )] волосы в красивую причёску..."
 agot_religion_flavor.0110.a: "Какой замечательный опыт сближения!"
 agot_religion_flavor.0110.a.tt: "[maiden_daughter.GetName] примет участие на празднике"

 agot_religion_flavor.0111.t: "Утренняя прогулка в септу"
 agot_religion_flavor.0111.desc: "В преддверии Дня Девы все девы державы должны посетить торжества в септе. [ROOT.Char.Custom2('direct_address_by_familiarity', maiden_daughter)|U] слишком [Select_CString(maiden_daughter.IsFemale, 'мала', 'мал' )], чтобы присутствовать на них самостоятельно, поэтому мне придётся сопровождать [maiden_daughter.GetHerHis]. Надев платье, сшитое специально для этого дня, и приведя себя в порядок, [maiden_daughter.GetSheHe] протягивает мне свою крошечную ручку, терпеливо ожидая, когда я возьму её.\n\n[maiden_daughter.GetSheHe|U] мило улыбается, когда я беру [maiden_daughter.GetHerHis] за руку, и мы направляемся в септу. Мы проводим так много времени за разговорами и смехом во время путешествия, что я понимаю, что мы уже почти на месте в мгновение ока..."
 agot_religion_flavor.0111.a: "Я надеюсь, [Select_CString(maiden_daughter.IsFemale, 'ей', 'ему' )] понравится праздник..."

 agot_religion_flavor.0112.t: "Муза"
 agot_religion_flavor.0112.desc: "Слушая праздничные песни, мой взгляд то и дело останавливается на одной девушке. Наблюдая, как [maiden_day_muse.GetSheHe] поёт и танцует, я ловлю себя на том, что пытаюсь найти способ расположиться к ней поближе...\n\nЯ могу подойти достаточно близко, чтобы услышать [maiden_day_muse.GetHerHis] прекрасный голос, [maiden_day_muse.GetHerHis] красота только усиливает привлекательность песен. Когда [maiden_day_muse.GetSheHe] заканчивает петь, я завязываю с [Select_CString(maiden_day_muse.IsFemale, 'ней', 'ним' )] разговор. Я не сомневаюсь, что [maiden_day_muse.GetFirstNameNicknamed] [Select_CString(maiden_day_muse.IsFemale, 'была послана', 'был послан' )] богами, но есть ли здесь что-то ещё?"
 agot_religion_flavor.0112.a: "Боги благословили нас [maiden_day_muse.GetHerHis] голосом..."
 agot_religion_flavor.0112.a.tt: "Вы проводите весь день, слушая [maiden_day_muse.GetHerHis] песни"
 agot_religion_flavor.0112.b: "Может, нам стоит найти место, где мы могли бы побыть одни?"
 agot_religion_flavor.0112.b.tt: "Вы попытаетесь ухаживать за прекрасной девой."
 msg_got_rejected_by_muse: "[maiden_day_muse.GetFirstNameNoTooltip] отвергает ваши ухаживания, возвращаясь к празднествам."

 agot_religion_flavor.0113.t: "Любовь витает в воздухе"
 agot_religion_flavor.0113.desc: "Вскоре я и [maiden_day_muse.GetName] остаёмся наедине, вдали от бдительных глаз. Воздух между нами накаляется, каждый взгляд и движение ещё больше сближают нас, пока даже молчание не становится тяжёлым от невысказанных намерений.\n\nПроходит совсем немного времени, и сдержанность полностью отступает, и мы теряемся в настоящем, а окружающий мир превращается в ничто, когда мы отдаёмся тому, что возникло между нами."
 agot_religion_flavor.0113.a: "Возможно, это знак богов, что пора [Select_CString(ROOT.Char.IsFemale, 'выходить замуж за', 'жениться на' )] [Select_CString(maiden_day_muse.IsFemale, 'ней', 'него' )]."
 agot_religion_flavor.0113.b: "Наверняка это не последний раз, когда я увижу [maiden_day_muse.GetHerHis]."
 agot_religion_flavor.0113.c: "Это было всего лишь мимолётное мгновение. Ничего больше."