 # Rescue War Saves Aerys Instead #
 ##################################

 ## Rescue War Successful, Aerys is Saved//Same options as Barristan rescue successful
 ## Side version sent to Rhaegar as context event that siege was won
 # available scopes: rescue_war_winner(will be Tywin or Rhaegar)/denys/renfred/viserys
 agot_scenario_dd.0100.t: "Осада Сумеречного Дола"
 agot_scenario_dd.0100.desc.aerys: "Я снова чувствую открытый воздух на своей коже, позволяя солнцу поцеловать меня. [rescue_war_winner.GetTitledFirstName] [Select_CString(rescue_war_winner.IsFemale, 'спасла', 'спас' )] меня, освободив от мучений и мрака темницы.\n\nЯ мечтал уйти в лучшее окружение; вместо этого меня выводят к бушующим пожарам и умирающим глупцам. Птицы-падальщики пируют, а дым поднимается из Сумеречного форта. Мой совет ждет меня за стенами, я свободен лишь короткое время, но они уже шумят. Они задаются вопросом, что делать с домом Дарклинов, проклятыми изменниками.\n\nОни не могут сохранить свои земли, но должны ли они все умереть? С ужасами моей темницы в памяти, мне предстоит решить. А вопрос об их землях не за горами.\n\n[renfred.GetTitledFirstName] — хороший и верный вассал, возможно, земли Дарклинов должны перейти к нему. Или, возможно, эти земли должен получить [viserys.GetTitledFirstName], мой младший сын."
 # Rhaegar
 agot_scenario_dd.0100.desc.rhaegar: "[rescue_war_winner.GetTitledFirstName] [Select_CString(rescue_war_winner.IsFemale, 'добилась', 'добился' )] успеха, ворота были прорваны. Сумеречный Дол горит, и его люди кричат от ужаса и агонии, пока город разграбляется, но по крайней мере мой отец обрел свободу.\n\nОднако я уже вижу перемену в нем; он никогда не будет прежним. Прежде чем я смогу задуматься о будущем, я должен разобраться с настоящим. С освобождением моего отца предстоит решить, кто получит земли дома Дарклин.\n\nЯ всем сердцем верю, что мой брат, [viserys.GetTitledFirstName], — правильный выбор."

 # Aerys
 agot_scenario_dd.0100.opt.a: "Дом Риккер получит земли, и держава узнает мою ярость."
 agot_scenario_dd.0100.opt.b: "Дом Риккер получит земли, но сперва мы убедимся, что изменники больше никогда не будут владеть землями."
 agot_scenario_dd.0100.opt.c: "Дом Таргариен получит земли, и держава узнает мою ярость."
 agot_scenario_dd.0100.opt.d: "Дом Таргариен получит земли, но сперва мы убедимся, что изменники больше никогда не будут владеть землями."
 # Rhaegar
 agot_scenario_dd.0100.opt.e: "Наконец-то мой отец свободен."

 # Aerys
 agot_scenario_dd.0100.a.tt: "Вы возвращаетесь в Королевскую Гавань, но не раньше, чем уничтожите Дарклинов и Холлардов. Дом Риккер получит Сумеречный Дол."
 agot_scenario_dd.0100.b.tt: "Вы передаете Сумеречный Дол дому Риккер и лишаете Дарклинов и Холлардов земель и притязаний."
 agot_scenario_dd.0100.c.tt: "Вы возвращаетесь в Королевскую Гавань, но не раньше, чем уничтожите Дарклинов и Холлардов. Дом Таргариен получит Сумеречный Дол."
 agot_scenario_dd.0100.d.tt: "Вы передаете Сумеречный Дол дому Таргариен и лишаете Дарклинов и Холлардов земель и притязаний."
 # Rhaegar
 agot_scenario_dd.0100.e.tt: "Вы возвращаетесь на Драконий Камень после спасения короля."

 ## Rescue war successful, shows to rescue war winner; rescue war winner takes Darklyn VS Stalwart
 # available scopes: rescue_war_winner(will be Tywin or Rhaegar)/denys/aerys/rhaegar/tywin/duskendale
 agot_scenario_dd.0111.t: "$agot_scenario_dd.0100.t$"
 # Tywin
 agot_scenario_dd.0111.desc.tywin: "Война окончена! Мои войска пробили ворота города [duskendale.GetNameNoTier] и захватили Сумеречный форт. Я разрешил своим людям разграбить город — мы были здесь долгие месяцы, и они заслужили добычу. Я смотрю на бушующие пожары и умирающих жителей Сумеречного Дола, какая трата...\n\nЯ переступаю через солдата Дарклинов, оставленного гнить на окровавленной улице, отражение ближайшего огня играет на поверхности его меча. Тогда мне приходит в голову, что валирийский меч дома Дарклинов, [stalwart.GetName], находится здесь. Я уже давно хотел заменить Светлый Рёв...\n\nЯ должен заполучить его!"
 # Rhaegar
 agot_scenario_dd.0111.desc.rhaegar: "Война окончена, [duskendale.GetNameNoTier] захвачен. Я отдал приказы пощадить невинных, но управлять осаждающим войском — все равно что управлять приливами. Уже ярость переполняет этот древний порт, крики невинных заглушают любое оправдание, которое могло бы быть у этой битвы.\n\nУ моих ног лежит мертвый солдат Дарклинов, его безжизненные глаза смотрят на последнее небо, которое он видел, и я задаюсь вопросом, может ли из этого выйти что-то хорошее. Меч человека отражает мое лицо, и я вспоминаю про [stalwart.GetName], родовой меч дома Дарклинов.\n\nВозможно, я смогу пустить его в дело."
 # Tywin
 agot_scenario_dd.0111.opt.a: "Я заберу меч у самого Дениса!"
 agot_scenario_dd.0111.opt.b: "Обыщите замок! Я хочу этот меч!"
 # Rhaegar
 agot_scenario_dd.0111.opt.c: "Я заберу меч у Дениса."
 agot_scenario_dd.0111.opt.d: "Мы обыщем замок."
 # Tywin
 agot_scenario_dd.0111.a.tt: "Вы отнимете валирийский меч [stalwart.GetName] у дома Дарклин."
 agot_scenario_dd.0111.b.tt: "Вы обыщете замок в поисках валирийского меча [stalwart.GetName], принадлежащего дому Дарклин."
 # Rhaegar
 agot_scenario_dd.0111.c.tt: "$agot_scenario_dd.0111.a.tt$"
 agot_scenario_dd.0111.d.tt: "$agot_scenario_dd.0111.b.tt$"



 ###############################
 # Barristan the Bold Requests #
 ###############################

 ## Barristan wants to rescue the King, Sent to Tywin
 # available scopes: selmy/aerys/tywin/rhaegar/maelys/duskendale
 agot_scenario_dd.0195.t: "Барристан Отважный"
 agot_scenario_dd.0195.desc: "Пока мы планируем, как штурмовать [duskendale.GetNameNoTier], вмешивается сир [selmy.GetFirstNameNicknamed]. У него есть собственный план спасения короля, настолько опасный, что его можно назвать невозможным. Либо он оправдывает свое прозвище, либо он самый глупый рыцарь, когда-либо носивший белый плащ.\n\nНесмотря на мой скептицизм, я должен признать, что сир Барристан — опытный рыцарь и непревзойденный воин. Если бы был человек, способный осуществить такой план, это был бы тот, от чьей руки пал [maelys.GetFirstNameNicknamed]. Однако, как я сказал Малому совету, если мы потеряем короля — у нас будет лучший король, и это [rhaegar.GetTitledFirstName]. Даже если я отложу атаку, чтобы позволить это, начинать с такого — безрассудство.\n\nТем не менее, решение должно быть принято."

 agot_scenario_dd.0195.opt.a: "Барристан может попробовать осуществить свой замысел, хотя я не буду долго ждать."
 agot_scenario_dd.0195.opt.b: "Я не могу позволить ему это."

 agot_scenario_dd.0195.a.tt: "Вы позволяете Барристану отправиться на свою миссию."
 agot_scenario_dd.0195.b.tt: "Вы запрещаете Барристану уходить."

 ## Tywin refuses Barristans rescue attempt but Rhaegar can choose otherwise
 # available scopes: selmy/aerys/tywin/rhaegar/maelys/duskendale
 agot_scenario_dd.0196.t: "Слава Королевской гвардии"
 agot_scenario_dd.0196.desc: "Сир [selmy.GetFirstNameNicknamed] сообщил о своём плане спасения короля, намереваясь проникнуть в замок глубокой ночью, в одиночку и с одним лишь кинжалом. Десница короля, [tywin.GetTitledFirstName], отверг этот план и запретил его выполнение.\n\nКак наследный принц, я могу отменить его решение и отправить Барристана попытаться освободить моего отца до того, как атака на [duskendale.GetNameNoTier] поставит его жизнь под угрозу. Однако, действительно ли этот план осуществим? Может ли один человек, каким бы смелым он ни был, действительно выполнить это?"

 agot_scenario_dd.0196.opt.a: "Барристан получит свой шанс."
 agot_scenario_dd.0196.opt.b: "Я не позволю этому случиться."

 agot_scenario_dd.0196.a.tt: "Вы отправляете Барристана Селми на миссию по спасению короля из темницы Дарклинов."
 agot_scenario_dd.0196.b.tt: "Вы не позволите Барристану Селми рисковать своей жизнью таким образом."



 #############################
 # Barristan Attempt Results #
 #############################

 ## Barristan successfully rescues the King; Aerys takes Darklyn VS Stalwart
 # available scopes: aerys/viserys/selmy/denys/renfred/duskendale/iron_throne/stalwart
 agot_scenario_dd.0197.t: "Спаситель в белом"
 agot_scenario_dd.0197.desc: "Я чувствую, как мое тело дрожит и трясется, лежа в углу своей темницы. Здесь нет тепла, нет безопасности. Мое сердце бешено колотится в груди, а голова кажется легкой, как перо. Я клянусь, что вижу, как во мраке движутся тени, но, обернувшись, обнаруживаю, что в тенях ничего нет. Я едва замечаю шаги, приближающиеся ко мне, полагаю, что тюремщик снова пришел за мной.\n\nЯ смотрю сквозь дымку своих семи адов и вижу знакомую фигуру. Сир [selmy.GetFirstNameNicknamed] стоит за пределами моей темницы в одежде нищего, с окровавленным кинжалом в одной руке и ключами в другой. Прежде чем я успеваю что-то спросить, он открывает дверь, и мы начинаем двигаться. Спасение проходит как в тумане: мой королевский гвардеец рубит гарнизон, словно разрезает пирог, и, прежде чем я понимаю, что происходит, мы уже выбрались из города. Пока люди оказывают нам помощь, совет спрашивает о моих планах на Сумеречный Дол и на дома, которые им правили.\n\nЧто я должен им сказать?"

 agot_scenario_dd.0197.opt.a: "Дом Риккер получит земли. Перебить их всех, до последнего."
 agot_scenario_dd.0197.opt.b: "Просто покинем это проклятое место, передав земли дому Риккер."
 agot_scenario_dd.0197.opt.c: "Дом Таргариен получит земли. Перебить их всех, до последнего."
 agot_scenario_dd.0197.opt.d: "Просто покинем это проклятое место, передав земли дому Таргариен."

 agot_scenario_dd.0197.a.tt: "Вы сбегаете из Сумеречного Дола и приказываете казнить представителей домов Дарклин и Холлард. Дом Риккер получит Сумеречный Дол."
 agot_scenario_dd.0197.b.tt: "Вы передадите Сумеречный Дол дому Риккер и лишите Дарклинов и Холлардов земель и притязаний."
 agot_scenario_dd.0197.c.tt: "Вы сбегаете из Сумеречного Дола и приказываете казнить представителей домов Дарклин и Холлард. Дом Таргариен получит Сумеречный Дол."
 agot_scenario_dd.0197.d.tt: "Вы передадите Сумеречный Дол дому Таргариен и лишите Дарклинов и Холлардов земель и притязаний."

 ## Barristan fails and Aerys finds out he will now die
 # available scopes: aerys/viserys/tywin/selmy/denys/renfred/duskendale/iron_throne
 agot_scenario_dd.0198.t: "Отважная неудача"
 agot_scenario_dd.0198.desc: "Я вздрагиваю от звука шагов у двери. Мой тюремщик приносит мне подарок, и с глухим стуком передо мной оказывается голова. Это сир [selmy.GetFirstNameNicknamed] — один из моих лучших королевских гвардейцев. Моё тело начинает дрожать, а глаза наполняются слезами, искажающими мое зрение. Какими бы ни были его усилия, мой рыцарь не смог спасти меня. Если [tywin.GetTitledFirstName] начнёт штурм, в чём нет никаких сомнений, [denys.GetTitledFirstName] окажется в безвыходном положении - у него не останется выбора, кроме как выполнить свои угрозы и казнить меня. Шаги приближаются, и я вижу, как тюремщик зловеще ухмыляется.\n\nЯ — дракон! Я не могу умереть!"

 agot_scenario_dd.0198.opt.a: "@death_icon! Нет! Этого не может быть!"

 agot_scenario_dd.0198.a.tt: "Вас казнили в подземельях."

 ## .selmy = Lets Rhaegar know Barristan failed and Barristan/Aerys both died
 ## .war = Aerys was killed by Denys on entering the premises
 # available scopes: aerys/viserys/tywin/selmy/denys/renfred/duskendale/iron_throne
 agot_scenario_dd.0199.t.saved: "Король жив"
 agot_scenario_dd.0199.t.failed: "Король мертв"
 ##### Selmy Saved
 # Rhaegar joined war
 agot_scenario_dd.0199.desc.saved.camp: "Я просыпаюсь от звука копыт на краю лагеря. Я слышу смесь торопливых приказов и криков радости. Выйдя из палатки, я вижу, как сир [selmy.GetFirstName] останавливается на краю лагеря. На спине его лошади сидит сгорбленная и дрожащая фигура, и, когда мои глаза привыкают к свету, я вижу серебряные волосы моего отца.\n\nАвантюра, что предпринял сир [selmy.GetFirstNameNoTooltip], увенчалась успехом, король спасён. Я вздыхаю с облегчением, зная, что мне не придётся занять его место.\n\nЛагерь охвачен суетой: одни спешат поздравить рыцаря, другие занимают свои места для штурма. [tywin.GetTitledFirstName] приказал штурмовать замок, и я уже вижу, как за могучими стенами поднимаются огни."
 # Rhaegar did not join war
 agot_scenario_dd.0199.desc.saved.home: "Из лагеря, который разбил за пределами Сумеречного Дола [tywin.GetTitledFirstName], прибыл ворон. Сир [selmy.GetFirstNameNicknamed] из Королевской гвардии совершил дерзкую миссию в Сумеречный форт и спас моего отца.\n\nЯ вздыхаю с облегчением, зная, что мне не придется занять его место на Железном троне, по крайней мере, пока. Я читаю дальше и узнаю, что [tywin.GetTitledFirstNameNoTooltip] направил королевские войска на штурм города, и вскоре я могу увидеть, как он горит, как факел, на другом берегу. Я сомневаюсь, что возмездие моего отца будет милосердным."
 ##### Selmy Failed
 # Rhaegar joined war
 agot_scenario_dd.0199.desc.failed.camp: "Я выхожу из палатки под громкие вздохи собравшихся. Прибыл гонец и объявил, что [denys.GetTitledFirstName] отдал роковой приказ - сир [selmy.GetFirstName] и мой отец казнены.\n\nЯ чувствую, как в животе образуется пустота, не только из-за его смерти, но и из-за тяжести, которая на меня обрушивается. Я уже вижу, как солдаты и рыцари смотрят на меня с ожиданием. Они видят во мне своего короля, а я еще даже не справился с тем, что я сын мертвеца. [tywin.GetTitledFirstNameNoTooltip] уже приступил к планированию штурма, а за столом совета шепчутся о коронациях и свадьбах.\n\nМой отец ещё не остыл, а они уже двинулись дальше. Давление новых обязанностей кажется способным раздавить меня, а я даже еще не начал."
 # Rhaegar did not join war
 agot_scenario_dd.0199.desc.failed.home: "Из лагеря за пределами Сумеречного Дола прибыл ворон. Прежде чем мейстер заговорит, я понимаю, что новости мрачные. Сир [selmy.GetFirstName], действуя по безрассудному плану спасения, был схвачен и убит. Вместе с ним погиб и мой отец. Теперь нет надежды на переговоры, и [tywin.GetTitledFirstName] был вынужден штурмовать стены и разграбить город.\n\nОбычно я бы подумал о невинных жителях Сумеречного Дола, но мой разум слишком затуманен горем. Я уже чувствовал тяжесть ожиданий и пророчеств, а теперь к этому добавится и корона. Мой отец мертв, и принц Рейгар тоже мёртв, на его месте должен родиться король."
 # Denys Killed Aerys
 agot_scenario_dd.0199.desc.war.nobs: "[denys.GetTitledFirstName] убил моего отца, как только мы прорвались через ворота.\n\nВозможно, король был бы еще жив, если бы мы сдержались и обговорили условия. Я беру момент, чтобы собраться с мыслями, и понимаю, что бремя правления теперь лежит на мне.\n\n[iron_throne.GetNameNoTier] пустует, мой отец мертв, нам следовало серьезнее отнестись к угрозам, которые высказал [denys.GetTitledFirstNameNoTooltip].\n\nТеперь я могу только надеяться, что буду хорошим королём, чтобы почтить память отца. Моя первая задача, конечно, будет заключаться в том, что делать с Дарклинами."
 # Denys Killed Aerys But This Time Barristan Is Mentioned
 agot_scenario_dd.0199.desc.war: "[denys.GetTitledFirstName] убил моего отца, как только мы прорвались через ворота.\n\nВозможно, король был бы еще жив, если бы мы сдержались, а сир [selmy.GetFirstName] осуществил свой замысел с нашего дозволения. Я беру момент, чтобы собраться с мыслями, и понимаю, что бремя правления теперь лежит на мне.\n\n[iron_throne.GetNameNoTier] пустует, мой отец мертв, нам следовало серьезнее отнестись к угрозам, которые высказал [denys.GetTitledFirstNameNoTooltip].\n\nТеперь я могу только надеяться, что буду хорошим королем, чтобы почтить память отца. Моя первая задача, конечно, будет заключаться в том, что делать с Дарклинами."

 # Selmy Saved
 agot_scenario_dd.0199.opt.a: "Я помолюсь за Сумеречный Дол и воздам благодарность."
 # Selmy Failed
 agot_scenario_dd.0199.opt.b: "Я приму это тяжелое бремя."
 # Denys Killed Aerys
 agot_scenario_dd.0199.opt.c: "Казнить всех, кроме невинных!"
 agot_scenario_dd.0199.opt.d: "[denys.GetTitledFirstName] отправится на Стену."
 agot_scenario_dd.0199.opt.e: "Я отниму только их титулы, но не жизни."

 agot_scenario_dd.0199.a.tt: "Вы возвращаетесь на Драконий Камень."
 agot_scenario_dd.0199.b.tt: "Вы унаследовали Железный трон."
 agot_scenario_dd.0199.c.tt: "Вы унаследовали Железный трон и казните заговорщиков, пощадив женщин и детей."
 agot_scenario_dd.0199.d.tt: "Вы унаследовали Железный трон и лишаете заговорщиков притязаний и отправляете Дениса Дарклина на Стену."
 agot_scenario_dd.0199.e.tt: "Вы унаследовали Железный трон и лишаете заговорщиков притязаний и гарантируете, что они больше не будут править."
 

 
