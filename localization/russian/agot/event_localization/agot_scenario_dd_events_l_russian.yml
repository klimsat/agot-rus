 # Elia and Ashara are available
 agot_scenario_dd.0300.desc.ea: "Два четких варианта выходят на первый план, оба с далёкого юга. С одной стороны, это [elia.GetName], хрупкая принцесса из залитого солнцем Дорна, которая укрепит связи короны с домом Мартелл. С другой — [ashara.GetFirstName] из дома Дейн, красавица Звездопада с фиалковыми глазами."
 # Elia, Ashara, and Lyanna are available
 agot_scenario_dd.0300.desc.eal: "[elia.GetName], хрупкая принцесса из залитого солнцем Дорна, станет хорошей партией. Есть также [lyanna.GetName], прекрасная волчица с дикой натурой и сильной волей. Кроме того, [ashara.GetName], дочь Звездопада с фиалковыми глазами."
 # Elia and Lyanna are available
 agot_scenario_dd.0300.desc.el: "Два варианта выходят на первый план, с разных концов державы. С одной стороны, это [elia.GetName], хрупкая принцесса из залитого солнцем Дорна, которая укрепит связи короны с домом Мартелл. С другой — [lyanna.GetFirstName] из дома Старк, прекрасная и своевольная дочь Севера."
 # Ashara and Lyanna are available
 agot_scenario_dd.0300.desc.al: "Два варианта выходят на первый план, с разных концов державы. С одной стороны, это [ashara.GetName], красавица Звездопада с фиалковыми глазами. С другой — [lyanna.GetFirstName] из дома Старк, прекрасная дочь Севера с дикой натурой и сильной волей."
