 ## Tywin asks Aerys to marry Rhaegar to Cersei
 # availabe scopes: tywin/cersei/lyanna/elia/ashara/bachelor(to be betrothed)
 agot_scenario_dd.0310.t: "$agot_scenario_dd.0300.t$"
 agot_scenario_dd.0310.desc: "На ком же должен жениться [bachelor.GetTitledFirstName]? [tywin.GetTitledFirstName] желает, чтобы наши дома объединились, предлагая, чтобы его дочь [cersei.GetName] вышла замуж за моего сына. Учитывая всё, что произошло, я не могу не чувствовать, что он хочет узурпировать власть. Поставив свою дочь рядом с будущим королем, прежде чем вытолкнуть меня за дверь.\n\nТем не менее, я должен рассмотреть его предложение."

 agot_scenario_dd.0310.opt.a: "Наши дома объединятся, несмотря на мои опасения."
 agot_scenario_dd.0310.opt.b: "Дракон не склонится перед львом."

 agot_scenario_dd.0310.b.tt: "Рейгар будет искать другую супругу."

