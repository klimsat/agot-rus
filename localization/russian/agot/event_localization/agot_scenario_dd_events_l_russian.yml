 ## After Tywin starts the Rescue War, Rhaegar is notified so he can join
 # available scopes: aerys/tywin/denys/duskendale
 agot_scenario_dd.0095.t: "Спасение короля"
 agot_scenario_dd.0095.desc: "Десница короля, [tywin.GetTitledFirstName], выступил с сильным войском, чтобы осадить [duskendale.GetNameNoTier]. Там он надеется спасти короля из темницы, в которую его посадил [denys.GetTitledFirstName].\n\nОднако в моей голове возникает вопрос: #italic Стоит ли спасать моего отца?#!"

 agot_scenario_dd.0095.opt.a: "Собрать знаменосцев! Мы отплываем в Сумеречный Дол."
 agot_scenario_dd.0095.opt.b: "Десница не получит от меня помощи."

 agot_scenario_dd.0095.a.tt: "Вы присоединяетесь к войне, чтобы спасти своего отца."
 agot_scenario_dd.0095.b.tt: "Вы игнорируете войну за спасение своего отца."



