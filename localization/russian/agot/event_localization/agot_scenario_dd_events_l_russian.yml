 ## Rhaegar can decide if he agrees to the chosen spouse
 # availabe scopes: tywin/cersei/lyanna/elia/ashara/bachelor(to be betrothed)/bachelorette
 agot_scenario_dd.0315.t.c: "Львица и Дракон"
 agot_scenario_dd.0315.t.l: "Волчица"
 agot_scenario_dd.0315.t.e: "Солнце и Копье"
 agot_scenario_dd.0315.t.a: "Фиалковая Звезда"

 agot_scenario_dd.0315.desc.start: "Мой отец сообщил о моей предстоящей помолвке, решив это без моего согласия или мнения. Я должен подумать, приму ли я эту помолвку или найду свою невесту вопреки желанию отца.\n\n"
 # Cersei
 agot_scenario_dd.0315.desc.c: "Если я ничего не сделаю, я и [bachelorette.GetName], чьим отцом является [tywin.GetName], будем помолвлены. Никто не может отрицать её красоту или мощь дома Ланнистер, хотя в её глазах есть холодные амбиции, которые вызывают у меня тревожные сны о горящей державе. По всем признакам она кажется идеальной будущей королевой, но могу ли я жениться на ком-то, кто вызывает у меня такие сомнения?\n\n"
 # Lyanna
 agot_scenario_dd.0315.desc.l: "Если я ничего не сделаю, я и [bachelorette.GetName] с Севера будем помолвлены. Она известна своим свободолюбивым характером, и считается, что она станет красавицей. Никогда Старки не вступали в брак с отпрысками дома Таргариен, и создание новых связей с Севером может быть мудрым решением. Однако она молода, и скорейшая женитьба с рождением наследника была бы лучшим решением для моего положения.\n\n"
 # Elia
 agot_scenario_dd.0315.desc.e: "Если я ничего не сделаю, я и [bachelorette.GetName], хрупкая принцесса из залитого солнцем Дорна, будем помолвлены. Её дом давно связан с моим, и они сами по себе могущественны, хотя хрупкая принцесса станет хрупкой королевой.\n\n"
 # Ashara
 agot_scenario_dd.0315.desc.a: "Если я ничего не сделаю, я и [bachelorette.GetName], красавица с фиалковыми глазами из Звездопада, будем помолвлены. Хотя дом Дейн не самый могущественный в политическом плане, из него происходят лучшие рыцари в державе, и она станет подходящей королевой для любого короля.\n\n"

 agot_scenario_dd.0315.desc.finish: "Станет ли [bachelorette.GetNameNoTooltip] моей женой, или мне стоит пойти против воли отца и выбрать кого-то по своему усмотрению?"


 agot_scenario_dd.0315.opt.a: "Я женюсь на львице."
 agot_scenario_dd.0315.opt.b: "Дракон и волчица поженятся."
 agot_scenario_dd.0315.opt.c: "Наши связи с Дорном всегда можно укрепить."
 agot_scenario_dd.0315.opt.d: "Я женюсь на Эшаре, свете Звездопада."
 agot_scenario_dd.0315.opt.e: "Я найду другую."

 agot_scenario_dd.0315.e.tt: "Вы пойдете против воли отца и будете искать супругу самостоятельно."

 ## Aerys gets the news that Rhaegar thinks his choice is bad and he should feel bad
 # availabe scopes: tywin/cersei/lyanna/elia/ashara/bachelor(to be betrothed)/bachelorette
 agot_scenario_dd.0316.t: "Непокорный принц"

 agot_scenario_dd.0316.desc: "С Драконьего Камня пришли вести: мой сын Рейгар отказался от тщательно согласованной мной помолвки, согласно которой [bachelorette.GetName] стала бы его женой. Это не только тяжкое оскорбление для его невесты и [bachelorette.GetHerHis] дома, но и открытое неповиновение моей воле как короля. Я уже подозревал его в заговоре против меня, возможно, даже в узурпации трона, и с этим катастрофическим неповиновением доказательства его измены только возросли.\n\nТеперь я могу только смириться с его решением и держать его под пристальным наблюдением..."

 agot_scenario_dd.0316.opt.a: "Хорошо, пусть сам выбирает свою проклятую невесту!"

 agot_scenario_dd.0316.a.tt: "Ваш сын пока не будет помолвлен."



