 ## Rhaegar can decide who he marries on his own
 # availabe scopes: tywin/cersei/lyanna/elia/ashara/bachelor(to be betrothed)
 agot_scenario_dd.0300.t: "Будущее дома Таргариен"
 agot_scenario_dd.0300.desc.start: "Моего отца и Тайвина больше нет, мне предстоит решить, какие союзы лучше всего защитят наш дом. Я должен жениться, хотя это не простое решение. Мне предстоит выбрать королеву Семи королевств; я должен хорошо обдумать это.\n\n"
 # Each option alone
 agot_scenario_dd.0300.desc.c: "Давно запланированная помолвка, в которой предусматривалась [cersei.GetName], всё ещё возможна. Никто не может отрицать её красоту или мощь дома Ланнистер, хотя в её глазах есть холодные амбиции, которые вызывают у меня тревожные сны о горящей державе."
 agot_scenario_dd.0300.desc.e: "[elia.GetName], хрупкая принцесса из залитого солнцем Дорна, может стать моей женой. Её дом давно связан с моим, а так же весьма могуществен."
 agot_scenario_dd.0300.desc.a: "[ashara.GetName], красавица с фиалковыми глазами из Звездопада, из чьего дома происходят величайшие рыцари в королевстве, может стать моей супругой."
 agot_scenario_dd.0300.desc.l: "Говорят, что [lyanna.GetName] с Севера — красавица с дикой натурой и сильной волей. Она станет первой Старк, заключившей брак с кровью Старой Валирии."
 # Cersei and Elia are available
 agot_scenario_dd.0300.desc.ce: "Давно запланированная помолвка, в которой предусматривалась [cersei.GetName], всё ещё возможна. Она весьма красива, и её дом остаётся сильным. Хотя на далёком юге есть также [elia.GetName], хрупкая принцесса из залитого солнцем Дорна. Женитьба на ней снова укрепит связи между Дорном и Железным троном."
 # Cersei and Ashara are available
 agot_scenario_dd.0300.desc.ca: "Давно запланированная помолвка, в которой предусматривалась [cersei.GetName], всё ещё возможна. Она весьма красива, и её дом остаётся сильным. Хотя в Дорне говорят о другой красавице, которая может стать подходящей королевой. [ashara.GetName], дочь Звездопада с фиалковыми глазами."
 # Cersei and Lyanna are available
 agot_scenario_dd.0300.desc.cl: "Давно запланированная помолвка, в которой предусматривалась [cersei.GetName], всё ещё возможна. Она весьма красива, и её дом остаётся сильным. Хотя говорят, что [lyanna.GetName] с Севера тоже красавица, с дикой натурой и сильной волей. Любая из них может стать подходящей королевой."
 # Cersei, Elia, and Ashara are available
 agot_scenario_dd.0300.desc.cea: "Давно запланированная помолвка, в которой предусматривалась [cersei.GetName], всё ещё возможна. Она весьма красива, и её дом остаётся сильным. Хотя есть также [elia.GetName], хрупкая принцесса из залитого солнцем Дорна. Наконец, есть [ashara.GetName], дочь Звездопада с фиалковыми глазами."
 # Cersei, Elia, and Lyanna are available
 agot_scenario_dd.0300.desc.cel: "Давно запланированная помолвка, в которой предусматривалась [cersei.GetName], всё ещё возможна. Она весьма красива, и её дом остаётся сильным. Говорят, что [lyanna.GetName] с Севера тоже красавица, с дикой натурой и сильной волей. Наконец, есть и [elia.GetName], хрупкая принцесса из залитого солнцем Дорна."
 # Cersei Ashara, and Lyanna are available
 agot_scenario_dd.0300.desc.cal: "Давно запланированная помолвка, в которой предусматривалась [cersei.GetName], всё ещё возможна. Она весьма красива, и её дом остаётся сильным. Говорят, что [lyanna.GetName] с Севера тоже красавица, с дикой натурой и сильной волей. Наконец, есть [ashara.GetName], дочь Звездопада с фиалковыми глазами."
 # Cersei, Elia, Lyanna, and Ashara are available
