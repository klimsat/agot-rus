 ## Tywin requests his family gets Duskendale
 # available scopes: aerys/viserys/tywin/selmy/denys/renfred/duskendale
 agot_scenario_dd.0200.t: "Не слишком скромная просьба"
 # If Aerys Dies Early
 agot_scenario_dd.0200.desc.early: "Вопрос того, кому должен перейти [duskendale.GetNameNoTier], всё ещё не решён. Земли всё ещё находятся в подвешенном состоянии.\n\nНаедине [tywin.GetTitledFirstName] попросил, чтобы его [chosen_sibling.Custom2('RelationToMeShort', SCOPE.sC('tywin'))] [Select_CString(chosen_sibling.IsFemale, 'получила', 'получил' )] эти земли, включая ту самую хартию, которую так отчаянно желал дом Дарклин. Он говорит, что [chosen_sibling.GetTitledFirstName] станет достойным вассалом.\n\nХотя Десница был верен, кровь дракона густа. Я бы хотел, чтобы [viserys.GetFirstNameNicknamed] получил свой замок. В любом случае, мы встретим этих изменников на поле боя. Они станут пищей для червей."
 # Tywin Requests Titles, Option for Viserys
 agot_scenario_dd.0200.desc.tywin: "С кончиной моего отца и моим правлением Семью королевствами, мне напомнили, что вопрос того, кому должен перейти [duskendale.GetNameNoTier], всё ещё не решён. Коварный [denys.GetTitledFirstName] провозгласил себя независимым, поставив себя в один ряд с древними королями своей крови. Многие считают, что эта война уже выиграна, и предлагают свои имена для получения прав на земли Дарклинов.\n\n[tywin.GetTitledFirstName] просит, чтобы его [chosen_sibling.Custom2('RelationToMeShort', SCOPE.sC('tywin'))] [chosen_sibling.GetTitledFirstName] [Select_CString(chosen_sibling.IsFemale, 'получила', 'получил' )] эти земли вместе с королевской хартией, из-за которой всё это началось.\n\nХотя это порадует нашего верного Десницу, кровь дракона густа, и мой брат [viserys.GetFirstNameNicknamed] должен получить свой замок. В любом случае, изменник ждёт на поле боя."
 # Tywin Dead, Viserys Only Option
 agot_scenario_dd.0200.desc.viserys: "С кончиной моего отца и моим правлением Семью королевствами, мне напомнили, что вопрос того, кому должен перейти [duskendale.GetNameNoTier], всё ещё не решён. Коварный [denys.GetTitledFirstName] провозгласил себя независимым, поставив себя в один ряд с древними королями своей крови. Многие считают, что эта война уже выиграна, и предлагают свои имена для получения прав на земли Дарклинов.\n\nДо своей смерти [tywin.GetTitledFirstName] просил, чтобы его родственники получили земли Дарклинов с той же хартией, которую требовал Денис.\n\nПоскольку Тайвина больше нет, чтобы настаивать на этом, мой брат [viserys.GetFirstNameNicknamed] должен получить от меня собственный замок. Чтобы добиться этого, мы должны встретить этого изменника на поле боя."

 agot_scenario_dd.0200.opt.a: "Земли должны перейти к дому Ланнистер."
 agot_scenario_dd.0200.opt.b: "Мы сделаем их владением Таргариенов."
 agot_scenario_dd.0200.opt.c: "Я возьму эти земли себе."

 agot_scenario_dd.0200.a.tt: "[chosen_sibling.GetUINameNoTooltip] станет [Select_CString(chosen_sibling.IsFemale, 'новой владелицей', 'новым владельцем' )] Сумеречного Дола с вашего дозволения."
 agot_scenario_dd.0200.b.tt: "[viserys.GetUINameNoTooltip] станет новым владельцем Сумеречного Дола с вашего дозволения."
 agot_scenario_dd.0200.c.tt: "Вы решаете, что станете новым владельцем Сумеречного Дола, чтобы распоряжаться им по своему усмотрению."

 ## Tywin requests his family gets Duskendale after Denys fails Independence War
 # available scopes: aerys/viserys/tywin/selmy/denys/renfred/duskendale
 agot_scenario_dd.0201.t: "Не слишком скромная просьба"
 # Tywin Requests Titles, Option for Viserys
 agot_scenario_dd.0201.desc.tywin: "Война окончена, безрассудный [denys.GetTitledFirstName] напал на нас, не подумав о том, как мало людей поддержат его маленькое восстание. Этот вопрос решён, но [duskendale.GetNameNoTier] всё ещё не имеет подходящего владельца, преданного моему делу.\n\n[tywin.GetTitledFirstName] просит, чтобы его [chosen_sibling.Custom2('RelationToMeShort', SCOPE.sC('tywin'))] [chosen_sibling.GetTitledFirstName] [Select_CString(chosen_sibling.IsFemale, 'получила', 'получил' )] эти земли с той же хартией, которую желали Дарклины.\n\nХотя Десница был верен, кровь дракона густа. Я хотел бы, чтобы [viserys.GetFirstNameNicknamed] получил собственный замок. Я должен подумать, как действовать дальше..."
 # Tywin Dead, Viserys Only Option
 agot_scenario_dd.0201.desc.viserys: "Война окончена, безрассудный [denys.GetTitledFirstName] напал на нас, не подумав о том, как мало людей поддержат его маленькое восстание. Этот вопрос решён, но [duskendale.GetNameNoTier] всё ещё не имеет подходящего владельца, преданного моему делу.\n\nНаедине, до своей смерти, [tywin.GetTitledFirstName] просил, чтобы его родственник получил эти земли с теми же преимуществами, которые требовал Денис.\n\nПоскольку Тайвина больше нет, чтобы спорить, мой брат [viserys.GetFirstNameNicknamed] должен получить собственный замок. Мы подготовим его к правлению."

 agot_scenario_dd.0201.opt.a: "Земли должны перейти к дому Ланнистер."
 agot_scenario_dd.0201.opt.b: "Я сделаю их владением Таргариенов."
 agot_scenario_dd.0201.opt.c: "Я заберу эти земли себе."

 agot_scenario_dd.0201.a.tt: "[chosen_sibling.GetUINameNoTooltip] станет [Select_CString(chosen_sibling.IsFemale, 'новой владелицей', 'новым владельцем' )] Сумеречного Дола с вашего дозволения, а Денис будет отправлен на Стену."
 agot_scenario_dd.0201.b.tt: "[viserys.GetUINameNoTooltip] станет новым владельцем Сумеречного Дола с вашего дозволения, а Денис будет отправлен на Стену."
 agot_scenario_dd.0201.c.tt: "Вы решаете, что эти земли отойдут вам, а Денис будет отправлен на Стену."

 ## Tywin requests his family gets Duskendale after wars fail to resolve(rare)
 # available scopes: aerys/viserys/tywin/denys/renfred/duskendale
 agot_scenario_dd.0220.t.rhaegar: "Захват по праву силы"
 agot_scenario_dd.0220.t.denys: "Захват по праву силы"
 # Fallback for Invalidated Wars Rhaegar Started -> Iron Throne vs Duskendale
 agot_scenario_dd.0220.desc.rhaegar: "Войны за [duskendale.GetNameNoTier] оказались неудачными, никогда нельзя всё предусмотреть. Поскольку мы не можем вечно метаться туда-сюда, мы просто заберем эти земли силой. Земли будут моими, чтобы я мог решать, что с ними делать, и я не потерплю возражений.\n\nЯ объявляю себя правителем Сумеречного Дола, и, пока я этим занимаюсь, я аннулирую любые притязания на него королевским указом."
 # Fallback for Invalidated Wars Denys Started -> Duskendale vs Iron Throne
 agot_scenario_dd.0220.desc.denys: "Войны за [duskendale.GetNameNoTier] оказались неудачными, никогда нельзя всё предусмотреть. Железный трон и его войска стоят у моих ворот, чтобы забрать мои земли силой.\n\nВсё кончено, я потерял всё."
 # Fallback -> To Start Claimant War vs Duskendale with Chosen Candidate
 agot_scenario_dd.0220.desc.war: "Войны за притязания на [duskendale.GetNameNoTier] оказались неудачными, никогда нельзя всё предусмотреть. Я просто заберу эти земли [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )], силой. Они почувствуют ярость дракона. Земли будут моими, чтобы я мог решать, что с ними делать, мне надоело, что мои кандидаты не доводят дела до конца.\n\nНадеюсь, они ждут меня, ведь я хочу увидеть, как будет выглядеть [denys.GetFullNameNoTooltip], когда отомщу за своего отца."

 # Rhaegar Gives to Lannister
 agot_scenario_dd.0220.opt.a: "Подарок для львов."
 # Rhaegar Gives to Viserys
 agot_scenario_dd.0220.opt.b: "Кровь дракона густа."
 # Denys Losing His Lands
 agot_scenario_dd.0220.opt.c: "Я потерял все!"
 # Starting War
 agot_scenario_dd.0220.opt.d: "Эти земли будут моими..."

 agot_scenario_dd.0220.a.tt: "[chosen_sibling.GetUINameNoTooltip] получит Сумеречный Дол."
 agot_scenario_dd.0220.b.tt: "[viserys.GetUINameNoTooltip] получит Сумеречный Дол."
 agot_scenario_dd.0220.c.tt: "Вы теряете свои земли, титулы и притязания."
 agot_scenario_dd.0220.d.tt: "Вы начинаете войну с Сумеречным Долом, чтобы забрать его себе."


