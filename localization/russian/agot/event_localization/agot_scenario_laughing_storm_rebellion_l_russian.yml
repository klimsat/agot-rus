l_russian:
 ##############################################################
 ## 0001-0010 LAUGHING STORM EVENTS - Canon Scenario         ##
 ##############################################################

 #Lyonel's Fury
 ### POV: Lyonel Baratheon
 ### Bookmark starter event
 agot_laughing_storm_rebellion.0001.t: "Назревающий Смеющийся Вихрь"
 agot_laughing_storm_rebellion.0001.desc: "Предательство ранит глубже любого клинка. [duncansmall.GetTitledFirstNameNicknamed], с которым некогда была обручена моя любимая дочь [cassandra.GetFirstName], нарушил свои клятвы и связался с той загадочной девицей, некой [jenny.GetNameNicknamed]. Этот позор для дома [lyonel.GetHouse.GetBaseName] недопустим.\n\nЧесть моей семьи лежит в руинах, растоптанная прихотями Железного трона. Дом [lyonel.GetHouse.GetBaseNameNoTooltip] не потерпит оскорблений. Независимость — мой путь, и если дело дойдёт до войны, да будет так.\n\nШтормовые земли будут стоять особняком, и я верну честь своей семьи всей мощью, что у нас есть."
 agot_laughing_storm_rebellion.0001.a: "Нам ярость!"

 #The King's Trouble
 ### POV: Aegon V
 ### Bookmark starter event
 #### Triggers: 0003
 agot_laughing_storm_rebellion.0002.t: "Вихрь на горизонте"
 agot_laughing_storm_rebellion.0002.desc: "Тяжесть короны никогда не ощущалась так остро. Мой сын, [duncansmall.GetTitledFirstNameNicknamed], расторг помолвку, [cassandra.GetFullName] отвергнута ради некой [jenny.GetFirstNameNicknamed].\n\n[lyonel.GetFullNameNicknamed] своей яростью теперь угрожает всей державе. Он потребовал независимости от Железного трона, готовый ввергнуть земли в войну ради восстановления чести своей семьи. Как король, я должен действовать быстро, чтобы предотвратить катастрофу.\n\nПредложение провести испытание поединком, в котором лицом к лицу сойдутся [lyonel.GetTitledFirstNameNoTooltip] и [duncantall.GetTitledFirstName] «Высокий», может открыть путь к миру. Это риск, но он может спасти державу от ненужного кровопролития."
 agot_laughing_storm_rebellion.0002.a: "Пусть лорд-командующий решит это."

 #The King's Offer
 ### POV: Lyonel
 ### Pre-event for the Lyonel v Duncan Tall duel.
 #### Option A: will lead to duel (Triggers: 0004)
 #### Option B: might lead to immediate war of independence (Triggers: 0025)
 agot_laughing_storm_rebellion.0003.t: "Поединок чести"
 agot_laughing_storm_rebellion.0003.desc: "Ворон приносит предложение короля — уладить противостояние единственным поединком, испытанием, к котором от имени короны выступит [duncantall.GetTitledFirstName] «Высокий». Я помню, как сражался рядом с ним в былых битвах — некогда товарищи, ныне возможные враги. Этот поединок — не просто столкновение стали; это битва за честь, саму душу дома [lyonel.GetHouse.GetBaseName].\n\nОтказ означает независимость, но какой ценой? Пришло время решить нашу судьбу."
 agot_laughing_storm_rebellion.0003.a: "Пусть боги решат; мы решим это в #bold испытании поединком#!."
 agot_laughing_storm_rebellion.0003.b: "Я не подчинюсь требованиям ложного короля."

 #A Trial
 ### POV: Lyonel
 ### Duel event.
 #### If Lyonel wins triggers 0020
 #### If Duncan wins and Lyonel is alive triggers 0007 and 0008
 #### If Duncan wins and Lyonel has died triggers 0009
 agot_laughing_storm_rebellion.0004.t: "Столкновение вихря и стали"
 agot_laughing_storm_rebellion.0004.desc: "Путь в Королевскую Гавань был долгим и полным предвкушения. Теперь я стою перед Красным замком, передо мной [duncantall.GetFirstName] «Высокий», лорд-командующий Королевской Гвардии. Воспоминания о былых совместных битвах мелькают в моём разуме, но сегодня товарищество отброшено.\n\nЭто бой за честь, за имя дома [lyonel.GetHouse.GetBaseName]. Взоры державы устремлены на нас, и лишь один выйдет победителем.\n\nПусть звон стали звучит громче моего смеха, и да победит лучший боец в этой судьбоносном поединке."
 agot_laughing_storm_rebellion.0004.a: "#bold Ха-ха-ха!#!"

 #Duel Tooltips
 agot_laughing_storm_rebellion.t: "Испытание поединком"
 agot_laughing_storm_rebellion.duncan_won: "[duncantall.GetTitledFirstNameNoTooltip] [Select_CString(duncantall.IsFemale, 'победила', 'победил' )] в поединке против персонажа [lyonel.GetTitledFirstNameNoTooltip]."
 agot_laughing_storm_rebellion.lyonel_won: "[lyonel.GetTitledFirstNameNoTooltip] [Select_CString(lyonel.IsFemale, 'победила', 'победил' )] в поединке против персонажа [duncantall.GetTitledFirstNameNoTooltip]."

 #Lyonel Lost
 ### POV: Lyonel
 ### Post-duel event.
 agot_laughing_storm_rebellion.0007.t: "Падение вихря"
 agot_laughing_storm_rebellion.0007.desc: "Поединок окончен, и звон мечей растворился в памяти. Несмотря на моё мастерство, [duncantall.GetTitledFirstName] одержал победу. Поражение — горькая пилюля, тяжесть утраты тяжёлым бременем легла на мои плечи.\n\nТеперь [aegonv.GetTitledFirstNameRegnal] держит в своих руках уязвлённую и истерзанную честь дома [lyonel.GetHouse.GetBaseName]. Преклонив колено перед Железным троном, я жду решения короля, и будущее Штормовых земель висит на волоске. Какую судьбу уготовит мне и моему дому король?"
 agot_laughing_storm_rebellion.0007.a: "Я приму свою судьбу с честью."

 #Lyonel Lost
 ### POV: Aegon V
 ### Post-duel event.
 #### Triggers: 0010 (regardless the selected option)
 agot_laughing_storm_rebellion.0008.t: "Королевская милость"
 agot_laughing_storm_rebellion.0008.desc: "[lyonel.GetFullNameNicknamed] стоит передо мной, побеждённый, но не сломленный. Несмотря на то, что [duncantall.GetTitledFirstName] победил, напряжение в державе сохраняется. Как король, я осознаю необходимость мира и стабильности. Суровое наказание может разжечь пламя мятежа, но милость способна залечить раскол.\n\nЧтобы сохранить хрупкую гармонию, я размышляю о брачном союзе, который свяжет Баратеонов ближе к трону.\n\nПредложить ли руку моей дочери его сыну или просто потребовать его вновь подтверждённой верности без дальнейших жестов?"
 agot_laughing_storm_rebellion.0008.a: "Я предложу руку Рейль его сыну."
 agot_laughing_storm_rebellion.0008.b: "Я предложу руку Вейллы его сыну."
 agot_laughing_storm_rebellion.0008.c: "Я ничего не предложу."

 #Lyonel Lost - Lyonel died
 ### POV: Aegon V
 ### Post-duel event.
 #### Triggers: 0031
 agot_laughing_storm_rebellion.0009.t: "Конец вихря"
 agot_laughing_storm_rebellion.0009.desc: "[lyonel.GetFullNameNicknamed] встретил свой конец в испытании поединком, в котором против него выступил [duncantall.GetTitledFirstName]. Его вызов и доблесть, некогда грозная угроза, ныне умолкли. Восстание, угрожавшее разорвать державу, пресечено с падением его лидера.\n\nЦена мира была высока, и отголоски этого конфликта будут жить в анналах истории. С покорением Штормовых земель держава может начать исцеление, но тень этого события будет нависать над Железным троном многие годы."
 agot_laughing_storm_rebellion.0009.a: "Он сражался, проиграл и ныне покоится."

 #A new betrothal
 ### POV: Lyonel
 ### Betrothal offer from Egg
 #### Option A: Leads to betrothal (Triggers: 0028)
 #### Option B: Leads to end of story (Triggers: 0030)
 #### Option C: Leads to end of story (Triggers: 0030)
 agot_laughing_storm_rebellion.0010.t: "Последствия вихря"
 agot_laughing_storm_rebellion.0010.betrothal.desc: "После моего поражения в испытании поединком [aegonv.GetTitledFirstNameRegnal] протягивает оливковую ветвь, предложив, чтобы его дочь, [targ_betrothed.GetTitledFirstName], и мой сын, [bara_betrothed.GetTitledFirstName], заключили помолвку. Этот жест, призванный исцелить раскол между домом [lyonel.GetHouse.GetBaseName] и Железным троном, несёт в себе потенциал мира и единства.\n\nЧесть моего дома может быть восстановлена через этот союз, укрепляя узы, которые обеспечат будущее Штормовых земель."
 agot_laughing_storm_rebellion.0010.nobetrothal.desc: "После моего поражения в испытании поединком молчание Железного трона оглушает. [aegonv.GetTitledFirstNameRegnal] не предлагает руки в браке, не делает жеста мира, лишь холодная реальность моего поражения.\n\nЧесть дома [lyonel.GetHouse.GetBaseName] остаётся запятнанной, и будущее Штормовых земель неопределённо. Я стою один, размышляя о следующих шагах для моего дома, зная, что путь впереди полон испытаний, и тень этого поражения велика."
 agot_laughing_storm_rebellion.0010.a: "Я приму предложение короля."
 agot_laughing_storm_rebellion.0010.b: "Я вынужден отклонить это предложение."
 agot_laughing_storm_rebellion.0010.c: "Я приму свою судьбу."

 ##############################################################
 ## 0011-0018 LAUGHING STORM EVENTS - Canon Breakups         ##
 ##############################################################

 #Jaehaerys & Shaera
 ### POV: Jaehaerys Targaryen
 ### Breaking betrothals between Jaeharys+Celia Tully and Shaera+Luthor Tyrell
 #### Option A: Parents notified about the breakup (Triggers: 0013)
 #### Option B: End of story
 agot_laughing_storm_rebellion.0011.t: "Дилемма сердца"
 agot_laughing_storm_rebellion.0011.desc: "То, как поступил мой старший брат [duncansmall.GetFirstName], пробудило во мне глубокое размышление. [cassandra.GetTitledFirstName] отвергнута им ради некой [jenny.GetFirstNameNicknamed], следуя зову истинной любви, это заставил меня усомниться в своём пути. [celia.GetTitledFirstName] и я связаны помолвкой, но моё сердце занимает лишь [shaera.GetFirstName], моя истинная любовь.\n\nТяжесть долга и притяжение любви ведут ожесточённую битву во мне. Следовать ли мне по стопам брата и исполнить желание сердца или оставаться связанным данными клятвами?"
 agot_laughing_storm_rebellion.0011.a: "Да, я должен следовать своему сердцу."
 agot_laughing_storm_rebellion.0011.b: "Нет, долг должен преобладать."

 #Daeron
 ### POV: Daeron Targaryen
 ### Breaking betrothal between Daeron+Olenna Redwyne
 #### Option A: Parents notified about the breakup (Triggers: 0014)
 #### Option B: End of story
 agot_laughing_storm_rebellion.0012.t: "Сомнения будущого"
 agot_laughing_storm_rebellion.0012.desc: "Видя выбор моих старших братьев, последовавших за сердцем и разорвавших помолвки ради любви, я нахожусь в смятении. Мне предназначена [olenna.GetTitledFirstName], девушка, которую я едва знаю, но сомнения омрачают мои мысли. [olenna.GetTitledFirstName] может казаться приятной, но мой разум и сердце в другом месте.\n\nОжидания долга тяжёлым бременем лежат на мне, но желание истинного счастья манит. Следовать ли мне собственным путём и искать любовь или придерживаться установленных обязательств?"
 agot_laughing_storm_rebellion.0012.a: "Да, я должен следовать своему сердцу."
 agot_laughing_storm_rebellion.0012.b: "Нет, долг должен вести меня."

 #Jaehaerys & Shaera - notification
 ## Can be triggered via event 0021 (or can trigger after some time in historical game ruler)
 ### POV: Egg, Steffon Tully, Garlan Tyrell
 ### Jaeharys+Celia Tully and Shaera+Luthor Tyrell broke up
 #### Option A: End of story
 #### Option B (only for Egg): End of story + Jaehaerys and Shaera are disinherited
 agot_laughing_storm_rebellion.0013.t: "Осквернённые союзы"
 agot_laughing_storm_rebellion.0013.desc: "Произошёл прискорбный поворот событий. [jaehaerys.GetTitledFirstName] разорвал свою помолвку, [celia.GetTitledFirstName] больше не связана с ним, в свою очередь [shaera.GetTitledFirstName] поступила также, [luthor.GetTitledFirstName] не станет её мужем. Пренебрегая традициями и долгом, они теперь заявляют, что вступили в брак друг с другом.\n\nЭтот безрассудный поступок посеял раздор и разочарование, пошатнув основы союзов и ожиданий. Последствия их союза отзовутся повсюду, оставляя глав домов разбираться с последствиями этих неожиданных и прискорбных решений."
 agot_laughing_storm_rebellion.0013.a: "Это серьёзный промах."
 agot_laughing_storm_rebellion.0013.b: "Они должны быть наказаны."

 #Daeron - notification
 ## Can be triggered via event 0021 (or can trigger after some time in historical game ruler)
 ### POV: Egg, Runceford Redwyne
 ### Daeron+Olenna Redwyne broke up
 #### Option A (only for Egg): End of story
 #### Option B (only for Runceford if Luthor Tyrell is NOT betrothed): Luthor and Olenna betrothal might happen (Triggers: 0015)
 #### Option C (only for Runceford if Luthor Tyrell is betrothed): End of story
 agot_laughing_storm_rebellion.0014.t: "Расторжение помолвки"
 agot_laughing_storm_rebellion.0014.desc: "Новости приходят с тяжёлым сердцем. [daeron.GetTitledFirstName] и [olenna.GetTitledFirstName] более не связаны помолвкой, принц разорвал её, отвергнув тщательно выстроенные планы их брака. Этот неожиданный поворот событий крайне прискорбен, вызывая разочарование и неопределённость.\n\nПоследствия этого нарушенного обещания, несомненно, отзовутся в обоих домах, бросая вызов союзам и ожиданиям."
 agot_laughing_storm_rebellion.0014.aegonv.a: "Это серьёзное разочарование."
 agot_laughing_storm_rebellion.0014.runceford.a: "Пожалуй, пора предложить Гарлану помолвку."
 agot_laughing_storm_rebellion.0014.runceford.a.tt: "Будет предложена помолвка между персонажами [olenna.GetTitledFirstName] и [luthor.GetTitledFirstName]"
 agot_laughing_storm_rebellion.0014.runcefordx.a: "Это серьёзное разочарование."

 #Luthor + Olenna = ?
 ### POV: Garlan Tyrell
 ### Betrothal offer from Runceford Redwyne
 #### Option A: Agrees to the betrothal (Triggers: 0016)
 #### Option B: Refuses the betrothal (Triggers: 0018)
 agot_laughing_storm_rebellion.0015.t: "Новое предложение"
 agot_laughing_storm_rebellion.0015.desc: "После того, как [daeron.GetTitledFirstName] и [olenna.GetTitledFirstName] разорвали помолвку, её отец [runceford.GetTitledFirstName] обратился ко мне с новым предложением. Он предлагает помолвку, которой будут связаны [olenna.GetTitledFirstName] и мой сын, [luthor.GetTitledFirstName].\n\nЭтот союз может оказаться весьма ценным, укрепляя связи и обеспечивая будущее дома [garlan.GetHouse.GetBaseName]. Это возможность, требующая тщательного рассмотрения."
 agot_laughing_storm_rebellion.0015.a: "Этот союз принесёт пользу нашему дому."
 agot_laughing_storm_rebellion.0015.b: "Я вынужден отклонить это предложение."

 #Luthor + Olenna = betrothal
 ### POV: Runceford Redwyne
 ### Betrothal between Olenna and Luthor
 #### Option A: Final confirmation on the betrothal (Triggers: 0017)
 #### Option B: Refuses the betrothal (Triggers: 0018)
 agot_laughing_storm_rebellion.0016.t:0 "Решение отца"
 agot_laughing_storm_rebellion.0016.desc: "[garlan.GetTitledFirstName] принял предложение о помолвке, которой будут связаны [olenna.GetTitledFirstName] и [luthor.GetTitledFirstName]. Этот союз обещает большую ценность и укрепление связей между нашими домами. Однако, как отец, мой долг — убедиться, что этот союз будет полезен и для моей дочери.\n\nОкончательное решение за мной, и я должен тщательно взвесить преимущества для нашей семьи против её будущего счастья."
 agot_laughing_storm_rebellion.0016.a: "Продолжим с помолвкой."
 agot_laughing_storm_rebellion.0016.b: "Я должен отказаться ради блага Оленны."

 #Luthor + Olenna = betrothal notification
 ### POV: Garlan Tyrell
 ### Olenna and Luthor betrothed, alliance made
 #### Option A: End of story
 agot_laughing_storm_rebellion.0017.t: "Заключение союза"
 agot_laughing_storm_rebellion.0017.desc: "Наконец, [olenna.GetTitledFirstName] и [luthor.GetTitledFirstName] заключили помолвку. Этот союз обещает укрепить узы между нашими домами, принося взаимные выгоды и обеспечивая будущие соююзы.\n\nС этим партнёрством оба дома получат прирост в силе и влиянии, прокладывая путь к процветающему будущему."
 agot_laughing_storm_rebellion.0017.a: "Это повод для праздника."

 #Luthor + Olenna = refused
 ### POV: Garlan Tyrell OR Runceford Redwyne (depending who refused it)
 ### Olenna and Luthor betrothal negotiation failed
 #### Option A: End of story
 agot_laughing_storm_rebellion.0018.t: "Упущенная Возможность"
 agot_laughing_storm_rebellion.0018.desc: "Помолвка, которую должны были заключить [olenna.GetTitledFirstName] и [luthor.GetTitledFirstName], была отвергнута. Жаль, ведь этот союз был бы весьма выгоден для обоих наших домов, укрепляя наши связи и обеспечивая наше будущее.\n\nНесмотря на неудачу, мы должны смотреть вперёд и искать другие пути для укрепления наших союзов и процветания нашей семьи."
 agot_laughing_storm_rebellion.0018.a: "Мой ребёнок найдёт свою любовь в другом месте."

 ##############################################################
 ## 0020-0035 LAUGHING STORM EVENTS - Non-Canon Scenarios    ##
 ##############################################################

 #Lyonel Won
 ### POV: Lyonel
 ### Lyonel beats Duncan Tall in the duel
 #### Option A: Lyonel remains a vassal if Egg agrees to sending Duncan Targaryen to the wall and a marriage between Rhaella and Ormund Baratheon (or Herbert if Ormund died somehow) (Triggers: 0021)
 #### Option B: Declares independence (Triggers: 0026)
 agot_laughing_storm_rebellion.0020.t: "Победа вихря"
 agot_laughing_storm_rebellion.0020.desc: "Испытание поединком завершено, и [duncantall.GetTitledFirstName] повержен моей рукой. Честь дома [lyonel.GetHouse.GetBaseName] восстановлена, и восторг победы пульсирует в моих жилах. Теперь я стою на распутье.\n\n"
 agot_laughing_storm_rebellion.0020.desc.both: "Я могу выбрать независимость, проложив свой путь, свободный от Железного трона. Или же я могу вновь присягнуть на верность, но только при условии того, что [aegonv.GetTitledFirstNameRegnal] предложит моему дому новую помолвку, а [duncansmall.GetTitledFirstNameNicknamed] будет изгнан на Стену."
 agot_laughing_storm_rebellion.0020.desc.only_banishment: "Я могу выбрать независимость, проложив свой путь, свободный от Железного трона. Или же я могу вновь присягнуть на верность, но только при условии того, что [duncansmall.GetTitledFirstNameNicknamed] будет изгнан на Стену."
 agot_laughing_storm_rebellion.0020.desc.only_betrothal: "Я могу выбрать независимость, проложив свой путь, свободный от Железного трона. Или же я могу вновь присягнуть на верность, но только при условии того, что [aegonv.GetTitledFirstNameRegnal] предложит моему дому новую помолвку."
 agot_laughing_storm_rebellion.0020.desc.none: "Я могу выбрать независимость, проложив свой путь, свободный от Железного трона. Или же я могу вновь присягнуть на верность, но не сделаю этого слепо."
 agot_laughing_storm_rebellion.0020.a: "Я присягну на верность, но потребую справедливости."
 agot_laughing_storm_rebellion.0020.a.simple: "Нет нужды в дальнейшем раздоре — я присягну на верность."
 agot_laughing_storm_rebellion.0020.b: "Штормовые земли будут стоять особняком."

 #Lyonel Won
 ### POV: Aegon V
 ### Lyonel demanded to send Prince Duncan to the wall and a marriage between Rhaella and Ormund Baratheon in order for him to remain loyal
 #### Option A: Demand refused - might lead to the break of betrothals (Triggers: 0013, 0014, 0023, 0024 and 0032)
 #### Option B: Demand accepted (Triggers: 0028)
 agot_laughing_storm_rebellion.0021.t: "Требования Вихря"
 agot_laughing_storm_rebellion.0021.no_demand.t: "Победа Вихря"
 agot_laughing_storm_rebellion.0021.desc: "[lyonel.GetFullNameNicknamed] одержал победу в испытании поединком, а [duncantall.GetTitledFirstName] повержен.\n\n"
 agot_laughing_storm_rebellion.0021.desc.both: "Он предлагает вновь присягнуть на верность, но его лояльность имеет цену: новая помолвка от короны, и мой сын, [duncansmall.GetTitledFirstNameNicknamed], должен быть отправлен на Стену. Это решение нелегко, оно балансирует между честью державы и требованиями могущественного вассала.\n\nЯ должен тщательно обдумать последствия принятия или отказа от его условий."
 agot_laughing_storm_rebellion.0021.desc.only_banishment: "Теперь он снова предлагает присягнуть на верность, но его лояльность имеет свою цену: мой сын, [duncansmall.GetTitledFirstNameNicknamed], должен быть отправлен на Стену. Решение весомое, оно балансирует между честью державы и требованиями могущественного вассала.\n\nЯ должен тщательно обдумать последствия принятия или отказа от его условий."
 agot_laughing_storm_rebellion.0021.desc.only_betrothal: "Теперь он предлагает вновь присягнуть на верность, но его лояльность имеет цену: новая помолвка от короны. Это непростое решение, балансирующее между честью державы и требованиями могущественного вассала.\n\nМне нужно тщательно взвесить последствия принятия или отказа от его условий."
 agot_laughing_storm_rebellion.0021.desc.none: "Теперь он предлагает вновь присягнуть на верность - без требований и условий. Его клятва возвращает державе долю мира, хотя прошлые распри не так просто забыть.\n\nПо крайней мере сейчас держава вновь едина."
 agot_laughing_storm_rebellion.0021.a: "Я отклоняю его требования."
 agot_laughing_storm_rebellion.0021.a.no_demand: "Пусть мир сохранится."
 agot_laughing_storm_rebellion.0021.b: "Я принимаю его условия."

 #Lyonel Refused the marriage
 ### POV: Aegon V
 #### Option A: End of story
 agot_laughing_storm_rebellion.0022.t: "Непокорность Оленя"
 agot_laughing_storm_rebellion.0022.desc: "[lyonel.GetTitledFirstName] отвечает быстро и резко — он отказывается от брака. Ни извинений, ни учтивости, только непоколебимая воля человека, который не желает связывать свой дом с моим даже ради мира.\n\nОн проиграл поединок, но в этом вопросе остаётся непреклонным. Буря так просто не укротится."
 agot_laughing_storm_rebellion.0022.a: "Что ж, пусть будет так."
 agot_laughing_storm_rebellion.0022.a.tt: "Да будет так."

 #creating the alliance
 ### POV: Runceford Redwyne, Steffon Tully, Garlan Tyrell (only if their children are involved in Targaryen betrothal break ups)
 ### Lyonel offers alliance for the coming war
 #### Option A: Ally with Lyonel
 #### Option B: End of story
 agot_laughing_storm_rebellion.0023.t: "Призыв к восстанию"
 agot_laughing_storm_rebellion.0023.desc: "Бесчестье, нанесённое дому [lyonel.GetHouse.GetBaseName] из-за помолвки, которую расторг  [duncansmall.GetTitledFirstNameNicknamed], теперь подпитывает восстание, что замыслил [lyonel.GetTitledFirstNameNicknamed] против Железного трона. [lyonel.GetTitledFirstNameNoTooltip] собирает союзников, стремясь сражаться за независимость.\n\nМой ребёнок тоже пострадал от рук Таргариенов, что делает справедливым присоединение к борьбе, которую ведёт [lyonel.GetFirstNameNoTooltip]. Однако я всегда был верен Железному трону, и последствия восстания тяжким грузом ложатся на плечи. Это судьбоносное решение, которое определит будущее нашего дома."
 agot_laughing_storm_rebellion.0023.a: "Мы поддержим «Смеющегося Вихря»."
 agot_laughing_storm_rebellion.0023.b: "Мы сохраним верность Железному трону."

 #WAR
 ### POV: Lyonel
 ### War event (desc depends on who accepted the call)
 #### Option A: The war begins
 agot_laughing_storm_rebellion.0024.t: "Начало шторма"
 agot_laughing_storm_rebellion.0024.garlan_steffon_runceford.desc: "Пришло время. Мои войска готовы, знамёна развеваются на ветру, сердца закалены для битвы. Рядом со мной [runceford.GetTitledFirstName], [garlan.GetTitledFirstName] и [steffon.GetTitledFirstName], призыв к войне разносится по Штормовым землям. Бесчестье, нанесённое дому [lyonel.GetHouse.GetBaseName], будет возмещено яростью шторма.\n\nМы выступаем, чтобы вернуть нашу честь и независимость, готовые встретить любые испытания. Пусть Железный трон содрогнётся, ибо на него обрушится гнев шторма."
 agot_laughing_storm_rebellion.0024.steffon_runceford.desc: "Пришло время. Мои войска готовы, знамёна развеваются на ветру, сердца закалены для битвы. Рядом со мной [runceford.GetTitledFirstName] и [steffon.GetTitledFirstName], призыв к войне разносится по Штормовым землям. Бесчестье, нанесённое дому [lyonel.GetHouse.GetBaseName], будет возмещено яростью шторма.\n\nМы выступаем, чтобы вернуть нашу честь и независимость, готовые встретить любые испытания. Пусть Железный трон содрогнётся, ибо на него обрушится гнев шторма."
 agot_laughing_storm_rebellion.0024.garlan_runceford.desc: "Пришло время. Мои войска готовы, знамёна развеваются на ветру, сердца закалены для битвы. Рядом со мной [runceford.GetTitledFirstName] и [garlan.GetTitledFirstName], призыв к войне разносится по Штормовым землям. Бесчестье, нанесённое дому [lyonel.GetHouse.GetBaseName], будет возмещено яростью шторма.\n\nМы выступаем, чтобы вернуть нашу честь и независимость, готовые встретить любые испытания. Пусть Железный трон содрогнётся, ибо на него обрушится гнев шторма."
 agot_laughing_storm_rebellion.0024.garlan_steffon.desc: "Пришло время. Мои войска готовы, знамёна развеваются на ветру, сердца закалены для битвы. Рядом со мной [garlan.GetTitledFirstName] и [steffon.GetTitledFirstName], призыв к войне разносится по Штормовым землям. Бесчестье, нанесённое дому [lyonel.GetHouse.GetBaseName], будет возмещено яростью шторма.\n\nМы выступаем, чтобы вернуть нашу честь и независимость, готовые встретить любые испытания. Пусть Железный трон содрогнётся, ибо на него обрушится гнев шторма."
 agot_laughing_storm_rebellion.0024.garlan.desc: "Пришло время. Мои войска готовы, знамёна развеваются на ветру, сердца закалены для битвы. Рядом со мной [garlan.GetTitledFirstName], призыв к войне разносится по Штормовым землям. Бесчестье, нанесённое дому [lyonel.GetHouse.GetBaseName], будет возмещено яростью шторма.\n\nМы выступаем, чтобы вернуть нашу честь и независимость, готовые встретить любые испытания. Пусть Железный трон содрогнётся, ибо на него обрушится гнев шторма."
 agot_laughing_storm_rebellion.0024.steffon.desc: "Пришло время. Мои войска готовы, знамёна развеваются на ветру, сердца закалены для битвы. Рядом со мной [steffon.GetTitledFirstName], призыв к войне разносится по Штормовым землям. Бесчестье, нанесённое дому [lyonel.GetHouse.GetBaseName], будет возмещено яростью шторма.\n\nМы выступаем, чтобы вернуть нашу честь и независимость, готовые встретить любые испытания. Пусть Железный трон содрогнётся, ибо на него обрушится гнев шторма."
 agot_laughing_storm_rebellion.0024.runceford.desc: "Пришло время. Мои войска готовы, знамёна развеваются на ветру, сердца закалены для битвы. Рядом со мной [runceford.GetTitledFirstName], призыв к войне разносится по Штормовым землям. Бесчестье, нанесённое дому [lyonel.GetHouse.GetBaseName], будет возмещено яростью шторма.\n\nМы выступаем, чтобы вернуть нашу честь и независимость, готовые встретить любые испытания. Пусть Железный трон содрогнётся, ибо на него обрушится гнев шторма."
 agot_laughing_storm_rebellion.0024.none.desc: "Пришло время. Мои войска готовы, знамёна развеваются на ветру, сердца закалены для битвы. Рядом со мной верные союзники, призыв к войне разносится по Штормовым землям. Бесчестье, нанесённое дому [lyonel.GetHouse.GetBaseName], будет возмещено яростью шторма.\n\nМы выступаем, чтобы вернуть нашу честь и независимость, готовые встретить любые испытания. Пусть Железный трон содрогнётся, ибо на него обрушится гнев шторма."
 agot_laughing_storm_rebellion.0024.a: "В бой!"

 #Lyonel refused the trial
 ### POV: Aegon V
 ### Lyoned refused the trial
 #### Option A: Leads to war (Triggers: 0027)
 #### Option B: Grant him independence anyway (Triggers: 0026)
 agot_laughing_storm_rebellion.0025.t: "Дилемма короля"
 agot_laughing_storm_rebellion.0025.desc: "[lyonel.GetTitledFirstName] отказался от поединка, в котором должны были схлестнуться он и [duncantall.GetTitledFirstName], чего я никак не ожидал. Этот неожиданный поворот событий ставит меня перед трудным выбором.\n\nДаровать ли ему желанную независимость, рискуя создать опасный прецедент для других лордов, или же наказать за дерзость, возможно, втянув державу в новый конфликт? Судьба Штормовых земель и стабильность Железного трона теперь под угрозой."
 agot_laughing_storm_rebellion.0025.a: "Он должен понести наказание."
 agot_laughing_storm_rebellion.0025.b: "Я дарую ему независимость."

 #The Storm King
 ### POV: Lyonel
 ### The Stormlands became independent
 #### Option A: Leads to end of story (Triggers: 0029)
 agot_laughing_storm_rebellion.0026.t: "Штормовой король"
 agot_laughing_storm_rebellion.0026.desc: "Победа за нами. Я завоевал нашу независимость, и Штормовые земли вновь будут править самостоятельно, как это делали Дюррандоны до нас. Наши знамёна реют высоко, возвещая о нашем суверенитете и восстановлении древних прав.\n\nЧесть дома [lyonel.GetHouse.GetBaseName] восстановлена, и мы готовы ковать собственную судьбу, свободные от ярма Железного трона. Да знают все: штормовые короли царствуют безраздельно."
 agot_laughing_storm_rebellion.0026.a: "Слава Штормовым землям!"

 #The Early War
 ### POV: Lyonel
 ### Pre-War event
 #### Option A: Leads to war (Triggers: 0024)
 agot_laughing_storm_rebellion.0027.t: "Надвигающийся шторм"
 agot_laughing_storm_rebellion.0027.desc: "Отказавшись от поединка, я теперь стою на пороге войны. Напряжение витает в воздухе, и Штормовые земли готовятся к неизбежному конфликту. Чтобы обеспечить нашу независимость и защитить честь, я должен заручиться поддержкой союзников, готовых встать с нами против гнева Железного трона.\n\nПуть вперёд будет полон опасностей, но с верными соратниками мы переживём любую бурю."
 agot_laughing_storm_rebellion.0027.a: "Созвать союзников."

 #Fin
 ### POV: Lyonel
 ### Everything goes back to normal (canon-ish timeline)
 #### Option A: Leads to end of story (Triggers: 0030)
 agot_laughing_storm_rebellion.0028.t: "Восстановление мира"
 agot_laughing_storm_rebellion.0028.desc: "После периода борьбы король устроил новую помолвку, и мир вновь близок. Штормовые Земли могут смотреть в будущее с надеждой — наша честь сохранена, а узы с Железным троном восстановлены.\n\nЭтот союз сулит стабильность и обновлённое чувство единства, позволяя нам сосредоточиться на процветании и благополучии нашего народа."
 agot_laughing_storm_rebellion.0028.desc.no_betrothal: "После периода борьбы мир вновь близок. Штормовые земли могут смотреть в будущее с надеждой — наша честь сохранена, а узы с Железным троном восстановлены.\n\nЭтот союз сулит стабильность и обновлённое чувство единства, позволяя нам сосредоточиться на процветании и благополучии нашего народа."
 agot_laughing_storm_rebellion.0028.a: "Мы примем этот вновь обретённый мир."

 #The Storm King
 ### POV: Everyone
 ### The Stormlands became independent
 #### Option A: End of story
 agot_laughing_storm_rebellion.0029.t: "Штормовой король"
 agot_laughing_storm_rebellion.0029.desc: "Дом [lyonel.GetHouse.GetBaseName] одержал победу в борьбе за независимость. Штормовые земли вновь будут править самостоятельно, как это делали Дюррандоны до них. Их знамёна теперь реют высоко, провозглашая суверенитет и восстановление древних прав.\n\nЧесть дома [lyonel.GetHouse.GetBaseName] восстановлена, и они готовы ковать собственную судьбу, свободные от Железного трона."
 agot_laughing_storm_rebellion.0029.a: "Смеющийся Шторм смеётся последним?"

 #Fin
 ### POV: Everyone
 ### Everything goes back to normal (canon-ish timeline)
 #### Option A: End of story
 agot_laughing_storm_rebellion.0030.t: "Восстановление мира"
 agot_laughing_storm_rebellion.0030.desc: "После периода борьбы был достигнут компромисс, вернувший стабильность в державу. Штормовые земли должны теперь смотреть в будущее, памятуя о высокой цене недавнего конфликта.\n\nС восстановлением мира начинается процесс исцеления. Теперь внимание сосредоточено на восстановлении и обеспечении благополучия всех жителей.\n\nПусть этот момент станет уроком важности единства и хрупкости мира."
 agot_laughing_storm_rebellion.0030.a: "Будем надеяться, что мир будет долгим."


 #Lyonel died
 ### POV: Everyone
 ### Lyonel died in the trial by combat
 #### Option A: End of story
 agot_laughing_storm_rebellion.0031.t: "Конец шторма"
 agot_laughing_storm_rebellion.0031.desc: "[lyonel.GetFullNameNicknamed] пал в поединке, в котором против него выступил [duncantall.GetTitledFirstName]. Его непокорность и доблесть, некогда представлявшие серьёзную угрозу, теперь умолкли. Восстание, грозившее разорвать державу, было пресечено со смертью своего предводителя.\n\nЦена мира оказалась высокой, и отголоски этого конфликта надолго останутся в анналах истории. Штормовые земли усмирены, держава может начать исцеление — но тень этих событий ещё долго будет лежать на Железном троне."
 agot_laughing_storm_rebellion.0031.a: "Он сражался, он пал, и теперь он упокоился."

 #Lyonel's Demand refused
 ### POV: Lyonel
 ### Aegon refused Lyonel's demand of new betrothal and sending Duncan Small to the wall
 #### Option A: Escalating the situation
 agot_laughing_storm_rebellion.0032.t: "Ярость шторма"
 agot_laughing_storm_rebellion.0032.desc: "[duncantall.GetTitledFirstName] повержен в поединке, и я потребовал справедливости от короля: его сын, [duncansmall.GetTitledFirstNameNicknamed], должен быть отправлен на Стену, между нашими домами должны быть заключена новая помолвка, которая свяжет нас. Но король отверг мои законные требования!\n\nЭто оскорбление возмутительно и неприемлемо. Теперь не остаётся иного выбора, кроме как взяться за оружие и сражаться за независимость.\n\nШтормовые земли больше не склонятся перед Железным троном. Война началась, и мы вернём себе честь через победу."
 agot_laughing_storm_rebellion.0032.a: "Он ещё пожалеет, что бросил мне вызов."
 agot_laughing_storm_rebellion.0032.b: "Возможно, разумнее будет искать мир."

 #Reconquest
 ### POV: Jaehaerys, Daeron or Duncan Targaryen
 ### Triggers in the future for either Jaehaerys, Daeron or Duncan if they inherit the throne AND if any of The Stormlands LP title gained independent
 #### Option A: Declare reconquest war against The Stormlands
 #### Option A: No reconquest
 agot_laughing_storm_rebellion.0034.t: "Возмездие дракона"
 agot_laughing_storm_rebellion.0034.desc: "Штормовые земли, некогда подвластные Железному трону, теперь стоят особняком — королевство, выкованное в огне мятежа под знаменем, что поднял [lyonel.GetName].\n\nВо времена правления моего отца держава была расколота — ошибка, которую я не могу допустить. Могущество Таргариенов не так просто сломить, а Штормовые земли принадлежат нам по праву. Война требует платы. Кровь, золото, жизни — выбор, что я сделаю сейчас, отзовётся в веках."
 agot_laughing_storm_rebellion.0034.a: "Я захвачу Штормовые земли пламенем и кровью."
 agot_laughing_storm_rebellion.0034.b: "Пусть наслаждаются своей свободой... пока что."

 #Realm Reconquest
 ### POV: Jaehaerys, Daeron or Duncan Targaryen
 ### Triggers in the future for either Jaehaerys, Daeron or Duncan if they inherit the throne AND if any of the LP titles gained independent
 #### Option A: Declare reconquest war against the next independent kingdom
 #### Option A: No reconquest
 agot_laughing_storm_rebellion.0037.t: "Расколотый трон"
 agot_laughing_storm_rebellion.0037.desc: "[reconquest_target_title.GetName], земли, некогда подвластные Железному трону, теперь стали дерзким независимым королевством — горьким напоминанием о неудаче моего отца. С каждым днём они дерзают всё больше, их богатства растут, их сила не знает уз. Держава кажется расколотой, а трон — ослабленным их отсутствием.\n\nТяжесть их мятежа терзает меня, и я больше не могу это терпеть. Железный трон должен быть единым, его владычество — бесспорным. Оставить [reconquest_target_title.GetNameNoTooltip] свободными — значит оставить оружие в руках наших врагов."
 agot_laughing_storm_rebellion.0037.a: "Железный трон должен быть единым. Готовьтесь к войне."
 agot_laughing_storm_rebellion.0037.b: "Возможно, сейчас не время для войны."

 #Redwyne Independence
 ### POV: Redwyne
 agot_laughing_storm_rebellion.0038.t: "Корона из лозы"
 agot_laughing_storm_rebellion.0038.desc: "На протяжении поколений Арбор склонял колени перед лордами, превосходящими нас по имени, но никогда по значимости. Наши корабли наполняли их казну, наше вино украшало их столы, и всё же мы были лишь очередной ветвью на их древе. Больше нет.\n\n[stormlands.GetNameNoTier] освободились от власти дракона, и так же поступит [arbor.GetNameNoTier]. Пусть мир знает — я не просто лорд виноградников и флотов, а король по собственному праву. Арбор не подчиняется никакому повелителю."
 agot_laughing_storm_rebellion.0038.a: "Пусть Арбор правит сам по себе, как всегда должен был."

 #Reach informed about PK Arbor
 ### POV: Reach
 #Option A: accept
 #Option B: inform Redwyne that Olenna will be execute if Redwyne won't swear fealty (active only if Olenna is at Reach court)
 agot_laughing_storm_rebellion.0039.t: "Виноградная лоза обретает свободу"  
 agot_laughing_storm_rebellion.0039.desc: "Сколько люди помнят, #L [arbor.GetAdjective|l]ая#! казна и флот служили державе [reach.GetNameNoTier], его лорды были верными и обязанными вассалами.\n\nНо теперь, когда дракон низвержен, а наша власть укреплена, они провозглашают собственную корону. [k_arbor_holder.GetTitledFirstNameNicknamed] именует себя [Select_CString(k_arbor_holder.IsFemale,'королевой, и её', 'королём, и его')] знамёна больше не подчиняются нам."  
 agot_laughing_storm_rebellion.0039.desc.olenna: "\n\n[olenna.GetTitledFirstName] остаётся в моих чертогах, гостья по имени, заложница по сути.[k_arbor_holder.GetTitledFirstNameNoTooltip] может называть себя [Select_CString(k_arbor_holder.IsFemale,'королевой', 'королём')], может утверждать, что Арбор отделился от Простора, но кровь - более крепкая цепь чем гордость."
 agot_laughing_storm_rebellion.0039.a: "Простор одинок."
 agot_laughing_storm_rebellion.0039.b: "Отправить весть на Арбор — [k_arbor_holder.GetHerHis] корона за её жизнь."

 #Arbor: Reach Threat
 ### POV: Redwyne
 #Option A: swear fealty - Triggers 0041
 #Option B: don't swear fealty - Triggers 0042
 agot_laughing_storm_rebellion.0040.t: "Цена короны"  
 agot_laughing_storm_rebellion.0040.desc: "Прибыло послание, тяжёлое, словно меч у моего горла. [olenna.GetTitledFirstName] томится в темнице. [e_reach_holder.GetTitledFirstName] [Select_CString(e_reach_holder.IsFemale, 'сделала', 'сделал' )] её пешкой в своей игре, чтобы сломить мою корону, пока она не укрепилась. [e_reach_holder.GetSheHe|U] предлагает простой выбор — присягнуть на верность, склониться, как [arbor.GetNameNoTier] всегда склонялся, или смотреть, как [olenna.GetTitledFirstNameNoTooltip] страдает за моё неповиновение.\n\nПреклонить колени — значит перечеркнуть всё, что мы завоевали. Отказаться — значит обречь мою собственную кровь. Нет правильного выбора, есть лишь тот, с которым мне придётся жить."  
 agot_laughing_storm_rebellion.0040.a: "Арбор склоняется — Оленна должна жить."  
 agot_laughing_storm_rebellion.0040.b: "Прости, Оленна."

 ##Arbor remains loyal
 ### POV: Reach
 #Option A: Olenna released, Redwyne vassalized
 agot_laughing_storm_rebellion.0041.t: "Корона отброшена"  
 agot_laughing_storm_rebellion.0041.desc: "[k_arbor_holder.GetTitledFirstName] [Select_CString(k_arbor_holder.IsFemale, 'образумилась', 'образумился' )]. [k_arbor_holder.GetHerHis|U] корона отброшена, [k_arbor_holder.GetHerHis] знамёна спущены, и [arbor.GetNameNoTier] вновь склоняется перед нами. Трон покинут, жизнь возвращена. Справедливая сделка — или, возможно, единственная, которую [k_arbor_holder.GetSheHe] [Select_CString(k_arbor_holder.IsFemale, 'могла', 'мог' )] заключить.\n\nС [k_arbor_holder.GetHerHis] капитуляцией место [olenna.GetTitledFirstName] может вновь обрести свободу. Арбор снова мой, как и должно было быть."  
 agot_laughing_storm_rebellion.0041.a: "Освободить её — вопрос решён."

 ##Arbor remains independent
 ### POV: Reach
 #Option A: Olenna executed
 agot_laughing_storm_rebellion.0042.t: "Цена короны"
 agot_laughing_storm_rebellion.0042.desc: "[k_arbor_holder.GetTitledFirstName] [Select_CString(k_arbor_holder.IsFemale, 'сделала', 'сделал')] свой выбор. [arbor.GetNameNoTier] стоит в одиночестве, его знамена не склоняются, его корона не сломлена. [k_arbor_holder.GetSheHe|U] скорее увидит как прольётся [k_arbor_holder.GetHerHis] собственная кровь, чем преклонит колени. Да будет так.\n\nСудьба, которую встретит [olenna.GetTitledFirstName], предрешена. Предупреждение тем, кто бросает мне вызов, цена, заплаченная за трон, который держат слишком крепко. [reach.GetNameNoTier] не забудет этого оскорбления, как и я.\n\nАрбор может устоять, но его корни орошены его собственной кровью."
 agot_laughing_storm_rebellion.0042.a: "Да будет так."

 #Initial event for everyone
 ### POV: Every Seven Kingdoms ruler (except Lyonel and Aegon because they have their own starter event)
 ### Bookmark starter event
 agot_laughing_storm_rebellion.0050.t: "Восстание Смеющегося Вихря"
 agot_laughing_storm_rebellion.0050.desc: "Держава охвачена хаосом. [lyonel.GetTitledFirstNameNicknamed] поднял свои знамёна в открытом восстании против Железного трона. Его ярость вспыхнула после того, как [duncansmall.GetTitledFirstNameNicknamed], наследник трона, [Select_CString(duncansmall.IsFemale, 'отказалась', 'отказался')] от дочери Лионеля, чтобы жениться по любви на девушке низкого происхождения — скандал, который унизил дом Баратеон и разрушил союз между Штормовым Пределом и Королевской Гаванью.\n\nСмеющийся Вихрь не позволит себя высмеивать. Его вызов эхом разносится по Штормовым землям, бросая вызов правлению Таргариенов и угрожая ввергнуть державу в войну. Пока Лионель действует в ярости, Железный трон должен готовиться к расплате. Воют ветры войны, и теперь каждый дом должен решить, на чьей он стороне."
 agot_laughing_storm_rebellion.0050.a: "Шторм наступил."

 ##############################################################
 ## 0100-0104 MAELYS BLACKFYRE EVENTS                        ##
 ##############################################################

 #Maelys Challenging Daemon
 ### POV: Maelys the Monstrous
 ### Triggers in the future. Challenging the ruler of the Golden Company to take over the leadership
 #### Option A: Initiate duel against GC ruler (Triggers: 0101 or 0102)
 #### Option B: End of story
 agot_laughing_storm_rebellion.0100.t: "Вызов за лидерство"
 agot_laughing_storm_rebellion.0100.desc: "Я слишком долго [Select_CString(ROOT.Char.IsFemale, 'наблюдала', 'наблюдал')], как [daemonbf_lsr.GetTitledFirstNameNicknamed] мучается с лидерством. Пришло время взять всё в свои руки. Я вызову Деймона на поединок за лидерство.\n\nТолько через силу и решимость мы сможем обеспечить наше будущее и вернуть то, что по праву принадлежит нам."
 agot_laughing_storm_rebellion.0100.a: "Я встану во главе."
 agot_laughing_storm_rebellion.0100.b: "Пусть [daemonbf_lsr.GetFirstNameNoTooltip] ведёт нас."

 #the duel
 ### POV: GC Ruler
 ### Duel to death event (triggers if the GC ruler is adult)
 #### Option A: Duel (Triggers: 0104)
 agot_laughing_storm_rebellion.0101.t: "Поединок за власть"
 agot_laughing_storm_rebellion.0101.desc: "[maelysbf_lsr.GetTitledFirstNameNicknamed] [Select_CString(maelysbf_lsr.IsFemale, 'бросила', 'бросил')] вызов моему лидерству, стремясь захватить контроль. Отказ от этого поединка означал бы потерю уважения и верности наших людей. Пришло время защитить моё право на правление и доказать мою силу.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] принять этот вызов. Я и [maelysbf_lsr.GetFirstNameNoTooltip] столкнёмся в противостоянии, чтобы закрепить свою позицию и будущее нашего дела."
 agot_laughing_storm_rebellion.0101.a: "Да начнётся поединок."

 #usurpation
 ### POV: GC Ruler
 ### Maelys usurping the GC (triggers if the GC ruler is child)
 #### Option A: Continue to play as Maelys
 #### Option B: Continue to play as a random Targaryen ruler (if any)
 #### Option C: Continue to play as the king of the IT (if Targaryen)
 agot_laughing_storm_rebellion.0102.t: "Тень Блэкфайра"
 agot_laughing_storm_rebellion.0102.desc: "[maelysbf_lsr.GetFirstNameNicknamed] [Select_CString(maelysbf_lsr.IsFemale, 'ворвалась', 'ворвался')] в мой двор со своей бандой наёмников, [Select_CString(maelysbf_lsr.IsFemale, 'её', 'его')] глаза пылают амбициями и жестокостью. Я чувствую страх, сковывающий моё сердце, пока [Select_CString(maelysbf_lsr.IsFemale, 'она', 'он')] возвышается надо мной, [Select_CString(maelysbf_lsr.IsFemale, 'её', 'его')] чудовищное присутствие отбрасывает тёмную тень на мою судьбу.\n\nТитулы для которых я [Select_CString(ROOT.Char.IsFemale, 'рождена', 'рождён')], всё, что я когда-либо [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал')], ускользает, и, что хуже, [Select_CString(maelysbf_lsr.IsFemale, 'её', 'его')] взгляд обещает больше, чем просто кражу. [Select_CString(maelysbf_lsr.IsFemale, 'Она', 'Он')] [Select_CString(maelysbf_lsr.IsFemale, 'намерена', 'намерен')] казнить меня, положить конец моей жизни и моим притязаниям. Я стою [Select_CString(ROOT.Char.IsFemale, 'одна', 'один')] перед зверем, моё будущее почти угасло."
 agot_laughing_storm_rebellion.0102.a: "От чудовища нет спасения."
 agot_laughing_storm_rebellion.0102.b: "Это ещё не конец."
 agot_laughing_storm_rebellion.0102.c: "[king_house_member.GetTitledFirstName] [Select_CString(king_house_member.IsFemale, 'должна', 'должен' )] знать об этом."

 #Maelys the Monstrous
 ### POV: The old GC Ruler OR Maelys
 ### Conclusion of the duel/usurpation (title, desc and option depending on who won)
 #### Option A: End of story
 agot_laughing_storm_rebellion.0104.maelys.t: "Восхождение Ужасного"
 agot_laughing_storm_rebellion.0104.notmaelys.t: "Падение Ужасного"
 agot_laughing_storm_rebellion.0104.maelys.desc: "Лидерство теперь моё. С силой и решимостью я поведу своих последователей к славе и верну то, что по праву принадлежит нам. Будущее нашего дела в моих руках, и я не остановлюсь ни перед чем, чтобы увидеть наш триумф.\n\nПусть все, кто противостоит нам, трепещут, ибо теперь командует Мейлис «Ужасный»."
 agot_laughing_storm_rebellion.0104.notmaelys.desc: "Мейлис пал, и моё лидерство теперь закреплено. С силой и решимостью я поведу своих последователей к славе."
 agot_laughing_storm_rebellion.0104.notmaelys.a: "Вперёд!"
 agot_laughing_storm_rebellion.0104.maelys.a: "С этого начнётся моё правление."

 #Aegor Bittersteel Starter Event
 agot_laughing_storm_rebellion.0105.t: "Пепел и клятвы"
 agot_laughing_storm_rebellion.0105.desc: "Три года, а вкус поражения всё ещё горчит во рту, словно желчь. Четвёртое восстание Блэкфайра разбилось о холодную сталь и кровь изменников, наши знамёна разорваны, наши родичи убиты или рассеяны.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'пролила', 'пролил')] кровь за #L [daemon_blackfyre.GetFirstName]а#!, за его сыновей, за мечту, которую мы поклялись высечь из руин угасающей династии. И всё же этого было недостаточно. Но Золотые Мечи всё ещё существуют.\n\nИзгнанники, сломленные, мечи, что не знают дома, кроме войны. Блэкфайры не побеждены, и я тоже. Однажды мы снова пересечём Узкое море. Однажды дракон получит своё."
 agot_laughing_storm_rebellion.0105.a: "Ни один король не вечен."

 ##############################################################
 ## 0200 - 0201 SCALY EVENTS                                 ##
 ##############################################################

 #Scaly Baby
 ### POV: A random Stormlandler ruler
 ### Birth of Scaly Allard
 #### Option A: End of story
 agot_laughing_storm_rebellion.0201.t: "Чешуйчатый найдёныш"
 agot_laughing_storm_rebellion.0201.desc: "Придворный врывается в мои покои, задыхаясь от новостей о находке во дворе. Был найден младенец, брошенный и одинокий. Когда я подхожу к ребёнку, я замечаю нечто необыкновенное. [allard.GetHerHis|U] кожа имеет странную текстуру, напоминающую чешую.\n\n[Select_CString(ROOT.Char.IsFemale, 'Заинтригованная и тронутая', 'Заинтригованный и тронутый')] судьбой ребёнка, я решаю взять [allard.GetHerHis] под своё крыло, поклявшись, что [Select_CString(allard.IsFemale, 'она', 'он')] будет [Select_CString(allard.IsFemale, 'воспитана', 'воспитан')] в безопасности и под руководством моего двора."
 agot_laughing_storm_rebellion.0201.a: "Добро пожаловать, чешуйчатый малыш."

 ##############################################################
 ## 0300 - 0311 TYTOS & ELLYN EVENTS                         ##
 ##############################################################

 #Ellyn's Seduction
 ### POV: Ellyn Reyne
 ### Seduction attempt on Tytos Lannister
 #### Option A: Seduction attempt
 agot_laughing_storm_rebellion.0300.t: "Колдунья Утёса Кастерли"
 agot_laughing_storm_rebellion.0300.desc: "Падение с высот — горькая участь, но не настолько горькая, чтобы её нельзя было обратить. [tytos.GetTitledFirstName] мягок, человек, которого легко склонить нежным прикосновением, и я всё ещё знаю, как заставить мужчин забыть своих жён.\n\n[jeyne.GetTitledFirstName]? Тень, мимолётный шёпот в залах Утеса Кастерли, но я заставлю их снова петь моё имя.\n\nМеня презирали слишком долго. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] проложить свой путь, и если на пути стоит [tytos.GetTitledFirstNameNoTooltip], пусть будет так."
 agot_laughing_storm_rebellion.0300.a: "Сердце льва скоро забьётся ради меня."

 #Tytos: Seduction Outcome
 ### POV: Tytos Lannister
 ### Ellyn's seduction attempt
 #### Option A: Remain loyal to current wife (Triggers: 0302)
 #### Option B: Ellyn becomes lover (Triggers: 0303)
 agot_laughing_storm_rebellion.0301.t: "Искушение льва"
 agot_laughing_storm_rebellion.0301.desc: "[ellyn.GetFirstName] стоит близко, её слова сладки, как мёд, её глаза полны обещаний о том, что было и может быть вновь. Воздух между нами густеет, её рука касается моей, её прикосновение прожигает холодные каменные стены Утеса Кастерли.\n\n[jeyne.GetFirstName]... моя жена, мой долг. Но Эллин, с её огнём, её амбициями. Она пробуждает во мне нечто, нечто опасное. Отвернусь ли я или позволю пламени поглотить нас обоих?"
 agot_laughing_storm_rebellion.0301.a: "Джейн — моя жена, моя честь принадлежит ей."
 agot_laughing_storm_rebellion.0301.b: "Пожалуй, пламя стоит риска."

 #Ellyn: Tytos refused me
 ### POV: Ellyn Reyne
 ### Tytos refused me
 #### Option A: Accept the refusal
 #### Option B: Accept the refusal + Jeyne becomes rival of mine
 agot_laughing_storm_rebellion.0302.t: "Отвергнутая львом"
 agot_laughing_storm_rebellion.0302.desc: "Титос отвернулся. Этот слабый, хнычущий лев выбрал [jeyne.GetFirstName] вместо меня. Тусклая, бесцветная женщина, которая не предлагает ему ничего, кроме холодного долга. Я предлагала ему власть, славу, правление королевы, а он всё равно цепляется за неё.\n\nГлупцы вроде него часто делают такой выбор, но ошибка глупца не останется без ответа. Я могу принять это оскорбление и оставить всё как есть, или я могу обеспечить, чтобы правление [jeyne.GetFirstNameNoTooltip] как леди Утеса Кастерли оказалось куда короче, чем она думает."
 agot_laughing_storm_rebellion.0302.a: "Я выжду своё время... пока."
 agot_laughing_storm_rebellion.0302.b: "Джейн пожалеет, что перешла мне дорогу."

 #Ellyn: Tytos became my lover
 ### POV: Ellyn Reyne
 ### Tytos become my lover
 #### Option A: Suggest to Tytos that he should divorce from Jeyne and marry me instead (Triggers: 304)
 agot_laughing_storm_rebellion.0303.t: "Истинная пара льва"
 agot_laughing_storm_rebellion.0303.desc: "[tytos.GetFirstName] пришёл ко мне, наконец осознав то, что я всегда знала: я его законная королева, та, кто может возвысить его до высот, которых [jeyne.GetFirstName] никогда не достичь. Но между нами всё ещё есть одно препятствие. Джейн.\n\nМы не сможем по-настоящему править вместе, пока она остаётся его женой. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] убедить Титоса отречься от неё, чтобы я вновь стала леди Утеса Кастерли. Вместе мы будем править так, как нам предназначено."
 agot_laughing_storm_rebellion.0303.a: "Мы должны сделать это официально, любовь моя."

 #Tytos: Keeping it as secret, or request divorce from father
 ### POV: Tytos Lannister
 ### Ellyn suggested that we shoud marry
 #### Option A: Relationship remains a secret (Triggers: 0311)
 #### Option B: Request divorce from father (Triggers: 0305)
 #### Option C: Request divorce from the High Septon (Triggers: 0306) (only if Tytos already became LP)
 agot_laughing_storm_rebellion.0304.t: "Дилемма льва"
 agot_laughing_storm_rebellion.0304.desc:0 "Страсть [ellyn.GetFirstName] пылает ярко, но путь впереди полон опасностей. [jeyne.GetFirstName] всё ещё является моей женой, и хотя я могу скрывать нашу связь, тайны имеют свойство всплывать в залах Утеса Кастерли.\n\nТолько Верховный септон обладает властью расторгнуть мои узы с Джейн и даровать мне свободу жениться на Эллин, но такое прошение не делается легкомысленно. Продолжать ли мне в ютиться тени или сделать смелый шаг к новому будущему, какой бы ни была цена?"
 agot_laughing_storm_rebellion.0304.a: "Пусть это останется тайной... пока."
 agot_laughing_storm_rebellion.0304.b: "Я попрошу благословения моего отца."
 agot_laughing_storm_rebellion.0304.c: "Я попрошу благословения Верховного септона."

 #Gerold: Requests divorce from the High Septon
 ### POV: Gerold Lannister
 ### Tytos asked me to grant divorce
 #### Option A: I ask the High Septon for permission (Triggers: 0306)
 agot_laughing_storm_rebellion.0305.t: "Бремя отца"
 agot_laughing_storm_rebellion.0305.desc: "[tytos.GetFirstName], мой сын, стоит передо мной, говоря о любви и [ellyn.GetFirstName]. Он желает отречься от [jeyne.GetFirstName], своей жены, и жениться на вдове своего павшего брата. Это противоречит нашим традициям, порядку, который мы, Ланнистеры, долгое время поддерживали. Но его сердце решительно, и, возможно, есть способ.\n\nВерховного септона можно убедить, если я буду настаивать на этом с весом нашего дома за спиной."
 agot_laughing_storm_rebellion.0305.a: "Я напишу Верховному септону."

 #Gerold: High Septon asks money for the divorce -> Pay or Refuse
 ### POV: Gerold Lannister OR Tytos Lannister
 ### The High Septon's reply. Desc depends on if the High Septon is greedy.
 #### Option A: No Divorce (Triggers: 0308) (Only if the High septon is not Greedy)
 #### Option B: Bribe the High Septon (Triggers: 0310)
 #### Option C: Can't afford the divorce (Triggers: 0307)
 agot_laughing_storm_rebellion.0306.t: "Решение Верховного септона"
 agot_laughing_storm_rebellion.0306.desc: "Ответ Верховного септона прибыл, полный веса традиций и законов богов и людей. Он пишет, что этот развод станет тяжким оскорблением священных уз брака."
 agot_laughing_storm_rebellion.0306.greedy.desc: "\n\nНо к концу письма тон смягчается. Намёк между строк. Возможно, при должном проявлении благодарности его сердце можно склонить. Быстро разносится слух, что он не чужд принять золота, если оно предложено с осторожностью.\n\nТеперь выбор за мной. Оставить это дело позади или заплатить цену за его благословение."
 agot_laughing_storm_rebellion.0306.a: "Всё решено. Мы должны двигаться дальше."
 agot_laughing_storm_rebellion.0306.b: "Пожалуй, щедрое подношение изменит его мнение."
 agot_laughing_storm_rebellion.0306.c: "Я не могу позволить себе запятнать свою честь взяткой."
 agot_laughing_storm_rebellion.0306.c.tt: "Брат Эллин, Роджер, также может попытаться подкупить Верховного септона."

 #Roger: If Gerold resued the payment -> Pay or Refuse
 ### POV: Roger Reyne
 ### Gerold/Tytos couldn't afford the bribery, so i pay the sum to bribe the High Septon
 #### Option A: Not bribing the High Septon (Triggers: 0308)
 #### Option B: Bribe the High Septon (Triggers: 0310)
 agot_laughing_storm_rebellion.0307.t: "Дилемма брата"
 agot_laughing_storm_rebellion.0307.desc: "[gerold.GetFirstName] просил благословения Верховного септона, чтобы [tytos.GetFirstName] мог развестись с [jeyne.GetFirstName] и жениться на [ellyn.GetFirstName], но благословение было отказано, если, конечно, золото не изменит мнение Верховного септона.\n\nСтранно, но, несмотря на богатство Ланнистеров, Титос не заплатил взятку. Теперь надежды [ellyn.GetFirstNameNoTooltip] висят на волоске, и она обращается ко мне, своему брату, за помощью.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'желала бы', 'желал бы')] видеть её вновь возвысившейся, но цена немалая, даже для Кастамере."
 agot_laughing_storm_rebellion.0307.a: "Цена слишком высока, даже для Эллин."
 agot_laughing_storm_rebellion.0307.b: "Ради сестры я заплачу всё, что потребуется."

 #Tytos and Ellyn: Noone funded the divorce -> Keep the secret, or elope
 ### POV: Tytos Lannister
 ### Noone granted us divorce
 #### Option A: Leads to end of story (Triggers: 0311)
 #### Option B: We marry anyway (Triggers: 0309 and 0310)
 agot_laughing_storm_rebellion.0308.t: "Скованные законом, разрываемые страстью"
 agot_laughing_storm_rebellion.0308.desc: "Похоже, нет законного пути для моего развода, нет благословения Верховного септона, чтобы освободить от клятв, связывающих меня с [jeyne.GetFirstName]. Боги и люди стоят на нашем пути, и всё же моё сердце всё ещё тянется к [ellyn.GetFirstName].\n\nТрадиции могут держать нас в оковах, но любовь не сдаётся так легко."
 agot_laughing_storm_rebellion.0308.a: "Мы всё равно можем любить друг друга, несмотря на законы."
 agot_laughing_storm_rebellion.0308.b: "К пекло традиции, я женюсь на Эллин!"
 agot_laughing_storm_rebellion.0308.b.tt: "Мой отец может лишить меня наследства за это."

 #Gerold's Decision
 ### POV: Gerold Lannister
 ### Tytos ignored the High Septon's word and married Ellyn anyways.
 #### Option A: End of story
 #### Option B: End of story + Disinherit Tytos
 agot_laughing_storm_rebellion.0309.t: "Предательство сына"
 agot_laughing_storm_rebellion.0309.desc: "Титос бросил вызов закону и чести нашей семьи, отвергнув [jeyne.GetFirstName], чтобы жениться на девушке из дома Рейнов. Он выбрал своё сердце вместо традиций, и ради чего? Мимолётной страсти, которая может принести позор дому Ланнистер.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'предупреждала', 'предупреждал')] его, и всё же он пошёл против самого порядка, который скрепляет наш мир."
 agot_laughing_storm_rebellion.0309.a: "Пусть боги простят тебя... и пусть ты не пожалеешь об этом."
 agot_laughing_storm_rebellion.0309.b: "Ты мне больше не сын, считай себя лишённым наследства."

 #Tytos & Ellyn: We got married!
 ### POV: Tytos/Ellyn
 ### Marriage (3 descs: "desc" is for Tytos, "ellyn.desc" is for Ellyn, "ellyn_anyway.desc" is for Ellyn married regardless the High Septon's decision)
 #### Option A: End of story
 agot_laughing_storm_rebellion.0310.t: "Связанные судьбой"
 agot_laughing_storm_rebellion.0310.desc:0 "Наконец-то Верховный септон дал своё согласие. Путь к моему освобождению от [jeyne.GetFirstName] свободен, и [ellyn.GetFirstName] будет стоять рядом со мной как моя истинная жена.\n\nСемеро улыбнулись нам, и теперь ничто не стоит на нашем пути. Вместе с Эллин мы перекроим', 'перекроим наше будущее и, возможно, даже судьбу дома Ланнистеров. Пусть мир шепчется и сплетничает, это начало чего-то великого."
 agot_laughing_storm_rebellion.0310.ellyn.desc: "Путь к тому, чтобы [tytos.GetTitledFirstName] освободился от [jeyne.GetFirstName] свободен, и теперь я займу своё законное место рядом с ним как его истинная жена.\n\nСемеро улыбнулись нам, и ничто не стоит между мной и властью, которую я всегда была предназначена держать. Вместе с Титосом мы перекроим наше будущее и, возможно, даже судьбу самого дома Рейн. Пусть шепчутся и сплетничают, если посмеют — это только начало."
 agot_laughing_storm_rebellion.0310.ellyn_anyway.desc: "Мы сделали это. Наперекор воле державы, наперекор шёпоту придворных и тяжести традиций, я теперь жена #L [tytos.GetFirstName]а#!. Семеро, возможно, не благословили этот союз, но власть приходит не от благочестия, а от амбиций, а у меня их более чем достаточно.\n\nПусть лорды хватаются за свои жемчуга, пусть септоны проповедуют, ибо я теперь там, где мне всегда было суждено быть. Вместе мы будем править, и те, кто противостоит нам, узнают цену неповиновения."
 agot_laughing_storm_rebellion.0310.a: "Наша новая жизнь начинается сейчас."

 #Ellyn: No marriage
 ### POV: Ellyn Reyne
 ### No Marriage
 #### Option A: End of story + Rivarly with Jeyne
 agot_laughing_storm_rebellion.0311.t: "Предательство возлюбленного"
 agot_laughing_storm_rebellion.0311.desc: "Я думала, что [tytos.GetFirstName] будет полностью моим, что он отречётся от [jeyne.GetFirstName] ради меня. Но теперь, после всего, что мы пережили, он колеблется. Он предпочитает оставаться рядом с этой робкой женщиной, вместо того чтобы захватить власть, которую мы могли бы держать вместе.\n\nКак он слаб, как легко поддаётся долгу и страху. Я ожидала от него большего, но теперь, похоже, мне нужно пересмотреть свои планы. Если он не поднимется к величию со мной, возможно, меня ждёт другой путь."
 agot_laughing_storm_rebellion.0311.a: "Я не позволю так легко отмахнуться от себя."

 ##############################################################
 ## 0400-0469 BLOODRAVEN EVENTS                             ##
 ##############################################################

 #Bloodraven Elected
 ### POV: Bloodraven
 ### Bookmark starter event
 agot_laughing_storm_rebellion.0400.t: "Новый лорд-командующий на Стене"
 agot_laughing_storm_rebellion.0400.desc: "После того, как [jack.GetTitledFirstName] недавно отошёл в мир иной, присягнувшие братья Ночного Дозора избрали меня своим новым командующим. Теперь мой долг — руководить братством и защищать державу от опасностей, таящихся за Стеной...\n\n#weak Ночь собирается, и начинается мой дозор. Он не окончится до самой моей смерти. Я не возьму себе ни жены, не земель, не буду отцом детям. Я не надену корону и не буду добиваться славы. Я буду жить и умру на своём посту. Я — меч во тьме. Я — дозорный на Стене. Я — огонь, который разгоняет холод, я - свет, который приносит рассвет, я - рог, который будит спящих, я - щит, который охраняет царство людей. Я отдаю свою жизнь и честь Ночному Дозору среди этой ночи и всех, которые грядут после неё.#!"
 agot_laughing_storm_rebellion.0400.a: "И теперь начинается мой дозор."

 #Aegon V: Dark Sister
 ### POV: Aegon V
 ### Triggers in the future. Ask Bloodraven to give me back Dark Sister.
 #### Option A: Ask for the sword (Triggers: 0402)
 #### Option B: Do not ask for the sword
 agot_laughing_storm_rebellion.0401.t: "Тёмная Сестра"
 agot_laughing_storm_rebellion.0401.desc: "Прошло много лет с тех пор, как [bloodraven.GetTitledFirstName] отправился на Стену по моей воле, забрав с собой валирийский меч [dark_sister_sword.GetName]. Меч, столь древний и могущественный, как Тёмная Сестра, принадлежит трону, а не Стене.\n\nЯ могу отправить весточку Бриндену, предложив ему целое состояние в золоте, чтобы вернуть меч на его законное место — к Железному трону."
 agot_laughing_storm_rebellion.0401.a: "Тёмная Сестра принадлежит Железному трону."
 agot_laughing_storm_rebellion.0401.b: "Меч ничего для меня не значит."

 #Bloodraven: Aegon V wants Dark Sister LETTER
 ### POV: Bloodraven
 ### Eggs asked for Dark Sister.
 #### Option A: Do not give the sword to Egg (Triggers: 0404)
 #### Option B: Give the sword to Egg (Triggers: 0403)
 agot_laughing_storm_rebellion.0402.opening: "[bloodraven.GetTitledFirstNameNoTooltip]"
 agot_laughing_storm_rebellion.0402.desc: "Я пишу вам не как ваш король, а как потомок крови Старой Валирии, прося вернуть трону то, что по праву принадлежит ему. [dark_sister_sword.GetName], легендарный меч, клинок, что видел кровь и славу в руках наших предков, принадлежит Железному трону, а не замёрзшим просторам Стены.\n\nЯ предлагаю вам золото, достойное его значимости и ценности, чтобы он вновь покоился там, где ему место. Что скажете, Бринден? Почтите ли вы наш дом и вернёте Тёмную Сестру, или она останется потерянной в снегах?"
 agot_laughing_storm_rebellion.0402.a: "Тёмная Сестра останется со мной."
 agot_laughing_storm_rebellion.0402.b: "Я верну Тёмную Сестру на её законное место."

 #Aegon V: Bloodraven gave me Dark Sister LETTER
 ### POV: Aegon V
 ### Bloodraven gave me Dark Sister.
 #### Option A: End of sword story.
 agot_laughing_storm_rebellion.0403.opening: "[aegonv.GetTitledFirstNameNoTooltip]"
 agot_laughing_storm_rebellion.0403.desc: "Ваше письмо дошло до меня здесь, на Стене, и я тщательно обдумал вашу просьбу. [dark_sister_sword.GetName] была мне верным спутником, как и великим Таргариенам прошлого. Её лезвие вкусило кровь наших врагов, и в моей руке она защищала державу. Но я больше не тот человек, каким был, и моё время владения мечом прошло.\n\nРади блага державы и в честь нашего дома я верну Тёмную Сестру вам, где она вновь сможет служить Железному трону, как ей предназначено. Пусть она найдёт достойную руку, чтобы держать её."
 agot_laughing_storm_rebellion.0403.a: "Тёмная Сестра возвращается в свой законный дом."

 #Aegon V: No sword for me LETTER
 ### POV: Aegon V
 ### Bloodraven did not gave me Dark Sister.
 #### Option A: End of sword story.
 agot_laughing_storm_rebellion.0404.opening: "[aegonv.GetTitledFirstNameNoTooltip]"
 agot_laughing_storm_rebellion.0404.desc: "Ваши слова дошли до меня, но я вынужден отклонить ваше предложение. [dark_sister_sword.GetName] была рядом со мной в бесчисленных битвах, её сталь запятнана кровью изменников и врагов державы. Теперь она принадлежит мне, здесь, на Стене, где её служение державе продолжается. Север суров и беспощаден, но именно здесь я несу своё покаяние, и именно здесь Тёмная Сестра исполняет своё предназначение.\n\nЗолото, которое вы предлагаете, не имеет для меня ценности в этой замёрзшей пустоши, и я не расстанусь с ней. Некоторые узы, однажды выкованные, не могут быть разорваны."
 agot_laughing_storm_rebellion.0404.a: "Я этого не забуду."

 #Bloodraven: Following my dreams
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 #### Option A: Travel northwards (leads to end of story. Triggers: 0421).
 #### Option B: End of vision story.
 agot_laughing_storm_rebellion.0420.t: "Зов за Стеной"
 agot_laughing_storm_rebellion.0420.desc: "Видения становятся всё сильнее: дерево, холод и странные шёпоты, что, кажется, манят из-за Стены. Теперь я чувствую это яснее, чем когда-либо, что-то там, в замёрзшей пустыне, тянет меня к себе. Ветер, воющий в ночи, кажется голосом, зовущим на север, приглашающим узнать, что скрывается за краем известного мира.\n\nКаждый инстинкт подсказывает, что это опасно, возможно, даже ловушка, но притяжение неоспоримо. Стена стоит между мной и тем, что ждёт за ней, но я не могу игнорировать чувство, что моя судьба там, в льдах и тенях."
 agot_laughing_storm_rebellion.0420.a: "Ответы лежат за Стеной, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен')] их найти."
 agot_laughing_storm_rebellion.0420.a.tt: "Вы начнёте путешествие на север."
 agot_laughing_storm_rebellion.0420.b: "Мой долг здесь."

 #Bloodraven: Following my dreams
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event. Disappeared while ranging story. (Becomes the Three-Eyed Crow)
 #### Option A: End of vision story.
 agot_laughing_storm_rebellion.0421.t: "Последний полёт Кровавого Ворона"
 agot_laughing_storm_rebellion.0421.desc: "Там, под древним деревом, я вижу их, зеленокожих детей из моих снов. Они стоят молча, не сводя с меня глаз, словно всё это время чего-то ждали. Воздух вокруг них кажется другим, наполненным чем-то древним и могущественным. Я тоже чувствую это, глубоко внутри себя, сдвиг, словно часть меня уже изменилась, словно я уже не тот человек, которым был раньше.\n\nЯ подхожу ближе, и мне кажется, что сам лес дышит, листья шепчут о тайнах, которые я почти понимаю. Дети не разговаривают, но я чувствую их приглашение, их зов, они тянут меня в свой мир, во что-то гораздо более древнее, чем я мог себе представить."
 agot_laughing_storm_rebellion.0421.a: "Я должен понять, куда ведёт этот путь."
 agot_laughing_storm_rebellion.0421.a.tt: "...и, возможно, я никогда не вернусь."

 ### Bloodraven Filler Events

 #Dream: A Tree
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0451.t: "Древо"
 agot_laughing_storm_rebellion.0451.desc: "Когда сон овладевает мной, я оказываюсь в знакомом, но от этого не менее тревожном видении. Окружающий мир растворяется, и я уже не лорд-командующий Ночного Дозора, а одинокий путник в странном холодном краю. Передо мной на холме возвышается древнее древо, его бледная кора светится, словно кость, в лунном свете. У его подножия зияет пещера, подобная разверстой пасти.\n\nЯ чувствую, как оно манит меня ближе. Делаю шаг, но земля под ногами начинает замерзать, ледяные щупальца ползут вверх, угрожая сковать меня на месте. Я пытаюсь идти, но холод усиливается.\n\nПрямо перед тем, как достичь древа, холод окончательно охватывает меня, и я просыпаюсь в испарине, видение всё ещё живо в моей памяти."
 agot_laughing_storm_rebellion.0451.a: "Что на самом деле означает этот сон?"
 agot_laughing_storm_rebellion.0451.a.tt: "...я ли этот ползущий холод? Тёмная пещера? Или, может, само древо?"

 #Dream: A Dark Wolf
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0452.t: "Тёмный волк"
 agot_laughing_storm_rebellion.0452.desc: "Погружаясь в сон, я оказываюсь в новом видении. Бесплодная снежная пустошь, пронизывающий ветер режет сквозь плащ как нож. Вдалеке я вижу его: волка, крупнее любого из мне известных, с шерстью тёмной как ночное небо, сливающейся с тенями пейзажа. Его глаза, красные как кровь на белом снегу, горят тревожным светом. Волк наблюдает за мной этим пронзительным взглядом, будто знает то, что мне неведомо.\n\nЯ пытаюсь приблизиться, но с каждым шагом волк отступает в туман, оставаясь вне досягаемости. Последнее, что я вижу перед его исчезновением - эти пылающие глаза.\n\nЯ просыпаюсь с учащённым сердцебиением, образ тёмного волка навсегда запечатлён в моей памяти."
 agot_laughing_storm_rebellion.0452.a: "Чего хочет от меня этот волк?"
 agot_laughing_storm_rebellion.0452.a.tt: "...и почему его глаза так похожи на мои?"

 #Dream: A Crow with three eyes
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0453.t: "Странный ворон"
 agot_laughing_storm_rebellion.0453.desc: "Погружаясь в сон, я оказываюсь в очередном странном видении. Я стою на пустынном поле под тяжёлым тёмным небом. Издалека ко мне стремительно приближается ворон - его чёрные крылья бесшумно рассекают воздух. Приблизившись, он открывает мне нечто пугающее: это не обычный ворон. Третий глаз, расположенный посреди его лба, пристально смотрит на меня, всевидящий и неустанный. Ворон кружит надо мной, его взгляд беспокоит, словно он видит гораздо больше, чем мне дано постичь.\n\nОн каркает всего один раз, и этот крик эхом разносится по безлюдной земле. У меня возникает ощущение, что за мной наблюдает нечто гораздо большее, чем просто птица.\n\nЯ просыпаюсь с тяжёлым сердцем, отягощённый весом этого взгляда, а образ трёхглазого ворона ещё долго витает в тёмных уголках моего сознания."
 agot_laughing_storm_rebellion.0453.a: "Какие тайны видит ворон своим третьим глазом?"
 agot_laughing_storm_rebellion.0453.a.tt: "...что он разглядел во мне?"

 #Dream: A Climber
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0454.t: "Взбирающийся мальчик"
 agot_laughing_storm_rebellion.0454.desc: "Сон вновь овладевает мной, погружая в видение одновременно странное и знакомое. Я стою в тени огромного замка, чьи стены уходят высоко в небо. Краем глаза я замечаю мальчика - маленького и ловкого, с невероятной лёгкостью карабкающегося по стенам. Его пальцы находят едва заметные выступы в камне, будто он взбирается по лестнице. Он движется как тень, стремительно и бесстрашно, поднимаясь всё выше и выше. Ребёнок не оглядывается, словно не ведает страха падения.\n\nЯ кричу ему, но ветер уносит мой голос. Он продолжает подъём, забираясь на опасную высоту, пока не исчезает в тумане у вершины башни.\n\nЯ пробуждаюсь с чётким образом мальчика в памяти - его невозможное восхождение не покидает мои мысли."
 agot_laughing_storm_rebellion.0454.a: "Кто этот ребёнок и куда он взбирается?"
 agot_laughing_storm_rebellion.0454.a.tt: "...и как он собирается спускаться?"

 #Dream: A Tree Part 2
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0455.t: "Древо вновь зовёт"
 agot_laughing_storm_rebellion.0455.desc: "Сон вновь возвращает меня к тому же видению. Великое древо по-прежнему стоит на холме, его бледная кора возвышается над окрестностями, а ветви тянутся к небу, словно скрюченные пальцы. Пещера у его подножия зияет ещё чернее, чем прежде, будто чего-то - или кого-то - ждёт. Лёд снова ползёт по моим ногам, но на этот раз холод не останавливает меня.\n\nЯ движусь вперёд, каждый шаг даётся тяжелее, но зов древа теперь яснее, настойчивее. Когда я приближаюсь к подножию холма, ветер воет, а земля дрожит под ногами. Ветви древа колышутся, словно живые, маня меня ближе.\n\nЯ резко пробуждаюсь, ощущая холод видения в воздухе, а зов древа звучит в ушах сильнее прежнего."
 agot_laughing_storm_rebellion.0455.a: "Что скрывается под древом?"
 agot_laughing_storm_rebellion.0455.a.tt: "...и почему оно зовёт именно меня?"

 #Dream: A White Wolf Part 2
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0456.t: "Волк в снегах"
 agot_laughing_storm_rebellion.0456.desc: "Я снова оказываюсь в этом сне, где передо мной простирается заснеженная пустошь. Леденящий ветер обжигает кожу, но не холод тревожит меня, а пристальный взгляд, наблюдающий из темноты. Тёмный волк снова здесь - ещё крупнее, чем прежде, его шерсть сливается с тенями на снегу. Пылающие красные глаза горят во тьме, неотрывно следя за мной.\n\nНа этот раз он не отступает при моём приближении. Волк стоит неподвижно, его пронзительный взгляд устремлён на меня. Я делаю шаг вперёд - в ответ раздаётся низкое рычание, пронизывающее морозный воздух. Кажется, он пытается что-то сказать: предупредить или испытать меня. Когда я сокращаю дистанцию, волк оскаливает клыки, а его глаза вспыхивают ярче. Я замираю, разрываясь между желанием подойти ближе и страхом.\n\nМгновение длится вечность - и я просыпаюсь, всё ещё чувствуя на себе этот огненный взгляд."
 agot_laughing_storm_rebellion.0456.a: "Чего хочет от меня волк?"
 agot_laughing_storm_rebellion.0456.a.tt: "...и чего он ждёт?"

 #Dream: A Crow with three eyes Part 2
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0457.t: "Безмолвный наблюдатель"
 agot_laughing_storm_rebellion.0457.desc: "Сон вновь возвращает меня к видению, преследующему мои ночи. Та же пустынная равнина простирается передо мной - безжизненная и мёртвая. На этот раз ворон появляется почти сразу, бесшумно спускаясь с тёмного неба. Его три глаза горят в полумраке, их взгляд пронзительнее, чем прежде. Особенно третий глаз - кажется, он смотрит прямо в душу, видя не только то, кто я есть, но и то, кем могу стать.\n\nВорон садится на искривлённую ветвь и молча наблюдает. Я чувствую его присутствие, его силу - нечто, превосходящее моё понимание. Он каркает всего раз, но так громко, что весь мир будто содрогается от этого звука. Ворон продолжает смотреть, словно ждёт, когда я постигну то, что пока мне недоступно.\n\nЯ пробуждаюсь во тьме, и образ его немигающих глаз преследует меня, будто последовал за мной в мир явьи."
 agot_laughing_storm_rebellion.0457.a: "Какое знание хранит ворон?"
 agot_laughing_storm_rebellion.0457.a.tt: "...и зачем оно нужно мне?"

 #Dream: A Climber Part 2
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0458.t: "Пламя в небесах"
 agot_laughing_storm_rebellion.0458.desc: "Я снова погружаюсь в этот сон. Мальчик здесь - он с прежней лёгкостью взбирается по немыслимо высоким стенам древнего замка. На этот раз я подхожу ближе, к самому основанию башни, ощущая холод камней под ногами. Небеса внезапно темнеют, и по ним проносится красная комета, подобная пылающему мечу. Её огненный хвост освещает путь мальчика, отбрасывая длинные призрачные тени. Я замираю, ослеплённый этим зрелищем, чувствуя, как в воздухе витает нечто грандиозное.\n\nКогда я вновь смотрю на стену - мальчика уже нет. На его месте сидит чёрный ворон. Он смотрит на меня мгновение, затем расправляет крылья и исчезает в небесной дали.\n\nЯ просыпаюсь с видением кровавой кометы и исчезнувшего мальчика, навсегда запечатлённым в памяти."
 agot_laughing_storm_rebellion.0458.a: "Какую судьбу несёт комета?"
 agot_laughing_storm_rebellion.0458.a.tt: "...и куда исчез ребёнок?"

 #Dream: The Night
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0459.t: "Тени ночи"
 agot_laughing_storm_rebellion.0459.desc: "Сон окутывает меня, погружая в кромешную тьму - ночь без звёзд, холод, пронизывающий до костей. Вокруг лишь замёрзшая пустошь, укрытая снежным саваном. Ветер воет, будто тысячи голосов шепчут предостережения о грядущей погибели. Вдалеке мерцает слабый огонёк, отчаянно борющийся с наступающим холодом. Я пытаюсь идти к нему, но с каждым шагом тьма сгущается, поглощая свет.\n\nВ снежной пелене колышутся тени, и я понимаю - в них что-то движется. Что-то древнее. Что-то злое. Поднимаю глаза - небеса пусты, ни луны, ни звёзд, лишь бездонная пустота.\n\nЛедяные объятия сжимаются крепче, огонёк гаснет. Когда тьма почти поглощает меня, я пробуждаюсь, а холод всё ещё цепко держит мою кожу."
 agot_laughing_storm_rebellion.0459.a: "Что шевелится в ночных тенях?"
 agot_laughing_storm_rebellion.0459.a.tt: "...и откуда этот пронизывающий холод?"

 #Dream: The Dead
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0460.t: "Вновь ходячие"
 agot_laughing_storm_rebellion.0460.desc: "Сон охватывает меня, перенося в зловеще знакомый мир. Воздух ледяной, пропитанный запахом тления. Я стою на пустынной равнине с потрескавшейся землёй под ногами. Вдалеке медленно движутся фигуры - их походка неестественна, пугающа. Сначала это лишь тени, но по мере приближения я различаю их чётко.\n\nЭто не люди - это мертвецы. Лица, застывшие в предсмертной гримасе, пустые глазницы, серая разлагающаяся плоть. Но они движутся, будто в их жилах всё ещё течёт жизнь. Мертвецы шествуют ко мне в зловещей тишине. Их взгляд одновременно слеп и всевидящ. Я пытаюсь закричать, но голос предательски застревает в горле. Внезапно один из ходячих поворачивает голову, устремляя на меня свой мёртвый взор.\n\nЯ пробуждаюсь в холодном поту, а образы этих оживших трупов продолжают преследовать меня."
 agot_laughing_storm_rebellion.0460.a: "Почему мёртвые восстают?"
 agot_laughing_storm_rebellion.0460.a.tt: "...и что они ищут?"

 #Aemon: Dragon with three heads
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0461.t: "Драконий сон"
 agot_laughing_storm_rebellion.0461.desc: "Я тихо вхожу в покои мейстера Эймона, собираясь задать ему незначительный вопрос. Но прежде чем я успеваю заговорить, замечаю, как он ворочается во сне, его морщинистый лоб покрылся испариной. Внезапно его глаза широко открываются - на мгновение он выглядит растерянным, застрявшим между сном и явью. Мейстер приподнимается, моргая, будто остатки видения всё ещё не отпускают его.\n\n#italic «У дракона три головы»,#! бормочет он, скорее себе под нос, голос тихий и неуверенный. #italic «Так было всегда... так и будет. Три головы, одно тело. Без них дракон... дракон сломан».#! Он потирает глаза, наконец замечая моё присутствие. #italic «Понимаешь? Одной головы недостаточно. Остальные должны восстать».#!\n\nМейстер качает головой, будто пытаясь стряхнуть остатки сна, но его слова повисают в воздухе, наполненные скрытым смыслом. Я смотрю на него, не зная, говорит ли он из знаний или пророческого сна - тяжёлое предчувствие сжимает моё сердце."
 agot_laughing_storm_rebellion.0461.a: "Что он увидел в том сне?"

 #Aemon: A Targaryen in a distant land
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0462.t: "Дракон вдали"
 agot_laughing_storm_rebellion.0462.desc: "Поздней ночью я застаю мейстера Эймона в его покоях. Он бодрствует, но взгляд его устремлён вдаль, будто видит нечто за пределами этих стен. Его глаза встречаются с моими, но в них читается смятение - словно он всё ещё пребывает между сном и явью.\n\n#italic «Таргариен... в далёкой земле»,#! тихо произносит он, голос дрожит от неуверенности. #italic «Я не знаю где, но я видел... кого-то с нашей кровью, заблудившегося, скитающегося вдали отсюда».#! Его руки слегка трясутся, когда он прижимает их ко лбу, пытаясь осмыслить видение. #italic «Я не понимаю... но знаю - они важны. Как-то связаны с нами».#!\n\nОн замолкает, уставившись в пустоту, будто всё ещё видит отголоски пророчества. Его слова повисают в воздухе, заставляя меня гадать - о ком же идёт речь?"
 agot_laughing_storm_rebellion.0462.a: "Не обо мне ли он говорит?"

 #Ranging: A Child
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0463.t: "Дитя"
 agot_laughing_storm_rebellion.0463.desc: "Я вернулся с короткого дозора, но что-то из этого путешествия не отпускает меня, словно тень, что не желает рассеиваться. Там, в диких землях, среди снегов и пустошей, мне показалось, будто я увидел нечто... или кого-то.\n\nРебёнка — маленького и проворного, мелькающего между деревьями. На мгновение его кожа показалась мне странной... зелёной, словно сама листва. Лишь мимолётный взгляд — и когда я присмотрелся, его уже не было. Никто из отряда ничего не заметил. Я спрашивал, но их взгляды заставили меня усомниться в собственном зрении.\n\nБыло ли это игрой света или чем-то большим? Образ этого зеленокожего ребёнка преследует меня даже сейчас. Я не могу отделаться от ощущения, что увиденное мной было реальным, но я не знаю, что это было... и что означало."
 agot_laughing_storm_rebellion.0463.a: "Было ли это лишь игрой разума?"

 #Ranging: The Children
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0464.t: "Дети Леса"
 agot_laughing_storm_rebellion.0464.desc: "Во время дозора я ненадолго отдалился от группы, желая насладиться тишиной дикой природы. Именно тогда я увидел их — троих детей, стоящих среди деревьев. Их кожа имела странный оттенок, почти зелёный, сливаясь с лесом, будто они были его частью. Они не произнесли ни слова, но их глаза молча звали меня за собой, приглашая в свой мир. Я сделал шаг навстречу, почувствовав странное притяжение, но затем вспомнил о спутниках.\n\nЯ поспешил назад, чтобы привести других, горя желанием показать им увиденное. Но когда мы вернулись, детей уже не было — они исчезли, словно никогда и не появлялись. Мои товарищи смотрели на меня с недоверием, и я сам начал сомневаться, не привиделось ли мне это. Однако ощущение их присутствия не покидает меня, будто они всё ещё наблюдают из лесной тени."
 agot_laughing_storm_rebellion.0464.a: "Не играет ли лес со мной в игры?"

 #Bloodraven: Brothers
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0465.t: "Братья"
 agot_laughing_storm_rebellion.0465.desc: "Ледяной ветер Севера пронизывает Чёрный замок, напоминая о суровой доле, что выпала мне. Глядя за стену, я невольно вспоминаю давно ушедшие дни и лица, врезавшиеся в память как шрамы на душе. Чётче других встают перед глазами два брата: один - благородный и гордый, которого я когда-то любил, пока жажда власти не развела нас; другой - мрачная тень, полная гнева и горечи, чья вражда холодна, как лёд под моими ногами.\n\nЭти мысли гложут меня, всплывая вопреки прошедшим годам. Узы крови и предательства выковали того, кто я есть - человека, стоящего на страже у края света. Эта служба не даёт ни утешения, ни избавления от теней прошлого. Быть может, именно здесь, среди бескрайних снегов и древних деревьев, мне суждено обрести покой - или пронести этих призраков с собой до самого конца."
 agot_laughing_storm_rebellion.0465.a: "Прошлое никогда не отпускает нас по-настоящему."

 #Red Dream: A Girl in the Flames
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0466.t: "Восставший из пламени"
 agot_laughing_storm_rebellion.0466.desc: "Сон погружает меня в новое видение, ослепительное как само солнце. Передо мной стоит фигура, объятая пламенем, её очертания искажаются в дрожащем от жара воздухе. Жар невыносим, языки пламени вздымаются всё выше, поглощая человека целиком.\n\nЯ пытаюсь протянуть руку, но огонь отбрасывает меня назад. В последний момент, прежде чем фигура исчезает в пекле, я поднимаю взгляд - всё небо охвачено огнём, будто горят сами звёзды. Земля дрожит под ногами, и из сердца пламени появляется тень. Дракон, величественный и ужасающий, выходит из огня, его чешуя сверкает как раскалённая сталь. Его взгляд встречается с моим, и я чувствую его древнюю мощь.\n\nЯ пробуждаюсь в холодном поту, образ дракона и сгорающего человека навсегда запечатлён в памяти, их судьбы переплетены с пылающим небом."
 agot_laughing_storm_rebellion.0466.a: "Дракон пробудился... но какой ценой?"

 #Red Dream: Wildfire
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0467.t: "Трон в пламени"
 agot_laughing_storm_rebellion.0467.desc: "Погружаясь в сон, я становлюсь свидетелем видения огня и разрушения. Передо мной раскинулся великий город, но что-то ужасно не так. Пожирающее его пламя - не обычный огонь, а странный, неестественно-зелёный, излучающий зловещее сияние, искажающее сам воздух. Дикий огонь.\n\nЗдания трещат и шипят, когда зелёные языки пламени облизывают их стены, превращая камень и дерево в гротескные формы. Огонь кажется живым, ненасытным, пожирающим не только постройки, но и саму землю под ними.\n\nЗапах горящего камня и пепла наполняет воздух. Я беспомощно наблюдаю, как сердце города превращается в руины. Резко пробуждаюсь, с горящим в мыслях образом уничтоженного города и зелёным заревом дикого огня."
 agot_laughing_storm_rebellion.0467.a: "Это искажённое воспоминание об Эйрионе?"
 agot_laughing_storm_rebellion.0467.a.tt: "...или нечто более зловещее?"

 #Bloodraven: Whispers of the Dragon
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0468.t: "Шёпот дракона"
 agot_laughing_storm_rebellion.0468.desc: "Стоя на вершине Стены, глядя на бескрайние ледяные пустоши, я слышу, как ветер шепчет сквозь морозный воздух, словно голос из далёкого прошлого. Холод кусает кожу, но груз минувшего стыдит меня сильнее. Мои мысли обращаются к старым преданиям - о Таргариенах, видевших в видениях грядущее, чьи сны были одержимы тем, что должно свершиться.\n\nЕщё до Завоевания говорили, что драконы прозревали сквозь время, и их сны были одновременно благословением и проклятием. Пророчества об огне, крови и гибели, мелькавшие в дрожащем пламени, давались дорогой ценой - ввергая видящих их в безумие или отчаяние.\n\nКогда я всматриваюсь в даль, заснеженный мир будто колеблется. Тяжесть этих видений давит на меня. Разделяю ли я это наследие? Взывают ли ко мне тени будущего, показывая грядущее за страшную плату? Стена не даёт ответов - лишь холод и безмолвие."
 agot_laughing_storm_rebellion.0468.a: "Эти сны - дар?"
 agot_laughing_storm_rebellion.0468.a.tt: "...или лишь ждущее своего часа проклятие?"

 #Bloodraven: The Cold Dark Night
 ### POV: Bloodraven
 ### Vision/Dream/Flashback event.
 agot_laughing_storm_rebellion.0469.t: "Холодная тёмная ночь"
 agot_laughing_storm_rebellion.0469.desc: "Завывающий северный ветер несёт с собой нескончаемый холод. В моих покоях колеблющееся пламя одинокой свечи отбрасывает тени на каменные стены. Я сижу в тишине, укутавшись в чёрный плащ Ночного Дозора. В такие ночи воспоминания о старых предательствах прокрадываются в мои мысли.\n\nМой взгляд падает на ворона, молча сидящего в углу и наблюдающего за мной. Я бормочу себе под нос, вспоминая давний разговор: #italic «Измена не становится менее подлой, если изменник оказывается трусом».#! Баттервелл усвоил этот урок, и теперь эти братья тоже осторожно ступают в моей тени.\n\nНочь становится глубже, холод сжимает Чёрный замок в своих объятиях. Где-то там, во тьме, шевелятся тайны, но пока всё тихо. Я бодрствую - мой дозор бесконечен."
 agot_laughing_storm_rebellion.0469.a: "Ночь долга, но я выстою."
 agot_laughing_storm_rebellion.0469.a.tt: "Огонь потрескивает, даруя мало тепла против неумолимого северного холода"
 agot_laughing_storm_rebellion.0469.b: "Предательство оставляет след, но бдительность - мой щит."
 agot_laughing_storm_rebellion.0469.b.tt: "Глаз ворона поблёскивает в свете свечи, напоминая, что ни одна тайна не скроется от моего взора"
 agot_laughing_storm_rebellion.0469.c: "Холод может кусаться, но мой дозор продолжается."
 agot_laughing_storm_rebellion.0469.c.tt: "Снаружи ветер воет в ночи. Внутри я сижу в тишине, вечно бдительный"