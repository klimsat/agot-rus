l_russian:
 agot_banking.0001.t: "Посланники банка"
 agot_banking.0001.desc: "Мои слуги сообщают, что посланники [Concept('agot_bank', 'банка')|E] наконец прибыли для запрошенной аудиенции. Не желая оскорбить этих почтенных гостей, я немедленно отправляюсь к ним.\n\nПосланцы выглядят чужеродно в моём зале, их одеяния резко контрастируют с варёной кожей моих стражников. Однако их предложения предельно ясны.\n\nПередо мной они раскладывают различные варианты займов, различающиеся сроками и суммами. Вопрос в том, какой из них лучше соответствует моим потребностям?"
 agot_banking.0001.a: "Я выбираю #bold небольшую#! сумму золота на #bold долгий#! срок."
 agot_banking.0001.a_tt: "Этот заём будет иметь #difficulty_easy наименьшую#! [Concept('agot_bank_interest_rate', 'процентную ставку')|E]."
 agot_banking.0001.b: "Я выбираю #bold небольшую#! сумму золота на #bold короткий#! срок."
 agot_banking.0001.b_tt: "Это #difficulty_medium умеренно#! увеличит [Concept('agot_bank_interest_rate', 'процентную ставку')|E]."
 agot_banking.0001.c: "Я выбираю #bold крупную#! сумму золота на #bold долгий#! срок."
 agot_banking.0001.c_tt: "Это #difficulty_hard значительно#! увеличит [Concept('agot_bank_interest_rate', 'процентную ставку')|E]."
 agot_banking.0001.d: "Я выбираю #bold крупную#! сумму золота на #bold короткий#! срок."
 agot_banking.0001.d_tt: "Этот заём #XB очень рискованный#!. [Concept('agot_bank_interest_rate', 'Процентная ставка')|E] будет высокой."
 agot_banking.0001.e: "Я [Select_CString(ROOT.Char.IsFemale, 'передумала', 'передумал' )], отослать их."
 agot_banking.0001.e_tt: "Посланцы будут отосланы прочь."

 agot_banking.0002.t: "Отказ в займе"
 agot_banking.0002.desc: "Оценив условия и потенциальные риски моего займа, посланники [Concept('agot_bank', 'банка')|E] отказали в моей просьбе о финансировании. Моё текущее финансовое положение кажется слишком нестабильным, и такой заём был бы [Concept('agot_bank_risk_level', 'слишком рискованным')|E], учитывая текущие финансовые резервы банка и их веру в мою способность соблюдать сроки выплат."
 agot_banking.0002.a: "Я найду необходимые средства в другом месте."

 agot_banking.0003.t: "Предложение от банка"
 agot_banking.0003.desc: "Оценив все риски, посланники [Concept('agot_bank', 'банка')|E] решили предложить мне заём на следующих условиях:\nМне будет предоставлено @gold_icon! [ROOT.Var('loaned_amount').GetValue|2|P].\nСумма должна быть возвращена через [ROOT.Var('loan_term').GetValue|0|N] лет с [Concept('agot_bank_interest_rate', 'процентной ставкой')|E] в размере [ROOT.Var('loan_interest_rate').GetValue|0|N] процентов годовых.\n\n#help @warning_icon! Если вы умрёте до окончания срока займа, вся сумма с процентами должна быть немедленно выплачена вашим первым живым наследником.#!"
 agot_banking.0003.a: "Эти условия оскорбительны. Проваливайте!"
 agot_banking.0003.b: "Условия приемлемы, я [Select_CString(ROOT.Char.IsFemale, 'согласна', 'согласен' )]!"
 agot_banking.0003.c: "Обсудим сроки и сумму ещё раз."

 agot_banking.0004.t: "Требования банка"
 agot_banking.0004.desc: "Напряжение витает в воздухе моих покоев, поскольку посланники [Concept('agot_bank', 'банка')|E] явились за причитающимся.\n\nПосле краткого обмена любезностями, представители банка вручают мне несколько документов. Первый - копия первоначального соглашения, подтверждающая истечение срока займа. Второй - лист с расчётами, согласно которым я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выплатить [ROOT.Var('total_repayment').GetValue|2|N] незамедлительно."
 agot_banking.0004.a: "Я полностью погашу заём."
 agot_banking.0004.a_tt: "Ваш долг будет погашен, и вы освободитесь от обязательств."
 agot_banking.0004.b: "Я могу выплатить только проценты."
 agot_banking.0004.b_tt: "Срок займа будет продлён, и [Concept('agot_bank_interest_rate', 'проценты')|E] продолжат начисляться. Это не считается дефолтом."
 agot_banking.0004.c: "Я не могу выплатить ничего сейчас..."
 agot_banking.0004.c_tt: "Банк расценит это как дефолт. Однако вам могут предложить новое соглашение: заём продлевается на 5 лет, но [Concept('agot_bank_interest_rate', 'процентная ставка')|E] по будущим займам значительно увеличится. #italic Это ваш последний шанс!#!"
 agot_banking.0004.d: "Вы не получите от меня ни гроша!"
 agot_banking.0004.d_tt: "Вы отказываетесь платить по долгам. Банк не забудет этого - вам больше никогда не одобрят заём... Но банк всё равно получит своё."

 agot_banking.0005.t: "Досрочное погашение"
 agot_banking.0005.desc: "Я могу погасить заём до наступления срока платежа. Можно выплатить всю сумму или только половину."
 agot_banking.0005.a: "Я полностью погашу заём."
 agot_banking.0005.a_tt: "Ваш долг будет погашен, и вы освободитесь от обязательств."
 agot_banking.0005.b: "Я выплачу половину суммы."
 agot_banking.0005.b_tt: "Вы погашаете половину основной суммы и половину начисленных [Concept('agot_bank_interest_rate','процентов')|E]. Остаток можно выплатить по истечении срока займа."
 agot_banking.0005.c: "Я выплачу 50 золотых."
 agot_banking.0005.c_tt: "Вы вносите 50 золотых. Остаток можно выплатить по истечении срока займа."
 agot_banking.0005.d: "Я [Select_CString(ROOT.Char.IsFemale, 'передумала', 'передумал' )], выплачу позже."

 agot_banking.0006.t: "Унаследованный долг"
 agot_banking.0006.desc: "[parent_debtor.GetTitledFirstName], да упокоится [parent_debtor.GetSheHe] с миром, [Select_CString(parent_debtor.IsFemale, 'задолжала', 'задолжал' )] [Concept('agot_bank', 'банку')|E].\n\nПоскольку у меня тоже есть текущий заём, банк прислал уведомление, что оба долга будут объединены, так как я являюсь [Select_CString(ROOT.Char.IsFemale, 'законной наследницей и должна', 'законным наследником и должен' )] выполнить обязательства, которые [Select_CString(parent_debtor.IsFemale, 'заключила', 'заключил' )] [parent_debtor.GetFirstNamePossessiveNoTooltip].\n\nОбщая сумма долга теперь составляет @gold_icon! [ROOT.Var('total_repayment').GetValue|2|N]."
 agot_banking.0006.a: "Спасибо за наследство..."

 agot_banking.0007.t: "Унаследованный долг"
 agot_banking.0007.desc: "[parent_debtor.GetTitledFirstName], да упокоится [parent_debtor.GetSheHe] с миром, [Select_CString(parent_debtor.IsFemale, 'задолжала', 'задолжал' )] [Concept('agot_bank', 'банку')|E].\n\nКак [Select_CString(parent_debtor.IsFemale, 'её', 'его')] [Select_CString(ROOT.Char.IsFemale, 'законная наследница', 'законный наследник' )], я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выполнить обязательства, которые [Select_CString(parent_debtor.IsFemale, 'заключила', 'заключил' )] [parent_debtor.GetFirstNamePossessiveNoTooltip]. Следует ожидать скорого визита представителей банка.\n\nОбщая сумма долга составляет @gold_icon! [ROOT.Var('total_repayment').GetValue|2|N]."
 agot_banking.0007.a: "Спасибо за наследство..."

 agot_banking.0101.t: "Гнев банка"
 agot_banking.0101.desc: "Налётчики, посланные и финансируемые [Concept('agot_bank', 'банком')|E], вторглись в мои земли с целью разграбления резиденции!\n\nК счастью, мои солдаты смогли дать отпор до нанесения серьёзного ущерба. Пленные налётчики признались, что были наняты банком в качестве компенсации за мой отказ платить по долгам. Похоже, банк перешёл к более радикальным методам взыскания.\n\nБудем надеяться, что если они попытаются снова, исход будет таким же..."
 agot_banking.0101.a: "Неужели они действительно собираются взыскивать долги ТАК?"

 agot_banking.0102.t: "Гнев банка"
 agot_banking.0102.desc: "Мои поля опустошены, подданные оплакивают погибших, пока наёмники, разграбившие мои земли, скрываются в море, увозя добычу своим хозяевам из [Concept('agot_bank', 'банка')|E]!\n\nМои войска не смогли противостоять их силе, и местный гарнизон пал. Земля ещё долго будет хранить шрамы этого набега, а мои подданные - ещё дольше.\n\nВскоре после набега я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] письмо от банка, кратко сообщающее, что теперь они считают мой долг погашенным."
 agot_banking.0102.a: "Такова цена моей неуплаты?"

 agot_banking.0103.t: "Кинжал во тьме"
 agot_banking.0103.desc: "[Concept('agot_bank', 'Банк')|E] подослал ко мне убийцу!\n\nМоя стража бдительно исполняла свой долг и разоблачила нападавшего, несмотря на его маскировку под доверенного слугу! Я [Select_CString(ROOT.Char.IsFemale, 'избежала', 'избежал' )] подлого и тихого убийства, но тень нового кинжала во тьме уже нависла. Похоже, банк не остановится ни перед чем, чтобы получить своё."
 agot_banking.0103.a: "Проклятые алчные счетоводы!"

 agot_banking.0104.t: "Валар адеммис"
 agot_banking.0104.desc: "Какая жестокая ирония - Безликий, посланный банком, явился мне в тот самый момент, когда я [Select_CString(ROOT.Char.IsFemale, 'размышляла', 'размышлял' )] о своей долговой проблеме. Приняв облик слуги, убийца без труда подкрался и приставил клинок к моему горлу.\n\nКровь хлещет из раны, а удар был нанесён так искусно, что я не могу даже позвать на помощь.\n\nВ последние мгновения я осознаю, что кредиторы потеряли терпение и надеются, что мои наследники окажутся сговорчивее."
 agot_banking.0104.a: "[ROOT.Char.Custom('Scream')]"

 agot_banking.0105.t:0 "Сорванный переворот"
 agot_banking.0105.desc: "[Concept('agot_bank', 'Банк')|E] потерпел неудачу в попытке отстранить меня от власти!\nБанк планировал поддержать завоевание моих земель вассалом в обмен на погашение моих долгов. Их план провалился, и сталь пока молчит - но ненадолго. Нет сомнений, что банк найдёт нового амбициозного изменника, чтобы вернуть своё золото.\n\nБанк продолжит подрывать мою власть и выдвигать претендентов, когда я меньше всего этого ожидаю."
 agot_banking.0105.a: "Моя власть не так шатка!"

 agot_banking.0106.t: "[Select_CString(buyer.IsFemale, 'Золотая соперница', 'Золотой соперник' )]"
 agot_banking.0106.desc: "[buyer.GetTitledFirstName] [Select_CString(buyer.IsFemale, 'заручилась', 'заручился' )] поддержкой [Concept('agot_bank', 'банка')|E] в попытке узурпировать мою власть! [buyer.GetFirstNameNoTooltip] [Select_CString(buyer.IsFemale, 'согласилась', 'согласился' )] погасить мой просроченный долг перед банком в обмен на их поддержку в этой измене. Уже само объявление банком оппозиции мне подорвало мою легитимность в глазах союзников.\nТеперь остаётся лишь ждать, решится ли [buyer.GetFirstNameNoTooltip] предъявить свои права..."
 agot_banking.0106.a: "Я не сдамся без боя!"

 agot_banking.0116.t: "Шанс возвышения"
 agot_banking.0116.desc: "Сегодня при моём дворе появился человек, представившийся посланником [Concept('agot_bank', 'банка')|E]. Представившись, он сообщил, что банк готов поддержать мои притязания на земли, которыми правит [FinalDefaulter.GetFirstNamePossessive]! Всё, что мне нужно сделать - это покрыть оставшуюся часть долга, по которому [FinalDefaulter.GetTitledFirstNameNoTooltip] [Select_CString(FinalDefaulter.IsFemale, 'допустила', 'допустил' )] дефолт. Цена высока, но предложение заманчивое..."
 agot_banking.0116.a: "Это будет плодотворное сотрудничество!"
 agot_banking.0116.b: "Мне не нужны эти земли."

 agot_banking.0107.t: "Требования кредитора"
 agot_banking.0107.desc: "[Concept('agot_bank', 'Банк')|E] направил письмо моему сюзерену, уведомив [Select_CString(debtors_liege.IsFemale, 'её', 'его')] о моём дефолте и запросив [Select_CString(debtors_liege.IsFemale, 'её', 'его')] поддержку в возврате средств. Я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы попытаться убедить [Select_CString(debtors_liege.IsFemale, 'её', 'его')], что требования банка несправедливы, надеясь, что [debtors_liege.GetTitledFirstName] не станет принуждать меня к выплатам или принимать ещё более жёсткие меры..."
 agot_banking.0107.a: "[Select_CString(debtors_liege.IsFemale, 'Она', 'Он')] точно не продаст меня банкирам!"

 agot_banking.0108.t: "Нарушенный контракт"
 agot_banking.0108.desc: "Мне сообщили, что [FinalDefaulter.GetTitledFirstName] [Select_CString(FinalDefaulter.IsFemale, 'допустила', 'допустил' )] дефолт по своему займу и отказывается платить [Concept('agot_bank', 'банку')|E] или соглашаться на новый план выплат.\n\nБанк настаивает, что я, как [Select_CString(FinalDefaulter.IsFemale, 'её', 'его')] сюзерен, [Select_CString(ROOT.Char.IsFemale, 'обязана', 'обязан' )] заставить вассала соблюдать договорённости.\n\nНа мгновение я задумываюсь отказать банку, чтобы не злить вассала, но это будет воспринято как оскорбление и ухудшит условия будущих займов.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы выплатить сумму, которую [Select_CString(FinalDefaulter.IsFemale, 'задолжала', 'задолжал')] [FinalDefaulter.GetFirstNamePossessiveNoTooltip] [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )]... Но не хочу поощрять такое поведение."
 agot_banking.0108.a: "[FinalDefaulter.GetFirstNameNoTooltip] [Select_CString(FinalDefaulter.IsFemale, 'должна', 'должен' )] выполнить контракт!"
 agot_banking.0108.a_tt: "Если [FinalDefaulter.GetTitledFirstName] откажется, вы получите повод для заключения в темницу."
 agot_banking.0108.b: "Я выплачу заем из собственной казны..."
 agot_banking.0108.c: "Эти мелкие денежные споры меня не касаются."
 agot_banking.0108.c_tt: "Это увеличит [Concept('agot_bank_interest_rate', 'процентную ставку')|E] по всем вашим будущим займам."

 agot_banking.0109.t: "Строгий приказ"
 agot_banking.0109.desc: "[debtors_liege.GetTitledFirstName] [Select_CString(debtors_liege.IsFemale, 'призвала', 'призвал' )] меня, чтобы потребовать погашения оставшейся части займа, по которому я недавно [Select_CString(ROOT.Char.IsFemale, 'допустила', 'допустил' )] просрочку. Ясно, что [Concept('agot_bank', 'банк')|E] не перестанет меня преследовать, пока не получит причитающееся, неустанно добиваясь погашения. Стоит ли золото того, чтобы пойти наперекор моему сюзерену?\n\n[debtors_liege.GetFirstNameNoTooltip] [Select_CString(debtors_liege.IsFemale, 'заявила', 'заявил' )], что я [Select_CString(ROOT.Char.IsFemale, 'обязана', 'обязан' )] выполнить условия контракта с банком, возобновить выплаты и полностью погасить заем в течение трёх лет, а также немедленно внести штраф за предыдущую просрочку."
 agot_banking.0109.a: "Как прикажет мой сюзерен."
 agot_banking.0109.a_tt: "Ваш заем будет продлён, и погашение будет требоваться через три года."
 agot_banking.0109.b: "Я не буду!"
 agot_banking.0109.b_tt: "Если вы откажетесь подчиниться, ваш сюзерен может попытаться заключить вас в темницу!"

 agot_banking.0110.t: "Обязательство исполнено"
 agot_banking.0110.desc: "[FinalDefaulter.GetTitledFirstName] [Select_CString(FinalDefaulter.IsFemale, 'подчинилась', 'подчинился' )] моему приказу и [Select_CString(FinalDefaulter.IsFemale, 'обязалась', 'обязался' )] погасить свой заем перед [Concept('agot_bank', 'банком')|E] в течение трёх лет."
 agot_banking.0110.a: "Я [Select_CString(ROOT.Char.IsFemale, 'рада', 'рад' )], что [FinalDefaulter.GetFirstName] [Select_CString(FinalDefaulter.IsFemale, 'сдержал', 'сдержал' )] своё слово."

 agot_banking.0111.t: "Приказ нарушен"
 agot_banking.0111.desc: "[FinalDefaulter.GetTitledFirstName] [Select_CString(FinalDefaulter.IsFemale, 'отказалась', 'отказался' )] погашать свой просроченный заем перед [Concept('agot_bank', 'банком')|E].\n\nТакое неповиновение не должно остаться безнаказанным!"
 agot_banking.0111.a: "[FinalDefaulter.GetSheHe|U] ещё пожалеет об этом."

 agot_banking.0112.t: "Услуга, оплаченная золотом"
 agot_banking.0112.desc: "[debtors_liege.GetTitledFirstName] [Select_CString(debtors_liege.IsFemale, 'сообщила', 'сообщил' )] мне, что представитель [Concept('agot_bank', 'банка')|E] прибыл к [Select_CString(debtors_liege.IsFemale, 'её', 'его')] двору, требуя принять меры в связи с моими невыплатами. Чтобы сохранить хорошие отношения с банком, [Select_CString(debtors_liege.IsFemale, 'она', 'он')] лично [Select_CString(debtors_liege.IsFemale, 'погасила', 'погасил')] мой займ. Однако теперь [Select_CString(debtors_liege.IsFemale, 'она', 'он')] ожидает ответной услуги."
 agot_banking.0112.a: "Главное, что плачу не я..."

 agot_banking.0113.t: "Предотвращенная катастрофа"
 agot_banking.0113.desc: "[Concept('agot_bank', 'Банк')|E] попытался подорвать мою экономику!\n\nОни хотели захватить ключевые предприятия в моей столице, поднять цены и снизить расходы, чтобы выжать причитающиеся им деньги прямо из моей казны за счёт простого люда. К счастью, их попытка была настолько очевидной, что я [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел' )] вовремя вмешаться и предотвратить захват, сохранив стабильность экономики."
 agot_banking.0113.a: "Мои подданные не будет страдать из-за моих долгов."

 agot_banking.0114.t: "Экономический крах"
 agot_banking.0114.desc: "[Concept('agot_bank', 'Банк')|E] разрушил мою экономику!\n\nОни захватили важнейшие предприятия в моих городах и взвинтили цены, чтобы выжать причитающиеся им деньги из моей казны и карманов простолюдинов! Прежде чем я [Select_CString(ROOT.Char.IsFemale, 'осознала', 'осознал' )] происходящее, банк уже перевёл значительные средства из моей столицы в свои сундуки. Нанесённый ущерб будет ощущаться годами, обрекая мой народ на нищету."
 agot_banking.0114.a: "Это катастрофа!"

 agot_banking.0115.t: "Смерть [Select_CString(DeadDefaulter.IsFemale, 'должницы', 'должника' )]"
 agot_banking.0115.desc: "[DeadDefaulter.GetFirstName] [Select_CString(DeadDefaulter.IsFemale, 'умерла', 'умер' )] прежде, чем мы успели принять меры по взысканию [Select_CString(DeadDefaulter.IsFemale, 'её', 'его')] займа, поэтому обязательства перешли к [Select_CString(DeadDefaulter.IsFemale, 'её', 'его')] наследникам, и сейчас никаких действий не требуется."
 agot_banking.0115.a: "Некоторые проблемы решаются сами."

 agot_banking.0202.t: "[ROOT.Char.Custom('agot_bank_name')]: Бухгалтерия"
 agot_banking.0202.IB.desc: "Каждые 5 лет Железный [Concept('agot_bank', 'банк')|E] Браавоса подводит итоги своей деятельности за прошедший период и выплачивает дивиденды своим вкладчикам.\n\n#T Текущие показатели, которые [Select_CString(director.IsFemale, 'предоставила', 'предоставил' )] [Concept('agot_bank_director', Select_CString(director.IsFemale, 'управляющая банка', 'управляющий банка' ))|E] [director.GetTitledFirstName]:#!\n\nСвободный капитал:                            #bold [ROOT.Var('IB_FreeCapital').GetValue|2] #!\nВыданные займы:                             #bold [ROOT.Var('IB_LoanedCapital').GetValue|2] #!\nОбъём инвестиционного фонда:           #bold [ROOT.Var('IB_InvestmentFund').GetValue|2] #!\nОбщая стоимость банка:                     #bold [ROOT.Var('IB_BankValue').GetValue|2] #!\nКоличество выпущенных долей:           #bold [ROOT.Var('IB_NofShares').GetValue|0] #!\nДоход:                                               #bold [ROOT.Var('IB_Earnings').GetValue|2|P] #!\nРасходы:                                            #bold [ROOT.Var('IB_Expenses').GetValue|2|N] #!\nПотери по займам:                           #bold [ROOT.Var('IB_LostLoans').GetValue|2|N] #!\nЧистая прибыль:                                 #bold [ROOT.Var('IB_Profit').GetValue|2] #!\nПрибыль на долю:                               #bold [ROOT.Var('IB_ProfitPerShare').GetValue|2] #!\nДивиденды на долю:                           #bold [ROOT.Var('IB_DividendPerShare').GetValue|2] #!"
 agot_banking.0202.bank1.desc: "Каждые 5 лет [ROOT.Char.Custom('agot_bank_name')] подводит итоги своей деятельности за прошедший период и выплачивает дивиденды своим вкладчикам.\n\n#T Текущие показатели, которые [Select_CString(director.IsFemale, 'предоставила', 'предоставил' )] [Concept('agot_bank_director', Select_CString(director.IsFemale, 'управляющая банка', 'управляющий банка' ))|E] [director.GetTitledFirstName]:#!\n\nСвободный капитал:                            #bold [ROOT.Var('bank1_FreeCapital').GetValue|2] #!\nВыданные займы:                             #bold [ROOT.Var('bank1_LoanedCapital').GetValue|2] #!\nОбъём инвестиционного фонда:           #bold [ROOT.Var('bank1_InvestmentFund').GetValue|2] #!\nОбщая стоимость банка:                     #bold [ROOT.Var('bank1_BankValue').GetValue|2] #!\nКоличество выпущенных долей:           #bold [ROOT.Var('bank1_NofShares').GetValue|0] #!\nДоход:                                               #bold [ROOT.Var('bank1_Earnings').GetValue|2|P] #!\nРасходы:                                            #bold [ROOT.Var('bank1_Expenses').GetValue|2|N] #!\nПотери по займам:                           #bold [ROOT.Var('bank1_LostLoans').GetValue|2|N] #!\nЧистая прибыль:                                 #bold [ROOT.Var('bank1_Profit').GetValue|2] #!\nПрибыль на долю:                               #bold [ROOT.Var('bank1_ProfitPerShare').GetValue|2] #!\nДивиденды на долю:                           #bold [ROOT.Var('bank1_DividendPerShare').GetValue|2] #!"
 agot_banking.0202.bank2.desc: "Каждые 5 лет [ROOT.Char.Custom('agot_bank_name')] подводит итоги своей деятельности за прошедший период и выплачивает дивиденды своим вкладчикам.\n\n#T Текущие показатели, которые [Select_CString(director.IsFemale, 'предоставила', 'предоставил' )] [Concept('agot_bank_director', Select_CString(director.IsFemale, 'управляющая банка', 'управляющий банка' ))|E] [director.GetTitledFirstName]:#!\n\nСвободный капитал:                            #bold [ROOT.Var('bank2_FreeCapital').GetValue|2] #!\nВыданные займы:                             #bold [ROOT.Var('bank2_LoanedCapital').GetValue|2] #!\nОбъём инвестиционного фонда:           #bold [ROOT.Var('bank2_InvestmentFund').GetValue|2] #!\nОбщая стоимость банка:                     #bold [ROOT.Var('bank2_BankValue').GetValue|2] #!\nКоличество выпущенных долей:           #bold [ROOT.Var('bank2_NofShares').GetValue|0] #!\nДоход:                                               #bold [ROOT.Var('bank2_Earnings').GetValue|2|P] #!\nРасходы:                                            #bold [ROOT.Var('bank2_Expenses').GetValue|2|N] #!\nПотери по займам:                           #bold [ROOT.Var('bank2_LostLoans').GetValue|2|N] #!\nЧистая прибыль:                                 #bold [ROOT.Var('bank2_Profit').GetValue|2] #!\nПрибыль на долю:                               #bold [ROOT.Var('bank2_ProfitPerShare').GetValue|2] #!\nДивиденды на долю:                           #bold [ROOT.Var('bank2_DividendPerShare').GetValue|2] #!"
 agot_banking.0202.bank3.desc: "Каждые 5 лет [ROOT.Char.Custom('agot_bank_name')] подводит итоги своей деятельности за прошедший период и выплачивает дивиденды своим вкладчикам.\n\n#T Текущие показатели, которые [Select_CString(director.IsFemale, 'предоставила', 'предоставил' )] [Concept('agot_bank_director', Select_CString(director.IsFemale, 'управляющая банка', 'управляющий банка' ))|E] [director.GetTitledFirstName]:#!\n\nСвободный капитал:                            #bold [ROOT.Var('bank3_FreeCapital').GetValue|2] #!\nВыданные займы:                             #bold [ROOT.Var('bank3_LoanedCapital').GetValue|2] #!\nОбъём инвестиционного фонда:           #bold [ROOT.Var('bank3_InvestmentFund').GetValue|2] #!\nОбщая стоимость банка:                     #bold [ROOT.Var('bank3_BankValue').GetValue|2] #!\nКоличество выпущенных долей:           #bold [ROOT.Var('bank3_NofShares').GetValue|0] #!\nДоход:                                               #bold [ROOT.Var('bank3_Earnings').GetValue|2|P] #!\nРасходы:                                            #bold [ROOT.Var('bank3_Expenses').GetValue|2|N] #!\nПотери по займам:                           #bold [ROOT.Var('bank3_LostLoans').GetValue|2|N] #!\nЧистая прибыль:                                 #bold [ROOT.Var('bank3_Profit').GetValue|2] #!\nПрибыль на долю:                               #bold [ROOT.Var('bank3_ProfitPerShare').GetValue|2] #!\nДивиденды на долю:                           #bold [ROOT.Var('bank3_DividendPerShare').GetValue|2] #!"
 agot_banking.0202.a: "Тщательный анализ!"

 agot_banking.0203.t: "Предложение банка"
 agot_banking.0203.desc: "[ROOT.Char.Custom('agot_bank_name')] направил эмиссара в ответ на мой запрос о покупке долей. За каждую долю, принадлежащую мне, будут выплачиваться [Concept('agot_bank_dividend_level','дивиденды')|E] раз в пять лет. А если я когда-нибудь окажусь в тяжёлом финансовом положении, всегда смогу продать её за единовременную сумму.\n\nТекущая цена одной доли: @gold_icon! [ROOT.Var('ShareBuyingPrice').GetValue|2|N]."
 agot_banking.0203.a: "Мне это не по карману!"
 agot_banking.0203.b: "Договорились!"
 agot_banking.0203.c: "Я куплю 5 долей."
 agot_banking.0203.d: "Не сейчас, я [Select_CString(ROOT.Char.IsFemale, 'передумала', 'передумал' )]."

 agot_banking.0204.t: "Продажа доли банка"
 agot_banking.0204.desc: "Меня не устраивает, сколько золота у меня вложено в [ROOT.Char.Custom('agot_bank_name')] ради пары медяков, что они присылают мне каждые несколько лет! Куда разумнее продать одну из моих долей и вернуть своё золото, пока ещё не поздно — вдруг цена доли обрушится.\n\nЯ могу продать долю, вложенную в [ROOT.Char.Custom('agot_bank_name')], и получить её текущую стоимость — @gold_icon! [ROOT.Var('ShareSellingPrice').GetValue|2|N]."
 agot_banking.0204.a: "Это меня устраивает."
 agot_banking.0204.b: "Нет, я оставлю свою долю."

 agot_banking.0205.t: "[Select_CString(director.IsFemale, 'Новая управляющая', 'Новый управляющий' )] банка"
 agot_banking.0205.desc: "[ROOT.Char.Custom('agot_bank_name')] выбрал нового [Concept('agot_bank_director', 'управляющего')|E], который будет курировать и пересматривать условия дальнейшей деятельности.\n\n[Select_CString(director.IsFemale, 'Новая', 'Новый' )] [Concept('agot_bank_director', Select_CString(director.IsFemale, 'управляющая банка', 'управляющий банка' ))|E] — [director.GetTitledFirstName], [Select_CString(director.IsFemale, 'получившая', 'получивший' )] [ROOT.Var('director_winner_votes').GetValue] голосов, — поведёт банк к ещё большему процветанию!"
 agot_banking.0205.a: "Браво!"
 agot_banking.0205.a_tt: "Вы получили [THIS.Var('director_votes').GetValue] голосов."

 agot_banking.0206.t: "Определение уровня риска"
 agot_banking.0206.desc: "Перед тем как выдать заем клиенту, [Concept( 'agot_bank', 'банк' )|E] должен определить его кредитный рейтинг. В зависимости от оценки будет принято решение о возможности выдачи займа.\n\nКак [Concept('agot_bank_director', Select_CString(ROOT.Char.IsFemale, 'управляющей банка', 'управляющему банка' ))|E], именно мне предстоит установить, какой уровень риска банк готов принять, прежде чем отказывать ненадежным клиентам."
 agot_banking.0206.a: "Будем осторожны. Нам не нужны лишние риски!"
 agot_banking.0206.b: "Выберем сбалансированный подход, оценивая риск и выгоды равномерно."
 agot_banking.0206.c: "Всех милости просим!"

 agot_banking.0207.t: "Определение уровня дивидендов"
 agot_banking.0207.desc: "Как [Concept('agot_bank_director', Select_CString(ROOT.Char.IsFemale, 'управляющая банка', 'управляющий банка' ))|E] [ROOT.Char.Custom('agot_bank_name')], я решаю, какая часть прибыли будет выплачена вкладчикам. Сумма, не распределённая в виде [Concept( 'agot_bank_dividends', 'дивидендов' )|E], остаётся в банке и может быть использована для получения дополнительной прибыли за счёт новых займов в будущем."
 agot_banking.0207.a: "Мы должны сосредоточиться на долгосрочном росте!"
 agot_banking.0207.a_tt: "Каждые 5 лет 50% [Concept( 'agot_bank_profits', 'прибыли банка' )|E] будет выплачиваться вкладчикам в виде дивидендов."
 agot_banking.0207.b: "Сбалансированная политика будет устойчивее."
 agot_banking.0207.b_tt: "Каждые 5 лет 75% [Concept( 'agot_bank_profits', 'прибыли банка' )|E] будет выплачиваться вкладчикам в виде дивидендов."
 agot_banking.0207.c: "Наша цель — обогащение вкладчиков!"
 agot_banking.0207.c_tt: "Каждые 5 лет 100% [Concept( 'agot_bank_profits', 'прибыли банка' )|E] будет выплачиваться вкладчикам в виде дивидендов."

 agot_banking.0210.t: "Невыполненные долговые обязательства"
 agot_banking.0210.desc: "Служащий сообщает мне, что [FinalDefaulter.GetTitledFirstName] больше не может или не желает возвращать свой заем на сумму [ROOT.Var('show_loan').GetValue|2] @gold_icon. Средства, выданные в долг, потеряны. Это требует немедленных действий со стороны [Concept( 'agot_bank', 'банка' )|E]. Наши вкладчики будут в ярости, если я просто забуду об этих средствах!\n\nКак [Concept('agot_bank_director', Select_CString(ROOT.Char.IsFemale, 'управляющая банка', 'управляющий банка' ))|E], я могу решить, как поступить."
 agot_banking.0210.a: "Я займусь этим лично."
 agot_banking.0210.a_tt: "Вы получите несколько вариантов для попытки вернуть утерянный заем."
 agot_banking.0210.b: "Поручу это вкладчикам."
 agot_banking.0210.b_tt: "Один из вкладчиков банка решит, как вернуть утерянный заем."
 agot_banking.0210.c: "Больше не беспокойте меня по поводу должников!"
 agot_banking.0210.c_tt: "Отныне все случаи невозврата будут рассматриваться вкладчиками."
 agot_banking.0210.d: "Такова цена ведения дел."
 agot_banking.0210.d_tt: "Вы не сможете вернуть этот заем в будущем!"

 agot_banking.0211.t: "Невыполненные долговые обязательства"
 agot_banking.0211.raid_failed_desc: "Беда! Стражники, которых держит при себе [FinalDefaulter.GetTitledFirstName], были хорошо подготовлены и отбили нападение нанятых нами пиратов, не позволив им захватить сколько-нибудь значительную добычу из [FinalDefaulter.GetHerHis] владений.\n\nПридется попробовать что-то другое..."
 agot_banking.0211.assassin_failed_desc: "Беда! Отправленный убийца не вернулся. Надо полагать, его схватили телохранители, которых держит при себе [FinalDefaulter.GetFirstName], и он не выполнил свою миссию.\n\nПридется попробовать что-то другое..."
 agot_banking.0211.claim1_failed_desc: "Беда! Подделанная нами претензия на титул, которым владеет [FinalDefaulter.GetTitledFirstName], оказалась недостаточно убедительной, чтобы привлечь потенциальных покупателей.\n\nПридется попробовать что-то другое..."
 agot_banking.0211.claim2_failed_desc: "Плохие новости: несмотря на то, что [buyer.GetTitledFirstName] изначально [Select_CString(buyer.IsFemale, 'проявила', 'проявил' )] интерес к приобретению сфабрикованной претензии на титул, которым владеет [FinalDefaulter.GetTitledFirstName], [buyer.GetSheHe] [Select_CString(buyer.IsFemale, 'отказала', 'отказал' )] нам в запрашиваемой цене.\n\nПридется попробовать что-то другое..."
 agot_banking.0211.letter1_failed_desc: "Плохие новости: письмо, отправленное сюзерену [Select_CString(FinalDefaulter.IsFemale, 'должницы', 'должника' )], не убедило его помочь нам восстановить справедливость. Похоже, [FinalDefaulter.GetTitledFirstName] [Select_CString(FinalDefaulter.IsFemale, 'сумела', 'сумел' )] доказать, что наши претензии незаконны.\n\nПридется попробовать что-то другое..."
 agot_banking.0211.letter2_failed_desc: "Плохие новости: хотя сюзерен [Select_CString(FinalDefaulter.IsFemale, 'должницы', 'должника' )] и признаёт обоснованность наших требований, он все равно отказывается приказать, чтобы [FinalDefaulter.GetTitledFirstNameNoTooltip] [Select_CString(FinalDefaulter.IsFemale, 'выполнила', 'выполнил' )] условия соглашения с банком.\n\nПридется попробовать что-то другое..."
 agot_banking.0211.letter3_failed_desc: "Плохие новости: даже убедив сюзерена [Select_CString(FinalDefaulter.IsFemale, 'должницы', 'должника' )] потребовать соблюдения соглашения, [FinalDefaulter.GetTitledFirstNameNoTooltip] наотрез [Select_CString(FinalDefaulter.IsFemale, 'отказалась', 'отказался' )] подчиниться.\n\nПридется действовать более решительно..."
 agot_banking.0211.economy_failed_desc: "Неудача: наши агрессивные инвестиции в экономику земель, которыми правит [FinalDefaulter.GetTitledFirstName], не увенчались успехом. Похоже, [FinalDefaulter.GetSheHe] [Select_CString(FinalDefaulter.IsFemale, 'приняла', 'принял' )] меры противодействия, чтобы не дать нам вывести средства через [FinalDefaulter.GetHerHis] местную экономику.\n\nПридется попробовать что-то другое..."
 agot_banking.0211.director_desc: "Чтобы вернуть потерянный заем, который [Select_CString(FinalDefaulter.IsFemale, 'должна', 'должен' )] выплатить [FinalDefaulter.GetTitledFirstName], у вас есть несколько подходов на выбор."
 agot_banking.0211.delegated_desc: "[Concept('agot_bank_director', Select_CString(director.IsFemale, 'Управляющая банка', 'Управляющий банка' ))|E] [director.GetTitledFirstName] [Select_CString(director.IsFemale, 'сообщила', 'сообщил' )] вам о том, что [FinalDefaulter.GetTitledFirstName] не соблюдает свои обязательства по займу и [Select_CString(director.IsFemale, 'поручила', 'поручил' )] вам вернуть утраченные средства.\n\nДля выполнения этого поручения у вас есть несколько вариантов действий."
 agot_banking.0211.a: "Нанять пиратов для набега на [FinalDefaulter.GetHerHis] земли."
 agot_banking.0211.a_tt: "Это обойдется банку в [default_revisor.MakeScope.Var('RaiderCost').GetValue] @gold_icon!. В случае успеха налётчики вернут долг банку и оставят себе всю лишнюю добычу."
 agot_banking.0211.b: "Послать убийцу, надеясь, что [FinalDefaulter.GetHerHis] наследники будут сговорчивее."
 agot_banking.0211.b_tt: "Это обойдется банку в [default_revisor.MakeScope.Var('AssassinCost').GetValue] @gold_icon!. Если [FinalDefaulter.GetTitledFirstName] будет [Select_CString(FinalDefaulter.IsFemale, 'устранена', 'устранён' )] убийцей, мы попробуем взыскать долг с [FinalDefaulter.GetHerHis] наследников."
 agot_banking.0211.c: "Подделать претензию на [FinalDefaulter.GetHerHis] титул."
 agot_banking.0211.c_tt: "Это обойдется банку в [default_revisor.MakeScope.Var('ClaimCost').GetValue] @gold_icon!. В случае успеха мы попробуем продать претензию амбициозному соседу персонажа [FinalDefaulter.GetTitledFirstName]."
 agot_banking.0211.d: "Отправить письмо [FinalDefaulter.GetHerHis] сюзерену."
 agot_banking.0211.d_tt: "Это обойдется банку в [default_revisor.MakeScope.Var('LetterCost').GetValue] @gold_icon!. Сюзерен персонажа [FinalDefaulter.GetTitledFirstName] может потребовать от своего вассала соблюсти соглашение или даже покрыть долг самостоятельно."
 agot_banking.0211.e: "Подорвать [FinalDefaulter.GetHerHis] экономику."
 agot_banking.0211.e_tt: "Это обойдется банку в [default_revisor.MakeScope.Var('EconomyCost').GetValue] @gold_icon!. При успехе мы сможем постепенно изъять долг через наши вложения, ослабив местные города. На восстановление им потребуется время."
 agot_banking.0211.g: "Мы ничего не можем сделать."
 agot_banking.0211.g_tt: "Заем не может быть возвращен ни сейчас, ни в будущем!"
 agot_banking.0211.a.failure: "Набег не удался."
 agot_banking.0211.a.success: "Набег удался."
 agot_banking.0211.b.failure: "Убийца потерпел неудачу."
 agot_banking.0211.b.success: "Убийца добился успеха."
 agot_banking.0211.c.failure: "Претензия признана нелегитимной."
 agot_banking.0211.c.success: "Претензия признана легитимной."
 agot_banking.0211.d.failure: "Сюзерен не поверил обвинениям."
 agot_banking.0211.d.success: "Сюзерен признал ваши претензии обоснованными."
 agot_banking.0211.e.failure: "Подрыв экономики провалился."
 agot_banking.0211.e.success: "Подрыв экономики удался."

 agot_banking.0212.t: "Возвращение займа"
 agot_banking.0212.raid_success_desc: "Сработало!\nПираты, отправленные в столицу, где правит [FinalDefaulter.GetTitledFirstName], сумели разграбить деревни и города на [FinalDefaulter.GetHerHis] землях и скрыться с добычей до того, как стража смогла организовать достойную оборону. Захваченного золота как раз хватило, чтобы компенсировать убытки от займа, который [FinalDefaulter.GetTitledFirstNameNoTooltip] [Select_CString(FinalDefaulter.IsFemale, 'отказалась', 'отказался' )] выплатить."
 agot_banking.0212.assassin_success_desc: "Сработало!\nУбийца, посланный устранить [Select_CString(FinalDefaulter, 'должницу', 'должника' )], добился успеха - [FinalDefaulter.GetTitledFirstName] [Select_CString(FinalDefaulter, 'отошла', 'отошёл' )] в мир иной. Остаётся лишь надеяться, что [FinalDefaulter.GetHerHis] наследники окажутся более здравомыслящими — иначе они тоже скоро окажутся в могиле..."
 agot_banking.0212.claim_success_desc: "Сработало!\nПодделанная нами претензия была признана законной, и [buyer.GetTitledFirstName] [Select_CString(buyer.IsFemale, 'приобрела', 'приобрёл' )] её у нас. Полученных от н[buyer.GetHerHis] денег хватило, чтобы покрыть убытки от займа, который [FinalDefaulter.GetTitledFirstName] [Select_CString(FinalDefaulter.IsFemale, 'отказалась', 'отказался' )] выплатить. Остаётся надеяться, что [buyer.GetFirstNameNoTooltip] на поле боя объяснит [FinalDefaulter.GetHerHim], почему с банком шутки плохи."
 agot_banking.0212.letter1_success_desc: "Сработало!\nСюзерен [Select_CString(FinalDefaulter, 'должницы', 'должника' )] признал наши требования законными и выплатил долг из собственных средств. Теперь [FinalDefaulter.GetHerHis] долг погашен — пусть [FinalDefaulter.GetTitledFirstName] теперь [Select_CString(FinalDefaulter.IsFemale, 'сама', 'сам' )] разбирается с гневом своего сюзерена."
 agot_banking.0212.letter2_success_desc: "Сработало!\nПосле того как [FinalDefaulter.GetTitledFirstName] [Select_CString(FinalDefaulter, 'получила', 'получил' )] от своего сюзерена приказ вернуть долг банку, [FinalDefaulter.GetSheHe] [Select_CString(FinalDefaulter, 'подчинилась и согласилась', 'подчинился и согласился' )] выплатить не только долг, но и штраф в течение следующих трёх лет."
 agot_banking.0212.economy_success_desc: "Сработало!\nБлагодаря агрессивным вложений в столицу, где пребывает [FinalDefaulter.GetTitledFirstName], мы сумели перекачать достаточно средств из местной экономики [FinalDefaulter.GetHerHis] владений в казну банка, компенсировав тем самым убытки от неуплаченного займа."
 agot_banking.0212.a: "Банк получил своё."

 agot_banking.0213.t: "Дробление долей"
 agot_banking.0213.desc: "[ROOT.Char.Custom('agot_bank_name')] процветает в последние годы, что привело к увеличению стоимости одной доли. Поскольку это затрудняет покупку новых долей, банк решил провести дробление:\n\nКаждая имеющаяся доля у вкладчиков будет разделена на две. Таким образом, цена новых долей уменьшится вдвое, но суммарная стоимость долей у текущих вкладчиков останется прежней."
 agot_banking.0213.a: "Разумный ход."
 agot_banking.0213.a_tt: "Теперь у вас вдвое больше долей, чем было ранее."

 agot_banking.0301.t: "[ROOT.Char.Custom('agot_bank_name')]: Бухгалтерия"
 agot_banking.0301.IB.desc: "Являясь [Select_CString(ROOT.Char.IsFemale, 'вкладчицей', 'вкладчиком' )], вы можете ознакомиться с текущей бухгалтерией, которую составил [ROOT.Char.Custom('agot_bank_name')].\n\n#T Вот актуальные цифры, представленные служащими банка:#!\n\nДоступный капитал:                            #bold @gold_icon! [ROOT.Var('IB_FreeCapital').GetValue|2] #!\nКапитал, выданный в займы:       #bold @gold_icon! [ROOT.Var('IB_LoanedCapital').GetValue|2] #!\nОбъём инвестиционного фонда:             #bold @gold_icon! [ROOT.Var('IB_InvestmentFund').GetValue|2] #!\nОбщая стоимость банка:                #bold @gold_icon! [ROOT.Var('IB_BankValue').GetValue|2] #!\nКоличество выпущенных долей:                     #bold [ROOT.Var('IB_NofShares').GetValue|0] #!\nДоход:                                          #bold @gold_icon! [ROOT.Var('IB_Earnings').GetValue|2|P] #!\nРасходы:                                         #bold @gold_icon! [ROOT.Var('IB_Expenses').GetValue|2|N] #!\nПотери из-за невыплат по займам:                     #bold @gold_icon! [ROOT.Var('IB_LostLoans').GetValue|2|N] #!"
 agot_banking.0301.bank1.desc: "Являясь [Select_CString(ROOT.Char.IsFemale, 'вкладчицей', 'вкладчиком' )], вы можете ознакомиться с текущей бухгалтерией, которую составил [ROOT.Char.Custom('agot_bank_name')].\n\n#T Вот актуальные цифры, представленные служащими банка:#!\n\nДоступный капитал:                            #bold @gold_icon! [ROOT.Var('bank1_FreeCapital').GetValue|2] #!\nКапитал, выданный в займы:       #bold @gold_icon! [ROOT.Var('bank1_LoanedCapital').GetValue|2] #!\nОбъём инвестиционного фонда:             #bold @gold_icon! [ROOT.Var('bank1_InvestmentFund').GetValue|2] #!\nОбщая стоимость банка:                #bold @gold_icon! [ROOT.Var('bank1_BankValue').GetValue|2] #!\nКоличество выпущенных долей:                     #bold [ROOT.Var('bank1_NofShares').GetValue|0] #!\nДоход:                                          #bold @gold_icon! [ROOT.Var('bank1_Earnings').GetValue|2|P] #!\nРасходы:                                         #bold @gold_icon! [ROOT.Var('bank1_Expenses').GetValue|2|N] #!\nПотери из-за невыплат по займам:                     #bold @gold_icon! [ROOT.Var('bank1_LostLoans').GetValue|2|N] #!"
 agot_banking.0301.bank2.desc: "Являясь [Select_CString(ROOT.Char.IsFemale, 'вкладчицей', 'вкладчиком' )], вы можете ознакомиться с текущей бухгалтерией, которую составил [ROOT.Char.Custom('agot_bank_name')].\n\n#T Вот актуальные цифры, представленные служащими банка:#!\n\nДоступный капитал:                            #bold @gold_icon! [ROOT.Var('bank2_FreeCapital').GetValue|2] #!\nКапитал, выданный в займы:       #bold @gold_icon! [ROOT.Var('bank2_LoanedCapital').GetValue|2] #!\nОбъём инвестиционного фонда:             #bold @gold_icon! [ROOT.Var('bank2_InvestmentFund').GetValue|2] #!\nОбщая стоимость банка:                #bold @gold_icon! [ROOT.Var('bank2_BankValue').GetValue|2] #!\nКоличество выпущенных долей:                     #bold [ROOT.Var('bank2_NofShares').GetValue|0] #!\nДоход:                                          #bold @gold_icon! [ROOT.Var('bank2_Earnings').GetValue|2|P] #!\nРасходы:                                         #bold @gold_icon! [ROOT.Var('bank2_Expenses').GetValue|2|N] #!\nПотери из-за невыплат по займам:                     #bold @gold_icon! [ROOT.Var('bank2_LostLoans').GetValue|2|N] #!"
 agot_banking.0301.bank3.desc: "Являясь [Select_CString(ROOT.Char.IsFemale, 'вкладчицей', 'вкладчиком' )], вы можете ознакомиться с текущей бухгалтерией, которую составил [ROOT.Char.Custom('agot_bank_name')].\n\n#T Вот актуальные цифры, представленные служащими банка:#!\n\nДоступный капитал:                            #bold @gold_icon! [ROOT.Var('bank3_FreeCapital').GetValue|2] #!\nКапитал, выданный в займы:       #bold @gold_icon! [ROOT.Var('bank3_LoanedCapital').GetValue|2] #!\nОбъём инвестиционного фонда:             #bold @gold_icon! [ROOT.Var('bank3_InvestmentFund').GetValue|2] #!\nОбщая стоимость банка:                #bold @gold_icon! [ROOT.Var('bank3_BankValue').GetValue|2] #!\nКоличество выпущенных долей:                     #bold [ROOT.Var('bank3_NofShares').GetValue|0] #!\nДоход:                                          #bold @gold_icon! [ROOT.Var('bank3_Earnings').GetValue|2|P] #!\nРасходы:                                         #bold @gold_icon! [ROOT.Var('bank3_Expenses').GetValue|2|N] #!\nПотери из-за невыплат по займам:                     #bold @gold_icon! [ROOT.Var('bank3_LostLoans').GetValue|2|N] #!"
 agot_banking.0301.a: "На сегодня с цифрами хватит."

 agot_banking.0401.t: "Пополнение инвестиционного фонда"
 agot_banking.0401.desc: "Пополняя инвестиционный фонд [Concept('agot_bank', 'банка')|E], вы лишаетесь возможности выдать эти средства в виде займов потенциальным должникам.\n\nВзамен фонд будет приносить прибыль каждый год — если, конечно, вложения окажутся разумными. Однако вложения в нестабильные и рискованные предприятия могут привести к потерям средств, особенно если фондом управляет некомпетентный [Concept('agot_bank_director', 'управляющий банка')|E]!"
 agot_banking.0401.a: "Сделать вложение."
 agot_banking.0401.a_tt: "1000 @gold_icon! будут безвозвратно переведены из резервных средств банка в инвестиционный фонд. @warning_icon! #X После вложения средства невозможно будет изъять из фонда. #!"
 agot_banking.0401.b: "Я [Select_CString(ROOT.Char.IsFemale, 'передумала', 'передумал' )]."

 agot_banking.0403.t: "Доходы инвестиционного фонда"
 agot_banking.0403.positive_desc: "Как и каждый год, служащие банка предоставляют мне свежие данные о доходности инвестиционного фонда.\n\nВ этом году вложенные средства принесли нам прибыль в размере [ROOT.Var('ShownInvestProfit').GetValue|0|P] @gold_icon!."
 agot_banking.0403.neutral_desc: "Как и каждый год, служащие банка предоставляют мне свежие данные о доходности инвестиционного фонда.\n\nПохоже, в этом году доходы и убытки уравновесили друг друга."
 agot_banking.0403.negative_desc: "Как и каждый год, служащие банка предоставляют мне свежие данные о доходности инвестиционного фонда.\n\nГод выдался тяжёлым: некоторые предприятия, в которые мы вложились, испытывали трудности или вовсе закрылись. В результате фонд не только не принёс прибыли, но и уменьшился на [ROOT.Var('ShownInvestProfit').GetValue|0|N] @gold_icon!."
 agot_banking.0403.a: "На сегодня с цифрами хватит."

 # Decision loc
 decision_group_type_banking: "Банковские решения"
 take_loan_decision: "Запросить банковский заем"
 take_loan_decision_desc: "Богатейшие и самые авторитетные финансовые учреждения мира всегда рады предоставить заем тем, кого сочтут достойными доверия. Однако будьте осторожны: неспроста говорят, что [Concept('agot_bank', 'банк')|E] всегда взыщет своё."
 take_loan_decision_effect: "Представитель [Concept('agot_bank', 'банка')|E] прибудет для переговоров о займе и его условиях."
 take_loan_decision_tooltip: "Отправить послание выбранному банку с просьбой о займе."
 take_loan_decision_tooltip_confirm_text_desc: "Выбрать банк."
 take_loan_bank_cash_reserve: "В настоящий момент ни один банк не располагает достаточными средствами для выдачи новых займов."

 agot_repay_loan_decision: "Погасить банковский заем"
 agot_repay_loan_decision_desc: "Вы можете полностью или частично погасить текущий заем до истечения срока его выплаты."
 agot_repay_loan_decision_tooltip: "Вам будут предложены различные варианты погашения долга."
 agot_repay_loan_decision_tooltip_confirm_text_desc: "Показать варианты погашения."
 agot_repay_loan_decision_effect: "Вы можете полностью или частично погасить текущий заем до истечения срока его выплаты."

 buy_shares_decision: "Вложиться в банк"
 buy_shares_decision_shareholder_IB_desc: "[ROOT.Char.Custom('agot_bank_name')] принимает новые вложения.\n\nСейчас у меня [ROOT.Var('IB_Shares').GetValue] долей, но разумно увеличить их количество, пока у меня ещё есть такая возможность. Большая доля означает более крупные [Concept('agot_bank_dividend_level','дивиденды')|E] из [Concept('agot_bank_profits','прибыли')|E] банка."
 buy_shares_decision_shareholder_bank1_desc: "[ROOT.Char.Custom('agot_bank_name')] принимает новые вложения.\n\nСейчас у меня [ROOT.Var('bank1_Shares').GetValue] долей, но разумно увеличить их количество, пока у меня ещё есть такая возможность. Большая доля означает более крупные [Concept('agot_bank_dividend_level','дивиденды')|E] из [Concept('agot_bank_profits','прибыли')|E] банка."
 buy_shares_decision_shareholder_bank2_desc: "[ROOT.Char.Custom('agot_bank_name')] принимает новые вложения.\n\nСейчас у меня [ROOT.Var('bank2_Shares').GetValue] долей, но разумно увеличить их количество, пока у меня ещё есть такая возможность. Большая доля означает более крупные [Concept('agot_bank_dividend_level','дивиденды')|E] из [Concept('agot_bank_profits','прибыли')|E] банка."
 buy_shares_decision_shareholder_bank3_desc: "[ROOT.Char.Custom('agot_bank_name')] принимает новые вложения.\n\nСейчас у меня [ROOT.Var('bank3_Shares').GetValue] долей, но разумно увеличить их количество, пока у меня ещё есть такая возможность. Большая доля означает более крупные [Concept('agot_bank_dividend_level','дивиденды')|E] из [Concept('agot_bank_profits','прибыли')|E] банка."
 buy_shares_decision_desc: "Золото, лежащее без дела, не приносит пользы. Поскольку мой местный банк открыт для вкладчиков, я могу приобрести долю — а вместе с ней и голос в совете, и долю [Concept('agot_bank_profits','прибыли')|E] банка."
 buy_shares_decision_tooltip: "Приобрести долю вашего местного банка"
 buy_shares_decision_tooltip_confirm_text_desc: "Какова текущая цена доли?"
 buy_shares_decision_effect: "Вам будет предложена одна доля. Цена зависит от текущей общей стоимости банка." 
 bank_needs_no_cash: "У банка достаточно денежных резервов, и в настоящее время он не принимает новые вложения"

 sell_shares_decision: "Продать долю"
 sell_shares_decision_IB_desc: "[ROOT.Char.Custom('agot_bank_name')] в данный момент располагает достаточным количеством золота, чтобы выкупить одну из ваших долей.\n\nВ настоящее время у вас [ROOT.Var('IB_Shares').GetValue] долей в Железном банке."
 sell_shares_decision_bank1_desc: "[ROOT.Char.Custom('agot_bank_name')] в данный момент располагает достаточным количеством золота, чтобы выкупить одну из ваших долей.\n\nВ настоящее время у вас [ROOT.Var('bank1_Shares').GetValue] долей в банке."
 sell_shares_decision_bank2_desc: "[ROOT.Char.Custom('agot_bank_name')] в данный момент располагает достаточным количеством золота, чтобы выкупить одну из ваших долей.\n\nВ настоящее время у вас [ROOT.Var('bank2_Shares').GetValue] долей в банке."
 sell_shares_decision_bank3_desc: "[ROOT.Char.Custom('agot_bank_name')] в данный момент располагает достаточным количеством золота, чтобы выкупить одну из ваших долей.\n\nВ настоящее время у вас [ROOT.Var('bank3_Shares').GetValue] долей в банке."
 sell_shares_decision_tooltip: "Вам будет предложено золото, эквивалентное текущей цене доли."
 sell_shares_decision_tooltip_confirm_text_desc: "Какова текущая цена доли?"
 sell_shares_decision_effect: "Вам будет предложено золото, эквивалентное текущей цене доли."

 set_risk_level_decision: "Изменить уровень риска"
 set_risk_level_decision_desc: "Являясь [Concept('agot_bank_director', Select_CString(ROOT.Char.IsFemale, 'управляющей банка', 'управляющим банка' ))|E] [ROOT.Char.Custom('agot_bank_name')], вы можете определить, на какой уровень [Concept('agot_bank_risk_level','риска')|E] банк готов пойти при выдаче займов или вложениях."
 set_risk_level_decision_tooltip: "Вы сможете выбрать между низким, средним и высоким уровнем риска для займов и вложений."
 set_risk_level_decision_tooltip_confirm_text_desc: "Я пересмотрю политику банка."
 set_risk_level_decision_effect: "Вы сможете выбрать между низким, средним и высоким уровнями риска для займов и вложений."

 set_dividend_level_decision: "Отрегулировать ставки дивидендов"
 set_dividend_level_decision_desc: "Являясь [Concept('agot_bank_director', Select_CString(ROOT.Char.IsFemale, 'управляющей банка', 'управляющим банка' ))|E] [ROOT.Char.Custom('agot_bank_name')], вы можете установить, какая часть [Concept('agot_bank_profits', 'прибыли банка')|E] будет выплачена вкладчикам."
 set_dividend_level_decision_tooltip: "Вы сможете выбрать между низкими, средними и высокими ставками [Concept('agot_bank_dividends','дивидендов')|E]."
 set_dividend_level_decision_tooltip_confirm_text_desc: "Я пересмотрю политику банка."
 set_dividend_level_decision_effect: "Вы сможете выбрать между низкими, средними и высокими ставками [Concept('agot_bank_dividends','дивидендов')|E]."

 show_bank_numbers_decision: "Посмотреть книгу учета"
 show_bank_numbers_decision_confirm: "Взглянем в книгу"
 show_bank_numbers_decision_desc: "[ROOT.Char.Custom('agot_bank_name')] располагает разнообразными активами и обязательствами, отражёнными в его отчётности. Вы можете ознакомиться с текущими резервами банка и ожидаемыми поступлениями в будущем."
 show_bank_numbers_decision_tooltip: "Пора просмотреть книги"
 show_bank_numbers_decision_effect: "Вам будет представлено общее представление о текущих ключевых показателях банка."

