 # handle_defaulters_again_decision_desc:0 "I am willing to resume managing defaulting debtors personally."
 # handle_defaulters_again_decision_tooltip:0 "You will receive a message each time a default occurs."
 # handle_defaulters_again_decision_confirm:0 "It is my duty to handle such cases"
 # handle_defaulters_again_decision_effect:0 "You will receive reports of loan defaults again."

 fill_investment_fund_decision: "Пополнить инвестиционный фонд"
 fill_investment_fund_decision_desc: "Являясь [Concept('agot_bank_director', Select_CString(ROOT.Char.IsFemale, 'управляющей банка', 'управляющим банка' ))|E] [ROOT.Char.Custom('agot_bank_name')], вы можете пополнить инвестиционный фонд банка. Средства из этого фонда вкладываются в малые предприятия и проекты, создавая возможности для устойчивой прибыли. Однако любые вложения сопряжены с риском полной потери капитала, что может поставить под угрозу ликвидность банка. Хорошее понимание устойчивости и надёжности инвестиционных возможностей — ключ к долгосрочному успеху."
 fill_investment_fund_decision_tooltip: "Вы можете вложить 1000 золота каждые два года. Эффективность инвестиционного фонда зависит от навыка управления текущего управляющего."
 fill_investment_fund_decision_tooltip_confirm_text_desc: "Банк должен процветать."
 fill_investment_fund_decision_effect: "Вы переведете 1000 золота из резерва банковских средств в инвестиционный фонд. Средства в инвестиционном фонде являются заблокированными и не могут быть выведены."

 agot_banking.0215.t: "Выборы нового управляющего"
 agot_banking.0215.desc: "Пришло время избрать следующего [Concept('agot_bank_director', 'управляющего банка')|E] [ROOT.Char.Custom('agot_bank_name')].\n\nНеобходимо избрать нового вкладчика на этот пост, чтобы направить банк к процветающему будущему. Четыре крупнейших держателя долей становятся кандидатами на руководство.\n\nКаждый вкладчик может проголосовать за одного из кандидатов. Кандидат получает по одному голосу за каждую долю, принадлежащую голосующему. Победит тот, кто наберёт наибольшее число голосов.\n\nКому вы отдадите свои голоса?"
 agot_banking.0215.a: "Мой выбор - [director_candidate1.GetTitledFirstName]."
 agot_banking.0215.b: "[director_candidate2.GetTitledFirstName] получит мою поддержку."
 agot_banking.0215.c: "[director_candidate3.GetTitledFirstName] — будущее."
 agot_banking.0215.d: "[director_candidate4.GetTitledFirstName] справится."

 agot_banking.1001.t: "Выбор банка"
 agot_banking.1001.desc: "Есть несколько [Concept('agot_banks', 'банков')|E], предоставляющих займы. В какой из них вы обратитесь?"
 agot_banking.1001.a: "Я выбираю Железный банк Браавоса."
 agot_banking.1001.low_interest: "Уровень [Concept('agot_bank_interest_rate', 'процентной ставки')|E] в этом банке #difficult_easy в данный момент снижен#!."
 agot_banking.1001.medium_interest: "Уровень [Concept('agot_bank_interest_rate', 'процентной ставки')|E] в этом банке #difficult_medium в данный момент сбалансирован#!."
 agot_banking.1001.high_interest: "Уровень [Concept('agot_bank_interest_rate', 'процентной ставки')|E] в этом банке #difficult_hard в данный момент повышен#!."
 agot_banking.1001.b: "Я выбираю [director_bank1.Custom('agot_bank_name')]."
 agot_banking.1001.c: "Я выбираю [director_bank2.Custom('agot_bank_name')]."
 agot_banking.1001.d: "Я выбираю [director_bank3.Custom('agot_bank_name')]."
 agot_banking.1001.e: "Я [Select_CString(ROOT.Char.IsFemale, 'передумала', 'передумал' )]."

 set_interest_level_decision: "Отрегулировать процентные ставки"
 set_interest_level_decision_desc: "Являясь [Concept('agot_bank_director', Select_CString(ROOT.Char.IsFemale, 'управляющей банка', 'управляющим банка' ))|E] [ROOT.Char.Custom('agot_bank_name')], вы можете установить общий уровень [Concept('agot_bank_interest_rate', 'процентной ставки')|E] для новых займов."
 set_interest_level_decision_tooltip: "Вы сможете выбрать между низкими, нормальными и высокими процентными ставками. Чем ниже процентная ставка, тем больше клиентов вы привлечете, но тем ниже будет ваша [Concept('agot_bank_profits', 'прибыль банка')|E] с каждого займа, и наоборот."
 set_interest_level_decision_tooltip_confirm_text_desc: "Я пересмотрю политику банка."
 set_interest_level_decision_effect: "Вы сможете выбрать между низкими, нормальными и высокими процентными ставками. Чем ниже процентная ставка, тем больше клиентов вы привлечете, но тем ниже будет ваша [Concept('agot_bank_profits', 'прибыль банка')|E] с каждого займа, и наоборот."

 agot_banking.0208.t: "Выбор уровня процентной ставки"
 agot_banking.0208.desc: "Являясь [Concept('agot_bank_director', Select_CString(ROOT.Char.IsFemale, 'управляющей банка', 'управляющим банка' ))|E] [ROOT.Char.Custom('agot_bank_name')], я принимаю решение об общем уровне [Concept('agot_bank_interest_rate', 'процентной ставки')|E] для новых займов. Чем ниже ставка, тем больше клиентов я могу привлечь, но тем ниже будет [Concept('agot_bank_profits', 'прибыль банка')|E] с каждого займа, и наоборот."
 agot_banking.0208.a: "Нам нужно стать более конкурентоспособными."
 agot_banking.0208.a_tt: "Ежегодная процентная ставка снижена на один процент. Это привлечет больше клиентов, но прибыль с каждого клиента уменьшится."
 agot_banking.0208.b: "Сбалансированная политика более устойчива."
 agot_banking.0208.b_tt: "Ежегодная процентная ставка будет установлена на стандартном уровне."
 agot_banking.0208.c: "Нам нужно быть более прибыльными."
 agot_banking.0208.c_tt: "Ежегодная процентная ставка увеличена на один процент. Это привлечет меньше клиентов, но прибыль с каждого клиента возрастет."

 found_bank_decision: "Основать новый банк"
 found_bank_decision_desc: "Накопив достаточно богатства и финансовых знаний, вы можете захотеть расширить свое процветание, основав новый [Concept('agot_bank', 'банк')|E]."
 found_bank_decision_tooltip: "В вашей столице будет основан новый банк. Вы станете [Select_CString(ROOT.Char.IsFemale, 'первой', 'первым' )] [Concept('agot_bank_director', Select_CString(ROOT.Char.IsFemale, 'управляющей банка', 'управляющим банка' ))|E], и все персонажи в вашей державе смогут вложить средства в новый банк и стать вкладчиками."
 found_bank_decision_tooltip_confirm_text_desc: "К процветанию!"
 not_in_a_megawar_realm: "Ваша держава не должна быть разделена войной"
 agot_found_bank_decision_effect_tooltip: "В вашей столице будет основан новый [Concept('agot_bank', 'банк')|E]. Вы станете [Select_CString(ROOT.Char.IsFemale, 'первой', 'первым' )] [Concept('agot_bank_director', Select_CString(ROOT.Char.IsFemale, 'управляющей банка', 'управляющим банка' ))|E], и все персонажи в вашей державе смогут вложить средства в новый банк и стать вкладчиками."

 rename_bank_decision: "Переименовать банк"
 rename_bank_decision_desc: "Названия обладают весом. В последнее время меня беспокоит, что [ROOT.Char.Custom('agot_bank_name')] не внушает должного доверия. Новое название могло бы вдохнуть жизнь в его образ и помочь укрепить доверие и привлечь больше вложений."
 rename_bank_decision_tooltip: "Выбрать новое название для вашего банка"
 rename_bank_decision_tooltip_confirm_text_desc: "Дадим ему запоминающееся название."
 agot_rename_bank_decision_effect_tooltip: "Вы сможете выбрать новое название для банка."

 agot_banking.0601.t: "Новый банк"
 agot_banking.0601.desc: "Сегодня открылся новый банк, и я стану его [Select_CString(ROOT.Char.IsFemale, 'первой', 'первым' )] [Concept('agot_bank_director', Select_CString(ROOT.Char.IsFemale, 'управляющей', 'управляющим' ))|E]. Банк немедленно начнёт выдавать займы, а также привлечёт новых вкладчиков для укрепления своего процветания.\n\nКак назвать новый банк?"
 agot_banking.0601.a: "К светлому будущему!"

 agot_banking.0602.t: "[Select_CString(NewDebtor.IsFemale, 'Новая важная должница', 'Новый важный должник' )]"
 agot_banking.0602.desc: "Сегодня [messaged_director.Custom('agot_bank_name')] выдал огромный заём. [NewDebtor.GetTitledFirstName] [Select_CString(NewDebtor.IsFemale, 'получила', 'получил' )] [NewDebtor.MakeScope.Var('loaned_amount').GetValue|2|P] золотых. Это делает [NewDebtor.GetHerHis] одним из наших крупнейших клиентов."
 agot_banking.0602.a: "Приятно вести с вами дела."

 agot_banking.0607.t: "Вес названия"
 agot_banking.0607.desc: "Название может формировать восприятие, определять наследие и иметь вес, куда больший, чем звон монет. Как [Select_CString(ROOT.Char.IsFemale, 'управляющая', 'управляющий' )] банка, я обладаю и привилегией, и властью переименовать его. Нынешнее название сослужило свою службу... но, полагаю, этого уже недостаточно. Если это учреждение должно отражать мои амбиции, оно должно носить название, достойное их."
 agot_banking.0607.a: "Подобающее название."

 show_shareholders_decision: "Показать вкладчиков"
 show_shareholders_decision_desc: "Служащие банка [ROOT.Char.Custom('agot_bank_name')] предоставят вам список текущих вкладчиков банка."
 show_shareholders_decision_tooltip: "Вам будет представлен список текущих вкладчиков банка."
 show_shareholders_decision_confirm: "Давайте взглянем"
 show_shareholders_decision_effect: "Вам будет представлен список текущих вкладчиков банка."

 agot_banking.0603.t: "[ROOT.Char.Custom('agot_bank_name')]: Вкладчики"
 agot_banking.0603.desc: "Вот текущие вкладчики банка [ROOT.Char.Custom('agot_bank_name')], отсортированные по убыванию количества долей:"
 agot_banking.0603.a: "Спасибо."

 show_debtors_decision: "Показать крупных должников"
 show_debtors_decision_desc: "Служащие банка [ROOT.Char.Custom('agot_bank_name')] предоставят вам список крупнейших должников банка."
 show_debtors_decision_tooltip: "Вам будет представлен список самых важных должников банка."
 show_debtors_decision_confirm: "Давайте взглянем"
 show_debtors_decision_effect: "Вам будет представлен список самых важных должников банка."

 agot_banking.0604.t: "[ROOT.Char.Custom('agot_bank_name')]: Крупнейшие должники"
 agot_banking.0604.desc: "Вот крупнейшие должники банка [ROOT.Char.Custom('agot_bank_name')], отсортированные по убыванию суммы долга (сумма займа с процентами):"
 agot_banking.0604.a: "Спасибо."

 agot_debtors_list: "[Character.GetTitledFirstName] - общая задолженность: @gold_icon! [Character.MakeScope.Var('total_repayment').GetValue|0]"

 agot_shareholder_list: "[Character.GetTitledFirstName] имеет [Character.MakeScope.Var('ShownShares').GetValue] долей"

 # vassal loan stuff
 take_vassal_loan_interaction: "Попросить заем у вассала"
 take_vassal_loan_interaction_desc: "Попросить личный заем у своих вассалов. Заем будет иметь процентную ставку в 25% и должен быть возвращен по истечении 5 лет."

 liege_requests_loan: "В последнее время меня преследуют финансовые трудности. Не могли бы предоставить мне заем в размере [actor.MakeScope.Var('vassal_loan_amount').GetValue] золотых?\nЭта сумма с учётом 25% процентов, будет возвращена через 5 лет."

 agot_banking.0501.t: "[loan_vassal.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_banking.0501.desc: "Я [Select_CString(loan_vassal.IsFemale, 'рада', 'рад' )] принять вашу просьбу о займе и отправлю вам золото. Ожидаю, что долг будет возвращен через 5 лет."
 agot_banking.0501.a: "Хорошие новости!"

 agot_banking.0502.t: "[loan_vassal.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_banking.0502.desc: "К сожалению, я не могу предоставить вам запрашиваемый заем. Я [Select_CString(loan_vassal.IsFemale, 'отложила', 'отложил' )] эти средства на многие годы для конкретных нужд. Надеюсь, вы поймёте и простите меня."
 agot_banking.0502.a: "Досадно."

 agot_banking.0503.t: "Мой сюзерен,"
 agot_banking.0503.desc: "Прошло пять лет с тех пор, как я [Select_CString(vassal_loan_creditor.IsFemale, 'исполнила', 'исполнил' )] вашу просьбу о займе. Время пришло, и пора вернуть долг, как мы и договаривались. Будете ли вы достаточно честны, чтобы сдержать слово и вернуть мне то, что принадлежит мне?"
 agot_banking.0503.a: "Я верну все, что [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )]."
 agot_banking.0503.a_tt: "Заем будет полностью погашен."
 agot_banking.0503.b: "Я могу пока покрыть только проценты."
 agot_banking.0503.b_tt: "Срок займу будет продлен на пять лет."
 agot_banking.0503.c: "Я не могу заплатить прямо сейчас ни гроша. Но я буду [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] вам услугу!"
 agot_banking.0503.c_tt: "Вы не платите по займу и ничего не выплачиваете. Срок займа будет продлён на пять лет, и [vassal_loan_creditor.GetTitledFirstName] получит на вас слабое влияние."
 agot_banking.0503.d: "Я не могу заплатить ни гроша. Я компенсирую это любым способом, который вы сочтёте нужным!"
 agot_banking.0503.d_tt: "Вы не исполнили обязательства по займу второй раз. Заем будет аннулирован, и [vassal_loan_creditor.GetTitledFirstName] в обмен получит на вас сильное влияние."
 agot_banking.0503.e: "Вы не получите от меня ни гроша!"
 agot_banking.0503.e_tt: "Вы отказываетесь от погашения. Это аннулирует заем, но [vassal_loan_creditor.GetTitledFirstName] в обмен получит претензию на ваш основной титул."

 agot_banking.0504.t: "Дорогой вассал,"
 agot_banking.0504.repay_full_desc: "Наконец-то пришло время вернуть долг, который вы щедро предоставили мне пять лет назад. Я очень ценю вашу готовность помочь мне в трудный момент. Я запомню вашу доброту."
 agot_banking.0504.repay_interest_desc: "Пришло время вернуть долг, который вы мне предоставили... Однако на данный момент я не могу вернуть весь долг, но с радостью выплачу проценты за последние пять лет! Обещаю, что всё будет возвращено через пять лет. Надеюсь, вы понимаете, мой верный вассал."
 agot_banking.0504.first_default_desc: "Хотя пришло время вернуть долг, который вы мне предоставили... К сожалению, в данный момент я не могу заплатить ни гроша. Я обещаю, что вся сумма долга будет возвращена через пять лет! В качестве компенсации за это неудобство, я предоставлю вам услугу, будь то снижение налогов или место в моем совете."
 agot_banking.0504.second_default_desc: "Приношу глубокие извинения за невозможность вернуть долг, который вы мне предоставили десять лет назад. В качестве компенсации за это продолжающееся неудобство, я выполню любое ваше желание, которое в моей власти. Скажите слово, и так будет!"
 agot_banking.0504.refusal_desc: "Средства, которые вы мне одолжили, не будут возвращены. Как ваш сюзерен, я имею право забрать всё, что мне нужно, чтобы поддерживать стабильность и удовлетворять нужды державы. Считайте это дополнительным налогом. Вы не получите возврата, и не смейте требовать его в будущем."
 agot_banking.0504.a: "Приятно вести с вами дела."
 agot_banking.0504.b: "Ну, я полагаю, это лучше, чем ничего."
 agot_banking.0504.c: "В следующий раз я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] увидеть деньги."
 agot_banking.0504.d: "Это не то, о чем мы договаривались!"
 agot_banking.0504.e: "Долг будет урегулирован другими способами. Вы недостойны править."

 repay_vassal_loan_decision: "Вернуть заем вассалу"
 repay_vassal_loan_decision_desc: "Вы заняли деньги у вассала на условиях пятилетнего соглашения. Вы можете вернуть его полностью до окончания срока займа."
 repay_vassal_loan_decision_tooltip: "Вы погасите весь долг вместе с начисленными процентами."
 repay_vassal_loan_decision_tooltip_confirm_text_desc: "Одним беспокойством меньше."
 repay_vassal_loan_decision_effect: "Вы можете вернуть текущий заем вампассалу до окончания его срока."



 agot_bank_list_name: "#high;SIZE:24 [Character.Custom('agot_bank_name')]#!"
 agot_bank_list_value: "$EFFECT_LIST_BULLET$Стоимость банка: #clickable [Character.MakeScope.Var('BankValue').GetValue|0]#!"
 agot_bank_list_interest: "[Character.Custom('agot_banking_interest_level')]"
 agot_bank_list_interest_low: "$EFFECT_LIST_BULLET$#positive_value Низкая#! процентная ставка"
 agot_bank_list_interest_high: "$EFFECT_LIST_BULLET$#negative_value Высокая#! процентная ставка"
 agot_bank_list_interest_normal: "$EFFECT_LIST_BULLET$#zero_value Стандартная#! процентная ставка"

 agot_banking.0605.t: "Все известные банки мира"
 agot_banking.0605.desc: "Это управляющие и стоимости банков, которые в настоящее время работают в мире:"
 agot_banking.0605.a: "Спасибо."

 agot_banking.0211.letter4_failed_desc: "Плохие новости: [FinalDefaulter.GetTitledFirstNameNoTooltip] прямо [Select_CString(FinalDefaulter.IsFemale, 'отказалась', 'отказался' )] рассматривать наше щедрое предложение о новом плане погашения.\n\nПридётся попробовать что-то более решительное..."
 agot_banking.0212.letter3_success_desc: "Сработало!\n[FinalDefaulter.GetTitledFirstNameNoTooltip] [Select_CString(FinalDefaulter.IsFemale, 'приняла', 'принял' )] наше щедрое предложение, выплатив штраф и пообещав вернуть заем в полном объёме через 3 года."

 agot_banking.0211.f: "[FinalDefaulter.GetTitledFirstName] получит письмо."
 agot_banking.0211.f_tt: "Это будет стоить банку [default_revisor.MakeScope.Var('LetterCost').GetValue] @gold_icon!. [FinalDefaulter.GetTitledFirstName] получит от нас новый план погашения долга: мы можем отложить окончательное погашение еще на 3 года, но [FinalDefaulter.GetTitledFirstName] [Select_CString(FinalDefaulter.IsFemale, 'должна', 'должен' )] немедленно заплатить штраф в размере половины суммы начисленных процентов."

 agot_banking.1108.t: "Щедрое предложение"
 agot_banking.1108.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] письмо от [Concept('agot_bank', 'банка')|E] с жалобой на моё нежелание погашения долга. Для нахождения решения, которое устроит обе стороны, банк предлагает новый план погашения: я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] немедленно заплатить штраф в размере половины начисленных процентов. Взамен окончательное погашение будет отложено на 3 года."
 agot_banking.1108.a: "Это справедливое предложение."
 agot_banking.1108.a_tt: "Ваш заем будет продлён, и погашение будет через три года."
 agot_banking.1108.b: "Я не буду!"
 agot_banking.1108.b_tt: "Вы отказываетесь от предложения банка. Это может привести к более жесткой реакции..." 

 agot_banking.0606.t: "[Select_CString(NewShareholder.IsFemale, 'Новая вкладчица', 'Новый вкладчик' )]"
 agot_banking.0606.desc: "Сегодня [NewShareholder.GetTitledFirstName] [Select_CString(NewShareholder.IsFemale, 'получила', 'получил' )] новую долю в банке [ROOT.Char.Custom('agot_bank_name')]."

 bank_name_default: "[ROOT.Char.GetTopLiege.GetPrimaryTitle.GetAdjectiveNoTooltip]ий банк"
 bank_name_default_IB: "Железный банк Браавоса"
 bank_name_default_Rogare: "Банк Рогаре"
 bank_name_default_blank: ""
 bank_name_fallback: "[ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]ий банк"

 bank_name_normal: "[ROOT.Var('BankName').Char.GetLocalizedText( 'bank_name' )]"
 bank_name_normal_list: "[Character.GetLocalizedText( 'bank_name' )]"

 agot_banking.0700.t: "Банк ликвидирован"
 agot_banking.0700.desc: "Печальные новости! [NewHolder.GetTitledFirstNameNicknamed] [Select_CString(NewHolder.IsFemale, 'получила', 'получил' )] контроль над штаб-квартирой нашего банка. Поскольку в [NewHolder.GetHerHis] владениях уже есть другой банк, [NewHolder.GetSheHe] решает ликвидировать наш, чтобы сократить конкуренцию.\n\nВсе вкладчики получат часть текущих резервов банка. После этого банк прекратит своё существование."
 agot_banking.0700.a: "Вот и завершилось это начинание."

 event_window_widget_enter_bank_name_prompt: "Выберите название банка:"

 agot_banking.0701.t: "Налёт на банк?"
 agot_banking.0701.desc: "Запах гари и шум веселящихся воинов смешиваются в воздухе вокруг меня. Мой отряд успешно осадил владение [barony.GetNameNoTierNoTooltip], где находится знаменитый [bank_shareholder.Custom('agot_bank_name')].\n\nПеред нами открывается заманчивая возможность: наверняка в хранилищах этого банка хранятся несметные сокровища и невообразимые богатства... А наш контроль над владением означает, что банк беззащитен перед моими войсками.\n\nНо такие действия не останутся незамеченными. Банк не оставит эту агрессию без ответа..."
 agot_banking.0701.a: "Я не могу упустить такую возможность!"
 agot_banking.0701.b: "[bank_shareholder.Custom('agot_bank_name')] - не мои враги."

 agot_banking.0702.t: "Разграбление банка"
 agot_banking.0702.desc: "После осады владения [barony.GetNameNoTierNoTooltip] [Select_CString(bank_raider.IsFemale, 'напавшая', 'напавший' )] [bank_raider.GetTitledFirstNameNicknamed] [Select_CString(bank_raider.IsFemale, 'решила', 'решил' )] совершить налет на штаб-квартиру нашего банка, и [bank_raider.GetHerHis] войска смогли прорваться в некоторые из наших хранилищ. Они похитили [bank_raider.MakeScope.Var('raided_gold').GetValue|2|N] золотых из нашего финансового резерва.\n\nБанк должен защищаться от этого враждебного действия всеми доступными ему средствами!\n\n[bank_raider.GetTitledFirstNameNoTooltip] может получить от нас письмо, сообщающее, что [bank_raider.GetHerHis] действия будут иметь тяжёлые последствия - и что украдённые средства, с учётом компенсации, должны быть возвращены.\n\nЕсли [bank_raider.GetSheHe] откажется, мы поступим с [Select_CString(bank_raider.IsFemale, 'ней как с любой другой неплательщицей', 'ним как с любым другим неплательщиком' )]... #bold сурово.#!"
 agot_banking.0702.a: "Отправить письмо."
 agot_banking.0702.b: "Мы не будем принимать никаких мер..."

 agot_banking.0703.t: "[raided_director.Custom2('AppropriateGreetingNegative', bank_raider)]"
 agot_banking.0703.desc: "Ваше ограбление нашего банка не останется без последствий. Мы предлагаем вам одноразовую возможность вернуть украденное золото с учётом компенсации. Если вы откажетесь, мы будем вынуждены вернуть средства другими способами."
 agot_banking.0703.a: "Я немедленно заплачу то, что вы требуете."
 agot_banking.0703.b: "Мне нужно время для погашения долга."
 agot_banking.0703.b_tt: "Украденные вами средства будут превращены в займ, который нужно будет погасить через 3 года по процентной ставке 5 % в год."
 agot_banking.0703.c: "Вы не получите от меня ни гроша!"
 agot_banking.0703.c_tt: "Вы отказываетесь от любых выплат банку, и это будет расценено как дефолт..."

 agot_banking.0704.t: "[Select_CString(bank_raider.IsFemale, 'Налётчица выплатила', 'Налётчик выплатил' )] компенсацию"
 agot_banking.0704.desc: "[bank_raider.GetTitledFirstNameNicknamed] [Select_CString(bank_raider.IsFemale, 'уступила и вернула', 'уступил и вернул' )] украденное, с учётом компенсации в размере 10%."
 agot_banking.0704.a: "Мудрый выбор."

 agot_banking.0705.t: "[Select_CString(bank_raider.IsFemale, 'Налётчица', 'Налётчик' )] обещает вернуть долг"
 agot_banking.0705.desc: "[bank_raider.GetTitledFirstNameNicknamed] [Select_CString(bank_raider.IsFemale, 'уступила и пообещала', 'уступил и пообещал' )] вернуть украденное в течение следующих 3 лет. Мы будем считать это займом с годовой процентной ставкой 5 %."
 agot_banking.0705.a: "Будем надеяться, что [bank_raider.GetSheHe] не нарушит соглашение."

 gift_share_interaction: "Подарить доли банка"
 gift_share_interaction_desc: "Подарить персонажу одну из долей вашего банка."
 gift_share: "Вот, держи долю."

 take_share_interaction: "Отнять доли банка"
 take_share_interaction_desc: "Отнять все доли банка у члена дома."
 take_share: "Давай сюда свои доли."

 agot_banking.0801.t: "Угроза банкротства"
 agot_banking.0801.desc: "[ROOT.Char.Custom('agot_bank_name')] не имеет достаточно резервов для покрытия операционных расходов. Поэтому всех вкладчиков просят немедленно приобрести дополнительные доли, чтобы избежать банкротства.\n\nЕсли не будет собрано достаточное количество средств, банк будет вынужден навсегда закрыть свои двери."
 agot_banking.0801.a: "Я внесу свой вклад."
 agot_banking.0801.b: "Я положусь на других вкладчиков."

 agot_banking.0803.t: "Банкротство"
 agot_banking.0803.desc: "Катастрофа!\n\n[ROOT.Char.Custom('agot_bank_name')] не смог привлечь достаточное количество новых вкладов для покрытия своих операционных расходов. В результате банк теперь официально обанкротился и навсегда прекратит свою деятельность."
 agot_banking.0803.a: "Мои вложения потеряны..."

 agot_banking.0804.t: "Банк спасён"
 agot_banking.0804.desc: "Благодаря готовности достаточного количества вкладчиков снова увеличить свои доли, неизбежное банкротство банка было предотвращено."
 agot_banking.0804.a: "Какое облегчение!"