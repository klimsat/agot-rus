l_russian:
 ##############################################################
 ####### ####### ####### TRIAL OF SEVEN ####### ####### #######
 ##############################################################

 #############################################
 ### TOS: Succession Crisis INITIAL EVENTS ###
 #############################################

 # ToS - Succession Crisis: ToS Demanded
 agot_trial_of_seven.0100.t: "Требование перед всей державой"
 agot_trial_of_seven.0100.desc: "Едва корона опустилась на мою голову, как обвинение было произнесено вслух. [accuser_leader.GetTitledFirstName] называет моё правление узурпацией и требует суда за это, утверждая, что королевство было захвачено мной.\n\nТребование достаточно ясное. Суд Семерых. Семь обвинителей против семерых защитников, моё дело против [Select_CString(accuser_leader.IsFemale, 'её', 'его' )], и судьба моего правления зависит от исхода. Отрицать это было бы воспринято многими как признание вины. Согласиться - значит поставить на карту всю державу."
 agot_trial_of_seven.0100.desc.helper: "Едва корона опустилась на мою голову, как обвинение было произнесено вслух. [accuser_leader.GetTitledFirstName] [Select_CString(accuser_leader.IsFemale, 'выступила', 'выступил' )] вперёд, назвав моё правление узурпацией, и [Select_CString(accuser_leader.IsFemale, 'потребовала', 'потребовал' )] Суда Семерых, заявив, что [Select_CString(true_heir.IsFemale, 'истинной правительницей', 'истинным правителем' )] является [true_heir.GetTitledFirstName], чьи притязания были украдены.\n\nТребование достаточно ясно. Семь защитников против семи обвинителей, моё дело противостоит делу, за которое они взялись, и судьба моего правления зависит от результата. Во многих глазах отказ от этого был бы воспринят как страх. Согласиться - значит поставить на карту всю державу."
 agot_trial_of_seven.0100.desc.accuser: "[defender_leader.GetTitledFirstName] с трудом возлагает на себя корону, и я не позволю державе притворяться, что это не так. Как перед лордами, так и перед простонародьем, я объявляю это правление узурпацией и требую суда перед ликом богов и людей.\n\nСуд Семерых. Семь обвинителей выступят за меня и за то, что я отстаиваю, семеро за [Select_CString(defender_leader.IsFemale, 'ту', 'того' )], кто восседает на троне. Пусть сталь и вера решают, чего не могут сделать одни только слова. Если [defender_leader.GetSheHe] откажется, королевство узнает, что означает это молчание."
 agot_trial_of_seven.0100.a: "Пусть боги решают, [Select_CString(accuser_leader.IsFemale, 'права она', 'прав он' )] или нет."
 agot_trial_of_seven.0100.a.accuser: "Да будут Семеро свидетелями."

 # ToS - Succession Crisis: Interaction now available
 agot_trial_of_seven.0101.t: "Путь к правосудию"
 agot_trial_of_seven.0101.desc: "[crown_thief.GetTitledFirstName] - [Select_CString(crown_thief.IsFemale, 'узурпаторша', 'узурпатор' )], и есть способ призвать [Select_CString(crown_thief.IsFemale, 'её', 'его' )] к ответу за это. Я могу потребовать Суда Семерых и выдвинуть обвинение в открытую, сражаясь перед ликом как богов, так и перед державой за то, чтобы [crown_theft_king_legit_heir.GetTitledFirstName] [Select_CString(crown_theft_king_legit_heir.IsFemale, 'заняла', 'занял' )] трон, принадлежащий [Select_CString(crown_theft_king_legit_heir.IsFemale, 'ей', 'ему' )] по праву."
 agot_trial_of_seven.0101.desc.legit_heir: "Возможно, я слишком поспешно [Select_CString(ROOT.Char.IsFemale, 'смирилась', 'смирился' )] с тем, что было сделано. [crown_thief.GetTitledFirstName] восседает на троне, который должен был принадлежать мне, а держава вынуждена притворяться, что вопрос решён. Но есть и другой путь. Суд Семерых позволяет выдвинуть обвинение в открытую, после чего правоту моего дела решат сталь и боги."
 agot_trial_of_seven.0101.a: "Я подумаю над этим."
 agot_trial_of_seven.0101.a.tt: "Теперь вы можете потребовать Суда Семерых против правителя."

 # ToS Denied
 agot_trial_of_seven.9999.t: "Отказ в испытании"
 agot_trial_of_seven.9999.desc: "Моё требование отвергнуто. [recipient.GetTitledFirstName] не выступит против меня в открытую, и не выставит вопрос своей правоты перед всей державой. Отказ облечён в вежливую форму, но я слышу правду, скрытую за ней. [Select_CString(recipient.IsFemale, 'Она', 'Он' )] не станет рисковать сталью, особенно когда сталь может заговорить слишком громко."
 agot_trial_of_seven.9999.a: "Я не буду молчать об этом."

 #######################################
 ### TOS: Succession Crisis OUTCOMES ###
 #######################################

 # ToS - Succession Crisis: Usurpation Scenario Outcome - POV: usurper or final_usurper (the heir of the usurper)
 agot_trial_of_seven.0103.t: "Правосудие перед ликом державы"
 #Legit Heir won - Usurper POV
 agot_trial_of_seven.0103.desc.legit_won: "Суд свершился, и приговор ясен. Я [Select_CString(ROOT.Char.IsFemale, 'потерпела', 'потерпел' )] поражение вместе с теми, кто встал на мою сторону, моё дело потерпело крах на глазах у всех, кто был свидетелем.\n\nПоле боя усеяно телами, цена короны написана кровью и сталью. [legit_heir.GetTitledFirstName], чьи притязания были подтверждены не словами, а победой, вырванной у самой смерти, получает корону. То, что было отнято, было возвращено на глазах у всей державы, и теперь ни один лорд не может притворяться, что это решение было неопределённым."
 #Legit Heir won - Usurper's Heir POV
 agot_trial_of_seven.0103.desc.legit_won.usurper_died: "Суд свершился, и приговор ясен. [usurper.GetTitledFirstName] [Select_CString(usurper.IsFemale, 'пала', 'пал' )] вместе с теми, кто встал на [usurper.GetHerHis] сторону, [usurper.GetHerHis] дело предано забвению на глазах у всех, кто был свидетелем.\n\nПоле боя усеяно телами, цена короны написана кровью и сталью. [legit_heir.GetTitledFirstName], чьи притязания были подтверждены не словами, а победой, вырванной у самой смерти, получает корону. То, что было отнято, было возвращено на глазах у всей державы, и теперь ни один лорд не может притворяться, что это решение было неопределённым."
 #Legit Heir Helper won - Usurper POV
 agot_trial_of_seven.0103.desc.legit_helper_won: "Суд свершился, и приговор ясен. [legit_combatant.GetTitledFirstName] и [legit_combatant.GetHerHis] соратники победили меня и тех, кто встал на мою сторону, моё дело было предано забвению на глазах у всех, кто был свидетелем.\n\nПоле боя усеяно телами, цена короны написана кровью и сталью. [legit_heir.GetTitledFirstName], чьи притязания были подтверждены не словами, а победой, вырванной у самой смерти, получает корону. То, что было отнято, было возвращено на глазах у всей державы, и теперь ни один лорд не может притворяться, что это решение было неопределённым."
 #Legit Heir Helper won - Usurper's Heir POV
 agot_trial_of_seven.0103.desc.legit_helper_won.usurper_died: "Суд свершился, и приговор ясен. [legit_combatant.GetTitledFirstName] и [legit_combatant.GetHerHis] соратники одержали верх - [usurper.GetTitledFirstName] и те, кто встал на [usurper.GetHerHis] сторону, побеждены, [usurper.GetHerHis] дело предано забвению перед всеми, кто был свидетелем.\n\nПоле боя усеяно телами, цена короны написана кровью и сталью. [legit_heir.GetTitledFirstName], чьи притязания были подтверждены не словами, а победой, вырванной у самой смерти, получает корону. То, что было отнято, было возвращено на глазах у всей державы, и теперь ни один лорд не может притворяться, что это решение было неопределённым."
 #Legit Heir Helper won but Legit Heir died - Usurper POV
 agot_trial_of_seven.0103.desc.legit_helper_won.legit_heir_died: "Поражение настигло меня и моих соратников, но даже победа не внесла ясности. [legit_heir.GetTitledFirstName] [Select_CString(legit_heir.IsFemale, 'мертва, сражена', 'мёртв, сражен' )] прежде, чем кто-либо добился правосудия.\n\nПоле безмолвствует, не принося утешения живым. Хотя [legit_heir.GetTitledFirstNameNoTooltip] не [Select_CString(legit_heir.IsFemale, 'дожила', 'дожил' )] до того, чтобы корона вернулась на голову, на которой она должна была покоиться, приговор всё равно остаётся в силе, скреплённый кровью и потерями. [final_heir.GetTitledFirstName], [Select_CString(final_heir.IsFemale, 'которая', 'который' )] унаследует не только трон, но и справедливость, за которую заплатили жизнями, получит корону."
 #Legit Heir Helper won but Legit Heir died - Usurper's Heir POV
 agot_trial_of_seven.0103.desc.legit_helper_won.legit_heir_died.usurper_died: "Поле боя забрало всё, что могло. [usurper.GetTitledFirstName] лежит [Select_CString(usurper.IsFemale, 'мёртвая', 'мёртвый' )] рядом с теми, кто встал на [Select_CString(usurper.IsFemale, 'её', 'его' )] сторону, но то же самое делает и [legit_heir.GetTitledFirstName], [Select_CString(legit_heir.IsFemale, 'убитая', 'убитый' )] до того, как кто-либо доказал свою правоту.\n\nНаступившая тишина не даёт никаких ответов. Хотя [legit_heir.GetTitledFirstNameNoTooltip] не [Select_CString(legit_heir.IsFemale, 'дожила', 'дожил' )] до того, чтобы корона вернулась на голову, на которой она должна была покоиться, приговор всё равно остаётся в силе, скреплённый кровью и потерями. [final_heir.GetTitledFirstName], [Select_CString(final_heir.IsFemale, 'которая', 'который' )] унаследует не только трон, но и справедливость, за которую заплатили жизнями, получит корону."
 #Usurper won
 agot_trial_of_seven.0103.desc.usurper_won: "Обвинители разгромлены. [legit_combatant.GetTitledFirstName] лежит [Select_CString(legit_combatant.IsFemale, 'поверженная', 'поверженный' )] на поле боя, [legit_combatant.GetHerHis] дело терпит крах.\n\nСама земля свидетельствует о цене неповиновения. Корона остаётся на своём месте, не поколебленная судом, призванным её свергнуть. На обвинения был дан жёсткий ответ, и у державы не осталось иного выбора, кроме как принять правление, которое устояло."
 #Legit Heir Helper won but no heir exists
 agot_trial_of_seven.0103.desc.legit_helper_won.no_heir: "[legit_combatant.GetTitledFirstName] одерживает верх, но [legit_heir.GetTitledFirstName] [Select_CString(legit_heir.IsFemale, 'умерла', 'умер' )], не оставив наследника, который мог бы восстать из кровавой бойни и потребовать плоды победы.\n\nНа поле боя нет ответов, только трупы и тишина. Поскольку не осталось крови, чтобы ответить на приговор, корона переходит ко мне скорее по необходимости, чем из-за триумфа. Держава сохраняет [Select_CString(ROOT.Char.IsFemale, 'свою правительницу', 'своего правителя' )], но правосудие, которого когда-то потребовали, похоронено рядом с мёртвыми."
 #Legit Heir is somehow already the king
 agot_trial_of_seven.0103.desc.legit_heir_won_after_all: "Была обнажена сталь и отданы жизни, но борьба закончилась без той ясности, на которую многие надеялись. [usurper.GetTitledFirstName] лежит [Select_CString(usurper.IsFemale, 'мёртвая', 'мёртвый' )] на поле боя, и с [Select_CString(usurper.IsFemale, 'её', 'его' )] падением характер конфликта изменился больше, чем мог бы изменить любой вердикт.\n\nСуд Семерых завершился не триумфом, а молчанием, и после этого на трон [Select_CString(final_heir.IsFemale, 'взошла', 'взошёл' )] [final_heir.GetTitledFirstName]. Действительно ли боги рассудили это дело или просто наблюдали, как оно переходит в чужие руки, - решать державе."
 #Legit Heir is somehow already the king
 agot_trial_of_seven.0103.desc.legit_heir_won_after_all.legit_heir: "Была обнажена сталь и отданы жизни, но борьба закончилась без той ясности, на которую многие надеялись. [usurper.GetTitledFirstName] лежит [Select_CString(usurper.IsFemale, 'мёртвая', 'мёртвый' )] на поле боя, и с [Select_CString(usurper.IsFemale, 'её', 'его' )] падением характер конфликта изменился больше, чем мог бы изменить любой вердикт.\n\nСуд Семерых завершился не триумфом, а молчанием, и после этого я [Select_CString(ROOT.Char.IsFemale, 'воссела', 'воссел' )] на трон. Действительно ли боги рассудили это дело или просто наблюдали, как оно переходит в чужие руки, решать державе."
 #Legit Heir is somehow already the king
 agot_trial_of_seven.0103.desc.legit_heir_won_after_all.usurper: "Была обнажена сталь и отданы жизни, но борьба закончилась без той ясности, на которую многие надеялись. [legit_heir.GetTitledFirstName] лежит [Select_CString(legit_heir.IsFemale, 'мёртвая', 'мёртвый' )] на поле боя, и с [Select_CString(legit_heir.IsFemale, 'её', 'его' )] падением характер конфликта изменился больше, чем мог бы изменить любой вердикт.\n\nСуд Семерых завершился не триумфом, а молчанием, и после этого я [Select_CString(ROOT.Char.IsFemale, 'воссела', 'воссел' )] на трон. Действительно ли боги рассудили это дело или просто наблюдали, как оно переходит в чужие руки, решать державе."
 #Options
 agot_trial_of_seven.0103.a: "Надеюсь, [final_heir.GetTitledFirstNameNoTooltip] будет править мудро."
 agot_trial_of_seven.0103.b: "Досадно."
 agot_trial_of_seven.0103.c: "Пусть держава помнит, кто всё ещё стоит на ногах."
 agot_trial_of_seven.0103.d: "Столько крови, и всё впустую."


 # ToS - Succession Crisis: Usurpation Scenario Outcome - POV: legit_heir or heir_of_the_legit_heir
 agot_trial_of_seven.0104.t:0 "Приговор семерых"
 # Legit Heir won - Legit Heir POV
 agot_trial_of_seven.0104.desc.legit_won:0 "Суд свершился, и приговор несут разбитые щиты и пропитанная кровью земля. [usurper.GetTitledFirstName] [Select_CString(usurper.IsFemale, 'повержена', 'повержен' )] вместе с теми, кто стоял за [usurper.GetHerHis], и притязание, похитившее корону, обнажено перед всем королевством.\n\nПоле усеяно телами, и цена правосудия ясно написана сталью и смертью. Я [Select_CString(ROOT.Char.IsFemale, 'возвращаю', 'возвращаю' )] то, что было у меня отнято, не указом и не милостью, а тем, что [Select_CString(ROOT.Char.IsFemale, 'выжила', 'выжил' )] там, где другой не смог. Корона возвращается на свое законное место на глазах у лордов и свидетелей, и никто теперь не сможет сказать, что этот приговор был неясен."
 # Legit Helper won - Legit Heir POV
 agot_trial_of_seven.0104.desc.legit_helper_won:0 "Я не [Select_CString(ROOT.Char.IsFemale, 'стояла', 'стоял' )] на поле боя, но сражение велось во имя мое. [legit_heir_helper.GetTitledFirstName] и [legit_heir_helper.GetHerHis] соратники сломили дело узурпатора в открытом бою, положив конец лжи, возложившей ложную корону на чужую голову.\n\nПоле хранит цену этой истины в крови и тишине. То, что было у меня отнято, возвращено, пусть и не моей рукой, а защитниками, что несли мое дело, когда я не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )]. Королевство получило свой приговор, и корона возвращается ко мне, как велят закон и кровь.\n\nЯ не забываю тех, кто [Select_CString(legit_heir_helper.IsFemale, 'стояла', 'стоял' )] там, где я не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )]. [legit_heir_helper.GetTitledFirstNameNoTooltip] [Select_CString(legit_heir_helper.IsFemale, 'рискнула', 'рискнул' )] жизнью и именем, чтобы мое право жило, и тяжесть этого долга последует за мной на трон. Королевство может видеть лишь возвращенную корону, но я знаю, чья кровь ее оплатила."
 # Legit Helper won, but Legit Heir died before claiming the crown - Legit Heir's Heir POV
 agot_trial_of_seven.0104.desc.legit_helper_won.legit_heir_died:0 "Победа была одержана на поле боя, но пришла слишком поздно. [legit_heir_helper.GetTitledFirstName] сокрушил дело узурпатора на глазах у всех, однако [legit_heir.GetTitledFirstName] не [Select_CString(legit_heir.IsFemale, 'дожила', 'дожил' )] до того, чтобы увидеть исполнение приговора.\n\nПоле не приносит утешения в своей тишине. Хотя тот, кому было нанесено зло, [Select_CString(legit_heir.IsFemale, 'ушла', 'ушел' )], приговор остается в силе, скрепленный кровью и жертвой. Теперь корона переходит ко мне — не как трофей победы, а как тень правосудия, пришедшего слишком поздно, чтобы спасти того, кому оно было предназначено.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'наследую', 'наследую' )] не только трон. [legit_heir_helper.GetTitledFirstNameNoTooltip] [Select_CString(legit_heir_helper.IsFemale, 'несла', 'нес' )] дело моей семьи, когда его законный носитель не мог этого сделать, и этот долг не умирает вместе с павшими. Какое бы правление ни последовало с этого дня, оно будет помнить, чья отвага сохранила это право, когда кровь и случай грозили положить ему конец." 
 # Usurper won - Legit Heir POV
 agot_trial_of_seven.0104.desc.usurper_won:0 "Суд завершен, и поле дает свой беспощадный ответ. Те, кто поднялся отстаивать мое право, лежат сломленными, и вместе с ними пало обвинение, выдвинутое от моего имени.\n\nСталь сказала свое там, где слова оказались бессильны. [usurper.GetTitledFirstName] [Select_CString(usurper.IsFemale, 'остается', 'остается' )] на троне, и мой вызов лишен всякой силы перед лицом королевства. Корона не меняет владельца, а обвинение, из-за которого пролилась кровь, погребено вместе с мертвыми."
 agot_trial_of_seven.0104.a:0 "Дело решено."


 # ToS - Succession Crisis: Usurpation Scenario Outcome - Observer POV
 agot_trial_of_seven.0105.t:0 "$agot_trial_of_seven.0104.t$"
 # final_heir won after all (somehow they ended up on the throne) - Observer POV
 agot_trial_of_seven.0105.desc.legit_heir_won_after_all:0 "В королевстве распространяются вести о Суде семерых, созванном после узурпации — отчаянной попытке силой вернуть [main_title.GetNameNoTier]. Были названы защитники, обнажена сталь, и пролилась кровь перед взорами собравшихся.\n\nНо прежде чем приговор смог окончательно свершиться, вмешалась смерть. [usurper.GetTitledFirstName] [Select_CString(usurper.IsFemale, 'пала', 'пал' )] в схватке, лишив суд всякого смысла. Со смертью узурпатора [main_title.GetNameNoTierNoTooltip] переходит к [final_heir.GetTitledFirstName] по обычному праву наследования, а не по приговору.\n\nПоле остается усеянным телами, а королевство — с горьким пониманием, что суд не изменил ничего из того, что уже решила смерть."
 # Legit Heir won - Observer POV
 agot_trial_of_seven.0105.desc.legit_won:0 "После того как [main_title.GetNameNoTier] был захвачен [usurper.GetTitledFirstName], был созван Суд семерых, чтобы ответить за это преступление перед богами и людьми. Обвинение встретилось со сталью, и судьба короны была решена на поле, залитом кровью.\n\nТеперь суд вынес свой приговор. [legit_heir.GetTitledFirstName] выступил среди обвинителей и вышел победителем, сокрушив дело [usurper.GetTitledFirstNamePossessiveNoTooltip] в открытом бою. [main_title.GetNameNoTierNoTooltip] возвращается своему законному владельцу не указом и не соглашением, а победой, увиденной всем королевством.\n\nОт двора до самых дальних земель приговор считается окончательным, а цена короны измеряется жизнями, а не словами."
 # Legit Helper won - Observer POV
 agot_trial_of_seven.0105.desc.legit_helper_won:0 "После узурпации законное право на [main_title.GetNameNoTier] было вынесено не в зал совета, а на поле боя. Был созван Суд семерых, призвавший защитников ответить кровью на кражу.\n\nПоле дало свой ответ. [legit_combatant.GetTitledFirstName] одержал победу над защитниками [usurper.GetTitledFirstNamePossessive], сокрушив дело, удерживавшее корону незаконно. Хотя [final_heir.GetTitledFirstName] не участвовал в бою, приговор вынесен в [final_heir.GetHerHis] пользу.\n\n[main_title.GetNameNoTierNoTooltip] переходит к новому владельцу по решению суда, и обвинение, некогда разделившее королевство, получило ответ на глазах у всех собравшихся."
 # Usurper won - Observer POV
 agot_trial_of_seven.0105.desc.usurper_won:0 "После захвата [main_title.GetNameNoTier] был созван Суд семерых, чтобы оспорить право [usurper.GetTitledFirstNamePossessive] на власть. [legit_combatant.GetTitledFirstNamePossessive] и обвинители назвали своих защитников, и королевство собралось, чтобы увидеть, сможет ли сталь отменить то, что взяли честолюбием.\n\nСуд завершился неудачей для тех, кто искал правосудия. Защитники, выступившие против короны, лежат поверженными, и обвинение, выдвинутое от имени [legit_heir.GetTitledFirstName], пало на поле боя.\n\n[main_title.GetNameNoTierNoTooltip] остается в руках [usurper.GetTitledFirstNameNoTooltip]. Обвинение лишено всякой силы, и королевству остается лишь принять власть, устоявшую в испытании кровью."
 # Legit Helper won, but no heir exists so victory changes nothing - Observer POV
 agot_trial_of_seven.0105.desc.legit_helper_won.no_heir:0 "После того как [main_title.GetNameNoTier] был отнят у законного владельца [usurper.GetTitledFirstName], был созван Суд семерых, чтобы вернуть утраченное. Защитники откликнулись на обвинение, и судьба короны была решена на поле боя.\n\nПобеда была одержана в бою. [legit_combatant.GetTitledFirstName] сокрушил дело [usurper.GetTitledFirstNamePossessiveNoTooltip] на глазах у свидетелей со всего королевства. Однако некому принять этот приговор. [legit_heir.GetTitledFirstName] не [Select_CString(legit_heir.IsFemale, 'дожила', 'дожил' )] до его исполнения, и не осталось наследника, который мог бы исполнить решение суда.\n\nНе осталось того, кто мог бы воспользоваться победой, и [main_title.GetNameNoTierNoTooltip] остается в руках [final_usurper.GetTitledFirstName]. Суд запомнят не тем, что он вернул, а тем, сколько жизней он унес, не изменив судьбу короны."
 agot_trial_of_seven.0105.a:0 "Итак, дело решено."


 #####################################################
 ### TOS: Dishonorable Imprisonment INITIAL EVENTS ###
 #####################################################

 agot_trial_of_seven.0200.t:0 "Суд перед королевством"
 agot_trial_of_seven.0200.desc.defender.against_accuser:0 "В цепях или без них, я требую права на судебный поединок, надеясь, что сталь и честь еще могут даровать мне свободу. Однако [accuser_ruler.GetTitledFirstName] отвергает этот путь. Перед двором и короной [accuser_ruler.GetSheHe] [Select_CString(accuser_ruler.IsFemale, 'призывает', 'призывает' )] к куда более значительному — Суду семерых.\n\nСемь защитников выступят за [accuser_ruler.GetHerHis] приговор и семь — за меня. То, что могло быть решено между двумя клинками, теперь будет взвешено под взором богов и всего королевства. Является ли это правосудием или жестокостью — скоро решит поле боя."
 agot_trial_of_seven.0200.desc.defender.against_accuser_kin:0 "Я просил один клинок и честный шанс ответить на обвинение против меня. Вместо этого родич [accuser_ruler.GetTitledFirstNamePossessive], [accuser_candidate_kin.GetTitledFirstName], выступает вперед и требует Суд семерых от имени короны. То, что должно было стать рыцарским поединком, превратилось в зрелище для всего королевства.\n\nТеперь мне предстоит найти семь защитников, чтобы встать рядом со мной, иначе мое дело падет еще до первого удара. Сталь рассудит то, что гордость и положение извратили за пределами слов."
 agot_trial_of_seven.0200.desc.accuser:0 "[defender_leader.GetTitledFirstName], находясь под моей стражей, требует судебного поединка, чтобы ответить на обвинения, выдвинутые против [defender_leader.GetHerHis]. Один поединок решил бы дело быстро, но не всегда справедливо.\n\nНекоторые при дворе шепчут, что спор, затрагивающий корону, требует большего веса, чем может дать один клинок. Я [Select_CString(ROOT.Char.IsFemale, 'могу позволить', 'могу позволить' )] тот поединок, о котором [defender_leader.GetSheHe] просит... или отказать и вместо этого созвать Суд семерых."
 agot_trial_of_seven.0200.desc.accuser_kin.start:0 "[defender_leader.GetTitledFirstName], мой пленник, требует судебного поединка, надеясь решить дело одним клинком. Я уже [Select_CString(ROOT.Char.IsFemale, 'была готова', 'был готов' )] согласиться, как вдруг [accuser_candidate_kin.GetTitledFirstName] выступает вперед перед двором, заявляя, что такой спор требует большего, чем простой поединок."
 agot_trial_of_seven.0200.desc.accuser_kin.end:0 "[accuser_candidate_kin.GetSheHe] призывает к Суду семерых, настаивая, чтобы семь защитников выступили за корону и семь — против нее. Теперь весь двор наблюдает, ожидая, позволю ли я своему родичу вести это дело... или возьму его в свои руки."
 agot_trial_of_seven.0200.desc.accuser_kin.end.from_tbc:0 "[accuser_candidate_kin.GetSheHe] призывает к Суду семерых, настаивая, чтобы семь защитников выступили за корону и семь — против нее. Теперь весь двор наблюдает, ожидая, позволю ли я своему родичу вести это дело... или возьму его в свои руки."

 agot_trial_of_seven.0200.desc.accuser.from_tbc:0 "[defender_leader.GetTitledFirstName], находясь под моей стражей, требует судебного поединка, чтобы ответить на обвинения, выдвинутые против [defender_leader.GetHerHis]. Один поединок решил бы дело быстро, но не всегда справедливо.\n\nНекоторые при дворе шепчут, что спор, затрагивающий корону, требует большего веса, чем может дать один клинок. Их совет был услышан. Вместо одного поединка дело будет решено Судом семерых перед богами и всем королевством."
 agot_trial_of_seven.0200.desc.accuser_kin.start.from_tbc:0 "[defender_leader.GetTitledFirstName], мой пленник, требует судебного поединка, надеясь решить дело одним клинком. Я уже собираюсь объявить, что дело будет решено Судом семерых, как вдруг [accuser_candidate_kin.GetTitledFirstName] выступает вперед перед двором, опережая меня."

 agot_trial_of_seven.0200.a:0 "Хорошо, пусть [accuser_candidate_kin.GetFirstNameNoTooltip] ведет Суд семерых."
 agot_trial_of_seven.0200.b:0 "Это мое решение. Я созываю Суд семерых."
 agot_trial_of_seven.0200.c:0 "Я дарую [defender_leader.GetTitledFirstNameNoTooltip] судебный поединок."
 agot_trial_of_seven.0200.d:0 "Тогда я встану с семью."
 agot_trial_of_seven.0200.a.tt:0 "Этот выбор запускает Суд семерых вместо судебного поединка."
 agot_trial_of_seven.0200.a.tt.from_tbc:0 "Суд семерых начинается."
 agot_trial_by_combat.1000.f:0 "Я призываю к Суду семерых."
 agot_trial_of_seven.0200.b.from_tbc:0 "Тогда пусть будут призваны защитники"
 agot_trial_of_seven.0200.b.generic:0 "$agot_trial_by_combat.1000.f$"

 #Accuser CusLocs
 #plotting_against_me_opinion, schemed_against_me, scheming_against_me, fabricate_hook_threatened_me
 accuser_kin_plotting:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] действует против меня в тени. Я [Select_CString(ROOT.Char.IsFemale, 'добьюсь', 'добьюсь' )] суда на глазах у всех."\n\n"
 #abducted_me_opinion, abducted_me_crime, attempted_abduct_me_crime
 accuser_kin_abduction:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'пыталась', 'пытался' )] утащить меня, словно вора в ночи. Пусть королевство увидит ответ на это."\n\n"
 #attempted_murder_me_crime, tried_to_poison_me_opinion
 accuser_kin_murder:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'пыталась', 'пытался' )] покончить со мной втайне. Если уж рисковать смертью, то под взором богов."\n\n"
 #tortured_me, wounded_me, tutored_me_opinion
 accuser_kin_torture:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'причинила', 'причинил' )] мне страдания ради забавы. Я не позволю, чтобы все закончилось одним клинком."\n\n"
 #maimed_me, disfigured_me, blinded_me, castrated_me
 accuser_kin_maimed:0 "\n\n"Посмотрите, что [defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'сделала', 'сделал' )] со мной. Пусть семь клинков скажут то, что не выразить словами."\n\n"
 #stole_artifact_from_me, fp3_stole_from_me
 accuser_kin_stole:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'украла', 'украл' )] то, что по праву было моим. Я не приму пустые оправдания."\n\n"
 #fp3_sabotaged_me, betrayed_me_opinion
 accuser_kin_sabotage:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'предала', 'предал' )] меня в самый важный момент. Пусть боги взвесят это предательство."\n\n"
 #fp3_denounced_me, slandered_me_opinion, shamed_me_opinion, ruined_me_opinion, blamed_me_unjustly, rival_insult_opinion
 accuser_kin_slander:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'очернила', 'очернил' )] мое имя. Я [Select_CString(ROOT.Char.IsFemale, 'добьюсь', 'добьюсь' )] приговора, который королевство не сможет игнорировать."\n\n"
 #imprisoned_me, imprisoned_me_dungeon, imprisoned_me_past
 accuser_kin_imprison:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'заключила', 'заключил' )] меня в цепи. Если суду быть — он будет свершен как должно."\n\n"
 #banished_me
 accuser_kin_banished:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'изгнала', 'изгнал' )] меня с моего места, будто я ничто. Пусть это будет решено на глазах у всех."\n\n"
 #challenged_authority_opinion, usurped_title, deposed_me_opinion
 accuser_kin_deposed:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'пытается разрушить', 'пытается разрушить' )] законный порядок. Пусть семь защитников встанут на его защиту."\n\n"
 #killed_my_child
 accuser_kin_child_kill:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'отняла', 'отнял' )] у меня моего ребенка. Я не позволю, чтобы это было решено тихо."\n\n"
 #mw_wanted_to_execute_me, mw_evaded_execution
 accuser_kin_execute:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'насмехалась', 'насмехался' )] над правосудием. Пусть боги решат то, что не смог закон."\n\n"
 #muted_me
 accuser_kin_mute:0 "\n\n[accuser_candidate_kin.GetTitledFirstNameNoTooltip] [Select_CString(accuser_candidate_kin.IsFemale, 'ударяет', 'ударяет' )] кулаком по столу и поспешно пишет требование о Суде семерых на клочке пергамента.\n\n"
 #tried_to_eat_me_opinion
 accuser_kin_tried_to_aith_me:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'пыталась', 'пытался' )] однажды съесть меня. Я [Select_CString(ROOT.Char.IsFemale, 'предпочла бы', 'предпочел бы' )], чтобы боги решили, было ли это уместно."\n\n"
 #agot_tried_to_sacrifice_me
 accuser_kin_sacrifice:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'хотела пролить', 'хотел пролить' )] мою кровь ради темных обрядов. Пусть Семеро дадут ответ."\n\n"
 #tournament_savagely_beaten_opinion
 accuser_kin_beaten:0 "\n\n"[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'избила', 'избил' )] меня без пощады. Я не дам [defender_leader.GetHerHis] легкого ответа сегодня."\n\n"
 #insane
 accuser_kin_insane:0 "\n\n"Одного клинка недостаточно! Семь! Семь угодят богам!"\n\n"

