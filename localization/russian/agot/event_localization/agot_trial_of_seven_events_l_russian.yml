 they_agot_unavailable_due_to_grand_wedding:0 "Они не могут прибыть, так как присутствуют на Великой свадьбе"
 i_agot_unavailable_due_to_grand_wedding:0 "Я не могу прибыть, так как присутствую на Великой свадьбе"