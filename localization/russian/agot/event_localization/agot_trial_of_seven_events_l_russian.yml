 ### TOS: Dishonorable Imprisonment OUTCOMES ###
 ###############################################

 agot_trial_of_seven.0201.t:0 "Где пали Семеро"
 #CROWN POV
 agot_trial_of_seven.0201.desc.defender_won_default.accuser_pov:0 "Все кончено. Суд Семерых высказался против меня, и поле боя дало ответ, который я [Select_CString(ROOT.Char.IsFemale, 'пыталась', 'пытался' )] отрицать. Мои чемпионы лежат поверженными или побежденными, а [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'стоит оправданной', 'стоит оправданным' )] перед богами и всем королевством.\n\nТакую победу нельзя скрыть за закрытыми дверями. Лорды запомнят, кто одержал верх, а простолюдины будут повторять эту историю, пока она не станет истиной. Какой бы приговор я ни [Select_CString(ROOT.Char.IsFemale, 'намеревалась', 'намеревался' )] обрушить на [tos_final_accused.GetHerHis], он вернулся и лег на меня."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.accuser_pov:0 "Суд Семерых завершился кровью и разорением, и мне остается лишь смотреть на его цену. Дело [tos_final_accuser.GetTitledFirstNamePossessive] пало на поле боя, и [tos_final_accuser.GetSheHe] [Select_CString(tos_final_accuser.IsFemale, 'не поднялась', 'не поднялся' )] вновь. [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'стоит победительницей', 'стоит победителем' )], и королевство стало этому свидетелем.\n\nТеперь двор отводит взор от поля боя к тому, что будет дальше. Сталью и волей Семерых [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'стоит оправданной', 'стоит оправданным' )]. Какие бы обвинения ни были брошены против [tos_final_accused.GetHerHis], на них был дан ответ, и королевство увидело явный суд богов."
 agot_trial_of_seven.0201.desc.accuser_won_defeault.accuser_pov:0 "Суд Семерых завершен, и боги [Select_CString(ROOT.Char.IsFemale, 'благоволили', 'благоволили' )] моему делу. Мои чемпионы удержали поле, и [tos_final_accused.GetTitledFirstName] остался с поражением вместо свободы, которой [tos_final_accused.GetSheHe] [Select_CString(tos_final_accused.IsFemale, 'требовала', 'требовал' )].\n\nНо даже победа имеет свою цену. Семь клинков были собраны, и многие не вернутся такими, какими пришли. И все же королевство увидело свершившийся суд при всех, и это зрелище — оружие не менее острое, чем любой меч."
 agot_trial_of_seven.0201.desc.accuser_won_defender_died.accuser_pov:0 "Суд Семерых завершен, и [tos_final_accused.GetTitledFirstName] больше никогда не произнесет ни слова в неповиновении. Поле боя забрало [tos_final_accused.GetHerHis] как свою дань, а мои чемпионы остались стоять, когда пал последний удар.\n\nОдни назовут это справедливостью, другие — простой властью под маской закона. Пусть шепчутся. Королевство видело, как боги вынесли решение, а мертвые не спорят с приговорами."
 #DEFENDER POV
 agot_trial_of_seven.0201.desc.defender_won_default.defender_pov:0 "Суд Семерых завершен, и я все еще [Select_CString(ROOT.Char.IsFemale, 'дышу', 'дышу' )]. Против тяжести короны и суда мои чемпионы устояли, и поле дало свой ответ. Перед богами и всем королевством мое дело оказалось сильнее цепей, которыми меня [Select_CString(ROOT.Char.IsFemale, 'пытались', 'пытались' )] сковать.\n\nНо победа никогда не бывает чистой. Земля пропитана ее ценой, и крики умирающих звучат дольше любого ликования. И все же... я [Select_CString(ROOT.Char.IsFemale, 'свободна', 'свободен' )] от их приговора, и королевство это увидело."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.defender_pov:0 "Суд Семерых завершился, и боги ответили голосом, который никто не может не услышать. Мои чемпионы удержали поле, а [tos_final_accuser.GetTitledFirstName] [Select_CString(tos_final_accuser.IsFemale, 'пала', 'пал' )] среди звона стали. Приговор короны умер вместе с [tos_final_accuser.GetHerHim].\n\nТеперь поле спокойно, а его решение уже становится законом и памятью. По воле богов и силой моих чемпионов я [Select_CString(ROOT.Char.IsFemale, 'очищена', 'очищен' )] от всех обвинений. Все, что было сказано против меня, получило ответ в стали, и никто не может отрицать вынесенный приговор."
 agot_trial_of_seven.0201.desc.accuser_won_defeault.defender_pov:0 "Все кончено. Суд Семерых обернулся против меня, и мои чемпионы не смогли удержать поле. Боги не даровали мне ответ, которого я [Select_CString(ROOT.Char.IsFemale, 'требовала', 'требовал' )], или же даровали его другой стороне.\n\nВсе шансы разорвать эти цепи по праву были оплачены кровью. Теперь мне предстоит встретить то, что следует за проигранным судом: королевство, верящее в приговор, и победителя, который не забудет, что я [Select_CString(ROOT.Char.IsFemale, 'вынудила', 'вынудил' )] его дать ответ."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.inherited_crown_pov:0 "Суд Семерых завершился, и вместе с ним оборвалась жизнь, стоявшая между мной и короной. [tos_final_accuser.GetTitledFirstName] [Select_CString(tos_final_accuser.IsFemale, 'пала', 'пал' )] на поле боя, и бремя власти переходит ко мне не тихим наследованием, а через кровь и суд.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришел' )] на поле не в поисках трона, а справедливости, но сталь возложила на меня и то и другое. Боги высказались на глазах у всех, и я выхожу из суда не только [Select_CString(ROOT.Char.IsFemale, 'оправданной', 'оправданным' )], но и [Select_CString(ROOT.Char.IsFemale, 'увенчанной', 'увенчанным' )] короной самим приговором, который должен был меня сломить."
 #OBSERVER POV
 agot_trial_of_seven.0201.desc.defender_won_default.observer_pov:0 "Суд Семерых завершился, и победитель очевиден для всех. [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'одержала верх', 'одержал верх' )], и ее чемпионы все еще стоят там, где клинки [tos_final_accuser.GetTitledFirstNamePossessive] дрогнули.\n\nКоролевство будет говорить об этом долгие годы. Такие суды редки, а еще реже их исход затрагивает и власть, и наказание. То, что было требованием узника, стало приговором, свидетелями которого стали все, и никто скоро этого не забудет."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.observer_pov:0 "Суд Семерых завершился приговором, написанным телами. [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'одержала победу', 'одержал победу' )], а [tos_final_accuser.GetTitledFirstName] [Select_CString(tos_final_accuser.IsFemale, 'лежит мертвой', 'лежит мертвым' )] на поле среди павших чемпионов.\n\nС гибелью [tos_final_accuser.GetTitledFirstNameNoTooltip] этот суд почти не оставляет места сомнениям. Перед богами и людьми [tos_final_accused.GetTitledFirstNameNoTooltip] [Select_CString(tos_final_accused.IsFemale, 'стоит оправданной', 'стоит оправданным' )], а обвинения против [tos_final_accused.GetHerHis] получили ответ на глазах у всех. То, что прежде обсуждалось словами, теперь решено сталью."
 agot_trial_of_seven.0201.desc.accuser_won_defeault.observer_pov:0 "Суд Семерых завершен, и сторона [tos_final_accuser.GetTitledFirstNamePossessive] одержала верх на поле. [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'побеждена', 'побежден' )], и приговор уже распространяется от костров до дворов, словно священное слово.\n\nОдни называют это справедливостью, другие — неизбежностью. Как бы то ни было, королевство видело, как семь клинков решили то, что не смогли слова. Приговор был завоеван сталью, и королевство это увидело."
 agot_trial_of_seven.0201.desc.accuser_won_defender_died.observer_pov:0 "Суд Семерых завершился тем, что [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'пала', 'пал' )] на поле. Чемпионы [tos_final_accuser.GetTitledFirstNamePossessive] устояли, и дело узника умерло вместе с [tos_final_accused.GetHerHim].\n\nНайдутся те, кто скажет, что боги ясно высказались, и те, кто будет настаивать, что боги лишь были вынуждены наблюдать. Как бы то ни было, жизнь была уплачена за право задать вопрос, и королевство запомнит эту цену."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.inherited_crown_observer_pov:0 "Суд Семерых завершился победой, которую ни один бард не смог бы описать, не прозвучав жестоко. [tos_final_accuser.GetTitledFirstName] [Select_CString(tos_final_accuser.IsFemale, 'лежит мертвой', 'лежит мертвым' )] на поле, а тот, кого прежде называли узником, теперь [Select_CString(tos_final_accused.IsFemale, 'восходит', 'восходит' )] как законный правитель перед богами и людьми.\n\nТо, что началось как требование суда, стало передачей самой короны. Сталь дала ответ и обвинению, и наследованию, и все свидетели знают, что этот трон был взят не в тишине, а завоеван под взором Семерых."
 agot_trial_of_seven.0201.a:0 "Так боги вынесли свой суд."


 #################################################
 ### TOS: Dishonorable Imprisonment PRE-EVENTS ###
 #################################################

 # ToS: Imprisoned.. Friend Visits
 agot_trial_of_seven.0202.t:0 "Гость во тьме"
 agot_trial_of_seven.0202.desc:0 "Часы тянутся медленно в этих стенах, нарушаемые лишь далекими шагами и капанием невидимой воды. Когда дверь наконец открывается, я [Select_CString(ROOT.Char.IsFemale, 'ожидаю', 'ожидаю' )] увидеть очередного стражника... а не знакомое лицо.\n\n[tos_friend.GetTitledFirstName] вступает в тусклый свет, и на мгновение я не [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], [Select_CString(ROOT.Char.IsFemale, 'улыбнуться', 'улыбнуться' )] мне или проклясть это зрелище. [tos_friend.GetSheHe|U] носит имя того же дома, что держит меня здесь, но в [tos_friend.GetHerHis] глазах нет его жесткости. Мы говорим вполголоса, остерегаясь лишних ушей, пока наконец [tos_friend.GetSheHe] не [Select_CString(tos_friend.IsFemale, 'обещает', 'обещает' )] поговорить с [tos_imprisoner.GetTitledFirstName] от моего имени.\n\nВозможно, это мелочь — слова, переданные из одного зала в другой — но даже малое обещание ощущается иначе, когда у тебя нет ничего."
 agot_trial_of_seven.0202.a:0 "Я [Select_CString(ROOT.Char.IsFemale, 'буду держаться', 'буду держаться' )] за эту надежду."
 agot_trial_of_seven.0202.b:0 "Мне не нужны милости от твоего дома."

 # ToS: Imprisoned.. I can demand TbC
 agot_trial_of_seven.0203.t:0 "Перед короной"
 agot_trial_of_seven.0203.desc:0 "За мной приходит стражник. Я [Select_CString(ROOT.Char.IsFemale, 'ожидаю', 'ожидаю' )] очередного допроса. Вместо этого меня ведут в небольшую залу, где меня ждет мой [SCOPE.sC('tos_prisoner').Custom2('RelationToMeShort', SCOPE.sC('tos_friend'))], [tos_friend.GetTitledFirstName]. [tos_friend.GetSheHe|U] почти не тратит времени на любезности. Если я [Select_CString(ROOT.Char.IsFemale, 'намерена', 'намерен' )] покинуть эти стены с честью, [tos_friend.GetSheHe] говорит мне, я должна буду за нее сражаться.\n\nСуд поединком может быть моим единственным путем вперед. Сталь, а не слова, может оказаться единственным языком, который [tos_imprisoner.GetTitledFirstName] [Select_CString(tos_imprisoner.IsFemale, 'признает', 'признает' )]. Вскоре стражник ведет нас дальше, в большую залу, где [tos_imprisoner.GetTitledFirstNameNoTooltip] и собравшиеся придворные ждут моего ответа. Все взгляды обращаются ко мне, ожидая услышать, чего я потребую... если вообще потребую что-либо."
 agot_trial_of_seven.0203.a:0 "Я требую суда поединком."
 agot_trial_of_seven.0203.b:0 "Я не стану превращать это в представление."
 agot_trial_of_seven.0203.b.tt:0 "Вас сопровождают обратно в темницу."

 # ToS: Imprisoned.. King considers the release of the prisoner
 agot_trial_of_seven.0204.t:0 "О милосердии"
 agot_trial_of_seven.0204.desc:0 "[tos_friend.GetTitledFirstName] [Select_CString(tos_friend.IsFemale, 'предстаёт', 'предстаёт')] передо мной с просьбой столь же дерзкой, сколь и неудобной. Говоря осторожно и размеренно, [Select_CString(tos_friend.IsFemale, 'она просит', 'он просит')] освободить [tos_prisoner.GetTitledFirstName] из-под моей стражи.\n\n[Select_CString(tos_friend.IsFemale,'Она', 'Он')] утверждает, что эта история и так стоила многих трудов, а милосердие сейчас позволило бы избежать новых хлопот. Однако цепи редко снимают без причины, и двор внимательно следит за тем, какой ответ я дам."
 agot_trial_of_seven.0204.a:0 "Хорошо. Отпустить [tos_prisoner.GetHerHim]."
 agot_trial_of_seven.0204.b:0 "У свободы есть цена. Платите."
 agot_trial_of_seven.0204.c:0 "Нет. [Select_CString(tos_prisoner.IsFemale, 'Она', 'Он')] останется там, где [Select_CString(tos_prisoner.IsFemale, 'ей', 'ему')] и место."
 agot_trial_of_seven.0204.d:0 "Освободить [tos_prisoner.GetTitledFirstNameNoTooltip]... и отправить [Select_CString(tos_prisoner.IsFemale, 'её', 'его')] на Стену."

 # ToS: Imprisoned.. Prisoner informed
 agot_trial_of_seven.0205.t:0 "Слово от [tos_imprisoner.Custom('GetQueenKing')|U]"
 agot_trial_of_seven.0205.desc.ok:0 "Дверь снова открывается, и возвращается [tos_friend.GetTitledFirstName]. На этот раз на [Select_CString(tos_friend.IsFemale, 'её', 'его')] лице — спокойное облегчение.\n\n[Select_CString(tos_friend.IsFemale, 'Она', 'Он')] говорит мне, что [tos_imprisoner.GetTitledFirstName] [Select_CString(tos_imprisoner.IsFemale, 'согласилась', 'согласился')] отпустить меня. Цепи, державшие меня здесь, скоро падут, и дорога за этими стенами снова станет моей."
 agot_trial_of_seven.0205.desc.gold:0 "Когда дверь открывается, [tos_friend.GetTitledFirstName] стоит за ней, но выражение [Select_CString(tos_friend.IsFemale, 'её', 'его')] лица не совсем то, на которое я надеялся.\n\n[tos_imprisoner.GetTitledFirstName] [Select_CString(tos_imprisoner.IsFemale, 'согласится', 'согласится')] даровать мне свободу, но лишь за плату. Прежде чем эти цепи будут сняты, должна перейти золотая монета."
 agot_trial_of_seven.0205.desc.no:0 "[tos_friend.GetTitledFirstName] возвращается в мою камеру, но весть, которую [Select_CString(tos_friend.IsFemale, 'она', 'он')] приносит, не та, что я надеялся услышать.\n\n[tos_imprisoner.GetTitledFirstName] [Select_CString(tos_imprisoner.IsFemale, 'отказала', 'отказал')] в просьбе. Мои цепи остаются на месте, и надежда покинуть эти стены отвергнута."
 agot_trial_of_seven.0205.desc.nw:0 "Когда дверь снова открывается, [tos_friend.GetTitledFirstName] стоит на пороге, и тяжесть в [Select_CString(tos_friend.IsFemale, 'её', 'его')] глазах говорит мне, что это не простая встреча.\n\n[tos_imprisoner.GetTitledFirstName] [Select_CString(tos_imprisoner.IsFemale, 'согласилась', 'согласился')] отпустить меня... но не на свободу. Меня отправят на Стену, где я приму чёрный плащ и проведу остаток своих дней на службе Ночного Дозора."
 agot_trial_of_seven.0205.a:0 "Хорошо. Я согласен."
 agot_trial_of_seven.0205.b:0 "Это не справедливость."
 agot_trial_of_seven.0205.b.nw:0 "Это не справедливость. Я требую суда поединком."
 agot_trial_of_seven.0205.c:0 "Да будет так."

##########################
### TOS TEAM SELECTION ###
##########################

 # ToS: Selecting Champions
 agot_trial_of_seven.1000.t:0 "Семеро чемпионов"
 agot_trial_of_seven.1000.desc:0 "Настал час суда семерых. Я должен назвать тех, кто выйдет на поединок ради моего дела.\n\nЕсли мне не удастся собрать шестерых, чтобы выступить со мной, приговор свершится без единого удара, и вина падёт на моё имя.\n\nНесколько рыцарей уже предложили свои мечи. Я должен решить, кто из них выйдет на поле рядом со мной."
 agot_trial_of_seven.1000.desc.lost_before_started:0 "Тишина затягивается, никто не откликается. Никто больше не выходит, чтобы встать рядом со мной, а без семерых, отвечающих на обвинение, суд не может состояться.\n\nПо закону и обычаю обвинение остаётся без ответа, и я признан виновным."
 # desc variations
 agot_trial_of_seven.1000.desc.sellsword:0 "Тишина затягивается дольше, чем мне хотелось бы. Наконец из толпы выступает воин с суровым взглядом, останавливаясь лишь когда ясно звучит моё предложение золота.\n\nУ стали много хозяев, и сегодня золото оказалось достаточной платой, чтобы привязать один клинок к моему делу."
 agot_trial_of_seven.1000.desc.helper_knight.a:0 "Тишина длится, тяжёлая и непробиваемая. Наконец [helper_knight.GetTitledFirstName] [Select_CString(helper_knight.IsFemale, 'выступает', 'выступает')] из толпы и [Select_CString(helper_knight.IsFemale, 'предлагает', 'предлагает')] свой меч моему делу."
 agot_trial_of_seven.1000.desc.helper_knight.b:0 "Сначала никто не двигается. Затем [helper_knight.GetTitledFirstName] [Select_CString(helper_knight.IsFemale, 'покидает', 'покидает')] толпу, [Select_CString(helper_knight.IsFemale, 'выходит', 'выходит')] на открытое место и [Select_CString(helper_knight.IsFemale, 'заявляет', 'заявляет')] о готовности выступить за меня."
 agot_trial_of_seven.1000.desc.helper_knight.c:0 "Минута тянется в тишине, пока [helper_knight.GetTitledFirstName] не [Select_CString(helper_knight.IsFemale, 'нарушает', 'нарушает')] её, [Select_CString(helper_knight.IsFemale, 'выходя', 'выходя')] вперёд и [Select_CString(helper_knight.IsFemale, 'вручая', 'вручая')] свой меч моему делу."
 agot_trial_of_seven.1000.desc.helper_knight.d:0 "Все взгляды остаются прикованными к толпе, пока [helper_knight.GetTitledFirstName] не [Select_CString(helper_knight.IsFemale, 'выходит', 'выходит')] вперёд, [Select_CString(helper_knight.IsFemale, 'кладет', 'кладет')] конец молчанию и [Select_CString(helper_knight.IsFemale, 'посвящает', 'посвящает')] свой клинок моему делу."
 agot_trial_of_seven.1000.desc.helper_knight.e:0 "Долгое мгновение никто не двигается. Затем одна фигура — [helper_knight.GetTitledFirstName] — [Select_CString(helper_knight.IsFemale, 'выступает', 'выступает')] из толпы, нарушая молчание, и [Select_CString(helper_knight.IsFemale, 'предлагает', 'предлагает')] свой меч моему делу."
 agot_trial_of_seven.1000.desc.helper_squire:0 "Тишина готова поглотить момент целиком, когда юный оруженосец, [helper_knight.GetTitledFirstName], [Select_CString(helper_knight.IsFemale, 'выходит', 'выходит')] из толпы. В [Select_CString(helper_knight.IsFemale, 'её', 'его')] голосе слышна робость, но не страх.\n\n[Select_CString(helper_knight.IsFemale, 'Она', 'Он')] опускается на одно колено передо мной, [Select_CString(helper_knight.IsFemale, 'склоняет', 'склоняет')] голову и говорит громко, чтобы все слышали.\n\n#EMP "[the_other_leader.GetTitledFirstNameNoTooltip], [Select_CString(the_other_leader.IsFemale, 'посвятите', 'посвяти')] меня в рыцари... и я [Select_CString(helper_knight.IsFemale, 'встану', 'встану')] рядом с вами."#S"
 # situational option texts
 agot_trial_of_seven.1000.a:0 "Прекрасный выбор."
 agot_trial_of_seven.1000.a.buy:0 "Золото говорит громче молчания."
 agot_trial_of_seven.1000.a.tt:0 "Выбранный вами чемпион будет сражаться на вашей стороне.\n"
 agot_trial_of_seven.1000.a.lost_before_started:0 "Моя судьба решена."
 agot_trial_of_seven.1000.a.need_new_char:0 "Кто встанет и будет сражаться со мной?"
 agot_trial_of_seven.1000.a.squire_approved:0 "Встаньте, сер [helper_knight.GetFirstNameNoTooltip]. Станьте рядом со мной."
 agot_trial_of_seven.1000.a.squire_approved.tt:0 "#EMP Именем Воина заклинаю вас быть отважным. Именем Отца заклинаю вас быть справедливым. Именем Матери заклинаю вас защищать невинных и юных. Именем Девы заклинаю вас оберегать всех женщин.\n#S"
 agot_trial_of_seven.1000.b.squire_denied:0 "Мне не следует этого делать."
 agot_trial_of_seven.1000.b.squire_denied.tt:0 "Без достаточного числа чемпионов Суд Семерых не может начаться, и вы будете признаны виновным."


 # ToS: Trial of Seven Starts
 agot_trial_of_seven.1001.t:0 "Семеро против семерых"
 agot_trial_of_seven.1001.t.accusers:0 "$agot_trial_of_seven.1002.t$: [accuser_leader.GetTitledFirstNameNoTooltip] и обвинители"
 agot_trial_of_seven.1001.t.defenders:0 "$agot_trial_of_seven.1002.t$: [defender_leader.GetTitledFirstNameNoTooltip] и [Select_CString(defender_leader.IsFemale, 'её', 'его')] чемпионы"
 agot_trial_of_seven.1001.desc:0 "На глазах у всего королевства наконец-то объявлен древний Суд Семерых. Ни слово лорда, ни указ короля не могут теперь положить конец этой распре, только семь мечей, поднятых за каждую из сторон, и приговор, который боги вынесут через сталь и кровь. Обвинитель и обвиняемый стоят друг против друга, их судьбы связаны так же крепко, как и судьбы чемпионов, сражающихся от их имени. Пусть поле станет свидетелем, и когда последний меч падёт, боги решат, кто стоял за правду, а кто за грех.\n\n#EMP [oth_1.GetTitledFirstName] [Select_CString(oth_1.IsFemale, 'выступает', 'выступает')] вместе с [oth_5.GetTitledFirstName], [oth_4.GetTitledFirstName], [oth_2.GetTitledFirstName], [oth_3.GetTitledFirstName], [oth_6.GetTitledFirstName] и [oth_7.GetTitledFirstName].\n\nПротив них [Select_CString(roy_1.IsFemale, 'выступает', 'выступает')] [roy_1.GetTitledFirstName], к [Select_CString(roy_1.IsFemale, 'которой', 'которому')] [Select_CString(roy_1.IsFemale, 'присоединились', 'присоединились')] [roy_5.GetTitledFirstName], [roy_4.GetFirstName], [roy_2.GetTitledFirstName], [roy_3.GetTitledFirstName], [roy_6.GetTitledFirstName] и [roy_7.GetTitledFirstName].#S"
 agot_trial_of_seven.1001.a:0 "Так пусть же боги рассудят."
 agot_trial_of_seven.1001.a.second:0 "Да начнётся Суд Семерых."


 # ToS - Succession Crisis: Event about Tos - Player can observe
 agot_trial_of_seven.1002.t:0 "Суд Семерых"
 agot_trial_of_seven.1002.desc.usurpation:0 "Слухи быстро распространяются по дворам и лагерям. Объявлен Суд Семерых: [the_other_leader.GetTitledFirstName] открыто называет восхождение [the_royal_leader.GetTitledFirstNamePossessive] узурпацией и требует суда перед богами и людьми.\n\nТакие суды случаются редко, а когда на кону корона и притязания — ещё реже. Лорды шепчутся, что чемпионы уже собираются, каждый клинок поклялся доказать, кто из правителей стоит за правду, а кто — за грех. Скоро сталь решит то, что не смог решить ни один совет."
 agot_trial_of_seven.1002.desc.imprisonment:0 "Весть разносится быстро: то, что начиналось как требование суда поединком, превратилось в нечто гораздо большее. После того как [the_other_leader.GetTitledFirstName] потребовал поединка один на один, чтобы ответить за приговор [the_royal_leader.GetTitledFirstNamePossessive], корона отказала и вместо этого объявила Суд Семерых.\n\nМногие называют это смелым ходом, другие — жестоким, ибо такие суды превращают распри в зрелища, которые всё королевство не может проигнорировать. Чемпионы собираются отовсюду, и вскоре семь мечей против семи решат судьбу, которую не смогли решить слова."
 agot_trial_of_seven.1002.a:0 "Я буду следить за судом."
 agot_trial_of_seven.1002.a.tt:0 "Вы будете наблюдать за ходом Суда Семерых."
 agot_trial_of_seven.1002.b:0 "Меня это не касается."


 # ToS: No one volunteered
 agot_trial_of_seven.1003.t:0 "$agot_trial_of_seven.1000.t$"
 agot_trial_of_seven.1003.desc.need_more_knights.a:0 "Счёт неполон. У меня ещё нет семерых, требуемых для ответа на обвинение, и суд не может продолжаться в таком виде.\n\nСо всех сторон давит тяжесть момента, пока снова и снова считают и находят, что число недостаточно. Нужно найти ещё чемпионов, чтобы продолжить это дело, иначе приговор вынесут без стали."
 agot_trial_of_seven.1003.desc.need_more_knights.b:0 "Взгляды, устремлённые на меня, не дают ответа. Слишком немногие вышли вперёд, и нужное число всё ещё не набрано.\n\nНа краю толпы слышен ропот — любопытный, а порой и недобрый, пока тишина затягивается. Пока не названы новые имена, Суд Семерых остаётся незавершённым, повиснув в равновесии перед всеми, кто смотрит."
 agot_trial_of_seven.1003.desc.need_more_knights.c:0 "Закон ясен, а число ещё не достигнуто. Без семерых, выступающих вместе, обвинение не может быть оспорено.\n\nСлова обычая громко звучат в моих мыслях — я выучил их давно и никогда не думал, что они будут проверены на деле. Если этот суд должен продолжиться, нужно найти ещё чемпионов, иначе закон осудит меня без пощады."
 agot_trial_of_seven.1003.desc.need_more_knights.d:0 "Тех, кто передо мной, недостаточно. Семеро ещё не собраны, и момент тянется незавершённым.\n\nКаждое биение сердца притягивает взгляды толпы всё ближе, все ждут, выступит ли кто-то ещё. Если больше никто не придёт встать рядом со мной, этот суд не состоится, и исход будет решён здесь и сейчас."
 agot_trial_of_seven.1003.desc.need_more_knights.e:0 "Тишина отвечает на мой призыв. Те, кто готов выступить, уже вышли, и никто больше не присоединяется к ним.\n\nНа мгновение сомнение пронзает острее любого клинка, и я задаюсь вопросом, не здесь ли конец моего дела. Если предстоит назвать ещё чемпионов, их придётся искать самому, иначе сама тишина станет моим ответом."
 #honorable calls
 agot_trial_of_seven.1003.a.honorable.a:0 "Кто встанет там, где ещё жива правда?"
 agot_trial_of_seven.1003.a.honorable.b:0 "Неужели никто здесь больше не верит в справедливость?"
 agot_trial_of_seven.1003.a.honorable.c:0 "Неужели не осталось никого, кто встал бы за правое дело?"
 agot_trial_of_seven.1003.a.honorable.d:0 "Неужели не осталось ни одного рыцаря, помнящего о своей клятве?"
 agot_trial_of_seven.1003.a.honorable.e:0 "Неужели среди вас нет истинных рыцарей?!"
 #royal calls (available only for the royal side, they have the money)
 agot_trial_of_seven.1003.a.greedy.a:0 "Какую цену вы назначите за свой меч?"
 agot_trial_of_seven.1003.a.greedy.b:0 "Кто здесь готов сражаться за хорошее золото?"
 agot_trial_of_seven.1003.a.greedy.c:0 "Неужели никто не желает получить плату за свою храбрость?"
 agot_trial_of_seven.1003.a.greedy.d:0 "Кто продаст свой клинок за золото?"
 agot_trial_of_seven.1003.a.greedy.e:0 "Кто из вас сразится за достойную цену?"
 #dishonorable/arrogant calls
 agot_trial_of_seven.1003.a.dishonorable.a:0 "Неужели вы все так боитесь поля?"
 agot_trial_of_seven.1003.a.dishonorable.b:0 "Никто не откликнется, когда я зову?"
 agot_trial_of_seven.1003.a.dishonorable.c:0 "Неужели правда нет никого, кто достоин выступить за меня?"
 agot_trial_of_seven.1003.a.dishonorable.d:0 "Неужели я и вправду окружён трусами?"
 agot_trial_of_seven.1003.a.dishonorable.e:0 "Кто из вас выступит ради меня?"


#Leader couldn't gather 6 other knights
 agot_trial_of_seven.1004.t:0 "Осуждённый без стали"
 agot_trial_of_seven.1004.desc:0 "Вызов угасает, так и не получив ответа. [leader_lost_before_started.GetTitledFirstName] [Select_CString(leader_lost_before_started.IsFemale, 'не смогла', 'не смог')] собрать шестерых чемпионов, чтобы выступить рядом с [Select_CString(leader_lost_before_started.IsFemale, 'ней', 'ним')], и Суд Семерых не может состояться.\n\nПо закону и обычаю обвинение остаётся без ответа. Вина ложится на [Select_CString(leader_lost_before_started.IsFemale, 'неё', 'него')], и дело решено без единого обнажённого меча."
 agot_trial_of_seven.1004.a:0 "Уберите [Select_CString(leader_lost_before_started.IsFemale, 'её', 'его')] с моих глаз."

 #Yield! Yield!
 agot_single_combat.0031.b:0 "Это ещё не конец."

