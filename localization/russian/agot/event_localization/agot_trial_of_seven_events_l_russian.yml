l_russian:
 ##############################################################
 ####### ####### ####### TRIAL OF SEVEN ####### ####### #######
 ##############################################################

 #############################################
 ### TOS: Succession Crisis INITIAL EVENTS ###
 #############################################

 # ToS - Succession Crisis: ToS Demanded
 agot_trial_of_seven.0100.t: "Требование перед всей державой"
 agot_trial_of_seven.0100.desc: "Едва корона опустилась на мою голову, как обвинение было произнесено вслух. [accuser_leader.GetTitledFirstName] называет моё правление узурпацией и требует суда за это, утверждая, что королевство было захвачено мной.\n\nТребование достаточно ясное. Суд Семерых. Семь обвинителей против семерых защитников, моё дело против [Select_CString(accuser_leader.IsFemale, 'её', 'его' )], и судьба моего правления зависит от исхода. Отрицать это было бы воспринято многими как признание вины. Согласиться - значит поставить на карту всю державу."
 agot_trial_of_seven.0100.desc.helper: "Едва корона опустилась на мою голову, как обвинение было произнесено вслух. [accuser_leader.GetTitledFirstName] [Select_CString(accuser_leader.IsFemale, 'выступила', 'выступил' )] вперёд, назвав моё правление узурпацией, и [Select_CString(accuser_leader.IsFemale, 'потребовала', 'потребовал' )] Суда Семерых, заявив, что [Select_CString(true_heir.IsFemale, 'истинной правительницей', 'истинным правителем' )] является [true_heir.GetTitledFirstName], чьи притязания были украдены.\n\nТребование достаточно ясно. Семь защитников против семи обвинителей, моё дело противостоит делу, за которое они взялись, и судьба моего правления зависит от результата. Во многих глазах отказ от этого был бы воспринят как страх. Согласиться - значит поставить на карту всю державу."
 agot_trial_of_seven.0100.desc.accuser: "[defender_leader.GetTitledFirstName] с трудом возлагает на себя корону, и я не позволю державе притворяться, что это не так. Как перед лордами, так и перед простонародьем, я объявляю это правление узурпацией и требую суда перед ликом богов и людей.\n\nСуд Семерых. Семь обвинителей выступят за меня и за то, что я отстаиваю, семеро за [Select_CString(defender_leader.IsFemale, 'ту', 'того' )], кто восседает на троне. Пусть сталь и вера решают, чего не могут сделать одни только слова. Если [defender_leader.GetSheHe] откажется, королевство узнает, что означает это молчание."
 agot_trial_of_seven.0100.a: "Пусть боги решают, [Select_CString(accuser_leader.IsFemale, 'права она', 'прав он' )] или нет."
 agot_trial_of_seven.0100.a.accuser: "Да будут Семеро свидетелями."

 # ToS - Succession Crisis: Interaction now available
 agot_trial_of_seven.0101.t: "Путь к правосудию"
 agot_trial_of_seven.0101.desc: "[crown_thief.GetTitledFirstName] - [Select_CString(crown_thief.IsFemale, 'узурпаторша', 'узурпатор' )], и есть способ призвать [Select_CString(crown_thief.IsFemale, 'её', 'его' )] к ответу за это. Я могу потребовать Суда Семерых и выдвинуть обвинение в открытую, сражаясь перед ликом как богов, так и перед державой за то, чтобы [crown_theft_king_legit_heir.GetTitledFirstName] [Select_CString(crown_theft_king_legit_heir.IsFemale, 'заняла', 'занял' )] трон, принадлежащий [Select_CString(crown_theft_king_legit_heir.IsFemale, 'ей', 'ему' )] по праву."
 agot_trial_of_seven.0101.desc.legit_heir: "Возможно, я слишком поспешно [Select_CString(ROOT.Char.IsFemale, 'смирилась', 'смирился' )] с тем, что было сделано. [crown_thief.GetTitledFirstName] восседает на троне, который должен был принадлежать мне, а держава вынуждена притворяться, что вопрос решён. Но есть и другой путь. Суд Семерых позволяет выдвинуть обвинение в открытую, после чего правоту моего дела решат сталь и боги."
 agot_trial_of_seven.0101.a: "Я подумаю над этим."
 agot_trial_of_seven.0101.a.tt: "Теперь вы можете потребовать Суда Семерых против правителя."

 # ToS Denied
 agot_trial_of_seven.9999.t: "Отказ в испытании"
 agot_trial_of_seven.9999.desc: "Моё требование отвергнуто. [recipient.GetTitledFirstName] не выступит против меня в открытую, и не выставит вопрос своей правоты перед всей державой. Отказ облечён в вежливую форму, но я слышу правду, скрытую за ней. [Select_CString(recipient.IsFemale, 'Она', 'Он' )] не станет рисковать сталью, особенно когда сталь может заговорить слишком громко."
 agot_trial_of_seven.9999.a: "Я не буду молчать об этом."

 #######################################
 ### TOS: Succession Crisis OUTCOMES ###
 #######################################

 # ToS - Succession Crisis: Usurpation Scenario Outcome - POV: usurper or final_usurper (the heir of the usurper)
 agot_trial_of_seven.0103.t: "Правосудие перед ликом державы"
 #Legit Heir won - Usurper POV
 agot_trial_of_seven.0103.desc.legit_won: "Суд свершился, и приговор ясен. Я [Select_CString(ROOT.Char.IsFemale, 'потерпела', 'потерпел' )] поражение вместе с теми, кто встал на мою сторону, моё дело потерпело крах на глазах у всех, кто был свидетелем.\n\nПоле боя усеяно телами, цена короны написана кровью и сталью. [legit_heir.GetTitledFirstName], чьи притязания были подтверждены не словами, а победой, вырванной у самой смерти, получает корону. То, что было отнято, было возвращено на глазах у всей державы, и теперь ни один лорд не может притворяться, что это решение было неопределённым."
 #Legit Heir won - Usurper's Heir POV
 agot_trial_of_seven.0103.desc.legit_won.usurper_died: "Суд свершился, и приговор ясен. [usurper.GetTitledFirstName] [Select_CString(usurper.IsFemale, 'пала', 'пал' )] вместе с теми, кто встал на [usurper.GetHerHis] сторону, [usurper.GetHerHis] дело предано забвению на глазах у всех, кто был свидетелем.\n\nПоле боя усеяно телами, цена короны написана кровью и сталью. [legit_heir.GetTitledFirstName], чьи притязания были подтверждены не словами, а победой, вырванной у самой смерти, получает корону. То, что было отнято, было возвращено на глазах у всей державы, и теперь ни один лорд не может притворяться, что это решение было неопределённым."
 #Legit Heir Helper won - Usurper POV
 agot_trial_of_seven.0103.desc.legit_helper_won: "Суд свершился, и приговор ясен. [legit_combatant.GetTitledFirstName] и [legit_combatant.GetHerHis] соратники победили меня и тех, кто встал на мою сторону, моё дело было предано забвению на глазах у всех, кто был свидетелем.\n\nПоле боя усеяно телами, цена короны написана кровью и сталью. [legit_heir.GetTitledFirstName], чьи притязания были подтверждены не словами, а победой, вырванной у самой смерти, получает корону. То, что было отнято, было возвращено на глазах у всей державы, и теперь ни один лорд не может притворяться, что это решение было неопределённым."
 #Legit Heir Helper won - Usurper's Heir POV
 agot_trial_of_seven.0103.desc.legit_helper_won.usurper_died: "Суд свершился, и приговор ясен. [legit_combatant.GetTitledFirstName] и [legit_combatant.GetHerHis] соратники одержали верх - [usurper.GetTitledFirstName] и те, кто встал на [usurper.GetHerHis] сторону, побеждены, [usurper.GetHerHis] дело предано забвению перед всеми, кто был свидетелем.\n\nПоле боя усеяно телами, цена короны написана кровью и сталью. [legit_heir.GetTitledFirstName], чьи притязания были подтверждены не словами, а победой, вырванной у самой смерти, получает корону. То, что было отнято, было возвращено на глазах у всей державы, и теперь ни один лорд не может притворяться, что это решение было неопределённым."
 #Legit Heir Helper won but Legit Heir died - Usurper POV
 agot_trial_of_seven.0103.desc.legit_helper_won.legit_heir_died: "Поражение настигло меня и моих соратников, но даже победа не внесла ясности. [legit_heir.GetTitledFirstName] [Select_CString(legit_heir.IsFemale, 'мертва, сражена', 'мёртв, сражен' )] прежде, чем кто-либо добился правосудия.\n\nПоле безмолвствует, не принося утешения живым. Хотя [legit_heir.GetTitledFirstNameNoTooltip] не [Select_CString(legit_heir.IsFemale, 'дожила', 'дожил' )] до того, чтобы корона вернулась на голову, на которой она должна была покоиться, приговор всё равно остаётся в силе, скреплённый кровью и потерями. [final_heir.GetTitledFirstName], [Select_CString(final_heir.IsFemale, 'которая', 'который' )] унаследует не только трон, но и справедливость, за которую заплатили жизнями, получит корону."
 #Legit Heir Helper won but Legit Heir died - Usurper's Heir POV
 agot_trial_of_seven.0103.desc.legit_helper_won.legit_heir_died.usurper_died: "Поле боя забрало всё, что могло. [usurper.GetTitledFirstName] лежит [Select_CString(usurper.IsFemale, 'мёртвая', 'мёртвый' )] рядом с теми, кто встал на [Select_CString(usurper.IsFemale, 'её', 'его' )] сторону, но то же самое делает и [legit_heir.GetTitledFirstName], [Select_CString(legit_heir.IsFemale, 'убитая', 'убитый' )] до того, как кто-либо доказал свою правоту.\n\nНаступившая тишина не даёт никаких ответов. Хотя [legit_heir.GetTitledFirstNameNoTooltip] не [Select_CString(legit_heir.IsFemale, 'дожила', 'дожил' )] до того, чтобы корона вернулась на голову, на которой она должна была покоиться, приговор всё равно остаётся в силе, скреплённый кровью и потерями. [final_heir.GetTitledFirstName], [Select_CString(final_heir.IsFemale, 'которая', 'который' )] унаследует не только трон, но и справедливость, за которую заплатили жизнями, получит корону."
 #Usurper won
 agot_trial_of_seven.0103.desc.usurper_won: "Обвинители разгромлены. [legit_combatant.GetTitledFirstName] лежит [Select_CString(legit_combatant.IsFemale, 'поверженная', 'поверженный' )] на поле боя, [legit_combatant.GetHerHis] дело терпит крах.\n\nСама земля свидетельствует о цене неповиновения. Корона остаётся на своём месте, не поколебленная судом, призванным её свергнуть. На обвинения был дан жёсткий ответ, и у державы не осталось иного выбора, кроме как принять правление, которое устояло."
 #Legit Heir Helper won but no heir exists
 agot_trial_of_seven.0103.desc.legit_helper_won.no_heir: "[legit_combatant.GetTitledFirstName] одерживает верх, но [legit_heir.GetTitledFirstName] [Select_CString(legit_heir.IsFemale, 'умерла', 'умер' )], не оставив наследника, который мог бы восстать из кровавой бойни и потребовать плоды победы.\n\nНа поле боя нет ответов, только трупы и тишина. Поскольку не осталось крови, чтобы ответить на приговор, корона переходит ко мне скорее по необходимости, чем из-за триумфа. Держава сохраняет [Select_CString(ROOT.Char.IsFemale, 'свою правительницу', 'своего правителя' )], но правосудие, которого когда-то потребовали, похоронено рядом с мёртвыми."
 #Legit Heir is somehow already the king
 agot_trial_of_seven.0103.desc.legit_heir_won_after_all: "Была обнажена сталь и отданы жизни, но борьба закончилась без той ясности, на которую многие надеялись. [usurper.GetTitledFirstName] лежит [Select_CString(usurper.IsFemale, 'мёртвая', 'мёртвый' )] на поле боя, и с [Select_CString(usurper.IsFemale, 'её', 'его' )] падением характер конфликта изменился больше, чем мог бы изменить любой вердикт.\n\nСуд Семерых завершился не триумфом, а молчанием, и после этого на трон [Select_CString(final_heir.IsFemale, 'взошла', 'взошёл' )] [final_heir.GetTitledFirstName]. Действительно ли боги рассудили это дело или просто наблюдали, как оно переходит в чужие руки, - решать державе."
 #Legit Heir is somehow already the king
 agot_trial_of_seven.0103.desc.legit_heir_won_after_all.legit_heir: "Была обнажена сталь и отданы жизни, но борьба закончилась без той ясности, на которую многие надеялись. [usurper.GetTitledFirstName] лежит [Select_CString(usurper.IsFemale, 'мёртвая', 'мёртвый' )] на поле боя, и с [Select_CString(usurper.IsFemale, 'её', 'его' )] падением характер конфликта изменился больше, чем мог бы изменить любой вердикт.\n\nСуд Семерых завершился не триумфом, а молчанием, и после этого я [Select_CString(ROOT.Char.IsFemale, 'воссела', 'воссел' )] на трон. Действительно ли боги рассудили это дело или просто наблюдали, как оно переходит в чужие руки, решать державе."
 #Legit Heir is somehow already the king
 agot_trial_of_seven.0103.desc.legit_heir_won_after_all.usurper: "Была обнажена сталь и отданы жизни, но борьба закончилась без той ясности, на которую многие надеялись. [legit_heir.GetTitledFirstName] лежит [Select_CString(legit_heir.IsFemale, 'мёртвая', 'мёртвый' )] на поле боя, и с [Select_CString(legit_heir.IsFemale, 'её', 'его' )] падением характер конфликта изменился больше, чем мог бы изменить любой вердикт.\n\nСуд Семерых завершился не триумфом, а молчанием, и после этого я [Select_CString(ROOT.Char.IsFemale, 'воссела', 'воссел' )] на трон. Действительно ли боги рассудили это дело или просто наблюдали, как оно переходит в чужие руки, решать державе."
 #Options
 agot_trial_of_seven.0103.a: "Надеюсь, [final_heir.GetTitledFirstNameNoTooltip] будет править мудро."
 agot_trial_of_seven.0103.b: "Досадно."
 agot_trial_of_seven.0103.c: "Пусть держава помнит, кто всё ещё стоит на ногах."
 agot_trial_of_seven.0103.d: "Столько крови, и всё впустую."


 # ToS - Succession Crisis: Usurpation Scenario Outcome - POV: legit_heir or heir_of_the_legit_heir
 agot_trial_of_seven.0104.t: "Приговор Семерых"
 # Legit Heir won - Legit Heir POV
 agot_trial_of_seven.0104.desc.legit_won: "Суд свершился, и приговор несут разбитые щиты и пропитанная кровью земля. [usurper.GetTitledFirstName] [Select_CString(usurper.IsFemale, 'повержена', 'повержен' )] вместе с теми, кто встал на [usurper.GetHerHis] сторону, и притязание, похитившее корону, обнажено перед всей державой.\n\nПоле усеяно телами, и цена правосудия ясно написана сталью и смертью. Я [Select_CString(ROOT.Char.IsFemale, 'вернула', 'вернул' )] то, что было у меня отнято, не указом и не милостью, а тем, что [Select_CString(ROOT.Char.IsFemale, 'выжила', 'выжил' )] там, где другие не смогли. Корона возвращается на своё законное место на глазах у лордов и свидетелей, и никто теперь не сможет сказать, что этот приговор был неясен."
 # Legit Helper won - Legit Heir POV
 agot_trial_of_seven.0104.desc.legit_helper_won: "Я не [Select_CString(ROOT.Char.IsFemale, 'стояла', 'стоял' )] на поле боя, но сражение велось во имя моё. [legit_heir_helper.GetTitledFirstName] и [legit_heir_helper.GetHerHis] соратники сломили сторонников узурпатора в открытом бою, положив конец лжи, возложившей ложную корону на чужую голову.\n\nПоле хранит цену этой истины в крови и тишине. То, что было у меня отнято, возвращено, пусть и не моей рукой, а защитниками, что несли моё дело, когда я не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )]. Держава получила свой приговор, и корона возвращается ко мне, как велят закон и кровь.\n\nЯ не забуду тех, кто стоял' там, где я не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )]. [legit_heir_helper.GetTitledFirstNameNoTooltip] [Select_CString(legit_heir_helper.IsFemale, 'рискнула', 'рискнул' )] жизнью и именем, чтобы мои притязания жили, и тяжесть этого долга последует за мной на трон. Держава может видеть лишь возвращённую корону, но я знаю, чья кровь её оплатила."
 # Legit Helper won, but Legit Heir died before claiming the crown - Legit Heir's Heir POV
 agot_trial_of_seven.0104.desc.legit_helper_won.legit_heir_died: "Победа была одержана на поле боя, но пришла слишком поздно. [legit_heir_helper.GetTitledFirstName] [Select_CString(legit_heir_helper.IsFemale, 'сокрушила', 'сокрушил' )] дело узурпатора на глазах у всех, однако [legit_heir.GetTitledFirstName] не [Select_CString(legit_heir.IsFemale, 'дожила', 'дожил' )] до того, чтобы увидеть свершение правосудия.\n\nПоле не приносит утешения в своей тишине. Хотя [Select_CString(legit_heir.IsFemale, 'той', 'того' )], кому было нанесено зло, больше нет, приговор остаётся в силе, скреплённый кровью и жертвой. Теперь корона переходит ко мне — не как трофей победы, а как тень правосудия, пришедшего слишком поздно, чтобы спасти того, кому оно было предназначено.\n\nЯ наследую не только трон. [legit_heir_helper.GetTitledFirstNameNoTooltip] [Select_CString(legit_heir_helper.IsFemale, 'выступила', 'выступил' )] от имени моей семьи, когда её законные члены не могли этого сделать, и этот долг не умирает вместе с павшими. Какое бы правление ни последовало с этого дня, оно будет помнить, чья отвага сохранила это право, когда кровь и случай грозили положить ему конец."
 # Usurper won - Legit Heir POV
 agot_trial_of_seven.0104.desc.usurper_won: "Суд завершён, и поле даёт свой беспощадный ответ. Те, кто вызвались отстаивать моё право, лежат сломленными, и вместе с ними пало обвинение, выдвинутое от моего имени.\n\nСталь сказала своё там, где слова оказались бессильны. [usurper.GetTitledFirstName] продолжит восседать на троне, и мой вызов лишён всякой силы перед лицом державы. Корона не сменит владельца, а обвинение, из-за которого пролилась кровь, погребено вместе с мертвецами."
 agot_trial_of_seven.0104.a: "Дело решено."


 # ToS - Succession Crisis: Usurpation Scenario Outcome - Observer POV
 agot_trial_of_seven.0105.t: "$agot_trial_of_seven.0104.t$"
 # final_heir won after all (somehow they ended up on the throne) - Observer POV
 agot_trial_of_seven.0105.desc.legit_heir_won_after_all: "В державе распространяются вести о Суде Семерых, созванном после узурпации — отчаянной попытке силой вернуть титул [main_title.GetNameNoTier]. Были названы защитники, обнажена сталь, и пролилась кровь перед взорами собравшихся.\n\nНо прежде чем приговор смог окончательно свершиться, вмешалась смерть. [usurper.GetTitledFirstName] [Select_CString(usurper.IsFemale, 'пала', 'пал' )] в схватке, лишив суд всякого смысла. Со смертью [Select_CString(usurper.IsFemale, 'узурпаторши', 'узурпатора' )] [final_heir.GetTitledFirstName] получает [main_title.GetNameNoTierNoTooltip] согласно праву наследования, а не по приговору.\n\nПоле остаётся усеянным телами, а держава — с горьким пониманием, что суд не изменил ничего из того, что уже решила смерть."
 # Legit Heir won - Observer POV
 agot_trial_of_seven.0105.desc.legit_won: "После того как [usurper.GetTitledFirstName] [Select_CString(usurper.IsFemale, 'захватила', 'захватил' )] [main_title.GetNameNoTier], был созван Суд Семерых, чтобы ответить за это преступление перед богами и людьми. Обвинение встретилось со сталью, и судьба короны была решена на поле, залитом кровью.\n\nТеперь суд вынес свой приговор. [legit_heir.GetTitledFirstName] [Select_CString(legit_heir.IsFemale, 'выступила', 'выступил' )] среди обвинителей и [Select_CString(legit_heir.IsFemale, 'вышла победительницей', 'вышел победителем' )], а [usurper.GetTitledFirstNameNoTooltip] [Select_CString(usurper.IsFemale, 'сокрушена', 'сокрушён' )] в открытом бою. [main_title.GetNameNoTierNoTooltip] возвращается [Select_CString(legit_heir.IsFemale, 'своей законной владелице', 'своему законному владельцу' )] не указом и не соглашением, а победой, свидетелем которой стала вся держава.\n\nОт двора до самых дальних земель приговор считается окончательным, а цена короны измеряется жизнями, а не словами."
 # Legit Helper won - Observer POV
 agot_trial_of_seven.0105.desc.legit_helper_won: "После узурпации законное право на [main_title.GetNameNoTier] было вынесено не в зал совета, а на поле боя. Был созван Суд Семерых, призвавший защитников ответить кровью на узурпацию.\n\nПоле дало свой ответ. [legit_combatant.GetTitledFirstName] [Select_CString(legit_combatant.IsFemale, 'одержала', 'одержал' )] победу, а [Select_CString(usurper.IsFemale, 'захватившая', 'захвативший' )] корону [usurper.GetTitledFirstName] со своими защитниками побеждены. Хотя [final_heir.GetTitledFirstName] не [Select_CString(final_heir.IsFemale, 'участвовала', 'участвовал' )] в бою, приговор вынесен в [final_heir.GetHerHis] пользу.\n\n[main_title.GetNameNoTierNoTooltip] переходит к [Select_CString(final_heir.IsFemale, 'новой владелице', 'новому владельцу' )] по решению суда, и обвинение, некогда разделившее державу, получило ответ на глазах у всех собравшихся."
 # Usurper won - Observer POV
 agot_trial_of_seven.0105.desc.usurper_won: "После захвата титула [main_title.GetNameNoTier] был созван Суд Семерых, чтобы оспорить, что [usurper.GetTitledFirstName] имеет право на власть. [legit_combatant.GetTitledFirstName] и обвинители назвали своих защитников, и держава собралась, чтобы увидеть, сможет ли сталь отменить то, что взяли честолюбием.\n\nСуд завершился неудачей для тех, кто искал правосудия. Защитники, выступившие против короны, повержены, и обвинение, что [Select_CString(legit_heir.IsFemale, 'выдвинула', 'выдвинул' )] [legit_heir.GetTitledFirstName], пало на поле боя.\n\n[usurper.GetTitledFirstNameNoTooltip] сохраняет власть над титулом [main_title.GetNameNoTierNoTooltip]. Обвинение лишено всякой силы, и державе остаётся лишь принять власть, устоявшую в испытании кровью."
 # Legit Helper won, but no heir exists so victory changes nothing - Observer POV
 agot_trial_of_seven.0105.desc.legit_helper_won.no_heir: "После того как [usurper.GetTitledFirstName] [Select_CString(usurper.IsFemale, 'отняла', 'отнял' )] [main_title.GetNameNoTier] у [Select_CString(legit_heir.IsFemale, 'законной владелицы', 'законного владельца' )], был созван Суд Семерых, чтобы вернуть утраченное. Защитники откликнулись на обвинение, и судьба короны была решена на поле боя.\n\n[legit_combatant.GetTitledFirstName] [Select_CString(legit_combatant.IsFemale, 'одержала', 'одержал' )] победу в бою, а [usurper.GetTitledFirstNameNoTooltip] [Select_CString(usurper.IsFemale, 'сокрушена', 'сокрушён' )] на глазах у свидетелей со всей державы. Однако некому принять этот приговор. [legit_heir.GetTitledFirstName] не [Select_CString(legit_heir.IsFemale, 'дожила', 'дожил' )] до его исполнения, и не осталось наследника, который мог бы исполнить решение суда.\n\nНе осталось того, кто мог бы воспользоваться победой, и [final_usurper.GetTitledFirstName] оставляет [main_title.GetNameNoTierNoTooltip] в своих руках. Суд запомнят не тем, что он вернул, а тем, сколько жизней он унёс, не изменив судьбу короны."
 agot_trial_of_seven.0105.a: "Итак, дело решено."


 #####################################################
 ### TOS: Dishonorable Imprisonment INITIAL EVENTS ###
 #####################################################

 agot_trial_of_seven.0200.t: "Суд перед ликом державы"
 agot_trial_of_seven.0200.desc.defender.against_accuser: "В цепях или без них, я требую права на испытание поединком, надеясь, что сталь и честь ещё могут даровать мне свободу. Однако [accuser_ruler.GetTitledFirstName] отвергает этот путь. Перед двором и короной [accuser_ruler.GetSheHe] взывает к куда более значимому — Суду Семерых.\n\nСемь защитников выступят за [accuser_ruler.GetHerHis] приговор и семь — за меня. То, что могло быть решено между двумя клинками, теперь будет взвешено под взором богов и всей державы. Является ли это правосудием или жестокостью — скоро решит поле боя."
 agot_trial_of_seven.0200.desc.defender.against_accuser_kin: "Я [Select_CString(ROOT.Char.IsFemale, 'просила', 'просил' )], чтобы [accuser_ruler.GetTitledFirstName] [Select_CString(accuser_ruler.IsFemale, 'даровала', 'даровал' )] мне один клинок и честную возможность ответить на обвинение против меня. Вместо этого [Select_CString(accuser_ruler.IsFemale, 'её', 'его' )] родич, [accuser_candidate_kin.GetTitledFirstName], выступает вперёд и требует Суд Семерых от имени короны. То, что должно было стать рыцарским поединком, превратилось в зрелище для всей державы.\n\nТеперь мне предстоит найти семь защитников, которые встанут на мою сторону, иначе моё дело падёт ещё до первого удара. Сталь рассудит то, что гордость и положение извратили за пределами слов."
 agot_trial_of_seven.0200.desc.accuser: "[defender_leader.GetTitledFirstName], находясь под моей стражей, требует испытания поединком, чтобы ответить на обвинения, выдвинутые против н[defender_leader.GetHerHis]. Один поединок решил бы дело быстро, но не всегда справедливо.\n\nНекоторые при дворе шепчут, что спор, затрагивающий корону, требует большего веса, чем может дать один клинок. Я могу позволить тот поединок, о котором [defender_leader.GetSheHe] просит... или отказать и вместо этого созвать Суд Семерых."
 agot_trial_of_seven.0200.desc.accuser_kin.start: "[defender_leader.GetTitledFirstName], [Select_CString(defender_leader.IsFemale, 'моя пленница', 'мой пленник' )], требует испытания поединком, надеясь решить дело одним клинком. Я уже [Select_CString(ROOT.Char.IsFemale, 'была готова', 'был готов' )] согласиться, как вдруг [accuser_candidate_kin.GetTitledFirstName] выступает вперёд перед двором, заявляя, что такой спор требует большего, чем простой поединок."
 agot_trial_of_seven.0200.desc.accuser_kin.end: "[accuser_candidate_kin.GetSheHe] призывает к Суду Семерых, настаивая, чтобы семь защитников выступили за корону и семь — против неё. Теперь весь двор наблюдает, ожидая, позволю ли я [Select_CString(accuser_candidate_kin.IsFemale, 'своей родственнице', 'своему родичу' )] вести это дело... или возьму его в свои руки."
 agot_trial_of_seven.0200.desc.accuser_kin.end.from_tbc: "[accuser_candidate_kin.GetSheHe] призывает к Суду Семерых, настаивая, чтобы семь защитников выступили за корону и семь — против неё. Теперь весь двор наблюдает, ожидая, позволю ли я [Select_CString(accuser_candidate_kin.IsFemale, 'своей родственнице', 'своему родичу' )] вести это дело... или возьму его в свои руки."

 agot_trial_of_seven.0200.desc.accuser.from_tbc: "[defender_leader.GetTitledFirstName], находясь под моей стражей, требует испытания поединком, чтобы ответить на обвинения, выдвинутые против н[defender_leader.GetHerHis]. Один поединок решил бы дело быстро, но не всегда справедливо.\n\nНекоторые при дворе шепчут, что спор, затрагивающий корону, требует большего веса, чем может дать один клинок. Их совет был услышан. Вместо одного поединка дело будет решено Судом Семерых перед ликом богов и всей державы."
 agot_trial_of_seven.0200.desc.accuser_kin.start.from_tbc: "[defender_leader.GetTitledFirstName], [Select_CString(defender_leader.IsFemale, 'моя пленница', 'мой пленник' )], требует испытания поединком, надеясь решить дело одним клинком. Я уже собираюсь объявить, что дело будет решено Судом Семерых, как вдруг [accuser_candidate_kin.GetTitledFirstName] выступает вперёд перед двором, опережая меня."

 agot_trial_of_seven.0200.a: "Хорошо, пусть [accuser_candidate_kin.GetFirstNameNoTooltip] ведёт Суд Семерых."
 agot_trial_of_seven.0200.b: "Это моё решение. Я созываю Суд Семерых."
 agot_trial_of_seven.0200.c: "[defender_leader.GetTitledFirstNameNoTooltip] получит испытание поединком."
 agot_trial_of_seven.0200.d: "Тогда я встану с семью."
 agot_trial_of_seven.0200.a.tt: "Этот выбор приведёт к Суду Семерых вместо испытания поединком."
 agot_trial_of_seven.0200.a.tt.from_tbc: "Суд Семерых начинается."
 agot_trial_by_combat.1000.f: "Я призываю к Суду Семерых."
 agot_trial_of_seven.0200.b.from_tbc: "Тогда пусть будут призваны защитники"
 agot_trial_of_seven.0200.b.generic: "$agot_trial_by_combat.1000.f$"

 #Accuser CusLocs
 #plotting_against_me_opinion, schemed_against_me, scheming_against_me, fabricate_hook_threatened_me
 accuser_kin_plotting: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] действует против меня в тени. Я добьюсь правосудия на глазах у всех».\n\n"
 #abducted_me_opinion, abducted_me_crime, attempted_abduct_me_crime
 accuser_kin_abduction: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'пыталась', 'пытался' )] утащить меня, словно [Select_CString(ROOT.Char.IsFemale, 'воровку', 'вора' )] в ночи. Пусть держава увидит ответ на это».\n\n"
 #attempted_murder_me_crime, tried_to_poison_me_opinion
 accuser_kin_murder: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'пыталась', 'пытался' )] покончить со мной втайне. Если уж рисковать смертью, то под взором богов».\n\n"
 #tortured_me, wounded_me, tutored_me_opinion
 accuser_kin_torture: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'причинила', 'причинил' )] мне страдания ради забавы. Я не позволю, чтобы всё закончилось одним клинком».\n\n"
 #maimed_me, disfigured_me, blinded_me, castrated_me
 accuser_kin_maimed: "\n\n«Посмотрите, что [defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'сделала', 'сделал' )] со мной. Пусть семь клинков скажут то, что не выразить словами».\n\n"
 #stole_artifact_from_me, fp3_stole_from_me
 accuser_kin_stole: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'украла', 'украл' )] то, что по праву было моим. Я не приму пустые оправдания».\n\n"
 #fp3_sabotaged_me, betrayed_me_opinion
 accuser_kin_sabotage: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'предала', 'предал' )] меня в самый важный момент. Пусть боги взвесят это предательство».\n\n"
 #fp3_denounced_me, slandered_me_opinion, shamed_me_opinion, ruined_me_opinion, blamed_me_unjustly, rival_insult_opinion
 accuser_kin_slander: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'очернила', 'очернил' )] моё имя. Я добьюсь приговора, который держава не сможет игнорировать».\n\n"
 #imprisoned_me, imprisoned_me_dungeon, imprisoned_me_past
 accuser_kin_imprison: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'заковала', 'заковал' )] меня в цепи. Если суду быть — он будет свершен как должно».\n\n"
 #banished_me
 accuser_kin_banished: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'изгнала', 'изгнал' )] меня с моего места, будто я ничто. Пусть это будет решено на глазах у всех».\n\n"
 #challenged_authority_opinion, usurped_title, deposed_me_opinion
 accuser_kin_deposed: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] пытается разрушить законный порядок. Пусть семь защитников встанут на защиту«».\n\n"
 #killed_my_child
 accuser_kin_child_kill: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'отняла', 'отнял' )] у меня моего ребёнка. Я не позволю, чтобы это было решено тихо».\n\n"
 #mw_wanted_to_execute_me, mw_evaded_execution
 accuser_kin_execute: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'превратила', 'превратил' )] правосудие в посмешище. Пусть боги решат то, что не смог закон».\n\n"
 #muted_me
 accuser_kin_mute: "\n\n[accuser_candidate_kin.GetTitledFirstNameNoTooltip] резко бьёт кулаком по столу и поспешно пишет требование о Суде Семерых на клочке пергамента.\n\n"
 #tried_to_eat_me_opinion
 accuser_kin_tried_to_aith_me: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'пыталась', 'пытался' )] однажды съесть меня. Я [Select_CString(ROOT.Char.IsFemale, 'предпочла', 'предпочёл' )] бы, чтобы боги решили, было ли это уместно».\n\n"
 #agot_tried_to_sacrifice_me
 accuser_kin_sacrifice: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'хотела', 'хотел' )] пролить мою кровь ради тёмных обрядов. Пусть Семеро дадут ответ».\n\n"
 #tournament_savagely_beaten_opinion
 accuser_kin_beaten: "\n\n«[defender_leader.GetTitledFirstNameNoTooltip] [Select_CString(defender_leader.IsFemale, 'избила', 'избил' )] меня без пощады. Я не дам [defender_leader.GetHerHim] лёгкого ответа сегодня».\n\n"
 #insane
 accuser_kin_insane: "\n\n«Одного клинка недостаточно! Семь! Семь угодят богам!"\n\n"

 ###############################################
 ### TOS: Dishonorable Imprisonment OUTCOMES ###
 ###############################################

 agot_trial_of_seven.0201.t: "Где пали семеро"
 #CROWN POV
 agot_trial_of_seven.0201.desc.defender_won_default.accuser_pov: "Всё кончено. Суд Семерых высказался против меня, и поле боя дало ответ, который я [Select_CString(ROOT.Char.IsFemale, 'пыталась', 'пытался' )] отрицать. Мои защитники  повержены или побеждены, а [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'оправдана', 'оправдан' )] перед богами и всей державой.\n\nТакую победу нельзя скрыть за закрытыми дверями. Лорды запомнят, кто одержал верх, а простолюдины будут повторять эту историю, пока она не станет истиной. Какой бы приговор я ни [Select_CString(ROOT.Char.IsFemale, 'намеревалась', 'намеревался' )] обрушить на н[tos_final_accused.GetHerHis], он вернулся и обрушился на меня."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.accuser_pov: "Суд Семерых завершился кровью и смертью, и мне остаётся лишь смотреть на его цену. [tos_final_accuser.GetTitledFirstName] [Select_CString(tos_final_accuser.IsFemale, 'пала', 'пал' )] на поле боя, и [tos_final_accuser.GetSheHe] не [Select_CString(tos_final_accuser.IsFemale, 'поднялась', 'поднялся' )] вновь. [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'одержала', 'одержал' )] верх, и держава стала этому свидетелем.\n\nТеперь двор отводит взор от поля боя к тому, что будет дальше. Сталью и волей Семерых [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'оправдана', 'оправдан' )]. Какие бы обвинения ни были брошены против н[tos_final_accused.GetHerHis], на них был дан ответ, и держава увидела явный суд богов."
 agot_trial_of_seven.0201.desc.accuser_won_defeault.accuser_pov: "Суд Семерых завершен, и боги благоволили моему делу. Мои защитники одержали верх, и [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'осталась', 'остался' )] с поражением вместо свободы, которой [tos_final_accused.GetSheHe] [Select_CString(tos_final_accused.IsFemale, 'требовала', 'требовал' )].\n\nНо даже победа имеет свою цену. Семь клинков были собраны, и многие не вернутся такими, какими пришли. И всё же держава увидела свершившийся суд при всех, и это зрелище — оружие не менее острое, чем любой меч."
 agot_trial_of_seven.0201.desc.accuser_won_defender_died.accuser_pov: "Суд Семерых завершён, и [tos_final_accused.GetTitledFirstName] больше никогда не произнесёт ни слова в неповиновении. Поле боя забрало [tos_final_accused.GetHerHis] как свою дань, а мои защитники остались на ногах, когда был нанесён последний удар.\n\nОдни назовут это справедливостью, другие — простой властью под маской закона. Пусть шепчутся. Держава видела, как боги вынесли решение, а мёртвецы не оспорят приговор."
 #DEFENDER POV
 agot_trial_of_seven.0201.desc.defender_won_default.defender_pov: "Суд Семерых завершен, и я всё ещё дышу. Против тяжести короны и суда мои защитники устояли, и поле дало свой ответ. Перед богами и всей державой моё дело оказалось сильнее цепей, которыми меня пытались сковать.\n\nНо победа никогда не бывает чистой. Земля пропитана её ценой, и крики умирающих звучат дольше любого ликования. И всё же... я [Select_CString(ROOT.Char.IsFemale, 'свободна', 'свободен' )] от их приговора, и держава стала тому свидетелем."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.defender_pov: "Суд Семерых завершился, и боги ответили голосом, который никто не может отрицать. Мои защитники одержали верх, а [tos_final_accuser.GetTitledFirstName] [Select_CString(tos_final_accuser.IsFemale, 'пала', 'пал' )] среди звона стали. Приговор короны умер вместе с [Select_CString(tos_final_accuser.IsFemale, 'ней', 'ним' )].\n\nТеперь поле спокойно, а его решение уже становится законом и памятью. По воле богов и силой моих защитников я [Select_CString(ROOT.Char.IsFemale, 'очищена', 'очищен' )] от всех обвинений. Всё, что было сказано против меня, получило ответ в стали, и никто не может отрицать вынесенный приговор."
 agot_trial_of_seven.0201.desc.accuser_won_defeault.defender_pov: "Всё кончено. Суд Семерых обернулся против меня, и мои защитники не смогли удержать поле. Боги не даровали мне ответ, которого я [Select_CString(ROOT.Char.IsFemale, 'требовала', 'требовал' )], или же даровали его другой стороне.\n\nВсе шансы разорвать эти цепи по праву были оплачены кровью. Теперь мне предстоит встретить то, что следует за проигранным судом: держава, верящая в приговор, и победителей, которые не забудут, что я [Select_CString(ROOT.Char.IsFemale, 'вынудила', 'вынудил' )] их дать ответ."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.inherited_crown_pov: "Суд Семерых завершился, и вместе с ним оборвалась жизнь, стоявшая между мной и короной. [tos_final_accuser.GetTitledFirstName] [Select_CString(tos_final_accuser.IsFemale, 'пала', 'пал' )] на поле боя, и бремя власти переходит ко мне не тихим наследованием, а через кровь и суд.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришел' )] на поле добиваясь не трона, а справедливости, но сталь возложила на меня и то и другое. Боги высказались на глазах у всех, и я выхожу из суда не только [Select_CString(ROOT.Char.IsFemale, 'оправданной', 'оправданным' )], но и [Select_CString(ROOT.Char.IsFemale, 'увенчанной', 'увенчанным' )] короной самим приговором, который должен был меня сломить."
 #OBSERVER POV
 agot_trial_of_seven.0201.desc.defender_won_default.observer_pov: "Суд Семерых завершился, и победитель очевиден для всех. [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'одержала верх', 'одержал' )] верх, и защитники всё ещё стоят там, где [Select_CString(tos_final_accuser.IsFemale, 'дрогнула', 'дрогнул' )] [tos_final_accuser.GetTitledFirstName].\n\nДержава будет говорить об этом долгие годы. Такие суды редки, а ещё реже их исход затрагивает и власть, и наказание. То, что было требованием [Select_CString(tos_final_accused.IsFemale, 'узницы', 'узника' )], стало приговором, свидетелями которого стали все, и никто скоро этого не забудет."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.observer_pov: "Суд Семерых завершился приговором, написанным телами. [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'одержала', 'одержал' )] победу, а [tos_final_accuser.GetTitledFirstName] лежит на поле среди павших защитников.\n\n[tos_final_accuser.GetTitledFirstNameNoTooltip] [Select_CString(tos_final_accuser.IsFemale, 'погибла', 'погиб' )], и этот суд почти не оставляет места сомнениям. Перед ликом богов и людей [tos_final_accused.GetTitledFirstNameNoTooltip] [Select_CString(tos_final_accused.IsFemale, 'оправдана', 'оправдан' )], а обвинения против н[tos_final_accused.GetHerHis] получили ответ на глазах у всех. То, что прежде обсуждалось словами, теперь решено сталью."
 agot_trial_of_seven.0201.desc.accuser_won_defeault.observer_pov: "Суд Семерых завершён, и [tos_final_accuser.GetTitledFirstName] со своими сторонниками одержали верх на поле. [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'побеждена', 'побеждён' )], и приговор уже распространяется от костров до дворов, словно священное слово.\n\nОдни называют это справедливостью, другие — неизбежностью. Как бы то ни было, держава видела, как семь клинков решили то, что не смогли слова. Приговор был завоёван сталью, и держава стала тому свидетелем."
 agot_trial_of_seven.0201.desc.accuser_won_defender_died.observer_pov: "Суд Семерых завершился тем, что [tos_final_accused.GetTitledFirstName] [Select_CString(tos_final_accused.IsFemale, 'пала', 'пал' )] на поле. [tos_final_accuser.GetTitledFirstName] со своими защитниками устояли, и дело [Select_CString(tos_final_accused.IsFemale, 'узницы', 'узника' )] умерло вместе с [Select_CString(tos_final_accused.IsFemale, 'ней', 'ним' )].\n\nНайдутся те, кто скажет, что боги ясно высказались, и те, кто будет настаивать, что боги лишь были вынуждены наблюдать. Как бы то ни было, жизнь была уплачена за право задать вопрос, и держава запомнит эту цену."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.inherited_crown_observer_pov: "Суд Семерых завершился победой, которую ни один бард не смог бы описать, не прозвучав жестоко. [tos_final_accuser.GetTitledFirstName] [Select_CString(tos_final_accuser.IsFemale, 'пала', 'пал' )] на поле, а [Select_CString(tos_final_accused.IsFemale, 'та', 'тот' )], кого прежде называли [Select_CString(tos_final_accused.IsFemale, 'узницей', 'узником' )], теперь восходит как [Select_CString(tos_final_accused.IsFemale, 'законная правительница', 'законный правитель' )] перед взором богов и людей.\n\nТо, что началось как требование суда, стало передачей самой короны. Сталь дала ответ и обвинению, и наследованию, и все свидетели знают, что этот трон был взят не в тишине, а завоеван под взором Семерых."
 agot_trial_of_seven.0201.a: "Так рассудили боги."


 #################################################
 ### TOS: Dishonorable Imprisonment PRE-EVENTS ###
 #################################################

 # ToS: Imprisoned.. Friend Visits
 agot_trial_of_seven.0202.t: "[Select_CString(tos_friend.IsFemale, 'Гостья', 'Гость' )] во мраке"
 agot_trial_of_seven.0202.desc: "Часы тянутся медленно в этих стенах, нарушаемые лишь далёкими шагами и капанием невидимой воды. Когда дверь наконец открывается, я ожидаю увидеть очередного стражника... а не знакомое лицо.\n\n[tos_friend.GetTitledFirstName] вступает в тусклый свет, и на мгновение я не [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], улыбнуться мне или проклясть это зрелище. [tos_friend.GetSheHe|U] носит имя того же дома, что держит меня здесь, но в [tos_friend.GetHerHis] глазах нет его жёсткости. Мы говорим вполголоса, остерегаясь лишних ушей, пока наконец [tos_friend.GetSheHe] не обещает, что [tos_imprisoner.GetTitledFirstName] получит от н[tos_friend.GetHerHis] обращение от моего имени.\n\nВозможно, это мелочь — слова, переданные из одного зала в другой — но даже малое обещание ощущается иначе, когда у тебя нет ничего."
 agot_trial_of_seven.0202.a: "Я буду держаться за эту надежду."
 agot_trial_of_seven.0202.b: "Мне не нужны милости от вашего дома."

 # ToS: Imprisoned.. I can demand TbC
 agot_trial_of_seven.0203.t: "Перед короной"
 agot_trial_of_seven.0203.desc: "За мной приходит стражник. Я ожидаю очередного допроса. Вместо этого меня ведут в небольшую залу, где меня ждёт [Select_CString(tos_friend.IsFemale, 'моя', 'мой' )] [SCOPE.sC('tos_prisoner').Custom2('RelationToMeShort', SCOPE.sC('tos_friend'))], [tos_friend.GetTitledFirstName]. [tos_friend.GetSheHe|U] почти не тратит времени на любезности. Если я [Select_CString(ROOT.Char.IsFemale, 'намерена', 'намерен' )] покинуть эти стены с честью, [tos_friend.GetSheHe] говорит мне, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] буду за неё сражаться.\n\nИспытание поединком может быть моим единственным путём вперёд. Сталь, а не слова, может оказаться единственным языком, который признаёт [tos_imprisoner.GetTitledFirstName]. Вскоре стражник ведёт нас дальше, в большую залу, где [tos_imprisoner.GetTitledFirstNameNoTooltip] и собравшиеся придворные ждут моего ответа. Все взгляды обращаются ко мне, ожидая услышать, чего я потребую... если вообще потребую что-либо."
 agot_trial_of_seven.0203.a: "Я требую испытания поединком."
 agot_trial_of_seven.0203.b: "Я не стану превращать это в представление."
 agot_trial_of_seven.0203.b.tt: "Вас сопровождают обратно в темницу."

 # ToS: Imprisoned.. King considers the release of the prisoner
 agot_trial_of_seven.0204.t: "О милосердии"
 agot_trial_of_seven.0204.desc: "[tos_friend.GetTitledFirstName] предстаёт передо мной с просьбой столь же дерзкой, сколь и неудобной. Говоря осторожно и размеренно, [Select_CString(tos_friend.IsFemale, 'она просит', 'он просит')], чтобы [tos_prisoner.GetTitledFirstName] [Select_CString(tos_prisoner.IsFemale, 'была освобождена', 'был освобождён' )] из-под моей стражи.\n\n[Select_CString(tos_friend.IsFemale,'Она', 'Он')] утверждает, что эта история и так стоила многих трудов, а милосердие сейчас позволило бы избежать новых хлопот. Однако цепи редко снимают без причины, и двор внимательно следит за тем, какой ответ я дам."
 agot_trial_of_seven.0204.a: "Хорошо. Освободить [tos_prisoner.GetHerHis]."
 agot_trial_of_seven.0204.b: "У свободы есть своя цена. Плати."
 agot_trial_of_seven.0204.c: "Нет. [Select_CString(tos_prisoner.IsFemale, 'Она', 'Он')] останется там, где [Select_CString(tos_prisoner.IsFemale, 'ей', 'ему')] и место."
 agot_trial_of_seven.0204.d: "[tos_prisoner.GetTitledFirstNameNoTooltip] будет [Select_CString(tos_prisoner.IsFemale, 'освобождена... и отправлена', 'освобождён... и отправлен')] на Стену."

 # ToS: Imprisoned.. Prisoner informed
 agot_trial_of_seven.0205.t: "Королевское слово"
 agot_trial_of_seven.0205.desc.ok: "Дверь снова открывается, и возвращается [tos_friend.GetTitledFirstName]. На этот раз на [Select_CString(tos_friend.IsFemale, 'её', 'его')] лице — спокойное облегчение.\n\n[Select_CString(tos_friend.IsFemale, 'Она', 'Он')] говорит мне, что [tos_imprisoner.GetTitledFirstName] [Select_CString(tos_imprisoner.IsFemale, 'согласилась', 'согласился')] освободить меня. Цепи, державшие меня здесь, скоро падут, и дорога за этими стенами снова станет моей."
 agot_trial_of_seven.0205.desc.gold: "Когда дверь открывается, [tos_friend.GetTitledFirstName] стоит за ней, но выражение [Select_CString(tos_friend.IsFemale, 'её', 'его')] лица не совсем то, на которое я [Select_CString(ROOT.Char.IsFemale, 'надеялась', 'надеялся' )].\n\n[tos_imprisoner.GetTitledFirstName] [Select_CString(tos_imprisoner.IsFemale, 'согласилась', 'согласился')] даровать мне свободу, но лишь за плату. Прежде чем эти цепи будут сняты, должна быть уплачена золотая монета."
 agot_trial_of_seven.0205.desc.no: "[tos_friend.GetTitledFirstName] возвращается в мою темницу, но весть, которую [Select_CString(tos_friend.IsFemale, 'она', 'он')] приносит, не та, что я [Select_CString(ROOT.Char.IsFemale, 'надеялась', 'надеялся' )] услышать.\n\n[tos_imprisoner.GetTitledFirstName] [Select_CString(tos_imprisoner.IsFemale, 'отказала', 'отказал')] в моей просьбе. Мои цепи останутся на месте, и надежда покинуть эти стены отвергнута."
 agot_trial_of_seven.0205.desc.nw: "Когда дверь снова открывается, [tos_friend.GetTitledFirstName] стоит на пороге, и тяжесть в [Select_CString(tos_friend.IsFemale, 'её', 'его')] глазах говорит мне, что это не простая встреча.\n\n[tos_imprisoner.GetTitledFirstName] [Select_CString(tos_imprisoner.IsFemale, 'согласилась', 'согласился')] отпустить меня... но не на свободу. Меня отправят на Стену, где я облачусь в чёрный плащ и проведу остаток своих дней на службе Ночного Дозора."
 agot_trial_of_seven.0205.a: "Хорошо. Я [Select_CString(ROOT.Char.IsFemale, 'согласна', 'согласен' )]."
 agot_trial_of_seven.0205.b: "Это не справедливость."
 agot_trial_of_seven.0205.b.nw: "Это не справедливость. Я требую испытания поединком."
 agot_trial_of_seven.0205.c: "Да будет так."

 ##########################
 ### TOS TEAM SELECTION ###
 ##########################

 # ToS: Selecting Champions
 agot_trial_of_seven.1000.t: "Семеро защитников"
 agot_trial_of_seven.1000.desc: "Настал час Суда Семерых. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] назвать тех, кто выйдет на поединок ради моего дела.\n\nЕсли мне не удастся собрать шестерых, чтобы выступить со мной, приговор свершится без единого удара, и вина падёт на моё имя.\n\nНесколько рыцарей уже предложили свои мечи. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, кто из них выйдет на поле рядом со мной."
 agot_trial_of_seven.1000.desc.lost_before_started: "Тишина затягивается, никто не откликается. Никто больше не выходит, чтобы встать рядом со мной, а без семерых, отвечающих на обвинение, суд не может состояться.\n\nПо закону и обычаю обвинение остаётся без ответа, и я [Select_CString(ROOT.Char.IsFemale, 'признана виновной', 'признан виновным' )]."
 # desc variations
 agot_trial_of_seven.1000.desc.sellsword: "Тишина затягивается дольше, чем мне хотелось бы. Наконец из толпы выступает воин с суровым взглядом, останавливаясь лишь когда ясно звучит моё предложение золота.\n\nУ стали много хозяев, и сегодня золото оказалось достаточной платой, чтобы привязать один клинок к моему делу."
 agot_trial_of_seven.1000.desc.helper_knight.a: "Тишина длится, тяжёлая и непробиваемая. Наконец [helper_knight.GetTitledFirstName] выступает из толпы и предлагает свой меч моему делу."
 agot_trial_of_seven.1000.desc.helper_knight.b: "Сначала никто не двигается. Затем [helper_knight.GetTitledFirstName] покидает толпу, выходит на открытое место и заявляет о готовности выступить за меня."
 agot_trial_of_seven.1000.desc.helper_knight.c: "Минута тянется в тишине, пока [helper_knight.GetTitledFirstName] не нарушает её, выходя вперёд и вручая свой меч моему делу."
 agot_trial_of_seven.1000.desc.helper_knight.d: "Все взгляды остаются прикованными к толпе, пока [helper_knight.GetTitledFirstName] не выходит вперёд, прерывает молчание и посвящает свой клинок моему делу."
 agot_trial_of_seven.1000.desc.helper_knight.e: "Долгое мгновение никто не двигается. Затем одна фигура — [helper_knight.GetTitledFirstName] — выступает из толпы, нарушая молчание, и предлагает свой меч моему делу."
 agot_trial_of_seven.1000.desc.helper_squire: "Тишина готова поглотить момент целиком, когда юный оруженосец, [helper_knight.GetTitledFirstName], выходит из толпы. В [Select_CString(helper_knight.IsFemale, 'её', 'его')] голосе слышна робость, но не страх.\n\n[Select_CString(helper_knight.IsFemale, 'Она', 'Он')] опускается на одно колено передо мной, склоняет голову и говорит громко, чтобы все слышали.\n\n#EMP «[the_other_leader.GetTitledFirstNameNoTooltip], посвятите меня в рыцари... и я встану рядом с вами».#S"
 # situational option texts
 agot_trial_of_seven.1000.a: "Прекрасный выбор."
 agot_trial_of_seven.1000.a.buy: "Золото говорит громче молчания."
 agot_trial_of_seven.1000.a.tt: "Выбранный вами защитник будет сражаться на вашей стороне.\n"
 agot_trial_of_seven.1000.a.lost_before_started: "Моя судьба решена."
 agot_trial_of_seven.1000.a.need_new_char: "Кто встанет и будет сражаться со мной?"
 agot_trial_of_seven.1000.a.squire_approved: "Встаньте, сир [helper_knight.GetFirstNameNoTooltip]. Станьте рядом со мной."
 agot_trial_of_seven.1000.a.squire_approved.tt: "#EMP Именем Воина обязую тебя быть [Select_CString(helper_knight.IsFemale, 'храброй', 'храбрым' )]. Именем Отца обязую тебя быть [Select_CString(helper_knight.IsFemale, 'справедливой', 'справедливым' )]. Именем Матери обязую тебя защищать всех невинных. Именем Девы обязую тебя оберегать всех женщин.\n#S"
 agot_trial_of_seven.1000.b.squire_denied: "Мне не следует этого делать."
 agot_trial_of_seven.1000.b.squire_denied.tt: "Без достаточного числа защитников Суд Семерых не может начаться, и вы будете признаны [Select_CString(ROOT.Char.IsFemale, 'виновной', 'виновным' )]."


 # ToS: Trial of Seven Starts
 agot_trial_of_seven.1001.t: "Семеро против семерых"
 agot_trial_of_seven.1001.t.accusers: "$agot_trial_of_seven.1002.t$: [accuser_leader.GetTitledFirstNameNoTooltip] и обвинители"
 agot_trial_of_seven.1001.t.defenders: "$agot_trial_of_seven.1002.t$: [defender_leader.GetTitledFirstNameNoTooltip] и [Select_CString(defender_leader.IsFemale, 'её', 'его')] защитники"
 agot_trial_of_seven.1001.desc: "На глазах у всей державы наконец-то созван древний Суд Семерых. Ни слово лорда, ни указ короля не могут теперь положить конец этой распре, только семь мечей, поднятых за каждую из сторон, и приговор, который боги вынесут через сталь и кровь. Обвинитель и обвиняемый стоят друг против друга, их судьбы связаны так же крепко, как и судьбы защитников, сражающихся от их имени. Пусть поле станет свидетелем, и когда последний меч падёт, боги решат, кто стоял за правду, а кто за грех.\n\n#EMP [oth_1.GetTitledFirstName] [Select_CString(oth_1.IsFemale, 'заручилась', 'заручился')] поддержкой таких рыцарей, как [oth_5.GetTitledFirstName], [oth_4.GetTitledFirstName], [oth_2.GetTitledFirstName], [oth_3.GetTitledFirstName], [oth_6.GetTitledFirstName] и [oth_7.GetTitledFirstName].\n\nПротив них выступает [roy_1.GetTitledFirstName], к [Select_CString(roy_1.IsFemale, 'которой', 'которому')] присоединились [roy_5.GetTitledFirstName], [roy_4.GetFirstName], [roy_2.GetTitledFirstName], [roy_3.GetTitledFirstName], [roy_6.GetTitledFirstName] и [roy_7.GetTitledFirstName].#S"
 agot_trial_of_seven.1001.a: "Так пусть же боги рассудят."
 agot_trial_of_seven.1001.a.second: "Да начнётся Суд Семерых."


 # ToS - Succession Crisis: Event about Tos - Player can observe
 agot_trial_of_seven.1002.t: "Суд Семерых"
 agot_trial_of_seven.1002.desc.usurpation: "Слухи быстро распространяются по дворам и лагерям. Объявлен Суд Семерых: [the_royal_leader.GetTitledFirstName], [Select_CString(the_royal_leader.IsFemale, 'взошедшая', 'взошедший' )] на трон, [Select_CString(the_royal_leader.IsFemale, 'объявлена узурпаторшей', 'объявлен узурпатором' )] - [the_other_leader.GetTitledFirstName] открыто заявляет об этом и требует суда перед ликом богов и людей.\n\nТакие суды случаются редко, а когда на кону корона и притязания — ещё реже. Лорды шепчутся, что защитники уже собираются, каждый клинок поклялся доказать, кто из правителей стоит за правду, а кто — за грех. Скоро сталь решит то, что не смог решить ни один совет."
 agot_trial_of_seven.1002.desc.imprisonment: "Весть разносится быстро: то, что начиналось как требование испытания поединком, превратилось в нечто гораздо большее. После того как [the_other_leader.GetTitledFirstName] [Select_CString(the_other_leader.IsFemale, 'потребовала', 'потребовал' )] поединка один на один, чтобы ответить на приговор, что [Select_CString(the_royal_leader.IsFemale, 'вынесла', 'вынес' )] [the_royal_leader.GetTitledFirstName], корона отказала и вместо этого объявила Суд Семерых.\n\nМногие называют это смелым ходом, другие — жестоким, ибо такие суды превращают распри в зрелища, которые вся держава не может проигнорировать. Защитники собираются отовсюду, и вскоре семь мечей против семи решат судьбу, которую не смогли решить слова."
 agot_trial_of_seven.1002.a: "Я буду следить за судом."
 agot_trial_of_seven.1002.a.tt: "Вы будете наблюдать за ходом Суда Семерых."
 agot_trial_of_seven.1002.b: "Меня это не касается."


 # ToS: No one volunteered
 agot_trial_of_seven.1003.t: "$agot_trial_of_seven.1000.t$"
 agot_trial_of_seven.1003.desc.need_more_knights.a: "Время на исходе. У меня ещё нет семерых, требуемых для ответа на обвинение, и суд не может продолжаться в таком виде.\n\nСо всех сторон давит тяжесть момента, пока снова и снова считают и находят, что число недостаточно. Нужно найти ещё защитников, чтобы продолжить это дело, иначе приговор вынесут без стали."
 agot_trial_of_seven.1003.desc.need_more_knights.b: "Взгляды, устремлённые на меня, не дают ответа. Слишком немногие вышли вперёд, и нужное число всё ещё не набрано.\n\nНа краю толпы слышен ропот — любопытный, а порой и недобрый, пока тишина затягивается. Пока не названы новые имена, Суд Семерых остаётся незавершённым, повиснув в равновесии перед всеми собравшимися."
 agot_trial_of_seven.1003.desc.need_more_knights.c: "Закон ясен, а число ещё не достигнуто. Без семерых, выступающих вместе, обвинение не может быть оспорено.\n\nСлова обычая громко звучат в моих мыслях — я [Select_CString(ROOT.Char.IsFemale, 'выучила', 'выучил' )] их давно и никогда не [Select_CString(ROOT.Char.IsFemale, 'думала', 'думал' )], что они будут проверены на деле. Если этот суд должен продолжиться, нужно найти ещё защитников, иначе закон осудит меня без пощады."
 agot_trial_of_seven.1003.desc.need_more_knights.d: "Тех, кто передо мной, недостаточно. Семеро ещё не собраны, и момент тянется незавершённым.\n\nКаждое биение сердца притягивает взгляды толпы всё ближе, все ждут, выступит ли кто-то ещё. Если больше никто не придёт встать рядом со мной, этот суд не состоится, и исход будет решён здесь и сейчас."
 agot_trial_of_seven.1003.desc.need_more_knights.e: "Тишина отвечает на мой призыв. Те, кто готов выступить, уже вышли, и никто больше не присоединяется к ним.\n\nНа мгновение сомнение пронзает острее любого клинка, и я задаюсь вопросом, не здесь ли конец моего дела. Если предстоит назвать ещё защитников, их придётся искать [Select_CString(ROOT.Char.IsFemale, 'самой', 'самому' )], иначе сама тишина станет моим ответом."
 #honorable calls
 agot_trial_of_seven.1003.a.honorable.a: "Кто встанет на сторону правды?"
 agot_trial_of_seven.1003.a.honorable.b: "Неужели никто здесь больше не верит в справедливость?"
 agot_trial_of_seven.1003.a.honorable.c: "Неужели не осталось никого, кто встал бы за правое дело?"
 agot_trial_of_seven.1003.a.honorable.d: "Неужели не осталось ни одного рыцаря, помнящего о своей клятве?"
 agot_trial_of_seven.1003.a.honorable.e: "Неужели среди вас нет истинных рыцарей?!"
 #royal calls (available only for the royal side, they have the money)
 agot_trial_of_seven.1003.a.greedy.a: "Какую цену вы хотите за свой меч?"
 agot_trial_of_seven.1003.a.greedy.b: "Кто здесь готов сражаться за хорошую плату?"
 agot_trial_of_seven.1003.a.greedy.c: "Неужели никто не желает получить плату за свою храбрость?"
 agot_trial_of_seven.1003.a.greedy.d: "Кто продаст свой клинок за золото?"
 agot_trial_of_seven.1003.a.greedy.e: "Кто из вас сразится за достойную цену?"
 #dishonorable/arrogant calls
 agot_trial_of_seven.1003.a.dishonorable.a: "Неужели вы все так боитесь поля боя?"
 agot_trial_of_seven.1003.a.dishonorable.b: "Никто не откликнется на мой зов?"
 agot_trial_of_seven.1003.a.dishonorable.c: "Неужели правда нет никого, кто достоин выступить за меня?"
 agot_trial_of_seven.1003.a.dishonorable.d: "Неужели я и вправду [Select_CString(ROOT.Char.IsFemale, 'окружена', 'окружён' )] трусами?"
 agot_trial_of_seven.1003.a.dishonorable.e: "Кто из вас выступит за меня?"


 #Leader couldn't gather 6 other knights
 agot_trial_of_seven.1004.t: "[Select_CString(leader_lost_before_started.IsFemale, 'Осуждённая', 'Осуждённый' )] без стали"
 agot_trial_of_seven.1004.desc: "Вызов угасает, так и не получив ответа. [leader_lost_before_started.GetTitledFirstName] не [Select_CString(leader_lost_before_started.IsFemale, 'смогла', 'смог')] собрать шестерых защитников, готовых выступить рядом с [Select_CString(leader_lost_before_started.IsFemale, 'ней', 'ним')], и Суд Семерых не может состояться.\n\nПо закону и обычаю обвинение остаётся без ответа. Вина ложится на [Select_CString(leader_lost_before_started.IsFemale, 'неё', 'него')], и дело решено без единого обнажённого меча."
 agot_trial_of_seven.1004.a: "Уберите [Select_CString(leader_lost_before_started.IsFemale, 'её', 'его')] с моих глаз."

 #Yield! Yield!
 agot_single_combat.0031.b: "Это ещё не конец."

