l_russian:

 agot_commission_special_artifact_crown.0001.t: "Заказ короны"
 agot_commission_special_artifact_crown.0001.desc: "Мало кому в Вестеросе позволено иметь корону. Ещё меньше тех, кто имеет право её носить. Пришло время создать новый символ власти, который будет представлять и узаконивать моё правление. Пусть история запомнит меня по моему имени, моим деяниям и символам, которые я [Select_CString(ROOT.Char.IsFemale, 'выбрала', 'выбрал' )] для себя. Я закажу корону, которая станет реликвией, передаваемой из поколения в поколение, открыто демонстрируя мою власть и влияние."
 agot_commission_special_artifact_crown.0001.desc_coronation: "Каждая коронация требует короны, и я закажу ее. Она станет реликвией, передаваемой из поколения в поколение, открыто демонстрируя мою власть и влияние."
 agot_commission_special_artifact_crown.0001.a: "Вот она."
 agot_commission_special_artifact_crown.0001.b: "Я [Select_CString(ROOT.Char.IsFemale, 'передумала', 'передумал' )]. Я больше не хочу изготавливать новую корону."

 agot_commission_special_artifact_crown_spouse.0001.desc: "Мало кому в Вестеросе позволено иметь корону. Ещё меньше тех, кто имеет право её носить. Я закажу корону, которой увенчают моего консорта."

 agot_commission_special_artifact_armor.0001.t: "Заказ доспехов"
 agot_commission_special_artifact_armor.0001.desc: "Доспехи - это нечто большее, чем просто защита; они отражают статус и представительность того, кто их носит. Я закажу новый комплект, изготовленный по моим меркам и достойный того, чтобы его помнили."
 agot_commission_special_artifact_armor.0001.a: "Вот он."
 agot_commission_special_artifact_armor.0001.b: "Я [Select_CString(ROOT.Char.IsFemale, 'передумала', 'передумал' )]. Я больше не хочу изготавливать новые доспехи."