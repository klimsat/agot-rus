 agot_the_citadel.1000.desc:0 "Для меня нет большей радости, чем посвятить свою жизнь науке. Я немедленно отправлюсь в Цитадель."
 agot_the_citadel.1000.positive:0 "Я рад, что [recipient.GetFirstNameNoTooltip] разглядел мудрость в этом действии."
 agot_the_citadel.1001.desc:0 "Ваше предложение о том, чтобы я перевернул всю свою жизнь и уехал в Цитадель, просто смехотворно. Я счастлив там, где я есть, и у меня нет планов что-то менять."
 agot_the_citadel.1001.negative:0 "Очень жаль..."

