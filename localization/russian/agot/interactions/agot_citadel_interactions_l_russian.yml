 CITADEL_PHYSICIAN:1 "[personality|E] — #italic Он изучал строение человеческого тела:#! $VALUE|=+0$"
 CITADEL_ZEALOUS:1 "[personality|E] — #italic Он предпочел бы служить вере:#! $VALUE|=+0$"
