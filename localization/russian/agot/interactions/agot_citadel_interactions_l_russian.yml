 CITADEL_KNIGHT:1 "[GetTrait('knight').GetName( recipient.Self )]: $VALUE|=+0$"
 CITADEL_FIGHTER:1 "[personality|E] — #italic Он предпочел бы жизнь на поле боя:#! $VALUE|=+0$"
 CITADEL_WANTS_TO_LEARN:1 "[personality|E] — #italic Он хочет учиться:#! $VALUE|=+0$"
