l_russian:
 allow_love_match_interaction:0 "Allow Love Match"
 allow_love_match_interaction_desc:0 "Give [recipient.GetShortUIName] permission to marry for love and instruct [recipient.GetHerHim] to seek out a match on [recipient.GetHerHis] own."
 allow_love_match_interaction_tt:0 "[recipient.GetShortUIName|U] will be given permission to marry for love and will seek out a match on [recipient.GetHerHis] own."

 lmf_heir.1517.t.directed:0 "End of the Search"
 lmf_heir.1517.desc:0 "[focus_child.GetFirstNameNoTooltip] came to me this morning, looking rather sheepish.\n\n"I know I've said that I want to marry on my own, [focus_child.Custom2('spoken_address_by_familiarity', ROOT.Char )], but the truth is that I haven't met a [focus_child.Custom('GetWomanManOpposite')] worth marrying."\n\n"Does this mean what I think it means?" I asked, smiling.\n\n[focus_child.GetSheHe|U] nodded, sighing. "Yes, I think it's time. If you could find a proper [focus_child.Custom('WifeHusbandOpp')] for me, I would appreciate it.""
 lmf_heir.1517.desc.directed:0 "[focus_child.GetFirstNameNoTooltip] came to me this morning, looking rather sheepish.\n\n"I know you directed me to find a [focus_child.Custom('WifeHusbandOpp')] on my own, [focus_child.Custom2('spoken_address_by_familiarity', ROOT.Char )], but the truth is that I haven't found a [focus_child.Custom('GetWomanManOpposite')] worth marrying."\n\n"Does this mean you intend to give up the search?" I asked.\n\n[focus_child.GetSheHe|U] nodded, sighing. "I appreciate your offer, [focus_child.Custom2('spoken_address_by_familiarity', ROOT.Char )], but it appears I need your assistance if you still wish to see me properly wed.""

 lmf_heir.1517.b:0 "So be it."

 lmf_heir.1519.desc.start.secret:0 "Sadly, I think I already know why [heir.GetFirstNameNoTooltip] is so reluctant to marry: the [heir.Custom('GirlBoy')] is in love.\n\nUnfortunately, "

 lmf_heir.2050.t:0 "My [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('heir'))|U] Desire"
 lmf_heir.2050.start:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir'))] hesitated for a lengthy amount of time, perhaps not quite understanding — or believing — what I'd proposed. "You are allowing me," [heir.GetSheHe] repeated back carefully, "to marry... whomever I wish?"\n\nI told [heir.GetHerHim] that was so, at least for now, and then [heir.GetSheHe] took a deep breath. "Then you should know, there #EMP is #! a [heir_lover.GetWomanMan] who I love, and who I wish to marry."\n\n"
 lmf_heir.2050.knows:0 "I sighed, well aware of who [heir.GetSheHe] meant. "You're referring to [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_lover'))]."\n\n"
 lmf_heir.2050.secret:0 "That took me by surprise. "You... have a lover?"\n\n"
 lmf_heir.2050.soulmate:0 "[heir.GetFirstNameNoTooltip] nodded, trying not to look embarrassed. "[heir_lover.GetTitledFirstName] and I are soulmates. We're meant to be together, I know it. "
 lmf_heir.2050.lover:0 "[heir.GetFirstNameNoTooltip] nodded, trying not to look embarrassed. "What [heir_lover.GetTitledFirstName] and I have is real love, I know it is. "
 lmf_heir.2050.end:0 "If there's anyone I would choose for myself, if my choice means anything at all," here [heir.GetSheHe] looked up at me, perhaps wondering if I would take back my offer after all, "it would be [heir_lover.GetHerHim].""
 lmf_heir.2050.a:0 "No, [heir_lover.GetSheHe] is unsuitable. You must end it at once."
 lmf_heir.2050.b:0 "Very well, you have my blessing."
 lmf_heir.2050.c:0 "Well then! Let's approach [heir_lover.GetHerHis] liege and see if [heir_lover.GetLiege.GetTitledFirstNameNoTooltip] is amenable."
 lmf_heir.2050.c.tt:0 "[heir_lover.GetLiege.GetShortUINameNoFormat|U] will be approached with the marriage proposal"
 lmf_heir.2050.d:0 "Well then! Let's see if [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_lover'))] feels the same as you."
 lmf_heir.2050.d.tt:0 "[heir_lover.GetShortUINameNoFormat|U] will be approached with the marriage proposal"
 lmf_heir.2050.matrilineal.tt:0 "The proposed marriage will be #X matrilineal#!"
 lmf_heir.2050.patrilineal.tt:0 "The proposed marriage will be #X patrilineal#!"
 
 lmf_heir.2051.t:0 "My [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('heir'))|U] Desire"
 lmf_heir.2051.start:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir'))] hesitated for a lengthy amount of time, perhaps not quite understanding — or believing — what I'd proposed. "You are allowing me," [heir.GetSheHe] repeated back carefully, "to marry... whomever I wish?"\n\nI told [heir.GetHerHim] that was so. [heir.GetSheHe|U] took an even deeper breath "
 lmf_heir.2051.knows:0 "and then explained what I already knew: that [heir.GetSheHe] was in love. Unfortunately, "
 lmf_heir.2051.secret:0 "and then revealed [heir.GetHerHis] secret and the source of [heir.GetHerHis] hesitation: [heir.GetSheHe] was in love. Unfortunately, "
 lmf_heir.2051.desc.samesex:0 "the object of [heir.GetHerHis] affections is also a [heir_lover.GetWomanMan]. A rather awkward situation.\n\n"
 lmf_heir.2051.desc.order:0 "the object of [heir.GetHerHis] affections happens to have sworn oaths to a religious order. [heir_lover.GetSheHe|U] cannot marry, not so long as [heir_lover.GetSheHe] remains true to [heir_lover.GetHerHis] vows.\n\n"
 lmf_heir.2051.desc.married:0 "the object of [heir.GetHerHis] affections happens to be already married. An old tale, if a shameful one.\n\n"
 lmf_heir.2051.desc.betrothed:0 "the object of [heir.GetHerHis] affections is already betrothed to another, if not yet wed. [heir_lover.GetSheHe|U] cannot marry [heir.GetHerHim], so long as that betrothal remains in place.\n\n"
 lmf_heir.2051.desc.permission.lover.man:0 "since I previously denied [heir.GetHerHis] lover permission to marry, the man is now clearly reluctant to properly ask for my [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('heir'))] hand.\n\n"
 lmf_heir.2051.desc.permission.lover.woman:0 "since I previously denied [heir.GetHerHis] lover permission to marry, my [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('heir'))] clearly thinks that refusal also applies to him.\n\n"
 lmf_heir.2051.desc.permission.both:0 "my previous refusal to allow them to marry means they now intend to carry on in secret. A rather awkward situation, if it's allowed to continue.\n\n"
 lmf_heir.2051.desc.permission.heir.man:0 "my [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('heir'))] is clearly reluctant to ask permission to wed [heir_lover.GetHerHim], considering my previous refusal.\n\n"
 lmf_heir.2051.desc.permission.heir.woman:0 "it's clear the man is reluctant to ask permission to marry my [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('heir'))], considering I have already refused a proposal for her hand.\n\n"
 lmf_heir.2051.desc.generic:0 "It's impossible for the two of them to wed. Thus, they carry on in secret, and my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] is too smitten to consider that [heir.GetSheHe] has a greater duty than to this [heir_lover.GetWomanMan] [heir.GetSheHe] loves.\n\n"
 lmf_heir.2051.desc.end.canact:0 "Perhaps I should see that they get married anyhow. Or tell [heir.GetHerHim] to end this hopeless arrangement. Either way, something should likely be done."
 lmf_heir.2051.desc.end:0 "I could interfere in my [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('heir'))] affair, though I doubt [heir.GetSheHe] will thank me for doing so."
 lmf_heir.2051.a:0 "[heir.GetFirstNameNoTooltip] needs to end this and find a proper [heir.Custom('WifeHusbandOpp')]."
 lmf_heir.2051.b:0 "I will tell them I have changed my mind."
 lmf_heir.2051.c:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_lover'))] must abandon [heir_lover.GetHerHis] vows and marry my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))]."
 lmf_heir.2051.d:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_lover'))] must end [heir_lover.GetHerHis] betrothal and marry my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))]."
 lmf_heir.2051.e:0 "[heir.GetHerHis|U] affairs are [heir.GetHerHis] business. [heir.GetSheHe|U] must still marry #EMP someone #!..."
 lmf_heir.2051.f:0 "Time to take [heir.GetHerHis] future back into my hands, then."
 
 lmf_heir.2052.t:0 "Excited to Begin"
 lmf_heir.2052.t.notwant:0 "Reluctant to Begin"
 lmf_heir.2052.desc.start:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir'))] hesitated for a lengthy amount of time, perhaps not quite understanding — or believing — what I'd proposed. "You are allowing me," [heir.GetSheHe] repeated back carefully, "to marry... whomever I wish?"\n\n[heir.GetSheHe|U] seemed pleased with that, nodded, and left. I assumed that was the last I would hear of the topic until [heir.GetSheHe] was ready, but [heir.GetSheHe] returned later that evening with "
 lmf_heir.2052.desc.start.notwant:0 "And what if I do not #EMP want #! to be married, [heir.Custom2('spoken_address_by_familiarity', ROOT.Char )|U]?" [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir'))] finally asked following my proposal.\n\n"You must be married eventually," I replied. "Whether by your choice or mine. I am allowing it to be yours... for now."\n\n[heir.GetSheHe|U] seemed content with that and left. I assumed it was the last I'd hear of the topic until I pressed the matter further, but [heir.GetSheHe] returned later that evening with "
 lmf_heir.2052.desc.one:0 "the name of a [suitor_1.Custom('WomanManGirlBoy')] [secondary_actor.GetSheHe] might be interested in "
 lmf_heir.2052.desc.two:0 "the name of two [suitor_1.Custom('WomenMenGirlsBoys')] [secondary_actor.GetSheHe] might be interested in "
 lmf_heir.2052.desc.three:0 "a list of several [suitor_1.Custom('WomenMenGirlsBoys')] [secondary_actor.GetSheHe] was interested in "
 lmf_heir.2052.desc.matrilineal:0 "marrying matrilineally.\n\n"
 lmf_heir.2052.desc.normal:0 "meeting.\n\n"
 lmf_heir.2052.desc.end:0 "If I agree, I'll need to invite [suitor_1.GetHerHim] here to [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] for a proper introduction. Let's hope my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('secondary_actor'))] is serious about this and not wasting my time."
 lmf_heir.2052.a:0 "We'll invite [suitor_1.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]."
 lmf_heir.2052.b:0 "We'll invite [suitor_2.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]."
 lmf_heir.2052.c:0 "We'll invite [suitor_3.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]."
 lmf_heir.2052.d:0 "Nonsense, I'll find someone better myself."
 
 lmf_heir.2053.t:0 "Reality Sinks In"
 lmf_heir.2053.desc.ruler:0 ""I can't believe [heir_lover.GetSheHe] said #EMP no #!."\n\n"
 lmf_heir.2053.desc.liege:0 ""I can't believe [heir.Custom2('direct_address_by_familiarity', SCOPE.sC('recipient'))] #EMP refused #!."\n\n"
 lmf_heir.2053.desc.end:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir'))] sat in my study, dejected after the news about the refusal was received. I wasn't surprised, though I doubted telling [heir.GetHerHim] so would be particularly comforting.\n\n"Sometimes," I said slowly, "there's a difference between love and marriage, at least in the world we live in."\n\n[heir.GetSheHe|U] sighed and nodded. "It doesn't matter any more. [heir_lover.GetFirstNameNoTooltip] and I aren't together any longer, not in that way. I'll think about what you said, [heir.Custom2('spoken_address_by_familiarity', ROOT.Char )]."\n\nWith that, [heir.GetSheHe|U] left the study, though I knew I'd hear more from [heir.GetHerHim] in time."
 lmf_heir.2053.a:0 "[heir.GetSheHe|U] will find someone in time, I'm certain."
 lmf_heir.2053.b:0 "Time to take [heir.GetHerHis] future back into my hands."
 
 lmf_heir.2054.t:0 "Hesitant to Begin"
 lmf_heir.2054.desc.start:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir'))] hesitated for a lengthy amount of time, perhaps not quite understanding — or believing — what I'd proposed. "You are allowing me," [heir.GetSheHe] repeated back carefully, "to marry... whomever I wish?"\n\nI told [heir.GetHerHim] that was so, at least for now, to which [heir.GetSheHe] nodded... though I noticed [heir.GetSheHe] was still hesitant. "Why? Do you have someone in mind?" I asked.\n\n"
 lmf_heir.2054.desc.lover:0 ""No!" [heir.GetSheHe] blurted out, though I wasn't sure I believed [heir.GetHerHim]. [heir.GetSheHe|U] #EMP did #! have someone in mind, but was unwilling to tell me. At least, for now.\n\n"
 lmf_heir.2054.desc.default:0 ""No," [heir.GetSheHe] replied. "It's more that I wonder if there's anyone who'd wish to marry #EMP me #!." There was some truth to [heir.GetHerHis] concern, I know, but I was confident [heir.GetSheHe] would figure it out, in time.\n\n"
 lmf_heir.2054.desc.end:0 ""I'll think about this more, [heir.Custom2('spoken_address_by_familiarity', ROOT.Char )]." With that, [heir.GetSheHe|U] left the study, and I was left to wonder how long I'd need to wait before I pressed the matter further."
 lmf_heir.2054.a:0 "So be it."

 lmf_spouse.1165.e:0 ""How about I appoint you as my [ROOT.Char.GetPrimarySpouse.Custom('GetTargetCourtPosition')]?""

 lmf_spouse.1240.desc.bestfriend:0 ""Because [spouse_visit_target.GetSheHe]'s my best friend. Surely you know this? It's been too long since we've seen each other," [ROOT.Char.GetPrimarySpouse.GetSheHe] said with a sigh. "
 lmf_spouse.1240.desc.potfriend:0 ""[spouse_visit_target.GetSheHe|U] and I have long been on good terms and I'd like to see if there's an actual friendship to be had," [ROOT.Char.GetPrimarySpouse.GetSheHe] said thoughtfully. "
 lmf_spouse.1240.desc.lover:0 ""Because [spouse_visit_target.GetSheHe] and I have business, which happens to be no business of yours," [ROOT.Char.GetPrimarySpouse.GetSheHe] said with obvious annoyance. "

 lmf_spouse.1280.desc.clouded_eyes:0 "I saw [ROOT.Char.GetPrimarySpouse.GetHerHim] walking down the corridor towards me last night, and even though I was not far away it was clear [ROOT.Char.GetPrimarySpouse.GetSheHe] didn't see me. Finally, before we literally collided, I called out to [ROOT.Char.GetPrimarySpouse.GetHerHim] and [ROOT.Char.GetPrimarySpouse.GetSheHe] jumped with alarm. "My eyes aren't what they used to be," [ROOT.Char.GetPrimarySpouse.GetSheHe] admitted with a chuckle... and that's very true. They're beginning to cloud over, however. Even I can see that.\n\n[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] is compensating for now, but I'm starting to wonder if the day will soon come when [ROOT.Char.GetPrimarySpouse.GetSheHe] will be completely blind. "
 lmf_spouse.1280.desc.faltering_heart:0 "Even a short walk leaves [ROOT.Char.GetPrimarySpouse.GetHerHim] winded, and I'll catch [ROOT.Char.GetPrimarySpouse.GetHerHim] from time to time standing still with [ROOT.Char.GetPrimarySpouse.GetHerHis] eyes closed and a hand placed on [ROOT.Char.GetPrimarySpouse.GetHerHis] chest. "My heart keeps racing," [ROOT.Char.GetPrimarySpouse.GetSheHe] explained after one of those occasions. "Sometimes it's all I can do even just to keep standing!" I tell [ROOT.Char.GetPrimarySpouse.GetHerHim] that [ROOT.Char.GetPrimarySpouse.GetSheHe] #EMP shouldn't #! keep standing, that [ROOT.Char.GetPrimarySpouse.GetSheHe] should lie down, but [ROOT.Char.GetPrimarySpouse.GetSheHe] waves away the concern.\n\n[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] doesn't think the problem a large one, but I'm starting to wonder if the day will come when [ROOT.Char.GetPrimarySpouse.GetHerHis] heart gives out completely. "
 lmf_spouse.1280.desc.fragile_bones:0 "Over the last year, [ROOT.Char.GetPrimarySpouse.GetSheHe]'s had a frightening number of injuries: a broken hip after what appeared to be a minor fall, a broken ankle after a slip, a broken wrist after a fumble on the stairs which almost had [ROOT.Char.GetPrimarySpouse.GetHerHim] falling to the very bottom. Each time is more alarming than the last, though [ROOT.Char.GetPrimarySpouse.GetSheHe] waves away my concern. "It's just my aging bones," [ROOT.Char.GetPrimarySpouse.GetSheHe] says dismissively. "What's the alternative? That I stay in bed and never emerge?"\n\nI can tell that [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] is more frightened of [ROOT.Char.GetPrimarySpouse.GetHerHis] situation than [ROOT.Char.GetPrimarySpouse.GetSheHe] lets on, and I'm starting to wonder if the time will come when we #EMP do #! need to restrict [ROOT.Char.GetPrimarySpouse.GetHerHis] movements for [ROOT.Char.GetPrimarySpouse.GetHerHis] own good. "
 lmf_spouse.1280.desc.same:0 "I feel for [ROOT.Char.GetPrimarySpouse.GetHerHim]. Old age has caught up with me in the exact same manner, and it's troubling to see in [ROOT.Char.GetPrimarySpouse.GetHerHim] a mirror of the path that lies before me."
 lmf_spouse.1280.desc.other:0 "I feel for [ROOT.Char.GetPrimarySpouse.GetHerHim]. I may not suffer the same way, but old age is playing its own tricks on me. It appears we are to become decrepit together."