 lmf_pos_reaction_alike: "именно [Select_CString(second.IsFemale, 'такая', 'такой' )] [second.Custom('WomanManGirlBoy')], с [Select_CString(second.IsFemale, 'которой', 'которым' )] я полажу!"
 lmf_pos_reaction_virtuous: "[Select_CString(second.IsFemale, 'добродетельная', 'добродетельный' )] [second.Custom('WomanManGirlBoy')]!"
 lmf_pos_reaction_friend: "[Select_CString(second.IsFemale, 'моя подруга', 'мой друг' )]!"
 lmf_pos_reaction_like: "[Select_CString(second.IsFemale, 'чудесная', 'чудесный' )] [second.Custom('WomanManGirlBoy')]!"
 lmf_pos_reaction_picked: "именно [Select_CString(second.IsFemale, 'такая', 'такой' )] [second.Custom('WomanManGirlBoy')], [Select_CString(second.IsFemale, 'которую', 'которого' )] я предпочту в [Select_CString(second.IsFemale, 'жёны', 'мужья' )]!"
 lmf_pos_reaction_fallback: "подходит мне! Я знаю это!"

 lmf_has_relation_them: "[second.GetSheHe|U] -"
 lmf_has_no_relation_them: "Мне сказали, что [second.GetSheHe]"

 lmf_interaction.1300.start: "После должного размышления я [Select_CString(recipient.IsFemale, 'должна', 'должен' )] отказаться от вашего предложения.\n\n"
 lmf_interaction.1300.youandi: "Мы с вами просто не созданы друг для друга."
 lmf_interaction.1300.youandthem: "Вы и [secondary_recipient.GetTitledFirstName] просто не созданы друг для друга."
 lmf_interaction.1300.themandi: "Я и [secondary_actor.GetTitledFirstName] просто не созданы друг для друга."
 lmf_interaction.1300.them: "[secondary_actor.GetTitledFirstName] и [secondary_recipient.GetTitledFirstName] просто не созданы друг для друга."

 lmf_interaction.1301.t: "Знакомство"
 lmf_interaction.1301.desc.start: "Приглашение было принято, и [secondary_recipient.GetTitledFirstNameNoTooltip] направляется во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_interaction.1301.desc.actor: "Мне нужно многое подготовить. Ведь это может быть [Select_CString(secondary_recipient.IsFemale, 'моя будущая', 'мой будущий' )] [secondary_recipient.GetWifeHusband]. Или, возможно, [secondary_recipient.GetSheHe] мне сразу не понравится, и я отправлю [secondary_recipient.GetHerHis] домой сразу после визита.\n\nВыбор, как всегда, за мной."
 lmf_interaction.1301.desc.pleased.willnotwed: "[secondary_actor.GetFirstNameNoTooltip], по крайней мере, осторожно [Select_CString(secondary_actor.IsFemale, 'довольна', 'доволен' )], когда я сообщаю новость о [secondary_actor.GetHerHis] [Select_CString(secondary_recipient.IsFemale, 'потенциальной будущей жене', 'потенциальном будущем муже' )]. «Вы приведёте [secondary_recipient.GetHerHis] сюда?» — [Select_CString(secondary_actor.IsFemale, 'спросила', 'спросил' )] [secondary_actor.GetSheHe]. «[secondary_actor.Custom2('lmf_has_relation', SCOPE.sC('secondary_recipient'))] [secondary_actor.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_recipient'))]».\n\nЗатем [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'замолчала', 'замолчал' )], размышляя. «А если я решу, что не хочу [Select_CString(secondary_actor.IsFemale, 'выходить замуж за него', 'жениться на ней' )]? Моё мнение будет учтено?»\n\n«Посмотрим», — [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )] я, и этого было достаточно, чтобы [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'была удовлетворена', 'был удовлетворён' )]... по крайней мере, на данный момент."
 lmf_interaction.1301.desc.pleased: "[secondary_actor.GetFirstNameNoTooltip], по крайней мере, [Select_CString(secondary_actor.IsFemale, 'довольна', 'доволен' )], когда я сообщаю новость о [secondary_actor.GetHerHis] [Select_CString(secondary_recipient.IsFemale, 'потенциальной будущей жене', 'потенциальном будущем муже' )]. «[secondary_recipient.GetSheHe|U] приедет сюда? Чтобы встретиться со мной?» — взволнованно [Select_CString(secondary_actor.IsFemale, 'спросила', 'спросил' )] [secondary_actor.GetSheHe]. «[secondary_actor.Custom2('lmf_has_relation', SCOPE.sC('secondary_recipient'))] [secondary_actor.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_recipient'))]»\n\nЗатем [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'замолчала', 'замолчал' )], размышляя. «Но что, если я [secondary_recipient.GetHerHim] не понравлюсь? Значит ли это, что мы не поженимся, даже после того, как [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'проделала', 'проделал' )] весь этот путь?»\n\n«Посмотрим», — [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )] я, и этого было достаточно, чтобы [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'перестала', 'перестал' )] тревожиться из-за своих опасений... по крайней мере, на время."
 lmf_interaction.1301.desc.displeased: "Теперь [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'должна', 'должен' )] узнать о предстоящем визите, и [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'была', 'был' )] этим [Select_CString(secondary_actor.IsFemale, 'недовольна', 'недоволен' )].\n\n«[secondary_actor.Custom2('lmf_has_relation', SCOPE.sC('secondary_recipient'))] [secondary_actor.Custom2('lmf_neg_reaction', SCOPE.sC('secondary_recipient'))]» — [secondary_actor.GetSheHe] [secondary_actor.Custom('lmf_neg_reaction_type')].\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'попыталась', 'попытался' )] убедить [secondary_actor.GetHerHis] не спешить с мнением, напомнив, что при обычных обстоятельствах условия такого союза, как «[secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]», уже были бы согласованы, но мои слова мало помогли.\n\nПридётся подождать и посмотреть, как пройдет визит."
 lmf_interaction.1301.a: "Время готовиться!"

 lmf_interaction.1302.t: "В пути"
 lmf_interaction.1302.desc.recipient: "Я отправляюсь во владение [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], возможно, чтобы встретить [Select_CString(secondary_actor.IsFemale, 'свою будущую жену', 'своего будущего мужа' )].\n\nПри обычных обстоятельствах свадебные приготовления уже были бы завершены... но это шанс, чтобы я и [secondary_actor.GetTitledFirstNameNoTooltip] могли встретиться, а затем мы сами решим, хотим ли мы продолжать со свадьбой.\n\nПолагаю, мы увидим, как пройдёт этот визит."
 lmf_interaction.1302.desc.pleased.willnotwed: "Мы приняли приглашение, и [secondary_recipient.GetFirstNameNoTooltip] уже готовится к отъезду во владение [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\n[Select_CString(ROOT.Char.IsFemale, 'Должна', 'Должен' )] признать, я [Select_CString(ROOT.Char.IsFemale, 'была довольна', 'был доволен' )], когда [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'отреагировала', 'отреагировал' )] на то, что [secondary_actor.GetTitledFirstNameNoTooltip] станет [secondary_recipient.GetHerHis] [Select_CString(secondary_actor.IsFemale, 'потенциальной будущей женой', 'потенциальным будущим мужем' )] по моему выбору, с осторожным энтузиазмом.\n\n«[secondary_recipient.Custom2('lmf_has_relation', SCOPE.sC('secondary_actor'))] [secondary_recipient.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_actor'))] Но... что, если [secondary_actor.GetSheHe] мне не понравится после визита?» — [Select_CString(secondary_recipient.IsFemale, 'спросила', 'спросил' )] [secondary_recipient.GetSheHe]. «Моё мнение будет учтено?»\n\n«Посмотрим», — [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )] я и [Select_CString(ROOT.Char.IsFemale, 'пожелала', 'пожелал' )] [secondary_recipient.GetHerHim] счастливого пути, когда [secondary_recipient.GetHerHis] свита покинула [ROOT.Char.Custom('FortifiedBuilding')]."
 lmf_interaction.1302.desc.pleased: "Мы приняли приглашение, и [secondary_recipient.GetFirstNameNoTooltip] уже готовится к отъезду во владение [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\n[Select_CString(ROOT.Char.IsFemale, 'Должна', 'Должен' )] признать, я [Select_CString(ROOT.Char.IsFemale, 'была довольна', 'был доволен' )], когда [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'отреагировала', 'отреагировал' )] на то, что [secondary_actor.GetTitledFirstNameNoTooltip] может стать [secondary_recipient.GetHerHis] [Select_CString(secondary_actor.IsFemale, 'потенциальной будущей женой', 'потенциальным будущим мужем' )] по моему выбору, с энтузиазмом.\n\n«[secondary_recipient.Custom2('lmf_has_relation', SCOPE.sC('secondary_actor'))] [secondary_recipient.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_actor'))] Но... что, если я [secondary_actor.GetHerHim] не понравлюсь?» — вдруг обеспокоенно [Select_CString(secondary_recipient.IsFemale, 'спросила', 'спросил' )] [secondary_recipient.GetSheHe]. «Значит ли это, что мы не поженимся, даже после того, как я проделаю весь этот путь?»\n\n«Посмотрим», — [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )] я и [Select_CString(ROOT.Char.IsFemale, 'пожелала', 'пожелал' )] [secondary_recipient.GetHerHim] счастливого пути, когда [secondary_recipient.GetHerHis] свита покинула [ROOT.Char.Custom('FortifiedBuilding')]."
 lmf_interaction.1302.desc.displeased: "Мы приняли приглашение, и [secondary_recipient.GetFirstNameNoTooltip] уже готовится к отъезду во владение [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\n[secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] весьма [Select_CString(secondary_recipient.IsFemale, 'расстроена', 'расстроен' )], когда я [Select_CString(ROOT.Char.IsFemale, 'сообщила', 'сообщил' )] о [secondary_recipient.GetHerHis] поездке и что [secondary_actor.GetTitledFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'выбрана', 'выбран' )] мной в качестве [secondary_recipient.GetHerHis] [Select_CString(secondary_actor.IsFemale, 'потенциальной будущей жены', 'потенциального будущего мужа')].\n\n«[secondary_recipient.Custom2('lmf_has_relation', SCOPE.sC('secondary_actor'))] [secondary_recipient.Custom2('lmf_neg_reaction', SCOPE.sC('secondary_actor'))]», — [secondary_recipient.GetSheHe] [secondary_recipient.Custom('lmf_neg_reaction_type')].\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'попыталась', 'попытался' )] убедить [secondary_recipient.GetHerHis] не спешить с мнением, напомнив, что при обычных обстоятельствах условия такого союза, как «[secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]» уже были бы согласованы, но мои слова мало помогли.\n\nПридётся подождать и посмотреть, как пройдёт визит."
 lmf_interaction.1302.a: "С нетерпением жду новостей."
 lmf_interaction.1302.b: "В путь!"

 lmf_interaction.1304.t: "Грядущая война"
 lmf_interaction.1304.desc.atwar.actor: "Теперь, когда мы и [actor.GetTitledFirstNameNoTooltip] находимся в состоянии войны, кажется крайне неуместным, чтобы [recall_char.GetFirstNameNoTooltip] [Select_CString(recall_char.IsFemale, 'продолжила', 'продолжил' )] свой визит во владение [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]."
 lmf_interaction.1304.desc.atwar.self.rootattacker: "Мы и [defender.GetTitledFirstNameNoTooltip] воюем, и это ставит вопрос о том, [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] ли я немедленно вернуться во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_interaction.1304.desc.atwar.rootattacker: "Мы и [defender.GetTitledFirstNameNoTooltip] воюем, и это ставит вопрос о том, [Select_CString(recall_char.IsFemale, 'должна', 'должен' )] ли [recall_char.GetFirstNameNoTooltip] быть [Select_CString(recall_char.IsFemale, 'отозвана', 'отозван' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nПо правде говоря, [recall_char.GetSheHe] [Select_CString(recall_char.IsFemale, 'должна', 'должен' )] быть в безопасности при дворе, ведь [actor.GetTitledFirstNameNoTooltip] [Select_CString(actor.IsFemale, 'дала', 'дал' )] слово, но это не гарантировано."
 lmf_interaction.1304.desc.atwar.self.rootdefender: "[attacker.GetTitledFirstNameNoTooltip] воюет против меня, и это ставит вопрос о том, [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] ли я немедленно вернуться во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_interaction.1304.desc.atwar.rootdefender: "[attacker.GetTitledFirstNameNoTooltip] воюет против меня, и это ставит вопрос о том, [Select_CString(recall_char.IsFemale, 'должна', 'должен' )] ли [recall_char.GetFirstNameNoTooltip] вернуться во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nПо правде говоря, [recall_char.GetSheHe] [Select_CString(recall_char.IsFemale, 'должна', 'должен' )] быть в безопасности при дворе, ведь [actor.GetTitledFirstNameNoTooltip] [Select_CString(actor.IsFemale, 'дала', 'дал' )] слово, но это не гарантировано."
 lmf_interaction.1304.desc.atwar.self: "Теперь, когда я участвую в войне между державами [attacker.GetPrimaryTitle.GetNameNoTierNoTooltip] и [defender.GetPrimaryTitle.GetNameNoTierNoTooltip], возникает вопрос, [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] ли я немедленно вернуться во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_interaction.1304.desc.atwar: "Теперь, когда я участвую в войне между державами [attacker.GetPrimaryTitle.GetNameNoTierNoTooltip] и [defender.GetPrimaryTitle.GetNameNoTierNoTooltip], возникает вопрос, [Select_CString(recall_char.IsFemale, 'должна', 'должен' )] ли [recall_char.GetFirstNameNoTooltip] быть [Select_CString(recall_char.IsFemale, 'отозвана', 'отозван' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nПо правде говоря, [recall_char.GetSheHe] [Select_CString(recall_char.IsFemale, 'должна', 'должен' )] быть в безопасности при дворе, ведь [actor.GetTitledFirstNameNoTooltip] [Select_CString(actor.IsFemale, 'дала', 'дал' )] слово, но это не гарантировано."
 lmf_interaction.1304.a: "Немедленно отозвать [recall_char.GetHerHis]."
 lmf_interaction.1304.b: "Мне следует вернуться."
 lmf_interaction.1304.c: "[recall_char.GetSheHe|U] в безопасности там, где [recall_char.GetSheHe] находится."
 lmf_interaction.1304.d: "Я продолжу путь."

 lmf_interaction.intro.cancelled.tt: "Знакомство отменено"
 lmf_interaction.intro.cancelled.our.war: "Визит, на котором  [recall_char.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменён из-за нашей войны."
 lmf_interaction.intro.cancelled.recipient.war: "Визит, на котором [recall_char.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменён из-за #L [ROOT.Char.GetPrimaryTitle.GetAdjective|l]ой#! войны."
 lmf_interaction.intro.cancelled.death.visitor: "Визит, на котором [recall_char.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменён из-за [recall_char.GetHerHis] смерти."
 lmf_interaction.intro.cancelled.death: "[intro_death.GetTitledFirstName]  [Select_CString(intro_death.IsFemale, 'умерла', 'умер' )], из-за этого визит, на котором [recall_char.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменён."
 lmf_interaction.intro.cancelled.actor.besieged: "Визит, на котором [secondary_recipient.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменён, так как столица, в которой пребывает [actor.GetTitledFirstNameNoTooltip], осаждена."
 lmf_interaction.intro.cancelled.actor.notruler: "Визит, на котором [secondary_recipient.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменен, так как [actor.GetTitledFirstName] больше не является [Select_CString(actor.IsFemale, 'правительницей', 'правителем' )]."
 lmf_interaction.intro.cancelled.recipient.notruler: "Визит, на котором [secondary_recipient.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменён, так как [recipient.GetTitledFirstName] больше не является [Select_CString(recipient.IsFemale, 'правительницей', 'правителем' )]."
 lmf_interaction.intro.cancelled.secrecp.ill: "Визит, на котором [secondary_recipient.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменён, так как [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'заболела', 'заболел' )]."
 lmf_interaction.intro.cancelled.secactor.ill: "Визит, на котором [secondary_recipient.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменён, так как [secondary_actor.GetTitledFirstName] [Select_CString(secondary_actor.IsFemale, 'заболела', 'заболел' )]."
 lmf_interaction.intro.cancelled.secrecp.imprisoned: "Визит, на котором [secondary_recipient.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменён, так как [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'заключена', 'заключён' )] в темницу."
 lmf_interaction.intro.cancelled.secrecp.incapable: "Визит, на котором [secondary_recipient.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменён, так как [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'недееспособна', 'недееспособен' )]."
 lmf_interaction.intro.cancelled.secactor.unavailable: "Визит, на котором [secondary_recipient.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменён, так как [secondary_actor.GetTitledFirstName] больше не может принять [secondary_recipient.GetHerHis]."
 lmf_interaction.intro.cancelled.actor.imprisoned: "Визит, на котором [secondary_recipient.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменен, так как [actor.GetShortUINameNoTooltipNoFormat] [Select_CString( actor.IsLocalPlayer, 'находитесь', 'находится')] в заключении."
 lmf_interaction.intro.cancelled.actor.incapable: "Визит, на котором [secondary_recipient.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменен, так как [actor.GetShortUINameNoTooltipNoFormat] [Select_CString( actor.IsLocalPlayer, 'недееспособны', Select_CString(actor.IsFemale, 'недееспособна', 'недееспособен' ))]."
 lmf_interaction.intro.cancelled.fallthrough: "Визит, на котором [secondary_recipient.GetTitledFirstName] и [secondary_actor.GetTitledFirstName] должны были встретиться, отменён."

 lmf_interaction.1311.t: "Прибытие"
 lmf_interaction.1311.initial.secrep: "Я наконец [Select_CString(ROOT.Char.IsFemale, 'прибыла', 'прибыл' )] во владение [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] ранним утром и меня немедленно [Select_CString(secondary_actor.IsFemale, 'встретила', 'встретил' )] во дворе [actor.Custom('FortifiedBuilding_RU_Gen')] не кто [Select_CString(secondary_actor.IsFemale, 'иная', 'иной' )], как [Select_CString(secondary_actor.IsFemale, 'сама', 'сам' )] [secondary_actor.GetTitledFirstNameNoTooltip].\n\n"
 lmf_interaction.1311.initial.actor: "[secondary_recipient.GetTitledFirstNameNoTooltip] наконец [Select_CString(secondary_recipient.IsFemale, 'прибыла', 'прибыл' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] ранним утром, и я лично [Select_CString(ROOT.Char.IsFemale, 'отправилась', 'отправился' )] приветствовать [secondary_recipient.GetHerHis], приказав слугам разместить [secondary_recipient.GetHerHis] процессию после их утомительного путешествия.\n\n"
 lmf_interaction.1311.initial: "[secondary_recipient.GetTitledFirstNameNoTooltip] наконец [Select_CString(secondary_recipient.IsFemale, 'прибыла', 'прибыл' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] ранним утром и [Select_CString(secondary_recipient.IsFemale, 'её', 'его' )] немедленно [Select_CString(secondary_actor.IsFemale, 'встретила', 'встретил' )] во дворе [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] не кто [Select_CString(secondary_actor.IsFemale, 'иная', 'иной' )], как [Select_CString(secondary_actor.IsFemale, 'сама', 'сам' )] [secondary_actor.GetTitledFirstNameNoTooltip].\n\n"
 lmf_interaction.1311.act.pleased.secrep: "[secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'была любезна', 'был любезен' )] в своём приветствии, и мне показалось, я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )] одобрение на [secondary_actor.GetHerHis] лице, когда [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'разглядывала', 'разглядывал' )] меня. Возможно, [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'думала', 'думал' )], что я не замечу?\n\n"
 lmf_interaction.1311.act: ""
 lmf_interaction.1311.secact.pleased.secrep: "Признаю, я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] приятно [Select_CString(ROOT.Char.IsFemale, 'удивлена', 'удивлён' )], что [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'казалась рада', 'казался рад' )] меня видеть. [secondary_actor.GetSheHe|U] низко [Select_CString(secondary_actor.IsFemale, 'поклонилась и приветствовала', 'поклонился и приветствовал' )], как [Select_CString(actor.IsFemale, 'велела', 'велел' )] [secondary_actor.GetHerHis] [secondary_actor.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))], но я [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], как [secondary_actor.GetSheHe] внимательно [Select_CString(secondary_actor.IsFemale, 'разглядывала', 'разглядывал' )] меня.\n\n"
 lmf_interaction.1311.act.displeased.secrep: "Не могу сказать, что [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'выглядела', 'выглядел' )] особенно [Select_CString(secondary_actor.IsFemale, 'рада', 'рад' )] меня видеть, несмотря на то что приглашение исходило от н[secondary_actor.GetHerHis]. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'передумала', 'передумал' )]? [secondary_actor.GetHerHim|U] не нравится моя внешность? Если так, то я уже в невыгодном положении.\n\n"
 lmf_interaction.1311.secact.displeased.secrep: "Не могу сказать, что [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'выглядела', 'выглядел' )] особенно [Select_CString(secondary_actor.IsFemale, 'рада', 'рад' )] меня видеть, хотя [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'сохраняла', 'сохранял' )] вежливый вид. Возможно, приглашение было не [secondary_actor.GetHerHis] идеей, и [secondary_actor.GetSheHe] против союза? Если так, мне предстоит трудная работа.\n\n"
 lmf_interaction.1311.secact.pleased: "К счастью, [secondary_actor.GetSheHe] всё ещё [Select_CString(secondary_actor.IsFemale, 'казалась довольной', 'казался довольным' )] визитом и тем, что он потенциально означает, и их первоначальное общение, когда [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'приветствовала', 'приветствовал' )] [secondary_recipient.GetHerHis], только подтвердило это.\n\n"
 lmf_interaction.1311.secact.displeased: "К несчастью, было ясно, что [secondary_actor.GetSheHe] всё ещё не [Select_CString(secondary_actor.IsFemale, 'одобряла', 'одобрял' )] визит и его потенциальные последствия, и [secondary_actor.GetHerHis] холодность, когда [secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'получила', 'получил' )] от н[secondary_actor.GetHerHis] официальное приветствие, это сразу охладило атмосферу.\n\n"
 lmf_interaction.1311.reaction.secrep: ""
 lmf_interaction.1311.reaction.actor.pleased: "[secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'казалась рада', 'казался рад' )] меня видеть, и мне показалось, я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )] одобрение на [secondary_recipient.GetHerHis] лице, когда [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'разглядывала', 'разглядывал' )] меня. Если [secondary_recipient.GetFirstNameNoTooltip] одобрит идею союза, это определённо облегчит нам обоим предстоящий визит.\n\n"
 lmf_interaction.1311.reaction.pleased: "Тем временем [secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'была сердечна и учтива', 'был сердечен и учтив' )]. Более того, [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'стремилась', 'стремился')] поскорее начать.\n\n"
 lmf_interaction.1311.reaction.actor.displeased: "Мне показалось, [secondary_recipient.GetSheHe|U] не [Select_CString(secondary_recipient.IsFemale, 'выглядела', 'выглядел' )] особенно [Select_CString(secondary_recipient.IsFemale, 'рада', 'рад' )] меня видеть. [Select_CString(secondary_recipient.IsFemale, 'Холодная и напряжённая', 'Холодный и напряжённый')], возможно, не [Select_CString(secondary_recipient.IsFemale, 'одобряющая', 'одобряющий' )] весь визит и его потенциальные последствия. Если так, это может осложнить ситуацию.\n\n"
 lmf_interaction.1311.reaction.displeased: "Тем временем [secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'была скована и напряжён', 'был скован и напряжён' )]. Было ясно, что [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'чувствовала', 'чувствовал' )] себя неловко из-за всего визита... или, возможно, [Select_CString(secondary_recipient.IsFemale, 'была измотан', 'был измотан' )] долгой дорогой. Посмотрим.\n\n"
 lmf_interaction.1311.us.end: "Настоящее знакомство начнётся через два дня, когда мы проведём время наедине и узнаем друг друга лучше."
 lmf_interaction.1311.end: "Настоящее знакомство начнётся через два дня, когда они проведут время наедине и узнают друг друга лучше."
 lmf_interaction.1311.a: "Посмотрим, как все пойдёт, не так ли?"

 lmf_interaction.1312.t: "Просьба о поддержке"
 lmf_interaction.1312.desc.start: "Позже той же ночью [secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'пришла', 'пришёл' )] поговорить со мной наедине.\n\n«Я искренне хочу, чтобы я и"
 lmf_interaction.1312.desc.name: " [secondary_actor.GetFirstNameNoTooltip] вступили в брак, "
 lmf_interaction.1312.desc.stranger: " [Select_CString(secondary_actor.IsFemale, 'ваша', 'ваш')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('secondary_actor'))] вступили в брак, "
 lmf_interaction.1312.desc.end: "[Select_CString(ROOT.Char.IsFemale, 'миледи', 'милорд' )]. Я боюсь, что [secondary_actor.GetSheHe] не захочет [Select_CString(secondary_actor.IsFemale, 'выйти за меня', 'жениться на мне' )]».\n\n«Так почему ты [Select_CString(secondary_recipient.IsFemale, 'обратилась', 'обратился' )] ко мне?» — [Select_CString(ROOT.Char.IsFemale, 'спросила', 'спросил' )] я.\n\n«Потому что мне нужна ваша поддержка». [secondary_recipient.Custom('polite_gender_ref')] явно [Select_CString(secondary_recipient.IsFemale, 'нервничала', 'нервничал' )], но я [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], как [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'собралась', 'собрался' )] с духом во время разговора. «[secondary_actor.GetTitledFirstNameNoTooltip] доверяет вашему суждению. Вы [Select_CString(secondary_actor.IsFemale, 'её', 'его' )] [secondary_actor.Custom2('LMF_RelationToMeShort', ROOT.Char)]. Если бы вы поддержали моё предложение завтра, возможно...»\n\nЯ подозреваю, что [secondary_recipient.Custom('polite_gender_ref')] переоценивает влияние хороших отношений, которые поддерживаем я и [secondary_actor.GetFirstNameNoTooltip], но, возможно, [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'права', 'прав' )]."
 lmf_interaction.1312.a: "Я тихо поддержу [secondary_recipient.GetHerHis] предложение."
 lmf_interaction.1312.b: "[secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'сама', 'сам' )] по себе."
 lmf_interaction_intro_chance_pos_tt: "Вероятность успешного знакомства #positive_value повышается#!"
 lmf_interaction_intro_chance_neg_tt: "Вероятность успешного знакомства #negative_value понижается#!"

 lmf_interaction.1313.t: "Тревожное поведение"
 lmf_interaction.1313.desc.start: "[secondary_recipient.GetTitledFirstNameNoTooltip] и [secondary_recipient.GetHerHis] свита разместились во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], и сначала казалось, что всё спокойно и все будут готовы к настоящему знакомству на следующий день.\n\nЗатем, поздним вечером, слуга разбудил меня новостью: "
 lmf_interaction.1313.desc.lunatic: "[secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'была найдена бродящей', 'был найден бродящим' )] по залам [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], безумно смеясь и без единой нитки одежды на теле.\n\nСлугам в конце концов удалось успокоить [secondary_recipient.GetHerHis] и вернуть [secondary_recipient.GetHerHis] в покои, "
 lmf_interaction.1313.desc.lustful: "[secondary_recipient.GetTitledFirstNameNoTooltip] тайком [Select_CString(secondary_recipient.IsFemale, 'покинула', 'покинул' )] [ROOT.Char.Custom('FortifiedBuilding')] и [Select_CString(secondary_recipient.IsFemale, 'отправилась', 'отправился' )] в местную деревню, где [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'вступила', 'вступил' )] в стычку с несколькими местными... по-видимому, из-за [secondary_recipient.GetHerHis] «непристойного поведения».\n\n[secondary_recipient.Custom('polite_gender_ref')] [Select_CString(secondary_recipient.IsFemale, 'была узнана и сопровождена', 'был узнан и сопровождён' )] обратно моими стражниками, "
 lmf_interaction.1313.desc.sadistic: "[secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'затеяла', 'затеял' )] драку с одной из служанок в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')]. Она, по-видимому, вошла в покои, где [Select_CString(secondary_recipient.IsFemale, 'разместилась', 'разместился' )] [secondary_recipient.Custom('polite_gender_ref')], без приглашения, после чего [secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'задала', 'задал' )] ей такую взбучку, что почти половине обитателей [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] пришлось вмешаться. Со служанкой в основном всё в порядке, хотя её потрясла жестокая вспышка гнева, которую [Select_CString(secondary_recipient.IsFemale, 'продемонстрировала', 'продемонстрировал' )] [secondary_recipient.GetTitledFirstNameNoTooltip], "
 lmf_interaction.1313.desc.end: "так что реального вреда не было, но всё же... это тревожно.\n\nЧто хуже, [secondary_actor.GetFirstNameNoTooltip], как и я, [Select_CString(secondary_actor.IsFemale, 'услышала', 'услышал' )] о происшествии."
 lmf_interaction.1313.a: "Полагаю, нам придётся сделать вид, что этого никогда не было."

 lmf_interaction.1314.t: "Драка в зале"
 lmf_interaction.1314.desc: "[secondary_recipient.GetTitledFirstNameNoTooltip] и [secondary_recipient.GetHerHis] свита разместились во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], и сначала всё шло хорошо. Был небольшой неформальный ужин, на котором даже не [Select_CString(secondary_actor.IsFemale, 'присутствовала', 'присутствовал' )] [secondary_actor.GetFirstNameNoTooltip], и вот тогда всё пошло наперекосяк.\n\n[secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'казалась', 'казался' )] в дурном настроении с самого начала, поэтому я [Select_CString(ROOT.Char.IsFemale, 'избегала', 'избегал' )] [secondary_recipient.GetHerHis]... вот почему я не [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], что произошло, пока не начались крики. [secondary_recipient.GetTitledFirstNameNoTooltip] и [your_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] начали ругаться, и перепалка между ними накалилась настолько, что они чуть не подрались, прежде чем их разняли!\n\nПричина не важна. Важно то, что [your_courtier.GetFirstNameNoTooltip] невероятно [Select_CString(your_courtier.IsFemale, 'смущена', 'смущён' )] всей этой ситуацией, это произошло на глазах у всех, и [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'услышала', 'услышал' )] о том, насколько ужасно себя [Select_CString(secondary_recipient.IsFemale, 'повела', 'повёл' )] [secondary_recipient.GetTitledFirstNameNoTooltip]."
 lmf_interaction.1314.a: "Досадно."
 fought_during_introduction: "[CHARACTER.GetShortUIName] и [TARGET_CHARACTER.GetShortUIName] стали соперниками после поединка во время знакомства для брака [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )]."
 fought_during_introduction_corresponding: "[TARGET_CHARACTER.GetShortUIName] и [CHARACTER.GetShortUIName] стали соперниками после поединка во время знакомства для брака [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )]."

 lmf_interaction.1315.t: "Нигде не найти"
 lmf_interaction.1315.desc: "После того как [secondary_recipient.GetTitledFirstNameNoTooltip] и [secondary_recipient.GetHerHis] свита устроились на ночь, я [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил' )] устроить небольшую неформальную встречу перед сном. Шанс для того, чтобы [secondary_recipient.GetSheHe] и [secondary_actor.GetFirstNameNoTooltip] могли поговорить без давления сотен глаз.\n\nОднако [secondary_recipient.GetTitledFirstNameNoTooltip] куда-то [Select_CString(secondary_recipient.IsFemale, 'пропала', 'пропал' )].\n\nКакое-то время мы думали, что [secondary_recipient.Custom('polite_gender_ref')] [Select_CString(secondary_recipient.IsFemale, 'исчезла', 'исчез' )] или даже [Select_CString(secondary_recipient.IsFemale, 'была похищена', 'был похищен' )]! [secondary_recipient.GetHerHis|U] не было в [secondary_recipient.GetHerHis] спальне, не было в большом зале. Даже [secondary_recipient.GetHerHis] собственные слуги были озадачены. Был собран поисковый отряд.\n\nЗатем, после того как все в панике искали больше часа, одна из моих служанок наткнулась на н[secondary_recipient.GetHerHis] в кабинете. [secondary_recipient.GetSheHe|U], по-видимому, [Select_CString(secondary_recipient.IsFemale, 'укрылась', 'укрылся' )] там, чтобы спрятаться после стресса от встречи с множеством незнакомцев, не подозревая, что [secondary_recipient.GetHerHis] уже обыскались.\n\n[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'была', 'был' )] крайне не [Select_CString(secondary_actor.IsFemale, 'впечатлена', 'впечатлён' )]."
 lmf_interaction.1315.a: "По правде говоря, я тоже."

 lmf_interaction.1316.t: "Испорченный ужин"
 lmf_interaction.1316.desc.start: "После того как [secondary_recipient.GetTitledFirstNameNoTooltip] и [secondary_recipient.GetHerHis] свита устроились на ночь, я [Select_CString(ROOT.Char.IsFemale, 'устроила', 'устроил' )] небольшой ужин в большом зале. Возможность, [Select_CString(ROOT.Char.IsFemale, 'подумала', 'подумал' )] я, чтобы [secondary_actor.GetFirstNameNoTooltip] и [secondary_recipient.Custom('polite_gender_ref')] могли заранее поговорить перед более формальным знакомством.\n\nВсё пошло не так.\n\n"
 lmf_interaction.1316.desc.gluttonous: "[secondary_recipient.GetTitledFirstNameNoTooltip] не [Select_CString(secondary_recipient.IsFemale, 'говорила', 'говорил' )], ни с [Select_CString(secondary_actor.IsFemale, 'ней', 'ним' )], и ни с кем-либо. [secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'заботилась', 'заботился' )] только о еде и [Select_CString(secondary_recipient.IsFemale, 'сгребала', 'сгребал' )] в рот всё, что касалось [secondary_recipient.GetHerHis] тарелки. Любая попытка, когда [Select_CString(secondary_actor.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('secondary_actor'))] [Select_CString(secondary_actor.IsFemale, 'пытался', 'пытался' )] завести с [Select_CString(secondary_recipient.IsFemale, 'ней', 'ним' )] разговор, встречала невнятное бормотание, едва слышимое между чавканьем.\n\n"
 lmf_interaction.1316.desc.paranoid: "[secondary_recipient.GetTitledFirstNameNoTooltip] явно не [Select_CString(secondary_recipient.IsFemale, 'хотела', 'хотел' )] там быть. [secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'вздрагивала', 'вздрагивал' )] при обращении, не [Select_CString(secondary_recipient.IsFemale, 'сводила', 'сводил' )] глаз со всех дверей и подозрительно [Select_CString(secondary_recipient.IsFemale, 'хмурилась', 'хмурился' )], когда приближались слуги. Можно подумать, мы замышляли убить [secondary_recipient.GetHerHis]! Даже [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'получила', 'получил' )] лишь пустые взгляды при попытке взаимодействия.\n\n"
 lmf_interaction.1316.desc.lazy: "[secondary_recipient.GetTitledFirstNameNoTooltip] явно не [Select_CString(secondary_recipient.IsFemale, 'хотела', 'хотел' )] там быть. [secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'опоздала', 'опоздал' )], зевая и едва [Select_CString(secondary_recipient.IsFemale, 'одета', 'одетый')] для представления, и большую часть ужина невнимательно [Select_CString(secondary_recipient.IsFemale, 'ковырялась', 'ковырялся' )] в еде и [Select_CString(secondary_recipient.IsFemale, 'зевала', 'зевал' )]. Когда [secondary_actor.GetFirstNameNoTooltip] прямо [Select_CString(secondary_actor.IsFemale, 'спросила', 'спросил' )], утомил ли [secondary_recipient.GetHerHis] путь, [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'получила', 'получил' )] ответ «не особо», и на том всё закончилось.\n\n"
 lmf_interaction.1316.desc.fallthrough: "[secondary_recipient.GetTitledFirstNameNoTooltip], казалось, [Select_CString(secondary_recipient.IsFemale, 'старалась', 'старался' )] изо всех сил поддержать беседу, но [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была неловкой', 'был неловким' )] и явно [Select_CString(secondary_recipient.IsFemale, 'чувствовала', 'чувствовал' )] себя некомфортно. Возможно, [secondary_recipient.GetSheHe] просто не в своей тарелке или [Select_CString(secondary_recipient.IsFemale, 'измотана', 'измотан' )] путешествием? Так или иначе, ужин был мучительным, и явное облегчение, которое [Select_CString(secondary_recipient.IsFemale, 'изобразила', 'изобразил' )] на своём лице [secondary_recipient.Custom('polite_gender_ref')], когда [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'извинилась', 'извинился' )], мало помогло.\n\n"
 lmf_interaction.1316.desc.end: "Будем надеяться, что знакомство завтра всё исправит, ибо начало было неудачным."
 lmf_interaction.1316.a: "Могло бы пройти и лучше."

 lmf_interaction.1317.t: "Хорошее впечатление"
 lmf_interaction.1317.desc.start: "После того как [secondary_recipient.GetTitledFirstNameNoTooltip] и [secondary_recipient.GetHerHis] свита устроились на ночь, я [Select_CString(ROOT.Char.IsFemale, 'устроила', 'устроил' )] небольшой ужин в большом зале. Возможность, [Select_CString(ROOT.Char.IsFemale, 'подумала', 'подумал' )] я, чтобы [secondary_actor.GetFirstNameNoTooltip] и [secondary_recipient.Custom('polite_gender_ref')] могли поговорить перед более формальным знакомством.\n\nВсё прошло лучше, чем я [Select_CString(ROOT.Char.IsFemale, 'надеялась', 'надеялся' )].\n\n"
 lmf_interaction.1317.desc.gregarious: "[secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] в центре внимания с момента, как [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'вошла', 'вошёл' )] в большой зал. Всё - [secondary_recipient.GetHerHis] улыбка, [secondary_recipient.GetHerHis] смех, [secondary_recipient.GetHerHis] манера внимательно слушать... всё это значительно разрядило атмосферу. Даже [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'ловила', 'ловил' )] себя на смехе.\n\n"
 lmf_interaction.1317.desc.diligent: "[secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] воплощением достоинства и манер, [Select_CString(secondary_recipient.IsFemale, 'старалась', 'старался')] вовлечь каждого в беседу и внимательно слушая говорящих. Было трудно не почувствовать себя вовлечёнными, когда [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'обращала', 'обращал' )] на вас внимание. Даже [secondary_actor.GetFirstNameNoTooltip] явно [Select_CString(secondary_actor.IsFemale, 'поддалась', 'поддался' )] обаянию, когда [secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'вовлекла', 'вовлёк' )] [secondary_actor.GetHerHis] в легкую беседу, к восторгу стола.\n\n"
 lmf_interaction.1317.desc.temperate: "[secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] воплощением манер и умеренности. [secondary_recipient.GetSheHe|U] не [Select_CString(secondary_recipient.IsFemale, 'злоупотребляла', 'злоупотреблял' )] выпивкой, [Select_CString(secondary_recipient.IsFemale, 'ела', 'ел' )] лишь небольшую порцию, но [Select_CString(secondary_recipient.IsFemale, 'делала', 'делал' )] это с такой грацией, что никто не чувствовал себя обжорой. Даже если найдутся те, кто смотрит свысока на [Select_CString(secondary_recipient.IsFemale, 'девушку, которая', 'юношу, который' )] не пьёт, [secondary_actor.GetFirstNameNoTooltip] определённо [Select_CString(secondary_actor.IsFemale, 'заметила', 'заметил' )]... и [Select_CString(secondary_actor.IsFemale, 'одобрила', 'одобрил' )].\n\n"
 lmf_interaction.1317.desc.fallthrough: "Не [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], как обычно [secondary_recipient.GetTitledFirstNameNoTooltip] ведёт себя на таких мероприятиях, но сегодня [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] в прекрасном расположении духа. [Select_CString(secondary_recipient.IsFemale, 'Смеялась и шутила', 'Смеялся и шутил' )] со всеми, [Select_CString(secondary_recipient.IsFemale, 'чувствовала', 'чувствовал' )] себя непринуждённо вдали от дома. [secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'превратила', 'превратил' )] то, что могло быть тихим неловким ужином, в восхитительное событие, и казалось, будто [secondary_recipient.GetSheHe] уже часть семьи. Что важнее, [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'заметила', 'заметил' )]... и [Select_CString(secondary_actor.IsFemale, 'одобрила', 'одобрил' )].\n\n"
 lmf_interaction.1317.desc.end: "Будем надеяться, этот импульс сохранится до завтрашнего знакомства."
 lmf_interaction.1317.a: "Это было превосходное начало."

 lmf_interaction.1318.t: "Завоёвывая моё расположение"
 lmf_interaction.1318.desc: "В стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] было тихо после того, как [secondary_recipient.GetTitledFirstNameNoTooltip] и [secondary_recipient.GetHerHis] свита устроились на ночь. Я [Select_CString(ROOT.Char.IsFemale, 'пригласила', 'пригласил' )] [secondary_recipient.GetHerHis] в свои покои на скромный ужин, надеясь, что [secondary_recipient.GetSheHe] и [secondary_actor.GetFirstNameNoTooltip] смогут поговорить наедине без сотен глаз.\n\nВместо этого, однако, получилось, что говорили в основном [secondary_recipient.GetTitledFirstNameNoTooltip] и я!\n\nМы приятно беседовали за выпивкой, и не [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел' )] я опомниться, как уже [Select_CString(ROOT.Char.IsFemale, 'смеялась', 'смеялся' )] над шутками, которые [Select_CString(secondary_recipient.IsFemale, 'отпускала', 'отпускал' )] [secondary_recipient.Custom('polite_gender_ref')] и [Select_CString(ROOT.Char.IsFemale, 'рассказывала', 'рассказывал' )] свои. Возможно, [secondary_recipient.GetSheHe] просто [Select_CString(secondary_recipient.IsFemale, 'пыталась', 'пытался' )] снискать мою благосклонность как [Select_CString(ROOT.Char.IsFemale, 'той', 'того' )], кто решает судьбу брака, но это не так ощущалось. Мы просто прекрасно ладили!\n\n[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'покинула', 'покинул' )] ужин рано, [Select_CString(secondary_actor.IsFemale, 'скучающая и незамеченная', 'скучающий и незамеченный' )]."
 lmf_interaction.1318.a: "Прекрасный вечер!"
 got_along_at_introduction: "[CHARACTER.GetShortUIName] и [TARGET_CHARACTER.GetShortUIName] сблизились во время визита для знакомства перед браком [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )]."
 got_along_at_introduction_corresponding: "[TARGET_CHARACTER.GetShortUIName] и [CHARACTER.GetShortUIName] сблизились во время визита для знакомства перед браком [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )]."

 lmf_interaction.1319.t: "Игры с мечами"
 lmf_interaction.1319.desc.start: "После того как [secondary_recipient.GetTitledFirstNameNoTooltip] и [secondary_recipient.GetHerHis] свита устроились на ночь, мне сообщили, что [secondary_recipient.GetSheHe] быстро [Select_CString(secondary_recipient.IsFemale, 'направилась', 'направился' )] в казармы, где устроились мои [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')], чтобы провести время в спаррингах.\n\nНеобычно, возможно, но [secondary_recipient.GetTitledFirstNameNoTooltip] просто чувствует себя комфортнее размахивая мечом, чем играя роль [Select_CString(secondary_recipient.IsFemale, 'придворной', 'придворного' )] в поисках [Select_CString(secondary_actor.IsFemale, 'жены', 'мужа' )].\n\nЧто важнее, [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'услышала', 'услышал' )] новости так же, как и я, и [Select_CString(secondary_actor.IsFemale, 'спустилась', 'спустился' )] в арсенал, чтобы лично увидеть зрелище. "
 lmf_interaction.1319.desc.impressed: "Видимо, [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'была восхищена', 'был восхищён' )] демонстрацией, которую [Select_CString(secondary_recipient.IsFemale, 'устроила', 'устроил' )] [secondary_recipient.GetTitledFirstNameNoTooltip], [Select_CString(secondary_actor.IsFemale, 'подбадривала', 'подбадривал' )] [secondary_recipient.GetHerHis] с трибун и [Select_CString(secondary_actor.IsFemale, 'осыпала', 'осыпал' )] похвалами после каждой победы."
 lmf_interaction.1319.desc.unimpressed: "Видимо, [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'была', 'был' )] не [Select_CString(secondary_actor.IsFemale, 'впечатлена', 'впечатлён' )] демонстрацией, которую [Select_CString(secondary_recipient.IsFemale, 'устроила', 'устроил' )] [secondary_recipient.GetTitledFirstNameNoTooltip], особенно когда [Select_CString(secondary_actor.IsFemale, 'попыталась', 'попытался')] завязать разговор с [Select_CString(secondary_recipient.IsFemale, 'женщиной', 'мужчиной' )], но [Select_CString(secondary_actor.IsFemale, 'была', 'был' )] грубо [Select_CString(secondary_actor.IsFemale, 'отвергнута', 'отвергнут' )]. После чего [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'развернулась и ушла', 'развернулся и ушёл' )]."
 lmf_interaction.1319.a: "Что ж, по крайней мере [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'была впечатлена', 'был впечатлён' )]."
 lmf_interaction.1319.b: "Не самое удачное начало."

 lmf_interaction.1320.t: "Неожиданный поединок"
 lmf_interaction.1320.desc: "После того как [secondary_recipient.GetTitledFirstNameNoTooltip] и [secondary_recipient.GetHerHis] свита устроились на ночь, я [Select_CString(ROOT.Char.IsFemale, 'была уверена', 'был уверен')], что вечер будет тихим. Однако все было иначе.\n\nПока большая часть [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] спала, [secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'спустилась', 'спустился' )] в казармы, где расположились мои [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]... вероятно, чтобы выпивать и играть в азартные игры, хотя они это отрицают.\n\nВ какой-то момент [secondary_recipient.Custom('polite_gender_ref')] и [your_courtier.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] начали игру. Прозвучало обвинение в жульничестве, ситуация вышла из-под контроля, и неожиданно был объявлен поединок.\n\nТо, что это происходило без моего ведома, было плохо само по себе, но [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'прознала', 'прознал')] о поединке и [Select_CString(secondary_actor.IsFemale, 'прибежала', 'прибежал')] посмотреть, на что [Select_CString(secondary_recipient.IsFemale, 'способна', 'способен')] [secondary_recipient.GetHerHis] [Select_CString(secondary_recipient.IsFemale, 'потенциальная будущая', 'потенциальный будущий')] [secondary_recipient.GetWifeHusband]."
 lmf_interaction.1320.a: "Думаю, могло быть и хуже..."
 lmf_interaction.1320.a.win.tt: "[secondary_recipient.GetTitledFirstNameNoTooltip] выигрывает поединок"
 lmf_interaction.1320.a.lose.tt: "[secondary_recipient.GetTitledFirstNameNoTooltip] проигрывает поединок"

 lmf_interaction.1321.t: "Тоска по дому"
 lmf_interaction.1321.desc: "После того как [secondary_recipient.GetTitledFirstNameNoTooltip] и [secondary_recipient.GetHerHis] свита разместились в своих комнатах, ночь была тихой. Я [Select_CString(ROOT.Char.IsFemale, 'предполагала', 'предполагал')], что на этом все закончится.\n\nВместо этого я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил')] сообщение от слуги [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')]: [secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'заперлась', 'заперся')] в своих покоях, [Select_CString(secondary_recipient.IsFemale, 'неутешная', 'неутешный')] и в слезах.\n\nМне пришлось лично спуститься и успокаивать [secondary_recipient.GetHerHis] через дверь, пока [secondary_recipient.Custom('polite_gender_ref')] наконец не [Select_CString(secondary_recipient.IsFemale, 'впустила', 'впустил')] меня.\n\nОказалось, [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'тосковала', 'тосковал')] по дому. Всего лишь. Я [Select_CString(ROOT.Char.IsFemale, 'должна была', 'должен был' )] напомнить себе, что [secondary_recipient.GetTitledFirstNameNoTooltip] всё ещё ребенок, и быть [Select_CString(ROOT.Char.IsFemale, 'благодарной', 'благодарным')], что [secondary_actor.GetFirstNameNoTooltip] не [Select_CString(secondary_actor.IsFemale, 'видела', 'видел')] этого."
 lmf_interaction.1321.a: "Как неловко для н[secondary_recipient.GetHerHis]."

 intro_planned_activity_hunting: "провести день на охоте"
 intro_planned_activity_hike: "провести день в длительном походе"
 intro_planned_activity_garrison: "продемонстрировать своё мастерство владения мечом"
 intro_planned_activity_seduction: "провести день в тесной компании"
 intro_planned_activity_poetry: "продемонстрировать свой поэтический талант"
 intro_planned_activity_library: "провести день в библиотеке"
 intro_planned_activity_church: "посетить [ROOT.GetCharacter.GetFaith.HouseOfWorship|l] и провести там день"
 intro_planned_activity_tavern: "покинуть [ROOT.GetCharacter.Custom('FortifiedBuilding')] и исследовать ближайшую деревню"
 intro_planned_activity_poor: "провести день, помогая бедным"
 intro_planned_activity_tour: "провести день, осматривая владения, что окружают [ROOT.GetCharacter.Custom('FortifiedBuilding')]"
 intro_planned_activity_garden: "провести день в садах, что окружают [ROOT.GetCharacter.Custom('FortifiedBuilding')]"

 lmf_interaction.1325.t: "Следующий день"
 lmf_interaction.1325.t.same: "Потенциальная пара"
 lmf_interaction.1325.desc.same.actor.start: "Трудно назвать это настоящим «знакомством», учитывая что [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))] является частью моего двора здесь, во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], но мы всё же соблюдаем формальности.\n\n"
 lmf_interaction.1325.desc.same.actor.willnotwed: "[secondary_recipient.GetSheHe|U] кажется довольно [Select_CString(secondary_recipient.IsFemale, 'нервной', 'нервным')], когда [secondary_recipient.GetSheHe] предстаёт передо мной в тронном зале. [secondary_recipient.GetSheHe|U] ведь довольно громко [Select_CString(secondary_recipient.IsFemale, 'заявляла', 'заявлял')], что [secondary_recipient.GetSheHe] не [Select_CString(secondary_recipient.IsFemale, 'выйдет замуж', 'женится' )] ни на ком, кто не соответствует [secondary_recipient.GetHerHis] ожиданиям... а у меня есть власть проигнорировать эти желания. Но зачем мне этот ритуал, если я [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )] бы так поступить?\n\n"
 lmf_interaction.1325.desc.same.actor: "[secondary_recipient.GetSheHe|U] кажется довольно [Select_CString(secondary_recipient.IsFemale, 'нервной', 'нервным')], когда [secondary_recipient.GetSheHe] предстает передо мной в тронном зале. Ведь именно я решу, состоится ли [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l], независимо от того, какие чувства мы испытываем друг к другу в конце дня. Но если бы я [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )] бы, чтобы я и [secondary_recipient.GetFirstNameNoTooltip] вступили в брак без учёта совместимости, разве я уже не [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )] бы это?\n\n"
 lmf_interaction.1325.desc.same.actor.end: "Итак, я беру [secondary_recipient.GetHerHis] за руку и веду [secondary_recipient.GetHerHis] прочь. Пока мы беседуем, я планирую [secondary_actor.Custom('lmf_intro_planned_activity')]. Несмотря на то что весь двор наблюдает за нами, мы постараемся насладиться временем."
 lmf_interaction.1325.desc.same.start: "Трудно назвать это настоящим «знакомством», учитывая что [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))] проживает здесь, во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Но суть в том, что они проведут день, определяя свою совместимость... "
 lmf_interaction.1325.desc.same.both.willnotwed: "ведь и [secondary_recipient.GetSheHe], и [secondary_actor.GetFirstNameNoTooltip] поклялись вступить в брак с теми, кого выберут сами, и если бы я [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )] игнорировать их желания, в этом не было бы нужды.\n\n"
 lmf_interaction.1325.desc.same.secact.willnotwed: "ведь если бы я [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )] игнорировать то, что [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'выразила желание выйти замуж только за мужчину, который ей', 'выразил желание жениться только на женщине, которая ему')] понравится, в этом не было бы нужды.\n\n"
 lmf_interaction.1325.desc.same.secrec.willnotwed: "ведь если бы я [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )] игнорировать то, что [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'выразила желание выйти замуж только за мужчину, который ей', 'выразил желание жениться только на женщине, которая ему')] понравится, в этом не было бы нужды.\n\n"
 lmf_interaction.1325.desc.same: "ведь если бы я [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )] поженить их без этого, я бы так и [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )].\n\n"
 lmf_interaction.1325.desc.same.end: "Оба сохраняют спокойные лица перед собравшимся двором, тщательно скрывая истинные мысли. Затем [secondary_actor.GetFirstNameNoTooltip] и [secondary_recipient.GetTitledFirstNameNoTooltip] берут друг друга за руки и выходят из зала. Судя по всему, они планируют [secondary_actor.Custom('lmf_intro_planned_activity')].\n\nЗнакомство начинается."
 lmf_interaction.1325.desc.secrec.start: "Когда наступает утро, я являюсь в тронный зал, [Select_CString(ROOT.Char.IsFemale, 'принаряжённая и готовая', 'принаряжённый и готовая')] к тому, что я и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_actor'))] проведём этот день вместе.\n\nПризнаюсь, я нервничаю. Даже если бы мое будущее не решалось сейчас, на меня смотрит весь двор. Кто бы не потел под таким давлением?\n\nВсе же я сохраняю нейтральное выражение лица.\n\n"
 lmf_interaction.1325.desc.start: "С наступлением утра [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))] предстаёт в тронном зале, [Select_CString(secondary_recipient.IsFemale, 'принаряженная и готовая', 'принаряжённый и готовый')] к тому, что [secondary_recipient.GetSheHe] и [Select_CString( secondary_actor.IsLocalPlayer, 'я', secondary_actor.GetFirstNameNoTooltip )] [Select_CString( secondary_actor.IsLocalPlayer, 'проведёт', 'проведут')] день вместе.\n\n[secondary_recipient.GetSheHe|U] кажется [Select_CString(secondary_recipient.IsFemale, 'нервной', 'нервным')], что понятно, учитывая, что на [Select_CString(secondary_recipient.IsFemale, 'неё', 'него')] смотрит весь двор. Если у [Select_CString(secondary_recipient.IsFemale, 'неё', 'него')] и есть сомнения, то [secondary_recipient.GetSheHe] хотя бы достаточно [Select_CString(secondary_recipient.IsFemale, 'тактична', 'тактичен')], чтобы не дать им проявиться.\n\n"
 lmf_interaction.1325.desc.actor: "Что касается меня, то сомневаюсь, что мое выражение лица столь же бесстрастно. И все же я не могу сказать, что [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )] в том, чем закончится этот день, больше, чем [secondary_recipient.GetSheHe].\n\n"
 lmf_interaction.1325.desc.secact.disapprove: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_actor'))], в свою очередь, гораздо менее [Select_CString(secondary_actor.IsFemale, 'сдержана', 'сдержан' )] в выражении [secondary_actor.GetHerHis] мнения. С того самого момента, как [Select_CString( secondary_recipient.IsLocalPlayer, 'я', secondary_recipient.GetSheHe )] [Select_CString(secondary_recipient.IsFemale, 'появилась', 'появился' )], [secondary_actor.GetSheHe] не переставая хмуро [Select_CString(secondary_actor.IsFemale, 'смотрела', 'смотрел' )] на [Select_CString( secondary_recipient.IsLocalPlayer, 'меня', secondary_recipient.GetFirstNameNoTooltip )].\n\n" #проверить 
 lmf_interaction.1325.desc.secact: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_actor'))], в свою очередь, гораздо менее [Select_CString(secondary_actor.IsFemale, 'сдержана', 'сдержан' )] в выражении [secondary_actor.GetHerHis] мнения. С того самого момента, как [Select_CString( secondary_recipient.IsLocalPlayer, 'я', secondary_recipient.GetSheHe )] [Select_CString(secondary_recipient.IsFemale, 'появилась', 'появился' )], [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'сияла', 'сиял' )], глядя на [Select_CString( secondary_recipient.IsLocalPlayer, 'меня', secondary_recipient.GetFirstNameNoTooltip )], явно стремясь поскорее начать день.\n\n" #проверить
 lmf_interaction.1325.desc.end: "Пока двор наблюдает, [Select_CString( secondary_actor.IsLocalPlayer, 'я', secondary_actor.GetFirstNameNoTooltip )] [Select_CString( secondary_actor.IsLocalPlayer, 'выхожу вперёд и вывожу', 'выходит вперед и выводит')] [Select_CString( secondary_recipient.IsLocalPlayer, 'меня', secondary_recipient.GetHerHis )] из зала. [Select_CString( secondary_actor.IsLocalPlayer, 'Вы', 'Судя по всему, ' )][Select_CString( secondary_actor.IsLocalPlayer, '', secondary_actor.GetSheHe)] [Select_CString( secondary_actor.IsLocalPlayer, 'планируете', 'планирует')] [secondary_actor.Custom('lmf_intro_planned_activity')].\n\nПредставление вот-вот начнётся." #Мофф, тесты нужны
 lmf_interaction.1325.a: "Посмотрим, что из этого выйдет."
 lmf_interaction.1325.a.tt: "[secondary_actor.GetShortUIName|U] и [secondary_recipient.GetShortUIName] проведут день, знакомясь ближе" 
 lmf_interaction.1325.a.secrec.charmed: "[secondary_recipient.GetTitledFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'очарована', 'очарован' )] персонажем [secondary_actor.GetFirstNameNoTooltip]"
 lmf_interaction.1325.a.secrec.notcharmed: "[secondary_actor.GetFirstNameNoTooltip] не [Select_CString(secondary_actor.IsFemale, 'произвела', 'произвёл' )] хорошего впечатления"
 lmf_interaction.1325.a.secact.charmed: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'очарована', 'очарован' )] персонажем [secondary_recipient.GetTitledFirstNameNoTooltip]"
 lmf_interaction.1325.a.secact.notcharmed: "[secondary_recipient.GetTitledFirstNameNoTooltip] не [Select_CString(secondary_recipient.IsFemale, 'произвела', 'произвёл' )] хорошего впечатления"

