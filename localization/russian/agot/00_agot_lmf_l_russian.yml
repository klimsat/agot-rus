 lmf_interaction.0004.desc: "[Select_CString(disinherited_betrothed.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinherited_betrothed'))] [Select_CString(disinherited_betrothed.IsFemale, 'принесла', 'принёс' )] тревожные вести: [disinherited_character.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinheritor'))] [disinherited_betrothed.GetHerHis] [Select_CString(disinherited_character.IsFemale, 'невесты', 'жениха' )] [disinheritor.GetTitledFirstName] [Select_CString(disinheritor.IsFemale, 'лишила', 'лишил' )] [disinherited_character.GetHerHis] наследства! Это нарушает наши договорённости о [disinherited_character.GetHerHis] будущем."
