 lmf_interaction.0004.b: "Уже поздно. Помолвка останется в силе."

 lmf_interaction.0005.opening: "[betrothed_liege.Custom2('GreetingToForeignRulerNegative', ROOT.Char )],"
 lmf_interaction.0005.desc: "[Select_CString(disinherited_character.IsFemale, 'Ваш', 'Ваша' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinherited_character'))] [Select_CString(disinherited_character.IsFemale, 'лишена', 'лишён' )] наследства, и это подрывает наши договорённости о [disinherited_character.GetHerHis] будущем и жизни, которую [Select_CString(disinherited_character.IsFemale, 'она', 'он' )] и [Select_CString(disinherited_betrothed.IsFemale, 'моя', 'мой' )] [betrothed_liege.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinherited_betrothed'))] должны были прожить. Поэтому помолвка, которой были связаны [disinherited_character.GetSheHe] и [disinherited_betrothed.GetTitledFirstName], аннулируется."
 lmf_interaction.0005.a: "Что ж, не [Select_CString(ROOT.Char.IsFemale, 'удивлена', 'удивлен' )]."

