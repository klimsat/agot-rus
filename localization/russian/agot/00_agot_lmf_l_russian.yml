 trait_will_not_wed: "Отказ от брака"
 trait_will_not_wed_desc: "Хотя этот персонаж не имеет иных ограничений на вступление в брак, он отказывается от брака — по крайней мере, в настоящее время."
 trait_will_not_wed_character_desc: "Хотя [ROOT.GetCharacter.GetFirstNameNoTooltip] не имеет иных ограничений на вступление в брак, [Select_CString(ROOT.GetCharacter.IsFemale, 'она предпочитает не выходить замуж', 'он предпочитает не жениться')] — по крайней мере, в настоящее время.\n\n#help Это может быть отменено сюзереном персонажа [ROOT.GetCharacter.GetFirstNameNoTooltip] через взаимодействие «Настоять на браке», хотя [ROOT.GetCharacter.GetSheHe] этому [Select_CString(ROOT.GetCharacter.IsFemale, 'рада', 'рад')] не будет.#!"
 trait_seclusion: "В уединении"
 trait_seclusion_desc: "Этот персонаж в настоящее время находится в полном уединении и не видится ни с кем, кроме личных слуг. Может, он болен? Никто, кажется, не знает."
 trait_maiden: "Дева на выданье"
 trait_maiden_desc: "Эта молодая женщина из незначительной дворянской семьи была отправлена ко двору в надежде найти мужа. Если она его не найдёт, то в конце концов вернётся домой."
 trait_broke_vows: "[Select_CString(ROOT.GetCharacter.IsFemale, 'Нарушительница', 'Нарушитель')] обетов"
 trait_broke_vows_desc: "Этот персонаж нарушил свои обеты, вернувшись к светской жизни с пятном, которое останется с ним до конца его дней."
 trait_heir_in_training: "[Select_CString(ROOT.GetCharacter.IsFemale, 'Наследница', 'Наследник')] в обучении"
 trait_heir_in_training_desc: "Этот персонаж в настоящее время [Concept('lmf_heir_training', 'учится')|E] у своего сюзерена."
 trait_heir_in_training_noliege_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] [Select_CString(ROOT.GetCharacter.IsFemale, 'получила', 'получил')] некоторое [Concept('lmf_heir_training', 'обучение')|E], но оно ещё не завершено.\n\n#X (Прогресс в получении свойства «[GetTrait('education_heir_training_1').GetName( GetNullCharacter )]»: [Character.MakeScope.ScriptValue('heir_training_progress_value')|0]%) #!"
 trait_heir_in_training_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] [Concept('lmf_heir_training', 'учится')|E]. Наставник - [ROOT.GetCharacter.GetHerHis] [ROOT.GetCharacter.Custom2('LMF_RelationToMeShort', ROOT.GetCharacter.GetLiege )], [ROOT.GetCharacter.GetLiege.GetTitledFirstName].\n\n#help (Прогресс в получении свойства «[GetTrait('education_heir_training_1').GetName( GetNullCharacter )]»: [Character.MakeScope.ScriptValue('heir_training_progress_value')|0]%) #!"
 trait_education_heir_training: "[Select_CString(ROOT.GetCharacter.IsFemale, 'Обученная наследница', 'Обученный наследник')]"
 trait_education_heir_training_1: "[Select_CString(ROOT.GetCharacter.IsFemale, 'Подготовленная наследница', 'Подготовленный наследник')]"
 trait_education_heir_training_1_desc: "Этот персонаж был обучен искусству государственного управления и подготовлен к тому, чтобы стать правителем."
 trait_education_heir_training_1_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] [Select_CString(ROOT.GetCharacter.IsFemale, 'была обучена', 'был обучен')] искусству государственного управления и [Select_CString(ROOT.GetCharacter.IsFemale, 'подготовлена', 'подготовлен')] к тому, чтобы стать [Select_CString(ROOT.GetCharacter.IsFemale, 'правительницей', 'правителем')].[AddLocalizationIf( Not( ROOT.GetCharacter.IsRuler ), 'heir_training_progress_tt' )]"
 trait_education_heir_training_2: "Тщательно [Select_CString(ROOT.GetCharacter.IsFemale, 'подготовленная наследница', 'подготовленный наследник')]"
 trait_education_heir_training_2_desc: "Этот персонаж прошёл значительную подготовку в искусстве государственного управления и готов стать правителем."
 trait_education_heir_training_2_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] [Select_CString(ROOT.GetCharacter.IsFemale, 'прошла', 'прошёл')] значительную подготовку в искусстве государственного управления и [Select_CString(ROOT.GetCharacter.IsFemale, 'готова', 'готов')] стать [Select_CString(ROOT.GetCharacter.IsFemale, 'правительницей', 'правителем')].[AddLocalizationIf( Not( ROOT.GetCharacter.IsRuler ), 'heir_training_progress_tt' )]"
 trait_education_heir_training_3: "Весьма [Select_CString(ROOT.GetCharacter.IsFemale, 'подготовленная наследница', 'подготовленный наследник')]"
 trait_education_heir_training_3_desc: "Этот персонаж провёл много времени, готовясь к правлению и изучая искусство государственного управления."
 trait_education_heir_training_3_character_desc:2 "[ROOT.GetCharacter.GetFirstNameNoTooltip] [Select_CString(ROOT.GetCharacter.IsFemale, 'провела', 'провёл')] много времени, готовясь к правлению и изучая искусство государственного управления.[AddLocalizationIf( Not( ROOT.GetCharacter.IsRuler ), 'heir_training_progress_tt' )]"
 trait_education_heir_training_4: "Исключительно [Select_CString(ROOT.GetCharacter.IsFemale, 'подготовленная наследница', 'подготовленный наследник')]"
 trait_education_heir_training_4_desc: "Этот персонаж провёл много лет при дворе, готовясь к правлению и изучая искусство государственного управления, — вероятно, дольше, чем он когда-либо будет править."
 trait_education_heir_training_4_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] [Select_CString(ROOT.GetCharacter.IsFemale, 'провела', 'провёл')] много лет при дворе, готовясь к правлению и изучая искусство государственного управления, — вероятно, дольше, чем [ROOT.GetCharacter.GetSheHe] когда-либо будет править."
 heir_training_progress_tt: "\n\n#help (Прогресс до следующего уровня: [Character.MakeScope.ScriptValue('heir_training_progress_value')|0]%) #!"
 game_concept_lmf_heir_training: "Обучение наследника"
 game_concept_lmf_heir_training_desc: "Начиная с 12 лет, [Concept('player_heir', 'наследник')|E] правителя получает свойство «[GetTrait('heir_in_training').GetName( GetNullCharacter )]» и начинает своё обучение искусству правления и государственного управления:\n\n$EFFECT_LIST_BULLET$Это обучение требует, чтобы наследник находился при [Concept('court', 'дворе')|E] правителя, и обучение будет продвигаться ежегодно, пока и наследник, и его [Concept('guardian', 'опекун')|E] (или его [Concept('liege', 'сюзерен')|E], когда наследник станет взрослым) доступны и здоровы.\n\n$EFFECT_LIST_BULLET$Скорость продвижения зависит от [Concept('learning', 'учёности')|E] как наследника, так и его опекуна/сюзерена, возраста наследника (обучение замедляется по мере взросления) и изменяется под влиянием различных факторов, таких как интеллект, усердие и терпение.\n\n$EFFECT_LIST_BULLET$Как только наследник достигает свойства «[GetTrait('education_heir_training_1').GetName( GetNullCharacter )]», он считается «обученным», и это свойство сохранится даже после получения им титула. Если обучение продолжится, свойство может в конечном итоге развиться до «[GetTrait('education_heir_training_4').GetName( GetNullCharacter )]».\n\n$EFFECT_LIST_BULLET$Обучение прекращается в тот момент, когда наследник покидает двор своего сюзерена, например, при получении титула."
 game_concept_lmf_lover_rating: "Рейтинг любовника"
 game_concept_lmf_lover_rating_desc: "Каждый раз, когда персонаж становится вашим [Concept('lover', 'любовником')|E] или [Concept('soulmate', 'родственной душой')|E], ваши отношения получают рейтинг, который указывает на интенсивность ваших чувств. Это сильно влияет на тип событий, связанных с любовником, которые вы получаете.\n\nЭтот рейтинг со временем будет повышаться и понижаться, хотя для его повышения потребуются время и усилия.\n\nРейтинги в порядке от высшего к низшему:\n\n$EFFECT_LIST_BULLET$#difficulty_hard Обожание#!: начальный рейтинг для [Concept('soulmate', 'родственной души')|E], при этом рейтинге [Concept('lover', 'любовник')|E] может стать [Concept('soulmate', 'родственной душой')|E]\n$EFFECT_LIST_BULLET$#difficulty_hard Неизменная любовь#!\n$EFFECT_LIST_BULLET$#difficulty_hard Любовь#!: начальный рейтинг для [Concept('lover', 'любовника')|E], при этом рейтинге [Concept('soulmate', 'родственная душа')|E] может стать [Concept('lover', 'любовником')|E]\n$EFFECT_LIST_BULLET$#difficulty_hard Привязанность#!: [Concept('soulmate', 'родственная душа')|E] определённо станет [Concept('lover', 'любовником')|E]\n$EFFECT_LIST_BULLET$#difficulty_hard Угасающая любовь#!\n$EFFECT_LIST_BULLET$#difficulty_hard Утраченная любовь#!: при этом рейтинге отношения всегда заканчиваются"
 game_concept_lmf_relatives_by_marriage: "Родственники по браку"
 game_concept_good_mother: "Свекровь/Тёща"
 game_concept_good_father: "Свёкр/Тесть"
 game_concept_good_sister: "Золовка/свояченица"
 game_concept_good_brother: "Деверь/шурин"
 game_concept_good_son: "Зять"
 game_concept_good_daughter: "Сноха"
 game_concept_lmf_relatives_by_marriage_desc: "Родственники, приобретённые через [Concept('marriage', 'брак')|E], обычно обозначаются как «X-по-браку».\n\nНапример, #high мать-по-браку#! и #high отец-по-браку#! — это родители вашей [Concept('spouse', 'второй половинки')|E], а вы для них будете #high сын-по-браку#! или #high дочь-по-браку#!. Примечание переводчика: термины Мартина не имеют перевода на русский. #high В целях обеспечения безопасности и большей стабильности...#! В целях упрощения всё приведено в понятный вид."

 tutor_teach_languages: "Прямое обучение языкам"
 tutor_teach_languages_desc: "Этот персонаж отвечает за выбор языков для обучения членов вашей семьи без вашего непосредственного вмешательства."
 tutor_teach_languages_tt: "Обучение языкам членов вашей семьи при дворе будет проводиться автоматически.\n\nПри высоком уровне [Concept('aptitude', 'пригодности')|E] могут периодически появляться придворные с важными языками, которых вы не знаете."

