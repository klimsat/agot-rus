 lmf_lover.101.t: "Настало утро"
 lmf_lover.101.desc.start: "Я [Select_CString(ROOT.Char.IsFemale, 'проснулась', 'проснулся' )] в своих покоях во владении [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] после ночи, которую я и [lover.GetFirstNameNoTooltip] провели вместе, и [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [lover.GetSheHe] стоит неподалёку. [Select_CString(lover.IsFemale, 'Она', 'Он' )] смотрит в окно с озабоченным выражением лица, что удивительно, учитывая, насколько... усердны были [lover.GetHerHis] старания ранее.\n\nПосле нескольких осторожных вопросов я узнаю правду о [lover.GetHerHis] беспокойстве.\n\n"
 lmf_lover.101.desc.soulmate: "«Я обожаю тебя сильнее, чем могу выразить, любовь моя. Это правда, однако "
 lmf_lover.101.desc.lover: "«Я не испытываю несчастья из-за нашей... связи, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]. Совсем наоборот. Однако "
 lmf_lover.101.desc.samesex: "ты [Select_CString(ROOT.Char.IsFemale, 'женщина', 'мужчина' )], как и я. Наш союз запретен. "
 lmf_lover.101.desc.incest: "ты [Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [lover.Custom2('LMF_RelationToMeShort', ROOT.Char )]. Наш союз не просто невозможен, он запретен. "
 lmf_lover.101.desc.lover.married: "Я [Select_CString(lover.IsFemale, 'замужняя женщина', 'женатый мужчина' )]. [lover_spouse.GetFirstNameNoTooltip] не покидает мои мысли. "
 lmf_lover.101.desc.married: "ты [Select_CString(ROOT.Char.IsFemale, 'замужняя женщина', 'женатый мужчина' )], и [my_spouse.GetTitledFirstNameNoTooltip] не покидает мои мысли. "
 lmf_lover.101.desc.both.married: "мы оба состоим в браке. [lover_spouse.GetFirstNameNoTooltip] и [my_spouse.GetTitledFirstNameNoTooltip] не покидают мои мысли. "
 lmf_lover.101.desc.not.married: "мы не муж и жена. Я [Select_CString(lover.IsFemale, 'твоя любовница', 'твой любовник' )]. "
 lmf_lover.101.desc.ruler: "ты [Select_CString(ROOT.Char.IsFemale, 'правительница', 'правитель' )] державы [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], а я? Никто по сравнению с тобой. "
 lmf_lover.101.desc.nobility: "мы оба знаем разницу в нашем положении. Я всего лишь [Select_CString(lover.IsFemale, 'простолюдинка', 'простолюдин' )] по сравнению с тобой. "
 lmf_lover.101.desc.default: "но всё же... "
 lmf_lover.101.desc.secret: "Если кто-то узнает о нас...»\n\n"
 lmf_lover.101.desc.public: "То, что все уже знают о нас. То, как они смотрят...»\n\n"
 lmf_lover.101.desc.end: "Я [Select_CString(ROOT.Char.IsFemale, 'попыталась', 'попытался' )] успокоить [lover.GetHerHis], но тщетно. «Полагаю, мне просто нужно понять, что это значит», - [Select_CString(lover.IsFemale, 'вздохнула', 'вздохнул' )] [lover.GetSheHe]."
 lmf_lover.101.a: "«Я сделаю всё возможное, чтобы ты [Select_CString(lover.IsFemale, 'была счастлива', 'был счастлив' )]»."
 lmf_lover.101.b: "«Мы здесь ради собственного удовольствия»."
 lmf_lover.101.c: "«Ты и я созданы друг для друга»."
 lmf_lover.101.d: "«Тьфу! Почему это вообще что-то должно значить?»"
 lmf_lover_promise_tt: "#italic [lover.GetFirstNameNoTooltip] воспримет это как намёк на совместное будущее #!"
 lmf_lover_no_promise_tt: "#italic [lover.GetFirstNameNoTooltip] воспримет это как знак, что отношения несерьёзны #!"

 lmf_lover.102.t: "В садах"
 lmf_lover.102.desc.start: "Я и [lover.GetFirstNameNoTooltip] только что закончили наши утехи в укромном уголке сада, когда я [Select_CString(ROOT.Char.IsFemale, 'повернулась', 'повернулся' )] к н[lover.GetHerHim]. Я любуюсь [lover.GetHerHis] телом, с которого ещё не высох пот, и замечаю [lover.GetHerHis] насмешливую ухмылку, когда [lover.GetSheHe] видит, что я наблюдаю за [Select_CString(lover.IsFemale, 'ней', 'ним' )].\n\n«О чём думаешь, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]?» - спрашивает [lover.GetSheHe].\n\n«Интересно, к чему приведёт то, что между нами».\n\n[lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'усмехнулась', 'усмехнулся' )] из-за этого вопроса. «Почему это должно куда-то приводить? "
 lmf_lover.102.desc.married: "У тебя есть [Select_CString(my_spouse.IsFemale, 'жена', 'муж' )]. "
 lmf_lover.102.desc.theymarried: "У меня есть [Select_CString(lover_spouse.IsFemale, 'жена', 'муж' )]. "
 lmf_lover.102.desc.samesex: "Мы двое [Select_CString(ROOT.Char.IsFemale, 'женщин', 'мужчин' )], находящие удовольствие друг в друге. "
 lmf_lover.102.desc.incest: "Я [Select_CString(lover.IsFemale, 'твоя', 'твой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))]. "
 lmf_lover.102.desc.end: "Честно говоря, я [Select_CString(lover.IsFemale, 'удивлена', 'удивлён' )] лишь тому, что ты [Select_CString(ROOT.Char.IsFemale, 'захотела', 'захотел' )] продолжить это после нашей первой... ночи». [lover.GetSheHe|U] [Select_CString(lover.IsFemale, 'приподняла', 'приподнял' )] бровь. «Если ты хочешь чего-то большего... полагаю, тебе решать, не так ли?»"
 lmf_lover.102.a: "«Я сделаю всё возможное, чтобы ты [Select_CString(lover.IsFemale, 'была счастлива', 'был счастлив' )]»."
 lmf_lover.102.b: "«[Select_CString(ROOT.Char.IsFemale, 'Согласна', 'Согласен' )]. Мы здесь ради собственного удовольствия»."
 lmf_lover.102.c: "«Мы созданы друг для друга, веришь ты в это или нет»."
 lmf_lover.102.d: "«Ты [Select_CString(lover.IsFemale, 'права', 'прав' )]. Это ничего для меня не значит»."

 lmf_lover.103.t: "[Select_CString( lover.IsFemale, 'Моя прекрасная', 'Мой красивый' )] [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U]"
 lmf_lover.103.desc.start: "Я и [lover.GetFirstNameNoTooltip] только что закончили наши утехи и лежим в постели, когда я [Select_CString(ROOT.Char.IsFemale, 'повернулась', 'повернулся' )] к н[lover.GetHerHim]. Я любуюсь [lover.GetHerHis] телом, с которого ещё не высох пот, и замечаю насмешливую ухмылку, когда [lover.GetSheHe] видит, что я наблюдаю за [Select_CString(lover.IsFemale, 'ней', 'ним' )].\n\n«О чём думаешь, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]?» - спрашивает [lover.GetSheHe].\n\n«Ты [Select_CString(lover.IsFemale, 'счастлива', 'счастлив' )]? Со мной?»\n\nВопрос заставил [lover.GetHerHis] задуматься. «[Select_CString(lover.IsFemale, 'Счастлива', 'Счастлив' )] тем, что "
 lmf_lover.103.desc.secret: "я [Select_CString(lover.IsFemale, 'твоя тайная', 'твой тайный' )] [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))], ты хочешь сказать? "
 lmf_lover.103.desc.public: "я [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))], [Select_CString(lover.IsFemale, 'известная', 'известный' )] всему твоему двору? "
 lmf_lover.103.desc.end: "В этом нет стыда, и я вполне [Select_CString(lover.IsFemale, 'счастлива', 'счастлив' )]. Пожалуй, мне следовало бы спросить, [Select_CString(ROOT.Char.IsFemale, 'счастлива', 'счастлив' )] ли #EMP ты#!, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]».\n\nЯ не [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал' )], как ответить на свой же вопрос, но [lover.GetSheHe] [Select_CString(lover.IsFemale, 'настаивала', 'настаивал' )]. «Куда, по-твоему, ведёт то, что между нами, если оно вообще куда-то ведёт?»"
 lmf_lover.103.a: "«Я сделаю всё возможное, чтобы ты [Select_CString(lover.IsFemale, 'была счастлива', 'был счастлив' )]»."
 lmf_lover.103.b: "«Мы здесь ради собственного удовольствия. Мне этого достаточно»."
 lmf_lover.103.c: "«Ты и я созданы друг для друга»."
 lmf_lover.103.d: "«Это ни к чему не ведёт, и мне так даже лучше»."

 lmf_lover.104.t: "Ещё одна ночь во владении [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]"
 lmf_lover.104.desc.start: "Пока что отношения, которые поддерживаем я и [lover.GetFirstNameNoTooltip], были восхитительными, как и подобает новому роману. Только сегодня вечером, к примеру, я [Select_CString(ROOT.Char.IsFemale, 'освободила', 'освободил' )] тронный зал во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], чтобы разыграть свой любимый сценарий [Select_CString(lover.IsFemale, 'придворной', 'придворного' )] и [Select_CString(ROOT.Char.IsFemale, 'леди', 'лорда' )], и всё было именно так, как я [Select_CString(ROOT.Char.IsFemale, 'мечтала', 'мечтал' )].\n\nОднако позже, когда пот на наших телах ещё не высох, я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [lover.GetFirstNameNoTooltip] ведёт себя немного... сдержанно. Сожаление, возможно? Или я слишком часто [Select_CString(ROOT.Char.IsFemale, 'потакала', 'потакал' )] своим желаниям? Я [Select_CString(ROOT.Char.IsFemale, 'спросила', 'спросил' )] об этом.\n\n"
 lmf_lover.104.desc.end: "Я [Select_CString(ROOT.Char.IsFemale, 'усмехнулась', 'усмехнулся' )] над [lover.GetHerHis] мыслями. Я [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )] такое не впервые, но [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'обеспокоилась', 'обеспокоился' )] сильнее из-за моего веселья. «Мне просто... нужно понять, к чему это ведёт», - [Select_CString(lover.IsFemale, 'сказала', 'сказал' )] [lover.GetSheHe]. «Значу ли я что-то для тебя или просто обманываю себя»."

 lmf_lover.105.t: "Всему хорошему приходит конец"
 lmf_lover.105.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'осознала', 'осознал' )], что [lover.GetFirstNameNoTooltip] давно не [Select_CString(lover.IsFemale, 'занимала', 'занимал' )] мои мысли, и сомневаюсь, что [lover.GetSheHe] [Select_CString(lover.IsFemale, 'думала', 'думал' )] обо мне.\n\nПричин множество, но все они меркнут перед правдой: что бы ни было между нами, что бы мы ни делили и ни чувствовали, наши отношения окончены."
 lmf_lover.105.a: "Какая жалость."

 lmf_lover.1000.t: "Блаженство родственной души"
 lmf_lover.1000.desc.army: "В редкий момент затишья в этот день, когда войско расположилось лагерем, [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'пришла', 'пришёл' )] ко мне.\n\n"
 lmf_lover.1000.desc.travel: "Мы уже расположились в шатрах на ночь, совершенно измождённые, когда [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'пришла', 'пришёл' )] ко мне.\n\n"
 lmf_lover.1000.desc.activity: "Я [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )] перерыв в напряжённом дневном графике, прогуливаясь по двору владения [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], когда [Select_CString(ROOT.Char.IsFemale, 'подняла', 'поднял' )] глаза и [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )], что [lover.GetFirstNameNoTooltip] рядом.\n\n"
 lmf_lover.1000.desc.notlocal: "[lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'пришла', 'пришёл' )] сегодня навестить меня во владении [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], что стало приятным сюрпризом.\n\n"
 lmf_lover.1000.desc.local: "Сегодня я [Select_CString(ROOT.Char.IsFemale, 'прогуливалась', 'прогуливался' )] по двору владения [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], [Select_CString(ROOT.Char.IsFemale, 'погружённая', 'погружённый' )] в мысли, когда [Select_CString(ROOT.Char.IsFemale, 'подняла', 'поднял' )] глаза и [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )], что [lover.GetFirstNameNoTooltip] рядом.\n\n"
 lmf_lover.1000.desc.end: "Я [Select_CString(ROOT.Char.IsFemale, 'улыбнулась', 'улыбнулся' )], как только [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )] [lover.GetHerHis], и [lover.GetSheHe] [Select_CString(lover.IsFemale, 'ответила', 'ответил' )] тем же. Почти без слов мы пошли рядом. Любой, кто увидел бы нас, счёл бы нас просто друзьями, но [lover.GetFirstNameNoTooltip] значит для меня гораздо больше.\n\n[Select_CString(lover.IsFemale, 'Она', 'Он' )] внимательно [Select_CString(lover.IsFemale, 'слушала', 'слушал' )], как я [Select_CString(ROOT.Char.IsFemale, 'жаловалась', 'жаловался' )] на свои проблемы, почти не давая советов, но позволяя мне выговориться. После каждого тяжёлого вздоха [lover.GetSheHe] тихо [Select_CString(lover.IsFemale, 'усмехалась', 'усмехался' )], и мне почему-то становилось легче.\n\nНе [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел' )] я опомниться, как прошли часы, но мне не надоело [lover.GetHerHis] общество. Должно быть, так и выглядит настоящая родственная душа."
 lmf_lover.1000.a: "Мне никогда не надоест это."

 lmf_lover.1005.t: "Моя родственная душа: [lover_trait.GetNameNoTooltip( ROOT.Char )|U]"
 lmf_lover.1005.desc.sinful: "Мне говорили, что за годы, которые я и [lover.GetFirstNameNoTooltip] провели вместе, [Select_CString(lover.IsFemale, 'она могла', 'он мог' )] плохо на меня влиять"
 lmf_lover.1005.desc.good: "Мне говорили, что за годы, которые я и [lover.GetFirstNameNoTooltip] провели вместе, [lover.GetSheHe] хорошо [Select_CString(lover.IsFemale, 'повлияла', 'повлиял' )] на меня"
 lmf_lover.1005.desc.normal: "Мне говорили, что за годы, которые мы провели вместе, [lover.GetFirstNameNoTooltip] сильно [Select_CString(lover.IsFemale, 'повлияла', 'повлиял' )] на меня"
 lmf_lover.1005.desc.mid: "... и в этом есть доля правды.\n\nНапример, [Select_CString(lover.IsFemale, 'ей', 'ему' )] свойственно [lover_trait.GetNameNoTooltip( ROOT.Char )|l], "
 lmf_lover.1005.desc.opposite: "тогда как мне, напротив, [lover_opposite_trait.GetNameNoTooltip( ROOT.Char )|l]. Это создаёт напряжение в наших отношениях, проявляясь в мелочах, ведь хотя [lover.GetFirstNameNoTooltip] никогда не [Select_CString(lover.IsFemale, 'пыталась', 'пытался' )] меня изменить, я чувствую [lover.GetHerHis] неодобрение.\n\n"
 lmf_lover.1005.desc.notopp: "и хотя [lover.GetFirstNameNoTooltip] никогда не [Select_CString(lover.IsFemale, 'пыталась', 'пытался' )] меня изменить, я всё же чувствую [lover.GetHerHis] влияние в едва уловимых взглядах и случайных неодобрительных кивках.\n\n"
 lmf_lover.1005.desc.end: "Я часто ловлю себя на том, что меняю поведение, когда мы вместе. Наша связь так сильна, что я не против, ведь становиться ближе естественно... но хочу ли я этого? Принять [lover_trait.GetNameNoTooltip( ROOT.Char )|l], как [lover.GetSheHe]?\n\nЕсли я проявлю твёрдость, есть риск, что это "
 lmf_lover.1005.desc.opposite2: "напряжение может перерасти в реальную проблему. Но разве наши различия не привлекли нас друг к другу изначально?"
 lmf_lover.1005.desc.notopp2: "может перерасти в реальную проблему в наших отношениях. Или я, возможно, придаю значение тому, что изначально не должно было быть проблемой?"
 lmf_lover.1005.a: "Пусть будет так."
 lmf_lover.1005.b: "Нет, я [Select_CString(ROOT.Char.IsFemale, 'та', 'тот' )], кто я есть, и меняться не собираюсь."
 lmf_lover.1005.b.tt: "Ваши различия усиливаются"

 lmf_lover.1010.t: "Моё влияние: [lover_trait.GetNameNoTooltip( ROOT.Char )|U]"
 lmf_lover.1010.desc.sinful: "Мне говорили, что за годы, которые мы провели вместе, [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'поддалась', 'поддался' )] моему плохому влиянию"
 lmf_lover.1010.desc.good: "Мне говорили, что за годы, которые мы провели вместе, [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'поддалась', 'поддался' )] моему хорошему влиянию"
 lmf_lover.1010.desc.normal: "Мне говорили, что за годы, которые мы провели вместе, [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'поддалась', 'поддался' )] моему сильному влиянию"
 lmf_lover.1010.desc.mid: "... и в этом есть доля правды.\n\nНапример, мне частенько свойственно [lover_trait.GetNameNoTooltip( ROOT.Char )|l], "
 lmf_lover.1010.desc.opposite: "тогда как [lover.GetSheHe], напротив, предпочитает [lover_opposite_trait.GetNameNoTooltip( ROOT.Char )|l]. Это создаёт напряжение в наших отношениях, проявляясь в мелочах, ведь хотя я никогда не [Select_CString(ROOT.Char.IsFemale, 'пыталась', 'пытался' )] изменить [lover.GetHerHis], [lover.GetSheHe] чувствует моё неодобрение.\n\n"
 lmf_lover.1010.desc.notopp: "и хотя я никогда не [Select_CString(ROOT.Char.IsFemale, 'пыталась', 'пытался' )] изменить [lover.GetHerHis], очевидно, [lover.GetSheHe] чувствует влияние моих едва уловимых взглядов и случайных неодобрительных кивков.\n\n"
 lmf_lover.1010.desc.end: "Всё чаще [lover.GetFirstNameNoTooltip] меняет своё поведение, когда мы вместе. Чтобы угодить мне, думаю, и чтобы наши различия не стали источником напряжения, хотя я никогда не [Select_CString(ROOT.Char.IsFemale, 'просила', 'просил' )] об этом. Наша связь так сильна, что [lover.GetSheHe] не жалуется, и я верю, что это ведёт к глубоким изменениям... которые со временем лишь сблизят нас."
 lmf_lover.1010.a: "Я так люблю [lover.GetHerHis] за это."

 lmf_lover.1015.t: "Побег?"
 lmf_lover.1015.desc.start: "Мне следовало догадаться, что у н[lover.GetHerHis] есть план, по той ухмылке, с которой [Select_CString(lover.IsFemale, 'появилась', 'появился' )] [lover.GetFirstNameNoTooltip].\n\n«Давай сбежим», - [Select_CString(lover.IsFemale, 'заявила', 'заявил' )] [lover.GetSheHe] с полной уверенностью.\n\n"
 lmf_lover.1015.desc.bold: "[lover.GetFirstNameNoTooltip] всегда [Select_CString(lover.IsFemale, 'была смелой', 'был смелым' )], но это было нечто иное.\n\n"
 lmf_lover.1015.desc.irrational: "[lover.GetFirstNameNoTooltip] всегда [Select_CString(lover.IsFemale, 'была', 'был' )] немного [Select_CString(lover.IsFemale, 'безрассудна', 'безрассуден' )], по правде говоря, но сейчас это достигло нового уровня.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал' )] объяснять проблемы [lover.GetHerHis] плана"
 lmf_lover.1015.desc.married: ", начиная с [Select_CString(my_spouse.IsFemale, 'моего мужа', 'моей жены' )], но [lover.GetSheHe] [Select_CString(lover.IsFemale, 'остановила', 'остановил' )] меня. «Разве [my_spouse.GetTitledFirstNameNoTooltip] - твоя родственная душа? Нет? Тогда и обсуждать нечего, верно?»\n\n"
 lmf_lover.1015.desc.them.married: ", начиная с [lover.GetHerHis] [Select_CString(lover_spouse.IsFemale, 'жены', 'мужа' )], но [lover.GetSheHe] [Select_CString(lover.IsFemale, 'остановила', 'остановил' )] меня. «Разве [lover_spouse.GetTitledFirstNameNoTooltip] - моя родственная душа? Нет? Тогда и обсуждать нечего, верно?»\n\n"
 lmf_lover.1015.desc.liege: ", начиная с того, что [lover.GetHerHis] сюзерен несомненно воспротивится такому плану, но [lover.GetSheHe] [Select_CString(lover.IsFemale, 'остановила', 'остановил' )] меня. «Разве [lover.GetLiege.GetTitledFirstNameNoTooltip] - моя родственная душа? Нет? Тогда и обсуждать нечего, верно?»\n\n"
 lmf_lover.1015.desc.default: ", но [lover.GetSheHe] [Select_CString(lover.IsFemale, 'остановила', 'остановил' )] меня. «Я - твоя родственная душа. Разве что-то ещё стоит обсуждения?»\n\n"
 lmf_lover.1015.desc.end: "У меня не нашлось быстрого ответа на это. "
 lmf_lover.1015.desc.end.happy: "«Когда мы впервые полюбили друг друга, ты [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )], что сделаешь всё для моего счастья», - [Select_CString(lover.IsFemale, 'напомнила', 'напомнил' )] [lover.GetSheHe]. «#EMP Это#! сделает меня [Select_CString(lover.IsFemale, 'счастливой', 'счастливым' )]»."
 lmf_lover.1015.desc.end.meant: "«Когда мы впервые полюбили друг друга, ты [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )], что мы созданы друг для друга», [Select_CString(lover.IsFemale, 'напомнила', 'напомнил' )] [lover.GetSheHe]. «Так давай будем вместе»."
 lmf_lover.1015.desc.end.now: "«Может, мы и не начинали эти отношения, ожидая такого», - [Select_CString(lover.IsFemale, 'напомнила', 'напомнил' )] [lover.GetSheHe], «Но вот мы здесь! Так давай будем счастливы»."
 lmf_lover.1015.a: "[Select_CString(lover.IsFemale, 'Она', 'Он' )] совершенно [Select_CString(lover.IsFemale, 'права', 'прав' )]."
 lmf_lover.1015.b: "Этого не случится."

 lmf_lover.1020.t: "Давно назревающее"
 lmf_lover.1020.desc.army: "[lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'присоединилась', 'присоединился' )] ко мне у костра поздним вечером, когда солдаты разошлись по шатрам и воцарилась тишина.\n\n"
 lmf_lover.1020.desc.travel: "[lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'присоединилась', 'присоединился' )] ко мне у костра сегодня, поздним вечером, когда большая часть свиты уже удалилась.\n\n"
 lmf_lover.1020.desc.activity: "После насыщенного дня [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'нашла', 'нашёл' )] меня в саду.\n\n"
 lmf_lover.1020.desc.notlocal: "Во время прогулки по саду я [Select_CString(ROOT.Char.IsFemale, 'обнаружила', 'обнаружил' )], что [lover.GetFirstNameNoTooltip] специально [Select_CString(lover.IsFemale, 'приехала', 'приехал' )] из владения [lover.GetCurrentLocation.GetNameNoTooltip], чтобы провести день со мной.\n\n"
 lmf_lover.1020.desc.local: "Во время прогулки по саду ко мне [Select_CString(lover.IsFemale, 'присоединилась', 'присоединился' )] [lover.GetFirstNameNoTooltip].\n\n"
 lmf_lover.1020.desc.desc: "Признаю, я [Select_CString(ROOT.Char.IsFemale, 'была рада', 'был рад' )] видеть [lover.GetHerHis]. Было время, когда я [Select_CString(ROOT.Char.IsFemale, 'считала', 'считал' )] [lover.GetHerHis] лишь [Select_CString(lover.IsFemale, 'любовницей', 'любовником' )], но я [Select_CString(ROOT.Char.IsFemale, 'говорила', 'говорил' )] [lover.GetHerHim] с самого начала, что наши отношения особенные, и это оказалось правдой - они переросли в нечто большее.\n\nМы говорили часами, и в конце концов зашла речь о наших отношениях. [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'колебалась', 'колебался' )], но я [Select_CString(ROOT.Char.IsFemale, 'задумалась', 'задумался' )], не пришло ли время выяснить, стали ли мы родственными душами."
 lmf_lover.1020.a: "[lover.GetSheHe|U] убедится, что наша любовь истинна!"
 lmf_lover.1020.a.success.tt: "[lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'убеждена', 'убеждён' )]"
 lmf_lover.1020.a.failure.tt: "[lover.GetFirstNameNoTooltip] не [Select_CString(lover.IsFemale, 'готова', 'готов' )] к этому шагу"
 lmf_lover.1020.b: "Нет, лучше оставить всё как есть."

 lmf_lover.1025.t: "Разговор на подушках"
 lmf_lover.1025.desc.courtier.other: "Мне следовало догадаться, что что-то затевается, когда [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'прибыла', 'прибыл' )] из владения [lover.GetLiege.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], чтобы провести вечер. "
 lmf_lover.1025.desc.courtier: "Мне следовало догадаться, что что-то затевается, когда [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'пришла', 'пришёл' )] в мои покои, чтобы провести вечер. "
 lmf_lover.1025.desc: "В глазах [Select_CString(lover.IsFemale, 'этой женщины', 'этого мужчины' )] мерцал озорной огонек.\n\n«Мне нужно кое-что тебе сказать, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]», - [Select_CString(lover.IsFemale, 'сказала', 'сказал' )] [lover.GetSheHe].\n\n«Да?» Я изо всех сил [Select_CString(ROOT.Char.IsFemale, 'старалась', 'старался' )] выглядеть [Select_CString(ROOT.Char.IsFemale, 'равнодушной', 'равнодушным' )], хотя это было неправдой.\n\n«Это секрет, который я сегодня [Select_CString(lover.IsFemale, 'подслушала', 'подслушал' )] при дворе, и [Select_CString(lover.IsFemale, 'подумала', 'подумал' )], тебе будет интересно это услышать...»"
 lmf_lover.1025.a: "«[Select_CString(lover.IsFemale, 'Какая', 'Какой' )] ты умница, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('lover'))]!»"

 lmf_lover.1030.t: "[Select_CString( lover.IsFemale, 'Моя талантливая', 'Мой талантливый' )] [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))]"
 lmf_lover.1030.desc.start: "Иногда легко забыть, насколько [Select_CString(lover.IsFemale, 'талантлива', 'талантлив' )] [lover.GetFirstNameNoTooltip] на самом деле.\n\n"
 lmf_lover.1030.desc.diplomacy: "Однако в последнее время [lover.GetSheHe] очень помогает, сидя в постели и слушая, как я составляю письма другим правителям, а затем предлагая проницательные советы по редактированию.\n\n"
 lmf_lover.1030.desc.martial: "Однако на днях [lover.GetSheHe] [Select_CString(lover.IsFemale, 'заметила', 'заметил' )] на моём столе бумаги со скучными деталями о снабжении войск и [Select_CString(lover.IsFemale, 'предложила', 'предложил' )] улучшения, которые оказались удивительно полезны.\n\n"
 lmf_lover.1030.desc.stewardship: "Однако на днях, когда мы лежали в постели, а я бесконечно [Select_CString(ROOT.Char.IsFemale, 'жаловалась', 'жаловался' )] на налоговые соглашения с вассалами, [lover.GetSheHe] мимоходом [Select_CString(lover.IsFemale, 'предложила', 'предложил' )] идеи, значительно улучшившие эти договорённости.\n\n"
 lmf_lover.1030.desc.intrigue: "[Select_CString(lover.IsFemale, 'Её', 'Его' )] глаза всегда настороже: [lover.GetSheHe] указывает на недостатки моей личной охраны и отмечает, на какие дворцовые интриги стоит обратить внимание.\n\n"
 lmf_lover.1030.desc.learning: "[lover.GetSheHe|U] проявляет большой интерес к моим размышлениям о последних увлечениях и даже предлагает полезные подсказки, почерпнутые из [lover.GetHerHis] знаний.\n\n"
 lmf_lover.1030.desc.end: "Сначала я [Select_CString(ROOT.Char.IsFemale, 'сопротивлялась', 'сопротивлялся' )] [lover.GetHerHis] помощи, считая это неуместным, но теперь все чаще принимаю поддержку [Select_CString(lover.IsFemale, 'придворноой, которая', 'придворного, который' )] явно желает мне добра."
 lmf_lover.1030.a: "[Select_CString(lover.IsFemale, 'Она удивительна', 'Он удивителен' )], не так ли?"

 lmf_lover.1035.t: "Небольшой подарок"
 lmf_lover.1035.desc.ruler: "Мне показалось любопытным, когда доложили о прибытии гонца из владения [lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], и я [Select_CString(ROOT.Char.IsFemale, 'вышла', 'вышел' )] во двор встретить его.\n\n"
 lmf_lover.1035.desc.notlocation: "Мне показалось любопытным, когда доложили о прибытии гонца из владения [lover.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], и я [Select_CString(ROOT.Char.IsFemale, 'вышла', 'вышел' )] во двор встретить его.\n\n"
 lmf_lover.1035.desc.location: "Мне показалось любопытным, когда доложили, что [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'прибыла', 'прибыл' )] ко двору, чтобы увидеть меня. Так официально? Странно. Я немедленно [Select_CString(ROOT.Char.IsFemale, 'отправилась', 'отправился' )] встретить [lover.GetHerHis].\n\n"
 lmf_lover.1035.desc.courtier: "Я [Select_CString(ROOT.Char.IsFemale, 'проходила', 'проходил' )] через двор [lover.Custom('FortifiedBuilding_RU_Gen')], когда мне на глаза [Select_CString(ROOT.Char.IsFemale, 'попалась', 'попался' )] [lover.GetTitledFirstNameNoTooltip], [Select_CString(lover.IsFemale, 'стоящая', 'стоящий' )] там с безумной улыбкой. Как... неожиданно. Конечно, я сразу [Select_CString(ROOT.Char.IsFemale, 'подошла', 'подошёл' )] поговорить с [Select_CString(lover.IsFemale, 'ней', 'ним' )].\n\n"
 lmf_lover.1035.desc.messenger: "«Посланием» был мешок с драгоценными камнями и простая записка:\n\n«#EMP Они никогда не сияют так ярко, как ты — небольшой подарок от [Select_CString(lover.IsFemale, 'любящей', 'любящего' )] тебя#!».\n\nПодписи не было, но я точно знаю, от кого она."
 lmf_lover.1035.desc.inperson: "«У меня для тебя небольшой подарок», - [Select_CString(lover.IsFemale, 'сказала', 'сказал' )] [lover.GetSheHe]. С этими словами [lover.GetSheHe] [Select_CString(lover.IsFemale, 'передала', 'передал' )] мне маленький мешочек с драгоценными камнями.\n\nЯ уже [Select_CString(ROOT.Char.IsFemale, 'собиралась', 'собирался' )] возразить против [lover.GetHerHis] излишней щедрости, но [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'опередила', 'опередил' )] меня. [Select_CString(lover.IsFemale, 'Она', 'Он' )] слишком хорошо меня знает.\n\n«Ты так много значишь для меня, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]. Пожалуйста, прими это с тем чувством, с которым дарю». И с этими словами [lover.GetSheHe] [Select_CString(lover.IsFemale, 'ушла', 'ушёл' )], не дав мне ответить."
 lmf_lover.1035.a: "Как внимательно с [lover.GetHerHis] стороны."

 lmf_lover.1036.t: "[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))|U] в беде"
 lmf_lover.1036.desc.start: "До меня дошли вести из владения [lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], и [lover.GetFirstNameNoTooltip]... в последнее время дела у н[lover.GetHerHis] идут не лучшим образом.\n\nНасколько я понимаю, [lover.GetSheHe] по уши в долгах, и конечно же [lover.GetSheHe] слишком "
 lmf_lover.1036.desc.proud: "[Select_CString(lover.IsFemale, 'горда', 'горд' )]"
 lmf_lover.1036.desc.stubborn: "[Select_CString(lover.IsFemale, 'упряма', 'упрям' )]"
 lmf_lover.1036.desc.humble: "[Select_CString(lover.IsFemale, 'скромна', 'скромен' )]"
 lmf_lover.1036.desc.shy: "[Select_CString(lover.IsFemale, 'застенчива', 'застенчив' )]"
 lmf_lover.1036.desc.paranoid: "[Select_CString(lover.IsFemale, 'параноидальна', 'параноидален' )]"
 lmf_lover.1036.desc.craven: "[Select_CString(lover.IsFemale, 'труслива', 'труслив' )]"
 lmf_lover.1036.desc.content: "[Select_CString(lover.IsFemale, 'непритязательна', 'непритязателен' )]"
 lmf_lover.1036.desc.end: ", чтобы #EMP попросить#! моей помощи.\n\nПожалуй, мне следует просто помочь, не оставляя [lover.GetHerHim] выбора. Но часть меня сомневается: а не ожидает ли [lover.GetFirstNameNoTooltip] этого в глубине души? Не будет ли [lover.GetSheHe] [Select_CString(lover.IsFemale, 'разочарована', 'разочарован' )] или даже [Select_CString(lover.IsFemale, 'рассержена', 'рассержен' )], если я останусь в стороне?"
 lmf_lover.1036.a: "Конечно я помогу!"
 lmf_lover.1036.b: "[lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'сама', 'сам' )] по себе."
 lmf_lover.1036.b.tt: "[lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'ожидала', 'ожидал' )] вашей помощи..."

 lmf_lover.1040.t: "Небольшой совет"
 lmf_lover.1040.desc.start: "Как только [lover.GetFirstNameNoTooltip] сегодня [Select_CString(lover.IsFemale, 'прибыла', 'прибыл' )] из владения [lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что что-то беспокоит [lover.GetHerHis].\n\n[Select_CString(lover.IsFemale, 'Она', 'Он' )] [Select_CString(lover.IsFemale, 'была', 'был' )] так [Select_CString(lover.IsFemale, 'рассеянна', 'рассеян' )], с морщинами от стресса на лбу. Я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что [lover.GetSheHe] [Select_CString(lover.IsFemale, 'пришла', 'пришёл' )] не провести день со мной, а за советом.\n\n«Что-то случилось, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('lover'))]?» - наконец [Select_CString(ROOT.Char.IsFemale, 'спросила', 'спросил' )] я.\n\n[Select_CString(lover.IsFemale, 'Она', 'Он' )] тяжело [Select_CString(lover.IsFemale, 'вздохнула', 'вздохнул' )]. «Знаю, у тебя свои заботы с управлением державой [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], но мне нужна твоя помощь "
 lmf_lover.1040.desc.diplomacy: "с деликатным дипломатическим вопросом, "
 lmf_lover.1040.desc.martial: "со стратегическим вопросом, "
 lmf_lover.1040.desc.stewardship: "в споре с вассалом о договоре, "
 lmf_lover.1040.desc.intrigue: "с неотложным делом, требующим полной секретности, "
 lmf_lover.1040.desc.end: "а в этом ты разбираешься куда лучше меня. Пожалуйста... боюсь, я в отчаянии»."
 lmf_lover.1040.a: "«Я сделаю всё возможное, что бы ни потребовалось»."
 lmf_lover.1040.a.success: "Ваша помощь успешна и радует [lover.GetHerHis]"
 lmf_lover.1040.a.fail.angry: "Ваша помощь приводит к обратному результату, и [lover.GetSheHe] в ярости"
 lmf_lover.1040.a.fail.disappointed: "Ваша помощь приводит к обратному результату, но [lover.GetSheHe] прощает вас"
 lmf_lover.1040.b: "Увернуться от помощи туманными фразами."
 lmf_lover.1040.b.success: "[Select_CString(lover.IsFemale, 'Она', 'Он' )] соглашается, что вы не можете помочь"
 lmf_lover.1040.b.fail: "[Select_CString(lover.IsFemale, 'Она', 'Он' )] видит вашу хитрость"

 lmf_lover.1045.t: "Совет, что [Select_CString(lover.IsFemale, 'дала моя', 'дал мой' )] [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))]"
 lmf_lover.1045.desc.start: "Иногда я забываю, насколько [Select_CString(lover.IsFemale, 'умелой и умной женщиной', 'умелым и умным мужчиной' )] является [lover.GetFirstNameNoTooltip].\n\nМы прогуливались по садам владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], когда [lover.GetSheHe] "
 lmf_lover.1045.desc.diplomacy: "[Select_CString(lover.IsFemale, 'заговорила', 'заговорил' )] о моих недавних проблемах с вассалом и о том, как их можно решить мирно.\n\n"
 lmf_lover.1045.desc.martial: "[Select_CString(lover.IsFemale, 'упомянула', 'упомянул' )] о проблемах со снабжением войск, которые я [Select_CString(ROOT.Char.IsFemale, 'обсуждала', 'обсуждал' )], и [Select_CString(lover.IsFemale, 'предложила', 'предложил' )] несколько вариантов решения.\n\n"
 lmf_lover.1045.desc.stewardship: "[Select_CString(lover.IsFemale, 'заговорила', 'заговорил' )] о налоговом споре с вассалами, сначала нерешительно, но потом увереннее. Фактически [lover.GetSheHe] [Select_CString(lover.IsFemale, 'показала', 'показал' )] способ полностью обойти проблему.\n\n"
 lmf_lover.1045.desc.intrigue: "[Select_CString(lover.IsFemale, 'заговорила', 'заговорил' )] о безопасности [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], вернее о её отсутствии. О способах проникновения. Не как угрозу, а из искренней заботы.\n\n"
 lmf_lover.1045.desc.learning: "подробно [Select_CString(lover.IsFemale, 'рассказала', 'рассказал' )], как я могу поддержать библиотеки во владении [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] и как это поможет развитию моих земель.\n\n"
 lmf_lover.1045.desc.end: "[Select_CString(lover.IsFemale, 'Она', 'Он' )] [Select_CString(lover.IsFemale, 'продолжала', 'продолжал' )] говорить большую часть дня, а я [Select_CString(ROOT.Char.IsFemale, 'слушала', 'слушал' )] с интересом. [Select_CString(lover.IsFemale, 'Ее', 'Его' )] совет действительно может быть полезен, если [lover.GetSheHe] [Select_CString(lover.IsFemale, 'согласна', 'согласен' )] продолжать советовать."
 lmf_lover.1045.a: "Очень [Select_CString(ROOT.Char.IsFemale, 'признательна', 'признателен' )]!"

 lmf_lover.1050.t: "На помощь"
 lmf_lover.1050.desc.start: "Болезнь приковала меня к постели с кашлем, и когда я [Select_CString(ROOT.Char.IsFemale, 'услышала', 'услышал' )], как кто-то входит в покои, я [Select_CString(ROOT.Char.IsFemale, 'заворчала', 'заворчал' )], чтобы меня оставили в покое.\n\n«Чепуха, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]. "
 lmf_lover.1050.desc.ruler: "Я [Select_CString(lover.IsFemale, 'приехала', 'приехал' )] прямиком из владения [lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], как только [Select_CString(lover.IsFemale, 'услышала', 'услышал' )] о твоём недуге». "
 lmf_lover.1050.desc.location: "Я не оставлю тебя здесь чахнуть, когда могу ухаживать за тобой». "
 lmf_lover.1050.desc.notlocation: "Я [Select_CString(lover.IsFemale, 'приехала', 'приехал' )] прямиком из владения [lover.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], как только [Select_CString(lover.IsFemale, 'услышала', 'услышал' )] о твоём недуге». "
 lmf_lover.1050.desc.mid: "[lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'ворвалась', 'ворвался' )], не оставляя выбора, и сразу [Select_CString(lover.IsFemale, 'взяла', 'взял' )] на себя заботу.\n\n«Н-но ты же заразишься!» [Select_CString(ROOT.Char.IsFemale, 'возразила', 'возразил' )] я между приступами кашля.\n\n[Select_CString(lover.IsFemale, 'Она', 'Он' )] [Select_CString(lover.IsFemale, 'пожала', 'пожал' )] плечами. «Если на то воля [lover.GetFaith.HighGodNamePossessive], да будет так».\n\n"
 lmf_lover.1050.desc.secret: "Я слишком [Select_CString(ROOT.Char.IsFemale, 'слаба', 'слаб' )] для протеста, но понимаю: слугам будет трудно объяснить, что [lover.GetHerHis] забота совершенно невинна. [lover.GetFirstNameNoTooltip] может раскрыть наш секрет своими благими намерениями!"
 lmf_lover.1050.desc.public: "Я слишком [Select_CString(ROOT.Char.IsFemale, 'слаба', 'слаб' )] для протеста, да и какой толк? Все уже знают о наших отношениях... а [lover.GetSheHe] явно не примет отказа."
 lmf_lover.1050.a: "Подчиниться [lover.GetHerHis] заботе."
 lmf_lover.1050.a.success: "[lover.GetFirstNameNoTooltip] избегает подозрений"
 lmf_lover.1050.a.fail: "[lover.GetFirstNameNoTooltip] своей преданностью раскрывает правду"
 lmf_lover.1050.b: "Немедленно выгнать [lover.GetHerHis]! Без возражений!"

 lmf_lover.1055.t: "Оговорка"
 lmf_lover.1055.desc: "Я не [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )] этого говорить.\n\nНазовите это «разговором на подушках», неосторожностью или глупостью. Я и [lover.GetFirstNameNoTooltip] беседовали вечером, и я [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )] лишнего.\n\n[Select_CString(lover.IsFemale, 'Она сделала', 'Он сделал' )] вид, что не [Select_CString(lover.IsFemale, 'поняла', 'понял' )], но я [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )] понимание в [lover.GetHerHis] глазах. [Select_CString(lover.IsFemale, 'Она', 'Он' )] знает."
 lmf_lover.1055.a: "Теперь ничего не поделаешь..."
 lmf_lover.1055.b: "Пообещать [lover.GetHerHim] что угодно за молчание."
 lmf_lover.1055.c: "[Select_CString(lover.IsFemale, 'Она', 'Он' )] никому не расскажет из темницы!"
 lover_promise_to_keep_secret: "[lover.GetFirstNameNoTooltip] обещает не раскрывать [Concept('secret', 'секрет')|E]"
 lover_jailed_to_keep_secret: "[lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'вынуждена', 'вынужден' )] обещать не раскрывать [Concept('secret', 'секрет')|E]"

 lmf_lover.1060.t: "Оговорка"
 lmf_lover.1060.desc: "Ясно, что [lover.GetFirstNameNoTooltip] не [Select_CString(lover.IsFemale, 'хотела', 'хотел' )] этого говорить.\n\nНазовите это «разговором на подушках», неосторожностью или глупостью. Мы беседовали вечером, и [lover.GetSheHe] [Select_CString(lover.IsFemale, 'проговорилась', 'проговорился' )] о том, о чём не следовало.\n\nКогда [lover.GetSheHe] мгновенно [Select_CString(lover.IsFemale, 'замерла', 'замер' )], я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )] - [lover.GetSheHe] осознаёт, что [Select_CString(lover.IsFemale, 'сказала', 'сказал' )], и знает, что я это [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )]. Даже если мне всё ещё трудно поверить."
 lmf_lover.1060.a: "Что ж, это неожиданно."

 lmf_lover.1065.t: "Предложение"
 lmf_lover.1065.desc.start: "«Почему мы не женаты?»\n\nТак [Select_CString(lover.IsFemale, 'спросила', 'спросил' )] меня [lover.GetFirstNameNoTooltip] сегодня, когда мы лежали в постели, с озабоченным выражением лица.\n\n"
 lmf_lover.1065.desc.secret: "Я [Select_CString(ROOT.Char.IsFemale, 'напомнила', 'напомнил' )] о тайном характере наших отношений, а [lover.GetSheHe] [Select_CString(lover.IsFemale, 'ответила', 'ответил' )], что это не имело бы значения, будь мы в браке.\n\n"
 lmf_lover.1065.desc.public: "Я [Select_CString(ROOT.Char.IsFemale, 'колебалась', 'колебался' )], а [lover.GetSheHe] [Select_CString(lover.IsFemale, 'напомнила', 'напомнил' )], что все уже знают о наших отношениях. После свадьбы люди забудут, и косые взгляды прекратятся.\n\n"
 lmf_lover.1065.desc.happy: "«Ты же [Select_CString(ROOT.Char.IsFemale, 'говорила', 'говорил' )], [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)], в начале наших отношений, что сделаешь всё для моего счастья. Что ж, это сделает меня [Select_CString(lover.IsFemale, 'счастливой', 'счастливым' )]». "
 lmf_lover.1065.desc.meant: "«Ты же [Select_CString(ROOT.Char.IsFemale, 'говорила', 'говорил' )], [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)], в начале наших отношений, что мы созданы друг для друга. Так давай будем вместе. По-настоящему». "
 lmf_lover.1065.desc.now: "«Может, мы и не думали об этом годами назад, но [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]... сейчас всё иначе». "
 lmf_lover.1065.desc.end: "Я [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )] решимость в [lover.GetHerHis] глазах."
 lmf_lover.1065.a: "[Select_CString(ROOT.Char.IsFemale, 'Согласна', 'Согласен' )]. Давай!"
 lmf_lover.1065.b: "Нет, это невозможно."

 lmf_lover.1070.t: "Пора?"
 lmf_lover.1070.desc.start: "Когда я и [lover.GetFirstNameNoTooltip] лежали в постели, зашёл разговор о браке.\n\nИнициатива исходила не от н[lover.GetHerHis], ведь [lover.GetSheHe] часто [Select_CString(lover.IsFemale, 'говорила', 'говорил' )], что [Select_CString(lover.IsFemale, 'равнодушна', 'равнодушен' )] к браку. Это была моя идея.\n\n"
 lmf_lover.1070.desc.happy: "Я [Select_CString(ROOT.Char.IsFemale, 'напомнила', 'напомнил' )] [lover.GetHerHim], что в начале наших отношений [Select_CString(ROOT.Char.IsFemale, 'обещала', 'обещал' )] сделать всё для [lover.GetHerHis] счастья. "
 lmf_lover.1070.desc.meant: "Я [Select_CString(ROOT.Char.IsFemale, 'напомнила', 'напомнил' )] [lover.GetHerHim], что в начале наших отношений [Select_CString(ROOT.Char.IsFemale, 'говорила', 'говорил' )] о нашей предназначенности друг другу. "
 lmf_lover.1070.desc.now: "Я [Select_CString(ROOT.Char.IsFemale, 'напомнила', 'напомнил' )] [lover.GetHerHim], что в начале никто из нас не считал эти отношения серьёзными... но всё изменилось. "
 lmf_lover.1070.desc.secret: "К тому же это положит конец тайным встречам и необходимости скрывать наши отношения.\n\n"
 lmf_lover.1070.desc.public: "К тому же все уже знают о наших отношениях. Это положит конец перешептываниям и косым взглядам в [lover.GetHerHis] адрес.\n\n"
 lmf_lover.1070.desc.end: "[lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'обдумывала', 'обдумывал' )] предложение. Я [Select_CString(ROOT.Char.IsFemale, 'чувствовала', 'чувствовал' )] - если настоять, [lover.GetHerHis] нерешительность исчезнет. Иначе эта тема больше не поднимется."
 lmf_lover.1070.a: "Настоять на своём. Давай поженимся!"
 lmf_lover.1070.b: "Оставить тему здесь и сейчас."

 lmf_lover.1075.t: "Появление при дворе"
 lmf_lover.1075.desc.start: "«Что #EMP [lover.GetSheHe]#! здесь делает?»\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'услышала', 'услышал' )] шёпот придворных и, подняв глаза, [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )], что [lover.GetFirstNameNoTooltip] смело вступает в тронный зал, будто является здесь [Select_CString(lover.IsFemale, 'хозяйкой', 'хозяином' )]. [Select_CString(lover.IsFemale, 'Она', 'Он' )] — "
 lmf_lover.1075.desc.known: "[Select_CString(lover.IsFemale, 'моя известная любовница', 'мой известный любовниник' )] и предмет всех сплетен в державе [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_lover.1075.desc.lowborn: "[Select_CString(lover.IsFemale, 'простолюдинка', 'простолюдин' )], чьё присутствие здесь совершенно неуместно.\n\n"
 lmf_lover.1075.desc.courtier.realm: "[Select_CString(lover.IsFemale, 'придворная, чья', 'придворный, чей' )] [lover.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover.GetLiege'))] - [lover.GetLiege.GetTitledFirstNameNoTooltip], не [Select_CString(lover.IsFemale, 'имеющая', 'имеющий' )] причин здесь находится.\n\n"
 lmf_lover.1075.desc.courtier.foreign: "[Select_CString(lover.IsFemale, 'женщина', 'мужчина' )] из державы [lover.GetLiege.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip], не [Select_CString(lover.IsFemale, 'имеющая', 'имеющий' )] причин здесь находится.\n\n"
 lmf_lover.1075.desc.culture: "[lover.GetCulture.GetCollectiveNounNoTooltip|l][Select_CString(lover.IsFemale, 'ая женщина', 'ий мужчина' )], не [Select_CString(lover.IsFemale, 'имеющая', 'имеющий' )] причин здесь находится.\n\n"
 lmf_lover.1075.desc.religion: "[lover.GetFaith.GetNameNoTooltip|l][Select_CString(lover.IsFemale, 'ая последовательница', 'ий последователь' )], не [Select_CString(lover.IsFemale, 'имеющая', 'имеющий' )] причин здесь находится.\n\n"
 lmf_lover.1075.desc.default: "[Select_CString(lover.IsFemale, 'женщина', 'мужчина' )] без сюзерена, двора и причин быть здесь.\n\n"
 lmf_lover.1075.desc.mid: "Что [lover.GetSheHe] [Select_CString(lover.IsFemale, 'надеялась', 'надеялся' )] достичь — не представляю. "
 lmf_lover.1075.desc.secret: "Хуже того, с уже начавшимися перешептываниями, будет сложно объяснить [lover.GetHerHis] присутствие без заранее придуманной истории.\n\n"
 lmf_lover.1075.desc.public: "Возможно, [lover.GetSheHe] [Select_CString(lover.IsFemale, 'хотела', 'хотел' )] бросить вызов тем, кто знает о наших отношениях, сплетникам и интриганам, даже если это лишь разожжёт их.\n\n"
 lmf_lover.1075.desc.end: "Благоразумнее было бы тихо удалить [lover.GetHerHis]. Но зная [lover.GetHerHis], [lover.GetFirstNameNoTooltip] будет крайне [Select_CString(lover.IsFemale, 'недовольна', 'недоволен' )]."
 lmf_lover.1075.a: "Пусть [lover.GetFirstNameNoTooltip] останется и повеселится."
 lmf_lover.1075.a.success: "Вам удалось объяснить присутствие персонажа [lover.GetFirstNameNoTooltip]"
 lmf_lover.1075.a.fail: "Вам не удалось объяснить"
 lmf_lover.1075.b: "Нет, это неуместно. Удалить [lover.GetHerHis]."

 lmf_lover.1080.opening: "Любовь моя,"
 lmf_lover.1080.desc.start: "Говорят, разлука усиливает чувства. Похоже, это правда, ведь моё сердце тоскует по тебе.\n\nМне сказали, что "
 lmf_lover.1080.desc.army: "твоё войско расположилось лагерем далеко во владении "
 lmf_lover.1080.desc.travel: "твоё путешествие завело тебя в далёкое владение "
 lmf_lover.1080.desc.event: "ты сейчас в далёком владении "
 lmf_lover.1080.desc.end: "[my_camp.GetNameNoTierNoTooltip], и если это так, надеюсь, это письмо найдёт тебя в добром здравии. Я буду думать о тебе, пока ты не вернёшься во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_lover.1080.a: "Надеюсь, скоро увижу [lover.GetHerHis]."

 lmf_lover.1085.t: "[Select_CString(lover.IsFemale, 'Моя честолюбивая', 'Мой честолюбивый' )] [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))]"
 lmf_lover.1085.desc.start: "Я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы сказать, что [lover.GetFirstNameNoTooltip] что-то [Select_CString(lover.IsFemale, 'задумала', 'задумал' )], и, конечно же, когда мы раздевались в моих покоях, [lover.GetSheHe] [Select_CString(lover.IsFemale, 'остановилась', 'остановился' )].\n\n«Я хочу быть [Select_CString(lover.IsFemale, 'полезной', 'полезным' )]», - [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )] [lover.GetSheHe]. «Я пребываю при твоём дворе», - многозначительно произносит [lover.GetFirstNameNoTooltip], - «но мне нечего делать. У меня нет другой цели, кроме как служить тебе». "
 lmf_lover.1085.desc.target: "[Select_CString(lover.IsFemale, 'Она', 'Он' )] глубоко [Select_CString(lover.IsFemale, 'вздохнула', 'вздохнул' )]. «Я хочу придворную должность «[lover.Custom('GetTargetCourtPosition')]».\n\nПризнаю, я [Select_CString(ROOT.Char.IsFemale, 'удивилась', 'удивился' )]. «И это всё?»\n\n«Я серьёзно! "
 lmf_lover.1085.desc.bodyguard: "Кто защитит тебя лучше того, кто рядом днём и ночью? "
 lmf_lover.1085.desc.lady: "Подумай! Я буду рядом днём и ночью, и никто не посмеет осудить! "
 lmf_lover.1085.desc.oldholder: "Я буду служить вернее, чем [old_holder.GetTitledFirstNameNoTooltip]! "
 lmf_lover.1085.desc.noholder: "Должность же свободна? "
 lmf_lover.1085.desc.backup: "Или... или, возможно, ты предоставишь мне должность «[lover.Custom('GetBackupCourtPosition')]»? "
 lmf_lover.1085.desc.onlybackup: "[Select_CString(lover.IsFemale, 'Она', 'Он' )] глубоко [Select_CString(lover.IsFemale, 'вздохнула', 'вздохнул' )]. «Я хочу придворную должность [lover.Custom('GetBackupCourtPosition')]».\n\nПризнаю, я [Select_CString(ROOT.Char.IsFemale, 'удивилась', 'удивился' )]. «И это всё?»\n\n«Я серьёзно! "
 lmf_lover.1085.desc.nothing: "Я [Select_CString(ROOT.Char.IsFemale, 'спросила', 'спросил' )] #EMP как#! [Select_CString(lover.IsFemale, 'она', 'он' )] может служить, но [lover.GetSheHe] [Select_CString(lover.IsFemale, 'растерялась', 'растерялся' )]. "
 lmf_lover.1085.desc.end: "Пожалуйста, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)], я хочу заняться #EMP чем-нибудь#!!»\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )] - [lover.GetSheHe] не отступит, и вечер не продолжится, пока я не отвечу."
 lmf_lover.1085.a: "«Хорошо, ты получишь придворную должность «[lover.Custom('GetTargetCourtPosition')]»."
 lmf_lover.1085.b: "«Хорошо. [old_holder.GetTitledFirstNameNoTooltip] уступит должность тебе»."
 lmf_lover.1085.a.lady_in_waiting_soulmate: "«Какая мы пара!»"
 lmf_lover.1085.a.lady_in_waiting_lover: "«Хм, да, ты можешь прислуживать мне»."
 lmf_lover.1085.a.bodyguard_soulmate: "#EMP О, мой доблестный Патрокл...#!"
 lmf_lover.1085.a.bodyguard_lover: "«Ты не [Select_CString(lover.IsFemale, 'должна', 'должен' )] покидать меня, [lover.GetFirstNameNoTooltip]»."
 lmf_lover.1085.c: "«Тогда ты получишь придворную должность «[lover.Custom('GetBackupCourtPosition')]»."
 lmf_lover.1085.d: "«Мои [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] примут тебя в своих рядах»."
 lmf_lover.1085.e: "«Нет, это было бы неуместно»."
 lmf_lover.1086.title.tt: "Нарушенное обещание"
 lmf_lover.1086.desc: "[lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'лишена', 'лишён' )] придворной должности, тем самым вы нарушили обещание, данное [lover.GetHerHim]."

 lmf_lover.1090.opening: "Моя бедная любовь,"
 lmf_lover.1090.desc: "Если это письмо дошло, значит юный солдат, которого я [Select_CString(lover.IsFemale, 'подкупила', 'подкупил' )], сдержал слово, и [my_imprisoner.GetTitledFirstNameNoTooltip] (плюю на [my_imprisoner.GetHerHis] имя) ничего не [Select_CString(my_imprisoner.IsFemale, 'узнала', 'узнал' )].\n\nЯ [Select_CString(lover.IsFemale, 'написала', 'написал' )], как только [Select_CString(lover.IsFemale, 'узнала', 'узнал' )] о твоём пленении. Если бы я [Select_CString(lover.IsFemale, 'могла', 'мог' )] устроить побег! Увы, мне остаётся лишь утешать тебя словами и молиться о скором освобождении.\n\nЯ буду ждать дня нашей встречи."
 lmf_lover.1090.a: "Мысли о [Select_CString(lover.IsFemale, 'ней', 'нём' )] скрасят моё заточение."

 lmf_lover.1095.t: "Остывающие чувства"
 lmf_lover.1095.desc: "Когда я и [lover.GetFirstNameNoTooltip] только полюбили друг друга, я [Select_CString(ROOT.Char.IsFemale, 'была уверена', 'был уверен' )], что [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашёл' )] родственную душу. Сейчас? Не так [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )].\n\nЧувства всё ещё сильны, но сердце не замирает при мысли о [Select_CString(lover.IsFemale, 'ней', 'нём' )]. [Select_CString(lover.IsFemale, 'Она', 'Он' )] не занимает мои мысли каждую минуту... а глядя в [lover.GetHerHis] глаза, я вижу - [lover.GetSheHe] чувствует то же самое.\n\nМожет, это естественно - любовь со временем остывает. Или я недостаточно [Select_CString(ROOT.Char.IsFemale, 'старалась', 'старался' )] поддерживать пламя. Можно ли это исправить?\n\nИ хочу ли я этого теперь?"
 lmf_lover.1095.a: "Чувства меняются."
 lmf_lover.1095.b: "Попытаться возродить искру любви."
 lmf_lover.1095.b.success.tt: "Вам удалось возродить страсть"
 lmf_lover.1095.b.failure.tt: "Ваши попытки лишь ухудшили положение"

 lmf_lover.1098.t: "[Select_CString(my_bastard.IsFemale, 'Моя тайная дочь', 'Мой тайный сын' )]"
 lmf_lover.1098.courtier: "Я [Select_CString(ROOT.Char.IsFemale, 'удивилась', 'удивился' )], когда [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'попросила', 'попросил' )] встречи сегодня без договорённости. "
 lmf_lover.1098.notcourtier: "Я [Select_CString(ROOT.Char.IsFemale, 'удивилась', 'удивился' )], когда [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'прибыла', 'прибыл' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] без предупреждения. "
 lmf_lover.1098.start: "Ещё больше я [Select_CString(ROOT.Char.IsFemale, 'удивилась', 'удивился' )], увидев [Select_CString(my_bastard.IsFemale, 'девочку', 'мальчика' )] позади: [my_bastard.GetFirstNameNoTooltip], [Select_CString(lover.IsFemale, 'её', 'его' )] [my_bastard.Custom('GetDaughterSon')] "
 lmf_lover.1098.notsecret: "и также - моё тайное дитя.\n\n[Select_CString(my_bastard.IsFemale, 'Молчаливая', 'Молчаливый' )] [my_bastard.GetFirstNameNoTooltip] [Select_CString(my_bastard.IsFemale, 'была представлена', 'представлен' )] [Select_CString(lover.IsFemale, 'ей', 'им' )], после чего [Select_CString(lover.IsFemale, 'она посмотрел', 'он посмотрел' )] мне в глаза: «Пора людям узнать, кто [Select_CString(my_bastard.IsFemale, 'её', 'его' )] отец».\n\n"
 lmf_lover.1098.secret: ".\n\n[Select_CString(my_bastard.IsFemale, 'Молчаливая', 'Молчаливый' )] [my_bastard.GetFirstNameNoTooltip] [Select_CString(my_bastard.IsFemale, 'была представлена', 'представлен' )] [Select_CString(lover.IsFemale, 'ей', 'им' )], после чего [Select_CString(lover.IsFemale, 'она сказала', 'он сказал' )]: «Пора узнать, что [my_bastard.GetSheHe] [Select_CString(my_bastard.IsFemale, 'твоя дочь', 'твой сын' )]». Я [Select_CString(ROOT.Char.IsFemale, 'подозревала', 'подозревал' )], но [Select_CString(ROOT.Char.IsFemale, 'была шокирована', 'был шокирован' )] прямотой?\n\nНо [lover.GetSheHe] не [Select_CString(lover.IsFemale, 'закончила', 'закончил' )]: «Пора людям узнать, кто [Select_CString(my_bastard.IsFemale, 'её', 'его' )] отец».\n\n"
 lmf_lover.1098.criminal: "Я [Select_CString(ROOT.Char.IsFemale, 'предупредила', 'предупредил' )] о серьёзных последствиях, но [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'была непреклонна', 'был непреклонен' )]: «Дело не во мне, а в [my_bastard.GetHerHis] будущем и правде»."
 lmf_lover.1098.notcriminal: "Я [Select_CString(ROOT.Char.IsFemale, 'спросила', 'спросил' )], почему сейчас? [Select_CString(lover.IsFemale, 'Она ответила', 'Он ответил' )]: «Дело не в нас. [my_bastard.GetSheHe|U] [Select_CString(my_bastard.IsFemale, 'заслужила', 'заслужил' )] выйти из тени»."
 lmf_lover.1098.a: "Убедить её не делать этого сейчас."
 lmf_lover.1098.a.success: "[Select_CString(lover.IsFemale, 'Она согласна', 'Он согласен' )], но [Select_CString(lover.IsFemale, 'недовольна', 'недоволен' )]"
 lmf_lover.1098.a.failure: "[Select_CString(lover.IsFemale, 'Она', 'Он' )] раскрывает правду без согласия"
 lmf_lover.1098.b: "Пригрозить ей как сюзерен."
 lmf_lover.1098.b.angry: "[Select_CString(lover.IsFemale, 'Она', 'Он' )] в ярости, но отступает"
 lmf_lover.1098.b.dumped: "Тайна сохранена, но отношениям конец"
 lmf_lover.1098.c: "Возможно, она права. Пора."
 lmf_lover.1098.c.tt: "Вы автоматически простите преступления персонажа [lover.GetFirstNameNoTooltip]"

 lmf_lover.1100.t: "Взгляд на приз"
 lmf_lover.1100.desc.start: "Пока пот остывал после утех, я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )] - [lover.GetFirstNameNoTooltip] чего-то хочет. В [lover.GetHerHis] глазах был тот самый взгляд желания.\n\n\«Я [Select_CString(lover.IsFemale, 'видела', 'видел' )] "
 lmf_lover.1100.desc.jewelry: "чудесное украшение "
 lmf_lover.1100.desc.sword: "великолепный меч "
 lmf_lover.1100.desc.book: "невероятную книгу "
 lmf_lover.1100.desc.manuals: "замечательную коллекцию пособий "
 lmf_lover.1100.desc.robe: "невероятное облачение, столь искусно вышитую, "
 lmf_lover.1100.desc.end: "на рынке сегодня. Я так сильно этого [Select_CString(lover.IsFemale, 'хотела', 'хотел' )], хотя это, конечно, #EMP очень#! дорого...»\n\nНамерение было ясным: [lover.GetFirstNameNoTooltip] хочет, чтобы я [Select_CString(ROOT.Char.IsFemale, 'купила', 'купил' )] это в подарок для [Select_CString(lover.IsFemale, 'неё', 'него' )]. Более того, ещё до конца вечера [Select_CString(lover.IsFemale, 'она', 'он' )] уже [Select_CString(lover.IsFemale, 'умоляла', 'умолял' )] о [Select_CString(lover.IsFemale, 'её', 'его' )] вожделенном призе. «Неужели это так много, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]? Ты ведь обожаешь меня, не так ли?»"
 lmf_lover.1100.a: "Я удивлю [Select_CString(lover.IsFemale, 'её', 'его' )] чем-то ещё #EMP дороже#!"
 lmf_lover.1100.b: "Уступить и подарить [Select_CString(lover.IsFemale, 'ей', 'ему' )] подарок."
 lmf_lover.1100.c: "[Select_CString(lover.IsFemale, 'Она', 'Он' )] шутит? Ни за что!"

 lmf_lover.1105.t: "Тяжёлое оскорбление"
 lmf_lover.1105.desc.start: "Когда [lover.GetFirstNameNoTooltip] [Select_CString(lover.IsFemale, 'ворвалась', 'ворвался' )] в комнату, пылая от гнева, я сначала [Select_CString(ROOT.Char.IsFemale, 'подумала', 'подумал' )], что причина во мне.\n\nНо, нет, оказалось, что [Select_CString(lover.IsFemale, 'она', 'он' )] и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('my_courtier'))] столкнулись. "
 lmf_lover.1105.desc.relation: "[Select_CString(my_courtier.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('my_courtier'))] "
 lmf_lover.1105.desc.norelation: "[Select_CString(my_courtier.IsFemale, 'Женщина', 'Мужчина' )] "
 lmf_lover.1105.desc.end: "[Select_CString(my_courtier.IsFemale, 'позволила', 'позволил' )] себе комментарий, в котором [lover.GetSheHe] [Select_CString(lover.IsFemale, 'услышала', 'услышал' )], нечто... скажем так, недоброе. Это привело к перепалке, а затем и к громкой ссоре, и теперь [lover.GetFirstNameNoTooltip] говорит, что [my_courtier.GetFirstNameNoTooltip] «бегает по коридорам [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], распространяя лживые слухи» о [Select_CString(lover.IsFemale, 'ней', 'нём' )].\n\nПолагаю, это было неизбежно, учитывая, что всем при дворе известно о наших отношениях. Мне они ничего сказать не могут, но [Select_CString(lover.IsFemale, 'ей', 'ему' )]?\n\n[lover.GetFirstNameNoTooltip] прямо не [Select_CString(lover.IsFemale, 'просила', 'просил' )] меня что-либо предпринять, но я чувствую, что [Select_CString(lover.IsFemale, 'она', 'он' )] считает, что я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )]."
 lmf_lover.1105.a: "[my_courtier.GetFirstNameNoTooltip] покинет двор. Немедленно."
 got_me_kicked_from_court: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'добились', Select_CString(TARGET_CHARACTER.IsFemale, 'добилась', 'добился' ))] изгнания [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] из двора после того, как [Select_CString( CHARACTER.IsLocalPlayer, 'вы оскорбили', Select_CString(CHARACTER.IsFemale, 'она оскорбила', 'он оскорбил' ))] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вас', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))]."
