 INVITE_SOULMATE_TO_VISIT: "Меня сводит с ума, что день за днём во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] тебя нет рядом со мной. Пожалуйста, приезжай в гости. Мне нужно вспомнить, каково это — быть в твоих объятиях, смотреть в твои глаза."
 INVITE_LOVER_TO_VISIT: "Слишком долго я тебя не [Select_CString(actor.IsFemale, 'видела', 'видел' )]. Приезжай во владение [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], умоляю, чтобы я [Select_CString(actor.IsFemale, 'могла', 'мог' )] снова обнять тебя."
 INVITE_SPOUSE_TO_VISIT: "Я приглашаю тебя: приезжай в владение [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], чтобы мы могли провести время вместе как муж и жена и укрепить наши брачные узы."

 intro_marriage_notification_both_personal_matri: "На благо обеих наших держав я приглашаю вас приехать во владение [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], чтобы мы могли встретиться и обсудить возможность матрилинейного брака... если, конечно, мы оба будем согласны к концу вашего визита."
 intro_marriage_notification_actor_personal_matri: "С вашего позволения, я [Select_CString(actor.IsFemale, 'хотела', 'хотел' )] бы, чтобы я и [Select_CString(secondary_recipient.IsFemale, 'ваша', 'ваш' )] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.Custom('ComplimentAdjective')] [secondary_recipient.GetShortUIName] встретились. Я приглашаю [secondary_recipient.GetHerHis] посетить меня здесь, во владении [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], и, если мы оба будем согласны к концу [secondary_recipient.GetHerHis] визита, обсудить возможность моего матрилинейного брака с [Select_CString(secondary_recipient.IsFemale, 'ней', 'ним' )]."
 intro_marriage_notification_recipient_personal_matri: "Я приглашаю вас приехать во владение [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], чтобы вы и [Select_Cstring(secondary_actor.IsFemale, 'моя', 'мой' )] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))], [secondary_actor.Custom('ComplimentAdjective')] [secondary_actor.GetShortUIName] встретились, в интересах матрилинейного брака между вами... если, конечно, вы оба будете согласны к концу визита."
 intro_marriage_notification_matri: "Я хочу, чтобы [Select_CString(secondary_recipient.IsFemale, 'ваша', 'ваш' )] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetShortUIName], [Select_CString(secondary_recipient.IsFemale, 'приехала', 'приехал' )] сюда, во владение [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], чтобы [Select_CString(secondary_recipient.IsFemale, 'она', 'он' )] и [Select_Cstring(secondary_actor.IsFemale, 'моя', 'мой' )] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))] [secondary_actor.GetShortUIName] встретились. Если они понравятся друг другу, я предлагаю обсудить возможность матрилинейного брака между ними."
 intro_marriage_notification_both_personal: "На благо обеих наших держав я приглашаю вас приехать во владение [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], чтобы мы могли встретиться и обсудить возможность брака... если, конечно, мы оба будем согласны к концу вашего визита."
 intro_marriage_notification_actor_personal: "С вашего позволения, я [Select_CString(actor.IsFemale, 'хотела', 'хотел' )] бы, чтобы я и [Select_CString(secondary_recipient.IsFemale, 'ваша', 'ваш' )] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.Custom('ComplimentAdjective')] [secondary_recipient.GetShortUIName] встретились. Я приглашаю [secondary_recipient.GetHerHis] посетить меня здесь, во владении [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], и, если мы оба будем согласны к концу [secondary_recipient.GetHerHis] визита, обсудить возможность моего брака с [Select_CString(secondary_recipient.IsFemale, 'ней', 'ним' )]."
 intro_marriage_notification_recipient_personal: "Я приглашаю вас приехать во владение [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], чтобы вы и [Select_Cstring(actor.Custom2.IsFemale, 'моя', 'мой' )] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))], [secondary_actor.Custom('ComplimentAdjective')] [secondary_actor.GetShortUIName], могли встретиться. Если вы оба будете согласны к концу визита, я [Select_CString(actor.IsFemale, 'хотела', 'хотел' )] бы обсудить возможность брака."
 intro_marriage_notification: "Я хочу, чтобы [Select_CString(secondary_recipient.IsFemale, 'ваша', 'ваш' )] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetShortUIName], [Select_CString(secondary_recipient.IsFemale, 'приехала', 'приехал' )] сюда, во владение [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], чтобы [Select_CString(secondary_recipient.IsFemale, 'она', 'он' )] и [Select_Cstring(actor.Custom2.IsFemale, 'моя', 'мой' )] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))] [secondary_actor.GetShortUIName] встретились. Если они понравятся друг другу, я предлагаю обсудить возможность их брака."
 intro_betrothal_notofication_both_personal_matri: "На благо обеих наших держав я приглашаю вас приехать в [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], чтобы мы могли встретиться и обсудить возможность матрилинейной помолвки между нами... если, конечно, мы оба будем согласны к концу вашего визита."
