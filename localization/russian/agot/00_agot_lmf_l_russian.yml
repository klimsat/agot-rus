 lmf_scheme.1031.my.relation.notcourtier:0 "Я приш[Select_CString(proposer.IsFemale, 'ла', 'ёл' )] просить вашего разрешения жениться на ваш[Select_CString(proposer_target.IsFemale, 'ей', 'ем' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer_target'))], [proposer_target.GetTitledFirstName], котор[Select_CString(proposer_target.IsFemale, 'ая', 'ый' )] находится при дворе [Select_CString(proposer_target_liege.IsLocalPlayer, 'вашем', proposer_target_liege.GetShortUINamePossessive )].\n\n"
 lmf_scheme.1031.my.relation:0 "Я приш[Select_CString(proposer.IsFemale, 'ла', 'ёл' )] просить вашего разрешения жениться на ваш[Select_CString(proposer_target.IsFemale, 'ей', 'ем' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer_target'))], [proposer_target.GetTitledFirstName].\n\n"
 lmf_scheme.1031.other.relation:0 "Я приш[Select_CString(proposer.IsFemale, 'ла', 'ёл' )] просить вашего разрешения жениться на [proposer_target_liege.GetTitledFirstNamePossessive] [proposer_target_liege.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer_target'))], [proposer_target.GetTitledFirstName].\n\n"
 lmf_scheme.1031.both.my.courtier:0 "Я приш[Select_CString(proposer.IsFemale, 'ла', 'ёл' )] просить вашего разрешения жениться на мо[Select_CString(proposer_target.IsFemale, 'ей', 'ем' )] соседке по двору, [proposer_target.GetTitledFirstName].\n\n"
 lmf_scheme.1031.my.courtier:0 "Я приш[Select_CString(proposer.IsFemale, 'ла', 'ёл' )] просить вашего разрешения жениться на [proposer_target.Custom('polite_gender_ref')] по имени [proposer_target.GetFullName], котор[Select_CString(proposer_target.IsFemale, 'ая', 'ый' )] находится при дворе [Select_CString(proposer_liege.IsLocalPlayer, 'вашем', proposer_liege.GetShortUINamePossessive )].\n\n"
 lmf_scheme.1031.other.courtier:0 "Я приш[Select_CString(proposer.IsFemale, 'ла', 'ёл' )] просить вашего разрешения жениться на [proposer_target.Custom('polite_gender_ref')] по имени [proposer_target.GetFullName], котор[Select_CString(proposer_target.IsFemale, 'ая', 'ый' )] находится при дворе [Select_CString(proposer_target_liege.IsLocalPlayer, 'вашем', proposer_target_liege.GetShortUINamePossessive )].\n\n"
 lmf_scheme.1031.stranger:0 "Я приш[Select_CString(proposer.IsFemale, 'ла', 'ёл' )] просить вашего разрешения жениться на [proposer_target.Custom('polite_gender_ref')] по имени [proposer_target.GetFullName].\n\n"

 lmf_scheme.1031.both.family:0 "Вы, несомненно, имеете другие планы на нас или считаете нас слишком близкими родственниками, но "
 lmf_scheme.1031.only.target.family:0 "Вы, несомненно, имеете другие планы на [proposer_target.GetHerHis], но "
 lmf_scheme.1031.only.proposer.family:0 "Вы, несомненно, имеете другие планы на меня, но "
 lmf_scheme.1031.proposer.wanderer:0 "Я знаю, что я всего лишь [proposer.GetWomanMan] без сюзерена, но "
 lmf_scheme.1031.target.wanderer:0 "Я знаю, что [proposer_target.GetSheHe] всего лишь [proposer_target.GetWomanMan] без сюзерена, но "
 lmf_scheme.1031.proposer.leavescourt:0 "Я знаю, что это означает уход из вашего двора, но "
 lmf_scheme.1031.target.leavescourt:0 "Я знаю, что это означает, что [proposer_target.GetSheHe] приедет в [proposer_liege.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], но "
 lmf_scheme.1031.proposer.arrivescourt:0 "Я знаю, что это означало бы приезд ко вашему двору, но "
 lmf_scheme.1031.target.arrivescourt:0 "Я знаю, что это означает, что [proposer_target.GetSheHe] приедет в [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], но "
 lmf_scheme.1031.neither.family:0 "Я знаю, что это необычно, и вы можете считать нас неподходящей парой, но "

 lmf_extoll_knight:0 "искусн[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] вои[Select_CString(ROOT.GetCharacter.IsFemale, 'тельница', 'тель' )], котор[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] может быть [Select_CString(ROOT.GetCharacter.IsFemale, 'полезна', 'полезен' )] вам как [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]."
 lmf_extoll_physician:0 "учён[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] [ROOT.GetCharacter.GetWomanMan], котор[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] может служить вам как [GetCourtPositionType('court_physician_court_position').GetNameNoTooltip()|l]?"
 lmf_extoll_court_tutor:0 "учён[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] [ROOT.GetCharacter.GetWomanMan], котор[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] может служить вам как [GetCourtPositionType('court_tutor_court_position').GetNameNoTooltip()|l]?"
 lmf_extoll_antiquarian:0 "учён[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] [ROOT.GetCharacter.GetWomanMan], котор[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] может служить вам как [GetCourtPositionType('antiquarian_court_position').GetNameNoTooltip()|l]?"
 lmf_extoll_seneschal:0 "искусн[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] [ROOT.GetCharacter.GetWomanMan], котор[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] может служить вам как [GetCourtPositionType('seneschal_court_position').GetNameNoTooltip()|l]?"
 lmf_extoll_musician:0 "талантлив[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] артист[Select_CString(ROOT.GetCharacter.IsFemale, 'ка', '' )], котор[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] может служить вам как [GetCourtPositionType('court_musician_court_position').GetNameNoTooltip()|l]?"
 lmf_extoll_poet:0 "талантлив[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] писатель[Select_CString(ROOT.GetCharacter.IsFemale, 'ница', '' )], котор[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] может служить вам как [GetCourtPositionType('court_poet_court_position').GetNameNoTooltip()|l]?"
 lmf_extoll_spymaster:0 "весьма опытн[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] в искусстве интриг и может служить вам как [second.GetCouncillorPosition( 'councillor_spymaster' ).GetPositionName|l]?"
 lmf_extoll_marshal:0 "высококвалифицированн[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] вои[Select_CString(ROOT.GetCharacter.IsFemale, 'тельница', 'н' )], котор[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] может служить вам как [second.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName|l]?"
 lmf_extoll_virtuous:0 "[ROOT.GetCharacter.Custom('lmf_extoll_trait')] сам[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] добродетельн[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] [ROOT.GetCharacter.GetWomanMan]."
 lmf_extoll_diplomacy:0 "[ROOT.GetCharacter.Custom('lmf_extoll_trait')] весьма искусн[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] в дипломатии и может быть полезен[Select_CString(ROOT.GetCharacter.IsFemale, 'а', '' )]."
 lmf_extoll_martial:0 "[ROOT.GetCharacter.Custom('lmf_extoll_trait')] весьма искусн[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] в вопросах стратегии и войны и может быть полезен[Select_CString(ROOT.GetCharacter.IsFemale, 'а', '' )]."
 lmf_extoll_stewardship:0 "[ROOT.GetCharacter.Custom('lmf_extoll_trait')] весьма искусн[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] в управлении хозяйством и может быть полезен[Select_CString(ROOT.GetCharacter.IsFemale, 'а', '' )]."
 lmf_extoll_intrigue:0 "[ROOT.GetCharacter.Custom('lmf_extoll_trait')] весьма искусн[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] в интригах и может быть полезен[Select_CString(ROOT.GetCharacter.IsFemale, 'а', '' )]."
 lmf_extoll_learning:0 "[ROOT.GetCharacter.Custom('lmf_extoll_trait')] очень учён[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] [ROOT.GetCharacter.GetWomanMan] и может быть полезен[Select_CString(ROOT.GetCharacter.IsFemale, 'а', '' )]."
 lmf_extoll_family:0 "[ROOT.GetCharacter.Custom('lmf_extoll_trait')] из престижной семьи, а не обычн[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый' )] попрошайка с улиц."
