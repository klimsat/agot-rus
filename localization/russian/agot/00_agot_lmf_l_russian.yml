 insist_on_marriage_interaction_desc: "Отменить желание персонажа [recipient.GetShortUINameNoTooltipNoFormat] не вступать в брак. [recipient.GetSheHe|U] [Select_CString(recipient.IsFemale, 'выйдет замуж', 'женится')], когда вы сочтёте нужным, а не [recipient.GetSheHe]."
