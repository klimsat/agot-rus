 lmf_interaction.1329.desc.start.secrec: "День, который я и [secondary_actor.GetTitledFirstNameNoTooltip] провели в компании, обернулся катастрофой.\n\n"
 lmf_interaction.1329.desc.secrec.both.start: "Мы были как масло и вода с самого начала. "
 lmf_interaction.1329.desc.secrec.both.hunting: "Наш разговор во время охоты быстро превратился в споры и холодное молчание. [secondary_actor.GetFirstNameNoTooltip] в какой-то момент [Select_CString(secondary_actor.IsFemale, 'поехала', 'поехал' )] вперёд, оставив меня позади, и когда я [Select_CString(ROOT.Char.IsFemale, 'догнала', 'догнал' )] [secondary_actor.GetHerHis], ситуация не улучшилась. "
 lmf_interaction.1329.desc.secrec.both.hike: "Наш разговор во время похода быстро превратился в споры и холодное молчание. [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'задала', 'задал' )] нещадный темп и, казалось, [Select_CString(secondary_actor.IsFemale, 'раздражалась', 'раздражался')] из-за моего незнания местности. "
 lmf_interaction.1329.desc.secrec.both.garrison: "[secondary_actor.GetFirstNameNoTooltip] полностью [Select_CString(secondary_actor.IsFemale, 'игнорировала', 'игнорировал' )] меня, пока [secondary_actor.GetSheHe] и [secondary_actor.GetHerHis] [actor.Custom('KnightCulturePluralNoTooltipLowercase')] сражались, и когда поединки закончились, дела пошли немногим лучше. "
 lmf_interaction.1329.desc.secrec.both.poetry: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'развлекала', 'развлекал' )] меня [secondary_actor.GetCulture.GetCollectiveNounNoTooltip|l]ой поэзией, пока мы бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], но, судя по всему, [secondary_actor.GetHerHis] мало интересовало моё мнение о ней. А когда у н[secondary_actor.GetHerHis] закончились стихи, ситуация стала ещё более неловкой. "
 lmf_interaction.1329.desc.secrec.both.library: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'показывала', 'показывал' )] мне библиотеку [actor.Custom('FortifiedBuilding_RU_Gen')], но, казалось, [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'была', 'был' )] гораздо больше [Select_CString(secondary_actor.IsFemale, 'заинтересована', 'заинтересован' )] в книгах, чем в том, что я [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )] сказать. Если я [Select_CString(ROOT.Char.IsFemale, 'высказала', 'высказал' )] мнение? Это было ещё хуже. " 
 lmf_interaction.1329.desc.secrec.both.church: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'привела', 'привёл' )] меня в [actor.GetFaith.HouseOfWorship|l] во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], но [Select_CString(secondary_actor.IsFemale, 'провела', 'провёл' )] всё время, слушая проповеди о благочестии. Если я [Select_CString(ROOT.Char.IsFemale, 'пыталась', 'пытался' )] заговорить, меня просили быть тише. "
 lmf_interaction.1329.desc.secrec.both.poor: "Мы провели день, раздавая милостыню беднякам перед храмом во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Благое дело, но разговора практически не было. "
 lmf_interaction.1329.desc.secrec.both.tour: "Мы осмотрели [actor.Custom('FortifiedBuilding')] и окрестные земли, но это было формальностью. [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'казалась раздражённой', 'казался раздражённым' )] моей неосведомлённостью о владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], и наш разговор быстро превратился в споры и холодное молчание. "
 lmf_interaction.1329.desc.secrec.both.garden: "Мы бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], но наш разговор быстро превратился в споры и холодное молчание. Несколько раз [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'ускоряла шаг и шла', 'ускорял шаг и шёл' )] вперёд, заставляя меня бежать, чтобы догнать. "
 lmf_interaction.1329.desc.secrec.both.mid: "Постоянное ощущение слежки заставляло нас нервничать, что лишь усиливало напряжение между нами. Ничто из сказанного мной не радовало [secondary_recipient.GetHerHis], а все, что [Select_CString(secondary_recipient.IsFemale, 'говорила', 'говорил' )] [secondary_recipient.SheHe], заставляло меня закатывать глаза."
 lmf_interaction.1329.desc.secrec.secact.start: "Сначала мне казалось, что всё идёт достаточно хорошо. "
 lmf_interaction.1329.desc.secrec.secact.hunting: "Охота рядом с владением [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] была приятной, и [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'казалась приятной', 'казался приятным' )]. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'оказалась отличной компаньонкой', 'оказался отличным компаньоном' )] на охоте"
 lmf_interaction.1329.desc.secrec.secact.hike: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'была', 'был' )] достаточно [Select_CString(secondary_actor.IsFemale, 'приятна', 'приятен' )] во время похода и [Select_CString(secondary_actor.IsFemale, 'внимательна', 'внимателен' )] к темпу. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'указывала', 'указывал' )] на многочисленные достопримечательности, объясняя их историю"
 lmf_interaction.1329.desc.secrec.secact.garrison: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'привела', 'привёл' )] меня в гарнизон [actor.Custom('FortifiedBuilding_RU_Gen')], где [secondary_actor.GetSheHe] и [secondary_actor.GetHerHis] [actor.Custom('KnightCulturePluralNoTooltipLowercase')] сражались в напряженных поединках. Мы разговаривали между поединками"
 lmf_interaction.1329.desc.secrec.secact.poetry: "Мы осматривали сады [actor.Custom('FortifiedBuilding_RU_Gen')], пока [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'развлекала', 'развлекал' )] меня [secondary_actor.GetCulture.GetCollectiveNounNoTooltip|l]ой поэзией. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'делала', 'делал' )] это элегантно, хотя и с оттенком искусственности"
 lmf_interaction.1329.desc.secrec.secact.library: "Мы осматривали библиотеку [actor.Custom('FortifiedBuilding_RU_Gen')], и [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'показывала', 'показывал' )] мне самые любимые из [secondary_actor.GetHerHis] многих томов. [secondary_actor.GetHerHis|U] глаза буквально сверкали, когда [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'говорила', 'говорил' )] о литературе" 
 lmf_interaction.1329.desc.secrec.secact.church: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'привела', 'привёл' )] меня в [actor.GetFaith.HouseOfWorship|l] во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где мы слушали проповеди о благочестии. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'казалась', 'казался' )] столь [Select_CString(secondary_actor.IsFemale, 'увлечённой', 'увлечённым' )] всем, что связано с верой"
 lmf_interaction.1329.desc.secrec.secact.poor: "Мы провели день, раздавая милостыню беднякам перед храмом во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'казалась', 'казался' )] столь [Select_CString(secondary_actor.IsFemale, 'искренней и истинной', 'искренним и истинным' )] в своём сострадании"
 lmf_interaction.1329.desc.secrec.secact.tour: "Мы осмотрели [actor.Custom('FortifiedBuilding')] и окрестные земли, [secondary_actor.GetFirstNameNoTooltip] с большим интересом и деталями [Select_CString(secondary_actor.IsFemale, 'объясняла', 'объяснял' )] историю всего. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'казалась', 'казался' )] столь [Select_CString(secondary_actor.IsFemale, 'внимательной', 'внимательным' )]"
 lmf_interaction.1329.desc.secrec.secact.garden: "Мы бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], ведя разговор, который, по крайней мере сначала, казался оживлённым. [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'имела', 'имел' )] множество интересов, которые [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'была', 'был' )] более чем [Select_CString(secondary_actor.IsFemale, 'готова', 'готов' )] обсудить"
 lmf_interaction.1329.desc.secrec.secact.mid: ", и я [Select_CString(ROOT.Char.IsFemale, 'почувствовала', 'почувствовал' )] себя [Select_CString(ROOT.Char.IsFemale, 'очарованной', 'очарованным' )] [secondary_actor.GetHerHis] манерами.\n\nОднако постепенно я [Select_CString(ROOT.Char.IsFemale, 'обнаружила', 'обнаружил' )], что [secondary_recipient.GetSheHe] не [Select_CString(secondary_recipient.IsFemale, 'разделяла', 'разделял' )] этих чувств. Я [Select_CString(ROOT.Char.IsFemale, 'замечала', 'замечал' )], как [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'закатывала', 'закатывал' )] глаза, когда я [Select_CString(ROOT.Char.IsFemale, 'говорила', 'говорил' )], и [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'вздрагивала', 'вздрагивал' )], когда я [Select_CString(ROOT.Char.IsFemale, 'приближалась', 'приближался' )]. Напряжение стало невыносимым."
 lmf_interaction.1329.desc.secrec.secrec.start: "Сначала всё шло достаточно хорошо. "
 lmf_interaction.1329.desc.secrec.secrec.hunting: "Охота вблизи владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] была приятной, и [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'казалась приятной', 'казался приятным' )], и [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'оказалась отличной компаньонкой', 'оказался отличным компаньоном' )] на охоте... по крайней мере поначалу."
 lmf_interaction.1329.desc.secrec.secrec.hike: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'была', 'был' )] достаточно [Select_CString(secondary_actor.IsFemale, 'приятна', 'приятен' )] во время похода и [Select_CString(secondary_actor.IsFemale, 'внимательна', 'внимателен' )] к темпу. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'указывала', 'указывал' )] на многочисленные достопримечательности, подробно, хотя и сухо, объясняя их историю."
 lmf_interaction.1329.desc.secrec.secrec.garrison: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'привела', 'привёл' )] меня в гарнизон [actor.Custom('FortifiedBuilding_RU_Gen')], где [secondary_actor.GetSheHe] и [secondary_actor.GetHerHis] [actor.Custom('KnightCulturePluralNoTooltipLowercase')] сражались в поединках, хотя [secondary_actor.GetSheHe] внимательно [Select_CString(secondary_actor.IsFemale, 'относилась', 'относился' )] ко мне между поединками."
 lmf_interaction.1329.desc.secrec.secrec.poetry: "Мы осматривали сады [actor.Custom('FortifiedBuilding_RU_Gen')], пока [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'развлекала', 'развлекал' )] меня [secondary_actor.GetCulture.GetCollectiveNounNoTooltip|l]ой поэзией. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'исполняла', 'исполнял' )] достаточно хорошо, хотя [secondary_actor.GetHerHis] выбор стихов был сомнителен."
 lmf_interaction.1329.desc.secrec.secrec.library: "Мы осматривали библиотеку [actor.Custom('FortifiedBuilding_RU_Gen')], и [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'показывала', 'показывал' )] мне самые любимые из своих многих томов. Я [Select_CString(ROOT.Char.IsFemale, 'усомнилась', 'усомнился' )] в некоторых [secondary_actor.GetHerHis] выборах, но [Select_CString(ROOT.Char.IsFemale, 'была успокоена', 'был успокоен' )] [secondary_actor.GetHerHis] явной страстью к знаниям."
 lmf_interaction.1329.desc.secrec.secrec.church: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'привела', 'привёл' )] меня в [actor.GetFaith.HouseOfWorship|l] во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где мы слушали проповеди о благочестии. [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'казалась', 'казался' )] истинно [Select_CString(secondary_actor.IsFemale, 'верующей', 'верующим' )], [Select_CString(ROOT.Char.IsFemale, 'подумала', 'подумал' )] я, хотя [secondary_actor.GetHerHis] попытки завязать разговор были менее искренними."
 lmf_interaction.1329.desc.secrec.secrec.poor: "Мы провели день, раздавая милостыню беднякам перед храмом во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [secondary_actor.GetFirstNameNoTooltip] явно [Select_CString(secondary_actor.IsFemale, 'пыталась', 'пытался' )] произвести на меня впечатление [secondary_actor.GetHerHis] щедростью, что поначалу забавляло."
 lmf_interaction.1329.desc.secrec.secrec.tour: "Мы осмотрели [actor.Custom('FortifiedBuilding')] и окрестные земли, [secondary_actor.GetFirstNameNoTooltip] с большим интересом и деталями [Select_CString(secondary_actor.IsFemale, 'объясняла', 'объяснял' )] историю всего. Это было приятно, хотя я не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] вставить слово."
 lmf_interaction.1329.desc.secrec.secrec.garden: "Мы бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], ведя разговор, который, по крайней мере сначала, казался оживленным. [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'имела', 'имел' )] так много интересов, и, казалось, не было конца мнениям, которые [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'могла', 'мог' )] выразить о них."
 lmf_interaction.1329.desc.secrec.secrec.mid: "\n\nОднако постепенно я [Select_CString(ROOT.Char.IsFemale, 'почувствовала', 'почувствовал' )], как меня охватывает все большее раздражение. [secondary_recipient.GetHerHis|U] манеры раздражали, [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'заставляла', 'заставлял' )] меня закатывать глаза, и напряжение росло. Если [secondary_recipient.GetSheHe] и [Select_CString(secondary_recipient.IsFemale, 'заметила', 'заметил' )] это, [secondary_recipient.GetSheHe] не [Select_CString(secondary_recipient.IsFemale, 'подала', 'подал' )] виду. Действительно, [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'казалась', 'казался' )] совершенно [Select_CString(secondary_recipient.IsFemale, 'очарованной', 'очарованным' )] мной... но я? Я не [Select_CString(ROOT.Char.IsFemale, 'разделяла', 'разделял' )] этих чувств."
 lmf_interaction.1329.desc.rival.secrec: " В какой-то момент я [Select_CString(ROOT.Char.IsFemale, 'споткнулась', 'споткнулся' )], и [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'рассмеялась', 'рассмеялся' )] надо мной — [Select_CString(secondary_actor.IsFemale, 'рассмеялась', 'рассмеялся' )]! Клянусь, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] свернуть [secondary_actor.GetHerHim] шею прямо на месте."
 lmf_interaction.1329.desc.end.secrec: "\n\nК тому времени, как зашло солнце и мы вернулись в [actor.Custom('FortifiedBuilding')], стало ясно, что мы не пара."
 lmf_interaction.1329.desc.end.secrec.nomarry: " [actor.GetTitledFirstNameNoTooltip] явно [Select_CString(actor.IsFemale, 'согласилась', 'согласился' )], и немедленно [Select_CString(actor.IsFemale, 'отменила', 'отменил' )] подготовку к такому союзу, как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]."
 lmf_interaction.1329.desc.end.secrec.marry: " [actor.GetTitledFirstNameNoTooltip], однако, не [Select_CString(actor.IsFemale, 'согласилась', 'согласился' )] и хочет продолжить подготовку к такому союзу, как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l], несмотря ни на что. Вопрос, следовательно, таков: [Select_CString(ROOT.Char.IsFemale, 'согласна', 'согласен' )] ли я?"
 lmf_interaction.1329.desc.start: "Я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] вести от н[secondary_recipient.GetHerHis], и [secondary_recipient.GetFirstNameNoTooltip] пишет, что [secondary_recipient.GetHerHis] визит во владение [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] был катастрофой.\n\n"
 lmf_interaction.1329.desc.both.loved: "По-видимому, сначала всё шло достаточно хорошо. [secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'наслаждалась', 'наслаждался' )] таким занятием, как [secondary_actor.Custom('lmf_intro_activity_short')], но не [Select_CString(secondary_actor.IsFemale, 'сама', 'сам' )] [secondary_actor.GetFirstNameNoTooltip]. "
 lmf_interaction.1329.desc.both.hated: "[secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'возненавидела', 'возненавидел' )] такое занятие, как [secondary_actor.Custom('lmf_intro_activity_short')], и дальше всё только ухудшалось. "
 lmf_interaction.1329.desc.both.neutral: "[secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'сочла', 'счёл' )] такое занятие, как [secondary_actor.Custom('lmf_intro_activity_short')], терпимым, но не [Select_CString(secondary_actor.IsFemale, 'сама', 'сам' )] [secondary_actor.GetFirstNameNoTooltip]. "
 lmf_interaction.1329.desc.both.hunting: "Они спорили по пути у владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где [secondary_actor.GetSheHe] постоянно [Select_CString(secondary_actor.IsFemale, 'скакала', 'скакал' )] впереди н[secondary_recipient.GetHerHis], оставляя [secondary_recipient.GetHerHis] изо всех сил пытаться догнать. Даже когда [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'догоняла', 'догонял' )], их разговор, по сообщениям, был неловким, если вообще происходил."
 lmf_interaction.1329.desc.both.hike: "Изначально разговор был достаточно приятным... пока спор не привел к холодному молчанию. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'задавала', 'задавал' )] нещадный темп и, казалось, [Select_CString(secondary_actor.IsFemale, 'раздражалась', 'раздражался' )] из-за [secondary_recipient.GetHerHis] незнания местности. Никто не хотел там быть, но к тому моменту было уже слишком поздно."
 lmf_interaction.1329.desc.both.garrison: "[secondary_actor.GetSheHe|U] практически [Select_CString(secondary_actor.IsFemale, 'игнорировала', 'игнорировал' )] [secondary_recipient.GetHerHis], пока [secondary_actor.GetSheHe] и [secondary_actor.GetHerHis] [actor.Custom('KnightCulturePluralNoTooltipLowercase')] сражались, и когда поединки закончились, дела пошли немногим лучше. Немногочисленные разговоры были неловкими и наполнены холодным молчанием."
 lmf_interaction.1329.desc.both.seduction: "Они бродили по территории [actor.Custom('FortifiedBuilding_RU_Gen')], мало разговаривая. Затем [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'начала', 'начал' )] стоять слишком близко к н[secondary_recipient.GetHerHim], по общим отзывам [Select_CString(secondary_actor.IsFemale, 'вела', 'вёл' )] себя неподобающе и [Select_CString(secondary_actor.IsFemale, 'намекала', 'намекал' )] на то, что явно не интересовало [secondary_recipient.GetHerHis]."
 lmf_interaction.1329.desc.both.poetry: "[secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'развлекала', 'развлекал' )] [secondary_recipient.GetHerHis] [secondary_actor.GetCulture.GetCollectiveNounNoTooltip|l] стихами, пока они бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], но [secondary_recipient.GetSheHe] либо [Select_CString(secondary_recipient.IsFemale, 'скучала', 'скучал' )] от поэзии, либо от н[secondary_actor.GetHerHis]. В любом случае [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'обиделась', 'обиделся' )]."
 lmf_interaction.1329.desc.both.library: "[secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'показала', 'показал' )] [secondary_recipient.GetHerHim] самые любимые из своих многих томов и [Select_CString(secondary_actor.IsFemale, 'казалась', 'казался' )] совершенно не [Select_CString(secondary_actor.IsFemale, 'осведомлённой', 'осведомлённым' )] о том, что [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была не заинтересована', 'был не заинтересован')]."
 lmf_interaction.1329.desc.both.church: "Они слушали проповеди о благочестии, но очевидно мало что еще делали. Любые разговоры были неестественными и неловкими, в лучшем случае."
 lmf_interaction.1329.desc.both.tavern: "[secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'сделала', 'сделал' )] странный выбор, приведя [secondary_recipient.GetHerHis] в таверну во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где [secondary_actor.GetSheHe] практически [Select_CString(secondary_actor.IsFemale, 'оставила', 'оставил' )] [secondary_recipient.GetHerHis] в углу. Когда [secondary_actor.GetSheHe] наконец [Select_CString(secondary_actor.IsFemale, 'вернулась', 'вернулся')] к н[secondary_recipient.GetHerHim], [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] в ярости."
 lmf_interaction.1329.desc.both.poor: "Они провели день у храма во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], но стояли далеко друг от друга и редко разговаривали. Когда они это делали, их разговор был неловким и наполнен холодным молчанием."
 lmf_interaction.1329.desc.both.tour: "[secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'показала', 'показал' )] [secondary_recipient.GetHerHim] [actor.Custom('FortifiedBuilding')] и окрестные земли, подробно объясняя историю всего... и явно не замечая, что [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] совершенно не [Select_CString(secondary_recipient.IsFemale, 'заинтересована', 'заинтересован' )]."
 lmf_interaction.1329.desc.both.garden: "Они стояли далеко друг от друга во время прогулки и явно выглядели так, будто предпочли бы быть где угодно в другом месте. Происходившие разговоры, по сообщениям, были неестественными и неловкими, причем [secondary_actor.GetSheHe] постоянно [Select_CString(secondary_actor.IsFemale, 'закатывала', 'закатывал' )] глаза на всё, что [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'говорила', 'говорил' )]."
 lmf_interaction.1329.desc.both.mid: "\n\nОни были как масло и вода, и если что и изменилось, так это то, что они стали нравиться друг другу ещё меньше после целого дня, проведённого вместе."
 lmf_interaction.1329.desc.secact.start: "[secondary_actor.GetFirstNameNoTooltip] сначала [Select_CString(secondary_actor.IsFemale, 'казалась', 'казался' )] достаточно [Select_CString(secondary_actor.IsFemale, 'заинтересованной', 'заинтересованным' )], пишет [secondary_recipient.GetSheHe]. "
 lmf_interaction.1329.desc.secact.hunting: "Они выехали в путь у владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где [secondary_actor.GetFirstNameNoTooltip] изо всех сил [Select_CString(secondary_actor.IsFemale, 'старалась', 'старался' )] очаровать [secondary_recipient.GetHerHis] своим искусством вести беседу. Действительно, [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'казалась', 'казался' )] столь [Select_CString(secondary_actor.IsFemale, 'увлечённой', 'увлечённым' )], что сама охота практически не состоялась."
 lmf_interaction.1329.desc.secact.hike: "Они отправились в поход по тропам возле владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'задала', 'задал' )] неторопливый темп и [Select_CString(secondary_actor.IsFemale, 'была', 'был' )] очень [Select_CString(secondary_actor.IsFemale, 'внимательна', 'внимателен' )]. [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'казалась очарованной', 'казался очарованным' )] [Select_CString(secondary_recipient.IsFemale, 'ей', 'им' )] с самого начала, всячески стараясь произвести впечатление на н[secondary_recipient.GetHerHis]."
 lmf_interaction.1329.desc.secact.garrison: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'привела', 'привёл' )] [secondary_recipient.GetHerHis] в гарнизон [actor.Custom('FortifiedBuilding_RU_Gen')], где [secondary_actor.GetSheHe] и [secondary_actor.GetHerHis] [actor.Custom('KnightCulturePluralNoTooltipLowercase')] сражались в поединках, явно стараясь сверх меры произвести впечатление на н[secondary_recipient.GetHerHis]. [secondary_recipient.GetSheHe|U], по сути, [Select_CString(secondary_recipient.IsFemale, 'казалась очарованной', 'казался очарованным' )]."
 lmf_interaction.1329.desc.secact.seduction: "Они бродили по территории [actor.Custom('FortifiedBuilding_RU_Gen')], где [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'пыталась', 'пытался' )] очаровать [secondary_recipient.GetHerHis] разговором. [secondary_actor.GetSheHe|U] явно [Select_CString(secondary_actor.IsFemale, 'восприняла', 'воспринял' )] [secondary_recipient.GetHerHis] молчание как поощрение, ибо [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'начала', 'начал' )] вести себя... неподобающе. [Select_CString(secondary_recipient.IsFemale, 'Стояла', 'Стоял' )] слишком близко и [Select_CString(secondary_recipient.IsFemale, 'делала', 'делал' )] намекающие замечания, явно будучи [Select_CString(secondary_recipient.IsFemale, 'убеждённой', 'убеждённым')], что всё идёт замечательно."
 lmf_interaction.1329.desc.secact.poetry: "Они осматривали сады [actor.Custom('FortifiedBuilding_RU_Gen')], пока [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'развлекала', 'развлекал' )] [secondary_recipient.GetHerHis] [secondary_actor.GetCulture.GetCollectiveNounNoTooltip|l]ой поэзией. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'восприняла', 'воспринял' )] [secondary_recipient.GetHerHis] относительное молчание как поощрение и [Select_CString(secondary_actor.IsFemale, 'старалась', 'старался' )] ещё усерднее в своих декламациях, явно будучи [Select_CString(secondary_actor.IsFemale, 'очарованной', 'очарованным' )]."
 lmf_interaction.1329.desc.secact.library: "Они осматривали библиотеку [actor.Custom('FortifiedBuilding_RU_Gen')], и [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'показала', 'показал' )] [secondary_recipient.GetHerHim] самые любимые из многих томов. [secondary_actor.GetSheHe|U] без умолку [Select_CString(secondary_actor.IsFemale, 'болтала и воспринимала', 'болтал и воспринимал' )] [secondary_recipient.GetHerHis] относительное молчание как поощрение, так как [secondary_actor.GetSheHe] явно [Select_CString(secondary_actor.IsFemale, 'была очарована', 'был очарован' )]."
 lmf_interaction.1329.desc.secact.church: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'привела', 'привёл' )] [secondary_recipient.GetHerHis] в [actor.GetFaith.HouseOfWorship|l] во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где они слушали проповеди о благочестии. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'пыталась', 'пытался' )] очаровать [secondary_recipient.GetHerHis] своей верой, явно [Select_CString(secondary_actor.IsFemale, 'заинтересованный', 'заинтересованная' )] в [secondary_recipient.GetHerHis] одобрении."
 lmf_interaction.1329.desc.secact.tavern: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'сделала', 'сделал' )] странный выбор, приведя [secondary_recipient.GetHerHis] в таверну во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'пыталась', 'пытался' )] развеселить [secondary_recipient.GetHerHis]. По сообщениям, [secondary_actor.GetSheHe] много [Select_CString(secondary_actor.IsFemale, 'пила и считала', 'пил и считал' )], что оба прекрасно проводят время."
 lmf_interaction.1329.desc.secact.poor: "Они провели день, раздавая милостыню беднякам перед храмом во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [secondary_actor.GetFirstNameNoTooltip] явно [Select_CString(secondary_actor.IsFemale, 'была очарована', 'был очарован' )], изо всех сил стараясь произвести впечатление на н[secondary_recipient.GetHerHis] своей щедростью."
 lmf_interaction.1329.desc.secact.tour: "Они осмотрели [actor.Custom('FortifiedBuilding')] и окрестные земли, [secondary_actor.GetFirstNameNoTooltip] с большим интересом и детально [Select_CString(secondary_actor.IsFemale, 'объясняла', 'объяснял' )] [secondary_recipient.GetHerHim] историю. Слишком много, возможно, такова была [secondary_actor.GetHerHis] старательность."
 lmf_interaction.1329.desc.secact.garden: "Они бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], ведя разговор, который [secondary_recipient.GetSheHe] называет довольно односторонним. [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'стремилась', 'стремился' )] произвести впечатление на н[secondary_recipient.GetHerHis] и изо всех сил [Select_CString(secondary_actor.IsFemale, 'старалась', 'старался' )] очаровать [secondary_recipient.GetHerHis]... и явно [Select_CString(secondary_actor.IsFemale, 'считала', 'считал' )], что [secondary_actor.GetSheHe] преуспевает в этом."
 lmf_interaction.1329.desc.secact.hated: "\n\n[secondary_recipient.GetSheHe|U] пишет, однако, что [secondary_recipient.GetSheHe] не [Select_CString(secondary_recipient.IsFemale, 'разделяла', 'разделял' )] этих чувств. С самого начала [secondary_recipient.GetSheHe] не [Select_CString(secondary_recipient.IsFemale, 'наслаждалась', 'наслаждался' )] таким занятием, как [secondary_actor.Custom('lmf_intro_activity_short')], и это всё больше раздражало [secondary_recipient.GetHerHis] по мере того, как шёл день."
 lmf_interaction.1329.desc.secact.loved: "\n\nНесмотря на то что [secondary_recipient.GetSheHe] пишет, что [Select_CString(secondary_recipient.IsFemale, 'наслаждалась', 'наслаждался' )] таким занятием, как [secondary_actor.Custom('lmf_intro_activity_short')], [secondary_recipient.GetSheHe] не [Select_CString(secondary_recipient.IsFemale, 'разделяла', 'разделял' )] этих чувств. [secondary_recipient.GetHerHis|U] удовольствие уменьшалось по мере того, как шёл день, в конечном счете превращаясь в скуку и негодование."
 lmf_interaction.1329.desc.secact.neutral: "\n\n[secondary_recipient.GetSheHe|U] пишет, однако, что [secondary_recipient.GetSheHe] не [Select_CString(secondary_recipient.IsFemale, 'разделяла', 'разделял' )] этих чувств. [secondary_recipient.GetSheHe|U] говорит, что [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] либо [Select_CString(secondary_recipient.IsFemale, 'скучающей', 'скучающим' )], либо [Select_CString(secondary_recipient.IsFemale, 'раздражённой', 'раздражённым' )], и ситуация не улучшалась с течением дня."
 lmf_interaction.1329.desc.secrec.start: "[secondary_recipient.GetFirstNameNoTooltip] пишет, что [secondary_recipient.GetSheHe] сначала [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] достаточно [Select_CString(secondary_recipient.IsFemale, 'заинтересована', 'заинтересован' )]. "
 lmf_interaction.1329.desc.secrec.hunting: "Они выехали в путь у владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'пыталась', 'пытался' )] очаровать [secondary_actor.GetHerHis] своим искусством вести беседу. Действительно, [secondary_recipient.GetSheHe] так [Select_CString(secondary_recipient.IsFemale, 'отвлекала', 'отвлекал' )] [secondary_actor.GetHerHis], что охота почти не состоялась. Ясно, что [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была очарована', 'был очарован' )]."
 lmf_interaction.1329.desc.secrec.hike: "Они отправились в поход по тропам возле владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'задала', 'задал' )] неторопливый темп и, по сообщениям, [Select_CString(secondary_actor.IsFemale, 'была', 'был' )] очень [Select_CString(secondary_actor.IsFemale, 'внимательна', 'внимателен' )]. [secondary_recipient.GetFirstNameNoTooltip] говорит, что [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была очарована', 'был очарован' )] [Select_CString(secondary_actor.IsFemale, 'ей', 'им' )] с самого начала, всячески стараясь произвести впечатление на н[secondary_actor.GetHerHis]."
 lmf_interaction.1329.desc.secrec.garrison: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'привела', 'привёл' )] [secondary_recipient.GetHerHis] в гарнизон [actor.Custom('FortifiedBuilding_RU_Gen')], где [secondary_actor.GetSheHe] и [secondary_actor.GetHerHis] [actor.Custom('KnightCulturePluralNoTooltipLowercase')] сражались в напряжённых поединках. [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'была впечатлена', 'был впечатлён' )], [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] в восторге от н[secondary_actor.GetHerHis] после каждого поединка."
 lmf_interaction.1329.desc.secrec.seduction: "Они бродили по территории [actor.Custom('FortifiedBuilding_RU_Gen')], где [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'вела', 'вёл' )] себя с [Select_CString(secondary_recipient.IsFemale, 'ней', 'ним' )] более чем неподобающе... по крайней мере поначалу. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'стояла', 'стоял' )] слишком близко, [Select_CString(secondary_actor.IsFemale, 'была намекающей и сверхдружелюбной', 'был намекающим и сверхдружелюбным' )], но [secondary_recipient.GetSheHe] утверждает, что [secondary_recipient.GetSheHe] не [Select_CString(secondary_recipient.IsFemale, 'возражала', 'возражал' )] вовсе. К середине дня [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была очарован', 'был очарован' )]."
 lmf_interaction.1329.desc.secrec.poetry: "Они осматривали сады [actor.Custom('FortifiedBuilding_RU_Gen')], пока [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'развлекала', 'развлекал' )] [secondary_recipient.GetHerHis] отрывками из [secondary_actor.GetCulture.GetCollectiveNounNoTooltip|l]ой поэзии. [secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'реагировала', 'реагировал' )] с энтузиазмом, и к середине дня [secondary_recipient.GetSheHe] говорит, что [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] полностью [Select_CString(secondary_recipient.IsFemale, 'очарована', 'очарован' )] [Select_CString(secondary_actor.IsFemale, 'ей', 'им' )]."
 lmf_interaction.1329.desc.secrec.library: "Они осматривали библиотеку [actor.Custom('FortifiedBuilding_RU_Gen')], и [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'показывала', 'показывал' )] [secondary_recipient.GetHerHim] самые любимые из своих многих томов. [secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] в восторге, и, по [secondary_recipient.GetHerHis] словам, пока [secondary_recipient.GetSheHe] без умолку [Select_CString(secondary_recipient.IsFemale, 'болтала', 'болтал' )], [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'ась', 'ся')] [Select_CString(secondary_actor.IsFemale, 'была очарована', 'был очарован' )]."
 lmf_interaction.1329.desc.secrec.church: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'привела', 'привёл' )] [secondary_recipient.GetHerHis] в [actor.GetFaith.HouseOfWorship|l] во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где они слушали проповеди. Когда они долго разговаривали после, [secondary_recipient.GetSheHe] пишет, что [secondary_recipient.GetSheHe] быстро [Select_CString(secondary_recipient.IsFemale, 'очаровалась', 'очаровался' )]."
 lmf_interaction.1329.desc.secrec.tavern: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'сделала', 'сделал' )] странный выбор, приведя [secondary_recipient.GetHerHis] в таверну во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'пыталась', 'пытался' )] развеселить [secondary_recipient.GetHerHis]. [secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'поддержала', 'поддержал' )] игру, много [Select_CString(secondary_recipient.IsFemale, 'пила и осыпала', 'пил и осыпал')] [secondary_actor.GetHerHis] знаками внимания при каждом удобном случае."
 lmf_interaction.1329.desc.secrec.poor: "Они провели день, раздавая милостыню беднякам перед храмом во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'была очарована', 'был очарован' )] и изо всех сил [Select_CString(secondary_recipient.IsFemale, 'старалась', 'старался' )] произвести впечатление на н[secondary_actor.GetHerHis] своей щедростью."
 lmf_interaction.1329.desc.secrec.tour: "Они осмотрели [actor.Custom('FortifiedBuilding')] и окрестные земли, [secondary_actor.GetFirstNameNoTooltip] с большим интересом и деталями [Select_CString(secondary_actor.IsFemale, 'объясняла', 'объяснял' )] [secondary_recipient.GetHerHim] историю. [secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'наслаждалась', 'наслаждался' )] вниманием и изо всех сил [Select_CString(secondary_recipient.IsFemale, 'старалась', 'старался' )] произвести впечатление на н[secondary_actor.GetHerHis] при каждом удобном случае."
 lmf_interaction.1329.desc.secrec.garden: "Они бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], ведя долгий разговор. [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'стремилась', 'стремился' )] произвести впечатление на н[secondary_actor.GetHerHis] и изо всех сил [Select_CString(secondary_recipient.IsFemale, 'старалась', 'старался' )] очаровать [secondary_actor.GetHerHis]... и говорит, что [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'думала', 'думал' )], что [secondary_recipient.GetSheHe] преуспевает в этом."
 lmf_interaction.1329.desc.secrec.hated: "\n\n[secondary_actor.GetFirstNameNoTooltip], однако, явно не [Select_CString(secondary_actor.IsFemale, 'разделяла', 'разделял' )] этих чувств. [secondary_actor.GetSheHe|U] временами [Select_CString(secondary_actor.IsFemale, 'казалась', 'казался' )] скучающим из-за н[secondary_recipient.GetHerHis], а порой [Select_CString(secondary_actor.IsFemale, 'испытывала', 'испытывал' )] неприязнь к н[secondary_recipient.GetHerHim]. [secondary_recipient.GetHerHis|U] разочарование ощутимо."
 lmf_interaction.1329.desc.secrec.loved: "\n\nНесмотря на [secondary_recipient.GetHerHis] явное удовольствие от такого занятия, как [secondary_actor.Custom('lmf_intro_activity_short')], было ясно, что [secondary_actor.GetFirstNameNoTooltip] не [Select_CString(secondary_actor.IsFemale, 'разделяла', 'разделял' )] этих чувств. [secondary_actor.GetSheHe|U] постепенно [Select_CString(secondary_actor.IsFemale, 'начала', 'начал')]  скучать от н[secondary_recipient.GetHerHis] по мере того, как шёл день, и это переросло в неприязнь. [secondary_recipient.GetHerHis|U] разочарование ощутимо."
 lmf_interaction.1329.desc.secrec.neutral: "\n\n[secondary_actor.GetFirstNameNoTooltip], однако, явно не [Select_CString(secondary_actor.IsFemale, 'разделяла', 'разделял' )] этих чувств. [secondary_recipient.GetSheHe|U] пишет, что [secondary_actor.GetSheHe] временами [Select_CString(secondary_actor.IsFemale, 'казалась скучающей', 'казался скучающим' )] из-за [Select_CString(secondary_recipient.IsFemale, 'неё', 'него' )], а порой [Select_CString(secondary_actor.IsFemale, 'испытывала', 'испытывал' )] неприязнь к н[secondary_recipient.GetHerHim]. [secondary_recipient.GetHerHis|U] разочарование ощутимо."
 lmf_interaction.1329.desc.rival: " [secondary_recipient.GetFirstNameNoTooltip] не [Select_CString(secondary_recipient.IsFemale, 'сказала', 'сказал' )] ни единого приятного слова, по сути. Чистая и абсолютная ненависть."
 lmf_interaction.1329.desc.end.nomarry: "\n\n[actor.GetTitledFirstNameNoTooltip] [Select_CString(actor.IsFemale, 'согласилась', 'согласился' )], что они не пара, и [Select_CString(actor.IsFemale, 'прекратила', 'прекратил' )] подготовку к такому предложенному союзу, как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]. [secondary_recipient.GetFirstNameNoTooltip] немедленно вернётся."
 lmf_interaction.1329.desc.end.marry: "\n\nКак ни странно, [actor.GetTitledFirstNameNoTooltip] не [Select_CString(actor.IsFemale, 'согласна', 'согласен' )], что они не пара, и хочет продолжить подготовку к такому союзу, как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l], несмотря ни на что. [secondary_recipient.GetFirstNameNoTooltip] считает, что это плохая идея... но, возможно, так будет лучше?"
 lmf_interaction.1329.a: "Я и [secondary_actor.GetTitledFirstNameNoTooltip] заключим брак."
 lmf_interaction.1329.b: "Я [Select_CString(ROOT.Char.IsFemale, 'согласна', 'согласен' )]. [secondary_recipient.GetSheHe|U] и [secondary_actor.GetTitledFirstNameNoTooltip] заключат брак."
 lmf_interaction.1329.c: "Нет. Отменить подготовку к такому союзу, как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]."
 lmf_interaction.1329.d: "Что ж, на этом всё."

 lmf_interaction.1331.t: "[Select_CString(rebel.IsFemale, 'Беглянка', 'Беглец' )]"
 lmf_interaction.1331.desc.reject: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('rebel'))] не [Select_CString(rebel.IsFemale, 'восприняла', 'воспринял' )] новость о том, что [rebel.GetSheHe] и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('intended_spouse'))] вскоре заключат брак. Совсем нет.\n\n"
 lmf_interaction.1331.desc.start: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('rebel'))] не [Select_CString(rebel.IsFemale, 'одобрила', 'одобрил' )] моё решение лишить [rebel.GetHerHis] права [Select_CString(rebel.IsFemale, 'самой', 'самому' )] выбрать [Select_CString(rebel.IsFemale, 'жену', 'мужа' )]. Совсем нет.\n\n"
 lmf_interaction.1331.desc.mid: "Сначала все думали, что [rebel.GetSheHe] просто [Select_CString(rebel.IsFemale, 'выбежала', 'выбежал' )] из комнаты в гневе. Затем стало ясно, что [rebel.GetSheHe] [Select_CString(rebel.IsFemale, 'исчезла', 'исчез' )] из [actor.Custom('FortifiedBuilding_RU_Gen')], фактически [Select_CString(rebel.IsFemale, 'сбежала', 'сбежал' )] без единой записки.\n\n"
 lmf_interaction.1331.desc.septon: "Только позже мы узнали, что [rebel.GetSheHe] [Select_CString(rebel.IsFemale, 'принесла', 'принес' )] обеты, чтобы присоединиться к Вере, а не принять [Select_CString(intended_spouse.IsFemale, 'жену, которую', 'мужа, которого' )] [rebel.GetSheHe] не [Select_CString(rebel.IsFemale, 'хотела', 'хотел' )].\n\n"
 lmf_interaction.1331.desc.maester: "Только позже мы узнали, что он отправился в Цитадель, решив стать мейстером, а не принимать брак, которого он не хотел.\n\n"
 lmf_interaction.1331.desc.wall: "Только позже мы узнали, что он вступил в Ночной Дозор. Похоже, он предпочёл жизнь на Стене, а не принятие брака, которого он не хотел.\n\n"
 lmf_interaction.1331.desc.ranoff: "Только позже мы узнали, что [rebel.GetSheHe] [Select_CString(rebel.IsFemale, 'сбежала', 'сбежал' )] окончательно, [Select_CString(rebel.IsFemale, 'её', 'его' )] последний раз видели [Select_CString(rebel.IsFemale, 'проходящей', 'проходящим' )] через соседнюю деревню. Были отправлены несколько поисковых групп, но они вернулись ни с чем, и никто не знает, вернётся ли [rebel.GetSheHe] когда-либо. Всё это вместо принятия [Select_CString(intended_spouse.IsFemale, 'жены, которую', 'мужа, которого' )] [rebel.GetSheHe] не [Select_CString(rebel.IsFemale, 'хотела', 'хотел' )].\n\n"
 lmf_interaction.1331.desc.end.reject: "Само собой разумеется, свадьба отменена."
 lmf_interaction.1331.desc.end: "Кто мог подумать, что [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('rebel'))] будет [Select_CString(rebel.IsFemale, 'такой своевольной', 'таким своевольным' )]?"
 lmf_interaction.1331.a: "Что ж, на этом всё."

 lmf_interaction.1500.opening.spouseliege: "[Select_CString(actor.IsFemale, 'Моя леди-жена', 'Мой лорд-муж' )],"
 lmf_interaction.1500.opening.liege: "[Select_CString(actor.IsFemale, 'Миледи', 'Милорд' )],"
 lmf_interaction.1500.opening.love: "Любовь моя,"
 lmf_interaction.1500.opening.spouse: "[actor.GetWifeHusband|U],"
 lmf_interaction.1500.nemesis: "Я скорее размозжу голову о каменную стену, чем добровольно поеду во владение [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] только ради так называемого удовольствия быть у тебя на побегушках.\n\nНеужели ты [Select_CString(ROOT.Char.IsFemale, 'прислала', 'прислал' )] это приглашение в шутку?"
 lmf_interaction.1500.rival: "Приглашение приехать во владение [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]? Увидеться с тобой после того, что ты [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )]?\n\nНет, полагаю, я пока останусь там, где нахожусь, спасибо."
 lmf_interaction.1500.betray: "Приглашение приехать во владение [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]? Увидеться с тобой?\n\nНет, думаю, твоё предательство всё ещё слишком свежо, чтобы я [Select_CString(recipient.IsFemale, 'могла', 'мог' )] вынести больше времени с тобой, по крайней мере сейчас."
 lmf_interaction.1500.spouse: "Я [Select_CString(recipient.IsFemale, 'согласна', 'согласен' )], что нам пора провести время вместе как мужу и жене, но я просто не могу оторваться от владения [recipient.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip] в данный момент.\n\n[Select_CString(recipient.IsFemale, 'Уверена', 'Уверен' )], ты понимаешь."
 lmf_interaction.1500.lover: "О, как бы я [Select_CString(recipient.IsFemale, 'хотела', 'хотел' )] не отказываться от этого приглашения, но боюсь, [Select_CString(recipient.IsFemale, 'должна', 'должен' )]. Я просто не могу уехать из владения [recipient.GetCurrentLocation.GetTitle.GetNameNoTier] сейчас.\n\nСкоро, любовь моя! Обещаю."
 lmf_interaction.1500.a: "Что ж, стоило попробовать."

 lmf_interaction.1501.lover: "Я как раз [Select_CString(recipient.IsFemale, 'думала', 'думал' )] о тебе, и вот приходит это прекрасное приглашение!\n\nЯ подготовлюсь к поездке во владение [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] и скоро увижусь с тобой."
 lmf_interaction.1501.spouse: "Да, полагаю, нам пора провести время вместе как мужу и жене, не так ли?\n\nЯ подготовлюсь к поездке во владение [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_interaction.1501.a: "Не могу дождаться!"

 lmf_interaction.1503.t: "Отменить визит?"
 lmf_interaction.1503.desc.atwar.betrayed: "[Select_CString(actor.IsFemale, 'Гнусная предательница! Моя', 'Гнусный предатель! Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] [Select_CString(actor.IsFemale, 'использовала', 'использовал' )] мой визит как уловку, напав, пока я ещё в пути.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] немедленно вернуться во владение [origin.GetTitle.GetNameNoTierNoTooltip]!"
 lmf_interaction.1503.desc.atwar.betrayer: "Теперь я и [Select_CString(actor.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] втянуты в войну.\n\nСомневаюсь, что во владении [destination.GetTitle.GetNameNoTierNoTooltip] меня сейчас ждёт тёплый приём, так что ничего не остаётся, кроме как вернуться во владение [origin.GetTitle.GetNameNoTierNoTooltip]."
 lmf_interaction.1503.desc.atwar.rootdefender: "На меня напала держава [attacker.GetPrimaryTitle.GetNameNoTooltip], пока я путешествую.\n\nПолагаю, вопрос в следующем: стоит ли мне возвращаться во владение [origin.GetTitle.GetNameNoTierNoTooltip]? Успею ли я вовремя, чтобы что-то изменить?"
 lmf_interaction.1503.desc.atwar.rootattacker: "И теперь я и [defender.GetPrimaryTitle.GetNameNoTooltip] находимся в состоянии войны, а я нахожусь в пути.\n\nПолагаю, вопрос в следующем: стоит ли мне возвращаться во владение [origin.GetTitle.GetNameNoTierNoTooltip]? Успею ли я вовремя, чтобы что-то изменить?"
 lmf_interaction.1503.desc.atwar.actorattacker: "Я только что [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] известие, что [Select_CString(actor.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] [Select_CString(actor.IsFemale, 'начала', 'начал' )] войну против державы [defender.GetPrimaryTitle.GetNameNoTooltip], хотя [actor.GetSheHe] [Select_CString(actor.IsFemale, 'знала', 'знал' )], что я еду.\n\nТеперь вопрос: вернуться ли мне во владение [origin.GetTitle.GetNameNoTierNoTooltip] или просто продолжить путь и надеяться на лучшее?"
 lmf_interaction.1503.desc.atwar.actordefender: "Я только что [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] известие, что [Select_CString(actor.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] находится под нападением державы [attacker.GetPrimaryTitle.GetNameNoTooltip]. Какое ужасное время!\n\nТеперь вопрос: вернуться ли мне во владение [origin.GetTitle.GetNameNoTierNoTooltip] или просто продолжить путь и надеяться на лучшее?"
 lmf_interaction.1503.desc.atwar.actor: "Я только что [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] известие, что [Select_CString(actor.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] [Select_CString(actor.IsFemale, 'втянута', 'втянут' )] в войну, хотя похоже, что [destination.GetTitle.GetNameNoTierNoTooltip] не находится в непосредственной опасности.\n\nВернуться ли мне во владение [origin.GetTitle.GetNameNoTierNoTooltip] или продолжить путь и надеяться на лучшее?"
 lmf_interaction.1503.desc.atwar: "Я только что [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] известие, что я [Select_CString(ROOT.Char.IsFemale, 'втянута', 'втянут' )] в войну, находясь в пути и вдали от дома.\n\nПолагаю, вопрос в следующем: стоит ли мне возвращаться во владение [origin.GetTitle.GetNameNoTierNoTooltip]? Успею ли я вовремя, чтобы что-то изменить?"
 lmf_interaction.1503.a: "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] немедленно вернуться."
 lmf_interaction.1503.a.title: "Визит отменен"
 lmf_interaction.1503.a.desc: "[recipient.GetShortUINameNoTooltip|U] [Select_CString(recipient.IsFemale, 'вынуждена', 'вынужден' )] отменить визит и вернуться во владение [origin.GetTitle.GetNameNoTierNoTooltip] из-за войны."
 lmf_interaction.1503.b: "В этом нет смысла. Продолжить путь во владение [destination.GetTitle.GetNameNoTierNoTooltip]."

 lmf_interaction.1504.t: "Печальные новости"
 lmf_interaction.1504.desc: "Печальные новости! [Select_CString(actor.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] [Select_CString(actor.IsFemale, 'умерла', 'умер' )], и я здесь, не в силах ничего предпринять.\n\nНет смысла продолжать путь во владение [destination.GetTitle.GetNameNoTierNoTooltip]. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] вернуться во владение [origin.GetTitle.GetNameNoTierNoTooltip]."
 lmf_interaction.1504.a: "О, [actor.GetFirstNameNoTooltip]!"
 lmf_interaction.1504.tt: "[recipient.GetShortUINameNoTooltip|U] [Select_CString( recipient.IsLocalPlayer, 'были вынуждены', Select_CString(recipient.IsFemale, 'была вынуждена', 'был вынужден' ))] отменить визит и вернуться во владение [origin.GetTitle.GetNameNoTierNoTooltip] из-за безвременной кончины [Select_CString(actor.IsLocalPlayer, '', 'персонажа ' )][actor.GetShortUINamePossessive][Select_CString(actor.IsLocalPlayer, 'его персонажа', '' )]."
 lmf_interaction.1505.a.title: "Визит отменён"
 lmf_interaction.1505.desc.begin: "[recipient.GetShortUINameNoTooltipNoFormat|U] [Select_CString( recipient.IsLocalPlayer, 'были вынуждены', Select_CString(recipient.IsFemale, 'была вынуждена', 'был вынужден' ))] отменить свой визит во владение [destination.GetTitle.GetNameNoTierNoTooltip]"
 lmf_interaction.1505.desc.norelationship: " потому что [Select_CString( recipient.IsLocalPlayer, 'ваши', Select_CString(recipient.IsFemale, 'её', 'его' ))] отношения с [Select_CString(actor.IsLocalPlayer, '', 'персонажем ' )][actor.GetShortUINamePossessive][Select_CString(actor.IsLocalPlayer, 'им персонажем', '' )] прекратились."
 lmf_interaction.1505.desc.notprovince: " потому что это больше не [Select_CString( actor.IsLocalPlayer, 'ваша', Select_CString(actor.IsFemale, 'её', 'его' ))] столица."
 lmf_interaction.1505.desc.actorleft: " потому что [Select_CString( actor.IsLocalPlayer, 'вас', Select_CString(actor.IsFemale, 'её', 'его' ))] там больше нет."
 lmf_interaction.1505.desc.actorill: " потому что [Select_CString( actor.IsLocalPlayer, 'вы', Select_CString(actor.IsFemale, 'она', 'он' ))] серьёзно [Select_CString( actor.IsLocalPlayer, 'заболели', Select_CString(actor.IsFemale, 'заболела', 'заболел' ))]."
 lmf_interaction.1505.desc.rootill: " потому что [Select_CString( recipient.IsLocalPlayer, 'вы', Select_CString(recipient.IsFemale, 'она', 'он' ))] серьёзно [Select_CString( recipient.IsLocalPlayer, 'заболели', Select_CString(recipient.IsFemale, 'заболела', 'заболел' ))]."
 lmf_interaction.1505.desc.actorimprison: " потому что [Select_CString( actor.IsLocalPlayer, 'вы были заключены', Select_CString(actor.IsFemale, 'она была заключена', 'он был заключён' ))] в темницу."
 lmf_interaction.1505.desc.rootimprison: " потому что [Select_CString( recipient.IsLocalPlayer, 'вы были заключены', Select_CString(recipient.IsFemale, 'она была заключена', 'он был заключён' ))] в темницу."
 lmf_interaction.1505.desc.actorpregnant: " потому что [Select_CString( actor.IsLocalPlayer, 'вы забеременели', Select_CString(actor.IsFemale, 'она забеременела', 'он забеременел' ))]."
 lmf_interaction.1505.desc.rootpregnant: " потому что [Select_CString( recipient.IsLocalPlayer, 'вы забеременели', Select_CString(recipient.IsFemale, 'она забеременела', 'он забеременел' ))]."
 lmf_interaction.1505.desc.actorhealth: " потому что [Select_CString( actor.IsLocalPlayer, 'вы прихворали', Select_CString(actor.IsFemale, 'она прихворала', 'он прихворал' ))]."
 lmf_interaction.1505.desc.roothealth: " потому что [Select_CString( recipient.IsLocalPlayer, 'вы прихворали', Select_CString(recipient.IsFemale, 'она прихворала', 'он прихворал' ))]."
 lmf_interaction.1505.desc.default: "."

 lmf_interaction.1506.t.reclove: "Я здесь, любовь моя!"
 lmf_interaction.1506.t.rec: "Вечер с [Select_CString(actor.IsFemale, 'моей женой', 'моим мужем' )]"
 lmf_interaction.1506.t.love: "Моя любовь прибывает"
 lmf_interaction.1506.t: "Вечер с [Select_CString(actor.IsFemale, 'моей женой', 'моим мужем' )]"
 lmf_interaction.1506.desc.reclove.notspouse: "Наконец-то! Я [Select_CString(ROOT.Char.IsFemale, 'прибыла', 'прибыл' )] во владение [destination.GetTitle.GetNameNoTierNoTooltip], [Select_CString(ROOT.Char.IsFemale, 'устала', 'устал' )], но уже [Select_CString(ROOT.Char.IsFemale, 'взволнована', 'взволнован' )] ожиданием, когда я и [actor.GetFirstNameNoTooltip] встретимся.\n\nИ вот [actor.GetSheHe] уже улыбается и стремится начать наш запланированный день вместе... и внезапно я чувствую себя не [Select_CString(ROOT.Char.IsFemale, 'такой усталой', 'таким усталым' )].\n\n[actor.GetFirstNameNoTooltip] ведёт нас в уединенную часть [actor.Custom('FortifiedBuilding_RU_Gen')], подальше от любопытных глаз, и там мы используем то немногое время, что у нас есть."
 lmf_interaction.1506.desc.reclove.spouse: "Наконец-то! Я [Select_CString(ROOT.Char.IsFemale, 'прибыла', 'прибыл' )] во владение [destination.GetTitle.GetNameNoTierNoTooltip], [Select_CString(ROOT.Char.IsFemale, 'устала', 'устал' )], но уже [Select_CString(ROOT.Char.IsFemale, 'взволнована', 'взволнован' )] ожиданием, когда я и [actor.GetFirstNameNoTooltip] встретимся.\n\nИ вот [actor.GetSheHe] уже улыбается, [Select_CString(actor.IsFemale, 'окружённая', 'окружённый' )] толпой слуг, стремящихся принести мне сообщения и посоветоваться с [Select_CString(actor.IsFemale, 'мужем своей леди', 'женой своего лорда' )]. К счастью, [actor.GetFirstNameNoTooltip] прогоняет их уже через несколько минут, стремясь начать наш запланированный день вместе.\n\n[actor.GetSheHe|U] ведёт меня в свою спальню, запрещая придворным [actor.Custom('FortifiedBuilding_RU_Gen')] доступ в это крыло. Это будет хорошая ночь."
 lmf_interaction.1506.desc.rec.spouse: "Наконец-то! Я [Select_CString(ROOT.Char.IsFemale, 'прибыла', 'прибыл' )] во владение [destination.GetTitle.GetNameNoTierNoTooltip], [Select_CString(ROOT.Char.IsFemale, 'устала', 'устал' )] и стремлюсь отдохнуть... но толпа слуг уже стремится принести мне сообщения и посоветоваться с [Select_CString(actor.IsFemale, 'мужем своей леди', 'женой своего лорда' )]. Я разбираюсь с ними какое-то время, прежде чем прогнать их, и удаляюсь в покои, которые [actor.GetFirstNameNoTooltip] [Select_CString(actor.IsFemale, 'отвела', 'отвёл' )] мне в стенах [actor.Custom('FortifiedBuilding_RU_Gen')].\n\n[actor.GetSheHe|U] приходит позже, к счастью, когда я [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )], и мы начинаем вечер в обществе друг друга, который не лишён удовольствия."
 lmf_interaction.1506.desc.love.notspouse: "Наконец-то! [recipient.GetFirstNameNoTooltip] [Select_CString(recipient.IsFemale, 'прибыла', 'прибыл' )] во владение [destination.GetTitle.GetNameNoTierNoTooltip], [Select_CString(recipient.IsFemale, 'утомлённая', 'утомлённый' )] поездкой, но явно [Select_CString(recipient.IsFemale, 'рада', 'рад' )] видеть меня.\n\nЯ приветствую [recipient.GetHerHis] во дворе, улыбаясь и стремясь начать наш запланированный день вместе... и внезапно [recipient.GetFirstNameNoTooltip] выглядит не [Select_CString(recipient.IsFemale, 'такой утомлённой', 'таким утомлённым')].\n\nЯ веду [recipient.GetHerHis] в уединенную часть [actor.Custom('FortifiedBuilding_RU_Gen')], в основном неиспользуемую и подальше от любопытных глаз, и там мы используем то немногое время, что у нас есть."
 lmf_interaction.1506.desc.love.spouse: "Наконец-то! [recipient.GetFirstNameNoTooltip] [Select_CString(recipient.IsFemale, 'прибыла', 'прибыл' )] во владение [destination.GetTitle.GetNameNoTierNoTooltip], [Select_CString(recipient.IsFemale, 'утомлённая', 'утомлённый' )] поездкой, но явно [Select_CString(recipient.IsFemale, 'рада', 'рад' )] видеть меня.\n\nЯ приветствую [recipient.GetHerHis] во дворе, [Select_CString(ROOT.Char.IsFemale, 'окружённая', 'окружённый')] толпой слуг, стремящихся принести [recipient.GetHerHim] сообщения и посоветоваться с [Select_CString(actor.IsFemale, 'мужем своей леди', 'женой своего лорда' )]. К счастью, [actor.GetFirstNameNoTooltip] прогоняет их уже через несколько минут, стремясь начать наш запланированный день вместе.\n\nЯ веду [recipient.GetHerHis] в свои спальни, запрещая придворным [actor.Custom('FortifiedBuilding_RU_Gen')] доступ в это крыло. Это будет хорошая ночь."
 lmf_interaction.1506.desc.spouse: "Наконец-то! [recipient.GetFirstNameNoTooltip] [Select_CString(recipient.IsFemale, 'прибыла', 'прибыл' )] во владение [destination.GetTitle.GetNameNoTierNoTooltip], [Select_CString(recipient.IsFemale, 'утомлённая', 'утомлённый' )] долгой поездкой из владения [origin.GetTitle.GetNameNoTierNoTooltip].\n\nЯ даю [Select_CString(recipient.IsFemale, 'ей', 'ему' )] время отдохнуть и подготовиться в покоях, которые я [Select_CString(ROOT.Char.IsFemale, 'предоставила', 'предоставил' )] [Select_CString(recipient.IsFemale, 'ей', 'ему')] здесь, в стенах [actor.Custom('FortifiedBuilding_RU_Gen')], и позволяю [recipient.GetHerHim] разобраться с многочисленными слугами, ждущими, чтобы принести [recipient.GetHerHim] сообщения и посоветоваться с [Select_CString(actor.IsFemale, 'мужем своей леди', 'женой своего лорда' )].\n\nКогда я наконец стучу, [recipient.GetFirstNameNoTooltip] более чем [Select_CString(recipient.IsFemale, 'готова', 'готов' )], и мы начинаем вечер в обществе друг друга, который вовсе не лишён удовольствия."
 lmf_interaction.1506.a: "Эти ночи слишком редки."

