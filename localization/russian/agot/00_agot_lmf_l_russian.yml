 lmf_spouse_court_dominant:0 "[Select_CString(ROOT.GetCharacter.IsFemale, 'встретила', 'встретил')] вызов с силой, которую я и ожидал от [ROOT.GetCharacter.GetHerHim]. [ROOT.GetCharacter.GetSheHe|U] смотрел[Select_CString(ROOT.GetCharacter.IsFemale, 'а', '')] двору прямо в глаза и не [Select_CString(ROOT.GetCharacter.IsFemale, 'дрогнула', 'дрогнул')], сразу же [Select_CString(ROOT.GetCharacter.IsFemale, 'завоевав', 'завоевав')] многих своей решимостью и силой характера. Как это и свойственно [ROOT.GetCharacter.GetHerHis]"
 lmf_spouse_court_benevolent:0 "поначалу [Select_CString(ROOT.GetCharacter.IsFemale, 'колебалась', 'колебался')]. Но мягкость натуры [ROOT.GetCharacter.GetHerHis] была очевидна для всех, и вскоре полдвора [Select_CString(ROOT.GetCharacter.IsFemale, 'обожала', 'обожало')] [ROOT.GetCharacter.GetHerHim], а [ROOT.GetCharacter.GetSheHe] [Select_CString(ROOT.GetCharacter.IsFemale, 'двигалась', 'двигался')] среди них с доброй и знакомой улыбкой, словно [Select_CString(ROOT.GetCharacter.IsFemale, 'прожила', 'прожил')] здесь целую вечность"
 lmf_spouse_court_levelheaded:0 "[Select_CString(ROOT.GetCharacter.IsFemale, 'подошла', 'подошёл')] к делу с трезвой головой. [ROOT.GetCharacter.GetSheHe|U] явно [Select_CString(ROOT.GetCharacter.IsFemale, 'понимала', 'понимал')] долг, лежащий перед [ROOT.GetCharacter.GetHerHim], и [ROOT.GetCharacter.GetHerHis] практичность была очевидна всем"
 lmf_spouse_court_gregarious:0 "быстро [Select_CString(ROOT.GetCharacter.IsFemale, 'стала', 'стал')] душой [second.Custom('FortifiedBuilding')]. Быстрая улыбка и кипучая натура [ROOT.GetCharacter.GetHerHis|U] [Select_CString(ROOT.GetCharacter.IsFemale, 'покорила', 'покорил')] даже тех, кто не хотел [Select_CString(ROOT.GetCharacter.IsFemale, 'быть покорённой', 'быть покорённым')]. Говорят, смех [ROOT.GetCharacter.GetHerHis|U] во время пиров был слышен даже во дворе"
 lmf_spouse_court_diligent:0 "[Select_CString(ROOT.GetCharacter.IsFemale, 'громко заявляла', 'громко заявлял')] о том, насколько серьёзно [ROOT.GetCharacter.GetSheHe] относится к долгу быть [ROOT.GetCharacter.GetTitleAsNameNoTooltip|l]. Всем было ясно, что [ROOT.GetCharacter.GetSheHe] не [Select_CString(ROOT.GetCharacter.IsFemale, 'станет', 'станет')] уклоняться от этого, и все это знали"
 lmf_spouse_court_smart:0 "[Select_CString(ROOT.GetCharacter.IsFemale, 'умно говорила', 'умно говорил')] с нужными людьми о нужных вещах, от самых важных членов двора до слуг, которые, как [ROOT.GetCharacter.GetSheHe] [Select_CString(ROOT.GetCharacter.IsFemale, 'понимала', 'понимал')], на самом деле управляли [second.Custom('FortifiedBuilding')]. Было удивительно наблюдать, как быстро они стали есть у [ROOT.GetCharacter.GetHerHis] с рук"
 lmf_spouse_court_lunatic:0 "[Select_CString(ROOT.GetCharacter.IsFemale, 'была', 'был')]... не в лучшей форме. [ROOT.GetCharacter.GetSheHe|U] часто [Select_CString(ROOT.GetCharacter.IsFemale, 'вела', 'вёл')] себя так, будто не [Select_CString(ROOT.GetCharacter.IsFemale, 'понимала', 'понимал')], где находится. В какой-то момент [ROOT.GetCharacter.GetSheHe] [Select_CString(ROOT.GetCharacter.IsFemale, 'встала', 'встал')] посреди зала, [Select_CString(ROOT.GetCharacter.IsFemale, 'закричала', 'закричал')] и [Select_CString(ROOT.GetCharacter.IsFemale, 'выбежала', 'выбежал')] прочь. Мы не могли найти [ROOT.GetCharacter.GetHerHim] #EMP несколько часов#!"
 lmf_spouse_court_malicious:0 "[Select_CString(ROOT.GetCharacter.IsFemale, 'усмехнулась', 'усмехнулся')] в ответ на все разговоры. [ROOT.GetCharacter.GetSheHe|U] [Select_CString(ROOT.GetCharacter.IsFemale, 'вошла', 'вошёл')] в [second.Custom('FortifiedBuilding')] так, будто [Select_CString(ROOT.GetCharacter.IsFemale, 'владела', 'владел')] им, и язвительность [ROOT.GetCharacter.GetHerHis] не [Select_CString(ROOT.GetCharacter.IsFemale, 'принесла', 'принёс')] [ROOT.GetCharacter.GetHerHim] быстрых друзей при моём дворе"
 lmf_spouse_court_temper:0 "[Select_CString(ROOT.GetCharacter.IsFemale, 'была', 'был')] в ярости. [ROOT.GetCharacter.GetSheHe|U] ненавиде[Select_CString(ROOT.GetCharacter.IsFemale, 'ла', 'л')] все сплетни и [Select_CString(ROOT.GetCharacter.IsFemale, 'считала', 'считал')], что все в [second.Custom('FortifiedBuilding')] чувствуют то же самое. Вспыльчивость [ROOT.GetCharacter.GetHerHis|U] уже стала притчей во языцех среди слуг и темой для разговоров при дворе"
 lmf_spouse_court_arrogant:0 "каким-то образом [Select_CString(ROOT.GetCharacter.IsFemale, 'сочла', 'счёл')] себя выше всего этого. Особенно теперь, когда [ROOT.GetCharacter.GetSheHe] [Select_CString(ROOT.GetCharacter.IsFemale, 'стала', 'стал')] мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.GetCharacter.GetWifeHusband] и их нов[Select_CString(ROOT.GetCharacter.IsFemale, 'ой', 'ым')] [ROOT.GetCharacter.GetLadyLord]. Внезапная важность [ROOT.GetCharacter.GetHerHis|U] явно не [Select_CString(ROOT.GetCharacter.IsFemale, 'снискала', 'снискал')] [ROOT.GetCharacter.GetHerHim] поклонников при моём дворе"
 lmf_spouse_court_drunkard:0 "[Select_CString(ROOT.GetCharacter.IsFemale, 'была', 'был')]... в основном пьян[Select_CString(ROOT.GetCharacter.IsFemale, 'а', '')]. [ROOT.GetCharacter.GetSheHe|U] [Select_CString(ROOT.GetCharacter.IsFemale, 'перебрала', 'перебрал')] на приветственном ужине, во время первого приёма при дворе и, честно говоря, почти во всех других случаях. Никто не хотел ничего говорить, но я слишком хорошо [Select_CString(ROOT.Char.IsFemale, 'осознавала', 'осознавал')] это грандиозное зрелище"
 lmf_spouse_court_dumb:0 "[Select_CString(ROOT.GetCharacter.IsFemale, 'оказалась', 'оказался')] не совсем на высоте. [ROOT.GetCharacter.GetSheHe|U] [Select_CString(ROOT.GetCharacter.IsFemale, 'тупо моргала', 'тупо моргал')], когда я пытал[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] объяснить [ROOT.GetCharacter.GetHerHim] обязанности, и в основном [Select_CString(ROOT.GetCharacter.IsFemale, 'бродила', 'бродил')] по [second.Custom('FortifiedBuilding')], постоянно забывая, куда идёт и что [Select_CString(ROOT.GetCharacter.IsFemale, 'должна', 'должен')] делать"
 lmf_spouse_court_dull:0 "[Select_CString(ROOT.GetCharacter.IsFemale, 'оказалась', 'оказался')] не совсем на высоте. На первом приёме при дворе все, кто заговаривал с [ROOT.GetCharacter.GetHerHim], быстро покидали [ROOT.GetCharacter.GetHerHim] из-за скучной беседы, пока, наконец, [ROOT.GetCharacter.GetSheHe] не [Select_CString(ROOT.GetCharacter.IsFemale, 'осталась', 'остался')] стоять в неловком одиночестве. С тех пор лучше не стало"
 lmf_spouse_court_submissive:0 "[Select_CString(ROOT.GetCharacter.IsFemale, 'делала', 'делал')] то, что [ROOT.GetCharacter.GetSheHe] [Select_CString(ROOT.GetCharacter.IsFemale, 'говорила', 'говорил')]и, и не более того. [ROOT.GetCharacter.GetSheHe|U] [Select_CString(ROOT.GetCharacter.IsFemale, 'кротко опускала', 'кротко опускал')] голову, подавленн[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый')] размерами моего двора, и [Select_CString(ROOT.GetCharacter.IsFemale, 'оставалась', 'оставался')] по большей части безмолвн[Select_CString(ROOT.GetCharacter.IsFemale, 'ой', 'ым')], пока к [ROOT.GetCharacter.GetHerHim] не обратятся"
 lmf_spouse_court_introverted:0 "[Select_CString(ROOT.GetCharacter.IsFemale, 'нашла', 'нашёл')] всё это довольно подавляющим. Когда [ROOT.GetCharacter.GetSheHe] не [Select_CString(ROOT.GetCharacter.IsFemale, 'была', 'был')] явно [Select_CString(ROOT.GetCharacter.IsFemale, 'призвана', 'призван')] ко двору или на ужин, [ROOT.GetCharacter.GetSheHe] [Select_CString(ROOT.GetCharacter.IsFemale, 'пряталась', 'прятался')] в своих покоях. И даже когда [Select_CString(ROOT.GetCharacter.IsFemale, 'выходила', 'выходил')], то в основном [Select_CString(ROOT.GetCharacter.IsFemale, 'держалась', 'держался')] в стороне и ни с кем не [Select_CString(ROOT.GetCharacter.IsFemale, 'разговаривала', 'разговаривал')]"
 lmf_spouse_court_depressed:0 "[Select_CString(ROOT.GetCharacter.IsFemale, 'казалась', 'казался')] в основном безучастн[Select_CString(ROOT.GetCharacter.IsFemale, 'ой', 'ым')] ко всему. Меланхолия [ROOT.GetCharacter.GetHerHis|U] окутывала [ROOT.GetCharacter.GetHerHim], словно саван, — печаль, которую все замечали... Разве новобрачн[Select_CString(ROOT.GetCharacter.IsFemale, 'ая', 'ый')] не долж[Select_CString(ROOT.GetCharacter.IsFemale, 'на', 'ен')] радоваться? Увы, это было не так"
 lmf_spouse_court_fallthrough:0 "[Select_CString(ROOT.GetCharacter.IsFemale, 'делала', 'делал')] всё возможное. К счастью, хоть [ROOT.GetCharacter.GetSheHe] никого и не [Select_CString(ROOT.GetCharacter.IsFemale, 'впечатлила', 'впечатлил')], но и не [Select_CString(ROOT.GetCharacter.IsFemale, 'обидела', 'обидел')] никого и не [Select_CString(ROOT.GetCharacter.IsFemale, 'совершила', 'совершил')] заметных ошибок. Придворные в основном игнорировали [ROOT.GetCharacter.GetHerHim], и, возможно, это было к лучшему"
 
 lmf_spouse.101.t.lowborn:0 "Простолюдин[Select_CString(new_spouse.IsFemale, 'ка', '')] и [new_spouse.GetTitleAsNameNoTooltip|U]"
 lmf_spouse.101.t.ruler:0 "[new_spouse.GetTitleAsNameNoTooltip|U] прибывает из [spouse_title.GetNameNoTierNoTooltip]"
 lmf_spouse.101.t.relative:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.Custom2('LMF_BloodRelationToMe', SCOPE.sC('new_spouse'))|U] и [new_spouse.GetTitleAsNameNoTooltip|U]"
 lmf_spouse.101.t.default:0 "Нов[Select_CString(new_spouse.IsFemale, 'ая', 'ый')] [new_spouse.GetTitleAsNameNoTooltip|U]"
 lmf_spouse.101.desc.start:0 "До нашей свадьбы жители [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] "
 lmf_spouse.101.desc.start.lowborn:0 "скорее всего, знали только то, что мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] нов[Select_CString(new_spouse.IsFemale, 'ая', 'ый')] [new_spouse.GetWifeHusband] [Select_CString(new_spouse.IsFemale, 'была', 'был')] простого происхождения. Несомненно, для многих это стало сюрпризом.\n\n"
 lmf_spouse.101.desc.start.relative:0 "в основном знали мо[Select_CString(ROOT.Char.IsFemale, 'ю', 'его')] нов[Select_CString(new_spouse.IsFemale, 'ую', 'ого')] [new_spouse.GetWifeHusband] как мо[Select_CString(ROOT.Char.IsFemale, 'ю', 'его')] [ROOT.Char.Custom2('LMF_BloodRelationToMe', SCOPE.sC('new_spouse'))], если вообще знали.\n\n"
 lmf_spouse.101.desc.start.ruler:0 "скорее всего, знали только то, что мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] нов[Select_CString(new_spouse.IsFemale, 'ая', 'ый')] [new_spouse.GetWifeHusband] прави[Select_CString(new_spouse.IsFemale, 'ла', 'л')] [spouse_title.GetNameNoTooltip], если вообще знали.\n\n"
 lmf_spouse.101.desc.start.rulerdistant:0 "скорее всего, знали только то, что мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] нов[Select_CString(new_spouse.IsFemale, 'ая', 'ый')] [new_spouse.GetWifeHusband] прави[Select_CString(new_spouse.IsFemale, 'ла', 'л')] [spouse_title.GetNameNoTooltip|l], где-то в далёком [spouse_top_liege.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_spouse.101.desc.start.rulerrelative:0 "скорее всего, знали мо[Select_CString(ROOT.Char.IsFemale, 'ю', 'его')] нов[Select_CString(new_spouse.IsFemale, 'ую', 'ого')] [new_spouse.GetWifeHusband] только как [spouse_relative.Custom2('LMF_BloodRelationToMe', SCOPE.sC('new_spouse'))|l] [spouse_relative.GetTitleAsNameNoTooltip] из [spouse_relative.GetPrimaryTitle.GetNameNoTierNoTooltip], если вообще знали.\n\n"
 lmf_spouse.101.desc.start.dynasty:0 "возможно, знали мо[Select_CString(ROOT.Char.IsFemale, 'ю', 'его')] нов[Select_CString(new_spouse.IsFemale, 'ую', 'ого')] [new_spouse.GetWifeHusband] только как [new_spouse.Custom('polite_gender_ref')] из династии [new_spouse.GetDynasty.GetBaseName], не более.\n\n"
 lmf_spouse.101.desc.start.default:0 "скорее всего, вообще ничего не знали о мо[Select_CString(ROOT.Char.IsFemale, 'ём', 'ей')] нов[Select_CString(new_spouse.IsFemale, 'ой', 'ом')] [new_spouse.GetWifeHusband]. [new_spouse.GetSheHe] [Select_CString(new_spouse.IsFemale, 'была', 'был')] полной загадкой.\n\n"
 lmf_spouse.101.desc.hasrep2:0 "Затем, когда разнеслись слухи, они судачили о [new_spouse.Custom('first_spouse_reputation_comment')] и [new_spouse.Custom('second_spouse_reputation_comment')], представляете. "
 lmf_spouse.101.desc.hasrep1:0 "Затем, когда разнеслись слухи, они в основном судачили о [new_spouse.Custom('first_spouse_reputation_comment')]. "
 lmf_spouse.101.desc.hasrep0:0 "Кроме разных слухов, они не знали, что и думать о [new_spouse.GetHerHim]. "
 lmf_spouse.101.desc.hasrem2:0 "Те, кто приезжал в [ROOT.Char.Custom('FortifiedBuilding')] и видел [new_spouse.GetHerHim] при дворе, шептались о [new_spouse.Custom('first_spouse_remarkable_comment')], а также о [new_spouse.Custom('second_spouse_remarkable_comment')].\n\n"
 lmf_spouse.101.desc.hasrem1:0 "Те, кто приезжал в [ROOT.Char.Custom('FortifiedBuilding')] и видел [new_spouse.GetHerHim] при дворе, в основном шептались о [new_spouse.Custom('first_spouse_remarkable_comment')], а также о [new_spouse.Custom('random_spouse_remarkable_comment')].\n\n"
 lmf_spouse.101.desc.hasrem0:0 "Те, кто приезжал в [ROOT.Char.Custom('FortifiedBuilding')] и видел [new_spouse.GetHerHim] при дворе, шептались о [new_spouse.Custom('first_random_spouse_remarkable_comment')], а также о [new_spouse.Custom('second_random_spouse_remarkable_comment')].\n\n"
 lmf_spouse.101.desc.mid:0 "[new_spouse.GetFirstNameNoTooltip], со своей стороны, [new_spouse.Custom2('spouse_court_introduction', ROOT.Char )].\n\n"
 lmf_spouse.101.desc.good:0 "Весьма благоприятное начало. Будем надеяться, что это знак грядущего."
 lmf_spouse.101.desc.goodsick:0 "Учитывая, насколько [new_spouse.GetFirstNameNoTooltip] [Select_CString(new_spouse.IsFemale, 'была', 'был')] больн[Select_CString(new_spouse.IsFemale, 'а', '')] всё это время, лучшего и желать нельзя."
 lmf_spouse.101.desc.bad:0 "Не самое благоприятное начало, надо признать. Будем надеяться, что это не знак грядущего."
 lmf_spouse.101.desc.badsick:0 "Несомненно, болезнь [new_spouse.GetFirstNamePossessiveNoTooltip] повлияла на [new_spouse.GetHerHis] поведение. Будем надеяться, что всё наладится, когда [new_spouse.GetSheHe] [Select_CString(new_spouse.IsFemale, 'поправится', 'поправится')]."
 lmf_spouse.101.desc.default:0 "В целом, могло быть и хуже. Будем надеяться, что в будущем всё наладится."
 lmf_spouse.101.desc.defaultsick:0 "Учитывая, насколько [new_spouse.GetFirstNameNoTooltip] [Select_CString(new_spouse.IsFemale, 'была', 'был')] больн[Select_CString(new_spouse.IsFemale, 'а', '')] всё это время, могло быть гораздо хуже. Будем надеяться, что [new_spouse.GetSheHe] быстро [Select_CString(new_spouse.IsFemale, 'поправится', 'поправится')]."
 lmf_spouse.101.a:0 "Да здравствует [new_spouse.GetTitledFirstNameNoTooltip]!"
 
 lmf_spouse.1000.t:0 "Блаженство родственной души"
 lmf_spouse.1000.desc.army:0 "Сегодня, в редкий момент покоя, когда армия уже [Select_CString(ROOT.Char.IsFemale, 'разбила', 'разбил')] лагерь, мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'пришла', 'пришёл')] ко мне.\n\n"
 lmf_spouse.1000.desc.travel:0 "Мы уже [Select_CString(ROOT.Char.IsFemale, 'устроилась', 'устроился')] на ночлег в своих шатрах, совершенно без сил, когда мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'пришла', 'пришёл')] ко мне.\n\n"
 lmf_spouse.1000.desc.activity:0 "После полудня я [Select_CString(ROOT.Char.IsFemale, 'взяла', 'взял')] перерыв в нашем плотном расписании, прогуливаясь по двору в [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], как вдруг подня[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] глаза и увиде[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] мо[Select_CString(ROOT.Char.IsFemale, 'ю', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] неподалёку.\n\n"
 lmf_spouse.1000.desc.notlocal:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'приехала', 'приехал')] навестить меня в [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] сегодня, что было, мягко говоря, приятным сюрпризом.\n\n"
 lmf_spouse.1000.desc.local:0 "Я [Select_CString(ROOT.Char.IsFemale, 'прогуливалась', 'прогуливался')] сегодня по двору в [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], почти погружённ[Select_CString(ROOT.Char.IsFemale, 'ая', 'ый')] в свои мысли, как вдруг подня[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] глаза и увиде[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] мо[Select_CString(ROOT.Char.IsFemale, 'ю', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] неподалёку.\n\n"
 lmf_spouse.1000.desc.end:0 "Я улыбнул[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')], едва увидев [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], и [ROOT.Char.GetPrimarySpouse.GetSheHe] ответи[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] тем же. Почти без слов мы пошли рядом. Для любого наблюдателя это была просто прогулка мужа и жены, но, как всегда, я [Select_CString(ROOT.Char.IsFemale, 'была', 'был')] поглощён[Select_CString(ROOT.Char.IsFemale, 'а', '')] присутствием [ROOT.Char.GetPrimarySpouse.GetHerHis].\n\n[ROOT.Char.GetPrimarySpouse.GetSheHe|U] внимательно слуша[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')], как я жалуюсь на свои разнообразные проблемы, предлагая не столько советы, сколько давая мне возможность выговориться. При каждом тяжёлом вздохе [ROOT.Char.GetPrimarySpouse.GetSheHe] тихо [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'посмеивалась', 'посмеивался')], и каким-то образом мне становилось легче.\n\nНе успел я опомниться, как прошло несколько часов, и всё же я не уста[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] от общества [ROOT.Char.GetPrimarySpouse.GetHerHis]. Вот что, наверное, значит иметь настоящую родственную душу."
 lmf_spouse.1000.a:0 "Я никогда от этого не устану."
 
 lmf_spouse.1005.t:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [lover_trait.GetNameNoTooltip( ROOT.Char )|U] [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U]"
 lmf_spouse.1005.desc.sinful:0 "Говорят, что за время нашего брака мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] может дурно влиять на меня"
 lmf_spouse.1005.desc.good:0 "Говорят, что за время нашего брака мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] хорош[Select_CString(ROOT.Char.IsFemale, 'о', 'о')] вли[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'яла', 'ял')] на меня"
 lmf_spouse.1005.desc.normal:0 "Говорят, что за время нашего брака мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] сильно вли[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'яла', 'ял')] на меня"
 lmf_spouse.1005.desc.mid:0 "... и в этом есть доля правды.\n\n[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], например, довольно [lover_trait.GetNameNoTooltip( ROOT.Char )|l], "
 lmf_spouse.1005.desc.opposite:0 "тогда как я, напротив, [lover_opposite_trait.GetNameNoTooltip( ROOT.Char )|l]. Это камень преткновения в наших отношениях, проявляющийся в мелочах, ибо, хотя [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] никогда не пытал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] меня изменить, я вижу, что [ROOT.Char.GetPrimarySpouse.GetSheHe] не одобряет этого.\n\n"
 lmf_spouse.1005.desc.notopp:0 "и хотя [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] никогда не пытал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] меня изменить, я всё же чувствую вли[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'яние', 'яние')] [ROOT.Char.GetPrimarySpouse.GetHerHis] в едва заметных взглядах и редких нахмуренных бровях.\n\n"
 lmf_spouse.1005.desc.end:0 "Я часто ловлю себя на том, что меняю своё поведение, когда мы вместе. Наша связь такова, что я не возражаю, ведь становиться более похожими кажется естественным... но этого ли я хочу? Стать более [lover_trait.GetNameNoTooltip( ROOT.Char )|l], как [ROOT.Char.GetPrimarySpouse.GetSheHe]?\n\nЕсли я буду стоять на своём, то, вероятно, "
 lmf_spouse.1005.desc.opposite2:0 "этот камень преткновения вырастет в настоящую проблему. Но разве не различия изначально привлекли нас друг к другу?"
 lmf_spouse.1005.desc.notopp2:0 "это может вырасти в настоящий камень преткновения в наших отношениях. Или, возможно, я слишком много анализирую то, что и проблемой-то быть не должно?"
 lmf_spouse.1005.a:0 "Пусть так и будет."
 lmf_spouse.1005.b:0 "Нет, я такая, какая есть, и это не изменится."
 lmf_spouse.1005.b.tt:0 "Ваши различия растут"
 
 lmf_spouse.1010.t:0 "Моё [lover_trait.GetNameNoTooltip( ROOT.Char )|U] вли[Select_CString(ROOT.Char.IsFemale, 'яние', 'яние')]"
 lmf_spouse.1010.desc.sinful:0 "Говорят, что за время нашего брака я дурно вли[Select_CString(ROOT.Char.IsFemale, 'яла', 'ял')] на мо[Select_CString(ROOT.Char.IsFemale, 'ю', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]"
 lmf_spouse.1010.desc.good:0 "Говорят, что за время нашего брака я хорош[Select_CString(ROOT.Char.IsFemale, 'о', 'о')] вли[Select_CString(ROOT.Char.IsFemale, 'яла', 'ял')] на мо[Select_CString(ROOT.Char.IsFemale, 'ю', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]"
 lmf_spouse.1010.desc.normal:0 "Говорят, что за время нашего брака я сильно вли[Select_CString(ROOT.Char.IsFemale, 'яла', 'ял')] на мо[Select_CString(ROOT.Char.IsFemale, 'ю', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]"
 lmf_spouse.1010.desc.mid:0 "... и в этом есть доля правды.\n\nЯ, например, часто бываю довольно [lover_trait.GetNameNoTooltip( ROOT.Char )|l], "
 lmf_spouse.1010.desc.opposite:0 "тогда как [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], напротив, [lover_opposite_trait.GetNameNoTooltip( ROOT.Char )|l]. Это камень преткновения в наших отношениях, проявляющийся в мелочах, ибо, хотя я никогда не пытал[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] изменить [ROOT.Char.GetPrimarySpouse.GetHerHim], [ROOT.Char.GetPrimarySpouse.GetSheHe] видит, что я не одобряю.\n\n"
 lmf_spouse.1010.desc.notopp:0 "и хотя я никогда не пытал[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] изменить [ROOT.Char.GetPrimarySpouse.GetHerHim], ясно, что [ROOT.Char.GetPrimarySpouse.GetSheHe] чувствует вли[Select_CString(ROOT.Char.IsFemale, 'яние', 'яние')] моих едва заметных взглядов и редких нахмуренных бровей.\n\n"
 lmf_spouse.1010.desc.end:0 "Всё чаще [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] меняет своё поведение, когда мы вместе. Думаю, чтобы угодить мне и не дать нашим различиям перерасти в камень преткновения, хотя я никогда бы не попроси[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] [ROOT.Char.GetPrimarySpouse.GetHerHim] об этом. Наша связь такова, что [ROOT.Char.GetPrimarySpouse.GetSheHe] не жалуется, и я искренне верю, что это вызывает более глубокие изменения... которые со временем только сблизят нас."
 lmf_spouse.1010.a:0 "Я так люблю [ROOT.Char.GetPrimarySpouse.GetHerHim] за это."

 lmf_spouse.1015.t:0 "Разговор в постели"
 lmf_spouse.1015.desc:0 "Я долж[Select_CString(ROOT.Char.IsFemale, 'на', 'ен')] был[Select_CString(ROOT.Char.IsFemale, 'а', '')] догадаться, что что-то затевается, как только мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'пришла', 'пришёл')] в наши покои, чтобы провести вечер. В глазах [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] плясали озорные искорки.\n\n«Мне нужно тебе кое-что рассказать, [ROOT.Char.GetPrimarySpouse.Custom2('spoken_address_by_familiarity', ROOT.Char)]», — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe].\n\n«Да?» — я изо всех сил [Select_CString(ROOT.Char.IsFemale, 'постаралась', 'постарался')] притвориться незаинтересованн[Select_CString(ROOT.Char.IsFemale, 'ой', 'ым')], хоть это и было неправдой.\n\n«Это секрет, который я [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'подслушала', 'подслушал')] сегодня при дворе, и я подумал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')], что тебе будет интересно его услышать...»"
 lmf_spouse.1015.a:0 "«Как умно, любовь моя!»"
 
 lmf_spouse.1020.t:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] талантлив[Select_CString(ROOT.Char.IsFemale, 'ая', 'ый')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U]"
 lmf_spouse.1020.desc.start:0 "Иногда легко забыть, насколько талантлив[Select_CString(ROOT.Char.IsFemale, 'а', '')] на самом деле мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband].\n\n"
 lmf_spouse.1020.desc.diplomacy:0 "Но в последнее время [ROOT.Char.GetPrimarySpouse.GetSheHe] очень помогал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')]: [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сидела', 'сидел')] в постели и слуша[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')], как я сочиняю переписку с другими правителями, а потом да[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'вала', 'вал')] весьма проницательные советы, как исправить формулировки.\n\n"
 lmf_spouse.1020.desc.martial:0 "Но буквально на днях [ROOT.Char.GetPrimarySpouse.GetSheHe] замети[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] на моём столе бумаги со скучными подробностями о снабжении наших ополченцев и предложи[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] несколько улучшений, которые оказались на удивление полезными.\n\n"
 lmf_spouse.1020.desc.stewardship:0 "Но буквально на днях, когда мы лежали в постели, и я бесконечно жаловал[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] на налоговые соглашения с вассалами, [ROOT.Char.GetPrimarySpouse.GetSheHe] между делом предложи[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] кое-что, что значительно улучшило эти соглашения.\n\n"
 lmf_spouse.1020.desc.intrigue:0 "Глаза [ROOT.Char.GetPrimarySpouse.GetHerHis|U] всегда настороже: [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'указывала', 'указывал')] на недостатки в моей личной охране и обраща[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] моё внимание на определённые интриги при дворе и способы их использования.\n\n"
 lmf_spouse.1020.desc.learning:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] проявляет большой интерес к моим разглагольствованиям о последних увлечениях и время от времени даже даёт полезные советы, почерпнутые из своей сокровищницы знаний.\n\n"
 lmf_spouse.1020.desc.end:0 "Поначалу я сопротивлял[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] принятию помощи [ROOT.Char.GetPrimarySpouse.GetHerHis], но всё чаще я прихожу к выводу, что просто благоразумно принимать помощь от [ROOT.Char.GetPrimarySpouse.GetWomanMan], который так явно печётся о моих интересах."
 lmf_spouse.1020.a:0 "[ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip] удивительн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', 'ый')], не так ли?"
 
 lmf_spouse.1025.t:0 "Маленький подарок"
 lmf_spouse.1025.desc.ruler:0 "Мне показалось весьма любопытным, когда мне сообщили, что из [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] прибыл посыльный, и я [Select_CString(ROOT.Char.IsFemale, 'спустилась', 'спустился')] во двор встретить его.\n\n"
 lmf_spouse.1025.desc.notlocation:0 "Мне показалось весьма любопытным, когда мне сообщили, что из [ROOT.Char.GetPrimarySpouse.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] прибыл посыльный, и я [Select_CString(ROOT.Char.IsFemale, 'спустилась', 'спустился')] во двор встретить его.\n\n"
 lmf_spouse.1025.desc.location:0 "Мне показалось весьма любопытным, когда мне сказали, что мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'прибыла', 'прибыл')] во двор, чтобы увидеться со мной. Так официально? Как странно. Я [Select_CString(ROOT.Char.IsFemale, 'спустилась', 'спустился')] встретить [ROOT.Char.GetPrimarySpouse.GetHerHim] немедленно.\n\n"
 lmf_spouse.1025.desc.courtier:0 "Я [Select_CString(ROOT.Char.IsFemale, 'проходила', 'проходил')] через двор [ROOT.Char.Custom('FortifiedBuilding')], когда замети[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] стоящую там мо[Select_CString(ROOT.Char.IsFemale, 'ю', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband], [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'улыбающуюся', 'улыбающегося')] как безумн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ый')] [ROOT.Char.GetPrimarySpouse.GetWomanMan]. Как... неожиданно. Так что я, конечно же, сразу [Select_CString(ROOT.Char.IsFemale, 'подошла', 'подошёл')] поговорить с [ROOT.Char.GetPrimarySpouse.GetHerHim].\n\n"
 lmf_spouse.1025.desc.messenger:0 "«Посланием» оказалось великолепное кольцо, украшенное сверкающим драгоценным камнем, с простой запиской:\n\n#EMP Им никогда не сиять так ярко, как тебе — маленький подарок от того, кто любит тебя, как никто другой.#!\n\nЗаписка была без подписи, но я точно знаю, от кого она."
 lmf_spouse.1025.desc.inperson:0 "«У меня есть для тебя маленький подарок», — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe]. С этими словами [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] протяну[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] мне великолепное кольцо, украшенное сверкающим драгоценным камнем.\n\nЯ уже [Select_CString(ROOT.Char.IsFemale, 'собралась', 'собрался')] было возражать против [ROOT.Char.GetPrimarySpouse.GetHerHis] ненужной щедрости, но [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] прерва[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] меня, не дав и слова сказать. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] слишком хорошо меня знает.\n\n«Ты так много значишь для меня, [ROOT.Char.GetPrimarySpouse.Custom('WifeHusbandOpp')]. Пожалуйста, прими это как знак нашей нерушимой связи». И с этими словами [ROOT.Char.GetPrimarySpouse.GetSheHe] удалил[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')], не дав мне возможности ответить."
 lmf_spouse.1025.a:0 "Как заботливо со стороны [ROOT.Char.GetPrimarySpouse.GetHerHim]."
 
 lmf_spouse.1030.t:0 "[ROOT.Char.GetPrimarySpouse.GetWifeHusband|U] в нужде"
 lmf_spouse.1030.desc.start:0 "До меня дошли вести из [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], и дела... идут не очень хорошо у мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] в последнее время.\n\nНасколько я понимаю, мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip] по уши в долгах и, конечно же, слишком "
 lmf_spouse.1030.desc.proud:0 "горд[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] "
 lmf_spouse.1030.desc.stubborn:0 "упрям[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] "
 lmf_spouse.1030.desc.humble:0 "скром[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'на', 'ен')] "
 lmf_spouse.1030.desc.shy:0 "застенчив[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] "
 lmf_spouse.1030.desc.paranoid:0 "параноидальн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', 'ен')] "
 lmf_spouse.1030.desc.craven:0 "труслив[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] "
 lmf_spouse.1030.desc.content:0 "не [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'склонна', 'склонен')] "
 lmf_spouse.1030.desc.end:0 "чтобы на самом деле #EMP попросить#! моей помощи.\n\nВозможно, мне стоит просто вмешаться и не давать [ROOT.Char.GetPrimarySpouse.GetHerHim] возможности отказаться. Однако часть меня задаётся вопросом, не этого ли [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] втайне ожидает, и не [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'будет', 'будет')] ли [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'разочарована', 'разочарован')] или даже расстроен[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')], если я останусь в стороне и ничего не сделаю."
 lmf_spouse.1030.a:0 "Конечно, я помогу!"
 lmf_spouse.1030.b:0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сама', 'сам')] по себе."
 lmf_spouse.1030.b.tt:0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] ожида[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] вашей помощи..."
 
 lmf_spouse.1035.t:0 "Небольшой совет"
 lmf_spouse.1035.desc.start:0 "Как только мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'прибыла', 'прибыл')] сегодня из [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], я поня[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что [ROOT.Char.GetPrimarySpouse.GetHerHim] что-то беспокоит.\n\n[ROOT.Char.GetPrimarySpouse.GetSheHe|U] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'была', 'был')] так поглощен[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] своими мыслями, брови [ROOT.Char.GetPrimarySpouse.GetHerHis] сошлись от напряжения и тревоги. Я начал[Select_CString(ROOT.Char.IsFemale, 'а', '')] понимать, что [ROOT.Char.GetPrimarySpouse.GetSheHe] приеха[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] не для того, чтобы провести со мной день, а чтобы попросить совета.\n\n«Что-то не так, дорогая?» — наконец спроси[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] я.\n\n[ROOT.Char.GetPrimarySpouse.GetSheHe|U] тяжело вздохну[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')]. «Я знаю, у тебя есть свои заботы по управлению [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], но мне нужна твоя помощь "
 lmf_spouse.1035.desc.diplomacy:0 "в деликатном дипломатическом вопросе, "
 lmf_spouse.1035.desc.martial:0 "в вопросе стратегии, "
 lmf_spouse.1035.desc.stewardship:0 "в урегулировании спора с одним из моих вассалов по поводу их контракта, "
 lmf_spouse.1035.desc.intrigue:0 "в неотложном деле, требующем величайшей осмотрительности, "
 lmf_spouse.1035.desc.end:0 "в области, в которой ты разбираешься гораздо лучше меня. Пожалуйста... Боюсь, я в отчаянном положении»."
 lmf_spouse.1035.a:0 "«Я сделаю всё возможное, что бы ни потребовалось»."
 lmf_spouse.1035.a.success:0 "Ваша помощь увенчалась успехом и порадовала [ROOT.Char.GetPrimarySpouse.GetHerHim]"
 lmf_spouse.1035.a.fail.angry:0 "Ваша помощь привела к обратным результатам, и [ROOT.Char.GetPrimarySpouse.GetSheHe] в ярости"
 lmf_spouse.1035.a.fail.disappointed:0 "Ваша помощь привела к обратным результатам, но [ROOT.Char.GetPrimarySpouse.GetSheHe] проща[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ет', 'ет')] вас"
 lmf_spouse.1035.b:0 "Уклониться от ответа, отделавшись туманными банальностями."
 lmf_spouse.1035.b.success:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] соглаша[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ется', 'ется')], что вы не можете помочь"
 lmf_spouse.1035.b.fail:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] вид[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ит', 'ит')] ваш обман насквозь"
 
 lmf_spouse.1040.t:0 "Совет мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U]"
 lmf_spouse.1040.desc.start:0 "Иногда мне легко забыть, насколько умел[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ой', 'ым')] и умн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ой', 'ым')] [ROOT.Char.GetPrimarySpouse.GetWomanMan] является мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband].\n\nМы гуляли сегодня по садам в [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], когда [ROOT.Char.GetPrimarySpouse.GetSheHe] "
 lmf_spouse.1040.desc.diplomacy:0 "начал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] говорить о недавних проблемах с одним вассалом и о том, как я мог бы урегулировать их мирно.\n\n"
 lmf_spouse.1040.desc.martial:0 "заговори[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] о проблемах со снабжением, которые, как я упоминал, у нас возникли с воинами, и предложи[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] несколько вариантов их решения.\n\n"
 lmf_spouse.1040.desc.stewardship:0 "заговори[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] о налоговом споре, о котором я упоминал со своими вассалами, сначала неохотно, а затем с большей убеждённостью. Более того, [ROOT.Char.GetPrimarySpouse.GetSheHe] предложи[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] способ полностью его обойти.\n\n"
 lmf_spouse.1040.desc.intrigue:0 "заговори[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] о безопасности [ROOT.Char.Custom('FortifiedBuilding')], а точнее, об её отсутствии. О том, как её можно нарушить. Не в качестве угрозы, а из искренней заботы о моём благополучии.\n\n"
 lmf_spouse.1040.desc.learning:0 "пространно говори[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] о том, как я мог бы поддерживать библиотеки в [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] и как это могло бы способствовать развитию во всём моём государстве.\n\n"
 lmf_spouse.1040.desc.end:0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip|U] продолжал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] почти весь день, и я слуша[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] с восхищением. Совет [ROOT.Char.GetPrimarySpouse.GetHerHis|U] мог бы быть действительно полезен, если бы [ROOT.Char.GetPrimarySpouse.GetSheHe] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'была', 'был')] готова продолжать его давать."
 lmf_spouse.1040.a:0 "Весьма признателен!"
 
 lmf_spouse.1045.t:0 "На помощь"
 lmf_spouse.1045.desc.start:0 "Болезнь приковала меня к постели, я кашля[Select_CString(ROOT.Char.IsFemale, 'ю', 'ю')], и поэтому, когда слышу, как кто-то входит в мои покои, я сонно приказываю немедленно удалиться.\n\n«Ерунда, любовь моя. "
 lmf_spouse.1045.desc.ruler:0 "Я приеха[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] из самого [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], как только узна[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')], что ты бол[Select_CString(ROOT.Char.IsFemale, 'ьна', 'ен')]». "
 lmf_spouse.1045.desc.location:0 "Я не собираюсь оставлять тебя здесь угасать, когда я вполне могу за тобой ухаживать». "
 lmf_spouse.1045.desc.notlocation:0 "Я приеха[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] из самого [ROOT.Char.GetPrimarySpouse.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], как только узна[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')], что ты бол[Select_CString(ROOT.Char.IsFemale, 'ьна', 'ен')]». "
 lmf_spouse.1045.desc.mid:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] врывается, не оставляя мне выбора, и сразу же берёт на себя заботу обо мне.\n\n«Н-но ты же наверняка заразишься!» — возража[Select_CString(ROOT.Char.IsFemale, 'ю', 'ю')] я между приступами кашля.\n\n[ROOT.Char.GetPrimarySpouse.GetSheHe|U] пожима[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ет', 'ет')] плечами. «Если на то будет воля [ROOT.Char.GetPrimarySpouse.GetFaith.PantheonTerm2], пусть так».\n\nКогда появляются испуганные слуги, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] начинает раздавать приказы, не оставляя сомнений в том, кто здесь главный. И это уж точно не я."
 lmf_spouse.1045.a:0 "Подчиниться заботам [ROOT.Char.GetPrimarySpouse.GetHerHis]."
 
 lmf_spouse.1050.t:0 "Оговорка"
 lmf_spouse.1050.desc:0 "Я не хоте[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] этого говорить.\n\nНазовите это «разговором в постели», назовите это неосторожностью или даже глупостью. Мы с мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] болтали одним вечером, как часто бывает, и я сказа[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] гораздо больше, чем намерева[Select_CString(ROOT.Char.IsFemale, 'лась', 'лся')].\n\n[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip|U] сначала [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'притворилась', 'притворился')], что не понимает, но я виде[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] понимание в глазах [ROOT.Char.GetPrimarySpouse.GetHerHis]. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] знает."
 lmf_spouse.1050.a:0 "Теперь уже ничего не поделаешь..."
 lmf_spouse.1050.b:0 "Пообещать [ROOT.Char.GetPrimarySpouse.GetHerHim] что угодно в обмен на молчание."
 lmf_spouse.1050.c:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] никому не расскажет из темницы!"
 spouse_promise_to_keep_secret:0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] обеща[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ет', 'ет')] не раскрывать [secret|E]"
 spouse_jailed_to_keep_secret:0 "Вырва[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] у [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] вынужденное обещание не раскрывать [secret|E]"
 learned_terrible_secret:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] узна[Select_CString(TARGET_CHARACTER.IsFemale, 'ла', 'л')] ужасную тайну о [CHARACTER.GetShortUINameNoTooltipNoFormat], которая глубоко расстрои[Select_CString(TARGET_CHARACTER.IsFemale, 'ла', 'л')] [CharYouHerHim(TARGET_CHARACTER)]."
 learned_terrible_secret_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] узна[Select_CString(CHARACTER.IsFemale, 'ла', 'л')] ужасную тайну о [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat], которая глубоко расстрои[Select_CString(CHARACTER.IsFemale, 'ла', 'л')] [CharYouHerHim(CHARACTER)]."
 
 lmf_spouse.1055.t:0 "Оговорка [ROOT.Char.GetPrimarySpouse.GetHerHis]"
 lmf_spouse.1055.desc:0 "Ясно, что [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] не хоте[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] этого говорить.\n\nНазовите это «разговором в постели», назовите это неосторожностью или даже глупостью. Мы с мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] болтали одним вечером, как часто бывает, и [ROOT.Char.GetPrimarySpouse.GetSheHe] проговори[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'лась', 'лся')] о том, о чём [ROOT.Char.GetPrimarySpouse.GetSheHe] совершенно не следовало говорить.\n\nТо, как [ROOT.Char.GetPrimarySpouse.GetSheHe] мгновенно замер[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', '')] после этого, сказало мне, что [ROOT.Char.GetPrimarySpouse.GetSheHe] прекрасно понима[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')], что только что сказа[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')]... и что с моей стороны не было недопонимания.\n\n[ROOT.Char.GetPrimarySpouse.GetSheHe|U] зна[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')], что я тоже это знаю. Даже если мне всё ещё трудно в это поверить."
 lmf_spouse.1055.a:0 "Ну, это было неожиданно."
 
 lmf_spouse.1060.opening:0 "Моя дражайшая любовь,"
 lmf_spouse.1060.desc.start:0 "Говорят, что разлука заставляет сердце любить сильнее. Похоже, это правда, ибо моё сердце действительно полно любви к тебе.\n\nМне сказали, что "
 lmf_spouse.1060.desc.army:0 "твоя армия разбила лагерь где-то далеко в "
 lmf_spouse.1060.desc.travel:0 "твои странствия достигли далёкого "
 lmf_spouse.1060.desc.event:0 "ты сейчас в далёком "
 lmf_spouse.1060.desc.end:0 "[my_camp.GetNameNoTierNoTooltip], и если это так, то я надеюсь, что это письмо найдёт тебя и застанет мо[Select_CString(ROOT.Char.IsFemale, 'ю', 'его')] [ROOT.Char.GetWifeHusband] в добром здравии и хорошем настроении. Я буду думать о тебе до твоего возвращения в [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_spouse.1060.a:0 "Надеюсь, скоро увижу [ROOT.Char.GetPrimarySpouse.GetHerHim]."
 
 lmf_spouse.1065.opening:0 "Моя бедная любовь,"
 lmf_spouse.1065.desc:0 "Если это письмо найдёт тебя, значит, молодой солдат, которого я подкупи[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], сдержал слово, и [my_imprisoner.GetTitledFirstNameNoTooltip] (чтоб [my_imprisoner.GetHerHis] имя сгнило) ничего не узнал.\n\nЯ написал[Select_CString(ROOT.Char.IsFemale, 'а', '')], как только узна[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] о твоём заточении. Если бы я только мог[Select_CString(ROOT.Char.IsFemale, 'ла', '')] устроить тебе побег!\n\nУвы, всё, что я могу, — это предложить тебе слова утешения и молиться, чтобы тебя скоро освободили.\n\nЯ буду ждать того времени, когда смогу воссоединиться с мо[Select_CString(ROOT.Char.IsFemale, 'им', 'ей')] прекрасн[Select_CString(ROOT.Char.IsFemale, 'ой', 'ым')] [ROOT.Char.GetWifeHusband]."
 lmf_spouse.1065.a:0 "Мысли о [ROOT.Char.GetPrimarySpouse.GetHerHim] скрасят моё время здесь."
 
 lmf_spouse.1070.t:0 "Взгляд на приз"
 lmf_spouse.1070.desc.start.lover:0 "Когда сегодня вечером остыл пот после недавних трудов, "
 lmf_spouse.1070.desc.start.notlover:0 "Когда сегодня вечером мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'вошла', 'вошёл')] в гостиную, "
 lmf_spouse.1070.desc.start:0 "я сразу поня[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что у [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip] что-то на уме. У [ROOT.Char.GetPrimarySpouse.GetHerHis] в глазах был тот самый взгляд, который появляется, когда [ROOT.Char.GetPrimarySpouse.GetSheHe] чего-то хочет.\n\n«Я виде[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] "
 lmf_spouse.1070.desc.jewelry:0 "самое чудесное украшение "
 lmf_spouse.1070.desc.sword:0 "самый великолепный меч "
 lmf_spouse.1070.desc.book:0 "самую невероятную книгу "
 lmf_spouse.1070.desc.manuals:0 "самый замечательный набор руководств "
 lmf_spouse.1070.desc.robe:0 "невероятную мантию, так искусно вышитую, "
 lmf_spouse.1070.desc.end:0 "сегодня на рынке. Мне так [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'захотелось', 'захотелось')] её, хотя она #EMP очень#! дорогая...»\n\nНамерение было ясно: [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] хоте[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')], чтобы я купи[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] это для [ROOT.Char.GetPrimarySpouse.GetHerHim] в подарок. На самом деле, ещё до того, как вечер закончился, [ROOT.Char.GetPrimarySpouse.GetSheHe] уже практически умоля[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] о желанном призе. «Конечно, это не слишком много, чтобы просить, "
 lmf_spouse.1070.desc.end.lover:0 "любовь моя? Ты же обожаешь меня, не так ли?»"
 lmf_spouse.1070.desc.end.notlover:0 "дражайш[Select_CString(ROOT.Char.IsFemale, 'ая', 'ий')] [ROOT.Char.GetWifeHusband]? Мы же можем позволить себе такую роскошь, не так ли?»"
 lmf_spouse.1070.a:0 "Я удивлю [ROOT.Char.GetPrimarySpouse.GetHerHim] чем-то ещё более #EMP дорогим#!"
 lmf_spouse.1070.b:0 "Уступить и подарить [ROOT.Char.GetPrimarySpouse.GetHerHim] этот подарок."
 lmf_spouse.1070.c:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe] шутит? Конечно, нет!"
 
 lmf_spouse.1075.t:0 "Тяжкое оскорбление"
 lmf_spouse.1075.desc.start:0 "Когда мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ворва[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'лась', 'лся')] в комнату, пылая гневом, я сначала подума[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что причиной могу быть я.\n\nНо нет, оказалось, что [ROOT.Char.GetPrimarySpouse.GetSheHe] столкнул[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] с [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('my_courtier'))]. "
 lmf_spouse.1075.desc.relation:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('my_courtier'))] "
 lmf_spouse.1075.desc.norelation:0 "[Select_CString(my_courtier.IsFemale, 'Эта', 'Этот')] [my_courtier.GetWomanMan] "
 lmf_spouse.1075.desc.end:0 "сдела[Select_CString(my_courtier.IsFemale, 'ла', 'л')] замечание, которое [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'подслушала', 'подслушал')], что-то... скажем так, недоброе. Это привело к конфронтации, а затем к перебранке, и теперь мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] говорит мне, что [my_courtier.GetFirstNameNoTooltip] «бегает по [ROOT.Char.Custom('FortifiedBuilding')], распространяя ложь» о [ROOT.Char.GetPrimarySpouse.GetHerHim].\n\nПолагаю, это было неизбежно, учитывая "
 lmf_spouse.1075.desc.commoner:0 "простое происхождение [ROOT.Char.GetPrimarySpouse.GetHerHis]... некоторые будут считать [ROOT.Char.GetPrimarySpouse.GetHerHim] выскочкой.\n\n"
 lmf_spouse.1075.desc.rival:0 "давнюю вражду [ROOT.Char.GetPrimarySpouse.GetHerHis] с [my_courtier.GetFirstNameNoTooltip]. Рано или поздно это должно было случиться.\n\n"
 lmf_spouse.1075.desc.temper:0 "печально известный нрав [my_courtier.GetFirstNamePossessiveNoTooltip]. Я долж[Select_CString(ROOT.Char.IsFemale, 'на', 'ен')] был[Select_CString(ROOT.Char.IsFemale, 'а', '')] знать, что это в конце концов доведёт [my_courtier.GetHerHim] до беды.\n\n"
 lmf_spouse.1075.desc.end2:0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] прямо не проси[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] меня что-либо с этим делать, но я вижу, что [ROOT.Char.GetPrimarySpouse.GetSheHe] считает, что мне следует."
 lmf_spouse.1075.a:0 "Я немедленно отошлю [my_courtier.GetFirstNameNoTooltip] прочь."
 lmf_spouse.1075.b:0 "[my_courtier.GetFirstNameNoTooltip] будет строго наказан[Select_CString(my_courtier.IsFemale, 'а', '')] за это оскорбление."
 lmf_spouse.1075.b.success:0 "[my_courtier.GetFirstNameNoTooltip] [Select_CString(my_courtier.IsFemale, 'выразила', 'выразил')] должное сожаление"
 lmf_spouse.1075.b.failure:0 "Теперь [my_courtier.GetFirstNameNoTooltip] зол на вас обоих"
 reprimanded_me_unjustly_spouse:0 "[TARGET_CHARACTER.GetShortUIName|U] несправедливо наказа[Select_CString(TARGET_CHARACTER.IsFemale, 'ла', 'л')] [CHARACTER.GetShortUIName] за оскорбление, нанесённое супругу [TARGET_CHARACTER.GetHerHisMy]."
 reprimanded_me_unjustly__spouse_corresponding:0 "[CHARACTER.GetShortUIName|U] несправедливо наказа[Select_CString(CHARACTER.IsFemale, 'ла', 'л')] [TARGET_CHARACTER.GetShortUIName] за оскорбление, нанесённое супругу [CHARACTER.GetHerHisMy]."
 lmf_spouse.1075.c:0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] придётся к этому привыкнуть."

 lmf_spouse.1080.t:0 "Всегда рядом"
 lmf_spouse.1080.desc:0 "В последние дни мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] всегда рядом.\n\nТо мы вместе в постели, то гуляем по садам, то вместе при дворе... Я бы подума[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что у [ROOT.Char.GetPrimarySpouse.GetHerHis] и так достаточно дел в качестве [ROOT.Char.GetPrimarySpouse.GetLadyLord] моего [ROOT.Char.Custom('FortifiedBuilding')], но, очевидно, нет, ведь мы вместе почти каждое мгновение.\n\nПоймите меня правильно, мне очень нравится проводить с [ROOT.Char.GetPrimarySpouse.GetHerHim] время. Просто [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] сильно отвлекает меня от моих собственных обязанностей как [ROOT.Char.GetTitleAsNameNoTooltip].\n\nЯ бы, конечно, никогда не сказа[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] [ROOT.Char.GetPrimarySpouse.GetHerHim] этого, но, возможно, буду вынужден[Select_CString(ROOT.Char.IsFemale, 'а', '')] сделать это, если так продолжится и дальше, иначе пострадает моё внимание к [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 lmf_spouse.1080.a:0 "Ну и что? Мне нравится отвлекаться."
 lmf_spouse.1080.b:0 "Отослать [ROOT.Char.GetPrimarySpouse.GetHerHim] прочь. Мне нужно сосредоточиться на своих обязанностях."
 
 lmf_spouse.1085.t:0 "День в саду"
 lmf_spouse.1085.desc.courtier:0 "Хотя мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] и является частью моего двора, нам нечасто удаётся провести день вместе.\n\n"
 lmf_spouse.1085.desc.ruler:0 "Поскольку у мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] есть свой собственный двор, которым нужно управлять, нам нечасто удаётся провести день вместе.\n\n"
 lmf_spouse.1085.desc.start:0 "Однако сегодня был не такой день, как обычно. В [ROOT.Char.Custom('FortifiedBuilding')] в кои-то веки было тихо, и большая часть двора была занята неважными делами. "
 lmf_spouse.1085.mid.courtier:0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] тихо подош[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'ёл')] ко мне. "
 lmf_spouse.1085.mid.ruler:0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] появил[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] будто из ниоткуда — я даже не зна[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что [ROOT.Char.GetPrimarySpouse.GetSheHe] в [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]! "
 lmf_spouse.1085.desc.mid:0 "«Я знаю место, где мы можем побыть наедине», — прошепта[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] [ROOT.Char.GetPrimarySpouse.GetSheHe].\n\n[ROOT.Char.GetPrimarySpouse.GetSheHe|U] уве[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] меня вглубь садов, и хотя я иска[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] глазами садовников, никого не увиде[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')].\n\n«Я отосла[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] их», — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip].\n\nКак [ROOT.Char.GetPrimarySpouse.GetSheHe] это устрои[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')], я не спрашива[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] и мне было всё равно, ведь последовавший день никто из нас вряд ли скоро забудет."
 lmf_spouse.1085.a:0 "Мне #EMP очень#! нравится этот сад."
 
 lmf_spouse.1090.t:0 "Украденный миг в лагере"
 lmf_spouse.1090.desc:0 "Армия разбила лагерь в [army_location.GetCounty.GetTitle.GetNameNoTierNoTooltip] после долгого дня. Было поздно, большинство солдат и [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] уже разошлись по палаткам, и я тоже собирал[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] последовать их примеру.\n\nТут появил[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband], будто из ниоткуда, с озорной ухмылкой на лице, которая стала видна, когда [ROOT.Char.GetPrimarySpouse.GetSheHe] сня[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] шлем. «Пойдём со мной», — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe].\n\nНа мгновение я подума[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что что-то не так. Когда [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] приве[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] меня в более уединённую часть лагеря и нача[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] снимать [ROOT.Char.GetPrimarySpouse.GetHerHis] доспехи, я поня[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что дело #EMP вовсе#! не в этом.\n\n«Солдаты могут нас увидеть», — предупреди[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] я с усмешкой.\n\n«Увидеть что? [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'Женщину', 'Мужчину')], которая любит и обожает своего [ROOT.Char.GetWifeHusband]? Какое им дело?» С этими словами моё сопротивление рухнуло, и хорошо, что так."
 lmf_spouse.1090.a:0 "Кто бы мог подумать, что в лагере может быть так весело?"
 
 lmf_spouse.1095.t:0 "Сломанное колесо"
 lmf_spouse.1095.desc.start:0 "У одного из фургонов, как мне сказали, сломалось колесо. Это не должно было сильно задержать наше путешествие, но всё же означало много стояния без дела в ожидании, пока другие всё починят.\n\nИ тут, откуда ни возьмись, позади меня появил[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]. «У меня есть идея», — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe], подмигнув.\n\nЯ не сразу поня[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что [ROOT.Char.GetPrimarySpouse.GetSheHe] имеет в виду, пока не замети[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] корзину и одеяло на руке у [ROOT.Char.GetPrimarySpouse.GetHerHis]. Я позволи[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] [ROOT.Char.GetPrimarySpouse.GetHerHim] отвести меня в уединённое место неподалёку, подальше от любопытных глаз нашей свиты, и, расстелив одеяло, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] нача[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] снимать [ROOT.Char.GetPrimarySpouse.GetHerHis] одежду.\n\n"
 lmf_spouse.1095.desc.cold:0 "«Не холодновато ли для этого здесь?» — рассмеял[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] я.\n\n«Нет, если ты рядом», — улыбнул[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] [ROOT.Char.GetPrimarySpouse.GetSheHe]. "
 lmf_spouse.1095.desc.sand:0 "«Осторожнее, чтобы песок не попал в... некоторые места», — рассмеял[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] я.\n\n«Мне понадобится, чтобы ты провери[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')]», — улыбнул[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] [ROOT.Char.GetPrimarySpouse.GetSheHe]. "
 lmf_spouse.1095.desc.bugs:0 "«Не боишься насекомых, как я погляжу», — рассмеял[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] я.\n\n«Нет, если ты рядом», — улыбнул[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] [ROOT.Char.GetPrimarySpouse.GetSheHe]. "
 lmf_spouse.1095.desc.default:0 "«Знаешь, любой может пройти мимо и увидеть нас», — рассмеял[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] я.\n\n«Тогда их ждёт неплохое зрелище», — улыбнул[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] [ROOT.Char.GetPrimarySpouse.GetSheHe]. "
 lmf_spouse.1095.desc.end:0 "Это оказалось предложением, от которого я не мог отказаться."
 lmf_spouse.1095.a:0 "Мне #EMP очень#! нравится путешествовать."
 
 lmf_spouse.1100.t:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] ненадёжн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ый')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U]?"
 lmf_spouse.1100.desc:0 "Может ли это быть правдой?\n\nДо меня дошли донесения, что мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] недавно связывал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] с [my_rival.GetTitledFirstNameNoTooltip]. Зачем [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] писать письма моему сопернику, я понятия не имею. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] отрицает это, конечно, и хотя я пытал[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] расследовать это дело более тщательно, вполне возможно, что всё это был лишь слух... слух, который, по предположению [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], несомненно, распустил кто-то, желающий опорочить доброе имя [ROOT.Char.GetPrimarySpouse.GetHerHis]. Не имея возможности проверить истину, у меня нет иного выбора, кроме как поверить [ROOT.Char.GetPrimarySpouse.GetHerHim] на слово, но это гложет меня.\n\nЯ #EMP знаю#!, что что-то не так. Здесь замешана какая-то интрига."
 lmf_spouse.1100.a:0 "Надеюсь, ничего из этого не выйдет."
 
 lmf_spouse.1101.opening:0 "[lover.Custom2('GreetingToGenericPositive', ROOT.Char )],"
 lmf_spouse.1101.stranger:0 "Кто я — неважно, но "
 lmf_spouse.1101.start:0 "у меня есть сведения о [player_rival.GetTitledFirstName], которые могут вас весьма заинтересовать, учитывая, что всем известно, что вы с [player_rival.GetSheHe] соперники.\n\nВсё, что я прошу взамен за мои труды, — это ничтожная сумма золота, и чтобы вы никогда не упоминали, что "
 lmf_spouse.1101.know:0 "это пришло от ва[Select_CString(ROOT.Char.IsFemale, 'шей', 'шего')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))|l]."
 lmf_spouse.1101.stranger2:0 "от кого вы получили эти сведения."
 lmf_spouse.1101.a:0 "У [player_rival.GetTitledFirstNameNoTooltip] есть секрет? Да, пожалуйста!"
 lmf_spouse.1101.b:0 "Мне это неинтересно. Прочь."

 lmf_spouse.1105.t:0 "Мимолётная тень"
 lmf_spouse.1105.desc.start:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] возлюбленн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ый')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] бол[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ьна', 'ен')].\n\n"
 lmf_spouse.1105.desc.courtier:0 "Я ненадолго заш[Select_CString(ROOT.Char.IsFemale, 'ла', 'ёл')] в наши покои повидать [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] ранее, и [ROOT.Char.GetPrimarySpouse.GetSheHe] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'была', 'был')] в лихорадочном бреду. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] всё время стона[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] моё имя, снова и снова, и как только [ROOT.Char.GetPrimarySpouse.GetSheHe] замети[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] меня, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'протянула', 'протянул')] отчаянную руку и умоля[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] подойти поближе.\n\nЯ не мог[Select_CString(ROOT.Char.IsFemale, 'ла', '')] остаться, конечно, и теперь думаю, а стоило ли.\n\n"
 lmf_spouse.1105.desc.end:0 "Мне больно думать о [ROOT.Char.GetPrimarySpouse.GetHerHim], лежащ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'ем')] там, возможно, умирающ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'ем')], и в тот момент, когда [ROOT.Char.GetPrimarySpouse.GetSheHe] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'просыпается', 'просыпается')] и [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'находится', 'находится')] в сознании, меня нет рядом. Если [ROOT.Char.GetPrimarySpouse.GetSheHe] справится с этим, а меня не было рядом, когда [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'нужна', 'нужен')] была я больше всего, [ROOT.Char.GetPrimarySpouse.GetSheHe] это поймёт."
 lmf_spouse.1105.a:0 "Конечно, я останусь у постели [ROOT.Char.GetPrimarySpouse.GetHerHis]!"
 lmf_spouse.1105.c:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] получит надлежащее лечение от нашего врача."
 
 lmf_spouse.1115.t:0 "Любовь и ненависть"
 lmf_spouse.1115.desc:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] злится на меня.\n\nИли, возможно, [ROOT.Char.GetPrimarySpouse.GetSheHe] стал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] меня недолюбливать, даже ненавидеть. В любом случае, в последние месяцы я вижу [ROOT.Char.GetPrimarySpouse.GetHerHim] лишь изредка. Когда мы встречаемся, [ROOT.Char.GetPrimarySpouse.GetSheHe] держится отстранённо, а иногда и холодно.\n\nВозможно, это пройдёт, это правда. Или, возможно, это начало конца наших любящих отношений... если не конца нашего брака."
 lmf_spouse.1115.a:0 "Этого следовало ожидать, на самом деле."
 
 lmf_spouse.1120.t:0 "Такие похожие"
 lmf_spouse.1120.desc:0 "Мне говорили, что мы с мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] очень похожи.\n\nПризнаю, это правда. "
 lmf_spouse.1120.desc.low:0 "Возможно, не настолько похожи, как утверждают некоторые сплетники, но можно с уверенностью сказать, что мы чаще соглашаемся, чем расходимся во мнениях... а для супружеской пары это немалое достижение.\n\n"
 lmf_spouse.1120.desc.mid:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] часто заканчивает мои предложения, а я — [ROOT.Char.GetPrimarySpouse.GetHerHis], и я часто могу предугадать, как [ROOT.Char.GetPrimarySpouse.GetSheHe] отреагирует почти на любую тему. Для супружеской пары это немалое достижение.\n\n"
 lmf_spouse.1120.desc.high:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] заканчивает мои предложения, кажется, предугадывает каждое моё желание, и мы редко расходимся во мнениях... почти по любому поводу. По крайней мере, в последнее время. В этом сплетники правы, а для супружеской пары это немалое достижение.\n\n"
 lmf_spouse.1120.desc.end:0 "Это не значит, что мы всегда будем соглашаться, конечно, но в последнее время это сходство привело к лёгкости, которая мне очень нравится. [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] недавно встрети[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] меня во дворе, когда я вернул[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] в [ROOT.Char.Custom('FortifiedBuilding')], и искренняя улыбка, которой [ROOT.Char.GetPrimarySpouse.GetSheHe] меня одари[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')], позволила легко ответить тем же.\n\nПока что всё хорошо."
 lmf_spouse.1120.a:0 "Ах, семейная жизнь!"
 
 lmf_spouse.1125.t:0 "Нечто общее"
 lmf_spouse.1125.desc.diplomat:0 "Я собираюсь ответить на вопрос при дворе, касающийся очень деликатного дипломатического дела... но прежде чем я успеваю заговорить, мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] отвечает за меня. «Прошу прощения, дорог[Select_CString(ROOT.Char.IsFemale, 'ая', 'ой')] [ROOT.Char.GetWifeHusband]», — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'говорит', 'говорит')] [ROOT.Char.GetPrimarySpouse.GetSheHe] мне, подмигивая. По правде говоря, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] ответи[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] на вопрос лучше, чем мог бы я, и тем самым избави[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] меня от некоторых хлопот.\n\nПреимущество иметь [ROOT.Char.GetPrimarySpouse.GetWifeHusband], столь же сведущ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ую', 'его')] в дипломатическом этикете, как и я сам[Select_CString(ROOT.Char.IsFemale, 'а', '')]."
 lmf_spouse.1125.desc.reveler:0 "Я развлекаю нескольких мелких лордов в [ROOT.Char.Custom('FortifiedBuilding')] в [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] — скорее мелкие неприятности, которыми нужно управлять, чем люди с реальной властью. Однако час поздний, а они всё не уходят. И кто же входит в комнату, как не мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]... который[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ый')], взглянув на ситуацию, улыбается и берёт всё в свои руки. Вскоре жизнь вечеринки возвращается, и лордов потихоньку выпроваживают, довольных столь прекрасным развлечением.\n\nПреимущество иметь [ROOT.Char.GetPrimarySpouse.GetWifeHusband], столь же искусн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ую', 'ого')] в веселье, как и я."
 lmf_spouse.1125.desc.blademaster:0 "Мои мышцы ноют после полуденной тренировки по фехтованию. Нелегко овладеть формами, следить, чтобы моё мастерство владения клинком не ржавело.\n\nИ кто же появляется с мечом в руке, готовый бросить мне вызов? Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband], который[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ый')] одаривает меня лёгкой улыбкой, подобной моей. «Готов[Select_CString(ROOT.Char.IsFemale, 'а', '')], дорог[Select_CString(ROOT.Char.IsFemale, 'ая', 'ой')] [ROOT.Char.GetWifeHusband]? Ты сегодня выглядишь немного небрежно, нам нужно это исправить». Самоуверенность [ROOT.Char.GetPrimarySpouse.GetHerHis|U] заставляет меня смеяться.\n\nВот, полагаю, преимущество иметь [ROOT.Char.GetPrimarySpouse.GetWifeHusband], чей интерес к фехтованию не уступает моему."
 lmf_spouse.1125.desc.hunter:0 "Мы провели день на небольшой охоте в небольшом лесу близ [ROOT.Char.Custom('FortifiedBuilding')] в [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Ничего утомительного, хотя наша добыча оказалась досадно неуловимой. Час поздний, мои придворные начинают уставать и раздражаться... этого достаточно, чтобы #EMP я#! начал[Select_CString(ROOT.Char.IsFemale, 'а', '')] раздражаться.\n\nИ кто же подходит ко мне и дарит нетерпеливую улыбку? Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband], конечно. «Нам следует отослать остальных домой, дорог[Select_CString(ROOT.Char.IsFemale, 'ая', 'ой')] [ROOT.Char.GetWifeHusband], и закончить эту охоту самим». Этого достаточно, чтобы вызвать у меня смех.\n\nВот, думаю, преимущество иметь [ROOT.Char.GetPrimarySpouse.GetWifeHusband], разделяющ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ую', 'его')] мою любовь к охоте."
 lmf_spouse.1125.desc.strategist:0 "Поздно. Я развлекаю одного из моих старших командиров в [ROOT.Char.Custom('FortifiedBuilding')], хотя вечер превратился в затяжной спор о старом сражении где-то далеко-далеко.\n\nЯ говорю, что у того полководца не было другого выбора. Он считает, что справился бы лучше, но досадно уклончив в деталях, как именно. Моё раздражение растёт, как вдруг из ниоткуда появляется мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]. «Кто-нибудь из вас рассматривал альтернативу?» Вскоре [ROOT.Char.GetPrimarySpouse.GetSheHe] присоединяется к нашему разговору и превращает его в нечто действительно интересное... и подмигивает мне, прекрасно осознавая, что только что сделал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')].\n\nПолагаю, преимущество иметь [ROOT.Char.GetPrimarySpouse.GetWifeHusband], чьё знание стратегии не уступает моему."
 lmf_spouse.1125.desc.architect:0 "Поздно. Большая часть [ROOT.Char.Custom('FortifiedBuilding')] уже спит, а что делаю я? Корплю над планами нового [ROOT.Char.GetFaith.HouseOfWorship] в [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], внося правку за правкой, но всё равно досадно неудовлетворённый всем проектом.\n\nВнезапно мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] подходит сзади. Я напрягаюсь, думая, что [ROOT.Char.GetPrimarySpouse.GetSheHe] прикажет мне идти спать, но вместо этого [ROOT.Char.GetPrimarySpouse.GetSheHe] указывает на часть планов. «Ты не думал сделать это отдельным помещением, дорог[Select_CString(ROOT.Char.IsFemale, 'ая', 'ой')] [ROOT.Char.GetWifeHusband]? Это полностью нарушает баланс». Вскоре мы решаем мою проблему и составляем план, который меня наконец-то устраивает, и #EMP наконец-то#! я могу спать.\n\nВот, полагаю, преимущество иметь [ROOT.Char.GetPrimarySpouse.GetWifeHusband], чей интерес к архитектуре не уступает моему."
 lmf_spouse.1125.desc.intrigue:0 "Поздно. Я разговариваю со своими советниками о некоем тёмном деле... план, который, возможно, никогда не осуществится, но мы хотим быть готовы, если и когда он понадобится.\n\nК сожалению, мы топчемся на месте. Спор ходит по кругу, и сейчас я уже тру глаза и подумываю просто отказаться от всей затеи.\n\nВнезапно из тени появляется мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband], держа свечу и одаривая меня нежной улыбкой. «Ты не думал, дорог[Select_CString(ROOT.Char.IsFemale, 'ая', 'ой')] [ROOT.Char.GetWifeHusband], что есть гораздо более простые способы достичь желаемого?» Я не знал, что [ROOT.Char.GetPrimarySpouse.GetSheHe] подслушива[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')], но, конечно, должен был догадаться, что вклад [ROOT.Char.GetPrimarySpouse.GetHerHis] будет неоценим, и вскоре был составлен новый план, и все согласились, что он весьма неплох. Хотя и довольно мрачен. Я испытываю облегчение.\n\nПолагаю, преимущество иметь [ROOT.Char.GetPrimarySpouse.GetWifeHusband], чьё мастерство в интригах не уступает моему." 
 lmf_spouse.1125.desc.celibate:0 "Безбрачие — нелёгкая вещь.\n\nК счастью, мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] присоединил[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] ко мне в этом обете. У нас нет ожиданий друг от друга, и вместе мы можем поддерживать друг друга в минуты слабости, когда дело касается плотских желаний. Мы выше этого, кажется, даже если это трудно понять многим другим супружеским парам."
 lmf_spouse.1125.desc.learning:0 "В последнее время я читаю довольно сложный том древнего философа, чьи мысли были почти так же сложны, как и его стиль письма. От этого голова болит, и мне трудно понять его полностью... хотя я очень этого хочу.\n\nТогда просто обратиться за советом к мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'ему')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]. «Ах да, кажется, я это чита[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')]», — кивает [ROOT.Char.GetPrimarySpouse.GetSheHe] и с радостью объясняет это так, что всё вдруг становится очевидным. Я так рад[Select_CString(ROOT.Char.IsFemale, 'а', '')], что готов[Select_CString(ROOT.Char.IsFemale, 'а', '')] расцеловать [ROOT.Char.GetPrimarySpouse.GetHerHim]!\n\nПобочное преимущество, полагаю, иметь [ROOT.Char.GetPrimarySpouse.GetWifeHusband], столь же образованн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ую', 'ого')], как и я."
 lmf_spouse.1125.desc.family:0 "Мы с мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] засиделись допоздна, обсуждая довольно деликатные семейные дела.\n\nРешить их непросто, и никто из нас не хочет уступать свою позицию. Однако я понимаю, что в этом разногласии есть и лёгкость... никто из нас не расстраивается и не принимает это на свой счёт, потому что мы оба хотим одного и того же. Мы ставим семью на первое место. Я смотрю в глаза [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip], и когда [ROOT.Char.GetPrimarySpouse.GetSheHe] улыбается в ответ, я вижу, что это правда.\n\nЕсли я — [ROOT.Char.Custom('MatriarchPatriarch')] нашей семьи, то [ROOT.Char.GetPrimarySpouse.GetSheHe] — её [ROOT.Char.GetPrimarySpouse.Custom('MatriarchPatriarch')], и так оно есть и должно быть."
 lmf_spouse.1125.desc.sadistic:0 "Я в темнице [ROOT.Char.Custom('FortifiedBuilding')], допрашиваю довольно уклончивого разбойника, которого наконец поймала моя стража. Мне нужна от него информация о его сообщниках, но он уже трижды плюнул мне в лицо... так что, признаюсь, у меня есть соблазн просто заставить его заплатить.\n\n«Ты позволишь этому простаку так тебя не уважать, дорог[Select_CString(ROOT.Char.IsFemale, 'ая', 'ой')] [ROOT.Char.GetWifeHusband]?» — внезапно произносит мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband], появляясь рядом со мной. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] озорно подмигивает мне, переводя взгляд [ROOT.Char.GetPrimarySpouse.GetHerHis] обратно на разбойника. «Потому что я могу придумать несколько способов заставить его говорить #EMP и#! заплатить».\n\nАх, иметь [ROOT.Char.GetPrimarySpouse.GetWifeHusband], чьи интересы так совпадают с моими."
 lmf_spouse.1125.desc.lunatic:0 "Поздно. Темно.\n\nЯ в... одном из коридоров [ROOT.Char.Custom('FortifiedBuilding')]? И у меня кровь на руках?\n\nМои мысли мечутся. #EMP Что я наделал[Select_CString(ROOT.Char.IsFemale, 'а', '')]?#! Это снова случилось, да?\n\nЗатем я слышу смешок позади. Я оборачиваюсь, но это мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ухмыляется мне. В глазах [ROOT.Char.GetPrimarySpouse.GetHerHis] пляшут искорки, когда она говорит: «Веселишься без меня, дорог[Select_CString(ROOT.Char.IsFemale, 'ая', 'ой')] [ROOT.Char.GetWifeHusband]? Что ж, давай приведём тебя в порядок?» Вскоре я уже в ванне, и [ROOT.Char.GetPrimarySpouse.GetSheHe] сделал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] так, что мне снова стало лучше.\n\n[ROOT.Char.GetPrimarySpouse.GetSheHe] так добр[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] ко мне. Надеюсь, однажды ночью я смогу сделать то же самое для [ROOT.Char.GetPrimarySpouse.GetHerHim]."
 lmf_spouse.1125.a:0 "Вот так браки и выживают."
 
 lmf_spouse.1130.t:0 "Наши различия"
 lmf_spouse.1130.desc:0 "Эта неделя не была хорошей для нас с мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband].\n\nЧестно говоря, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] не нужно много, чтобы начать спор, даже в лучшие времена. Мы очень разные, и ничто так не раздражает [ROOT.Char.GetPrimarySpouse.GetHerHim], как общее мнение, что она довольно [their_trait.GetNameNoTooltip( ROOT.Char )|l], тогда как я скорее [my_trait.GetNameNoTooltip( ROOT.Char )|l]... несмотря на то, что это в основном правда.\n\nВ данном случае мы просто всю неделю действовали друг другу на нервы. Я отменил несколько приказов [ROOT.Char.GetPrimarySpouse.GetHerHis] слугам [ROOT.Char.Custom('FortifiedBuilding')], а [ROOT.Char.GetPrimarySpouse.GetSheHe] проводил[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] время при дворе, заметно хмурясь и закатывая глаза на каждое моё заявление. Каждый раз, сталкиваясь в коридорах, мы сражались, поэтому старались делать это как можно реже.\n\nЭто никогда не легко."
 lmf_spouse.1130.a:0 "#EMP Вздох.#!"
 
 lmf_spouse.1135.t:0 "На показ"
 lmf_spouse.1135.desc.start:0 "Всё началось с холодного молчания.\n\nПока я говорил[Select_CString(ROOT.Char.IsFemale, 'а', '')] со своими советниками, мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] сиде[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] за столом, сверля меня взглядом и скрестив руки. Я не собирал[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] спрашивать, в чём дело, не при других, поэтому игнорировал[Select_CString(ROOT.Char.IsFemale, 'а', '')] [ROOT.Char.GetPrimarySpouse.GetHerHim]. Это, конечно, только ухудшило ситуацию.\n\nПосле двадцати минут кипения в [ROOT.Char.GetPrimarySpouse.GetHerHis] ярости [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] внезапно разразил[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] критикой в мой адрес — прервав заседание — и всё это не имело никакого отношения к делам совета. Я огрызнул[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] в ответ, и вскоре мы уже кричали друг на друга, а другие советники ёрзали на своих местах в неловкости, наблюдая за этим представлением. Наконец, мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] вста[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] и выш[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'ел')] из зала.\n\n"
 lmf_spouse.1135.desc.unfaithful:0 "Без сомнения, [ROOT.Char.GetPrimarySpouse.GetSheHe] всё ещё злится из-за моей неверности, даже если отказывается это признать. "
 lmf_spouse.1135.desc.revenge:0 "Без сомнения, [ROOT.Char.GetPrimarySpouse.GetSheHe] всё ещё в ярости на меня и жаждет мести, даже если отказывается называть это так. "
 lmf_spouse.1135.desc.rival:0 "В этом нет ничего нового, конечно. На данном этапе наших отношений [ROOT.Char.GetPrimarySpouse.GetSheHe] и меня можно считать врагами. "
 lmf_spouse.1135.desc.hate:0 "После стольких лет, думаю, я могу с уверенностью сказать, что [ROOT.Char.GetPrimarySpouse.GetSheHe] меня ненавидит. Возможно, я не могу винить [ROOT.Char.GetPrimarySpouse.GetHerHim]. "
 lmf_spouse.1135.desc.friend:0 "Это совсем не похоже на [ROOT.Char.GetPrimarySpouse.GetHerHim], обычно мы с ним[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', '')] друзья. Полагаю, даже друзьям иногда приходится ссориться. "
 lmf_spouse.1135.desc.lover:0 "Я знаю, это не значит, что [ROOT.Char.GetPrimarySpouse.GetSheHe] меня не любит, как и я люблю [ROOT.Char.GetPrimarySpouse.GetHerHim]. Это не значит, что мы не будем иногда ссориться, хоть это и больно. "
 lmf_spouse.1135.desc.soulmate:0 "Я знаю, что [ROOT.Char.GetPrimarySpouse.GetSheHe] — моя родственная душа, а я — [ROOT.Char.GetPrimarySpouse.GetHersHis]... но в такой день, как сегодня, об этом трудно помнить. "
 lmf_spouse.1135.desc.like:0 "Я немного удивлён[Select_CString(ROOT.Char.IsFemale, 'а', '')], честно говоря. Мне казалось, мы начинаем довольно хорошо ладить. "
 lmf_spouse.1135.desc.end:0 "С тех пор я избега[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], но, полагаю, в конце концов придётся повидать [ROOT.Char.GetPrimarySpouse.GetHerHim] и попытаться всё уладить."
 lmf_spouse.1135.a:0 "Если [ROOT.Char.GetPrimarySpouse.GetSheHe] позволит мне, конечно."
 
 lmf_spouse.1140.t:0 "Радушный приём"
 lmf_spouse.1140.desc.start:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] жда[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] меня во дворе [ROOT.Char.Custom('FortifiedBuilding')] по моём возвращении из короткой поездки в городок недалеко от [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. "
 lmf_spouse.1140.desc.ruler:0 "Сюрприз, ведь я дума[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что [ROOT.Char.GetPrimarySpouse.GetSheHe] всё ещё в [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_spouse.1140.desc.default:0 "Сюрприз, ведь обычно [ROOT.Char.GetPrimarySpouse.GetSheHe] так не делает.\n\n"
 lmf_spouse.1140.desc.unfaithful:0 "Я напряг[Select_CString(ROOT.Char.IsFemale, 'лась', 'ся')], ожидая очередного холодного приёма... как и все после того, как [ROOT.Char.GetPrimarySpouse.GetSheHe] узна[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] о моей неверности. Но нет, вместо этого она "
 lmf_spouse.1140.desc.revenge:0 "Я напряг[Select_CString(ROOT.Char.IsFemale, 'лась', 'ся')], гадая, не будет ли это очередной демонстрацией гнева по отношению ко мне. Желание мести у [ROOT.Char.GetPrimarySpouse.GetHerHis|U] всё ещё сохраняется, в конце концов. Но нет, вместо этого она "
 lmf_spouse.1140.desc.rival:0 "Я напряг[Select_CString(ROOT.Char.IsFemale, 'лась', 'ся')], слишком уставш[Select_CString(ROOT.Char.IsFemale, 'ая', 'ий')] для очередного раунда колкостей и презрительных взглядов. Я хоте[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] в постель, а не к сопернику. Но нет, вместо этого она "
 lmf_spouse.1140.desc.hate:0 "Я напряг[Select_CString(ROOT.Char.IsFemale, 'лась', 'ся')], представляя очередной холодный приём от [ROOT.Char.GetPrimarySpouse.GetWomanMan], который[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ый')], как я зна[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], мало заботи[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'лась', 'лся')] обо мне. Но нет, вместо этого она "
 lmf_spouse.1140.desc.friend:0 "Я улыбнул[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')], радуясь видеть [ROOT.Char.GetPrimarySpouse.GetWomanMan], котор[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ую', 'ого')] я считал[Select_CString(ROOT.Char.IsFemale, 'а', '')] другом, даже если мы не всегда сходились во взглядах. Она "
 lmf_spouse.1140.desc.lover:0 "Я улыбнул[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')], радуясь видеть [ROOT.Char.GetPrimarySpouse.GetWomanMan], котор[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ую', 'ого')] я так сильно люби[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')]. Если бы кажд[Select_CString(ROOT.Char.IsFemale, 'ая', 'ый')] [ROOT.Char.GetWifeHusband] был[Select_CString(ROOT.Char.IsFemale, 'а', '')] так же удачлив[Select_CString(ROOT.Char.IsFemale, 'а', '')], как я! Она "
 lmf_spouse.1140.desc.soulmate:0 "Я улыбнул[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')], радуясь видеть [ROOT.Char.GetPrimarySpouse.GetWomanMan], котор[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ую', 'ого')] я считал[Select_CString(ROOT.Char.IsFemale, 'а', '')] родственной душой, моей противоположностью и равной мне. Она "
 lmf_spouse.1140.desc.like:0 "Я останови[Select_CString(ROOT.Char.IsFemale, 'лась', 'лся')], гадая, какого приёма ожидать. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] часто кажется равнодушн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ой', 'ым')] к моему присутствию, иногда даже холодн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ой', 'ым')]. Однако сегодня она "
 lmf_spouse.1140.desc.end:0 "кивну[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] мне и веле[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] слугам забрать мой дорожный плащ. «Рада видеть твоё возвращение, [ROOT.Char.GetPrimarySpouse.Custom2('spoken_address_by_familiarity', ROOT.Char )]».\n\n«Я что, так надолго уезжал?» — пошути[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] я.\n\n«Достаточно, чтобы скучать». [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] проводи[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] меня обратно в замок, и мы пошли лёгкой походкой, пока она рассказывала о событиях дня. "
 lmf_spouse.1140.desc.end.poor:0 "Это было приятно, в кои-то веки. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] был[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] тепл[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')], и я пойма[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] себя на мысли, что хотел[Select_CString(ROOT.Char.IsFemale, 'а', '')] бы, чтобы так было чаще."
 lmf_spouse.1140.desc.end.good:0 "Было хорошо, как обычно. Я благословляю судьбу за то, что [ROOT.Char.GetPrimarySpouse.GetSheHe] рядом со мной, как всегда."
 lmf_spouse.1140.a:0 "Интересно, каковы шансы?"
 lmf_spouse.1140.b:0 "Что я буду делать, если когда-нибудь потеряю [ROOT.Char.GetPrimarySpouse.GetHerHim]?"
 
 lmf_spouse.1145.t:0 "Наш общий друг"
 lmf_spouse.1145.desc.start:0 "Когда я услыша[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('mutual_friend'))] проводят время вместе, я не знал[Select_CString(ROOT.Char.IsFemale, 'а', '')], что и думать. Я знал, что они в дружеских отношениях, конечно, так же как и мы с [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('mutual_friend'))], но не мог представить, чем они занимаются.\n\nЛишь позже я узна[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что "
 lmf_spouse.1145.desc.relation:0 "мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('mutual_friend'))] "
 lmf_spouse.1145.desc.norelation:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('mutual_friend'))] "
 lmf_spouse.1145.desc.mid:0 "всё это время расхваливал[Select_CString(mutual_friend.IsFemale, 'а', '')] меня перед [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip].\n\nЗачем? Думаю, [mutual_friend.GetSheHe] счита[Select_CString(mutual_friend.IsFemale, 'ет', 'ет')], что "
 lmf_spouse.1145.desc.rival:0 "мы с мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] должны помириться, и нашей взаимной вражде пора положить конец.\n\n"
 lmf_spouse.1145.desc.revenge:0 "мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] должен простить меня, полагаю. [mutual_friend.GetSheHe|U] уже говорил[Select_CString(mutual_friend.IsFemale, 'а', '')] об этом раньше.\n\n"
 lmf_spouse.1145.desc.hate:0 "неприязнь [ROOT.Char.GetPrimarySpouse.GetHerHis] ко мне только всё усложняет, полагаю. [mutual_friend.GetSheHe|U] уже говорил[Select_CString(mutual_friend.IsFemale, 'а', '')] об этом раньше.\n\n"
 lmf_spouse.1145.desc.like:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe] долж[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'на', 'ен')] попытаться узнать меня получше. Мы в достаточно хороших отношениях, в конце концов, если и не друзья. Хотя не многие мужья и жёны таковы, не так ли?\n\n"
 lmf_spouse.1145.desc.neutral:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe] долж[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'на', 'ен')] преодолеть свою двойственность и дать мне шанс, полагаю.\n\n"
 lmf_spouse.1145.desc.end:0 "Чего я не мог представить, так это того, что [mutual_friend.GetSheHe] добьётся успеха. Что бы [mutual_friend.GetSheHe] ни сказа[Select_CString(mutual_friend.IsFemale, 'ла', 'л')], отношение [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip] заметно изменилось за последние несколько недель. Посмотрим, выйдет ли из этого что-нибудь."
 lmf_spouse.1145.a:0 "Приятная перемена."
 talked_up_by_friend:0 "Отношение [TARGET_CHARACTER.GetShortUINamePossessiveNoFormat|U] к [CHARACTER.GetShortUINameNoFormat] значительно улучшилось после разговора с общим другом."
 talked_up_by_friend_corresponding:0 "Отношение [CHARACTER.GetShortUINamePossessiveNoFormat|U] к [TARGET_CHARACTER.GetShortUINameNoFormat] значительно улучшилось после разговора с общим другом."
 
 lmf_spouse.1150.t:0 "Взятие работы на себя"
 lmf_spouse.1150.desc.start:0 "Признаю: в последнее время я нахожусь в стрессе. И ясно, что мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] это замети[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')]. В последнее время [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] изо всех сил старается облегчить мою жизнь.\n\n"
 lmf_spouse.1150.diligent:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] опрашивает приходящих ко двору, чтобы незначительные вопросы решал кто-то рангом пониже. [ROOT.Char.GetPrimarySpouse.GetSheHe] разговаривает со слугами, успокаивая их тревоги и объясняя мои указания, когда я был[Select_CString(ROOT.Char.IsFemale, 'а', '')] слишком краток. [ROOT.Char.GetPrimarySpouse.GetSheHe] не даёт советникам беспокоить меня ничем, кроме самых важных дел.\n\n"
 lmf_spouse.1150.dominant:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] появил[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] однажды вечером в дверях моего кабинета, пристально посмотре[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] на меня и сказал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')]: «Ну всё, хватит».\n\n«Что ты имеешь в виду?» — спроси[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] я, встревоженн[Select_CString(ROOT.Char.IsFemale, 'ая', 'ый')].\n\n«Тебе нужно делегировать, дорог[Select_CString(ROOT.Char.IsFemale, 'ая', 'ой')] [ROOT.Char.GetWifeHusband], и начать ты можешь с делегирования мне. Позволь мне взять на себя часть твоего бремени, здесь, в [ROOT.Char.Custom('FortifiedBuilding')] и при дворе». Затем, не дожидаясь моего согласия, [ROOT.Char.GetPrimarySpouse.GetSheHe] именно это и сделал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')].\n\n"
 lmf_spouse.1150.compassionate:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] появил[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] однажды вечером в дверях моего кабинета, посмотре[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] на меня с жалостью и сказал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')]: «Ты не можешь так продолжать, [ROOT.Char.GetWifeHusband]».\n\n«Какой у меня выбор?»\n\n«Ты можешь делегировать. Мне, например. Я могла бы многое с тебя снять, и я готова это сделать». Хотя я и сопротивлял[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')], пришлось признать, что [ROOT.Char.GetPrimarySpouse.GetSheHe] прав[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')]... так [ROOT.Char.GetPrimarySpouse.GetSheHe] и сделал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')].\n\n"
 lmf_spouse.1150.desc.end:0 "Не сомневаюсь, что [ROOT.Char.GetPrimarySpouse.GetSheHe] делает гораздо больше, о чём я не знаю, и всё для того, чтобы уменьшить мой стресс... за счёт своего собственного, конечно."
 lmf_spouse.1150.a:0 "Я очень благодарен."
 
 lmf_spouse.1155.t:0 "На пределе"
 lmf_spouse.1155.desc.start:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'ему')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] в последнее время трудно даётся выполнение своих придворных обязанностей.\n\n"
 lmf_spouse.1155.submissive:0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] никогда не был[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] очень напорист[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ой', 'ым')], и, насколько я понимаю, [ROOT.Char.GetPrimarySpouse.GetSheHe] позволяет слишком многим придворным садиться [ROOT.Char.GetPrimarySpouse.GetHerHim] на шею, злоупотребляя [ROOT.Char.GetPrimarySpouse.GetHerHis] добротой и уклоняясь от слишком многих задач... которые [ROOT.Char.GetPrimarySpouse.GetSheHe], конечно же, вынужден[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] выполнять сам[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')].\n\n"
 lmf_spouse.1155.introvert:0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] никогда не был[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] общительн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ой', 'ым')] существом. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] гораздо счастливее в одиночестве, уткнувшись носом в книгу. Однако жизнь в качестве [ROOT.Char.GetPrimarySpouse.GetLadyLord] [ROOT.Char.Custom('FortifiedBuilding')] требует от [ROOT.Char.GetPrimarySpouse.GetHerHim] активного общения как с придворными, так и с знатью, с ожидаемой грацией и апломбом, которые [ROOT.Char.GetPrimarySpouse.GetSheHe], честно говоря, трудно изобразить.\n\n"
 lmf_spouse.1155.lazy:0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] никогда не был[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] особенно энергичн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ой', 'ым')]. Некоторые могут назвать [ROOT.Char.GetPrimarySpouse.GetHerHim] #EMP ленив[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ой', 'ым')]#!, но по правде говоря, [ROOT.Char.GetPrimarySpouse.GetSheHe] предпоч[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'ёл')] бы жизнь в праздности и роскоши... тогда как требования двора обязывают [ROOT.Char.GetPrimarySpouse.GetHerHim] быть постоянно активн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ой', 'ым')]. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] ведь [ROOT.Char.GetPrimarySpouse.GetLadyLord] [ROOT.Char.Custom('FortifiedBuilding')], и дел невпроворот.\n\n"
 lmf_spouse.1155.desc.end:0 "В результате мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] находится в сильном стрессе. Я мог бы вмешаться и облегчить [ROOT.Char.GetPrimarySpouse.GetHerHim] жизнь, но у меня у самого есть обязанности."
 lmf_spouse.1155.a:0 "Конечно, я помогу [ROOT.Char.GetPrimarySpouse.GetHerHim]!"
 lmf_spouse.1155.b:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] долж[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'на', 'ен')] справиться с этим сам[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')]."
 
 lmf_spouse.1160.t:0 "Бедственное положение [ROOT.Char.GetPrimarySpouse.GetTitleAsNameNoTooltip|U]"
 lmf_spouse.1160.desc.start:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'ему')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] в последнее время приходится нелегко.\n\n[ROOT.Char.GetPrimarySpouse.GetSheHe|U] управляет хозяйством в [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], помимо [ROOT.Char.GetPrimarySpouse.GetHerHis] обязанностей при моём дворе, и в последнее время, кажется, одна проблема следует за другой. «Такое чувство, будто [ROOT.Char.GetPrimarySpouse.GetFaith.HighGodName] решил завалить меня неприятностями!» — воскликну[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] [ROOT.Char.GetPrimarySpouse.GetSheHe].\n\n«Я могу чем-то помочь?» — предложи[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] я.\n\n"
 lmf_spouse.1160.rival:0 "«Помочь? Ты?» — фыркнул[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] [ROOT.Char.GetPrimarySpouse.GetSheHe]. «Скорее подавлюсь».\n\n"
 lmf_spouse.1160.dominant:0 "«Я справлюсь с этим сам[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')]», — решительно [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe].\n\n"
 lmf_spouse.1160.levelheaded:0 "«Это не может длиться вечно, дорог[Select_CString(ROOT.Char.IsFemale, 'ая', 'ой')] [ROOT.Char.GetWifeHusband]», — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe], глубоко вздохнув. «Скоро пройдёт».\n\n"
 lmf_spouse.1160.malicious:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] задумал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')]. «Нет», — наконец [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe]. «Я найду смутьянов и заставлю их пожалеть. Вот увидишь».\n\n"
 lmf_spouse.1160.benevolent:0 "«Мило, что ты предлагаешь», — вздохнул[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] [ROOT.Char.GetPrimarySpouse.GetSheHe], «но я не хочу добавлять тебе забот. Я справлюсь, как смогу».\n\n"
 lmf_spouse.1160.diligent:0 "«Это мой долг», — твёрдо [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe], «и только мой. Я поступлю, как и подобает любому [ROOT.Char.GetPrimarySpouse.GetTitleAsNameNoTooltip|l]».\n\n"
 lmf_spouse.1160.default:0 "Я виде[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что [ROOT.Char.GetPrimarySpouse.GetSheHe] серьёзно обдумывает это. «Нет», — наконец [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe] с ноткой сожаления. «Я продолжу пытаться».\n\n"
 lmf_spouse.1160.desc.end:0 "Вот так. Похоже, какой бы стресс это ни вызывало у [ROOT.Char.GetPrimarySpouse.GetHerHim], [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] намерен[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] продолжать в том же духе."
 lmf_spouse.1160.a:0 "Неужели это #EMP настолько#! трудно?"
 
 lmf_spouse.1165.t:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] апатичн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ый')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U]"
 lmf_spouse.1165.desc:0 "Нельзя сказать, что мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'ему')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] нечем заняться... [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] #EMP всё же#! [ROOT.Char.GetPrimarySpouse.GetLadyLord] [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Однако в последнее время я замеча[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] [ROOT.Char.GetPrimarySpouse.GetHerHim] бродящ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'им')] по коридорам и садам, вздыхающ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'им')] от, казалось бы, скуки.\n\n«Мне нужно чем-то #EMP заняться#!», — наконец пожалова[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'лась', 'лся')] [ROOT.Char.GetPrimarySpouse.GetSheHe] мне. «Я никому не наставник, у меня нет настоящей должности, и у меня нет роли при твоём дворе, кроме как быть тво[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]».\n\n«Разве этого недостаточно?»\n\nУничтожающий взгляд, который я получи[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] в ответ, говорил, что нет. По крайней мере, для [ROOT.Char.GetPrimarySpouse.GetHerHim]. Очевидно, [ROOT.Char.GetPrimarySpouse.GetSheHe] хоте[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] совета."
 lmf_spouse.1165.a:0 "«Возможно, всё, что тебе нужно, — это новый друг»."
 lmf_spouse.1165.b:0 "«Есть навыки, которые ты могла бы отточить на будущее?»"
 lmf_spouse.1165.c:0 "«Полагаю, мы могли бы проводить больше времени вместе...»"
 spent_more_time_together:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] улучшили свои супружеские отношения, проводя больше времени вместе."
 spent_more_time_together_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [CHARACTER.GetShortUINameNoTooltipNoFormat] улучшили свои супружеские отношения, проводя больше времени вместе."
 lmf_spouse.1165.d:0 "«Уверен[Select_CString(ROOT.Char.IsFemale, 'а', '')], ты разберёшься»."
 lmf_spouse.1165.e:0 "«А что, если я назначу тебя своим [ROOT.Char.GetPrimarySpouse.Custom('GetTargetCourtPosition')]?»"
 spurned_spouse_request_for_advice:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] разозлил[Select_CString(CHARACTER.IsFemale, 'а', '')] [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat], отвергнув [CharYourHerHis(TARGET_CHARACTER)] просьбу о совете."
 spurned_spouse_request_for_advice_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] разозлил[Select_CString(TARGET_CHARACTER.IsFemale, 'а', '')] [CHARACTER.GetShortUINameNoTooltipNoFormat], отвергнув [CharYourHerHis(CHARACTER)] просьбу о совете."
 
 lmf_spouse.1170.t:0 "Воспитание [ROOT.Char.GetPrimarySpouse.GetHerHis|U] [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('ward'))|U]"
 lmf_spouse.1170.desc.start:0 "Сегодня мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] приш[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'ёл')] в тронный зал с решительным выражением лица и простой просьбой.\n\n"
 lmf_spouse.1170.desc.ruler:0 "«Я хочу, чтобы [ward.GetFirstNameNoTooltip] приеха[Select_CString(ward.IsFemale, 'ла', 'л')] в [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] и стал[Select_CString(ward.IsFemale, 'а', '')] мо[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'им')] воспитанни[Select_CString(ward.IsFemale, 'цей', 'ком')]».\n\n"
 lmf_spouse.1170.desc.courtier:0 "«Я хочу, чтобы [ward.GetFirstNameNoTooltip] был[Select_CString(ward.IsFemale, 'а', '')] мо[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'им')] воспитанни[Select_CString(ward.IsFemale, 'цей', 'ком')]».\n\n"
 lmf_spouse.1170.desc.hasguardian:0 "«У [ward.GetFirstNameNoTooltip] уже есть воспитатель», — сказа[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] я. «Что не так с [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('spouse_ward_guardian'))]?»\n\n"
 lmf_spouse.1170.desc.rival:0 "«Ты прекрасно знаешь, что не так. Я ненавижу [ROOT.Char.GetPrimarySpouse.Custom2('direct_address_by_familiarity', SCOPE.sC('spouse_ward_guardian'))]. [ward.GetFirstNameNoTooltip] — мо[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('ward'))], и [ward.GetSheHe] будет гораздо лучше со #EMP мной#!».\n\n"
 lmf_spouse.1170.desc.skill:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] пренебрежительно махну[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] рукой. «Я по крайней мере не худш[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ий')] наставни[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ца', 'к')], чем [ROOT.Char.GetPrimarySpouse.Custom2('direct_address_by_familiarity', SCOPE.sC('spouse_ward_guardian'))]. Суть в том, что [ward.GetFirstNameNoTooltip] — мо[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('ward'))], и [ward.GetSheHe] будет гораздо лучше со мной».\n\n"
 lmf_spouse.1170.desc.noguardian:0 "Я обдумал[Select_CString(ROOT.Char.IsFemale, 'а', '')] этот вопрос. «Полагаю, у [ward.GetFirstNameNoTooltip] сейчас нет воспитателя...»\n\n«Тогда кто лучше меня воспитает [ward.GetHerHim]? [ward.GetSheHe|U] — мо[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('ward'))], и это лучший способ для меня проводить с [ward.GetHerHim] время».\n\n"
 lmf_spouse.1170.desc.end:0 "Я виде[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] не собирается это так оставлять."
 lmf_spouse.1170.a:0 "Хорошо. Можешь стать воспитателем [ward.GetFirstNamePossessiveNoTooltip]."
 lmf_spouse.1170.b:0 "Нет. Всё останется как есть."
 
 lmf_spouse.1175.t:0 "Неодобрение мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U]"
 lmf_spouse.1175.desc.start:0 "С тех пор как я позволил[Select_CString(ROOT.Char.IsFemale, 'а', '')] [focus_child.GetFirstNameNoTooltip] начать обучение настоящему фехтованию, мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] относится к этому с явным неодобрением. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] ходит в оружейную смотреть, вздрагивая каждый раз, когда [focus_child.GetFirstNameNoTooltip] получает удар или падает на землю, хотя [focus_child.GetFirstNameNoTooltip] ничуть не возражает.\n\n"
 lmf_spouse.1175.desc.religion:0 "«Это #EMP неприлично#!, чтобы девочка с благочестивым воспитанием играла с мечами!» — наконец сказа[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] она мне.\n\n"
 lmf_spouse.1175.desc.paranoid:0 "«Что #EMP подумают#! люди?» — сказа[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] она позже, когда мы были одни. «И что они скажут о тебе? И обо #EMP мне#!, что мы такое позволяем?!»\n\n"
 lmf_spouse.1175.desc.dominant:0 "«Я запрещаю это», — сказа[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] она мне позже с решительным видом. «И что ты сделаешь? Пошлёшь [focus_child.GetFirstNameNoTooltip] в #EMP бой#!? Ни в коем случае».\n\n"
 lmf_spouse.1175.desc.end:0 "«Решение уже принято», — вздохнул[Select_CString(ROOT.Char.IsFemale, 'а', '')] я.\n\n«Тогда #EMP отмени#! его!»"
 lmf_spouse.1175.a:0 "«Хорошо, я сделаю, как ты требуешь»."
 stopped_my_swordsmanship_education:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] запретил[Select_CString(CHARACTER.IsFemale, 'а', '')] [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] продолжать обучение фехтованию."
 stopped_my_swordsmanship_education_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] запретил[Select_CString(TARGET_CHARACTER.IsFemale, 'а', '')] [CHARACTER.GetShortUINameNoTooltipNoFormat] продолжать обучение фехтованию."
 lmf_spouse.1175.b:0 "«Нет, обучение [focus_child.GetFirstNamePossessiveNoTooltip] продолжится, как и раньше»."
 
 lmf_spouse.1180.t:0 "Материнская гордость"
 lmf_spouse.1180.desc.start:0 "«[focus_child.GetFirstNameNoTooltip] следует разрешить начать обучение настоящему фехтованию», — сообщила мне сегодня вечером моя жена. «Она и так уже практически этим занимается, нравится нам это или нет».\n\nЯ был[Select_CString(ROOT.Char.IsFemale, 'а', '')] ошеломлен[Select_CString(ROOT.Char.IsFemale, 'а', '')]. «И что? Ты хочешь, чтобы я послал [focus_child.GetFirstNameNoTooltip] на войну? Как #EMP [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]#!?!»"
 lmf_spouse.1180.desc.knight:0 "«А почему нет?» — взгляд, которым [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] на меня посмотре[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')], был опасен. «Ты же посылал #EMP меня#!».\n\n"
 lmf_spouse.1180.desc.cynic:0 "«А почему нет?» — с насмешкой выплюну[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip]. «Потому что она милая и набожная маленькая девочка?»\n\n"
 lmf_spouse.1180.desc.just:0 "«Это правильно, если [focus_child.GetFirstNameNoTooltip] того желает», — пожала она плечами, «а она желает».\n\n"
 lmf_spouse.1180.desc.compassion:0 "«Ты бы отказал ей в праве следовать своему призванию? Если это то, чего она действительно желает?» Она выглядела неуверенной, но наконец покачала головой. «Я не могла бы».\n\n"
 lmf_spouse.1180.desc.end:0 "Мы обсуждали это какое-то время, но я виде[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] не собирается отступать, пока не будет принято решение."
 lmf_spouse.1180.a:0 "Хорошо, мы сделаем, как ты хочешь."
 lmf_spouse.1180.b:0 "Нет, и это конец разговора."
 
 lmf_spouse.1185.t:0 "[ROOT.Char.GetPrimarySpouse.GetMotherFather|U] и [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))|U]"
 lmf_spouse.1185.desc.start:0 "Я услыша[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] крики за несколько комнат. Пронзительные вопли, затем хлопанье дверьми, и наконец мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ворва[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'лась', 'лся')] в комнату, где я находи[Select_CString(ROOT.Char.IsFemale, 'лась', 'лся')], с красными от ярости и разочарования щеками. «Этот... этот #EMP ребёнок#! сведёт меня в могилу!» — заяви[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] [ROOT.Char.GetPrimarySpouse.GetSheHe].\n\nНаконец, успокоив [ROOT.Char.GetPrimarySpouse.GetHerHim], я узна[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что ссора произошла между [ROOT.Char.GetPrimarySpouse.GetHerHim] и наш[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [focus_child.Custom('GetDaughterSon')], [focus_child.GetFirstNameNoTooltip]. "
 lmf_spouse.1185.desc.rowdy:0 "Очевидно, [focus_child.GetFirstNameNoTooltip] [Select_CString(focus_child.IsFemale, 'была', 'был')] в своём обычном буйном настроении и опрокинул[Select_CString(focus_child.IsFemale, 'а', '')] вазу, за что [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] отчита[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] [focus_child.GetHerHim].\n\n"
 lmf_spouse.1185.desc.bossy:0 "Очевидно, [focus_child.GetFirstNameNoTooltip] [Select_CString(focus_child.IsFemale, 'была', 'был')] в своём обычном властном настроении, командуя всеми... и сегодня в это число попал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] и [focus_child.GetHerHis] [ROOT.Char.GetPrimarySpouse.GetMotherFather].\n\n"
 lmf_spouse.1185.desc.wrathful:0 "У [focus_child.GetFirstNamePossessiveNoTooltip] нрав не из лучших в принципе, а сейчас, видимо, [focus_child.GetSheHe] особенно раздражите[Select_CString(focus_child.IsFemale, 'льна', 'лен')] и взорвал[Select_CString(focus_child.IsFemale, 'ась', 'ся')] на [focus_child.GetHerHis] [ROOT.Char.GetPrimarySpouse.GetMotherFather] из-за пустяка.\n\n"
 lmf_spouse.1185.desc.arrogant:0 "Очевидно, [focus_child.GetFirstNameNoTooltip] сказа[Select_CString(focus_child.IsFemale, 'ла', 'л')] что-то довольно недоброе об одном из слуг [ROOT.Char.Custom('FortifiedBuilding')], и [focus_child.GetHerHis] [ROOT.Char.GetPrimarySpouse.GetMotherFather] призвал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] [focus_child.GetHerHim] к ответу за высокомерие.\n\n"
 lmf_spouse.1185.desc.paranoia:0 "Очевидно, паранойя [focus_child.GetFirstNamePossessiveNoTooltip] проявилась сегодня во всей красе. [focus_child.GetSheHe|U] волновал[Select_CString(focus_child.IsFemale, 'ась', 'ся')] и жаловал[Select_CString(focus_child.IsFemale, 'ась', 'ся')] без конца, пока наконец [focus_child.GetHerHis] [ROOT.Char.GetPrimarySpouse.GetMotherFather] не веле[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] [focus_child.GetHerHim] успокоиться.\n\n"
 lmf_spouse.1185.desc.stubborn:0 "Очевидно, упрямство [focus_child.GetFirstNamePossessiveNoTooltip] проявилось сегодня во всей красе, так как [focus_child.GetHerHis] [ROOT.Char.GetPrimarySpouse.GetMotherFather] не мог[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', '')] заставить [focus_child.GetHerHim] выполнить задание, несмотря на неоднократные попытки и большое терпение.\n\n"
 lmf_spouse.1185.desc.impatient:0 "Очевидно, нетерпение [focus_child.GetFirstNamePossessiveNoTooltip] проявилось сегодня во всей красе, так как [focus_child.GetSheHe] требова[Select_CString(focus_child.IsFemale, 'ла', 'л')] достаточно денег, чтобы купить безделушку, которую [focus_child.GetSheHe] виде[Select_CString(focus_child.IsFemale, 'ла', 'л')] на днях... требование, в котором [focus_child.GetHerHis] [ROOT.Char.GetPrimarySpouse.GetMotherFather] справедливо отказа[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')].\n\n"
 lmf_spouse.1185.desc.callous:0 "Очевидно, [focus_child.GetFirstNameNoTooltip] сделал[Select_CString(focus_child.IsFemale, 'а', '')] довольно бессердечное замечание в адрес [focus_child.GetHerHis] [ROOT.Char.GetPrimarySpouse.GetMotherFather]... замечание, которое [ROOT.Char.GetPrimarySpouse.GetSheHe] одновременно поразило и задело.\n\n"
 lmf_spouse.1185.desc.potential:0 "С чего началась ссора — неважно, поскольку это назревало между ними уже довольно давно. Достаточно сказать, что были сказаны слова.\n\n"
 lmf_spouse.1185.desc.rival:0 "С чего началась ссора — неважно, поскольку [ROOT.Char.GetPrimarySpouse.GetMotherFather] и [focus_child.Custom('GetDaughterSon')] уже некоторое время вцепляются друг другу в глотку. Возможно, они не так посмотрели друг на друга, возможно, были сказаны слова.\n\n"
 lmf_spouse.1185.desc.end:0 "Это привело к грандиозной ссоре, в которой всплыли обиды — реальные и мнимые — удивившие даже [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip]. «Честно говоря, я не знаю, что на [focus_child.GetHerHim] нашло».\n\nЯ знаю, что это свойственно молодым [focus_child.GetWomenMen] в возрасте [focus_child.GetHerHis], но, сомневаюсь, что сейчас подходящее время говорить об этом мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'ему')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]."
 lmf_spouse.1185.a:0 "Они со временем всё уладят... надеюсь."
 had_massive_argument:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] сильно поссорились, что испортило их отношения."
 had_massive_argument_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [CHARACTER.GetShortUINameNoTooltipNoFormat] сильно поссорились, что испортило их отношения."
 
 lmf_spouse.1190.t:0 "[ROOT.Char.GetMotherFather|U] и [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))|U]"
 lmf_spouse.1190.desc.start:0 "Я долж[Select_CString(ROOT.Char.IsFemale, 'на', 'ен')] был[Select_CString(ROOT.Char.IsFemale, 'а', '')] догадаться, что что-то назревает.\n\n[focus_child.GetFirstNameNoTooltip] [Select_CString(focus_child.IsFemale, 'была', 'был')] в нехарактерно угрюмом настроении, раздражая меня, пока я пыта[Select_CString(ROOT.Char.IsFemale, 'лась', 'лся')] сосредоточиться на других делах. "
 lmf_spouse.1190.desc.rowdy:0 "Затем, размахивая деревянным мечом, [focus_child.GetSheHe] удари[Select_CString(focus_child.IsFemale, 'ла', 'л')] меня им прямо по голове. Я знаю, что это был несчастный случай, пока [focus_child.GetSheHe] играл[Select_CString(focus_child.IsFemale, 'а', '')], но я вспыли[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] и приказа[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] [focus_child.GetHerHim] убираться.\n\n"
 lmf_spouse.1190.desc.bossy:0 "Однако [focus_child.GetSheHe|U] вби[Select_CString(focus_child.IsFemale, 'ла', 'л')] себе в голову, что сегодня день, когда можно командовать всеми в [ROOT.Char.Custom('FortifiedBuilding')]... включая меня. Я вспыли[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] и приказа[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] [focus_child.GetHerHim] убираться.\n\n"
 lmf_spouse.1190.desc.wrathful:0 "[focus_child.GetSheHe|U] спори[Select_CString(focus_child.IsFemale, 'ла', 'л')] по любому поводу и наконец прямо заорал[Select_CString(focus_child.IsFemale, 'а', '')] на меня в ярости, когда я отказал[Select_CString(ROOT.Char.IsFemale, 'а', '')] [focus_child.GetHerHim] в каком-то незначительном требовании.\n\n"
 lmf_spouse.1190.desc.arrogant:0 "[focus_child.GetSheHe|U] без умолку говори[Select_CString(focus_child.IsFemale, 'ла', 'л')] о слугах [ROOT.Char.Custom('FortifiedBuilding')], [focus_child.GetHerHis] высокомерие проявлялось во всей красе, пока [focus_child.GetSheHe] отпуска[Select_CString(focus_child.IsFemale, 'ла', 'л')] одно недоброе замечание за другим. Наконец, я вспыли[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] и приказа[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] [focus_child.GetHerHim] убираться.\n\n"
 lmf_spouse.1190.desc.paranoia:0 "[focus_child.GetSheHe|U] бесконечно волновал[Select_CString(focus_child.IsFemale, 'ась', 'ся')] по поводу какого-то решения, которое [focus_child.GetSheHe] счита[Select_CString(focus_child.IsFemale, 'ла', 'л')] жизненно важным, но на которое мне было наплевать. Что подумают люди, а что, если всё пойдёт не так... одно беспокойство за другим, пока я раздражённо не приказа[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] [focus_child.GetHerHim] убираться.\n\n"
 lmf_spouse.1190.desc.stubborn:0 "Я уже несколько раз приказывал[Select_CString(ROOT.Char.IsFemale, 'а', '')] [focus_child.GetHerHim] убираться, но [focus_child.GetSheHe] упрямо отказывал[Select_CString(focus_child.IsFemale, 'ась', 'ся')], с каждым разом всё больше злясь. Наконец, [focus_child.GetSheHe] подош[Select_CString(focus_child.IsFemale, 'ла', 'ёл')] и #EMP толкнул[Select_CString(focus_child.IsFemale, 'а', '')]#! меня на стуле!\n\n"
 lmf_spouse.1190.desc.impatient:0 "[focus_child.GetSheHe|U] проявлял[Select_CString(focus_child.IsFemale, 'а', '')] невероятное нетерпение. Ужин не мог наступить достаточно быстро, будущее не могло наступить достаточно быстро... жалоба за жалобой, пока наконец я не приказа[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] [focus_child.GetHerHim] убираться.\n\n"
 lmf_spouse.1190.desc.callous:0 "[focus_child.GetSheHe|U] говори[Select_CString(focus_child.IsFemale, 'ла', 'л')] о своих друзьях... или, по крайней мере, я должен предположить, что это друзья, поскольку вещи, которые [focus_child.GetSheHe] о них говори[Select_CString(focus_child.IsFemale, 'ла', 'л')], были настолько жестоки, что приходилось только удивляться. Когда я призвал[Select_CString(ROOT.Char.IsFemale, 'а', '')] [focus_child.GetHerHim] к ответу за [focus_child.GetHerHis] бессердечие, [focus_child.GetSheHe] проворча[Select_CString(focus_child.IsFemale, 'ла', 'л')] что-то обо #EMP мне#!.\n\n"
 lmf_spouse.1190.desc.rival:0 "Всё, что я слышал[Select_CString(ROOT.Char.IsFemale, 'а', '')] снова и снова, — это невнятные пассивно-агрессивные комментарии в мой адрес. Но когда я требова[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], чтобы [focus_child.GetSheHe] повтори[Select_CString(focus_child.IsFemale, 'ла', 'л')] их чётко, [focus_child.GetSheHe] отказывал[Select_CString(focus_child.IsFemale, 'ась', 'ся')]. Это было отвратительное поведение, и я это знал[Select_CString(ROOT.Char.IsFemale, 'а', '')].\n\n"
 lmf_spouse.1190.desc.potential:0 "Каждый раз, когда я смотре[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] в сторону [focus_child.GetHerHis], я виде[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] только злобные взгляды и угрюмое выражение лица. У [focus_child.GetHerHis] была какая-то обида, но я не стал[Select_CString(ROOT.Char.IsFemale, 'а', '')] тратить время, чтобы выяснить, реальная она или мнимая, и приказа[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] [focus_child.GetHerHim] убираться.\n\n"
 lmf_spouse.1190.desc.end:0 "Это привело к спору, и этот спор продолжался до тех пор, пока мы не начали кричать друг на друга, и я сейчас даже не могу вспомнить, из-за чего всё было. Всплыли старые обиды, были сказаны слова, и наконец [focus_child.GetFirstNameNoTooltip] вылетел[Select_CString(focus_child.IsFemale, 'а', '')] с криком «Я #EMP ненавижу#! тебя!»\n\nПозже мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] утеша[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] меня. «Молодые [focus_child.GetWomenMen] в возрасте [focus_child.GetHerHis]... вот такие они и есть», — вздохну[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] [ROOT.Char.GetPrimarySpouse.GetSheHe]. Легче от этого не стало."
 lmf_spouse.1190.a:0 "[focus_child.GetSheHe] перебесится. Надеюсь."
 
 lmf_spouse.1195.t:0 "Вли[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'яние', 'яние')] [ROOT.Char.GetPrimarySpouse.GetMotherFather|U]"
 lmf_spouse.1195.desc:0 "Я вижу, что [focus_child.GetFirstNameNoTooltip] и мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] проводят вместе много времени в последнее время.\n\nЭто неплохо, конечно. Какой родитель будет в обиде на то, что [ROOT.Char.GetHerHis] [focus_child.Custom('GetDaughterSon')] проводит больше времени со сво[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetMotherFather]?\n\nНо кажется, они спелись. Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] вьёт верёвки из [focus_child.Custom('GetLassLad')], и поэтому [ROOT.Char.GetPrimarySpouse.GetHerHis] вли[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'яние', 'яние')] очень глубоко. Могу только надеяться, что это к добру."
 lmf_spouse.1195.a:0 "Поживём — увидим!"
 spent_quality_time_together:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] проводили много времени вместе, сближаясь как [CHARACTER.GetMotherFather] и [TARGET_CHARACTER.Custom('GetDaughterSon')]."
 spent_quality_time_together_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [CHARACTER.GetShortUINameNoTooltipNoFormat] проводили много времени вместе, сближаясь как [TARGET_CHARACTER.GetMotherFather] и [CHARACTER.Custom('GetDaughterSon')]."
 
 lmf_spouse.1200.t:0 "Верования мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U]"
 lmf_spouse.1200.desc:0 "Я вижу, что [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] и [focus_child.GetFirstNameNoTooltip] проводят вместе много времени в последнее время.\n\nСначала я подума[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')], что это не более чем [ROOT.Char.GetPrimarySpouse.GetMotherFather], проявляющ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ий')] интерес к сво[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'ему')] [focus_child.Custom('GetDaughterSon')], и возможность сблизиться. Затем я случайно подслуша[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] их разговор, и у меня сложилось отчётливое впечатление, что мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] говори[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] о вопросах веры. Неужели... [ROOT.Char.GetPrimarySpouse.GetSheHe] учит [focus_child.GetFirstNameNoTooltip] [ROOT.Char.GetPrimarySpouse.GetFaith.GetNameNoTooltip]? [ROOT.Char.GetPrimarySpouse.GetSheHe] пытается обратить [focus_child.GetHerHim]?\n\nПозже я столкнул[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')] с [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], и [ROOT.Char.GetPrimarySpouse.GetSheHe] признал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] в обучении, но утвержда[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ет', 'ет')], что это было по настоянию [focus_child.GetFirstNamePossessiveNoTooltip]. «Это [focus_child.GetHersHis] наследие, как и моё», — возмутил[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] [ROOT.Char.GetPrimarySpouse.GetSheHe]. «Разве это #EMP так#! плохо?»"
 lmf_spouse.1200.a:0 "Хорошо, я позволю этому продолжаться."
 lmf_spouse.1200.b:0 "Ни в коем случае. Это немедленно прекратится."
 lmf_spouse.1200.b.success.tt:0 "[focus_child.GetFirstNameNoTooltip] неохотно остаётся последователем [focus_child.GetFaith.GetNameNoTooltip]"
 lmf_spouse.1200.b.secret.tt:0 "[focus_child.GetFirstNameNoTooltip] продолжает изучать [ROOT.Char.GetPrimarySpouse.GetFaith.GetNameNoTooltip] в #EMP тайне#!"
 
 lmf_spouse.1205.t:0 "Холодный приём"
 lmf_spouse.1205.desc:0 "Я прекрасно осознаю, что отношения между мной и мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] достигли низшей точки.\n\n[ROOT.Char.GetPrimarySpouse.GetSheHe|U] прекрасно знает, как выполнять мои просьбы, как присутствовать при дворе и выполнять все обязанности, требуемые от [ROOT.Char.GetPrimarySpouse.GetHerHim] в качестве [ROOT.Char.GetPrimarySpouse.GetLadyLord] [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]... но делает это так, что мне каждый раз напоминают о степени [ROOT.Char.GetPrimarySpouse.GetHerHis] недовольства.\n\nХолодные взгляды, молчание, то, как [ROOT.Char.GetPrimarySpouse.GetSheHe] отворачивается, когда я обращаюсь к [ROOT.Char.GetPrimarySpouse.GetHerHim]. Это не должно было бы так действовать мне на нервы, но действует. "
 lmf_spouse.1205.desc.courtier:0 "Я почти не хочу возвращаться в [ROOT.Char.Custom('FortifiedBuilding')] каждый день, зная, какой приём меня ждёт."
 lmf_spouse.1205.desc.ruler:0 "Каждый раз, когда [ROOT.Char.GetPrimarySpouse.GetSheHe] возвращается в [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], я вздыхаю с облегчением... однако, несмотря на то, что [ROOT.Char.GetPrimarySpouse.GetSheHe] явно чувствует, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'она', 'он')] всегда находит причину вернуться: чтобы досадить мне."
 lmf_spouse.1205.a:0 "#EMP вздох...#!"
 
 lmf_spouse.1210.t:0 "Проблемы в [ROOT.Char.Custom('FortifiedBuilding')|U]"
 lmf_spouse.1210.desc:0 "Сообщения «теряются». Приказы, переданные через слуг, каким-то образом никогда не доходят до адресата. Другие приказы прямо противоречат друг другу, а виновный так и не находится. Не хватает персонала. Слишком много персонала. В моём кабинете недостаточно припасов.\n\nЯ мог бы продолжать и продолжать перечислять постоянную череду мелких проблем, с которыми я сталкиваюсь в [ROOT.Char.Custom('FortifiedBuilding')] в [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], но в этом нет нужды. Я знаю, кто виновник.\n\nМо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband].\n\nУ [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] много способов обеспечить саботаж... никогда настолько серьёзный, чтобы я мог[Select_CString(ROOT.Char.IsFemale, 'ла', '')] формально упрекнуть [ROOT.Char.GetPrimarySpouse.GetHerHim], но достаточно, чтобы я это чувствовал[Select_CString(ROOT.Char.IsFemale, 'а', '')]."
 lmf_spouse.1210.a:0 "Как это раздражает."
 
 lmf_spouse.1215.t:0 "Перехваченное послание"
 lmf_spouse.1215.desc:0 "«Где моё письмо к [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('focus_vassal'))]?» — потребова[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] я у мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband].\n\nЕстественно, [ROOT.Char.GetPrimarySpouse.GetSheHe] пожал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] плечами. «Понятия не имею, о чём ты, [ROOT.Char.GetWifeHusband]».\n\nОднако [ROOT.Char.GetPrimarySpouse.GetHerHis] чрезмерно невинный вид означал, что [ROOT.Char.GetPrimarySpouse.GetSheHe] действительно зна[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] о письме. Более того, [ROOT.Char.GetPrimarySpouse.GetSheHe] #EMP хотел[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')]#!, чтобы я знал[Select_CString(ROOT.Char.IsFemale, 'а', '')], что [ROOT.Char.GetPrimarySpouse.GetSheHe] знает. «Оно не было готово к отправке! Ещё нужно было внести правки. Важные правки!»\n\n[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] просто пожал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] плечами. «Тогда было бы очень досадно, если бы кто-то его отправил. Я спрошу слуг».\n\n[ROOT.Char.GetPrimarySpouse.GetSheHe|U] уш[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'ёл')], но я уже догадал[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')], что произошло: #EMP Саботаж.#!"
 lmf_spouse.1215.a:0 "Похоже, вражда моего [ROOT.Char.GetPrimarySpouse.GetWifeHusband] не знает границ."
 waylaid_message:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(TARGET_CHARACTER.IsFemale, 'была', 'был')] в ярости, получив письмо, случайно отправленное [CHARACTER.GetShortUINameNoTooltipNoFormat]."
 waylaid_message_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsFemale, 'была', 'был')] в ярости, получив письмо, случайно отправленное [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]."
 
 lmf_spouse.1220.t:0 "Отсутствующ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ий')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U]"
 lmf_spouse.1220.desc:0 "«Ни в коем случае!»\n\nПосле очередного спора с мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] в зале совета [ROOT.Char.GetPrimarySpouse.GetSheHe] холодно поднял[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] со своего места и покину[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] зал. Воцарилось неловкое молчание, пока я и другие советники ждали возвращения [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], но вскоре стало ясно, что [ROOT.Char.GetPrimarySpouse.GetSheHe] не собирается этого делать.\n\nПозже я наш[Select_CString(ROOT.Char.IsFemale, 'ла', 'ёл')] [ROOT.Char.GetPrimarySpouse.GetHerHim] в коридоре, и [ROOT.Char.GetPrimarySpouse.GetSheHe] поклял[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')], что больше не будет заседать в моём совете. «Я тво[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]», — рявкнул[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] [ROOT.Char.GetPrimarySpouse.GetSheHe], «но мы оба знаем, что это по большей части формальность. Пусть мир знает об этом, мне всё равно».\n\nЯ ничего не мог[Select_CString(ROOT.Char.IsFemale, 'ла', '')] сделать, чтобы переубедить [ROOT.Char.GetPrimarySpouse.GetHerHim]. Придётся подождать и посмотреть, не смягчится ли [ROOT.Char.GetPrimarySpouse.GetHerHis] позиция в ближайшие недели."
 lmf_spouse.1220.a:0 "Интересно, каковы шансы?"
 lmf_spouse.1120.tt:0 "[THIS.Char.GetPrimarySpouse.GetShortUINameNoFormat|U] покинул[Select_CString(THIS.Char.GetPrimarySpouse.IsFemale, 'а', '')] [THIS.Char.GetPrimarySpouse.GetHerHis] пост в вашем совете и не может быть нанят[Select_CString(THIS.Char.GetPrimarySpouse.IsFemale, 'а', '')] обратно"
 lmf_spouse.1221.t:0 "[angry_spouse.GetShortUINameNoTooltipNoFormat|U] может вернуться ко двору"
 lmf_spouse.1221.desc:0 "[angry_spouse.GetShortUINamePossessive|U] позиция смягчилась, и теперь [angry_spouse.GetSheHe] снова может быть назначен[Select_CString(angry_spouse.IsFemale, 'а', '')] в ваш совет."
 
 lmf_spouse.1225.t:0 "Сколько достаточно?"
 lmf_spouse.1225.desc.start:0 "Сегодня утром моя жена отозвала меня в сторону, сказав, что ей нужно о чём-то важном меня попросить.\n\n"
 lmf_spouse.1225.desc.hasnochildren:0 "«Я... не хочу детей», — наконец призналась она.\n\n«#EMP Совсем#!?», — удивлённо спросил[Select_CString(ROOT.Char.IsFemale, 'а', '')] я.\n\n"
 lmf_spouse.1225.desc.haschildrennotyours:0 "«Я... не хочу больше детей», — наконец призналась она.\n\n«Даже одного нашего собственного?» — удивлённо спросил[Select_CString(ROOT.Char.IsFemale, 'а', '')] я.\n\n"
 lmf_spouse.1225.desc.hasyourchildren:0 "«Я... не хочу, чтобы у нас было больше детей», — наконец призналась она.\n\n"
 lmf_spouse.1225.desc.notattracted:0 "Должен признать, это не стало большим сюрпризом. [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] никогда не проявляла особого интереса к сексуальным отношениям... или к мужчинам в целом, если честно.\n\n"
 lmf_spouse.1225.desc.chaste:0 "Должен признать, её отношение меня не шокировало. Отношение [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip] к сексуальным отношениям всегда было... скажем так, неохотным.\n\n"
 lmf_spouse.1225.desc.depressed:0 "Я задавался вопросом, не было ли это результатом её постоянной меланхолии. Такая непрестанная печаль, казалось, лишала [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] #EMP всякого#! желания, будь то к жизни, к детям или к чему-либо ещё.\n\n"
 lmf_spouse.1225.desc.lunatic:0 "Я задавался вопросом, не было ли это результатом какой-то её причуды. У [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] бывали странные идеи, безумные мысли, которые временами овладевали ею. Или, возможно, она боялась передать это состояние по наследству? Не могу сказать.\n\n"
 lmf_spouse.1225.desc.callous:0 "Она высказала своё требование так деловито, даже холодно. Как будто наши супружеские отношения — это то, от чего можно отказаться. Правда, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] и я вряд ли любили друг друга, но как она могла быть #EMP настолько#! бессердечной?\n\n"
 lmf_spouse.1225.desc.paranoid:0 "Я знал, что одним из самых больших страхов [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip] было умереть при родах. Она была почти параноидально одержима этой идеей. Не этот ли страх стоял за этим?\n\n"
 lmf_spouse.1225.desc.reclusive:0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] стала такой затворницей в последнее время. Она отдалялась от меня, от всех. Было ли это частью какого-то желания видеть меня ещё меньше, чем ей и так приходится, интересно?\n\n"
 lmf_spouse.1225.desc.twoheirs:0 "«У тебя и так более чем достаточно наследников, милорд», — продолжила она. "
 lmf_spouse.1225.desc.heir:0 "«Я уже дала тебе по крайней мере одного наследника, милорд», — продолжила она. "
 lmf_spouse.1225.desc.end:0 "«Наверняка тебе не нужно больше детей, не от меня».\n\nВерно, возможно... но #EMP хотел#! ли я их?"
 lmf_spouse.1225.a:0 "«Хорошо, я исполню твоё желание»."
 lmf_spouse.1225.a.tt:0 "У вас с [THIS.Char.GetPrimarySpouse.GetShortUINameNoTooltipNoFormat] больше не будет общих детей"
 lmf_spouse.marriagebed.notify1.tt:0 "У вас с [std_partner.GetShortUINameNoTooltipNoFormat] больше не будет общих детей"
 lmf_spouse.marriagebed.notify2.tt:0 "У вас с [other_partner.GetShortUINameNoTooltipNoFormat] больше не будет общих детей"
 lmf_spouse.marriagebed.notify3.tt:0 "У вас с [THIS.Char.GetShortUINameNoTooltipNoFormat] больше не будет общих детей"
 granted_request_no_more_children:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] удовлетворил[Select_CString(CHARACTER.IsFemale, 'а', '')] просьбу [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] не иметь больше общих детей."
 granted_request_no_more_children_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] удовлетворил[Select_CString(TARGET_CHARACTER.IsFemale, 'а', '')] просьбу [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] не иметь больше общих детей."
 lmf_spouse.1225.b:0 "«Ни в коем случае! Рожать больше детей — твой #EMP долг#!»."
 refused_request_no_more_children:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] отказал[Select_CString(CHARACTER.IsFemale, 'а', '')] в просьбе [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] не иметь больше общих детей."
 refused_request_no_more_children_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] отказал[Select_CString(TARGET_CHARACTER.IsFemale, 'а', '')] в просьбе [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] не иметь больше общих детей."
 
 lmf_spouse.1230.t:0 "Время и усилия"
 lmf_spouse.1230.desc.start:0 "Поздно ночью мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] приш[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'ёл')] ко мне с тем самым взглядом.\n\n«Думаю, пора нам поработать над появлением ещё одного ребёнка», — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe]."
 lmf_spouse.1230.desc.myheir:0 " «Мне, в конце концов, говорят, что нужен собственный наследник».\n\n"
 lmf_spouse.1230.desc.yourheir:0 " «Тебе, в конце концов, нужен собственный наследник... по крайней мере, так мне часто говорят».\n\n"
 lmf_spouse.1230.desc.unfruitful:0 " «Я знаю, прошло уже много времени...»\n\nПризнаюсь, я был[Select_CString(ROOT.Char.IsFemale, 'а', '')] удивлен[Select_CString(ROOT.Char.IsFemale, 'а', '')]. «Я думал[Select_CString(ROOT.Char.IsFemale, 'а', '')], ты больше не хочешь детей», — замети[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] я.\n\n«Обстоятельства изменились, не так ли?»\n\n"
 lmf_spouse.1230.desc.end:0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] приня[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] моё удивление за колебание. «Если хочешь, [ROOT.Char.GetWifeHusband], я могу оставить тебя сегодня в твоей постели. Просто такие вещи требуют времени и усилий».\n\nС этими словами [ROOT.Char.GetPrimarySpouse.GetSheHe] подмигну[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] мне, повернул[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] и вош[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'ёл')] в нашу спальню."
 lmf_spouse.1230.a:0 "Ни слова больше!"
 lmf_spouse.1230.b:0 "Вообще-то, я, пожалуй, откажусь..."
 
 lmf_spouse.1235.t:0 "Супружеское ложе"
 lmf_spouse.1235.desc.start:0 "В последнее время случаи, когда мы с мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] вступали в супружеские отношения, стали довольно... редкими.\n\nЯ понимаю, это нормально для большинства браков, но с [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] всё иначе. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] отшатывается от моих прикосновений, и это если мы вообще заходим так далеко.\n\nТеперь меня и вовсе выставили из супружеской постели. Если бы воля мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] была исполнена, [ROOT.Char.GetPrimarySpouse.GetSheHe] никогда больше не легла бы со мной.\n\n"
 lmf_spouse.1235.desc.rival:0 "Полагаю, мне не следует удивляться, учитывая, насколько явной стала ненависть [ROOT.Char.GetPrimarySpouse.GetHerHis] ко мне. Наш брак — почти формальность, и это лишь делает его ещё более таковым."
 lmf_spouse.1235.desc.attraction:0 "Полагаю, мне не следует удивляться. [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] никогда не заботил сексуальный акт, и, честно говоря, сомневаюсь, что её вообще привлекают [ROOT.Char.GetWomenMen] в этом смысле. Это лишь доказывает то, что я всегда подозревал."
 lmf_spouse.1235.desc.malicious:0 "Полагаю, это правда, что мы с [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] не испытываем друг к другу тёплых чувств, и она, по правде говоря, не самая добрая из [ROOT.Char.GetPrimarySpouse.GetWomenMen]. Видимо, придётся смириться с тем, что так оно и есть."
 lmf_spouse.1235.desc.dominant:0 "Полагаю, это правда, что мы с [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] не испытываем друг к другу тёплых чувств, и она всегда стремится настоять на своём. Спорить с ней на этот счёт точно не придётся, это уж точно."
 lmf_spouse.1235.a:0 "Как унизительно."
 
 lmf_spouse.1236.t:0 "[angry_spouse.GetShortUINameNoTooltipNoFormat|U] [Select_CString(angry_spouse.IsFemale, 'передумала', 'передумал')]"
 lmf_spouse.1236.desc:0 "[angry_spouse.GetShortUINameNoFormat|U] решил[Select_CString(angry_spouse.IsFemale, 'а', '')] снова разделить с вами супружеское ложе."

 lmf_spouse.1240.t:0 "Поездка в гости"
 lmf_spouse.1240.desc.start:0 "Сегодня мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] приш[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'ёл')] ко мне с просьбой: «Я хочу навестить [ROOT.Char.GetPrimarySpouse.Custom2('direct_address_by_familiarity', SCOPE.sC('spouse_visit_target'))]».\n\n«[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('spouse_visit_target'))]? В "
 lmf_spouse.1240.desc.foreign:0 "[visit_kingdom.GetNameNoTierNoTooltip]? Почему так далеко?»\n\n"
 lmf_spouse.1240.desc.ruler:0 "[spouse_visit_target.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]? Зачем?»\n\n"
 lmf_spouse.1240.desc.courtier:0 "[spouse_visit_target.GetLiege.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]? Зачем?»\n\n"
 lmf_spouse.1240.desc.grandchildren:0 "«Навестить своих внуков, конечно, как будто мне нужна дополнительная причина навестить мо[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ю', 'его')] [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('spouse_visit_target'))]», — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe], немного раздражённ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ый')] моим вопросом. "
 lmf_spouse.1240.desc.grandson:0 "«Разве мне нужна причина, чтобы навестить мо[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ю', 'его')] [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('spouse_visit_target'))] и моего новорождённого внука?» — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe], немного раздражённ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ый')] моим вопросом. "
 lmf_spouse.1240.desc.granddaughter:0 "«Разве мне нужна причина, чтобы навестить мо[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ю', 'его')] [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('spouse_visit_target'))] и мою новорождённую внучку?» — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe], немного раздражённ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ый')] моим вопросом. "
 lmf_spouse.1240.desc.relation:0 "«Разве мне действительно нужна причина, чтобы навестить мо[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ю', 'его')] [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('spouse_visit_target'))]?» — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe], немного раздражённ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ый')] моим вопросом. "
 lmf_spouse.1240.desc.sick:0 "«[spouse_visit_target.GetSheHe|U] бол[Select_CString(spouse_visit_target.IsFemale, 'ьна', 'ен')], и я хочу убедиться, что [spouse_visit_target.GetSheHe] получает надлежащий уход», — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe]. "
 lmf_spouse.1240.desc.pregnant:0 "«Моя [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('spouse_visit_target'))] беременна, если ты не слышал», — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe], хмурясь на меня. "
 lmf_spouse.1240.desc.bestfriend:0 "«Потому что [spouse_visit_target.GetSheHe] — мой лучший друг. Ты ведь знаешь? Мы слишком долго не виделись», — со вздохом сказал(а) [ROOT.Char.GetPrimarySpouse.GetSheHe]. "
 lmf_spouse.1240.desc.potfriend:0 "«[spouse_visit_target.GetSheHe|U] и я давно в хороших отношениях, и я хотел(а) бы посмотреть, может ли возникнуть настоящая дружба», — задумчиво сказал(а) [ROOT.Char.GetPrimarySpouse.GetSheHe]. "
 lmf_spouse.1240.desc.lover:0 "«Потому что у [spouse_visit_target.GetSheHe] и меня есть дела, которые тебя не касаются», — с явным раздражением сказал(а) [ROOT.Char.GetPrimarySpouse.GetSheHe]. "
 lmf_spouse.1240.desc.friend:0 "«Потому что прошло слишком много времени, и я скучаю по [spouse_visit_target.GetHerHim]», — [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'сказала', 'сказал')] [ROOT.Char.GetPrimarySpouse.GetSheHe] с раздражённым вздохом. "
 lmf_spouse.1240.desc.end:0 "«Меня не будет из [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] больше нескольких месяцев, максимум шести, если тебя это беспокоит».\n\nЭто было не так, хотя я и удивил[Select_CString(ROOT.Char.IsFemale, 'ась', 'ся')], почему [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] хочет ехать сам[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] и не попроси[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] меня поехать с ней. В конце концов, такое путешествие может быть довольно опасным."
 lmf_spouse.1240.a:0 "«Конечно, можешь ехать»."
 lmf_spouse.1240.a.tt:0 "[THIS.Char.GetPrimarySpouse.GetShortUINameNoFormat|U] отправится навестить [spouse_visit_target.GetShortUINameNoFormat] и пробудет там до шести месяцев."
 lmf_spouse.1240.a.nocouncil.tt:0 "Поскольку [THIS.Char.GetPrimarySpouse.GetHerHis] визит проходит за пределами [THIS.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip], [THIS.Char.GetPrimarySpouse.GetShortUINameNoFormat] будет недоступ[Select_CString(THIS.Char.GetPrimarySpouse.IsFemale, 'на', 'ен')] в качестве советника на время [THIS.Char.GetPrimarySpouse.GetHerHis] визита."
 lmf_spouse.1240.b:0 "«Нет, это слишком опасно. В другой раз»."
 
 lmf_spouse.1242.title:0 "Визит [visiting_spouse.GetShortUINamePossessiveNoTooltipNoFormat|U] завершён"
 lmf_spouse.1242.desc:0 "[visiting_spouse.GetShortUINameNoFormat|U] завершил[Select_CString(visiting_spouse.IsFemale, 'а', '')] свой визит к [actor.GetShortUINameNoFormat] в [destination.GetTitle.GetNameNoTierNoTooltip] и теперь возвращается домой в [origin.GetTitle.GetNameNoTierNoTooltip]."
 came_for_a_long_visit:0 "Отношения [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] с [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] улучшились после долгого одиночного визита."
 came_for_a_long_visit_corresponding:0 "Отношения [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] с [CHARACTER.GetShortUINameNoTooltipNoFormat] улучшились после долгого одиночного визита."
 
 lmf_spouse.1250.t:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [spouse_stress.GetNameNoTooltip( ROOT.Char )|U] [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U]"
 lmf_spouse.1250.desc.start:0 "Обязанности мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] "
 lmf_spouse.1250.desc.courtier:0 "здесь, в [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] "
 lmf_spouse.1250.desc.ruler:0 "при [ROOT.Char.GetPrimarySpouse.GetHerHis] дворе в [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] "
 lmf_spouse.1250.desc.mid:0 "нелегки, в этом нет сомнений. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] часто жалуется на стресс, который испытывает. Однако то, #EMP КАК#! [ROOT.Char.GetPrimarySpouse.GetSheHe] справляется с этим стрессом, иногда оставляет желать лучшего.\n\n"
 lmf_spouse.1250.desc.drunkard:0 "Сегодня всё началось с того, что [ROOT.Char.GetPrimarySpouse.GetSheHe] пил[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] с раннего утра. Вино, по большей части, бокал здесь, бокал там, пока вдруг речь [ROOT.Char.GetPrimarySpouse.GetHerHis] не стала невнятной и [ROOT.Char.GetPrimarySpouse.GetSheHe] не закачал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] на ногах. К вечеру это переросло в пьяные разглагольствования и крики на слуг, пока нескольким из них не удалось скрутить [ROOT.Char.GetPrimarySpouse.GetHerHim] и уложить в постель.\n\n"
 lmf_spouse.1250.desc.hashishiyah:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] очень пристрастил[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] к этому зелью, употребляя маковое молоко так регулярно, что [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'остаётся', 'остаётся')] бесчувственн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ой', 'ым')]. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] валяется на подушках в своих покоях, едва желая вставать в некоторые дни... а в другие ужасно боле[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ет', 'ет')]. Один из слуг попытался спрятать [ROOT.Char.GetPrimarySpouse.GetHerHis] запасы от отчаяния, и истерика, которую из-за этого закати[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband], была тем ещё зрелищем.\n\n"
 lmf_spouse.1250.desc.rakish.nolover:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] пристаёт к слугам, жалуясь, что [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'ему')] нужна «разрядка»... а когда и этого недостаточно, я слышал донесения, что [ROOT.Char.GetPrimarySpouse.GetSheHe] отправляется в близлежащую деревню в disguise. Ищет ли [ROOT.Char.GetPrimarySpouse.GetSheHe] мимолётных встреч или у [ROOT.Char.GetPrimarySpouse.GetHerHis] есть любовник, я пока не выяснил, но нетрудно представить, когда [ROOT.Char.GetPrimarySpouse.GetSheHe] ведёт себя так.\n\n"
 lmf_spouse.1250.desc.rakish.lover:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] пристаёт к слугам, жалуясь, что [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'ему')] нужна «разрядка»... а когда и этого недостаточно, я слышал донесения, что [ROOT.Char.GetPrimarySpouse.GetSheHe] покидает [ROOT.Char.Custom('FortifiedBuilding')] в disguise... чтобы встретиться с [ROOT.Char.GetPrimarySpouse.GetHerHis] любовником, без сомнения. Честно говоря, [ROOT.Char.GetPrimarySpouse.GetSheHe] даже не особо это скрывает. Как и то, что потребности [ROOT.Char.GetPrimarySpouse.GetHerHis] превосходят то, что могу дать я.\n\n"
 lmf_spouse.1250.desc.irritable:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] постоянно срывается — на меня, на придворных, на слуг. Если кто-то допускает малейшую ошибку в [ROOT.Char.GetPrimarySpouse.GetHerHis] присутствии, на него обрушивается вся сила [ROOT.Char.GetPrimarySpouse.GetHerHis] гнева. Из-за этого, когда [ROOT.Char.GetPrimarySpouse.GetSheHe] находится в стрессе, все ходят вокруг [ROOT.Char.GetPrimarySpouse.GetHerHim] на цыпочках. В такие дни [ROOT.Char.Custom('FortifiedBuilding')] наполняется тихим напряжением, которое почти сводит с ума.\n\n"
 lmf_spouse.1250.desc.flagellant:0 "Я слышу [ROOT.Char.GetPrimarySpouse.GetHerHim] по ночам, в своей комнате, как [ROOT.Char.GetPrimarySpouse.GetSheHe] горячо молится [ROOT.Char.GetPrimarySpouse.GetFaith.HighGodName]. Затем начинаются звуки ударов плетью, быстро сопровождаемые восклицаниями боли и страдания. Бывало, слуги находили [ROOT.Char.GetPrimarySpouse.GetHerHim] без сознания на полу, со спиной, исполосованной в клочья. Лекарь каждый раз лечит [ROOT.Char.GetPrimarySpouse.GetHerHim], но говорит мне, что в конце концов [ROOT.Char.GetPrimarySpouse.GetSheHe] нанесёт себе вред, который уже нельзя будет исправить.\n\n"
 lmf_spouse.1250.desc.profligate:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] ходит по рынкам или совершает короткие поездки в соседний город, каждый раз накапливая долги, от которых глаза на лоб лезут. И что же [ROOT.Char.GetPrimarySpouse.GetSheHe] покупает? Да ничего существенного. Всё, что попадается на глаза. «Мне #EMP нужны#! эти вещи!» — настаивает [ROOT.Char.GetPrimarySpouse.GetSheHe], но и [ROOT.Char.GetPrimarySpouse.GetSheHe], и я знаем, что это не так. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] швыряет золото в бездонную пропасть.\n\n"
 lmf_spouse.1250.desc.contrite:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] часто посещает [ROOT.Char.GetPrimarySpouse.GetFaith.HouseOfWorship|l], изливая душу любому [ROOT.Char.GetPrimarySpouse.GetFaith.PriestNeuter], который согласится выслушать [ROOT.Char.GetPrimarySpouse.GetHerHim]... до такой степени, что [ROOT.Char.GetPrimarySpouse.GetFaith.PriestNeuterPlural] начали избегать [ROOT.Char.GetPrimarySpouse.GetHerHim] вовсе. И дело не только в них. Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] мучи[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'т', 'т')] чувство вины за свои недостатки, реальные и мнимые, и покаяние — явно единственный способ очистить [ROOT.Char.GetPrimarySpouse.GetHerHis] разум.\n\n"
 lmf_spouse.1250.desc.comfort_eater:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] ест. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] начинает утром, съедая на завтрак больше, чем большинство съедает за целый день. [ROOT.Char.GetPrimarySpouse.GetSheHe] набивает себя тортами, сладостями и «пустячками», а за вечерней трапезой ест так быстро, что другие в зале начинают глазеть. И всё равно? Почему-то [ROOT.Char.GetPrimarySpouse.GetSheHe] никогда не наедается.\n\n"
 lmf_spouse.1250.desc.inappetetic:0 "[ROOT.Char.GetPrimarySpouse.GetHerHim] не ест. Я вижу [ROOT.Char.GetPrimarySpouse.GetHerHim] за столом, как [ROOT.Char.GetPrimarySpouse.GetSheHe] лениво ковыряется в крошках на своей тарелке с неопределённым отвращением, оставляя большую часть еды нетронутой. И это постоянно, несмотря на уверения [ROOT.Char.GetPrimarySpouse.GetHerHis], что [ROOT.Char.GetPrimarySpouse.GetSheHe] #EMP ест#!. Конечно, долж[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'на', 'ен')] есть, ведь иначе как жить, и всё же я почему-то никогда этого не вижу. День за днём я наблюдаю, как мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] чахнет на моих глазах.\n\n"
 lmf_spouse.1250.desc.reclusive:0 "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] исчезает, иногда на несколько дней. Обычно слуги знают, куда [ROOT.Char.GetPrimarySpouse.GetSheHe] девается, запираясь в одной из отдалённых частей [ROOT.Char.Custom('FortifiedBuilding')], но иногда они не могут найти [ROOT.Char.GetPrimarySpouse.GetHerHim] и там. Часто я нахожу [ROOT.Char.GetPrimarySpouse.GetHerHim] в одиночестве в [ROOT.Char.GetPrimarySpouse.GetHerHis] покоях, смотрящ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'им')] в окно и почти ничего не говорящ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'им')]. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] отшатывается от моих прикосновений, но снова молчит.\n\n"
 lmf_spouse.1250.desc.same:0 "Я понимаю [ROOT.Char.GetPrimarySpouse.GetHerHis] порывы лучше, чем [ROOT.Char.GetPrimarySpouse.GetSheHe] думает. Понимающие взгляды, которыми мы с [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] обмениваемся после одного из [ROOT.Char.GetPrimarySpouse.GetHerHis] приступов, как ни странно, улучшили наши отношения. Тем не менее, это нехорошо."
 lmf_spouse.1250.desc.default:0 "Не могу сказать, что понимаю порывы [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip]. Я пыта[Select_CString(ROOT.Char.IsFemale, 'лась', 'лся')] говорить об этом с [ROOT.Char.GetPrimarySpouse.GetHerHim], объяснял[Select_CString(ROOT.Char.IsFemale, 'а', '')], что так не может продолжаться, но всё без толку."
 lmf_spouse.1250.a:0 "Увы, так оно и есть."
 
 lmf_spouse.1260.t:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [spouse_stress.GetNameNoTooltip( ROOT.Char )|U] [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U]"
 lmf_spouse.1260.desc.start:0 "Обязанности мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] "
 lmf_spouse.1260.desc.courtier:0 "здесь, в [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] "
 lmf_spouse.1260.desc.ruler:0 "при [ROOT.Char.GetPrimarySpouse.GetHerHis] дворе в [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] "
 lmf_spouse.1260.desc.mid:0 "часто изматывают и вызывают стресс, это правда. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] часто говорит мне об этом. Однако в последнее время [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] начала направлять этот стресс во что-то продуктивное.\n\n"
 lmf_spouse.1260.desc.athletic:0 "Будучи всегда спортивной, [ROOT.Char.GetPrimarySpouse.GetSheHe] взяла за правило совершать долгие прогулки по [ROOT.Char.Custom('FortifiedBuilding')] — ходить по крепостным стенам, проверять состояние садов, иногда даже выходя далеко за пределы [ROOT.Char.Custom('FortifiedBuilding')]. Но вместо того, чтобы на этом остановиться, [ROOT.Char.GetPrimarySpouse.GetSheHe] превратила это во время, когда она может общаться со слугами и другими простолюдинами. [ROOT.Char.GetPrimarySpouse.GetSheHe] останавливается, чтобы поговорить с каждым, расспрашивая об их успехах и положении дел в [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], и в ответ они её за это полюбили. Похоже, они с нетерпением ждут каждой её вылазки, приберегая последние новости специально для её ушей... к её большому удовольствию!\n\n"
 lmf_spouse.1260.desc.journaller:0 "Я видел журналы, которые ведёт [ROOT.Char.GetPrimarySpouse.GetSheHe], и они одновременно обширны и впечатляющи. Это не просто пустые мысли о прошедшем дне, как я сначала подозревал, а скорее исследования на различные темы, которые её интересуют. Некоторые из них [ROOT.Char.GetPrimarySpouse.GetSheHe] даже отправляет некоторым придворным, тем, кому, по её мнению, это может быть полезно (и кто умеет читать), и каждый, видимо, был рад их получить. Судя по тому, что я видел, я иногда думаю, не захочет ли моя [ROOT.Char.GetPrimarySpouse.GetWifeHusband] опубликовать некоторые из этих журналов в качестве интеллектуального занятия.\n\n"
 lmf_spouse.1260.desc.confider:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] любит поговорить, видите ли. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] поговорит почти с кем угодно о чём угодно, и почти каждый день я замечаю её смеющейся с каким-нибудь новым другом. Сначала я думал, что это просто пустые сплетни, но вскоре заметил, что [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] так же хорошо умеет располагать людей к откровенности с #EMP ней#!, как и сама откровенничать с ними. [ROOT.Char.GetPrimarySpouse.GetSheHe|U], очевидно, узнаёт таким образом многое о происходящем в [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] и передаёт всё важное мне. Задатки мастера шпионажа, честно говоря, хотя она утверждает, что делает это просто потому, что ей это нравится.\n\n"
 lmf_spouse.1260.desc.canlearn:0 "«Ты тоже мог бы этому научиться», — сказала она мне однажды вечером. «Кто знает? Возможно, это даже пойдёт тебе на пользу»."
 lmf_spouse.1260.desc.same:0 "Мне так приятно это видеть в основном потому, что у меня самой такие же порывы, и понимающие взгляды, которыми мы с [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] обмениваемся после того, как она заканчивает на сегодня, как ни странно, немного сблизили нас."
 lmf_spouse.1260.desc.default:0 "Я не уверена, что смогла бы когда-нибудь делать то же самое, несмотря на её уверения, что смогла бы. Тем не менее, приятно видеть."
 lmf_spouse.1260.a:0 "По крайней мере, это здоровый выход."
 lmf_spouse.1260.b:0 "Возможно, я #EMP могла бы#! быть больше похожей на неё..."
 
 lmf_spouse.1270.t:0 "Тёмное облако"
 lmf_spouse.1270.desc:0 "Печаль мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] нависла над [home_ruler.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] словно миазма, тёмное облако, заражающее весь [home_ruler.Custom('FortifiedBuilding')].\n\nСлуги двигаются медленнее, крадучись по коридорам осторожными шагами. Если прислушаться, можно услышать звук тихих рыданий [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip], доносящийся из [ROOT.Char.GetPrimarySpouse.GetHerHis] покоев. В некоторые дни [ROOT.Char.GetPrimarySpouse.GetSheHe] кажется в порядке, а в другие? Кажется, никакая сила на земле не сможет вытащить [ROOT.Char.GetPrimarySpouse.GetHerHim] из трясины отчаяния, в которой [ROOT.Char.GetPrimarySpouse.GetSheHe] погряз[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', '')].\n\nЧто я могу сделать? Если я пытаюсь поговорить с [ROOT.Char.GetPrimarySpouse.GetHerHim] об этом, [ROOT.Char.GetPrimarySpouse.GetSheHe] замолкает. Я мог бы накричать на [ROOT.Char.GetPrimarySpouse.GetHerHim], бросить вызов, умолять хотя бы встать с постели и #EMP попытаться#!... но ничего, кажется, не работает.\n\nНе всегда всё так плохо. Кажется, я помню [ROOT.Char.GetPrimarySpouse.GetWifeHusband], который когда-то улыбался. Но в последнее время это кажется далёким воспоминанием."
 lmf_spouse.1270.a:0 "Так уж оно есть."
 lmf_spouse.1270.b:0 "Мне нужно стараться больше и быть рядом с [ROOT.Char.GetPrimarySpouse.GetHerHim]."
 lmf_spouse.1270.success.tt:0 "Вам удаётся вывести [THIS.Char.GetPrimarySpouse.GetFirstName] из [THIS.Char.GetPrimarySpouse.GetHerHis] мрачного настроения"
 lmf_army.1270.success.title:0 "[THIS.Char.GetPrimarySpouse.GetFirstNameNoTooltip] приходит в себя"
 lmf_spouse.1270.fail.tt:0 "[THIS.Char.GetPrimarySpouse.GetFirstName] раздражен[Select_CString(THIS.Char.GetPrimarySpouse.IsFemale, 'а', '')] вашей попыткой"
 lmf_army.1270.fail.title:0 "Вам не удаётся расшевелить [THIS.Char.GetPrimarySpouse.GetHerHim]"
 
 lmf_spouse.1280.t: "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'Моя стареющая', 'Мой стареющий')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]"
 lmf_spouse.1280.desc.start: "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] стареет.\n\nОднако дело не только в [ROOT.Char.GetPrimarySpouse.GetHerHis] возрасте. "
 lmf_spouse.1280.desc.infirm: "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] двигается и реагирует медленнее. [ROOT.Char.GetPrimarySpouse.GetHerHis|U] кожа начинает обвисать, и кажется, что [ROOT.Char.GetPrimarySpouse.GetHerHis] конечности превращаются в простые палочки. «Это просто старческая немощь», - пренебрежительно говорит [ROOT.Char.GetPrimarySpouse.GetSheHe], когда я поднимаю эту тему. «С этим ничего не поделаешь». Тем не менее, когда я предполагаю, что, возможно, [ROOT.Char.GetPrimarySpouse.GetHerHim] нужно начать быть более [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'осторожной', 'осторожным' )], [ROOT.Char.GetPrimarySpouse.GetSheHe] отрицает, что в [ROOT.Char.GetPrimarySpouse.GetHerHis] жизни что-то должно измениться.\n\nПока [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] может так думать, но я начинаю задумываться, скоро ли настанет время, когда нам нужно будет ограничить [ROOT.Char.GetPrimarySpouse.GetHerHis] передвижения и постоянно следить за [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ней', 'ним' )] для [ROOT.Char.GetPrimarySpouse.GetHerHis] же блага... нравится [ROOT.Char.GetPrimarySpouse.GetHerHim] это или нет. "
 lmf_spouse.1280.desc.withering_mind: "[ROOT.Char.GetPrimarySpouse.GetSheHe|U] забывает о вещах... иногда о простых вещах, например, о том, где [ROOT.Char.GetPrimarySpouse.GetSheHe] что-то [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'оставила', 'оставил' )], или об имени придворного. Иногда, однако, я вижу, как [ROOT.Char.GetPrimarySpouse.GetSheHe] стоит в комнате, и по выражению страха на [ROOT.Char.GetPrimarySpouse.GetHerHis] лице становится ясно, что [ROOT.Char.GetPrimarySpouse.GetSheHe] совершенно [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'забыла', 'забыл' )], где находится. Я даже [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [ROOT.Char.GetPrimarySpouse.GetSheHe] смотрит на меня с тихой паникой, и я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что [ROOT.Char.GetPrimarySpouse.GetSheHe] не знает, кто #EMP я#! [Select_CString(ROOT.Char.IsFemale, 'такая', 'такой' )]!\n\nОднако [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] всегда приходит в себя, но я начинаю задаваться вопросом, наступит ли день, когда [ROOT.Char.GetPrimarySpouse.GetSheHe] этого не узнает. "
 lmf_spouse.1280.desc.clouded_eyes:0 "Вчера вечером я увидел(а), как [ROOT.Char.GetPrimarySpouse.GetSheHe] идёт по коридору ко мне, и хотя я был(а) недалеко, было ясно, что [ROOT.Char.GetPrimarySpouse.GetSheHe] меня не видит. Наконец, прежде чем мы буквально столкнулись, я окликнул(а) [ROOT.Char.GetPrimarySpouse.GetHerHim], и [ROOT.Char.GetPrimarySpouse.GetSheHe] вздрогнул(а) от испуга. «Мои глаза уже не те, что раньше», — со смехом признался(а) [ROOT.Char.GetPrimarySpouse.GetSheHe]... и это чистая правда. Однако они начинают мутнеть. Даже я это вижу.\n\n[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] пока компенсирует, но я начинаю задаваться вопросом, скоро ли наступит день, когда [ROOT.Char.GetPrimarySpouse.GetSheHe] полностью ослепнет. "
 lmf_spouse.1280.desc.faltering_heart:0 "Даже короткая прогулка оставляет [ROOT.Char.GetPrimarySpouse.GetHerHim] без дыхания, и я время от времени застаю [ROOT.Char.GetPrimarySpouse.GetHerHim] стоящим неподвижно с закрытыми глазами и рукой на груди. «Моё сердце всё время колотится», — объяснил(а) [ROOT.Char.GetPrimarySpouse.GetSheHe] после одного из таких случаев. «Иногда я могу только стоять, и то с трудом!» Я говорю [ROOT.Char.GetPrimarySpouse.GetHerHim], что [ROOT.Char.GetPrimarySpouse.GetSheHe] #EMP не [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] #! стоять, что ему/ей следует лечь, но [ROOT.Char.GetPrimarySpouse.GetSheHe] отмахивается от беспокойства.\n\n[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] не считает проблему серьёзной, но я начинаю задаваться вопросом, наступит ли день, когда [ROOT.Char.GetPrimarySpouse.GetHerHis] сердце окончательно сдаст. "
 lmf_spouse.1280.desc.fragile_bones:0 "За последний год у [ROOT.Char.GetPrimarySpouse.GetSheHe] было пугающее количество травм: перелом шейки бедра после, казалось бы, незначительного падения, перелом лодыжки после того, как поскользнулся(лась), перелом запястья после оговорки на лестнице, которая едва не отправила [ROOT.Char.GetPrimarySpouse.GetHerHim] на самый низ. Каждый раз всё тревожнее, хотя [ROOT.Char.GetPrimarySpouse.GetSheHe] отмахивается от моего беспокойства. «Это просто мои стареющие кости», — пренебрежительно говорит [ROOT.Char.GetPrimarySpouse.GetSheHe]. «Что за альтернатива? Лежать в постели и никогда не выходить?»\n\nЯ вижу, что [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] боится своего положения больше, чем показывает, и я начинаю задаваться вопросом, настанет ли время, когда нам #EMP действительно #! нужно будет ограничить [ROOT.Char.GetPrimarySpouse.GetHerHis] передвижения ради [ROOT.Char.GetPrimarySpouse.GetHerHis] же блага. "
 lmf_spouse.1280.desc.same:0 "Мне жаль [ROOT.Char.GetPrimarySpouse.GetHerHim]. Старость настигла и меня точно так же, и тревожно видеть в [ROOT.Char.GetPrimarySpouse.GetHerHim] отражение пути, который лежит предо мной."
 lmf_spouse.1280.desc.other:0 "Мне жаль [ROOT.Char.GetPrimarySpouse.GetHerHim]. Возможно, я страдаю не так же, но старость играет свои шутки и со мной. Похоже, мы вместе становимся дряхлыми."
 lmf_spouse.1280.desc.old:0 "Я и сам[Select_CString(ROOT.Char.IsFemale, 'а', '')] уже не молод[Select_CString(ROOT.Char.IsFemale, 'а', '')] [ROOT.Char.GetWomanMan], но возраст пока не ударил по мне так же сильно, как по мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'ему')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]. Не жду того дня, когда это изменится."
 lmf_spouse.1280.desc.default:0 "Возможно, однажды, когда я постарею, я стану таким же. Пока же, по крайней мере, полагаю, мне следует быть благодарным за ту молодость, что у меня осталась."
 lmf_spouse.1280.a:0 "Должно быть, [ROOT.Char.GetPrimarySpouse.GetHerHim] тяжело."
 lmf_spouse.1280.a.rival:0 "Полагаю, скоро я избавлюсь от [ROOT.Char.GetPrimarySpouse.GetHerHim], не так ли?"
 
 lmf_spouse.1290.t.reason:0 "Всё ещё в ярости"
 lmf_spouse.1290.t.default:0 "Что-то я сказал?"
 lmf_spouse.1290.desc.reason:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] продолжает злиться на меня. Не без причины, я знаю. И всё же холодное молчание и осуждающие взгляды трудно переносить.\n\nЯ много раз пыта[Select_CString(ROOT.Char.IsFemale, 'лась', 'лся')] поговорить с [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], извиниться или хотя бы объясниться, но в такие моменты я считаю удачей, если [ROOT.Char.GetPrimarySpouse.GetSheHe] просто уходит. Обычно такие разговоры заканчиваются очередной ссорой, от которой слуги [ROOT.Char.Custom('FortifiedBuilding')] разбегаются.\n\n"
 lmf_spouse.1290.desc.default.start:0 "В последнее время мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] в ярости на меня.\n\nХотел бы я знать точную причину. "
 lmf_spouse.1290.desc.lover:0 "Обычно [ROOT.Char.GetPrimarySpouse.GetSheHe] так[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ой')] любящ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ая', 'ий')] [ROOT.Char.GetPrimarySpouse.GetWomanMan]... что на [ROOT.Char.GetPrimarySpouse.GetHerHim] нашло? "
 lmf_spouse.1290.desc.friend:0 "Обычно я считаю [ROOT.Char.GetPrimarySpouse.GetHerHim] больше, чем [ROOT.Char.GetPrimarySpouse.GetWifeHusband]. [ROOT.Char.GetPrimarySpouse.GetSheHe|U] — мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] друг. Но теперь...? Что на [ROOT.Char.GetPrimarySpouse.GetHerHim] нашло? "
 lmf_spouse.1290.desc.warm:0 "Обычно у нас относительно тёплые отношения, насколько это можно ожидать от [ROOT.Char.GetHerHis] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]. Но теперь...? "
 lmf_spouse.1290.desc.cool:0 "Полагаю, у нас не самые лучшие отношения в большинстве дней, но я редко вижу такие вспышки гнева без объяснений со стороны [ROOT.Char.GetPrimarySpouse.GetHerHim]. Но теперь...? "
 lmf_spouse.1290.desc.default.end:0 "Я сказал что-то не так? Сделал что-то, что [ROOT.Char.GetPrimarySpouse.GetSheHe] не нравится? [ROOT.Char.GetPrimarySpouse.GetSheHe|U] просто не говорит мне.\n\n"
 lmf_spouse.1290.desc.end:0 "По крайней мере, в последнее время у меня складывается ощущение, что позиция [ROOT.Char.GetPrimarySpouse.GetHerHis] смягчается. Думаю, [ROOT.Char.GetPrimarySpouse.GetSheHe] возможно, готов[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] наконец выслушать извинения, если я сделаю искреннюю попытку. Или это может сделать всё ещё хуже."
 lmf_spouse.1290.a:0 "Тогда лучше попытаться."
 lmf_spouse.1290.a.success:0 "[angry_spouse.GetFirstNameNoTooltip] принимает ваши извинения"
 spouse_apologized_profusely:0 "Отношения [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] с [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] значительно улучшились после того, как [CharYouSheHe(CHARACTER)] принёс[Select_CString(CHARACTER.IsFemale, 'ла', '')] свои глубочайшие извинения."
 spouse_apologized_profusely_corresponding:0 "Отношения [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] с [CHARACTER.GetShortUINameNoTooltipNoFormat] значительно улучшились после того, как [CharYouSheHe(TARGET_CHARACTER)] принёс[Select_CString(TARGET_CHARACTER.IsFemale, 'ла', '')] свои глубочайшие извинения."
 lmf_spouse.1290.a.failure:0 "Ваши усилия только ещё больше злят [angry_spouse.GetHerHim]"
 lmf_spouse.1290.b:0 "Лучше не будить лихо, пока оно тихо."
 
 lmf_spouse.1300.t:0 "Время загладить вину?"
 lmf_spouse.1300.desc.reason:0 "Между мной и мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] не всё хорошо, и на то есть веские причины.\n\n"
 lmf_spouse.1300.desc.default:0 "Мои отношения с мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] были в лучшем случае прохладными. Мы не близки, даже по меркам супругов.\n\n"
 lmf_spouse.1300.desc.mid:0 "Поэтому, признаюсь, я был[Select_CString(ROOT.Char.IsFemale, 'а', '')] удивлен[Select_CString(ROOT.Char.IsFemale, 'а', '')], когда [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] подош[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'ёл')] ко мне сегодня, казалось бы, с раскаянием. "
 lmf_spouse.1300.desc.reason2:0 "«Я хоте[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] бы попросить у тебя прощения, [ROOT.Char.GetFirstNameNoTooltip]. Возможно, я его не заслуживаю, но всё же прошу. "
 lmf_spouse.1300.desc.default2:0 "«Я знаю, всё было... непросто, и я не был[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] для тебя лучш[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]. "
 lmf_spouse.1300.desc.end:0 "Я бы хотел[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')], чтобы всё стало лучше».\n\n«Ты бы хотел[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')]?» — спроси[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] я. «Почему сейчас?»\n\n«Потому что я устал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] бороться с тобой. Так же, как и ты устал[Select_CString(ROOT.Char.IsFemale, 'а', '')] бороться со мной, я думаю». [ROOT.Char.GetPrimarySpouse.GetSheHe|U] сделал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] паузу, глубоко вздохнув. «Если ты, конечно, готов[Select_CString(ROOT.Char.IsFemale, 'а', '')]»."
 lmf_spouse.1300.a:0 "Это хорошая новость."
 was_apologized_to_profusely:0 "Отношения [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] с [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] улучшились после того, как [CharYouSheHe(TARGET_CHARACTER)] попыта[Select_CString(TARGET_CHARACTER.IsFemale, 'лась', 'лся')] загладить прошлые обиды."
 was_apologized_to_profusely_corresponding:0 "Отношения [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] с [CHARACTER.GetShortUINameNoTooltipNoFormat] улучшились после того, как [CharYouSheHe(CHARACTER)] попыта[Select_CString(CHARACTER.IsFemale, 'лась', 'лся')] загладить прошлые обиды."
 lmf_spouse.1300.b:0 "Нет, всё и так хорошо."
 
 lmf_spouse.1310.t:0 "Наш[Select_CString(ROOT.Char.IsFemale, 'а', '')] прекрасн[Select_CString(good_child.IsFemale, 'ая', 'ый')] [good_child.Custom('GetDaughterSon')|U]"
 lmf_spouse.1310.desc.start:0 "Недавно мы с мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] были во дворе [ROOT.Char.Custom('FortifiedBuilding')], "
 lmf_spouse.1310.desc.courtier.child:0 "наблюдая за игрой маленьк[Select_CString(good_child.IsFemale, 'ой', 'ого')] [good_child.GetFirstNameNoTooltip], "
 lmf_spouse.1310.desc.courtier.adult:0 "наблюдая за молод[Select_CString(good_child.IsFemale, 'ой', 'ым')] [good_child.GetFirstNameNoTooltip], занимающ[Select_CString(good_child.IsFemale, 'ейся', 'имся')] своими повседневными делами, "
 lmf_spouse.1310.desc.default:0 "только что попрощавшись с [good_child.GetFirstNameNoTooltip] после недавнего визита, "
 lmf_spouse.1310.desc.mid:0 " и [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] внезапно повернул[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] ко мне и улыбнул[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')].\n\n«[good_child.GetSheHe|U] хорош[Select_CString(good_child.IsFemale, 'ая', 'ий')] [good_child.Custom('GetLassLad')], не так ли? Прекрасн[Select_CString(good_child.IsFemale, 'ая', 'ый')] [good_child.Custom('GetDaughterSon')]».\n\nЯ не мог[Select_CString(ROOT.Char.IsFemale, 'ла', '')] не улыбнуться. «Это точно».\n\n«И мы создали [good_child.GetHerHim]».\n\n"
 lmf_spouse.1310.desc.rival:0 "Я могу не соглашаться с мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] во многом — да почти во всём — но в этом? Мы хорошо воспитали наш[Select_CString(ROOT.Char.IsFemale, 'у', 'его')] [good_child.Custom('GetDaughterSon')]. Вместе."
 lmf_spouse.1310.desc.lover:0 "Если бы я могла любить мо[Select_CString(ROOT.Char.IsFemale, 'ю', 'его')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ещё сильнее в тот момент, я бы так и сделала. Блеск в глазах [ROOT.Char.GetPrimarySpouse.GetHerHis] был всем."
 lmf_spouse.1310.desc.friend:0 "Я всегда была привязана к сво[Select_CString(ROOT.Char.IsFemale, 'ей', 'ему')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband], и в тот момент я осознала, как нам повезло быть настоящими партнёрами, а также друзьями."
 lmf_spouse.1310.desc.warm:0 "У нас с мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] тёплые отношения, если не любящие, но в тот момент я должна была признать, что иногда истинное партнёрство — лучшее."
 lmf_spouse.1310.desc.cool:0 "У нас с мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] не самые тёплые отношения, мягко говоря. Мы мало в чём согласны. Но в этом? Мы хорошо воспитали наш[Select_CString(ROOT.Char.IsFemale, 'у', 'его')] [good_child.Custom('GetDaughterSon')]. Вместе."
 lmf_spouse.1310.a:0 "Отлично сработано, я считаю."
 
 lmf_spouse.1320.t:0 "Пустой [ROOT.Char.Custom('FortifiedBuilding')|U]"
 lmf_spouse.1320.desc:0 "Я наткнулся на жену в кабинете [ROOT.Char.Custom('FortifiedBuilding')] этим вечером и заметил, что она разбирает различные письма. Это не было чем-то необычным, за исключением того, что я также заметил, что её глаза были влажными и мутными, как будто она плакала.\n\n«Что случилось, любовь моя?» — спросил я, внезапно обеспокоенный.\n\n«Ничего», — сказала она. Заметив, что моё беспокойство не уменьшилось, она вздохнула и показала мне письма. «Это письма. От наших детей. Обычно я не получаю их все сразу, но они все пришли за последние несколько дней».\n\n«И это... плохо?»\n\nОна усмехнулась. «Просто это напомнило мне, что они все выросли и ушли. [ROOT.Char.Custom('FortifiedBuilding')] когда-то был таким полным, кажется, это было вчера, но теперь здесь тише». Её глаза снова наполнились слезами. «И больше не будет детей, не от меня».\n\nЯ знал, что она не была по-настоящему несчастна, но всё равно обнял её и напомнил, что у нас всё ещё есть друг у друга."
 lmf_spouse.1320.a:0 "Так уж оно есть."
 
 lmf_spouse.1330.t:0 "Поминание ушедших"
 lmf_spouse.1330.desc.start:0 "Я проезжал через городок близ [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] по делам, когда местный магистрат сообщил мне, что мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] посещает местн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ую', 'ый')] [ROOT.Char.GetPrimarySpouse.GetFaith.HouseOfWorship|l]... что было сюрпризом, хотя я не сказал об этом магистрату.\n\nДействительно, позже я нашёл [ROOT.Char.GetPrimarySpouse.GetHerHim] там, просто сидящ[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'им')] у алтаря, печальн[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ой', 'ым')]. «[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip]? Что-то случилось?» — спроси[Select_CString(ROOT.Char.IsFemale, 'ла', 'л')] я.\n\nМоё присутствие застало [ROOT.Char.GetPrimarySpouse.GetHerHim] врасплох, но [ROOT.Char.GetPrimarySpouse.GetSheHe] быстро взя[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ла', 'л')] себя в руки. «Я... просто думала о сво[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ей', 'ём')] [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('dead_relative'))|l]».\n\nАх, это имело смысл. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('dead_relative'))] умер[Select_CString(dead_relative.IsFemale, 'ла', '')] "
 lmf_spouse.1330.desc.month:0 "совсем недавно. Конечно, [dead_relative.GetSheHe] занима[Select_CString(dead_relative.IsFemale, 'ет', 'ет')] мысли [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip].\n\n"
 lmf_spouse.1330.desc.6month:0 "несколько месяцев назад. Странно, что [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] оказал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] здесь сейчас, когда похороны давно прошли, но я же не знал[Select_CString(ROOT.Char.IsFemale, 'а', '')] [dead_relative.GetHerHim] так, как [ROOT.Char.GetPrimarySpouse.GetSheHe].\n\n"
 lmf_spouse.1330.desc.year:0 "почти год назад, кажется. Странно, что [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] оказал[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] здесь сейчас, спустя столько времени, но я же не знал[Select_CString(ROOT.Char.IsFemale, 'а', '')] [dead_relative.GetHerHim] так, как [ROOT.Char.GetPrimarySpouse.GetSheHe].\n\n"
 lmf_spouse.1330.desc.rival:0 "Мы с мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'им')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] вряд ли в дружеских отношениях, но всё же "
 lmf_spouse.1330.desc.lover:0 "Это была моя дражайшая любовь, так что "
 lmf_spouse.1330.desc.friend:0 "Мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] по совместительству мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] друг, так что "
 lmf_spouse.1330.desc.default:0 "Я не видел причин этого не делать, так что " 
 lmf_spouse.1330.desc.end:0 "я сидел и слушал, как мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] рассказывает о [dead_relative.GetHerHim]. Прошло несколько часов, прежде чем [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'была', 'был')] готов[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] уйти, и я видел, что [ROOT.Char.GetPrimarySpouse.GetSheHe] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'была', 'был')] благодар[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'на', 'ен')] мне за компанию."
 lmf_spouse.1330.a:0 "Я рад, что был рядом с [ROOT.Char.GetPrimarySpouse.GetHerHim]."
 
 lmf_spouse.1340.t:0 "Заноза в боку [ROOT.Char.GetPrimarySpouse.GetHerHis|U]"
 lmf_spouse.1340.desc.start:0 "«Я хочу, чтобы [bastard_child.GetHerHim] #EMP убрали#!».\n\nМо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [ROOT.Char.GetPrimarySpouse.GetWifeHusband] уже не в первый раз заводила разговор о присутствии мо[Select_CString(ROOT.Char.IsFemale, 'ей', 'его')] незаконн[Select_CString(bastard_child.IsFemale, 'ой', 'ого')] [bastard_child.Custom('GetDaughterSon')] при моём дворе в [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], но впервые она прямо потребовала, чтобы я отослал[Select_CString(ROOT.Char.IsFemale, 'а', '')] [bastard_child.GetFirstNameNoTooltip] прочь. Я вздохнул, видя, что она полна решимости настоять на своём. "
 lmf_spouse.1340.desc.child:0 "«[bastard_child.GetSheHe|U] #EMP ребёнок#!, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip]», — возразил я.\n\n«В том-то и дело! [bastard_child.GetSheHe|U] не #EMP мой#! ребёнок! "
 lmf_spouse.1340.desc.adult:0 "«[bastard_child.GetSheHe|U] мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] #EMP [bastard_child.Custom('GetDaughterSon')]#!, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip]», — возразил я.\n\n«[bastard_child.GetSheHe|U] взросл[Select_CString(bastard_child.IsFemale, 'ая', 'ый')] [bastard_child.GetWomanMan]! "
 lmf_spouse.1340.desc.end:0 "Ты хоть представляешь, как я выгляжу, оставляя [bastard_child.GetHerHim] при дворе? Тебе #EMP вообще не всё равно#?!»\n\nС этими словами [ROOT.Char.GetPrimarySpouse.GetSheHe] повернул[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'ась', 'ся')] и вылетел[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale, 'а', '')] из комнаты... хотя я видел, что это не последний раз, когда я слышу об этом."
 lmf_spouse.1340.a:0 "«Хорошо, я отошлю [bastard_child.GetHerHim] ко двору [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('bastard_home'))]»."
 had_me_sent_away_from_court:0 "[TARGET_CHARACTER.GetShortUIName|U] заставил[Select_CString(TARGET_CHARACTER.IsFemale, 'а', '')] [TARGET_CHARACTER.Custom('GetMotherFatherOpposite')|l] [CHARACTER.GetShortUINamePossessiveNoFormat] выгнать [CharYouHerHim(CHARACTER)] со двора."
 had_me_sent_away_from_court_corresponding:0 "[CHARACTER.GetShortUIName|U] заставил[Select_CString(CHARACTER.IsFemale, 'а', '')] [CHARACTER.Custom('GetMotherFatherOpposite')|l] [TARGET_CHARACTER.GetShortUINamePossessiveNoFormat] выгнать [CharYouHerHim(TARGET_CHARACTER)] со двора."
 lmf_spouse.1340.b:0 "«Ладно. [bastard_child.GetSheHe] уходит. Ты довольна?!»"
 lmf_spouse.1340.c:0 "«Нет. [bastard_child.GetSheHe|U] мо[Select_CString(ROOT.Char.IsFemale, 'я', 'й')] [bastard_child.Custom('GetDaughterSon')] и, следовательно, моя ответственность»."
 refused_to_kick_bastard_child:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] отказал[Select_CString(CHARACTER.IsFemale, 'ась', 'ся')] выполнять требование [TARGET_CHARACTER.GetShortUINamePossessiveNoFormat] выгнать [CharYourHerHis(CHARACTER)] незаконнорождённого ребёнка со двора."
 refused_to_kick_bastard_child_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] отказал[Select_CString(TARGET_CHARACTER.IsFemale, 'ась', 'ся')] выполнять требование [CHARACTER.GetShortUINamePossessiveNoFormat] выгнать [CharYourHerHis(TARGET_CHARACTER)] незаконнорождённого ребёнка со двора."
 demanded_I_be_ejected_from_court:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] потребовал[Select_CString(TARGET_CHARACTER.IsFemale, 'а', '')], чтобы [TARGET_CHARACTER.Custom('GetMotherFatherOpposite')|l] [CHARACTER.GetShortUINamePossessiveNoFormat] выгнал[Select_CString(TARGET_CHARACTER.Custom('GetMotherFatherOpposite').IsFemale, 'а', '')] [CharYouHerHim(CHARACTER)] со двора."
 demanded_I_be_ejected_from_court_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] потребовал[Select_CString(CHARACTER.IsFemale, 'а', '')], чтобы [CHARACTER.Custom('GetMotherFatherOpposite')|l] [TARGET_CHARACTER.GetShortUINamePossessiveNoFormat] выгнал[Select_CString(CHARACTER.Custom('GetMotherFatherOpposite').IsFemale, 'а', '')] [CharYouHerHim(TARGET_CHARACTER)] со двора."