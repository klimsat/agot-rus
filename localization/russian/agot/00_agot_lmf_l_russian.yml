 ai_legitimize_bastard_interaction: "Узаконить бастарда"
 ASK_TO_ai_legitimize_bastard_interaction_liege: "Я смиренно прошу, чтобы [Select_CString(secondary_recipient.IsFemale, 'моя', 'мой' )] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetShortUIName], [Select_CString(secondary_recipient.IsFemale, 'была узаконена', 'был узаконен' )]."
 introduce_to_marry_interaction: "Устроить знакомство"
 introduce_to_marry_interaction_none_desc: "Представить члена вашей семьи тому, с кем он заинтересован встретиться, в надежде на брак по любви."
 introduce_to_marry_interaction_recipient_desc: "Представить персонажа [secondary_recipient.GetShortUINameNoTooltip] члену вашего двора или вашей семьи в надежде на брак по любви. В списке будут только те члены семьи, с которыми [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'заинтересована', 'заинтересован')] встретиться."
 introduce_to_marry_interaction_desc: "Представить [Select_CString( secondary_actor.IsLocalPlayer, 'себя', secondary_actor.GetShortUINameNoTooltip )] [Select_CString(secondary_actor.IsFemale, 'потенциальному супругу', 'потенциальной супруге' )] в надежде на брак по любви. В списке будут только те потенциальные супруги, с которыми [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'заинтересована', 'заинтересован')] встретиться."
