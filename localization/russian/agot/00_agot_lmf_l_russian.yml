 lmf_interaction.1326.t: "Хорошее начало"
 lmf_interaction.1326.desc.start.actor: "День, который я и [secondary_recipient.GetFirstNameNoTooltip] провели в компании, оказался прекрасным.\n\nМы "
 lmf_interaction.1326.desc.start.actor.hunting: "устроили неспешную охоту, неподалеку от [actor.Custom('FortifiedBuilding_RU_Gen')]. Целью, конечно, было не что-то поймать, а поговорить. "
 lmf_interaction.1326.desc.start.actor.hike: "побродили по землям вокруг владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], и я [Select_CString(ROOT.Char.IsFemale, 'показала', 'показал' )] различные исторические достопримечательности. Главной целью, конечно, была беседа. "
 lmf_interaction.1326.desc.start.actor.garrison: "отправились в гарнизон [actor.Custom('FortifiedBuilding_RU_Gen')], [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'наблюдала', 'наблюдал' )], как я великолепно [Select_CString(ROOT.Char.IsFemale, 'сражалась', 'сражался' )] с рыцарями. Каждый раз, когда я [Select_CString(ROOT.Char.IsFemale, 'делала', 'делал' )] перерыв, мы разговаривали. "
 lmf_interaction.1326.desc.start.actor.poetry: "бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'слушала', 'слушал' )], как я [Select_CString(ROOT.Char.IsFemale, 'читала', 'читал' )] [actor.GetCulture.GetCollectiveNounNoTooltip]ие стихи о любви и доблести. Но в основном мы беседовали. "
 lmf_interaction.1326.desc.start.actor.library: "осматривали библиотеку, обыскивая полки, пока я [Select_CString(ROOT.Char.IsFemale, 'показывала', 'показывал' )] [secondary_recipient.GetHerHim] свои самые ценные фолианты. Целью, конечно, были не книги, а разговор. "
 lmf_interaction.1326.desc.start.actor.poor: "находились у храма во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], раздавая милостыню и утешая бедных. Хотя это и достойное занятие, главной целью было поговорить. "
 lmf_interaction.1326.desc.start.actor.tour: "совершили тур по окрестным землям, окружающим [actor.Custom('FortifiedBuilding')]. Я с гордостью [Select_CString(ROOT.Char.IsFemale, 'демонстрировала', 'демонстрировал' )], что может предложить [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], но главной целью, конечно, была беседа. "
 lmf_interaction.1326.desc.start.actor.garden: "прогуливались по садам [actor.Custom('FortifiedBuilding_RU_Gen')], в мирной и прекрасной обстановке для нашей беседы. "
 lmf_interaction.1326.desc.start.actor.hated: "\n\n[secondary_recipient.GetFirstNameNoTooltip] явно [Select_CString(secondary_recipient.IsFemale, 'нашла', 'нашел' )] [secondary_actor.Custom('lmf_intro_activity_short')] невероятно скучным занятием, но даже так "
 lmf_interaction.1326.desc.start.actor.loved: "И мы поговорили.\n\n[secondary_recipient.GetFirstNameNoTooltip], казалось, [Select_CString(secondary_recipient.IsFemale, 'получила', 'получил' )] огромное удовольствие, и мы "
 lmf_interaction.1326.desc.start.actor.neutral: "И мы поговорили.\n\nВ течение дня мы "
 lmf_interaction.1326.desc.start.actor.mid: "долго говорили о будущем и о том, чего мы от него ждем. Хотя мы знали, что за нами наблюдают, думаю, мы оба чувствовали себя непринужденно.\n\nКогда солнце начало клониться к закату, мне стало ясно: это [secondary_recipient.Custom('WomanManGirlBoy')], с [Select_CString(secondary_recipient.IsFemale, 'которой', 'которым')] я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы вступить в брак, и я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'чувствовала', 'чувствовал' )] то же самое."
 lmf_interaction.1326.desc.actor.lover: " На самом деле, в [secondary_recipient.GetHerHis] глазах был огонек, который говорил, что, возможно, [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'заинтересована', 'заинтересован')] во мне не только как в [Select_CString(secondary_actor.IsFemale, 'жене', 'муже' )]. Что мы могли бы быть любовниками."
 lmf_interaction.1326.desc.actor.friends: " На самом деле, думаю, мы оба нашли настоящую связь... не как любовники, по крайней мере пока. Но как друзья. Только представьте! [secondary_recipient.GetWifeHusband], [Select_CString(secondary_recipient.IsFemale, 'которая', 'который' )] также [Select_CString(ROOT.Char.IsFemale, 'моя самая близкая подруга', 'мой самый близкий друг' )]."
 lmf_interaction.1326.desc.actor.end: "\n\nГлавный вопрос тогда: хочу ли я этого?"
 lmf_interaction.1326.desc.start: "День, который [secondary_actor.GetFirstNameNoTooltip] и [secondary_recipient.GetFirstNameNoTooltip] провели в обществе друг друга, оказался успешным.\n\nОни "
 lmf_interaction.1326.desc.hunting: "устроили неспешную охоту в угодьях неподалеку от [actor.Custom('FortifiedBuilding_RU_Gen')]. Целью, конечно, была не охота, а возможность поговорить. "
 lmf_interaction.1326.desc.hike: "побродили по землям вокруг владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], и [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'показала', 'показал' )] различные исторические достопримечательности. Главной целью была беседа. "
 lmf_interaction.1326.desc.garrison: "отправились в гарнизон [actor.Custom('FortifiedBuilding_RU_Gen')], [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'наблюдала', 'наблюдал' )], как сражались [secondary_actor.GetFirstNameNoTooltip] и [actor.Custom('KnightCulturePluralNoTooltipLowercase')]. Каждый раз, когда [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'делала', 'делал' )] перерыв, они разговаривали. "
 lmf_interaction.1326.desc.seduction: "бродили по территории [actor.Custom('FortifiedBuilding_RU_Gen')]... по некоторым сведениям, слишком близко. Можно даже сказать, что [secondary_actor.GetFirstNameNoTooltip] порой [Select_CString(secondary_actor.IsFemale, 'вела', 'вёл' )] себя неуместно, хотя целью была беседа. "
 lmf_interaction.1326.desc.poetry: "бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'слушала', 'слушал' )], как [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'читала', 'читал' )] [secondary_actor.GetCulture.GetCollectiveNounNoTooltip|l]ие стихи о любви и доблести... по крайней мере так говорят. Но в основном они беседовали. "
 lmf_interaction.1326.desc.library: "осматривали библиотеку, обыскивая полки, пока [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'показывала', 'показывал' )] [secondary_recipient.GetHerHim] наши самые ценные фолианты. Целью, конечно, были не книги, а разговор. "
 lmf_interaction.1326.desc.church: "посетили [actor.GetFaith.HouseOfWorship|l], слушая проповеди о благочестии, как мне сказали, когда не разговаривали. "
 lmf_interaction.1326.desc.tavern: "отправились в деревню неподалеку от [actor.Custom('FortifiedBuilding_RU_Gen')], в основном в таверне. Говорят, [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'была полна', 'был полон' )] решимости веселиться, но даже так у них было много возможностей поговорить. "
 lmf_interaction.1326.desc.poor: "находились у храма во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], раздавая милостыню и утешая бедных. Хотя это и достойное занятие, главной целью была беседа. "
 lmf_interaction.1326.desc.tour: "совершили тур по окрестностям [actor.Custom('FortifiedBuilding_RU_Gen')], [secondary_actor.GetFirstNameNoTooltip] с гордостью [Select_CString(secondary_actor.IsFemale, 'демонстрировала', 'демонстрировал')], что может предложить [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]... но главной целью, конечно, была беседа. "
 lmf_interaction.1326.desc.garden: "прогуливались по садам [actor.Custom('FortifiedBuilding_RU_Gen')], мирной и прекрасной обстановке для их беседы. "
 lmf_interaction.1326.desc.hated: "Хотя было ясно, что [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'нашла', 'нашёл' )] [secondary_actor.Custom('lmf_intro_activity_short')] скучным занятием, "
 lmf_interaction.1326.desc.loved: "По всем сообщениям, [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'нашла', 'нашёл' )] [secondary_actor.Custom('lmf_intro_activity_short')] совершенно восхитительным занятием, и "
 lmf_interaction.1326.desc.neutral: "[secondary_recipient.GetFirstNameNoTooltip], казалось, вполне [Select_CString(secondary_recipient.IsFemale, 'наслаждалась', 'наслаждался')], [secondary_actor.Custom('lmf_intro_activity_short')], и "
 lmf_interaction.1326.desc.mid: "они приятно беседовали. Несмотря на все наблюдающие глаза, следившие за каждым их движением, они казались расслабленными, и день оказался успешным.\n\nКогда солнце начало клониться к закату и пару позвали обратно в [ROOT.Char.Custom('FortifiedBuilding')] на ужин, [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'признала', 'признал' )] это.\n\n«Это [secondary_recipient.Custom('WomanManGirlBoy')], с [Select_CString(secondary_recipient.IsFemale, 'которой', 'которым' )] я хочу вступить в брак», — [Select_CString(secondary_actor.IsFemale, 'сказала', 'сказал' )] [secondary_actor.GetSheHe].\n\n"
 lmf_interaction.1326.desc.secrec.player: "Вопрос тогда в следующем: чувствует ли [secondary_recipient.GetTitledFirstNameNoTooltip] то же самое? И является ли их [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] тем, чего я хочу?"
 lmf_interaction.1326.desc.end: "Ясно, что [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))] чувствует то же самое. Вопрос тогда в следующем: является ли их [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] тем, чего я хочу?"
 lmf_interaction.1326.a: "Да, я [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашёл' )] свою пару."
 lmf_interaction.1326.b: "Мне не [Select_CString(secondary_recipient.IsFemale, 'нужна очередная любовница', 'нужен очередной любовник' )], только [secondary_recipient.GetWifeHusband]."
 lmf_interaction.1326.c: "Мы поженимся, но мне не [Select_CString(secondary_recipient.IsFemale, 'нужна очередная подруга', 'нужен очередной друг' )]."
 lmf_interaction.1326.d: "[secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] продолжится!"
 lmf_interaction.1326.e: "Мы поженимся, и [secondary_recipient.GetSheHe] станет [Select_CString(secondary_recipient.IsFemale, 'моей любовницей', 'моим любовником')]."
 lmf_interaction.1326.f: "Да, [secondary_recipient.GetSheHe] станет [Select_CString(secondary_recipient.IsFemale, 'моей женой и подругой', 'моим мужем и другом')]."
 lmf_interaction.1326.g: "Я [Select_CString(ROOT.Char.IsFemale, 'передумала', 'передумал' )]. Отменить всё."
 agree_to_marriage_intro_ask_rec.tt: "Если [recipient.GetTitledFirstName] согласится на такой союз, как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l], он состоится"
 agree_to_marriage_intro_tt: "Подготовка к такому союзу, как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] между персонажами [secondary_actor.GetShortUIName] и [secondary_recipient.GetShortUIName] продолжится"
 refuse_marriage_intro_send_rec.tt: "[recipient.GetTitledFirstName] будет [Select_CString(recipient.IsFemale, 'уведомлена', 'уведомлён' )] об отмене подготовки к такому союзу, как[secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]"
 refuse_marriage_intro_send_act.tt: "[actor.GetTitledFirstName] будет [Select_CString(actor.IsFemale, 'уведомлена', 'уведомлён' )] об отмене подготовки к такому союзу, как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]"
 refuse_marriage_intro_fail_rec.tt: "[recipient.GetTitledFirstName] немедленно [Select_CString(recipient.IsFemale, 'прекратила', 'прекратил' )] подготовку к такому союзу, как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]"
 refuse_marriage_intro.tt: "Подготовка к такому союзу, как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l], между персонажами [secondary_recipient.GetShortUIName] и [secondary_actor.GetShortUIName] будет немедленно прекращена"
 attraction_at_introduction: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] влюбились друг в друга во время знакомства перед браком."
 attraction_at_introduction_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] и [CHARACTER.GetShortUIName] влюбились друг в друга во время знакомства перед браком."
 friends_at_introduction: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] стали настоящими друзьями во время знакомства перед браком."
 friends_at_introduction_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] и [CHARACTER.GetShortUIName] стали настоящими друзьями во время знакомства перед браком."
 lmf_interaction_no_marriage.tt: "[secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))]: Подготовка отменена"
 lmf_interaction_no_marriage.success.actor.tt: "Несмотря на успех знакомства, [actor.GetShortUIName] [Select_CString(actor.IsFemale, 'передумала', 'передумал' )] и [Select_CString(actor.IsFemale, 'отменила', 'отменил' )] подготовку к предстоящему союзу, известному как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]."
 lmf_interaction_no_marriage.success.rec.tt: "Несмотря на успех знакомства и ваше одобрение, [recipient.GetShortUIName] [Select_CString(recipient.IsFemale, 'передумала', 'передумал')] и отменил[Select_CString(recipient.IsFemale, 'а', '')] подготовку к предстоящему союзу, известному как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]."
 lmf_interaction_no_marriage.failure.rec.tt: "Несмотря на ваше желание продолжить, [recipient.GetShortUIName] [Select_CString(recipient.IsFemale, 'решила', 'решил')], что отсутствие взаимопонимания - достаточная причина для отмены подготовки к предстоящему союзу, известному как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]."

 lmf_interaction.1327.desc.start.secrec: "День, который я и [secondary_actor.GetTitledFirstNameNoTooltip] провели в компании, оказался прекрасным.\n\nМы "
 lmf_interaction.1327.desc.hunting.secrec: "устроили неспешную охоту в окрестностях [actor.Custom('FortifiedBuilding_RU_Gen')]. Целью, конечно, было не что-то поймать, а поговорить. "
 lmf_interaction.1327.desc.hike.secrec: "побродили по землям вокруг владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], и [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'показала', 'показал' )] различные исторические достопримечательности. Главной целью была не экскурсия, а беседа. "
 lmf_interaction.1327.desc.garrison.secrec: "отправились в гарнизон [actor.Custom('FortifiedBuilding_RU_Gen')], я [Select_CString(ROOT.Char.IsFemale, 'наблюдала', 'наблюдал' )], как [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'демонстрировала', 'демонстрировал' )] искусство владения мечом в поединках, в которых приняли участие другие [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]. Каждый раз, когда [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'делала', 'делал' )] перерыв, мы разговаривали. "
 lmf_interaction.1327.desc.poetry.secrec: "бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], я [Select_CString(ROOT.Char.IsFemale, 'слушала', 'слушал' )], как [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'читала', 'читал' )] [secondary_recipient.GetCulture.GetCollectiveNounNoTooltip|l]ие стихи о любви и доблести. Но в основном мы беседовали. "
 lmf_interaction.1327.desc.library.secrec: "осматривали библиотеку, обыскивая полки, пока [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'показывала', 'показывал' )] мне свои самые ценные фолианты. Целью, конечно, были не книги, а разговор. "
 lmf_interaction.1327.desc.church.secrec: "посетили [actor.GetFaith.HouseOfWorship|l], слушая проповеди о благочестии, когда не разговаривали. "
 lmf_interaction.1327.desc.poor.secrec: "в основном находились у храма во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], раздавая милостыню и утешая бедных. Хотя это и достойное занятие, главной целью была беседа. "
 lmf_interaction.1327.desc.tour.secrec: "совершили тур по окрестностям [actor.Custom('FortifiedBuilding_RU_Gen')]. [secondary_recipient.GetFirstNameNoTooltip] с гордостью [Select_CString(secondary_recipient.IsFemale, 'демонстрировала', 'демонстрировал' )], что может предложить [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], но главной целью, конечно, была беседа. "
 lmf_interaction.1327.desc.garden.secrec: "прогуливались по садам [actor.Custom('FortifiedBuilding_RU_Gen')], мирной и прекрасной обстановке для нашей беседы. "
 lmf_interaction.1327.desc.mid.secrec: "И мы поговорили. Мы долго говорили о будущем и о том, чего мы от него ждем. Хотя мы знали, что за нами наблюдают, думаю, мы оба чувствовали себя непринужденно.\n\nКогда солнце начало клониться к закату, мне стало ясно: это [secondary_actor.Custom('WomanManGirlBoy')], с [Select_CString(secondary_actor.IsFemale, 'которой', 'которым' )] я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы вступить в брак, и я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'чувствовала', 'чувствовал' )] то же самое."
 lmf_interaction.1327.desc.secrec.lover: " На самом деле, в [secondary_actor.GetHerHis] глазах был огонек, который говорил, что, возможно, [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'заинтересована', 'заинтересован' )] во мне не только как в [Select_CString(secondary_recipient.IsFemale, 'жене', 'муже' )]. Что мы могли бы быть любовниками. "
 lmf_interaction.1327.desc.secrec.friends: " На самом деле, думаю, мы оба нашли настоящую связь... не как любовники, по крайней мере пока. Но как друзья. Только представьте! [secondary_actor.GetWifeHusband], [Select_CString(secondary_actor.IsFemale, 'которая', 'который' )] также [Select_CString(secondary_actor.IsFemale, 'моя самая близкая подруга', 'мой самый близкий друг' )]. "
 lmf_interaction.1327.desc.secrec.end: "К тому времени, как мы вернулись в [actor.Custom('FortifiedBuilding')], я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что [actor.GetTitledFirstNameNoTooltip] стремится начать подготовку.\n\nГлавный вопрос тогда: хочу ли я этого?"
 lmf_interaction.1327.desc.start: "[secondary_recipient.GetFirstNameNoTooltip] [Select_CString(ROOT.Char.IsFemale, 'прислала', 'прислал' )] мне ответ, и [secondary_recipient.GetSheHe] пишет, что [secondary_recipient.GetHerHis] визит во владение [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] был успешным.\n\nПохоже, они "
 lmf_interaction.1327.desc.hunting: "устроили неспешную охоту в окрестностях [actor.Custom('FortifiedBuilding_RU_Gen')]. Целью, конечно, была не охота, а беседа. "
 lmf_interaction.1327.desc.hike: "побродили по землям вокруг владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], и [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'показала', 'показал' )] различные исторические достопримечательности. Главной целью была беседа. "
 lmf_interaction.1327.desc.garrison: "отправились в гарнизон [actor.Custom('FortifiedBuilding_RU_Gen')], [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'наблюдала', 'наблюдал' )], как сражались [secondary_actor.GetFirstNameNoTooltip] и [actor.Custom('KnightCulturePluralNoTooltipLowercase')]. Каждый раз, когда [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'делала', 'делал' )] перерыв, они разговаривали. "
 lmf_interaction.1327.desc.seduction: "бродили по территории [actor.Custom('FortifiedBuilding_RU_Gen')]... по слухам, слишком близко. Читая между строк, я бы [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )], что порой [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'вела', 'вёл' )] себя неуместно. Тем не менее, у них была возможность поговорить. "
 lmf_interaction.1327.desc.poetry: "бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'слушала', 'слушал' )], как [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'читала', 'читал' )] [secondary_actor.GetCulture.GetCollectiveNounNoTooltip|l]ие стихи о любви и доблести. Но в основном они беседовали. "
 lmf_interaction.1327.desc.library: "осматривали библиотеку [actor.Custom('FortifiedBuilding_RU_Gen')], обыскивая полки, пока [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'показывала', 'показывал' )] [secondary_recipient.GetHerHim] свои самые ценные фолианты. Целью, конечно, были не книги, а разговор. "
 lmf_interaction.1327.desc.church: "посетили [actor.GetFaith.HouseOfWorship|l], слушая проповеди о благочестии, когда не разговаривали. "
 lmf_interaction.1327.desc.tavern: "отправились в деревню неподалеку от [actor.Custom('FortifiedBuilding_RU_Gen')], в основном в таверне. [secondary_recipient.GetSheHe] пишет, что [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'была полна', 'был полон' )] решимости веселиться, но даже так у них было много возможностей поговорить. "
 lmf_interaction.1327.desc.poor: "находились у храма во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], раздавая милостыню и утешая бедных. Хотя это и достойное занятие, главной целью была беседа. "
 lmf_interaction.1327.desc.tour: "совершили тур по окрестностям [actor.Custom('FortifiedBuilding_RU_Gen')]. [secondary_actor.GetFirstNameNoTooltip] с гордостью [Select_CString(secondary_actor.IsFemale, 'демонстрировала', 'демонстрировал' )], что может предложить [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], но главной целью, конечно, была беседа. "
 lmf_interaction.1327.desc.garden: "прогуливались по садам [actor.Custom('FortifiedBuilding_RU_Gen')] большую часть дня, в достаточно мирной обстановке, где у них была возможность поговорить. "
 lmf_interaction.1327.desc.hated: "Несмотря на то, что [secondary_recipient.GetSheHe] не особо [Select_CString(secondary_recipient.IsFemale, 'впечатлилась', 'впечатлился')] таким занятием, как[secondary_actor.Custom('lmf_intro_activity_short')], в конце концов [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была покорена', 'был покорён' )].\n\n"
 lmf_interaction.1327.desc.loved: "[secondary_recipient.GetSheHe|U] явно [Select_CString(secondary_recipient.IsFemale, 'одобрила', 'одобрил' )] такое занятие, как [secondary_actor.Custom('lmf_intro_activity_short')], очень даже, и в конце концов [Select_CString(secondary_recipient.IsFemale, 'была покорена', 'был покорён' )].\n\n"
 lmf_interaction.1327.desc.neutral: "Они так и поступили, и приятно беседовали, несмотря на все наблюдающие за ними глаза.\n\n"
 lmf_interaction.1327.desc.end: "Кажется, они симпатизируют друг другу и согласны заключить такой союз, как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]. [actor.GetTitledFirstNameNoTooltip] хочет, чтобы подготовка началась как можно скорее.\n\nГлавный вопрос тогда: хочу ли я этого?"
 lmf_interaction.1327.b: "Мне не [Select_CString(secondary_actor.IsFemale, 'нужна очередная любовница', 'нужен очередной любовник' )], только [secondary_actor.GetWifeHusband]."
 lmf_interaction.1327.e: "Мы поженимся, и [secondary_actor.GetSheHe] станет [Select_CString(secondary_actor.IsFemale, 'моей любовницей', 'моим любовником' )]."
 lmf_interaction.1327.f: "Да, [secondary_actor.GetSheHe] станет [Select_CString(secondary_actor.IsFemale, 'моей женой и подругой', 'моим мужем и другом')]."
 overrode_marriage_wishes: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'отвергли', Select_CString(TARGET_CHARACTER.IsFemale, 'отвергла', 'отверг' ))] желание [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] вступить в брак по своему желанию."
 overrode_marriage_wishes_corresponding: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'отвергли', Select_CString(CHARACTER.IsFemale, 'отвергла', 'отверг' ))] желание [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] вступить в брак по своему желанию."
 married_to_someone_I_dislike: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'выдали', Select_CString(CHARACTER.IsFemale, 'выдала', 'выдал' ))] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] [Select_CString(TARGET_CHARACTER.IsFemale, 'замуж', 'в мужья' )] за [Select_CString(TARGET_CHARACTER.IsFemale, 'того', 'ту' )], кого [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вы не любите', Select_CString(TARGET_CHARACTER.IsFemale, 'она не любит', 'он не любит' ))]."
 married_to_someone_I_dislike_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'выдали', Select_CString(TARGET_CHARACTER.IsFemale, 'выдала', 'выдал' ))] [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] [Select_CString(CHARACTER.IsFemale, 'замуж', 'в мужья' )] за [Select_CString(CHARACTER.IsFemale, 'того', 'ту' )], кого [Select_CString( CHARACTER.IsLocalPlayer, 'вы не любите', Select_CString(CHARACTER.IsFemale, 'она не любит', 'он не любит' ))]."
 force_marriage_intro_ask_rec.tt: "Если [recipient.GetTitledFirstName] согласится, подготовка к такому союзу, как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l], продолжится в любом случае"
 became_enemies_at_introduction: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] сразу возненавидели друг друга, когда [Select_CString( Or( CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer ), 'вас', 'их' )] познакомили для брака."
 became_enemies_at_introduction_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [CHARACTER.GetShortUINameNoTooltipNoFormat] сразу возненавидели друг друга, когда [Select_CString( Or( CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer ), 'вас', 'их' )] познакомили для брака."

 lmf_interaction.1328.t: "Катастрофическая пара"
 lmf_interaction.1328.desc.secact.actor.start: "День, который я и [secondary_recipient.GetFirstNameNoTooltip] провели в компании, оказался катастрофой.\n\n"
 lmf_interaction.1328.desc.secact.both.loved: "Было странно, главным образом потому, что казалось, будто [secondary_recipient.GetTitledFirstNameNoTooltip] очень [Select_CString(secondary_recipient.IsFemale, 'оценила', 'оценил' )] такое занятие, как [secondary_actor.Custom('lmf_intro_activity_short')]... по крайней мере сначала. "
 lmf_interaction.1328.desc.secact.both.hated: "[secondary_recipient.GetTitledFirstNameNoTooltip] страстно [Select_CString(secondary_recipient.IsFemale, 'возненавидела', 'возненавидел' )] такое занятие, как [secondary_actor.Custom('lmf_intro_activity_short')], и дальше становилось только хуже. "
 lmf_interaction.1328.desc.secact.both.neutral: "[secondary_recipient.GetTitledFirstNameNoTooltip], казалось, нормально [Select_CString(secondary_recipient.IsFemale, 'относилась', 'относился' )] к такому занятию, как [secondary_actor.Custom('lmf_intro_activity_short')], но мы с самого начала были как масло и вода. "
 lmf_interaction.1328.desc.secact.both.hunting: "Наш разговор по дороге быстро превратился в споры и холодное молчание. В какой-то момент я [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил' )], что с меня хватит, и [Select_CString(ROOT.Char.IsFemale, 'поскакала', 'поскакал' )] вперёд, оставив [secondary_recipient.GetHerHis] позади, но даже когда [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'нагнала', 'нагнал' )] меня, ситуация мало улучшилась.\n\n"
 lmf_interaction.1328.desc.secact.both.hike: "Наш разговор быстро превратился в споры и холодное молчание, поэтому я [Select_CString(ROOT.Char.IsFemale, 'попыталась', 'попытался' )] провести прогулку, указывая на местные достопримечательности вокруг владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] и объясняя их историю, но в ответ [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] закатывание глаз и вздохи.\n\n"
 lmf_interaction.1328.desc.secact.both.garrison: "Я и мои [actor.Custom('KnightCulturePluralNoTooltipLowercase')] сражались в гарнизоне [actor.Custom('FortifiedBuilding_RU_Gen')], но [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'стала нетерпеливымой', 'стал нетерпеливымым')]. И каждый раз, когда я [Select_CString(ROOT.Char.IsFemale, 'подходила', 'подходил' )] к н[secondary_recipient.GetHerHim] между поединками, ситуация только ухудшалась.\n\n"
 lmf_interaction.1328.desc.secact.both.poetry: "Я [Select_CString(ROOT.Char.IsFemale, 'развлекала', 'развлекал' )] [secondary_recipient.GetHerHis], пока мы бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], но [secondary_recipient.GetSheHe], казалось, мало [Select_CString(secondary_recipient.IsFemale, 'интересовалась', 'интересовался' )] моими подборками. А когда стихи закончились, стало ещё неловче.\n\n"
 lmf_interaction.1328.desc.secact.both.library: "Я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провёл' )] [secondary_recipient.GetHerHis] по библиотеке, с радостью показывая [secondary_recipient.GetHerHim] свои самые ценные тома, но [secondary_recipient.GetSheHe] мало [Select_CString(secondary_recipient.IsFemale, 'интересовалась', 'интересовался' )] моими словами. Каждая мысль о литературе заставляла [secondary_recipient.GetHerHis] закатывать глаза.\n\n"
 lmf_interaction.1328.desc.secact.both.church: "Мы слушали проповеди, но [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'стала вялой', 'стал вялым')]. Всё, что я [Select_CString(ROOT.Char.IsFemale, 'говорила', 'говорил' )] о вере, вызывало лишь закатывание глаз, и в конце концов [secondary_recipient.GetSheHe] просто [Select_CString(secondary_recipient.IsFemale, 'сидела', 'сидел' )] со скрещёнными руками.\n\n"
 lmf_interaction.1328.desc.secact.both.poor: "Перед нами [actor.GetFaith.HouseOfWorship|l] во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], и у нас было мало возможностей поговорить. Каждый раз, когда я [Select_CString(ROOT.Char.IsFemale, 'подходила', 'подходил' )] к н[secondary_recipient.GetHerHim], [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'отстранялась', 'отстранялся' )].\n\n"
 lmf_interaction.1328.desc.secact.both.tour: "Я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провёл' )] [secondary_recipient.GetHerHis] по коридорам [actor.Custom('FortifiedBuilding_RU_Gen')] и окрестным землям, но это было неловко. [secondary_actor.GetSheHe|U], казалось, [Select_CString(secondary_actor.IsFemale, 'раздражалась', 'раздражался' )] каждый раз, когда я [Select_CString(ROOT.Char.IsFemale, 'пыталась', 'пытался' )] говорить о личных вещах, и наш разговор быстро сводился в спорам и холодному молчанию.\n\n"
 lmf_interaction.1328.desc.secact.both.garden: "Наш разговор быстро превратился в споры и холодное молчание. Несколько раз [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'ускоряла', 'ускорял' )] шаг и шёл вперёд, несмотря на незнакомость с садами, заставляя меня бежать, чтобы догнать.\n\n"
 lmf_interaction.1328.desc.secact.both.mid: "Постоянное ощущение наблюдения заставляло нас нервничать, что только усиливало напряжение. Ничто из сказанного мной [secondary_recipient.GetHerHim] не нравилось, и всё, что [Select_CString(secondary_recipient.IsFemale, 'говорила', 'говорил' )] [secondary_recipient.GetSheHe], заставляло меня хотеть уйти."
 lmf_interaction.1328.desc.secact.secact.loved: "Сначала я [Select_CString(ROOT.Char.IsFemale, 'думала', 'думал' )], что всё прошло хорошо. [secondary_recipient.GetTitledFirstNameNoTooltip], казалось, очень [Select_CString(secondary_recipient.IsFemale, 'оценила', 'оценил' )] такое занятие, как [secondary_actor.Custom('lmf_intro_activity_short')]. "
 lmf_interaction.1328.desc.secact.secact.hated: "[secondary_recipient.GetTitledFirstNameNoTooltip] с самого начала [Select_CString(secondary_recipient.IsFemale, 'возненавидела', 'возненавидел' )] такое занятие, как [secondary_actor.Custom('lmf_intro_activity_short')], но я [Select_CString(ROOT.Char.IsFemale, 'думала', 'думал' )], что дальше будет лучше. "
 lmf_interaction.1328.desc.secact.secact.neutral: "[secondary_recipient.GetTitledFirstNameNoTooltip], казалось, нормально [Select_CString(secondary_recipient.IsFemale, 'восприняла', 'воспринял' )] такое занятие, как [secondary_actor.Custom('lmf_intro_activity_short')], и всё, казалось, шло неплохо. "
 lmf_interaction.1328.desc.secact.secact.hunting: "Поездка вблизи владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] была приятной, и [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'была отличной компаньонкой', 'был отличным компаньоном' )] на охоте. [secondary_recipient.GetSheHe] приятно [Select_CString(secondary_recipient.IsFemale, 'беседовала', 'беседовал' )] со мной"
 lmf_interaction.1328.desc.secact.secact.hike: "Я [Select_CString(ROOT.Char.IsFemale, 'была внимательна', 'был внимателен' )] к темпу, указывая на многочисленные достопримечательности и объясняя их историю. Мне казалось, [secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'была заинтересована', 'был заинтересован' )], задавая много вопросов"
 lmf_interaction.1328.desc.secact.secact.garrison: "Когда я и мои [actor.Custom('KnightCulturePluralNoTooltipLowercase')] сражались в гарнизоне [actor.Custom('FortifiedBuilding_RU_Gen')], признаюсь, я [Select_CString(ROOT.Char.IsFemale, 'показушничала', 'показушничал' )]. Мы разговаривали после каждого поединка"
 lmf_interaction.1328.desc.secact.secact.poetry: "Мы осматривали сады [actor.Custom('FortifiedBuilding_RU_Gen')], пока я [Select_CString(ROOT.Char.IsFemale, 'развлекала', 'развлекал' )] [secondary_recipient.GetHerHis], и [secondary_recipient.GetSheHe] тихо [Select_CString(secondary_recipient.IsFemale, 'слушала', 'слушал' )]. Когда стихи закончились, мы долго беседовали"
 lmf_interaction.1328.desc.secact.secact.library: "Я [Select_CString(ROOT.Char.IsFemale, 'показала', 'показал' )] [secondary_recipient.GetHerHim] свои любимые тома среди множества фолиантов. [secondary_recipient.GetSheHe] мало [Select_CString(secondary_recipient.IsFemale, 'говорила', 'говорил' )], но тишина дала нам возможность долго поговорить"
 lmf_interaction.1328.desc.secact.secact.church: "Мы слушали проповеди в храме во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Это давало нам мало шансов поговорить, но когда мы наконец заговорили"
 lmf_interaction.1328.desc.secact.secact.poor: "Мы провели день перед храмом во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], и толпа занимала нас. Когда у нас наконец появилась возможность поговорить"
 lmf_interaction.1328.desc.secact.secact.tour: "Я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провел' )] [secondary_recipient.GetHerHis] повсюду по окрестностям [actor.Custom('FortifiedBuilding_RU_Gen')] и окрестным землям, подробно объясняя историю всего. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'была приятной компаньонкой', 'был приятным компаньоном' )]"
 lmf_interaction.1328.desc.secact.secact.garden: "Мы беседовали, пока бродили, и поначалу это казалось приятным. У н[secondary_recipient.GetHerHis] были разнообразные интересы, о которых [secondary_recipient.GetSheHe] охотно [Select_CString(secondary_recipient.IsFemale, 'говорила', 'говорил' )]"
 lmf_interaction.1328.desc.secact.secact.mid: ", и я [Select_CString(ROOT.Char.IsFemale, 'почувствовала', 'почувствовал' )] себя [Select_CString(ROOT.Char.IsFemale, 'очарованной', 'очарованным' )] [secondary_recipient.GetHerHis] манерами.\n\nОднако постепенно я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что [secondary_recipient.GetSheHe] не чувствует того же. Я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], как [secondary_recipient.GetSheHe] закатывает глаза, когда я [Select_CString(ROOT.Char.IsFemale, 'говорила', 'говорил' )], и [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'вздрагивала', 'вздрагивал' )], когда я [Select_CString(ROOT.Char.IsFemale, 'приближалась', 'приближался' )]. Напряжение стало невыносимым."
 lmf_interaction.1328.desc.secact.secrec.loved: "Сначала всё шло неплохо. [secondary_recipient.GetTitledFirstNameNoTooltip] явно очень [Select_CString(secondary_recipient.IsFemale, 'оценила', 'оценил' )] такое занятие, как [secondary_actor.Custom('lmf_intro_activity_short')]. "
 lmf_interaction.1328.desc.secact.secrec.hated: "[secondary_recipient.GetTitledFirstNameNoTooltip] явно [Select_CString(secondary_recipient.IsFemale, 'возненавидела', 'возненавидел' )] такое занятие, как [secondary_actor.Custom('lmf_intro_activity_short')], но [Select_CString(secondary_recipient.IsFemale, 'терпела и пыталась', 'терпел и пытался' )] участвовать. "
 lmf_interaction.1328.desc.secact.secrec.neutral: "Сначала всё шло неплохо. [secondary_recipient.GetTitledFirstNameNoTooltip] не [Select_CString(secondary_recipient.IsFemale, 'возражала', 'возражал' )] против такого занятия, как [secondary_actor.Custom('lmf_intro_activity_short')], по крайней мере не настолько, чтобы испортить день. "
 lmf_interaction.1328.desc.secact.secrec.hunting: "Поездка вблизи владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] была приятной, и [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'казалась приятной', 'казался приятным' )]. Мы время от времени беседовали, и это было неловко, но не неожиданно."
 lmf_interaction.1328.desc.secact.secrec.hike: "Я [Select_CString(ROOT.Char.IsFemale, 'была внимательна', 'был внимателен' )] к темпу, указывая на многочисленные достопримечательности и объясняя их историю. [secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'казалась заинтересованной', 'казался заинтересованным' )], но довольно поверхностно. Всё же я [Select_CString(ROOT.Char.IsFemale, 'ценила', 'ценил' )], что [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'пыталась', 'пытался' )]."
 lmf_interaction.1328.desc.secact.secrec.garrison: "Когда я и мои [actor.Custom('KnightCulturePluralNoTooltipLowercase')] сражались в энергичных поединках в гарнизоне [actor.Custom('FortifiedBuilding_RU_Gen')], я, признаюсь, [Select_CString(ROOT.Char.IsFemale, 'показушничала', 'показушничал' )]. Мы разговаривали после каждого поединка, и это было довольно приятно."
 lmf_interaction.1328.desc.secact.secrec.poetry: "Мы осматривали сады [actor.Custom('FortifiedBuilding_RU_Gen')], пока я [Select_CString(ROOT.Char.IsFemale, 'развлекала', 'развлекал' )] [secondary_recipient.GetHerHis], и [secondary_recipient.GetSheHe] тихо [Select_CString(secondary_recipient.IsFemale, 'слушала', 'слушал' )]. Когда стихи закончились, мы долго беседовали... или пытались, во всяком случае, и это было достаточно приятно."
 lmf_interaction.1328.desc.secact.secrec.library: "Я [Select_CString(ROOT.Char.IsFemale, 'показала', 'показал' )] [secondary_recipient.GetHerHim] свои любимые тома среди множества фолиантов. [secondary_recipient.GetSheHe] мало [Select_CString(secondary_recipient.IsFemale, 'говорила', 'говорил' )], но тишина дала нам возможность долго поговорить, и это было неловко, хотя и не совсем неприятно."
 lmf_interaction.1328.desc.secact.secrec.church: "Мы слушали проповеди в храме во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Это давало нам мало шансов поговорить, но когда мы наконец заговорили, это было достаточно приятно."
 lmf_interaction.1328.desc.secact.secrec.poor: "Мы провели день перед храмом во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], и толпа занимала нас. Когда у нас наконец появилась возможность поговорить, это было неловко, но достаточно приятно."
 lmf_interaction.1328.desc.secact.secrec.tour: "Я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провёл' )] [secondary_recipient.GetHerHis] повсюду по окрестностям [actor.Custom('FortifiedBuilding_RU_Gen')], подробно объясняя историю всего. [secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'была приятной', 'был приятным' )], хотя и [Select_CString(secondary_recipient.IsFemale, 'неловкой компаньонкой', 'неловким компаньоном' )]."
 lmf_interaction.1328.desc.secact.secrec.garden: "Мы беседовали, пока бродили, и поначалу это казалось достаточно приятным. У н[secondary_recipient.GetHerHis] были разнообразные интересы, о которых [secondary_recipient.GetSheHe] охотно [Select_CString(secondary_recipient.IsFemale, 'говорила', 'говорил' )], даже если я [Select_CString(ROOT.Char.IsFemale, 'находила', 'находил' )] их довольно банальными."
 lmf_interaction.1328.desc.secact.secrec.mid: "\n\nОднако постепенно я [Select_CString(ROOT.Char.IsFemale, 'почувствовала', 'почувствовал' )] себя всё более [Select_CString(ROOT.Char.IsFemale, 'раздражённой', 'раздражённым' )]. [secondary_recipient.GetHerHis|U] манера раздражала, [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'заставляла', 'заставлял' )] меня закатывать глаза, и напряжение росло. Если [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'заметила', 'заметил' )] это, [secondary_recipient.GetSheHe] не [Select_CString(secondary_recipient.IsFemale, 'сказала', 'сказал' )]. Действительно, [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'казалась', 'казался' )] полностью [Select_CString(secondary_recipient.IsFemale, 'очарованной', 'очарованным' )] мной... но я? Я не [Select_CString(ROOT.Char.IsFemale, 'чувствовала', 'чувствовал' )] того же."
 lmf_interaction.1328.desc.rival.actor: " В какой-то момент я [Select_CString(ROOT.Char.IsFemale, 'споткнулась', 'споткнулся' )], и [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'засмеялась', 'засмеялся' )] — [Select_CString(secondary_recipient.IsFemale, 'засмеялась', 'засмеялся' )]! Клянусь, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы свернуть [secondary_recipient.GetHerHim] шею прямо там и тогда."
 lmf_interaction.1328.desc.end.actor: "\n\nК тому времени, как зашло солнце и мы вернулись в [actor.Custom('FortifiedBuilding')], стало ясно, что мы не пара."
 lmf_interaction.1328.desc.start: "День, который [secondary_actor.GetFirstNameNoTooltip] и [secondary_recipient.GetFirstNameNoTooltip] провели в обществе друг друга, оказался катастрофой.\n\nПо словам наблюдателей, "
 lmf_interaction.1328.desc.both.start: "никто не проявлял интереса к другому с самого начала. "
 lmf_interaction.1328.desc.both.hunting: "Они спорили по прогулке у владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где [secondary_actor.GetFirstNameNoTooltip] постоянно [Select_CString(secondary_actor.IsFemale, 'скакала', 'скакал' )] впереди н[secondary_recipient.GetHerHis], а [secondary_recipient.GetFirstNameNoTooltip] изо всех сил [Select_CString(secondary_recipient.IsFemale, 'пыталась', 'пытался' )] нагнать. Даже когда [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'догоняла', 'догонял' )], их разговор, по сообщениям, был неловким, когда вообще происходил."
 lmf_interaction.1328.desc.both.hike: "Изначально разговор во время их прогулки был достаточно приятным... пока спор не привел к холодному молчанию. [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'задала', 'задал' )] нещадный темп и, казалось, [Select_CString(secondary_actor.IsFemale, 'раздражалась', 'раздражался' )] из-за того, что [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'незнакома', 'незнаком' )] с местностью. Никто не хотел там быть, но к тому времени было уже слишком поздно."
 lmf_interaction.1328.desc.both.garrison: "[secondary_actor.GetFirstNameNoTooltip] практически [Select_CString(secondary_actor.IsFemale, 'игнорировала', 'игнорировал' )] [secondary_recipient.GetHerHis], пока [secondary_actor.GetSheHe] и другие [actor.Custom('KnightCulturePluralNoTooltipLowercase')] сражались, и когда поединки закончились, дела шли немногим лучше. Немногочисленные разговоры были неловкими и наполненными холодным молчанием."
 lmf_interaction.1328.desc.both.seduction: "Они бродили по территории [actor.Custom('FortifiedBuilding_RU_Gen')], мало разговаривая. Затем [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'начала', 'начал' )] стоять слишком близко к н[secondary_recipient.GetHerHim], по всем сообщениям ведя себя неуместно и намекая на то, что явно не интересовало [secondary_recipient.GetHerHis]. Дальше становилось только хуже."
 lmf_interaction.1328.desc.both.poetry: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'развлекала', 'развлекал' )] [secondary_recipient.GetHerHis] [secondary_actor.GetCulture.GetCollectiveNounNoTooltip]ой поэзией, пока они бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], но [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'скучала', 'скучал' )] либо от поэзии, либо от н[secondary_actor.GetHerHis]. В любом случае, [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'обиделась', 'обиделся' )], и дальше становилось только хуже."
 lmf_interaction.1328.desc.both.library: "Они осмотрели библиотеку [actor.Custom('FortifiedBuilding_RU_Gen')], и [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'показала', 'показал')] [secondary_recipient.GetHerHim] свои самые любимые тома среди множества фолиантов. [secondary_actor.GetSheHe|U], казалось, совершенно не [Select_CString(secondary_actor.IsFemale, 'замечала', 'замечал' )], что [secondary_recipient.GetFirstNameNoTooltip] не [Select_CString(secondary_recipient.IsFemale, 'заинтересована', 'заинтересован' )], и дальше становилось только хуже."
 lmf_interaction.1328.desc.both.church: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'привела', 'привёл' )] [secondary_recipient.GetHerHis] в [actor.GetFaith.HouseOfWorship|l] во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где они слушали проповеди, но мало что еще делали. Разговоры, если происходили, были натянутыми и неловкими."
 lmf_interaction.1328.desc.both.tavern: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'сделала', 'сделал' )] странный выбор, приведя [secondary_recipient.GetHerHis] в таверну во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где [secondary_actor.GetSheHe] практически [Select_CString(secondary_actor.IsFemale, 'оставила', 'оставил' )] [secondary_recipient.GetHerHis] в углу, пока [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'веселилась', 'веселился' )]. По сообщениям, когда [secondary_actor.GetSheHe] позже [Select_CString(secondary_actor.IsFemale, 'вернулась', 'вернулся' )] к н[secondary_recipient.GetHerHim], [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] в ярости."
 lmf_interaction.1328.desc.both.poor: "Они провели день, раздавая милостыню бедным перед храмом во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], но стояли далеко друг от друга и редко разговаривали. Когда они говорили, их беседа была неловкой и наполненной холодным молчанием."
 lmf_interaction.1328.desc.both.tour: "Они совершили тур по окрестностям [actor.Custom('FortifiedBuilding_RU_Gen')], [secondary_actor.GetFirstNameNoTooltip] подробно [Select_CString(secondary_actor.IsFemale, 'объясняла', 'объяснял' )] историю всего... и не [Select_CString(secondary_actor.IsFemale, 'замечала', 'замечал' )], что [secondary_recipient.GetFirstNameNoTooltip] совершенно не [Select_CString(secondary_recipient.IsFemale, 'заинтересована', 'заинтересован' )]. [secondary_recipient.GetSheHe|U] едва [Select_CString(secondary_recipient.IsFemale, 'говорила', 'говорил' )], лишь [Select_CString(secondary_recipient.IsFemale, 'вздыхала', 'вздыхал' )] или [Select_CString(secondary_recipient.IsFemale, 'зевала', 'зевал' )]."
 lmf_interaction.1328.desc.both.garden: "Они бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], но стояли далеко друг от друга и явно предпочли бы быть где угодно в другом месте. Разговоры, по сообщениям, были натянутыми и неловкими, [secondary_actor.GetFirstNameNoTooltip] постоянно [Select_CString(secondary_actor.IsFemale, 'закатывала', 'закатывал' )] глаза на всё, что [Select_CString(secondary_recipient.IsFemale, 'говорила', 'говорил' )] [secondary_recipient.GetFirstNameNoTooltip]."
 lmf_interaction.1328.desc.both.mid: "\n\nОни были как масло и вода, без единой искры."
 lmf_interaction.1328.desc.secrec.start: "[secondary_actor.GetFirstNameNoTooltip], казалось, сначала [Select_CString(secondary_actor.IsFemale, 'была полна', 'был полон' )] энтузиазма. "
 lmf_interaction.1328.desc.secrec.hunting: "Они выехали из владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где [secondary_actor.GetFirstNameNoTooltip], по сообщениям, [Select_CString(secondary_actor.IsFemale, 'старалась', 'старался' )] изо всех сил очаровать [secondary_recipient.GetHerHis] своими разговорными навыками. Действительно, [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'казалась', 'казался' )] настолько [Select_CString(secondary_actor.IsFemale, 'увлечённой', 'увлеченным' )], что охота почти не велась."
 lmf_interaction.1328.desc.secrec.hike: "Они прогуливались по тропам возле владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'задала', 'задал' )] неторопливый темп и, по сообщениям, [Select_CString(secondary_actor.IsFemale, 'была', 'был' )] очень [Select_CString(secondary_actor.IsFemale, 'внимательна', 'внимателен' )]. [secondary_actor.GetSheHe], казалось, [Select_CString(secondary_actor.IsFemale, 'была очарована', 'был очарован' )] [Select_CString(secondary_recipient.IsFemale, 'ей', 'им' )] с самого начала, всячески стараясь произвести впечатление на н[secondary_recipient.GetHerHis]." 
 lmf_interaction.1328.desc.secrec.garrison: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'привела', 'привёл' )] [secondary_recipient.GetHerHis] в гарнизон [actor.Custom('FortifiedBuilding_RU_Gen')], где [secondary_actor.GetSheHe] и другие [actor.Custom('KnightCulturePluralNoTooltipLowercase')] сражались, явно стараясь произвести впечатление на н[secondary_recipient.GetHerHis]. [secondary_recipient.GetFirstNameNoTooltip], по сути, [Select_CString(secondary_recipient.IsFemale, 'казалась очарованной', 'казался очарованным' )]."
 lmf_interaction.1328.desc.secrec.seduction: "Они бродили по территории [actor.Custom('FortifiedBuilding_RU_Gen')], где [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'пыталась', 'пытался' )] очаровать [secondary_recipient.GetHerHis] беседой. [secondary_actor.GetSheHe|U] явно [Select_CString(secondary_actor.IsFemale, 'приняла', 'принял' )] [secondary_recipient.GetHerHis] молчание за поощрение, ибо [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'начала', 'начал' )] вести себя... неуместно. Стоя слишком близко и делая двусмысленные замечания, явно [Select_CString(secondary_recipient.IsFemale, 'уверенная', 'уверенный' )], что всё идет прекрасно."
 lmf_interaction.1328.desc.secrec.poetry: "Они осматривали сады [actor.Custom('FortifiedBuilding_RU_Gen')], пока [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'развлекала', 'развлекал' )] [secondary_recipient.GetHerHis] [secondary_actor.GetCulture.GetCollectiveNounNoTooltip]ой поэзией. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'приняла', 'принял' )] [secondary_recipient.GetHerHis] относительное молчание за поощрение и [Select_CString(secondary_actor.IsFemale, 'продолжала', 'продолжал' )] стараться с декламацией, явно [Select_CString(secondary_actor.IsFemale, 'очарованная', 'очарованный' )]."
 lmf_interaction.1328.desc.secrec.library: "Они осмотрели библиотеку [actor.Custom('FortifiedBuilding_RU_Gen')], и [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'показала', 'показал' )] [secondary_recipient.GetHerHim] свои самые любимые тома среди множества фолиантов. По всем сообщениям, [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'говорила', 'говорил' )] бесконечно и [Select_CString(secondary_actor.IsFemale, 'приняла', 'принял')] относительную тишину с [secondary_recipient.GetHerHis] стороны, за поощрение. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'была', 'был' )] явно [Select_CString(secondary_actor.IsFemale, 'очарована', 'очарован' )]."
 lmf_interaction.1328.desc.secrec.church: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'привела', 'привёл' )] [secondary_recipient.GetFirstNameNoTooltip] в [actor.GetFaith.HouseOfWorship|l] во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где они слушали проповеди о благочестии. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'казалась воодушевлённой', 'казался воодушевлённым' )] [secondary_recipient.GetHerHis] молчанием и [Select_CString(secondary_actor.IsFemale, 'пыталась', 'пытался' )] очаровать [secondary_recipient.GetHerHis] своей верой, явно [Select_CString(secondary_actor.IsFemale, 'заинтересованной', 'заинтересованным' )] в [secondary_recipient.GetHerHis] одобрении."
 lmf_interaction.1328.desc.secrec.tavern: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'сделала', 'сделал' )] странный выбор, приведя [secondary_recipient.GetFirstNameNoTooltip] в таверну во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'пыталась', 'пытался' )] веселиться с [Select_CString(secondary_recipient.IsFemale, 'ней', 'ним' )]. По сообщениям, [secondary_actor.GetSheHe] много [Select_CString(secondary_actor.IsFemale, 'пила и считала', 'пил и считал' )], что оба прекрасно проводят время."
 lmf_interaction.1328.desc.secrec.poor: "Они провели день, раздавая милостыню бедным перед храмом во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'была', 'был' )] явно [Select_CString(secondary_actor.IsFemale, 'очарована', 'очарован' )], стараясь произвести впечатление на н[secondary_recipient.GetHerHis] своей щедростью."
 lmf_interaction.1328.desc.secrec.tour: "Они совершили тур по окрестностям [actor.Custom('FortifiedBuilding_RU_Gen')], [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'объясняла', 'объяснял' )] [secondary_recipient.GetHerHim] историю с большим интересом и подробностями. Слишком подробно, возможно, таков был [secondary_actor.GetHerHis] энтузиазм."
 lmf_interaction.1328.desc.secrec.garden: "Они бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], ведя беседу, которая, по всем сообщениям, была довольно односторонней. [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'стремилась', 'стремился' )] произвести впечатление на н[secondary_recipient.GetHerHis] и [Select_CString(secondary_actor.IsFemale, 'старалась', 'старался' )] очаровать [secondary_recipient.GetHerHis]... и явно [Select_CString(secondary_actor.IsFemale, 'думала', 'думал' )], что [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'преуспела', 'преуспел' )]."
 lmf_interaction.1328.desc.secrec.hated: "\n\n[secondary_recipient.GetSheHe|U], однако, явно не [Select_CString(secondary_recipient.IsFemale, 'чувствовала', 'чувствовал' )] того же. С самого начала [secondary_recipient.GetSheHe] не [Select_CString(secondary_recipient.IsFemale, 'наслаждалась', 'наслаждался' )] таким занятием, как [secondary_actor.Custom('lmf_intro_activity_short')], и это раздражало [secondary_recipient.GetHerHis] всё больше по мере того, как день шел."
 lmf_interaction.1328.desc.secrec.loved: "\n\nНесмотря на явное наслаждение таким занятием, как [secondary_actor.Custom('lmf_intro_activity_short')], было ясно, что [secondary_recipient.GetSheHe] не [Select_CString(secondary_recipient.IsFemale, 'чувствовала', 'чувствовал' )] того же. [secondary_recipient.GetHerHis|U] удовольствие уменьшалось по мере того, как день шел, превращаясь в скуку, если не в откровенную неприязнь."
 lmf_interaction.1328.desc.secrec.neutral: "\n\n[secondary_recipient.GetSheHe|U], однако, явно не [Select_CString(secondary_recipient.IsFemale, 'чувствовала', 'чувствовал' )] того же. Мне сказали, [secondary_recipient.GetSheHe] иногда [Select_CString(secondary_recipient.IsFemale, 'казалась скучающей', 'казался скучающим')], а иногда [Select_CString(secondary_recipient.IsFemale, 'обиженной', 'обиженным' )]. Ситуация не улучшалась по мере того, как день шел."
 lmf_interaction.1328.desc.secact.start: "[secondary_recipient.GetFirstNameNoTooltip], казалось, сначала [Select_CString(secondary_recipient.IsFemale, 'была полна', 'был полон' )] энтузиазма. "
 lmf_interaction.1328.desc.secact.hunting: "Они выехали из владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где [secondary_recipient.GetFirstNameNoTooltip], по сообщениям, [Select_CString(secondary_recipient.IsFemale, 'старалась', 'старался' )] изо всех сил очаровать [secondary_actor.GetHerHis] своими разговорными навыками. Действительно, [secondary_recipient.GetSheHe] так [Select_CString(secondary_recipient.IsFemale, 'отвлекала', 'отвлекал' )] [secondary_actor.GetHerHis], что охота почти не велась. Ясно, что [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была очарована', 'был очарован' )]."
 lmf_interaction.1328.desc.secact.hike: "Они отправились в поход по тропам возле владения [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'задавала', 'задавал' )] неторопливый темп и, по слухам, [Select_CString(secondary_actor.IsFemale, 'была', 'был' )] очень [Select_CString(secondary_actor.IsFemale, 'внимательна', 'внимателен' )]. [secondary_recipient.GetFirstNameNoTooltip], похоже, [Select_CString(secondary_recipient.IsFemale, 'была очарована', 'был очарован' )] [Select_CString(secondary_actor.IsFemale, 'ей', 'им' )] с самого начала, всячески стараясь произвести впечатление на н[secondary_actor.GetHerHis]."
 lmf_interaction.1328.desc.secact.garrison: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'привела', 'привёл' )] [secondary_recipient.GetHerHis] в гарнизон [actor.Custom('FortifiedBuilding_RU_Gen')], где [secondary_actor.GetSheHe] и [secondary_actor.GetHerHis] [actor.Custom('KnightCulturePluralNoTooltipLowercase')] участвовали в напряжённых поединках. [secondary_recipient.GetFirstNameNoTooltip] явно [Select_CString(secondary_recipient.IsFemale, 'впечатлилась', 'впечатлился' )] этим, [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] в восторге от [Select_CString(secondary_actor.IsFemale, 'неё', 'него')] после каждого поединка."
 lmf_interaction.1328.desc.secact.seduction: "Они бродили по территории [actor.Custom('FortifiedBuilding_RU_Gen')], где [secondary_actor.GetFirstNameNoTooltip], по общим отзывам, [Select_CString(secondary_actor.IsFemale, 'вела', 'вёл' )] себя с [Select_CString(secondary_recipient.IsFemale, 'ней', 'ним' )] более чем неподобающе... по крайней мере, поначалу. [secondary_actor.GetSheHe|U] [Select_CString(secondary_actor.IsFemale, 'стояла', 'стоял' )] слишком близко, [Select_CString(secondary_actor.IsFemale, 'была намекающей и сверхдружелюбной', 'был намекающим и сверхдружелюбным')], и [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'реагировала', 'реагировал' )] с явным энтузиазмом. К середине дня [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'была очарована', 'был очарован' )]."
 lmf_interaction.1328.desc.secact.poetry: "Они осматривали сады [actor.Custom('FortifiedBuilding_RU_Gen')], пока [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'развлекала', 'развлекал' )] [secondary_recipient.GetHerHis] отрывками из [secondary_actor.GetCulture.GetCollectiveNounNoTooltip|l]ой поэзии. [secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'реагировала', 'реагировал' )] с явным энтузиазмом, и к середине дня, казалось, [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] полностью [Select_CString(secondary_recipient.IsFemale, 'очарована', 'очарован' )] [Select_CString(secondary_actor.IsFemale, 'ей', 'им' )]."
 lmf_interaction.1328.desc.secact.library: "Они осматривали библиотеку [actor.Custom('FortifiedBuilding_RU_Gen')], и [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'показывала', 'показывал' )] [secondary_recipient.GetHerHim] самые любимые из своих многих томов. [secondary_recipient.GetSheHe|U] [Select_CString(secondary_recipient.IsFemale, 'была', 'был' )] в восторге, и, судя по тому, как [secondary_recipient.GetSheHe] без умолку [Select_CString(secondary_recipient.IsFemale, 'болтала', 'болтал' )], было ясно, что [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'очарована', 'очарован' )] [Select_CString(secondary_actor.IsFemale, 'ей', 'им' )]."
 lmf_interaction.1328.desc.secact.church: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'привела', 'привёл' )] [secondary_recipient.GetHerHis] в [actor.GetFaith.HouseOfWorship|l] во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где они слушали проповеди. Это, по-видимому, привело [secondary_recipient.GetHerHis] в восторг, и по [secondary_recipient.GetHerHis] бесконечной болтовне было ясно, что [secondary_recipient.GetSheHe] [Select_CString(secondary_recipient.IsFemale, 'очарована', 'очарован' )]."
 lmf_interaction.1328.desc.secact.tavern: "[secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'сделала', 'сделал' )] странный выбор, приведя [secondary_recipient.GetHerHis] в таверну во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], где [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'пыталась', 'пытался' )] развеселить [secondary_recipient.GetHerHis]. [secondary_recipient.GetSheHe|U], по общим отзывам, [Select_CString(secondary_recipient.IsFemale, 'реагировала', 'реагировал' )] с энтузиазмом, много [Select_CString(secondary_recipient.IsFemale, 'пила и осыпала', 'пил и осыпал')] [secondary_actor.GetHerHis] знаками внимания при каждом удобном случае."
 lmf_interaction.1328.desc.secact.poor: "Они провели день, раздавая милостыню беднякам перед храмом во владении [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [secondary_recipient.GetFirstNameNoTooltip] явно [Select_CString(secondary_recipient.IsFemale, 'была очарована', 'был очарован' )], изо всех сил стараясь впечатлить [secondary_actor.GetHerHis] своей щедростью."
 lmf_interaction.1328.desc.secact.tour: "Они осмотрели [actor.Custom('FortifiedBuilding')] и окрестные земли, [secondary_actor.GetFirstNameNoTooltip] с большим интересом и деталями [Select_CString(secondary_actor.IsFemale, 'объясняла', 'объяснял' )] [secondary_recipient.GetHerHim] историю. [secondary_recipient.GetSheHe|U] явно [Select_CString(secondary_recipient.IsFemale, 'наслаждалась', 'наслаждался' )] вниманием и изо всех сил [Select_CString(secondary_recipient.IsFemale, 'старалась', 'старался' )] впечатлить [secondary_actor.GetHerHis] при каждом удобном случае."
 lmf_interaction.1328.desc.secact.garden: "Они бродили по садам [actor.Custom('FortifiedBuilding_RU_Gen')], ведя разговор, который, по общим отзывам, был довольно односторонним. [secondary_recipient.GetFirstNameNoTooltip] [Select_CString(secondary_recipient.IsFemale, 'стремилась', 'стремился' )] впечатлить [secondary_actor.GetHerHis] и изо всех сил [Select_CString(secondary_recipient.IsFemale, 'старалась', 'старался' )] очаровать [secondary_actor.GetHerHis]... и явно [Select_CString(secondary_recipient.IsFemale, 'считала', 'считал' )], что [secondary_recipient.GetSheHe] преуспевает в этом."
 lmf_interaction.1328.desc.secact.hated: "\n\n[secondary_actor.GetFirstNameNoTooltip], однако, явно не [Select_CString(secondary_actor.IsFemale, 'разделяла', 'разделял' )] этих чувств. Мне говорили, что [secondary_actor.GetSheHe] временами [Select_CString(secondary_actor.IsFemale, 'казалась скучающей', 'казался скучающим' )] из-за н[secondary_recipient.GetHerHis], а порой [Select_CString(secondary_actor.IsFemale, 'испытывала', 'испытывал' )] неприязнь к н[secondary_recipient.GetHerHim]. Ситуация не улучшилась с течением дня."
 lmf_interaction.1328.desc.secact.loved: "\n\nНесмотря на [secondary_recipient.GetHerHis] явное удовольствие от такого занятия, как [secondary_actor.Custom('lmf_intro_activity_short')], было ясно, что [secondary_actor.GetSheHe] не [Select_CString(secondary_actor.IsFemale, 'разделяла', 'разделял' )] этих чувств. [secondary_actor.GetSheHe|U] постепенно [Select_CString(secondary_actor.IsFemale, 'начала', 'начал' )] скучать от [Select_CString(secondary_recipient.IsFemale, 'неё', 'него' )] по мере того, как шёл день, и это переросло в неприязнь."
 lmf_interaction.1328.desc.secact.neutral: "\n\n[secondary_actor.GetFirstNameNoTooltip], однако, явно не [Select_CString(secondary_actor.IsFemale, 'разделяла', 'разделял' )] этих чувств. Мне говорили, что [secondary_actor.GetSheHe] временами [Select_CString(secondary_actor.IsFemale, 'казалась скучающей', 'казался скучающим' )] из-за н[secondary_recipient.GetHerHis], а порой [Select_CString(secondary_actor.IsFemale, 'испытывала', 'испытывал' )] неприязнь. Ситуация не улучшилась с течением дня."
 lmf_interaction.1328.desc.rival: " Временами казалось, что они совершенно ненавидят друг друга. [secondary_recipient.GetTitledFirstNameNoTooltip] в какой-то момент [Select_CString(secondary_recipient.IsFemale, 'споткнулась', 'споткнулся' )] о камень, и [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'рассмеялась', 'рассмеялся' )] — [Select_CString(secondary_actor.IsFemale, 'рассмеялась', 'рассмеялся' )]! Это лишь разозлило [secondary_recipient.GetHerHis]."
 lmf_interaction.1328.desc.end: "\n\nК тому времени, как зашло солнце, уже было ясно, что они не пара."
 lmf_interaction.1328.a: "Мы все равно продолжим подготовку к такому союзу, как [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]."
 lmf_interaction.1328.b: "Немедленно отменить приготовления."
 lmf_interaction.1328.c: "[secondary_recipient.GetSheHe|U] уже направляется к выходу..."

