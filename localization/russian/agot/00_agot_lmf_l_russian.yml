 lmf_interaction.1202.opening: "[recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U],"
 lmf_interaction.1202.start: "Я [Select_CString(recipient.IsFemale, 'обдумала', 'обдумал' )] ваше требование и [Select_CString(recipient.IsFemale, 'решила', 'решил' )], что, несмотря на "
 lmf_interaction.1202.adulterer: "иронию того, что именно вы поучаете меня добродетели, "
 lmf_interaction.1202.soulmate: "мою веру в то, что [family_lover.GetSheHe] — моя судьба, "
 lmf_interaction.1202.angry: "моё возмущение вашим вмешательством, "
 lmf_interaction.1202.open: "уже известность наших отношений, "
 lmf_interaction.1202.default: "мою любовь к н[family_lover.GetHerHim], "
 lmf_interaction.1202.end: "я выполню вашу просьбу.\n\nЕсли вы считаете, что [family_lover.GetTitledFirstNameNoTooltip] - мне не пара, и разрыв с [Select_CString(family_lover.IsFemale, 'ней', 'ним' )] пойдёт мне во благо, я немедленно покончу с этим."
 lmf_interaction.1202.a: "Да, сделай это."
 lmf_interaction.1202.b: "Возможно, я преувеличиваю..."

 lmf_interaction.1203.start: "Я [Select_CString(recipient.IsFemale, 'обдумала', 'обдумал' )] ваше требование, но [Select_CString(recipient.IsFemale, 'решила', 'решил' )], что я и [family_lover.GetTitledFirstNameNoTooltip] не станем расставаться.\n\n"
 lmf_interaction.1203.adulterer: "Честно говоря, как вы смеете поучать меня добродетели? Это невероятно.\n\n"
 lmf_interaction.1203.soulmate: "[family_lover.GetSheHe|U] — моя судьба, и я люблю [family_lover.GetHerHis]. Расстаться с [Select_CString(family_lover.IsFemale, 'ней', 'ним' )] для меня всё равно что вырвать сердце.\n\n"
 lmf_interaction.1203.open: "Наша связь и так известна всем, какой ещё вред она может нанести моей репутации? Я даже [Select_CString(recipient.IsFemale, 'рада', 'рад' )] этому.\n\n"
 lmf_interaction.1203.default: "Простая правда: я люблю [family_lover.GetHerHis], и это главное.\n\n"
 lmf_interaction.1203.end.rival: "Ваша вера в то, что я приму ваше вмешательство, поражает."
 lmf_interaction.1203.end.malicious: "Если это разочарует вас, [recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], что ж. Мне всё равно."
 lmf_interaction.1203.end.dominant: "Если это разочарует вас — что ж. Моё решение окончательно."
 lmf_interaction.1203.end.submissive: "Мне искренне жаль, если это вас расстроило. Вы не представляете, как я [Select_CString(recipient.IsFemale, 'мучилась', 'мучился' )]."
 lmf_interaction.1203.end.default: "Простите, [recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], если это вас разочаровало."
 lmf_interaction.1203.a: "Возможно, подарки убедят тебя...?"
 lmf_interaction.1203.a.lover.tt: "Всё ещё нужно будет убедить персонажа [family_lover.GetTitledFirstNameNoTooltip]..."
 lmf_interaction.1203.b: "Тогда я и [family_lover.GetTitledFirstNameNoTooltip] поговорим лично."
 lmf_interaction.1203.c: "Неповиновение будет наказано!"
 lmf_interaction.1203.d: "Хорошо. Я оставлю всё как есть."

 lmf_interaction.1204.opening: "[family_lover.Custom2('GreetingToForeignRulerPositive', ROOT.Char )],"
 lmf_interaction.1204.secret: "Итак, вы знаете о моих отношениях, в которых [Select_CString(recipient.IsFemale, 'замешана ваша', 'замешан ваш' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]?\n\n"
 lmf_interaction.1204.open: "Правду говоря, с тех пор как мои отношения, в которых [Select_CString(recipient.IsFemale, 'замешана ваша', 'замешан ваш' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))], стали известны, я [Select_CString(family_lover.IsFemale, 'ждала', 'ждал' )] этого дня.\n\n"
 lmf_interaction.1204.end: "Я долго [Select_CString(family_lover.IsFemale, 'размышляла', 'размышлял' )]. [recipient.GetTitledFirstNameNoTooltip] [Select_CString(recipient.IsFemale, 'дорога', 'дорог' )] мне... и вам, видимо, тоже, раз просите такой жертвы. Поэтому, несмотря на сомнения, если вы этого хотите — я повинуюсь и немедленно расстанусь с [Select_CString(recipient.IsFemale, 'ней', 'ним' )]."

 lmf_interaction.1205.opening: "[family_lover.Custom2('GreetingToForeignRuler', ROOT.Char )],"
 lmf_interaction.1205.start: "Я знаю, [Select_CString(recipient.IsFemale, 'ваша', 'ваш' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))] [Select_CString(recipient.IsFemale, 'дорога', 'дорог' )] вам. Я и [recipient.GetFirstNameNoTooltip] заботимся друг о друге. Поэтому я не могу просто бросить [recipient.GetHerHis] по вашему приказу.\n\n"
 lmf_interaction.1205.end.rival: "Если это вас злит — отлично. Вы заслужили это за вмешательство в отношения, которые поддерживает [Select_CString(recipient.IsFemale, 'ваша', 'ваш' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]."
 lmf_interaction.1205.end.malicious: "[recipient.GetFirstNameNoTooltip] [Select_CString(recipient.IsFemale, 'говорила', 'говорил' )], что вы [Select_CString(ROOT.Char.IsFemale, 'назойливая', 'назойливый' )] [recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )], и [Select_CString(recipient.IsFemale, 'оказалась права', 'оказался прав' )]."
 lmf_interaction.1205.end.dominant: "Если это вас злит — что ж, но так решили я и [recipient.GetFirstNameNoTooltip]."
 lmf_interaction.1205.end.submissive: "Искренне сожалею, если это вас расстроило, [Select_CString(ROOT.Char.IsFemale, 'миледи', 'милорд' )]. Вы не представляете, как я [Select_CString(family_lover.IsFemale, 'мучилась', 'мучился' )]."
 lmf_interaction.1205.end.benevolent: "Искренне сожалею, если это вас расстроило, но такое решение [Select_CString(recipient.IsFemale, 'должна', 'должен' )] сделать [recipient.GetFirstNameNoTooltip], а не другие."
 lmf_interaction.1205.end.default: "Если моё решение расстроило вас, [Select_CString(ROOT.Char.IsFemale, 'миледи', 'милорд' )], мне искренне жаль, но иначе нельзя."
 lmf_interaction.1205.a: "Что потребуется, чтобы ты [Select_CString(family_lover.IsFemale, 'ушла', 'ушёл' )]?"
 lmf_interaction.1205.b: "Тогда я [Select_CString(recipient.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))] должны поговорить лично."

 lmf_interaction.1206.start: "Я [Select_CString(recipient.IsFemale, 'обдумала', 'обдумал' )] ваше требование и [Select_CString(recipient.IsFemale, 'решила', 'решил' )], что, несмотря на "
 lmf_interaction.1206.adulterer: "иронию того, что именно вы поучаете меня добродетели, "
 lmf_interaction.1206.angry: "моё возмущение вашим вмешательством, "
 lmf_interaction.1206.default: "наглость требования прекратить ВСЕ мои связи, "
 lmf_interaction.1206.end: "я выполню его.\n\nЕсли вы считаете разрыв с любовниками во благо — доверюсь вашим причинам и немедленно покончу с этим."

 lmf_interaction.1207.start: "Я [Select_CString(recipient.IsFemale, 'обдумала', 'обдумал' )] ваше требование, но [Select_CString(recipient.IsFemale, 'решила', 'решил' )] не бросать любовников просто по вашему желанию.\n\n"
 lmf_interaction.1207.adulterer: "Честно говоря, как такой человек, как вы, смеет поучать меня добродетели? Это невероятно.\n\n"
 lmf_interaction.1207.default: "Каждый занимает место в моём сердце и постели — таково мое право.\n\n"
 lmf_interaction.1207.end.rival: "Ваша вера в то, что я приму ваше вмешательство, поражает." 
 lmf_interaction.1207.end.malicious: "Если это разочарует вас, [recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], что ж. Мне всё равно."
 lmf_interaction.1207.end.dominant: "Если это разочарует вас — что ж. Это моя жизнь и моё решение."
 lmf_interaction.1207.end.submissive: "Мне искренне жаль, если это вас расстроило. Я бы [Select_CString(recipient.IsFemale, 'предпочла', 'предпочёл' )] иное, но [Select_CString(recipient.IsFemale, 'должна', 'должен' )] жить своей жизнью."
 lmf_interaction.1207.end.default: "Простите, [recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], если это вас разочаровало."

 lmf_interaction.1208.desc: "Хорошо.\n\nЯ и [family_lover.GetFirstNameNoTooltip] обсудили всё и, если вы этого требуете... готовы пожениться и благословить наш союз перед ликом [recipient.GetFaith.FertilityGodNamePossessive]."
 lmf_interaction.1208.a: "[Select_CString(recipient.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))] получит выгоду от этого брака."
 lmf_interaction.1208.b: "[family_lover.GetTitledFirstNameNoTooltip] получит выгоду от этого брака."
 lmf_interaction.1208.c: "С другой стороны, нет..."
 lmf_interaction.1208.tt: "[recipient.GetFirstNameNoTooltip] и [family_lover.GetTitledFirstNameNoTooltip] прекратят все любовные связи кроме друг с другом"

 lmf_interaction.1209.start: "Вы хотите, чтобы я и [family_lover.GetTitledFirstNameNoTooltip] вступили в брак? Вы с ума сошли?!\n\n[family_lover.GetWomanMan] — [Select_CString(recipient.IsFemale, 'моя любовница', 'мой любовник' )], но мне не [Select_CString(family_lover.IsFemale, 'нужна', 'нужен' )] [family_lover.GetWifeHusband]! "
 lmf_interaction.1209.open: "Если вы беспокоитесь о моей репутации — напрасно. Как вам известно, ущерб уже нанесён.\n\n"
 lmf_interaction.1209.secret: "Благодарю за заботу о моей репутации, но пока вы не собираетесь разглашать нашу тайну — я рискну.\n\n"
 lmf_interaction.1209.a: "Тогда немедленно прекратите эту связь."

 lmf_interaction.1210.desc: "Хорошо.\n\n[recipient.GetFirstNameNoTooltip] и я обсудили ситуацию, и если это ваше требование... Я [Select_CString(family_lover.IsFemale, 'готова', 'готова' )] к тому, чтобы [Select_CString(recipient.IsFemale, 'ваша', 'ваш' )] [ROOT.Char.GetRelation('LMF_RelationToMeShort', SCOPE.sC('recipient'))] [Select_CString(recipient.IsFemale, 'стала моей женой', 'стал моим мужем' )], и [family_lover.GetFaith.FertilityGodName] благословит наш союз."

 lmf_interaction.1211.start: "Вы хотите, чтобы я и [Select_CString(recipient.IsFemale, 'ваша', 'ваш' )] [ROOT.Char.GetRelation('LMF_RelationToMeShort', SCOPE.sC('recipient'))] вступили в брак? Вы с ума сошли?!\n\nЯ понимаю вашу заботу о репутации, которую поддерживает [recipient.GetFirstNameNoTooltip], но мне определённо не [Select_CString(recipient.IsFemale, 'нужна такая', 'нужен такой' )] [recipient.GetWifeHusband]!\n\n"
 lmf_interaction.1211.end.rival: "Если это вас расстраивает, тем лучше. Вы заслужили это за то, что вмешиваетесь, куда вас не просят."
 lmf_interaction.1211.end.malicious: "В следующий раз подумайте получше, прежде чем выдвигать такие нелепые требования."
 lmf_interaction.1211.end.dominant: "Я знаю, это решение может вас расстроить, и пусть. Если я и [recipient.GetFirstNameNoTooltip] вступим в брак, это будет наше решение, а не ваше."
 lmf_interaction.1211.end.submissive: "Если бы существовал другой способ, [Select_CString(ROOT.Char.IsFemale, 'миледи', 'милорд' )], но это невозможно. Прошу прощения."
 lmf_interaction.1211.end.benevolent: "Мне искренне жаль, если это вас расстраивает, но это решение можем принять только [recipient.GetFirstNameNoTooltip] и я."
 lmf_interaction.1211.end.default: "Если моё решение огорчает вас, [Select_CString(ROOT.Char.IsFemale, 'миледи', 'милорд' )], то мне жаль."

 lmf_interaction.1212.desc: "Ладно, раз вы настаиваете, я [family_lover.GetTitledFirstNameNoTooltip] вступим в брак.\n\nВам придётся убедить [family_lover.GetHerHis] согласиться с вашим планом, но не ждите от меня в этом помощи."
 lmf_interaction.1212.a: "Посмотрим, что [family_lover.GetSheHe]скажет ..."

