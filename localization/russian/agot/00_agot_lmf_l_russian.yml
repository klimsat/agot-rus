 intro_betrothal_notification_actor_personal: "С вашего позволения, я [Select_CString(actor.IsFemale, 'хотела', 'хотел' )] бы, чтобы я и [Select_CString(secondary_recipient.IsFemale, 'ваша', 'ваш' )] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.Custom('ComplimentAdjective')] [secondary_recipient.GetShortUIName], встретились. Я приглашаю [secondary_recipient.GetHerHis] посетить меня здесь, во владении [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], и, если мы оба будем согласны к концу [secondary_recipient.GetHerHis] визита, обсудить возможность помолвки между нами."
 intro_betrothal_notification_recipient_personal: "Я приглашаю вас приехать во владение [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], чтобы вы и [Select_Cstring(secondary_actor.IsFemale, 'моя', 'мой' )] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))], [secondary_actor.Custom('ComplimentAdjective')] [secondary_actor.GetShortUIName], могли встретиться в интересах помолвки между вами... если, конечно, вы оба будете согласны к концу визита."
 intro_betrothal_notification: "Я хочу, чтобы [Select_CString(secondary_recipient.IsFemale, 'ваша', 'ваш' )] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetShortUIName], [Select_CString(secondary_recipient.IsFemale, 'приехала', 'приехал' )] сюда, во владение [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], чтобы [Select_CString(secondary_recipient.IsFemale, 'она', 'он' )] и [Select_Cstring(secondary_actor.IsFemale, 'моя', 'мой' )] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))] [secondary_actor.GetShortUIName] могли встретиться. Если они понравятся друг другу, я предлагаю обсудить возможность их помолвки."

 ai_ruler_marry_decision: "Время для брака"
 ai_ruler_marry_decision_desc: "Наши поиски второй половинки должны ускориться. Пришло время."
 ai_ruler_marry_decision_effect_tooltip: "Начнётся поиск подходящей второй половинки"
 ai_ruler_marry_decision_confirm: "Начать поиски"
 ai_ruler_reduce_stress_army_decision: "Снизить стресс в армии"
 ai_ruler_reduce_stress_army_decision_desc: "Это решение снизит стресс у вас или члена вашей семьи, когда они находятся в армии и сильно напряжены"
 ai_ruler_reduce_stress_army_decision_effect_tooltip: "Персонаж с самым высоким уровнем стресса получит событие"
 ai_ruler_reduce_stress_army_decision_confirm: "Продолжить"

 game_rule_category_lmf: "@lmf_icon! Love Marriage Family"
 rule_lmf_scheming_courtiers: "@lmf_icon! Придворные-интриганы"
 setting_lmf_scheming_courtiers_ai_frequent: "Включая ИИ"
 setting_lmf_scheming_courtiers_ai_frequent_desc: "Большие дворы ИИ также будут участвовать в происках побега, соблазнения и ухаживания. #X Может сильно нагружать производительность! #! "
 setting_lmf_scheming_courtiers_ai_infrequent: "Включая ИИ - Редко"
 setting_lmf_scheming_courtiers_ai_infrequent_desc: "Большие дворы ИИ также будут участвовать в происках побега, соблазнения и ухаживания, но проверяются гораздо реже (в целях повышения производительности)."
 setting_lmf_scheming_courtiers_player_realm_only: "Только держава игрока"
 setting_lmf_scheming_courtiers_player_realm_only_desc: "Придворные в державе игрока будут участвовать в происках побега, соблазнения и ухаживания."
 setting_lmf_scheming_courtiers_player_realm_infrequent: "Держава игрока - Редко"
 setting_lmf_scheming_courtiers_player_realm_infrequent_desc: "Придворные в державе игрока будут участвовать в происках побега, соблазнения и ухаживания, но проверка происходит гораздо реже (в целях повышения производительности)."
 setting_lmf_scheming_courtiers_disabled: "Отключено"
 setting_lmf_scheming_courtiers_disabled_desc: "Придворные не участвуют в происках побега, соблазнения и ухаживания, за исключением существующих событий."
 rule_lmf_courtier_marriage_proposals: "@lmf_icon! Браки придворных"
 setting_lmf_courtier_marriage_ai_frequent: "Включая ИИ"
 setting_lmf_courtier_marriage_ai_frequent_desc: "Придворные в больших дворах ИИ также будут самостоятельно предлагать брак другим придворным. #X Может сильно нагружать производительность! #! "
 setting_lmf_courtier_marriage_ai_infrequent: "Включая ИИ - Редко"
 setting_lmf_courtier_marriage_ai_infrequent_desc: "Придворные в больших дворах ИИ также будут самостоятельно предлагать брак другим придворным, но проверяются гораздо реже (в целях повышения производительности)."
 setting_lmf_courtier_marriage_player_realm_only: "Только держава игрока"
 setting_lmf_courtier_marriage_player_realm_only_desc: "Придворные в державе игрока будут самостоятельно предлагать брак другим придворным и просить разрешения на брак."
 setting_lmf_courtier_marriage_player_realm_infrequent: "Держава игрока - Редко"
 setting_lmf_courtier_marriage_player_realm_infrequent_desc: "Придворные в державе игрока будут самостоятельно предлагать брак другим придворным, но проверка происходит гораздо реже (в целях повышения производительности)."
 setting_lmf_courtier_marriage_disabled: "Отключено"
 setting_lmf_courtier_marriage_disabled_desc: "Придворные не будут предлагать брак другим придворным, за исключением существующих событий."
 rule_lmf_introductions: "@lmf_icon! Знакомства для брака"
 setting_lmf_no_introductions: "Отключено"
 setting_lmf_no_introductions_desc: "Система знакомств для брака отключена."
 setting_lmf_normal_introductions: "Разрешено"
 setting_lmf_normal_introductions_desc: "Кандидаты на вступление в брак могут быть представлены друг другу, чтобы узнать, захотят ли они обручиться."
 rule_lmf_additional_maidens: "@lmf_icon! Дополнительные девы"
 setting_lmf_yes_additional_maidens: "Полный"
 setting_lmf_yes_additional_maidens_desc: "Девы добавляются в начале игры и через решение, используя новые и все существующие династии. #X Может вызвать несвязанные записи в вашем династическом древе! #!"
 setting_lmf_non_dynasty_additional_maidens: "Кроме династии игрока"
 setting_lmf_non_dynasty_additional_maidens_desc: "Девы добавляются в начале игры и через решение. Они используют новые и существующие династии, но никогда династию игрока."
 setting_lmf_restricted_additional_maidens: "Кроме существующих династий"
 setting_lmf_restricted_additional_maidens_desc: "Девы добавляются в начале игры и через решение. Они используют только новые династии и династии существующих персонажей из списка."
 setting_lmf_player_only_additional_maidens: "Только игрок"
 setting_lmf_player_only_additional_maidens_desc: "Девы добавляются в начале игры, но после этого только через решение, которое может использовать только игрок. Новые девы никогда не используют династию игрока."
 setting_lmf_no_additional_maidens: "Отключено"
 setting_lmf_no_additional_maidens_desc: "Девы не будут добавляться в начале игры (при условии, что это правило установлено в начале игры), и нет решения для добавления новых."
 rule_lmf_disinheritance_change: "@lmf_icon! Лишение наследства"
 setting_lmf_yes_disinheritance_change: "Полное изменение"
 setting_lmf_yes_disinheritance_change_desc: "Лишённый наследства персонаж получает претензии на все титулы, наследником которых он был. По достижении совершеннолетия он может потребовать восстановления своего наследства."
 setting_lmf_no_claim_disinheritance_change: "Частичное изменение"
 setting_lmf_no_claim_disinheritance_change_desc: "Лишённый наследства персонаж всё ещё может потребовать восстановления своего наследства, но не получает мгновенных претензий на какие-либо титулы."
 setting_lmf_no_disinheritance_change: "Без изменений"
 setting_lmf_no_disinheritance_change_desc: "Лишение наследства работает так же, как в оригинальной CK3."
 rule_lmf_family_feasts: "@lmf_icon! Семейные пиры"
 setting_lmf_normal_family_feasts: "Обычно"
 setting_lmf_normal_family_feasts_desc: "У игрока будет случайное событие семейного пира в среднем каждые два года, при условии, что он не занят чем-то другим."
 setting_lmf_less_frequent_family_feasts: "Реже"
 setting_lmf_less_frequent_family_feasts_desc: "У игрока будет случайное событие семейного пира с половиной обычной частоты, при условии, что он не занят чем-то другим."
 setting_lmf_no_family_feasts: "Отключено"
 setting_lmf_no_family_feasts_desc: "События семейных пиров полностью отключены."
 rule_lmf_heir_training: "@lmf_icon! Обучение наследника"
 setting_lmf_more_frequent_heir_events: "Более частые события"
 setting_lmf_more_frequent_heir_events_desc: "Ваш [Concept('player_heir', 'наследник')|E] получает обучение как при «Обычном обучении наследника», но случайные события будут появляться гораздо чаще."
 setting_lmf_normal_heir_training: "Обычные события"
 setting_lmf_normal_heir_training_desc: "Ваш [Concept('player_heir', 'наследник')|E] получает обучение, дающее ему свойства, которые развиваются со временем, и случайные события, которые появляются с 12 лет."
 setting_lmf_less_frequent_heir_events: "Менее частые события"
 setting_lmf_less_frequent_heir_events_desc: "Ваш [Concept('player_heir', 'наследник')|E] будет получать события и свойства обучения наследника как обычно, но случайные события будут появляться реже."
 setting_lmf_no_heir_events: "Только обучение"
 setting_lmf_no_heir_events_desc: "Ваш [Concept('player_heir', 'наследник')|E] будет получать обучение и связанные с ним свойства, но вы не будете получать случайных событий по обучению наследника."
 setting_lmf_no_heir_training: "Отключено"
 setting_lmf_no_heir_training_desc: "Полностью отключает систему обучения наследника. Свойства не появятся, и случайных событий не будет."
 rule_lmf_army_events: "@lmf_icon! Армейские события"
 setting_lmf_player_only_army_events: "Только игрок"
 setting_lmf_player_only_army_events_desc: "Рыцари и командиры в армиях игрока будут получать армейские события, находясь в поле."
 setting_lmf_player_realm_army_events: "Только держава игрока"
 setting_lmf_player_realm_army_events_desc: "Рыцари и командиры в державе игрока (любой персонаж с рангом герцога или выше) будут получать армейские события, находясь в поле."
 setting_lmf_independent_ruler_army_events: "Только независимые державы"
 setting_lmf_independent_ruler_army_events_desc: "Рыцари и командиры любого независимого правителя (с рангом герцога или выше) будут получать армейские события, находясь в поле. #X Может сильно нагружать производительность! #!"
 setting_lmf_no_army_events: "Отключено"
 setting_lmf_no_army_events_desc: "Никто не будет получать армейских событий."
 rule_lmf_player_marriage_modifiers: "@lmf_icon! Модификаторы брака игрока"
 setting_lmf_all_marriage_modifiers: "Все модификаторы"
 setting_lmf_all_marriage_modifiers_desc: "Игрок испытывает те же бонусы и ограничения для предложений брака, что и ИИ."
 setting_lmf_fewer_marriage_modifiers: "Меньше модификаторов"
 setting_lmf_fewer_marriage_modifiers_desc: "Большинство добавленных LMF ограничений на предложения брака, за исключением тех, что специально нацелены на возраст и фертильность, не будут применяться к предложениям игрока."
 setting_lmf_easy_marriage_modifiers: "Упрощённый брак"
 setting_lmf_easy_marriage_modifiers_desc: "В дополнение к эффектам правила «Меньше модификаторов», все предложения брака от игрока получат +200 к принятию (эквивалент сильного влияния)."
 rule_lmf_birth_fertility_modifiers: "@lmf_icon! Рождение и фертильность"
 setting_lmf_all_birth_fertility_modifiers: "Все модификаторы"
 setting_lmf_all_birth_fertility_modifiers_desc: "LMF увеличивает осложнения при родах и добавляет модификаторы, которые могут снизить фертильность после рождения нескольких детей."
 setting_lmf_all_birth_fertility_modifiers_ai_only: "Все модификаторы - Только ИИ"
 setting_lmf_all_birth_fertility_modifiers_ai_only_desc: "Модификаторы LMF применяются как обычно, но модификаторы фертильности, которые могут возникнуть после родов, никогда не применяются к игроку или его ближайшей семье."
 setting_lmf_reduce_birth_fertility_modifiers: "Меньше модификаторов"
 setting_lmf_reduce_birth_fertility_modifiers_desc: "Шанс применения модификаторов фертильности после родов будет значительно снижен."
 setting_lmf_reduce_birth_fertility_modifiers_ai_only: "Меньше модификаторов - Только ИИ"
 setting_lmf_reduce_birth_fertility_modifiers_ai_only_desc: "Шанс применения модификаторов фертильности после родов значительно снижен и полностью исключён для игрока или его близких родственников."
 setting_lmf_no_birth_fertility_modifiers: "Без новых модификаторов"
 setting_lmf_no_birth_fertility_modifiers_desc: "Любые изменения, применяемые LMF к фертильности или осложнениям при родах, будут удалены, хотя общее увеличение количества детей остаётся."
 rule_lmf_automatic_guardians: "@lmf_icon! Автоматические опекуны"
 setting_lmf_automatic_guardians_active: "Включено"
 setting_lmf_automatic_guardians_active_desc: "Детям, которые не являются близкими родственниками хозяина двора, будет назначен лучший доступный опекун для их типа образования."
 setting_lmf_automatic_guardians_inactive: "Отключено"
 setting_lmf_automatic_guardians_inactive_desc: "Опекуны никогда не будут назначаться автоматически."
 rule_lmf_lover_event_eligibility: "@lmf_icon! Доступность событий любовников"
 setting_lmf_lover_event_eligibility_all: "Все"
 setting_lmf_lover_event_eligibility_all_desc: "Все игроки и правители ИИ ранга герцога или выше будут получать события любовников/родственных душ. Все остальные персонажи ИИ получают упрощённые версии. #X Может сильно нагружать производительность! #! "
 setting_lmf_lover_event_eligibility_tier: "Держава игрока + высокий ранг"
 setting_lmf_lover_event_eligibility_tier_desc: "Только игроки и правители ИИ ранга герцога или выше будут получать события любовников/родственных душ. Другие персонажи ИИ в державе игрока будут получать упрощённые версии. #X Может сильно нагружать производительность! #! "
 setting_lmf_lover_event_eligibility_player_realm: "Только держава игрока"
 setting_lmf_lover_event_eligibility_player_realm_desc: "Только игроки и правители ИИ в их державе ранга герцога или выше будут получать события любовников/родственных душ. Другие персонажи ИИ в их державе получают упрощённые версии."
 setting_lmf_lover_event_eligibility_player_only: "Только игрок"
 setting_lmf_lover_event_eligibility_player_only_desc: "Только игроки будут получать события любовников/родственных душ."
 rule_lmf_lover_event_frequency: "@lmf_icon! Частота событий любовников"
 setting_lmf_lover_event_frequency_none: "Никогда"
 setting_lmf_lover_event_frequency_none_desc: "Система событий любовников/родственных душ будет полностью отключена, а настройка «Доступность событий любовников» будет игнорироваться."
 setting_lmf_lover_event_frequency_less: "Реже"
 setting_lmf_lover_event_frequency_less_desc: "События любовников/родственных душ будут происходить реже для всех подходящих персонажей."
 setting_lmf_lover_event_frequency_default: "По умолчанию"
 setting_lmf_lover_event_frequency_default_desc: "Стандартная частота событий любовников/родственных душ для всех подходящих персонажей."
 setting_lmf_lover_event_frequency_more: "Чаще"
 setting_lmf_lover_event_frequency_more_desc: "События любовников/родственных душ будут происходить чаще для всех подходящих персонажей."
 rule_lmf_spouse_event_frequency: "@lmf_icon! Частота супружеских событий"
 setting_lmf_spouse_event_frequency_none: "Никогда"
 setting_lmf_spouse_event_frequency_none_desc: "Система событий для основных супругов будет полностью отключена."
 setting_lmf_spouse_event_frequency_less: "Реже"
 setting_lmf_spouse_event_frequency_less_desc: "События для основных супругов будут происходить реже, в среднем примерно раз в 5 лет."
 setting_lmf_spouse_event_frequency_default: "По умолчанию"
 setting_lmf_spouse_event_frequency_default_desc: "События для основных супругов будут происходить с обычной частотой, в среднем примерно раз в 3 года."
 setting_lmf_spouse_event_frequency_more: "Чаще"
 setting_lmf_spouse_event_frequency_more_desc: "События для основных супругов будут происходить чаще, в среднем примерно раз в 2 года."

 agot_court_ongoing.court_start_song.intro.0503.relative.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашёл' )], классическую [target.GetCulture.GetCollectiveNounNoTooltip]ую балладу о любви, которую [target.GetFirstName] наверняка оценит! Я репетирую её снова и снова — всё должно быть идеально!\n\n[Select_CString(target.IsFemale, 'Моя', 'Мой' )] [owner.Custom2('LMF_RelationToMeShort', SCOPE.sC('target'))] прогуливается в садах владения [target_location.GetNameNoTooltip] в окружении своих друзей. С сердцем, бьющимся как молот, я опускаюсь перед [Select_CString(target.IsFemale, 'ней', 'ним' )] на колени и начинаю петь."
 agot_court_ongoing.court_start_song.success.0503.relative.desc: "\n\n[target.GetFirstNameNoTooltip] смущается, [target.GetHerHis] щёки становятся гранатово-красными, но [target.GetSheHe] не прерывает меня. [target.GetHerHis|U] спутники выглядят то восхищёнными, то завистливыми — это хороший знак!\n\n«У тебя прекрасный голос, [target.Custom2('LMF_RelationToMeShort', SCOPE.sC('owner'))]», — говорит [target.GetFirstNameNoTooltip], прежде чем поспешно удалиться. [target.GetHerHis|U] друзья тут же следуют за [Select_CString(target.IsFemale, 'ней', 'ним' )]. Я поднимаюсь на дрожащих ногах, наблюдая, как они исчезают среди кустов, моё сердце бьётся сильнее, чем когда-либо."
 agot_court_ongoing.court_start_sneaky_love_letter.success.spouse.0503.desc: "\n\nОжидание невыносимо. Мысль об отказе вызывает тошноту! Когда [target.GetHerHis] ответ наконец приходит, я дрожащими руками разрываю печать.\n\n«Твои слова прекрасны, [owner.Custom2('RelationToMeAddress', ROOT.Char)], и я [Select_CString(target.IsFemale, 'благодарна', 'благодарен' )] за них. Возможно, со временем узы нашего брака станут узами любви? Поживём — увидим. Искренне [Select_CString(target.IsFemale, 'твоя', 'твой' )], [target.GetFirstNameNoTooltip]»."
 agot_court_ongoing.court_start_sneaky_love_letter.success.relative.0503.desc: "\n\nОжидание невыносимо. Мысль об отказе вызывает тошноту! Когда [target.GetHerHis] ответ наконец приходит, я дрожащими руками разрываю печать.\n\n«Твои слова стали для меня неожиданностью, [owner.Custom2('RelationToMeAddress', ROOT.Char)], но признаю — они прекрасны. Я спрячу твоё письмо в тайном месте, чтобы перечитывать, когда пожелаю. [Select_CString(target.IsFemale, 'Твоя', 'Твой' )] [owner.Custom2('LMF_RelationToMeShort', SCOPE.sC('target'))], [target.GetFirstNameNoTooltip]»."
 agot_court_ongoing.public_regular_rejection.0503.desc: "[target.GetFirstNameNoTooltip] [Select_CString(target.IsFemale, 'отреагировала', 'отреагировал' )] совсем не так, как я [Select_CString(ROOT.Char.IsFemale, 'надеялась', 'надеялся' )]. «Прекрати это нелепое публичное представление, [ROOT.Char.Custom2('RelationToMeAddress', target)], и не позорь себя. Меня не интересуют твои ухаживания, и никогда не будут!»"
 agot_court_ongoing.written_regular_rejection.0503.desc: "\n\n[target.GetFirstNameNoTooltip] [Select_CString(target.IsFemale, 'ответила', 'ответил' )] быстро и недвусмысленно. «Я [Select_CString(target.IsFemale, 'получила', 'получил' )] твою записку, [ROOT.Char.Custom2('RelationToMeAddress', target)], если это действительно ты, а не чья-то злая шутка. Если это всё же ты, настоятельно требую немедленно прекратить эту глупую затею. У меня нет и никогда не будет романтического интереса к тебе»."

 agot_court_ongoing.1000.t: "$court_event_title$ Неловкий танец"
 agot_court_ongoing.1000.desc: "Во время светского мероприятия в [location.GetNameNoTooltip], пытаясь быть ближе к [Select_CString(target.IsFemale, 'ней', 'нему' )], музыканты заиграли весёлую мелодию, и начался танец. Я ищу взглядом объект своих чувств, но уже слишком поздно... [target.GetFirstNameNoTooltip] и [social_bore.GetTitledFirstNameNoTooltip] уже приступили к танцу. Похоже, не по своей воле, ведь [Select_CString(target.IsFemale, 'ей', 'ему')] не слишком нравится [social_bore.GetTitledFirstNameNoTooltip], да и [Select_CString(social_bore.IsFemale, 'она', 'он')] танцует ужасно, а [target.GetFirstNameNoTooltip] слишком [Select_CString(target.IsFemale, 'вежлива', 'вежлив')], чтобы прервать танец, хотя [Select_CString(target.IsFemale, 'она', 'он')] явно этого хочет.\n\n[target.GetFirstNameNoTooltip] смотрит на меня с другого конца зала, умоляя взглядом спасти [Select_CString(target.IsFemale, 'её', 'его')]."
 agot_court_ongoing.1000.a: "Попробовать изящно вмешаться."
 agot_court_ongoing.1000.a.success: "Вам удаётся вмешаться и потанцевать с персонажем [target.GetFirstNameNoTooltip]."
 agot_court_ongoing.1000.a.failure: "[social_bore.GetTitledFirstNameNoTooltip] отказывается и делает ситуацию ещё более неловкой."
 agot_court_ongoing.1000.b: "Пусть [target.GetFirstNameNoTooltip] разбирается [Select_CString(target.IsFemale, 'сама', 'сама' )]."

 agot_court_ongoing.1300.t: "$court_event_title$ Литературные вкусы"
 agot_court_ongoing.1300.desc: "Куда [Select_CString(target.IsFemale, 'подевалась', 'подевался' )] [target.GetFirstNameNoTooltip]? Я иду искать [target.GetHerHis] и нахожу [target.GetHerHis] в один солнечный день [Select_CString(target.IsFemale, 'читающей', 'читающим' )] во дворе владения [location.GetNameNoTooltip]. Подойдя ближе, я замечаю, что книга — это увесистый том, и [target.GetFirstNameNoTooltip], кажется, не получает от него большого удовольствия. Заметив меня, [target.GetSheHe] откладывает книгу и, подтверждая мои подозрения, долго жалуется на неё.\n\nС изогнутой бровью [target.GetSheHe] спрашивает, не могу ли я порекомендовать что-нибудь получше. Это столько же просьба, сколько и вызов, немедленно ставящий меня в тупик."
 agot_court_ongoing.1300.a: "Предложить что-то, что, по-моему, [target.GetSheHe] оценит."
 agot_court_ongoing.1300.a.success: "[target.GetSheHe|U] [Select_CString(target.IsFemale, 'оценила', 'оценил' )] книгу, которую вы порекомендовали!"
 agot_court_ongoing.1300.a.failure: "[target.GetSheHe|U] не [Select_CString(target.IsFemale, 'впечатлена', 'впечатлён' )] вашим выбором"
 agot_court_ongoing.1300.b: "Найти предлог и вместо этого попытаться сделать [target.GetHerHim] комплимент..."

 agot_court_ongoing.1310.t: "Тренировочный спарринг"
 agot_court_ongoing.1310.opening.martial: "Я спаррингую с солдатами во дворе, когда замечаю, что [target.GetTitledFirstNameNoTooltip] тоже упражняется неподалёку. "
 agot_court_ongoing.1310.opening: "Я прохожу через двор, когда замечаю, что [target.GetTitledFirstNameNoTooltip] упражняется с солдатами неподалёку. "
 agot_court_ongoing.1310.mid: "[target.GetSheHe|U] агрессивно нападает на своего противника, пот стекает по [target.GetHerHis] лбу, и [target.GetSheHe] выглядит весьма впечатляюще.\n\nЯ могу только предполагать, что [target.GetSheHe] ещё не [Select_CString(target.IsFemale, 'заметила', 'заметил' )] меня, но это ненадолго. Возможно, это мой шанс подобраться поближе? "
 agot_court_ongoing.1310.ending.martial: "Мы могли бы скрестить мечи, пока я впечатляю [target.GetHerHis] своей техникой, сблизиться в духе товарищества, может быть, даже позволить [target.GetHerHim] нанести несколько хороших ударов..."
 agot_court_ongoing.1310.ending.spectator: "Обычно я не увлекаюсь фехтованием, но я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы поболеть за н[target.GetHerHis]. Возможно, после спарринга даже будет возможность присоединиться к н[target.GetHerHim] и солдатам за выпивкой..."
 agot_court_ongoing.1310.ending: "Они бы не позволили [Select_CString(owner.IsFemale, 'женщине', 'мужчине' )] присоединиться к поединкам, но не могли бы отказать мне в возможности посмотреть. Возможно, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы даже сделать вид, что [target.GetTitledFirstNameNoTooltip] пользуется моей благосклонностью, полностью очаровав [target.GetHerHis] в процессе..."
 agot_court_ongoing.1310.a: "Присоединиться к спаррингу!"
 agot_court_ongoing.1310.b: "Болеть за н[target.GetHerHis] со стороны."
 agot_court_ongoing.1310.c: "Время включить обаяние!"
 agot_court_ongoing.1310.d: "Поспешно пройти мимо, пока [target.GetSheHe] меня не [Select_CString(target.IsFemale, 'заметила', 'заметил' )]..."
 agot_court_ongoing.1310.a.success: "[target.GetSheHe|U] [Select_CString(target.IsFemale, 'впечатлена', 'впечатлён' )] вашим мастерством"
 agot_court_ongoing.1310.a.failure: "Вы позоритесь в поединке"
 agot_court_ongoing.1310.b.success: "[target.GetSheHe|U] [Select_CString(target.IsFemale, 'покорена', 'покорён' )] вашим обаянием"
 agot_court_ongoing.1310.b.failure: "Становится немного неловко..."

 court_outcome.0003.d: "Я хочу вступить с [Select_CString(owner.IsFemale, 'ней', 'ним' )] в брак!"
 court_outcome.0003.e: "Я хочу быть с [Select_CString(owner.IsFemale, 'ней', 'ним' )], несмотря ни на что!"
 court_outcome.0003.e.them.elope.tt: "Если [owner.GetShortUIName|U] согласится, [owner.GetSheHe] начнёт происки, чтобы сбежать со мной и стать моей родственной душой"
 court_outcome.0003.e.me.elope.tt: "Если [owner.GetShortUIName|U] согласится, я начну происки, чтобы сбежать с [Select_CString(owner.IsFemale, 'ней', 'ним' )] и стать [owner.GetHerHis] родственной душой"
 court_outcome.0003.e.no.elope.tt: "Никто из нас не может начать происки побега, но, если [owner.GetShortUIName|U] согласится, будет дано обещание, и мы станем родственными душами"
 court_outcome.0003.d.propose.tt: "Если [owner.GetShortUIName|U] согласится, вы вступите с [Select_CString(owner.IsFemale, 'ней', 'ним' )] в брак и станете [owner.GetHerHis] родственной душой"
 # court_outcome.0003.a.tt Moved to Replace Folder
 court_outcome.0003.d.permission.tt: "Если [owner.GetShortUIName|U] согласится, вы станете [owner.GetHerHis] родственной душой и попросите разрешения вступить с [Select_CString(owner.IsFemale, 'ней', 'ним' )] в брак"
 agot_court_outcome.1001.c: "Пусть [owner.GetFaith.FertilityGodName] благословит наш союз!"
 agot_court_outcome.1001.d: "Мы однажды поженимся, несмотря ни на что!"
 agot_court_outcome.1003.b: "Мы разделим один поцелуй, сладкий, как мёд."
 agot_court_outcome_seek_permission_both_to_marry_tt: "[proposer.GetTitledFirstNameNoTooltip] [Select_CString(proposer.IsFemale, 'должна', 'должен' )] сперва попросить разрешения на брак у персонажа [proposer_liege.GetTitledFirstName] - своего сюзерена, и у сюзерена персонажа [proposer_target.GetTitledFirstNameNoTooltip], которым является [proposer_target_liege.GetTitledFirstName]"
 agot_court_outcome_seek_permission_proposer_both_liege_to_marry_tt: "[proposer.GetTitledFirstNameNoTooltip] [Select_CString(proposer.IsFemale, 'должна', 'должен' )] сперва попросить разрешения на брак у вашего сюзерена, которым является [proposer_liege.GetTitledFirstName]"
 agot_court_outcome_seek_permission_proposer_own_liege_to_marry_tt: "[proposer.GetTitledFirstNameNoTooltip] [Select_CString(proposer.IsFemale, 'должна', 'должен' )] сперва попросить разрешения на брак у своего сюзерена, которым является [proposer_liege.GetTitledFirstName]"
 agot_court_outcome_seek_permission_proposer_target_liege_to_marry_tt: "[proposer.GetTitledFirstNameNoTooltip] [Select_CString(proposer.IsFemale, 'должна', 'должен' )] сперва попросить разрешения на брак у сюзерена персонажа [proposer_target.GetTitledFirstNameNoTooltip], которым является [proposer_target_liege.GetTitledFirstName]"

 agot_court_outcome.1105.a: "[Select_CString(owner.IsFemale, 'Она сделала', 'Он сделал' )] предложение, и я [Select_CString(ROOT.Char.IsFemale, 'согласилась', 'согласился' )]!"
 agot_court_outcome.1105.b: "[owner.GetSheHe|U] [Select_CString(owner.IsFemale, 'обещала', 'обещал' )], что однажды мы поженимся, несмотря ни на что!"
 agot_court_outcome_elope_promise_tt: "Даётся торжественное обещание, что, как только это станет возможным, [owner.GetFirstNameNoTooltip] начнёт происки, чтобы сбежать с персонажем [target.GetFirstNameNoTooltip]!"

 agot_court_outcome.1200.t: "Великий жест"
 agot_court_outcome.1200.courtier.desc: "Когда я [Select_CString(ROOT.Char.IsFemale, 'держала', 'держал' )] двор во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], в толпе зрителей мне на глаза попадается [target.GetTitledFirstNameNoTooltip], и моё сердце замерло при [target.GetHerHis] виде.\n\n"
 agot_court_outcome.1200.ruler.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'посетила', 'посетил' )] двор, которым правит [target.GetTitledFirstNameNoTooltip] во владении [target.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], не видя [target.GetHerHis] некоторое время. Увидев [target.GetHerHis] там, перед всеми, моё сердце замерло.\n\n"
 agot_court_outcome.1200.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )], что [target.GetTitledFirstNameNoTooltip] может присутствовать при дворе, которым правит [target_host.Custom2('NamePossessiveCharacterIntroduction', target)], поэтому [Select_CString(ROOT.Char.IsFemale, 'пошла', 'пошёл' )] посмотреть [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )]. Оказалось, я [Select_CString(ROOT.Char.IsFemale, 'была права', 'был прав' )], и, заметив, что [target.Custom('LoverPetName')] стоит в толпе зрителей, моё сердце забилось от радости.\n\n"
 agot_court_outcome.1200.end.desc: "Именно тогда мне пришло в голову: что, если я объявлю о своей любви к н[target.GetHerHim] прямо здесь, перед всеми? Конечно, я могу опозорить нас обоих, но великий жест может быть именно тем, что нужно, чтобы [target.GetTitledFirstNameNoTooltip] [Select_CString(target.IsFemale, 'убедилась', 'убедился' )], что моя любовь настоящая и её нелегко игнорировать."
 agot_court_outcome.1200.a: "Я выйду вперёд и объявлю о своих чувствах!"
 agot_court_outcome.1200.b: "Нет, я не вынесу позора..."

 agot_court_outcome.1201.start.desc: "Глубоко вздохнув, я [Select_CString(ROOT.Char.IsFemale, 'шагнула', 'шагнул' )] в толпу. Они расступились, словно почувствовав, что что-то должно произойти, и все взгляды обратились на нас, когда я иду в ту сторону, где стоит явно [Select_CString(target.IsFemale, 'удивлённая', 'удивлённый' )] [target.GetTitledFirstNameNoTooltip] и [Select_CString(ROOT.Char.IsFemale, 'взяла', 'взял' )] [target.GetHerHis] руки в свои. Громким голосом я [Select_CString(ROOT.Char.IsFemale, 'объявила', 'объявил' )] всему двору о том, что я и [Select_CString(target.IsFemale, 'эта', 'этот' )] [target.Custom('polite_gender_ref')] испытываем друг к другу вечную любовь."
 agot_court_outcome.1201.diplomacy.desc: " Слова пришли ко мне сами собой, и они были одновременно красноречивы и просты. Дамы вокруг нас падали в обморок от восторга. Мужчины поджимали губы от зависти. Когда [target.GetTitledFirstNameNoTooltip] [Select_CString(target.IsFemale, 'улыбнулась', 'улыбнулся' )] в ответ, стало ясно, что мой медовый язык не подвёл меня.\n\n"
 agot_court_outcome.1201.desc: " Признаюсь, я не [Select_CString(ROOT.Char.IsFemale, 'продумала', 'продумал' )], что собираюсь сказать, и я не [Select_CString(ROOT.Char.IsFemale, 'одарена', 'одарён' )] медовым языком. Толпа в основном молчала, за исключением редкого неловкого кашля. Тем не менее, [target.GetTitledFirstNameNoTooltip] [Select_CString(target.IsFemale, 'улыбнулась', 'улыбнулся' )], потому что [target.GetHerHim] было ясно, что я [Select_CString(ROOT.Char.IsFemale, 'искренна', 'искренен' )] в своих намерениях.\n\n"
 agot_court_outcome.1201.end.desc: "Позже [target.GetSheHe] [Select_CString(target.IsFemale, 'отвела', 'отвёл' )] меня в уединённое место и [Select_CString(target.IsFemale, 'отругала', 'отругал' )] за мою безрассудную глупость, хотя в [target.GetHerHis] словах не было жара. Я едва [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )] [target.GetHerHis], потому что я [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал' )] тогда и там, что [target.GetHerHis] сердце было моим, если я этого [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )]."
 agot_court_outcome.1201.b: "Один сладкий поцелуй, и на этом всё."
 agot_court_outcome.1201.c: "В пылу момента предложить брак."

 agot_court_outcome.1202.diplomacy.desc: "\n\nНесмотря на мои красноречивые слова, пропитанные медовым чувством, сразу стало ясно, что я [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )] неверный выбор."
 agot_court_outcome.1202.desc: "\n\nСразу стало ясно, что я [Select_CString(ROOT.Char.IsFemale, 'совершила', 'совершил' )] ужасную ошибку в суждениях. Мои слова спотыкались друг о друга, и когда [target.GetTitledFirstNameNoTooltip] [Select_CString(target.IsFemale, 'переменилась', 'переменился' )] в лице, выразив ужас, я [Select_CString(ROOT.Char.IsFemale, 'запаниковала', 'запаниковал' )], и стало ещё хуже."
 agot_court_outcome.1202.end: " Толпа вокруг нас замерла в гробовом молчании, за исключением редкого неловкого кашля. [target.GetTitledFirstNameNoTooltip] [Select_CString(target.IsFemale, 'вырвала', 'вырвал' )] свои руки из моей хватки и нервно [Select_CString(target.IsFemale, 'призналась', 'признался' )] окружающим, что [target.GetSheHe] понятия не имеет, что заставило меня сказать такие вещи. Когда [target.GetSheHe] [Select_CString(target.IsFemale, 'повернулась и покинула', 'повернулся и покинул' )] зал, я [Select_CString(ROOT.Char.IsFemale, 'почувствовала', 'почувствовал' )] только холод и [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что это конец."
 agot_court_outcome.1202.a: "[Select_CString(ROOT.Char.IsFemale, 'Какую же дуру', 'Какого же дурака' )] я из себя [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )]."

 agot_court_outcome.1203.start.desc: "Я присутствую при дворе, занимаюсь своими делами и веду праздную беседу с дворянином рядом со мной, как вдруг толпа вокруг нас расступается. [Select_CString(ROOT.Char.IsFemale, 'Смущённая', 'Смущённый' )], я поворачиваюсь и замечаю, что в мою сторону идёт [owner.GetTitledFirstNameNoTooltip].\n\n[owner.GetSheHe|U] [Select_CString(owner.IsFemale, 'взяла', 'взял' )] мои руки в свои и громким голосом [Select_CString(owner.IsFemale, 'объявила', 'объявил' )] всем о своей вечной любви."
 agot_court_outcome.1203.diplomacy.desc: " [owner.GetHerHis|U] слова были медовыми и сладкими, казалось, даже отрепетированными, хотя я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] сказать, что это было сделано спонтанно. Дамы вокруг нас падали в обморок от восторга, мужчины поджимали губы от зависти, и моё сердце полностью растаяло.\n\n"
 agot_court_outcome.1203.desc: " Было ясно, что [owner.GetTitledFirstNameNoTooltip] этого не [Select_CString(owner.IsFemale, 'планировала', 'планировал' )]. [owner.GetHerHis|U] слова спотыкались друг о друга некрасноречиво, и, когда [owner.GetSheHe] [Select_CString(owner.IsFemale, 'запаниковала', 'запаниковал' )], дело только ухудшилось. Толпа затихла, за исключением редкого неловкого кашля. Тем не менее, это не имело значения, потому что я [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал' )], что [owner.GetHerHis] намерения были чисты. Моё сердце полностью растаяло.\n\n"
 agot_court_outcome.1203.end.desc: "Позже я и [owner.Custom('polite_gender_ref')] отошли в уединённое место и я [Select_CString(ROOT.Char.IsFemale, 'отругала', 'отругал' )] [owner.GetHerHis] за безрассудную глупость. Мы оба могли бы опозориться! Сомневаюсь, что [owner.GetSheHe] [Select_CString(owner.IsFemale, 'слышала', 'слышал' )] хоть слово, но в любом случае это не имело значения. Дело было сделано, и я [Select_CString(ROOT.Char.IsFemale, 'влюбилась', 'влюбился' )]."
 public_grand_gesture: "[TARGET_CHARACTER.GetShortUIName|U] и [CHARACTER.GetShortUIName] обрели вечную любовь после того, как [TARGET_CHARACTER.GetShortUIName] публично [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'объявили', Select_CString(TARGET_CHARACTER.IsFemale, 'объявила', 'объявил' ))] о своём обожании к [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажу ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'ему персонажу', '' )] в великом жесте."
 public_grand_gesture_corresponding: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] обрели вечную любовь после того, как [CHARACTER.GetShortUIName] публично [Select_CString( CHARACTER.IsLocalPlayer, 'объявили', Select_CString(CHARACTER.IsFemale, 'объявила', 'объявил' ))] о своём обожании к [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажу ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'ему персонажу', '' )] в великом жесте."

 agot_court_outcome.1300.t: "Встреча в саду"
 agot_court_outcome.1300.same.desc: "Я и [Select_CString(target.IsFemale, 'моя', 'мой' )] [target.Custom('LoverPetName')] давно не виделись, поэтому я [Select_CString(ROOT.Char.IsFemale, 'отправилась', 'отправился' )] на [target.GetHerHis] поиски. Когда день стал клониться к закату, я наконец [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашёл')] [target.GetHerHis], [Select_CString(target.IsFemale, 'гуляющую', 'гуляющего')] в прекрасных садах владения [target.GetCurrentLocation.GetNameNoTooltip]. "
 agot_court_outcome.1300.desc: "Я и [Select_CString(target.IsFemale, 'моя', 'мой' )] [target.Custom('LoverPetName')] давно не виделись, поэтому я [Select_CString(ROOT.Char.IsFemale, 'отправилась', 'отправился' )] во владение [target.GetCurrentLocation.GetNameNoTooltip], в надежде найти [target.GetHerHis]. Потребовалось немало усилий, и лишь к закату я [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашёл' )] [target.GetHerHis], [Select_CString(target.IsFemale, 'гуляющую', 'гуляющего' )] в просторных садах. "
 agot_court_outcome.1300.end.desc: "[target.GetSheHe|U] [Select_CString(target.IsFemale, 'выглядела погружённой', 'выглядел погружённым' )] в мысли, возможно, [Select_CString(target.IsFemale, 'обременённой', 'обременённым' )] какими-то заботами или даже [Select_CString(target.IsFemale, 'ждала', 'ждал' )] кого-то. И всё же моё сердце переполнила радость.\n\nМне пришло в голову, что это уединённое место, в сиянии красок заката, может стать лучшим моментом, чтобы признаться в любви. Если я не рискну смущением ради такого признания сейчас, то когда же?"
 agot_court_outcome.1300.a: "Я [Select_CString(ROOT.Char.IsFemale, 'набралась', 'набрался' )] храбрости, чтобы сделать шаг вперёд..."

 agot_court_outcome.1301.desc: "Мне не стоило беспокоиться. [target.GetFirstNameNoTooltip] [Select_CString(target.IsFemale, 'была рада', 'был рад' )] меня видеть и [Select_CString(target.IsFemale, 'призналась', 'признался' )], что [target.GetSheHe] тоже [Select_CString(target.IsFemale, 'думала', 'думал' )] обо мне. Когда сумерки сменились настоящей ночью, мы бродили по садам вдвоём и говорили о многом — о звёздах, цветах, нашем прошлом и будущем. Я [Select_CString(ROOT.Char.IsFemale, 'была очарована', 'был очарован' )] звуком [target.GetHerHis] голоса, а [target.GetSheHe] — моим.\n\nК тому времени, как мы обнаружили самый прекрасный ручей в уединённом гроте, с луной, сияющей высоко над головой, я думаю, дело было решено. Мы были влюблены."

 agot_court_outcome.1302.start.desc: "Как только я [Select_CString(ROOT.Char.IsFemale, 'вышла', 'вышел' )] из тени и [Select_CString(ROOT.Char.IsFemale, 'поприветствовала', 'поприветствовал' )] [target.GetHerHis], я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что это была ошибка. [target.GetFirstNameNoTooltip] [Select_CString(target.IsFemale, 'вздрогнула', 'вздрогнул' )], а затем нервно [Select_CString(target.IsFemale, 'извинилась', 'извинился' )], пока я [Select_CString(ROOT.Char.IsFemale, 'пыталась', 'пытался' )] разрядить обстановку и превратить последовавший натянутый разговор во что-то более приятное. [target.GetSheHe|U] всё время [Select_CString(target.IsFemale, 'пыталась', 'пытался' )] оправдаться, и вскоре я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], почему.\n\n"
 agot_court_outcome.1302.target.desc: "Из тени [Select_CString(targets_meeting.IsFemale, 'появилась', 'появился' )] [targets_meeting.Custom('polite_gender_ref')]. [targets_meeting.GetTitledFirstName] [Select_CString(targets_meeting.IsFemale, 'подошла', 'подошёл' )] к нам, явно [Select_CString(targets_meeting.IsFemale, 'раздражённая', 'раздражённый')] моим присутствием, и когда [targets_meeting.GetSheHe] [Select_CString(targets_meeting.IsFemale, 'присоединилась', 'присоединился' )] к разговору, я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал' )] понимать по взглядам между ними, что [target.GetTitledFirstNameNoTooltip] [Select_CString(target.IsFemale, 'ждала', 'ждал' )] здесь [targets_meeting.GetHerHis], а не меня. О чём они собирались поговорить, я не знаю, но это явно было важно, а я [Select_CString(ROOT.Char.IsFemale, 'оказалась нежеланной гостьей', 'оказался нежеланным гостем' )].\n\n"
 agot_court_outcome.1302.desc: "Из тени появился один из слуг. Юноша подошёл к нам осторожно, явно чувствуя себя не в своей тарелке, и хотя поначалу я [Select_CString(ROOT.Char.IsFemale, 'раздражалась', 'раздражался' )] на его вторжение, вскоре [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )] по тому, как переглядываются этот слуга и [target.GetTitledFirstNameNoTooltip], что [target.GetSheHe] [Select_CString(target.IsFemale, 'ждала', 'ждал' )] встречи с ним, а не со мной. О чём [target.GetSheHe] [Select_CString(target.IsFemale, 'собиралась', 'собирался' )] поговорить со слугой, я не знаю, но это явно было важно, а я оказал[Select_CString(ROOT.Char.IsFemale, 'оказалась нежеланной гостьей', 'оказался нежеланным гостем' )].\n\n"
 agot_court_outcome.1302.end: "В конце концов я больше не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] терпеть напряжение. Я вежливо [Select_CString(ROOT.Char.IsFemale, 'извинилась', 'извинился' )], вернувшись в тенистые сады, и [target.GetTitledFirstNameNoTooltip] [Select_CString(target.IsFemale, 'была рада', 'был рад' )] моему уходу. С тех пор я не [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )] [target.GetHerHis], и, вероятно, так даже лучше."

 agot_court_outcome.1303.desc: "В один роковой вечер я [Select_CString(ROOT.Char.IsFemale, 'бродила', 'бродил' )] по просторным садам владения [target.GetCurrentLocation.GetNameNoTooltip], а мои мысли [Select_CString(owner.IsFemale, 'занимала', 'занимал' )] [owner.GetTitledFirstNameNoTooltip], пока пылающие краски заката сменялись звёздным небом. И вдруг, словно по зову, [Select_CString(owner.IsFemale, 'появилась сама', 'появился сам' )] [owner.GetTitledFirstNameNoTooltip].\n\n[owner.Custom('polite_gender_ref')] [Select_CString(owner.IsFemale, 'подошла', 'подошёл' )] ко мне из тени, словно из сна, [Select_CString(owner.IsFemale, 'взяла', 'взял' )] меня за руку, и мы вместе шли по садам и говорили о многом — о звёздах, цветах, прошлом и будущем, которое я едва [Select_CString(ROOT.Char.IsFemale, 'запомнила', 'запомнил' )]. Я [Select_CString(ROOT.Char.IsFemale, 'была очарована', 'был очарован' )] звуками [owner.GetHerHis] голоса, а [owner.GetSheHe] — моим.\n\nКогда мы нашли самый живописный ручей в укромной роще, под сиянием луны высоко над головой, я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что всё решено. Мы были влюблены."
 garden_meeting: "[TARGET_CHARACTER.GetShortUIName|U] и [CHARACTER.GetShortUIName] обрели вечную любовь после того, как [TARGET_CHARACTER.GetShortUIName] и [CHARACTER.GetShortUIName] прогулялись в зачарованном саду."
 garden_meeting_corresponding: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] обрели вечную любовь после того, как [CHARACTER.GetShortUIName] и [TARGET_CHARACTER.GetShortUIName] прогулялись в зачарованном саду."

 agot_court_outcome.1400.t: "До поздней ночи"
 agot_court_outcome.1400.desc: "С тех пор, как я и [target.GetFirstNameNoTooltip] принесли клятвы, у нашего брака были свои взлёты и падения, но в последнее время всё изменилось. Были ссоры, в основном по мелочам, но некоторые из них перерастали в крики... и, хоть убей, я не могу понять почему. Всё шло так хорошо, и я [Select_CString(ROOT.Char.IsFemale, 'делала', 'делал' )] всё возможное, чтобы завоевать [target.GetHerHis] сердце!\n\nКогда я смотрю на н[target.GetHerHis] сейчас, из дверного проёма [target.GetHerHis] спальни, я задаюсь вопросом, не пришло ли время решить это раз и навсегда, или попытка только закончится ещё одной ссорой и усугубит раскол."
 agot_court_outcome.1400.a: "Пришло время."
 agot_court_outcome.1400.b: "Нет. Как говорится, не буди лихо, пока оно тихо."

 agot_court_outcome.1401.desc: "Какое облегчение!\n\n[target.GetFirstNameNoTooltip] сначала [Select_CString(target.IsFemale, 'колебалась', 'колебался' )], но из-за моей настойчивости в конце концов [Select_CString(target.IsFemale, 'призналась', 'признался' )], что напряжённая атмосфера была вызвана [target.GetHerHis] сомнениями... в нашем браке, нашем будущем и в истинном смысле всех моих попыток ухаживать за [Select_CString(target.IsFemale, 'женщиной, которая', 'мужчиной, который' )], по всем признакам, уже [Select_CString(target.IsFemale, 'принадлежала', 'принадлежал' )] мне. Я [Select_CString(ROOT.Char.IsFemale, 'заверила', 'заверил' )] [target.GetHerHis] настолько прямо, насколько [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )], что в моих ухаживаниях нет скрытого умысла. Я [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )], чтобы наш брак был счастливым. Всё было именно так просто.\n\n[target.GetHerHis|U] лицо просияло от моих слов, облегчение было очевидно, и затем мы говорили часами напролёт, далеко за полночь. Мы держались за руки и произносили слова, которые раньше не осмеливались сказать друг другу. Не все браки полны любви, это правда. Теперь наш — да."

 agot_court_outcome.1402.desc: "Мой выбор момента не мог быть хуже.\n\n[target.GetFirstNameNoTooltip] [Select_CString(target.IsFemale, 'вспыхнула', 'вспыхнул' )] от моих попыток снять это напряжение и, наконец, [Select_CString(target.IsFemale, 'призналась', 'признался')], что всё происходящее вызвано непониманием причин моего долгого ухаживания. «Ты ухаживаешь за [Select_CString(target.IsFemale, 'женщиной, которая', 'мужчиной, который' )] уже [Select_CString(target.IsFemale, 'замужем за тобой', 'женат на тебе' )]!» — [Select_CString(target.IsFemale, 'воскликнула', 'воскликнул')] [target.GetSheHe]. Я [Select_CString(ROOT.Char.IsFemale, 'попыталась', 'попытался')] объяснить, что хочу, чтобы наш союз был полон любви, но [target.GetFirstNameNoTooltip] [Select_CString(target.IsFemale, 'отвергла', 'отверг' )] эту мысль. Когда я [Select_CString(ROOT.Char.IsFemale, 'спросила', 'спросил' )], нет ли у н[target.GetHerHis] чувств к кому-то другому, раз в [target.GetHerHis] сердце нет места для меня, это оказалось ошибкой. Мы снова поссорились, и ссора длилась часами, пока, наконец, я не [Select_CString(ROOT.Char.IsFemale, 'вышла', 'вышел' )] из опочивальни [Select_CString(ROOT.Char.IsFemale, 'одна', 'один' )]. Это ни к чему не вело."
 agot_court_outcome.1402.a: "Ну и пусть!"

 agot_court_outcome.1403.desc: "С тех пор, как я и [owner.GetFirstNameNoTooltip] принесли клятвы, у нашего брака были взлёты и падения, но в последнее время всё изменилось. Бывали ссоры, в основном из-за мелочей, но некоторые перерастали в крики... и я никак не [Select_CString(target.IsFemale, 'могла', 'мог' )] понять, почему. [owner.GetSheHe|U] в последнее время [Select_CString(owner.IsFemale, 'была нежна, выражала', 'был нежен, выражал' )] привязанность и [Select_CString(owner.IsFemale, 'ухаживала', 'ухаживал')] за мной, но зачем [owner.GetSheHe] так [Select_CString(owner.IsFemale, 'старалась', 'старался')] завоевать сердце [Select_CString(target.IsFemale, 'женщины, на которой', 'мужчины, за которого' )] [owner.GetSheHe] уже [Select_CString(owner.IsFemale, 'вышла замуж', 'был женат' )]?\n\nСегодня вечером [owner.GetSheHe] [Select_CString(owner.IsFemale, 'вошла', 'вошёл' )] в мою спальню и [Select_CString(owner.IsFemale, 'взяла', 'взял' )] меня за руки.\n\n[owner.GetSheHe|U] [Select_CString(owner.IsFemale, 'заверила', 'заверил' )] меня простыми словами, что в [owner.GetHerHis] ухаживаниях нет скрытого умысла. [owner.GetSheHe|U] хочет лишь, чтобы наш брак был полон любви. Моё облегчение было очевидно, и затем мы говорили часами напролёт, далеко за полночь. Мы держались за руки и произносили слова, которые раньше не осмеливались сказать друг другу. Не все браки полны любви, это правда. Но наш — да."
 late_into_the_night: "[TARGET_CHARACTER.GetShortUIName|U] и [CHARACTER.GetShortUIName] обрели вечную любовь в своём браке после долгой ночи, проведённой за улаживанием разногласий."
 late_into_the_night_corresponding: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] обрели вечную любовь в своём браке после долгой ночи, проведённой за улаживанием разногласий."

 agot_court_outcome.2000.family.opening: "[proposer.Custom2('GreetingToFamilyPositive', ROOT.Char )]"
 agot_court_outcome.2000.courtier.opening: "[proposer.Custom2('GreetingToLiegePositive', ROOT.Char )]"
 agot_court_outcome.2000.opening: "[proposer.Custom2('GreetingToForeignRulerPositive', ROOT.Char )]"
 agot_court_outcome.2000.my.relation: "В последние месяцы я и [Select_CString(proposer_target.IsFemale, 'ваша', 'ваш' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer_target'))], [proposer_target.GetTitledFirstName], были связаны благопристойным и целомудренным ухаживанием, и я [Select_CString(proposer.IsFemale, 'стала', 'стал' )] считать [proposer_target.GetHerHis] своей истинной родственной душой.\n\n"
 agot_court_outcome.2000.other.relation: "В последние месяцы я и [proposer_target.GetTitledFirstName], [Select_CString(proposer_target.IsFemale, 'чья', 'чей' )] [proposer_target.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer_target_liege'))] - [proposer_target_liege.GetTitledFirstNameNoTooltip], были связаны благопристойным и целомудренным ухаживание, и я [Select_CString(proposer.IsFemale, 'стала', 'стал')] считать [proposer_target.GetHerHis] своей истинной родственной душой.\n\n"
 agot_court_outcome.2000.both.my.courtier: "В последние месяцы я и [proposer_target.Custom('polite_gender_ref')] при дворе — [proposer_target.GetTitledFirstName] были связаны благопристойным и целомудренным ухаживанием, и я [Select_CString(proposer.IsFemale, 'стала', 'стал')] считать [proposer_target.GetHerHis] своей истинной родственной душой.\n\n"
 agot_court_outcome.2000.my.courtier: "В последние месяцы я и [proposer_target.Custom('polite_gender_ref')] при вашем дворе — [proposer_target.GetTitledFirstName] были связаны благопристойным и целомудренным ухаживанием, и я [Select_CString(proposer.IsFemale, 'стала', 'стал считать')] [proposer_target.GetHerHis] своей истинной родственной душой.\n\n"
 agot_court_outcome.2000.stranger: "В последние месяцы я и [proposer_target.Custom('polite_gender_ref')] по имени [proposer_target.GetFullName] были связаны благопристойным и целомудренным ухаживанием, и я [Select_CString(proposer.IsFemale, 'стала', 'стал')] считать [proposer_target.GetHerHis] своей истинной родственной душой.\n\n"
 agot_court_outcome.2000.second.liege: "Так как мой сюзерен [proposer_liege.GetTitledFirstName] уже [Select_CString(proposer_liege.IsFemale, 'дала', 'дал' )] согласие, "
 agot_court_outcome.2000.proposer.family.willnotwed: "Как [Select_CString(proposer.IsFemale, 'верная', 'верный' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer'))], [Select_CString(proposer.IsFemale, 'которой', 'которому' )] обещали возможность следовать зову своего сердца, "
 agot_court_outcome.2000.proposer.family: "Как [Select_CString(proposer.IsFemale, 'ваша верная', 'ваш верный')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer'))], "
 agot_court_outcome.2000.proposer.dynasty: "Как верный член династии [ROOT.Char.GetDynasty.GetBaseNameNoTooltip], "
 agot_court_outcome.2000.proposer.courtier: "Как [Select_CString(proposer.IsFemale, 'ваша верноподданная', 'ваш верноподданный')], "
 agot_court_outcome.2000.proposer.guest: "Как [Select_CString(proposer.IsFemale, 'ваша гостья', 'ваш гость')] и, надеюсь, будущий член вашего двора, "
 agot_court_outcome.2000.onlyliege: "[proposer.Custom('lmf_type_of_request')] даровать мне разрешение [Select_CString(proposer.IsFemale, 'выйти замуж за', 'жениться на' )] [Select_CString(proposer_target.IsFemale, 'женщине, которую', 'мужчину, которого')] я так обожаю."
 agot_court_outcome.2000.otherliege: "[proposer.Custom('lmf_type_of_request')] даровать мне благословение обратиться к [proposer_target.GetHerHis] сюзерену, чтобы [proposer_target_liege.GetTitledFirstName] [Select_CString(proposer_target_liege.IsFemale, 'позволила', 'позволил' )] нам сочетаться законным браком."
 agot_court_outcome.2000.a: "Разрешение дано!"
 agot_court_outcome.2000.b: "Абсолютно нет."
 agot_court_outcome.2000.a.seek.permission.tt: "[proposer.GetTitledFirstNameNoTooltip] попросит разрешения у персонажа [proposer_target_liege.GetTitledFirstName]"
 agot_court_outcome.2000.a.permission.granted.tt: "[proposer_target_liege.GetTitledFirstNameNoTooltip] даёт разрешение"
 agot_court_outcome.2000.a.permission.refused.tt: "[proposer_target_liege.GetTitledFirstNameNoTooltip] отказывает [proposer.GetHerHim]"
 agot_court_outcome.2000.b.tt: "[proposer.GetTitledFirstNameNoTooltip] и [proposer_target.GetTitledFirstNameNoTooltip] могут продолжить свои отношения или даже сбежать"

 agot_court_outcome.2001.opening: "[proposer_liege.Custom2('GreetingToFamilyPositive', ROOT.Char )]"
 agot_court_outcome.2001.desc: "Хорошо. Я даю разрешение, чтобы ты и [proposer_target.GetTitledFirstNameNoTooltip] заключили брак, при условии, что [proposer_target_liege.GetTitledFirstName] также даст вам своё согласие."
 agot_court_outcome.2001.a: "[proposer_target_liege.GetTitledFirstNameNoTooltip], мы идём!"

 agot_court_outcome.2003.t: "Разрешение дано!"
 agot_court_outcome.2003.proposer: "Прекрасные новости! [permission_granter.GetTitledFirstNameNoTooltip] [Select_CString(permission_granter.IsFemale, 'дала', 'дал' )] своё согласие, чтобы я и [proposer_target.GetTitledFirstNameNoTooltip] могли пожениться! Это была небольшая церемония в местном храм в провинции [proposer.GetCurrentLocation.GetName], которую провёл седой [proposer.GetFaith.DevoteeNeuterPlural|l], удивлённый неожиданностью события... но мне всё равно. Я [Select_CString(ROOT.Char.IsFemale, 'вышла замуж за любовь', 'женился на любви' )] всей своей жизни, и дело сделано!"
 agot_court_outcome.2003.proposer_target: "Прекрасные новости! [proposer.GetTitledFirstNameNoTooltip] [Select_CString(proposer_target.IsFemale, 'получила', 'получил' )] разрешение, чтобы мы с [Select_CString(proposer_target.IsFemale, 'нею', 'ним' )] могли пожениться! Это была небольшая церемония в местном храм в провинции [proposer_target.GetCurrentLocation.GetName], которую провёл седой [proposer_target.GetFaith.DevoteeNeuterPlural|l], удивлённый неожиданностью события... но мне всё равно. Я [Select_CString(ROOT.Char.IsFemale, 'вышла замуж за любовь', 'женился на любви' )] всей моей жизни, и дело сделано!"
 agot_court_outcome.2003.a: "Я никогда не забуду этот день!"
 given_leave_to_marry: "[TARGET_CHARACTER.GetShortUIName|U] и [CHARACTER.GetShortUIName] нашли настоящую любовь, получив разрешение на брак."
 given_leave_to_marry_corresponding: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] нашли настоящую любовь, получив разрешение на брак."

 agot_court_outcome.2004.t: "Просьба отклонена!"
 agot_court_outcome.2004.desc: "[permission_refuser.GetTitledFirstNameNoTooltip] [Select_CString(permission_refuser.IsFemale, 'отказалась', 'отказался' )] дать разрешение на брак, и [Select_CString(permission_refuser.IsFemale, 'эта женщина', 'этот мужчина' )] даже не [Select_CString(permission_refuser.IsFemale, 'назвала', 'назвал' )] причину! Наши планы разрушены. Что нам делать, [proposer_target.GetTitledFirstNameNoTooltip]?"
 agot_court_outcome.2004.a: "Остался только один вариант: сбежать!"
 agot_court_outcome.2004.b: "Женаты мы или нет — наша любовь никогда не умрёт!"
 agot_court_outcome.2004.c: "Если мы не можем быть вместе, то какой в этом смысл?"
 agot_court_outcome.2004.b.tt: "Вы останетесь родственными душами даже вне брака"
 agot_court_outcome.2004.c.tt: "Последний поцелуй — и вы расстанетесь..."
 agot_court_outcome.2005.elope: "[proposer.GetTitledFirstNameNoTooltip] [Select_CString(proposer_target.IsFemale, 'пришла', 'пришёл' )] ко мне, только что вернувшись со встречи, на которой [permission_refuser.GetTitledFirstNameNoTooltip] [Select_CString(permission_refuser.IsFemale, 'приняла', 'принял' )] [Select_CString(proposer.IsFemale, 'её', 'его' )]... и новости были неутешительные. [permission_refuser.GetTitledFirstNameNoTooltip] не [Select_CString(permission_refuser.IsFemale, 'дала', 'дал' )] нам разрешения пожениться! Но, не дрогнув, [proposer.GetFirstNameNoTooltip] [Select_CString(proposer.IsFemale, 'взяла', 'взял' )] меня за руку и [Select_CString(proposer.IsFemale, 'поклялась', 'поклялся' )], что [Select_CString(proposer.IsFemale, 'она', 'он' )] не позволит этому встать у нас на пути. «Я приду за тобой», — [Select_CString(proposer.IsFemale, 'сказала она', 'сказал он' )]. — «Хоть через сто лет, но я приду за тобой, и мы поженимся, что бы кто ни говорил!»"
 agot_court_outcome.2005.continue: "[proposer.GetTitledFirstNameNoTooltip] [Select_CString(proposer.IsFemale, 'пришла', 'пришёл' )] ко мне, только что вернувшись со встречи, на которой [permission_refuser.GetTitledFirstNameNoTooltip] [Select_CString(permission_refuser.IsFemale, 'приняла', 'принял' )] [Select_CString(proposer.IsFemale, 'её', 'его' )]... и новости были неутешительные. [permission_refuser.GetTitledFirstNameNoTooltip] не [Select_CString(permission_refuser.IsFemale, 'дала', 'дал' )] нам разрешения пожениться! «Это не важно», — [Select_CString(proposer.IsFemale, 'заявила', 'заявил' )] [proposer.GetFirstNameNoTooltip]. [Select_CString(proposer.IsFemale, 'Она заключила', 'Он заключил' )] меня в свои объятия и сладко [Select_CString(proposer_target.IsFemale, 'поцеловала', 'поцеловал' )] в губы. «Женаты мы или нет — наша любовь расцветёт, что бы кто ни говорил!»"
 agot_court_outcome.2005.breakup: "[proposer.GetTitledFirstNameNoTooltip] [Select_CString(proposer.IsFemale, 'пришла', 'пришёл' )] ко мне, только что вернувшись от встречи, на которой [permission_refuser.GetTitledFirstNameNoTooltip] [Select_CString(permission_refuser.IsFemale, 'приняла', 'принял' )] [Select_CString(proposer.IsFemale, 'её', 'его' )]... и новости были неутешительные. [permission_refuser.GetTitledFirstNameNoTooltip] не [Select_CString(permission_refuser.IsFemale, 'дала', 'дал' )] нам разрешения пожениться! «Какой смысл быть вместе», — [Select_CString(proposer.IsFemale, 'вздохнула', 'вздохнул' )] [proposer.GetFirstNameNoTooltip], — «если нам придётся скрываться? Нет, я не вынесу этого». С этими словами [Select_CString(proposer.IsFemale, 'она поцеловала', 'он поцеловал' )] меня в последний раз, нежно, и [Select_CString(proposer.IsFemale, 'ушла', 'ушёл' )] навсегда."
 agot_court_outcome.2005.a: "«Я буду ждать тебя, любовь моя!»"
 agot_court_outcome.2005.b: "«Ты мне [Select_CString(proposer.IsFemale, 'нужна', 'нужен' )] здесь и сейчас, любовь моя!»"
 agot_court_outcome.2005.c: "Увы, этот последний поцелуй придётся хранить в памяти..."

 agot_court_outcome.2010.opening: "[target.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 agot_court_outcome.2010.imprison: "[Select_CString(target.IsFemale, 'Запертая', 'Запертый' )] в этой темнице, я признаю, что наши шансы когда-либо быть вместе кажутся ничтожными. Слишком давно я не [Select_CString(target.IsFemale, 'видела', 'видел' )] твоего лица.\n\n"
 agot_court_outcome.2010.normal: "Я вспоминаю, как ты [Select_CString(ROOT.Char.IsFemale, 'дала', 'дал' )] обещание, что мы однажды будем вместе как муж и жена, и это кажется таким далёким. Слишком далёким, на самом деле.\n\n"
 agot_court_outcome.2010.hate: "Я не могу отделаться от чувства, что ты меня [Select_CString(ROOT.Char.IsFemale, 'обманула', 'обманул' )]. Возможно, даже [Select_CString(ROOT.Char.IsFemale, 'лишила', 'лишил' )] меня жизни, которая могла бы быть у меня. "
 agot_court_outcome.2010.nothate: "По правде говоря, я не могу винить тебя. Судьба ополчилась против нас, и с этим не поспоришь. "
 agot_court_outcome.2010.end: "Как бы то ни было, я считаю, что пора признать всё как есть. Я освобождаю тебя от твоего обещания — если ты вообще его признаёшь — и мы пойдём каждый своей дорогой."
 agot_court_outcome.2010.a: "Увы, этому не суждено было случиться."

 agot_elope.1004.t: "Исчезнувшие в ночи в ночи"
 agot_elope.1004.start: "Проснувшись утром, я [Select_CString(ROOT.Char.IsFemale, 'услышала', 'услышал' )] неожиданную новость: оказывается, прошлой ночью "
 agot_elope.1004.both: "[owner.GetTitledFirstName] и [target.GetTitledFirstName] вместе покинули [ROOT.Char.Custom('FortifiedBuilding')] и тайно поженились. " #АХТУНГ
 agot_elope.1004.target: "[owner.GetFullName] [Select_CString(owner.IsFemale, 'прокралась', 'прокрался' )] в замок во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], после чего [Select_CString(owner.IsFemale, 'она', 'он' )] и [Select_CString(target.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('target'))], [target.GetTitledFirstNameNoTooltip], сбежали, чтобы тайно пожениться. "
 agot_elope.1004.mid: "Вся эта затея, должно быть, планировалась довольно долго, ведь им удалось обойти стражу и остаться незамеченными. [Select_CString(ROOT.Char.IsFemale, 'Должна', 'Должен' )] признать, впечатляет.\n\n"
 agot_elope.1004.refused: "Ранее я [Select_CString(ROOT.Char.IsFemale, 'отказала', 'отказал' )] им в разрешении на брак, но теперь, похоже, они взяли всё в свои руки и опозорили себя обоих."
 agot_elope.1004.owner.refused: "Похоже, [owner.GetLiege.GetTitledFirstNameNoTooltip] [Select_CString(owner.GetLiege.IsFemale, 'отказала', 'отказал' )] [owner.GetHerHim] в просьбе о браке, и теперь [owner.GetTitledFirstNameNoTooltip] [Select_CString(owner.IsFemale, 'взяла', 'взял' )] всё в свои руки. Несмотря на мои симпатии к [owner.GetHerHis] положению, закон есть закон. Их поступок опозорил их обоих."
 agot_elope.1004.target.refused: "Похоже, [target.GetLiege.GetTitledFirstNameNoTooltip] [Select_CString(target.GetLiege.IsFemale, 'отказала', 'отказал' )] в просьбе о браке, которую [Select_CString(target.IsFemale, 'сделала', 'сделал' )] [target.GetTitledFirstNameNoTooltip], и теперь [owner.GetTitledFirstNameNoTooltip] [Select_CString(owner.IsFemale, 'взяла', 'взял' )] всё в свои руки. Несмотря на мои симпатии к их положению, закон есть закон. Их поступок опозорил их обоих."
 agot_elope.1004.granted: "Ранее я [Select_CString(ROOT.Char.IsFemale, 'дала', 'дал' )] им разрешение на брак, но, похоже, этого оказалось недостаточно... и теперь они взяли всё в свои руки. Несмотря на мои симпатии к их положению, закон есть закон. Их поступок опозорил их обоих."
 agot_elope.1004.married: "Полагаю, [owner.GetTitledFirstNameNoTooltip] не [Select_CString(owner.IsFemale, 'смогла', 'смог' )] официально просить [target.GetHerHis] руки, потому что [target.GetTitledFirstNameNoTooltip] уже в браке! Как бы то ни было, теперь они нарушили закон и опозорили себя обоих."
 agot_elope.1004.end: "Почему [owner.GetTitledFirstNameNoTooltip] не [Select_CString(owner.IsFemale, 'подумала', 'подумал' )] официально просить [target.GetHerHis] руки, я и представить не могу. Как бы то ни было, теперь они нарушили закон, поженившись без моего разрешения, и опозорили себя обоих."
 agot_elope.1004.a: "Надеюсь, оно того стоило."
 agot_elope.1004.b: "Передайте им, что они могут вернуться. Мы забудем об этой оплошности."

 agot_elope.1005.t: "Новый побег"
 agot_elope.1005.start: "Проснувшись утром, я [Select_CString(ROOT.Char.IsFemale, 'услышала', 'услышал' )] весьма неожиданную новость: прошлой ночью [owner.GetTitledFirstNameNoTooltip] [Select_CString(owner.IsFemale, 'прокралась', 'прокрался' )] в [target_liege.Custom('FortifiedBuilding')], в котором пребывает [target_liege.GetTitledFirstName], и [Select_CString(owner.IsFemale, 'она', 'он' )] и [target.GetTitledFirstNameNoTooltip] сбежали вместе. Сейчас они где-то там, заключают брак.\n\n"
 agot_elope.1005.refused: "Ранее я [Select_CString(ROOT.Char.IsFemale, 'отказала', 'отказал' )] им в разрешении на брак, но теперь, похоже, они взяли всё в свои руки и опозорили себя обоих."
 agot_elope.1005.granted: "Ранее я [Select_CString(ROOT.Char.IsFemale, 'дала', 'дал' )] им разрешение на брак, но, похоже, этого оказалось недостаточно... и теперь они взяли всё в свои руки, что привело к побегу, который опозорил их обоих."
 agot_elope.1005.neither: "Из-за чего [owner.GetTitledFirstNameNoTooltip] [Select_CString(owner.IsFemale, 'пошла', 'пошёл' )] на столь безрассудный поступок, я и представить не могу. Как бы то ни было, брак без разрешения их сюзерена опозорил их обоих."
 agot_elope.1005.end: " Единственный оставшийся вопрос — будут ли [owner.GetTitledFirstNameNoTooltip] и [owner.GetHerHis] [Select_CString(target.IsFemale, 'новая жена', 'новый муж' )] желанными гостями в моём дворе."
 agot_elope.1005.a: "Надеюсь, оно того стоило."
 agot_elope.1005.b: "Им здесь больше не рады."
 agot_elope.1005.c: "Передайте им, что они могут вернуться. Мы забудем об этой оплошности."

 pregnancy.3003.c: "Мы должны пожениться немедленно!"

 seduce_outcome.4900.failure.tt: "Происки персонажа [owner.GetTitledFirstName] по соблазнению персонажа [target.GetTitledFirstName] провалились и были раскрыты!"

 agot_seduce_outcome.4901.opening: "Уже поздний вечер, когда [ROOT.Char.Custom('FortifiedBuilding')] огласили тревожные крики.\n\nКогда я [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришёл' )] посмотреть, в чём дело, меня встретила толпа слуг и стражников у входа в покои, где пребывает [target.Custom2('MyCharacterIntroductionPossessive', ROOT.Char)]... где, оказывается, [target.GetSheHe] [Select_CString(target.IsFemale, 'появилась', 'появился' )] ранее, где [target.GetHerHis] [Select_CString(owner.IsFemale, 'встретила', 'встретил' )] [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] — совершенно без одежды!\n\nКакого бы рода встречу ни [Select_CString(owner.IsFemale, 'ожидала', 'ожидал' )] [owner.GetTitledFirstNameNoTooltip], [owner.GetSheHe] её не [Select_CString(owner.IsFemale, 'получила', 'получил' )]. "
 agot_seduce_outcome.4901.reject: "Я [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], как [target.GetTitledFirstNameNoTooltip] яростно [Select_CString(target.IsFemale, 'кричала', 'кричал' )] на н[owner.GetHerHis], требуя, чтобы [owner.GetSheHe] [Select_CString(owner.IsFemale, 'убралась', 'убрался' )] и никогда не [Select_CString(owner.IsFemale, 'возвращалась', 'возвращался' )].\n\nКак только [owner.GetSheHe] [Select_CString(owner.IsFemale, 'увидела', 'увидел' )] нас, [owner.GetSheHe] [Select_CString(owner.IsFemale, 'сбежала', 'сбежал' )], даже не потратив время на то, чтобы собрать свою одежду!"
 agot_seduce_outcome.4901.normal: "[target.GetTitledFirstNameNoTooltip] [Select_CString(target.IsFemale, 'была', 'был' )] явно в ужасе и, как только [target.GetSheHe] [Select_CString(target.IsFemale, 'увидела', 'увидел' )] меня, [Select_CString(target.IsFemale, 'заявила', 'заявил' )], что не имеет к этому никакого отношения.\n\nТем временем [owner.GetTitledFirstNameNoTooltip] [Select_CString(owner.IsFemale, 'собрала', 'собрал' )] свою одежду и с чувством неловкости [Select_CString(owner.IsFemale, 'убежала', 'убежал' )], утверждая, что это всё какая-то ошибка..."
 agot_seduce_outcome.4901.a: "Шокирующе, но и довольно забавно..."

 agot_seduce_outcome.4902.opening: "Я [Select_CString(ROOT.Char.IsFemale, 'прогуливалась', 'прогуливался' )] по садам владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], когда [Select_CString(ROOT.Char.IsFemale, 'услышала', 'услышал' )] звуки, которые сначала показались ссорой.\n\nКогда я [Select_CString(ROOT.Char.IsFemale, 'подбежала', 'подбежал' )] посмотреть, в чём дело, передо мной предстала картина: [owner.Custom2('MyCharacterIntroduction', ROOT.Char)], на [Select_CString(owner.IsFemale, 'которую', 'которого' )] кричит [target.Custom2('MyCharacterIntroduction', ROOT.Char)]. "
 agot_seduce_outcome.4902.reject: "[target.GetSheHe|U] в ярости и лишь с опозданием [Select_CString(target.IsFemale, 'заметила', 'заметил' )] моё присутствие, уходя прочь. «[Select_CString(owner.IsFemale, 'Эта женщина', 'Этот мужчина' )], — [Select_CString(target.IsFemale, 'выпалила', 'выпалил' )] [target.GetSheHe], — пусть оставит меня в покое. Я не потерплю больше ни минуты [owner.GetHerHis] ухаживаний!»\n\n[owner.GetTitledFirstNameNoTooltip], [Select_CString(owner.IsFemale, 'проявила', 'проявил' )] достаточно тактичности, чтобы выглядеть [Select_CString(owner.IsFemale, 'смущённой', 'смущённым' )], когда [owner.GetSheHe] [Select_CString(owner.IsFemale, 'сбежала', 'сбежал' )], сохраняя лишь крохи достоинства."
 agot_seduce_outcome.4902.normal: "[target.GetSheHe|U] [Select_CString(target.IsFemale, 'была', 'был' )] скорее [Select_CString(target.IsFemale, 'шокирована и расстроена', 'шокирован и расстроен' )], чем [Select_CString(target.IsFemale, 'зла', 'зол' )], и, завидев меня, [target.GetSheHe] [Select_CString(target.IsFemale, 'подбежала', 'подбежал' )] ко мне. «Славтесь, [target.GetFaith.PantheonTerm2], что ты [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришёл' )]! Я не могу терпеть ни минуты больше [owner.GetHerHis] постоянных посягательств!»\n\n[owner.GetTitledFirstNameNoTooltip] густо [Select_CString(owner.IsFemale, 'покраснела и попыталась', 'покраснел и попытался' )] заявить, что всё это — простое недоразумение... но, думаю, всем было ясно, что происходило."
 agot_seduce_outcome.4902.a: "Разве [owner.GetSheHe] не знает стыда?! Возмутительно!"

 agot_seduce_outcome.4903.opening: "Я [Select_CString(ROOT.Char.IsFemale, 'возвращалась', 'возвращался' )] в свои покои во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], когда [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [target.Custom2('MyCharacterIntroduction', ROOT.Char)] и [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] стоят в нише очень близко друг к другу. Слишком близко? Неужели это возможно...?\n\nКак только [target.GetTitledFirstNameNoTooltip] [Select_CString(target.IsFemale, 'заметила', 'заметил' )] меня, "
 agot_seduce_outcome.4903.reject: "[target.GetSheHe] [Select_CString(target.IsFemale, 'сделала', 'сделал' )] преднамеренный шаг назад. «Это не моя инициатива, [Select_CString(ROOT.Char.IsFemale, 'миледи', 'милорд' )]! [Select_CString(owner.IsFemale, 'Эта женщина', 'Этот мужчина' )] преследует меня уже несколько недель! Я не могу заставить [owner.GetHerHis] отстать!»\n\nОчевидно, что [target.GetHerHis] гнев был искренним, что только подтверждалось тем, как смущённо бормочет [owner.GetTitledFirstNameNoTooltip]. [owner.GetSheHe|U] изо всех сил [Select_CString(owner.IsFemale, 'пыталась', 'пытался' )] выдать всё за недоразумение, но к тому моменту [target.GetTitledFirstNameNoTooltip] уже [Select_CString(target.IsFemale, 'ушла', 'ушёл' )]."
 agot_seduce_outcome.4903.normal: "[target.GetSheHe] [Select_CString(target.IsFemale, 'вздохнула', 'вздохнул' )] с облегчением. «Славтесь, [target.GetFaith.PantheonTerm2], что ты [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришёл' )], — [Select_CString(target.IsFemale, 'пробормотала', 'пробормотал' )] [target.GetSheHe], — я бы не [Select_CString(target.IsFemale, 'выдержала', 'выдержал' )] ни минуты больше».\n\n[owner.GetTitledFirstNameNoTooltip] [Select_CString(owner.IsFemale, 'попыталась', 'попытался' )] выдать всё за простое недоразумение, но я в это не [Select_CString(ROOT.Char.IsFemale, 'поверила', 'поверил' )]. Как бы то ни было, вряд ли теперь [owner.GetHerHis] планы, в которых занимает место [target.GetTitledFirstNameNoTooltip], осуществятся."
 agot_seduce_outcome.4903.a: "Хорошо, что я [Select_CString(ROOT.Char.IsFemale, 'появилась', 'появился' )] вовремя!"

 agot_seduce_outcome.4904.opening: "Идёт очередной ночной пир во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], но этот оказался довольно примечательным в основном из-за выходок, которые [Select_CString(owner.IsFemale, 'устроила', 'устроил' )] [owner.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\n[owner.Custom('polite_gender_ref')] явно уже изрядно [Select_CString(owner.IsFemale, 'перебрала', 'перебрал' )], а [target.Custom2('MyCharacterIntroduction', ROOT.Char)] [Select_CString(target.IsFemale, 'осыпана', 'осыпан' )] кокетливым вниманием. "
 agot_seduce_outcome.4904.reject: "Наконец [target.GetSheHe] [Select_CString(target.IsFemale, 'встала и закричала', 'встал и закричал' )]: «С меня хватит твоих похотливых домогательств! Прекрати, я говорю тебе! Прекрати!»\n\nС этими словами [target.GetTitledFirstNameNoTooltip] в гневе [Select_CString(target.IsFemale, 'вышла', 'вышел' )] из зала, а [owner.GetTitledFirstNameNoTooltip] [Select_CString(owner.IsFemale, 'осталась', 'остался' )] стоять в шоке... в то время как все остальные смотрели на н[owner.GetHerHis].\n\nКакими бы ни были [owner.GetHerHis] намерения в [target.GetHerHis] отношении, теперь им точно пришёл конец."
 agot_seduce_outcome.4904.normal: "[target.GetSheHe|U] явно не [Select_CString(target.IsFemale, 'проявляла', 'проявлял' )] интереса и едва [Select_CString(target.IsFemale, 'терпела', 'терпел' )] [owner.GetHerHis] присутствие.\n\n«Что, во имя [ROOT.Char.GetFaith.HighGodNamePossessive], здесь происходит?» — [Select_CString(ROOT.Char.IsFemale, 'спросила', 'спросил' )] я, подходя, и [target.GetTitledFirstNameNoTooltip] [Select_CString(target.IsFemale, 'воспользовалась', 'воспользовался' )] заминкой, чтобы сбежать... а [owner.GetTitledFirstNameNoTooltip] [Select_CString(owner.IsFemale, 'осталась', 'остался' )] стоять, возмущённо бормоча, пока все смотрели на н[owner.GetHerHis]."
 agot_seduce_outcome.4904.a: "Позорное зрелище."

 agot_seduce_outcome.4905.desc: "[target.GetTitledFirstNameNoTooltip] [Select_CString(target.IsFemale, 'пришла', 'пришёл' )] ко мне сегодня вечером, пылая от гнева.\n\n«[Select_CString(owner.IsFemale, 'Эта', 'Этот' )] [owner.Custom('InsultNounSexual')] меня [Select_CString(owner.IsFemale, 'достала', 'достал' )]! Я тысячу раз [Select_CString(target.IsFemale, 'говорила', 'говорил' )] [owner.GetHerHim] «нет», но [owner.GetSheHe] разве слушает? Этому нужно положить конец!»\n\n[owner.Custom('polite_gender_ref')], на [Select_CString(owner.IsFemale, 'которую', 'которого' )] [target.GetSheHe] так [Select_CString(target.IsFemale, 'разозлилась', 'разозлился' )], [Select_CString(owner.IsFemale, 'оказалась', 'оказался' )] не кто иной, как [owner.Custom2('MyCharacterIntroduction', ROOT.Char)]... [Select_CString(ROOT.Char.IsFemale, 'которой', 'которому' )] теперь, разумеется, навсегда запрещено разговаривать с [Select_CString(target.IsFemale, 'ней', 'ним' )], к [target.GetHerHis] большому облегчению. И всё же, какая дерзость! Пытаться соблазнить [Select_CString(ROOT.Char.IsFemale, 'моего мужа', 'мою жену' )] прямо у меня под носом, да ещё и когда вокруг мой собственный [ROOT.Char.Custom('FortifiedBuilding')]!"
 agot_seduce_outcome.4905.a: "Как [owner.GetSheHe] [Select_CString(owner.IsFemale, 'посмела', 'посмел' )]!"

 agot_seduce_outcome.4906.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'возвращалась', 'возвращался' )] в свои покои во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], когда [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [Select_CString(ROOT.Char.IsFemale, 'мой муж', 'моя жена' )] и [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] стоят в тёмной нише очень близко друг к другу. Слишком близко? Неужели это возможно...?\n\nКак только [target.GetFirstNameNoTooltip] [Select_CString(target.IsFemale, 'заметила', 'заметил' )] меня, [target.GetSheHe] [Select_CString(target.IsFemale, 'отступила', 'отступил' )], явно испытывая облегчение. «Славтесь, [target.GetFaith.PantheonTerm2], что ты [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришёл' )], — [Select_CString(target.IsFemale, 'пробормотала', 'пробормотал' )] [target.GetSheHe], — я бы не [Select_CString(target.IsFemale, 'выдержала', 'выдержал' )] ни минуты больше!»\n\n[owner.GetTitledFirstNameNoTooltip] возмущённо и испуганно [Select_CString(owner.IsFemale, 'бормотала', 'бормотал' )], пытаясь выдать всё за простое недоразумение, но было ясно, что это не так. К счастью для н[owner.GetHerHis], [owner.GetSheHe] [Select_CString(owner.IsFemale, 'успела', 'успел' )] сбежать, прежде чем я [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел' )] позвать стражу!"
 agot_seduce_outcome.4906.a: "Вот [owner.Custom('InsultNounSexual')]! Как [owner.GetSheHe] [Select_CString(owner.IsFemale, 'посмела', 'посмел' )]!"

 tried_to_seduce_spouse: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'попытались', Select_CString(TARGET_CHARACTER.IsFemale, 'попыталась', 'попытался' ))] соблазнить вторую половинку [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )]."
 tried_to_seduce_spouse_corresponding: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'попытались', Select_CString(CHARACTER.IsFemale, 'попыталась', 'попытался' ))] соблазнить вторую половинку [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )]."

 agot_seduce_outcome.4907.opening: "Это был ещё один день при дворе во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] — скучный и однообразный, пока вдруг события не приняли неожиданный оборот.\n\n"
 agot_seduce_outcome.4907.reject: "«С меня довольно!» — до меня доносится [Select_CString(target.IsFemale, 'мужской', 'женский' )] крик из толпы зевак. Все взгляды обращаются в ту сторону, и, когда толпа расступается, я вижу, что это [target.Custom2('MyCharacterIntroduction', ROOT.Char)], а напротив [Select_CString(target.IsFemale, 'неё', 'него' )] стоит [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. [Select_CString(target.IsFemale, 'Она', 'Он' )] явно вне себя от ярости и замолкает лишь тогда, когда вдруг осознаёт, что теперь все глаза устремлены на [Select_CString(target.IsFemale, 'неё', 'него' )].\n\n«Прошу прощения, [Select_CString(ROOT.Char.IsFemale, 'миледи', 'милорд' )]! Просто [Select_CString(owner.IsFemale, 'эта', 'этот' )]... [Select_CString(owner.IsFemale, 'эта', 'этот' )] [owner.Custom('InsultNounSexual')] никак не оставит меня в покое! Ради моей репутации я хочу, чтобы [Select_CString(owner.IsFemale, 'её', 'его' )] репутация была разрушена!» С этими словами [target.GetFirstNameNoTooltip] [Select_CString(target.IsFemale, 'развернулась', 'развернулся' )] и стремительно [Select_CString(target.IsFemale, 'покинула', 'покинул' )] зал, а [owner.GetFirstNameNoTooltip] остаётся стоять в неловком молчании под осуждающими и презрительными взглядами собравшихся.\n\nЧего бы [Select_CString(owner.IsFemale, 'она', 'он' )] ни [Select_CString(owner.IsFemale, 'пыталась', 'пытался' )] добиться своими усилиями, [Select_CString(owner.IsFemale, 'её', 'его' )] план явно провалился."
 agot_seduce_outcome.4907.normal: "«Пожалуйста, прекратите! Я умоляю вас!» — до меня доносится [Select_CString(target.IsFemale, 'мужской', 'женский' )] крик из толпы зевак. Все взгляды устремляются туда, и, когда толпа расступается, я вижу, что это [target.Custom2('MyCharacterIntroduction', ROOT.Char)], а напротив [Select_CString(target.IsFemale, 'неё', 'него' )] стоит [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. [Select_CString(target.IsFemale, 'Она', 'Он' )] выглядит [Select_CString(target.IsFemale, 'подавленной', 'подавленным' )], и ещё больше — когда понимает, что теперь весь двор смотрит на [Select_CString(target.IsFemale, 'неё', 'него' )].\n\n«Прошу прощения, [Select_CString(ROOT.Char.IsFemale, 'миледи', 'милорд' )]! Я просто... я больше не в силах это терпеть». [target.GetFirstNameNoTooltip] бросает последний гневный взгляд на [Select_CString(owner.IsFemale, 'неё', 'него' )] и выбегает из зала.\n\nПоскольку [Select_CString(target.IsFemale, 'она', 'он' )] ничего не [Select_CString(target.IsFemale, 'объяснила', 'объяснил' )], мне остаётся только гадать, что именно [Select_CString(owner.IsFemale, 'сделала', 'сделал' )] [owner.GetFirstNameNoTooltip], чтобы вызвать такое поведение... хотя, думаю, мы все понимаем. Несмотря на [Select_CString(owner.IsFemale, 'её', 'его' )] тихую усмешку в ответ на взгляды, можно с уверенностью сказать, что [Select_CString(owner.IsFemale, 'её', 'его' )] усилия пропали впустую."
 agot_seduce_outcome.4907.a: "Скандал!"

 agot_seduce_outcome.4908.desc: "Я иду по коридору ночью в сторону своей спальни, когда вдруг ко мне подбегает [target.GetWomanMan] и начинает идти рядом. Это [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)], выглядит напряжённо и нервно... хотя явно не я тому причина.\n\n«Просто продолжайте идти», — умоляет [Select_CString(target.IsFemale, 'она', 'он' )]. — «Хорошо, что вы появились вовремя — я весь день [Select_CString(target.IsFemale, 'пыталась', 'пытался' )] избегать [Select_CString(owner.IsFemale, 'её', 'его' )] ухаживаний». Не зная, о ком может идти речь, я оглядываюсь и замечаю, что в тени [Select_CString(owner.IsFemale, 'притаилась', 'притаился' )] [owner.Custom2('MyCharacterIntroduction', ROOT.Char)], пытаясь сделать вид, что [Select_CString(owner.IsFemale, 'оказалась', 'оказался' )] там случайно и совсем не интересуется, где находится [target.GetFirstNameNoTooltip].\n\n«Не верьте ни единому слову, что [Select_CString(owner.IsFemale, 'она', 'он' )] скажет», — шёпотом добавляет [target.GetFirstNameNoTooltip]. — «[Select_CString(owner.IsFemale, 'Её', 'Его' )] поведение крайне неприлично, но это всё, что я могу сделать, чтобы сохранить своё достоинство, если уж не доброе имя». Как только мы скрылись из виду, [target.GetFirstNameNoTooltip] горячо [Select_CString(target.IsFemale, 'поблагодарила', 'поблагодарил' )] меня и [Select_CString(target.IsFemale, 'поспешила', 'поспешил' )] прочь."
 agot_seduce_outcome.4908.a: "Интересно, вмешаться ли мне?"

 agot_seduce_outcome.4909.desc: "Я нахожусь в комнате во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], развлекая нескольких придворных, когда вдруг вбегает [target.Custom2('MyCharacterIntroduction', ROOT.Char)]. [target.GetWomanMan] явно [Select_CString(target.IsFemale, 'взволнована', 'взволнован' )], держа в руках большую пачку писем. На миг я [Select_CString(ROOT.Char.IsFemale, 'подумала', 'подумал')], что [Select_CString(target.IsFemale, 'она пришла', 'он пришёл' )] ко мне, но вместо этого [Select_CString(target.IsFemale, 'она направилась', 'он направился' )] туда, где на другом конце комнаты сидит [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)].\n\n«Заберите их обратно, — [Select_CString(target.IsFemale, 'сказала она', 'сказал он' )]. — Заберите все! Умоляю вас, [Select_CString(owner.IsFemale, 'миледи', 'милорд' )], перестаньте писать мне. Эта ваша одержимость должна закончиться!» С этими словами [target.GetFirstNameNoTooltip] [Select_CString(target.IsFemale, 'бросила', 'бросил')] письма к [Select_CString(owner.IsFemale, 'её', 'его' )] ногам и стремительно [Select_CString(target.IsFemale, 'покинула', 'покинул')] комнату, а [owner.GetFirstNameNoTooltip] [Select_CString(owner.IsFemale, 'осталась', 'остался' )] в шоковом оцепенении.\n\nСодержание писем можно было только угадывать, но по тому, как [Select_CString(owner.IsFemale, 'она', 'он' )], опустив глаза, [Select_CString(owner.IsFemale, 'собирала', 'собирал' )] их, и по осуждающим взглядам остальных в комнате, стало ясно: все прекрасно понимали, чем [Select_CString(owner.IsFemale, 'занималась', 'занимался' )] [owner.GetFirstNameNoTooltip]. Не менее ясно было и то, что теперь всё кончено."
 agot_seduce_outcome.4909.a: "Вот это да!"

 lmf_army.1010.t: "Лагерная девка"
 lmf_army.1010.female.start: "При войске в походе всегда тянутся несколько крестьянок. В основном это поварихи и прачки, но некоторых зовут и «лагерными девками» — теми, кто делает всё, чтобы [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] обратил на них внимание, для того, чтобы либо найти мужа, либо заработать пару монет, подарив ему ночь утешения.\n\nОбычно я не обращаю особого внимания на этих женщин, но в последнее время одна из них #EMP всё же#! привлекла мой взгляд. [follower.GetCulture.GetCollectiveNounNoTooltip]ая девица улыбается мне каждый раз, когда я прохожу мимо, и, похоже, не возражала бы против позднего визита... это очевидно.\n\n"
 lmf_army.1010.male.start: "При войске в походе всегда тянутся крестьяне. Большинство из них — женщины, поварихи и прачки, а также печально известные «лагерные девки», которые делают всё, в надежде, что статный [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] рыцарь обратит на них внимание, их терпят лишь потому, что они готовы дарить утешение.\n\nОбычно я не обращаю на них внимания, но в последнее время среди них выделяется красивый [follower.GetCulture.GetCollectiveNounNoTooltip]ий юноша — сын прачки, как мне сказали, который помогает чинить повозки. По тому, как он улыбается мне всякий раз, когда я прохожу мимо, ясно, что он был бы не прочь позднего визита.\n\n"
 lmf_army.1010.end: "Вопрос лишь в том, [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )] ли #EMP я#!?"
 lmf_army.1010.a: "Почему бы и нет? Навещу [follower.GetHerHis]."
 lmf_army.1010.b: "Нет, лучше избегать таких связей."

 lmf_army.1020.t: "Трактирная девка"
 lmf_army.1020.desc: "Устав от лагерной стряпни, [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] и я решили заглянуть в небольшую деревенскую таверну неподалёку от владения [army.GetLocation.GetTitle.GetNameNoTierNoTooltip], чтобы выпить и развлечься.\n\nВечер прошёл вполне приятно, и я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что одна из трактирных девок явно положила на меня глаз. Она присела к нашему столу, чокалась за нашу удачу, смеялась над шутками, но всё это время улыбалась только мне — и никому другому.\n\nРазвеяться за кружкой-другой — это одно. Но захочу ли я провести с ней ночь страсти? Если да, было ясно, что для этого нужно лишь попросить."
 lmf_army.1020.a: "А почему бы и нет."
 lmf_army.1020.b: "Нет, она меня не интересует."

 lmf_army.1030.t: "Буйная ночь в таверне"
 lmf_army.1030.desc: "Я и [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] отправились из лагеря войска во владении [army.GetLocation.GetTitle.GetNameNoTierNoTooltip] в соседнюю деревню, где, по словам одного из наших, имелась таверна.\n\nМесто оказалось неплохим, и вскоре мы уже изрядно набрались, горланя во всю глотку и веселясь, как это свойственно солдатам.\n\nВозможно, мы слегка перебрали, и терпение местных начало иссякать. Слово за слово, пара ударов — и вот я уже лицом к лицу с разъярённым, громилоподобным местным жителем."
 lmf_army.1030.a: "Пора выпустить пар!"
 lmf_army.1030.a.injury.tt: "[champion.GetShortUINameNoTooltipNoFormat|U] [Select_CString(champion.IsFemale, 'получила', 'получил' )] ранение в драке"
 lmf_army.1030.a.injury.desc: "Ваш [player.Custom('KnightCultureNoTooltipLowercase')] [champion.GetShortUIName] [Select_CString(champion.IsFemale, 'получила', 'получил' )] ранение после того, как [Select_CString(champion.IsFemale, 'спровоцировала', 'спровоцировал' )] драку в деревенской таверне неподалёку от владения [province.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1030.b: "Может, попробую всех успокоить, пока не стало хуже..."
 lmf_army.1030.c: "Лучше уйти, пока не стало #EMP совсем#! жарко."

 lmf_army.1040.t: "Ночь веселья"
 lmf_army.1040.siege.start: "Осада тянется, и конца-края ей не видно. В лагерях царит напряжение, и признаюсь — я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам')] чувствую этот стресс.\n\nТак что неудивительно, что, как только солнце садится, я оказываюсь в центре попойки - вокруг [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')], которые хлопают меня по плечу и подбадривают. Мы обчистили палатку квартирмейстера, вытащив крепкий алкоголь, и уже сейчас я понимаю: это будет та самая ночь, за которую утро отомстит сполна.\n\n"
 lmf_army.1040.march.start: "Кажется, этот марш длится уже вечность. В лагерях царит напряжение, и признаюсь — я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам')] чувствую этот стресс.\n\nТак что неудивительно, что, как только солнце садится, я и [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] оказываемся в таверне небольшой [army.GetLocation.GetCounty.GetCulture.GetCollectiveNounNoTooltip]ской деревушки неподалёку. Местные быстро разбегаются от нашей шумной компании, а хозяева таверны беспомощно наблюдают из тени, пока мы пьем, орем и веселимся. И уже сейчас я понимаю: это будет та самая ночь, за которую утро отомстит сполна.\n\n"
 lmf_army.1040.end: "Надо бы остановиться, говорю я себе. Но мне нужен какой-то выход. #EMP Хоть что-то.#! "
 lmf_army.1040.a: "Пожалуй, лучше найти кого-то для ночи."
 lmf_army.1040.a.male.camp: "Вы ищете в лагере молодого мужчину, с которым можно провести ночь."
 lmf_army.1040.a.male.tavern: "Вы ищете в таверне молодого мужчину, с которым можно провести ночь."
 lmf_army.1040.a.female.camp: "Вы ищете в лагере походную девку, с которой можно провести ночь."
 lmf_army.1040.a.female.tavern: "Вы ищете в таверне молодую девушку, с которой можно провести ночь."
 lmf_army.1040.b: "Пожалуй, лучше найти кого-то для поединка."
 lmf_army.1040.c: "Наверняка тут можно присоединиться к азартной игре?"
 lmf_army.1040.d: "Лучше направлю аппетит на еду, а не на выпивку!"
 lmf_army.1040.e: "Ночь излишеств — вот что мне нужно!"
 lmf_army.1040.f: "Я смогу устоять перед искушением. Пора отойти на покой."

 lmf_army.1050.t: "Друзья по оружию"
 lmf_army.1050.march.start: "Дни, проведённые в марше по владению [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], тянутся долго, "
 lmf_army.1050.siege.start: "Дни, проведённые в осаде владения [army.GetLocation.GetTitle.GetNameNoTierNoTooltip], тянутся долго, "
 lmf_army.1050.end: "и между солдатами не всегда царит дружеское товарищество. Напряжение нередко зашкаливает.\n\nНо сегодня вечером, когда я отдыхаю у костра, ко мне присоединяется [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))], и разговор идёт легко. [Select_CString(army_friend.IsFemale, 'Она', 'Он' )] развлекает меня забавными историями, и сердце моё оттаивает; к тому времени, как огонь начинает угасать, я почти совсем забываю, где нахожусь.\n\nПо [Select_CString(army_friend.IsFemale, 'её', 'его' )] лукавому взгляду я понимаю, что [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] отлично [Select_CString(army_friend.IsFemale, 'осознавала', 'осознавал' )] моё состояние и намеренно [Select_CString(army_friend.IsFemale, 'провела', 'провёл' )] вечер, развлекая меня. [Select_CString(army_friend.IsFemale, 'Отличная', 'Отличный' )] [army_friend.GetWomanMan], скажу я."
 lmf_army.1050.a: "Думаю, я [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашёл' )] [Select_CString(army_friend.IsFemale, 'новую подругу', 'нового друга' )]."
 lmf_army.1050.a.friend.tt: "[player.Custom('KnightCulturePluralNoTooltip')] становятся друзьями"
 lmf_army.1050.a.friend.desc: "Ваш [player.Custom('KnightCultureNoTooltipLowercase')] [champion.GetShortUIName] и [army_friend.GetShortUIName] подружились, находясь в военном лагере неподалёку от владения [province.GetTitle.GetNameNoTierNoTooltip]."
 made_friend_at_army_camp: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] подружились, находясь в составе войска, расположившегося лагерем у провинции [PROVINCE.GetNameNoTooltip]."
 lmf_army.1050.b: "Я ценю [army_friend.GetHerHis] усилия, но не хочу, чтобы это заходило дальше."

 lmf_army.1060.t: "Соперники по оружию"
 lmf_army.1060.mid: "и между солдатами не всегда царит дружеское товарищество. Напряжение нередко зашкаливает.\n\nСегодняшний вечер был тому наглядным примером. В течение дня я и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_rival'))] несколько раз вступали в перепалки, которые едва не перерастали в ссоры, прежде чем я [Select_CString(ROOT.Char.IsFemale, 'сжимала', 'сжимал' )] зубы и просто [Select_CString(ROOT.Char.IsFemale, 'уходила', 'уходил' )]. Однако позже, когда мы сидели у костра, я [Select_CString(ROOT.Char.IsFemale, 'подслушала', 'подслушал' )], как [Select_CString(army_rival.IsFemale, 'она отпускала', 'он отпускал' )] комментарии обо мне, а другие [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] слушали эту клевету.\n\nНесомненно, всё это было вызвано "
 lmf_army.1060.revenge: "желанием отомстить, "
 lmf_army.1060.impious: "недовольством моей «безбожностью», "
 lmf_army.1060.pious: "недовольством моей набожностью, "
 lmf_army.1060.faith: "ненавистью к моей вере, "
 lmf_army.1060.jealous: "ревностью, "
 lmf_army.1060.differences: "нашими сильными разногласиями, "
 lmf_army.1060.hatred: "привычной ненавистью ко мне и ничем новым, "
 lmf_army.1060.end: "но терпеть, как [Select_CString(army_rival.IsFemale, 'она', 'он' )] распространяет ложь у меня за спиной, я больше не собираюсь.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'поднялась и бросила', 'поднялся и бросил' )] [Select_CString(army_rival.IsFemale, 'ей', 'ему' )] вызов, и вскоре мы уже дрались. Другие [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] были вынуждены нас разнимать, так и не поняв, кто начал первым. Более того, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_rival'))] [Select_CString(army_rival.IsFemale, 'заявила', 'заявил' )], что [Select_CString(ROOT.Char.IsFemale, 'виновата', 'виноват' )] #EMP я#!."
 lmf_army.1060.a: "Это непростительно!"
 lmf_army.1060.a.rival.tt: "[player.Custom('KnightCulturePluralNoTooltip')] становятся врагами"
 lmf_army.1060.a.rival.desc: "Ваш [player.Custom('KnightCultureNoTooltipLowercase')] [champion.GetShortUIName] и [army_rival.GetShortUIName] стали врагами, находясь в военном лагере неподалёку от провинции [province.GetTitle.GetNameNoTierNoTooltip]."
 became_rivals_army_camp: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] стали заклятыми врагами, находясь в составе войска, расположившегося лагерем у провинции [PROVINCE.GetNameNoTooltip]."
 lmf_army.1060.b: "Попробую [Select_CString(army_rival.IsFemale, 'её', 'его' )] успокоить, чтобы уладить всё как можно лучше."
 lmf_army.1060.c: "Стисну зубы и уйду. Снова."

 lmf_army.1070.t: "Кипение эмоций"
 lmf_army.1070.mid: "и, конечно, совсем не помогает то, что [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_rival'))] находится в военном лагере.\n\n[army_rival.GetHerHis|U] язвительное отношение ко мне раздражает с первого дня, а сегодня наша взаимная усталость только усугубила ситуацию. Одна едкая реплика сменяет другую, и когда мы задели друг друга при проходе — #EMP [army_rival.GetSheHe]#! [Select_CString(army_rival.IsFemale, 'сделала', 'сделал' )] это намеренно, я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )] — вдруг [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_rival'))] [Select_CString(army_rival.IsFemale, 'выхватила', 'выхватил' )] меч и [Select_CString(army_rival.IsFemale, 'вызвала', 'вызвал' )] меня на поединок.\n\n"
 lmf_army.1070.liege: "Технически говоря, такие несанкционированные поединки не допускаются в войске. Как [army_rival.GetHerHis] сюзерен, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы просто решить проигнорировать это правило... а ещё я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы заковать [army_rival.GetHerHis] в цепи за попытку напасть на своего сюзерена, что технически является изменой, так ведь? Но #EMP ох#! как же было бы приятно проучить [army_rival.GetHerHis]!"
 lmf_army.1070.commander: "Технически говоря, такие несанкционированные поединки не допускаются в войске. Однако как [army_rival.GetHerHis] командир, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы просто решить проигнорировать это правило... #EMP ох#! как же было бы приятно проучить [army_rival.GetHerHis]!"
 lmf_army.1070.knight: "Единственная проблема? Такие несанкционированные поединки не допускаются в войске. Мы оба можем оказаться в цепях за неповиновение приказам... но #EMP ох#! как же было бы приятно проучить [army_rival.GetHerHis]!"
 lmf_army.1070.a: "Если [army_rival.GetSheHe] хочет поединка — пусть так и будет!"
 lmf_army.1070.a.root.kill.tt: "[duel_opponent.GetShortUINameNoTooltipNoFormat|U] [Select_CString(duel_opponent.IsLocalPlayer, 'убиваете', 'убивает' )] [Select_CString(army_rival.IsLocalPlayer, '', 'персонажа ' )][army_rival.GetShortUINamePossessive][Select_CString(army_rival.IsLocalPlayer, 'его персонажа', '' )] в поединке"
 lmf_army.1070.a.root.kill.title: "[army_rival.GetShortUINameNoTooltipNoFormat] [Select_CString(army_rival.IsFemale, 'убита', 'убит' )] в поединке"
 lmf_army.1070.a.root.kill.desc: "[duel_opponent.GetShortUIName|U] [Select_CString(duel_opponent.IsLocalPlayer, 'убиваете', 'убивает' )] [Select_CString(army_rival.IsLocalPlayer, '', 'персонажа ' )][army_rival.GetShortUINamePossessive][Select_CString(army_rival.IsLocalPlayer, 'его персонажа', '' )] в несанкционированном поединке, пока войско стояло лагерем в провинции [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.a.root.kill.sanctioned.desc: "[duel_opponent.GetShortUIName|U] [Select_CString(duel_opponent.IsLocalPlayer, 'убиваете', 'убивает' )] [Select_CString(army_rival.IsLocalPlayer, '', 'персонажа ' )][army_rival.GetShortUINamePossessive][Select_CString(army_rival.IsLocalPlayer, 'его персонажа', '' )] в поединке, пока войско стояло лагерем в провинции [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.a.root.win.tt: "[duel_opponent.GetShortUINameNoTooltipNoFormat|U] [Select_CString(duel_opponent.IsLocalPlayer, 'побеждаете', 'побеждает' )] в поединке"
 lmf_army.1070.a.root.win.title: "[army_rival.GetShortUINameNoTooltipNoFormat] [Select_CString(army_rival.IsFemale, 'ранена', 'ранен' )] в поединке"
 lmf_army.1070.a.root.win.desc: "[army_rival.GetShortUIName] [Select_CString(army_rival.IsFemale, 'получила', 'получил' )] ранение, проиграв несанкционированный поединок с [Select_CString(duel_opponent.IsLocalPlayer, '', 'персонажем ' )][duel_opponent.GetShortUINamePossessive][Select_CString(duel_opponent.IsLocalPlayer, 'им персонажем', '' )], пока войско стояло лагерем в провинции [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.a.root.win.sanctioned.desc: "[army_rival.GetShortUIName] [Select_CString(army_rival.IsFemale, 'получила', 'получил' )] ранение, проиграв поединок с [Select_CString(duel_opponent.IsLocalPlayer, '', 'персонажем ' )][duel_opponent.GetShortUINamePossessive][Select_CString(duel_opponent.IsLocalPlayer, 'им персонажем', '' )], пока войско стояло лагерем в провинции [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.a.rival.win.tt: "[army_rival.GetShortUINameNoTooltipNoFormat|U] [Select_CString( army_rival.IsLocalPlayer, 'побеждаете', 'побеждает')] в поединке"
 lmf_army.1070.a.rival.win.title: "[duel_opponent.GetShortUINameNoTooltipNoFormat|U] [Select_CString( duel_opponent.IsLocalPlayer, 'получаете', 'получает')] ранение в поединке"
 lmf_army.1070.a.rival.win.desc: "[duel_opponent.GetShortUINameNoTooltipNoFormat|U] [Select_CString( duel_opponent.IsLocalPlayer, 'получили', Select_CString(duel_opponent.IsFemale, 'получила', 'получил' ))] ранение, проиграв несанкционированный поединок с [Select_CString(army_rival.IsLocalPlayer, '', 'персонажем ' )][army_rival.GetShortUINamePossessive][Select_CString(army_rival.IsLocalPlayer, 'им персонажем', '' )], пока войско стояло лагерем в провинции [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.a.rival.win.sanctioned.desc: "[duel_opponent.GetShortUIName|U] [Select_CString( duel_opponent.IsLocalPlayer, 'получили', Select_CString(duel_opponent.IsFemale, 'получила', 'получил' ))] ранение, проиграв поединок с [Select_CString(army_rival.IsLocalPlayer, '', 'персонажем ' )][army_rival.GetShortUINamePossessive][Select_CString(army_rival.IsLocalPlayer, 'им персонажем', '' )], пока войско стояло лагерем в провинции [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.a.rival.kill.tt: "[army_rival.GetShortUINameNoTooltipNoFormat] [Select_CString( army_rival.IsLocalPlayer, 'убиваете', 'убивает')] [Select_CString(duel_opponent.IsLocalPlayer, '', 'персонажа ' )][duel_opponent.GetShortUINamePossessive][Select_CString(duel_opponent.IsLocalPlayer, 'его персонажа', '' )] в поединке"
 lmf_army.1070.a.rival.kill.title: "[duel_opponent.GetShortUINameNoTooltipNoFormat|U] [Select_CString( duel_opponent.IsLocalPlayer, 'убиты', Select_CString(duel_opponent.IsFemale, 'убита', 'убит' ))] в поединке"
 lmf_army.1070.a.rival.kill.desc: "[army_rival.GetShortUIName] [Select_CString(army_rival.IsFemale, 'убила', 'убил' )] [Select_CString(duel_opponent.IsLocalPlayer, '', 'персонажа ' )][duel_opponent.GetShortUINamePossessive][Select_CString(duel_opponent.IsLocalPlayer, 'его персонажа', '' )] в несанкционированном поединке, пока войско стояло лагерем в провинции [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.a.rival.kill.sanctioned.desc: "[army_rival.GetShortUIName] [Select_CString(army_rival.IsFemale, 'убила', 'убил' )] [Select_CString(duel_opponent.IsLocalPlayer, '', 'персонажа ' )][duel_opponent.GetShortUINamePossessive][Select_CString(duel_opponent.IsLocalPlayer, 'его персонажа', '' )] в поединке, пока войско стояло лагерем в провинции [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 army_camp_duel_rivalry: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'стали', Select_CString(TARGET_CHARACTER.IsFemale, 'стала', 'стал' ))] заклятым врагом [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] после того, как [Select_CString( CHARACTER.IsLocalPlayer, 'вы проиграли', Select_CString(CHARACTER.IsFemale, 'она проиграла', 'он проиграл' ))] поединок с [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вами', Select_CString(TARGET_CHARACTER.IsFemale, 'ней', 'ним' ))]."
 army_camp_duel_rivalry_corresponding: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'стали', Select_CString(CHARACTER.IsFemale, 'стала', 'стал' ))] заклятым врагом [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] после того, как [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вы проиграли', Select_CString(TARGET_CHARACTER.IsFemale, 'она проиграла', 'он проиграл' ))] поединок с [Select_CString( CHARACTER.IsLocalPlayer, 'вами', Select_CString(CHARACTER.IsFemale, 'ней', 'ним' ))]."
 lmf_army.1070.b: "Как [army_rival.GetSheHe] [Select_CString(army_rival.IsFemale, 'посмела', 'посмел' )]?! Заковать [army_rival.GetHerHis] в цепи!"
 lmf_army.1070.b.imprison.tt: "[champion.GetShortUINameNoTooltipNoFormat|U] [Select_CString( champion.IsLocalPlayer, 'заключаете', 'заключает')] [Select_CString(army_friend.IsLocalPlayer, '', 'персонажа ' )][army_friend.GetShortUINamePossessive][Select_CString(army_friend.IsLocalPlayer, 'его персонажа', '' )] в темницу"
 lmf_army.1070.b.imprison.desc: "Наш [player.Custom('KnightCultureNoTooltipLowercase')], [army_rival.GetShortUIName], [Select_CString(army_rival.IsFemale, 'заключена', 'заключён' )] персонажем [champion.GetShortUIName] в темницу за вызов [champion.GetHerHis] на поединок в армейском лагере в провинции [province.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.c: "Я уйду, как более [Select_CString(ROOT.Char.IsFemale, 'великая женщина', 'великий мужчина' )]."

 lmf_army.1080.t: "Любовники на войне"
 lmf_army.1080.desc: "В последнее время я и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_lover'))] проводили много времени вместе. Мы вместе тренировались, вместе ели у костра, шутили друг с другом и рассказывали истории из дома. Это могло бы показаться дружбой, но между нами всегда была... #EMP напряжённость#!. Я [Select_CString(ROOT.Char.IsFemale, 'думала', 'думал' )], что это только с моей стороны, но время от времени [Select_CString(ROOT.Char.IsFemale, 'ловила', 'ловил' )] на себе [army_lover.GetHerHis] взгляд, намекающий, что [army_lover.GetSheHe] тоже это чувствует.\n\nСегодня вечером, когда я [Select_CString(ROOT.Char.IsFemale, 'возвращалась', 'возвращался' )] в палатку, вдруг там [Select_CString(army_lover.IsFemale, 'оказалась', 'оказался' )] [army_lover.GetSheHe]. [army_lover.GetSheHe|U] стоит у входа, без одежды, и смотрит на меня с тем самым взглядом, что говорит: наша ночь только начинается..."
 lmf_army.1080.a: "Это может быть началом чего-то особенного."
 army_camp_rendezvous: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] стали любовниками во время службы в армейском лагере в провинции [PROVINCE.GetNameNoTooltip]."
 lmf_army.1080.b: "Заключить [army_lover.GetHerHis] в объятия, но только на эту ночь."
 lmf_army.1080.c: "Нет, этого не будет."

 lmf_army.1090.t: "Мгновение передышки"
 lmf_army.1090.desc: "Тяжело идти в походе день за днём. Бесконечная ходьба, бесконечные жалобы, плохая еда и безжалостное солнце, палящее в лицо.\n\nИногда, однако, другие [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] способны скрасить всё это. Сегодня был именно такой вечер. Мы расположились лагерем во владении [army.GetLocation.GetTitle.GetNameNoTierNoTooltip], и боевой дух был на высоте: пиво лилось рекой, а воины были необычайно веселы.\n\nВ особенности [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_entertainer'))], казалось, будто [army_entertainer.GetSheHe] [Select_CString(army_entertainer.IsFemale, 'поставила', 'поставил' )] себе цель поднять настроение всем. Когда один из солдат заиграл на лютне, которую принёс с собой, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_entertainer'))] [Select_CString(army_entertainer.IsFemale, 'рассмеялась и начала', 'рассмеялся и начал' )] танцевать вокруг костра.\n\nЯ не [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог' )] сдержать смех и [Select_CString(ROOT.Char.IsFemale, 'присоединилась', 'присоединился' )] к веселью. Это был отличный вечер."
 lmf_army.1090.a: "Вечер, который стоит запомнить!"

 lmf_army.1100.t: "Ночи становятся длиннее"
 lmf_army.1100.end: "а ночи кажутся ещё длиннее.\n\nХворь прошла по лагерю, из-за чего большинство из нас оказалось заперто в палатках, когда мы не нужны где-то ещё... и это было бы терпимо, если бы здесь было хоть что-то #EMP делать#!.\n\nСкука заменила собой любое беспокойство, которое я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы испытывать перед боем. Даже редкие тренировки, в которых я [Select_CString(ROOT.Char.IsFemale, 'участвовала', 'участвовал' )], не смогли развеять это чувство, будто я нахожусь здесь целую вечность.\n\nБолее того, я вижу, что и другие [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] ощущают то же самое."
 lmf_army.1100.a: "Так не может продолжаться вечно..."

 lmf_army.1110.t: "Дождливые дни"
 lmf_army.1110.t.desert: "Песчаные бури"
 lmf_army.1110.normal: "и они казались ещё длиннее из-за непрекращающегося ливня.\n\nДень за днём проходили под завывания ветра и удары холодного дождя по солдатам. Мне редко приходилось чувствовать себя более жалко... и даже когда дождь наконец прекратился, холод так и не покинул мои кости."
 lmf_army.1110.desert: "и они казались ещё длиннее из-за постоянных песчаных бурь.\n\nДень за днём проходили под завывания ветра и песок, проникающий в каждую часть доспеха. Он забивается в рот, в уши, проникает в палатки и в еду... Между песком и палящим зноем пустыня оставила меня [Select_CString(ROOT.Char.IsFemale, 'сухой и измождённой', 'сухим и измождённым' )], и даже когда бури наконец стихли, это чувство так и не прошло."
 lmf_army.1110.end: "В лёгких поселился кашель, и он, похоже, становится всё хуже.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'пыталась', 'пытался' )] сохранять бодрый вид перед солдатами, но, боюсь, больше не смогу выдержать."
 lmf_army.1110.a: "Позвать лекаря!"

 lmf_army.1120.t: "Шаг за черту"
 lmf_army.1120.war: "Войско проходит через владение [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], и я патрулирую одну из местных деревень, которые мы разграбили в поисках припасов "
 lmf_army.1120.nowar: "Войско проходит через владение [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], и я [Select_CString(ROOT.Char.IsFemale, 'отправилась', 'отправился' )] вместе с несколькими солдатами в одну из местных деревень на поиски припасов "
 lmf_army.1120.end: "и мне на глаза попадается [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_bully'))], [Select_CString(army_bully.IsFemale, 'приставающая', 'приставающий' )] к одному из местных [army.GetLocation.GetCounty.GetCulture.GetCollectiveNounNoTooltip]их жителей прямо на улице.\n\nПохоже, [army_bully.GetSheHe] [Select_CString(army_bully.IsFemale, 'уверена', 'уверен' )], что этот человек виновен в каком-то проступке или располагает нужной нам информацией, но, по крайней мере для меня, очевидно, что это жалкое создание ничего не знает. Он умоляет о пощаде, что лишь подталкивает [army_bully.GetHerHis] жестокость на новые высоты.\n\nС таким количеством местных и даже наших солдат, застывших вокруг в шоке от происходящего, я чувствую себя почти [Select_CString(ROOT.Char.IsFemale, 'обязанной', 'обязанным' )] вмешаться... хотя [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_bully'))] явно не оценит моего вмешательства."
 lmf_army.1120.a: "Мне всё равно, что [army_bully.GetSheHe] думает. Это нужно прекратить."
 interfered_with_army_bully: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'вмешались', Select_CString(CHARACTER.IsFemale, 'вмешалась', 'вмешался' ))] в допрос местного крестьянина [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажем ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'им персонажем', '' )]."
 interfered_with_army_bully_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вмешались', Select_CString(TARGET_CHARACTER.IsFemale, 'вмешалась', 'вмешался' ))] в допрос местного крестьянина [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажем ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'им персонажем', '' )]."
 lmf_army.1120.b: "Это [army_bully.GetHerHis] дело, а не моё."

 lmf_army.1130.t: "Удачный улов"
 lmf_army.1130.desc: "Осада владения [army.GetLocation.GetTitle.GetNameNoTierNoTooltip] уже кажется бесконечной, а продвижение идёт медленно.\n\nКакое же это везение, что сегодня мои солдаты схватили местного жителя, пытавшегося незаметно пробраться сквозь наши ряды. Его, скорее всего, казнили бы на месте, если бы не случайность — один из солдат умел читать… и заметил, что маленькая книжка, найденная при этом человеке, может содержать полезные сведения.\n\nВместо казни его взяли в плен и привели ко мне. После нескольких вопросов я [Select_CString(ROOT.Char.IsFemale, 'убедилась', 'убедился')] в правоте солдата: в этой книжке, предназначенной для передачи союзникам врага, оказалась масса полезной информации о фортификациях, запасах и слабых местах обороны владения [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip].\n\nПохоже, нам с этим человеком будет #EMP о многом#! поговорить!"
 lmf_army.1130.a: "Думаю, теперь дела здесь пойдут быстрее."
 lmf_army.1130.a.title: "Получены сведения об осаде"
 lmf_army.1130.a.desc: "[commander.GetShortUIName|U] [Select_CString(commander.IsFemale, 'получила', 'получила' )] информацию о фортификациях и запасах врага во владении [army.GetLocation.GetTitle.GetNameNoTier] от пленного."

 lmf_army.1140.t: "Многообещающий солдат"
 lmf_army.1140.desc: "За месяцы, проведённые среди солдат, я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )] [Select_CString(army_potential.IsFemale, 'одну', 'одного' )], кто выделяется среди остальных.\n\n[Select_CString(ROOT.Char.IsFemale, 'Эта женщина', 'Этот мужчина' )] из малоизвестного [army_potential.GetCulture.GetCollectiveNounNoTooltip]ого рода, не имеющего других особо примечательных членов, [Select_CString(army_potential.IsFemale, 'проявила', 'проявил' )] себя как [Select_CString(army_potential.IsFemale, 'умелая и рьяная', 'умелый и рьяный' )] служака. И действительно, после того как мы перекинулись парой слов вечером, [army_potential.GetSheHe] [Select_CString(army_potential.IsFemale, 'пришла', 'пришёл' )] ко мне в шатёр и [Select_CString(army_potential.IsFemale, 'предложила', 'предложил' )] клятву верности, если я соглашусь взять [army_potential.GetHerHis] в [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nЯ, разумеется, [Select_CString(ROOT.Char.IsFemale, 'заинтригована', 'заинтригован' )], но даже при всём умении, нужен ли мне ещё один [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]?"
 lmf_army.1140.a: "Мне всегда нужны умелые [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]."
 lmf_army.1140.b: "Нет, мне не нужны [army_potential.GetHerHis] услуги."

 lmf_army.1150.t: "Случайная встреча"
 lmf_army.1150.begin: "Я [Select_CString(ROOT.Char.IsFemale, 'патрулировала', 'патрулировал' )] владение [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] с несколькими солдатами, когда мы наткнулись на то, что сначала приняли за труп: тело [Select_CString(army_stranger.IsFemale, 'женщины', 'мужчины' )] в кустах, без сомнения — жертвы нападения [army.GetLocation.GetCounty.GetCulture.GetCollectiveNounNoTooltip]их разбойников. Однако, присмотревшись, мы обнаружили, что [army_stranger.GetWomanMan] вовсе не [Select_CString(army_stranger.IsFemale, 'мертва', 'мёртв' )], так что я [Select_CString(ROOT.Char.IsFemale, 'велела', 'велел' )] доставить [army_stranger.GetHerHis] в лагерь для оказания помощи.\n\nОправившись, [army_stranger.GetSheHe] [Select_CString(army_stranger.IsFemale, 'выразила', 'выразил' )] свою благодарность. Я [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал' )], что [army_stranger.GetHerHis] зовут [army_stranger.GetFirstNameNoTooltip], "
 lmf_army.1150.poet: "[Select_CString(army_stranger.IsFemale, 'она поэтесса', 'он поэт')], [Select_CString(army_stranger.IsFemale, 'которая направлялась', 'который направлялся' )] во владение [army.GetLocation.GetTitle.GetNameNoTierNoTooltip], когда на н[army_stranger.GetHerHis] напали, "
 lmf_army.1150.monk: "[army_stranger.GetWomanMan], [Select_CString(army_stranger.IsFemale, 'состоявшая', 'состоявший' )] в святом ордене и [Select_CString(army_stranger.IsFemale, 'шедшая', 'шедший' )] из близлежащего храма, когда на н[army_stranger.GetHerHis] напали, "
 lmf_army.1150.scholar: "[Select_CString(army_stranger.IsFemale, 'учёная, направлявшаяся', 'учёный, направлявшийся' )] в дальний университет, когда на н[army_stranger.GetHerHis] напали, "
 lmf_army.1150.pilgrim: "[Select_CString(army_stranger.IsFemale, 'простая', 'простой' )] [army_stranger.GetFaith.GetAdherentNameNoTooltip], [Select_CString(army_stranger.IsFemale, 'находившаяся', 'находившийся' )] в паломничестве, когда на н[army_stranger.GetHerHis] напали, "
 lmf_army.1150.merchant: "[Select_CString(army_stranger.IsFemale, 'купчиха, направлявшаяся', 'купец, направлявшийся' )] во владение [army.GetLocation.GetTitle.GetNameNoTierNoTooltip], когда на н[army_stranger.GetHerHis] напали, "
 lmf_army.1150.architect: "[Select_CString(army_stranger.IsFemale, 'архитекторша, направлявшаяся', 'архитектор, направлявшийся' )] во владение [army.GetLocation.GetTitle.GetNameNoTierNoTooltip] в поисках работы, когда на н[army_stranger.GetHerHis] напали, "
 lmf_army.1150.gallowsbait: "и хотя [army_stranger.GetSheHe] [Select_CString(army_stranger.IsFemale, 'была скрытна', 'был скрытен' )] насчёт своих дел в этих местах, очевидно, что [Select_CString(army_stranger.IsFemale, 'ей', 'ему')] не повезло: на н[army_stranger.GetHerHis] напали, "
 lmf_army.1150.end: "лишив [army_stranger.GetHerHis] имущества и бросили умирать.\n\n[army_stranger.GetWomanMan] [Select_CString(army_stranger.IsFemale, 'заявила', 'заявил' )], что [Select_CString(army_stranger.IsFemale, 'обязана', 'обязан' )] мне жизнью, и [Select_CString(army_stranger.IsFemale, 'предложила', 'предложил' )] служить верным членом моего двора… если, конечно, я соглашусь приютить [army_stranger.GetHerHis]."
 lmf_army.1150.a: "Я буду [Select_CString(ROOT.Char.IsFemale, 'рада', 'рад' )], если [army_stranger.GetSheHe] присоединится ко мне."
 lmf_army.1150.b: "Нет, пора [army_stranger.GetHerHim] отправляться в свой путь."

 lmf_army.1160.t: "[Select_CString(ROOT.Char.IsFemale, 'Спасена', 'Спасён' )] [Select_CString(army_stranger.IsFemale, 'незнакомкой', 'незнакомцем' )]"
 lmf_army.1160.begin: "Я [Select_CString(ROOT.Char.IsFemale, 'патрулировала', 'патрулировал' )] недалеко от лагеря во владении [army.GetLocation.GetTitle.GetNameNoTierNoTooltip], когда внезапно на меня и нескольких солдат, что были со мной, напала группа [army.GetLocation.GetCounty.GetCulture.GetCollectiveNounNoTooltip]их разбойников. Нападение было столь внезапным и яростным, что всё могло закончиться очень плохо, если бы не неожиданное появление [Select_CString(army_stranger.IsFemale, 'незнакомки', 'незнакомца' )].\n\n[army_stranger.GetWomanMan|U] [Select_CString(army_stranger.IsFemale, 'выскочила', 'выскочил' )] из ниоткуда, с безумным криком [Select_CString(army_stranger.IsFemale, 'набросилась', 'набросился' )] на разбойников с мечом в руках... и, благодаря [army_stranger.GetHerHis] умению и моему собственному, мы смогли обратить их в бегство.\n\nПосле этого [army_stranger.GetWomanMan] [Select_CString(army_stranger.IsFemale, 'представилась', 'представился' )] как [army_stranger.GetFirstNameNoTooltip], "
 lmf_army.1160.mercenary: "[Select_CString(army_stranger.IsFemale, 'наёмница', 'наёмник' )] из этих мест, хоть и без любви к владению [army.GetLocation.GetCounty.GetTitle.GetHolder.GetTopLiege.GetTitledFirstNameNoTooltip], "
 lmf_army.1160.gallowsbait: "хотя [army_stranger.GetSheHe] больше ничего не [Select_CString(army_stranger.IsFemale, 'рассказала', 'рассказал' )] о своём загадочном прошлом, "
 lmf_army.1160.end: "и, к счастью, [Select_CString(army_stranger.IsFemale, 'оказалась', 'оказался' )] поблизости. Мы выпили вместе и хорошо поладили... Думаю, [army_stranger.GetSheHe] [Select_CString(army_stranger.IsFemale, 'могла', 'мог' )] бы согласиться на приглашение присоединиться ко мне, если бы я [Select_CString(ROOT.Char.IsFemale, 'захотела', 'захотел' )]..."
 lmf_army.1160.a: "С радостью приму ещё одного друга при дворе."
 saved_by_army_stranger: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'подружились', Select_CString(CHARACTER.IsFemale, 'подружилась', 'подружился' ))] с [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажем ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'им персонажем', '' )] после того, как [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вы спасли', Select_CString(TARGET_CHARACTER.IsFemale, 'она спасла', 'он спас' ))] [Select_CString( CHARACTER.IsLocalPlayer, 'вас', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] во время нападения разбойников."
 saved_by_army_stranger_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'подружились', Select_CString(TARGET_CHARACTER.IsFemale, 'подружилась', 'подружился' ))] с [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажем ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'им персонажем', '' )] после того, как [Select_CString( CHARACTER.IsLocalPlayer, 'вы спасли', Select_CString(CHARACTER.IsFemale, 'она спасла', 'он спас' ))] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вас', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))] во время нападения разбойников."
 lmf_army.1160.b: "Я приглашу [army_stranger.GetHerHis] служить при моём дворе."
 lmf_army.1160.c: "Я поблагодарю [army_stranger.GetHerHis] за помощь и отправлюсь дальше."

 lmf_army.1170.t: "Проблемы с провиантом"
 lmf_army.1170.desc: "Пока войско продвигается всё дальше во владение [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], запасы стремительно уменьшаются.\n\nНаши разведчики сообщили о нескольких больших фермах и усадьбах в окрестностях. Я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы послать солдат разграбить их ради необходимых припасов, но как только я дам такой приказ... их уже будет почти невозможно сдержать. Невинные будут убиты, дома сожжены, будут совершены зверства — и вся ответственность ляжет на меня.\n\nС другой стороны, если я #EMP не#! отдам приказ, возможно, многие мои солдаты погибнут от голода или чего похуже."
 lmf_army.1170.a: "[army.GetLocation.GetCounty.GetCulture.GetCollectiveNounNoTooltip]ие страдания меня не волнуют."
 lmf_army.1170.b: "Нет, мы обойдёмся тем, что у нас есть."

 lmf_army.1180.t: "[Select_CString(ROOT.Char.IsFemale, 'Потерялась и нашлась', 'Потерялся и нашёлся' )]"
 lmf_army.1180.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'присоединилась', 'присоединился' )] к нескольким рыцарям на небольшой охоте после того, как мы разбили лагерь во владении [army.GetLocation.GetTitle.GetNameNoTierNoTooltip], и — как бы мне ни было неприятно это признавать — я [Select_CString(ROOT.Char.IsFemale, 'отстала', 'отстал' )] от них и быстро [Select_CString(ROOT.Char.IsFemale, 'заблудилась', 'заблудился' )] на незнакомой местности.\n\nК счастью, на дороге я [Select_CString(ROOT.Char.IsFemale, 'встретила', 'встретил' )] местного жителя, оказавшегося дружелюбным. [army_stranger.GetSheHe|U] [Select_CString(army_stranger.IsFemale, 'представилась', 'представился' )] как [army_stranger.GetFirstNameNoTooltip], [Select_CString(army_stranger.IsFemale, 'проводница', 'проводник' )] для купцов, путешествующих через владение [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], и быстро [Select_CString(army_stranger.IsFemale, 'вывела', 'вывел' )] меня обратно в лагерь.\n\nПо дороге мы долго беседовали о моём доме... и я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что [army_stranger.GetSheHe] мечтает выбраться отсюда.\n\nБолее того, по улыбкам и явному интересу было ясно, что [army_stranger.GetSheHe] мечтает и обо мне."
 lmf_army.1180.a: "Мы проведём ночь вместе, но потом мне придётся идти дальше."
 lmf_army.1180.b: "[army_stranger.GetSheHe|U] может поехать со мной во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] как [Select_CString(army_stranger.IsFemale, 'моя новая любовница', 'мой новый любовник' )]."
 army_camp_lost_guide: "Когда [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'заблудились', Select_CString(CHARACTER.IsFemale, 'заблудилась', 'заблудился' ))] во владении [PROVINCE.GetNameNoTooltip], [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вывели', Select_CString(TARGET_CHARACTER.IsFemale, 'вывела', 'вывел' ))] [Select_CString( CHARACTER.IsLocalPlayer, 'вас', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] обратно в лагерь, и по дороге они влюбились друг в друга."
 army_camp_lost_guide_corresponding: "Когда [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'заблудились', Select_CString(TARGET_CHARACTER.IsFemale, 'заблудилась', 'заблудился' ))] во владении [PROVINCE.GetNameNoTooltip], [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'вывели', Select_CString(CHARACTER.IsFemale, 'вывела', 'вывел' ))] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вас', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))] обратно в лагерь, и по дороге они влюбились друг в друга."
 lmf_army.1180.c: "Я поблагодарю [army_stranger.GetHerHis] за помощь, и на этом всё."

 lmf_army.1190.t: "[candidate.GetCulture.GetCollectiveNounNoTooltip]ий лекарь"
 lmf_army.1190.t.maester: "Услужливый мейстер"
 lmf_army.1190.start: "Я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что в последнее время работа в шатре лекаря была на высшем уровне, и, когда я [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришёл' )] поздравить врача, [Select_CString(ROOT.Char.IsFemale, 'обнаружила', 'обнаружил' )], что это на самом деле работа "
 lmf_army.1190.maester: "мейстера.\n\n[candidate.GetWomanMan|U] [Select_CString(candidate.IsFemale, 'представилась', 'представился' )] как [candidate.GetFirstNameNoTooltip], и, когда я [Select_CString(ROOT.Char.IsFemale, 'выразила', 'выразил' )] удивление, увидев мейстера, заботящегося о моих солдатах, [Select_CString(candidate.IsFemale, 'она', 'он' )] грустно [Select_CString(candidate.IsFemale, 'кивнула и сказала', 'кивнул и сказал' )], что до недавнего времени [enemy.GetTitledFirstNameNoTooltip] [Select_CString(enemy.IsFemale, 'принимала', 'принимал' )] [Select_CString(candidate.IsFemale, 'её', 'его' )] у себя на службе. Потом [Select_CString(candidate.IsFemale, 'она', 'он' )] и [enemy.GetTitledFirstNameNoTooltip] поссорились, и [Select_CString(candidate.IsFemale, 'она решила', 'он решил' )] помогать [Select_CString(enemy.IsFemale, 'её', 'его' )] врагам.\n\nЯ удивлённо [Select_CString(ROOT.Char.IsFemale, 'подняла', 'поднял' )] брови от такого заявления, но [candidate.GetFirstNameNoTooltip] лишь [Select_CString(candidate.IsFemale, 'пожала', 'пожал' )] плечами.\n\n"
 lmf_army.1190.disgraced: "мейстера.\n\n[candidate.GetWomanMan|U] [Select_CString(candidate.IsFemale, 'представилась', 'представился' )] как [candidate.GetFirstNameNoTooltip], и, когда я [Select_CString(ROOT.Char.IsFemale, 'выразила', 'выразил' )] удивление, увидев мейстера, заботящегося о моих солдатах, [Select_CString(candidate.IsFemale, 'её', 'его' )] лицо омрачилось. [Select_CString(candidate.IsFemale, 'Она', 'Он' )] больше не мейстер, [Select_CString(candidate.IsFemale, 'объяснила она', 'объяснил он' )], из-за козней, что [Select_CString(enemy.IsFemale, 'устроила', 'устроил' )] [enemy.GetTitledFirstNameNoTooltip], [Select_CString(enemy.IsFemale, 'которой', 'которому' )] некогда [Select_CString(candidate.IsFemale, 'служила', 'служил' )]. Я осторожно [Select_CString(ROOT.Char.IsFemale, 'попыталась', 'попытался' )] выведать у [Select_CString(candidate.IsFemale, 'неё', 'него' )] больше, но, как и следовало ожидать, [Select_CString(candidate.IsFemale, 'она', 'он' )] не [Select_CString(candidate.IsFemale, 'горела', 'горел' )] желанием обсуждать свою опалу... каким бы она ни была.\n\n"
 lmf_army.1190.physician: "местного добровольца.\n\n[candidate.GetWomanMan|U] [Select_CString(candidate.IsFemale, 'представилась', 'представился' )] как [candidate.GetFirstNameNoTooltip], и, когда я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [candidate.GetHerHis] место скорее при дворе, чем в походном шатре, [candidate.GetSheHe] [Select_CString(candidate.IsFemale, 'улыбнулась и объяснила', 'улыбнулся и объяснил' )], что действительно [enemy.GetTitledFirstNameNoTooltip] [Select_CString(enemy.IsFemale, 'принимала', 'принимал' )] [Select_CString(candidate.IsFemale, 'её', 'его' )] у себя на службе, пока они не поссорились... и, похоже, любви между ними не осталось.\n\n"
 lmf_army.1190.end: "Сейчас же, [Select_CString(candidate.IsFemale, 'сказала', 'сказал' )] [candidate.GetSheHe], [Select_CString(candidate.IsFemale, 'она рада', 'он рад' )] работать там, где [candidate.GetHerHis] умения нужнее всего."
 lmf_army.1190.a: "Что ж, мы точно можем использовать [candidate.GetHerHis] умения здесь."
 lmf_army.1190.b: "Это [candidate.GetWomanMan], который [Select_CString(candidate.IsFemale, 'пригодилась', 'пригодился' )] бы мне во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]!"
 lmf_army.1190.c: "Я приглашу [candidate.GetHerHis] присоединиться ко мне во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [candidate.GetHerHis|U] умения могут оказаться полезными!"

 lmf_army.1200.t: "Тренировочный режим"
 lmf_army.1200.desc: "В моём войске сейчас тихо, хотя я знаю, что ситуация может быстро измениться.\n\nОднако, похоже, большинство солдат этого не понимают. Они бездельничают, жалуются на наряды и медлят, когда [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] зовут на учения. Некоторые из них предлагают удвоить усилия и заставить их тренироваться ещё усерднее, чтобы быть лучше подготовленными. Другие же считают, что можно позволить себе ослабить натиск... дать им отдохнуть и сохранить силы, не беспокоясь слишком сильно о дисциплине.\n\nСтоит ли мне выбрать один из этих подходов?"
 lmf_army.1200.a: "Пусть тренируются усердно. Им нужно быть готовыми."
 lmf_army.1200.b: "Пусть сохраняют силы для нужного момента."
 lmf_army.1200.c: "Ничего не менять. Всё в порядке."

 lmf_army.1210.t: "Пропавший рыцарь"
 lmf_army.1210.desc: "Я и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] находились в дозоре, когда погода резко испортилась... и вдруг [army_friend.GetSheHe] [Select_CString(army_friend.IsFemale, 'исчезла', 'исчез' )]. Я [Select_CString(ROOT.Char.IsFemale, 'обыскала', 'обыскал' )] всё вокруг, но так и не смог найти [army_friend.GetHerHis] следов.\n\n[army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] — это вражеская территория, и если я продолжу поиски, то [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )] могу попасть в беду. Но если я помчусь обратно в лагерь, шансы найти [army_friend.GetHerHis] [Select_CString(army_friend.IsFemale, 'живой', 'живым')] будут таять с каждой минутой.\n\nНужно решать быстро."
 lmf_army.1210.a: "Я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )] поищу [army_friend.GetHerHis]."
 lmf_army.1210.b: "Помчусь в лагерь и организую поисковый отряд."
 lmf_army.1210.c: "[army_friend.GetSheHe|U] [Select_CString(army_friend.IsFemale, 'взрослая', 'взрослый' )] [army_friend.GetWomanMan]. [army_friend.GetSheHe|U] [Select_CString(army_friend.IsFemale, 'сама', 'сам' )] о себе позаботится."
 lmf_army.1210.wounded.tt: "Вы не находите [army_friend.GetHerHis] и сталкиваетесь с врагом"
 lmf_army.1210.fail.tt: "Попытка найти [army_friend.GetHerHis] не увенчалась успехом"
 lmf_army.1210.succeed.tt: "[army_friend.GetSheHe|U] [Select_CString(army_friend.IsFemale, 'найдена', 'найден' )]!"
 lmf_army.1210.knight.lost.title: "[army_friend.GetTitledFirstNameNoTooltip] [Select_CString(army_friend.IsFemale, 'пропала', 'пропал' )] во владении [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]"
 lmf_army.1210.knight.lost.desc: "[army_friend.GetTitledFirstName] [Select_CString(army_friend.IsFemale, 'пропала', 'пропал' )] во время дозора во владении [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], и неизвестно, что с [Select_CString(army_friend.IsFemale, 'ней', 'ним' )] произошло."
 lmf_army.1210.knight.found.title: "[army_friend.GetTitledFirstNameNoTooltip] [Select_CString(army_friend.IsFemale, 'найдена', 'найден' )]!"
 lmf_army.1210.knight.found.desc: "После долгих поисков [army_friend.GetTitledFirstName] [Select_CString(army_friend.IsFemale, 'была найдена', 'был найден' )] во владении [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], [Select_CString(army_friend.IsFemale, 'раненная и благодарная', 'раненный и благодарный')] за спасение."
 lmf_army.1211.knight.newliege.desc: "После долгих поисков [army_friend.GetTitledFirstName] [Select_CString(army_friend.IsFemale, 'обнаружена', 'обнаружен' )]. [army_friend.GetLiege.GetShortUIName] [Select_CString(army_friend.GetLiege.IsFemale, 'позаботилась', 'позаботился' )] о [Select_CString(army_friend.IsFemale, 'ней', 'нём' )] после пережитого, [army_friend.GetSheHe] теперь предпочитает остаться при [Select_CString(army_friend.GetLiege.IsFemale, 'её', 'его' )] дворе."
 searched_for_me_after_lost: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'были благодарны', Select_CString(CHARACTER.IsFemale, 'была благодарна', 'был благодарен' ))], когда [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'разыскали', Select_CString(TARGET_CHARACTER.IsFemale, 'разыскала', 'разыскал' ))] [Select_CString( CHARACTER.IsLocalPlayer, 'вас', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] после того, как [Select_CString( CHARACTER.IsLocalPlayer, 'вы пропали', Select_CString(CHARACTER.IsFemale, 'она пропала', 'он пропал' ))] в дозоре."
 searched_for_me_after_lost_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'были благодарны', Select_CString(TARGET_CHARACTER.IsFemale, 'была благодарна', 'был благодарен' ))], когда [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString( CHARACTER.IsLocalPlayer, 'разыскали', Select_CString(CHARACTER.IsFemale, 'разыскала', 'разыскал' ))] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вас', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))] после того, как [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вы пропали', Select_CString(TARGET_CHARACTER.IsFemale, 'она пропала', 'он пропал' ))] в дозоре."
 lmf_army.1211.knight.found.desc: "После недель скитаний по владению [lost_in.GetTitle.GetNameNoTierNoTooltip] [army_friend.GetTitledFirstName] наконец [Select_CString(army_friend.IsFemale, 'была найдена и вернулась', 'был найден и вернулся' )] в провинцию [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."

 lmf_army.1220.t.commander: "Тренировка командира"
 lmf_army.1220.t.knight: "Тренировка рыцаря"
 lmf_army.1220.desc: "Последние несколько недель я и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] провели много времени в поединках… [Select_CString(army_friend.IsFemale, 'она оказалась', 'он оказался')] куда [Select_CString(army_friend.IsFemale, 'лучшей фехтовальщицей', 'лучшим фехтовальщиком' )] по сравнению со мной, что я [Select_CString(ROOT.Char.IsFemale, 'вынуждена', 'вынужден' )] признать.\n\nСначала я [Select_CString(ROOT.Char.IsFemale, 'думала', 'думал' )], что [Select_CString(army_friend.IsFemale, 'она', 'он' )] ничему меня не сможет научить, но со временем я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал' )] немало. [Select_CString(army_friend.IsFemale, 'Она была отличной наставницей', 'Он был отличным наставником')], а заодно и отвлечением от однообразных будней лагеря армии."
 lmf_army.1230.desc: "Последние несколько недель я и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] провели вместе немало времени… не обязательно в дружеской обстановке, но обсуждая стратегию и практические вопросы содержания войска такого размера.\n\nСначала у меня не было особого интереса. Если бы я [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )] узнать, как работает войско, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы просто оглядеться вокруг. Но [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] [Select_CString(army_friend.IsFemale, 'имела', 'имел' )] глубокие познания в этой теме, куда больше, чем я бы [Select_CString(ROOT.Char.IsFemale, 'приписала', 'приписал' )] [army_friend.GetHerHim], и признаюсь, это оказалось своего рода обучением." 
 lmf_army.1240.desc: "Последние несколько недель [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] [Select_CString(army_friend.IsFemale, 'обучала', 'обучал' )] меня, стараясь привить мне искусство мастерского фехтования.\n\nЧестно говоря, изначально я этого не [Select_CString(ROOT.Char.IsFemale, 'планировала', 'планировал' )]. Однако [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] [Select_CString(army_friend.IsFemale, 'подошла', 'подошёл' )] ко мне во время тренировки и [Select_CString(army_friend.IsFemale, 'сделала', 'сделал' )] пару замечаний о моём умении… Думаю, [Select_CString(army_friend.IsFemale, 'она хотела', 'он хотел' )] дать советы, но я [Select_CString(ROOT.Char.IsFemale, 'восприняла', 'воспринял' )] их в штыки.\n\nПосле трёх подряд поединков, в которых я [Select_CString(ROOT.Char.IsFemale, 'проиграла', 'проиграл' )], я [Select_CString(ROOT.Char.IsFemale, 'признала', ''признал )], что, возможно, [Select_CString(army_friend.IsFemale, 'она', 'он' )] и правда может меня чему-то научить, и этот процесс оказался куда приятнее, чем я [Select_CString(ROOT.Char.IsFemale, 'готова была', 'готов был' )] признать."
 lmf_army.1220.a: "Это может пригодиться."
 lmf_army.1220.a.improves.tt: "@knight_icon! [player.Custom('KnightCultureNoTooltip')] улучшает навыки"
 lmf_army.1220.a.prowess.desc: "Ваш [player.Custom('KnightCultureNoTooltipLowercase')], [champion.GetShortUIName], #P [Select_CString(champion.IsFemale, 'увеличила', 'увеличил' )]#! свою [Concept('prowess', 'доблесть')|E] на [prowess_i] 1 после тренировки с персонажем [army_friend.GetShortUIName]."
 lmf_army.1230.a.martial.desc: "Ваш [player.Custom('KnightCultureNoTooltipLowercase')], [champion.GetShortUIName], #P [Select_CString(champion.IsFemale, 'увеличила', 'увеличил' )]#! свой навык [Concept('martial', 'военного дела')|E] на [martial_i] 1 после тренировки с персонажем [army_friend.GetShortUIName]."
 lmf_army.1240.a.blademaster.desc: "Ваш [player.Custom('KnightCultureNoTooltipLowercase')], [champion.GetShortUIName], [Select_CString(champion.IsFemale, 'получила', 'получил' )] свойство «[GetTrait('lifestyle_blademaster').GetName( GetNullCharacter )]» после тренировки с персонажем [army_friend.GetShortUIName]."

 lmf_army.1250.t: "Глаз солдата"
 lmf_army.1250.mid: "и я признаюсь, что напряжение понемногу начинает действовать на меня. Сегодня вечером мы в основном пили молча у костра.\n\nНо всё же [Select_CString(army_lover.IsFemale, 'была одна', 'был один' )] [army_lover.GetWomanMan], [Select_CString(army_lover.IsFemale, 'которая', 'который' )] постоянно [Select_CString(army_lover.IsFemale, 'привлекала', 'привлекал' )] моё внимание. [Select_CString(army_lover.IsFemale, 'Она была', 'Он был' )] одним из рядовых солдат, "
 lmf_army.1250.male: "но красивым и, казалось, гораздо более умелым, чем большинство его товарищей."
 lmf_army.1250.female: "но красивой и, казалось, гораздо более умелой, чем большинство её товарищей-мужчин."
 lmf_army.1250.end: "Не думаю, что мы когда-либо пересекались раньше, но [Select_CString(army_lover.IsFemale, 'она казалась', 'он казался' )] странно [Select_CString(army_lover.IsFemale, 'знакомой', 'знакомым' )].\n\nПозже я [Select_CString(ROOT.Char.IsFemale, 'столкнулась', 'столкнулся' )] с [Select_CString(army_lover.IsFemale, 'той же женщиной', 'тем же мужчиной' )] возле своей палатки. [Select_CString(army_lover.IsFemale, 'Она представилась', 'Он представился' )] как [army_lover.GetFirstNameNoTooltip]... и я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что если я приглашу [army_lover.GetHerHis] внутрь, [Select_CString(army_lover.IsFemale, 'она', 'он' )] с готовностью согласится.\n\nПризнаюсь, я очень [Select_CString(ROOT.Char.IsFemale, 'соблазнена', 'соблазнён' )]."
 lmf_army.1250.a: "Почему бы и нет? Я приглашу [army_lover.GetHerHis] к себе на ночь."
 army_camp_caught_eye: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'были', Select_CString(CHARACTER.IsFemale, 'была', 'был' ))] солдатом, который привлёк внимание [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )], когда оба находились в армейском лагере в провинции [PROVINCE.GetNameNoTooltip]."
 army_camp_caught_eye_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'были', Select_CString(TARGET_CHARACTER.IsFemale, 'была', 'был' ))] солдатом, который привлёк внимание [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )], когда оба находились в армейском лагере в провинции [PROVINCE.GetNameNoTooltip]."
 lmf_army.1250.b: "На самом деле, [Select_CString(army_lover.IsFemale, 'эта', 'этот' )] [army_lover.Custom('GetLassLad')] заслуживает постоянного места при моём дворе."
 lmf_army.1250.c: "Нет, это действительно не лучшая идея."

 lmf_army.1260.t: "Пойманы у источника"
 lmf_army.1260.begin: "В походе с войском не так уж много возможностей помыться.\n\nПоэтому, когда мы разбили лагерь во владении [army.GetLocation.GetTitle.GetNameNoTierNoTooltip], и один из местных упомянул "
 lmf_army.1260.oasis: "про оазис с чистым источником неподалёку, "
 lmf_army.1260.spring: "про природный источник неподалёку, "
 lmf_army.1260.mid: "я с радостью [Select_CString(ROOT.Char.IsFemale, 'ухватилась', 'ухватился' )] за эту возможность. Найти его было непросто, но я [Select_CString(ROOT.Char.IsFemale, 'справилась', 'справился' )], и с облегчением [Select_CString(ROOT.Char.IsFemale, 'обнаружила', 'обнаружил' )], что он почти заброшен. Однако, выйдя из воды ненадолго спустя, я с удивлением [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )], что неподалёку стоит [army_stranger.GetWomanMan] и с интересом наблюдает за мной.\n\nЗаметив моё удивление, [army_stranger.GetSheHe] [Select_CString(army_stranger.IsFemale, 'извинилась и представилась', 'извинился и представился' )] как [army_stranger.GetFirstNameNoTooltip], "
 lmf_army.1260.septon.female: "[army_stranger.GetFaith.PriestFemale], чей дом - [army_stranger.GetFaith.HouseOfWorship] неподалёку.\n\n"
 lmf_army.1260.septon.male: "[army_stranger.GetFaith.PriestMale], чем дом - [army_stranger.GetFaith.HouseOfWorship] неподалёку.\n\n"
 lmf_army.1260.devoted.female: "[army_stranger.GetFaith.DevoteeFemale], чем дом - [army_stranger.GetFaith.HouseOfWorship] неподалёку.\n\n"
 lmf_army.1260.devoted.male: "[army_stranger.GetFaith.DevoteeMale], чем дом - [army_stranger.GetFaith.HouseOfWorship] неподалёку.\n\n"
 lmf_army.1260.peasant: "из деревни неподалёку.\n\n"
 lmf_army.1260.end: "[army_stranger.GetSheHe|U] [Select_CString(army_stranger.IsFemale, 'сказала', 'сказал' )] мне, что источник якобы обладает целебными свойствами, поэтому [army_stranger.GetSheHe] там и [Select_CString(army_stranger.IsFemale, 'находилась', 'находился' )], но по взгляду я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что теперь [army_stranger.GetHerHis] интересует совсем другое..."
 lmf_army.1260.a: "Я приглашу [army_stranger.GetHerHis] присоединиться ко мне в воде."
 lmf_army.1260.b: "Я соберу одежду и быстро уйду, чтобы не рисковать."

 lmf_birth.1001.t: "Позор, которым [Select_CString(relative.IsFemale, 'связана', 'связан' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))|U]"
 lmf_birth.1001.opening: "[spymaster.GetTitledFirstNameNoTooltip] [Select_CString(spymaster.IsFemale, 'пришла', 'пришёл' )] ко мне с тревожными новостями: [spymaster.GetSheHe] полагает, что моя незамужняя [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))], [relative.GetTitledFirstName], проявляет признаки беременности! "
 lmf_birth.1001.know: "[spymaster.GetTitledFirstNameNoTooltip] серьёзно подозревает, что отцом является мой [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('suspected_father'))], [suspected_father.GetTitledFirstName], но нельзя быть уверенными - [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))] должна быть допрошена, что немедленно вынесет всё дело на всеобщее обозрение.\n\n"
 lmf_birth.1001.secret: "[spymaster.GetTitledFirstNameNoTooltip] пока не имеет ни малейшего представления, кто может быть отцом, но если моя [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))] будет допрошена - это немедленно вынесет всё на всеобщее обозрение.\n\n"
 lmf_birth.1001.convent: "Однако есть один вариант. [relative.GetTitledFirstNameNoTooltip] должна уйти в уединение до рождения ребёнка — в небольшое сельское поместье, надёжно укрытое от любопытных глаз двора. Никому не нужно знать, что произошло или кто был настоящей матерью ребёнка... если, конечно, он вообще выживет. [relative.GetTitledFirstNameNoTooltip], как и мы сами, сохраним безупречную репутацию."
 lmf_birth.1001.end: "К сожалению, нет подходящего места, куда [relative.GetTitledFirstNameNoTooltip] могла бы уйти в уединение. Если она останется при дворе, то рано или поздно об этом узнают все."
 lmf_birth.1001.a: "Отправить её в уединение — этого никогда не было."
 lmf_birth.1001.b: "Немедленно изгнать её!"
 lmf_birth.1001.c: "Мы разберёмся с последствиями её проступка."
 lmf_birth.1001.d: "[suspected_father.GetTitledFirstNameNoTooltip] немедленно поступит правильно... или пожалеет."

 lmf_birth.1003.t: "Печальные вести"
 lmf_birth.1003.alive: "До нас дошли печальные вести из владения [relative.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]. Ваша [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))], [relative.GetTitledFirstNameNoTooltip], [Select_CString(relative.IsFemale, 'умерла', 'умер' )] при родах, но ребёнок выжил и, похоже, чувствует себя достаточно хорошо. Нас заверяют, что её прислужницы сделали всё возможное, но это не помогло. [relative.GetFirstNameNoTooltip] успела лишь подержать на руках [Select_CString(child.IsFemale, 'свою дочь', 'своего сына' )] и дать [child.GetHerHim] имя «[child.GetFirstNameNoTooltip]», после чего [Select_CString(relative.IsFemale, 'потеряла', 'потерял' )] сознание и больше не [Select_CString(relative.IsFemale, 'пришла', 'пришёл' )] в себя.\n\nВопрос остаётся лишь в том, что теперь делать с ребёнком."
 lmf_birth.1003.dead: "До нас дошли печальные вести из владения [relative.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]. [relative.GetTitledFirstNameNoTooltip] [Select_CString(relative.IsFemale, 'умерла', 'умер' )] при родах. Нас заверяют, что её прислужницы сделали всё возможное, но это не помогло. Ни она, ни ребёнок не выжили."
 lmf_birth.1003.a: "Я не хочу ничего знать об этом ребёнке."
 lmf_birth.1003.a.tt: "Бастард персонажа [relative.GetTitledFirstNameNoTooltip] исчезнет навсегда"
 lmf_birth.1003.b: "Нет смысла больше скрывать это."
 lmf_birth.1003.b.tt: "Бастарда персонажа [relative.GetTitledFirstNameNoTooltip] приведут ко двору, чтобы растить здесь"
 lmf_birth.1003.c: "Пусть [ROOT.Char.GetFaith.PantheonTerm2] хранят их обоих."

 lmf_birth.1004.t: "Всё позади"
 lmf_birth.1004.desc: "До нас дошли вести из владения [relative.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]. [relative.GetTitledFirstNameNoTooltip] [Select_CString(relative.IsFemale, 'родила', 'родил' )], и дело сделано — словно весь этот скандал никогда и не происходил. [Select_CString(relative.IsFemale, 'Должна ли ваша', 'Должен ли ваш' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))] вернуться домой?"
 lmf_birth.1004.a: "Разумеется! Пора оставить всё это в прошлом."
 lmf_birth.1004.b: "Пусть остаётся там, где [Select_CString(relative.IsFemale, 'она', 'он' )] есть. Мне нет дела."

 lmf_birth.1006.t: "Утрата"
 lmf_birth.1006.opening: "Я [Select_CString(ROOT.Char.IsFemale, 'ехала', 'ехал' )] во владение [ROOT.Char.GetCurrentLocation.GetName], когда [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )] из кареты [Select_CString(stray_bastard.IsFemale, 'юную женщину, шедшую', 'юного мужчину, шедшего' )] по улице. Само по себе зрелище ничем не примечательное, но было в [stray_bastard.GetHerHis] облике что-то тревожно знакомое... Достаточно, чтобы я [Select_CString(ROOT.Char.IsFemale, 'вспомнила', 'вспомнил' )] об этом позже и [Select_CString(ROOT.Char.IsFemale, 'приказала', 'приказал' )], чтобы [stray_bastard.GetSheHe] [Select_CString(stray_bastard.IsFemale, 'была разыскана', 'был разыскан' )].\n\n"
 lmf_birth.1006.mother: "Правда оказалась куда удивительнее, чем я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] себе представить. Оказалось, что [Select_CString(stray_bastard.IsFemale, 'эта юная женщина', 'этот юный мужчина' )] — не кто [Select_CString(stray_bastard.IsFemale, 'иная', 'иной' )], как [stray_bastard.Custom('GetDaughterSon')], [Select_CString(stray_bastard.IsFemale, 'которую', 'которого' )] я [Select_CString(ROOT.Char.IsFemale, 'родила', 'родил' )] много лет назад, когда [Select_CString(ROOT.Char.IsFemale, 'была отправлена', 'был отправлен' )] в уединение. Я [Select_CString(ROOT.Char.IsFemale, 'считала', 'считал' )] [stray_bastard.GetHerHis] [Select_CString(stray_bastard.IsFemale, 'потерянной', 'потерянным' )], даже [Select_CString(stray_bastard.IsFemale, 'мёртвой', 'мёртвым' )], но вот [stray_bastard.GetSheHe] передо мной! Возможно, это лишь [Select_CString(stray_bastard.IsFemale, 'самозванка, выдающая', 'самозванец, выдающий' )] себя за того ребёнка, но [stray_bastard.GetSheHe] никогда не [Select_CString(stray_bastard.IsFemale, 'искала', 'искал' )] меня ради выгоды... а кто ещё мог бы знать, что произошло?\n\n"
 lmf_birth.1006.family: "Правда оказалась куда удивительнее, чем я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] себе представить. Оказалось, что [Select_CString(stray_bastard.IsFemale, 'эта юная женщина', 'этот юный мужчина' )] — не кто [Select_CString(stray_bastard.IsFemale, 'иная', 'иной' )], как ребёнок, [Select_CString(stray_bastard.IsFemale, 'которую', 'которого' )] много лет назад тайно [Select_CString(relative.IsFemale, 'родила моя', 'родил мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))], [relative.GetTitledFirstNameNoTooltip], когда [Select_CString(relative.IsFemale, 'она была отправлена', 'он был отправлен' )] в уединение. Возможно, это лишь [Select_CString(stray_bastard.IsFemale, 'самозванка', 'самозванец' )], но [stray_bastard.GetSheHe] никогда не [Select_CString(stray_bastard.IsFemale, 'обращалась', 'обращался' )] к своей семье за помощью... а кто ещё мог бы знать правду?\n\n"
 lmf_birth.1006.other: "То, что позже сообщили мне слуги, оказалось куда удивительнее, чем я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] себе представить. Оказалось, что [Select_CString(stray_bastard.IsFemale, 'эта юная женщина', 'этот юный мужчина' )] — не кто [Select_CString(stray_bastard.IsFemale, 'иная', 'иной' )], как [stray_bastard.Custom('GetDaughterSon')], которую много лет назад [Select_CString(relative.IsFemale, 'родила', 'родил' )] [relative.GetGetFullName], когда [Select_CString(relative.IsFemale, 'она была отправлена', 'он был отправлен' )] в уединение во владение [birthplace.GetNameNoTooltip]. Возможно, это лишь [Select_CString(stray_bastard.IsFemale, 'самозванка', 'самозванец' )], но [stray_bastard.GetSheHe] никогда не [Select_CString(stray_bastard.IsFemale, 'обращалась', 'обращался' )] к своей семье за помощью... а кто ещё мог бы знать, что произошло? Это был позорный секрет, тщательно скрываемый.\n\n"
 lmf_birth.1006.knight: "[Select_CString(stray_bastard.IsFemale, 'Эта юная', 'Этот юный' )] [stray_bastard.GetWomanMan] - многообещающий [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] и сейчас служит мелкому сюзерену здесь, во владении [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], обладая достаточным мастерством, чтобы заслужить небольшую известность [Select_CString(stray_bastard.IsFemale, 'сама', 'сам' )] по себе."
 lmf_birth.1006.physician: "[Select_CString(stray_bastard.IsFemale, 'Эта юная', 'Этот юный' )] [stray_bastard.GetWomanMan] уже несколько лет работает многообещающим лекарем здесь, во владении [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], и [Select_CString(stray_bastard.IsFemale, 'достигла', 'достиг' )] достаточного мастерства, чтобы приобрести небольшую известность [Select_CString(stray_bastard.IsFemale, 'сама', 'сам' )] по себе."
 lmf_birth.1006.monk: "Оказывается, этот юноша - [stray_bastard.GetFaith.DevoteeMale], принявший обеты... человек, исполненный знаний и добродетели, насколько нам известно. [stray_bastard.GetFaith.GetAdherentNameNoTooltip], добившийся немалых успехов, несмотря на свой возраст."
 lmf_birth.1006.nun: "Оказывается, эта молодая женщина - [stray_bastard.GetFaith.DevoteeFemale], принявшая обеты... женщина, исполненная знаний и добродетели, насколько нам известно. [stray_bastard.GetFaith.GetAdherentNameNoTooltip], добившаяся немалых успехов, несмотря на свой возраст."
 lmf_birth.1006.rogue: "[Select_CString(stray_bastard.IsFemale, 'Эта юная', 'Этот юный' )] [stray_bastard.GetWomanMan] уже [Select_CString(stray_bastard.IsFemale, 'приобрела', 'приобрёл' )] сомнительную репутацию. Здесь, во владении [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], [stray_bastard.GetSheHe] [Select_CString(stray_bastard.IsFemale, 'известна как та', 'известен как тот' )], кто умеет добиваться своего. Говорят, [stray_bastard.GetSheHe] [Select_CString(stray_bastard.IsFemale, 'умна и находчива', 'умён и находчив' )], но без наставления, похоже, [stray_bastard.GetSheHe] рано или поздно окажется на тёмной стороне закона."
 lmf_birth.1006.beauty: "Молодая женщина служит в доме мелкого сюзерена здесь, во владении [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], и уже приобрела репутацию за свою красоту и изысканные манеры. Почти наверняка она вскоре привлечёт внимание более высоких кругов."
 lmf_birth.1006.end: "Хотя [stray_bastard.GetSheHe] никогда не [Select_CString(stray_bastard.IsFemale, 'пыталась', 'пытался' )] использовать своё происхождение ради выгоды, возможно, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы найти [stray_bastard.GetHerHim] место при своём дворе? Мы можем оставить [stray_bastard.GetHerHis] в покое, но наверняка слухи о [stray_bastard.GetHerHis] рождении рано или поздно дойдут и до других ушей."
 lmf_birth.1006.a: "Я найду [stray_bastard.GetHerHim] место при своём дворе."
 lmf_birth.1006.b: "Пусть этот бастард остаётся в неизвестности. Меня это не заботит."
 lmf_birth.1006.c: "[Select_CString(stray_bastard.IsFemale, 'Она', 'Он' )] давно [Select_CString(stray_bastard.IsFemale, 'должна была', 'должен был' )] умереть. Исправим эту ошибку."

 lmf_birth.1007.t: "Всё позади"
 lmf_birth.1007.desc: "До нас дошли вести из владения [relative.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]. Ребёнок не был доношен, но [relative.GetTitledFirstNameNoTooltip], похоже, не [Select_CString(relative.IsFemale, 'пострадала', 'пострадал' )]. Так что, по правде говоря, всё выглядит так, словно весь этот скандал никогда и не происходил. [Select_CString(relative.IsFemale, 'Должна ли ваша', 'Должен ли ваш' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))] вернуться домой?"

 lmf_birth.1008.t: "Разоблачение!"
 lmf_birth.1008.desc.start: "Я несколько дней не [Select_CString(ROOT.Char.IsFemale, 'получала', 'получал' )] вестей от [Select_CString(relative.IsFemale, 'своей возлюбленной', 'своего возлюбленного' )] и [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал' )] тревожиться. Неужели [Select_CString(relative.IsFemale, 'она уже устала', 'он уже устал' )] от меня?\n\nИ тут мне открылась правда: [relative.GetFirstNameNoTooltip] была тайно увезена по приказу, что [Select_CString(relative_liege.IsFemale, 'отдал её', 'отдал его' )] [relative.Custom2('LMF_RelationToMeShort', relative_liege )], в небольшое имение в мрачном уголке владения [convent.GetNameNoTooltip], где её держали в уединении. Почему? Потому что [relative_liege.GetSheHe] [Select_CString(relative_liege.IsFemale, 'обнаружила', 'обнаружил' )], что [relative.GetFirstNameNoTooltip] ждёт ребёнка. МОЕГО ребёнка.\n\nЯсно, что [relative_liege.GetTitledFirstNameNoTooltip] предпочитает, чтобы [relative_liege.GetHerHis] [relative_liege.Custom2('LMF_RelationToMeShort', relative )] больше не [Select_CString(relative.IsFemale, 'имела', 'имел' )] со мной контактов,"
 lmf_birth.1008.desc.secret: " если [relative_liege.GetSheHe] вообще знает, что отцом являюсь я,"
 lmf_birth.1008.desc.end: " но чего хочет сама [relative.GetFirstNameNoTooltip]? Я не имею ни малейшего представления. Уж точно не этого!"
 lmf_birth.1008.a: "К сожалению, я ничего не могу с этим поделать."
 lmf_birth.1008.b: "Приведите её ко мне. Я не оставлю её во владении [convent.GetNameNoTooltip]."
 lmf_birth.1008.c: "Я спасу её и женюсь на ней — несмотря на то, даст ли [relative.Custom2('LMF_RelationToMeShort', relative_liege )] разрешение или нет!"
 rival_took_secluded_family: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'похитили', Select_CString(TARGET_CHARACTER.IsFemale, 'похитила', 'похитил' ))] [CHARACTER.Custom2('LMF_RelationToMeShort', TARGET_CHARACTER_2 )] [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )], пока [Select_CString(TARGET_CHARACTER_2.IsFemale, 'она находилась', 'он находился' )] в уединении."
 rival_took_secluded_family_corresponding: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'похитили', Select_CString(CHARACTER.IsFemale, 'похитила', 'похитил' ))] [TARGET_CHARACTER.Custom2('LMF_RelationToMeShort', TARGET_CHARACTER_2 )] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )], пока [Select_CString(TARGET_CHARACTER_2.IsFemale, 'она находилась', 'он находился' )] в уединении."

 lmf_birth.1009.t: "Похищение"
 lmf_birth.1009.desc.start: "Сегодня утром прибыли вести.\n\nЕдва [relative.GetFirstNameNoTooltip] была поселена в уединённом имении во владении [convent.GetNameNoTooltip], как появились солдаты, чтобы увезти [Select_CString(relative.IsFemale, 'её', 'его' )] и сопроводить в провинцию [baby_father.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Как [baby_father.GetTitledFirstNameNoTooltip] [Select_CString(baby_father.IsFemale, 'узнала', 'узнал' )], куда я [Select_CString(ROOT.Char.IsFemale, 'отправила', 'отправил' )] [Select_CString(relative.IsFemale, 'её', 'его' )], я не знаю, но оказалось, что он и [relative.GetFirstNameNoTooltip] любят друг друга, и он является отцом [Select_CString(relative.IsFemale, 'её', 'его' )] ещё не рождённого ребёнка.\n\n"
 lmf_birth.1009.desc.elope: "Я [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал' )], что они поженились, едва достигли владения [baby_father.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Допустим, это избавило нас от позора бастарда, но всё же это побег. Всем будет известно, что он произошёл без моего ведома и согласия!"
 lmf_birth.1009.desc.abduct: "Теперь их укрытием стал [baby_father.Custom('FortifiedBuilding')], которым владеет [baby_father.GetTitledFirstNameNoTooltip], и этот человек даже не потрудился жениться на ней после столь вопиющего похищения!"
 lmf_birth.1009.a: "[Select_CString(relative.IsFemale, 'Она опозорила', 'Он опозорил' )] свою семью."

 lmf_birth.1101.t: "Осложнения"
 lmf_birth.1101.depressed.t: "Тёмнейшие ночи"
 lmf_birth.1101.depressed.death.opening: "Потерять младенца... я не знаю, что делать. Никто не решается упоминать ребёнка, боясь вызвать у меня слёзы, и всё же это молчание порой хуже самого упоминания. Оно стало мрачным облаком, висящим над моей жизнью, затмевающим всё, к чему прикасается.\n\n"
 lmf_birth.1101.depressed.sick.child.opening: "Младенец всё плачет и плачет, и этому нет конца. Я не могу избавиться от мысли, что это моя вина, что я что-то [Select_CString(ROOT.Char.IsFemale, 'должна была', 'должен был' )] знать, что-то сделать... Это нависает тьмой над всем, отравляя всё вокруг.\n\n"
 lmf_birth.1101.depressed.sick.opening: "Хворь терзает меня, оставляя [Select_CString(ROOT.Char.IsFemale, 'слабой и беспомощной', 'слабым и беспомощным' )]. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] быть рядом со своим новорождённым, но едва нахожу в себе силы двигаться. В глубине души я знаю: это моя вина. Я [Select_CString(ROOT.Char.IsFemale, 'должна была', 'должен был' )] быть сильнее. Мрак отбрасывает тень на всё, и мне от него не скрыться.\n\n"
 lmf_birth.1101.depressed.opening: "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] бы радоваться, не так ли? У нас появился ребёнок. Это должно быть счастьем. Но тень всё ещё витает в моих мыслях, затмевает всё вокруг, и мне никак не удаётся от неё избавиться.\n\n"
 lmf_birth.1101.opening: "С тех пор как прошли роды, всё изменилось. Я это знаю. Я это чувствую. Кровотечения слишком сильные, и я всё время ощущаю слабость.\n\n"
 lmf_birth.1101.end.infertile: "Врачи приходили и уходили из моей опочивальни, каждый раз неодобрительно цокая языками. Они говорят, что я могу оправиться, но осложнения после родов, вероятно, означают, что у меня больше никогда не будет детей."
 lmf_birth.1101.end.infertile.long: "Врачи приходили и уходили из моей опочивальни, каждый раз неодобрительно цокая языками. Они утверждают, что я оправлюсь, но осложнения после родов оказались серьёзными. Понадобится время. Сколько именно — они, похоже, не знают."
 lmf_birth.1101.end.age: "Врачи говорят, что всё это пройдёт, что подобное вполне нормально... особенно для женщины моего возраста. Сам факт, что я вообще родила, — уже своего рода чудо."
 lmf_birth.1101.end: "Врачи говорят, что всё это пройдёт, что подобное вполне нормально. Мне просто нужно немного времени."
 lmf_birth.1101.a: "Надеюсь, они ошибаются."
 lmf_birth.1101.b: "Надеюсь, они правы."
 lmf_birth.1101.tt: "Осложнения после родов"
 lmf_birth.1102.husband.tt: "Мрачное настроение персонажа [ROOT.Char.GetFirstNameNoTooltip] прошло"
 lmf_birth.1102.tt: "Ваше мрачное настроение прошло"

 dinner_past_temperate: "[Select_CString(ROOT.GetCharacter.IsFemale, 'съела', 'съел' )] лишь немного еды, большую часть времени предпочтя разговору"
 dinner_past_chaste_male: "держался особняком, сложив руки на коленях"
 dinner_past_chaste_female: "держалась особняком, скромно избегая взглядов слуг-мужчин"
 dinner_past_generous: "[Select_CString(ROOT.GetCharacter.IsFemale, 'была', 'был' )] весьма [Select_CString(ROOT.GetCharacter.IsFemale, 'занята', 'занят' )], помогая слугам убирать со столов"
 dinner_past_diligent: "с усердием [Select_CString(ROOT.GetCharacter.IsFemale, 'старалась', 'старался' )] вовлечь в беседу каждого члена семьи"
 dinner_past_calm: "[Select_CString(ROOT.GetCharacter.IsFemale, 'излучала', 'излучал' )] спокойствие в этот обычно шумный вечер — как и подобает [ROOT.GetCharacter.GetHerHis] натуре"
 dinner_past_patient_adult: "[Select_CString(ROOT.GetCharacter.IsFemale, 'проявила', 'проявил' )] огромное терпение с одним из новых слуг, показывая юноше, как правильно прислуживать"
 dinner_past_patient_child: "[Select_CString(ROOT.GetCharacter.IsFemale, 'проявила', 'проявил' )] редкое терпение для своего возраста, дожидаясь, пока принесут каждое блюдо"
 dinner_past_humble: "как обычно, [Select_CString(ROOT.GetCharacter.IsFemale, 'была скромна: называла', 'был скромен: называл' )] слуг по именам и [Select_CString(ROOT.GetCharacter.IsFemale, 'относилась', 'относился' )] к ним с большим уважением"
 dinner_past_honest: "[Select_CString(ROOT.GetCharacter.IsFemale, 'рассказывала', 'рассказывал' )] о недавнем происшествии, и я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [ROOT.GetCharacter.GetSheHe] ни в чём не [Select_CString(ROOT.GetCharacter.IsFemale, 'приукрасила', 'приукрасил' )] рассказ"
 dinner_past_brave: "[Select_CString(ROOT.GetCharacter.IsFemale, 'поведала', 'поведал' )] грандиозную историю о своём недавнем подвиге, чем немало [Select_CString(ROOT.GetCharacter.IsFemale, 'позабавила', 'позабавил' )] всех"
 dinner_past_gregarious: "снова [Select_CString(ROOT.GetCharacter.IsFemale, 'оказалась', 'оказался' )] душой вечера, удерживая всеобщее внимание своими историями"
 dinner_past_just: "дружелюбно [Select_CString(ROOT.GetCharacter.IsFemale, 'беседовала', 'беседовал' )] с моими советниками, выражая обеспокоенность недавней несправедливостью, [Select_CString(ROOT.GetCharacter.IsFemale, 'свидетельницей', 'свидетелем' )] которой [ROOT.GetCharacter.GetSheHe] [Select_CString(ROOT.GetCharacter.IsFemale, 'стала', 'стал' )] при дворе"
 dinner_past_zealous: "[Select_CString(ROOT.GetCharacter.IsFemale, 'возглавила', 'возглавил' )] семейную молитву, восхваляя [ROOT.GetCharacter.GetFaith.PantheonTerm2] с присущим [ROOT.GetCharacter.GetHerHim] рвением"
 dinner_past_trusting: "[Select_CString(ROOT.GetCharacter.IsFemale, 'внимала', 'внимал' )] каждому рассказу, обращённому к н[ROOT.GetCharacter.GetHerHim], с широко раскрытыми глазами и слышимыми вздохами"
 dinner_past_compassionate: "[Select_CString(ROOT.GetCharacter.IsFemale, 'была', 'был' )] воплощением доброжелательности, тепло улыбаясь всякий раз, когда внимание обращалось к [ROOT.GetCharacter.GetHerHis] персоне"
 dinner_past_stubborn: "[Select_CString(ROOT.GetCharacter.IsFemale, 'задержала', 'задержал' )] семью за столом своим разговором, упрямо не позволяя никому уйти"
 dinner_past_forgiving: "весь вечер [Select_CString(ROOT.GetCharacter.IsFemale, 'выступала', 'выступал' )] в роли миротворца, сглаживая не одну семейную ссору"
 dinner_past_charming: "[Select_CString(ROOT.GetCharacter.IsFemale, 'оказалась', 'оказался' )] прелестным ребёнком, широко улыбаясь и очаровывая почти всех за столом"
 dinner_past_curious: "[Select_CString(ROOT.GetCharacter.IsFemale, 'забавляла', 'забавлял' )] всех, без конца задавая невинные вопросы о блюдах и слугах"
 dinner_past_pregnant: "была в центре всеобщего внимания — её живот уже явно выдавал беременность"
 dinner_past_beauty_good_female: "сияла красотой, особенно заботливо выбрав для вечера новое платье"
 dinner_past_beauty_good_male: "привлёк взгляды служанок, которые вертелись вокруг него с почти комической заботливостью"
 dinner_past_intellect_good: "[Select_CString(ROOT.GetCharacter.IsFemale, 'поддерживала', 'поддерживал' )] живую беседу, остроумно рассуждая и наблюдая о самых разных темах"
 dinner_past_poet: "[Select_CString(ROOT.GetCharacter.IsFemale, 'развлекала', 'развлекал' )] семью подборкой [ROOT.GetCharacter.GetCulture.GetCollectiveNounNoTooltip]их стихов, хотя я подозреваю, что как минимум одно из них принадлежало [ROOT.GetCharacter.GetHerHis] перу"
 dinner_past_shrewd: "[Select_CString(ROOT.GetCharacter.IsFemale, 'устроила', 'устроил' )] свой маленький «суд», как [ROOT.GetCharacter.GetSheHe] умеет, остроумно и метко шутя, отчего все смеялись"
 dinner_past_lifestyle_reveler: "снова [Select_CString(ROOT.GetCharacter.IsFemale, 'оказалась', 'оказался' )] в центре внимания, требуя больше выпивки и заставляя всех смеяться"
 dinner_past_lifestyle_blademaster: "[Select_CString(ROOT.GetCharacter.IsFemale, 'привлекла', 'привлёк' )] всеобщее внимание слуг, развлекая их рассказами о недавнем поединке"
 dinner_past_lifestyle_hunter: "[Select_CString(ROOT.GetCharacter.IsFemale, 'рассказывала', 'рассказывал' )] живые истории о недавней охоте, а многие в семье слушали, затаив дыхание"
 dinner_past_lifestyle_herbalist: "[Select_CString(ROOT.GetCharacter.IsFemale, 'делала', 'делал' )] замечания о травах в блюдах и [Select_CString(ROOT.GetCharacter.IsFemale, 'советовала', 'советовал' )] повару, чем их можно заменить"
 dinner_past_lifestyle_gardener: "[Select_CString(ROOT.GetCharacter.IsFemale, 'была', 'был' )] очень [Select_CString(ROOT.GetCharacter.IsFemale, 'довольна', 'доволен' )], что повар использовал свежие овощи из [ROOT.GetCharacter.GetHerHis] сада во дворе"
 dinner_past_pos_fallback_1_adult: "[Select_CString(ROOT.GetCharacter.IsFemale, 'вела', 'вёл' )] себя на удивление хорошо, охотно поддерживая разговор"
 dinner_past_pos_fallback_1_child: "[Select_CString(ROOT.GetCharacter.IsFemale, 'вела', 'вёл' )] себя на удивление хорошо: [Select_CString(ROOT.GetCharacter.IsFemale, 'была вежлива и очаровывала', 'был вежлив и очаровывал' )] даже слуг"
 dinner_past_pos_fallback_2: "[Select_CString(ROOT.GetCharacter.IsFemale, 'была восхитительна', 'был восхитителен' )], и [ROOT.GetCharacter.GetHerHis] поведение стало украшением всей семьи"
 dinner_past_pos_fallback_3_adult: "[Select_CString(ROOT.GetCharacter.IsFemale, 'была', 'был' )] на редкость в хорошем настроении — [Select_CString(ROOT.GetCharacter.IsFemale, 'улыбалась и смеялась', 'улыбался и смеялся' )] вместе почти со всеми"
 dinner_past_pos_fallback_3_child: "[Select_CString(ROOT.GetCharacter.IsFemale, 'очаровывала', 'очаровывал' )] всех своей детской живостью — всё время [Select_CString(ROOT.GetCharacter.IsFemale, 'улыбалась и смеялась', 'улыбался и смеялся' )]"
 dinner_past_lustful_male: "провёл почти весь вечер, преследуя служанок, которые явно сторонились его дурной славы"
 dinner_past_lustful_female: "провела почти весь вечер, строя глазки слугам, которые поспешно избегали её"
 dinner_past_gluttonous: "[Select_CString(ROOT.GetCharacter.IsFemale, 'уплетала', 'уплетал' )] еду так, словно она могла вот-вот закончиться, в то время как все пристально смотрели на н[ROOT.GetCharacter.GetHerHis]"
 dinner_past_greedy_adult: "[Select_CString(ROOT.GetCharacter.IsFemale, 'провела', 'провёл' )] вечер в споре с одним из моих служителей из-за [ROOT.GetCharacter.GetHerHis] отказа вернуть небольшой долг"
 dinner_past_greedy_child: "[Select_CString(ROOT.GetCharacter.IsFemale, 'схватила', 'схватил' )] все игрушки и [Select_CString(ROOT.GetCharacter.IsFemale, 'устроила', 'устроил' )] грандиозную истерику, стоило кому-то попытаться их отобрать"
 dinner_past_greedy_teen: "[Select_CString(ROOT.GetCharacter.IsFemale, 'спорила', 'спорил' )] со слугами из-за странной идеи, что [ROOT.GetCharacter.GetSheHe] [Select_CString(ROOT.GetCharacter.IsFemale, 'получила', 'получил' )] десерта меньше, чем остальные"
 dinner_past_lazy: "[Select_CString(ROOT.GetCharacter.IsFemale, 'заснула', 'заснул' )] почти сразу после трапезы, а громкий храп привлёк внимание окружающих"
 dinner_past_wrathful: "в основном [Select_CString(ROOT.GetCharacter.IsFemale, 'ввязывалась', 'ввязывался' )] в яростные споры с остальными членами семьи, брызжа слюной от злости"
 dinner_past_impatient: "[Select_CString(ROOT.GetCharacter.IsFemale, 'оказалась', 'оказался' )] ужасно [Select_CString(ROOT.GetCharacter.IsFemale, 'раздражительной', 'раздражительным' )], постоянно жалуясь, что еду подают слишком медленно"
 dinner_past_arrogant: "почти ни с кем не [Select_CString(ROOT.GetCharacter.IsFemale, 'разговаривала', 'разговаривал' )] весь вечер, закатывая глаза с презрением при каждой попытке завязать беседу"
 dinner_past_deceitful: "всё время [Select_CString(ROOT.GetCharacter.IsFemale, 'выглядела', 'выглядел' )] нервно, пытаясь выкрутиться из лжи, на которой [ROOT.GetCharacter.GetSheHe] [Select_CString(ROOT.GetCharacter.IsFemale, 'была поймана', 'был пойман' )] ранее"
 dinner_past_craven: "большую часть вечера [Select_CString(ROOT.GetCharacter.IsFemale, 'держалась', 'держался' )] особняком, тихо стараясь избежать любого конфликта с семьёй"
 dinner_past_shy: "изо всех сил [Select_CString(ROOT.GetCharacter.IsFemale, 'пыталась', 'пытался' )] остаться [Select_CString(ROOT.GetCharacter.IsFemale, 'незаметной', 'незаметным' )] на краю стола, избегая разговоров"
 dinner_past_ambitious: "не [Select_CString(ROOT.GetCharacter.IsFemale, 'унималась', 'унимался' )], хвастаясь недавними достижениями, хотя они явно были преувеличены"
 dinner_past_arbitrary: "[Select_CString(ROOT.GetCharacter.IsFemale, 'вела', 'вёл' )] себя весьма странно, тревожась по малейшему поводу, будто это имеет огромное значение"
 dinner_past_cynical: "не [Select_CString(ROOT.GetCharacter.IsFemale, 'переставала', 'переставал' )] закатывать глаза и тяжело вздыхать, когда упоминались [ROOT.GetCharacter.GetFaith.PantheonTerm2]"
 dinner_past_paranoid: "[Select_CString(ROOT.GetCharacter.IsFemale, 'вела', 'вёл' )] себя крайне воинственно весь вечер, словно [Select_CString(ROOT.GetCharacter.IsFemale, 'была уверена', 'был уверен' )], что вся семья против н[ROOT.GetCharacter.GetHerHis]"
 dinner_past_callous: "[Select_CString(ROOT.GetCharacter.IsFemale, 'была', 'был' )] особенно [Select_CString(ROOT.GetCharacter.IsFemale, 'жестока', 'жесток' )] со слугами в этот вечер, насмехаясь над ними даже за малейшую ошибку"
 dinner_past_sadistic_adult: "[Select_CString(ROOT.GetCharacter.IsFemale, 'устраивала', 'устраивал' )] жестокие игры, вороша старые ссоры и наблюдая за семейными распрями, сидя в стороне и улыбаясь"
 dinner_past_sadistic_child: "[Select_CString(ROOT.GetCharacter.IsFemale, 'провела', 'провёл' )] время, издеваясь над слугами, поджигая вещи и ведя себя как настоящее чудовище"
 dinner_past_fickle: "не [Select_CString(ROOT.GetCharacter.IsFemale, 'переставала', 'переставал' )] корчить рожицы еде, вертеть её на тарелке и хмуриться"
 dinner_past_eccentric: "долго [Select_CString(ROOT.GetCharacter.IsFemale, 'разговаривала', 'разговаривал' )] с... кем-то, кого на самом деле не было, пока остальные делали вид, что не замечают"
 dinner_past_rowdy: "[Select_CString(ROOT.GetCharacter.IsFemale, 'устроила', 'устроил' )] форменный бедлам, [Select_CString(ROOT.GetCharacter.IsFemale, 'носилась', 'носился' )] по залу с неутомимой энергией и [Select_CString(ROOT.GetCharacter.IsFemale, 'кричала', 'кричал' )] до полной хрипоты"
 dinner_past_pensive: "[Select_CString(ROOT.GetCharacter.IsFemale, 'сидела', 'сидел' )] за столом молча, нервно ёрзая и терзаясь по пустякам"
 dinner_past_bossy: "[Select_CString(ROOT.GetCharacter.IsFemale, 'бегала', 'бегал' )] повсюду, громко указывая всем, что и как надо делать"
 dinner_past_drunkard: "снова невероятно [Select_CString(ROOT.GetCharacter.IsFemale, 'напилась, краснолицая', 'напился, краснолицый' )] и невнятно [Select_CString(ROOT.GetCharacter.IsFemale, 'бормотливая', 'бормотливый' )], притворяясь [Select_CString(ROOT.GetCharacter.IsFemale, 'трезвой', 'трезвым' )]"
 dinner_past_reclusive: "почти ни с кем не [Select_CString(ROOT.GetCharacter.IsFemale, 'разговаривала', 'разговаривал' )], вместо этого [Select_CString(ROOT.GetCharacter.IsFemale, 'стояла', 'стоял' )] в стороне и [Select_CString(ROOT.GetCharacter.IsFemale, 'смотрела', 'смотрел' )] в окно на двор"
 dinner_past_irritable: "[Select_CString(ROOT.GetCharacter.IsFemale, 'привела', 'привёл' )] всех в замешательство, злобно огрызаясь на всякого, кто пытался заговорить с [Select_CString(ROOT.GetCharacter.IsFemale, 'ней', 'ним' )]"
 dinner_past_comfort_eater: "жадно [Select_CString(ROOT.GetCharacter.IsFemale, 'уплетала', 'уплетал' )] все доступные десерты, заедая ими свои переживания"
 dinner_past_inappetetic: "снова почти не [Select_CString(ROOT.GetCharacter.IsFemale, 'притронулась', 'притронулся' )] к еде, вызвав серьёзное беспокойство у всех"
 dinner_past_depressed: "[Select_CString(ROOT.GetCharacter.IsFemale, 'была', 'был' )] словно туча над всем пиром, [ROOT.GetCharacter.GetHerHis] меланхолия распространялась, как миазмы"
 dinner_past_lunatic: "[Select_CString(ROOT.GetCharacter.IsFemale, 'устроила', 'устроил' )] настоящий спектакль, в какой-то момент сорвав с себя одежду и сбежав из зала"
 dinner_past_possessed: "вдруг [Select_CString(ROOT.GetCharacter.IsFemale, 'вскочила и начала', 'вскочил и начал' )] кричать на непонятных языках, пока мы, наконец, не смогли успокоить [ROOT.GetCharacter.GetHerHis]"
 dinner_past_infirm: "почти не [Select_CString(ROOT.GetCharacter.IsFemale, 'присутствовала', 'присутствовал' )] в происходящем, то впадая в приступы кашля, то засыпая за столом"
 dinner_past_intellect_bad: "[Select_CString(ROOT.GetCharacter.IsFemale, 'выставила', 'выставил' )] себя посмешищем, вмешиваясь в разговоры, смысла которых [ROOT.GetCharacter.GetSheHe] явно не [Select_CString(ROOT.GetCharacter.IsFemale, 'понимала', 'понимал' )]"
 dinner_past_dwarf: "[Select_CString(ROOT.GetCharacter.IsFemale, 'устроила', 'устроил' )] переполох, жалуясь, что стулья для н[ROOT.GetCharacter.GetHerHis] слишком высокие"
 dinner_past_giant: "[Select_CString(ROOT.GetCharacter.IsFemale, 'подняла', 'поднял' )] шум, когда один из стульев под [Select_CString(ROOT.GetCharacter.IsFemale, 'ней', 'ним' )] сломался — он был явно слишком мал"
 dinner_past_dull: "долго [Select_CString(ROOT.GetCharacter.IsFemale, 'тараторила', 'тараторил' )] о пустяках, вызывая зевоту и закатывание глаз у всей семьи"
 dinner_past_wheezing: "не [Select_CString(ROOT.GetCharacter.IsFemale, 'переставала', 'переставал' )] сипеть, и тяжёлое дыхание раздражало почти всех за столом"
 dinner_past_neg_fallback_1_adult: "[Select_CString(ROOT.GetCharacter.IsFemale, 'вела', 'вёл' )] себя неподобающе, ввязываясь в ссоры одну за другой без всякой причины"
 dinner_past_neg_fallback_1_child: "[Select_CString(ROOT.GetCharacter.IsFemale, 'вела', 'вёл' )] себя отвратительно, устроив форменную истерику, когда няня пришла увести [ROOT.GetCharacter.GetHerHis] спать"
 dinner_past_neg_fallback_2: "[Select_CString(ROOT.GetCharacter.IsFemale, 'была', 'был' )] на редкость [Select_CString(ROOT.GetCharacter.IsFemale, 'раздражительна и агрессивна', 'раздражителен и агрессивен' )], в дурном настроении с самого начала пира"
 dinner_past_neg_fallback_3_adult: "[Select_CString(ROOT.GetCharacter.IsFemale, 'напился', 'напилась' )] до одурения, громко распевая песни до невыносимости"
 dinner_past_neg_fallback_3_child: "[Select_CString(ROOT.GetCharacter.IsFemale, 'съела', 'съел' )] гораздо больше, чем следовало, и потом громко [Select_CString(ROOT.GetCharacter.IsFemale, 'жаловалась', 'жаловался' )] на боль в животе"

 dinner_rival_reason_murderer: "В какой-то момент [ROOT.Char.GetFirstNameNoTooltip] отчётливо [Select_CString(ROOT.Char.IsFemale, 'крикнула', 'крикнул' )] «убийца», так что логично предположить, что речь шла именно об этом."
 dinner_rival_reason_att_murder: "Полагаю, это было связано с тем, что [second.GetFirstNameNoTooltip] [Select_CString(second.IsFemale, 'пыталась', 'пытался' )] устроить так, чтобы [ROOT.Char.GetFirstNameNoTooltip] [Select_CString(ROOT.Char.IsFemale, 'погибла', 'погиб' )]... по крайней мере, [ROOT.Char.GetFirstNameNoTooltip] всё время [Select_CString(ROOT.Char.IsFemale, 'кричала', 'кричал' )] об этом."
 dinner_rival_reason_slept_spouse: "Мне показалось, я [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )] что-то о том, что [second.GetFirstNameNoTooltip] и [ROOT.Char.GetHerHis] [ROOT.Char.Custom('WifeHusbandOpp')] переспали."
 dinner_rival_reason_unfaithful: "Очевидно, дело было в супружеской неверности, которую [Select_CString(second.IsFemale, 'продемонстрировала', 'продемонстрировал')] [second.GetFirstNameNoTooltip]."
 dinner_rival_reason_botched_treatment: "[Select_CString(ROOT.Char.IsFemale, 'Уверена', 'Уверен' )], дело было в том, что [second.GetFirstNameNoTooltip] [Select_CString(second.IsFemale, 'проявила', 'проявил' )] себя бездарным врачом."
 dinner_rival_reason_revenge: "[ROOT.Char.GetFirstNameNoTooltip] явно [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )] отомстить за то, что [Select_CString(second.IsFemale, 'сделала', 'сделал' )] [second.GetFirstNameNoTooltip]."
 dinner_rival_reason_them_cynical: "Из-за цинизма, которые демонстрирует [second.GetFirstNameNoTooltip] в отношении [ROOT.Char.GetFaith.GetNameNoTooltip|l]их догматов [ROOT.Char.GetFirstNameNoTooltip] явно [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришёл' )] в ярость."
 dinner_rival_reason_them_pious: "[ROOT.Char.GetFirstNameNoTooltip] явно [Select_CString(ROOT.Char.IsFemale, 'занервничала', 'занервничал' )] из-за показной набожности, которую демонстрирует [second.GetFirstNameNoTooltip]."
 dinner_rival_reason_hostile_religion: "[ROOT.Char.GetFirstNameNoTooltip] явно [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришёл' )] в благочестивый гнев из-за убеждений, которых придерживается [second.GetFirstNameNoTooltip]."
 dinner_rival_reason_both_pious: "Похоже, всё стало результатом жаркого спора о [second.GetFaith.GetNameNoTooltip|l]их и [ROOT.Char.GetFaith.GetNameNoTooltip|l]их догматах."
 dinner_rival_reason_potential_rival: "Неудивительно: соперничество между ними назревало уже давно."
 dinner_rival_reason_war: "Несомненно, во всём этом немало виновата и война, которую они сейчас ведут друг с другом."
 dinner_rival_reason_jealousy: "Было ясно, что [ROOT.Char.GetFirstNameNoTooltip] и [second.GetFirstNameNoTooltip] испытывают ревность, возможно из-за какого-то возлюбленного."
 dinner_rival_reason_jealous_court: "Похоже, всё коренится в том, что [ROOT.Char.GetFirstNameNoTooltip] завидует, какое положение занимает [second.GetFirstNameNoTooltip] при моём дворе."
 dinner_rival_reason_jealous_council: "Похоже, всё коренится в том, что [ROOT.Char.GetFirstNameNoTooltip] завидует, что [second.GetFirstNameNoTooltip] - [second.GetCouncilTitle|l] в моём совете."
 dinner_rival_reason_heir_position: "Похоже, дело в том, что у [second.GetFirstNameNoTooltip] имеет шанс унаследовать мои титулы, а [ROOT.Char.GetFirstNameNoTooltip] - нет."
 dinner_rival_reason_claim: "Казалось, речь шла о «законной претензии», которую [ROOT.Char.GetFirstNameNoTooltip] имеет на [rival_claim_title.GetNameNoTierNoTooltip]."
 dinner_rival_reason_disinherited: "Полагаю, [ROOT.Char.GetFirstNameNoTooltip] [Select_CString(ROOT.Char.IsFemale, 'завидовала и сердилась', 'завидовал и сердился' )] из-за того, что [second.GetFirstNameNoTooltip] скоро получит наследство."
 dinner_rival_reason_disputed_heritage: "У меня сложилось впечатление, что [ROOT.Char.GetFirstNameNoTooltip] не слишком тонко высмеивает спорное происхождение, которое имеет [second.GetFirstNameNoTooltip]."
 dinner_rival_reason_hates: "Явная ненависть, которую питают друг к другу [ROOT.Char.GetFirstNameNoTooltip] и [second.GetFirstNameNoTooltip], бросалась в глаза всем."
 dinner_rival_reason_grudge: "Под всем этим явно тлела давняя обида между ними."
 dinner_rival_reason_victim: "Несомненно, причина — то, что [ROOT.Char.GetFirstNameNoTooltip] и [second.GetFirstNameNoTooltip] постоянно связаны травлей между собой."
 dinner_rival_reason_incompatible: "Они всегда были как огонь и вода, так что ничего удивительного."
 dinner_rival_reason_unknown: "Должно быть, что-то их вывело из себя."

 lmf_feast.1001.t: "Семейный пир: вражда"
 lmf_feast.1001.desc.opening: "Сегодня вечером семья собралась на пир в большом зале владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], и с самого начала всё пошло не так.\n\nАтмосфера была напряжённой. И вдруг, почти без предупреждения, [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_rival_2'))] и "
 lmf_feast.1001.desc.relation: "[family_rival_2.GetHerHis] [family_rival_2.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival_1'))], [family_rival_1.GetFirstNameNoTooltip], начали спорить.\n\n"
 lmf_feast.1001.desc.norelation: "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_rival_1'))] начали спорить.\n\n"
 lmf_feast.1001.desc.mid: "Почему? Я не совсем [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен')], но [family_rival_2.Custom2('dinner_rival_reason', SCOPE.sC('family_rival_1'))]\n\nИх крики становились всё громче и громче, перекрывая общий шум, пока наконец [family_rival_2.GetFirstNameNoTooltip] "
 lmf_feast.1001.desc.child.male: "не [Select_CString(family_rival_2.IsFemale, 'бросилась', 'бросился' )] на н[family_rival_1.GetHerHis] и [Select_CString(family_rival_2.IsFemale, 'начала', 'начал' )] [family_rival_1.GetHerHis] избивать.\n\n"
 lmf_feast.1001.desc.child.female: "не [Select_CString(family_rival_2.IsFemale, 'бросилась', 'бросился' )] на н[family_rival_1.GetHerHis] и [Select_CString(family_rival_2.IsFemale, 'начала', 'начал' )] царапать [family_rival_1.GetHerHis] лицо.\n\n"
 lmf_feast.1001.desc.combatant: "не [Select_CString(family_rival_2.IsFemale, 'вскочила и выхватила', 'вскочил и выхватил' )] клинок.\n\n"
 lmf_feast.1001.desc.noncombatant: "не [Select_CString(family_rival_2.IsFemale, 'вскочила', 'вскочил' )] и не [Select_CString(family_rival_2.IsFemale, 'влепила', 'влепил' )] [family_rival_1.GetHerHim] пощёчину.\n\n"
 lmf_feast.1001.desc.bystander: "Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел' )] понять, что происходит, как всё уже стало слишком серьёзно. "
 lmf_feast.1001.desc.intervene: "Я [Select_CString(ROOT.Char.IsFemale, 'попыталась', 'попытался')] вмешаться, но было уже слишком поздно. "
 lmf_feast.1001.desc.end: "Остальные члены семьи растащили их, и [family_rival_1.GetFirstNameNoTooltip] с шумом [Select_CString(family_rival_1.IsFemale, 'покинула', 'покинул' )] зал"
 lmf_feast.1001.desc.friends: ", крича, что их дружбе пришёл конец."
 lmf_feast.1001.desc.notfriends: ". Теперь они стали заклятыми врагами."
 lmf_feast.1001.a: "Хватит волнений на один вечер!"
 rival_family_dinner: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName|U] стали соперниками после страшной ссоры на пиру."
 rival_family_dinner_corresponding: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName|U] стали соперниками после страшной ссоры на пиру."

 dinner_rival_root_reason_murderer: "[ROOT.Char.GetSheHe|U] не [Select_CString(ROOT.Char.IsFemale, 'называла', 'называл')] меня прямо «убийцей», но именно об этом шла речь."
 dinner_rival_root_reason_att_murder: "[ROOT.Char.GetSheHe|U] [Select_CString(ROOT.Char.IsFemale, 'утверждала', 'утверждал')], что я пытаюсь убить [ROOT.Char.GetHerHis]. И [Select_CString(ROOT.Char.IsFemale, 'продолжала', 'продолжал' )] это повторять."
 dinner_rival_root_reason_slept_spouse: "[ROOT.Char.GetSheHe|U] никак не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] простить того, что я и [ROOT.Char.GetHerHis] [ROOT.Char.Custom('WifeHusbandOpp')] переспали."
 dinner_rival_root_reason_unfaithful: "[ROOT.Char.GetSheHe|U] не [Select_CString(ROOT.Char.IsFemale, 'говорила', 'говорил' )] этого прямо, но, конечно же, дело было в моей измене."
 dinner_rival_root_reason_imprison: "[ROOT.Char.GetSheHe|U] всё [Select_CString(ROOT.Char.IsFemale, 'жаловалась', 'жаловался' )], что [ROOT.Char.GetSheHe] [Select_CString(ROOT.Char.IsFemale, 'оказалась', 'оказался' )] в моей темнице, по крайней мере сначала."
 dinner_rival_root_reason_att_imprison: "[ROOT.Char.GetSheHe|U] всё [Select_CString(ROOT.Char.IsFemale, 'жаловалась', 'жаловался' )], что я пытаюсь заключить [ROOT.Char.GetHerHis] в темницу, по крайней мере сначала."
 dinner_rival_root_reason_execution: "Сначала [ROOT.Char.GetSheHe] горько [Select_CString(ROOT.Char.IsFemale, 'жаловалась', 'жаловался' )] на казнь. Опять."
 dinner_rival_root_reason_torture: "[ROOT.Char.GetSheHe|U] никак не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] замолчать о пытках. Бла-бла, пытки то, пытки сё."
 dinner_rival_root_reason_blind: "Речь, конечно, шла о ослеплении. Всегда об ослеплении!"
 dinner_rival_root_reason_castrate: "Речь, конечно, шла о кастрации. Разве он когда-нибудь перестанет тосковать по утраченному члену?"
 dinner_rival_reason_root_potential_rival: "Ничего удивительного. Это зрело уже давно."
 dinner_rival_reason_root_disinherit: "Речь снова зашла о лишении наследства. По крайней мере вначале."
 dinner_rival_reason_root_unknown: "Из-за чего всё началось? Честно говоря, я и не помню."

 lmf_feast.1002.desc: "Всё начиналось так хорошо.\n\nСемья собралась в большом зале владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] на пир, и сперва всё было довольно приятно. [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nА потом я и [family_rival.GetFirstNameNoTooltip] начали спорить.\n\n[family_rival.Custom2('dinner_rival_root_reason', ROOT.Char)] [Select_CString(family_rival.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival'))] и я оба были изрядно навеселе, и я помню, как [family_rival.GetSheHe] [Select_CString(family_rival.IsFemale, 'отпускала', 'отпускал' )] колкость за колкостью... настолько, что я [Select_CString(ROOT.Char.IsFemale, 'велела', 'велел' )] [family_rival.GetHerHim] замолчать.\n\nЗатем мы начали кричать, всё громче и громче, пока, наконец, остальные не встревожились и не вмешались. Но было уже поздно. Мы оба наговорили такого, о чём, скорее всего, пожалеем в ближайшие дни."
 lmf_feast.1002.a: "Что ж, это было досадно."
 self_rival_family_dinner: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName|U] стали соперниками после ужасной ссоры на пиру."
 self_rival_family_dinner_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] и [CHARACTER.GetShortUIName|U] стали соперниками после ужасной ссоры на пиру."

 lmf_feast.1003.t: "Семейный пир: Примирение"
 lmf_feast.1003.desc.opening: "Сегодняшний вечер в большом зале владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] прошёл довольно спокойно. Ни вспышек гнева, ни драм, лишь моя семья, наслаждающаяся моментом относительного мира.\n\nЧто удивительнее, я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], как [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_rival_1'))] и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_rival_2'))] действительно разговаривали.\n\nОба были изрядно навеселе, это правда, но когда я [Select_CString(ROOT.Char.IsFemale, 'услышала', 'услышал' )], как [Select_CString(family_rival_1.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival_1'))] смеётся над одной из "
 lmf_feast.1003.desc.relation: "шуток, которую [Select_CString(family_rival_2.IsFemale, 'отпустила', 'отпустил' )] [family_rival_1.GetHerHis] [family_rival_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival_2'))], "
 lmf_feast.1003.desc.norelation: "шуток, которую [Select_CString(family_rival_2.IsFemale, 'отпустила', 'отпустил' )] [Select_CString(family_rival_2.IsFemale, 'моя', 'мой')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival_2'))], "
 lmf_feast.1003.desc.child: "я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал' )] задумываться, не подошёл ли их спор к концу."
 lmf_feast.1003.desc.end: "я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал' )] задумываться, нет ли шанса, что их вражда, наконец, останется в прошлом. Быть может, с небольшой помощью...?"
 lmf_feast.1003.a: "Попробовать убедить их, наконец, помириться."
 lmf_feast.1003.a.convince.tt: "Вам удаётся убедить их помириться"
 lmf_feast.1003.a.fail.tt: "Они раздражены вашим вмешательством"
 lmf_feast.1003.b: "Пусть сами разберутся."
 lmf_feast.1003.c: "Очень надеюсь, что они помирятся."
 lmf_feast.1003.b.makeup.tt: "Они, наконец, помирились"
 lmf_feast.1003.b.nomakeup.tt: "Настоящего примирения не произошло"

 lmf_feast.1004.desc: "Сегодняшние посиделки в большом зале владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] прошли относительно тихо. Никаких вспышек, никаких драм — лишь моя семья, наслаждающаяся мгновением относительного покоя.\n\nЧто ещё удивительнее, я и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_rival'))] действительно поговорил.\n\nОба мы были изрядно навеселе, это правда, но в нашей беседе появилась лёгкость, которой давно не было. Когда [Select_CString(family_rival.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival'))] [Select_CString(family_rival.IsFemale, 'рассмеялась', 'рассмеялся' )] над одной из моих шуток, я [Select_CString(ROOT.Char.IsFemale, 'задумалась', 'задумался' )]... Неужели наше соперничество наконец можно похоронить? Может, оно закончится здесь, сегодня?"
 lmf_feast.1004.a: "Пришло время помириться."
 lmf_feast.1004.a.success.tt: "Вам удаётся убедить [family_rival.GetHerHis] прекратить соперничество"
 lmf_feast.1004.a.failure.tt: "[family_rival.GetSheHe|U] [Select_CString(family_rival.IsFemale, 'раздражена', 'раздражён' )] вашей попыткой"
 lmf_feast.1004.b: "Достаточно и того, что у нас был хороший вечер."

 lmf_feast.1005.t: "Семейный пир: Поминовение"
 lmf_feast.1005.desc.start: "Сегодняшний семейный пир прошёл в мрачной атмосфере.\n\nНедавно [Select_CString(dead_relative.IsFemale, 'мой', 'моя' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('dead_relative'))] [Select_CString(dead_relative.IsFemale, 'умерла', 'умер' )], и это событие всё ещё нависает над большим залом, словно тёмное облако."
 lmf_feast.1005.desc.miscarriage.start: "Сегодняшний семейный пир прошёл в мрачной атмосфере.\n\nНедавняя мертворождённость [Select_CString(SCOPE.sC('dead_child').IsFemale, 'моей дочери', 'моего сына' )] всё ещё висела над большим залом, словно тёмное облако."
 lmf_feast.1005.desc.miscarriage: "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dead_relative'))|U] [Select_CString(SCOPE.sC('dead_relative').IsFemale, 'сидела', 'сидел')] за столом, почти не разговаривая, но [Select_CString(SCOPE.sC('dead_relative').IsFemale, 'её', 'его')] печаль ощущалась почти физически.\n\nГоворили немногие, и когда мы всё же заговорили, то лишь мягко напомнили [Select_CString(SCOPE.sC('dead_relative').IsFemale, 'ей', 'ему')] — да и всем нам — что жизнь продолжается.\n\nЯ не знаю, насколько разговор помог [Select_CString(SCOPE.sC('dead_relative').IsFemale, 'ей', 'ему')], но, когда трапеза подошла к концу, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('dead_relative'))] [Select_CString(SCOPE.sC('dead_relative').IsFemale, 'сжала', 'сжал')] мою руку под столом. Это было хоть что-то, и то, что семья была вместе в этот тёмный момент, оказалось лучше прежнего молчания."
 lmf_feast.1005.desc.old: "Говорили немногие, и когда мы всё же заговорили, то в основном в наших речах [Select_CString(dead_relative.IsFemale, 'упоминалась', 'упоминался' )] [dead_relative.GetFirstNameNoTooltip].\n\n[dead_relative.GetSheHe|U] [Select_CString(dead_relative.IsFemale, 'прожила', 'прожил')] долгую жизнь, и [dead_relative.GetHerHis] уход оставил пустоту при моём дворе, которую будет непросто заполнить. Мы вспоминали [dead_relative.GetHerHis], игнорируя менее приятные воспоминания, и... в каком-то смысле помогало то, что мы скорбели вместе."
 lmf_feast.1005.desc.adult: "Говорили немногие, и когда мы всё же заговорили, то в основном в наших речах [Select_CString(dead_relative.IsFemale, 'упоминалась', 'упоминался' )] [dead_relative.GetFirstNameNoTooltip].\n\nМы вспоминали [dead_relative.GetHerHis], игнорируя менее приятные воспоминания, и... в каком-то смысле помогало то, что мы скорбели вместе."
 lmf_feast.1005.desc.child: "Говорили немногие, и когда мы всё же заговорили, то в основном в наших речах [Select_CString(dead_relative.IsFemale, 'упоминалась', 'упоминался' )] [dead_relative.GetFirstNameNoTooltip].\n\n[dead_relative.GetSheHe|U] [Select_CString(dead_relative.IsFemale, 'умерла', 'умер' )] так рано, что мы едва успели узнать [dead_relative.GetHerHis]. Поэтому мы говорили о [dead_relative.GetHerHis] проделках и о том, кем бы [Select_CString(dead_relative.IsFemale, 'она могла', 'он мог' )] стать, если бы [Select_CString(dead_relative.IsFemale, 'ей', 'ему' )] дали вырасти... и, в каком-то смысле, помогало то, что мы скорбели вместе."
 lmf_feast.1005.desc.baby: "Говорили немногие, и когда мы всё же заговорили, то в основном в наших речах [Select_CString(dead_relative.IsFemale, 'упоминалась', 'упоминался' )] [dead_relative.GetFirstNameNoTooltip].\n\n[dead_relative.GetSheHe|U] [Select_CString(dead_relative.IsFemale, 'умерла', 'умер')] ещё младенцем, и почему-то казалось таким неправильным, что [ROOT.Char.GetFaith.DeathDeityName] уже забирает [dead_relative.GetHerHis] у нас. Нам всем было больно это обсуждать... но, в каком-то смысле, помогало то, что мы скорбели вместе."
 lmf_feast.1005.a: "Пусть [ROOT.Char.GetFaith.DeathDeityName] упокоит [dead_relative.GetHerHis] душу."
 lmf_feast.1005.b: "[dead_relative.GetHerHis] будут помнить."
 lmf_feast.1005.c: "Пусть [ROOT.Char.GetFaith.DeathDeityName] упокоит [dead_child.GetHerHis] маленькую душу."

 lmf_feast.1006.t: "Семейный пир: Какофония"
 lmf_feast.1006.desc: "Семья собралась на наш вечерний ужин в большом зале владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], и с самого начала там царил настоящий бедлам.\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family_1'))|U] [dinner_neg_family_1.Custom('dinner_activity_neg_past')].\n\nПотом [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family_2'))] [dinner_neg_family_2.Custom('dinner_activity_neg_past')].\n\nА затем [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family_3'))] [dinner_neg_family_3.Custom('dinner_activity_neg_past')].\n\nВсе кричали, и какофония становилась настолько невыносимой, что я наконец [Select_CString(ROOT.Char.IsFemale, 'повысила', 'повысил' )] голос и [Select_CString(ROOT.Char.IsFemale, 'приказала', 'приказал' )] всем замолчать. Возможно, я [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )] кое-что лишнее, но мне просто необходимо было выбраться оттуда."
 lmf_feast.1006.a: "Бывало и лучше, это точно."

 lmf_feast.1007.t: "Семейный пир: Спокойствие"
 lmf_feast.1007.desc: "Время от времени мне кажется, что наша семья здесь, во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], ничем не отличается от любой другой. Сегодня был именно такой случай.\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family_1'))|U] [dinner_pos_family_1.Custom('dinner_activity_pos_past')].\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family_2'))|U] [dinner_pos_family_2.Custom('dinner_activity_pos_past')].\n\nДаже [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family_3'))] [dinner_pos_family_3.Custom('dinner_activity_pos_past')].\n\nВсе ладили между собой, смеялись и даже пели. В какой-то момент я [Select_CString(ROOT.Char.IsFemale, 'встала и произнесла', 'встал и произнёс' )] речь, растрогавшую мою семью до слёз. Это было... хорошо."
 lmf_feast.1007.a: "Прекрасный вечер."

 lmf_feast.1008.t: "Семейный пир: Дружба"
 lmf_feast.1008.desc.start: "Сегодняшний семейный пир в большом зале владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] прошёл довольно удачно.\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nПотом я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_friend_1'))] и "
 lmf_feast.1008.desc.relation: "[family_friend_1.GetHerHis] [family_friend_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend_2'))], [family_friend_2.GetTitledFirstNameNoTooltip], явно прекрасно ладят. "
 lmf_feast.1008.desc.norelation: "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_friend_2'))] явно прекрасно ладят. "
 lmf_feast.1008.desc.child: "Они бегали вокруг, занимаясь тем, что детям удаётся лучше всего: смеялись, играли.\n\n"
 lmf_feast.1008.desc.twomen: "Они хлопали друг друга по плечу, смеялись и рассказывали истории.\n\n"
 lmf_feast.1008.desc.twowomen: "Они шептались, сплетничали и смеялись.\n\n"
 lmf_feast.1008.desc.mixed: "Они вели долгую беседу... не романтическую, а с настоящим интересом и уважением.\n\n"
 lmf_feast.1008.desc.end: "Думаю, я [Select_CString(ROOT.Char.IsFemale, 'стала свидетельницей', 'стал свидетелем' )] зарождения настоящей дружбы."
 lmf_feast.1008.a: "Прекрасно!"

 lmf_feast.1009.desc.start: "Сегодняшний семейный пир в большом зале владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] прошёл довольно удачно.\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nЯ и [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_friend'))] также прекрасно поладили. "
 lmf_feast.1009.desc.child: "[family_friend.GetSheHe|U] [Select_CString(family_friend.IsFemale, 'присоединилась', 'присоединился' )] ко мне в игре после трапезы, и не прошло и мгновения, как мы оба смеялись и веселились, будто никогда прежде.\n\n"
 lmf_feast.1009.desc.adult: "[family_friend.GetSheHe|U] [Select_CString(family_friend.IsFemale, 'выпила', 'выпил' )] со мной после трапезы, и не прошло и мгновения, как мы оба смеялись и делились историями.\n\n"
 lmf_feast.1009.desc.end: "Неужели это начало новой дружбы?"
 lmf_feast.1009.a: "Да! [Select_CString(family_friend.IsFemale, 'Новая подруга', 'Новый друг' )]!"
 lmf_feast.1009.b: "Нет, ближе [family_friend.GetSheHe] уже не станет."

 lmf_feast.1010.t: "Семейный пир: Холодок"
 lmf_feast.1010.desc.start: "На сегодняшнем семейном пиру в большом зале владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] витала странная атмосфера.\n\nСначала [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))] [dinner_neg_family.Custom('dinner_activity_neg_past')].\n\nПотом я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [family_friend_1.GetFirstNameNoTooltip] и [family_friend_2.GetFirstNameNoTooltip] не разговаривали.\n\nОбычно они неразлучны, но вдруг [Select_CString(family_friend_1.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend_1'))] и "
 lmf_feast.1010.desc.relation: "[family_friend_1.GetHerHis] [family_friend_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend_2'))] "
 lmf_feast.1010.desc.norelation: "[Select_CString(family_friend_2.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend_2'))] "
 lmf_feast.1010.desc.end: "сидели на противоположных концах стола, и даже если они проходили друг мимо друга, между ними ощущался явный холодок.\n\nПохоже, их дружба подошла к концу."
 lmf_feast.1010.a: "Очень жаль."

 lmf_feast.1011.desc: "Сегодняшний семейный пир в большом зале сопровождался странной атмосферой.\n\nСначала [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))] [dinner_neg_family.Custom('dinner_activity_neg_past')].\n\nЗатем я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [Select_CString(family_friend.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend'))] [family_friend.GetFirstNameNoTooltip] избегает меня. Когда я [Select_CString(ROOT.Char.IsFemale, 'попыталась', 'попытался')] подойти к [Select_CString(family_friend.IsFemale, 'ней, она отошла', 'нему, он отошёл' )]... и с тех пор между нами ощущается явная холодность. Что я [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )]? Почему [family_friend.GetSheHe] не хочет со мной разговаривать?"
 lmf_feast.1011.a: "Я не понимаю, что изменилось..."

 lmf_feast.1012.t: "Семейный пир: Разоблачение"
 lmf_feast.1012.desc.start: "Сегодняшний семейный пир прошёл тихо, без происшествий. На самом деле я уже [Select_CString(ROOT.Char.IsFemale, 'собиралась', 'собирался' )] удалиться на сон, когда и [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('tattler'))] заговорили.\n\n"
 lmf_feast.1012.desc.child: "Думаю, [tattler.Custom('polite_gender_ref')] даже не [Select_CString(tattler.IsFemale, 'понимала', 'понимал' )] всей серьёзности того, что [Select_CString(tattler.IsFemale, 'говорила', 'говорил' )], лишь невинно [Select_CString(tattler.IsFemale, 'подслушала', 'подслушал' )], как "
 lmf_feast.1012.desc.adult: "Думаю, [tattler.GetFirstNameNoTooltip] даже не [Select_CString(tattler.IsFemale, 'понимала', 'понимал' )] всей серьёзности того, что [Select_CString(tattler.IsFemale, 'сказала', 'сказал' )], лишь [Select_CString(tattler.IsFemale, 'подслушала', 'подслушал' )], как "
 lmf_feast.1012.desc.relation: "[tattler.GetHerHis] [tattler.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_secret'))] "
 lmf_feast.1012.desc.norelation: "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_secret'))] "
 lmf_feast.1012.desc.child2: "шепчется об этом и [Select_CString(tattler.IsFemale, 'нашла', 'нашёл' )] это крайне забавным.\n\n"
 lmf_feast.1012.desc.temperate: "разговаривает об этом и [Select_CString(tattler.IsFemale, 'посчитала', 'посчитал' )] тему весьма неприятной.\n\n"
 lmf_feast.1012.desc.drunk: "шепчется об этом, а позже, изрядно выпив, [Select_CString(tattler.IsFemale, 'упомянула', 'упомянул' )] это мне вскользь.\n\n"
 lmf_feast.1012.desc.end: "Ну а я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял')] смысл очень хорошо, даже если [tattler.GetFirstNameNoTooltip] и нет. [family_secret.GetTitledFirstNameNoTooltip] хранит секрет, который [Select_CString(family_secret.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_secret'))] невольно [Select_CString(family_secret.IsFemale, 'выдала', 'выдал' )]."
 lmf_feast.1012.a: "Как интересно..."

 lmf_feast.1013.t: "Семейный пир: Влечение"
 lmf_feast.1013.start: "Сегодняшний семейный пир прошёл относительно тихо и ничем особым не выделился... за одним примечательным исключением.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_lover_1'))] ведёт себя довольно странно. [family_lover_1.GetSheHe|U] всё время с надеждой [Select_CString(family_lover_1.IsFemale, 'посматривала', 'посматривал' )] через зал в ту сторону, где находится "
 lmf_feast.1013.desc.relation: "[family_lover_1.GetHerHis] [family_lover_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_lover_2'))], [family_lover_2.GetTitledFirstNameNoTooltip]"
 lmf_feast.1013.desc.norelation: "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_lover_2'))]"
 lmf_feast.1013.end: ", [Select_CString(family_lover_2.IsFemale, 'которая', 'который' )] [Select_CString(family_lover_2.IsFemale, 'делала', 'делал' )] вид, что не ничего замечает. Однако когда [family_lover_1.GetFirstNameNoTooltip] наконец [Select_CString(family_lover_1.IsFemale, 'извинилась', 'извинился' )] и [Select_CString(family_lover_1.IsFemale, 'вышла', 'вышел')], [family_lover_2.GetFirstNameNoTooltip] тихо [Select_CString(family_lover_2.IsFemale, 'последовала', 'последовал' )] за [Select_CString(family_lover_1.IsFemale, 'ней', 'ним' )] минутой позже.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил' )] посмотреть, чем они заняты, и [Select_CString(ROOT.Char.IsFemale, 'застала', 'застал' )] их в страстных объятиях в тёмном коридоре. Я быстро [Select_CString(ROOT.Char.IsFemale, 'отступила', 'отступил' )], никому не говоря... по крайней мере, пока."
 lmf_feast.1013.a: "Шокирующе!"

 lmf_feast.1014.t: "Семейный пир: Насилие"
 lmf_feast.1014.start: "Напряжение на сегодняшнем семейном пиру было крайне высоким.\n\nВсе кричали. [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))|U] [dinner_neg_family.Custom('dinner_activity_neg_past')].\n\nХуже всего было слышать, как [family_duel_starter.GetFirstNameNoTooltip] и [family_duel_target.GetFirstNameNoTooltip] спорят на другом конце зала. Я [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], как [family_duel_starter.GetFirstNameNoTooltip] всё больше [Select_CString(family_duel_starter.IsFemale, 'приходила', 'приходил' )] в ярость, пока наконец [Select_CString(family_duel_starter.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_duel_starter'))] не [Select_CString(family_duel_starter.IsFemale, 'выхватила', 'выхватил' )] кинжал и не [Select_CString(family_duel_starter.IsFemale, 'сделала', 'сделал' )] замах в ту сторону, где стоит "
 lmf_feast.1014.desc.relation: "[family_duel_starter.GetHerHis] [family_duel_starter.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_duel_target'))]. "
 lmf_feast.1014.desc.norelation: "[Select_CString(family_duel_target.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_duel_target'))]. "
 lmf_feast.1014.end: "\n\nВсе замерли и уставились в ужасе, когда кровь капнула на пол. Было ясно, что их соперничество зашло слишком далеко."
 lmf_feast.1014.a: "Не вмешиваться."
 lmf_feast.1014.b: "Похоже, они всё-таки решили драться?"
 lmf_feast.1014.a.start.kill.tt: "[family_duel_starter.GetFirstNameNoTooltip] убивает персонажа [family_duel_target.GetFirstNameNoTooltip] на поединке"
 lmf_feast.1014.a.start.win.tt: "[family_duel_starter.GetFirstNameNoTooltip] выигрывает поединок"
 lmf_feast.1014.a.target.win.tt: "[family_duel_target.GetFirstNameNoTooltip] выигрывает поединок"
 lmf_feast.1014.a.target.kill.tt: "[family_duel_target.GetFirstNameNoTooltip] убивает персонажа [family_duel_starter.GetFirstNameNoTooltip] на поединке"
 family_feast_duel: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] сошлись в поединке на семейном пиру."
 lmf_feast.1014.c: "Бросить [family_duel_starter.GetHerHis] в темницу, пока [family_duel_starter.GetFirstNameNoTooltip] не остынет."

 lmf_feast.1015.t: "Семейный пир: Блаженство"
 lmf_feast.1015.desc.start: "Пир во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] был прекрасным этим вечером. Все вели себя тихо и прилично, а в моей семье царила атмосфера дружелюбия.\n\n"
 lmf_feast.1015.desc.newborn: "Вскоре после того, как убрали еду, [Select_CString(show_child.IsFemale, 'маленькая', 'маленький' )] [show_child.GetFirstNameNoTooltip] [Select_CString(show_child.IsFemale, 'была принесена', 'был принесён' )] служанкой из детской, всё ещё в пелёнках и [Select_CString(show_child.IsFemale, 'бодрствующая', 'бодрствующий' )] гораздо позже положенного времени. И всё же я и [family_spouse.GetFirstNameNoTooltip] не смогли устоять. Мы взяли младенца на руки, сюсюкали с [Select_CString(show_child.IsFemale, 'ней', 'ним' )]... и в какой-то момент я и [family_spouse.GetFirstNameNoTooltip] встретились взглядами, как будто говоря:\n\nМы создали это. Мы породили [Select_CString(show_child.IsFemale, 'эту идеальную маленькую девочку', 'этого идеального маленького мальчика' )]."
 lmf_feast.1015.desc.smallchild: "Вскоре после того, как убрали еду, [Select_CString(show_child.IsFemale, 'юная', 'юный' )] [show_child.GetFirstNameNoTooltip] [Select_CString(show_child.IsFemale, 'была приведена', 'был приведён' )] служанкой из детской, чтобы пожелать нам доброй ночи. [show_child.Custom('GirlBoy')] [Select_CString(show_child.IsFemale, 'была недовольна', 'был недоволен' )], конечно, ведь [show_child.GetSheHe] так [Select_CString(show_child.IsFemale, 'интересовалась', 'интересовался' )] происходящим в большом зале. Пытаясь не ложиться спать, [show_child.GetSheHe] [Select_CString(show_child.IsFemale, 'развлекла', 'развлёк' )] нас забавным танцем. Я и [family_spouse.GetFirstNameNoTooltip] громко смеялись, и в какой-то момент наши глаза встретились, как будто говоря:\n\nЭто [Select_CString(show_child.IsFemale, 'наша маленькая', 'наш маленький' )] [show_child.Custom('GirlBoy')]. Наша семья."
 lmf_feast.1015.desc.youngchild: "Вскоре после того, как убрали еду, [Select_CString(show_child.IsFemale, 'вбежала юная', 'вбежал юный' )] [show_child.GetFirstNameNoTooltip], [Select_CString(show_child.IsFemale, 'полная', 'полный' )] радости и решимости развлечь нас весёлой песней и танцем. [Select_CString(family_spouse.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))] и я громко смеялись, и в какой-то момент наши глаза встретились, как будто говоря:\n\nЭто [Select_CString(show_child.IsFemale, 'наша', 'наш' )] [show_child.Custom('GetDaughterSon')]. Мы — семья."
 lmf_feast.1015.desc.stillgotit: "После того как убрали еду, я и [family_spouse.GetFirstNameNoTooltip] оглядели всех, вовлечённых в веселье и разговоры. [Select_CString(family_spouse.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))] [Select_CString(family_spouse.IsFemale, 'вздохнула', 'вздохнул' )] с удовлетворением, затем [family_spouse.GetSheHe] [Select_CString(family_spouse.IsFemale, 'повернулась', 'повернулся' )] ко мне... и я [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )] искорку в [family_spouse.GetHerHis] глазах. [family_spouse.GetSheHe|U] явно [Select_CString(family_spouse.IsFemale, 'хотела', 'хотел' )] провести ночь как муж и жена — и начать прямо сейчас!"
 lmf_feast.1015.desc.chaste: "После того как убрали еду, я и [family_spouse.GetFirstNameNoTooltip] оглядели всех, вовлечённых в веселье и разговоры. [Select_CString(family_spouse.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))] [Select_CString(family_spouse.IsFemale, 'вздохнула', 'вздохнул' )] с удовлетворением, и наши глаза встретились. Возможно, нашу страсть нельзя назвать пылающей, но это всё же любовь. Это наша семья, и это прекрасно."
 lmf_feast.1015.a: "[family_spouse.GetTitledFirstNameNoTooltip], эта чаша за тебя!"
 friend_family_feast: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] сблизились на тёплом семейном пиру."

 lmf_feast.1016.t: "Семейный пир: Презрение"
 lmf_feast.1016.desc.start: "Отношения, которыми связаны я и [Select_CString(family_spouse.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))], были напряжёнными с самого начала сегодняшнего семейного пира.\n\nСначала мы почти не разговаривали, а редкие слова были холодными и неприятными. Затем, когда трапеза закончилась, всё стало ещё хуже. "
 lmf_feast.1016.desc.object.to.me: "[family_spouse.GetSheHe|U] [Select_CString(family_spouse.IsFemale, 'бросала', 'бросал' )] на меня взгляды с отвращением, [Select_CString(family_spouse.IsFemale, 'отдёргивала', 'отдёргивал' )] руку от моего прикосновения. "
 lmf_feast.1016.desc.object.to.me.sodomy: "«Так это правда? С другими мужчинами?!» — [Select_CString(family_spouse.IsFemale, 'прошипела', 'прошипел' )] [family_spouse.GetSheHe]. И теперь я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], о чём речь, хотя знание ничем не помогло.\n\n"
 lmf_feast.1016.desc.object.to.me.incest: "«Так это правда? С собственными родственниками?!» — [Select_CString(family_spouse.IsFemale, 'прошипела', 'прошипел' )] [family_spouse.GetSheHe]. И теперь я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], о чём речь, хотя знание ничем не помогло.\n\n"
 lmf_feast.1016.desc.object.to.me.secret.sodomy: "«Так это правда? С другими мужчинами?» — [Select_CString(family_spouse.IsFemale, 'прошипела', 'прошипел' )] [family_spouse.GetSheHe]. Но [family_spouse.GetSheHe] категорически [Select_CString(family_spouse.IsFemale, 'отказалась', 'отказался' )] что-либо пояснить.\n\n"
 lmf_feast.1016.desc.object.to.me.secret.incest: "«Правда? С собственными родственниками?» — [Select_CString(family_spouse.IsFemale, 'прошипела', 'прошипел' )] [family_spouse.GetSheHe]. Но [family_spouse.GetSheHe] категорически [Select_CString(family_spouse.IsFemale, 'отказалась', 'отказался' )] что-либо пояснить.\n\n"
 lmf_feast.1016.desc.object.to.me.deviant: "«Я знаю, кто ты на самом деле», — [Select_CString(family_spouse.IsFemale, 'прошипела', 'прошипел' )] [family_spouse.GetSheHe]. И теперь я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], о чём речь, хотя знание ничем не помогло.\n\n"
 lmf_feast.1016.desc.object.to.me.secret.deviant: "«Я знаю, кто ты на самом деле», — [Select_CString(family_spouse.IsFemale, 'прошипела', 'прошипел' )] [family_spouse.GetSheHe]. Но [family_spouse.GetSheHe] категорически [Select_CString(family_spouse.IsFemale, 'отказалась', 'отказался' )] что-либо пояснить.\n\n"
 lmf_feast.1016.desc.object.to.them: "Я просто не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] скрывать своего отвращения, зная то, что знаю о [family_spouse.GetHerHis] "
 lmf_feast.1016.desc.object.to.them.sodomy: "связях с другими мужчинами. «Я знаю, кто ты на самом деле!» — [Select_CString(ROOT.Char.IsFemale, 'прошипела', 'прошипел' )] я в какой-то момент.\n\n"
 lmf_feast.1016.desc.object.to.them.incest: "запретной страсти к собственной родне. «Я знаю, кто ты на самом деле!» — [Select_CString(ROOT.Char.IsFemale, 'прошипела', 'прошипел' )] я в какой-то момент.\n\n"
 lmf_feast.1016.desc.object.to.them.secret.sodomy: "тайных связях с другими мужчинами. «Я знаю, кто ты на самом деле!» — [Select_CString(ROOT.Char.IsFemale, 'прошипела', 'прошипел' )] я в какой-то момент.\n\n"
 lmf_feast.1016.desc.object.to.them.secret.incest: "тайных запретных связях с собственной роднёй. «Я знаю, кто ты на самом деле!» — [Select_CString(ROOT.Char.IsFemale, 'прошипела', 'прошипел' )] я в какой-то момент.\n\n"
 lmf_feast.1016.desc.object.to.them.deviant: "странных и извращённых влечениях. «Я знаю, кто ты на самом деле!» — [Select_CString(ROOT.Char.IsFemale, 'прошипела', 'прошипел' )] я в какой-то момент.\n\n"
 lmf_feast.1016.desc.object.to.them.secret.deviant: "тайных и извращённых привычках. «Я знаю, кто ты на самом деле!» — [Select_CString(ROOT.Char.IsFemale, 'прошипела', 'прошипел' )] я в какой-то момент.\n\n"
 lmf_feast.1016.desc.betrayed: "[family_spouse.GetSheHe|U] [Select_CString(family_spouse.IsFemale, 'стала', 'стал' )] спорить, даже издеваться. Всё это было из-за моего предательства супружеских клятв, я [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал' )]... [family_spouse.GetSheHe] никогда бы не [Select_CString(family_spouse.IsFemale, 'простила', 'простил' )] меня.\n\n"
 lmf_feast.1016.desc.they.betrayed: "Я [Select_CString(ROOT.Char.IsFemale, 'спорила', 'спорил' )] и [Select_CString(ROOT.Char.IsFemale, 'отдёргивала', 'отдёргивал')] руку от каждого [family_spouse.GetHerHis] прикосновения. Я не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] простить или забыть [family_spouse.GetHerHis] предательство наших брачных клятв. Не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )]!\n\n"
 lmf_feast.1016.desc.they.secret.lover: "Я [Select_CString(ROOT.Char.IsFemale, 'спорила', 'спорил' )] и [Select_CString(ROOT.Char.IsFemale, 'отдёргивала', 'отдёргивал' )] руку от каждого [family_spouse.GetHerHis] прикосновения. Я никак не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] выбросить из головы [family_spouse.GetHerHis] образ, когда [Select_CString(family_spouse.IsFemale, 'она', 'он')] и [suspected_lover.GetTitledFirstNameNoTooltip] лежат рядом, и это сводило меня с ума!\n\n"
 lmf_feast.1016.desc.secret.lover: "«Это обязательно [Select_CString(suspected_lover.IsFemale, 'должна была', 'должен был' )] быть [suspected_lover.GetFirstNameNoTooltip]?» — [Select_CString(family_spouse.IsFemale, 'прошипела', 'прошипел' )] [family_spouse.GetSheHe], но [Select_CString(family_spouse.IsFemale, 'отказалась', 'отказался' )] уточнить, насколько хорошо [family_spouse.GetSheHe] [Select_CString(family_spouse.IsFemale, 'знала', 'знал' )] о [Select_CString(suspected_lover.IsFemale, 'нём', 'ней' )].\n\n"
 lmf_feast.1016.desc.rivalry: "[family_spouse.GetSheHe|U] [Select_CString(family_spouse.IsFemale, 'насмехалась', 'насмехался' )] над каждым моим словом, [Select_CString(family_spouse.IsFemale, 'отдёргивала', 'отдёргивал' )] руку от моего прикосновения. В последнее время между нами и так было плохо, но теперь [family_spouse.GetSheHe] отвергает любые попытки наладить отношения.\n\n"
 lmf_feast.1016.desc.end: "К концу вечера наши крики уже вызывали ужасающие взгляды у остальной семьи. [family_spouse.GetFirstNameNoTooltip] в ярости [Select_CString(family_spouse.IsFemale, 'выскочила', 'выскочил' )] прочь, и... всё."
 lmf_feast.1016.a: "Ох..."
 nemesis_family_feast: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName|U] стали заклятыми врагами после ссоры на семейном пиру."
 nemesis_family_feast_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] и [CHARACTER.GetShortUIName|U] стали заклятыми врагами после ссоры на семейном пиру."
 rival_family_feast: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName|U] сильно поссорились из-за проблем брака на семейном пиру."
 rival_family_feast_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] и [CHARACTER.GetShortUIName|U] сильно поссорились из-за проблем брака на семейном пиру."

 lmf_feast.1017.t: "Семейный пир: Несчастный случай"
 lmf_feast.1017.desc.start: "Семейный пир во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] был оживленным и начался вполне неплохо.\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nЗатем всё резко изменилось.\n\nОдин из слуг вбежал в большой зал в панике, сообщив мне, что [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_accident'))] "
 lmf_feast.1017.desc.fire: "ужасно [Select_CString(family_accident.IsFemale, 'обожглась', 'обжёгся' )] из-за внезапного пожара на кухне. "
 lmf_feast.1017.desc.stairs: "[Select_CString(family_accident.IsFemale, 'упала', 'упал' )] с лестницы прямо снаружи. "
 lmf_feast.1017.desc.window: "[Select_CString(family_accident.IsFemale, 'выпала', 'выпал' )] из одного из окон наверху. "
 lmf_feast.1017.desc.fall: "сильно [Select_CString(family_accident.IsFemale, 'ушиблась', 'ушибся' )], упав во дворе. "
 lmf_feast.1017.desc.trample: "[Select_CString(family_accident.IsFemale, 'была затоптана', 'был затоптан' )] во дворе, когда одно из животных пришло в ярость. "
 lmf_feast.1017.desc.accident: "[Select_CString(family_accident.IsFemale, 'получила', 'получил' )] тяжёлую травму во дворе, но с трудом [Select_CString(family_accident.IsFemale, 'смогла', 'смог' )] объяснить, что произошло. "
 lmf_feast.1017.desc.end: "\n\nКонечно, это был несчастный случай, и все мы были глубоко обеспокоены. Я немедленно [Select_CString(ROOT.Char.IsFemale, 'распустила', 'распустил' )] всех и [Select_CString(ROOT.Char.IsFemale, 'пошла', 'пошёл' )] позаботиться о том, чтобы [family_accident.GetFirstNameNoTooltip] [Select_CString(family_accident.IsFemale, 'получила', 'получил' )] лучший уход."
 lmf_feast.1017.a: "Надеюсь, это не слишком серьёзно!"
 lmf_feast.1017.injured.tt: "[family_accident.GetTitledFirstName] [Select_CString(family_accident.IsFemale, 'ранена', 'ранен' )]!"

 lmf_feast.1018.t: "Семейный пир: Хворь"
 lmf_feast.1018.desc.start: "Семейный пир во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] проходил весьма удачно этим вечером, по крайней мере, поначалу.\n\nВсе смеялись и весело беседовали, пока вдруг кто-то "
 lmf_feast.1018.desc.child: "заметил, что [Select_CString(family_sick.IsFemale, 'маленькая', 'маленький' )] [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_sick'))] слишком [Select_CString(family_sick.IsFemale, 'притихла', 'притих' )].\n\n[Select_CString(family_sick.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_sick'))] и вправду [Select_CString(family_sick.IsFemale, 'была бледна', был бледен' )] как полотно, а затем [family_sick.GetSheHe] [Select_CString(family_sick.IsFemale, 'свалилась', 'свалился' )] со своего стула! "
 lmf_feast.1018.desc.adult: "закричал в тревоге. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_sick'))] [Select_CString(family_sick.IsFemale, 'начала', 'начал' )] блевать прямо на свою тарелку! То, что сначала показалось простым излишеством вина, быстро оказалось чем-то гораздо более серьёзным.\n\n[Select_CString(family_sick.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_sick'))] [Select_CString(family_sick.IsFemale, 'была бледна и дрожала, холодная', 'был бледен и дрожал, холодный' )] на ощупь. "
 lmf_feast.1018.desc.end: "Я [Select_CString(ROOT.Char.IsFemale, 'велела', 'велел' )] слугам немедленно унести [family_sick.GetHerHis], а затем [Select_CString(ROOT.Char.IsFemale, 'распустила', 'распустил' )] всех — вдруг эта хворь заразна.\n\nК концу вечера мы всё ещё не знали, насколько серьёзна эта внезапная болезнь."
 lmf_feast.1018.a: "Надеюсь, [family_sick.GetSheHe] быстро поправится!"

 lmf_feast.1019.t: "Семейный пир: Всё хорошо"
 lmf_feast.1019.desc.opening: "Моя семья собралась в большом зале владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], "
 lmf_feast.1019.desc.atwar: "игнорируя на один вечер вести с фронта, пока мы пировали.\n\n"
 lmf_feast.1019.desc.nowar: "наслаждаясь относительным миром в державе, во время нашего пира.\n\n"
 lmf_feast.1019.desc.end: "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nМежду тем, [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))] [dinner_neg_family.Custom('dinner_activity_neg_past')].\n\nИ все же, это было хорошо. Мы были все вместе, а это важнее всего."
 lmf_feast.1019.a: "Да благословит нас всех [ROOT.Char.GetFaith.FertilityGodName]."
 lmf_feast.1019.b: "Такой мир наверняка не может длиться вечно..."
 lmf_feast.1019.c: "Подобные времена стали такими редкими."
 lmf_feast.1019.d: "Честно говоря, я чуть не [Select_CString(ROOT.Char.IsFemale, 'заснула', 'заснул' )]..."
 lmf_feast.1019.e: "Как же я жажду вернуться на поле боя."
 lmf_feast.1019.f: "Я едва выношу их постоянную болтовню."
 lmf_feast.1019.g: "Честно, я [Select_CString(ROOT.Char.IsFemale, 'предпочла', 'предпочёл' )] бы побыть где-нибудь в одиночестве."
 lmf_feast.1019.h: "О? Я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] больше [Select_CString(ROOT.Char.IsFemale, 'заинтересована', 'заинтересован' )] в еде."
 lmf_feast.1019.i: "О? Я лично [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] больше [Select_CString(ROOT.Char.IsFemale, 'заинтересована', 'заинтересован' )] в выпивке."
 lmf_feast.1019.j: "Это те времена, которые мы будем помнить."

 lmf_feast.1020.t: "Семейный пир: Надежда"
 lmf_feast.1020.desc.start: "Сегодняшний семейный пир был оживленным, хотя, честно говоря, я едва [Select_CString(ROOT.Char.IsFemale, 'обратила', 'обратил' )] на это внимание.\n\nЯ, как и большая часть семьи, внимательно [Select_CString(ROOT.Char.IsFemale, 'следила', 'следил' )] за своей женой и ее беременностью. [family_spouse.GetFirstNameNoTooltip] [Select_CString(family_spouse.IsFemale, 'прибыла', 'прибыл' )] в большой зал поздно, выглядя бледной и измученной. К ее чести, она почти не жаловалась и пыталась улыбаться каждому участливому члену семьи, который подходил проведать ее. Когда вечер подходил к концу, наши взгляды встретились... и в них была настоящая нежность.\n\n"
 lmf_feast.1020.desc.resolution: "«Между нами было не все хорошо, муж мой», - сказала она. «Если у этого ребенка есть хоть какая-то надежда, не пришло ли время отбросить наши разногласия?» [family_spouse.GetFirstNameNoTooltip] не стала ждать ответа. Она лишь тяжело вздохнула и попросила слуг отвести ее обратно в спальню, оставив меня размышлять: права ли она?"
 lmf_feast.1020.desc.love: "«Я так тебя обожаю, муж мой», - неожиданно сказала она без повода. «Я не знала, чего ожидать от нашего брака, но я так рада, что мы поженились». Я едва [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел' )] улыбнуться в ответ, как она поманила слуг, чтобы те вернули ее в спальню, оставив меня купаться в теплом сиянии ее любви."
 lmf_feast.1020.desc.possibility: "«Я не знала, чего ожидать от нашего брака», - неожиданно сказала она. «Я думала, возможно, наш будет холодным браком, лишь для вида. Но теперь я думаю иначе. Есть ли надежда для нас с тобой, муж мой?» - [family_spouse.GetFirstNameNoTooltip] не стала ждать ответа. Она лишь тяжело вздохнула и попросила слуг отвести ее обратно в спальню, оставив меня размышлять над ответом на ее вопрос."
 lmf_feast.1020.desc.fallback: "«Надеюсь, ребенок порадует тебя, муж мой», - сказала она. Когда я [Select_CString(ROOT.Char.IsFemale, 'ответила', 'ответил' )], что несомненно так и будет, [family_spouse.GetFirstNameNoTooltip] просияла от гордости. «Тогда я рада». Тяжело вздохнув, она позвала слуг, чтобы те отвели ее обратно в спальню, и я [Select_CString(ROOT.Char.IsFemale, 'смотрела', 'смотрел' )], как она уходит, с улыбкой на губах."
 lmf_feast.1020.a: "Ради ребенка, да. Пора положить этому конец."
 lmf_feast.1020.b: "Вот и [Select_CString(ROOT.Char.IsFemale, 'ушла моя', 'ушёл мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))]."
 lmf_feast.1020.c: "Да, я действительно думаю, что у нас есть надежда."
 lmf_feast.1020.d: "Думаю, она вернется в норму после рождения ребенка."
 lmf_feast.1020.e: "Нет, я еще не [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )] отпустить это."
 lmf_feast.1020.f: "В последнее время она так эмоциональна. Я проигнорирую это."

 lmf_feast.1021.t: "Семейный пир: Дружба"
 lmf_feast.1021.desc.start: "Сегодняшние семейные посиделки в большом зале владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] на удивление прошли тихо.\n\nЭто дало время, чтобы я и [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_friend'))] могли пообщаться. По мере того как вечер подходил к концу, всё больше родственников расходились, но мы едва это замечали. Мы делились историями. Я [Select_CString(ROOT.Char.IsFemale, 'рассказывала', 'рассказывал' )] о своих планах для владения [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], а [family_friend.GetSheHe] [Select_CString(family_friend.IsFemale, 'слушала', 'слушал' )] с живым интересом. [family_friend.GetSheHe|U] [Select_CString(family_friend.IsFemale, 'рассказала', 'рассказал' )] мне о "
 lmf_feast.1021.desc.spouse: "различных трудностях, что были в [family_friend.GetHerHis] браке. "
 lmf_feast.1021.desc.ruler: "мелких заботах, что выпали [family_friend.GetHerHim] в правлении державой [family_friend.GetPrimaryTitle.GetNameNoTierNoTooltip]. "
 lmf_feast.1021.desc.court: "мелких делах, с которыми [family_friend.GetSheHe] [Select_CString(family_friend.IsFemale, 'сталкивалась', 'сталкивался' )] как [Select_CString(family_friend.IsFemale, 'моя', 'мой' )] [family_friend.Custom('GetCouncilOrCourtPosition')]. "
 lmf_feast.1021.desc.courtier: "разных событиях, которые видел [ROOT.Char.Custom('FortifiedBuilding')], о которых я редко слышу. "
 lmf_feast.1021.desc.end: "Я лишь [Select_CString(ROOT.Char.IsFemale, 'кивала и делала', 'кивал и делал' )] вид, что понимаю [family_friend.GetHerHis] заботы.\n\nКогда мы, наконец, остановились, то поняли, что зал давно опустел, а за окнами ночь. [family_friend.GetFirstNameNoTooltip] [Select_CString(family_friend.IsFemale, 'засмеялась', 'засмеялся' )], извинившись, что [Select_CString(family_friend.IsFemale, 'отняла', 'отнял' )] так много моего времени... но, по правде сказать, это было приятно — провести время с [Select_CString(family_friend.IsFemale, 'подругой', 'другом' )]."
 lmf_feast.1021.a: "[Select_CString(family_friend.IsFemale, 'Моя верная', 'Мой верный' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend'))], за тебя!"

 lmf_feast.1022.t: "Семейный пир: Вражда"
 lmf_feast.1022.desc: "Сегодняшний пир во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] мог бы быть вполне приятным... если бы не [Select_CString(family_rival.IsFemale, 'присутствовала', 'присутствовал' )] [family_rival.GetFirstNameNoTooltip]. Зачем [Select_CString(family_rival.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival'))] продолжает приходить на эти ужины — выше моего понимания. Пожалуй, лишь назло мне.\n\nСегодня это проявилось особенно явно, когда [family_rival.GetFirstNameNoTooltip] [Select_CString(family_rival.IsFemale, 'села', 'сел' )] достаточно далеко, чтобы я едва [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] разобрать [family_rival.GetHerHis] слова — язвительные реплики, которые [family_rival.GetSheHe] [Select_CString(family_rival.IsFemale, 'бросала', 'бросал' )] соседям, замаскированные так, будто они не адресованы никому конкретно, но на деле явно направленные в мой адрес. Постепенно они становились всё громче и злее по мере того, как [family_rival.GetFirstNameNoTooltip] всё больше [Select_CString(family_rival.IsFemale, 'пила', 'пил' )], и мне оставалось лишь стиснуть зубы и делать вид, что я это игнорирую.\n\nВ конце концов, когда терпение моё иссякло, я [Select_CString(ROOT.Char.IsFemale, 'встала и приказала', 'встал и приказал' )], чтобы [Select_CString(family_rival.IsFemale, 'моя', 'мой')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival'))] [Select_CString(family_rival.IsFemale, 'покинула', 'покинул')] стол. [family_rival.GetSheHe|U] же [Select_CString(family_rival.IsFemale, 'приняла', 'принял' )] такой невинный и оскорблённый вид, что это стало невыносимо. Тогда я [Select_CString(ROOT.Char.IsFemale, 'развернулась и сама покинула', 'развернулся и сам покинул' )] зал, кипя от ярости и всерьёз обдумывая, не изгнать ли [family_rival.GetHerHis] из моего двора навсегда."
 lmf_feast.1022.a: "Хорошо хоть [family_rival.GetSheHe] всё же из семьи..."

 lmf_feast.1023.t: "Семейный пир: [Select_CString(dead_relative.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('dead_relative'))|U]"
 lmf_feast.1023.desc: "Вечернее собрание во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] прошло тихо и без особых событий. Вдруг, без всякой видимой причины, темой разговора [Select_CString(dead_relative.IsFemale, 'стала моя', 'стал мой')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('dead_relative'))], [Select_CString(dead_relative.IsFemale, 'умершая и покинувшая', 'умерший и покинувший' )] нас уже много лет назад.\n\nСемья говорила о [Select_CString(dead_relative.IsFemale, 'ней', 'нём' )] шёпотом, то с лёгкими улыбками, то с горечью, пока наконец [family_toaster.GetFirstNameNoTooltip] не [Select_CString(family_toaster.IsFemale, 'встала', 'встал' )] и не [Select_CString(family_toaster.IsFemale, 'призвала', 'призвал' )] всех к вниманию.\n\n«Поднимем бокалы в память о [Select_CString(dead_relative.IsFemale, 'ней', 'нём' )]», — [Select_CString(family_toaster.IsFemale, 'обратилась', 'обратился' )] к собравшимся в большом зале [Select_CString(family_toaster.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_toaster'))].\n\n«[dead_relative.GetSheHe|U] [Select_CString(dead_relative.IsFemale, 'правила', 'правил' )] владением [dead_relative.GetPrimaryTitle.GetNameNoTooltip], пока [Select_CString(dead_relative.IsFemale, 'была жива', 'был жив' )][Select_CString(dead_relative.IsFemale, 'а', '')], и [Select_CString(dead_relative.IsFemale, 'отправилась', 'отправился' )] в [dead_relative.GetFaith.PositiveAfterLife], но память о [Select_CString(dead_relative.IsFemale, 'ней', 'нём' )] всегда останется с нами. Пусть [dead_relative.GetFaith.DeathDeityName] хранит [dead_relative.GetHerHis] в вечности!»"
 lmf_feast.1023.a: "Верно сказано!"

 lmf_feast.1024.t: "Семейный пир: Не в своей тарелке"
 lmf_feast.1024.desc.start: "Семейный пир во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] сегодня был шумным, весёлым и полным радости.\n\nВсе веселились, лишь [Select_CString(family_hostage.IsFemale, 'юная', 'юный' )] [family_hostage.GetTitledFirstNameNoTooltip] [Select_CString(family_hostage.IsFemale, 'помрачнела', 'помрачнел' )]. Я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [family_hostage.Custom('GetLassLad')] [Select_CString(family_hostage.IsFemale, 'сидела одна', 'сидел один' )] на дальнем конце стола, опустив голову и выглядя явно неловко.\n\n«Должно быть, тяжело», — [Select_CString(ROOT.Char.IsFemale, 'подумала', 'подумал' )] я, "
 lmf_feast.1024.desc.language.none: "не зная [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip] язык, и при этом на пиру нет никого, кто бы знал [family_hostage.GetCulture.GetLanguage.GetNameNoTooltip].\n\n"
 lmf_feast.1024.desc.language.one: "не зная [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip] язык, и при этом на пиру лишь [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_hostage_common'))] знает [family_hostage.GetCulture.GetLanguage.GetNameNoTooltip].\n\n"
 lmf_feast.1024.desc.religion.none: "будучи [Select_CString(family_hostage.IsFemale, 'единственной последовательницей', 'единственным последователем' )] [family_hostage.GetFaith.GetNameNoTooltip|l]ой веры на пиру, где никто не соблюдал её обычаев и, вероятно, даже не знал их.\n\n"
 lmf_feast.1024.desc.religion.one: "будучи [Select_CString(family_hostage.IsFemale, 'единственной последовательницей', 'единственным последователем')] [family_hostage.GetFaith.GetNameNoTooltip|l]ой веры на пиру, и лишь [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_hostage_common'))] разделяет их, и никто не соблюдал её обычаев.\n\n"
 lmf_feast.1024.desc.culture.none: "будучи [Select_CString(family_hostage.IsFemale, 'представительницей', 'представителем' )] [family_hostage.GetCulture.GetCollectiveNounNoTooltip|l]ого народа, и при этом на пиру не было ни души, кто бы знал или заботился о [family_hostage.GetCulture.GetCollectiveNounNoTooltip|l] традициях.\n\n"
 lmf_feast.1024.desc.culture.one: "будучи [Select_CString(family_hostage.IsFemale, 'представительницей', 'представителем' )] [family_hostage.GetCulture.GetCollectiveNounNoTooltip|l]ого народа, и при этом только [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_hostage_common'))] хоть что-то [Select_CString(family_hostage_common.IsFemale, 'знала или заботилась', 'знал или заботился' )] о [family_hostage.GetCulture.GetCollectiveNounNoTooltip|l]их традициях.\n\n"
 lmf_feast.1024.desc.end: "Честно говоря, мне стало жаль [family_hostage.GetHerHis] в тот момент. Может быть, стоит что-то предпринять?"
 lmf_feast.1024.a: "Я постараюсь, чтобы [family_hostage.GetSheHe] [Select_CString(family_hostage.IsFemale, 'почувствовала', 'почувствовал' )] себя как дома."
 lmf_feast.1024.b: "Я не [family_hostage.GetHerHis] [ROOT.Char.GetMotherFather]. [family_hostage.GetSheHe|U] может позаботиться о себе."

 lmf_feast.1025.t: "Семейный пир: [Select_CString(family_ward.IsFemale, 'Моя воспитанница', 'Мой воспитанник' )]"
 lmf_feast.1025.desc.start: "Сегодняшний пир во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] оказался довольно скучным, и я уже почти [Select_CString(ROOT.Char.IsFemale, 'задремала', 'задремал')] на своём месте, когда [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [Select_CString(family_ward.IsFemale, 'юная', 'юный' )] [family_ward.GetFirstNameNoTooltip] стоит неподалёку, внимательно прислушивается к разговору, "
 lmf_feast.1025.desc.relation: "который [family_ward.GetHerHis] [family_ward.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_example'))] "
 lmf_feast.1025.desc.norelation: "который [Select_CString(family_example.IsFemale, 'моя', 'мой')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_example'))] "
 lmf_feast.1025.desc.mid: "[Select_CString(family_example.IsFemale, 'вела', 'вёл' )] с кем-то другим.\n\nВ конце концов, любопытство взяло верх, и я [Select_CString(ROOT.Char.IsFemale, 'подошла и спросила', 'подошёл и спросил')], что же так привлекло [family_ward.GetHerHis] внимание. Оказалось, что [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_example'))] "
 lmf_feast.1025.desc.diplomacy: "[Select_CString(family_example.IsFemale, 'обсуждала', 'обсуждал' )] весьма деликатный дипломатический вопрос, касавшийся чужеземной державы, достаточно сложный, "
 lmf_feast.1025.desc.intrigue: "тихо [Select_CString(family_example.IsFemale, 'говорила', 'говорил' )] о дворцовых интригах, мораль которых была достаточно запутанной, "
 lmf_feast.1025.desc.martial: "[Select_CString(family_example.IsFemale, 'рассказывала', 'рассказывал' )] о недавней битве в другой державе, и стратегии, которые там применялись, были достаточно сложными, "
 lmf_feast.1025.desc.learning: "[Select_CString(family_example.IsFemale, 'рассуждала', 'рассуждал' )] о возвышенной философии, достаточно сложной, "
 lmf_feast.1025.desc.stewardship: "[Select_CString(family_example.IsFemale, 'объясняла', 'объяснял' )] недавнее дело о правосудии при моём дворе, детали которого были достаточно сложными, "
 lmf_feast.1025.desc.end: "чтобы [family_ward.GetFirstNameNoTooltip] [Select_CString(family_ward.IsFemale, 'осталась', 'остался' )] в полном недоумении.\n\nПовернувшись ко мне, [family_ward.GetSheHe] [Select_CString(family_ward.IsFemale, 'потребовала', 'потребовал' )] объяснений. Впрочем, неудивительно, ведь [family_ward.GetSheHe] — [Select_CString(family_ward.IsFemale, 'моя воспитанница', 'мой воспитанник')] и моя ответственность."
 lmf_feast.1025.a: "Ну, понимаешь, это было так..."
 lmf_feast.1025.a.success: "[family_ward.GetFirstNameNoTooltip] [Select_CString(family_ward.IsFemale, 'поняла', 'понял' )], и [family_ward.GetHerHis] [Concept('education_focus', 'обучение')|E] продвинулось вперёд."
 lmf_feast.1025.a.success.tt: "[family_ward.GetFirstNameNoTooltip] [Select_CString(family_ward.IsFemale, 'поняла', 'понял')]"
 lmf_feast.1025.a.success2.tt: "[family_ward.GetHerHis|U] [Concept('education_focus', 'обучение')|E] продвинулось."
 lmf_feast.1025.a.fail: "[family_ward.GetFirstNameNoTooltip] никак не [Select_CString(family_ward.IsFemale, 'сумела', 'сумел' )] понять ваши объяснения, как бы ни [Select_CString(family_ward.IsFemale, 'старалась', 'старался' )]..."
 lmf_feast.1025.a.fail.tt: "[family_ward.GetFirstNameNoTooltip] не [Select_CString(family_ward.IsFemale, 'поняла', 'понял' )]"
 lmf_feast.1025.a.botch: "[family_ward.GetFirstNameNoTooltip] совершенно неправильно всё [Select_CString(family_ward.IsFemale, 'поняла', 'понял' )], что повредило [family_ward.GetHerHis] [Concept('education_focus', 'обучению')|E]."
 lmf_feast.1025.a.botch.tt: "[family_ward.GetFirstNameNoTooltip] совершенно неправильно всё [Select_CString(family_ward.IsFemale, 'поняла', 'понял')]"
 lmf_feast.1025.a.botch2.tt: "[family_ward.GetHerHis|U] [Concept('education_focus', 'обучение')|E] оказалось под угрозой."
 lmf_feast.1025.b: "Хватит. Спроси меня в другой раз."

 lmf_feast.1026.t: "Семейный пир: Время молитвы"
 lmf_feast.1026.desc.start: "Сегодняшний пир во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] вышел довольно скучным, и его ничуть не оживило то, что [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_religious'))] [Select_CString(family_religious.IsFemale, 'решила', 'решил' )] провести вечер, читая длинную проповедь для всей семьи о важности благочестия и добродетели.\n\n"
 lmf_feast.1026.desc.zealous: "Я [Select_CString(ROOT.Char.IsFemale, 'слушала', 'слушал' )] с неподдельным вниманием, "
 lmf_feast.1026.desc.cynical: "Я [Select_CString(ROOT.Char.IsFemale, 'старалась', 'старался' )] не закатывать глаза слишком часто, "
 lmf_feast.1026.desc.nozeal: "Я [Select_CString(ROOT.Char.IsFemale, 'слушала', 'слушал' )] некоторое время, с трудом подавляя зевоту, "
 lmf_feast.1026.desc.impatient: "но, признаюсь, для моего терпения это оказалось чрезмерным испытанием.\n\n"
 lmf_feast.1026.desc.patient: "и, к счастью, моё терпение позволило мне выдержать это куда дольше, чем большинству присутствующих, которые уже мечтали вернуться к вину.\n\n"
 lmf_feast.1026.desc.family: "даже когда большинство в зале уже томились у своих кубков или клевали носом.\n\n"
 lmf_feast.1026.desc.loved: "По крайней мере, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_religious'))] [Select_CString(family_religious.IsFemale, 'нашла', 'нашёл' )] [Select_CString(family_react.IsFemale, 'союзницу', 'союзника' )] в семье: "
 lmf_feast.1026.desc.relation: "[family_religious.GetHerHis] [family_religious.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_react'))], [family_react.GetTitledFirstNameNoTooltip], "
 lmf_feast.1026.desc.norelation: "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_react'))], "
 lmf_feast.1026.desc.loved2: "[Select_CString(family_react.IsFemale, 'которая', 'который' )] явно [Select_CString(family_react.IsFemale, 'наслаждалась и подбадривала', 'наслаждался и подбадривал' )] [Select_CString(family_religious.IsFemale, 'её', 'его' )] ещё долго после того, как [family_religious.GetFirstNameNoTooltip] в ином случае [Select_CString(family_religious.IsFemale, 'остановилась', 'остановился' )] бы.\n\nК концу вечера, когда почти вся семья уже тихо разошлась, эти двое были видны на другой стороне зала, увлечённо споря о вере."
 lmf_feast.1026.desc.hated: "По крайней мере, один из членов семьи отнёсся к такой забаве с особым раздражением: "
 lmf_feast.1026.desc.hated2: "[Select_CString(family_react.IsFemale, 'которая', 'который' )] больше часа [Select_CString(family_react.IsFemale, 'скрипела', 'скрипел' )] зубами, а затем [Select_CString(family_react.IsFemale, 'стала', 'стал' )] почти при каждом удобном случае перебивать и высмеивать всё, что [Select_CString(family_religious.IsFemale, 'произнесла', 'произнёс' )] [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_religious'))].\n\nКогда проповедь наконец завершилась — к явному облегчению большинства в зале — их обоих можно было заметить в дальнем углу, ожесточённо спорящих о религии. Подозреваю, они оба будут помнить этот вечер ещё очень долго."
 lmf_feast.1026.desc.default: "Она тянулась и тянулась, пока в конце концов почти вся семья не удалилась из зала. Когда же [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_religious'))] наконец [Select_CString(family_religious.IsFemale, 'выдохлась', 'выдохся' )] и не [Select_CString(family_religious.IsFemale, 'смогла', 'смог' )] продолжать, я всё равно [Select_CString(ROOT.Char.IsFemale, 'была вынуждена', 'был вынужден' )] аплодировать [family_religious.GetHerHis] выносливости. Действительно, [family_religious.GetFaith.GetAdherentNameNoTooltip] с завидным усердием!"
 lmf_feast.1026.a: "Пусть [ROOT.Char.GetFaith.HouseOfWorship|l] станет местом для проповедей, а не пир."
 loved_family_feast_sermon: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'прониклись', Select_CString(CHARACTER.IsFemale, 'прониклась', 'проникся' ))] проповедью [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] на семейном пире."
 loved_family_feast_sermon_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'прониклись', Select_CString(TARGET_CHARACTER.IsFemale, 'прониклась', 'проникся' ))] проповедью [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] на семейном пире."
 hated_family_feast_sermon: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'отнеслись', Select_CString(CHARACTER.IsFemale, 'отнеслась', 'отнёсся' ))] отрицательно к проповеди [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] на семейном пире."
 hated_family_feast_sermon_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'отнеслись', Select_CString(TARGET_CHARACTER.IsFemale, 'отнеслась', 'отнёсся' ))] отрицательно к проповеди [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] на семейном пире."

 lmf_feast.1027.t: "Семейный пир: Представление"
 lmf_feast.1027.desc.start: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_entertainer'))] [Select_CString(family_entertainer.IsFemale, 'превзошла саму', 'превзошёл самого' )] себя на сегодняшнем семейном пиру.\n\nВечер проходил довольно спокойно, пока [Select_CString(family_entertainer.IsFemale, 'она', 'он' )] вдруг не [Select_CString(family_entertainer.IsFemale, 'решила', 'решил' )], что так не пойдёт... и [Select_CString(family_entertainer.IsFemale, 'вскочила', 'вскочил' )] на один из столов и "
 lmf_feast.1027.desc.poet: "[Select_CString(family_entertainer.IsFemale, 'разразилась', 'разразился' )] эпической [family_entertainer.GetCulture.GetCollectiveNounNoTooltip] поэмой.\n\nЭто было вовсе не простое стихотворение, нет. Это была сага о героических подвигах, и [Select_CString(family_entertainer.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_entertainer'))] [Select_CString(family_entertainer.IsFemale, 'поведала', 'поведал' )] её мастерски. [Select_CString(family_entertainer.IsFemale, 'Она делала', 'Он делал' )] драматические паузы в нужных местах и [Select_CString(family_entertainer.IsFemale, 'вдыхала', 'вдыхал' )] жизнь в каждую роль. Когда монстр поднял голову, [Select_CString(family_entertainer.IsFemale, 'она воздвигла', 'он воздвиг' )] руки и [Select_CString(family_entertainer.IsFemale, 'зарычала', 'зарычал' )], заставив детей визжать от ужаса и восторга.\n\n"
 lmf_feast.1027.desc.bard: "[Select_CString(family_entertainer.IsFemale, 'начала', 'начал' )] развлекать нас песней.\n\nНе знаю, какой дух вселился и сделал так, чтобы [Select_CString(family_entertainer.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_entertainer'))] [Select_CString(family_entertainer.IsFemale, 'поступила', 'поступил' )] в тот вечер, но музыка, которую [Select_CString(family_entertainer.IsFemale, 'она исполнял', 'он исполнял' )], была настоящим шедевром. Каждая нота — изысканна, каждая строка — тщательно подобрана и точно исполнена. И как только мы думали, что песня заканчивается, [family_entertainer.GetFirstNameNoTooltip] плавно [Select_CString(family_entertainer.IsFemale, 'переходила', 'переходил' )] к следующей.\n\n"
 lmf_feast.1027.desc.end: "Сказать, что семья осталась довольна, — ничего не сказать. Половина из нас прослезилась к концу, и когда [family_entertainer.GetFirstNameNoTooltip] [Select_CString(family_entertainer.IsFemale, 'сделала', 'сделал' )] последний поклон и [Select_CString(family_entertainer.IsFemale, 'покинула', 'покинул' )] стол, всех присутствующих объяли громовые аплодисменты.\n\nМы долго этого не забудем, я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )]."
 lmf_feast.1027.a: "Какой замечательный вечер!"

 lmf_feast.1028.t: "Семейный пир: Беседа"
 lmf_feast.1028.desc.start: "Во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] прошёл хороший вечер семейного пира.\n\nВ начале [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nПозже я и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_expert'))], [Select_CString(family_expert.IsFemale, 'которая', 'который' )] "
 lmf_feast.1028.desc.diplomat: "долго [Select_CString(family_expert.IsFemale, 'говорила', 'говорил' )] о дипломатии и возможностях для державы [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] в отношениях с соседями, завели лёгкий разговор. [Select_CString(family_expert.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] даже [Select_CString(family_expert.IsFemale, 'поведала', 'поведал' )] несколько поразительных историй дипломатических провалов, о которых я никогда не [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышалслышал' )], каждая лучше предыдущей.\n\n"
 lmf_feast.1028.desc.family_first: "[Select_CString(family_expert.IsFemale, 'говорила', 'говорил' )] в основном о семье, завели лёгкий разговор... обычно это не та тема, которая меня интересует, но [Select_CString(family_expert.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] [Select_CString(family_expert.IsFemale, 'предложила', 'предложил' )] такие взгляды на то, как семьи могут лучше ладить между собой, что это оказалось захватывающе. Подобных идей я не [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )] никогда.\n\n"
 lmf_feast.1028.desc.august: "[Select_CString(family_expert.IsFemale, 'говорила', 'говорил' )] о правлении, завели лёгкий разговор о взаимоотношениях между [Select_CString(ROOT.Char.IsFemale, 'леди', 'лордом' )] и [ROOT.Char.GetHerHis] вассалами и о том, как добиться лучшего понимания с обеих сторон. Это было по-настоящему увлекательно и показало глубину, на которую по моему представлению [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] [Select_CString(family_expert.IsFemale, 'была не способна', 'был не способен' )].\n\n"
 lmf_feast.1028.desc.strategist: "[Select_CString(family_expert.IsFemale, 'рассказывала', 'рассказывал' )] истории о сражениях, завели лёгкий разговор: о допущенных командирами ошибках, об изобретательных решениях, которые в последний момент переламывали ход войны, о том, как часто всё сводилось к тому, у какой стороны лучше снабжение. Возможно, я уже [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )] эти истории, но [Select_CString(family_expert.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] [Select_CString(family_expert.IsFemale, 'умела', 'умел' )] излагать их так, будто они новые и важные.\n\n"
 lmf_feast.1028.desc.overseer: "[Select_CString(family_expert.IsFemale, 'говорила', 'говорил' )] о снабжении армии, завели лёгкий разговор... обычно это быстро нагоняет скуку, но [Select_CString(family_expert.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] [Select_CString(family_expert.IsFemale, 'сумела', 'сумел' )] сделать это увлекательным. Даже самая сильная армия может пасть без хлеба! Кто бы мог подумать, что я буду смеяться, обсуждая цепочки снабжения?\n\n"
 lmf_feast.1028.desc.gallant: "[Select_CString(family_expert.IsFemale, 'говорила', 'говорил' )] о романтике и рыцарстве, завели лёгкий разговор о темах, что я обычно нахожу скучными или приторными, но [Select_CString(family_expert.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] [Select_CString(family_expert.IsFemale, 'сделала', 'сделал' )] их почти легендарными. [Select_CString(family_expert.IsFemale, 'Её', 'Его' )] глаза загорелись, когда [Select_CString(family_expert.IsFemale, 'она говорила', 'он говорил' )] об этом, и всё казалось невероятно важным.\n\n"
 lmf_feast.1028.desc.architect: "[Select_CString(family_expert.IsFemale, 'говорила', 'говорил' )] об архитектуре, завели лёгкий разговор... обычно это тема малопривлекательная, но [Select_CString(family_expert.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] [Select_CString(family_expert.IsFemale, 'сделала', 'сделал' )] её интересной. Я и не [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал' )], что нужно, чтобы построить [ROOT.Char.GetFaith.HouseOfWorship]! Или насколько важна простая каменная колонна!\n\n"
 lmf_feast.1028.desc.administrator: "[Select_CString(family_expert.IsFemale, 'говорила', 'говорил' )] об управлении державой, завели лёгкую беседу... обычно это смертельно скучно, но [Select_CString(family_expert.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] [Select_CString(family_expert.IsFemale, 'сумела', 'сумел' )] превратить каждую тему в эпическую историю! [Select_CString(family_expert.IsFemale, 'Её', 'Его' )] прозорливость казалась почти сверхъестественной, а советы были разумными и хорошо продуманными.\n\n"
 lmf_feast.1028.desc.avaricious: "[Select_CString(family_expert.IsFemale, 'говорила', 'говорил' )] в основном о своей любви к деньгам и о разных способах их добывать, завели лёгкую беседу... обычно это мне неприятно, но [Select_CString(family_expert.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] [Select_CString(family_expert.IsFemale, 'излагала', 'излагал' )] это так увлекательно, что я [Select_CString(ROOT.Char.IsFemale, 'заслушалась', 'заслушался' )]. Не каждый заработок лишён морали, [Select_CString(family_expert.IsFemale, 'утверждала она', 'утверждал он' )], и у [Select_CString(family_expert.IsFemale, 'неё', 'него' )] было полно историй в подтверждение.\n\n"
 lmf_feast.1028.desc.schemer: "[Select_CString(family_expert.IsFemale, 'рассказывала', 'рассказывал' )] о разных заговорах, в которых [Select_CString(family_expert.IsFemale, 'она участвовала', 'он участвовал' )], завели лёгкую беседу. Меня подмывало отвернуться, но [Select_CString(family_expert.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] всегда [Select_CString(family_expert.IsFemale, 'удерживала', 'удерживал' )] моё внимание. Каждая история говорила о глубине [Select_CString(family_expert.IsFemale, 'её', 'его' )] знаний об интригах, и не было конца хитросплетениям! Я и не [Select_CString(ROOT.Char.IsFemale, 'представляла', 'представлял' )], что ум так коварен.\n\n"
 lmf_feast.1028.desc.seducer: "[Select_CString(family_expert.IsFemale, 'говорила', 'говорил' )] в основном о своих любовных похождениях — теме, что обычно меня мало интересует, завели лёгкую беседу, но [Select_CString(family_expert.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] [Select_CString(family_expert.IsFemale, 'была', 'был' )] достаточно [Select_CString(family_expert.IsFemale, 'пьяна', 'пьян' )], чтобы [Select_CString(family_expert.IsFemale, 'её', 'его' )] язык развязался, и [Select_CString(family_expert.IsFemale, 'она делилась', 'он делился' )] тем, что обычно [Select_CString(family_expert.IsFemale, 'держала', 'держал' )] при себе. История за историей, полные скандальных подробностей, приковывали моё внимание.\n\n"
 lmf_feast.1028.desc.torturer: "[Select_CString(family_expert.IsFemale, 'говорила', 'говорил' )] в основном о пользе пыток, завели лёгкую беседу. Сначала меня это оттолкнуло, пока я не [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что [Select_CString(family_expert.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] [Select_CString(family_expert.IsFemale, 'была', 'был' )] достаточно [Select_CString(family_expert.IsFemale, 'пьяна', 'пьян' )], чтобы [Select_CString(family_expert.IsFemale, 'её', 'его' )] язык развязался. Подробности были ужасающими, но раскрывали такие методы, о которых я никогда не [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )], и я не [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] оторваться.\n\n"
 lmf_feast.1028.desc.whole_of_body: "[Select_CString(family_expert.IsFemale, 'говорила', 'говорил' )] о человеческом теле, болезнях и «жидкостях», завели лёгкую беседу... обычно тема сухая, но [Select_CString(family_expert.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] [Select_CString(family_expert.IsFemale, 'делала', 'делал' )] её интересной. [Select_CString(family_expert.IsFemale, 'Она выглядела', 'Он выглядел' )] так увлечённо, что это передавалось и мне.\n\n"
 lmf_feast.1028.desc.scholar: "[Select_CString(family_expert.IsFemale, 'говорила', 'говорил' )] в основном об учёности, завели лёгкую беседу, но вместо сухих рассуждений о философии и истории [Select_CString(family_expert.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] [Select_CString(family_expert.IsFemale, 'превращала', 'превращал' )] каждую задачу в увлекательную головоломку. «Мы так мало знаем о творении [family_expert.GetFaith.CreatorNamePossessive],» — [Select_CString(family_expert.IsFemale, 'сказала она', 'сказал он' )], с грустью покачав головой.\n\n"
 lmf_feast.1028.desc.theologian: "[Select_CString(family_expert.IsFemale, 'говорила', 'говорил' )] в основном о богословии, завели лёгкую беседу... сухая тема для пира, но я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что [Select_CString(family_expert.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] [Select_CString(family_expert.IsFemale, 'была', 'был' )] достаточно [Select_CString(family_expert.IsFemale, 'пьяна', 'пьян' )], чтобы [Select_CString(family_expert.IsFemale, 'её', 'его' )] язык развязался. [Select_CString(family_expert.IsFemale, 'Её', 'Его' )] о том, какое место занимает [ROOT.Char.GetFaith.CreatorName] в сотворении, о роли [ROOT.Char.GetFaith.GetNameNoTooltip|l]ой веры и человечества я никогда раньше не [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )]!\n\n"
 lmf_feast.1028.desc.end: "Сказать, что я в основном [Select_CString(ROOT.Char.IsFemale, 'слушала', 'слушал' )], — ничего не сказать. Я [Select_CString(ROOT.Char.IsFemale, 'сидела', 'сидел' )], ловя каждое [Select_CString(family_expert.IsFemale, 'её', 'его' )] слово, пока почти все не разошлись. Когда мы наконец оглянулись и это заметили, [Select_CString(family_expert.IsFemale, 'она', 'он' )] горячо [Select_CString(family_expert.IsFemale, 'извинилась', 'извинился' )] за то, что весь вечер [Select_CString(family_expert.IsFemale, 'занимала', 'занимал' )] меня, но я [Select_CString(ROOT.Char.IsFemale, 'отмахнулась', 'отмахнулся' )] от этой заботы. На самом деле я [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал' )] очень многое."
 lmf_feast.1028.a: "Какой познавательный вечер!"
 good_family_feast_conversation: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'узнали', Select_CString(CHARACTER.IsFemale, 'узнала', 'узнал' ))] многое от [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] за долгий вечер разговора на семейном пиру."
 good_family_feast_conversation_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'узнали', Select_CString(TARGET_CHARACTER.IsFemale, 'узнала', 'узнал' ))] многое от [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] за долгий вечер разговора на семейном пиру."

 lmf_feast.1029.t: "Семейный пир: Презрение"
 lmf_feast.1029.desc.start: "Сегодняшний семейный пир во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] проходил в тишине. Тем более досадно, что [public_lover.GetFirstNameNoTooltip] [Select_CString(public_lover.IsFemale, 'выбрала', 'выбрал' )] именно этот вечер, чтобы прийти.\n\n"
 lmf_feast.1029.desc.notfamily: " [Select_CString(ROOT.Char.IsFemale, 'говорила', 'говорил' )] [public_lover.GetHerHim] уже много раз, что [public_lover.GetSheHe] может свободно приходить на такие мероприятия, теперь, когда о наших отношениях знает каждый. Однако сегодня, когда семье больше не на что было обратить внимание, они обратили его на #EMP н[public_lover.GetHerHis]#!.\n\n"
 lmf_feast.1029.desc.family: "Несмотря на то, что мы семья, учитывая, что все знают о наших отношениях, [public_lover.GetSheHe] [Select_CString(public_lover.IsFemale, 'могла', 'мог' )] бы вовсе не приходить, но [public_lover.GetSheHe] [Select_CString(public_lover.IsFemale, 'захотела', 'захотел' )] увидеть меня. Однако сегодня, когда у остальной семьи не было других поводов для обсуждений, они сосредоточили внимание на #EMP [Select_CString(public_lover.IsFemale, 'ней', 'нём' )]#!.\n\n"
 lmf_feast.1029.desc.end: "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_hater'))|U] особенно [Select_CString(family_hater.IsFemale, 'возмутилась', 'возмутился' )] [public_lover.GetHerHis] присутствием здесь.\n\nШёпот и косые взгляды начались сразу же, и я [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], что [public_lover.GetFirstNameNoTooltip] [Select_CString(public_lover.IsFemale, 'чувствовала', 'чувствовал' )] себя неловко. Я [Select_CString(ROOT.Char.IsFemale, 'собиралась', 'собирался' )] предложить [public_lover.GetHerHim] уйти, но в этот момент [Select_CString(family_hater.IsFemale, 'вмешалась', 'вмешался' )] [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_hater'))]. Они поспорили, привлекая внимание всей залы, и когда [public_lover.GetFirstNameNoTooltip] [Select_CString(public_lover.IsFemale, 'была', 'был' )] громко [Select_CString(public_lover.IsFemale, 'обругана', 'обруган' )] парой «ласковых» слов, [public_lover.GetSheHe] наконец [Select_CString(public_lover.IsFemale, 'решила', 'решил' )] уйти.\n\nБыло уже поздно что-либо предпринимать, и праздничная атмосфера заметно охладилась."
 lmf_feast.1029.a: "Что ж, это было неприятно..."
 lover_showed_at_family_feast: "[CHARACTER.GetShortUINameNoTooltip|U] [Select_CString( CHARACTER.IsLocalPlayer, 'оскорбил', Select_CString(CHARACTER.IsFemale, 'оскорбили', 'оскорбил' ))] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] за то, что [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вы осмелились', Select_CString(TARGET_CHARACTER.IsFemale, 'она осмелилась', 'он осмелился' ))] появиться на семейном пиру."
 lover_showed_at_family_feast_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltip|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'оскорбил', Select_CString(TARGET_CHARACTER.IsFemale, 'оскорбили', 'оскорбил' ))] [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] за то, что [Select_CString( CHARACTER.IsLocalPlayer, 'вы осмелились', Select_CString(CHARACTER.IsFemale, 'она осмелилась', 'он осмелился' ))] появиться на семейном пиру."

 lmf_feast.1030.t: "Семейный пир: Культурный конфликт"
 lmf_feast.1030.desc: "Пир во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] начинался достаточно спокойно — по крайней мере, пока [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_hater'))] и [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_react'))] не начали спорить.\n\nСначала казалось, что это просто дружеская дискуссия, и никто не обращал на неё внимания. Затем голоса повысились. Спор, как оказалось, был о том, чья кухня лучше — [family_hater.GetCulture.GetCollectiveNounNoTooltip|l]ая или [family_react.GetCulture.GetCollectiveNounNoTooltip|l]ая. Потом [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_react'))] [Select_CString(family_react.IsFemale, 'сказала', 'сказал' )] что-то, из-за чего [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_hater'))] [Select_CString(family_hater.IsFemale, 'оскорбилась', 'оскорбился' )], и вот тогда начались настоящие крики.\n\nДело чуть не дошло до драки, но другие члены семьи быстро вмешались и разняли их, однако ущерб уже был нанесён. Остаток вечера они избегали друг друга, а настроение в большом зале заметно испортилось."
 lmf_feast.1030.a: "Как неприятно."
 argued_over_different_culture: "[CHARACTER.GetShortUINameNoTooltip|U] и [TARGET_CHARACTER.GetShortUINameNoTooltip] повздорили из-за культурных различий на семейном пиру."

 lmf_feast.1031.t: "Семейный пир: Представление"
 lmf_feast.1031.desc.start: "На сегодняшнем семейном пиру всё было спокойно... какое-то время.\n\nПотом [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_fool'))] "
 lmf_feast.1031.desc.drunkard: "так [Select_CString(family_fool.IsFemale, 'напилась', 'напился' )], что полностью [Select_CString(family_fool.IsFemale, 'опозорилась', 'опозорился' )]. Рюмка за рюмкой, пока [family_fool.GetSheHe] не [Select_CString(family_fool.IsFemale, 'начала', 'начал' )] шататься по большому залу, выкрикивая призывы присоединиться к веселью, несмотря на неловкие взгляды семьи.\n\n[family_fool.GetSheHe|U] [Select_CString(family_fool.IsFemale, 'хватала', 'хватал' )] слуг, несколько раз [Select_CString(family_fool.IsFemale, 'падала', 'падал' )], а в конце концов [Select_CString(family_fool.IsFemale, 'была вынесена', 'был вынесен' )] из зала другими членами семьи, пока [family_fool.GetSheHe] [Select_CString(family_fool.IsFemale, 'кричала', 'кричал' )], чтобы [family_fool.GetHerHis] отпустили."
 lmf_feast.1031.desc.hashishiyah: "так [Select_CString(family_fool.IsFemale, 'насытился', 'насытилась' )] маковым молоком, что полностью [Select_CString(family_fool.IsFemale, 'опозорилась', 'опозорился' )]. Несколько членов семьи пытались сказать [family_fool.GetHerHim], чтобы [family_fool.GetSheHe] [Select_CString(family_fool.IsFemale, 'умерила', 'умерил' )] пыл, но [family_fool.GetSheHe] раздражённо [Select_CString(family_fool.IsFemale, 'отмахивалась', 'отмахивался' )].\n\nВскоре [family_fool.GetSheHe] уже [Select_CString(family_fool.IsFemale, 'шаталась', 'шатался' )] по большому залу почти без сознания. [family_fool.GetHerHis|U] несколько раз вырвало и [family_fool.GetSheHe] [Select_CString(family_fool.IsFemale, 'рухнула', 'рухнул' )] на пол, после чего [family_fool.GetHerHis] безсознательное тело вынесли слуги, пока мы с неловким молчанием наблюдали."
 lmf_feast.1031.desc.lunatic: "[Select_CString(family_fool.IsFemale, 'взобралась', 'взобрался' )] на один из столов, [Select_CString(family_fool.IsFemale, 'привлекла', 'привлёк' )] внимание всех и [Select_CString(family_fool.IsFemale, 'начала', 'начал' )] бормотать. Сначала все решили, что это тост или история, и неловко посмеивались, хотя [family_fool.GetSheHe] [Select_CString(family_fool.IsFemale, 'говорила', 'говорил' )] полную чепуху.\n\nПотом всё вышло из-под контроля. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_fool'))|U] [Select_CString(family_fool.IsFemale, 'стала непредсказуемой', 'стал непредсказуемым' )], то крича, то заливаясь слезами. Когда [family_fool.GetSheHe] [Select_CString(family_fool.IsFemale, 'схватила', 'схватил' )] нож и [Select_CString(family_fool.IsFemale, 'пригрозила', 'пригрозил' )] выколоть себе глаза, я [Select_CString(ROOT.Char.IsFemale, 'велела', 'велел' )] вывести [family_fool.GetHerHis] из зала ради [family_fool.GetHerHis] же безопасности."
 lmf_feast.1031.desc.irritable: "[Select_CString(family_fool.IsFemale, 'начала', 'начал' )] спорить... сначала с теми, кто сидел рядом с [Select_CString(family_fool.IsFemale, 'ней', 'ним' )], а затем [family_fool.GetSheHe] [Select_CString(family_fool.IsFemale, 'подняла', 'поднял' )] голос на всю семью. Вспомнились старые обиды, старые грехи — реальные или воображаемые, все оказались неправы и ужасными родственниками.\n\n[family_fool.GetHerHis|U] гнев казался безграничным, и мы лишь молча переглядывались, пока наконец [family_fool.GetSheHe] не [Select_CString(family_fool.IsFemale, 'вскинула', 'вскинул' )] руки и не [Select_CString(family_fool.IsFemale, 'выскочила', 'выскочил' )] из зала."
 lmf_feast.1031.desc.depressed: "[Select_CString(family_fool.IsFemale, 'начала', 'начал' )] плакать. Сначала это были тихие слёзы, и [family_fool.GetHerHis] подавленность привлекла внимание лишь тех, кто сидел рядом с [Select_CString(family_fool.IsFemale, 'ней', 'ним' )]. Но вскоре [family_fool.GetSheHe] [Select_CString(family_fool.IsFemale, 'разрыдалась', 'разрыдался' )] в полный голос, что встревожило всю семью.\n\nПочти все окружили [family_fool.GetHerHis], пытаясь помочь, но, похоже, это лишь усугубило ситуацию. Когда [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_fool'))] [Select_CString(family_fool.IsFemale, 'выбежала', 'выбежал' )] из зала, [family_fool.GetSheHe] [Select_CString(family_fool.IsFemale, 'оставила', 'оставил' )] нас в неловком молчании."
 lmf_feast.1031.desc.rakish: "[Select_CString(family_fool.IsFemale, 'устроила', 'устроил' )] настоящее представление. [family_fool.GetSheHe|U] весь вечер [Select_CString(family_fool.IsFemale, 'приставала', 'приставал' )] к слугам и [Select_CString(family_fool.IsFemale, 'отпускала', 'отпускал' )] непристойные шутки, которые все слышали. Некоторые были столь грубыми, что заставили самых целомудренных родственников ахнуть.\n\nКогда [family_fool.GetSheHe] [Select_CString(family_fool.IsFemale, 'схватила', 'схватил' )] [Select_CString(family_fool.IsFemale, 'одного из молодых слуг', 'одну из молодых служанок' )] и [Select_CString(family_fool.IsFemale, 'начала', 'начал' )] [dummy_attracted_gender.GetHerHim] лапать — несмотря на [dummy_attracted_gender.GetHerHis] отчаянные протесты — прямо перед всей семьёй, я [Select_CString(ROOT.Char.IsFemale, 'вмешалась', 'вмешался' )] и [Select_CString(ROOT.Char.IsFemale, 'велела', 'велел' )] вывести [family_fool.GetHerHis] из зала под взгляды шокированных родственников."
 lmf_feast.1031.desc.reclusive: "[Select_CString(family_fool.IsFemale, 'решила', 'решил' )], что [family_fool.GetSheHe] достаточно [Select_CString(family_fool.IsFemale, 'насмотрелась', 'насмотрелся' )] на нашу компанию. [family_fool.GetSheHe|U] [Select_CString(family_fool.IsFemale, 'поднялась', 'поднялся' )], [Select_CString(family_fool.IsFemale, 'привлекла', 'привлёк' )] внимание и [Select_CString(family_fool.IsFemale, 'начала', 'начал' )] высказывать каждому своё мнение... и оно было недобрым.\n\n«Почему я вообще прихожу на эти сборища — ума не приложу!», — [Select_CString(family_fool.IsFemale, 'выкрикнула', 'выкрикнул' )] [family_fool.GetSheHe]. «Не хочу здесь быть! И вы не хотите, чтобы я здесь [Select_CString(family_fool.IsFemale, 'была', 'был' )]! Так что, с вашего позволения, я #EMP с радостью#! уйду!», — и с этими словами [family_fool.GetSheHe] [Select_CString(family_fool.IsFemale, 'выскочила', 'выскочил' )] из зала, оставив нас в неловком молчании."
 lmf_feast.1031.desc.deviant: "[Select_CString(family_fool.IsFemale, 'устроила', 'устроил' )] настоящее представление. [family_fool.GetSheHe|U] весь вечер [Select_CString(family_fool.IsFemale, 'приставала', 'приставал' )] к слугам и [Select_CString(family_fool.IsFemale, 'отпускала', 'отпускал' )] непристойные шутки, которые все слышали. Некоторые были столь грубыми, что вызвали вздохи у более целомудренных родственников.\n\nВ конце концов [family_fool.GetSheHe] [Select_CString(family_fool.IsFemale, 'шокировала', 'шокировал' )] нас всех, сорвав с себя одежду, взобравшись на стол и начав отчитывать всех за чрезмерную скромность. [family_fool.GetSheHe|U] [Select_CString(family_fool.IsFemale, 'выскочила', 'выскочил' )] из зала, прежде чем я [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел' )] приказать [family_fool.GetHerHis] вывести, оставив нас в полном молчании."
 lmf_feast.1031.desc.contrite: "[Select_CString(family_fool.IsFemale, 'поразила', 'поразил' )] всех, взобравшись на один из столов. [family_fool.GetSheHe|U] [Select_CString(family_fool.IsFemale, 'стояла', 'стоял' )] там, нервно заламывая свои руки, пока зал не притих в ожидании.\n\n«Я больше не могу!», — [Select_CString(family_fool.IsFemale, 'сказала', 'сказал' )] [family_fool.GetSheHe]. «Тяжесть этой тайны... это слишком! [family_fool.GetFaith.HighGodName] судит меня за молчание, и я больше не выдержу!», - после чего [family_fool.GetSheHe] [Select_CString(family_fool.IsFemale, 'раскрыла', 'раскрыл' )] секрет и, пока мы стояли в потрясённом молчании, [Select_CString(family_fool.IsFemale, 'выбежала', 'выбежал' )] из зала."
 lmf_feast.1031.desc.newtrait: "\n\nЧто стало причиной, никто не знал, ведь обычно [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_fool'))] так себя не ведёт. Вероятнее всего, стресс.\n\n"
 lmf_feast.1031.desc.trait: "\n\nДа, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_fool'))] частенько устраивает такие выходки, но такое — на семейном сборе? [family_fool.GetSheHe|U] должно быть [Select_CString(family_fool.IsFemale, 'испытывала', 'испытывал' )] сильнейший стресс.\n\n"
 lmf_feast.1031.desc.end: "Какова бы ни была причина, настроение в большом зале заметно испортилось... хотя, думаю, у семьи теперь будет тема для сплетен на месяцы."
 lmf_feast.1031.a: "Что ж, это было... что-то, ладно."

 lmf_feast.1032.t: "Семейный пир: Радость"
 lmf_feast.1032.desc: "Настроение на сегодняшнем семейном пиру во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] было лёгким и весёлым.\n\nА потом стало ещё оживлённее — благодаря нескольким зачинщикам: [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_celebrate_1'))], [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_celebrate_2'))] и [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_celebrate_3'))].\n\n[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_celebrate_2'))] [Select_CString(family_celebrate_2.IsFemale, 'начала', 'начал' )] веселье, попросив музыкантов сыграть что-нибудь задорное, и когда [family_celebrate_2.GetSheHe] [Select_CString(family_celebrate_2.IsFemale, 'пустилась', 'пустился' )] в пляс, двое других быстро присоединились.\n\nОни вытягивали других членов семьи на танцпол, одного за другим, и прежде чем я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], весь зал был охвачен радостным весельем. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_celebrate_1'))] [Select_CString(family_celebrate_1.IsFemale, 'встала', 'встал' )] на один из столов и [Select_CString(family_celebrate_1.IsFemale, 'призвала', 'призвал' )] меня показать свои танцевальные умения — и признаюсь, я [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )] это, к восторгу всех.\n\nКогда вечер подошёл к концу, мы все были вымотаны... но приятно, ведь этот вечер, [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], надолго останется в памяти всей семьи."
 lmf_feast.1032.a: "Да! Вот так бы почаще."
 all_stressed_family_dinner_guests: "Все гости семейного пира"

 lmf_feast.1033.t: "Семейный пир: Презрение"
 lmf_feast.1033.desc.start: "Вечер на сегодняшнем семейном пиру начинался вполне неплохо, пока [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_rival_1'))] и спорить со [Select_CString(family_rival_1.IsFemale, 'её', 'его' )] [family_rival_2.Custom('WifeHusband')] не начали спороть.\n\nДумаю, [Select_CString(angry_spouse.IsFemale, 'зачинщицей была', 'зачинщиком был' )] именно [angry_spouse.GetSheHe]. Сначала — холодные взгляды на [Select_CString(target_spouse.IsFemale, 'свою жену', 'своего мужа' )], затем — едкие замечания, которые погрузили всех вокруг в тягостное молчание, пока, наконец, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))] не [Select_CString(target_spouse.IsFemale, 'смогла', 'смог' )] терпеть это дольше.\n\nВот тогда и начались крики. Судя по тому, что я [Select_CString(ROOT.Char.IsFemale, 'услышала', 'услышал' )], "
 lmf_feast.1033.desc.sodomy: "речь шла о связях, которые [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))] поддерживает с другими мужчинами — скандале, о котором и так знали все в зале.\n\n"
 lmf_feast.1033.desc.incest: "речь шла о... ну, об инцесте. Скандал, с которым [Select_CString(target_spouse.IsFemale, 'связана', 'связан' )] [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))], известен нам всем, разумеется.\n\n"
 lmf_feast.1033.desc.deviant: "речь шла о делах супружеского ложа, и учитывая известные всем вкусы, которые предпочитает [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))]... это неудивительно.\n\n"
 lmf_feast.1033.desc.secretsodomy: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))] обвиняется в связях с другим мужчиной... для семьи это, разумеется, стало шокирующим откровением.\n\n"
 lmf_feast.1033.desc.secretincest: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))] обвиняетсся в инцесте... для семьи это, разумеется, стало шокирующим откровением.\n\n"
 lmf_feast.1033.desc.secretdeviant: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('angry_spouse'))] [Select_CString(angry_spouse.IsFemale, 'пришла', 'пришёл' )] в отвращение от «сексуальной извращённости», которую поддерживает [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))]... это стало новостью для нас всех.\n\n"
 lmf_feast.1033.desc.infidelity: "речь шла о супружеской неверности, которую [Select_CString(target_spouse.IsFemale, 'совершила', 'совершил' )] [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))] — теме, уже давно известной всей семье.\n\n"
 lmf_feast.1033.desc.secretinfidelity: "речь шла о тайной любовной связи, которую поддерживает [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))] — шокирующем откровении для нас всех.\n\n"
 lmf_feast.1033.desc.rival: "это было не более чем очередное проявление их взаимной ненависти. Всё те же старые споры, только теперь на глазах у всей семьи.\n\n"
 lmf_feast.1033.desc.potrival: "это был взрыв накопленной ненависти, которую, судя по всему, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('angry_spouse'))] [Select_CString(angry_spouse.IsFemale, 'копила', 'копил' )] уже давно.\n\n"
 lmf_feast.1033.desc.end: "Или, по крайней мере, так всё #EMP началось#!. Крики и взаимные обвинения продолжались почти час, пока [Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('target_spouse'))] не [Select_CString(target_spouse.IsFemale, 'взмолилась', 'взмолился' )] к нам с просьбой вмешаться. Когда я это [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )], [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('angry_spouse'))] [Select_CString(angry_spouse.IsFemale, 'обрушила', 'обрушил' )] свой гнев на #EMP меня#!.\n\nТогда я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что пора заканчивать этот вечер."
 lmf_feast.1033.a: "Как же неловко для всех нас."

 lmf_heir.1501.t: "Тайная тренировка"
 lmf_heir.1501.start: "Я [Select_CString(ROOT.Char.IsFemale, 'проверяла', 'проверял' )] укрепления, когда [new_educator.Custom2('MyCharacterIntroduction', ROOT.Char)] [Select_CString(new_educator.IsFemale, 'попросила', 'попросил' )] поговорить со мной наедине.\n\n«[Select_CString(focus_child.IsFemale, 'Ваша', 'Ваш' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))] в последние месяцы часто [Select_CString(focus_child.IsFemale, 'приходила', 'приходил' )] ко мне, [Select_CString(ROOT.Char.IsFemale, 'миледи', 'милорд' )], с просьбой дать уроки фехтования. Я не [Select_CString(new_educator.IsFemale, 'отказала', 'отказал' )] [focus_child.GetHerHim], ведь я вижу [focus_child.GetHerHis] страсть, но... я не могу продолжать это втайне».\n\n«[focus_child.GetTitledFirstNameNoTooltip] имеет большой потенциал, — настаивает [new_educator.GetSheHe], — и [focus_child.GetSheHe] [Select_CString(focus_child.IsFemale, 'несчастна', 'несчастен' )] на нынешних занятиях».\n\n"
 lmf_heir.1501.unusual: "«Я понимаю, что это весьма необычно — для [Select_CString(focus_child.IsFemale, 'девочки', 'мальчика' )] взяться за меч, но"
 lmf_heir.1501.default: "«Я понимаю, что у вас, должно быть, есть другие планы на [focus_child.GetHerHis] будущее, но"
 lmf_heir.1501.end: "я [Select_CString(new_educator.IsFemale, 'готова', 'готов' )] обучать [focus_child.GetHerHis] и наверстать упущенное, если вы позволите. [focus_child.GetSheHe|U] будет учиться быстро, обещаю»."
 lmf_heir.1500.a.tt_change: "[education_focus|E] персонажа [focus_child.GetFirstNameNoTooltip] сменится на [Concept('martial', 'военное дело')|E]"
 lmf_heir.1500.a.tt_tutor: "[new_educator.GetTitledFirstNameNoTooltip] лично обучит персонажа [focus_child.GetFirstNameNoTooltip], чтобы восполнить пробелы в образовании"
 lmf_heir.1501.a: "Хорошо. Посмотрим, как [focus_child.GetFirstNameNoTooltip] справится."
 lmf_heir.1501.b: "Ни в коем случае. [focus_child.GetFirstNameNoTooltip] [Select_CString(focus_child.IsFemale, 'должна', 'должен' )] сосредоточиться на нынешних занятиях."
 lmf_heir.1501.c: "[new_educator.GetFirstNameNoTooltip] может помочь, но [focus_child.GetFirstNameNoTooltip] научится фехтованию от меня."
 lmf_heir.1501.d: "[new_educator.GetFirstNameNoTooltip] может помочь, но я останусь [Select_CString(focus_child.IsFemale, 'её', 'его' )] [Select_CString(ROOT.Char.IsFemale, 'наставницей', 'наставником' )]."

 lmf_heir.1503.t: "[Select_CString(focus_child.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))]: Тренировка"
 lmf_heir.1503.start: "Мне пришли новости о том, как [Select_CString(focus_child.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))] проходит военную подготовку, и... они неутешительны.\n\n«[focus_child.GetTitledFirstNameNoTooltip] ещё [Select_CString(focus_child.IsFemale, 'молода', 'молод' )], это правда, — признаётся [focus_child.GetHerHis] последний наставник, — но ясно, что [focus_child.GetHerHis] сердце к этому не лежит, [Select_CString(ROOT.Char.IsFemale, 'миледи', милорд')]. [focus_child.GetSheHe|U] "
 lmf_heir.1503.female: "понимает, что ей никогда не позволят по-настоящему взяться за оружие, а даже если бы это было возможно, "
 lmf_heir.1503.end: "совершенно [Select_CString(focus_child.IsFemale, 'лишена', 'лишён' )] и таланта, и интереса к военному делу и стратегии».\n\nЭто уже не первый подобный отчёт. Как бы ни было это неприятно, возможно, пора подумать о том, чтобы [focus_child.GetFirstNameNoTooltip] [Select_CString(focus_child.IsFemale, 'была переведена', 'был переведён' )] на другое направление обучения, где [focus_child.GetSheHe] сможет проявить себя."
 lmf_heir.1503.a: "Возможно, [new_diplomacy_educator.GetFirstName] сможет обучить [focus_child.GetHerHis] дипломатии."
 lmf_heir.1503.b: "[focus_child.GetFirstNameNoTooltip] займётся дипломатией, а подходящего наставника мы подберём позже."
 lmf_heir.1503.c: "Возможно, [new_stewardship_educator.GetFirstName] сможет обучить [focus_child.GetHerHis] управлению."
 lmf_heir.1503.d: "[focus_child.GetFirstNameNoTooltip] займётся управлением, а подходящего наставника мы подберём позже."
 lmf_heir.1503.e: "Возможно, [new_intrigue_educator.GetFirstName] сможет обучить [focus_child.GetHerHis] искусству интриг."
 lmf_heir.1503.f: "[focus_child.GetFirstNameNoTooltip] займётся интригами, а подходящего наставника мы подберём позже."
 lmf_heir.1503.g: "Возможно, [new_learning_educator.GetFirstName] сможет обучить [focus_child.GetHerHis] наукам."
 lmf_heir.1503.h: "[focus_child.GetFirstNameNoTooltip] займётся науками, а подходящего наставника мы подберём позже."
 lmf_heir.1503.i: "Нет, [focus_child.GetFirstNameNoTooltip] просто [Select_CString(focus_child.IsFemale, 'должна', 'должен' )] постараться усерднее."
 lmf_heir.1503.a.tt_change: "[education_focus|E] персонажа [focus_child.GetFirstNameNoTooltip] сменится на [Concept('diplomacy', 'дипломатию')|E]"
 lmf_heir.1503.a.tt_tutor: "[new_diplomacy_educator.GetTitledFirstNameNoTooltip] лично обучит персонажа [focus_child.GetFirstNameNoTooltip], чтобы восполнить пробелы в образовании"
 lmf_heir.1503.tt_no_tutor: "[focus_child.GetFirstNameNoTooltip] будет усердно работать, чтобы восполнить пробелы в образовании"
 lmf_heir.1503.b.tt_change: "[education_focus|E] персонажа [focus_child.GetFirstNameNoTooltip] сменится на [Concept('stewardship', 'управление')|E]"
 lmf_heir.1503.b.tt_tutor: "[new_stewardship_educator.GetTitledFirstNameNoTooltip] лично обучит персонажа [focus_child.GetFirstNameNoTooltip], чтобы восполнить пробелы в образовании"
 lmf_heir.1503.c.tt_change: "[education_focus|E] персонажа [focus_child.GetFirstNameNoTooltip] сменится на [Concept('intrigue', 'искусство интриг')|E]"
 lmf_heir.1503.c.tt_tutor: "[new_intrigue_educator.GetTitledFirstNameNoTooltip] лично обучит персонажа [focus_child.GetFirstNameNoTooltip], чтобы восполнить пробелы в образовании"
 lmf_heir.1503.d.tt_change: "[education_focus|E] персонажа [focus_child.GetFirstNameNoTooltip] сменится на [Concept('learning', 'учёность')|E]"
 lmf_heir.1503.d.tt_tutor: "[new_learning_educator.GetTitledFirstNameNoTooltip] лично обучит персонажа [focus_child.GetFirstNameNoTooltip], чтобы восполнить пробелы в образовании"

 lmf_heir.1505.t: "[Select_CString(focus_child.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))]: Тренировка"
 lmf_heir.1505.desc: "Мне пришли новости о том, как [Select_CString(focus_child.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))] проходит военную подготовку.\n\n«[focus_child.GetTitledFirstNameNoTooltip] ещё [Select_CString(focus_child.IsFemale, 'молода', 'молод' )], это правда, — признаётся [focus_child.GetHerHis] последний наставник, — но [focus_child.GetSheHe] проявляет столь решительный характер и врождённый талант. [focus_child.GetSheHe|U] всё время требует позволить [focus_child.GetHerHim] начать полноценные занятия фехтованием, [Select_CString(ROOT.Char.IsFemale, 'миледи', 'милорд' )], и думаю, что если мы не позволим, [focus_child.GetSheHe] отправится учиться этому тайком».\n\nДля девушки браться за оружие — дело весьма неподобающее... но, с другой стороны, почему [focus_child.GetHerHis] обучение должно ограничиваться лишь стратегией и военным делом?"
 lmf_heir.1505.a: "Пусть учится сражаться. Посмотрим, что из этого выйдет."
 lmf_heir.1505.b: "Ей достаточно нынешней подготовки. Пусть сосредоточится на ней."

 lmf_heir.1511.t: "Брак по любви?"
 lmf_heir.1511.desc.start: "[focus_child.GetFirstNameNoTooltip] ещё [Select_CString(focus_child.IsFemale, 'молода', 'молод' )], но уже понимает, что помолвка может быть не за горами.\n\n«Если я вступлю в брак, то только по любви!» — смело [Select_CString(focus_child.IsFemale, 'заявила', 'заявил' )] [focus_child.GetSheHe] за ужином. «[focus_child.Custom2('LMF_RelationToMeShort', ROOT.Char)|U], вы же не станете заставлять меня вступить в брак против моей воли, правда?»\n\n"
 lmf_heir.1511.desc.sex: "Всё яснее становится, что [Select_CString(focus_child.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))] не слишком интересуется противоположным полом. Быть может, внезапная тяга к независимости проистекает именно из этого?\n\n"
 lmf_heir.1511.desc.lustful: "Я всё чаще замечаю, что [Select_CString(focus_child.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))] превращается в [Select_CString(focus_child.IsFemale, 'влюбчивую девицу', 'влюбчивого юнца' )], несмотря на столь юный возраст. Возможно, внезапная тяга к независимости связана с желанием насладиться вольной жизнью. Признаюсь, в [focus_child.GetHerHis] годы я [Select_CString(ROOT.Char.IsFemale, 'чувствовала', 'чувствовал' )] то же самое.\n\n"
 lmf_heir.1511.desc.sibling: "Когда я [Select_CString(ROOT.Char.IsFemale, 'удивилась', 'удивился' )], зачем [focus_child.GetSheHe] вообще поднимает этот вопрос, [focus_child.GetSheHe] [Select_CString(focus_child.IsFemale, 'ответила', 'ответил' )]: «С вашего дозволения [favored_sibling.GetFirstNameNoTooltip] [Select_CString(favored_sibling.IsFemale, 'вступила', 'вступил' )] в брак по своему выбору! Почему я не могу так же?» Ах, значит, [focus_child.GetHerHis] [focus_child.Custom2('LMF_RelationToMeShort', SCOPE.sC('favored_sibling'))] вызывает зависть своей свободой. Теперь всё ясно.\n\n"
 lmf_heir.1511.desc.adventure: "Признаюсь, я не совсем понимаю, откуда [Select_CString(focus_child.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))] вдруг [Select_CString(focus_child.IsFemale, 'обрела', 'обрёл' )] эту тягу к независимости. Желание приключений, быть может? Или стремление насладиться молодостью без бремени второй половинки?\n\n"
 lmf_heir.1511.desc.end.female: "Вопрос лишь в том, стоит ли поощрять такие желания. Члены нашей династии обязаны вступать в брак и иметь детей, и, нравится это или нет, женщинам приходится делать это в молодости, пока они в расцвете сил. Хотя... возможно, пока об этом ещё рано думать."
 lmf_heir.1511.desc.end: "Вопрос лишь в том, стоит ли поощрять это. Члены нашей династии обязаны вступать в брак и иметь детей, в конце концов. Хотя... возможно, это может подождать? [focus_child.GetFirstNameNoTooltip] ещё совсем [Select_CString(focus_child.IsFemale, 'юна', 'юн' )] и, кажется, [Select_CString(focus_child.IsFemale, 'полна', 'полон' )] решимости отстоять своё мнение."
 lmf_heir.1511.a: "С [focus_child.GetHerHis] браком можно повременить."
 lmf_heir.1511.b: "[focus_child.GetSheHe|U] вступит в брак тогда, когда я скажу. И точка."
 allowed_to_marry_at_will: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'позволили', Select_CString(CHARACTER.IsFemale, 'позволила', 'позволил' ))] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажу ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'ему персонажу', '' )] вступить в брак по своему желанию."
 allowed_to_marry_at_will_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'позволили', Select_CString(TARGET_CHARACTER.IsFemale, 'позволила', 'позволил' ))] [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажу ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'ему персонажу', '' )] вступить в брак по своему желанию."

 invite_suitor_1_introduction_tt: "[suitor_1.GetTitledFirstName] будет [Select_CString(suitor_1.IsFemale, 'приглашена', 'приглашён' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] для знакомства с персонажем [secondary_actor.GetTitledFirstNameNoTooltip]"
 invite_suitor_2_introduction_tt: "[suitor_2.GetTitledFirstName] будет [Select_CString(suitor_2.IsFemale, 'приглашена', 'приглашён' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] для знакомства с персонажем [secondary_actor.GetTitledFirstNameNoTooltip]"
 invite_suitor_3_introduction_tt: "[suitor_3.GetTitledFirstName] будет [Select_CString(suitor_3.IsFemale, 'приглашена', 'приглашён' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] для знакомства с персонажем [secondary_actor.GetTitledFirstNameNoTooltip]"
 lmf_heir.1516.warning.matrilineal_tt: "Если знакомство закончится браком, он будет #X матрилинейным#!"
 lmf_heir.1516.warning.patrilineal_tt: "Если знакомство закончится браком, он будет #X патрилинейным#!"
 lmf_heir.1516.t: "Знакомство?"
 lmf_heir.1516.desc.start: "Хорошая новость: хотя [secondary_actor.GetFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale, 'получила', 'получил' )] разрешение вступить в брак только по собственному желанию, у [Select_CString(secondary_actor.IsFemale, 'нее', 'него' )] уже есть мысли на этот счет.\n\n[secondary_actor.GetSheHe|U] сегодня [Select_CString(secondary_actor.IsFemale, 'подошла', 'подошёл' )] ко мне с "
 lmf_heir.1516.desc.one: "именем [Select_CString(secondary_actor.IsFemale, 'одного юноши, с которым', 'одной девицы, с которой' )] [Select_CString(secondary_actor.IsFemale, 'она хотела', 'он хотел' )] бы "
 lmf_heir.1516.desc.two: "именами двух [Select_CString(secondary_actor.IsFemale, 'юношей', 'девиц' )], с которыми [Select_CString(secondary_actor.IsFemale, 'она хотела', 'он хотел' )] бы "
 lmf_heir.1516.desc.three: "списком нескольких [Select_CString(secondary_actor.IsFemale, 'юношей', 'девиц' )], с которыми [Select_CString(secondary_actor.IsFemale, 'она хотела', 'он хотел' )] бы "
 lmf_heir.1516.desc.matrilineal: "вступить в матрилинейный брак.\n\n"
 lmf_heir.1516.desc.normal: "встретиться.\n\n"
 lmf_heir.1516.desc.end: "Если я соглашусь, нужно будет пригласить [suitor_1.GetHerHis] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] для представления. Надеюсь, [Select_CString(secondary_actor.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('secondary_actor'))] [Select_CString(secondary_actor.IsFemale, 'серьёзна', 'серьёзен')] и не тратит моё время. Если придется нарушить [Select_CString(secondary_actor.IsFemale, 'её', 'его' )] желания ради брака, я сделаю это."
 lmf_heir.1516.a: "[suitor_1.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]."
 lmf_heir.1516.b: "[suitor_2.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]."
 lmf_heir.1516.c: "[suitor_3.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]."
 lmf_heir.1516.d: "Чепуха, я подберу кого получше."

 lmf_heir.1517.t: "Время для свадьбы"
 lmf_heir.1517.t.directed: "Конец поисков"
 lmf_heir.1517.desc: "[focus_child.GetFirstNameNoTooltip] [Select_CString(focus_child.IsFemale, 'пришла', 'пришёл' )] ко мне сегодня утром с довольно смущённым видом.\n\n«Я знаю, что [Select_CString(focus_child.IsFemale, 'говорила', 'говорил' )], что хочу вступить в брак по своему желанию, [focus_child.Custom2('spoken_address_by_familiarity', ROOT.Char )], но правда в том, что я не [Select_CString(focus_child.IsFemale, 'встретила', 'встретил' )] ни [Select_CString(focus_child.IsFemale, 'одного мужчину, достойного', 'одной женщины, достойной' )] брака».\n\n«Означает ли это то, о чём я думаю?» — [Select_CString(ROOT.Char.IsFemale, 'спросила', 'спросил' )] я, улыбаясь.\n\n[focus_child.GetSheHe|U] [Select_CString(focus_child.IsFemale, 'кивнула и вздохнула', 'кивнул и вздохнул' )]. «Да, думаю, время пришло. Если бы вы смогли найти мне подходящую партию, я [Select_CString(focus_child.IsFemale, 'была бы благодарна', 'был бы благодарен' )]»."
 lmf_heir.1517.desc.directed: "[focus_child.GetFirstNameNoTooltip] [Select_CString(focus_child.IsFemale, 'пришла', 'пришёл' )] ко мне сегодня утром с довольно смущённым видом.\n\n«Я знаю, вы велели мне [Select_CString(focus_child.IsFemale, 'самой', 'самому' )] найти [Select_CString(focus_child.IsFemale, 'мужа', 'жену' )], [focus_child.Custom2('spoken_address_by_familiarity', ROOT.Char )], но правда в том, что я не [Select_CString(focus_child.IsFemale, 'нашла мужчину, достойного', 'нашёл женщины, достойной' )] брака».\n\n«Означает ли это, что ты [Select_CString(focus_child.IsFemale, 'намерена', 'намерен' )] отказаться от поисков?» — [Select_CString(ROOT.Char.IsFemale, 'спросила', 'спросил' )] я.\n\n[focus_child.GetSheHe|U] [Select_CString(focus_child.IsFemale, 'кивнула и вздохнула', 'кивнул и вздохнул' )]. «Я ценю ваше предложение, [focus_child.Custom2('spoken_address_by_familiarity', ROOT.Char )], но, похоже, мне нужна ваша помощь, если вы всё ещё хотите, чтобы я достойно [Select_CString(focus_child.IsFemale, 'вступила', 'вступил' )] в брак»."
 lmf_heir.1517.a: "Наконец-то!"
 lmf_heir.1517.b: "Да будет так."

 lmf_heir.1518.t: "Время возвращаться?"
 lmf_heir.1518.desc: "Сегодня [Select_CString(focus_child.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))] [Select_CString(focus_child.IsFemale, 'прислала', 'прислал' )] мне весточку.\n\nВидимо, [focus_child.GetFirstNameNoTooltip] считает, что пора покончить со странствиями, даже если придется остепениться и принять [Select_CString(focus_child.IsFemale, 'любого мужа, которого', 'любую жену, которую' )] я выберу. Разумеется, если я разрешу [Select_CString(focus_child.IsFemale, 'ей', 'ему' )] вернуться во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\n[focus_child.GetFirstNameNoTooltip], кажется, [Select_CString(focus_child.IsFemale, 'отказалась', 'отказался' )] от бунтарства."
 lmf_heir.1518.a: "Пусть [Select_CString(focus_child.IsFemale, 'она', 'он' )] возвращается."
 lmf_heir.1518.b: "Нет, пусть остаётся где есть."

 lmf_heir.1519.t: "[Select_CString(heir.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))|U] [Select_CString(heir.IsFemale, 'влюблена', 'влюблён' )]"
 lmf_heir.1519.desc.start.secret: "К сожалению, кажется, я уже знаю, почему [heir.GetFirstNameNoTooltip] так не хочет вступать в брак: [Select_CString(ROOT.Char.IsFemale, 'эта', 'этот' )] [heir.Custom('GirlBoy')] [Select_CString(ROOT.Char.IsFemale, 'влюблена', 'влюблён' )].\n\nК несчастью, "
 lmf_heir.1519.desc.start: "Кажется, я [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашёл' )] причину, почему [heir.GetFirstNameNoTooltip] не хочет вступать в брак: [Select_CString(heir.IsFemale, 'девушка влюблена', 'юноша влюблён' )].\n\nК несчастью, "
 lmf_heir.1519.desc.samesex: "объект [heir.GetHerHis] любви - [heir_lover.GetWomanMan]. Довольно неловкая ситуация.\n\n"
 lmf_heir.1519.desc.order: "объект [heir.GetHerHis] любви [Select_CString(heir_lover.IsFemale, 'дала', 'дал' )] обет духовному ордену. [Select_CString(heir_lover.IsFemale, 'Она', 'Он' )] |U] не может вступать в брак, пока хранит верность обетам.\n\n"
 lmf_heir.1519.desc.married: "объект [heir.GetHerHis] любви уже состоит в браке. Старая как мир история.\n\n"
 lmf_heir.1519.desc.betrothed: "объект [heir.GetHerHis] любви уже [Select_CString(heir_lover.IsFemale, 'связана', 'связан' )] помолвкой. Они не могут заключить брак, пока действует помолвка.\n\n"
 lmf_heir.1519.desc.permission.lover.man: "мой предыдущий отказ разрешить брак привел к тому, что [Select_CString(heir.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] не получает предложений о браке - никто не решается просить [heir.GetHerHis] руки.\n\n"
 lmf_heir.1519.desc.permission.lover.woman: "мой предыдущий отказ разрешить брак привел к тому, что [Select_CString(heir.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] считает, что отказ распространяется и на н[heir.GetHerHis].\n\n"
 lmf_heir.1519.desc.permission.both: "мой предыдущий отказ привёл к тому, что они продолжают встречаться тайно. Довольно неловкая ситуация.\n\n"
 lmf_heir.1519.desc.permission.heir.man: "[Select_CString(heir.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] не решается просить разрешения [Select_CString(heir.IsFemale, 'выйти замуж за', 'жениться на' )] [Select_CString(heir_lover.IsFemale, 'ней', 'него' )] после моего отказа.\n\n"
 lmf_heir.1519.desc.permission.heir.woman: "мужчина не решается просить, чтобы [Select_CString(heir.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] вышла за него после отказа.\n\n"
 lmf_heir.1519.desc.generic: "Они не могут пожениться. Поэтому они встречаются тайно, а [Select_CString(heir.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] слишком [Select_CString(heir.IsFemale, 'увлечена', 'увлечён' )], чтобы помнить о долге.\n\n"
 lmf_heir.1519.desc.end.canact: "Пожалуй, стоит сказать [Select_CString(heir.IsFemale, 'ей', 'ему' )], что я знаю, и разрешить брак. Или приказать покончить с этим. В любом случае нужно действовать."
 lmf_heir.1519.desc.end: "Я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы вмешаться в [heir.GetHerHis] дела, хотя сомневаюсь, что [Select_CString(heir.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] будет [Select_CString(heir.IsFemale, 'благодарна', 'благодарен' )] за это."
 lmf_heir.1519.a: "[heir.GetFirstNameNoTooltip] [Select_CString(heir.IsFemale, 'должна', 'должен')] покончить с этим. Это ни к чему не приведёт."
 lmf_heir.1519.b: "Я скажу, что [Select_CString(ROOT.Char.IsFemale, 'передумала', 'передумал' )]."
 lmf_heir.1519.c: "[heir_lover.GetFirstNameNoTooltip] [Select_CString(heir_lover.IsFemale, 'должна', 'должен' )] нарушить обеты, и [Select_CString(heir_lover.IsFemale, 'она', 'он' )] и [Select_CString(heir.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] вступят в брак."
 lmf_heir.1519.d: "[heir_lover.GetFirstNameNoTooltip] [Select_CString(heir_lover.IsFemale, 'должна', 'должен' )] расторгнуть помолвку, и [Select_CString(heir_lover.IsFemale, 'она', 'он' )] и [Select_CString(heir.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] вступят в брак."
 lmf_heir.1519.e: "Нет, пусть [heir.GetFirstNameNoTooltip] развлекается, пока может."

 lmf_heir.1530.heir_training.tt: "[trainee_heir.GetFirstNameNoTooltip]: Подготовка к правлению"
 lmf_heir.1530.heir_begin_training.tt: "[trainee_heir.GetFirstNameNoTooltip] начинает обучение [Select_CString(trainee_heir.IsFemale, 'наследницы', 'наследника' )]"

 lmf_heir.1601.t: "День при дворе"
 lmf_heir.1601.desc: "Сегодня двор владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] был спокоен... или так казалось.\n\nКогда зал опустел, [your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'подошла', 'подошёл' )] ко мне с вопросами. Оказывается, [Select_CString(your_heir.IsFemale, 'она наблюдала', 'он наблюдал' )] за всем днём, и некоторые мои решения остались [Select_CString(your_heir.IsFemale, 'ей', 'ему' )] непонятны.\n\nКаждый ответ порождал новые вопросы, и через час стало ясно, что [your_heir.GetFirstNameNoTooltip] не [Select_CString(your_heir.IsFemale, 'приблизилась', 'приблизился' )] к пониманию правления.\n\n«Откуда такой интерес, [your_heir.Custom('GetLassLad')]?», — [Select_CString(ROOT.Char.IsFemale, 'спросила', 'спросил' )] я в недоумении."
 lmf_heir.1601.a: "Попытаться объяснить, сколько бы времени это ни заняло."
 lmf_heir.1601.b: "Пусть кто-то другой ответит на вопросы."
 lmf_heir.1601.a.success.tt: "[your_heir.GetFirstNameNoTooltip] всё понимает"
 lmf_heir.1601.a.success.effect.tt: "Обучение персонажа [your_heir.GetFirstNameNoTooltip] значительно продвинулось"
 lmf_heir.1601.a.failure.tt: "[your_heir.GetFirstNameNoTooltip] ничего не понимает"
 lmf_heir.1601.a.failure.effect.tt: "Обучение персонажа [your_heir.GetFirstNameNoTooltip] не продвинулось"
 lmf_heir.1601.a.critfail.tt: "[your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'поняла', 'понял' )] всё неправильно"
 lmf_heir.1601.a.critfail.effect.tt: "Обучение персонажа [your_heir.GetFirstNameNoTooltip] значительно откатилось"

 lmf_heir.1602.t: "Ярость в саду"
 lmf_heir.1602.desc: "Тихий день во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] прервался, когда стражник доложил о том, что [your_heir.GetFirstNameNoTooltip] и [angry_family.GetFirstNameNoTooltip] подрались в саду.\n\n«Драка?!», — [Select_CString(ROOT.Char.IsFemale, 'воскликнула', 'воскликнул' )] я. «Между ними? Не может быть!»\n\nОднако так и было. [angry_family.GetFirstNameNoTooltip] [Select_CString(angry_family.IsFemale, 'начала', 'начал' )] ссору из-за того, что [Select_CString(angry_family.IsFemale, 'посчитала', 'посчитал' )], что [your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'оскорбила', 'оскорбил' )] [Select_CString(angry_family.IsFemale, 'её', 'его' )]... хотя, полагаю, причина в ревности к положению [Select_CString(your_heir.IsFemale, 'наследницы', 'наследника' )].\n\nХотя оба пробормотали извинения, подозреваю, эта вражда продолжится."
 lmf_heir.1602.a: "Почему дети не могут ладить?"
 fought_over_heir_status: "[CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'начали', Select_CString(CHARACTER.IsFemale, 'начала', 'начал' ))] драку с [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажем ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'им персонажем', '' )] из-за зависти к [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вашему', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))] статусу [Select_CString(TARGET_CHARACTER.IsFemale, 'наследницы', 'наследника' )]."
 fought_over_heir_status_corresponding: "[TARGET_CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'начали', Select_CString(TARGET_CHARACTER.IsFemale, 'начала', 'начал' ))] драку с [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажем ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'им персонажем', '' )] из-за зависти к [Select_CString( CHARACTER.IsLocalPlayer, 'вашему', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] статусу [Select_CString(CHARACTER.IsFemale, 'наследницы', 'наследника' )]."

 lmf_heir.1603.t: "Столько вопросов"
 lmf_heir.1603.desc: "[Select_CString(your_heir.IsFemale, 'Юная', 'Юный' )] [your_heir.GetFirstNameNoTooltip] воспитывается как [Select_CString(your_heir.IsFemale, 'будущая правительница', 'будущий правитель' )] державы [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] - это порой бывает сложно. Сегодня такой день.\n\n[your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'начала', 'начал' )] с рассвета, задавая вопросы о вчерашнем уроке. [Select_CString(your_heir.IsFemale, 'Она', 'Он' )] |U] хочет понять правление. «Рано [Select_CString(your_heir.IsFemale, 'начала', 'начал' )], [your_heir.Custom('GetLassLad')], не так ли?», — [Select_CString(ROOT.Char.IsFemale, 'усмехнулась', 'усмехнулся' )] я. Но это лишь раззадорило [Select_CString(your_heir.IsFemale, 'её', 'его' )].\n\nВесь день [your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'ходила', 'ходил' )] за мной по пятам — от тронного зала до конюшен... даже до отхожего места! Пришлось приказать, чтобы [your_heir.Custom('GirlBoy')] [Select_CString(your_heir.IsFemale, 'осталась', 'остался' )] снаружи!\n\n«Я просто хочу понять, [your_heir.Custom2('LMF_RelationToMeShort', ROOT.Char )|U]!» — [Select_CString(your_heir.IsFemale, 'кричала она', 'кричал он' )] за дверью, пока я [Select_CString(ROOT.Char.IsFemale, 'сидела', 'сидел' )] внутри, потирая виски."
 lmf_heir.1603.a: "Детям следует быть видными, но не слышными."

 lmf_heir.1604.t: "Почему мы воюем?"
 lmf_heir.1604.desc: "[Select_CString(your_heir.IsFemale, 'Моя юная наследница сопровождала', 'Мой юный наследник сопровождал' )] меня на смотр гарнизона во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], но большинство вопросов были о войне.\n\n«Почему [war_target.GetPrimaryTitle.GetNameNoTierNoTooltip] нас ненавидит?»\n«Какую судьбу встретит [war_target.GetTitledFirstNameNoTooltip] после победы?»\n«Мы ведь победим?»\n«Что если [war_target.GetHerHis] войска придут сюда?»\n\nХорошие вопросы для [Select_CString(your_heir.IsFemale, 'будущей правительницы', 'будущего правителя' )], но я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] здесь для смотра гарнизона."
 lmf_heir.1604.a: "Терпеливо объяснять."
 lmf_heir.1604.b: "[ROOT.Char.GetCouncillorPosition('councillor_marshal').GetPositionName], займитесь [Select_CString(your_heir.IsFemale, 'ей', 'им' )]."

 lmf_heir.1605.t: "[Select_CString(your_councillor.IsFemale, 'Разгневанная', 'Разгневанный' )] [your_councillor.GetCouncilTitle|U]"
 lmf_heir.1605.desc.start: "Поздним вечером в тронный зал в ярости [Select_CString(your_councillor.IsFemale, 'ворвалась мой советница', 'ворвался мой советник' )].\n\n«[Select_CString(your_heir.IsFemale, 'Ваша', 'Ваш' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_heir'))] [Select_CString(your_heir.IsFemale, 'осмелилась', 'осмелился' )] отдавать мне приказы!», — кричит [your_councillor.GetTitledFirstNameNoTooltip]. «Словно я слуга, а не [Select_CString(your_councillor.IsFemale, 'ваша', 'ваш' )] [your_councillor.GetCouncilTitle|l]!»\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'попыталась', 'попытался' )] успокоить [Select_CString(your_councillor.IsFemale, 'её', 'его' )]: «Помните, [your_heir.GetTitledFirstNameNoTooltip] учится правлению, и [Select_CString(your_heir.IsFemale, 'она', 'он' )] "
 lmf_heir.1605.desc.same: "[Select_CString(your_heir.IsFemale, 'ваша будущая', 'ваш будуший' )] [ROOT.Char.GetTitleAsNameNoTooltip|l] после меня».\n\n«[Select_CString(your_heir.IsFemale, 'Она', 'Он' )] #EMP ещё#! не [ROOT.Char.GetTitleAsNameNoTooltip|l]!»"
 lmf_heir.1605.desc.opposite: "[Select_CString(your_heir.IsFemale, 'ваша будущая', 'ваш будуший' )] [ROOT.Char.GetPrimarySpouse.GetTitleAsNameNoTooltip|l] после меня».\n\n«[your_heir.GetSheHe|U] #EMP ещё#! не [ROOT.Char.GetPrimarySpouse.GetTitleAsNameNoTooltip|l]!»"
 lmf_heir.1605.desc.default: "станет вашим сюзереном после меня».\n\n«[Select_CString(your_heir.IsFemale, 'Она', 'Он' )] #EMP ещё#! не правит державой [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]!»"
 lmf_heir.1605.a: "[your_heir.GetFirstNameNoTooltip] нуждается в большей тактичности."
 lmf_heir.1605.b: "[your_councillor.GetTitledFirstNameNoTooltip], помогите мне в [your_heir.GetHerHis] обучении."
 lmf_heir.1605.b.success.tt: "[Select_CString(your_councillor.IsFemale, 'Она согласилась', 'Он согласился' )] помочь персонажу [your_heir.GetFirstNameNoTooltip]"
 lmf_heir.1605.b.failure.tt: "[Select_CString(your_councillor.IsFemale, 'Она отказалась', 'Он отказался' )] помочь персонажу [your_heir.GetFirstNameNoTooltip]"
 lmf_heir.1605.b.critfail.tt: "[Select_CString(your_councillor.IsFemale, 'Она оскорблена', 'Он оскорблён' )] вашей просьбой"
 convinced_to_help_heir: "[CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'начали', Select_CString(CHARACTER.IsFemale, 'начала', 'начал' ))] помогать в обучении [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] как [Select_CString(TARGET_CHARACTER.IsFemale, 'наследницы', 'наследника' )]."
 convinced_to_help_heir_corresponding: "[TARGET_CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'начали', Select_CString(TARGET_CHARACTER.IsFemale, 'начала', 'начал' ))] помогать в обучении [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] как [Select_CString(CHARACTER.IsFemale, 'наследницы', 'наследника' )]."
 not_convinced_to_help_heir: "[CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'разгневаны', Select_CString(CHARACTER.IsFemale, 'разгневана', 'разгневан' ))] вмешательством [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] в дела совета."
 not_convinced_to_help_heir_corresponding: "[TARGET_CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'разгневаны', Select_CString(TARGET_CHARACTER.IsFemale, 'разгневана', 'разгневан' ))] вмешательством [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] в дела совета."
 lmf_heir.1605.c: "Пусть разбираются сами."
 lmf_heir.1605.c.success.tt: "Они пришли к согласию"
 lmf_heir.1605.c.failure.tt: "Вражда между ними усилилась"

 lmf_heir.1606.t: "Постоянное неуважение"
 lmf_heir.1606.desc: "«[Select_CString(your_courtier.IsFemale, 'Она', 'Он' )] не слушает меня!», — в ярости кричит [your_heir.GetFirstNameNoTooltip], врываясь в кабинет.\n\nУспокоив [Select_CString(your_heir.IsFemale, 'её', 'его' )], я [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал' )], что виной всему [Select_CString(your_courtier.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_courtier'))], [your_courtier.GetTitledFirstNameNoTooltip]. [Select_CString(your_courtier.IsFemale, 'Эта', 'Этот' )] [your_courtier.Custom('WomanManGirlBoy')] постоянно игнорирует приказы, которые отдаёт [your_heir.GetFirstNameNoTooltip], и грубит.\n\n«И ты сразу [Select_CString(your_heir.IsFemale, 'прибежала', 'прибежал' )] ко мне?», — [Select_CString(ROOT.Char.IsFemale, 'улыбнулась', 'улыбнулся' )] я.\n\n[your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'развела', 'развёл' )] руками: «Я не знаю, что делать!»"
 lmf_heir.1606.a: "[Select_CString(your_heir.IsFemale, 'Она должна', 'Он должен' )] научиться прощать."
 lmf_heir.1606.b: "[Select_CString(your_heir.IsFemale, 'Она должна', 'Он должен' )] постоять за себя."
 lmf_heir.1606.c: "Посоветовать [Select_CString(your_heir.IsFemale, 'ей', 'ему' )] преподать [Select_CString(your_courtier.IsFemale, 'женщине', 'мужчине' )] урок, который [Select_CString(your_courtier.IsFemale, 'она', 'он' )] не забудет."
 will_not_listen_to_heir: "[CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'раздражены', Select_CString(CHARACTER.IsFemale, 'раздражена', 'раздражён' ))] постоянным неуважением со стороны [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] при дворе."
 will_not_listen_to_heir_corresponding: "[TARGET_CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'раздражены', Select_CString(TARGET_CHARACTER.IsFemale, 'раздражена', 'раздражён' ))] постоянным неуважением со стороны [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] при дворе."
 lmf_heir.1606.d: "[your_heir.GetFirstNameNoTooltip], тебе нужно научиться лучше справляться с такими ситуациями."
 lmf_heir.1606.e: "[your_courtier.GetTitledFirstNameNoTooltip] получит выговор. Так продолжаться не может."
 forced_to_listen_to_heir: "[CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'получили', Select_CString(CHARACTER.IsFemale, 'получила', 'получил' ))] выговор от [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] за неуважение к [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вашему', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))] наследнику."
 forced_to_listen_to_heir_corresponding: "[TARGET_CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'получили', Select_CString(TARGET_CHARACTER.IsFemale, 'получила', 'получил' ))] выговор от [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] за неуважение к [Select_CString( CHARACTER.IsLocalPlayer, 'вашему', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] наследнику."

 lmf_heir.1607.t: "Вмешательство [Select_CString(your_heir.IsFemale, 'наследницы', 'наследника' )]"
 lmf_heir.1607.desc: "[your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'должна', 'должен' )] учиться правлению, ведь однажды держава [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] перейдёт [Select_CString(your_heir.IsFemale, 'ей', 'ему' )], но в последнее время [your_heir.Custom('GetLassLad')] [Select_CString(your_heir.IsFemale, 'зашла', 'зашёл' )] слишком далеко.\n\nДважды я [Select_CString(ROOT.Char.IsFemale, 'отдавала', 'отдавал' )] приказы придворным, а потом [Select_CString(ROOT.Char.IsFemale, 'узнавала', 'узнавал' )], что [Select_CString(your_heir.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_heir'))] их [Select_CString(your_heir.IsFemale, 'отменила', 'отменил' )]. Моё решение о нарушителе было тайно отменено. Даже хуже: иногда подчинённые смотрят на [Select_CString(your_heir.IsFemale, 'неё', 'него' )] в поисках подтверждения!\n\nМожет, это и к лучшему... но разве я всё ещё не [ROOT.Char.GetTitleAsNameNoTooltip|l]?"
 lmf_heir.1607.a: "Пусть продолжает. [Select_CString(your_heir.IsFemale, 'Она должна', 'Он должен' )] быть [Select_CString(your_heir.IsFemale, 'готова', 'готов' )]."
 lmf_heir.1607.b: "[your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'должна', 'должен' )] научиться уважению!"

 lmf_heir.1608.t: "Гнев в казармах"
 lmf_heir.1608.desc: "Наблюдая за тем, как тренируется [Select_CString(your_heir.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_heir'))] в казармах, я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что другие [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] проявляют неуважение.\n\n[your_courtier.GetTitledFirstNameNoTooltip] [Select_CString(your_courtier.IsFemale, 'игнорировала', 'игнорировал' )] мнение, которое высказывает [your_heir.GetFirstNameNoTooltip] и даже [Select_CString(your_courtier.IsFemale, 'отмахнулась', 'отмахнулся' )] от [Select_CString(your_heir.IsFemale, 'девушки', 'парнишки' )].\n\nПозже [your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'подтвердила', 'подтвердил' )]: «[Select_CString(your_courtier.IsFemale, 'Она', 'Он' )] знает больше меня, но однажды я стану [Select_CString(your_courtier.IsFemale, 'её', 'его' )] сюзереном! Мне нужно [Select_CString(your_courtier.IsFemale, 'её', 'его' )] уважение!»"
 lmf_heir.1608.a: "[your_heir.GetFirstNameNoTooltip], я помогу улучшить твои боевые навыки."
 lmf_heir.1608.b: "[your_courtier.GetTitledFirstNameNoTooltip] получит выговор [Select_CString(your_courtier.IsFemale, 'Она', 'Он' )] [Select_CString(your_courtier.IsFemale, 'должна', 'должен' )] знать своё место."
 lmf_heir.1608.c: "Пусть разбираются сами."
 does_not_respect_heir: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'разгневаны', Select_CString(TARGET_CHARACTER.IsFemale, 'разгневана', 'разгневан' ))] явным неуважением со стороны [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] в казармах."
 does_not_respect_heir_corresponding: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'разгневаны', Select_CString(CHARACTER.IsFemale, 'разгневана', 'разгневан' ))] явным неуважением со стороны [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] в казармах."

 lmf_heir.1609.t: "Травма [Select_CString(your_heir.IsFemale, 'наследницы', 'наследника' )]"
 lmf_heir.1609.desc: "Еще не конец дня, когда тревожные вести достигают [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')]: [your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'получила', 'получил' )] серьезную травму!\n\nЯ мчусь в казармы, страшась худшего и проклиная свою глупость за то, что [Select_CString(ROOT.Char.IsFemale, 'позволила', 'позволил' )] [Select_CString(your_heir.IsFemale, 'ей', 'ему' )] занять место среди других капитанов.\n\nК моему огромному облегчению, [your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'жива', 'жив' )]. Однако [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'получила', 'получил' )] ужасные увечья в результате, как мне сказали, нелепого несчастного случая на тренировке.\n\n[GetCourtPositionType('court_physician_court_position').GetNameNoTooltip()] прибыл по моему приказу — что бы ни случилось, действовать нужно быстро!"
 lmf_heir.1609.a: "Я могу лишь молиться, что всё не так плохо, как кажется."
 lmf_heir.1609.a.injured.tt: "[your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'травмирована', 'травмирован' )]!"

 lmf_heir.1610.t: "[Select_CString(your_heir.IsFemale, 'Наследница', 'Наследник' )] наготове"
 lmf_heir.1610.desc: "С возрастом бесконечные повседневные заботы, связанные с правлением державой [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], становятся всё более утомительными.\n\nМои советники говорят, что нет ничего зазорного в том, чтобы обратиться за помощью к [Select_CString(your_heir.IsFemale, 'моей наследнице', 'моему наследнику' )]. [your_heir.GetFirstNameNoTooltip] ведь проживает здесь, в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], не имея собственного титула. [your_heir.GetSheHe|U] [Select_CString(your_heir.IsFemale, 'могла', 'мог' )] бы время от времени замещать меня, верша правосудие в большом зале, или даже представлять меня на встречах с делегациями со всей державы.\n\nПризнаю, возможность больше отдыхать была бы облегчением... но [Select_CString(your_heir.IsFemale, 'готова', 'готов' )] ли [your_heir.GetFirstNameNoTooltip] к такой ответственности?"
 lmf_heir.1610.a: "[Select_CString(your_heir.IsFemale, 'Готова', 'Готов' )] [your_heir.GetFirstNameNoTooltip] или нет, мне нужна [your_heir.GetHerHis] помощь."
 lmf_heir.1610.b: "Нет, я справлюсь [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )]."
 lmf_heir.1610.a.success.tt: "[your_heir.GetFirstNameNoTooltip] хорошо [Select_CString(your_heir.IsFemale, 'справилась', 'справился' )] со своими обязанностями"
 lmf_heir.1610.a.failure.tt: "[your_heir.GetFirstNameNoTooltip] не [Select_CString(your_heir.IsFemale, 'справилась', 'справился' )]"
 lmf_heir.1610.a.critfail.tt: "Все закончилось катастрофой"

 lmf_heir.1611.t: "Новый проект?"
 lmf_heir.1611.desc: "Мои советники принесли вести о возможном проекте развития здесь, во владении [project_county.GetNameNoTierNoTooltip]. К сожалению, он слишком амбициозен, чтобы доверить его надзирателям, но и слишком мал, чтобы оправдать мое личное наблюдение или наблюдение моих советников.\n\nОднако возникла идея, что [your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'могла', 'мог' )] бы идеально подойти для руководства им. Это даст [your_heir.GetHerHim] шанс пообщаться с местными жителями за пределами [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], а также бесценный опыт.\n\nНо меня беспокоит... не слишком ли это большая ответственность для [your_heir.GetHerHis] плеч? Что, если [your_heir.GetSheHe] провалит задание?"
 lmf_heir.1611.a: "[your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'должна', 'должен' )] начать немедленно."
 lmf_heir.1611.a.success.tt: "Проект развития увенчался огромным успехом"
 lmf_heir.1611.a.failure.tt: "Проект развития провалился"
 lmf_heir.1611.a.critfail.tt: "Проект развития обернулся катастрофой"
 lmf_heir.1611.b: "Нет, риск не оправдан."

 lmf_heir_trait_lustful: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'похотливой она стала. Преисполненная', 'похотливым он стал. Преисполненный' )] желаний, и всё же [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] никогда не [Select_CString(ROOT.GetCharacter.IsFemale, 'удовлетворена', 'удовлетворён' )]."
 lmf_heir_trait_chaste: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'целомудренной она стала', 'целомудренным он стал')]. [Select_CString(ROOT.GetCharacter.IsFemale, 'Она', 'Он' )] вздрагивает от малейшего прикосновения, и любой разговор о сексе заставляет [Select_CString(ROOT.GetCharacter.IsFemale, 'её', 'его' )] краснеть."
 lmf_heir_trait_gluttonous: "[Select_CString(ROOT.GetCharacter.IsFemale, 'какой', 'каким' )] обжорой [Select_CString(ROOT.GetCharacter.IsFemale, 'она стала', 'он стал' )]. Всё, чего [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] хочет, это есть, есть, есть!"
 lmf_heir_trait_temperate: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'она умеренна', 'он умеренен' )]. Так [Select_CString(ROOT.GetCharacter.IsFemale, 'рассудительна', 'рассудителен' )], так [Select_CString(ROOT.GetCharacter.IsFemale, 'осторожна', 'осторожен' )], никогда не позволяет себе излишеств, даже ради маленькой радости."
 lmf_heir_trait_greedy: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'жадной она стала', 'жадным он стал' )]. Всё, о чём [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] беспокоится, это богатство и [Select_CString(ROOT.GetCharacter.IsFemale, 'её', 'его' )] собственность."
 lmf_heir_trait_generous: "насколько чрезмерно [Select_CString(ROOT.GetCharacter.IsFemale, 'щедрой она стала', 'щедрым он стал' )]. Бережливость не в почёте, и я подозреваю, что [Select_CString(ROOT.GetCharacter.IsFemale, 'она отдала', 'он отдал' )] бы последнюю монету без раздумий."
 lmf_heir_trait_lazy: "насколько невероятно [Select_CString(ROOT.GetCharacter.IsFemale, 'ленивой она стала', 'ленивым он стал' )]. Любое дело требует слишком много усилий. Если представится более лёгкий путь, [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] выберет именно его."
 lmf_heir_trait_diligent: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'она усердна и преданна', 'он усерден и предан' )]. Всё, о чём [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] думает, это долг и работа, и ни единой мысли об отдыхе."
 lmf_heir_trait_wrathful: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] всегда [Select_CString(ROOT.GetCharacter.IsFemale, 'зла', 'зол' )]. [Select_CString(ROOT.GetCharacter.IsFemale, 'Её', 'Его')] ярость постоянно готова вырваться наружу и подавить [Select_CString(ROOT.GetCharacter.IsFemale, 'её', 'его' )] лучшие суждения."
 lmf_heir_trait_calm: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] абсолютно [Select_CString(ROOT.GetCharacter.IsFemale, 'спокойна', 'спокоен' )]. [Select_CString(ROOT.GetCharacter.IsFemale, 'Её', 'Его' )] ничто не тревожит. [Select_CString(ROOT.GetCharacter.IsFemale, 'Её', 'Его' )] ничто и никогда не волнует."
 lmf_heir_trait_patient: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'терпеливой она стала', 'терпеливым он стал' )]. Думаю, [Select_CString(ROOT.GetCharacter.IsFemale, 'Она', 'Он' )] будет ждать до конца света, и останется полностью [Select_CString(ROOT.GetCharacter.IsFemale, 'довольна', 'доволен' )]."
 lmf_heir_trait_impatient: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'нетерпеливой она стала', 'нетерпеливым он стал' )]. Всё происходит недостаточно быстро. Даже когда это происходит, [Select_CString(ROOT.GetCharacter.IsFemale, 'ей', 'ему' )] кажется, что должно было произойти раньше."
 lmf_heir_trait_arrogant: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'высокомерной она стала', 'высокомерным он стал' )]. [Select_CString(ROOT.GetCharacter.IsFemale, 'Она', 'Он' )] смотрит свысока на всех вокруг [Select_CString(ROOT.GetCharacter.IsFemale, 'нее', 'него' )], даже на меня."
 lmf_heir_trait_humble: "насколько невероятно [Select_CString(ROOT.GetCharacter.IsFemale, 'скромной она стала', 'скромным он стал' )]. Почему [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] так [Select_CString(ROOT.GetCharacter.IsFemale, 'скромна', 'скромен' )]? Где [Select_CString(ROOT.GetCharacter.IsFemale, 'её', 'его' )] гордость?"
 lmf_heir_trait_deceitful: "[Select_CString(ROOT.GetCharacter.IsFemale, 'какой лгуньей она стала', 'каким лжецом он стал' )]. В наши дни трудно поверить хоть одному слову, слетающему с [Select_CString(ROOT.GetCharacter.IsFemale, 'её', 'его' )] губ!"
 lmf_heir_trait_honest: "[Select_CString(ROOT.GetCharacter.IsFemale, 'какой честной она стала', 'каким честным он стал' )]. Подозреваю, [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] не [Select_CString(ROOT.GetCharacter.IsFemale, 'смогла', 'смог' )] бы солгать, даже если бы от этого зависела судьба державы!"
 lmf_heir_trait_craven: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'трусливой она стала', 'трусливым он стал' )]. [Select_CString(ROOT.GetCharacter.IsFemale, 'Она', 'Он' )] совершенно [Select_CString(ROOT.GetCharacter.IsFemale, 'бесхребетна', 'бесхребетен' )] и заботится только о своей шкуре."
 lmf_heir_trait_brave: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'она безрассудна', 'он безрассуден' )]. [Select_CString(ROOT.GetCharacter.IsFemale, 'Храбра', 'Храбр' )], этого не отнять, но и [Select_CString(ROOT.GetCharacter.IsFemale, 'безрассудна', 'безрассуден' )]. [Select_CString(ROOT.GetCharacter.IsFemale, 'Она готова', 'Он готов' )] променять жизнь на крупицу славы."
 lmf_heir_trait_shy: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'застенчивой она стала', 'застенчивым он стал' )]. [Select_CString(ROOT.GetCharacter.IsFemale, 'Она', 'Он' )] избегает светских мероприятий, и видно, что общение причиняет [Select_CString(ROOT.GetCharacter.IsFemale, 'ей', 'ему' )] страдания."
 lmf_heir_trait_gregarious: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'общительной она стала', 'общительным он стал' )]. Жизнь - это вечный праздник, а будущее значит куда меньше, чем постоянное веселье."
 lmf_heir_trait_ambitious: "насколько невероятно [Select_CString(ROOT.GetCharacter.IsFemale, 'она амбициозна', 'он амбициозен')]. Блеск в [Select_CString(ROOT.GetCharacter.IsFemale, 'её', 'его')] глазах пугает, и я гадаю, где предел [Select_CString(ROOT.GetCharacter.IsFemale, 'её', 'его')] амбиций."
 lmf_heir_trait_content: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он')] ужасно [Select_CString(ROOT.GetCharacter.IsFemale, 'довольна', 'доволен' )] жизнью. [Select_CString(ROOT.GetCharacter.IsFemale, 'Довольна', 'Доволен' )] своей жизнью, своим положением. У [Select_CString(ROOT.GetCharacter.IsFemale, 'неё', 'него' )] нет амбиций."
 lmf_heir_trait_arbitrary: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'непредсказуемой она стала', 'непредсказуемым он стал' )]. Мысль едва мелькнет в [Select_CString(ROOT.GetCharacter.IsFemale, 'её', 'его')] переменчивом уме, как уже сменяется другой."
 lmf_heir_trait_just: "насколько ужасно [Select_CString(ROOT.GetCharacter.IsFemale, 'справедливой и законопослушной она стала. Она', 'справедливым и законопослушным он стал. Он' )] изводит себя постоянными размышлениями о правом и неправом."
 lmf_heir_trait_cynical: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'циничной и нечестивой она стала. Она', 'циничным и нечестивым он стал. Он' )] постоянно ставит под сомнение [ROOT.GetCharacter.GetFaith.GetNameNoTooltip|l]ие постулаты."
 lmf_heir_trait_zealous: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'фанатичной она стала', 'фанатичным он стал' )]. Так [Select_CString(ROOT.GetCharacter.IsFemale, 'сосредоточена', 'сосредоточен' )] на том, чтобы быть [Select_CString(ROOT.GetCharacter.IsFemale, 'благочестивой', 'благочестивым' )] [ROOT.GetCharacter.GetFaith.GetNameNoTooltip][Select_CString(ROOT.GetCharacter.IsFemale, 'ой последовательницей', 'им последователем' )], что всё остальное меркнет."
 lmf_heir_trait_paranoid: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'параноидальной она стала', 'параноидальным он стал' )]. Все и каждый хотят [Select_CString(ROOT.GetCharacter.IsFemale, 'ей', 'ему' )] навредить. [Select_CString(ROOT.GetCharacter.IsFemale, 'Она', 'Он' )] вечно настороже."
 lmf_heir_trait_trusting: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] ныне ужасно [Select_CString(ROOT.GetCharacter.IsFemale, 'доверчива', 'доверчив' )]. Никакой сдержанности, осторожности или самосохранения."
 lmf_heir_trait_compassionate: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'сострадательной она стала. Она', 'сострадательным он стал. Он' )] носит сердце на рукаве, напоказ всем."
 lmf_heir_trait_callous: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'бессердечной она стала', 'бессердечным он стал' )]. Есть ли в [Select_CString(ROOT.GetCharacter.IsFemale, 'её', 'его' )] душе хоть капля человечности? Сомнительно."
 lmf_heir_trait_sadistic: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] теперь [Select_CString(ROOT.GetCharacter.IsFemale, 'садистична. Она', 'садистичен. Он' )] с удовольствием мучает других, подозреваю, просто ради удовольствия."
 lmf_heir_trait_stubborn: "насколько невероятно [Select_CString(ROOT.GetCharacter.IsFemale, 'упрямой она стала. Её', 'упрямым он стал. Его' )] невозможно переубедить, даже здравым смыслом."
 lmf_heir_trait_fickle: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'непостоянной она стала', 'непостоянным он стал' )]. То, что было приемлемо вчера, сегодня отвратительно. Никогда не угадаешь, что [Select_CString(ROOT.GetCharacter.IsFemale, 'её', 'его' )] порадует."
 lmf_heir_trait_eccentric: "насколько [Select_CString(ROOT.GetCharacter.IsFemale, 'странной и эксцентричной она стала', 'странным и эксцентричным он стал' )]. Интересно, мыслит ли [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] здраво? [Select_CString(ROOT.Char.IsFemale, 'Уверена', 'Уверен' )], не я [Select_CString(ROOT.Char.IsFemale, 'одна', 'один' )] так думаю."
 lmf_heir_trait_vengeful: "какое ужасное чувство мести [Select_CString(ROOT.GetCharacter.IsFemale, 'она развила', 'он развил' )]. Нет обиды слишком малой, за которую [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] не [Select_CString(ROOT.GetCharacter.IsFemale, 'потребовала', 'потребовал' )] бы ужасную цену."
 lmf_heir_trait_forgiving: "насколько странно [Select_CString(ROOT.GetCharacter.IsFemale, 'снисходительной она стала. Она простила', 'снисходительным он стал. Он простил' )] бы кого угодно за любое оскорбление, думаю. Где предел?"
 lmf_heir_trait_drunkard: "насколько много [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] пьёт. Не только для веселья, как [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] утверждает, а постоянно и без меры! Кто-то смеётся, считая это безобидным, но кто по-настоящему захочет видеть пьяницу-слюнтяя [Select_CString(ROOT.GetCharacter.IsFemale, 'своей правительницей', 'своим правителем' )]?"
 lmf_heir_trait_rakish: "как [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] пристаёт почти к [Select_CString(ROOT.GetCharacter.IsFemale, 'каждому встречному молодому мужчине', 'каждой встречной молодой девушке')]. [Select_CString(ROOT.GetCharacter.IsFemale, 'Она', 'Он' )] совершенно не знает приличий, это непристойно."
 lmf_heir_trait_rakish_homosexual: "как [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] пристаёт почти к [Select_CString(ROOT.GetCharacter.IsFemale, 'каждой встречной молодой девушке', 'каждому встречному молодому мужчине' )] — будто я не замечу! Я не могу контролировать [Select_CString(ROOT.GetCharacter.IsFemale, 'её', 'его' )] желания, это так, но это? Это непристойно."
 lmf_heir_trait_rakish_bisexual: "как [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] пристаёт почти к каждой встречной хорошенькой молодой особе — парень, девушка, кажется, неважно! Я не могу контролировать [Select_CString(ROOT.GetCharacter.IsFemale, 'её', 'его' )] желания, это так, но это? Это непристойно."
 lmf_heir_trait_reclusive: "как [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] прячется от всех при первых же трудностях. [Select_CString(ROOT.GetCharacter.IsFemale, 'Она', 'Он' )] запирается в своих покоях и не выходит."
 lmf_heir_trait_irritable: "как быстро вспыхивает [Select_CString(ROOT.GetCharacter.IsFemale, 'её', 'его' )] гнев при малейшем стрессе. [Select_CString(ROOT.GetCharacter.IsFemale, 'Она', 'Он' )] заставляет слуг ходить на цыпочках вокруг себя, опасаясь, что в любой момент [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] превратится в чудовище."
 lmf_heir_trait_profligate: "насколько безрассудно [Select_CString(ROOT.GetCharacter.IsFemale, 'она стала', 'он стал' )] обращаться с деньгами. [Select_CString(ROOT.GetCharacter.IsFemale, 'Она', 'Он' )] тратит их, будто они ничего не стоят, будто их горы, и ради чего? Чтобы почувствовать себя лучше, как [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] говорит."
 lmf_heir_trait_improvident: "как быстро [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] раздаёт свои деньги. Стоит кому-то показать малейшее беспокойство, как [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] уже осыпает их золотом. Кто-то называет это щедростью, другие — безрассудством, но это? Это навязчивость."
 lmf_heir_trait_contrite: "как быстро [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] выбалтывает свои секреты любому, кто слушает. Способ облегчить душу, да, но какой толк от [Select_CString(ROOT.GetCharacter.IsFemale, 'правительницы, которая', 'правителя, который' )] не может хранить свои тайны?"
 lmf_heir_trait_inappetetic: "как мало [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] ест. При первых же трудностях [Select_CString(ROOT.GetCharacter.IsFemale, 'она', 'он' )] отодвигает свою еду, и это не просто умеренность. Боюсь, со временем это скажется на [Select_CString(ROOT.GetCharacter.IsFemale, 'её', 'его' )] здоровье."

 lmf_heir.1612.t: "[Select_CString(your_heir.IsFemale, 'Моя наследница', 'Мой наследник' )]: [heir_trait.GetNameNoTooltip( your_heir )|U]"
 lmf_heir.1612.desc.opening: "[your_heir.GetFirstNameNoTooltip] уже столько времени обучается у меня как [Select_CString(your_heir.IsFemale, 'моя наследница', 'мой наследник' )], и я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], [your_heir.Custom('heir_trait_description')]\n\nКак так вышло? "
 lmf_heir.1612.desc.opposite: "Как [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'могла', 'мог' )] стать настолько [Select_CString(your_heir.IsFemale, 'отличной', 'отличным' )] от меня?\n\n"
 lmf_heir.1612.desc.alsosinful: "Я не образец добродетели, но это? Этого я не потерплю.\n\n"
 lmf_heir.1612.desc.sinful: "Как я [Select_CString(ROOT.Char.IsFemale, 'воспитала', 'воспитал' )] [Select_CString(your_heir.IsFemale, 'наследницу, исполненную', 'наследника, исполненного' )] греха?\n\n"
 lmf_heir.1612.desc.default: "Негоже [Select_CString(your_heir.IsFemale, 'молодой женщине её', 'молодому мужчине его')] положения вести себя так.\n\n"
 lmf_heir.1612.desc.end: "Главный вопрос: что мне делать? Учитывая, что мы проводим так много времени вместе, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы попытаться заставить [Select_CString(ROOT.Char.IsFemale, 'парнишку', 'девицу' )] изменить своё поведение."
 lmf_heir.1612.a: "Это может быть тяжело для н[your_heir.GetHerHis], но я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] попытаться."
 lmf_heir.1612.a.success.tt: "[your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'согласилась', 'согласился' )] измениться"
 lmf_heir.1612.a.failure.tt: "[your_heir.GetFirstNameNoTooltip] сопротивляется попытке"
 tried_to_change_heir: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'попытались', Select_CString(TARGET_CHARACTER.IsFemale, 'попыталась', 'попытался' ))] насильно изменить личность [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )]."
 tried_to_change_heir_corresponding: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'попытались', Select_CString(CHARACTER.IsFemale, 'попыталась', 'попытался' ))] насильно изменить личность [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )]."
 lmf_heir.1612.b: "Оставить всё как есть."

 lmf_heir.1613.t: "[Select_CString(your_heir.IsFemale, 'Наследница', 'Наследник' )] поневоле"
 lmf_heir.1613.desc: "Печально видеть, но в последнее время [your_heir.GetFirstNameNoTooltip] не воспринимает свои обязанности [Select_CString(your_heir.IsFemale, 'наследницы', 'наследника' )] всерьёз.\n\n[your_heir.GetSheHe|U] [Select_CString(your_heir.IsFemale, 'должна', 'должен' )] многому научиться, принять столько ответственности, прежде чем будет [Select_CString(your_heir.IsFemale, 'готова', 'готов' )] однажды править державой [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]... но похоже, что [your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'предпочла', 'предпочёл' )] бы заниматься чем-то иным.\n\nПечальное положение дел, что и говорить."
 lmf_heir.1613.a: "Будем надеяться, [your_heir.GetSheHe] скоро изменит своё поведение."

 lmf_heir.1614.t: "Истинная преданность"
 lmf_heir.1614.desc: "Приятно видеть, как в последнее время [your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'посвятила', 'посвятил' )] себя своим обязанностям как [Select_CString(your_heir.IsFemale, 'будущая правительница', 'будущий правитель' )] державы [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\n[your_heir.GetSheHe|U] посещает заседания двора, встречается с моим советом, чтобы быть в курсе дел державы, и даже регулярно объезжает владения, чтобы узнать заботы простолюдинов.\n\nМне приходится уговаривать [your_heir.GetHerHis] отдохнуть!"
 lmf_heir.1614.a: "Похоже, [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] будет в надёжных руках."

 lmf_heir.1615.t: "Наивысшая форма лести"
 lmf_heir.1615.desc: "Учитывая, сколько времени мы проводим вместе, думаю, было неизбежно, что [your_heir.GetFirstNameNoTooltip] станет [Select_CString(your_heir.IsFemale, 'похожей', 'похожим' )] на меня.\n\nВ последнее время я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], как [your_heir.GetSheHe] пристально наблюдает за мной, пытается говорить со слугами как я, и копирует моё поведение... даже те вещи, которые я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )] не [Select_CString(ROOT.Char.IsFemale, 'замечала', 'замечал' )] или [Select_CString(ROOT.Char.IsFemale, 'предпочла', 'предпочёл')] бы, чтобы [your_heir.GetSheHe] не [Select_CString(your_heir.IsFemale, 'подражала', 'подражал' )].\n\nПолагаю, мне должно быть лестно?"
 lmf_heir.1615.a: "Возможно, [your_heir.GetSheHe] нуждается в большем времени наедине с собой?"

 lmf_heir.1625.t: "Путешествие за границу"
 lmf_heir.1625.desc.start: "[your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'пришла', 'пришёл' )] ко мне сегодня утром с интересным планом.\n\n"
 lmf_heir.1625.desc.family: "«[your_heir.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], "
 lmf_heir.1625.desc.notfamily: "«[Select_CString(ROOT.Char.IsFemale, 'Миледи', 'Милорд' )], "
 lmf_heir.1625.desc.mid: "я знаю, вы делаете всё возможное, чтобы подготовить меня как [Select_CString(your_heir.IsFemale, 'вашу наследницу', 'вашего наследника' )], но не всему можно научиться здесь, во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Я [Select_CString(your_heir.IsFemale, 'подумала', 'подумал' )], может, мне стоит погостить при дворе, которым правит [your_heir.Custom2('direct_address_by_familiarity', SCOPE.sC('your_vassal'))]?»\n\nЗаметив моё нежелание, [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'поспешила', 'поспешил' )] продолжить. «[your_vassal.GetSheHe|U] "
 lmf_heir.1625.desc.diplomacy: "отлично разбирается в дипломатии, "
 lmf_heir.1625.desc.martial: "эксперт в военных делах, "
 lmf_heir.1625.desc.stewardship: "хорошо [Select_CString(your_vassal.IsFemale, 'осведомлена', 'осведомлён' )] в управлении, "
 lmf_heir.1625.desc.intrigue: "[Select_CString(your_vassal.IsFemale, 'искусна', 'искусен' )] в интригах, "
 lmf_heir.1625.desc.learning: "[Select_CString(your_vassal.IsFemale, 'учёная', 'учёный' )] [your_vassal.GetWomanMan], "
 lmf_heir.1625.desc.bridge: "ведь [your_vassal.GetSheHe] "
 lmf_heir.1625.desc.myfriend: "также [Select_CString(your_heir.IsFemale, 'моя подруга', 'мой друг' )]. "
 lmf_heir.1625.desc.friend: "также [Select_CString(your_vassal.IsFemale, 'ваш подруга', 'ваш друг' )]. "
 lmf_heir.1625.desc.ally: "также [Select_CString(your_vassal.IsFemale, 'ваша союзница', 'ваш союзник' )]. "
 lmf_heir.1625.desc.alsofamily: "также член нашей семьи. "
 lmf_heir.1625.desc.vassal: "также ваш вассал. "
 lmf_heir.1625.desc.liege: "также наш сюзерен. "
 lmf_heir.1625.desc.realm: "Я даже не покину границ державы [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip]! "
 lmf_heir.1625.desc.end: "Несколько месяцев, проведённых с [Select_CString(your_vassal.IsFemale, 'ней', 'ним' )] во владении [your_vassal.GetPrimaryTitle.GetNameNoTierNoTooltip], могут многому меня научить».\n\nВозможно, [your_heir.GetFirstNameNoTooltip] имеет есть скрытые мотивы, и [your_heir.GetSheHe] просто хочет наконец выбраться из [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], но кто сможет винить [your_heir.GetHerHis]?"
 lmf_heir.1625.a: "[your_heir.GetSheHe|U] может отправиться в путь."
 lmf_heir.1625.a.tt: "[your_heir.GetTitledFirstName] отправится во владение [your_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] и пробудет у персонажа [your_vassal.GetTitledFirstName] до шести месяцев, где [your_heir.GetSheHe] может получить пользу для своего обучения как [Select_CString(your_vassal.IsFemale, 'вашей наследницы', 'вашего наследника' )]"
 lmf_heir.1625.a.player.tt: "Сначала нужно спросить персонажа [your_vassal.GetTitledFirstName], [Select_CString(your_vassal.IsFemale, 'согласна', 'согласен' )] ли [your_vassal.GetSheHe] принять у себя персонажа [your_heir.GetTitledFirstName]"
 lmf_heir.1625.b: "Нет, [your_heir.GetSheHe] останется здесь, во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."

 lmf_heir.1626.opening: "[heir_liege.Custom2('direct_address_by_familiarity', ROOT.Char)|U],"
 lmf_heir.1626.desc.opening.family: "[Select_CString(your_heir.IsFemale, 'Моя', 'Мой' )] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] [your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'выразила', 'выразил' )] желание посетить вас в ближайшие месяцы.\n\n"
 lmf_heir.1626.desc.opening: "Пишу, испрашивая разрешения, чтобы [Select_CString(your_heir.IsFemale, 'моя наследница', 'мой наследник' )], [your_heir.GetTitledFirstName], [Select_CString(your_heir.IsFemale, 'посетила', 'посетил' )] вас в ближайшие месяцы.\n\n"
 lmf_heir.1626.desc: "Я [Select_CString(heir_liege.IsFemale, 'была', 'был' )] бы [Select_CString(heir_liege.IsFemale, 'признательна', 'признателен' )], если бы вы могли помочь в обучении [Select_CString(your_heir.IsFemale, 'этой девицы', 'этого парня' )], но я не требую от вас больше времени, чем вы готовы уделить. Я прошу только гарантировать, чтобы [your_heir.GetFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'была', 'был' )] в безопасности и [Select_CString(your_heir.IsFemale, 'могла', 'мог' )] свободно посещать владение [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], чтобы [Select_CString(your_heir.IsFemale, 'она могла', 'он мог' )] лучше узнать город и его жителей."
 lmf_heir.1626.a: "Конечно, [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'желанная гостья', 'желанный гость' )]."
 lmf_heir.1626.a.tt: "[your_heir.GetTitledFirstName] отправится во владение [your_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] и пробудет там до шести месяцев"
 lmf_heir.1626.b: "Мои сожаления, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_liege'))]."

 lmf_heir.1627.opening: "[your_vassal.Custom2('GreetingToLiegePositive', ROOT.Char)],"
 lmf_heir.1627.desc: "Конечно, [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'желанная гостья', 'желанный гость' )]. Мы здесь, во владении [your_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], с нетерпением ждём [your_heir.GetHerHis] прибытия."
 lmf_heir.1627.a: "Отлично."

 lmf_heir.1628.opening: "[your_vassal.Custom2('GreetingToLiege', ROOT.Char)],"
 lmf_heir.1628.desc: "К сожалению, сейчас неподходящее время для того, чтобы [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'посетила', 'посетил' )] владение [your_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Жаль, но лучше бы [your_heir.GetSheHe] не [Select_CString(your_heir.IsFemale, 'тратила', 'тратил' )] силы на путешествие."
 lmf_heir.1628.a: "[your_heir.GetSheHe|U] может вместо этого посетить земли, которыми правит [alternate_vassal.GetFullName]."
 lmf_heir.1628.b: "Что ж, будь по-вашему."

 lmf_heir.1630.t.cancel: "Визит отменён"
 lmf_heir.1630.desc.title: "[your_heir.GetTitledFirstName] [Select_CString(your_heir.IsFemale, 'был вынуждена', 'был вынужден' )] отменить визит, возвысившись как [your_heir.GetTitleAsNameNoTooltip|l] державы [your_heir.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1630.desc.war: "[heir_liege.GetTitledFirstName] вступает в войну - [your_heir.GetTitledFirstName] [Select_CString(heir_liege.IsFemale, 'отозвана', 'отозван' )] домой."
 lmf_heir.1630.desc.target.death: "[heir_visit_target.GetTitledFirstName] [Select_CString(heir_visit_target.IsFemale, 'умерла', 'умер' )] - [your_heir.GetFirstName] [Select_CString(your_heir.IsFemale, 'вынуждена', 'вынужден' )] отменить визит."
 lmf_heir.1630.desc.heir.death: "[your_heir.GetTitledFirstName] безвременно [Select_CString(your_heir.IsFemale, 'скончалась', 'скончался' )] - визит отменён."
 lmf_heir.1630.desc.imprisoned: "[your_heir.GetTitledFirstName] [Select_CString(your_heir.IsFemale, 'вынуждена', 'вынужден' )] отменить визит во владение [heir_visit_location.GetTitle.GetNameNoTierNoTooltip] из-за своего заключения в темницу."
 lmf_heir.1630.desc.incapable: "[your_heir.GetTitledFirstName] [Select_CString(your_heir.IsFemale, 'вынуждена', 'вынужден' )] отменить визит во владение [heir_visit_location.GetTitle.GetNameNoTierNoTooltip], так как [your_heir.GetSheHe] теперь страдает #TOOLTIP:GAME_TRAIT,incapable, #L недееспособностью#!#!."
 lmf_heir.1630.desc.notheir: "[your_heir.GetTitledFirstName] [Select_CString(your_heir.IsFemale, 'была вынуждена', 'был вынужден' )] отменить визит во владение [heir_visit_location.GetTitle.GetNameNoTierNoTooltip], так как [heir_liege.GetShortUINameNoFormat] больше не [Select_CString( heir_liege.IsLocalPlayer, 'считаете', 'считает')] [your_heir.GetHerHis] [Select_CString(your_heir.IsFemale, 'своей наследницей', 'своим наследником' )]."
 lmf_heir.1630.desc.notruler: "[your_heir.GetTitledFirstName] [Select_CString(your_heir.IsFemale, 'была вынуждена', 'был вынужден' )] отменить визит во владение [heir_visit_location.GetTitle.GetNameNoTierNoTooltip], потому что [heir_liege.GetShortUINameNoFormat] больше не [Select_CString( heir_liege.IsLocalPlayer, 'являетесь', 'является')] [Select_CString(heir_liege.IsFemale, 'правительницей', 'правителем' )]."

 lmf_heir.1631.t.cancel: "[your_heir.GetFirstNameNoTooltip] возвращается домой"
 lmf_heir.1631.desc.dead: "[heir_visit_target.GetShortUINameNoFormat] внезапно [Select_CString( heir_visit_target.IsLocalPlayer, 'умерли', Select_CString(heir_visit_target.IsFemale, 'умерла', 'умер' ))], и [your_heir.GetFirstName] [Select_CString(your_heir.IsFemale, 'была вынуждена', 'был вынужден' )] прервать поездку."
 lmf_heir.1631.desc.notruler: "[your_heir.GetFirstName] [Select_CString(your_heir.IsFemale, 'была вынуждена', 'был вынужден' )] прервать поездку, потому что [heir_visit_target.GetShortUINameNoFormat] больше не правит владением [target_county.GetNameNoTierNoTooltip]."
 lmf_heir.1631.desc.imprisoned: "[heir_visit_target.GetShortUINameNoFormat] [Select_CString( heir_visit_target.IsLocalPlayer, 'были заточены', Select_CString(heir_visit_target.IsFemale, 'была заточена', 'был заточён' ))] в темницу, и [your_heir.GetFirstName] [Select_CString(your_heir.IsFemale, 'была вынуждена', 'был вынужден' )] прервать поездку."
 lmf_heir.1631.desc.siege: "[heir_visit_target.GetShortUINameNoFormat] [Select_CString( heir_visit_target.IsLocalPlayer, 'находитесь', 'находится')] под вражеской осадой во владении [heir_visit_location.GetTitle.GetNameNoTierNoTooltip], и [your_heir.GetFirstName] [Select_CString(your_heir.IsFemale, 'была вынуждена', 'был вынужден' )] прервать поездку."
 lmf_heir.1631.desc.isolating: "[your_heir.GetFirstName] [Select_CString(your_heir.IsFemale, 'была вынуждена', 'был вынужден' )] прервать поездку из-за поветрия, распространяющегося во владении [heir_visit_location.GetCounty.GetTitle.GetNameNoTierNoTooltip], уехав как раз перед тем, как [heir_visit_target.GetShortUINameNoFormat] [Select_CString(heir_visit_target.IsFemale, 'изолировала', 'изолировал' )] всю свою семью."
 lmf_heir.1631.desc.capital: "[your_heir.GetFirstName] [Select_CString(your_heir.IsFemale, 'была вынуждена', 'был вынужден' )] прервать поездку из-за поветрия, распространяющегося во владении [heir_visit_location.GetCounty.GetTitle.GetNameNoTierNoTooltip], уехав как раз перед тем, как [heir_visit_target.GetShortUINameNoFormat] [Select_CString(heir_visit_target.IsFemale, 'закрыла', 'закрыл')] владение [heir_visit_location.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1631.desc.incapable: "[your_heir.GetFirstName] [Select_CString(your_heir.IsFemale, 'была вынуждена', 'был вынужден' )] прервать поездку, потому что [heir_visit_target.GetShortUINameNoFormat] теперь [Select_CString( heir_visit_target.IsLocalPlayer, 'страдаете', 'страдает')] #TOOLTIP:GAME_TRAIT,incapable, #L недееспособностью#!#!."
 lmf_heir.1631.desc: "[your_heir.GetFirstName] [Select_CString(your_heir.IsFemale, 'была вынуждена', 'был вынужден' )] прервать поездку."

 lmf_heir.1632.t: "[Select_CString(your_heir.IsFemale, 'Должна', 'Должен' )] ли [your_heir.GetFirstNameNoTooltip] вернуться домой?"
 lmf_heir.1632.desc.atwar.primary: "Теперь, когда я и [heir_host.GetTitledFirstNameNoTooltip] в состоянии войны, возникает тревожный вопрос: [your_heir.GetFirstNameNoTooltip] сейчас в гостях у н[heir_host.GetHerHis].\n\n[Select_CString(your_heir.IsFemale, 'Моя', 'Мой')] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_heir )] [Select_CString(your_heir.IsFemale, 'должна', 'должен' )] немедленно вернуться во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1632.desc.atwar.rootattacker: "Я и [defender.GetTitledFirstNameNoTooltip] воюем, что означает, что и [heir_host.GetTitledFirstNameNoTooltip] находится в состоянии войны со мной, и это поднимает тревожный вопрос: [your_heir.GetFirstNameNoTooltip] сейчас в гостях у н[heir_host.GetHerHis].\n\n[Select_CString(your_heir.IsFemale, 'Моя', 'Мой')] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_heir )] [Select_CString(your_heir.IsFemale, 'должна', 'должен' )] немедленно вернуться во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1632.desc.atwar.rootdefender: "[attacker.GetTitledFirstNameNoTooltip] воюет против меня, и это означает, что [heir_host.GetTitledFirstNameNoTooltip] также находится в состоянии войны со мной, и это поднимает тревожный вопрос: [your_heir.GetFirstNameNoTooltip] сейчас в гостях у н[heir_host.GetHerHis].\n\n[Select_CString(your_heir.IsFemale, 'Моя', 'Мой')] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_heir )] [Select_CString(your_heir.IsFemale, 'должна', 'должен' )] немедленно вернуться во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1632.desc.atwar: "[defender.GetTitledFirstNameNoTooltip] и [attacker.GetTitledFirstNameNoTooltip] воюют между собой, и это означает, что [heir_host.GetTitledFirstNameNoTooltip] также находится в состоянии войны со мной, и это поднимает тревожный вопрос: [your_heir.GetFirstNameNoTooltip] сейчас в гостях у н[heir_host.GetHerHis].\n\n[Select_CString(your_heir.IsFemale, 'Моя', 'Мой')] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_heir )] [Select_CString(your_heir.IsFemale, 'должна', 'должен' )] немедленно вернуться во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1632.desc: "Война поднимает вопрос, [Select_CString(your_heir.IsFemale, 'должна', 'должен' )] ли [your_heir.GetFirstNameNoTooltip] вернуться из визита ко двору, которым правит [heir_host.GetTitledFirstNameNoTooltip].\n\n[your_heir.GetSheHe|U] не находится в непосредственной опасности, это так, но даже если [Select_CString(your_heir.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_heir )] не [Select_CString(your_heir.IsFemale, 'нужна', 'нужен' )] мне здесь, во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], есть и тот факт, что гарантии безопасности, которые [Select_CString(heir_host.IsFemale, 'предоставила', 'предоставил' )] [heir_host.GetTitledFirstNameNoTooltip], теперь гораздо менее надежны."
 lmf_heir.1632.a: "Приказать [your_heir.GetHerHim] немедленно уехать."
 lmf_heir.1632.b: "[your_heir.GetFirstNameNoTooltip] в безопасности там, где [your_heir.GetSheHe] находится."

 lmf_heir.1633.t: "[Select_CString(your_heir.IsFemale, 'Новая посетительница', 'Новый посетитель' )]"
 lmf_heir.1633.desc.begin: "[heir_liege.GetTitledFirstNameNoTooltip] и договорились о том, что [Select_CString(heir_liege.IsFemale, 'её', 'его' )] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] погостит у меня, и [Select_CString(your_heir.IsFemale, 'она прибыла', 'он прибыл' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], "
 lmf_heir.1633.desc.away: "но, к сожалению, меня не было там, чтобы встретить [your_heir.GetHerHis], и вряд ли я смогу провести с [Select_CString(your_heir.IsFemale, 'ней', 'ним' )] много времени во время своего визита.\n\nМне нужно решить, дать ли [your_heir.GetHerHim] свободу действий в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], рискуя, что [your_heir.GetSheHe] будет совать нос повсюду, и что [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )] узнает обо всём, или позволить [your_heir.GetHerHim] делать что [your_heir.GetSheHe] пожелает в окрестностях."
 lmf_heir.1633.desc.end: "поэтому я [Select_CString(ROOT.Char.IsFemale, 'спустилась', 'спустился')] во двор, чтобы лично приветствовать [your_heir.GetHerHis].\n\nМне нужно решить, проводить ли время с [Select_CString(your_heir.IsFemale, 'ней', 'ним' )] в ближайшие месяцы, разрешив [your_heir.GetHerHim] свободно перемещаться в границах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')]... с риском, что [your_heir.GetSheHe] будет совать нос повсюду, и что [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )] узнает обо всём, или позволить [your_heir.GetHerHim] делать что [your_heir.GetSheHe] пожелает в окрестностях."
 lmf_heir.1633.a: "Это шанс лучше познакомиться."
 lmf_heir.1633.a.tt: "#EMP [your_heir.GetShortUINameNoTooltipNoFormat|U] проведёт следующие месяцы в [THIS.Char.Custom('FortifiedBuilding_RU_Gen')], обучаясь с вами и вашими придворными. Это улучшит ваши отношения, но [your_heir.GetSheHe] может устроить беспорядок и узнать ваши секреты.#!"
 spent_time_with_visiting_heir: "[CHARACTER.GetShortUIName] и [TARGET_CHARACTER.GetShortUIName] провели время вместе во время [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вашего', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))] визита в [CHARACTER.Custom('FortifiedBuilding')] [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )]"
 spent_time_with_visiting_heir_corresponding: "[TARGET_CHARACTER.GetShortUIName] и [CHARACTER.GetShortUIName] провели время вместе во время [Select_CString( CHARACTER.IsLocalPlayer, 'вашего', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] визита в [TARGET_CHARACTER.Custom('FortifiedBuilding')] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )]"
 lmf_heir.1633.b: "[your_heir.GetSheHe|U] может остаться, но у меня есть дела поважнее."
 lmf_heir.1633.c: "Мы позаботимся, чтобы [your_heir.GetSheHe] не [Select_CString(your_heir.IsFemale, 'скучала', 'скучал' )]."
 lmf_heir.1633.c.tt: "#EMP [your_heir.GetShortUINameNoTooltipNoFormat|U] проведёт следующие месяцы в [THIS.Char.Custom('FortifiedBuilding_RU_Gen')], обучаясь с вашими придворными. [your_heir.GetSheHe|U] может устроить беспорядок и узнать ваши секреты, но вряд ли случится что-то хуже.#!"
 lmf_heir.1633.d: "То, что [your_heir.GetSheHe] делает во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], меня не касается."
 lmf_heir.1633.d.tt: "#EMP [your_heir.GetShortUINameNoTooltipNoFormat|U] не будет [Select_CString(your_heir.IsFemale, 'допущена', 'допущен')] в [THIS.Char.Custom('FortifiedBuilding')] и вместо этого проведет следующие месяцы в окрестностях. [your_heir.GetSheHe|U] может попасть в неприятности, и [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )] может это не одобрить, но [your_heir.GetSheHe] не устроит беспорядков там.#!"

 lmf_heir.1651.t: "[Select_CString(your_heir.IsFemale, 'Впечатляющая наследница', 'Впечатляющий наследник' )]"
 lmf_heir.1651.desc.away: "Хотя я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам')] этого не [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел')], мне сказали, "
 lmf_heir.1651.desc.busy: "Хотя я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провёл')] с [Select_CString(your_heir.IsFemale, 'ней', 'ним' )] мало времени, я [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал')], "
 lmf_heir.1651.desc.there: "Я [Select_CString(ROOT.Char.IsFemale, 'рада', 'рад')] отметить, "
 lmf_heir.1651.desc: "что [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [Select_CString(your_heir.IsFemale, 'проявила', 'проявил')] себя наилучшим образом в первые недели пребывания.\n\n[your_heir.GetTitledFirstNameNoTooltip] не только [Select_CString(your_heir.IsFemale, 'была мила и вежлива', 'был мил и вежлив')] со слугами в пределах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], [your_heir.GetSheHe] также [Select_CString(your_heir.IsFemale, 'помогала и была желанной гостьей', 'помогал и был желанным гостем')] при дворе.\n\nКонечно, [your_heir.GetSheHe] только обустраивается, и мы увидим, как пройдет визит, но начало определённо благоприятное."
 lmf_heir.1651.a: "[your_heir.GetSheHe|U] [Select_CString(your_heir.IsFemale, 'прекрасная', 'прекрасный')] [your_heir.Custom('polite_gender_ref')]."
 lmf_heir.1651.tt: "#EMP [your_heir.GetTitledFirstNameNoTooltip] с большей вероятностью преуспеет во время своего визита#!"

 lmf_heir.1652.t: "[Select_CString(your_heir.IsFemale, 'Неприятная наследница', 'Неприятный наследник' )]"
 lmf_heir.1652.desc.away: "Хотя я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам')] этого не [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел')], мне сказали, "
 lmf_heir.1652.desc.busy: "Хотя я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провёл')] с [Select_CString(your_heir.IsFemale, 'ней', 'ним' )] мало времени, я [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал')], "
 lmf_heir.1652.desc.there: "Мне неприятно отмечать, "
 lmf_heir.1652.desc: "что [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], не [Select_CString(your_heir.IsFemale, 'проявила', 'проявил')] особой учтивости в первые недели пребывания.\n\nСлуги в пределах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] сообщают, что [your_heir.GetTitledFirstNameNoTooltip] часто [Select_CString(your_heir.IsFemale, 'была раздражительна и капризна', 'был раздражителен и капризен')]. [your_heir.GetSheHe|U] бродит по залам, критикуя почти всё, что видит, а когда появляется при дворе, в основном старается привлечь к себе внимание.\n\nЯ утешаю себя мыслью, что [your_heir.GetSheHe] только осваивается, и мы увидим, как пройдёт визит, но начало определённо неблагоприятное."
 lmf_heir.1652.a: "Интересно, во владении [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip] [your_heir.GetSheHe] ведёт себя так же?"
 lmf_heir.1652.tt: "#EMP [your_heir.GetTitledFirstNameNoTooltip] с большей вероятностью проявит себя плохо во время своего визита#!"

 lmf_heir.1653.t: "[Select_CString(your_heir.IsFemale, 'Скрытная наследница', 'Скрытный наследник' )]"
 lmf_heir.1653.desc.away: "Хотя я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам')] этого не [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], мне сказали, "
 lmf_heir.1653.desc.busy: "Хотя я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провёл')] с [Select_CString(your_heir.IsFemale, 'ней', 'ним' )] мало времени, я [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )], "
 lmf_heir.1653.desc.there: "Мне неприятно отмечать, "
 lmf_heir.1653.desc: "что [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], почти не [Select_CString(your_heir.IsFemale, 'показывала', 'показывал')] своего лица в первые недели пребывания.\n\nСлуги в пределах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] говорят, что [your_heir.Custom('polite_gender_ref')] проводит большую часть времени взаперти в своих покоях, то мечтая, то читая, и даже когда [your_heir.GetSheHe] выходит, [your_heir.GetTitledFirstNameNoTooltip] избегает всех. Не думаю, что [your_heir.GetSheHe] хоть раз [Select_CString(your_heir.IsFemale, 'показалась', 'показался')] при дворе.\n\nЯ утешаю себя мыслью, что [your_heir.GetSheHe] только осваивается, и мы увидим, как пройдет визит, но начало определенно неблагоприятное."
 lmf_heir.1653.a: "Не самый общительный тип, не так ли?"
 lmf_heir.1653.tt: "#EMP [your_heir.GetTitledFirstNameNoTooltip] с большей вероятностью будет держаться особняком во время своего визита#!"

 lmf_heir.1654.t: "[Select_CString(your_heir.IsFemale, 'Тоскующая наследница', 'Тоскующий наследник' )]"
 lmf_heir.1654.desc.away: "Хотя я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам')] этого не [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], мне сказали, "
 lmf_heir.1654.desc.busy: "Хотя я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провёл')] с [Select_CString(your_heir.IsFemale, 'ней', 'ним' )] мало времени, я [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )], "
 lmf_heir.1654.desc.there: "Мне неприятно отмечать, "
 lmf_heir.1654.desc: "что [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [Select_CString(your_heir.IsFemale, 'провела', 'провёл')] первые недели в основном тоскуя по владению [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip].\n\nВозможно, [your_heir.Custom('polite_gender_ref')] не [Select_CString(your_heir.IsFemale, 'была готова', 'был готов')] к такому далекому путешествию, но слуги в пределах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] говорят, что [your_heir.GetTitledFirstNameNoTooltip] проводит большую часть времени в своих покоях, то плача, то хныча. Даже когда [your_heir.GetSheHe] показывается, любая встреча с кем-то заставляет [your_heir.GetHerHis] немедленно убегать.\n\nЯ утешаю себя мыслью, что [your_heir.GetSheHe] только осваивается, и мы увидим, как пройдет визит, но начало определенно неблагоприятное."
 lmf_heir.1654.a: "[your_heir.GetSheHe|U] к нам привыкнет, я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен')]."
 lmf_heir.1654.tt: "#EMP [your_heir.GetTitledFirstNameNoTooltip] с большей вероятностью проявит себя плохо во время своего визита#!"

 lmf_heir.1655.t: "[Select_CString(your_heir.IsFemale, 'Тихая наследница', 'Тихий наследник' )]"
 lmf_heir.1655.desc.away: "Хотя я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам')] этого не [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], мне сказали, "
 lmf_heir.1655.desc.busy: "Хотя я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провёл')] с [Select_CString(your_heir.IsFemale, 'ней', 'ним' )] мало времени, я [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )], "
 lmf_heir.1655.desc.there: "Я [Select_CString(ROOT.Char.IsFemale, 'рада', 'рад')] отметить, "
 lmf_heir.1655.desc: "что [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [Select_CString(your_heir.IsFemale, 'показала', 'показал')] себя [Select_CString(your_heir.IsFemale, 'тихой и исполнительной девицей', 'тихим и исполнительным юношей')] в первые недели пребывания.\n\nСлуги в пределах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] говорят, что [your_heir.GetTitledFirstNameNoTooltip] всегда [Select_CString(your_heir.IsFemale, 'вежлива', 'вежлив')], всегда отвечает, когда к [Select_CString(your_heir.IsFemale, 'ней', 'нему')] обращаются, и очень старается соблюдать все обычаи и правила, ожидаемые от гостей в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')].\n\nЯ бы не против, чтобы [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'раскрепостилась', 'раскрепостился')], но напоминаю себе, что [your_heir.GetSheHe] только осваивается. Мы увидим, как пройдет визит, но начало по крайней мере благоприятное."
 lmf_heir.1655.a: "Не самый общительный тип, не так ли?"
 lmf_heir.1655.tt: "#EMP [your_heir.GetTitledFirstNameNoTooltip] с большей вероятностью преуспеет во время своего визита#!"

 lmf_heir.1656.t: "[Select_CString(your_heir.IsFemale, 'Беспокойная наследница', 'Беспокойный наследник' )]"
 lmf_heir.1656.desc.away: "Хотя я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам')] этого не [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], мне сказали, "
 lmf_heir.1656.desc.busy: "Хотя я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провёл')] с [Select_CString(your_heir.IsFemale, 'ней', 'ним' )] мало времени, я [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )], "
 lmf_heir.1656.desc.there: "Мне неприятно отмечать, "
 lmf_heir.1656.desc: "что [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [Select_CString(your_heir.IsFemale, 'доставляла', 'доставлял')] хлопоты с момента прибытия. [your_heir.GetHerHis|U] первые недели прошли в разъездах, игнорировании большинства правил для гостей [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] и постоянном раздражении слуг. Возможно, [your_heir.GetSheHe] считает поездку отпуском?\n\nЯ утешаю себя мыслью, что [your_heir.GetSheHe] только осваивается, и мы увидим, как пройдет визит, но начало определенно неблагоприятное."
 lmf_heir.1656.a: "Я пожалею, что [Select_CString(ROOT.Char.IsFemale, 'согласилась', 'согласился')] на этот визит, не так ли?"
 lmf_heir.1656.tt: "#EMP [your_heir.GetTitledFirstNameNoTooltip] с большей вероятностью попадет в неприятности во время своего визита#!"

 lmf_heir.heir.progress.minor.tt: "Обучение персонажа [your_heir.GetTitledFirstNameNoTooltip] как [Select_CString(your_heir.IsFemale, 'наследницы', 'наследника' )] продвинулось незначительно"
 lmf_heir.heir.progress.moderate.tt: "Обучение персонажа [your_heir.GetTitledFirstNameNoTooltip] как [Select_CString(your_heir.IsFemale, 'наследницы', 'наследника' )] продвинулось умеренно"
 lmf_heir.heir.progress.large.tt: "Обучение персонажа [your_heir.GetTitledFirstNameNoTooltip] как [Select_CString(your_heir.IsFemale, 'наследницы', 'наследника' )] значительно продвинулось"
 lmf_heir.heir.progress.negative.tt: "Обучение персонажа [your_heir.GetTitledFirstNameNoTooltip] как [Select_CString(your_heir.IsFemale, 'наследницы', 'наследника' )] немного ухудшилось"

 lmf_heir.1660.t: "Время с [Select_CString(your_heir.IsFemale, 'наследницей', 'наследником' )]"
 lmf_heir.1660.desc.first.annoy: "Зачем я на это [Select_CString(ROOT.Char.IsFemale, 'согласилась', 'согласился')]?\n\n[your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'провела', 'провёл')] последние недели, следуя за мной по пятам, и вопросы бесконечны.\n\n«Почему вы делаете так, [Select_CString(ROOT.Char.IsFemale, 'миледи', 'милорд')]?»\n«Что вы теперь будете делать, [Select_CString(ROOT.Char.IsFemale, 'миледи', 'милорд')]?»\n«Почему вы так сказали, [Select_CString(ROOT.Char.IsFemale, 'миледи', 'милорд')]?»\n\nКаждый раз, когда я оборачиваюсь, там [your_heir.GetSheHe], [Select_CString(your_heir.IsFemale, 'пытающаяся', 'пытающийся' )] помочь, но чаще всего только [Select_CString(your_heir.IsFemale, 'мешающая', 'мешающий' )].\n\nЯ вздыхаю каждый раз, когда вспоминаю, что [your_heir.Custom('polite_gender_ref')] уедет нескоро."
 lmf_heir.1660.desc.first.helpful: "Пока что [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко мне, учится довольно хорошо.\n\n[your_heir.Custom('polite_gender_ref')] быстро [Select_CString(your_heir.IsFemale, 'усвоила', 'усвоил')] мои методы и старается не мешать. Иногда я почти забываю, что [your_heir.GetSheHe] здесь.\n\nКонечно, ещё есть время для изменений, не так ли?"
 lmf_heir.1660.desc.second.begin: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко мне, учится у меня уже несколько недель, как [heir_liege.GetSheHe] и [Select_CString(heir_liege.IsFemale, 'просила', 'просил')], "
 lmf_heir.1660.desc.second.annoy.wasannoy: "и [your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'стала', 'стал')] не менее [Select_CString(your_heir.IsFemale, 'раздражающей', 'раздражающим' )], чем прежде.\n\n"
 lmf_heir.1660.desc.second.annoy.washelpful: "и признаю, то, что [your_heir.Custom('polite_gender_ref')] постоянно находится рядом со мной, начало меня раздражать.\n\n"
 lmf_heir.1660.desc.second.helpful.wasannoy: "и, к счастью, ситуация улучшилась. [your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'стала', 'стал')] почти [Select_CString(your_heir.IsFemale, 'терпимой', 'терпимым')].\n\n"
 lmf_heir.1660.desc.second.helpful.washelpful: "и [your_heir.Custom('polite_gender_ref')] продолжает радовать своим присутствием.\n\n"
 lmf_heir.1660.desc.second.annoy: "Я знаю, [your_heir.GetSheHe] старается быть [Select_CString(your_heir.IsFemale, 'полезной', 'полезным' )], но в основном [your_heir.GetSheHe] просто мешает. Некоторых слуг я вижу реже!\n\nК счастью, визит скоро закончится."
 lmf_heir.1660.desc.second.helpful: "[your_heir.GetSheHe|U] [Select_CString(your_heir.IsFemale, 'привыкла', 'привык')] к моему распорядку, часто предвосхищая мои нужды, как [Select_CString(your_heir.IsFemale, 'верная служанка', 'верный слуга' )]. Несколько раз [your_heir.GetSheHe] даже [Select_CString(your_heir.IsFemale, 'брала', 'брал')] на себя решение надоедливых задач до моей просьбы.\n\nК сожалению, визит скоро закончится."
 lmf_heir.1660.desc.third.begin: "[your_heir.GetTitledFirstNameNoTooltip] продолжает проводить почти все время, следуя за мной здесь, во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], "
 lmf_heir.1660.desc.third.annoy.wasannoy: "и [your_heir.Custom('polite_gender_ref')] продолжает быть занозой в моем боку. Неужели [your_heir.GetSheHe] не может найти другое занятие?\n\n" 
 lmf_heir.1660.desc.third.annoy.washelpful: "и скажу сейчас: я буду [Select_CString(ROOT.Char.IsFemale, 'рада', 'рад')], когда [your_heir.Custom('polite_gender_ref')] наконец покинет нас.\n\n"
 lmf_heir.1660.desc.third.helpful.wasannoy: "и, к счастью, ситуация улучшилась. [your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'стала', 'стал')] почти [Select_CString(your_heir.IsFemale, 'терпимой', 'терпимым')].\n\n"
 lmf_heir.1660.desc.third.helpful.washelpful: "и подозреваю, что почти буду скучать по н[your_heir.GetHerHim], когда [your_heir.Custom('polite_gender_ref')] уедет.\n\n"
 lmf_heir.1660.desc.third.annoy: "Я почти [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен')], что [your_heir.Custom('GetLassLad')] полностью осознает, как [your_heir.GetSheHe] меня раздражает, и избегает меня, когда у меня не запланирован урок.\n\n[heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'должна', 'должен')] быть [Select_CString(heir_liege.IsFemale, 'благодарна', 'благодарен')] за все время, которое я [Select_CString(ROOT.Char.IsFemale, 'потратила', 'потратил')] на [Select_CString(your_heir.IsFemale, 'неё', 'него')]."
 lmf_heir.1660.desc.third.helpful: "Думаю, обучение прошло хорошо. [your_heir.Custom('GetLassLad')] и я вошли в комфортный распорядок, и подозреваю, что почти [Select_CString(ROOT.Char.IsFemale, 'доверяла', 'доверял')] бы [your_heir.GetHerHim] выполнять многие задачи без моего надзора.\n\nГрустно осознавать, что визит почти завершен."
 lmf_heir.1660.a: "[Select_CString(your_heir.IsFemale, 'Такая прекрасная', 'Такой прекрасный')] [your_heir.Custom('GetLassLad')]."
 lmf_heir.1660.b: "Лучше бы [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'была благодарна', 'был благодарен')]."
 spent_time_with_heir: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'провели', Select_CString(CHARACTER.IsFemale, 'провела', 'провёл' ))] время с [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажем ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'им персонажем', '' )] во время [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вашей', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))] подготовки как [Select_CString(TARGET_CHARACTER.IsFemale, 'наследницы', 'наследника' )]."
 spent_time_with_heir_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'провели', Select_CString(TARGET_CHARACTER.IsFemale, 'провела', 'провёл' ))] время с [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажем ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'им персонажем', '' )] во время [Select_CString( CHARACTER.IsLocalPlayer, 'вашей', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] подготовки как [Select_CString(CHARACTER.IsFemale, 'наследницы', 'наследника' )]."
 annoyed_by_heir_training: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'были раздражены', Select_CString(CHARACTER.IsFemale, 'была раздражена', 'был раздражён' ))] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажем ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'им персонажем', '' )] во время [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вашей', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))] подготовки как [Select_CString(TARGET_CHARACTER.IsFemale, 'наследницы', 'наследника' )]."
 annoyed_by_heir_training_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'были раздражены', Select_CString(TARGET_CHARACTER.IsFemale, 'была раздражена', 'был раздражён' ))] [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажем ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'им персонажем', '' )] во время [Select_CString( CHARACTER.IsLocalPlayer, 'вашей', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] подготовки как [Select_CString(CHARACTER.IsFemale, 'наследницы', 'наследника' )]."

 lmf_heir.1661.t: "В близком окружении"
 lmf_heir.1661.desc.start: "Я и [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко мне, провели последние недели в компании, готовя [your_heir.GetHerHis] к роли [Select_CString(your_heir.IsFemale, 'правительницы', 'правителя' )], как и [Select_CString(heir_liege.IsFemale, 'просила', 'просил')] [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )], и в последнее время [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил')], что [your_heir.Custom('GetLassLad')] [Select_CString(your_heir.IsFemale, 'стала', 'стал' )] вести себя... иначе.\n\n"
 lmf_heir.1661.desc.child: "[your_heir.GetTitledFirstNameNoTooltip] обожает меня, улыбаясь и смеясь почти над каждым моим словом, и при наших встречах я замечаю румянец на [your_heir.GetHerHis] щеках. Конечно, [your_heir.Custom('GetLassLad')] ещё ребенок, но любой заметил бы, что у [Select_CString(heir_liege.IsFemale, 'неё', 'него')] возникла влюбленность.\n\n"
 lmf_heir.1661.desc.adult: "[your_heir.GetTitledFirstNameNoTooltip] часто улыбается, находя любой повод прикоснуться к моей руке или плечу, а при зрительном контакте ощущается заинтересованность. Позволить этому развиться несомненно приведёт к тому, что [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )] потеряет доверие ко мне, но также ясно, что [your_heir.Custom('GetLassLad')] не против этого.\n\n"
 lmf_heir.1661.desc.end: "Выбор за мной: положить этому конец сейчас, пока не зашло слишком далеко?"
 lmf_heir.1661.a: "Зачем прекращать, если [your_heir.Custom('GetLassLad')] этого хочет?"
 lmf_heir.1661.b: "Забавное развлечение, но как только визит закончится, все кончено."
 lmf_heir.1661.c: "Я [Select_CString(ROOT.Char.IsFemale, 'польщена', 'польщён')]. Может, когда [your_heir.GetSheHe] станет старше...?"
 lmf_heir.1661.d: "Да, остановим это, пока не поздно."
 bonded_while_heir_training: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'начали', Select_CString(CHARACTER.IsFemale, 'начала', 'начал' ))] роман с [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажем ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'им персонажем', '' )] во время [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вашей', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))] подготовки как [Select_CString(TARGET_CHARACTER.IsFemale, 'наследницы', 'наследника' )]."
 bonded_while_heir_training_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'начали', Select_CString(TARGET_CHARACTER.IsFemale, 'начала', 'начал' ))] роман с [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажем ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'им персонажем', '' )] во время [Select_CString( CHARACTER.IsLocalPlayer, 'вашей', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] подготовки как [Select_CString(CHARACTER.IsFemale, 'наследницы', 'наследника' )]."
 crush_while_heir_training: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'влюбились', Select_CString(TARGET_CHARACTER.IsFemale, 'влюбилась', 'влюбился' ))] в [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] во время обучения у [Select_CString( CHARACTER.IsLocalPlayer, 'вас', Select_CString(CHARACTER.IsFemale, 'неё', 'него' ))] как [Select_CString(TARGET_CHARACTER.IsFemale, 'наследницы', 'наследника' )]."
 crush_while_heir_training_corresponding: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'влюбились', Select_CString(CHARACTER.IsFemale, 'влюбилась', 'влюбился' ))] в [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] во время обучения у [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вас', Select_CString(TARGET_CHARACTER.IsFemale, 'неё', 'него' ))] как [Select_CString(CHARACTER.IsFemale, 'наследницы', 'наследника' )]."

 lmf_heir.1662.t: "Обучение [Select_CString(your_heir.IsFemale, 'наследницы', 'наследника' )]"
 lmf_heir.1662.desc.away: "Так как меня не было, "
 lmf_heir.1662.desc.busy: "Так как я [Select_CString(ROOT.Char.IsFemale, 'была занята', 'был занят' )], "
 lmf_heir.1662.desc.notrain: "Мне сообщили, что "
 lmf_heir.1662.desc.start: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_councillor'))], [Select_CString(your_councillor.IsFemale, 'которая', 'который' )] "
 lmf_heir.1662.desc.chancellor: "[Select_CString(your_councillor.IsFemale, 'показала', 'показал' )] [Select_CString(your_heir.IsFemale, 'юноше', 'девушке' )] [ROOT.Char.Custom('FortifiedBuilding')] и [Select_CString(your_councillor.IsFemale, 'объяснила', 'объяснил' )] тонкости работы, с которой сталкивается [your_councillor.GetCouncilTitle|l], провели последние недели в компании.\n\n"
 lmf_heir.1662.desc.steward: "[Select_CString(your_councillor.IsFemale, 'показала', 'показал' )] [Select_CString(your_heir.IsFemale, 'юноше', 'девушке' )], чем занимается [your_councillor.GetCouncilTitle|l], чтобы управлять делами в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] и окружающими землями, провели последние недели в компании.\n\n"
 lmf_heir.1662.desc.marshal: "[Select_CString(your_councillor.IsFemale, 'отвела', 'отвёл' )] [Select_CString(your_heir.IsFemale, 'юношу', 'девушку' )] в казармы и [Select_CString(your_councillor.IsFemale, 'показала', 'показал' )] [your_heir.GetHerHim], как [your_councillor.GetCouncilTitle|l] управляет войсками [Select_CString(ROOT.Char.IsFemale, 'своей леди', 'своего лорда' )], провели последние недели в компании.\n\n"
 lmf_heir.1662.desc.spymaster: "[Select_CString(your_councillor.IsFemale, 'показала', 'показал' )] [Select_CString(your_heir.IsFemale, 'юноше', 'девушке' )] редко используемые части [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], объясняя важность работы, которую делает [your_councillor.GetCouncilTitle|l], провели последние недели в компании.\n\n"
 lmf_heir.1662.desc.admiral: "[Select_CString(your_councillor.IsFemale, 'показала', 'показал' )] [Select_CString(your_heir.IsFemale, 'юноше', 'девушке' )] верфи и [Select_CString(your_councillor.IsFemale, 'объяснила', 'объяснил' )] тонкости защиты торговых путей державы и [Select_CString(your_councillor.IsFemale, 'какой должна', 'каким должен' )] быть [Select_CString(your_councillor.IsFemale, 'достойная', 'достойный' )] [your_councillor.GetCouncilTitle|l], провели последние недели в компании.\n\n"
 lmf_heir.1662.desc.castellan: "[Select_CString(your_councillor.IsFemale, 'показала', 'показал' )] [Select_CString(your_heir.IsFemale, 'юноше', 'девушке' )] [ROOT.Char.Custom('FortifiedBuilding')] и [Select_CString(your_councillor.IsFemale, 'объяснила', 'объяснил' )] тонкости работы, которую выполняет [your_councillor.GetCouncilTitle|l], и поддержки своего сюзерена, провели последние недели в компании.\n\n"
 lmf_heir.1662.desc.well: "Похоже, обучение прошло хорошо, и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_councillor'))] и [your_heir.GetTitledFirstNameNoTooltip] прекрасно поладили. [heir_liege.GetTitledFirstNameNoTooltip] не будет иметь претензий к тому, как продвигается в обучении [heir_liege.GetHerHis] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]."
 lmf_heir.1662.desc.poorly: "Мне сообщили, что всё прошло не очень. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_councillor'))] и [your_heir.GetTitledFirstNameNoTooltip] не особо поладили, а [your_heir.Custom('GetLassLad')] в основном [Select_CString(your_heir.IsFemale, 'скучала', 'скучал' )]. В любом случае, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_councillor'))] заслуживает благодарности за приложенные усилия."
 lmf_heir.1662.a: "Приятно слышать!"
 lmf_heir.1662.b: "Что ж, это печально."

 lmf_heir.1663.t: "Обучение [Select_CString(your_heir.IsFemale, 'наследницы', 'наследника' )]"
 lmf_heir.1663.desc.away: "Так как меня не было, "
 lmf_heir.1663.desc.busy: "Так как я [Select_CString(ROOT.Char.IsFemale, 'была занята', 'был занят' )], "
 lmf_heir.1663.desc.notrain: "Мне сообщили, что "
 lmf_heir.1663.desc.start: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))], [Select_CString(your_courtier.IsFemale, 'которая', 'который' )] "
 lmf_heir.1663.desc.physician: "[Select_CString(your_courtier.IsFemale, 'ознакомила', 'ознакомил' )] [your_heir.GetHerHis] с обязанностями, которые выполняет [GetCourtPositionType('court_physician_court_position').GetNameNoTooltip()], а также [Select_CString(your_courtier.IsFemale, 'обучила', 'обучил' )] использованию трав и методам современной профилактики хворей, провели последние недели в компании.\n\n"
 lmf_heir.1663.desc.chronicler: "[Select_CString(your_courtier.IsFemale, 'показала', 'показал' )] [your_heir.GetHerHim] богатые исторические записи в нашей библиотеке и то, как их использует [GetCourtPositionType('chronicler_court_position').GetNameNoTooltip()] для создания повествований, влияющих на дипломатические взаимодействия в наши дни, провели последние недели в компании.\n\n"
 lmf_heir.1663.desc.horse: "[Select_CString(your_courtier.IsFemale, 'показала', 'показал' )] [your_heir.GetHerHim] конюшни [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], объясняя обязанности, которые выполняет [GetCourtPositionType('master_of_horse_court_position').GetNameNoTooltip()] не только по подготовке лошадей к бою, но и по их использованию для перевозки необходимых припасов, провели последние недели в компании.\n\n"
 lmf_heir.1663.desc.seneschal: "показал[Select_CString(your_courtier.IsFemale, 'а', '' )] [Select_CString(your_heir.IsFemale, 'юноше', 'девушке' )], какую работу выполняет [GetCourtPositionType('seneschal_court_position').GetNameNoTooltip()], чтобы управлять не только убранством [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] и окружающими землями, но и владениями [Select_CString(ROOT.Char.IsFemale, 'леди', 'лорда' )], провели последние недели в компании.\n\n"
 lmf_heir.1663.desc.taster: "[Select_CString(your_courtier.IsFemale, 'объяснила', 'объяснил' )] [your_heir.GetHerHim] всё то, что отвечает [GetCourtPositionType('food_taster_court_position').GetNameNoTooltip()] на пиру, а также различные виды придворных интриг, которые могут угрожать жизни [Select_CString(ROOT.Char.IsFemale, 'молодой правительницы', 'молодого правителя' )], если [your_heir.GetSheHe] не будет [Select_CString(your_heir.IsFemale, 'осторожна', 'осторожен' )].\n\n"
 lmf_heir.1663.desc.well: "Кажется, время прошло с пользой. [your_heir.GetTitledFirstNameNoTooltip] и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] прекрасно поладили, и [your_heir.Custom('GetLassLad')], казалось, [Select_CString(your_heir.IsFemale, 'впитывала', 'впитывал' )] информацию с чувством уважения и целеустремленности. [heir_liege.GetTitledFirstNameNoTooltip] не будет иметь претензий к тому, как [heir_liege.GetHerHis] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] справляется со своим обучением."
 lmf_heir.1663.desc.poorly: "К сожалению, дела пошли не очень хорошо. [your_heir.GetTitledFirstNameNoTooltip] и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] не поладили, и [your_heir.Custom('GetLassLad')] более или менее [Select_CString(your_heir.IsFemale, 'проигнорировала', 'проигнорировал' )] большую часть того, что [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] [Select_CString(your_courtier.IsFemale, 'говорила', 'говорил' )], сочтя это неважным, исходящим от «всего лишь» члена моего двора.\n\nВесьма досадно, если это правда."
 lmf_heir.1663.a: "Приятно слышать!"
 lmf_heir.1663.b: "Что ж, это печально."

 lmf_heir.1664.t: "Обучение [Select_CString(your_heir.IsFemale, 'наследницы', 'наследника' )]"
 lmf_heir.1664.desc.away: "Так как меня не было, "
 lmf_heir.1664.desc.busy: "Так как я [Select_CString(ROOT.Char.IsFemale, 'была занята', 'был занят' )], "
 lmf_heir.1664.desc.notrain: "Мне сообщили, что "
 lmf_heir.1664.desc: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))], [Select_CString(your_courtier.IsFemale, 'которая привела', 'который привел' )] [Select_CString(your_heir.IsFemale, 'юношу', 'девушку' )] в гарнизон [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] и [Select_CString(your_courtier.IsFemale, 'показала', 'показал' )] [your_heir.GetHerHim], на что способны мои [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n\n[your_heir.GetTitledFirstNameNoTooltip] безжалостно [Select_CString(your_heir.IsFemale, 'тренировалась', 'тренировался' )]... но, по общему мнению, [Select_CString(your_heir.IsFemale, 'справилась', 'справился' )] довольно хорошо. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] сообщает мне, что [your_heir.GetSheHe] мало [Select_CString(your_heir.IsFemale, 'жаловалась и ладила', 'жаловался и ладила' )] не только с [Select_CString(your_courtier.IsFemale, 'ней', 'ним' )], но и с другими солдатами.\n\nКажется, [heir_liege.GetTitledFirstNameNoTooltip] не будет иметь претензий к тому, как [heir_liege.GetHerHis] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] справляется со своим обучением."
 lmf_heir.1664.a: "Отличная работа, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]!"

 lmf_heir.1665.t: "Несчастливый поединок"
 lmf_heir.1665.desc: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))], [Select_CString(your_courtier.IsFemale, 'которая привела', 'который привёл' )] [Select_CString(your_heir.IsFemale, 'юношу', 'девушку' )] в гарнизон [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] и [Select_CString(your_courtier.IsFemale, 'показала', 'показал' )] [your_heir.GetHerHim], на что способны мои [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n\nК сожалению, всё пошло не так. [your_heir.Custom('GetLassLad')] [Select_CString(your_heir.IsFemale, 'была', 'был' )] больше [Select_CString(your_heir.IsFemale, 'озабочена', 'озабочен' )] тем, чтобы доказать свою состоятельность, чем заниматься реальным обучением, и они не поладили. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] [Select_CString(your_courtier.IsFemale, 'сочла', 'счёл' )] [your_heir.GetHerHis] манеры оскорбительными, и их споры закончились тем, что [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'вызвала', 'вызвал' )] [your_courtier.GetHerHis] на поединок.\n\n"
 lmf_heir.1665.desc.child: "Похоже, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] сначала [Select_CString(your_courtier.IsFemale, 'отказалась', 'отказался' )] сражаться с ребёнком... но из-за этого [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'оскорбилась', 'оскорбился' )] до такой степени, что [your_heir.Custom('GetLassLad')] [Select_CString(your_heir.IsFemale, 'выхватила', 'выхватил' )] свой клинок и [Select_CString(your_heir.IsFemale, 'атаковала', 'атаковал' )], после чего поединок стал неизбежным. "
 lmf_heir.1665.desc.adult: "Похоже, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] сначала [Select_CString(your_courtier.IsFemale, 'отказалась', 'отказался' )], так как [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'была моей гостьей', 'был моим гостем' )], но [your_heir.Custom('GetLassLad')] [Select_CString(your_heir.IsFemale, 'вынудила', 'вынудил' )] принять вызов, выхватив свой клинок и атаковав, после чего поединок стал неизбежным. "
 lmf_heir.1665.desc.end: "Чем бы это ни закончилось, вся эта история - полный провал."
 lmf_heir.1665.a: "Будем надеяться, что на этом всё закончилось."
 dueled_during_heir_training: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вызвали', Select_CString(TARGET_CHARACTER.IsFemale, 'вызвала', 'вызвал' ))] [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] на поединок после того, как [Select_CString( CHARACTER.IsLocalPlayer, 'вы провели', Select_CString(CHARACTER.IsFemale, 'она провела', 'он провёл' ))] время, обучая [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вас', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))] как [Select_CString(TARGET_CHARACTER.IsFemale, 'наследницу', 'наследника' )]."
 dueled_during_heir_training_corresponding: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'вызвали', Select_CString(CHARACTER.IsFemale, 'вызвала', 'вызвал' ))] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] на поединок после того, как [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вы провели', Select_CString(TARGET_CHARACTER.IsFemale, 'она провела', 'он провёл' ))] время, обучая [Select_CString( CHARACTER.IsLocalPlayer, 'вас', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] как [Select_CString(CHARACTER.IsFemale, 'наследницу', 'наследника' )]."
 lmf_heir.1665.a.courtier.severe.tt: "[your_courtier.GetTitledFirstNameNoTooltip] выигрывает поединок и серьёзно ранит персонажа [your_heir.GetTitledFirstNameNoTooltip]"
 lmf_heir.1665.a.courtier.win.tt: "[your_courtier.GetTitledFirstNameNoTooltip] выигрывает поединок против персонажа [your_heir.GetTitledFirstNameNoTooltip]"
 lmf_heir.1665.a.heir.severe.tt: "[your_heir.GetTitledFirstNameNoTooltip] выигрывает поединок и серьёзно ранит персонажа [your_courtier.GetTitledFirstNameNoTooltip]"
 lmf_heir.1665.a.heir.win.tt: "[your_heir.GetTitledFirstNameNoTooltip] выигрывает поединок против персонажа [your_courtier.GetTitledFirstNameNoTooltip]"
 lmf_heir.1665.heir.duel.title: "[your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'ранена', 'ранен' )] в поединке"
 lmf_heir.1665.heir.severe.duel.desc: "[ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] [Select_CString(heir_visit_target.IsLocalPlayer, '', 'персонажа ' )][heir_visit_target.GetShortUINamePossessive][Select_CString(heir_visit_target.IsLocalPlayer, 'его персонажа', '' )] [your_courtier.GetShortUINameNoFormat] [Select_CString( your_courtier.IsLocalPlayer, 'наносите', 'наносит')] серьёзное ранение [Select_CString(your_heir.IsLocalPlayer, '', 'персонажу ' )][your_heir.GetShortUINamePossessive][Select_CString(your_heir.IsLocalPlayer, 'ему персонажу', '' )] после вызова на поединок и поражения."
 lmf_heir.1665.heir.duel.desc: "[ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] [Select_CString(heir_visit_target.IsLocalPlayer, '', 'персонажа ' )][heir_visit_target.GetShortUINamePossessive][Select_CString(heir_visit_target.IsLocalPlayer, 'его персонажа', '' )] [your_courtier.GetShortUINameNoFormat] [Select_CString( your_courtier.IsLocalPlayer, 'наносите', 'наносит')] ранение [Select_CString(your_heir.IsLocalPlayer, '', 'персонажу ' )][your_heir.GetShortUINamePossessive][Select_CString(your_heir.IsLocalPlayer, 'ему персонажу', '' )] после вызова на поединок и поражения."

 lmf_heir.1666.t: "[Select_CString(your_heir.IsFemale, 'Хитрая наследница', 'Хитрый наследник' )]"
 lmf_heir.1666.desc.away: "Так как меня не было во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], "
 lmf_heir.1666.desc.busy: "Так как я [Select_CString(ROOT.Char.IsFemale, 'была занята', 'был занят' )] другими делами, "
 lmf_heir.1666.desc.train: "Я [Select_CString(ROOT.Char.IsFemale, 'ожидала', 'ожидал' )], что [your_heir.GetSheHe] проведёт это время со мной, но вместо этого "
 lmf_heir.1666.desc.notrain: "Мне сообщили, что "
 lmf_heir.1666.desc: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору [Select_CString(your_heir.IsFemale, 'провела', 'провёл' )] последние несколько недель, стараясь быть [Select_CString(your_heir.IsFemale, 'незаметной', 'незаметным' )]. Не отсутствуя в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], а скорее... скрываясь.\n\nПохоже, [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'подходила', 'подходил' )] к некоторым слугам и [Select_CString(your_heir.IsFemale, 'вела', 'вёл' )] разговоры, которые лучше всего охарактеризовать как «зондирующие». [your_heir.GetSheHe|U] также [Select_CString(your_heir.IsFemale, 'рыскала', 'рыскал' )] по коридорам [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], иногда [Select_CString(your_heir.IsFemale, 'замечена', 'замечен' )] в неожиданных местах, но никогда подозрительным образом. Если бы я не [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал' )] лучше, я бы [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )], что [your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'пыталась', 'пытался' )] выведать секреты либо обо мне, либо о моём дворе.\n\n[Select_CString(your_heir.IsFemale, 'Нашла', 'Нашёл' )] ли [your_heir.GetSheHe] что-нибудь? Понятия не имею, как и не знаю, собирается ли [your_heir.GetSheHe] раскрыть что-либо, чтобы [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )] [Select_CString(heir_liege.IsFemale, 'узнала', 'узнал' )] об этом.\n\n[your_heir.GetSheHe|U] довольно [Select_CString(your_heir.IsFemale, 'умна', 'умён' )]... и более [Select_CString(your_heir.IsFemale, 'осторожна', 'осторожен' )], чем я [Select_CString(ROOT.Char.IsFemale, 'предполагала', 'предполагал' )]."
 lmf_heir.1666.a: "Мне стоит беспокоиться?"

 lmf_heir.1667.t: "[Select_CString(your_heir.IsFemale, 'Неосторожная наследница', 'Неосторожный наследник' )]"
 lmf_heir.1667.desc: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, [Select_CString(your_heir.IsFemale, 'провела', 'провёл' )] последние несколько недель, стараясь быть [Select_CString(your_heir.IsFemale, 'незаметной', 'незаметным' )]. Не отсутствуя в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], а скорее... скрываясь.\n\nПохоже, [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'подходила', 'подходил' )] к некоторым слугам и [Select_CString(your_heir.IsFemale, 'вела', 'вёл' )] разговоры, которые лучше всего охарактеризовать как «зондирующие», и [your_heir.GetSheHe] также [Select_CString(your_heir.IsFemale, 'рыскала', 'рыскал' )] по коридорам [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')]. Я знаю это, потому что [your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'была поймана', 'был пойман' )]. Несколько раз. Дело дошло до того, что [your_heir.GetHerHis] попросили держаться подальше от определенных частей [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], а слугам запретили разговаривать с [Select_CString(your_heir.IsFemale, 'ней', 'ним' )].\n\nЕсли [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'пыталась', 'пытался' )] выведать секреты, то [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'делала', 'делал' )] это гораздо более неуклюже, чем я [Select_CString(ROOT.Char.IsFemale, 'ожидала', 'ожидал' )] от н[your_heir.GetHerHis]."
 lmf_heir.1667.a: "И это благодарность за то, что я [Select_CString(ROOT.Char.IsFemale, 'приняла', 'принял' )] [your_heir.GetHerHis]?"
 heir_digging_up_secrets: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'были оскорблены', Select_CString(CHARACTER.IsFemale, 'была оскорблена', 'был оскорблён' ))] неуклюжими попытками [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] выведать [Select_CString( CHARACTER.IsLocalPlayer, 'ваши', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] секреты."
 heir_digging_up_secrets_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'были оскорблены', Select_CString(TARGET_CHARACTER.IsFemale, 'была оскорблена', 'был оскорблён' ))] неуклюжими попытками [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] выведать [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'ваши', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))] секреты."

 lmf_heir.1668.t: "Книжный червь"
 lmf_heir.1668.desc.start: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, [Select_CString(your_heir.IsFemale, 'провела', 'провёл' )] большую часть последних недель, прячась в библиотеке [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')].\n\nНу, возможно, «прячась» - не совсем верное слово. [your_heir.Custom('polite_gender_ref')] мало с кем [Select_CString(your_heir.IsFemale, 'общалась', 'общался' )], и всякий раз, когда слуга [Select_CString(ROOT.Char.IsFemale, 'проверяла', 'проверял' )] [your_heir.GetHerHis], [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'была', 'был' )] почти всегда глубоко [Select_CString(your_heir.IsFemale, 'погружена', 'погружён' )] в какой-нибудь пыльный фолиант.\n\n"
 lmf_heir.1668.desc.well: "Могу предположить, что книги, доступные здесь во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], намного превосходят те, что есть в библиотеках владения [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip], так как я [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )], что [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'была довольна', 'был доволен' )] всем, что [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'нашла', 'нашёл' )]. Похоже, [your_heir.GetSheHe] многому [Select_CString(your_heir.IsFemale, 'научилась', 'научился' )]... а это всё, чего можно желать, верно?"
 lmf_heir.1668.desc.poorly: "Не знаю, почему [your_heir.GetSheHe] не [Select_CString(your_heir.IsFemale, 'подождала', 'подождал' )], пока [your_heir.GetSheHe] вернётся во владение [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip], если всё, что [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'хотела', 'хотел' )] делать, это читать. [your_heir.GetSheHe|U] явно не [Select_CString(your_heir.IsFemale, 'нашла', 'нашёл' )] здесь ничего стоящего чтения, и я понимаю, что [your_heir.GetSheHe] в конце концов [Select_CString(your_heir.IsFemale, 'сдалась и покинула', 'сдался и покинул' )] библиотеку в разочаровании. Возможно, это к лучшему, ведь [your_heir.GetHerHim] есть чем заняться, верно?"
 lmf_heir.1668.a: "[Select_CString(ROOT.Char.IsFemale, 'Рада', 'Рад' )], что наши тексты соответствовали [your_heir.GetHerHis] стандартам."
 lmf_heir.1668.b: "Возможно, [your_heir.GetSheHe] сосредоточится на обучении через практику?"

 lmf_heir.1669.t: "[Select_CString(your_heir.IsFemale, 'Популярная наследница', 'Популярный наследник' )]"
 lmf_heir.1669.desc.impressive: "Полагаю, меня не должно удивлять, учитывая, [Select_CString(your_heir.IsFemale, 'какой впечатляющей', 'каким впечатляющим' )] [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'была', 'был' )] изначально, но "
 lmf_heir.1669.desc.unpleasant: "Это несколько удивительно, учитывая, [Select_CString(your_heir.IsFemale, 'какой неприятной', 'каким неприятным' )] [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'казалась', 'казался' )] изначально, но "
 lmf_heir.1669.desc.trouble: "Это несколько удивительно, учитывая, что я [Select_CString(ROOT.Char.IsFemale, 'предполагала', 'предполагал' )], будто [your_heir.GetSheHe] принесёт больше проблем, чем пользы, но "
 lmf_heir.1669.desc.dutiful: "Это несколько удивительно, учитывая, что [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'казалась', 'казался' )] скорее [Select_CString(your_heir.IsFemale, 'тихой и сдержанной', 'тихим и сдержанным' )], но "
 lmf_heir.1669.desc.homesick: "Похоже, [your_heir.GetSheHe] наконец [Select_CString(your_heir.IsFemale, 'преодолела', 'преодолел' )] свою тоску по дому, так как "
 lmf_heir.1669.desc.avoid: "Похоже, [your_heir.GetSheHe] наконец [Select_CString(your_heir.IsFemale, 'сблизилась', 'сблизился' )] с местными, так как "
 lmf_heir.1669.desc: "мне сообщили, что [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, [Select_CString(your_heir.IsFemale, 'стала', 'стал' )] популярной фигурой в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')].\n\nКаждый день [your_heir.GetTitledFirstNameNoTooltip] приветствует слуг и затем делает всё возможное, чтобы участвовать в придворных делах, даже в тех, которых я обычно не [Select_CString(ROOT.Char.IsFemale, 'ожидала', 'ожидал' )] бы от благородной особы. Работа на кухне? Беседы со стражниками? Выполнение поручений моих управителей? [your_heir.GetSheHe|U] делает это охотно, при этом не мешая.\n\nДействительно замечательно."
 lmf_heir.1669.a: "Какое приятное развитие событий."

 lmf_heir.1670.t: "[Select_CString(your_heir.IsFemale, 'Надоедливая наследница', 'Надоедливый наследник' )]"
 lmf_heir.1670.desc.impressive: "Это несколько удивительно, учитывая, [Select_CString(your_heir.IsFemale, 'какой впечатляющей', 'каким впечатляющим' )] [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'была', 'был' )] изначально, но "
 lmf_heir.1670.desc.unpleasant: "Полагаю, меня не должно удивлять, учитывая, [Select_CString(your_heir.IsFemale, 'какой неприятной', 'каким неприятным' )] [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'казалась', 'казался' )] изначально, но "
 lmf_heir.1670.desc.trouble: "Моё первоначальное предположение, что [your_heir.GetSheHe] будет лишь проблемой, пока подтверждается, так как "
 lmf_heir.1670.desc.dutiful: "Это несколько удивительно, учитывая, [Select_CString(your_heir.IsFemale, 'какой исполнительной', 'каким исполнительным' )] [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'казалась', 'казался' )] изначально, но "
 lmf_heir.1670.desc.homesick: "Похоже, [your_heir.GetSheHe] так и не [Select_CString(your_heir.IsFemale, 'преодолела', 'преодолел' )] свою тоску по дому, так как "
 lmf_heir.1670.desc.avoid: "Полагаю, меня не должно удивлять, учитывая, [Select_CString(your_heir.IsFemale, 'какой необщительной', 'каким необщительным' )] [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'была', 'был' )] изначально, но "
 lmf_heir.1670.desc: "мне сообщили, что [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, [Select_CString(your_heir.IsFemale, 'стала', 'стал' )] источником неприятностей в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')].\n\nПохоже, [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'пыталась', 'пытался' )] втереться в доверие к членам моего двора, но когда это не удалось, [your_heir.GetSheHe] стал[Select_CString(your_heir.IsFemale, 'угрюмой и начала', 'угрюмым и начал' )] бродить без дела. Некоторые слуги пытались занять [your_heir.GetHerHis] работой, но ничто не было достаточно «достойным», и я [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )] много жалоб на то, как [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'вмешивалась', 'вмешивался' )] в дела, в которых [your_heir.GetSheHe] мало понимает, и поэтому постоянно мешает.\n\nБольшинство слуг теперь полностью избегают [your_heir.GetHerHis]. Как утомительно."
 lmf_heir.1670.a: "Нехороший знак."

 lmf_heir.1671.t: "[Select_CString(your_heir.IsFemale, 'Трудолюбивая наследница', 'Трудолюбивый наследник' )]"
 lmf_heir.1671.desc.start: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, несколько недель назад [Select_CString(your_heir.IsFemale, 'вызвалась', 'вызвался' )] помочь со строительным проектом за пределами [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')]. Полагаю, это для того, чтобы получить опыт в том, как управляют такими проектами и какую пользу они приносят державе.\n\n"
 lmf_heir.1671.desc.well: "Как выяснилось, все прошло лучше, чем кто-либо мог ожидать. [your_heir.GetTitledFirstNameNoTooltip] не [Select_CString(your_heir.IsFemale, 'пыталась', 'пытался' )] захватить управление проектом. Вместо этого [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'училась', 'учился' )] у бригадира тому, что [Select_CString(your_heir.IsFemale, 'могла', 'мог' )], и действительно [Select_CString(your_heir.IsFemale, 'помогала', 'помогал' )] рабочим. Все, кто возвращался в [ROOT.Char.Custom('FortifiedBuilding')], потом отмечали, насколько [your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'была полезна', 'был полезен' )] и как [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'казалась', 'казался' )] искренне [Select_CString(your_heir.IsFemale, 'заинтересованной', 'заинтересованным' )] в понимании их работы.\n\nЧестно говоря, неожиданный, но приятный результат."
 lmf_heir.1671.desc.poorly: "Были сомнения в том, насколько [your_heir.GetTitledFirstNameNoTooltip] вообще может быть [Select_CString(your_heir.IsFemale, 'полезна', 'полезен' )]... и, как выяснилось, эти опасения были обоснованы. Бригадир позже признался мне, что [your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'была', 'был' )] в лучшем случае [Select_CString(your_heir.IsFemale, 'раздражительницей', 'раздражителем' )], а часто и прямой помехой. [your_heir.GetSheHe|U] постоянно [Select_CString(your_heir.IsFemale, 'жаловалась', 'жаловался' )] на труд, явно [Select_CString(your_heir.IsFemale, 'считала', 'считал' )] себя выше рабочих и многократно [Select_CString(your_heir.IsFemale, 'пыталась', 'пытался' )] захватить управление проектом, явно ничего о нём не зная.\n\nЧестно говоря, ожидаемый, но всё же разочаровывающий результат."
 lmf_heir.1671.a: "Кто бы мог подумать, что в [Select_CString(your_heir.IsFemale, 'ней', 'нём' )] есть такой потенциал?"
 lmf_heir.1671.b: "Возможно, [your_heir.GetHerHim] стоило остаться в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')]."

 lmf_heir.1672.t: "Неприятный инцидент"
 lmf_heir.1672.desc: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, и [Select_CString(your_courtier.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )] провели большую часть последних недель в компании. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] [Select_CString(your_courtier.IsFemale, 'приложила', 'приложил' )] немало усилий, чтобы [your_heir.GetTitledFirstNameNoTooltip] лучше [Select_CString(your_heir.IsFemale, 'справилась', 'справился' )] с обучением.\n\nКак выяснилось, хуже быть не могло. Хотя пара сначала ладила, они поссорились... что привело к скрытому недовольству, пока, наконец, [your_heir.GetTitledFirstNameNoTooltip] не [Select_CString(your_heir.IsFemale, 'выплеснула', 'выплеснул' )] своё негодование, пока [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] [Select_CString(your_courtier.IsFemale, 'стояла', 'стоял' )] на дворе. Были сказаны слова, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] [Select_CString(your_courtier.IsFemale, 'была', 'был' )] невероятно [Select_CString(your_courtier.IsFemale, 'унижена', 'унижен' )], и никто не собирается прощать другого.\n\nТак что [your_heir.Custom('polite_gender_ref')] не только почти не [Select_CString(your_heir.IsFemale, 'продвинулась', 'продвинулся' )] в обучении, ради чего [Select_CString(your_heir.IsFemale, 'приехала', 'приехал' )] сюда, но и [Select_CString(your_heir.IsFemale, 'приобрела', 'приобрёл' )] нового врага среди членов моего двора."
 lmf_heir.1672.a: "Отличная работа, [your_heir.Custom('GetLassLad')]."
 fight_during_heir_training: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] непростительно [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'оскорбили', Select_CString(TARGET_CHARACTER.IsFemale, 'оскорбила', 'оскорбил' ))] [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] при дворе во время визита."
 fight_during_heir_training_corresponding: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] непростительно [Select_CString( CHARACTER.IsLocalPlayer, 'оскорбили', Select_CString(CHARACTER.IsFemale, 'оскорбила', 'оскорбил' ))] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] при дворе во время визита."

 lmf_heir.1673.t: "Новые друзья"
 lmf_heir.1673.desc: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, и [Select_CString(your_courtier.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )] провели большую часть последних недель в компании. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] [Select_CString(your_courtier.IsFemale, 'приложила', 'приложил' )] немало усилий, чтобы [your_heir.GetTitledFirstNameNoTooltip] лучше [Select_CString(your_heir.IsFemale, 'справилась', 'справился' )] с обучением.\n\nЧто ж, они не могли поладить лучше. Вскоре [your_heir.GetTitledFirstNameNoTooltip] и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] стали практически неразлучны. Они вместе ходили по коридорам [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], смеялись и общались, пока [Select_CString(your_courtier.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )] [Select_CString(your_courtier.IsFemale, 'показывала', 'показывал' )] [your_heir.GetHerHim] внутреннее убранство владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] и, вероятно, [Select_CString(your_courtier.IsFemale, 'дала', 'дал' )] [your_heir.GetHerHim] лучшее образование, чем я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы.\n\nОни всё ещё неразлучны при дворе, что заставляет думать, что их дружба не будет кратковременной."
 lmf_heir.1673.a: "Потрясающе!"
 befriended_during_heir_training: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] сблизились во время того, как [Select_CString( CHARACTER.IsLocalPlayer, 'вы обучали', Select_CString(CHARACTER.IsFemale, 'она обучала', 'он обучал' ))] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вас', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))] во время визита."
 befriended_during_heir_training_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [CHARACTER.GetShortUINameNoTooltipNoFormat] сблизились во время того, как [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вы обучали', Select_CString(TARGET_CHARACTER.IsFemale, 'она обучала', 'он обучал' ))] [Select_CString( CHARACTER.IsLocalPlayer, 'вас', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] во время визита."

 lmf_heir.1674.t: "Новые друзья?"
 lmf_heir.1674.desc.start: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, и [Select_CString(your_courtier.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )] провели большую часть последних недель в компании. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] [Select_CString(your_courtier.IsFemale, 'приложила', 'приложил' )] немало усилий, чтобы [your_heir.GetTitledFirstNameNoTooltip] лучше [Select_CString(your_heir.IsFemale, 'справилась', 'справился' )] с обучением.\n\n"
 lmf_heir.1674.desc.adult: "Что ж, они не могли поладить лучше. Вскоре [your_heir.GetTitledFirstNameNoTooltip] и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] стали практически неразлучны. Они вместе ходили по коридорам [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], смеялись и общались, пока [Select_CString(your_courtier.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )] [Select_CString(your_courtier.IsFemale, 'показывала', 'показывал' )] [your_heir.GetHerHim] внутреннее убранство владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nПри дворе шептались, что, возможно, они стали чем-то большим, чем просто друзьями? Но, конечно, это были просто сплетни."
 lmf_heir.1674.desc.bothchild: "Что ж, они не могли поладить лучше. Вскоре [your_heir.GetTitledFirstNameNoTooltip] и [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] стали практически неразлучны. Они вместе ходили по коридорам [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], смеялись и общались, пока [Select_CString(your_courtier.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )] [Select_CString(your_courtier.IsFemale, 'показывала', 'показывал' )] [your_heir.GetHerHim] внутреннее убранство владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nПри дворе шептались, что, возможно, они стали чем-то большим, чем просто друзьями, но они всего лишь дети. В лучшем случае, это детская влюблённость, а всё остальное - праздные сплетни."
 lmf_heir.1674.desc.child: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] позже [Select_CString(your_courtier.IsFemale, 'рассказала', 'рассказал' )] мне, что, хотя обучение прошло хорошо и [your_courtier.GetSheHe] [Select_CString(your_courtier.IsFemale, 'старалась', 'старался' )] показать [your_heir.GetHerHim] внутреннее убранство владения [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [your_courtier.GetSheHe] не [Select_CString(your_courtier.IsFemale, 'могла', 'мог' )] избавиться от чувства, что [your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'влюбилась', 'влюбился' )] в н[your_courtier.GetHerHis]. [your_courtier.GetSheHe|U] и [your_heir.GetTitledFirstNameNoTooltip] относятся друг к другу хорошо и [your_courtier.GetSheHe] [Select_CString(your_courtier.IsFemale, 'польщена', 'польщён' )] [your_heir.GetHerHis] вниманием, но, естественно, [your_heir.GetSheHe] всё ещё ребенок.\n\nЭто вполне естественно, и я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что [your_heir.Custom('polite_gender_ref')] это перерастёт."
 lmf_heir.1674.a: "Мне не о чем беспокоиться, верно?"
 lmf_heir.1674.b: "Ах, юная любовь."
 fell_in_love_heir_training: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'влюбились', Select_CString(CHARACTER.IsFemale, 'влюбилась', 'влюбился' ))] в [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] во время обучения у [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вас', Select_CString(TARGET_CHARACTER.IsFemale, 'неё', 'него' ))]."
 fell_in_love_heir_training_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'влюбились', Select_CString(TARGET_CHARACTER.IsFemale, 'влюбилась', 'влюбился' ))] в [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] во время обучения у [Select_CString( CHARACTER.IsLocalPlayer, 'вас', Select_CString(CHARACTER.IsFemale, 'неё', 'него' ))]."
 crushed_heir_training: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'увлеклись', Select_CString(CHARACTER.IsFemale, 'увлеклась', 'увлёкся' ))] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажем ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'им персонажем', '' )] во время визита в замок."
 crushed_heir_training_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'увлеклись', Select_CString(TARGET_CHARACTER.IsFemale, 'увлеклась', 'увлёкся' ))] [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажем ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'им персонажем', '' )] во время визита в замок."

 lmf_heir.1675.t: "На охоте"
 lmf_heir.1675.desc.invite: "Я был [Select_CString(ROOT.Char.IsFemale, 'довольна', 'доволен' )], когда [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, [Select_CString(your_heir.IsFemale, 'пригласила', 'пригласил' )] меня присоединиться к н[your_heir.GetHerHim] на охоте в ближайшем лесу. Я не [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал' )], сколько пользы для обучения получит [your_heir.Custom('polite_gender_ref')], но с нами двумя и несколькими слугами поездка казалась возможностью лучше узнать друг друга.\n\n"
 lmf_heir.1675.desc.invite.poorly: "Что ж, так и вышло, но результат был плохим. Почти сразу пошел дождь, и [your_heir.GetTitledFirstNameNoTooltip] постоянно [Select_CString(your_heir.IsFemale, 'жаловалась', 'жаловался' )]... особенно когда мы с трудом находили дичь. Когда мы наконец нашли, [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'промахнулась', 'промахнулся' )] по зверю и затем осмелился обвинить #EMP меня#! в том, что я [Select_CString(ROOT.Char.IsFemale, 'отвлекла', 'отвлёк' )] [your_heir.GetHerHis]!\n\nПосле еще почти недели терпения [your_heir.GetHerHis] постоянного нытья, я [Select_CString(ROOT.Char.IsFemale, 'была рада', 'был рад' )] вернуться в [ROOT.Char.Custom('FortifiedBuilding')] и оставить [your_heir.GetHerHis] в лесу, где [your_heir.GetTitledFirstNameNoTooltip] и [Select_CString(your_heir.IsFemale, 'находилась', 'находился' )]."
 lmf_heir.1675.desc.invite.well: "Так и вышло. [your_heir.GetTitledFirstNameNoTooltip] и я провели несколько прекрасных вечеров в беседах у костра, и [your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'получила', 'получил' )] от меня совет по аспектам правления, о которых я иначе не [Select_CString(ROOT.Char.IsFemale, 'подумала', 'подумал' )] бы. Нам удалось найти дичь, и я с удовольствием [Select_CString(ROOT.Char.IsFemale, 'отметила', 'отметил' )], [Select_CString(your_heir.IsFemale, 'какой приятной компаньонкой', 'каким приятным компаньоном' )] [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'была', 'был' )].\n\nК тому времени, когда мы вернулись в [ROOT.Char.Custom('FortifiedBuilding')], мне было почти жаль, что это закончилось."
 lmf_heir.1675.desc.start: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, [Select_CString(your_heir.IsFemale, 'отправилась', 'отправился' )] на охоту в небольшой лес возле владения [ROOT.Char.Custom('FortifiedBuilding')], взяв с собой лишь нескольких слуг. Я не [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал' )], что скажет [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )] о таком развлечении, ведь это вряд ли похоже на обучение, ради которого [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'приехала', 'приехал' )] сюда, но возможно [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'нуждалась', 'нуждался' )] в перерыве?\n\n"
 lmf_heir.1675.desc.poorly: "Увы, не думаю, что [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'получила', 'получил' )] его. Дождь лил большую часть недели, пока [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'отсутствовала', 'отсутствовал' )], и [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'вернулась', 'вернулся' )] с пустыми руками и в отчаянии. По крайней мере [your_heir.GetSheHe] не [Select_CString(your_heir.IsFemale, 'была изувечена', 'был изувечен' )] диким зверем. Что бы [Select_CString(heir_liege.IsFemale, 'сказала', 'сказал' )] [heir_liege.GetTitledFirstNameNoTooltip]?"
 lmf_heir.1675.desc.well: "К счастью, похоже, [your_heir.GetHerHis] поездка прошла хорошо. Погода была хорошей, и когда [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'вернулась', 'вернулся' )] через несколько недель, то с мехами в руках и широкой улыбкой на [your_heir.GetHerHis] лице."
 lmf_heir.1675.desc.notrain: "Я понимаю, что [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, [Select_CString(heir_liege.IsFemale, 'провела', 'провёл' )] большую часть своего времени во владении [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], занимаясь охотой в ближайших лесах. [your_heir.GetSheHe|U] [Select_CString(your_heir.IsFemale, 'могла', 'мог' )] бы сделать то же самое во владении [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip], полагаю, но поскольку я не [Select_CString(ROOT.Char.IsFemale, 'пустила', 'пустил' )] [your_heir.GetHerHis] в [ROOT.Char.Custom('FortifiedBuilding')], [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'была вынуждена', 'был вынужден' )] искать развлечения в другом месте.\n\n"
 lmf_heir.1675.desc.notrain.poorly: "К сожалению, мне сообщили, что поездка прошла плохо. Погода была ужасной, дичи мало, и в какой-то момент [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'получила', 'получил' )] серьезные травмы, упав в грязный овраг без помощи. Похоже, [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'пробыла', 'пробыл' )] там несколько дней!\n\nНадеюсь, [your_heir.GetSheHe] не будет винить меня за неудачную поездку."
 lmf_heir.1675.desc.notrain.well: "По крайней мере, поездка прошла хорошо, как мне сказали. Погода была хорошей, и когда [your_heir.GetTitledFirstNameNoTooltip] наконец [Select_CString(your_heir.IsFemale, 'вернулась', 'вернулся' )], то привез кучу мехов с глупой улыбкой на лице.\n\nВозможно, [your_heir.GetSheHe] посчитает отличную охоту достойной компенсацией за отсутствие обучения? Можно только надеяться."
 lmf_heir.1675.a: "Какое прекрасное время!"
 lmf_heir.1675.b: "[Select_CString(ROOT.Char.IsFemale, 'Рада', 'Рад' )], что [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'насладилась', 'насладился' )]."
 lmf_heir.1675.c: "Какой ужасный опыт для нас обоих."
 lmf_heir.1675.d: "Какая досада."
 excellent_hunting_trip: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] сблизились во время совместной охоты в ближайшем лесу."
 excellent_hunting_trip_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [CHARACTER.GetShortUINameNoTooltipNoFormat] сблизились во время совместной охоты в ближайшем лесу."
