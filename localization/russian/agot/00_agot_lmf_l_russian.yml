 lmf_interaction.1200.desc.mid: "и пора положить этому конец ради чести семьи.\n\nОстаётся вопрос: потребовать ли прекратить связь только с [Select_CString(recipient.IsFemale, 'одним', 'одной' )] или приказать, чтобы [recipient.GetFirstNameNoTooltip] немедленно [Select_CString(recipient.IsFemale, 'порвала', 'порвал' )] "
