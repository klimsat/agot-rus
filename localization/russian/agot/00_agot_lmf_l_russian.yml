 confront_about_lover_multi_tt: "Вы и [Select_CString(recipient.IsFemale, 'ваша', 'ваш' )] [actor.Custom2('LMF_RelationToMe', SCOPE.sC('recipient'))] поговорите об одном из [recipient.GetHerHis] любовников или потребуете, чтобы [recipient.GetSheHe] [Select_CString(recipient.IsFemale, 'прекратила', 'прекратил' )] отношения со всеми."
