 confront_about_lover_interaction_many_desc: "Поговорить с персонажем [recipient.GetShortUIName|U] о [recipient.GetHerHis] любовниках."
 confront_about_lover_interaction_marry_desc: "Поговорить с персонажем [recipient.GetShortUIName|U] о [recipient.GetHerHis] любовнике, потребовав либо прекратить отношения, либо узаконить их."
