 action_invite_spouse_ruler: "Вы должны пригласить свою [Concept('spouse', 'вторую половинку')|E] в гости"
 action_invite_spouse_ruler_label: "@lover_icon! Вы должны пригласить свою [Concept('spouse', 'вторую половинку')|E] в гости"
 action_invite_spouse_ruler_desc: "Поскольку у вас и вашей второй половинки разные дворы, вы должны находить время для встреч, если хотите иметь детей."
