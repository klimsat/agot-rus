 disastrous_hunting_trip_corresponding: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'действовали', Select_CString(CHARACTER.IsFemale, 'действовала', 'действовал' ))] на нервы [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] во время катастрофической совместной охоты."

 lmf_heir.1676.t: "[Select_CString(your_heir.IsFemale, 'Путешествующая наследница', 'Путешествующий наследник' )]"
 lmf_heir.1676.train: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, [Select_CString(your_heir.IsFemale, 'провела', 'провёл' )] последние несколько недель "
 lmf_heir.1676.notrain: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, [Select_CString(your_heir.IsFemale, 'провела', 'провёл' )] последние несколько месяцев "
 lmf_heir.1676.desc.begin: "путешествуя по владению [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], посещая местные деревни и [ROOT.Char.GetCapitalLocation.GetCounty.GetFaith.HouseOfWorshipPlural|l] и знакомясь с народом. Похвальное усилие, по правде говоря.\n\n"
 lmf_heir.1676.desc.poorly: "К сожалению, не думаю, что всё прошло так хорошо, как [Select_CString(your_heir.IsFemale, 'надеялась', 'надеялся' )] [your_heir.GetTitledFirstNameNoTooltip]. Погода была плохой, поэтому [your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'просидела', 'просидел' )] половину поездки в убогой [ROOT.Char.GetCapitalLocation.GetCounty.GetCulture.GetCollectiveNounNoTooltip]ой ферме без дела. Затем, позже, [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'была ограблена', 'был ограблен' )] разбойниками... хотя [your_heir.GetSheHe] отказывается комментировать это.\n\nБудем надеяться, что [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'извлекла', 'извлёк' )] что-то поучительное из всего этого?"
 lmf_heir.1676.desc.well: "Насколько я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], поездка прошла довольно хорошо. Погода была лучше ожидаемой, поэтому [your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'объехала', 'объехал' )] половину графства. Все - от исторических достопримечательностей до строительных проектов и старых кладбищ - было посещено... Честно говоря, не думаю, что #EMP я#! [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )] всё владение [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip].\n\n[your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'вернулась', 'вернулся' )] в [ROOT.Char.Custom('FortifiedBuilding')] в хорошем настроении, так что будем надеяться, что поездка дала [your_heir.GetHerHim] образование, на которое [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'надеялась', 'надеялся' )]?"
 lmf_heir.1676.a: "Потрясающе!"
 lmf_heir.1676.b: "Нельзя получить всё сразу, верно?"

 lmf_heir.1677.t: "[Select_CString(your_heir.IsFemale, 'Пирующая наследница', 'Пирующий наследник' )]"
 lmf_heir.1677.desc.castle: "Видимо, нуждаясь в перерыве от стен [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], "
 lmf_heir.1677.desc.away: "Всё ещё предпочитая не приходить в [ROOT.Char.Custom('FortifiedBuilding')], "
 lmf_heir.1677.desc.none: "Вместо того чтобы проводить время в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], "
 lmf_heir.1677.desc.invite: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, [Select_CString(your_heir.IsFemale, 'попросила', 'попросил' )] меня присоединиться к н[your_heir.GetHerHim] в походе в популярную таверну в городке неподалеку. Сначала я не [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )] идти, но потом [Select_CString(ROOT.Char.IsFemale, 'подумала', 'подумал' )], с какими неприятностями может столкнуться [Select_CString(your_heir.IsFemale, 'такая', 'такой' )] [your_heir.Custom('polite_gender_ref')], как [your_heir.GetTitledFirstNameNoTooltip], общаясь с простолюдинами и [Select_CString(ROOT.Char.IsFemale, 'осознала', 'осознал' )], что мне лучше всего следовать за [Select_CString(your_heir.IsFemale, 'ней', 'ним' )]... с несколькими слугами на поблизости, разумеется.\n\n"
 lmf_heir.1677.desc.invite.poorly: "Как оказалось, мои инстинкты были верны. [your_heir.GetTitledFirstNameNoTooltip] очень [Select_CString(your_heir.IsFemale, 'хотела', 'хотел' )] выпустить пар, теперь, когда [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'вышла', 'вышел' )] из-под бдительного присмотра, который поддерживает [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )], и за ночь так [Select_CString(your_heir.IsFemale, 'напилась', 'напился' )], что едва [Select_CString(your_heir.IsFemale, 'могла', 'мог' )] себя контролировать. [Select_CString(your_heir.IsFemale, 'Она устроила', 'Он устроил' )] драку в таверне, много раз [Select_CString(your_heir.IsFemale, 'оскорбляла', 'оскорблял' )] меня и "
 lmf_heir.1677.desc.invite.well: "Как выяснилось, мне не о чем было беспокоиться. [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'сохранила', 'сохранил' )] самообладание и прекрасно [Select_CString(your_heir.IsFemale, 'провела', 'провёл' )] вечер. Осмелюсь сказать, я тоже. Мы обменялись историями за выпивкой, повели посетителей таверны в песне, и "
 lmf_heir.1677.desc.invite.woman: "Думаю, я даже [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], как одна привлекательная девушка увела [your_heir.GetHerHis] в уединённое место посреди всего этого.\n\n"
 lmf_heir.1677.desc.invite.man: "Думаю, я даже [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], как один видный мужчина увёл [your_heir.GetHerHis] в уединённое место посреди всего этого.\n\n"
 lmf_heir.1677.desc.invite.nosex: "затем [Select_CString(your_heir.IsFemale, 'её', 'его' )] даже стошнило на мои туфли.\n\n"
 lmf_heir.1677.desc.invite.poorly.end: "В целом, хаос с начала до конца. К сожалению, я [Select_CString(ROOT.Char.IsFemale, 'оставила', 'оставил' )] [your_heir.GetHerHis] задолго до окончания вечера."
 lmf_heir.1677.desc.invite.well.end: "В целом, незабываемая ночь для нас обоих. Думаю, мне даже удалось дать [your_heir.GetHerHim] некоторое обучение через эти истории, если можно так сказать."
 lmf_heir.1677.desc.noinvite: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, [Select_CString(your_heir.IsFemale, 'отправилась', 'отправился' )] в город неподалёку, где, как я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], [your_heir.GetSheHe] отлично [Select_CString(your_heir.IsFemale, 'развлекась', 'развлёкся' )] в местной таверне.\n\n"
 lmf_heir.1677.desc.noinvite.poorly: "Похоже, [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'была рада', 'был рад' )] сбросить напряжение, раз уж [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'вырвалась', 'вырвался' )] из-под бдительного взора, который поддерживает [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )], так как истории того вечера впечатляют. Пьянство, потасовка... каким-то образом [your_heir.GetSheHe] даже [Select_CString(your_heir.IsFemale, 'разозлила', 'разозлил' )] посетителей настолько, что [your_heir.GetHerHis] выгнали из города.\n\nПолагаю, это один из способов получить образование, не так ли?"
 lmf_heir.1677.desc.noinvite.well: "Похоже, [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'была рада', 'был рад' )] сбросить напряжение, и веселье продолжалось большую часть следующей недели. Тем не менее, я считаю, что [your_heir.Custom('polite_gender_ref')] в основном [Select_CString(your_heir.IsFemale, 'вела', 'вёл' )] себя прилично. Не было пьяных драк, чрезмерного опьянения, и [your_heir.GetTitledFirstNameNoTooltip] не [Select_CString(your_heir.IsFemale, 'была изгнана', 'был изгнан' )] из города разгневанными жителями. Только чистое веселье и горожане, восхищенные [your_heir.GetHerHis] харизмой и надеющиеся на [your_heir.GetHerHis] возвращение.\n\nНе очень поучительно, на мой взгляд, но полагаю, [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'была рада', 'был рад' )] перерыву."
 lmf_heir.1677.desc.start: "[your_heir.GetHerHis|U] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )] [Select_CString(heir_liege.IsFemale, 'говорила', 'говорил' )] мне, что [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'могла', 'мог' )] использовать предлог «обучения», чтобы уехать из владения [heir_visit_origin.GetCounty.GetTitle.GetNameNoTierNoTooltip]... и похоже, так и есть, так как [your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'провела', 'провёл' )] большую часть последних месяцев, гуляя по тавернам владения [ROOT.Char.GetCapitalLocation.GetCounty.GetCulture.GetNameNoTooltip], и у меня есть подозрение, что было бы то же самое, если бы я [Select_CString(ROOT.Char.IsFemale, 'позволила', 'позволил' )] [your_heir.GetHerHim] прийти в [ROOT.Char.Custom('FortifiedBuilding')].\n\n"
 lmf_heir.1677.desc.poorly: "[Select_CString(ROOT.Char.IsFemale, 'Хотела', 'Хотел' )] бы я сказать, что [your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'провела', 'провёл' )] время лучше, но очевидно, что [your_heir.GetHerHis] гулянки сводились к пьяным дракам, тошноте до тех пор, пока [your_heir.GetSheHe] не [Select_CString(your_heir.IsFemale, 'заползла', 'заполз' )] в сарай на несколько дней, и злости местных жителей из-за больших долгов. Не самые похвальные истории, но похоже, [your_heir.GetSheHe] теперь хотя бы [Select_CString(your_heir.IsFemale, 'выпустила', 'выпустил' )] пар."
 lmf_heir.1677.desc.well: "По всем рассказам, [your_heir.Custom('polite_gender_ref')] прекрасно [Select_CString(your_heir.IsFemale, 'провела', 'провёл' )] время. [your_heir.GetSheHe|U] в целом [Select_CString(your_heir.IsFemale, 'вела', 'вёл' )] себя прилично, и помимо нескольких историй о буйстве, похоже, [Select_CString(your_heir.IsFemale, 'завоевала', 'завоевал' )] симпатии простолюдинов со всего графства. Истории о том, как [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'вела', 'вёл' )] толпу посетителей таверны в песне, довольно примечательны. Теперь веселье подошло к концу, но какое чудесное время это должно было быть для н[your_heir.GetHerHis]!"
 lmf_heir.1677.a: "Какое прекрасное время!"
 lmf_heir.1677.b: "Отличная работа, [your_heir.Custom('GetLassLad')]."
 lmf_heir.1677.c: "Ух, что за представление!"
 lmf_heir.1677.d: "#EMP Это#! [Select_CString(your_heir.IsFemale, 'наследница', 'наследник' )], которую признаёт [heir_liege.GetTitledFirstNameNoTooltip]?"
 excellent_party_with_heir: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] сблизились во время дикой гулянки в таверне."
 excellent_party_with_heir_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] и [CHARACTER.GetShortUINameNoTooltipNoFormat] сблизились во время дикой гулянки в таверне."
 disastrous_party_with_heir: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'испытали', Select_CString(CHARACTER.IsFemale, 'испытала', 'испытал' ))] отвращение к [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажу ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'ему персонажу', '' )] после ночи катастрофической гулянки в таверне."
 disastrous_party_with_heir_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'испытали', Select_CString(TARGET_CHARACTER.IsFemale, 'испытала', 'испытал' ))] отвращение к [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажу ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'ему персонажу', '' )] после ночи катастрофической гулянки в таверне."

 lmf_heir.1678.t: "Безделье"
 lmf_heir.1678.desc.all: "Мне почти трудно поверить, но за месяцы, прошедшие с тех пор, как [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, [Select_CString(your_heir.IsFemale, 'прибыла', 'прибыл' )] во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'занималась', 'занимался' )]... ну, вообще ничем.\n\n"
 lmf_heir.1678.desc.two: "Я не совсем [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], почему, но [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, [Select_CString(your_heir.IsFemale, 'провела', 'провёл' )] много времени в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], занимаясь... ну, вообще ничем.\n\n"
 lmf_heir.1678.desc.one: "Возможно, решив, что [your_heir.GetHerHim] нужен перерыв после предыдущих усилий, [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, [Select_CString(your_heir.IsFemale, 'провела', 'провёл' )] последние недели в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], занимаясь... ну, вообще ничем.\n\n"
 lmf_heir.1678.desc.castle: "[your_heir.GetTitledFirstNameNoTooltip] в основном [Select_CString(your_heir.IsFemale, 'находилась', 'находился' )] в предоставленных [your_heir.GetHerHim] комнатах, читая или делая записи в своём дневнике, или даже расхаживая. [your_heir.GetSheHe|U] [Select_CString(your_heir.IsFemale, 'появилась', 'появился' )] при дворе всего пару раз, и даже тогда [Select_CString(your_heir.IsFemale, 'держалась', 'держался' )] особняком.\n\n"
 lmf_heir.1678.desc.town: "Так как я [Select_CString(ROOT.Char.IsFemale, 'отказалась', 'отказался' )] принять [your_heir.GetHerHis] в стенах [ROOT.Char.Custom('FortifiedBuilding')], [your_heir.GetTitledFirstNameNoTooltip] в основном [Select_CString(your_heir.IsFemale, 'бродила', 'бродил' )] по местным городкам... не пытаясь #EMP что-то#! делать или учиться, а скорее осматривая достопримечательности. Или, по крайней мере, так мне сказали.\n\n"
 lmf_heir.1678.desc.end: "Лень это или просто [your_heir.Custom('polite_gender_ref')], [Select_CString(your_heir.IsFemale, 'благодарная', 'благодарный' )] за время наедине с собой вдали от наблюдающих глаз во владении [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip], я не могу сказать. По крайней мере [your_heir.GetSheHe] не [Select_CString(your_heir.IsFemale, 'создавала', 'создавал' )] проблем."
 lmf_heir.1678.a: "По крайней мере [your_heir.GetSheHe] не #EMP [Select_CString(your_heir.IsFemale, 'моя', 'мой' )]#! [Select_CString(your_heir.IsFemale, 'наследница', 'наследник' )]."

 lmf_heir.1680.t: "[your_heir.GetHerHis|U] путь"
 lmf_heir.1680.desc.notrain: "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] [Select_CString(your_heir.IsFemale, 'которую', 'которого' )] [heir_liege.GetTitledFirstNameNoTooltip] [Select_CString(heir_liege.IsFemale, 'направила', 'направил' )] ко двору, сегодня в последний раз [Select_CString(your_heir.IsFemale, 'пришла', 'пришёл' )] в [ROOT.Char.Custom('FortifiedBuilding')], "
 lmf_heir.1680.desc.notrain.away: "хотя, конечно, меня не было, чтобы проводить [your_heir.GetHerHis].\n\n"
 lmf_heir.1680.desc.notrain.ill: "хотя я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] слишком [Select_CString(ROOT.Char.IsFemale, 'больна', 'болен' )], чтобы спуститься во двор и проводить [your_heir.GetHerHis].\n\n"
 lmf_heir.1680.desc.notrain.busy: "хотя я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] слишком [Select_CString(ROOT.Char.IsFemale, 'занята', 'занят' )], чтобы спуститься во двор и проводить [your_heir.GetHerHis].\n\n"
 lmf_heir.1680.desc.notrain.nomeet.end: "Так что [your_heir.Custom('polite_gender_ref')] сухо [Select_CString(your_heir.IsFemale, 'попрощал', 'попрощался' )] с немногими присутствующими перед началом [your_heir.GetHerHis] пути обратно во владение [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip], где [your_heir.GetHerHis] ждёт [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]. Если [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'была недовольна', 'был недоволен' )] моим решением не принимать [your_heir.GetHerHis] в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')]... что ж, мы никогда не узнаем, не так ли? [your_heir.GetHerHis|U] визит подошёл к концу."
 lmf_heir.1680.desc.notrain.meet: "Поэтому я [Select_CString(ROOT.Char.IsFemale, 'спустилась', 'спустился' )] во двор, чтобы хотя бы проводить [your_heir.GetHerHis].\n\n[your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'была вежлива', 'был вежлив' )], и если [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'была недовольна', 'был недоволен' )] моим решением не принимать [your_heir.GetHerHis] в стенах [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')], [your_heir.GetSheHe] хорошо это [Select_CString(your_heir.IsFemale, 'скрывала', 'скрывал' )].\n\nПосле нескольких кратких любезностей [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'начала', 'начал' )] свой путь обратно во владение [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip], где [your_heir.GetHerHis] ждёт [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]. [your_heir.GetHerHis|U] визит подошёл к концу."
 lmf_heir.1680.desc.train: "Поскольку это был последний вечер, после которого [your_heir.GetTitledFirstNameNoTooltip] покинет владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], в [your_heir.GetHerHis] честь был устроен небольшой обед, "
 lmf_heir.1680.desc.train.away: "хотя меня, к сожалению, там не было.\n\n"
 lmf_heir.1680.desc.train.ill: "хотя, к сожалению, я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] слишком [Select_CString(ROOT.Char.IsFemale, 'больна', 'болен ')], чтобы присутствовать.\n\n"
 lmf_heir.1680.desc.train.busy: "хотя я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] слишком [Select_CString(ROOT.Char.IsFemale, 'занята', 'занят' )] другими делами, чтобы присутствовать.\n\n"
 lmf_heir.1680.desc.train.meet.friend: "и я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] более чем [Select_CString(ROOT.Char.IsFemale, 'рада', 'рад' )] присутствовать и проводить [your_heir.GetHerHis].\n\n"
 lmf_heir.1680.desc.train.meet.enemy: "и хотя я [Select_CString(ROOT.Char.IsFemale, 'предпочла', 'предпочёл' )] бы вовсе избежать этого события, я всё же [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] [your_heir.GetHerHis] [Select_CString(ROOT.Char.IsFemale, 'хозяйкой', 'хозяином' )], а это мой [ROOT.Char.Custom('FortifiedBuilding')].\n\n"
 lmf_heir.1680.desc.train.meet.neutral: "и я [Select_CString(ROOT.Char.IsFemale, 'присутствовала', 'присутствовал' )] и как [your_heir.GetHerHis] [Select_CString(ROOT.Char.IsFemale, 'хозяйка', 'хозяин' )], и как [Select_CString(ROOT.Char.IsFemale, 'леди, которой', 'лорд, которому' )] принадлежит [ROOT.Char.Custom('FortifiedBuilding')].\n\n"
 lmf_heir.1680.desc.train.success: "[your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'была', 'был' )] невероятно [Select_CString(your_heir.IsFemale, 'довольна', 'доволен' )] успехом своего визита и потому [Select_CString(your_heir.IsFemale, 'пребывала', 'пребывал' )] в хорошем настроении весь вечер.\n\n"
 lmf_heir.1680.desc.train.failure: "[your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'была', 'был' )] довольно [Select_CString(your_heir.IsFemale, 'молчалива', 'молчалив' )] на протяжении всего вечера, учитывая провал [your_heir.GetHerHis] визита, и [Select_CString(your_heir.IsFemale, 'удалилась', 'удалился' )], как только это стало вежливо.\n\n"
 lmf_heir.1680.desc.train.neutral: "[your_heir.Custom('polite_gender_ref')] [Select_CString(your_heir.IsFemale, 'была', 'был' )] [Select_CString(your_heir.IsFemale, 'вежлива', 'вежлив' )], хотя [your_heir.GetSheHe] в основном [Select_CString(your_heir.IsFemale, 'держалась', 'держался' )] особняком... возможно, размышляя об неоднозначном успехе своего визита.\n\n"
 lmf_heir.1680.desc.train.end: "На следующее утро [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'отправилась', 'отправился' )] в обратный путь во владение [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip], где [your_heir.GetHerHis] ждёт [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )]. Не могу не думать о том, что [your_heir.GetSheHe] расскажет о своём времени здесь... но, так или иначе, [your_heir.GetHerHis] поездка окончена."
 lmf_heir.1680.a: "Надеюсь, [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'провела', 'провёл' )] время с удовольствием. Знаю, что #EMP я#! - определенно."
 lmf_heir.1680.b: "Будем надеяться, это последний раз, когда мы [your_heir.GetHerHis] увидим."
 lmf_heir.1680.c: "[Select_CString(your_heir.IsFemale, 'Прекрасная', 'Прекрасный' )] [your_heir.Custom('polite_gender_ref')] и [Select_CString(your_heir.IsFemale, 'подруга', 'друг' )]."
 lmf_heir.1680.d: "[Select_CString(ROOT.Char.IsFemale, 'Рада', 'Рад' )], что [your_heir.GetSheHe] столь много [Select_CString(your_heir.IsFemale, 'получила', 'получил' )] от своей поездки."
 lmf_heir.1680.e: "Что ж, с этим покончено."
 lmf_heir.1680.f: "Теперь к моим собственным делам!"
 lmf_heir.1680.end.tt: "[your_heir.GetTitledFirstNameNoTooltip] начнёт свой путь обратно во владение [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip]"

 lmf_heir.1681.desc.start: "Я только что [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] весточку, которую [Select_CString(ROOT.Char.IsFemale, 'прислала', 'прислал' )] [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))], и [your_heir.GetHerHis] поездка во владение [heir_visit_target.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] подошла к концу.\n\nОчевидно, "
 lmf_heir.1681.desc.notrain: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))] [Select_CString(heir_visit_target.IsFemale, 'отказалась', 'отказался')] принимать [your_heir.GetHerHis] в стенах [heir_visit_target.Custom('FortifiedBuilding_RU_Gen')], поэтому вместо этого [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))] [Select_CString(your_heir.IsFemale, 'провела', 'провел' )] большую часть своего времени там "
 lmf_heir.1681.desc.notrain.hunt.good: "отлично поохотившись в окрестных землях.\n\n"
 lmf_heir.1681.desc.notrain.hunt.poor: "охотившись в окрестных землях при отвратительной погоде и почти без добычи.\n\n"
 lmf_heir.1681.desc.notrain.tour.good: "путешествуя по окрестным землям, знакомясь с народом и его обычаями... все прошло довольно хорошо, судя по всему.\n\n"
 lmf_heir.1681.desc.notrain.tour.poor: "путешествуя по окрестным землям, терпя непогоду и простолюдинов, которых мало интересовало [your_heir.GetHerHis] присутствие.\n\n"
 lmf_heir.1681.desc.notrain.party.good: "веселясь в тавернах ближайших деревень... судя по рассказам, все было весьма захватывающе, хоть и непродуктивно.\n\n"
 lmf_heir.1681.desc.notrain.party.poor: "безуспешно пытаясь веселиться в тавернах ближайших деревень. Читая между строк, [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'была несчастна', 'был несчастен' )].\n\n"
 lmf_heir.1681.desc.notrain.sick: "болея и отдыхая в деревенском постоялом дворе, почти ничем не занимаясь.\n\n"
 lmf_heir.1681.desc.notrain.nothing: "занимаясь... чем-то малозначительным. [Select_CString(your_heir.IsFemale, 'Бродила', 'Бродил' )] по деревням, [Select_CString(your_heir.IsFemale, 'ночевал', 'ночевала' )] в постоялых дворах, но в итоге не [Select_CString(your_heir.IsFemale, 'сделала', 'сделал' )] ничего стоящего.\n\n"
 lmf_heir.1681.desc.notrain.end: "Технически [heir_visit_target.GetSheHe] [Select_CString(heir_visit_target.IsFemale, 'выполнила', 'выполнил' )] обещание. [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'имела', 'имел' )] доступ во владение [heir_visit_target.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], пусть и не в [ROOT.Char.Custom('FortifiedBuilding')], но это сложно назвать настоящим гостеприимством."
 lmf_heir.1681.desc.train: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))] лично [Select_CString(heir_visit_target.IsFemale, 'встретила', 'встретил' )] [your_heir.GetHerHis]. [your_heir.GetTitledFirstNameNoTooltip] [Select_CString(your_heir.IsFemale, 'была окружёна', 'был окружён' )] всяческой заботой. [your_heir.GetSheHe|U] [Select_CString(your_heir.IsFemale, 'получила', 'получил' )] комнату в стенах [heir_visit_target.Custom('FortifiedBuilding_RU_Gen')] и [Select_CString(your_heir.IsFemale, 'провела', 'провёл' )] "
 lmf_heir.1681.desc.train.castle: "хотя [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))] не [Select_CString(heir_visit_target.IsFemale, 'обучала', 'обучал' )] [your_heir.GetHerHis] лично, [your_heir.GetSheHe] [Select_CString(your_heir.IsFemale, 'была окружена', 'был окружён' )] заботой и [Select_CString(your_heir.IsFemale, 'получила', 'получил' )] комнату в стенах [heir_visit_target.Custom('FortifiedBuilding_RU_Gen')], проведя "
 lmf_heir.1681.desc.train.all: "почти всю поездку "
 lmf_heir.1681.desc.train.most: "большую часть поездки "
 lmf_heir.1681.desc.train.some: "часть времени "
 lmf_heir.1681.desc.train.rest: "а остаток "
 lmf_heir.1681.desc.train.second: ", "
 lmf_heir.1681.desc.train.third: ", и "
 lmf_heir.1681.desc.host: "под личным руководством, которое [Select_CString(heir_visit_target.IsFemale, 'обеспечила', 'обеспечил' )] [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))]"
 lmf_heir.1681.desc.castle: "при дворе, которым правит [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))]"
 lmf_heir.1681.desc.sick: "болея и отдыхая"
 lmf_heir.1681.desc.hunt: "на охоте в окрестных землях"
 lmf_heir.1681.desc.tour: "путешествуя по землям и знакомясь с народом и его обычаями"
 lmf_heir.1681.desc.party: "отлично веселясь в тавернах поблизости"
 lmf_heir.1681.desc.nothing: "практически ничем не занимаясь"
 lmf_heir.1681.desc.train.good: ".\n\nСудя по письму, которое [Select_CString(your_heir.IsFemale, 'прислала', 'прислал' )] [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))], это был превосходный и крайне продуктивный опыт."
 lmf_heir.1681.desc.train.poor: ".\n\nОднако из письма, которое [Select_CString(your_heir.IsFemale, 'прислала', 'прислал' )] [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))], ясно, что опыт был удручающим и непродуктивным."
 lmf_heir.1681.desc.train.neutral: ".\n\nЧитая между строк, подозреваю, что не все прошло гладко, но в целом [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))] [Select_CString(your_heir.IsFemale, 'осталась довольна', 'остался доволен' )]."
 lmf_heir.1681.a: "Жду не дождусь [your_heir.GetHerHis] возвращения."
 lmf_heir.1681.secrets.to.tell.tt: "[your_heir.GetTitledFirstNameNoTooltip] раскрывает вам секреты, обнаруженные во время своего пребывания..."

 lmf_heir.1700.own.t: "[Select_CString(bastard_child.IsFemale, 'Моя дочь', 'Мой сын' )]-бастард?"
 lmf_heir.1700.son.t: "[Select_CString(bastard_child.IsFemale, 'Моя внучка', 'Мой внук' )]-бастард??"
 lmf_heir.1700.relative.t: "[Select_CString(bastard_child_father.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('bastard_child_father'))] и [Select_CString(bastard_child_father.IsFemale, 'её', 'его' )] [Select_CString(bastard_child.IsFemale, 'дочь', 'сын' )]-бастард?"
 lmf_heir.1700.bastard.me.start: "Сегодня у ворот [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] [Select_CString(visitor.IsFemale, 'появилась юная крестьянка, утверждающая', 'появился юный крестьянин, утверждающий' )], что [visitor.GetSheHe] — [Select_CString(bastard_child.IsFemale, 'моя дочь', 'мой сын' )].\n\nЯ лично [Select_CString(ROOT.Char.IsFemale, 'убедилась', 'убедился' )]: [bastard_child.GetSheHe] действительно [Select_CString(bastard_child.IsFemale, 'похожа', 'похож' )] на меня. По [bastard_child.GetHerHis] словам, я [Select_CString(ROOT.Char.IsFemale, 'встретила', 'встретил' )] [bastard_child.GetHerHis] мать "
 lmf_heir.1700.bastard.me.heirvisit: "во время пира в таверне, когда я [Select_CString(ROOT.Char.IsFemale, 'посещала', 'посещал' )] владение [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], которым правит [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip] в ... было это давно, но я помню тот вечер.\n\n"
 lmf_heir.1700.bastard.me.campfollower: "во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], где она была торговкой. Тот вечер я действительно помню.\n\n"
 lmf_heir.1700.bastard.me.taverngirl: "в таверне владения [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], где она была служанкой. Тот вечер я действительно помню.\n\n"
 lmf_heir.1700.bastard.me.lostguide: "когда она вывела меня к лагерю, после того как я [Select_CString(ROOT.Char.IsFemale, 'заблудилась', 'заблудился' )] во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Тот вечер я действительно помню.\n\n"
 lmf_heir.1700.bastard.me.campcaughteye: "во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], где она служила в войске и привлекла мой взгляд. Тот вечер я действительно помню.\n\n"
 lmf_heir.1700.bastard.me.foundpool: "у целебного источника во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], недалеко от лагеря. Тот день я действительно помню.\n\n"
 lmf_heir.1700.bastard.me.default: "много лун назад во время пира во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], который я смутно помню.\n\n"
 lmf_heir.1700.bastard.me.end: "Чего же хочет [Select_CString(visitor.IsFemale, 'эта девица', 'этот юноша' )]? «Ты мой отец, — [Select_CString(bastard_child.IsFemale, 'сказала', 'сказал' )] [bastard_child.GetSheHe]. — Надеюсь, я смогу служить тебе, если примешь меня»."
 lmf_heir.1700.bastard.alive.start: "Сегодня у ворот [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] [Select_CString(visitor.IsFemale, 'появилась юная крестьянка, утверждающая', 'появился юный крестьянин, утверждающий' )], что [visitor.GetHerHis] [Select_CString(bastard_child_father.IsFemale, 'мать', 'отец' )] - [bastard_child_father.GetFirstNameNoTooltip]!\n\nЯ лично [Select_CString(ROOT.Char.IsFemale, 'убедилсь', 'убедился' )]: [bastard_child.GetSheHe] действительно [Select_CString(bastard_child.IsFemale, 'похожа', 'похож' )] на н[bastard_child_father.GetHerHis]. Когда [bastard_child_father.GetFirstNameNoTooltip] [Select_CString(bastard_child_father.IsFemale, 'прибыл', 'прибыл' )] по моему приказу, [bastard_child_father.GetSheHe] смущённо [Select_CString(bastard_child_father.IsFemale, 'признала', 'признал' )] связь с женщиной"
 lmf_heir.1700.bastard.alive.heirvisit: " во время пира в таверне, когда [Select_CString(bastard_child_father.IsFemale, 'она посещала', 'он посещал' )] владение [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], которым правит [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip], что совпадает с рассказом [Select_CString(visitor.IsFemale, 'девушки', 'юноши' )].\n\n"
 lmf_heir.1700.bastard.alive.campfollower: "-маркитанткой во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], что совпадает с рассказом [Select_CString(visitor.IsFemale, 'девушки', 'юноши' )].\n\n"
 lmf_heir.1700.bastard.alive.taverngirl: "-служанкой в таверне владения [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], что совпадает с рассказом [Select_CString(visitor.IsFemale, 'девушки', 'юноши' )].\n\n"
 lmf_heir.1700.bastard.alive.lostguide: ", которая вывела его из владения [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], когда он заблудился, что совпадает с рассказом [Select_CString(visitor.IsFemale, 'девушки', 'юноши' )].\n\n"
 lmf_heir.1700.bastard.alive.campcaughteye: "-солдатом во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], привлекшей его внимание... что совпадает с рассказом [Select_CString(visitor.IsFemale, 'девушки', 'юноши' )].\n\n"
 lmf_heir.1700.bastard.alive.foundpool: " у целебного источника во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], что совпадает с рассказом [Select_CString(visitor.IsFemale, 'девушки', 'юноши' )].\n\n"
 lmf_heir.1700.bastard.alive.default: " много лун назад во время пира во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], что совпадает с рассказом [Select_CString(visitor.IsFemale, 'девушки', 'юноши' )].\n\n"
 lmf_heir.1700.bastard.alive.end: "Чего же хочет [Select_CString(visitor.IsFemale, 'девушка', 'юноша' )]? «Вы моя кровь, — [Select_CString(bastard_child.IsFemale, 'сказала', 'сказал' )] [bastard_child.GetSheHe]. — И единственная семья, что у меня осталась. Надеюсь, я смогу служить вам, если примете меня»."
 lmf_heir.1700.bastard.dead.start: "Сегодня у ворот [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] [Select_CString(visitor.IsFemale, 'появилась юная крестьянка, утверждающая', 'появился юный крестьянин, утверждающий' )], что [visitor.GetHerHis] [Select_CString(bastard_child_father.IsFemale, 'мать - моя покойная', 'отец - мой покойный' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('bastard_child_father'))] [bastard_child_father.GetFirstNameNoTooltip].\n\nЯ лично [Select_CString(ROOT.Char.IsFemale, 'убедилась', 'убедился' )]: [bastard_child.GetSheHe] действительно [Select_CString(bastard_child.IsFemale, 'похожа', 'похож' )] на н[bastard_child_father.GetHerHis]. По [visitor.GetHerHis] словам, [bastard_child_father.GetFirstNameNoTooltip] [Select_CString(bastard_child_father.IsFemale, 'встретила', 'встретил' )] [bastard_child.GetHerHis] мать"
 lmf_heir.1700.bastard.dead.heirvisit: " во время пира в таверне, когда он посещал владение [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], которым правит [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip]... что я смутно припоминаю, хотя [bastard_child_father.GetFirstNameNoTooltip] редко об этом говорил.\n\n"
 lmf_heir.1700.bastard.dead.campfollower: ", когда она была маркитанткой во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... вполне вероятно, ведь [bastard_child_father.GetFirstNameNoTooltip] действительно [Select_CString(bastard_child_father.IsFemale, 'была', 'был' )] там.\n\n"
 lmf_heir.1700.bastard.dead.taverngirl: " в таверне владения [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], где остановились [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]... вполне вероятно, ведь войско, в котором служил [bastard_child_father.GetFirstNameNoTooltip], действительно было там.\n\n"
 lmf_heir.1700.bastard.dead.lostguide: ", когда она, местная жительница, вывела его к лагерю после того как он заблудился во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... вполне вероятно, ведь войско, в котором служил [bastard_child_father.GetFirstNameNoTooltip], действительно было там.\n\n"
 lmf_heir.1700.bastard.dead.campcaughteye: ", когда она служила в войске и привлекла его внимание во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... вполне вероятно, ведь [bastard_child_father.GetFirstNameNoTooltip] действительно [Select_CString(bastard_child_father.IsFemale, 'была', 'был' )] там.\n\n"
 lmf_heir.1700.bastard.dead.foundpool: " у целебного источника во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... вполне вероятно, ведь [bastard_child_father.GetFirstNameNoTooltip] действительно [Select_CString(bastard_child_father.IsFemale, 'была', 'был' )] там.\n\n"
 lmf_heir.1700.bastard.dead.default: " много лун назад во время пира во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... вполне возможно, ведь [bastard_child_father.GetFirstNameNoTooltip] действительно [Select_CString(bastard_child_father.IsFemale, 'была', 'был' )] там.\n\n"
 lmf_heir.1700.bastard.dead.end: "Чего же хочет [Select_CString(visitor.IsFemale, 'эта девица', 'этот юноша' )]? «Вы моя кровь, — [Select_CString(bastard_child.IsFemale, 'сказала', 'сказал' )] [bastard_child.GetSheHe]. — И единственная семья, что у меня осталась. Надеюсь, я смогу служить вам, если примете меня»."
 lmf_heir.1700.mother.me.start: "Сегодня у ворот [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] появилась крестьянка с ребенком, которого она называет моим.\n\nЯ лично [Select_CString(ROOT.Char.IsFemale, 'убедилась', 'убедился' )] и смутно [Select_CString(ROOT.Char.IsFemale, 'вспомнила', 'вспомнил' )] её "
 lmf_heir.1700.mother.me.heirvisit: "со времён пира в таверне, когда я посещал владение [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], которым правит [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip], так что её рассказ правдоподобен.\n\n"
 lmf_heir.1700.mother.me.campfollower: "как маркитантку, увлечённую мной, когда моё войско стояло во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetNameNoTooltip]. Её рассказ правдоподобен.\n\n"
 lmf_heir.1700.mother.me.taverngirl: "как служанку из таверны во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], где стояло моё войско. Её рассказ правдоподобен.\n\n"
 lmf_heir.1700.mother.me.lostguide: "как местную жительницу, что вывела меня к лагерю, когда я заблудился во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Её рассказ правдоподобен.\n\n"
 lmf_heir.1700.mother.me.campcaughteye: "как воительницу, привлекшую мой взгляд в лагере во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Её рассказ правдоподобен.\n\n"
 lmf_heir.1700.mother.me.foundpool: "как ту, что встретила меня у целебного источника во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Её рассказ правдоподобен.\n\n"
 lmf_heir.1700.mother.me.default: "со времён пира много лун назад во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Её рассказ правдоподобен.\n\n"
 lmf_heir.1700.mother.me.mid: "Что до "
 lmf_heir.1700.mother.me.newborn: "младенца на её руках? "
 lmf_heir.1700.mother.me.child: "[Select_CString(bastard_child.IsFemale, 'девочки', 'мальчика' )] рядом с ней, робко [Select_CString(bastard_child.IsFemale, 'опустившей', 'опустившего' )] взгляд? "
 lmf_heir.1700.mother.me.end: "«[bastard_child.GetSheHe|U] — ваша кровь, — сказала женщина. — Я лишь надеюсь на место при вашем дворе, где [bastard_child.GetFirstNameNoTooltip] обретёт лучшее будущее, чем то, что могу дать я»."
 lmf_heir.1700.mother.alive.start: "Сегодня у ворот [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] появилась крестьянка с [Select_CString(bastard_child.IsFemale, 'дочерью', 'сыном' )], отцом [Select_CString(bastard_child.IsFemale, 'которой', 'которого' )] по её словам является [bastard_child_father.GetFirstNameNoTooltip]!\n\nЯ лично [Select_CString(ROOT.Char.IsFemale, 'убедилась', 'убедился' )]: [bastard_child.GetSheHe] [Select_CString(bastard_child.IsFemale, 'похожа', 'похож' )] на н[bastard_child_father.GetHerHis]. Когда [bastard_child_father.GetFirstNameNoTooltip] прибыл по моему приказу, он смущенно [Select_CString(bastard_child_father.IsFemale, 'признала', 'признал' )], что узнаёт женщину, "
 lmf_heir.1700.mother.alive.heirvisit: "проведя с ней ночь во время пира в таверне, когда он посещал владение [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], которым правит [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip].\n\n"
 lmf_heir.1700.mother.alive.campfollower: "которая была маркитанткой, когда его войско стояло во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], хотя с тех пор он не видел её.\n\n"
 lmf_heir.1700.mother.alive.taverngirl: "служанку в таверне во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Она увлеклась им, когда он и другие [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] посещали таверну, хотя с тех пор он не [Select_CString(bastard_child_father.IsFemale, 'видела', 'видел' )] её.\n\n"
 lmf_heir.1700.mother.alive.lostguide: "местную жительницу, которая вывела его к лагерю, когда он заблудился во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], и они провели вместе ночь.\n\n"
 lmf_heir.1700.mother.alive.campcaughteye: "воительницу, привлекшую его внимание в лагере во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], хотя с тех пор он не видел её.\n\n"
 lmf_heir.1700.mother.alive.foundpool: "местную жительницу, встретившую его у целебного источника во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], хотя с тех пор он не видел её.\n\n"
 lmf_heir.1700.mother.alive.default: "проведя с ней ночь во время пира много лун назад во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], хотя с тех пор он не [Select_CString(bastard_child_father.IsFemale, 'видела', 'видел' )] её.\n\n"
 lmf_heir.1700.mother.alive.mid: "Что до "
 lmf_heir.1700.mother.alive.newborn: "младенца на её руках? "
 lmf_heir.1700.mother.alive.child: "[Select_CString(bastard_child.IsFemale, 'девочки', 'мальчика' )] рядом с ней, робко [Select_CString(bastard_child.IsFemale, 'опустившей', 'опустившего' )] взгляд? "
 lmf_heir.1700.mother.alive.end: "«[bastard_child.GetSheHe|U] — ваша кровь, — сказала женщина. — Я лишь надеюсь на место при вашем дворе, где [bastard_child.GetFirstNameNoTooltip] обретёт лучшее будущее, чем то, что могу дать я»."
 lmf_heir.1700.mother.dead.start: "Сегодня у ворот [ROOT.Char.Custom('FortifiedBuilding_RU_Gen')] появилась крестьянка с [Select_CString(bastard_child.IsFemale, 'дочерью', 'сыном' )], отцом [Select_CString(bastard_child.IsFemale, 'которой', 'которого' )] по её словам является мой покойный [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('bastard_child_father'))] [bastard_child_father.GetFirstNameNoTooltip]!\n\nЯ лично [Select_CString(ROOT.Char.IsFemale, 'убедилась', 'убедился' )]: [bastard_child.GetSheHe] [Select_CString(bastard_child.IsFemale, 'похожа', 'похож' )] на н[bastard_child_father.GetHerHis]. По словам женщины, она и мой [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('bastard_child_father'))] встретились "
 lmf_heir.1700.mother.dead.heirvisit: "во время пира в таверне, когда он посещал владение [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], которым правит [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip]... что я смутно припоминаю, хотя [bastard_child_father.GetFirstNameNoTooltip] редко об этом говорил.\n\n"
 lmf_heir.1700.mother.dead.campfollower: "когда она была маркитанткой во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... вполне возможно, ведь [bastard_child_father.GetFirstNameNoTooltip] действительно был там.\n\n"
 lmf_heir.1700.mother.dead.taverngirl: "в таверне во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], где остановились он и другие [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]... вполне вероятно, ведь [bastard_child_father.GetFirstNameNoTooltip] действительно был там.\n\n"
 lmf_heir.1700.mother.dead.lostguide: "когда она, местная жительница, вывела его к лагерю после того как он заблудился во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... вполне вероятно, ведь [bastard_child_father.GetFirstNameNoTooltip] действительно [Select_CString(bastard_child_father.IsFemale, 'была', 'был' )] там.\n\n"
 lmf_heir.1700.mother.dead.campcaughteye: "когда она служила солдатом и привлекла его внимание в лагере во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... вполне вероятно, ведь [bastard_child_father.GetFirstNameNoTooltip] действительно [Select_CString(bastard_child_father.IsFemale, 'была', 'был' )] там.\n\n"
 lmf_heir.1700.mother.dead.foundpool: "когда он посетил целебный источник во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... вполне вероятно, ведь [bastard_child_father.GetFirstNameNoTooltip] действительно был там.\n\n"
 lmf_heir.1700.mother.dead.default: "много лун назад во время пира во владении [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... вполне возможно, ведь [bastard_child_father.GetFirstNameNoTooltip] действительно был там.\n\n"
 lmf_heir.1700.mother.dead.mid: "Что до "
 lmf_heir.1700.mother.dead.newborn: "младенца на её руках? "
 lmf_heir.1700.mother.dead.child: "[Select_CString(bastard_child.IsFemale, 'девочки', 'мальчика' )] рядом с ней, робко [Select_CString(bastard_child.IsFemale, 'опустившей', 'опустившего' )] взгляд? "
 lmf_heir.1700.mother.dead.end: "«[bastard_child.GetSheHe|U] — ваша кровь, — сказала женщина. — Я лишь надеюсь на место при вашем дворе, где [bastard_child.GetFirstNameNoTooltip] обретёт лучшее будущее, чем то, что могу дать я»."
 lmf_heir.1700.a: "Можешь остаться, но это останется между нами."
 lmf_heir.1700.b: "Добро пожаловать, и все узнают, кто ты."
 lmf_heir.1700.c: "Тебе не найдётся места здесь."

 lmf_heir.2050.t: "Желание, что [Select_CString(heir.IsFemale, 'изъявила моя', 'изъявил мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))|U]"
 lmf_heir.2050.start: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir'))] долго [Select_CString(heir.IsFemale, 'колебалась', 'колебался' )], возможно, не совсем понимая — или не веря — тому, что я [Select_CString(ROOT.Char.IsFemale, 'предложила', 'предложил' )]. «Вы позволяете мне, — осторожно [Select_CString(heir.IsFemale, 'повторила', 'повторил' )] [heir.GetSheHe], — [Select_CString(heir.IsFemale, 'выйти замуж... за кого', 'жениться... на ком' )] я пожелаю?»\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'ответила', 'ответил' )], что так и есть, по крайней мере пока, и тогда [heir.GetSheHe] глубоко [Select_CString(heir.IsFemale, 'вздохнула', 'вздохнул' )]. «Тогда вы должны знать, что #EMP есть #! [heir_lover.GetWomanMan], [Select_CString(heir_lover.IsFemale, 'которую', 'которого' )] я люблю и [Select_CString(heir_lover.IsFemale, 'на которой', 'за которого' )] хочу [Select_CString(heir.IsFemale, 'выйти замуж', 'жениться' )]».\n\n"
 lmf_heir.2050.knows: "Я [Select_CString(ROOT.Char.IsFemale, 'вздохнула', 'вздохнул' )], прекрасно зная, кого [heir.GetSheHe] [Select_CString(heir.IsFemale, 'имела', 'имел' )] в виду. «Это [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_lover'))]».\n\n"
 lmf_heir.2050.secret: "Это застало меня врасплох. «У тебя... есть [Select_CString(heir_lover.IsFemale, 'любовница', 'любовник' )]?»\n\n"
 lmf_heir.2050.soulmate: "[heir.GetFirstNameNoTooltip] [Select_CString(heir.IsFemale, 'кивнула', 'кивнул' )], стараясь не выглядеть [Select_CString(heir.IsFemale, 'смущённой', 'смущённым' )]. «[heir_lover.GetTitledFirstName] и я — родственные души. Мы должны быть вместе, я это знаю. "
 lmf_heir.2050.lover: "[heir.GetFirstNameNoTooltip] [Select_CString(heir.IsFemale, 'кивнула', 'кивнул' )], стараясь не выглядеть [Select_CString(heir.IsFemale, 'смущённой', 'смущённым' )]. «Я и [heir_lover.GetTitledFirstName] по-настоящему любим друг друга, я это знаю. "
 lmf_heir.2050.end: "Если я и могу выбрать кого-то [Select_CString(heir.IsFemale, 'сама', 'сам' )], если мой выбор вообще что-то значит», — [heir.GetSheHe] [Select_CString(heir.IsFemale, 'подняла', 'поднял' )] на меня глаза, возможно, гадая, не заберу ли я своё предложение обратно, — «то это будет [heir_lover.GetSheHe]»."
 lmf_heir.2050.a: "Нет, [heir_lover.GetSheHe] не подходит. Ты [Select_CString(heir.IsFemale, 'должна', 'должен' )] немедленно прекратить это."
 lmf_heir.2050.b: "Хорошо, ты получишь моё благословение."
 lmf_heir.2050.c: "Что ж! Обратимся к [heir_lover.GetHerHis] сюзерену и посмотрим, согласится ли [heir_lover.GetLiege.GetTitledFirstNameNoTooltip]."
 lmf_heir.2050.c.tt: "[heir_lover.GetLiege.GetShortUINameNoFormat|U] получит предложение брака"
 lmf_heir.2050.d: "Что ж! Посмотрим, чувствует ли [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_lover'))] то же самое, что и ты."
 lmf_heir.2050.d.tt: "[heir_lover.GetShortUINameNoFormat|U] получит предложение брака"
 lmf_heir.2050.matrilineal.tt: "Предложенный брак будет #X матрилинейным#!"
 lmf_heir.2050.patrilineal.tt: "Предложенный брак будет #X патрилинейным#!"

 lmf_heir.2051.t: "Желание, что [Select_CString(heir.IsFemale, 'изъявила моя', 'изъявил мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))|U]"
 lmf_heir.2051.start: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir'))] долго [Select_CString(heir.IsFemale, 'колебалась', 'колебался' )], возможно, не совсем понимая — или не веря — тому, что я [Select_CString(ROOT.Char.IsFemale, 'предложила', 'предложил' )]. «Вы позволяете мне, — осторожно [Select_CString(heir.IsFemale, 'повторила', 'повторил' )] [heir.GetSheHe], — [Select_CString(heir.IsFemale, 'выйти замуж... за кого', 'жениться... на ком' )] я пожелаю?»\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'ответила', 'ответил' )], что так и есть. [heir.GetSheHe|U] [Select_CString(heir.IsFemale, 'сделала', 'сделал' )] ещё более глубокий вдох "
 lmf_heir.2051.knows: "и затем [Select_CString(heir.IsFemale, 'объяснила', 'объяснил' )] то, что я уже [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал' )]: что [heir.GetSheHe] [Select_CString(heir.IsFemale, 'влюблена', 'влюблён' )]. К сожалению, "
 lmf_heir.2051.secret: "и затем [Select_CString(heir.IsFemale, 'раскрыла', 'раскрыл' )] свою тайну и источник своих колебаний: [heir.GetSheHe] [Select_CString(heir.IsFemale, 'влюблена', 'влюблён' )]. К сожалению, "
 lmf_heir.2051.desc.samesex: "объект [heir.GetHerHis] привязанности — [Select_CString(heir_lover.IsFemale, 'такая', 'такой' )] же [heir_lover.GetWomanMan]. Довольно неловкая ситуация.\n\n"
 lmf_heir.2051.desc.order: "объект [heir.GetHerHis] привязанности принёс обеты религиозному ордену. [heir_lover.GetSheHe|U] не может вступить в брак, пока остаётся [Select_CString(heir_lover.IsFemale, 'верна', 'верен' )] своим обетам.\n\n"
 lmf_heir.2051.desc.married: "объект [heir.GetHerHis] привязанности уже состоит в браке. Старая, хоть и постыдная, история.\n\n"
 lmf_heir.2051.desc.betrothed: "объект [heir.GetHerHis] привязанности уже [Select_CString(heir_lover.IsFemale, 'помолвлена с другим', 'помолвлен с другой' )], пусть ещё не [Select_CString(heir_lover.IsFemale, 'вступила', 'вступил' )] в брак. [heir_lover.GetSheHe|U] не может вступить с [Select_CString(heir.IsFemale, 'ней', 'ним' )] в брак, пока эта помолвка действительна.\n\n"
 lmf_heir.2051.desc.permission.lover.man: "поскольку я ранее [Select_CString(ROOT.Char.IsFemale, 'отказала', 'отказал' )] [heir.GetHerHis] [Select_CString(heir_lover.IsFemale, 'возлюбленной', 'возлюбленному' )] в разрешении на брак, [Select_CString(heir_lover.IsFemale, 'эта женщина', 'этот мужчина' )] теперь явно не решается официально просить, чтобы [Select_CString(heir_lover.IsFemale, 'она', 'он' )] и [Select_CString(heir.IsFemale, 'мой', 'моя' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] вступили в брак.\n\n"
 lmf_heir.2051.desc.permission.lover.woman: "поскольку я ранее [Select_CString(ROOT.Char.IsFemale, 'отказала', 'отказал' )] [heir.GetHerHis] [Select_CString(heir_lover.IsFemale, 'возлюбленной', 'возлюбленному' )] в разрешении на брак, [Select_CString(heir.IsFemale, 'мой', 'моя' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))], очевидно, считает, что отказ относится и к [Select_CString(heir.IsFemale, 'ней', 'нему' )].\n\n"
 lmf_heir.2051.desc.permission.both: "мой предыдущий отказ позволить им пожениться означает, что теперь они намерены продолжать втайне. Довольно неловкая ситуация, если это продолжится.\n\n"
 lmf_heir.2051.desc.permission.heir.man: "[Select_CString(heir.IsFemale, 'мой', 'моя' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))], очевидно, не решается просить разрешения вступить с [Select_CString(heir_lover.IsFemale, 'ней', 'ним' )] в брак, учитывая мой предыдущий отказ.\n\n"
 lmf_heir.2051.desc.permission.heir.woman: "ясно, что [Select_CString(heir_lover.IsFemale, 'эта женщина', 'этот мужчина' )] не решается просить, чтобы [Select_CString(heir_lover.IsFemale, 'она', 'он' )] и [Select_CString(heir.IsFemale, 'мой', 'моя' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] вступили в брак, учитывая, что я уже [Select_CString(ROOT.Char.IsFemale, 'отказала', 'отказал' )] в предложении о [Select_CString(heir.IsFemale, 'её', 'его' )] руке.\n\n"
 lmf_heir.2051.desc.generic: "Они не могут пожениться. Поэтому они продолжают тайно встречаться, а [Select_CString(heir.IsFemale, 'мой', 'моя' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] слишком [Select_CString(heir.IsFemale, 'очарована', 'очарован' )], чтобы думать о том, что у [Select_CString(heir.IsFemale, 'неё', 'него' )] есть долг поважнее, чем [Select_CString(heir_lover.IsFemale, 'эта', 'этот' )] [heir_lover.GetWomanMan], [Select_CString(heir_lover.IsFemale, 'которую', 'которого' )] [heir.GetSheHe] любит.\n\n"
 lmf_heir.2051.desc.end.canact: "Возможно, мне стоит всё же устроить их брак. Или сказать [heir.GetHerHim], чтобы [Select_CString(heir.IsFemale, 'прекратила', 'прекратил' )] эту безнадёжную связь. В любом случае, что-то нужно сделать."
 lmf_heir.2051.desc.end: "Я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы вмешаться в [heir.GetHerHis] дела, хотя сомневаюсь, что [Select_CString(heir.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] поблагодарит меня за это."
 lmf_heir.2051.a: "[heir.GetFirstNameNoTooltip] [Select_CString(heir.IsFemale, 'должна', 'должен' )] прекратить это и найти [Select_CString(heir.IsFemale, 'подходящего мужа', 'подходящую жену' )]."
 lmf_heir.2051.b: "Я скажу им, что [Select_CString(ROOT.Char.IsFemale, 'передумала', 'передумал' )]."
 lmf_heir.2051.c: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_lover'))] [Select_CString(heir_lover.IsFemale, 'должна', 'должен' )] отказаться от своих обетов, чтобы [Select_CString(heir_lover.IsFemale, 'она', 'он' )] и [Select_CString(heir.IsFemale, 'мой', 'моя' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] вступили в брак."
 lmf_heir.2051.d: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_lover'))] [Select_CString(heir_lover.IsFemale, 'должна', 'должен' )] разорвать свою помолвку, чтобы [Select_CString(heir_lover.IsFemale, 'она', 'он' )] и [Select_CString(heir.IsFemale, 'мой', 'моя' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] вступили в брак."
 lmf_heir.2051.e: "[heir.GetHerHis|U] дела — [heir.GetHerHis] личное дело. Но [heir.GetSheHe|U] всё равно [Select_CString(heir.IsFemale, 'должна выйти замуж', 'должен жениться' )] хоть #EMP [Select_CString(heir.IsFemale, 'за кого-то', 'на ком-то' )]#!..."
 lmf_heir.2051.f: "Тогда пришло время взять [heir.GetHerHis] будущее в мои руки."

 lmf_heir.2052.t: "Долгожданное начало"
 lmf_heir.2052.t.notwant: "Нежелание начинать"
 lmf_heir.2052.desc.start: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir'))] долго [Select_CString(heir.IsFemale, 'колебалась', 'колебался' )], возможно, не совсем понимая — или не веря — тому, что я [Select_CString(ROOT.Char.IsFemale, 'предложила', 'предложил' )]. «Вы позволяете мне, — осторожно [Select_CString(heir.IsFemale, 'повторила', 'повторил' )] [heir.GetSheHe], — [Select_CString(heir.IsFemale, 'выйти замуж... за кого', 'жениться... на ком' )] я пожелаю?»\n\n[heir.GetSheHe|U], казалось, [Select_CString(heir.IsFemale, 'была довольна', 'был доволен' )] этим, [Select_CString(heir.IsFemale, 'кивнула и ушла', 'кивнул и ушёл' )]. Я [Select_CString(ROOT.Char.IsFemale, 'думала', 'думал' )], что это последнее, что я услышу на эту тему, пока [heir.GetSheHe] не будет [Select_CString(heir.IsFemale, 'готова', 'готов' )], но [heir.GetSheHe] [Select_CString(heir.IsFemale, 'вернулась', 'вернулся' )] тем же вечером с "
 lmf_heir.2052.desc.start.notwant: "«А что, если я #EMP не хочу#! вступать в брак, [heir.Custom2('spoken_address_by_familiarity', ROOT.Char )|U]?» — наконец [Select_CString(heir.IsFemale, 'спросила', 'спросил' )] [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir'))] после моего предложения.\n\n«Ты [Select_CString(heir.IsFemale, 'должна', 'должен' )] вступить в брак, — [Select_CString(ROOT.Char.IsFemale, 'ответила', 'ответил' )] я. — По твоему выбору или по моему. Я позволяю тебе сделать это самостоятельно... пока».\n\n[heir.GetSheHe|U], казалось, [Select_CString(heir.IsFemale, 'была довольна', 'был доволен' )] этим и [Select_CString(heir.IsFemale, 'ушла', 'ушёл' )]. Я [Select_CString(ROOT.Char.IsFemale, 'думала', 'думал' )], что это последнее, что я услышу на эту тему, пока не подниму её снова, но [heir.GetSheHe] [Select_CString(heir.IsFemale, 'вернулась', 'вернулся' )] тем же вечером с "
 lmf_heir.2052.desc.one: "именем [Select_CString(suitor_1.IsFemale, 'женщины, которой', 'мужчины, которым' )] [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'могла', 'мог' )] бы заинтересоваться "
 lmf_heir.2052.desc.two: "именами двух [Select_CString(suitor_1.IsFemale, 'женщин', 'мужчин' )], которыми [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'могла', 'мог' )] бы заинтересоваться "
 lmf_heir.2052.desc.three: "списком нескольких [Select_CString(suitor_1.IsFemale, 'женщин', 'мужчин' )], которыми [secondary_actor.GetSheHe] [Select_CString(secondary_actor.IsFemale, 'заинтересовалась', 'заинтересовался' )] "
 lmf_heir.2052.desc.matrilineal: "для матрилинейного брака.\n\n"
 lmf_heir.2052.desc.normal: "для встречи.\n\n"
 lmf_heir.2052.desc.end: "Если я соглашусь, мне нужно будет пригласить [suitor_1.GetHerHis] сюда, во владение [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], для надлежащего знакомства. Будем надеяться, что [Select_CString(secondary_actor.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('secondary_actor'))] [Select_CString(secondary_actor.IsFemale, 'настроена', 'настроен' )] серьёзно и не тратит моё время впустую."
 lmf_heir.2052.a: "[suitor_1.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] получит приглашение."
 lmf_heir.2052.b: "[suitor_2.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] получит приглашение."
 lmf_heir.2052.c: "[suitor_3.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] получит приглашение."
 lmf_heir.2052.d: "Глупости, я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )] найду кого-то получше."

 lmf_heir.2053.t: "Осознание реальности"
 lmf_heir.2053.desc.ruler: "«Не могу поверить, что [heir_lover.GetSheHe] [Select_CString(heir_lover.IsFemale, 'сказала', 'сказал' )] #EMP нет#!».\n\n"
 lmf_heir.2053.desc.liege: "«Не могу поверить, что [heir.Custom2('direct_address_by_familiarity', SCOPE.sC('recipient'))] #EMP [Select_CString(recipient.IsFemale, 'отказалась', 'отказался' )]#!».\n\n"
 lmf_heir.2053.desc.end: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir'))] сидит в моих покоях, [Select_CString(heir.IsFemale, 'расстроенная', 'расстроенный' )] после того, как пришло известие об отказе. Я не [Select_CString(ROOT.Char.IsFemale, 'удивилась', 'удивился' )], хотя [Select_CString(ROOT.Char.IsFemale, 'сомневалась', 'сомневался' )], что говорить [heir.GetHerHim] об этом будет особенно утешительно.\n\n«Иногда, — медленно [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )] я, — есть разница между любовью и браком, по крайней мере в том мире, в котором мы живём».\n\n[heir.GetSheHe|U] [Select_CString(heir.IsFemale, 'вздохнула и кивнул', 'вздохнул и кивнул' )]. «Теперь это уже не важно. [heir_lover.GetFirstNameNoTooltip] и я больше не вместе, не в этом смысле. Я подумаю над тем, что вы сказали, [heir.Custom2('spoken_address_by_familiarity', ROOT.Char )]».\n\nС этими словами [heir.GetSheHe|U] [Select_CString(heir.IsFemale, 'покинула', 'покинул' )] покои, хотя я [Select_CString(ROOT.Char.IsFemale, 'знала', 'знал' )], что со временем ещё услышу о [Select_CString(heir.IsFemale, 'ней', 'нём' )]."
 lmf_heir.2053.a: "[Select_CString(ROOT.Char.IsFemale, 'Уверена', 'Уверен' )], [heir.GetSheHe] найдёт кого-нибудь со временем."
 lmf_heir.2053.b: "Пришло время вернуть [heir.GetHerHis] будущее в мои руки."

 lmf_heir.2054.t: "Нерешительное начало"
 lmf_heir.2054.desc.start: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir'))] долго [Select_CString(heir.IsFemale, 'колебалась', 'колебался' )], возможно, не совсем понимая — или не веря — тому, что я [Select_CString(ROOT.Char.IsFemale, 'предложила', 'предложил' )]. «Вы позволяете мне, — осторожно [Select_CString(heir.IsFemale, 'повторила', 'повторил' )] [heir.GetSheHe], — [Select_CString(heir.IsFemale, 'выйти замуж... за кого', 'жениться... на ком' )] я пожелаю?»\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'ответила', 'ответил' )], что так и есть, по крайней мере пока, на что [heir.GetSheHe] [Select_CString(heir.IsFemale, 'кивнула', 'кивнул' )]... хотя я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], что [heir.GetSheHe] всё ещё колеблется. «Почему? У тебя кто-то на примете?» — [Select_CString(ROOT.Char.IsFemale, 'спросила', 'спросил' )] я.\n\n"
 lmf_heir.2054.desc.lover: "«Нет!» — [Select_CString(heir.IsFemale, 'выпалила', 'выпалил' )] [heir.GetSheHe], хотя я не [Select_CString(ROOT.Char.IsFemale, 'была уверена', 'был уверен' )], что верю [heir.GetHerHim]. [heir.GetSheHe|U] #EMP действительно#! [Select_CString(heir.IsFemale, 'приметила', 'приметил' )] кого-то, но [heir.GetSheHe] не хочет мне говорить. По крайней мере, в данный момент.\n\n"
 lmf_heir.2054.desc.default: "«Нет, — [Select_CString(heir.IsFemale, 'ответила', 'ответил' )] [heir.GetSheHe]. — Скорее я сомневаюсь, найдётся ли кто-то, кто захочет [Select_CString(heir.IsFemale, 'жениться на', 'выйти замуж за' )] #EMP [Select_CString(heir.IsFemale, 'мне', 'меня' )]#!». В [Select_CString(heir.IsFemale, 'её', 'его' )] опасениях была доля правды, я знаю, но я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что со временем [heir.GetSheHe] разберётся.\n\n"
 lmf_heir.2054.desc.end: "«Я подумаю об этом ещё, [heir.Custom2('spoken_address_by_familiarity', ROOT.Char )]». С этими словами [heir.GetSheHe] [Select_CString(heir.IsFemale, 'покинула', 'покинул' )] покои, и я [Select_CString(ROOT.Char.IsFemale, 'осталась', 'остался' )] гадать, сколько времени мне придётся ждать, прежде чем поднять этот вопрос снова."
 lmf_heir.2054.a: "Да будет так."

 lmf_interaction.0001.t: "Лишение наследства"
 lmf_interaction.0001.opening.submissive: "[recipient.GetTitledFirstNameNoTooltip] [Select_CString(recipient.IsFemale, 'попросила', 'попросил' )] аудиенции в тронном зале, почтительно [Select_CString(recipient.IsFemale, 'преклонила', 'преклонил' )] колено и [Select_CString(recipient.IsFemale, 'заговорила', 'заговорил' )] тихим, но твёрдым голосом.\n\n"
 lmf_interaction.0001.opening.dominant: "[recipient.GetTitledFirstNameNoTooltip] [Select_CString(recipient.IsFemale, 'вошла', 'вошёл' )] в тронный зал, требуя аудиенции. [Select_CString(ROOT.Char.IsFemale, 'Заинтересованная', 'Заинтересованный' )], я [Select_CString(ROOT.Char.IsFemale, 'согласилась', 'согласился' )]. [recipient.GetSheHe] [Select_CString(recipient.IsFemale, 'говорила', 'говорил' )] уверенно, но скрытое беспокойство выдавало [recipient.GetHerHis] браваду.\n\n"
 lmf_interaction.0001.opening: "[recipient.GetTitledFirstNameNoTooltip] [Select_CString(recipient.IsFemale, 'попросила', 'попросил' )] аудиенции в тронном зале. [Select_CString(ROOT.Char.IsFemale, 'Заинтересованная', 'Заинтересованный' )], я [Select_CString(ROOT.Char.IsFemale, 'согласилась', 'согласился')]. Серьёзность в [recipient.GetHerHis] поведении говорила о долгих размышлениях.\n\n"
 lmf_interaction.0001.address.family: "«[recipient.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))|U], "
 lmf_interaction.0001.address: "«[Select_CString(ROOT.Char.IsFemale, 'Миледи', 'Милорд' )], "
 lmf_interaction.0001.disinheritor: "Не могу понять, почему вы лишили меня наследства. Возможно, вы воспринимаете меня "
 lmf_interaction.0001.dynast: "Не могу понять, почему меня лишили наследства. Возможно, меня воспринимают "
 lmf_interaction.0001.worst.deviant: "как [Select_CString(recipient.IsFemale, 'сексуальную извращенку, недостойную', 'сексуального извращенца, недостойного' )] титула. Но разве я не "
 lmf_interaction.0001.worst.unintelligent: "как [Select_CString(recipient.IsFemale, 'глупышку, неспособную', 'глупца, неспособного' )] править. Но разве я не "
 lmf_interaction.0001.worst.crazy: "как [Select_CString(recipient.IsFemale, 'сумасшедшую, которой', 'безумца, которому' )] нельзя доверять власть. Но разве я не "
 lmf_interaction.0001.worst.unskilled: "как неумёху, [Select_CString(recipient.IsFemale, 'лишённую', 'лишённого' )] качеств [Select_CString(recipient.IsFemale, 'правительницы', 'правителя' )]. Но разве я не "
 lmf_interaction.0001.worst.cowardly: "как [Select_CString(recipient.IsFemale, 'трусиху, лишённую', 'труса, лишённого' )] стойкости. Но разве я не "
 lmf_interaction.0001.worst.dishonorable: "как [Select_CString(recipient.IsFemale, 'лишённую', 'лишённого' )] чести и достоинства. "
