 THEY_RECENTLY_RECEIVED_DEMAND: "[TARGET_CHARACTER.GetShortUINameNoTooltip] недавно [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'получили', Select_CString(TARGET_CHARACTER.IsFemale, 'получила', 'получил' ))] требование о наследстве"
