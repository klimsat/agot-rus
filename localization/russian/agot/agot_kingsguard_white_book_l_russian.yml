l_russian:

 agot_kingsguard_white_book.0001.t: "Белая книга"
 agot_kingsguard_white_book.0001.desc: "Я перелистываю страницы Белой книги, читая имена и деяния тех, кто носил белый плащ. Каждая запись повествует о храбрости, долге и самопожертвовании, напоминая мне о торжественных клятвах, что связывают Королевскую гвардию с короной."
 agot_kingsguard_white_book.0001.a: "#bold Перевернуть страницу#!"
 agot_kingsguard_white_book.0001.b: "#bold Закрыть книгу#!"

 agot_kingsguard_white_book.0002.t: "[selected_kingsguard.Custom('GetWhiteBookPageTitle')]"
