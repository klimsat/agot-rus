 nemesis_bsteel_bloodraven:0 "Их ненависть друг к другу зародилась ещё тогда, когда оба были всего лишь бастардами, добивавшимися хоть одного взгляда от короля, у которого и без того было слишком много сыновей. Всё началось на тренировочных дворах и в богорощах, где различия их натур превратились в поле битвы. Эйгор видит в Бриндене гниль, которую невозможно исцелить, соперника, само существование которого оскорбляет его гордость."
