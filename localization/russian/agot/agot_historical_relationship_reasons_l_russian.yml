 friend_gendry_arya: "На долгом пути к Стене [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'познакомились', Select_CString(CHARACTER.IsFemale, 'познакомилась', 'познакомился' ))] с «Арри» — неистовым и упрямым мальчиком, который был больше солдатом, чем любой рыцарь, которого [Select_CString( CHARACTER.IsLocalPlayer, 'вы', Select_CString(CHARACTER.IsFemale, 'она', 'он' ))] когда-либо [Select_CString( CHARACTER.IsLocalPlayer, 'встречали', Select_CString(CHARACTER.IsFemale, 'встречала', 'встречал' ))]. К удивлению [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )], [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'мальчик оказался личиной, которую вам пришлось принять, когда вся держава искала вас', 'под личиной мальчика скрывалась Арья,')] дочь бывшего Десницы. Это открытие заставило [Select_CString( CHARACTER.IsLocalPlayer, 'вас', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] усомниться в своей причастности к тем же событиям, кульминацией которых стал [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'ваш', 'их')] побег из #ONCLICK:TITLE,c_kings_landing #TOOLTIP:LANDED_TITLE,c_kings_landing #L Королевской Гавани#!#!#!."
