 friend_beric_thoros: "Некогда лорд и красный жрец, [CHARACTER.GetShortUIName] и [TARGET_CHARACTER.GetShortUIName] превратились в призраков, связанных целью, которая поглотила всё, чем [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'вы двое', 'они')] когда-то были. Для [Select_CString(CHARACTER.IsLocalPlayer, 'вас', 'Берика')] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'вы', 'Торос')] - единственный, кто знает цену каждой отданной и отнятой жизни, в то время как [Select_CString(CHARACTER.IsLocalPlayer, 'вы', 'Берик')] - одновременно и друг, и бремя, чья кровь всегда на [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'ваших', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))] руках."
