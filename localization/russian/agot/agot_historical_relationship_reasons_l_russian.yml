 friend_aegoniii_viserysii: "Долгие годы мир был холодным и опустошённым из-за последствий войны, которая унесла [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'вашу', 'их')] семью. [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] и [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] связывают братские узы, основанные на общей памяти о смерти [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'вашей', 'их')] матери и тяжести короны, которая больше похожа на траурный саван. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Ваше возвращение', 'Возвращение младшего брата')] из-за моря было единственным лучом света в царстве теней."
