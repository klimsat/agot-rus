 #Lover reasons
 lover_cersei_jaime:0 "Jaime and Cersei share a closeness that goes beyond what the rest of the realm considers proper. Jaime and Cersei share a closeness that goes far beyond what is considered proper. Your fates have been intertwined before birth, as two halves of the same soul. Their relationship is a foul transgression against the laws of gods and men and a stain upon their bloodline."
 lover_ned_cat:0 "Though she came north as a stranger bound by the duty to tie two kingdoms together, Cat found warmth in her marriage with the cold North. Over time, she developed genuine love for Ned, discovering that behind the somber face lies a man of deep tenderness."
 lover_ned_cat_corresponding:0 "Though she came north as a stranger bound by the duty to tie two kingdoms together, Cat found warmth in her marriage with the cold North. Over time, she developed genuine love for Ned, discovering that behind the somber face lies a man of deep tenderness."
 lover_robb_jeyne:0 "After a shared night of vulnerability born from grief, Robb chose the difficult path, placing Jeyne's honor above his own. Rather than leaving her with a tarnished name, Robb made her queen, breaking his promise to house Frey. You have found in her a softness you had forgotten existed, and a loyal and dedicated wife. His choice has, in turn, dishonored the promises he made to the lords who bleed for his cause."
