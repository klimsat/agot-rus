 friend_faegon_rduckfield: "Отношения, завязанные на залитых солнцем палубах «Робкой девы». Будучи простым рыцарем, служащим принцу-изгнаннику, [CHARACTER.GetShortUIName] и [TARGET_CHARACTER.GetShortUIName] обрели настоящую дружбу благодаря совместным тренировкам, искренности в грубых шутках и тяжёлому грузу тайного наследия."
 friend_faegon_illyrio: "[TARGET_CHARACTER.GetShortUIName|U] - щедрый благодетель, который превратил жизнь в изгнании в королевское образование, обеспечив [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] золотом и опекунами, необходимыми для возвращения украденного у [Select_CString( CHARACTER.IsLocalPlayer, 'вас', Select_CString(CHARACTER.IsFemale, 'неё', 'него' ))] права по рождению. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Мальчик - главный приз в партии кайвассы, в которую играют на протяжении десятилетий, фигурка дракона, тщательно вырезанная вашей собственной рукой', 'Магистр считается верным союзником и настоящим другом, человеком, чья доброта была молчаливой основой всей вашей жизни')]."
