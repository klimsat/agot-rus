 nemesis_sandor_gregor:0 "A bond shaped by a smell of burning flesh that never leaves the air when [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'you', 'they')] are together. [CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'carry', 'carries')] the physical proof of the world's depravity, a permanent reminder of the day [TARGET_CHARACTER.GetShortUIName] found [CharYouHerHim(CHARACTER)] playing with a wooden knight and decided to press [CharYourHerHis(TARGET_CHARACTER)] brother's face into a bed of hot coals as punishment."
