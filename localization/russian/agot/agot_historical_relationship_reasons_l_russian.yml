l_russian:
 #Friends reasons
 friend_jarryn_robert: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] связаны узами отцовской любви, которые крепче кровных. [CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'воспитали', Select_CString(CHARACTER.IsFemale, 'воспитала', 'воспитал' ))] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] в #ONCLICK:TITLE,c_the_eyrie #TOOLTIP:LANDED_TITLE,c_the_eyrie #L Орлином Гнезде#!#!#! вместе с #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('Stark_3').GetID] #L Эддардом Старком#!#!, как своих собственных сыновей. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Вы считаете', 'Роберт признаёт')], что, хотя боги дали [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вам', Select_CString(TARGET_CHARACTER.IsFemale, 'ей', 'ему' ))] двух братьев и отца, которого [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вы едва знали', Select_CString(TARGET_CHARACTER.IsFemale, 'она едва знала', 'он едва знал' ))], [Select_CString(CHARACTER.IsLocalPlayer, 'вы', 'Джон Аррен')] - тот человек, который сделал [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вас таким, какой вы', Select_CString(TARGET_CHARACTER.IsFemale, 'её такой, какой она', 'его таким, какой он' ))] есть."
 friend_jarryn_robert_corresponding: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] связаны узами отцовской любви, которые крепче кровных. [TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'воспитали', Select_CString(TARGET_CHARACTER.IsFemale, 'воспитала', 'воспитал' ))] [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] в #ONCLICK:TITLE,c_the_eyrie #TOOLTIP:LANDED_TITLE,c_the_eyrie #L Орлином Гнезде#!#!#! вместе с #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('Stark_3').GetID] #L Эддардом Старком#!#!, как своих собственных сыновей. [Select_CString(CHARACTER.IsLocalPlayer, 'Вы считаете', 'Роберт признаёт')], что, хотя боги дали [Select_CString( CHARACTER.IsLocalPlayer, 'вам', Select_CString(CHARACTER.IsFemale, 'ей', 'ему' ))] двух братьев и отца, которого [Select_CString( CHARACTER.IsLocalPlayer, 'вы едва знали', Select_CString(CHARACTER.IsFemale, 'она едва знала', 'он едва знал' ))], [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'вы', 'Джон Аррен')] - тот человек, который сделал [Select_CString( CHARACTER.IsLocalPlayer, 'вас таким, какой вы', Select_CString(CHARACTER.IsFemale, 'её такой, какой она', 'его таким, какой он' ))] есть."
 friend_jarryn_ned: "[CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'воспитали', Select_CString(CHARACTER.IsFemale, 'воспитала', 'воспитал' ))] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] в #ONCLICK:TITLE,c_the_eyrie #TOOLTIP:LANDED_TITLE,c_the_eyrie #L Орлином Гнезде#!#!#! вместе с #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('Baratheon_2').GetID] #L Робертом Баратеоном#!#!, как своих собственных сыновей, служа твёрдым примером, который превратил [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'вас', 'Неда')] из тихого второго сына в благородного человека, придавая моральный вес, который [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'вы цените', 'он ценит')] превыше всего остального."
 friend_jarryn_ned_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'воспитали', Select_CString(TARGET_CHARACTER.IsFemale, 'воспитала', 'воспитал' ))] [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] в #ONCLICK:TITLE,c_the_eyrie #TOOLTIP:LANDED_TITLE,c_the_eyrie #L Орлином Гнезде#!#!#! вместе с #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('Baratheon_2').GetID] #L Робертом Баратеоном#!#!, как своих собственных сыновей, служа твёрдым примером, который превратил [Select_CString(CHARACTER.IsLocalPlayer, 'вас', 'Неда')] из тихого второго сына в благородного человека, придавая моральный вес, который [Select_CString(CHARACTER.IsLocalPlayer, 'вы цените', 'он ценит')] превыше всего остального."
 friend_davos_salladhor: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] связаны дружбой, выкованной контрабандой и удивительным бегством, связаны коварными водами Узкого моря, контрабандист и пират. Хотя [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'ваши', 'их')] мнения часто расходятся, [Select_CString(CHARACTER.IsLocalPlayer, 'вас', 'Давоса')] и [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'вас', 'Саллу')] объединяет взаимопонимание, которое превосходит всё на свете."
 friend_davos_salladhor_corresponding: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] связаны дружбой, выкованной контрабандой и удивительным бегством, связаны коварными водами Узкого моря, контрабандист и пират. Хотя [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'ваши', 'их')] мнения часто расходятся, [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'вас', 'Давоса')] и [Select_CString(CHARACTER.IsLocalPlayer, 'вас', 'Саллу')] объединяет взаимопонимание, которое превосходит всё на свете."
 friend_robert_thoros: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] - хорошие друзья, объединённые общей любовью к вину, песням и охоте. Хотя [TARGET_CHARACTER.GetShortUINameNoTooltip] - красный жрец Рглора, [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'ваше', Select_CString(TARGET_CHARACTER.IsFemale, 'её', 'его' ))] присутствие ценится за веселье и удивительно умелое владение пламенным мечом."
 friend_robert_thoros_corresponding: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] - хорошие друзья, объединённые общей любовью к вину, песням и охоте. Хотя [CHARACTER.GetShortUINameNoTooltip] - красный жрец Рглора, [Select_CString( CHARACTER.IsLocalPlayer, 'ваше', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] присутствие ценится за веселье и удивительно умелое владение пламенным мечом."
 friend_robert_alysanne: "[CHARACTER.GetShortUIName|U] и [TARGET_CHARACTER.GetShortUIName] - кузены и друзья с детства. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'Ваша', 'Их')] связь уходит корнями в общую историю [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'ваших', 'их')] самых ранних дней, когда [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'вы', 'они')] вместе играли в детстве."
 friend_tywin_kevan: "Отношения между [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажем ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'им персонажем', '' )] и [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажем ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'им персонажем', '' )] основаны на абсолютной преданности. [CHARACTER.GetShortUINameNoTooltip|U] всегда [Select_CString( CHARACTER.IsLocalPlayer, 'полагались', Select_CString(CHARACTER.IsFemale, 'полагалась', 'полагался' ))] на [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вас', Select_CString(TARGET_CHARACTER.IsFemale, 'неё', 'него' ))] не просто как на брата, но и как на своего самого важного командира и правую руку. [TARGET_CHARACTER.GetShortUINameNoTooltip|U] всегда [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'воспринимали', Select_CString(TARGET_CHARACTER.IsFemale, 'воспринимала', 'воспринимал' ))] доверие [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] как высшую форму признания."
 friend_tywin_kevan_corresponding: "Отношения между [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажем ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'им персонажем', '' )] и [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажем ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'им персонажем', '' )] основаны на абсолютной преданности. [TARGET_CHARACTER.GetShortUINameNoTooltip|U] всегда [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'полагались', Select_CString(TARGET_CHARACTER.IsFemale, 'полагалась', 'полагался' ))] на [Select_CString( CHARACTER.IsLocalPlayer, 'вас', Select_CString(CHARACTER.IsFemale, 'неё', 'него' ))] не просто как на брата, но и как на своего самого важного командира и правую руку. [CHARACTER.GetShortUINameNoTooltip|U] всегда [Select_CString( CHARACTER.IsLocalPlayer, 'воспринимали', Select_CString(CHARACTER.IsFemale, 'воспринимала', 'воспринимал' ))] доверие [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] как высшую форму признания."
 friend_jaime_tyrion: "[TARGET_CHARACTER.GetShortUIName|U] всегда [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'считали', Select_CString(TARGET_CHARACTER.IsFemale, 'считала', 'считал' ))] [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] своим защитником и редким источником доброты, несмотря на презрение [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'ваших', 'их')] отца и сестры, относясь к [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'вам', Select_CString(TARGET_CHARACTER.IsFemale, 'ней', 'нему' ))] с уважением, которого не было у других членов дома [GetScriptedCharacterByHistoryID('Lannister_7').GetHouse.GetName]."
 friend_jaime_tyrion_corresponding: "[CHARACTER.GetShortUIName|U] всегда [Select_CString( CHARACTER.IsLocalPlayer, 'считали', Select_CString(CHARACTER.IsFemale, 'считала', 'считал' ))] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )] своим защитником и редким источником доброты, несмотря на презрение [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'ваших', 'их')] отца и сестры, относясь к [Select_CString( CHARACTER.IsLocalPlayer, 'вам', Select_CString(CHARACTER.IsFemale, 'ней', 'нему' ))] с уважением, которого не было у других членов дома [GetScriptedCharacterByHistoryID('Lannister_7').GetHouse.GetName]."
 friend_admarbrand_jaime: "Товарищество, основанное на общей истории [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'вашей', 'их')] юности. [CHARACTER.GetShortUIName|U] [Select_CString( CHARACTER.IsLocalPlayer, 'служили', Select_CString(CHARACTER.IsFemale, 'служила', 'служил' ))] пажом в #ONCLICK:TITLE,c_casterly_rock #TOOLTIP:LANDED_TITLE,c_casterly_rock #L Утёсе Кастерли#!#!#!, где [Select_CString( CHARACTER.IsLocalPlayer, 'подружились', Select_CString(CHARACTER.IsFemale, 'подружилась', 'подружился' ))] с [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажем ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'им персонажем', '' )], установив хорошие отношения с вероятным наследником и своим предполагаемым будущим сюзереном."
 friend_admarbrand_jaime_corresponding: "Товарищество, основанное на общей истории [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'вашей', 'их')] юности. [TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'служили', Select_CString(TARGET_CHARACTER.IsFemale, 'служила', 'служил' ))] пажом в #ONCLICK:TITLE,c_casterly_rock #TOOLTIP:LANDED_TITLE,c_casterly_rock #L Утёсе Кастерли#!#!#!, где [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'подружились', Select_CString(TARGET_CHARACTER.IsFemale, 'подружилась', 'подружился' ))] с [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажем ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'им персонажем', '' )], установив хорошие отношения с вероятным наследником и своим предполагаемым будущим сюзереном."
 friend_aerys_tywin: "Узы товарищества, сформировавшиеся, когда [TARGET_CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'служили', Select_CString(TARGET_CHARACTER.IsFemale, 'служила', 'служил' ))] королевским пажом и оруженосцем в #ONCLICK:TITLE,c_kings_landing #TOOLTIP:LANDED_TITLE,c_kings_landing #L Королевской Гавани#!#!#! вместе со #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('Baratheon_1').GetID] #L Стеффоном Баратеоном#!#!, кузеном [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )]. Со временем [TARGET_CHARACTER.GetShortUINameNoTooltip|U] и [CHARACTER.GetShortUINameNoTooltip] стали неразлучны, видя друг в друге незаменимых союзников."
 friend_aerys_tywin_corresponding: "Узы товарищества, сформировавшиеся, когда [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'служили', Select_CString(CHARACTER.IsFemale, 'служила', 'служил' ))] королевским пажом и оруженосцем в #ONCLICK:TITLE,c_kings_landing #TOOLTIP:LANDED_TITLE,c_kings_landing #L Королевской Гавани#!#!#! вместе со #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('Baratheon_1').GetID] #L Стеффоном Баратеоном#!#!, кузеном [Select_CString(TARGET_CHARACTER.IsLocalPlayer, '', 'персонажа ' )][TARGET_CHARACTER.GetShortUINamePossessive][Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'его персонажа', '' )]. Со временем [CHARACTER.GetShortUINameNoTooltip|U] и [TARGET_CHARACTER.GetShortUINameNoTooltip] стали неразлучны, видя друг в друге незаменимых союзников."
 friend_steffon_aerys: "Узы товарищества, сформировавшиеся, когда [CHARACTER.GetShortUIName] [Select_CString( CHARACTER.IsLocalPlayer, 'служили', Select_CString(CHARACTER.IsFemale, 'служила', 'служил' ))] королевским пажом и оруженосцем в #ONCLICK:TITLE,c_kings_landing #TOOLTIP:LANDED_TITLE,c_kings_landing #L Королевской Гавани#!#!#! вместе с #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('Lannister_1').GetID] #L Тайвином Ланнистером#!#!, наследником #ONCLICK:TITLE,c_casterly_rock #TOOLTIP:LANDED_TITLE,c_casterly_rock #L Утёса Кастерли#!#!#!. Со временем [CHARACTER.GetShortUINameNoTooltip|U] и [TARGET_CHARACTER.GetShortUINameNoTooltip] стали неразлучны, видя друг в друге незаменимых союзников."
 friend_steffon_aerys_corresponding: "Узы товарищества, сформировавшиеся, когда [TARGET_CHARACTER.GetShortUIName] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'служили', Select_CString(TARGET_CHARACTER.IsFemale, 'служила', 'служил' ))] королевским пажом и оруженосцем в #ONCLICK:TITLE,c_kings_landing #TOOLTIP:LANDED_TITLE,c_kings_landing #L Королевской Гавани#!#!#! вместе с #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('Lannister_1').GetID] #L Тайвином Ланнистером#!#!, наследником #ONCLICK:TITLE,c_casterly_rock #TOOLTIP:LANDED_TITLE,c_casterly_rock #L Утёса Кастерли#!#!#!. Со временем [TARGET_CHARACTER.GetShortUINameNoTooltip|U] и [CHARACTER.GetShortUINameNoTooltip] стали неразлучны, видя друг в друге незаменимых союзников."
