 lover_bloodraven_shiera:0 "Bloodraven with his thousand eyes and one, saw everything in the realm but could never truly see into the heart of the woman he loved. To him, Shiera is the only woman who truly matches his intellect and ruthlessness."
 lover_bloodraven_shiera_corresponding:0 "Bloodraven with his thousand eyes and one, saw everything in the realm but could never truly see into the heart of the woman he loved. To him, Shiera is the only woman who truly matches his intellect and ruthlessness."
 lover_egg_betha:0 "To Aegon, Betha is the living proof of a rare and beautiful choice made by the heart — a man who saw the beauty of the common world and chose her to walk it with him. Their bond is a vibrant defiance against tradition, a marriage of equals who chose to build a legacy on affection rather than ambition."
 lover_egg_betha_corresponding:0 "To Aegon, Betha is the living proof of a rare and beautiful choice made by the heart — a man who saw the beauty of the common world and chose her to walk it with him. Their bond is a vibrant defiance against tradition, a marriage of equals who chose to build a legacy on affection rather than ambition."
 lover_renly_loras:0 "Renly and Loras share a bond that smells of peaches and summer rain, a colorful hidden garden that flourished unexpectedly amidst the dreary stones of the Stormlands. They find in each other a mirror of their own vitality, trading the heavy expectations of their great houses for the simple joy of each other's company."
 lover_aegon_rhaenys:0 "While Aegon took Visenya to wife for duty, he wed Rhaenys for love, finding in the youngest sister a spirit as boundless as the skies he mastered. While their union was forged in the tradition of Old Valyria, it flourished in the skies of Westeros, a devotion shared in flight."
 lover_aegon_rhaenys_corresponding:0 "While Aegon took Visenya to wife for duty, he wed Rhaenys for love, finding in the youngest sister a spirit as boundless as the skies he mastered. While their union was forged in the tradition of Old Valyria, it flourished in the skies of Westeros, a devotion shared in flight."
 lover_rhaena_efarman:0 "While Rhaena found in Elissa a rare sanctuary of genuine affection amidst a life of tragedy, Elissa found a patron for his wilder dreams. Their romance is a desperate attempt to find happiness on their own terms."
 lover_rhaena_efarman_corresponding:0 "While Rhaena found in Elissa a rare sanctuary of genuine affection amidst a life of tragedy, Elissa found a patron for his wilder dreams. Their romance is a desperate attempt to find happiness on their own terms."
 lover_jerry_alysanne:0 "Their history began in the dead of night when, as mere children, they fled the regency of Kings Landing to wed in secret upon the cliffs of Dragonstone. That act of defiance defined their bond from that day forward."
 lover_baelon_alyssa:0 "Their love is a wild, laughing thing that began long before they exchanged marriage vows. Growing up as constant companions, Baelon and Alyssa were a pair of terrors in the Red Keep, evolving into a fiery romance that has never lost the playful energy of their youth."
 lover_daemonrp_mysaria:0 "Their partnership started in the dark corners of the Street of Silk, where they found a functional intimacy. Daemon treats Mysaria as a luxury he can afford and a weapon he can wield, while she made herself indispensable, securing the advantages the relationship brings."
 lover_daemonrp_mysaria_corresponding:0 "Their partnership started in the dark corners of the Street of Silk, where they found a functional intimacy. Daemon treats Mysaria as a luxury he can afford and a weapon he can wield, while she made herself indispensable, securing the advantages the relationship brings."
 lover_daemonrp_nettles:0 "Their bond started as a mentorship, but it blossomed into intimacy. Daemon and Nettles share a history of stolen moments, away from the carnage of the civil war."
 lover_rhaenyra_criston:0 "Their history started when the young Princess chose the dashing Criston Cole as her personal protector, elevating her favorite knight to a position of constant proximity. Theirs is a youthful crush of a princess for her knight."
 lover_rhaenyra_criston_corresponding:0 "Their history started when the young Princess chose the dashing Criston Cole as her personal protector, elevating her favorite knight to a position of constant proximity. Theirs is a youthful crush of a princess for her knight."
 lover_rhaenyra_harwin:0 "Their relationship began when a knight happened upon a spurned princess, and that night they took solace in each other's company. Their history is one of unwavering presence, with Harwin offering the love that has become the heartbeat of his personal life."
 lover_rhaenyra_harwin_corresponding:0 "Their relationship began when a knight happened upon a spurned princess, and that night they took solace in each other's company. Their history is one of unwavering presence, with Harwin offering the love that has become the heartbeat of his personal life."
 lover_aemond_alys:0 "Within the hollowed-out ruins of Harrenhal, Aemond and Alys found a sanctuary the rest of the world could never understand. Their connection is a mixture of prophecy and passion, forged in the shadows of a cursed castle where the Prince found a confidant who did not fear the fire within him."
 lover_aemond_alys_corresponding:0 "Within the hollowed-out ruins of Harrenhal, Aemond and Alys found a sanctuary the rest of the world could never understand. Their connection is a mixture of prophecy and passion, forged in the shadows of a cursed castle where the Prince found a confidant who did not fear the fire within him."
 lover_maegor_tyanna:0 "Between Maegor and Tyanna lies a grim understanding that power is maintained through fear and force. Their link is forged in the silence of the torture chambers and the heat of dragonflame, where his outward violence is perfectly complemented by her web of eyes and ears that ensures no enemy remains hidden."
 lover_maegor_tyanna_corresponding:0 "Between Maegor and Tyanna lies a grim understanding that power is maintained through fear and force. Their link is forged in the silence of the torture chambers and the heat of dragonflame, where his outward violence is perfectly complemented by her web of eyes and ears that ensures no enemy remains hidden."
 lover_petyr_lysa:0 "A connection born from a night in the dark, a secret intimacy that neither the Tully name nor the laws of men could sanction. Lysa is the only person who truly understands the depth of Petyr's longing, finding a steady devotion in him that her own heart seeks elsewhere."
 lover_petyr_lysa_corresponding:0 "A connection born from a night in the dark, a secret intimacy that neither the Tully name nor the laws of men could sanction. Lysa is the only person who truly understands the depth of Petyr's longing, finding a steady devotion in him that her own heart seeks elsewhere."

 #Soulmate reasons
 soulmate_dunksmall_jenny:0 "Two souls who found a sanctuary in the soft rain and the ancient stones, trading a crown for the freedom of a dragonfly. To Dunkan, Jenny is a woman who smells of wildflowers and old secrets, and the only person who makes him feel like a man rather than a piece on a dynastic board."
 soulmate_dunksmall_jenny_corresponding:0 "Two souls who found a sanctuary in the soft rain and the ancient stones, trading a crown for the freedom of a dragonfly. To Dunkan, Jenny is a woman who smells of wildflowers and old secrets, and the only person who makes him feel like a man rather than a piece on a dynastic board."

 #Grudge Reasons
 grudge_cersei_robert:0 "It started on the very night of their nuptials, when the bedding ended not in a vow of love, but in a murmured betrayal. The wine was heavy and the feast was done, and Robert whispered the name of another woman into Cersei's ear: "Lyanna"."
 grudge_cersei_robert_corresponding:0 "It started on the very night of their nuptials, when the bedding ended not in a vow of love, but in a murmured betrayal. The wine was heavy and the feast was done, and Robert whispered the name of another woman into Cersei's ear: "Lyanna"."
 grudge_catelyn_jsnow:0 "Catelyn sees Jon as a constant reminder of Eddard's infidelity, a resentment that deepens each time she looks upon his dark hair and gray eyes, more a Stark than her firstborn. She could never fathom the decision to bring a bastard home, and would rather endure a thousand hidden bastards than one living under her roof."
 grudge_catelyn_jsnow_corresponding:0 "Catelyn sees Jon as a constant reminder of Eddard's infidelity, a resentment that deepens each time she looks upon his dark hair and gray eyes, more a Stark than her firstborn. She could never fathom the decision to bring a bastard home, and would rather endure a thousand hidden bastards than one living under her roof."
 grudge_oberyn_mountain:0 "It started when the lions were let loose in the capital, turning a city into a slaughterhouse and a princess into a victim. It started when the lions were let loose in the capital, turning a city into a slaughterhouse and a princess into a victim at the hands of a mindless beast. Oberyn does not want an apology or land; he wants the life of the one responsible: Gregor, a walking blood-debt whose only purpose is to die screaming the name of the woman he destroyed, Elia. Gregor, a blood-debt the Red Viper plans to collect himself to avenge, Elia."
 grudge_oberyn_mountain_corresponding:0 "It started when the lions were let loose in the capital, turning a city into a slaughterhouse and a princess into a victim. It started when the lions were let loose in the capital, turning a city into a slaughterhouse and a princess into a victim at the hands of a mindless beast. Oberyn does not want an apology or land; he wants the life of the one responsible: Gregor, a walking blood-debt whose only purpose is to die screaming the name of the woman he destroyed, Elia. Gregor, a blood-debt the Red Viper plans to collect himself to avenge, Elia."
 grudge_oberyn_alorch:0 "Oberyn carries a venomous contempt for Amory. The Sack was no accident, but a duty fulfilled. You never looked back, simply obeying the command of Tywin Lannister, like any good soldier would. It began when Amory Lorch dragged a weeping Rhaenys from beneath a bed, proving that his service to Tywin Lannister, knows no floor of depravity."
 grudge_oberyn_alorch_corresponding:0 "Oberyn carries a venomous contempt for Amory. The Sack was no accident, but a duty fulfilled. You never looked back, simply obeying the command of Tywin Lannister, like any good soldier would. It began when Amory Lorch dragged a weeping Rhaenys from beneath a bed, proving that his service to Tywin Lannister, knows no floor of depravity."
 grudge_oberyn_tywin:0 "Oberyn cannot forget that while Tywin was being embraced as an ally by a new king, Elia, Rhaenys and Aegon were being slaughtered in the shadow of that same king's throne. You see the act as pure cruelty, but with it, you secured a future for the West and the Seven Kingdoms. Oberyn sees past his facade of honor, seeing only the butcher who hid behind his rank while his monsters did the work."
 grudge_oberyn_tywin_corresponding:0 "Oberyn cannot forget that while Tywin was being embraced as an ally by a new king, Elia, Rhaenys and Aegon were being slaughtered in the shadow of that same king's throne. You see the act as pure cruelty, but with it, you secured a future for the West and the Seven Kingdoms. Oberyn sees past his facade of honor, seeing only the butcher who hid behind his rank while his monsters did the work."

 #Rival Reasons
 rival_robert_rhaegar:0 "Robert and Rhaegar became sworn enemies after Rhaegar kidnapped Lyanna, Robert's betrothed, which was seen as a grave insult. That offense motivated half the realm to rise in rebellion against the Iron Throne to find the bastard and bring Lyanna back to Robert's arms. Unknowingly, the act plunged the Seven Kingdoms into a bloody rebellion under Robert's leadership."
 rival_robert_rhaegar_corresponding:0 "Robert and Rhaegar became sworn enemies after Rhaegar kidnapped Lyanna, Robert's betrothed, which was seen as a grave insult. That offense motivated half the realm to rise in rebellion against the Iron Throne to find the bastard and bring Lyanna back to Robert's arms. Unknowingly, the act plunged the Seven Kingdoms into a bloody rebellion under Robert's leadership."
 rival_aerys_tywin:0 "The root of the enmity between Aerys and Tywin lies in the rising ambition and insubordination that shattered a friendship of many decades. It all started with Aerys's interest for Joanna, Tywin's lady, leading to years of public insults."
 rival_aerys_tywin_corresponding:0 "The root of the enmity between Aerys and Tywin lies in the pettiness and envy that shattered a friendship of many decades. It all started with Aerys's obsessive desire for Joanna, Tywin's wife, a personal affront that led to years of public insults."
 rival_cersei_tyrion:0 "Cersei considers Tyrion to be her greatest tormentor for reminding her of the monstrous imp he is, vile enough to kill their mother. Secretly, you dread that he is the valonqar profecized to be the reason for your own death."
 rival_cersei_tyrion_corresponding:0 "Cersei considers Tyrion to be her greatest tormentor for constantly seeking to undermine and humiliate her with public ridicule, and for the constantly blaming for the death of their mother."
 rival_jsnow_alliser:0 "Alliser and Jon exist in a state of permanent, simmering friction, each serving as the other's greatest goad. While you bury the ghosts of your past with harsh discipline, Jon's eyes exude the arrogance of a boy who wears his bastardy like a crown. Time will show Lord Snow that pride is a luxury that only leads to a cold grave."
 rival_jsnow_alliser_corresponding:0 "Alliser and Jon exist in a state of permanent, simmering friction, each serving as the other's greatest goad. While Thorne hides his own failures behind a mask of harsh discipline, Jon's presence acts as a constant reminder of the high-born life the older man can never reclaim."
 rival_jsnow_ramsay:0 "Between them lies a hatred fueled by blood. You see a self-righteous coward to be broken and humiliated, a fool who clings to the honor of a dead man as if it were a shield."
 rival_jsnow_ramsay_corresponding:0 "Between them lies a hatred fueled by blood. Ramsay bears the stain of countless deaths, a blight who dared to lay his hands upon Winterfell, a monster who wears a human skin and treats the lives of others as sport."
 rival_aerion_dunk:0 "Their hatred was written in the blood of better men on the tourney grounds of Ashford. Dunk is a lowly creature, a stable-boy in a suit of plate who dared to strike his better. Aerion is the dragon, and this nameless knight is merely a blunt tool the gods sent to test your fire."
 rival_aerion_dunk_corresponding:0 "Their hatred was written in the blood of better men on the tourney grounds of Ashford. Dunk is the one who committed the sin of defending a puppeteer against a prince who represents everything a true knight must destroy. Aerion is a sadistic man who hides behind a crown to inflict pain on the defenseless."
 rival_aerion_egg:0 "Aerion is forced to watch a dragon walk among the sheep. The fascination of your brother with the smallfolk is a sickness only you can cure. Aegon is a disappointment who would rather sleep in the dirt with a hedge knight than embrace the fire he carries in his veins."
 rival_aerion_egg_corresponding:0 "Aerion is the brother who whispered of dragons while inflicting scars that no maester could heal. He is a warning of what becomes of a prince who never learned mercy. Aegon is struck by the terror that Aerion uses as a leash, pushing to see if he will break."
 rival_daemon_rhea:0 "A forced union that neither desired, a political pact that tethered a restless dragon to the stones of the Vale. From their first meeting, they were incompatible in every detail; Rhea's stoic pride as a Lady of Runestone was the perfect foil to Daemon's volatile ambition."
 rival_daemon_rhea_corresponding:0 "A forced union that neither desired, a political pact that tethered a restless dragon to the stones of the Vale. From their first meeting, they were incompatible in every detail; Rhea's stoic pride as a Lady of Runestone was the perfect foil to Daemon's volatile ambition."
 rival_daemon_otto:0 "Otto and Daemon are tied by a mutual disdain that borders on the obsessive. To Otto, the prince is a chaotic fire that must be extinguished to preserve order, while Daemon sees Otto as an opportunist leeching the blood of the dragon for his own house's gain."
 rival_daemon_otto_corresponding:0 "Otto and Daemon are tied by a mutual disdain that borders on the obsessive. To Otto, the prince is a chaotic fire that must be extinguished to preserve order, while Daemon sees Otto as an opportunist leeching the blood of the dragon for his own house's gain."
 rival_rhaenyra_alicent:0 "From Aegon's birth, Rhaenyra and Alicent were locked in a cold war of influence over Viseris. Their bond proves the fact that power and pride can turn a family into a nest of vipers, where the only thing they share is the name of the man who failed to keep them at peace."
 rival_rhaenyra_criston:0 "Their history is of a protector turned persecutor. Criston, the man who once wore Rhaenyra's favor, has become her biggest goad, a shattered trust that soured her former devotion into cold malice. What was once a bond of loyalty now lies curdled, beyond hope of repair."
 rival_rhaenyra_criston_corresponding:0 "Their history is of a protector turned persecutor. Criston, the man who once wore Rhaenyra's favor, has become her biggest goad, a shattered trust that soured her former devotion into cold malice. What was once a bond of loyalty now lies curdled, beyond hope of repair."
 rival_rhaenyra_aemond:0 "Their rivalry is an open wound that refuses to heal, born in the salt-sprayed air of High Tide. Rhaenyra and Aemond are tethered by the memory of a lost eye and the sharp accusation of bastardy that nearly cost Aemond his tongue — a debt etched in blood, and one that remains unpaid."
 rival_rhaenyra_aemond_corresponding:0 "Their rivalry is an open wound that refuses to heal, born in the salt-sprayed air of High Tide. Rhaenyra and Aemond are tethered by the memory of a lost eye and the sharp accusation of bastardy that nearly cost Aemond his tongue — a debt etched in blood, and one that remains unpaid."
 rival_rhaenyra_aegonii:0 "Their history began with a birth the realm hailed as a blessing but Rhaenyra mourned as a curse — half-siblings raised beneath the same roof yet divided by a mountain of resentment. That resentment hardened into hate the night Lucerys took Aemond's eye, and whatever fragile hope of peace remained was shattered."
 rival_rhaenyra_aegonii_corresponding:0 "Their history began with a birth the realm hailed as a blessing but Rhaenyra mourned as a curse — half-siblings raised beneath the same roof yet divided by a mountain of resentment. That resentment hardened into hate the night Lucerys took Aemond's eye, and whatever fragile hope of peace remained was shattered."
 rival_aemond_lucerys:0 "Their rivalry began in earnest at Laena's funeral, where a childhood scuffle escalated into a dynastic blood feud. That night, Aemond crept away to claim the largest dragon in the world — and in return lost an eye to the knife of Lucerys's knife."
 rival_aemond_lucerys_corresponding:0 "Their rivalry began in earnest at Laena's funeral, where a childhood scuffle escalated into a dynastic blood feud. That night, Aemond crept away to claim the largest dragon in the world — and in return lost an eye to the knife of Lucerys's knife."
 rival_aemon_aegoniv:0 "Their bond is built on insults and silence, an exercise in agonizing endurance, held together only by their name and the weight of their father's legacy."
 rival_aemon_aegoniv_corresponding:0 "Their bond is built on insults and silence, an exercise in agonizing endurance, held together only by their name and the weight of their father's legacy."
 rival_daeronii_aegoniv:0 "Aegon sees in Daeron a silent judgment of his own excesses, a somber prince who would rather read than revel. Their bond is defined by a bitter doubt that has poisoned the very idea of family, as you find more of yourself in your baseborn sons than in the legitimate one."
 rival_daeronii_aegoniv_corresponding:0 "Aegon sees in Daeron a silent judgment of his own excesses, a somber prince who would rather read than revel. Their bond is defined by a bitter doubt that has poisoned the very idea of family, as Aegon turns his back on his trueborn son while scattering bastards across the realm."
 rival_daeronii_daemonbf:0 "Between Daeron and Daemon lies a bond shattered by distrust, bound to the legendary blade that passed between them. The final blow for you was losing your love to the sands — a princess bartered for a fragile Dornish peace — leaving in your heart only the weight of Blackfyre and the bitter taste of betrayal."
 rival_daeronii_daemonbf_corresponding:0 "Between Daeron and Daemon lies a bond shattered by distrust, bound to the legendary blade that passed between them. The final blow was the realization that there is a divide that no blood can bridge. Despite being offered lands, honors, and a place at court, the ghost of King Aegon IV and his gift will always haunt Daemon."
 rival_jsnow_jslynt:0 "Jon Snow and Janos share a relationship built on the irony of two men forced to serve the same vow despite being separated by a river of blood. While Janos clings to the fading remnants of his former status, Jon holds the memory of his father's dignity as a shield."
 rival_jsnow_jslynt_corresponding:0 "Jon Snow and Janos share a relationship built on the irony of two men forced to serve the same vow despite being separated by a river of blood. While Janos clings to the fading remnants of his former status, Jon holds the memory of his father's dignity as a shield."
 rival_dmallister_cpyke:0 "As commanders of two different fortresses, they have spent years competing for resources and influence, each convinced that the other is unfit for his post. Dennys sees nothing but a crude, illiterate pirate, while Cotter regards him as a preening old man who cares more for his name than the survival of the Watch."
 rival_dmallister_cpyke_corresponding:0 "As commanders of two different fortresses, they have spent years competing for resources and influence, each convinced that the other is unfit for his post. Dennys sees nothing but a crude, illiterate pirate, while Cotter regards him as a preening old man who cares more for his name than the survival of the Watch."
 rival_tywin_rreyne:0 "A struggle between the two lions of the West began when Roger thought he could mock the Rock without fear of reprisal. Defiant, you showed your claws, as the golden lion no longer holds the power it once did. Yet, some still cling to their supposed glorious past — the heir, Tywin — taking the mockery to your house as a debt yet to be collected."
 rival_tywin_rreyne_corresponding:0 "A struggle between the two lions of the West began when Roger thought he could mock the Rock without fear of reprisal. Defiant, the red lion showed his claws, threatening his liege. Yet he did not foresee that the golden lion still has teeth — in the figure of Tywin — who views the defiance as a debt yet to be collected."

 #Nemesis Reasons
 nemesis_bsteel_bloodraven:0 "Their hatred for each other started when they were both merely bastards vying for a glance from a king who had too many sons. It started in the training yards and the godswood, where the differences in their natures became a battlefield. Aegor views Brynden as a rot that cannot be cured, a rival whose very presence is an insult to his pride."
 nemesis_aerys_ddarklyn:0 "A deep hatred between Aerys and Denys was born the moment he imprisoned his king. The ultimate act of treason — a vassal who dared to lay hands upon the Lord of the Seven Kingdoms and strip him of his divine dignity, an insult that can only be answered in fire and blood."
 nemesis_aerys_ddarklyn_corresponding:0 "A deep hatred between Aerys and Denys was born the moment he imprisoned his king. A desperate act against a tyrant whose erratic whims threatened to bleed House Darklyn dry, the imprisonment served to remind him of his fragile humanity, a grim lesson that even dragons can be caged and made to bleed."
 nemesis_sandor_gregor:0 "A bond shaped by a smell of burning flesh that never leaves the air when they are together. Sandor carries the physical proof of the world's depravity, a permanent reminder of the day Gregor found him playing with a wooden knight and decided to press his brother's face into a bed of hot coals as punishment."
 nemesis_sandor_gregor_corresponding:0 "A bond shaped by a smell of burning flesh that never leaves the air when they are together. Sandor carries the physical proof of the world's depravity, a permanent reminder of the day Gregor found him playing with a wooden knight and decided to press his brother's face into a bed of hot coals as punishment."
 nemesis_euron_aeron:0 "It started with childhood torments that Euron treated as a game, teaching Aeron early on that he was powerless against him. Aeron is a toy to be broken and reassembled for sport, a weak mind you watch with delight as he desperately tries to escape reality."
 nemesis_euron_aeron_corresponding:0 "It started with childhood torments that Euron treated as a game, teaching Aeron early on that he was powerless against him. Aeron is afflicted by the memory of the sound of a rusted iron hinge, each act a desperate attempt to outrun the shadow of the man who first taught the meaning of fear."
 nemesis_euron_victarion:0 "Euron and Victarion are tethered by a shared bloodline and a fundamental disgust. It started in the shadow of the Sea Tower, where Euron first realized that the easiest way to hurt Victarion was to desecrate the things he holds sacred."
 nemesis_euron_victarion_corresponding:0 "Euron and Victarion are tethered by a shared bloodline and a fundamental disgust. It started in the shadow of the Sea Tower, where Euron first realized that the easiest way to hurt Victarion was to desecrate the things he holds sacred."