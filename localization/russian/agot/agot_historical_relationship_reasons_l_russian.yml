 friend_dany_wdarry: "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'унесли', Select_CString(TARGET_CHARACTER.IsFemale, 'унесла', 'унёс' ))] последние угли дома [GetScriptedCharacterByHistoryID('Targaryen_9').GetHouse.GetName] в ночь, спасаясь от клинков Узурпатора, которые пробили брешь в толстых стенах #ONCLICK:TITLE,c_dragonstone #TOOLTIP:LANDED_TITLE,c_dragonstone #L Драконьего Камня#!#!#!. [Select_CString(CHARACTER.IsLocalPlayer, 'Он - единственный отец, которого вы когда-либо знали, человек, который превратил изгнание в дом с красной дверью и лимонным деревом у окна', 'Для юной принцессы эта преданность - остаток утраченного престижа, верный рыцарь, который тратит свои силы на то, чтобы дракон мог вырасти вдали от тени клетки')]."
