 friend_faegon_joncon: "Для [Select_CString(CHARACTER.IsLocalPlayer, '', 'персонажа ' )][CHARACTER.GetShortUINamePossessive][Select_CString(CHARACTER.IsLocalPlayer, 'его персонажа', '' )] [TARGET_CHARACTER.GetShortUIName] - создатель [Select_CString( CHARACTER.IsLocalPlayer, 'вашей', Select_CString(CHARACTER.IsFemale, 'её', 'его' ))] судьбы, отец, которого [Select_CString( CHARACTER.IsLocalPlayer, 'вы', Select_CString(CHARACTER.IsFemale, 'она', 'он' ))] никогда не [Select_CString( CHARACTER.IsLocalPlayer, 'знали', Select_CString(CHARACTER.IsFemale, 'знала', 'знал' ))], тот, кто пожертвовал своим именем и честью, чтобы взрастить короля из пепла. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Для вас этот мальчик — второй шанс, живое воплощение серебряного принца, которого вы давным-давно подвели', 'Старик - это суровая опора долга, он учит, как руководить, бороться и помнить')]."
