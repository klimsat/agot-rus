 thug_attribute.unlock_tt: "Выполняется любое из нижеследующих условий:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] обладает свойством «[GetTrait('reaver').GetName( GetNullCharacter )]»\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] обладает свойством «[GetTrait('wrathful').GetName( GetNullCharacter )]»\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] обладает свойством «[GetTrait('arbitrary').GetName( GetNullCharacter )]»\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] обладает свойством «[GetTrait('arrogant').GetName( GetNullCharacter )]»\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] обладает свойством «[GetTrait('impatient').GetName( GetNullCharacter )]»\n$EFFECT_LIST_BULLET$Можно получить доступ к атрибуту, когда [Concept('army', 'армия')|E], в которой сражается [Concept('acclaimed_knight', 'именитый рыцарь')|E], убивает вражеских [Concept('knights', 'рыцарей')|E]"
