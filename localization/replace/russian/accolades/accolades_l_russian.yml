 accolade_idealist_unlock.tt: "При виде нашего милосердного обращения с пленными [idealist.GetName] [Select_CString(idealist.IsFemale, 'испытала', 'испытал' )] душевный подъем. [idealist.GetSheHe|U] может [Concept('acclaimed', 'удостоиться')|E] акколады «[GetAccoladeType('idealist_attribute').GetName]»"

 charmer_attribute.unlock_tt: "Выполняется любое из нижеследующих условий:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] обладает свойством «[GetTrait('seducer').GetName( GetNullCharacter )]»\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] обладает свойством «[GetTrait('lustful').GetName( GetNullCharacter )]»\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] может получить доступ к атрибуту, когда вы завершаете [Concept('scheme', 'происки')|E] по #TOOLTIP:SCHEME_TYPE,seduce #L соблазнению#!#!"
