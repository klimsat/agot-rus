 #Common attribute unlocks

 marauder_attribute.unlock_tt: "Выполняется любое из нижеследующих условий:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] обладает свойством «[GetTrait('sadistic').GetName( GetNullCharacter )]»\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] обладает свойством «[GetTrait('callous').GetName( GetNullCharacter )]»\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] обладает свойством «[GetTrait('vengeful').GetName( GetNullCharacter )]»\n$EFFECT_LIST_BULLET$Можно получить доступ к атрибуту, когда [Concept('army', 'армия')|E], в которой сражается [Concept('acclaimed_knight', 'именитый рыцарь')|E], [Concept('occupies', 'оккупирует')|E] вражеское [Concept('holding', 'владение')|E]"
 accolade_marauder_unlock.t: "[marauder.GetName] [Select_CString(marauder.IsFemale, 'воодушевлена', 'воодушевлен' )] разорением вражеской твердыни"
 accolade_marauder_unlock.tt: "[marauder.GetName] может быть [Concept('acclaimed', Select_CString(marauder.IsFemale, 'удостоена', 'удостоен' ) )|E] акколады «[GetAccoladeType('marauder_attribute').GetName]»"

 idealist_attribute.unlock_tt: "Выполняется любое из нижеследующих условий:\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] обладает свойством «[GetTrait('compassionate').GetName( GetNullCharacter )]»\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] обладает свойством «[GetTrait('forgiving').GetName( GetNullCharacter )]»\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] обладает свойством «[GetTrait('generous').GetName( GetNullCharacter )]»\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] обладает свойством «[GetTrait('trusting').GetName( GetNullCharacter )]»\n$EFFECT_LIST_BULLET$[acclaimed_knight|E] может получить доступ к атрибуту, когда #high вы#! без всяких условий освобождаете [Concept('prisoner', 'узника')|E]"
