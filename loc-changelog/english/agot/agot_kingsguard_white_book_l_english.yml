l_english:

 agot_kingsguard_white_book.0001.t:0 "The White Book"
 agot_kingsguard_white_book.0001.desc:0 "I leaf through the pages of the White Book, reading the names and deeds of those who have donned the white cloak. Each entry speaks of courage, duty, and sacrifice, reminding me of the solemn vows that bind the Kingsguard to the crown."
 agot_kingsguard_white_book.0001.a:0 "#bold Turn Page#!"
 agot_kingsguard_white_book.0001.b:0 "#bold Close Book#!"

 agot_kingsguard_white_book.0002.t:0 "[selected_kingsguard.Custom('GetWhiteBookPageTitle')]"
 agot_kingsguard_white_book.0002.desc:0 "[white_book_page.GetNameNoTierNoTooltip]"
 agot_kingsguard_white_book.0002.a:0 "#bold Back to Contents#!"
 agot_kingsguard_white_book.0002.b:0 "#bold Close Book#!"

 agot_kingsguard_white_book_title_house:0 "Ser [ROOT.Char.GetFirstNameNoTooltip] of House[AGOTGetSurname(ROOT.Char)]"
 agot_kingsguard_white_book_title_bastard:0 "Ser [ROOT.Char.GetFirstNameNoTooltip][AGOTGetSurname(ROOT.Char)]"
 agot_kingsguard_white_book_title_surname:0 "Ser [ROOT.Char.GetFirstNameNoTooltip][AGOTGetSurname(ROOT.Char)]"
 agot_kingsguard_white_book_title_nickname:0 "Ser [ROOT.Char.GetFirstNameNicknamedNoTooltip]"
 agot_kingsguard_white_book_title_fallback:0 "Ser [ROOT.Char.GetNameNoTooltip]"

 agot_kingsguard_white_book_fallback_on_join:0 "[ROOT.Char.GetTitledFirstNameNoTooltip] joined the Kingsguard and served honorably."
 agot_kingsguard_white_book_fallback_after_death:0 "[ROOT.Char.GetTitledFirstNameNoTooltip] joined the Kingsguard and served honorably until his death."

 agot_kingsguard_white_book_page:0 "[selected_kingsguard.Custom('GetWhiteBookPage')]"

 agot_age_ordinal_st:0 "st"
 agot_age_ordinal_nd:0 "nd"
 agot_age_ordinal_rd:0 "rd"
 agot_age_ordinal_th:0 "th"

 agot_kingsguard_white_book_page_empty:0 ""
 agot_kingsguard_white_book_page_join_parents:0 "[AGOTGetBirthOrder(ROOT.Char)] [ROOT.Char.Custom('GetDaughterSon')|l] of [AGOTGetName(ROOT.Char.GetFather)] and [AGOTGetName(ROOT.Char.GetMother)][AGOTGetTitleSuffixNoFormat(ROOT.Char.GetFather)]. "
