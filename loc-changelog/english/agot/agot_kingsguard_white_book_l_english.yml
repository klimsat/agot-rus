 agot_kingsguard_white_book_page_join_paragraph:0 "[selected_kingsguard.Custom('GetWhiteBookParents')]Named to the Kingsguard in [selected_kingsguard.GetHerHis] [selected_kingsguard.GetAge][selected_kingsguard.Custom('GetAgeOrdinal')] year under [AGOTGetName(king)]."
 agot_kingsguard_white_book_page_lc_update:0 "[white_book_page.GetNameNoTierNoTooltip]\n\nNamed Lord Commander of the Kingsguard in [selected_kingsguard.GetHerHis] [selected_kingsguard.GetAge][selected_kingsguard.Custom('GetAgeOrdinal')] year by [AGOTGetName(king)]."
 agot_kingsguard_white_book_page_sent_to_nightswatch_update:0 "[white_book_page.GetNameNoTierNoTooltip]\n\nDismissed from the Kingsguard and sent to the Night's Watch in [selected_kingsguard.GetHerHis] [selected_kingsguard.GetAge][selected_kingsguard.Custom('GetAgeOrdinal')] year by [AGOTGetName(king)]."
