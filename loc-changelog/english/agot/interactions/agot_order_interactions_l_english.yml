 CITADEL_LUSTFUL:1 "[GetTrait('lustful').GetName( recipient.Self )]: $VALUE|=+0$"
 CITADEL_PHYSICIAN:1 "[personality|E] — #italic He has studied the human condition:#! $VALUE|=+0$"
 CITADEL_ZEALOUS:1 "[personality|E] — #italic He would prefer serving the faith:#! $VALUE|=+0$"
 CITADEL_GREED:1 "[personality|E] — #italic He has no desire to relinquish earthly pleasures:#! $VALUE|=+0$"
 CITADEL_WEAK:1 "[personality|E] — #italic His weakness would make it difficult to earn glory in battle:#! $VALUE|=+0$"
 agot_the_citadel.1000.desc:0 "I can think of no greater joy than spending my life dedicated to scholarly pursuits. I will begin journeying to the Citadel immediately."
 agot_the_citadel.1000.positive:0 "I am glad [recipient.GetFirstNameNoTooltip] saw the wisdom in this action."
 agot_the_citadel.1001.desc:0 "Your suggestion that I uproot my entire life and scurry off to the Citadel is ludicrous. I am happy where I am, and I have no plans to change that."
 agot_the_citadel.1001.negative:0 "Most unfortunate..."

 #Silent Sister
 send_to_silent_sisterhood_interaction:0 "Send to the Silent Sisterhood"
 send_to_silent_sisterhood_interaction_desc:0 "Send [recipient.GetShortUINameNoTooltip] to take the vows of silence and join the sisterhood."

 #Septon
 take_vows_septon_interaction:0 "Ask to Take Vows"
 take_vows_septon_interaction_desc:0 "Ask [recipient.GetShortUINameNoTooltip] to take the vows and join the clergy"
