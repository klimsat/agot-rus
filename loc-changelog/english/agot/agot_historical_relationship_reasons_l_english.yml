 nemesis_euron_aeron:0 "It started with childhood torments that [CHARACTER.GetShortUIName] treated as a game, teaching [TARGET_CHARACTER.GetShortUIName] early on that [CharYouSheHe(TARGET_CHARACTER)] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'were', 'was')] powerless against [CharYouHerHim(CHARACTER)]. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'you are', 'Aeron is')] [Select_CString(CHARACTER.IsLocalPlayer, 'a toy to be broken and reassembled for sport, a weak mind you watch with delight as he desperately tries to escape reality', 'afflicted by the memory of the sound of a rusted iron hinge, each act a desperate attempt to outrun the shadow of the man who first taught the meaning of fear')]."
