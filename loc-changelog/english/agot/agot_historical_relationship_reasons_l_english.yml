 nemesis_euron_victarion:0 "[CHARACTER.GetShortUIName|U] and [TARGET_CHARACTER.GetShortUIName] are tethered by a shared bloodline and a fundamental disgust. It started in the shadow of the Sea Tower, where [Select_CString(CHARACTER.IsLocalPlayer, 'you', 'Euron')] first realized that the easiest way to hurt [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'you', 'Victarion')] was to desecrate the things [CharYouSheHe(TARGET_CHARACTER)] holds sacred."
