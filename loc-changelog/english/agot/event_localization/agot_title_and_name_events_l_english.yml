l_english:

 agot_title_and_name_events.0001.t:0 "A Matter of Royal Blood"
 agot_title_and_name_events.0001.desc:0 "My [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('child'))], [AGOTGetName(child)], is of royal blood, yet lacks recognition as such. As [ROOT.Char.GetTitleAsNameNoTooltip], it is within my power to bestow such honors upon [child.GetHerHim] so that all may know of [child.GetHerHis] royal lineage."
 agot_title_and_name_events.0001.desc.twins:0 "[AGOTGetName(child)] and [AGOTGetName(child_2)], the newborn children of my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('scoped_relative'))], [AGOTGetName(scoped_relative)], are of royal blood, yet lack recognition as such. As [ROOT.Char.GetTitleAsNameNoTooltip], it is within my power to bestow such honors upon them so that all may know of their royal lineage."
 agot_title_and_name_events.0001.desc.triplets:0 "[AGOTGetName(child)], [AGOTGetName(child_2)], and [AGOTGetName(child_3)], the newborn children of my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('scoped_relative'))], [AGOTGetName(scoped_relative)], are of royal blood, yet lack recognition as such. As [ROOT.Char.GetTitleAsNameNoTooltip], it is within my power to bestow such honors upon them so that all may know of their royal lineage."
 agot_title_and_name_events.0001.a:0 "Royal blood requires royal recognition."
 agot_title_and_name_events.0001.b:0 "Distant relations are not deserving of such honor."
 agot_title_and_name_events.0001.b.flavor:0 "@alert_icon! #alert_trial You will be able to bestow royal titles later#!"

 agot_title_and_name_events.0002.desc:0 "Members of my House are of royal blood, yet lack recognition as such. As [ROOT.Char.GetTitleAsNameNoTooltip], it is within my power to bestow such honors upon them so that all may know of their royal lineage.\n\n#I Select relatives to bestow royal titles upon#!"
