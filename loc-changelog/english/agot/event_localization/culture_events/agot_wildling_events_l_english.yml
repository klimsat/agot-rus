l_english:

 agot_wildling_events.0001.t:0 "A Name Bestowed"
 agot_wildling_events.0001.desc.me:0 "[ROOT.Char.GetFirstNameNoTooltip].\n\nA simple milk name, given only to ward off ill fortune in the earliest days of life among my people.\n\nNow that I have grown strong enough to be named properly, I wonder what name I should take."
 agot_wildling_events.0001.desc:0 "[child.GetFirstNameNoTooltip].\n\nA simple milk name, given only to ward off ill fortune in [child.GetHerHis] earliest days among our people.\n\nNow that [child.GetSheHe] has grown strong enough, it is time for [child.GetHerHim] to be given a true name among our people."
 agot_wildling_events.0001.a:0 "Let [Select_CString(Character.IsLocalPlayer, 'me', 'the child' )] be named anew."

 agot_wildling_events.0100.t:0 "A Name Taking Shape"
 agot_wildling_events.0100.desc.me:0 "[ROOT.Char.GetFirstNameNoTooltip].\n\nNo longer a milk name, but a true name now, taken from the creatures of the world, as is custom among my people.\n\nIt is the first step beyond childhood, though not yet the name I will carry as a grown [ROOT.Char.GetWomanMan]."
 agot_wildling_events.0100.desc:0 "[child.GetFirstNameNoTooltip].\n\nNo longer a milk name, but a true name now, taken from the creatures of the world, as is custom among our people.\n\nIt marks the first step beyond childhood, though not yet the name [child.GetSheHe] will carry as an adult."
 agot_wildling_events.0100.a:0 "A name earned in growing."

 agot_wildling_events.0101.t:0 "A Name Completed"
 agot_wildling_events.0101.desc.me:0 "[ROOT.Char.GetFirstNameNoTooltip].\n\nMy childhood name is gone; my name now bears an epithet that reflects who I have become, as is custom among my people.\n\nIt is a name fit for adulthood."
 agot_wildling_events.0101.desc:0 "[child.GetFirstNameNoTooltip].\n\n[child.GetHerHis|U] childhood name is gone; [child.GetHerHis] name now bears an epithet that reflects who [child.GetSheHe] has become, as is custom among our people.\n\nIt is a name fit for adulthood."
 agot_wildling_events.0101.a:0 "A name made whole."