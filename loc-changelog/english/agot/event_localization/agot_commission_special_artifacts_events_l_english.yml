l_english:

 agot_commission_special_artifact_crown.0001.t:0 "Crown Commission"
 agot_commission_special_artifact_crown.0001.desc:0 "Few in Westeros are allowed to possess a crown. Fewer still have the authority to wear one. The time has come to craft a new symbol of power to represent and legitimize my reign. Let history remember me by my name, my deeds, and the symbols I choose to bear. I shall commission a crown that will become an heirloom, passed from generation to generation, openly showcasing my power and influence."
 agot_commission_special_artifact_crown.0001.desc_coronation:0 "Every coronation requires a crown, and so I shall commission one. It will become an heirloom, passed from generation to generation, openly showcasing my power and influence."
 agot_commission_special_artifact_crown.0001.a:0 "This is the one."
 agot_commission_special_artifact_crown.0001.b:0 "I've changed my mind. I no longer wish to make a new crown."

 agot_commission_special_artifact_crown_spouse.0001.desc:0 "Few in Westeros are allowed to possess a crown. Fewer still have the authority to wear one. I shall commission a new crown to be bestowed upon my spouse."

 agot_commission_special_artifact_armor.0001.t:0 "Armor Commission"
 agot_commission_special_artifact_armor.0001.desc:0 "Armor is more than simple protection; it reflects the status and presence of the one who wears it. I will commission a new set, forged to my measure and worthy of being remembered."
 agot_commission_special_artifact_armor.0001.a:0 "This is the one."
 agot_commission_special_artifact_armor.0001.b:0 "I've changed my mind. I no longer wish to make new armor."